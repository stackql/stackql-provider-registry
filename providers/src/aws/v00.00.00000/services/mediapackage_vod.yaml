openapi: 3.0.0
info:
  version: "2018-11-07"
  title: AWS Elemental MediaPackage VOD
  description: AWS Elemental MediaPackage VOD
  x-serviceName: mediapackage-vod
  x-serviceAlias: mediapackage_vod
  x-protocol: rest-json
  x-apiVersion: "2018-11-07"
  x-endpointPrefix: mediapackage-vod
  x-jsonVersion: "1.1"
servers:
  - url: https://mediapackage-vod.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediapackage-vod
paths:
  /packaging_groups/{id}/configure_logs:
    put:
      operationId: ConfigureLogs
      description: Changes the packaging group's properities to configure log subscription
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of a MediaPackage VOD PackagingGroup resource.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                EgressAccessLogs:
                  $ref: "#/components/schemas/EgressAccessLogs"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigureLogsResponse"
  /assets:
    post:
      operationId: CreateAsset
      description: Creates a new MediaPackage VOD Asset resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/__string"
                PackagingGroupId:
                  $ref: "#/components/schemas/__string"
                ResourceId:
                  $ref: "#/components/schemas/__string"
                SourceArn:
                  $ref: "#/components/schemas/__string"
                SourceRoleArn:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - PackagingGroupId
                - SourceArn
                - SourceRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAssetResponse"
    get:
      operationId: ListAssets
      description: Returns a collection of MediaPackage VOD Asset resources.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Upper bound on number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
        - name: packagingGroupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns Assets associated with the specified PackagingGroup.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsResponse"
  /packaging_configurations:
    post:
      operationId: CreatePackagingConfiguration
      description: Creates a new MediaPackage VOD PackagingConfiguration resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CmafPackage:
                  $ref: "#/components/schemas/CmafPackage"
                DashPackage:
                  $ref: "#/components/schemas/DashPackage"
                HlsPackage:
                  $ref: "#/components/schemas/HlsPackage"
                Id:
                  $ref: "#/components/schemas/__string"
                MssPackage:
                  $ref: "#/components/schemas/MssPackage"
                PackagingGroupId:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - PackagingGroupId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackagingConfigurationResponse"
    get:
      operationId: ListPackagingConfigurations
      description: Returns a collection of MediaPackage VOD PackagingConfiguration resources.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Upper bound on number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
        - name: packagingGroupId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Returns MediaPackage VOD PackagingConfigurations associated with the specified PackagingGroup.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPackagingConfigurationsResponse"
  /packaging_groups:
    post:
      operationId: CreatePackagingGroup
      description: Creates a new MediaPackage VOD PackagingGroup resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Authorization:
                  $ref: "#/components/schemas/Authorization"
                EgressAccessLogs:
                  $ref: "#/components/schemas/EgressAccessLogs"
                Id:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackagingGroupResponse"
    get:
      operationId: ListPackagingGroups
      description: Returns a collection of MediaPackage VOD PackagingGroup resources.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Upper bound on number of records to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to resume pagination from the end of a previous request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPackagingGroupsResponse"
  /assets/{id}:
    delete:
      operationId: DeleteAsset
      description: Deletes an existing MediaPackage VOD Asset resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the MediaPackage VOD Asset resource to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAssetResponse"
    get:
      operationId: DescribeAsset
      description: Returns a description of a MediaPackage VOD Asset resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of an MediaPackage VOD Asset resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeAssetResponse"
  /packaging_configurations/{id}:
    delete:
      operationId: DeletePackagingConfiguration
      description: Deletes a MediaPackage VOD PackagingConfiguration resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the MediaPackage VOD PackagingConfiguration resource to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackagingConfigurationResponse"
    get:
      operationId: DescribePackagingConfiguration
      description: Returns a description of a MediaPackage VOD PackagingConfiguration resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of a MediaPackage VOD PackagingConfiguration resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackagingConfigurationResponse"
  /packaging_groups/{id}:
    delete:
      operationId: DeletePackagingGroup
      description: Deletes a MediaPackage VOD PackagingGroup resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the MediaPackage VOD PackagingGroup resource to delete.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePackagingGroupResponse"
    get:
      operationId: DescribePackagingGroup
      description: Returns a description of a MediaPackage VOD PackagingGroup resource.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of a MediaPackage VOD PackagingGroup resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribePackagingGroupResponse"
    put:
      operationId: UpdatePackagingGroup
      description: Updates a specific packaging group. You can't change the id attribute or any other system-generated attributes.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of a MediaPackage VOD PackagingGroup resource.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Authorization:
                  $ref: "#/components/schemas/Authorization"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePackagingGroupResponse"
  /tags/{resource-arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of the tags assigned to the specified resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource. You can get this from the response to any request to the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds tags to the specified resource. You can specify one or more tags to add.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource. You can get this from the response to any request to the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/__mapOf__string"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes tags from the specified resource. You can specify one or more tags to remove.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the resource. You can get this from the response to any request to the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: A comma-separated list of the tag keys to remove from the resource.
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    EgressAccessLogs:
      description: Configure egress access logging.
      type: object
      properties:
        LogGroupName:
          $ref: "#/components/schemas/__string"
          description: Customize the log group name.
    ConfigureLogsResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the PackagingGroup.
        Authorization:
          $ref: "#/components/schemas/Authorization"
        CreatedAt:
          $ref: "#/components/schemas/__string"
          description: The time the PackagingGroup was created.
        DomainName:
          $ref: "#/components/schemas/__string"
          description: The fully qualified domain name for Assets in the PackagingGroup.
        EgressAccessLogs:
          $ref: "#/components/schemas/EgressAccessLogs"
        Id:
          $ref: "#/components/schemas/__string"
          description: The ID of the PackagingGroup.
        Tags:
          type: object
          properties: {}
    Authorization:
      description: CDN Authorization credentials
      type: object
      properties:
        CdnIdentifierSecret:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the secret in AWS Secrets Manager that is used for CDN authorization.
        SecretsRoleArn:
          $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) for the IAM role that allows MediaPackage to communicate with AWS Secrets Manager.
      required:
        - SecretsRoleArn
        - CdnIdentifierSecret
    Tags:
      description: A collection of tags associated with a resource
      type: object
      properties: {}
    CreateAssetResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the Asset.
        CreatedAt:
          $ref: "#/components/schemas/__string"
          description: The time the Asset was initially submitted for Ingest.
        EgressEndpoints:
          $ref: "#/components/schemas/__listOfEgressEndpoint"
          description: The list of egress endpoints available for the Asset.
        Id:
          $ref: "#/components/schemas/__string"
          description: The unique identifier for the Asset.
        PackagingGroupId:
          $ref: "#/components/schemas/__string"
          description: The ID of the PackagingGroup for the Asset.
        ResourceId:
          $ref: "#/components/schemas/__string"
          description: The resource ID to include in SPEKE key requests.
        SourceArn:
          $ref: "#/components/schemas/__string"
          description: ARN of the source object in S3.
        SourceRoleArn:
          $ref: "#/components/schemas/__string"
          description: The IAM role_arn used to access the source S3 bucket.
        Tags:
          type: object
          properties: {}
    __listOfEgressEndpoint:
      type: array
      items:
        $ref: "#/components/schemas/EgressEndpoint"
    EgressEndpoint:
      description: The endpoint URL used to access an Asset using one PackagingConfiguration.
      type: object
      properties:
        PackagingConfigurationId:
          $ref: "#/components/schemas/__string"
          description: The ID of the PackagingConfiguration being applied to the Asset.
        Status:
          $ref: "#/components/schemas/__string"
          description: The current processing status of the asset used for the packaging configuration. The status can be either QUEUED, PROCESSING, PLAYABLE, or FAILED. Status information won't be available for most assets ingested before 2021-09-30.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL of the parent manifest for the repackaged Asset.
    CmafPackage:
      description: A CMAF packaging configuration.
      type: object
      properties:
        Encryption:
          $ref: "#/components/schemas/CmafEncryption"
        HlsManifests:
          $ref: "#/components/schemas/__listOfHlsManifest"
          description: A list of HLS manifest configurations.
        IncludeEncoderConfigurationInSegments:
          $ref: "#/components/schemas/__boolean"
          description: When includeEncoderConfigurationInSegments is set to true, MediaPackage places your encoder's Sequence Parameter Set (SPS), Picture Parameter Set (PPS), and Video Parameter Set (VPS) metadata in every video segment instead of in the init fragment. This lets you use different SPS/PPS/VPS settings for your assets during content playback.
        SegmentDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: Duration (in seconds) of each fragment. Actual fragments will be rounded to the nearest multiple of the source fragment duration.
      required:
        - HlsManifests
    CmafEncryption:
      description: A CMAF encryption configuration.
      type: object
      properties:
        ConstantInitializationVector:
          $ref: "#/components/schemas/__string"
          description: An optional 128-bit, 16-byte hex value represented by a 32-character string, used in conjunction with the key for encrypting blocks. If you don't specify a value, then MediaPackage creates the constant initialization vector (IV).
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
      required:
        - SpekeKeyProvider
    SpekeKeyProvider:
      description: A configuration for accessing an external Secure Packager and Encoder Key Exchange (SPEKE) service that will provide encryption keys.
      type: object
      properties:
        EncryptionContractConfiguration:
          $ref: "#/components/schemas/EncryptionContractConfiguration"
        RoleArn:
          $ref: "#/components/schemas/__string"
          description: An Amazon Resource Name (ARN) of an IAM role that AWS Elemental MediaPackage will assume when accessing the key provider service.
        SystemIds:
          $ref: "#/components/schemas/__listOf__string"
          description: The system IDs to include in key requests.
        Url:
          $ref: "#/components/schemas/__string"
          description: The URL of the external key provider service.
      required:
        - SystemIds
        - Url
        - RoleArn
    EncryptionContractConfiguration:
      description: "Use encryptionContractConfiguration to configure one or more content encryption keys for your endpoints that use SPEKE 2.0. The encryption contract defines which content keys are used to encrypt the audio and video tracks in your stream. To configure the encryption contract, specify which audio and video encryption presets to use. Note the following considerations when using encryptionContractConfiguration: encryptionContractConfiguration can be used for DASH endpoints that use SPEKE 2.0. SPEKE 2.0 relies on the CPIX 2.3 specification. You must disable key rotation for this endpoint by setting keyRotationIntervalSeconds to 0."
      type: object
      properties:
        PresetSpeke20Audio:
          $ref: "#/components/schemas/PresetSpeke20Audio"
          description: A collection of audio encryption presets.
        PresetSpeke20Video:
          $ref: "#/components/schemas/PresetSpeke20Video"
          description: A collection of video encryption presets.
      required:
        - PresetSpeke20Audio
        - PresetSpeke20Video
    PresetSpeke20Audio:
      type: string
      enum:
        - PRESET-AUDIO-1
        - PRESET-AUDIO-2
        - PRESET-AUDIO-3
        - SHARED
        - UNENCRYPTED
    PresetSpeke20Video:
      type: string
      enum:
        - PRESET-VIDEO-1
        - PRESET-VIDEO-2
        - PRESET-VIDEO-3
        - PRESET-VIDEO-4
        - PRESET-VIDEO-5
        - PRESET-VIDEO-6
        - PRESET-VIDEO-7
        - PRESET-VIDEO-8
        - SHARED
        - UNENCRYPTED
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    __listOfHlsManifest:
      type: array
      items:
        $ref: "#/components/schemas/HlsManifest"
    HlsManifest:
      description: An HTTP Live Streaming (HLS) manifest configuration.
      type: object
      properties:
        AdMarkers:
          $ref: "#/components/schemas/AdMarkers"
          description: This setting controls how ad markers are included in the packaged OriginEndpoint. "NONE" will omit all SCTE-35 ad markers from the output. "PASSTHROUGH" causes the manifest to contain a copy of the SCTE-35 ad markers (comments) taken directly from the input HTTP Live Streaming (HLS) manifest. "SCTE35_ENHANCED" generates ad markers and blackout tags based on SCTE-35 messages in the input source.
        IncludeIframeOnlyStream:
          $ref: "#/components/schemas/__boolean"
          description: When enabled, an I-Frame only stream will be included in the output.
        ManifestName:
          $ref: "#/components/schemas/__string"
          description: An optional string to include in the name of the manifest.
        ProgramDateTimeIntervalSeconds:
          $ref: "#/components/schemas/__integer"
          description: The interval (in seconds) between each EXT-X-PROGRAM-DATE-TIME tag inserted into manifests. Additionally, when an interval is specified ID3Timed Metadata messages will be generated every 5 seconds using the ingest time of the content. If the interval is not specified, or set to 0, then no EXT-X-PROGRAM-DATE-TIME tags will be inserted into manifests and no ID3Timed Metadata messages will be generated. Note that irrespective of this parameter, if any ID3 Timed Metadata is found in HTTP Live Streaming (HLS) input, it will be passed through to HLS output.
        RepeatExtXKey:
          $ref: "#/components/schemas/__boolean"
          description: When enabled, the EXT-X-KEY tag will be repeated in output manifests.
        StreamSelection:
          $ref: "#/components/schemas/StreamSelection"
    AdMarkers:
      type: string
      enum:
        - NONE
        - SCTE35_ENHANCED
        - PASSTHROUGH
    __boolean:
      type: boolean
    __integer:
      type: integer
    StreamSelection:
      description: A StreamSelection configuration.
      type: object
      properties:
        MaxVideoBitsPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The maximum video bitrate (bps) to include in output.
        MinVideoBitsPerSecond:
          $ref: "#/components/schemas/__integer"
          description: The minimum video bitrate (bps) to include in output.
        StreamOrder:
          $ref: "#/components/schemas/StreamOrder"
          description: A directive that determines the order of streams in the output.
    StreamOrder:
      type: string
      enum:
        - ORIGINAL
        - VIDEO_BITRATE_ASCENDING
        - VIDEO_BITRATE_DESCENDING
    DashPackage:
      description: A Dynamic Adaptive Streaming over HTTP (DASH) packaging configuration.
      type: object
      properties:
        DashManifests:
          $ref: "#/components/schemas/__listOfDashManifest"
          description: A list of DASH manifest configurations.
        Encryption:
          $ref: "#/components/schemas/DashEncryption"
        IncludeEncoderConfigurationInSegments:
          $ref: "#/components/schemas/__boolean"
          description: When includeEncoderConfigurationInSegments is set to true, MediaPackage places your encoder's Sequence Parameter Set (SPS), Picture Parameter Set (PPS), and Video Parameter Set (VPS) metadata in every video segment instead of in the init fragment. This lets you use different SPS/PPS/VPS settings for your assets during content playback.
        IncludeIframeOnlyStream:
          $ref: "#/components/schemas/__boolean"
          description: When enabled, an I-Frame only stream will be included in the output.
        PeriodTriggers:
          $ref: "#/components/schemas/__listOf__PeriodTriggersElement"
          description: A list of triggers that controls when the outgoing Dynamic Adaptive Streaming over HTTP (DASH) Media Presentation Description (MPD) will be partitioned into multiple periods. If empty, the content will not be partitioned into more than one period. If the list contains "ADS", new periods will be created where the Asset contains SCTE-35 ad markers.
        SegmentDurationSeconds:
          $ref: "#/components/schemas/__integer"
          description: Duration (in seconds) of each segment. Actual segments will be rounded to the nearest multiple of the source segment duration.
        SegmentTemplateFormat:
          $ref: "#/components/schemas/SegmentTemplateFormat"
          description: Determines the type of SegmentTemplate included in the Media Presentation Description (MPD). When set to NUMBER_WITH_TIMELINE, a full timeline is presented in each SegmentTemplate, with $Number$ media URLs. When set to TIME_WITH_TIMELINE, a full timeline is presented in each SegmentTemplate, with $Time$ media URLs. When set to NUMBER_WITH_DURATION, only a duration is included in each SegmentTemplate, with $Number$ media URLs.
      required:
        - DashManifests
    __listOfDashManifest:
      type: array
      items:
        $ref: "#/components/schemas/DashManifest"
    DashManifest:
      description: A DASH manifest configuration.
      type: object
      properties:
        ManifestLayout:
          $ref: "#/components/schemas/ManifestLayout"
          description: Determines the position of some tags in the Media Presentation Description (MPD). When set to FULL, elements like SegmentTemplate and ContentProtection are included in each Representation. When set to COMPACT, duplicate elements are combined and presented at the AdaptationSet level.
        ManifestName:
          $ref: "#/components/schemas/__string"
          description: An optional string to include in the name of the manifest.
        MinBufferTimeSeconds:
          $ref: "#/components/schemas/__integer"
          description: Minimum duration (in seconds) that a player will buffer media before starting the presentation.
        Profile:
          $ref: "#/components/schemas/Profile"
          description: The Dynamic Adaptive Streaming over HTTP (DASH) profile type. When set to "HBBTV_1_5", HbbTV 1.5 compliant output is enabled.
        ScteMarkersSource:
          $ref: "#/components/schemas/ScteMarkersSource"
          description: The source of scte markers used. When set to SEGMENTS, the scte markers are sourced from the segments of the ingested content. When set to MANIFEST, the scte markers are sourced from the manifest of the ingested content.
        StreamSelection:
          $ref: "#/components/schemas/StreamSelection"
    ManifestLayout:
      type: string
      enum:
        - FULL
        - COMPACT
    Profile:
      type: string
      enum:
        - NONE
        - HBBTV_1_5
    ScteMarkersSource:
      type: string
      enum:
        - SEGMENTS
        - MANIFEST
    DashEncryption:
      description: A Dynamic Adaptive Streaming over HTTP (DASH) encryption configuration.
      type: object
      properties:
        SpekeKeyProvider:
          $ref: "#/components/schemas/SpekeKeyProvider"
      required:
        - SpekeKeyProvider
    __listOf__PeriodTriggersElement:
      type: array
      items:
        $ref: "#/components/schemas/__PeriodTriggersElement"
    __PeriodTriggersElement:
      type: string
      enum:
