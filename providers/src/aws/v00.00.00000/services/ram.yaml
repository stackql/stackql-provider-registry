openapi: 3.0.0
info:
  version: "2018-01-04"
  title: AWS Resource Access Manager
  description: AWS Resource Access Manager
  x-serviceName: ram
  x-serviceAlias: ram
  x-protocol: rest-json
  x-apiVersion: "2018-01-04"
  x-endpointPrefix: ram
  x-jsonVersion: "1.1"
servers:
  - url: https://ram.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ram
paths:
  /acceptresourceshareinvitation:
    post:
      operationId: AcceptResourceShareInvitation
      description: Accepts an invitation to a resource share from another Amazon Web Services account. After you accept the invitation, the resources included in the resource share are available to interact with in the relevant Amazon Web Services Management Consoles and tools.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareInvitationArn:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - resourceShareInvitationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptResourceShareInvitationResponse"
  /associateresourceshare:
    post:
      operationId: AssociateResourceShare
      description: Adds the specified list of principals, resources, and source constraints to a resource share. Principals that already have access to this resource share immediately receive access to the added resources. Newly added principals immediately receive access to the resources shared in this resource share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                resourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
                principals:
                  $ref: "#/components/schemas/PrincipalArnOrIdList"
                clientToken:
                  $ref: "#/components/schemas/String"
                sources:
                  $ref: "#/components/schemas/SourceArnOrAccountList"
              required:
                - resourceShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceShareResponse"
  /associateresourcesharepermission:
    post:
      operationId: AssociateResourceSharePermission
      description: Adds or replaces the RAM permission for a resource type included in a resource share. You can have exactly one permission associated with each resource type in the resource share. You can add a new RAM permission only if there are currently no resources of that resource type currently in the resource share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                permissionArn:
                  $ref: "#/components/schemas/String"
                replace:
                  $ref: "#/components/schemas/Boolean"
                clientToken:
                  $ref: "#/components/schemas/String"
                permissionVersion:
                  $ref: "#/components/schemas/Integer"
              required:
                - resourceShareArn
                - permissionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceSharePermissionResponse"
  /createpermission:
    post:
      operationId: CreatePermission
      description: Creates a customer managed permission for a specified resource type that you can attach to resource shares. It is created in the Amazon Web Services Region in which you call the operation.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PermissionName"
                resourceType:
                  $ref: "#/components/schemas/String"
                policyTemplate:
                  $ref: "#/components/schemas/Policy"
                clientToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - name
                - resourceType
                - policyTemplate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePermissionResponse"
  /createpermissionversion:
    post:
      operationId: CreatePermissionVersion
      description: Creates a new version of the specified customer managed permission. The new version is automatically set as the default version of the customer managed permission. New resource shares automatically use the default permission. Existing resource shares continue to use their original permission versions, but you can use ReplacePermissionAssociations to update them. If the specified customer managed permission already has the maximum of 5 versions, then you must delete one of the existing versions before you can create a new one.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                policyTemplate:
                  $ref: "#/components/schemas/Policy"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - permissionArn
                - policyTemplate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePermissionVersionResponse"
  /createresourceshare:
    post:
      operationId: CreateResourceShare
      description: Creates a resource share. You can provide a list of the Amazon Resource Names (ARNs) for the resources that you want to share, a list of principals you want to share the resources with, the permissions to grant those principals, and optionally source constraints to enhance security for service principal sharing. Sharing a resource makes it available for use by principals outside of the Amazon Web Services account that created the resource. Sharing doesn't change any permissions or quotas that apply to the resource in the account that created it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/String"
                resourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
                principals:
                  $ref: "#/components/schemas/PrincipalArnOrIdList"
                tags:
                  $ref: "#/components/schemas/TagList"
                allowExternalPrincipals:
                  $ref: "#/components/schemas/Boolean"
                clientToken:
                  $ref: "#/components/schemas/String"
                permissionArns:
                  $ref: "#/components/schemas/PermissionArnList"
                sources:
                  $ref: "#/components/schemas/SourceArnOrAccountList"
                resourceShareConfiguration:
                  $ref: "#/components/schemas/ResourceShareConfiguration"
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResourceShareResponse"
  /deletepermission:
    delete:
      operationId: DeletePermission
      description: Deletes the specified customer managed permission in the Amazon Web Services Region in which you call this operation. You can delete a customer managed permission only if it isn't attached to any resource share. The operation deletes all versions associated with the customer managed permission.
      parameters:
        - name: permissionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies the Amazon Resource Name (ARN) of the customer managed permission that you want to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePermissionResponse"
  /deletepermissionversion:
    delete:
      operationId: DeletePermissionVersion
      description: Deletes one version of a customer managed permission. The version you specify must not be attached to any resource share and must not be the default version for the permission. If a customer managed permission has the maximum of 5 versions, then you must delete at least one version before you can create another.
      parameters:
        - name: permissionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies the Amazon Resource Name (ARN) of the permission with the version you want to delete.
        - name: permissionVersion
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Integer"
          description: Specifies the version number to delete. You can't delete the default version for a customer managed permission. You can't delete a version if it's the only version of the permission. You must either first create another version, or delete the permission completely. You can't delete a version if it is attached to any resource shares. If the version is the default, you must first use SetDefaultPermissionVersion to set a different version as the default for the customer managed permission, and then use AssociateResourceSharePermission to update your resource shares to use the new default version.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePermissionVersionResponse"
  /deleteresourceshare:
    delete:
      operationId: DeleteResourceShare
      description: Deletes the specified resource share. This doesn't delete any of the resources that were associated with the resource share; it only stops the sharing of those resources through this resource share.
      parameters:
        - name: resourceShareArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies the Amazon Resource Name (ARN) of the resource share to delete.
        - name: clientToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies a unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourceShareResponse"
  /disassociateresourceshare:
    post:
      operationId: DisassociateResourceShare
      description: Removes the specified principals, resources, or source constraints from participating in the specified resource share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                resourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
                principals:
                  $ref: "#/components/schemas/PrincipalArnOrIdList"
                clientToken:
                  $ref: "#/components/schemas/String"
                sources:
                  $ref: "#/components/schemas/SourceArnOrAccountList"
              required:
                - resourceShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateResourceShareResponse"
  /disassociateresourcesharepermission:
    post:
      operationId: DisassociateResourceSharePermission
      description: Removes a managed permission from a resource share. Permission changes take effect immediately. You can remove a managed permission from a resource share only if there are currently no resources of the relevant resource type currently attached to the resource share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                permissionArn:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - resourceShareArn
                - permissionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateResourceSharePermissionResponse"
  /enablesharingwithawsorganization:
    post:
      operationId: EnableSharingWithAwsOrganization
      description: Enables resource sharing within your organization in Organizations. This operation creates a service-linked role called AWSServiceRoleForResourceAccessManager that has the IAM managed policy named AWSResourceAccessManagerServiceRolePolicy attached. This role permits RAM to retrieve information about the organization and its structure. This lets you share resources with all of the accounts in the calling account's organization by specifying the organization ID, or all of the accounts in an organizational unit (OU) by specifying the OU ID. Until you enable sharing within the organization, you can specify only individual Amazon Web Services accounts, or for supported resource types, IAM roles and users. You must call this operation from an IAM role or user in the organization's management account.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableSharingWithAwsOrganizationResponse"
  /getpermission:
    post:
      operationId: GetPermission
      description: Retrieves the contents of a managed permission in JSON format.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                permissionVersion:
                  $ref: "#/components/schemas/Integer"
              required:
                - permissionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPermissionResponse"
  /getresourcepolicies:
    post:
      operationId: GetResourcePolicies
      description: Retrieves the resource policies for the specified resources that you own and have shared. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
                principal:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - resourceArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePoliciesOutputDisplay"
  /getresourceshareassociations:
    post:
      operationId: GetResourceShareAssociations
      description: Retrieves the lists of resources and principals that associated for resource shares that you own. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                associationType:
                  $ref: "#/components/schemas/ResourceShareAssociationType"
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                resourceArn:
                  $ref: "#/components/schemas/String"
                principal:
                  $ref: "#/components/schemas/String"
                associationStatus:
                  $ref: "#/components/schemas/ResourceShareAssociationStatus"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - associationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceShareAssociationsResponse"
  /getresourceshareinvitations:
    post:
      operationId: GetResourceShareInvitations
      description: Retrieves details about invitations that you have received for resource shares. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareInvitationArns:
                  $ref: "#/components/schemas/ResourceShareInvitationArnList"
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceShareInvitationsResponse"
  /getresourceshares:
    post:
      operationId: GetResourceShares
      description: Retrieves details about the resource shares that you own or that are shared with you. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                resourceShareStatus:
                  $ref: "#/components/schemas/ResourceShareStatus"
                resourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                name:
                  $ref: "#/components/schemas/String"
                tagFilters:
                  $ref: "#/components/schemas/TagFilters"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                permissionArn:
                  $ref: "#/components/schemas/String"
                permissionVersion:
                  $ref: "#/components/schemas/Integer"
              required:
                - resourceOwner
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourceSharesResponse"
  /listpendinginvitationresources:
    post:
      operationId: ListPendingInvitationResources
      description: Lists the resources in a resource share that is shared with you but for which the invitation is still PENDING. That means that you haven't accepted or rejected the invitation and the invitation hasn't expired. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareInvitationArn:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                resourceRegionScope:
                  $ref: "#/components/schemas/ResourceRegionScopeFilter"
              required:
                - resourceShareInvitationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPendingInvitationResourcesResponse"
  /listpermissionassociations:
    post:
      operationId: ListPermissionAssociations
      description: Lists information about the managed permission and its associations to any resource shares that use this managed permission. This lets you see which resource shares use which versions of the specified managed permission. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                permissionVersion:
                  $ref: "#/components/schemas/Integer"
                associationStatus:
                  $ref: "#/components/schemas/ResourceShareAssociationStatus"
                resourceType:
                  $ref: "#/components/schemas/String"
                featureSet:
                  $ref: "#/components/schemas/PermissionFeatureSet"
                defaultVersion:
                  $ref: "#/components/schemas/Boolean"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionAssociationsResponse"
  /listpermissionversions:
    post:
      operationId: ListPermissionVersions
      description: Lists the available versions of the specified RAM permission. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - permissionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionVersionsResponse"
  /listpermissions:
    post:
      operationId: ListPermissions
      description: Retrieves a list of available RAM permissions that you can use for the supported resource types. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceType:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                permissionType:
                  $ref: "#/components/schemas/PermissionTypeFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPermissionsResponse"
  /listprincipals:
    post:
      operationId: ListPrincipals
      description: Lists the principals that you are sharing resources with or that are sharing resources with you. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                resourceArn:
                  $ref: "#/components/schemas/String"
                principals:
                  $ref: "#/components/schemas/PrincipalArnOrIdList"
                resourceType:
                  $ref: "#/components/schemas/String"
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - resourceOwner
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPrincipalsResponse"
  /listreplacepermissionassociationswork:
    post:
      operationId: ListReplacePermissionAssociationsWork
      description: Retrieves the current status of the asynchronous tasks performed by RAM when you perform the ReplacePermissionAssociationsWork operation. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                workIds:
                  $ref: "#/components/schemas/ReplacePermissionAssociationsWorkIdList"
                status:
                  $ref: "#/components/schemas/ReplacePermissionAssociationsWorkStatus"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReplacePermissionAssociationsWorkResponse"
  /listresourcesharepermissions:
    post:
      operationId: ListResourceSharePermissions
      description: Lists the RAM permissions that are associated with a resource share. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
              required:
                - resourceShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceSharePermissionsResponse"
  /listresourcetypes:
    post:
      operationId: ListResourceTypes
      description: Lists the resource types that can be shared by RAM.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                resourceRegionScope:
                  $ref: "#/components/schemas/ResourceRegionScopeFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourceTypesResponse"
  /listresources:
    post:
      operationId: ListResources
      description: Lists the resources that you added to a resource share or the resources that are shared with you. Always check the NextToken response parameter for a null value when calling a paginated operation. These operations can occasionally return an empty set of results even when there are more results available. The NextToken response parameter value is null only when there are no more results to display.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceOwner:
                  $ref: "#/components/schemas/ResourceOwner"
                principal:
                  $ref: "#/components/schemas/String"
                resourceType:
                  $ref: "#/components/schemas/String"
                resourceArns:
                  $ref: "#/components/schemas/ResourceArnList"
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                resourceRegionScope:
                  $ref: "#/components/schemas/ResourceRegionScopeFilter"
              required:
                - resourceOwner
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResourcesResponse"
  /listsourceassociations:
    post:
      operationId: ListSourceAssociations
      description: Lists source associations for resource shares. Source associations control which sources can be used with service principals in resource shares. This operation provides visibility into source associations for resource share owners. You can filter the results by resource share Amazon Resource Name (ARN), source ID, source type, or association status. We recommend using pagination to ensure that the operation returns quickly and successfully.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArns:
                  $ref: "#/components/schemas/ResourceShareArnList"
                sourceId:
                  $ref: "#/components/schemas/String"
                sourceType:
                  $ref: "#/components/schemas/String"
                associationStatus:
                  $ref: "#/components/schemas/ResourceShareAssociationStatus"
                nextToken:
                  $ref: "#/components/schemas/String"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSourceAssociationsResponse"
  /promotepermissioncreatedfrompolicy:
    post:
      operationId: PromotePermissionCreatedFromPolicy
      description: When you attach a resource-based policy to a resource, RAM automatically creates a resource share of featureSet=CREATED_FROM_POLICY with a managed permission that has the same IAM permissions as the original resource-based policy. However, this type of managed permission is visible to only the resource share owner, and the associated resource share can't be modified by using RAM. This operation creates a separate, fully manageable customer managed permission that has the same IAM permissions as the original resource-based policy. You can associate this customer managed permission to any resource shares. Before you use PromoteResourceShareCreatedFromPolicy, you should first run this operation to ensure that you have an appropriate customer managed permission that can be associated with the promoted resource share. The original CREATED_FROM_POLICY policy isn't deleted, and resource shares using that original policy aren't automatically updated. You can't modify a CREATED_FROM_POLICY resource share so you can't associate the new customer managed permission by using ReplacePermsissionAssociations. However, if you use PromoteResourceShareCreatedFromPolicy, that operation automatically associates the fully manageable customer managed permission to the newly promoted STANDARD resource share. After you promote a resource share, if the original CREATED_FROM_POLICY managed permission has no other associations to A resource share, then RAM automatically deletes it.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                name:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - permissionArn
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotePermissionCreatedFromPolicyResponse"
  /promoteresourcesharecreatedfrompolicy:
    post:
      operationId: PromoteResourceShareCreatedFromPolicy
      description: When you attach a resource-based policy to a resource, RAM automatically creates a resource share of featureSet=CREATED_FROM_POLICY with a managed permission that has the same IAM permissions as the original resource-based policy. However, this type of managed permission is visible to only the resource share owner, and the associated resource share can't be modified by using RAM. This operation promotes the resource share to a STANDARD resource share that is fully manageable in RAM. When you promote a resource share, you can then manage the resource share in RAM and it becomes visible to all of the principals you shared it with. Before you perform this operation, you should first run PromotePermissionCreatedFromPolicyto ensure that you have an appropriate customer managed permission that can be associated with this resource share after its is promoted. If this operation can't find a managed permission that exactly matches the existing CREATED_FROM_POLICY permission, then this operation fails.
      parameters:
        - name: resourceShareArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies the Amazon Resource Name (ARN) of the resource share to promote.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoteResourceShareCreatedFromPolicyResponse"
  /rejectresourceshareinvitation:
    post:
      operationId: RejectResourceShareInvitation
      description: Rejects an invitation to a resource share from another Amazon Web Services account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareInvitationArn:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - resourceShareInvitationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectResourceShareInvitationResponse"
  /replacepermissionassociations:
    post:
      operationId: ReplacePermissionAssociations
      description: Updates all resource shares that use a managed permission to a different managed permission. This operation always applies the default version of the target managed permission. You can optionally specify that the update applies to only resource shares that currently use a specified version. This enables you to update to the latest version, without changing the which managed permission is used. You can use this operation to update all of your resource shares to use the current default version of the permission by specifying the same value for the fromPermissionArn and toPermissionArn parameters. You can use the optional fromPermissionVersion parameter to update only those resources that use a specified version of the managed permission to the new managed permission. To successfully perform this operation, you must have permission to update the resource-based policy on all affected resource types.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fromPermissionArn:
                  $ref: "#/components/schemas/String"
                fromPermissionVersion:
                  $ref: "#/components/schemas/Integer"
                toPermissionArn:
                  $ref: "#/components/schemas/String"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - fromPermissionArn
                - toPermissionArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplacePermissionAssociationsResponse"
  /setdefaultpermissionversion:
    post:
      operationId: SetDefaultPermissionVersion
      description: Designates the specified version number as the default version for the specified customer managed permission. New resource shares automatically use this new default permission. Existing resource shares continue to use their original permission version, but you can use ReplacePermissionAssociations to update them.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissionArn:
                  $ref: "#/components/schemas/String"
                permissionVersion:
                  $ref: "#/components/schemas/Integer"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - permissionArn
                - permissionVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetDefaultPermissionVersionResponse"
  /tagresource:
    post:
      operationId: TagResource
      description: Adds the specified tag keys and values to a resource share or managed permission. If you choose a resource share, the tags are attached to only the resource share, not to the resources that are in the resource share. The tags on a managed permission are the same for all versions of the managed permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagList"
                resourceArn:
                  $ref: "#/components/schemas/String"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /untagresource:
    post:
      operationId: UntagResource
      description: Removes the specified tag key and value pairs from the specified resource share or managed permission.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                resourceArn:
                  $ref: "#/components/schemas/String"
              required:
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /updateresourceshare:
    post:
      operationId: UpdateResourceShare
      description: Modifies some of the properties of the specified resource share.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceShareArn:
                  $ref: "#/components/schemas/String"
                name:
                  $ref: "#/components/schemas/String"
                allowExternalPrincipals:
                  $ref: "#/components/schemas/Boolean"
                clientToken:
                  $ref: "#/components/schemas/String"
              required:
                - resourceShareArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResourceShareResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    AcceptResourceShareInvitationResponse:
      type: object
      properties:
        resourceShareInvitation:
          $ref: "#/components/schemas/ResourceShareInvitation"
          description: An object that contains information about the specified invitation.
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    ResourceShareInvitation:
      description: Describes an invitation for an Amazon Web Services account to join a resource share.
      type: object
      properties:
        resourceShareInvitationArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the invitation.
        resourceShareName:
          $ref: "#/components/schemas/String"
          description: The name of the resource share.
        resourceShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource share
        senderAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account that sent the invitation.
        receiverAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account that received the invitation.
        invitationTimestamp:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the invitation was sent.
        status:
          $ref: "#/components/schemas/ResourceShareInvitationStatus"
          description: The current status of the invitation.
        resourceShareAssociations:
          $ref: "#/components/schemas/ResourceShareAssociationList"
          description: To view the resources associated with a pending resource share invitation, use ListPendingInvitationResources.
        receiverArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM user or role that received the invitation.
    DateTime:
      type: string
      format: date-time
    ResourceShareInvitationStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - REJECTED
        - EXPIRED
    ResourceShareAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceShareAssociation"
    ResourceShareAssociation:
      description: Describes an association between a resource share and either a principal or a resource.
      type: object
      properties:
        resourceShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource share.
        resourceShareName:
          $ref: "#/components/schemas/String"
          description: The name of the resource share.
        associatedEntity:
          $ref: "#/components/schemas/String"
          description: "The associated entity. This can be either of the following: For a resource association, this is the Amazon Resource Name (ARN) of the resource. For principal associations, this is one of the following: The ID of an Amazon Web Services account The Amazon Resource Name (ARN) of an organization in Organizations The ARN of an organizational unit (OU) in Organizations The ARN of an IAM role The ARN of an IAM user"
        associationType:
          $ref: "#/components/schemas/ResourceShareAssociationType"
          description: The type of entity included in this association.
        status:
          $ref: "#/components/schemas/ResourceShareAssociationStatus"
          description: The current status of the association.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: A message about the status of the association.
        creationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the association was created.
        lastUpdatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the association was last updated.
        external:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the principal belongs to the same organization in Organizations as the Amazon Web Services account that owns the resource share.
    ResourceShareAssociationType:
      type: string
      enum:
        - PRINCIPAL
        - RESOURCE
        - SOURCE
    ResourceShareAssociationStatus:
      type: string
      enum:
        - ASSOCIATING
        - ASSOCIATED
        - FAILED
        - DISASSOCIATING
        - DISASSOCIATED
        - SUSPENDED
        - SUSPENDING
        - RESTORING
    Boolean:
      type: boolean
    ResourceArnList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    PrincipalArnOrIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    SourceArnOrAccountList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AssociateResourceShareResponse:
      type: object
      properties:
        resourceShareAssociations:
          $ref: "#/components/schemas/ResourceShareAssociationList"
          description: An array of objects that contain information about the associations.
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    Integer:
      type: integer
    AssociateResourceSharePermissionResponse:
      type: object
      properties:
        returnValue:
          $ref: "#/components/schemas/Boolean"
          description: A return value of true indicates that the request succeeded. A value of false indicates that the request failed.
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    PermissionName:
      type: string
      minLength: 1
      maxLength: 36
      pattern: "[\\w.-]*"
    Policy:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A structure containing a tag. A tag is metadata that you can attach to your resources to help organize and categorize them. You can also use them to help you secure your resources. For more information, see Controlling access to Amazon Web Services resources using tags. For more information about tags, see Tagging Amazon Web Services resources in the Amazon Web Services General Reference Guide.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The key, or name, attached to the tag. Every tag must have a key. Key names are case sensitive.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The string value attached to the tag. The value can be an empty string. Key values are case sensitive.
    TagKey:
      type: string
    TagValue:
      type: string
    CreatePermissionResponse:
      type: object
      properties:
        permission:
          $ref: "#/components/schemas/ResourceSharePermissionSummary"
          description: A structure with information about this customer managed permission.
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    ResourceSharePermissionSummary:
      description: Information about an RAM permission.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the permission you want information about.
        version:
          $ref: "#/components/schemas/String"
          description: The version of the permission associated with this resource share.
        defaultVersion:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the version of the managed permission used by this resource share is the default version for this managed permission.
        name:
          $ref: "#/components/schemas/String"
          description: The name of this managed permission.
        resourceType:
          $ref: "#/components/schemas/String"
          description: "The type of resource to which this permission applies. This takes the form of: service-code:resource-code, and is case-insensitive. For example, an Amazon EC2 Subnet would be represented by the string ec2:subnet."
        status:
          $ref: "#/components/schemas/String"
          description: The current status of the permission.
        creationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the permission was created.
        lastUpdatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the permission was last updated.
        isResourceTypeDefault:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the managed permission associated with this resource share is the default managed permission for all resources of this resource type.
        permissionType:
          $ref: "#/components/schemas/PermissionType"
          description: "The type of managed permission. This can be one of the following values: AWS_MANAGED – Amazon Web Services created and manages this managed permission. You can associate it with your resource shares, but you can't modify it. CUSTOMER_MANAGED – You, or another principal in your account created this managed permission. You can associate it with your resource shares and create new versions that have different permissions."
        featureSet:
          $ref: "#/components/schemas/PermissionFeatureSet"
          description: "Indicates what features are available for this resource share. This parameter can have one of the following values: STANDARD – A resource share that supports all functionality. These resource shares are visible to all principals you share the resource share with. You can modify these resource shares in RAM using the console or APIs. This resource share might have been created by RAM, or it might have been CREATED_FROM_POLICY and then promoted. CREATED_FROM_POLICY – The customer manually shared a resource by attaching a resource-based policy. That policy did not match any existing managed permissions, so RAM created this customer managed permission automatically on the customer's behalf based on the attached policy document. This type of resource share is visible only to the Amazon Web Services account that created it. You can't modify it in RAM unless you promote it. For more information, see PromoteResourceShareCreatedFromPolicy. PROMOTING_TO_STANDARD – This resource share was originally CREATED_FROM_POLICY, but the customer ran the PromoteResourceShareCreatedFromPolicy and that operation is still in progress. This value changes to STANDARD when complete."
        tags:
          $ref: "#/components/schemas/TagList"
          description: A list of the tag key value pairs currently attached to the permission.
    PermissionType:
      type: string
      enum:
        - CUSTOMER_MANAGED
        - AWS_MANAGED
    PermissionFeatureSet:
      type: string
      enum:
        - CREATED_FROM_POLICY
        - PROMOTING_TO_STANDARD
        - STANDARD
    CreatePermissionVersionResponse:
      type: object
      properties:
        permission:
          $ref: "#/components/schemas/ResourceSharePermissionDetail"
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    ResourceSharePermissionDetail:
      description: Information about a RAM managed permission.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of this RAM managed permission.
        version:
          $ref: "#/components/schemas/String"
          description: The version of the permission described in this response.
        defaultVersion:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the version of the permission represented in this response is the default version for this permission.
        name:
          $ref: "#/components/schemas/String"
          description: The name of this permission.
        resourceType:
          $ref: "#/components/schemas/String"
          description: The resource type to which this permission applies.
        permission:
          $ref: "#/components/schemas/String"
          description: The permission's effect and actions in JSON format. The effect indicates whether the specified actions are allowed or denied. The actions list the operations to which the principal is granted or denied access.
        creationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the permission was created.
        lastUpdatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the permission was last updated.
        isResourceTypeDefault:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the version of the permission represented in this response is the default version for all resources of this resource type.
        permissionType:
          $ref: "#/components/schemas/PermissionType"
          description: "The type of managed permission. This can be one of the following values: AWS_MANAGED – Amazon Web Services created and manages this managed permission. You can associate it with your resource shares, but you can't modify it. CUSTOMER_MANAGED – You, or another principal in your account created this managed permission. You can associate it with your resource shares and create new versions that have different permissions."
        featureSet:
          $ref: "#/components/schemas/PermissionFeatureSet"
          description: "Indicates what features are available for this resource share. This parameter can have one of the following values: STANDARD – A resource share that supports all functionality. These resource shares are visible to all principals you share the resource share with. You can modify these resource shares in RAM using the console or APIs. This resource share might have been created by RAM, or it might have been CREATED_FROM_POLICY and then promoted. CREATED_FROM_POLICY – The customer manually shared a resource by attaching a resource-based policy. That policy did not match any existing managed permissions, so RAM created this customer managed permission automatically on the customer's behalf based on the attached policy document. This type of resource share is visible only to the Amazon Web Services account that created it. You can't modify it in RAM unless you promote it. For more information, see PromoteResourceShareCreatedFromPolicy. PROMOTING_TO_STANDARD – This resource share was originally CREATED_FROM_POLICY, but the customer ran the PromoteResourceShareCreatedFromPolicy and that operation is still in progress. This value changes to STANDARD when complete."
        status:
          $ref: "#/components/schemas/PermissionStatus"
          description: "The current status of the association between the permission and the resource share. The following are the possible values: ATTACHABLE – This permission or version can be associated with resource shares. UNATTACHABLE – This permission or version can't currently be associated with resource shares. DELETING – This permission or version is in the process of being deleted. DELETED – This permission or version is deleted."
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag key and value pairs attached to the resource share.
    PermissionStatus:
      type: string
      enum:
        - ATTACHABLE
        - UNATTACHABLE
        - DELETING
        - DELETED
    PermissionArnList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ResourceShareConfiguration:
      description: The configuration of the resource share
      type: object
      properties:
        retainSharingOnAccountLeaveOrganization:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the consumer account retains access to the resource share after leaving the organization.
    CreateResourceShareResponse:
      type: object
      properties:
        resourceShare:
          $ref: "#/components/schemas/ResourceShare"
          description: An object with information about the new resource share.
        clientToken:
          $ref: "#/components/schemas/String"
          description: The idempotency identifier associated with this request. If you want to repeat the same operation in an idempotent manner then you must include this value in the clientToken request parameter of that later call. All other parameters must also have the same values that you used in the first call.
    ResourceShare:
      description: Describes a resource share in RAM.
      type: object
      properties:
        resourceShareArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource share
        name:
          $ref: "#/components/schemas/String"
          description: The name of the resource share.
        owningAccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account that owns the resource share.
        allowExternalPrincipals:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether principals outside your organization in Organizations can be associated with a resource share. True – the resource share can be shared with any Amazon Web Services account. False – the resource share can be shared with only accounts in the same organization as the account that owns the resource share.
        status:
          $ref: "#/components/schemas/ResourceShareStatus"
          description: The current status of the resource share.
        statusMessage:
          $ref: "#/components/schemas/String"
          description: A message about the status of the resource share.
        tags:
          $ref: "#/components/schemas/TagList"
          description: The tag key and value pairs attached to the resource share.
        creationTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the resource share was created.
        lastUpdatedTime:
          $ref: "#/components/schemas/DateTime"
          description: The date and time when the resource share was last updated.
