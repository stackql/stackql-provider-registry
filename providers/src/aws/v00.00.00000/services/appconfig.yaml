        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
    delete:
      operationId: StopDeployment
      description: Stops a deployment. This API action works only on deployments that have a status of DEPLOYING, unless an AllowRevert parameter is supplied. If the AllowRevert parameter is supplied, the status of an in-progress deployment will be ROLLED_BACK. The status of a completed deployment will be REVERTED. AppConfig only allows a revert within 72 hours of deployment completion.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The environment ID.
        - name: deployment_number
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Integer"
          description: The sequence number of the deployment.
        - name: Allow-Revert
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: A Boolean that enables AppConfig to rollback a COMPLETED deployment to the previous configuration version. This action moves the deployment to a status of REVERTED.
