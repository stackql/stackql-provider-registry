          description: The application to get. Specify either the application name or the application ID.
        - name: environment
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StringWithLengthBetween1And64"
          description: The environment to get. Specify either the environment name or the environment ID.
        - name: configuration
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/StringWithLengthBetween1And64"
          description: The configuration to get. Specify either the configuration name or the configuration ID.
        - name: client_id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/StringWithLengthBetween1And64"
          description: The clientId parameter in the following command is a unique, user-specified ID to identify the client for the configuration. This ID enables AppConfig to deploy the configuration in intervals, as defined in the deployment strategy.
        - name: client_configuration_version
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Version"
          description: The configuration version returned in the most recent GetConfiguration response. AppConfig uses the value of the ClientConfigurationVersion parameter to identify the configuration version on your clients. If you don’t send ClientConfigurationVersion with each call to GetConfiguration, your clients receive the current configuration. You are charged each time your clients receive a configuration. To avoid excess charges, we recommend you use the StartConfigurationSession and GetLatestConfiguration APIs, which track the client configuration version on your behalf. If you choose to continue using GetConfiguration, we recommend that you include the ClientConfigurationVersion value with every call to GetConfiguration. The value to use for ClientConfigurationVersion comes from the ConfigurationVersion attribute returned by GetConfiguration when there is new or updated data, and should be saved for subsequent calls to GetConfiguration. For more information about working with configurations, see Retrieving feature flags and configuration data in AppConfig in the AppConfig User Guide.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuration"
