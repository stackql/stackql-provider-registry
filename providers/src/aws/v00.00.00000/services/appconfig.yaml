openapi: 3.0.0
info:
  version: "2019-10-09"
  title: Amazon AppConfig
  description: Amazon AppConfig
  x-serviceName: appconfig
  x-serviceAlias: appconfig
  x-protocol: rest-json
  x-apiVersion: "2019-10-09"
  x-endpointPrefix: appconfig
  x-jsonVersion: "1.1"
servers:
  - url: https://appconfig.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appconfig
paths:
  /applications:
    post:
      operationId: CreateApplication
      description: Creates an application. In AppConfig, an application is simply an organizational construct like a folder. This organizational construct has a relationship with some unit of executable code. For example, you could create an application called MyMobileApp to organize and manage configuration data for a mobile application installed by your users.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    get:
      operationId: ListApplications
      description: Lists all applications in your Amazon Web Services account.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Next token is a pagination token generated by AppConfig to describe what page the previous List call ended on. For the first List request, the nextToken should not be set. On subsequent calls, the nextToken parameter should be set to the previous responses nextToken value. Use this token to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Applications"
  /applications/{application_id}/configurationprofiles:
    post:
      operationId: CreateConfigurationProfile
      description: "Creates a configuration profile, which is information that enables AppConfig to access the configuration source. Valid configuration sources include the following: Configuration data in YAML, JSON, and other formats stored in the AppConfig hosted configuration store Configuration data stored as objects in an Amazon Simple Storage Service (Amazon S3) bucket Pipelines stored in CodePipeline Secrets stored in Secrets Manager Standard and secure string parameters stored in Amazon Web Services Systems Manager Parameter Store Configuration data in SSM documents stored in the Systems Manager document store A configuration profile includes the following information: The URI location of the configuration data. The Identity and Access Management (IAM) role that provides access to the configuration data. A validator for the configuration data. Available validators include either a JSON Schema or an Amazon Web Services Lambda function. For more information, see Create a Configuration and a Configuration Profile in the AppConfig User Guide."
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/LongName"
                Description:
                  $ref: "#/components/schemas/Description"
                LocationUri:
                  $ref: "#/components/schemas/Uri"
                RetrievalRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Validators:
                  $ref: "#/components/schemas/ValidatorList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Type:
                  $ref: "#/components/schemas/ConfigurationProfileType"
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifier"
              required:
                - LocationUri
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationProfile"
    get:
      operationId: ListConfigurationProfiles
      description: Lists the configuration profiles for an application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConfigurationProfileType"
          description: A filter based on the type of configurations that the configuration profile contains. A configuration can be a feature flag or a freeform configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationProfiles"
  /deploymentstrategies:
    post:
      operationId: CreateDeploymentStrategy
      description: Creates a deployment strategy that defines important criteria for rolling out your configuration to the designated targets. A deployment strategy includes the overall duration required, a percentage of targets to receive the deployment during each interval, an algorithm that defines how percentage grows, and bake time.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                DeploymentDurationInMinutes:
                  $ref: "#/components/schemas/MinutesBetween0And24Hours"
                FinalBakeTimeInMinutes:
                  $ref: "#/components/schemas/MinutesBetween0And24Hours"
                GrowthFactor:
                  $ref: "#/components/schemas/GrowthFactor"
                GrowthType:
                  $ref: "#/components/schemas/GrowthType"
                ReplicateTo:
                  $ref: "#/components/schemas/ReplicateTo"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DeploymentDurationInMinutes
                - GrowthFactor
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentStrategy"
    get:
      operationId: ListDeploymentStrategies
      description: Lists deployment strategies.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentStrategies"
  /applications/{application_id}/environments:
    post:
      operationId: CreateEnvironment
      description: Creates an environment. For each application, you define one or more environments. An environment is a deployment group of AppConfig targets, such as applications in a Beta or Production environment. You can also define environments for application subcomponents such as the Web, Mobile and Back-end components for your application. You can configure Amazon CloudWatch alarms for each environment. The system monitors alarms during a configuration deployment. If an alarm is triggered, the system rolls back the configuration.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                Monitors:
                  $ref: "#/components/schemas/MonitorList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    get:
      operationId: ListEnvironments
      description: Lists the environments for an application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environments"
  /extensions:
    post:
      operationId: CreateExtension
      description: Creates an AppConfig extension. An extension augments your ability to inject logic or behavior at different points during the AppConfig workflow of creating or deploying a configuration. You can create your own extensions or use the Amazon Web Services authored extensions provided by AppConfig. For an AppConfig extension that uses Lambda, you must create a Lambda function to perform any computation and processing defined in the extension. If you plan to create custom versions of the Amazon Web Services authored notification extensions, you only need to specify an Amazon Resource Name (ARN) in the Uri field for the new extension version. For a custom EventBridge notification extension, enter the ARN of the EventBridge default events in the Uri field. For a custom Amazon SNS notification extension, enter the ARN of an Amazon SNS topic in the Uri field. For a custom Amazon SQS notification extension, enter the ARN of an Amazon SQS message queue in the Uri field. For more information about extensions, see Extending workflows in the AppConfig User Guide.
      parameters:
        - name: Latest-Version-Number
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: You can omit this field when you create an extension. When you create a new version, specify the most recent current version number. For example, you create version 3, enter 2 for this field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/ExtensionOrParameterName"
                Description:
                  $ref: "#/components/schemas/Description"
                Actions:
                  $ref: "#/components/schemas/ActionsMap"
                Parameters:
                  $ref: "#/components/schemas/ParameterMap"
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Extension"
    get:
      operationId: ListExtensions
      description: Lists all custom and Amazon Web Services authored AppConfig extensions in the account. For more information about extensions, see Extending workflows in the AppConfig User Guide.
      parameters:
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryName"
          description: The extension name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Extensions"
  /extensionassociations:
    post:
      operationId: CreateExtensionAssociation
      description: When you create an extension or configure an Amazon Web Services authored extension, you associate the extension with an AppConfig application, environment, or configuration profile. For example, you can choose to run the AppConfig deployment events to Amazon SNS Amazon Web Services authored extension and receive notifications on an Amazon SNS topic anytime a configuration deployment is started for a specific application. Defining which extension to associate with an AppConfig resource is called an extension association. An extension association is a specified relationship between an extension and an AppConfig resource, such as an application or a configuration profile. For more information about extensions and associations, see Extending workflows in the AppConfig User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ExtensionIdentifier:
                  $ref: "#/components/schemas/Identifier"
                ExtensionVersionNumber:
                  $ref: "#/components/schemas/Integer"
                ResourceIdentifier:
                  $ref: "#/components/schemas/Identifier"
                Parameters:
                  $ref: "#/components/schemas/ParameterValueMap"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ExtensionIdentifier
                - ResourceIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAssociation"
    get:
      operationId: ListExtensionAssociations
      description: Lists all AppConfig extension associations in the account. For more information about extensions and associations, see Extending workflows in the AppConfig User Guide.
      parameters:
        - name: resource_identifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of an application, configuration profile, or environment.
        - name: extension_identifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The name, the ID, or the Amazon Resource Name (ARN) of the extension.
        - name: extension_version_number
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The version number for the extension defined in the association.
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results or pass null to get the first set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionAssociations"
  /applications/{application_id}/configurationprofiles/{configuration_profile_id}/hostedconfigurationversions:
    post:
      operationId: CreateHostedConfigurationVersion
      description: Creates a new configuration in the AppConfig hosted configuration store. If you're creating a feature flag, we recommend you familiarize yourself with the JSON schema for feature flag data. For more information, see Type reference for AWS.AppConfig.FeatureFlags in the AppConfig User Guide.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: configuration_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The configuration profile ID.
        - name: Description
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Description"
          description: A description of the configuration.
        - name: Content-Type
          in: header
          required: true
          schema:
            $ref: "#/components/schemas/StringWithLengthBetween1And255"
          description: A standard MIME type describing the format of the configuration content. For more information, see Content-Type.
        - name: Latest-Version-Number
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: An optional locking token used to prevent race conditions from overwriting configuration updates when creating a new version. To ensure your data is not overwritten when creating multiple hosted configuration versions in rapid succession, specify the version number of the latest hosted configuration version.
        - name: VersionLabel
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/VersionLabel"
          description: An optional, user-defined label for the AppConfig hosted configuration version. This value must contain at least one non-numeric character. For example, "v2.2.0".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Content:
                  $ref: "#/components/schemas/Blob"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedConfigurationVersion"
    get:
      operationId: ListHostedConfigurationVersions
      description: Lists configurations stored in the AppConfig hosted configuration store by version.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: configuration_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The configuration profile ID.
        - name: max_results
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return for this call. If MaxResults is not provided in the call, AppConfig returns the maximum of 50. The call also returns a token that you can specify in a subsequent call to get the next set of results.
        - name: next_token
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: A token to start the list. Use this token to get the next set of results.
        - name: version_label
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryName"
          description: An optional filter that can be used to specify the version label of an AppConfig hosted configuration version. This parameter supports filtering by prefix using a wildcard, for example "v2*". If you don't specify an asterisk at the end of the value, only an exact match is returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedConfigurationVersions"
  /applications/{application_id}:
    delete:
      operationId: DeleteApplication
      description: Deletes an application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the application to delete.
      responses:
        "204":
          description: Success
    get:
      operationId: GetApplication
      description: Retrieves information about an application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the application you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    patch:
      operationId: UpdateApplication
      description: Updates an application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
  /applications/{application_id}/configurationprofiles/{configuration_profile_id}:
    delete:
      operationId: DeleteConfigurationProfile
      description: Deletes a configuration profile. To prevent users from unintentionally deleting actively-used configuration profiles, enable deletion protection.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID that includes the configuration profile you want to delete.
        - name: configuration_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the configuration profile you want to delete.
        - name: x-amzn-deletion-protection-check
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/DeletionProtectionCheck"
          description: "A parameter to configure deletion protection. Deletion protection prevents a user from deleting a configuration profile if your application has called either GetLatestConfiguration or for the configuration profile during the specified interval. This parameter supports the following values: BYPASS: Instructs AppConfig to bypass the deletion protection check and delete a configuration profile even if deletion protection would have otherwise prevented it. APPLY: Instructs the deletion protection check to run, even if deletion protection is disabled at the account level. APPLY also forces the deletion protection check to run against resources created in the past hour, which are normally excluded from deletion protection checks. ACCOUNT_DEFAULT: The default setting, which instructs AppConfig to implement the deletion protection value specified in the UpdateAccountSettings API."
      responses:
        "204":
          description: Success
    get:
      operationId: GetConfigurationProfile
      description: Retrieves information about a configuration profile.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the application that includes the configuration profile you want to get.
        - name: configuration_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the configuration profile that you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationProfile"
    patch:
      operationId: UpdateConfigurationProfile
      description: Updates a configuration profile.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: configuration_profile_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the configuration profile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/LongName"
                Description:
                  $ref: "#/components/schemas/Description"
                RetrievalRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Validators:
                  $ref: "#/components/schemas/ValidatorList"
                KmsKeyIdentifier:
                  $ref: "#/components/schemas/KmsKeyIdentifierOrEmpty"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigurationProfile"
  /deployementstrategies/{deployment_strategy_id}:
    delete:
      operationId: DeleteDeploymentStrategy
      description: Deletes a deployment strategy.
      parameters:
        - name: deployment_strategy_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeploymentStrategyId"
          description: The ID of the deployment strategy you want to delete.
      responses:
        "204":
          description: Success
  /applications/{application_id}/environments/{environment_id}:
    delete:
      operationId: DeleteEnvironment
      description: Deletes an environment. To prevent users from unintentionally deleting actively-used environments, enable deletion protection.
      parameters:
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the environment that you want to delete.
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID that includes the environment that you want to delete.
        - name: x-amzn-deletion-protection-check
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/DeletionProtectionCheck"
          description: "A parameter to configure deletion protection. Deletion protection prevents a user from deleting an environment if your application called either GetLatestConfiguration or in the environment during the specified interval. This parameter supports the following values: BYPASS: Instructs AppConfig to bypass the deletion protection check and delete a configuration profile even if deletion protection would have otherwise prevented it. APPLY: Instructs the deletion protection check to run, even if deletion protection is disabled at the account level. APPLY also forces the deletion protection check to run against resources created in the past hour, which are normally excluded from deletion protection checks. ACCOUNT_DEFAULT: The default setting, which instructs AppConfig to implement the deletion protection value specified in the UpdateAccountSettings API."
      responses:
        "204":
          description: Success
    get:
      operationId: GetEnvironment
      description: Retrieves information about an environment. An environment is a deployment group of AppConfig applications, such as applications in a Production environment or in an EU_Region environment. Each configuration deployment targets an environment. You can enable one or more Amazon CloudWatch alarms for an environment. If an alarm is triggered during a deployment, AppConfig roles back the configuration.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the application that includes the environment you want to get.
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The ID of the environment that you want to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    patch:
      operationId: UpdateEnvironment
      description: Updates an environment.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The application ID.
        - name: environment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The environment ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Description:
                  $ref: "#/components/schemas/Description"
                Monitors:
                  $ref: "#/components/schemas/MonitorList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
  /extensions/{extension_identifier}:
    delete:
      operationId: DeleteExtension
      description: Deletes an AppConfig extension. You must delete all associations to an extension before you delete the extension.
      parameters:
        - name: extension_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The name, ID, or Amazon Resource Name (ARN) of the extension you want to delete.
        - name: version
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: A specific version of an extension to delete. If omitted, the highest version is deleted.
      responses:
        "204":
