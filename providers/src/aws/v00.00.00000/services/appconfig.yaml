components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Name:
      type: string
      minLength: 1
      maxLength: 64
    Description:
      type: string
      minLength: 0
      maxLength: 1024
    TagMap:
      type: object
      properties: {}
    Application:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: The application ID.
        Name:
          $ref: "#/components/schemas/Name"
          description: The application name.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the application.
    Id:
      type: string
      pattern: "[a-z0-9]{4,7}"
    LongName:
      type: string
      minLength: 1
      maxLength: 128
    Uri:
      type: string
      minLength: 1
      maxLength: 2048
    RoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^((arn):(aws|aws-cn|aws-iso|aws-iso-[a-z]{1}|aws-us-gov|aws-eusc):(iam)::\d{12}:role[/].*)$
    ValidatorList:
      type: array
      items:
        $ref: "#/components/schemas/Validator"
    Validator:
      description: A validator provides a syntactic or semantic check to ensure the configuration that you want to deploy functions as intended. To validate your application configuration data, you provide a schema or an Amazon Web Services Lambda function that runs against the configuration. The configuration deployment or update can only proceed when the configuration data is valid. For more information, see About validators in the AppConfig User Guide.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ValidatorType"
          description: AppConfig supports validators of type JSON_SCHEMA and LAMBDA
        Content:
          $ref: "#/components/schemas/StringWithLengthBetween0And32768"
          description: Either the JSON Schema content or the Amazon Resource Name (ARN) of an Lambda function.
      required:
        - Type
        - Content
    ValidatorType:
      type: string
      enum:
        - JSON_SCHEMA
        - LAMBDA
    StringWithLengthBetween0And32768:
      type: string
      minLength: 0
      maxLength: 32768
    ConfigurationProfileType:
      type: string
      pattern: ^[a-zA-Z\.]+
    KmsKeyIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
    ConfigurationProfile:
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/Id"
          description: The application ID.
        Id:
          $ref: "#/components/schemas/Id"
          description: The configuration profile ID.
        Name:
          $ref: "#/components/schemas/LongName"
          description: The name of the configuration profile.
        Description:
          $ref: "#/components/schemas/Description"
          description: The configuration profile description.
        LocationUri:
          $ref: "#/components/schemas/Uri"
          description: The URI location of the configuration.
        RetrievalRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of an IAM role with permission to access the configuration at the specified LocationUri.
        Validators:
          $ref: "#/components/schemas/ValidatorList"
          description: A list of methods for validating the configuration.
        Type:
          $ref: "#/components/schemas/ConfigurationProfileType"
          description: "The type of configurations contained in the profile. AppConfig supports feature flags and freeform configurations. We recommend you create feature flag configurations to enable or disable new features and freeform configurations to distribute configurations to an application. When calling this API, enter one of the following values for Type: AWS.AppConfig.FeatureFlags AWS.Freeform"
        KmsKeyArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name of the Key Management Service key to encrypt new configuration data versions in the AppConfig hosted configuration store. This attribute is only used for hosted configuration types. To encrypt data managed in other configuration stores, see the documentation for how to specify an KMS key for that particular service.
        KmsKeyIdentifier:
          $ref: "#/components/schemas/KmsKeyIdentifier"
          description: The Key Management Service key identifier (key ID, key alias, or key ARN) provided when the resource was created or updated.
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:[a-z]+:((eusc-)?[a-z]{2}((-gov)|(-iso([a-z]?)))?-[a-z]+-\d{1})?:(\d{12})?:[a-zA-Z0-9-_/:.]+
    MinutesBetween0And24Hours:
      type: integer
      minimum: 0
      maximum: 1440
    GrowthFactor:
      type: number
      format: float
      minimum: 1
      maximum: 100
    GrowthType:
      type: string
      enum:
        - LINEAR
        - EXPONENTIAL
    ReplicateTo:
      type: string
      enum:
        - NONE
        - SSM_DOCUMENT
    DeploymentStrategy:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: The deployment strategy ID.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the deployment strategy.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the deployment strategy.
        DeploymentDurationInMinutes:
          $ref: "#/components/schemas/MinutesBetween0And24Hours"
          description: Total amount of time the deployment lasted.
        GrowthType:
          $ref: "#/components/schemas/GrowthType"
          description: The algorithm used to define how percentage grew over time.
        GrowthFactor:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of targets that received a deployed configuration during each interval.
        FinalBakeTimeInMinutes:
          $ref: "#/components/schemas/MinutesBetween0And24Hours"
          description: The amount of time that AppConfig monitored for alarms before considering the deployment to be complete and no longer eligible for automatic rollback.
        ReplicateTo:
          $ref: "#/components/schemas/ReplicateTo"
          description: Save the deployment strategy to a Systems Manager (SSM) document.
    Percentage:
      type: number
      format: float
      minimum: 1
      maximum: 100
    MonitorList:
      type: array
      items:
        $ref: "#/components/schemas/Monitor"
    Monitor:
      description: Amazon CloudWatch alarms to monitor during the deployment process.
      type: object
      properties:
        AlarmArn:
          $ref: "#/components/schemas/StringWithLengthBetween1And2048"
          description: Amazon Resource Name (ARN) of the Amazon CloudWatch alarm.
        AlarmRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: ARN of an Identity and Access Management (IAM) role for AppConfig to monitor AlarmArn.
      required:
        - AlarmArn
    StringWithLengthBetween1And2048:
      type: string
      minLength: 1
      maxLength: 2048
    Environment:
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/Id"
          description: The application ID.
        Id:
          $ref: "#/components/schemas/Id"
          description: The environment ID.
        Name:
          $ref: "#/components/schemas/Name"
          description: The name of the environment.
        Description:
          $ref: "#/components/schemas/Description"
          description: The description of the environment.
        State:
          $ref: "#/components/schemas/EnvironmentState"
          description: "The state of the environment. An environment can be in one of the following states: READY_FOR_DEPLOYMENT, DEPLOYING, ROLLING_BACK, or ROLLED_BACK"
        Monitors:
          $ref: "#/components/schemas/MonitorList"
          description: Amazon CloudWatch alarms monitored during the deployment.
    EnvironmentState:
      type: string
      enum:
        - READY_FOR_DEPLOYMENT
        - DEPLOYING
        - ROLLING_BACK
        - ROLLED_BACK
        - REVERTED
    Integer:
      type: integer
    ExtensionOrParameterName:
      type: string
      pattern: ^[^\/#:\n]{1,64}$
    ActionsMap:
      type: object
      properties: {}
    ParameterMap:
      type: object
      properties: {}
    Extension:
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/Id"
          description: The system-generated ID of the extension.
        Name:
          $ref: "#/components/schemas/Name"
          description: The extension name.
        VersionNumber:
          $ref: "#/components/schemas/Integer"
          description: The extension version number.
        Arn:
          $ref: "#/components/schemas/Arn"
          description: The system-generated Amazon Resource Name (ARN) for the extension.
        Description:
          $ref: "#/components/schemas/Description"
          description: Information about the extension.
        Actions:
          type: object
          properties: {}
          description: The actions defined in the extension.
        Parameters:
          type: object
          properties: {}
          description: The parameters accepted by the extension. You specify parameter values when you associate the extension to an AppConfig resource by using the CreateExtensionAssociation API action. For Lambda extension actions, these parameters are included in the Lambda request object.
    Identifier:
      type: string
      minLength: 1
      maxLength: 2048
    ParameterValueMap:
      type: object
      properties: {}
    ExtensionAssociation:
      type: object
