openapi: 3.0.0
info:
  version: "2023-04-19"
  title: Network Flow Monitor
  description: Network Flow Monitor
  x-serviceName: networkflowmonitor
  x-serviceAlias: networkflowmonitor
  x-protocol: rest-json
  x-apiVersion: "2023-04-19"
  x-endpointPrefix: networkflowmonitor
servers:
  - url: https://networkflowmonitor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for networkflowmonitor
paths:
  /monitors:
    post:
      operationId: CreateMonitor
      description: Create a monitor for specific network flows between local and remote resources, so that you can monitor network performance for one or several of your workloads. For each monitor, Network Flow Monitor publishes detailed end-to-end performance metrics and a network health indicator (NHI) that informs you whether there were Amazon Web Services network issues for one or more of the network flows tracked by a monitor, during a time period that you choose.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monitorName:
                  $ref: "#/components/schemas/ResourceName"
                localResources:
                  $ref: "#/components/schemas/CreateMonitorInputLocalResourcesList"
                remoteResources:
                  $ref: "#/components/schemas/MonitorRemoteResources"
                scopeArn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/UuidString"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - monitorName
                - localResources
                - scopeArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMonitorOutput"
    get:
      operationId: ListMonitors
      description: List all monitors in an account. Optionally, you can list only monitors that have a specific status, by using the STATUS parameter.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of query results that you want to return with this call.
        - name: monitorStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MonitorStatus"
          description: "The status of a monitor. The status can be one of the following PENDING: The monitor is in the process of being created. ACTIVE: The monitor is active. INACTIVE: The monitor is inactive. ERROR: Monitor creation failed due to an error. DELETING: The monitor is in the process of being deleted."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMonitorsOutput"
  /scopes:
    post:
      operationId: CreateScope
      description: "In Network Flow Monitor, you specify a scope for the service to generate metrics for. By using the scope, Network Flow Monitor can generate a topology of all the resources to measure performance metrics for. When you create a scope, you enable permissions for Network Flow Monitor. A scope is a Region-account pair or multiple Region-account pairs. Network Flow Monitor uses your scope to determine all the resources (the topology) where Network Flow Monitor will gather network flow performance metrics for you. To provide performance metrics, Network Flow Monitor uses the data that is sent by the Network Flow Monitor agents you install on the resources. To define the Region-account pairs for your scope, the Network Flow Monitor API uses the following constucts, which allow for future flexibility in defining scopes: Targets, which are arrays of targetResources. Target resources, which are Region-targetIdentifier pairs. Target identifiers, made up of a targetID (currently always an account ID) and a targetType (currently always an account)."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targets:
                  $ref: "#/components/schemas/CreateScopeInputTargetsList"
                clientToken:
                  $ref: "#/components/schemas/UuidString"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - targets
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateScopeOutput"
    get:
      operationId: ListScopes
      description: List all the scopes for an account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The number of query results that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListScopesOutput"
  /monitors/{monitor_name}:
    delete:
      operationId: DeleteMonitor
      description: Deletes a monitor in Network Flow Monitor.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMonitorOutput"
    get:
      operationId: GetMonitor
      description: Gets information about a monitor in Network Flow Monitor based on a monitor name. The information returned includes the Amazon Resource Name (ARN), create time, modified time, resources included in the monitor, and status information.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMonitorOutput"
    patch:
      operationId: UpdateMonitor
      description: Update a monitor to add or remove local or remote resources.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                localResourcesToAdd:
                  $ref: "#/components/schemas/MonitorLocalResources"
                localResourcesToRemove:
                  $ref: "#/components/schemas/MonitorLocalResources"
                remoteResourcesToAdd:
                  $ref: "#/components/schemas/MonitorRemoteResources"
                remoteResourcesToRemove:
                  $ref: "#/components/schemas/MonitorRemoteResources"
                clientToken:
                  $ref: "#/components/schemas/UuidString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMonitorOutput"
  /scopes/{scope_id}:
    delete:
      operationId: DeleteScope
      description: Deletes a scope that has been defined.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScopeOutput"
    get:
      operationId: GetScope
      description: Gets information about a scope, including the name, status, tags, and target details. The scope in Network Flow Monitor is an account.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GetScopeInputScopeIdString"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account. A scope ID is returned from a CreateScope API call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScopeOutput"
    patch:
      operationId: UpdateScope
      description: Update a scope to add or remove resources that you want to be available for Network Flow Monitor to generate metrics for, when you have active agents on those resources sending metrics reports to the Network Flow Monitor backend.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                resourcesToAdd:
                  $ref: "#/components/schemas/UpdateScopeInputResourcesToAddList"
                resourcesToDelete:
                  $ref: "#/components/schemas/UpdateScopeInputResourcesToDeleteList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateScopeOutput"
  /monitors/{monitor_name}/topContributorsQueries/{query_id}/results:
    get:
      operationId: GetQueryResultsMonitorTopContributors
      description: Return the data for a query with the Network Flow Monitor query interface. You specify the query that you want to return results for by providing a query ID and a monitor name. This query returns the top contributors for a specific monitor. Create a query ID for this call by calling the corresponding API call to start the query, StartQueryMonitorTopContributors. Use the scope ID that was returned for your account by CreateScope. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to create a query.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of query results that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryResultsMonitorTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsQueries/{query_id}/results:
    get:
      operationId: GetQueryResultsWorkloadInsightsTopContributors
      description: Return the data for a query with the Network Flow Monitor query interface. You specify the query that you want to return results for by providing a query ID and a monitor name. This query returns the top contributors for a scope for workload insights. Workload insights provide a high level view of network flow performance data collected by agents. To return the data for the top contributors, see GetQueryResultsWorkloadInsightsTopContributorsData. Create a query ID for this call by calling the corresponding API call to start the query, StartQueryWorkloadInsightsTopContributors. Use the scope ID that was returned for your account by CreateScope. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to create a query.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of query results that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryResultsWorkloadInsightsTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsDataQueries/{query_id}/results:
    get:
      operationId: GetQueryResultsWorkloadInsightsTopContributorsData
      description: Return the data for a query with the Network Flow Monitor query interface. Specify the query that you want to return results for by providing a query ID and a scope ID. This query returns the data for top contributors for workload insights for a specific scope. Workload insights provide a high level view of network flow performance data collected by agents for a scope. To return just the top contributors, see GetQueryResultsWorkloadInsightsTopContributors. Create a query ID for this call by calling the corresponding API call to start the query, StartQueryWorkloadInsightsTopContributorsData. Use the scope ID that was returned for your account by CreateScope. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned. The top contributor network flows overall are for a specific metric type, for example, the number of retransmissions.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to create a query.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The token for the next set of results. You receive this token from a previous call.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Integer"
          description: The number of query results that you want to return with this call.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryResultsWorkloadInsightsTopContributorsDataOutput"
  /monitors/{monitor_name}/topContributorsQueries/{query_id}/status:
    get:
      operationId: GetQueryStatusMonitorTopContributors
      description: Returns the current status of a query for the Network Flow Monitor query interface, for a specified query ID and monitor. This call returns the query status for the top contributors for a monitor. When you create a query, use this call to check the status of the query to make sure that it has has SUCCEEDED before you review the results. Use the same query ID that you used for the corresponding API call to start (create) the query, StartQueryMonitorTopContributors. When you run a query, use this call to check the status of the query to make sure that the query has SUCCEEDED before you review the results.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to start a query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStatusMonitorTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsQueries/{query_id}/status:
    get:
      operationId: GetQueryStatusWorkloadInsightsTopContributors
      description: Return the data for a query with the Network Flow Monitor query interface. Specify the query that you want to return results for by providing a query ID and a monitor name. This query returns the top contributors for workload insights. When you start a query, use this call to check the status of the query to make sure that it has has SUCCEEDED before you review the results. Use the same query ID that you used for the corresponding API call to start the query, StartQueryWorkloadInsightsTopContributors. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to start a query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStatusWorkloadInsightsTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsDataQueries/{query_id}/status:
    get:
      operationId: GetQueryStatusWorkloadInsightsTopContributorsData
      description: Returns the current status of a query for the Network Flow Monitor query interface, for a specified query ID and monitor. This call returns the query status for the top contributors data for workload insights. When you start a query, use this call to check the status of the query to make sure that it has has SUCCEEDED before you review the results. Use the same query ID that you used for the corresponding API call to start the query, StartQueryWorkloadInsightsTopContributorsData. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned. The top contributor network flows overall are for a specific metric type, for example, the number of retransmissions.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account. A scope ID is returned from a CreateScope API call.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to start a query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetQueryStatusWorkloadInsightsTopContributorsDataOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns all the tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds a tag to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Keys that you specified when you tagged a resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /monitors/{monitor_name}/topContributorsQueries:
    post:
      operationId: StartQueryMonitorTopContributors
      description: Create a query that you can use with the Network Flow Monitor query interface to return the top contributors for a monitor. Specify the monitor that you want to create the query for. The call returns a query ID that you can use with GetQueryResultsMonitorTopContributors to run the query and return the top contributors for a specific monitor. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable APIs for the top contributors that you want to be returned.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                endTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                metricName:
                  $ref: "#/components/schemas/MonitorMetric"
                destinationCategory:
                  $ref: "#/components/schemas/DestinationCategory"
                limit:
                  $ref: "#/components/schemas/Limit"
              required:
                - startTime
                - endTime
                - metricName
                - destinationCategory
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryMonitorTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsQueries:
    post:
      operationId: StartQueryWorkloadInsightsTopContributors
      description: Create a query with the Network Flow Monitor query interface that you can run to return workload insights top contributors. Specify the scope that you want to create a query for. The call returns a query ID that you can use with GetQueryResultsWorkloadInsightsTopContributors to run the query and return the top contributors for the workload insights for a scope. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable APIs for the top contributors that you want to be returned.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account. A scope ID is returned from a CreateScope API call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                endTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                metricName:
                  $ref: "#/components/schemas/WorkloadInsightsMetric"
                destinationCategory:
                  $ref: "#/components/schemas/DestinationCategory"
                limit:
                  $ref: "#/components/schemas/Limit"
              required:
                - startTime
                - endTime
                - metricName
                - destinationCategory
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryWorkloadInsightsTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsDataQueries:
    post:
      operationId: StartQueryWorkloadInsightsTopContributorsData
      description: Create a query with the Network Flow Monitor query interface that you can run to return data for workload insights top contributors. Specify the scope that you want to create a query for. The call returns a query ID that you can use with GetQueryResultsWorkloadInsightsTopContributorsData to run the query and return the data for the top contributors for the workload insights for a scope. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ScopeId"
          description: The identifier for the scope that includes the resources you want to get data results for. A scope ID is an internally-generated identifier that includes all the resources for a specific root account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                endTime:
                  $ref: "#/components/schemas/SyntheticTimestamp_date_time"
                metricName:
                  $ref: "#/components/schemas/WorkloadInsightsMetric"
                destinationCategory:
                  $ref: "#/components/schemas/DestinationCategory"
              required:
                - startTime
                - endTime
                - metricName
                - destinationCategory
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartQueryWorkloadInsightsTopContributorsDataOutput"
  /monitors/{monitor_name}/topContributorsQueries/{query_id}:
    delete:
      operationId: StopQueryMonitorTopContributors
      description: Stop a top contributors query for a monitor. Specify the query that you want to stop by providing a query ID and a monitor name. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        - name: query_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The identifier for the query. A query ID is an internally-generated identifier for a specific query returned from an API call to create a query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopQueryMonitorTopContributorsOutput"
  /workloadInsights/{scope_id}/topContributorsQueries/{query_id}:
    delete:
      operationId: StopQueryWorkloadInsightsTopContributors
      description: Stop a top contributors query for workload insights. Specify the query that you want to stop by providing a query ID and a scope ID. Top contributors in Network Flow Monitor are network flows with the highest values for a specific metric type. Top contributors can be across all workload insights, for a given scope, or for a specific monitor. Use the applicable call for the top contributors that you want to be returned.
      parameters:
        - name: scope_id
          in: path
          required: true
          schema:
