openapi: 3.0.0
info:
  version: "2018-05-10"
  title: Security Incident Response
  description: Security Incident Response
  x-serviceName: security-ir
  x-serviceAlias: security_ir
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: security-ir
servers:
  - url: https://security-ir.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for security-ir
paths:
  /v1/membership/{membership_id}/batch-member-details:
    post:
      operationId: BatchGetMemberAccountDetails
      description: Provides information on whether the supplied account IDs are associated with a membership. AWS account ID's may appear less than 12 characters and need to be zero-prepended. An example would be 123123123 which is nine digits, and with zero-prepend would be 000123123123. Not zero-prepending to 12 digits could result in errors.
      parameters:
        - name: membership_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipId"
          description: Required element used in combination with BatchGetMemberAccountDetails to identify the membership ID to query.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountIds:
                  $ref: "#/components/schemas/AWSAccountIds"
              required:
                - accountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetMemberAccountDetailsResponse"
  /v1/membership/{membership_id}:
    put:
      operationId: CancelMembership
      description: Cancels an existing membership.
      parameters:
        - name: membership_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipId"
          description: Required element used in combination with CancelMembershipRequest to identify the membership ID to cancel.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMembershipResponse"
    get:
      operationId: GetMembership
      description: Returns the attributes of a membership.
      parameters:
        - name: membership_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipId"
          description: Required element for GetMembership to identify the membership ID to query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMembershipResponse"
  /v1/cases/{case_id}/close-case:
    post:
      operationId: CloseCase
      description: Closes an existing case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element used in combination with CloseCase to identify the case ID to close.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloseCaseResponse"
  /v1/create-case:
    post:
      operationId: CreateCase
      description: Creates a new case.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/CreateCaseRequestClientTokenString"
                resolverType:
                  $ref: "#/components/schemas/ResolverType"
                title:
                  $ref: "#/components/schemas/CaseTitle"
                description:
                  $ref: "#/components/schemas/CaseDescription"
                engagementType:
                  $ref: "#/components/schemas/EngagementType"
                reportedIncidentStartDate:
                  $ref: "#/components/schemas/Timestamp"
                impactedAccounts:
                  $ref: "#/components/schemas/ImpactedAccounts"
                watchers:
                  $ref: "#/components/schemas/Watchers"
                threatActorIpAddresses:
                  $ref: "#/components/schemas/ThreatActorIpList"
                impactedServices:
                  $ref: "#/components/schemas/ImpactedServicesList"
                impactedAwsRegions:
                  $ref: "#/components/schemas/ImpactedAwsRegionList"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - resolverType
                - title
                - description
                - engagementType
                - reportedIncidentStartDate
                - impactedAccounts
                - watchers
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseResponse"
  /v1/cases/{case_id}/create-comment:
    post:
      operationId: CreateCaseComment
      description: Adds a comment to an existing case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element used in combination with CreateCaseComment to specify a case ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/CreateCaseCommentRequestClientTokenString"
                body:
                  $ref: "#/components/schemas/CommentBody"
              required:
                - body
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCaseCommentResponse"
  /v1/membership:
    post:
      operationId: CreateMembership
      description: Creates a new membership.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/CreateMembershipRequestClientTokenString"
                membershipName:
                  $ref: "#/components/schemas/MembershipName"
                incidentResponseTeam:
                  $ref: "#/components/schemas/IncidentResponseTeam"
                optInFeatures:
                  $ref: "#/components/schemas/OptInFeatures"
                tags:
                  $ref: "#/components/schemas/TagMap"
                coverEntireOrganization:
                  $ref: "#/components/schemas/Boolean"
              required:
                - membershipName
                - incidentResponseTeam
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembershipResponse"
  /v1/cases/{case_id}/get-case:
    get:
      operationId: GetCase
      description: Returns the attributes of a case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for GetCase to identify the requested case ID.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCaseResponse"
  /v1/cases/{case_id}/get-presigned-url/{attachment_id}:
    get:
      operationId: GetCaseAttachmentDownloadUrl
      description: Returns a Pre-Signed URL for uploading attachments into a case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for GetCaseAttachmentDownloadUrl to identify the case ID for downloading an attachment from.
        - name: attachment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
          description: Required element for GetCaseAttachmentDownloadUrl to identify the attachment ID for downloading an attachment.
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCaseAttachmentDownloadUrlResponse"
  /v1/cases/{case_id}/get-presigned-url:
    post:
      operationId: GetCaseAttachmentUploadUrl
      description: Uploads an attachment to a case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for GetCaseAttachmentUploadUrl to identify the case ID for uploading an attachment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileName:
                  $ref: "#/components/schemas/FileName"
                contentLength:
                  $ref: "#/components/schemas/ContentLength"
                clientToken:
                  $ref: "#/components/schemas/GetCaseAttachmentUploadUrlRequestClientTokenString"
              required:
                - fileName
                - contentLength
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCaseAttachmentUploadUrlResponse"
  /v1/cases/{case_id}/list-case-edits:
    post:
      operationId: ListCaseEdits
      description: Views the case history for edits made to a designated case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element used with ListCaseEdits to identify the case to query.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListCaseEditsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListCaseEditsRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCaseEditsResponse"
  /v1/list-cases:
    post:
      operationId: ListCases
      description: Lists all cases the requester has access to.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListCasesRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListCasesRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCasesResponse"
  /v1/cases/{case_id}/list-comments:
    post:
      operationId: ListComments
      description: Returns comments for a designated case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for ListComments to designate the case to query.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListCommentsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListCommentsRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCommentsResponse"
  /v1/cases/{case_id}/list-investigations:
    get:
      operationId: ListInvestigations
      description: Investigation performed by an agent for a security incident...
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListInvestigationsRequestNextTokenString"
          description: Investigation performed by an agent for a security incident request
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListInvestigationsRequestMaxResultsInteger"
          description: Investigation performed by an agent for a security incident request, returning max results
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Investigation performed by an agent for a security incident per caseID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvestigationsResponse"
  /v1/memberships:
    post:
      operationId: ListMemberships
      description: Returns the memberships that the calling principal can access.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/ListMembershipsRequestNextTokenString"
                maxResults:
                  $ref: "#/components/schemas/ListMembershipsRequestMaxResultsInteger"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembershipsResponse"
  /v1/tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns currently configured tags on a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: Required element for ListTagsForResource to provide the ARN to identify a specific resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds a tag(s) to a designated resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: Required element for TagResource to identify the ARN for the resource to add a tag to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes a tag(s) from a designate resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: Required element for UnTagResource to identify the ARN for the resource to remove a tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeys"
          description: Required element for UnTagResource to identify tag to remove.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /v1/cases/{case_id}/feedback/{result_id}/send-feedback:
    post:
      operationId: SendFeedback
      description: Send feedback based on response investigation action
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Send feedback based on request caseID
        - name: result_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResultId"
          description: Send feedback based on request result ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usefulness:
                  $ref: "#/components/schemas/UsefulnessRating"
                comment:
                  $ref: "#/components/schemas/FeedbackComment"
              required:
                - usefulness
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendFeedbackResponse"
  /v1/cases/{case_id}/update-case:
    post:
      operationId: UpdateCase
      description: Updates an existing case.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for UpdateCase to identify the case ID for updates.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/CaseTitle"
                description:
                  $ref: "#/components/schemas/CaseDescription"
                reportedIncidentStartDate:
                  $ref: "#/components/schemas/Timestamp"
                actualIncidentStartDate:
                  $ref: "#/components/schemas/Timestamp"
                engagementType:
                  $ref: "#/components/schemas/EngagementType"
                watchersToAdd:
                  $ref: "#/components/schemas/Watchers"
                watchersToDelete:
                  $ref: "#/components/schemas/Watchers"
                threatActorIpAddressesToAdd:
                  $ref: "#/components/schemas/ThreatActorIpList"
                threatActorIpAddressesToDelete:
                  $ref: "#/components/schemas/ThreatActorIpList"
                impactedServicesToAdd:
                  $ref: "#/components/schemas/ImpactedServicesList"
                impactedServicesToDelete:
                  $ref: "#/components/schemas/ImpactedServicesList"
                impactedAwsRegionsToAdd:
                  $ref: "#/components/schemas/ImpactedAwsRegionList"
                impactedAwsRegionsToDelete:
                  $ref: "#/components/schemas/ImpactedAwsRegionList"
                impactedAccountsToAdd:
                  $ref: "#/components/schemas/ImpactedAccounts"
                impactedAccountsToDelete:
                  $ref: "#/components/schemas/ImpactedAccounts"
                caseMetadata:
                  $ref: "#/components/schemas/CaseMetadata"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCaseResponse"
  /v1/cases/{case_id}/update-case-comment/{comment_id}:
    put:
      operationId: UpdateCaseComment
      description: Updates an existing case comment.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for UpdateCaseComment to identify the case ID containing the comment to be updated.
        - name: comment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CommentId"
          description: Required element for UpdateCaseComment to identify the case ID to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  $ref: "#/components/schemas/CommentBody"
              required:
                - body
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCaseCommentResponse"
  /v1/cases/{case_id}/update-case-status:
    post:
      operationId: UpdateCaseStatus
      description: "Updates the state transitions for a designated cases. Self-managed: the following states are available for self-managed cases. Submitted → Detection and Analysis Detection and Analysis → Containment, Eradication, and Recovery Detection and Analysis → Post-incident Activities Containment, Eradication, and Recovery → Detection and Analysis Containment, Eradication, and Recovery → Post-incident Activities Post-incident Activities → Containment, Eradication, and Recovery Post-incident Activities → Detection and Analysis Any → Closed AWS supported: You must use the CloseCase API to close."
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for UpdateCaseStatus to identify the case to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caseStatus:
                  $ref: "#/components/schemas/SelfManagedCaseStatus"
              required:
                - caseStatus
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCaseStatusResponse"
  /v1/membership/{membership_id}/update-membership:
    put:
      operationId: UpdateMembership
      description: Updates membership configuration.
      parameters:
        - name: membership_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/MembershipId"
          description: Required element for UpdateMembership to identify the membership to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                membershipName:
                  $ref: "#/components/schemas/MembershipName"
                incidentResponseTeam:
                  $ref: "#/components/schemas/IncidentResponseTeam"
                optInFeatures:
                  $ref: "#/components/schemas/OptInFeatures"
                membershipAccountsConfigurationsUpdate:
                  $ref: "#/components/schemas/MembershipAccountsConfigurationsUpdate"
                undoMembershipCancellation:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMembershipResponse"
  /v1/cases/{case_id}/update-resolver-type:
    post:
      operationId: UpdateResolverType
      description: Updates the resolver type for a case. This is a one-way action and cannot be reversed.
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CaseId"
          description: Required element for UpdateResolverType to identify the case to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resolverType:
                  $ref: "#/components/schemas/ResolverType"
              required:
                - resolverType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResolverTypeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    MembershipId:
      type: string
      minLength: 12
      maxLength: 34
      pattern: m-[a-z0-9]{10,32}
    AWSAccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AWSAccountId"
    AWSAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    BatchGetMemberAccountDetailsResponse:
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/GetMembershipAccountDetailItems"
          description: The response element providing responses for requests to GetMembershipAccountDetails.
        errors:
          $ref: "#/components/schemas/GetMembershipAccountDetailErrors"
          description: The response element providing error messages for requests to GetMembershipAccountDetails.
    GetMembershipAccountDetailItems:
      type: array
      items:
        $ref: "#/components/schemas/GetMembershipAccountDetailItem"
    GetMembershipAccountDetailItem:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AWSAccountId"
        relationshipStatus:
          $ref: "#/components/schemas/MembershipAccountRelationshipStatus"
        relationshipType:
          $ref: "#/components/schemas/MembershipAccountRelationshipType"
    MembershipAccountRelationshipStatus:
      type: string
      enum:
        - Associated
        - Disassociated
        - Unassociated
    MembershipAccountRelationshipType:
      type: string
      enum:
        - Organization
        - Unrelated
    GetMembershipAccountDetailErrors:
      type: array
      items:
        $ref: "#/components/schemas/GetMembershipAccountDetailError"
    GetMembershipAccountDetailError:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AWSAccountId"
        error:
          $ref: "#/components/schemas/String"
        message:
          $ref: "#/components/schemas/String"
      required:
        - accountId
        - error
        - message
    String:
      type: string
    CancelMembershipResponse:
      type: object
      properties:
        membershipId:
          $ref: "#/components/schemas/MembershipId"
          description: The response element providing responses for requests to CancelMembershipRequest.
      required:
        - membershipId
    CaseId:
      type: string
      minLength: 10
      maxLength: 32
      pattern: \d{10,32}.*
    CloseCaseResponse:
      type: object
      properties:
        caseStatus:
          $ref: "#/components/schemas/CaseStatus"
          description: A response element providing responses for requests to CloseCase. This element responds Closed if successful.
        closedDate:
          $ref: "#/components/schemas/Timestamp"
          description: A response element providing responses for requests to CloseCase. This element responds with the ISO-8601 formatted timestamp of the moment when the case was closed.
    CaseStatus:
      type: string
      enum:
        - Submitted
        - Acknowledged
        - Detection and Analysis
        - Containment, Eradication and Recovery
        - Post-incident Activities
        - Ready to Close
        - Closed
    Timestamp:
      type: string
      format: date-time
    CreateCaseRequestClientTokenString:
      type: string
      minLength: 1
      maxLength: 255
    ResolverType:
      type: string
      enum:
        - AWS
        - Self
    CaseTitle:
      type: string
      minLength: 1
      maxLength: 300
    CaseDescription:
      type: string
      minLength: 1
      maxLength: 8000
    EngagementType:
      type: string
      enum:
        - Security Incident
        - Investigation
    ImpactedAccounts:
      type: array
      items:
        $ref: "#/components/schemas/AWSAccountId"
    Watchers:
      type: array
      items:
        $ref: "#/components/schemas/Watcher"
    Watcher:
      type: object
      properties:
        email:
          $ref: "#/components/schemas/EmailAddress"
        name:
          $ref: "#/components/schemas/PersonName"
        jobTitle:
          $ref: "#/components/schemas/JobTitle"
      required:
        - email
    EmailAddress:
      type: string
      minLength: 6
      maxLength: 254
