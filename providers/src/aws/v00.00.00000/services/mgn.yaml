      maxLength: 256
      pattern: "[^\\s\\x00]( *[^\\s\\x00])*"
    WaveDescription:
      type: string
      minLength: 0
      maxLength: 600
      pattern: "[^\\x00]*"
    WaveAggregatedStatus:
