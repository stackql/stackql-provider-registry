          description: Application wave ID.
    ARN:
      type: string
      minLength: 20
      maxLength: 2048
    ApplicationName:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[^\\s\\x00]( *[^\\s\\x00])*"
    ApplicationDescription:
      type: string
      minLength: 0
      maxLength: 600
      pattern: "[^\\x00]*"
    Boolean:
      type: boolean
    ApplicationAggregatedStatus:
      description: Application aggregated status.
