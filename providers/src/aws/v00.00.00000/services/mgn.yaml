openapi: 3.0.0
info:
  version: "2020-02-26"
  title: Application Migration Service
  description: Application Migration Service
  x-serviceName: mgn
  x-serviceAlias: mgn
  x-protocol: rest-json
  x-apiVersion: "2020-02-26"
  x-endpointPrefix: mgn
servers:
  - url: https://mgn.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mgn
paths:
  /ArchiveApplication:
    post:
      operationId: ArchiveApplication
      description: Archive application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationID:
                  $ref: "#/components/schemas/ApplicationID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - applicationID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
  /ArchiveWave:
    post:
      operationId: ArchiveWave
      description: Archive wave.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                waveID:
                  $ref: "#/components/schemas/WaveID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - waveID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wave"
  /AssociateApplications:
    post:
      operationId: AssociateApplications
      description: Associate applications to wave.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                waveID:
                  $ref: "#/components/schemas/WaveID"
                applicationIDs:
                  $ref: "#/components/schemas/ApplicationIDs"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - waveID
                - applicationIDs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateApplicationsResponse"
  /AssociateSourceServers:
    post:
      operationId: AssociateSourceServers
      description: Associate source servers to application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationID:
                  $ref: "#/components/schemas/ApplicationID"
                sourceServerIDs:
                  $ref: "#/components/schemas/AssociateSourceServersRequestSourceServerIDs"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - applicationID
                - sourceServerIDs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateSourceServersResponse"
  /ChangeServerLifeCycleState:
    post:
      operationId: ChangeServerLifeCycleState
      description: "Allows the user to set the SourceServer.LifeCycle.state property for specific Source Server IDs to one of the following: READY_FOR_TEST or READY_FOR_CUTOVER. This command only works if the Source Server is already launchable (dataReplicationInfo.lagDuration is not null.)"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceServerID:
                  $ref: "#/components/schemas/SourceServerID"
                lifeCycle:
                  $ref: "#/components/schemas/ChangeServerLifeCycleStateSourceServerLifecycle"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - sourceServerID
                - lifeCycle
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceServer"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Create application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ApplicationName"
                description:
                  $ref: "#/components/schemas/ApplicationDescription"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
  /CreateConnector:
    post:
      operationId: CreateConnector
      description: Create Connector.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ConnectorName"
                ssmInstanceID:
                  $ref: "#/components/schemas/SsmInstanceID"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                ssmCommandConfig:
                  $ref: "#/components/schemas/ConnectorSsmCommandConfig"
              required:
                - name
                - ssmInstanceID
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
  /CreateLaunchConfigurationTemplate:
    post:
      operationId: CreateLaunchConfigurationTemplate
      description: Creates a new Launch Configuration Template.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                postLaunchActions:
                  $ref: "#/components/schemas/PostLaunchActions"
                enableMapAutoTagging:
                  $ref: "#/components/schemas/Boolean"
                mapAutoTaggingMpeID:
                  $ref: "#/components/schemas/TagValue"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                launchDisposition:
                  $ref: "#/components/schemas/LaunchDisposition"
                targetInstanceTypeRightSizingMethod:
                  $ref: "#/components/schemas/TargetInstanceTypeRightSizingMethod"
                copyPrivateIp:
                  $ref: "#/components/schemas/Boolean"
                associatePublicIpAddress:
                  $ref: "#/components/schemas/Boolean"
                copyTags:
                  $ref: "#/components/schemas/Boolean"
                licensing:
                  $ref: "#/components/schemas/Licensing"
                bootMode:
                  $ref: "#/components/schemas/BootMode"
                smallVolumeMaxSize:
                  $ref: "#/components/schemas/PositiveInteger"
                smallVolumeConf:
                  $ref: "#/components/schemas/LaunchTemplateDiskConf"
                largeVolumeConf:
                  $ref: "#/components/schemas/LaunchTemplateDiskConf"
                enableParametersEncryption:
                  $ref: "#/components/schemas/Boolean"
                parametersEncryptionKey:
                  $ref: "#/components/schemas/KmsKeyArn"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchConfigurationTemplate"
  /network-migration/CreateNetworkMigrationDefinition:
    post:
      operationId: CreateNetworkMigrationDefinition
      description: Creates a new network migration definition that specifies the source and target network configuration for a migration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/NetworkMigrationDefinitionName"
                description:
                  $ref: "#/components/schemas/NetworkMigrationDefinitionDescription"
                sourceConfigurations:
                  $ref: "#/components/schemas/SourceConfigurationList"
                targetS3Configuration:
                  $ref: "#/components/schemas/TargetS3Configuration"
                targetNetwork:
                  $ref: "#/components/schemas/TargetNetwork"
                targetDeployment:
                  $ref: "#/components/schemas/TargetDeployment"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                scopeTags:
                  $ref: "#/components/schemas/ScopeTagsMap"
              required:
                - name
                - targetS3Configuration
                - targetNetwork
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkMigrationDefinition"
  /CreateReplicationConfigurationTemplate:
    post:
      operationId: CreateReplicationConfigurationTemplate
      description: Creates a new ReplicationConfigurationTemplate.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stagingAreaSubnetId:
                  $ref: "#/components/schemas/SubnetID"
                associateDefaultSecurityGroup:
                  $ref: "#/components/schemas/Boolean"
                replicationServersSecurityGroupsIDs:
                  $ref: "#/components/schemas/ReplicationServersSecurityGroupsIDs"
                replicationServerInstanceType:
                  $ref: "#/components/schemas/EC2InstanceType"
                useDedicatedReplicationServer:
                  $ref: "#/components/schemas/Boolean"
                defaultLargeStagingDiskType:
                  $ref: "#/components/schemas/ReplicationConfigurationDefaultLargeStagingDiskType"
                ebsEncryption:
                  $ref: "#/components/schemas/ReplicationConfigurationEbsEncryption"
                ebsEncryptionKeyArn:
                  $ref: "#/components/schemas/ARN"
                bandwidthThrottling:
                  $ref: "#/components/schemas/BandwidthThrottling"
                dataPlaneRouting:
                  $ref: "#/components/schemas/ReplicationConfigurationDataPlaneRouting"
                createPublicIP:
                  $ref: "#/components/schemas/Boolean"
                stagingAreaTags:
                  $ref: "#/components/schemas/TagsMap"
                useFipsEndpoint:
                  $ref: "#/components/schemas/Boolean"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                internetProtocol:
                  $ref: "#/components/schemas/InternetProtocol"
                storeSnapshotOnLocalZone:
                  $ref: "#/components/schemas/Boolean"
              required:
                - stagingAreaSubnetId
                - associateDefaultSecurityGroup
                - replicationServersSecurityGroupsIDs
                - replicationServerInstanceType
                - useDedicatedReplicationServer
                - defaultLargeStagingDiskType
                - ebsEncryption
                - bandwidthThrottling
                - dataPlaneRouting
                - createPublicIP
                - stagingAreaTags
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplicationConfigurationTemplate"
  /CreateWave:
    post:
      operationId: CreateWave
      description: Create wave.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/WaveName"
                description:
                  $ref: "#/components/schemas/WaveDescription"
                tags:
                  $ref: "#/components/schemas/TagsMap"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wave"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: Delete application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationID:
                  $ref: "#/components/schemas/ApplicationID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - applicationID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
  /DeleteConnector:
    post:
      operationId: DeleteConnector
      description: Delete Connector.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorID:
                  $ref: "#/components/schemas/ConnectorID"
              required:
                - connectorID
      responses:
        "204":
          description: Success
  /DeleteJob:
    post:
      operationId: DeleteJob
      description: Deletes a single Job by ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobID:
                  $ref: "#/components/schemas/JobID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - jobID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobResponse"
  /DeleteLaunchConfigurationTemplate:
    post:
      operationId: DeleteLaunchConfigurationTemplate
      description: Deletes a single Launch Configuration Template by ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                launchConfigurationTemplateID:
                  $ref: "#/components/schemas/LaunchConfigurationTemplateID"
              required:
                - launchConfigurationTemplateID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLaunchConfigurationTemplateResponse"
  /network-migration/DeleteNetworkMigrationDefinition:
    post:
      operationId: DeleteNetworkMigrationDefinition
      description: Deletes a network migration definition. This operation removes the migration definition and all associated metadata.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                networkMigrationDefinitionID:
                  $ref: "#/components/schemas/NetworkMigrationDefinitionID"
              required:
                - networkMigrationDefinitionID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteNetworkMigrationDefinitionResponse"
  /DeleteReplicationConfigurationTemplate:
    post:
      operationId: DeleteReplicationConfigurationTemplate
      description: Deletes a single Replication Configuration Template by ID
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                replicationConfigurationTemplateID:
                  $ref: "#/components/schemas/ReplicationConfigurationTemplateID"
              required:
                - replicationConfigurationTemplateID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReplicationConfigurationTemplateResponse"
  /DeleteSourceServer:
    post:
      operationId: DeleteSourceServer
      description: Deletes a single source server by ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceServerID:
                  $ref: "#/components/schemas/SourceServerID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - sourceServerID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSourceServerResponse"
  /DeleteVcenterClient:
    post:
      operationId: DeleteVcenterClient
      description: Deletes a given vCenter client by ID.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vcenterClientID:
                  $ref: "#/components/schemas/VcenterClientID"
              required:
                - vcenterClientID
      responses:
        "204":
          description: Success
  /DeleteWave:
    post:
      operationId: DeleteWave
      description: Delete wave.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                waveID:
                  $ref: "#/components/schemas/WaveID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - waveID
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWaveResponse"
  /DescribeJobLogItems:
    post:
      operationId: DescribeJobLogItems
      description: Retrieves detailed job log items with paging.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobID:
                  $ref: "#/components/schemas/JobID"
                maxResults:
                  $ref: "#/components/schemas/MaxResultsType"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - jobID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobLogItemsResponse"
  /DescribeJobs:
    post:
      operationId: DescribeJobs
      description: Returns a list of Jobs. Use the JobsID and fromDate and toData filters to limit which jobs are returned. The response is sorted by creationDataTime - latest date first. Jobs are normally created by the StartTest, StartCutover, and TerminateTargetInstances APIs. Jobs are also created by DiagnosticLaunch and TerminateDiagnosticInstances, which are APIs available only to *Support* and only used in response to relevant support tickets.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/DescribeJobsRequestFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResultsType"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                accountID:
                  $ref: "#/components/schemas/AccountID"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobsResponse"
  /DescribeLaunchConfigurationTemplates:
    post:
      operationId: DescribeLaunchConfigurationTemplates
      description: Lists all Launch Configuration Templates, filtered by Launch Configuration Template IDs
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                launchConfigurationTemplateIDs:
                  $ref: "#/components/schemas/LaunchConfigurationTemplateIDs"
                maxResults:
                  $ref: "#/components/schemas/MaxResultsType"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeLaunchConfigurationTemplatesResponse"
  /DescribeReplicationConfigurationTemplates:
    post:
      operationId: DescribeReplicationConfigurationTemplates
      description: Lists all ReplicationConfigurationTemplates, filtered by Source Server IDs.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                replicationConfigurationTemplateIDs:
                  $ref: "#/components/schemas/ReplicationConfigurationTemplateIDs"
                maxResults:
                  $ref: "#/components/schemas/MaxResultsType"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeReplicationConfigurationTemplatesResponse"
  /DescribeSourceServers:
    post:
      operationId: DescribeSourceServers
      description: Retrieves all SourceServers or multiple SourceServers by ID.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/DescribeSourceServersRequestFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResultsType"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                accountID:
                  $ref: "#/components/schemas/AccountID"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSourceServersResponse"
  /DescribeVcenterClients:
    get:
      operationId: DescribeVcenterClients
      description: Returns a list of the installed vCenter clients.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResultsType"
          description: Maximum results to be returned in DescribeVcenterClients.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: Next pagination token to be provided for DescribeVcenterClients.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVcenterClientsResponse"
  /DisassociateApplications:
    post:
      operationId: DisassociateApplications
      description: Disassociate applications from wave.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                waveID:
                  $ref: "#/components/schemas/WaveID"
                applicationIDs:
                  $ref: "#/components/schemas/ApplicationIDs"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - waveID
                - applicationIDs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateApplicationsResponse"
  /DisassociateSourceServers:
    post:
      operationId: DisassociateSourceServers
      description: Disassociate source servers from application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                applicationID:
                  $ref: "#/components/schemas/ApplicationID"
                sourceServerIDs:
                  $ref: "#/components/schemas/DisassociateSourceServersRequestSourceServerIDs"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - applicationID
                - sourceServerIDs
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateSourceServersResponse"
  /DisconnectFromService:
    post:
      operationId: DisconnectFromService
      description: "Disconnects specific Source Servers from Application Migration Service. Data replication is stopped immediately. All AWS resources created by Application Migration Service for enabling the replication of these source servers will be terminated / deleted within 90 minutes. Launched Test or Cutover instances will NOT be terminated. If the agent on the source server has not been prevented from communicating with the Application Migration Service service, then it will receive a command to uninstall itself (within approximately 10 minutes). The following properties of the SourceServer will be changed immediately: dataReplicationInfo.dataReplicationState will be set to DISCONNECTED; The totalStorageBytes property for each of dataReplicationInfo.replicatedDisks will be set to zero; dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will be nullified."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceServerID:
                  $ref: "#/components/schemas/SourceServerID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - sourceServerID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceServer"
  /FinalizeCutover:
    post:
      operationId: FinalizeCutover
      description: "Finalizes the cutover immediately for specific Source Servers. All AWS resources created by Application Migration Service for enabling the replication of these source servers will be terminated / deleted within 90 minutes. Launched Test or Cutover instances will NOT be terminated. The AWS Replication Agent will receive a command to uninstall itself (within 10 minutes). The following properties of the SourceServer will be changed immediately: dataReplicationInfo.dataReplicationState will be changed to DISCONNECTED; The SourceServer.lifeCycle.state will be changed to CUTOVER; The totalStorageBytes property fo each of dataReplicationInfo.replicatedDisks will be set to zero; dataReplicationInfo.lagDuration and dataReplicationInfo.lagDuration will be nullified."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceServerID:
                  $ref: "#/components/schemas/SourceServerID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - sourceServerID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceServer"
  /GetLaunchConfiguration:
    post:
      operationId: GetLaunchConfiguration
      description: Lists all LaunchConfigurations available, filtered by Source Server IDs.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceServerID:
                  $ref: "#/components/schemas/SourceServerID"
                accountID:
                  $ref: "#/components/schemas/AccountID"
              required:
                - sourceServerID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchConfiguration"
  /network-migration/GetNetworkMigrationDefinition:
    post:
      operationId: GetNetworkMigrationDefinition
      description: Retrieves the details of a network migration definition including source and target configurations.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                networkMigrationDefinitionID:
                  $ref: "#/components/schemas/NetworkMigrationDefinitionID"
              required:
                - networkMigrationDefinitionID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkMigrationDefinition"
  /network-migration/GetNetworkMigrationMapperSegmentConstruct:
    post:
      operationId: GetNetworkMigrationMapperSegmentConstruct
      description: Retrieves detailed information about a specific construct within a mapper segment, including its properties and configuration data.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                networkMigrationDefinitionID:
                  $ref: "#/components/schemas/NetworkMigrationDefinitionID"
                networkMigrationExecutionID:
                  $ref: "#/components/schemas/NetworkMigrationExecutionID"
                segmentID:
                  $ref: "#/components/schemas/SegmentID"
                constructID:
                  $ref: "#/components/schemas/ConstructID"
              required:
                - networkMigrationDefinitionID
                - networkMigrationExecutionID
                - segmentID
                - constructID
      responses:
        "200":
