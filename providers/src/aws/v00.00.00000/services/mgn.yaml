        - IN_PROGRESS
        - COMPLETED
    PositiveInteger:
      type: integer
      format: int64
      minimum: 0
    WaveID:
      type: string
      minLength: 22
      maxLength: 22
      pattern: wave-[0-9a-zA-Z]{17}
