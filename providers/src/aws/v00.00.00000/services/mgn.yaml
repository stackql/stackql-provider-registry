        - CREATING_SNAPSHOT
        - CONTINUOUS
        - PAUSED
        - RESCAN
        - STALLED
        - DISCONNECTED
        - PENDING_SNAPSHOT_SHIPPING
        - SHIPPING_SNAPSHOT
