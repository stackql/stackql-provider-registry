          description: The operation to perform on the construct.
      required:
        - segmentID
        - constructID
        - constructType
    OperationUnion:
      description: A union type representing the operation to perform on a construct during a mapping update.
      type: object
      properties:
        merge:
          $ref: "#/components/schemas/MergeOperation"
          description: A merge operation to combine constructs from different segments.
        split:
          $ref: "#/components/schemas/SplitOperation"
          description: A split operation to divide a construct into multiple constructs with specified CIDR blocks.
        delete:
          $ref: "#/components/schemas/DeleteOperation"
          description: A delete operation to remove a construct from the mapping.
        update:
          $ref: "#/components/schemas/UpdateOperation"
          description: An update operation to modify construct properties.
    MergeOperation:
      description: An operation that merges constructs from different segments into the target construct.
      type: object
      properties:
        mergeConstructs:
          $ref: "#/components/schemas/MergeConstructs"
          description: The list of constructs to merge into the target.
    MergeConstructs:
      type: array
      items:
        $ref: "#/components/schemas/MergeConstruct"
    MergeConstruct:
      description: A construct reference specifying the source segment and construct to merge.
      type: object
      properties:
        segmentID:
          $ref: "#/components/schemas/SegmentID"
          description: The segment ID of the construct to merge.
        constructID:
          $ref: "#/components/schemas/ConstructID"
          description: The construct ID to merge.
    SplitOperation:
      description: An operation that splits a construct into multiple constructs with different CIDR blocks.
      type: object
      properties:
        splitConstructs:
          $ref: "#/components/schemas/SplitConstructs"
          description: The list of split targets with their CIDR blocks.
    SplitConstructs:
      type: array
      items:
        $ref: "#/components/schemas/SplitConstruct"
    SplitConstruct:
      description: A split target specifying the CIDR block for the new construct.
      type: object
      properties:
        cidrBlock:
          $ref: "#/components/schemas/CidrBlock"
          description: The CIDR block for the split construct.
    CidrBlock:
      type: string
      pattern: ([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}
    DeleteOperation:
      description: An operation that deletes a construct from the mapping.
      type: object
    UpdateOperation:
      description: An operation that updates the properties of a construct.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/SegmentConstructName"
          description: The updated name for the construct.
        excluded:
          $ref: "#/components/schemas/Boolean"
          description: Whether to exclude this construct from the migration.
        properties_:
