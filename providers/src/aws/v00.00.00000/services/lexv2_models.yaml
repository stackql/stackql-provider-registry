                startDateTime:
                  $ref: "#/components/schemas/Timestamp"
                endDateTime:
                  $ref: "#/components/schemas/Timestamp"
                metrics:
                  $ref: "#/components/schemas/AnalyticsIntentMetrics"
                binBy:
                  $ref: "#/components/schemas/AnalyticsBinByList"
                groupBy:
                  $ref: "#/components/schemas/AnalyticsIntentGroupByList"
                filters:
