components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Id:
      type: string
      minLength: 10
      maxLength: 10
      pattern: ^[0-9a-zA-Z]+$
    BotVersion:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^(DRAFT|[0-9]+)$
    LocaleId:
      type: string
    CreateCustomVocabularyItemsList:
      type: array
      items:
        $ref: "#/components/schemas/NewCustomVocabularyItem"
    NewCustomVocabularyItem:
      description: The new custom vocabulary item from the custom vocabulary list.
      type: object
      properties:
        phrase:
          $ref: "#/components/schemas/Phrase"
          description: The unique phrase for the new custom vocabulary item from the custom vocabulary list.
        weight:
          $ref: "#/components/schemas/Weight"
          description: The weight assigned to the new custom vocabulary item from the custom vocabulary list.
        displayAs:
          $ref: "#/components/schemas/Phrase"
          description: The display as value assigned to the new custom vocabulary item from the custom vocabulary list.
      required:
        - phrase
    Phrase:
      type: string
      minLength: 1
      maxLength: 100
    Weight:
      type: integer
      minimum: 0
      maximum: 3
    BatchCreateCustomVocabularyItemResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported Languages .
        errors:
          $ref: "#/components/schemas/FailedCustomVocabularyItems"
          description: A list of custom vocabulary items that failed to create during the operation. The reason for the error is contained within each error object.
        resources:
          $ref: "#/components/schemas/CustomVocabularyItems"
          description: A list of custom vocabulary items that were successfully created during the operation.
    FailedCustomVocabularyItems:
      type: array
      items:
        $ref: "#/components/schemas/FailedCustomVocabularyItem"
    FailedCustomVocabularyItem:
      description: The unique failed custom vocabulary item from the custom vocabulary list.
      type: object
      properties:
        itemId:
          $ref: "#/components/schemas/ItemId"
          description: The unique item identifer for the failed custom vocabulary item from the custom vocabulary list.
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"
          description: The error message for the failed custom vocabulary item from the custom vocabulary list.
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
          description: The unique error code for the failed custom vocabulary item from the custom vocabulary list.
    ItemId:
      type: string
      minLength: 1
      maxLength: 32
    ErrorMessage:
      type: string
    ErrorCode:
      type: string
      enum:
        - DUPLICATE_INPUT
        - RESOURCE_DOES_NOT_EXIST
        - RESOURCE_ALREADY_EXISTS
        - INTERNAL_SERVER_FAILURE
    CustomVocabularyItems:
      type: array
      items:
        $ref: "#/components/schemas/CustomVocabularyItem"
    CustomVocabularyItem:
      description: The unique custom vocabulary item from the custom vocabulary list.
      type: object
      properties:
        itemId:
          $ref: "#/components/schemas/ItemId"
          description: The unique item identifer for the custom vocabulary item from the custom vocabulary list.
        phrase:
          $ref: "#/components/schemas/Phrase"
          description: The unique phrase for the custom vocabulary item from the custom vocabulary list.
        weight:
          $ref: "#/components/schemas/Weight"
          description: The weight assigned for the custom vocabulary item from the custom vocabulary list.
        displayAs:
          $ref: "#/components/schemas/Phrase"
          description: The DisplayAs value for the custom vocabulary item from the custom vocabulary list.
      required:
        - itemId
        - phrase
    DeleteCustomVocabularyItemsList:
      type: array
      items:
        $ref: "#/components/schemas/CustomVocabularyEntryId"
    CustomVocabularyEntryId:
      description: The unique entry identifier for the custom vocabulary items.
      type: object
      properties:
        itemId:
          $ref: "#/components/schemas/ItemId"
          description: The unique item identifier for the custom vocabulary items.
      required:
        - itemId
    BatchDeleteCustomVocabularyItemResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported languages (https://docs.aws.amazon.com/lexv2/latest/dg/how-languages.html).
        errors:
          $ref: "#/components/schemas/FailedCustomVocabularyItems"
          description: A list of custom vocabulary items that failed to delete during the operation. The reason for the error is contained within each error object.
        resources:
          $ref: "#/components/schemas/CustomVocabularyItems"
          description: A list of custom vocabulary items that were successfully deleted during the operation.
    UpdateCustomVocabularyItemsList:
      type: array
      items:
        $ref: "#/components/schemas/CustomVocabularyItem"
    BatchUpdateCustomVocabularyItemResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported Languages .
        errors:
          $ref: "#/components/schemas/FailedCustomVocabularyItems"
          description: A list of custom vocabulary items that failed to update during the operation. The reason for the error is contained within each error object.
        resources:
          $ref: "#/components/schemas/CustomVocabularyItems"
          description: A list of custom vocabulary items that were successfully updated during the operation.
    DraftBotVersion:
      type: string
      minLength: 5
      maxLength: 5
      pattern: ^DRAFT$
    BuildBotLocaleResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the specified bot.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot that was built. This is only the draft version of the bot.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The language and locale specified of where the bot can be used.
        botLocaleStatus:
          $ref: "#/components/schemas/BotLocaleStatus"
          description: The bot's build status. When the status is ReadyExpressTesting you can test the bot using the utterances defined for the intents and slot types. When the status is Built, the bot is ready for use and can be tested using any utterance.
        lastBuildSubmittedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp indicating the date and time that the bot was last built for this locale.
    BotLocaleStatus:
      type: string
      enum:
        - Creating
        - Building
        - Built
        - ReadyExpressTesting
        - Failed
        - Deleting
        - NotBuilt
        - Importing
        - Processing
    Timestamp:
      type: string
      format: date-time
    Name:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([0-9a-zA-Z][_-]?){1,100}$
    Description:
      type: string
      minLength: 0
      maxLength: 2000
    RoleArn:
      type: string
      minLength: 32
      maxLength: 2048
      pattern: ^arn:aws:iam::[0-9]{12}:role/.*$
    DataPrivacy:
      description: By default, data stored by Amazon Lex is encrypted. The DataPrivacy structure provides settings that determine how Amazon Lex handles special cases of securing the data for your bot.
      type: object
      properties:
        childDirected:
          $ref: "#/components/schemas/ChildDirected"
          description: For each Amazon Lex bot created with the Amazon Lex Model Building Service, you must specify whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to the Children's Online Privacy Protection Act (COPPA) by specifying true or false in the childDirected field. By specifying true in the childDirected field, you confirm that your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. By specifying false in the childDirected field, you confirm that your use of Amazon Lex is not related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. You may not specify a default value for the childDirected field that does not accurately reflect whether your use of Amazon Lex is related to a website, program, or other application that is directed or targeted, in whole or in part, to children under age 13 and subject to COPPA. If your use of Amazon Lex relates to a website, program, or other application that is directed in whole or in part, to children under age 13, you must obtain any required verifiable parental consent under COPPA. For information regarding the use of Amazon Lex in connection with websites, programs, or other applications that are directed or targeted, in whole or in part, to children under age 13, see the Amazon Lex FAQ.
      required:
        - childDirected
    ChildDirected:
      type: boolean
    SessionTTL:
      type: integer
      minimum: 60
      maximum: 86400
    TagMap:
      type: object
      properties: {}
    BotType:
      type: string
      enum:
        - Bot
        - BotNetwork
    BotMembers:
      type: array
      items:
        $ref: "#/components/schemas/BotMember"
    BotMember:
      description: A bot that is a member of a network of bots.
      type: object
      properties:
        botMemberId:
          $ref: "#/components/schemas/Id"
          description: The unique ID of a bot that is a member of this network of bots.
        botMemberName:
          $ref: "#/components/schemas/Name"
          description: The unique name of a bot that is a member of this network of bots.
        botMemberAliasId:
          $ref: "#/components/schemas/BotAliasId"
          description: The alias ID of a bot that is a member of this network of bots.
        botMemberAliasName:
          $ref: "#/components/schemas/BotAliasName"
          description: The alias name of a bot that is a member of this network of bots.
        botMemberVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of a bot that is a member of this network of bots.
      required:
        - botMemberId
        - botMemberName
        - botMemberAliasId
        - botMemberAliasName
        - botMemberVersion
    BotAliasId:
      type: string
      minLength: 10
      maxLength: 10
      pattern: ^(\bTSTALIASID\b|[0-9a-zA-Z]+)$
    BotAliasName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^(\bAmazonLexTestAlias\b|[0-9a-zA-Z][_-]?)+$
    ErrorLogSettings:
      description: Settings parameters for the error logs, whether it is enabled or disabled.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Settings parameters for the error logs, when it is enabled.
      required:
        - enabled
    BoxedBoolean:
      type: boolean
    CreateBotResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: A unique identifier for a particular bot. You use this to identify the bot when you call other Amazon Lex API operations.
        botName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the bot.
        description:
          $ref: "#/components/schemas/Description"
          description: The description specified for the bot.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM role specified for the bot.
        dataPrivacy:
          $ref: "#/components/schemas/DataPrivacy"
          description: The data privacy settings specified for the bot.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The session idle time specified for the bot.
        botStatus:
          $ref: "#/components/schemas/BotStatus"
          description: Shows the current status of the bot. The bot is first in the Creating status. Once the bot is read for use, it changes to the Available status. After the bot is created, you can use the DRAFT version of the bot.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp indicating the date and time that the bot was created.
        botTags:
          type: object
          properties: {}
          description: A list of tags associated with the bot.
        testBotAliasTags:
          type: object
          properties: {}
          description: A list of tags associated with the test alias for the bot.
        botType:
          $ref: "#/components/schemas/BotType"
          description: The type of a bot that was created.
        botMembers:
          $ref: "#/components/schemas/BotMembers"
          description: The list of bots in a network that was created.
        errorLogSettings:
          $ref: "#/components/schemas/ErrorLogSettings"
          description: Specifies configuration settings for delivering error logs to Cloudwatch Logs in an Amazon Lex bot response.
    BotStatus:
      type: string
      enum:
        - Creating
        - Available
        - Inactive
        - Deleting
        - Failed
        - Versioning
        - Importing
        - Updating
    NumericalBotVersion:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^[0-9]+$
    BotAliasLocaleSettingsMap:
      type: object
      properties: {}
    ConversationLogSettings:
      description: Configures conversation logging that saves audio, text, and metadata for the conversations with your users.
      type: object
      properties:
        textLogSettings:
          $ref: "#/components/schemas/TextLogSettingsList"
          description: The Amazon CloudWatch Logs settings for logging text and metadata.
        audioLogSettings:
          $ref: "#/components/schemas/AudioLogSettingsList"
          description: The Amazon S3 settings for logging audio to an S3 bucket.
    TextLogSettingsList:
      type: array
      items:
        $ref: "#/components/schemas/TextLogSetting"
    TextLogSetting:
      description: Defines settings to enable text conversation logs.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether conversation logs should be stored for an alias.
        destination:
          $ref: "#/components/schemas/TextLogDestination"
        selectiveLoggingEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: The option to enable selective conversation log capture for text.
      required:
        - enabled
        - destination
    Boolean:
      type: boolean
    TextLogDestination:
      description: Defines the Amazon CloudWatch Logs destination log group for conversation text logs.
      type: object
      properties:
        cloudWatch:
          $ref: "#/components/schemas/CloudWatchLogGroupLogDestination"
          description: Defines the Amazon CloudWatch Logs log group where text and metadata logs are delivered.
      required:
        - cloudWatch
    CloudWatchLogGroupLogDestination:
      description: The Amazon CloudWatch Logs log group where the text and metadata logs are delivered. The log group must exist before you enable logging.
      type: object
      properties:
        cloudWatchLogGroupArn:
          $ref: "#/components/schemas/CloudWatchLogGroupArn"
          description: The Amazon Resource Name (ARN) of the log group where text and metadata logs are delivered.
        logPrefix:
          $ref: "#/components/schemas/LogPrefix"
          description: The prefix of the log stream name within the log group that you specified
      required:
        - cloudWatchLogGroupArn
        - logPrefix
    CloudWatchLogGroupArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:[\w\-]+:logs:[\w\-]+:[\d]{12}:log-group:[\.\-_/#A-Za-z0-9]{1,512}(?::\*)?$
    LogPrefix:
      type: string
      maxLength: 1024
    AudioLogSettingsList:
      type: array
      items:
        $ref: "#/components/schemas/AudioLogSetting"
    AudioLogSetting:
      description: Settings for logging audio of conversations between Amazon Lex and a user. You specify whether to log audio and the Amazon S3 bucket where the audio file is stored.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether audio logging in enabled for the bot.
        destination:
          $ref: "#/components/schemas/AudioLogDestination"
        selectiveLoggingEnabled:
          $ref: "#/components/schemas/BoxedBoolean"
          description: The option to enable selective conversation log capture for audio.
      required:
        - enabled
        - destination
    AudioLogDestination:
      description: The location of audio log files collected when conversation logging is enabled for a bot.
      type: object
      properties:
        s3Bucket:
          $ref: "#/components/schemas/S3BucketLogDestination"
          description: The Amazon S3 bucket where the audio log files are stored. The IAM role specified in the roleArn parameter of the CreateBot operation must have permission to write to this bucket.
      required:
        - s3Bucket
    S3BucketLogDestination:
      description: Specifies an Amazon S3 bucket for logging audio conversations
      type: object
      properties:
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services Key Management Service (KMS) key for encrypting audio log files stored in an S3 bucket.
        s3BucketArn:
          $ref: "#/components/schemas/S3BucketArn"
          description: The Amazon Resource Name (ARN) of an Amazon S3 bucket where audio log files are stored.
        logPrefix:
          $ref: "#/components/schemas/LogPrefix"
          description: The S3 prefix to assign to audio log files.
      required:
        - s3BucketArn
        - logPrefix
    KmsKeyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:[\w\-]+:kms:[\w\-]+:[\d]{12}:(?:key\/[\w\-]+|alias\/[a-zA-Z0-9:\/_\-]{1,256})$
    S3BucketArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^arn:[\w\-]+:s3:::[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]$
    SentimentAnalysisSettings:
      description: Determines whether Amazon Lex will use Amazon Comprehend to detect the sentiment of user utterances.
      type: object
      properties:
        detectSentiment:
          $ref: "#/components/schemas/Boolean"
          description: Sets whether Amazon Lex uses Amazon Comprehend to detect the sentiment of user utterances.
      required:
        - detectSentiment
    CreateBotAliasResponse:
      type: object
      properties:
        botAliasId:
          $ref: "#/components/schemas/BotAliasId"
          description: The unique identifier of the bot alias.
        botAliasName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the bot alias.
        description:
          $ref: "#/components/schemas/Description"
          description: The description specified for the bot alias.
        botVersion:
          $ref: "#/components/schemas/NumericalBotVersion"
          description: The version of the bot associated with this alias.
        botAliasLocaleSettings:
          type: object
          properties: {}
          description: Configuration information for a specific locale.
        conversationLogSettings:
          $ref: "#/components/schemas/ConversationLogSettings"
          description: The conversation log settings specified for the alias.
        sentimentAnalysisSettings:
          $ref: "#/components/schemas/SentimentAnalysisSettings"
        botAliasStatus:
          $ref: "#/components/schemas/BotAliasStatus"
          description: The current status of the alias. The alias is first put into the Creating state. When the alias is ready to be used, it is put into the Available state. You can use the DescribeBotAlias operation to get the current state of an alias.
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that this alias applies to.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A Unix timestamp indicating the date and time that the bot alias was created.
        tags:
          type: object
          properties: {}
          description: A list of tags associated with the bot alias.
    BotAliasStatus:
      type: string
      enum:
        - Creating
        - Available
        - Deleting
        - Failed
    ConfidenceThreshold:
      type: number
      format: double
      minimum: 0
      maximum: 1
    VoiceSettings:
      description: "Defines settings for using an Amazon Polly voice to communicate with a user. Valid values include: standard neural long-form generative"
      type: object
      properties:
        engine:
          $ref: "#/components/schemas/VoiceEngine"
          description: Indicates the type of Amazon Polly voice that Amazon Lex should use for voice interaction with the user. For more information, see the engine parameter of the SynthesizeSpeech operation in the Amazon Polly developer guide. If you do not specify a value, the default is standard.
        voiceId:
          $ref: "#/components/schemas/VoiceId"
          description: The identifier of the Amazon Polly voice to use.
      required:
        - voiceId
    VoiceEngine:
      type: string
      enum:
        - standard
        - neural
        - long-form
        - generative
    VoiceId:
      type: string
    UnifiedSpeechSettings:
      description: Unified configuration settings that combine speech recognition and synthesis capabilities.
      type: object
      properties:
        speechFoundationModel:
          $ref: "#/components/schemas/SpeechFoundationModel"
          description: The foundation model configuration to use for unified speech processing capabilities.
      required:
        - speechFoundationModel
    SpeechFoundationModel:
      description: Configuration for a foundation model used for speech synthesis and recognition capabilities.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The Amazon Resource Name (ARN) of the foundation model used for speech processing.
        voiceId:
          $ref: "#/components/schemas/VoiceId"
          description: The identifier of the voice to use for speech synthesis with the foundation model.
      required:
        - modelArn
    BedrockModelArn:
      type: string
      pattern: ^arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}::foundation-model\/[a-z0-9-]{1,63}[.]{1}([a-z0-9-]{1,63}[.]){0,2}[a-z0-9-]{1,63}([:][a-z0-9-]{1,63}){0,2}$
    AudioFillerSettings:
      description: Configuration that plays background filler audio during speech-to-speech interactions to mask processing delays and improve the perceived responsiveness of the bot. Audio filler requires unifiedSpeechSettings (speech-to-speech) to be enabled on the bot locale when enabled is true.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether audio filler playback is enabled for the bot locale. Set to true to play filler audio while Amazon Lex processes a user utterance. Set to false to disable filler audio.
        audioType:
          $ref: "#/components/schemas/AudioFillerType"
          description: The identifier of the audio filler to play while Amazon Lex processes the user's input. This field is required when enabled is true.
        startDelayInMilliseconds:
          $ref: "#/components/schemas/AudioFillerDelayInMilliseconds"
          description: The time, in milliseconds, to wait after the end of the user's utterance before starting audio filler playback. Valid range is 500 to 5000 milliseconds. If not specified, Amazon Lex uses a default of 2500 milliseconds.
        minimumPlayDurationInMilliseconds:
          $ref: "#/components/schemas/AudioFillerDurationInMilliseconds"
          description: The minimum time, in milliseconds, that audio filler plays once it has started, even if the bot response becomes ready sooner. Valid range is 1000 to 5000 milliseconds. If not specified, Amazon Lex uses a default of 3000 milliseconds.
        responseDeliveryDelayInMilliseconds:
          $ref: "#/components/schemas/AudioFillerDeliveryDelayInMilliseconds"
          description: The silent delay, in milliseconds, inserted between the end of audio filler playback and the start of the bot's response. Valid range is 200 to 1000 milliseconds. If not specified, Amazon Lex uses a default of 500 milliseconds.
    AudioFillerType:
      description: The audio filler identifier played during speech-to-speech interactions. Supported values include melody and typing variants such as MELODY_CHIPPER_CHIME, MELODY_CURIOUS_CRAWL, MELODY_RISING_RIPPLE, MELODY_PATIENT_PING, MELODY_PONDERING_PONG, TYPING_KINETIC_KEYS, and TYPING_QUIET_QWERTY.
      type: string
      enum:
        - MELODY_CHIPPER_CHIME
        - MELODY_CURIOUS_CRAWL
        - MELODY_RISING_RIPPLE
        - MELODY_PATIENT_PING
        - MELODY_PONDERING_PONG
        - TYPING_KINETIC_KEYS
        - TYPING_QUIET_QWERTY
      minLength: 1
      maxLength: 64
    AudioFillerDelayInMilliseconds:
      type: integer
    AudioFillerDurationInMilliseconds:
      type: integer
    AudioFillerDeliveryDelayInMilliseconds:
      type: integer
    SpeechRecognitionSettings:
      description: Settings that control how Amazon Lex processes and recognizes speech input from users.
      type: object
      properties:
        speechModelPreference:
          $ref: "#/components/schemas/SpeechModelPreference"
          description: The speech-to-text model to use.
        speechModelConfig:
          $ref: "#/components/schemas/SpeechModelConfig"
          description: Configuration settings for the selected speech-to-text model.
    SpeechModelPreference:
      type: string
      enum:
        - Standard
        - Neural
        - Deepgram
    SpeechModelConfig:
      description: Configuration settings that define which speech-to-text model to use for processing speech input.
      type: object
      properties:
        deepgramConfig:
          $ref: "#/components/schemas/DeepgramSpeechModelConfig"
          description: Configuration settings for using Deepgram as the speech-to-text provider.
    DeepgramSpeechModelConfig:
      description: Configuration settings for integrating Deepgram speech-to-text models with Amazon Lex.
      type: object
      properties:
        apiTokenSecretArn:
          $ref: "#/components/schemas/SecretsManagerSecretArn"
          description: The Amazon Resource Name (ARN) of the Secrets Manager secret that contains the Deepgram API token.
        modelId:
          $ref: "#/components/schemas/DeepgramModelId"
          description: The identifier of the Deepgram speech-to-text model to use for processing speech input.
      required:
        - apiTokenSecretArn
    SecretsManagerSecretArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:aws[A-Za-z-]*:secretsmanager:[a-z0-9-]{1,20}:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]{1,512}-[A-Za-z0-9]{6}$
    DeepgramModelId:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[A-Za-z0-9-_]+"
    GenerativeAISettings:
      description: Contains specifications about the generative AI capabilities from Amazon Bedrock that you can turn on for your bot.
      type: object
      properties:
        runtimeSettings:
          $ref: "#/components/schemas/RuntimeSettings"
        buildtimeSettings:
          $ref: "#/components/schemas/BuildtimeSettings"
    RuntimeSettings:
      description: Contains specifications about the Amazon Lex runtime generative AI capabilities from Amazon Bedrock that you can turn on for your bot.
      type: object
      properties:
        slotResolutionImprovement:
          $ref: "#/components/schemas/SlotResolutionImprovementSpecification"
          description: An object containing specifications for the assisted slot resolution feature.
        nluImprovement:
          $ref: "#/components/schemas/NluImprovementSpecification"
          description: An object containing specifications for the Assisted NLU feature within the bot's runtime settings. These settings determine how the bot processes and interprets user utterances during conversations.
    SlotResolutionImprovementSpecification:
      description: Contains specifications for the assisted slot resolution feature.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether assisted slot resolution is turned on or off.
        bedrockModelSpecification:
          $ref: "#/components/schemas/BedrockModelSpecification"
          description: An object containing information about the Amazon Bedrock model used to assist slot resolution.
      required:
        - enabled
    Enabled:
      type: boolean
    BedrockModelSpecification:
      description: Contains information about the Amazon Bedrock model used to interpret the prompt used in descriptive bot building.
      type: object
      properties:
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The ARN of the foundation model used in descriptive bot building.
        guardrail:
          $ref: "#/components/schemas/BedrockGuardrailConfiguration"
          description: The guardrail configuration in the Bedrock model specification details.
        traceStatus:
          $ref: "#/components/schemas/BedrockTraceStatus"
          description: The Bedrock trace status in the Bedrock model specification details.
        customPrompt:
          $ref: "#/components/schemas/BedrockModelCustomPrompt"
          description: The custom prompt used in the Bedrock model specification details.
      required:
        - modelArn
    BedrockGuardrailConfiguration:
      description: The details on the Bedrock guardrail configuration.
      type: object
      properties:
        identifier:
          $ref: "#/components/schemas/BedrockGuardrailIdentifier"
          description: The unique guardrail id for the Bedrock guardrail configuration.
        version:
          $ref: "#/components/schemas/BedrockGuardrailVersion"
          description: The guardrail version for the Bedrock guardrail configuration.
      required:
        - identifier
        - version
    BedrockGuardrailIdentifier:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: ^(([a-z0-9]+)|(arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,20}:[0-9]{12}:guardrail/[a-z0-9]+))$
    BedrockGuardrailVersion:
      type: string
      pattern: ^(([1-9][0-9]{0,7})|(DRAFT))$
    BedrockTraceStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    BedrockModelCustomPrompt:
      type: string
      minLength: 1
      maxLength: 4000
    NluImprovementSpecification:
      description: Configures the Assisted Natural Language Understanding (NLU) feature for your bot. This specification determines whether enhanced intent recognition and utterance understanding capabilities are active.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
          description: Determines whether the Assisted NLU feature is enabled for the bot. When set to true, Amazon Lex uses advanced models to improve intent recognition and slot resolution, with the default being false.
        assistedNluMode:
          $ref: "#/components/schemas/AssistedNluMode"
          description: Specifies the mode for Assisted NLU operation. Use Primary to make Assisted NLU the primary intent recognition method, or Fallback to use it only when standard NLU confidence is low.
        intentDisambiguationSettings:
          $ref: "#/components/schemas/IntentDisambiguationSettings"
          description: An object containing specifications for the Intent Disambiguation feature within the Assisted NLU settings. These settings determine how the bot handles ambiguous user inputs that could match multiple intents.
      required:
        - enabled
    AssistedNluMode:
      description: Defines the operational mode for Assisted Natural Language Understanding. This enum determines how the enhanced NLU capabilities integrate with standard intent recognition.
      type: string
      enum:
        - Primary
        - Fallback
    IntentDisambiguationSettings:
      description: Configures the Intent Disambiguation feature that helps resolve ambiguous user inputs when multiple intents could match. When enabled, the system presents clarifying questions to users, helping them specify their exact intent for improved conversation accuracy.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
          description: Determines whether the Intent Disambiguation feature is enabled. When set to true, Amazon Lex will present disambiguation options to users when multiple intents could match their input, with the default being false.
        maxDisambiguationIntents:
          $ref: "#/components/schemas/MaxDisambiguationIntents"
          description: Specifies the maximum number of intent options (2-5) to present to users when disambiguation is needed. This setting determines how many intent options will be shown to users when the system detects ambiguous input. The default value is 3.
        customDisambiguationMessage:
          $ref: "#/components/schemas/CustomDisambiguationMessage"
          description: Provides a custom message that will be displayed before presenting the disambiguation options to users. This message helps set the context for users and can be customized to match your bot's tone and brand. If not specified, a default message will be used.
      required:
        - enabled
    MaxDisambiguationIntents:
      type: integer
      minimum: 2
      maximum: 5
    CustomDisambiguationMessage:
      type: string
      minLength: 1
      maxLength: 1000
    BuildtimeSettings:
      description: Contains specifications about the Amazon Lex build time generative AI capabilities from Amazon Bedrock that you can turn on for your bot.
      type: object
      properties:
        descriptiveBotBuilder:
          $ref: "#/components/schemas/DescriptiveBotBuilderSpecification"
          description: An object containing specifications for the descriptive bot building feature.
        sampleUtteranceGeneration:
          $ref: "#/components/schemas/SampleUtteranceGenerationSpecification"
          description: Contains specifications for the sample utterance generation feature.
    DescriptiveBotBuilderSpecification:
      description: Contains specifications for the descriptive bot building feature.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the descriptive bot building feature is activated or not.
        bedrockModelSpecification:
          $ref: "#/components/schemas/BedrockModelSpecification"
          description: An object containing information about the Amazon Bedrock model used to interpret the prompt used in descriptive bot building.
      required:
        - enabled
    SampleUtteranceGenerationSpecification:
      description: Contains specifications for the sample utterance generation feature.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable sample utterance generation or not.
        bedrockModelSpecification:
          $ref: "#/components/schemas/BedrockModelSpecification"
      required:
        - enabled
    SpeechDetectionSensitivity:
      description: "Determines the sensitivity level for voice activity detection (VAD) in noisy environments. This setting helps optimize speech recognition accuracy by adjusting how the system responds to background noise. Valid values include: Default - Standard sensitivity level suitable for most environments HighNoiseTolerance - Increased tolerance for moderate background noise MaximumNoiseTolerance - Maximum tolerance for high levels of background noise"
      type: string
      enum:
        - Default
        - HighNoiseTolerance
        - MaximumNoiseTolerance
    CreateBotLocaleResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The specified bot identifier.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The specified bot version.
        localeName:
          $ref: "#/components/schemas/LocaleName"
          description: The specified locale name.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The specified locale identifier.
        description:
          $ref: "#/components/schemas/Description"
          description: The specified description of the bot locale.
        nluIntentConfidenceThreshold:
          $ref: "#/components/schemas/ConfidenceThreshold"
          description: The specified confidence threshold for inserting the AMAZON.FallbackIntent and AMAZON.KendraSearchIntent intents.
        voiceSettings:
          $ref: "#/components/schemas/VoiceSettings"
          description: The Amazon Polly voice ID that Amazon Lex uses for voice interaction with the user.
        unifiedSpeechSettings:
          $ref: "#/components/schemas/UnifiedSpeechSettings"
          description: The unified speech settings configured for the created bot locale.
        audioFillerSettings:
          $ref: "#/components/schemas/AudioFillerSettings"
          description: The audio filler settings configured for the created bot locale.
        speechRecognitionSettings:
          $ref: "#/components/schemas/SpeechRecognitionSettings"
          description: The speech-to-text settings configured for the created bot locale.
        botLocaleStatus:
          $ref: "#/components/schemas/BotLocaleStatus"
          description: The status of the bot. When the status is Creating the bot locale is being configured. When the status is Building Amazon Lex is building the bot for testing and use. If the status of the bot is ReadyExpressTesting, you can test the bot using the exact utterances specified in the bots' intents. When the bot is ready for full testing or to run, the status is Built. If there was a problem with building the bot, the status is Failed. If the bot was saved but not built, the status is NotBuilt.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp specifying the date and time that the bot locale was created.
        generativeAISettings:
          $ref: "#/components/schemas/GenerativeAISettings"
        speechDetectionSensitivity:
          $ref: "#/components/schemas/SpeechDetectionSensitivity"
          description: The sensitivity level for voice activity detection (VAD) that was specified for the bot locale.
    LocaleName:
      type: string
    ReplicaRegion:
      description: The region that contains the replicated bots. Minimum value = 2, maximum value = 25.
      type: string
      minLength: 2
      maxLength: 25
    CreateBotReplicaResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique bot ID of the replicated bot generated.
        replicaRegion:
          $ref: "#/components/schemas/ReplicaRegion"
          description: The region of the replicated bot generated.
        sourceRegion:
          $ref: "#/components/schemas/ReplicaRegion"
          description: The source region for the source bot used for the replicated bot generated.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date and time of the replicated bot generated.
        botReplicaStatus:
          $ref: "#/components/schemas/BotReplicaStatus"
          description: The operational status of the replicated bot generated.
    BotReplicaStatus:
      description: "The status of the operation to replicate the bot. Values: Enabling, Enabled, Deleting, Failed."
      type: string
      enum:
        - Enabling
        - Enabled
        - Deleting
        - Failed
    BotVersionLocaleSpecification:
      type: object
      properties: {}
    CreateBotVersionResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The bot identifier specified in the request.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the version specified in the request.
        botVersion:
          $ref: "#/components/schemas/NumericalBotVersion"
          description: The version number assigned to the version.
        botVersionLocaleSpecification:
          type: object
          properties: {}
          description: The source versions used for each locale in the new version.
        botStatus:
          $ref: "#/components/schemas/BotStatus"
          description: When you send a request to create or update a bot, Amazon Lex sets the status response element to Creating. After Amazon Lex builds the bot, it sets status to Available. If Amazon Lex can't build the bot, it sets status to Failed.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of the date and time that the version was created.
    ExportResourceSpecification:
      description: Provides information about the bot or bot locale that you want to export. You can specify the botExportSpecification or the botLocaleExportSpecification, but not both.
      type: object
      properties:
        botExportSpecification:
          $ref: "#/components/schemas/BotExportSpecification"
          description: Parameters for exporting a bot.
        botLocaleExportSpecification:
          $ref: "#/components/schemas/BotLocaleExportSpecification"
          description: Parameters for exporting a bot locale.
        customVocabularyExportSpecification:
          $ref: "#/components/schemas/CustomVocabularyExportSpecification"
          description: The parameters required to export a custom vocabulary.
        testSetExportSpecification:
          $ref: "#/components/schemas/TestSetExportSpecification"
          description: Specifications for the test set that is exported as a resource.
    BotExportSpecification:
      description: Provides the identity of a the bot that was exported.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot assigned by Amazon Lex.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that was exported. This will be either DRAFT or the version number.
      required:
        - botId
        - botVersion
    BotLocaleExportSpecification:
      description: Provides the bot locale parameters required for exporting a bot locale.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot to create the locale for.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot to export.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale to export. The string must match one of the locales in the bot.
      required:
        - botId
        - botVersion
        - localeId
    CustomVocabularyExportSpecification:
      description: Provides the parameters required for exporting a custom vocabulary.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot that contains the custom vocabulary to export.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that contains the custom vocabulary to export.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale of the bot that contains the custom vocabulary to export.
      required:
        - botId
        - botVersion
        - localeId
    TestSetExportSpecification:
      description: Contains information about the test set that is exported.
      type: object
      properties:
        testSetId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the test set.
      required:
        - testSetId
    ImportExportFileFormat:
      type: string
      enum:
        - LexJson
        - TSV
        - CSV
    ImportExportFilePassword:
      type: string
      minLength: 1
      maxLength: 1024
    CreateExportResponse:
      type: object
      properties:
        exportId:
          $ref: "#/components/schemas/Id"
          description: An identifier for a specific request to create an export.
        resourceSpecification:
          $ref: "#/components/schemas/ExportResourceSpecification"
          description: A description of the type of resource that was exported, either a bot or a bot locale.
        fileFormat:
          $ref: "#/components/schemas/ImportExportFileFormat"
          description: The file format used for the bot or bot locale definition files.
        exportStatus:
          $ref: "#/components/schemas/ExportStatus"
          description: The status of the export. When the status is Completed, you can use the DescribeExport operation to get the pre-signed S3 URL link to your exported bot or bot locale.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the request to export a bot was created.
    ExportStatus:
      type: string
      enum:
        - InProgress
        - Completed
        - Failed
        - Deleting
    DisplayName:
      type: string
      minLength: 1
      maxLength: 100
    IntentSignature:
      type: string
    SampleUtterancesList:
      type: array
      items:
        $ref: "#/components/schemas/SampleUtterance"
    SampleUtterance:
      description: A sample utterance that invokes an intent or respond to a slot elicitation prompt.
      type: object
      properties:
        utterance:
          $ref: "#/components/schemas/Utterance"
          description: The sample utterance that Amazon Lex uses to build its machine-learning model to recognize intents.
      required:
        - utterance
    Utterance:
      type: string
    DialogCodeHookSettings:
      description: Settings that determine the Lambda function that Amazon Lex uses for processing user responses.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Enables the dialog code hook so that it processes user requests.
      required:
        - enabled
    FulfillmentCodeHookSettings:
      description: Determines if a Lambda function should be invoked for a specific intent.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether a Lambda function should be invoked to fulfill a specific intent.
        postFulfillmentStatusSpecification:
          $ref: "#/components/schemas/PostFulfillmentStatusSpecification"
          description: Provides settings for messages sent to the user for after the Lambda fulfillment function completes. Post-fulfillment messages can be sent for both streaming and non-streaming conversations.
        fulfillmentUpdatesSpecification:
          $ref: "#/components/schemas/FulfillmentUpdatesSpecification"
          description: Provides settings for update messages sent to the user for long-running Lambda fulfillment functions. Fulfillment updates can be used only with streaming conversations.
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether the fulfillment code hook is used. When active is false, the code hook doesn't run.
      required:
        - enabled
    PostFulfillmentStatusSpecification:
      description: Provides a setting that determines whether the post-fulfillment response is sent to the user. For more information, see https://docs.aws.amazon.com/lexv2/latest/dg/streaming-progress.html#progress-complete
      type: object
      properties:
        successResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        failureResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        timeoutResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        successNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step in the conversation that Amazon Lex invokes when the fulfillment code hook completes successfully.
        successConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the fulfillment code hook finishes successfully.
        failureNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step the bot runs after the fulfillment code hook throws an exception or returns with the State field of the Intent object set to Failed.
        failureConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the fulfillment code hook throws an exception or returns with the State field of the Intent object set to Failed.
        timeoutNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot runs when the fulfillment code hook times out.
        timeoutConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate if the fulfillment code hook times out.
    ResponseSpecification:
      description: Specifies a list of message groups that Amazon Lex uses to respond the user input.
      type: object
      properties:
        messageGroups:
          $ref: "#/components/schemas/MessageGroupsList"
          description: A collection of responses that Amazon Lex can send to the user. Amazon Lex chooses the actual response to send at runtime.
        allowInterrupt:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether the user can interrupt a speech response from Amazon Lex.
      required:
        - messageGroups
    MessageGroupsList:
      type: array
      items:
        $ref: "#/components/schemas/MessageGroup"
    MessageGroup:
      description: Provides one or more messages that Amazon Lex should send to the user.
      type: object
      properties:
        message:
          $ref: "#/components/schemas/Message"
          description: The primary message that Amazon Lex should send to the user.
        variations:
          $ref: "#/components/schemas/MessageVariationsList"
          description: Message variations to send to the user. When variations are defined, Amazon Lex chooses the primary message or one of the variations to send to the user.
      required:
        - message
    Message:
      description: The object that provides message text and its type.
      type: object
      properties:
        plainTextMessage:
          $ref: "#/components/schemas/PlainTextMessage"
          description: A message in plain text format.
        customPayload:
          $ref: "#/components/schemas/CustomPayload"
          description: A message in a custom format defined by the client application.
        ssmlMessage:
          $ref: "#/components/schemas/SSMLMessage"
          description: A message in Speech Synthesis Markup Language (SSML).
        imageResponseCard:
          $ref: "#/components/schemas/ImageResponseCard"
          description: A message that defines a response card that the client application can show to the user.
    PlainTextMessage:
      description: Defines an ASCII text message to send to the user.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/PlainTextMessageValue"
          description: The message to send to the user.
      required:
        - value
    PlainTextMessageValue:
      type: string
      minLength: 1
      maxLength: 1000
    CustomPayload:
      description: A custom response string that Amazon Lex sends to your application. You define the content and structure the string.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/CustomPayloadValue"
          description: The string that is sent to your application.
      required:
        - value
    CustomPayloadValue:
      type: string
      minLength: 1
      maxLength: 1000
    SSMLMessage:
      description: Defines a Speech Synthesis Markup Language (SSML) prompt.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/SSMLMessageValue"
          description: The SSML text that defines the prompt.
      required:
        - value
    SSMLMessageValue:
      type: string
      minLength: 1
      maxLength: 1000
    ImageResponseCard:
      description: A card that is shown to the user by a messaging platform. You define the contents of the card, the card is displayed by the platform. When you use a response card, the response from the user is constrained to the text associated with a button on the card.
      type: object
      properties:
        title_:
          $ref: "#/components/schemas/AttachmentTitle"
          description: The title to display on the response card. The format of the title is determined by the platform displaying the response card.
        subtitle:
          $ref: "#/components/schemas/AttachmentTitle"
          description: The subtitle to display on the response card. The format of the subtitle is determined by the platform displaying the response card.
        imageUrl:
          $ref: "#/components/schemas/AttachmentUrl"
          description: The URL of an image to display on the response card. The image URL must be publicly available so that the platform displaying the response card has access to the image.
        buttons:
          $ref: "#/components/schemas/ButtonsList"
          description: A list of buttons that should be displayed on the response card. The arrangement of the buttons is determined by the platform that displays the button.
      required:
        - title_
    AttachmentTitle:
      type: string
      minLength: 1
      maxLength: 250
    AttachmentUrl:
      type: string
      minLength: 1
      maxLength: 250
    ButtonsList:
      type: array
      items:
        $ref: "#/components/schemas/Button"
    Button:
      description: Describes a button to use on a response card used to gather slot values from a user.
      type: object
      properties:
        text:
          $ref: "#/components/schemas/ButtonText"
          description: The text that appears on the button. Use this to tell the user what value is returned when they choose this button.
        value:
          $ref: "#/components/schemas/ButtonValue"
          description: The value returned to Amazon Lex when the user chooses this button. This must be one of the slot values configured for the slot.
      required:
        - text
        - value
    ButtonText:
      type: string
      minLength: 1
      maxLength: 50
    ButtonValue:
      type: string
      minLength: 1
      maxLength: 50
    MessageVariationsList:
      type: array
      items:
        $ref: "#/components/schemas/Message"
    DialogState:
      description: The current state of the conversation with the user.
      type: object
      properties:
        dialogAction:
          $ref: "#/components/schemas/DialogAction"
        intent:
          $ref: "#/components/schemas/IntentOverride"
        sessionAttributes:
          type: object
          properties: {}
          description: Map of key/value pairs representing session-specific context information. It contains application information passed between Amazon Lex and a client application.
    DialogAction:
      description: Defines the action that the bot executes at runtime when the conversation reaches this step.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/DialogActionType"
          description: The action that the bot should execute.
        slotToElicit:
          $ref: "#/components/schemas/Name"
          description: If the dialog action is ElicitSlot, defines the slot to elicit from the user.
        suppressNextMessage:
          $ref: "#/components/schemas/BoxedBoolean"
          description: When true the next message for the intent is not used.
      required:
        - type_
    DialogActionType:
      type: string
      enum:
        - ElicitIntent
        - StartIntent
        - ElicitSlot
        - EvaluateConditional
        - InvokeDialogCodeHook
        - ConfirmIntent
        - FulfillIntent
        - CloseIntent
        - EndConversation
    IntentOverride:
      description: Override settings to configure the intent state.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the intent. Only required when you're switching intents.
        slots:
          type: object
          properties: {}
          description: A map of all of the slot value overrides for the intent. The name of the slot maps to the value of the slot. Slots that are not included in the map aren't overridden.
    ConditionalSpecification:
      description: Provides a list of conditional branches. Branches are evaluated in the order that they are entered in the list. The first branch with a condition that evaluates to true is executed. The last branch in the list is the default branch. The default branch should not have any condition expression. The default branch is executed if no other branch has a matching condition.
      type: object
      properties:
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether a conditional branch is active. When active is false, the conditions are not evaluated.
        conditionalBranches:
          $ref: "#/components/schemas/ConditionalBranches"
          description: A list of conditional branches. A conditional branch is made up of a condition, a response and a next step. The response and next step are executed when the condition is true.
        defaultBranch:
          $ref: "#/components/schemas/DefaultConditionalBranch"
          description: The conditional branch that should be followed when the conditions for other branches are not satisfied. A conditional branch is made up of a condition, a response and a next step.
      required:
        - active
        - conditionalBranches
        - defaultBranch
    ConditionalBranches:
      type: array
      items:
        $ref: "#/components/schemas/ConditionalBranch"
    ConditionalBranch:
      description: A set of actions that Amazon Lex should run if the condition is matched.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the branch.
        condition:
          $ref: "#/components/schemas/Condition"
          description: Contains the expression to evaluate. If the condition is true, the branch's actions are taken.
        nextStep:
          $ref: "#/components/schemas/DialogState"
          description: The next step in the conversation.
        response:
          $ref: "#/components/schemas/ResponseSpecification"
      required:
        - name
        - condition
        - nextStep
    Condition:
      description: Provides an expression that evaluates to true or false.
      type: object
      properties:
        expressionString:
          $ref: "#/components/schemas/ConditionExpression"
          description: The expression string that is evaluated.
      required:
        - expressionString
    ConditionExpression:
      type: string
      minLength: 1
      maxLength: 1024
    DefaultConditionalBranch:
      description: A set of actions that Amazon Lex should run if none of the other conditions are met.
      type: object
      properties:
        nextStep:
          $ref: "#/components/schemas/DialogState"
          description: The next step in the conversation.
        response:
          $ref: "#/components/schemas/ResponseSpecification"
    FulfillmentUpdatesSpecification:
      description: Provides information for updating the user on the progress of fulfilling an intent.
      type: object
      properties:
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether fulfillment updates are sent to the user. When this field is true, updates are sent. If the active field is set to true, the startResponse, updateResponse, and timeoutInSeconds fields are required.
        startResponse:
          $ref: "#/components/schemas/FulfillmentStartResponseSpecification"
          description: Provides configuration information for the message sent to users when the fulfillment Lambda functions starts running.
        updateResponse:
          $ref: "#/components/schemas/FulfillmentUpdateResponseSpecification"
          description: Provides configuration information for messages sent periodically to the user while the fulfillment Lambda function is running.
        timeoutInSeconds:
          $ref: "#/components/schemas/FulfillmentTimeout"
          description: The length of time that the fulfillment Lambda function should run before it times out.
      required:
        - active
    FulfillmentStartResponseSpecification:
      description: Provides settings for a message that is sent to the user when a fulfillment Lambda function starts running.
      type: object
      properties:
        delayInSeconds:
          $ref: "#/components/schemas/FulfillmentStartResponseDelay"
          description: The delay between when the Lambda fulfillment function starts running and the start message is played. If the Lambda function returns before the delay is over, the start message isn't played.
        messageGroups:
          $ref: "#/components/schemas/MessageGroupsList"
          description: 1 - 5 message groups that contain start messages. Amazon Lex chooses one of the messages to play to the user.
        allowInterrupt:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether the user can interrupt the start message while it is playing.
      required:
        - delayInSeconds
        - messageGroups
    FulfillmentStartResponseDelay:
      type: integer
      minimum: 1
      maximum: 900
    FulfillmentUpdateResponseSpecification:
      description: Provides settings for a message that is sent periodically to the user while a fulfillment Lambda function is running.
      type: object
      properties:
        frequencyInSeconds:
          $ref: "#/components/schemas/FulfillmentUpdateResponseFrequency"
          description: The frequency that a message is sent to the user. When the period ends, Amazon Lex chooses a message from the message groups and plays it to the user. If the fulfillment Lambda returns before the first period ends, an update message is not played to the user.
        messageGroups:
          $ref: "#/components/schemas/MessageGroupsList"
          description: 1 - 5 message groups that contain update messages. Amazon Lex chooses one of the messages to play to the user.
        allowInterrupt:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether the user can interrupt an update message while it is playing.
      required:
        - frequencyInSeconds
        - messageGroups
    FulfillmentUpdateResponseFrequency:
      type: integer
      minimum: 1
      maximum: 900
    FulfillmentTimeout:
      type: integer
      minimum: 1
      maximum: 900
    IntentConfirmationSetting:
      description: Provides a prompt for making sure that the user is ready for the intent to be fulfilled.
      type: object
      properties:
        promptSpecification:
          $ref: "#/components/schemas/PromptSpecification"
          description: Prompts the user to confirm the intent. This question should have a yes or no answer. Amazon Lex uses this prompt to ensure that the user acknowledges that the intent is ready for fulfillment. For example, with the OrderPizza intent, you might want to confirm that the order is correct before placing it. For other intents, such as intents that simply respond to user questions, you might not need to ask the user for confirmation before providing the information.
        declinationResponse:
          $ref: "#/components/schemas/ResponseSpecification"
          description: When the user answers "no" to the question defined in promptSpecification, Amazon Lex responds with this response to acknowledge that the intent was canceled.
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether the intent's confirmation is sent to the user. When this field is false, confirmation and declination responses aren't sent. If the active field isn't specified, the default is true.
        confirmationResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        confirmationNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot executes when the customer confirms the intent.
        confirmationConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the intent is closed.
        declinationNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot executes when the customer declines the intent.
        declinationConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the intent is declined.
        failureResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        failureNextStep:
          $ref: "#/components/schemas/DialogState"
          description: The next step to take in the conversation if the confirmation step fails.
        failureConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
        codeHook:
          $ref: "#/components/schemas/DialogCodeHookInvocationSetting"
          description: The DialogCodeHookInvocationSetting object associated with intent's confirmation step. The dialog code hook is triggered based on these invocation settings when the confirmation next step or declination next step or failure next step is InvokeDialogCodeHook.
        elicitationCodeHook:
          $ref: "#/components/schemas/ElicitationCodeHookInvocationSetting"
          description: The DialogCodeHookInvocationSetting used when the code hook is invoked during confirmation prompt retries.
      required:
        - promptSpecification
    PromptSpecification:
      description: Specifies a list of message groups that Amazon Lex sends to a user to elicit a response.
      type: object
      properties:
        messageGroups:
          $ref: "#/components/schemas/MessageGroupsList"
          description: A collection of messages that Amazon Lex can send to the user. Amazon Lex chooses the actual message to send at runtime.
        maxRetries:
          $ref: "#/components/schemas/PromptMaxRetries"
          description: The maximum number of times the bot tries to elicit a response from the user using this prompt.
        allowInterrupt:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether the user can interrupt a speech prompt from the bot.
        messageSelectionStrategy:
          $ref: "#/components/schemas/MessageSelectionStrategy"
          description: Indicates how a message is selected from a message group among retries.
        promptAttemptsSpecification:
          type: object
          properties: {}
          description: Specifies the advanced settings on each attempt of the prompt.
      required:
        - messageGroups
        - maxRetries
    PromptMaxRetries:
      type: integer
      minimum: 0
      maximum: 5
    MessageSelectionStrategy:
      type: string
      enum:
        - Random
        - Ordered
    DialogCodeHookInvocationSetting:
      description: Settings that specify the dialog code hook that is called by Amazon Lex at a step of the conversation.
      type: object
      properties:
        enableCodeHookInvocation:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether a Lambda function should be invoked for the dialog.
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Determines whether a dialog code hook is used when the intent is activated.
        invocationLabel:
          $ref: "#/components/schemas/Name"
          description: A label that indicates the dialog step from which the dialog code hook is happening.
        postCodeHookSpecification:
          $ref: "#/components/schemas/PostDialogCodeHookInvocationSpecification"
          description: Contains the responses and actions that Amazon Lex takes after the Lambda function is complete.
      required:
        - enableCodeHookInvocation
        - active
        - postCodeHookSpecification
    PostDialogCodeHookInvocationSpecification:
      description: Specifies next steps to run after the dialog code hook finishes.
      type: object
      properties:
        successResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        successNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifics the next step the bot runs after the dialog code hook finishes successfully.
        successConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the dialog code hook finishes successfully.
        failureResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        failureNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step the bot runs after the dialog code hook throws an exception or returns with the State field of the Intent object set to Failed.
        failureConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the dialog code hook throws an exception or returns with the State field of the Intent object set to Failed.
        timeoutResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        timeoutNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot runs when the code hook times out.
        timeoutConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate if the code hook times out.
    ElicitationCodeHookInvocationSetting:
      description: Settings that specify the dialog code hook that is called by Amazon Lex between eliciting slot values.
      type: object
      properties:
        enableCodeHookInvocation:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates whether a Lambda function should be invoked for the dialog.
        invocationLabel:
          $ref: "#/components/schemas/Name"
          description: A label that indicates the dialog step from which the dialog code hook is happening.
      required:
        - enableCodeHookInvocation
    IntentClosingSetting:
      description: Provides a statement the Amazon Lex conveys to the user when the intent is successfully fulfilled.
      type: object
      properties:
        closingResponse:
          $ref: "#/components/schemas/ResponseSpecification"
          description: The response that Amazon Lex sends to the user when the intent is complete.
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether an intent's closing response is used. When this field is false, the closing response isn't sent to the user. If the active field isn't specified, the default is true.
        nextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot executes after playing the intent's closing response.
        conditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches associated with the intent's closing response. These branches are executed when the nextStep attribute is set to EvalutateConditional.
    InputContextsList:
      type: array
      items:
        $ref: "#/components/schemas/InputContext"
    InputContext:
      description: A context that must be active for an intent to be selected by Amazon Lex.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the context.
      required:
        - name
    OutputContextsList:
      type: array
      items:
        $ref: "#/components/schemas/OutputContext"
    OutputContext:
      description: Describes a session context that is activated when an intent is fulfilled.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the output context.
        timeToLiveInSeconds:
          $ref: "#/components/schemas/ContextTimeToLiveInSeconds"
          description: The amount of time, in seconds, that the output context should remain active. The time is figured from the first time the context is sent to the user.
        turnsToLive:
          $ref: "#/components/schemas/ContextTurnsToLive"
          description: The number of conversation turns that the output context should remain active. The number of turns is counted from the first time that the context is sent to the user.
      required:
        - name
        - timeToLiveInSeconds
        - turnsToLive
    ContextTimeToLiveInSeconds:
      type: integer
      minimum: 5
      maximum: 86400
    ContextTurnsToLive:
      type: integer
      minimum: 1
      maximum: 20
    KendraConfiguration:
      description: Provides configuration information for the AMAZON.KendraSearchIntent intent. When you use this intent, Amazon Lex searches the specified Amazon Kendra index and returns documents from the index that match the user's utterance.
      type: object
      properties:
        kendraIndex:
          $ref: "#/components/schemas/KendraIndexArn"
          description: The Amazon Resource Name (ARN) of the Amazon Kendra index that you want the AMAZON.KendraSearchIntent intent to search. The index must be in the same account and Region as the Amazon Lex bot.
        queryFilterStringEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Determines whether the AMAZON.KendraSearchIntent intent uses a custom query string to query the Amazon Kendra index.
        queryFilterString:
          $ref: "#/components/schemas/QueryFilterString"
          description: A query filter that Amazon Lex sends to Amazon Kendra to filter the response from a query. The filter is in the format defined by Amazon Kendra. For more information, see Filtering queries.
      required:
        - kendraIndex
    KendraIndexArn:
      type: string
      minLength: 32
      maxLength: 2048
      pattern: ^arn:aws:kendra:[a-z]+-[a-z]+-[0-9]:[0-9]{12}:index\/[a-zA-Z0-9][a-zA-Z0-9_-]*$
    QueryFilterString:
      type: string
      minLength: 1
      maxLength: 5000
    InitialResponseSetting:
      description: Configuration setting for a response sent to the user before Amazon Lex starts eliciting slots.
      type: object
      properties:
        initialResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        nextStep:
          $ref: "#/components/schemas/DialogState"
          description: The next step in the conversation.
        conditional:
          $ref: "#/components/schemas/ConditionalSpecification"
        codeHook:
          $ref: "#/components/schemas/DialogCodeHookInvocationSetting"
    QnAIntentConfiguration:
      description: Details about the the configuration of the built-in Amazon.QnAIntent.
      type: object
      properties:
        dataSourceConfiguration:
          $ref: "#/components/schemas/DataSourceConfiguration"
          description: Contains details about the configuration of the data source used for the AMAZON.QnAIntent.
        bedrockModelConfiguration:
          $ref: "#/components/schemas/BedrockModelSpecification"
    DataSourceConfiguration:
      description: Contains details about the configuration of the knowledge store used for the AMAZON.QnAIntent. You must have already created the knowledge store and indexed the documents within it.
      type: object
      properties:
        opensearchConfiguration:
          $ref: "#/components/schemas/OpensearchConfiguration"
          description: Contains details about the configuration of the Amazon OpenSearch Service database used for the AMAZON.QnAIntent. To create a domain, follow the steps at Creating and managing Amazon OpenSearch Service domains.
        kendraConfiguration:
          $ref: "#/components/schemas/QnAKendraConfiguration"
          description: Contains details about the configuration of the Amazon Kendra index used for the AMAZON.QnAIntent. To create a Amazon Kendra index, follow the steps at Creating an index.
        bedrockKnowledgeStoreConfiguration:
          $ref: "#/components/schemas/BedrockKnowledgeStoreConfiguration"
          description: Contains details about the configuration of the Amazon Bedrock knowledge base used for the AMAZON.QnAIntent. To set up a knowledge base, follow the steps at Building a knowledge base.
    OpensearchConfiguration:
      description: Contains details about the configuration of the Amazon OpenSearch Service database used for the AMAZON.QnAIntent.
      type: object
      properties:
        domainEndpoint:
          $ref: "#/components/schemas/DomainEndpoint"
          description: The endpoint of the Amazon OpenSearch Service domain.
        indexName:
          $ref: "#/components/schemas/OSIndexName"
          description: The name of the Amazon OpenSearch Service index.
        exactResponse:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to return an exact response or to return an answer generated by the model using the fields you specify from the database.
        exactResponseFields:
          $ref: "#/components/schemas/ExactResponseFields"
          description: Contains the names of the fields used for an exact response to the user.
        includeFields:
          $ref: "#/components/schemas/OSIncludeFields"
          description: Contains a list of fields from the Amazon OpenSearch Service that the model can use to generate the answer to the query.
      required:
        - domainEndpoint
        - indexName
    DomainEndpoint:
      type: string
      pattern: ^(http|https):\/\/+[^\s]+[\w]
    OSIndexName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^(?![_-])[a-z0-9][a-z0-9_\-]{0,254}$
    ExactResponseFields:
      description: Contains the names of the fields used for an exact response to the user.
      type: object
      properties:
        questionField:
          $ref: "#/components/schemas/QuestionField"
          description: The name of the field that contains the query made to the OpenSearch Service database.
        answerField:
          $ref: "#/components/schemas/AnswerField"
          description: The name of the field that contains the answer to the query made to the OpenSearch Service database.
      required:
        - questionField
        - answerField
    QuestionField:
      type: string
    AnswerField:
      type: string
    OSIncludeFields:
      type: array
      items:
        $ref: "#/components/schemas/IncludeField"
    IncludeField:
      type: string
    QnAKendraConfiguration:
      description: Contains details about the configuration of the Amazon Kendra index used for the AMAZON.QnAIntent.
      type: object
      properties:
        kendraIndex:
          $ref: "#/components/schemas/KendraIndexArn"
          description: The ARN of the Amazon Kendra index to use.
        queryFilterStringEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to enable an Amazon Kendra filter string or not.
        queryFilterString:
          $ref: "#/components/schemas/QueryFilterString"
          description: Contains the Amazon Kendra filter string to use if enabled. For more information on the Amazon Kendra search filter JSON format, see Using document attributes to filter search results.
        exactResponse:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to return an exact response from the Amazon Kendra index or to let the Amazon Bedrock model you select generate a response based on the results. To use this feature, you must first add FAQ questions to your index by following the steps at Adding frequently asked questions (FAQs) to an index.
      required:
        - kendraIndex
    BedrockKnowledgeStoreConfiguration:
      description: Contains details about the configuration of a Amazon Bedrock knowledge base.
      type: object
      properties:
        bedrockKnowledgeBaseArn:
          $ref: "#/components/schemas/BedrockKnowledgeBaseArn"
          description: The base ARN of the knowledge base used.
        exactResponse:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether to return an exact response, or to return an answer generated by the model, using the fields you specify from the database.
        exactResponseFields:
          $ref: "#/components/schemas/BedrockKnowledgeStoreExactResponseFields"
          description: Contains the names of the fields used for an exact response to the user.
      required:
        - bedrockKnowledgeBaseArn
    BedrockKnowledgeBaseArn:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^arn:aws(-[^:]+)?:bedrock:[a-z0-9-]{1,40}:[0-9]{12}:knowledge-base\/[A-Za-z0-9]{10}$|^[A-Za-z0-9]{10}$
    BedrockKnowledgeStoreExactResponseFields:
      description: The exact response fields given by the Bedrock knowledge store.
      type: object
      properties:
        answerField:
          $ref: "#/components/schemas/AnswerField"
          description: The answer field used for an exact response from Bedrock Knowledge Store.
    QInConnectIntentConfiguration:
      description: The configuration details of the Qinconnect intent.
      type: object
      properties:
        qInConnectAssistantConfiguration:
          $ref: "#/components/schemas/QInConnectAssistantConfiguration"
          description: The Qinconnect assistant configuration details of the Qinconnect intent.
    QInConnectAssistantConfiguration:
      description: The configuration details of the Qinconnect assistant.
      type: object
      properties:
        assistantArn:
          $ref: "#/components/schemas/QInConnectAssistantARN"
          description: The assistant Arn details of the Qinconnect assistant configuration.
      required:
        - assistantArn
    QInConnectAssistantARN:
      type: string
      pattern: ^arn:[a-z-]*?:wisdom:[a-z0-9-]*?:[0-9]{12}:[a-z-]*?/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}(?:/[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}){0,2}$
    CreateIntentResponse:
      type: object
      properties:
        intentId:
          $ref: "#/components/schemas/Id"
          description: A unique identifier for the intent.
        intentName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the intent.
        intentDisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: The display name specified for the intent.
        description:
          $ref: "#/components/schemas/Description"
          description: The description specified for the intent.
        parentIntentSignature:
          $ref: "#/components/schemas/IntentSignature"
          description: The signature of the parent intent specified for the intent.
        sampleUtterances:
          $ref: "#/components/schemas/SampleUtterancesList"
          description: The sample utterances specified for the intent.
        dialogCodeHook:
          $ref: "#/components/schemas/DialogCodeHookSettings"
          description: The dialog Lambda function specified for the intent.
        fulfillmentCodeHook:
          $ref: "#/components/schemas/FulfillmentCodeHookSettings"
          description: The fulfillment Lambda function specified for the intent.
        intentConfirmationSetting:
          $ref: "#/components/schemas/IntentConfirmationSetting"
          description: The confirmation setting specified for the intent.
        intentClosingSetting:
          $ref: "#/components/schemas/IntentClosingSetting"
          description: The closing setting specified for the intent.
        inputContexts:
          $ref: "#/components/schemas/InputContextsList"
          description: The list of input contexts specified for the intent.
        outputContexts:
          $ref: "#/components/schemas/OutputContextsList"
          description: The list of output contexts specified for the intent.
        kendraConfiguration:
          $ref: "#/components/schemas/KendraConfiguration"
          description: Configuration for searching a Amazon Kendra index specified for the intent.
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with the intent.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot associated with the intent.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale that the intent is specified to use.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of the date and time that the intent was created.
        initialResponseSetting:
          $ref: "#/components/schemas/InitialResponseSetting"
          description: Configuration settings for the response that is sent to the user at the beginning of a conversation, before eliciting slot values.
        qnAIntentConfiguration:
          $ref: "#/components/schemas/QnAIntentConfiguration"
          description: Details about the the configuration of the built-in Amazon.QnAIntent.
        qInConnectIntentConfiguration:
          $ref: "#/components/schemas/QInConnectIntentConfiguration"
          description: Qinconnect intent configuration details for the create intent response.
    AmazonResourceName:
      type: string
      minLength: 1
      maxLength: 1011
    Policy:
      type: string
      minLength: 2
    CreateResourcePolicyResponse:
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the bot or bot alias that the resource policy was attached to.
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: The current revision of the resource policy. Use the revision ID to make sure that you are updating the most current version of a resource policy when you add a policy statement to a resource, delete a resource, or update a resource.
    RevisionId:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^[0-9]+$
    Effect:
      type: string
      enum:
        - Allow
        - Deny
    PrincipalList:
      type: array
      items:
        $ref: "#/components/schemas/Principal"
    Principal:
      description: "The IAM principal that you allowing or denying access to an Amazon Lex action. You must provide a service or an arn, but not both in the same statement. For more information, see AWS JSON policy elements: Principal ."
      type: object
      properties:
        service:
          $ref: "#/components/schemas/ServicePrincipal"
          description: The name of the Amazon Web Services service that should allowed or denied access to an Amazon Lex action.
        arn:
          $ref: "#/components/schemas/PrincipalArn"
          description: The Amazon Resource Name (ARN) of the principal.
    ServicePrincipal:
      type: string
      minLength: 15
      maxLength: 1024
      pattern: ^[0-9a-zA-Z_.]+$
    PrincipalArn:
      type: string
      minLength: 30
      maxLength: 1024
      pattern: ^arn:aws:iam::[0-9]{12}:(root|(user|role)/.*)$
    OperationList:
      type: array
      items:
        $ref: "#/components/schemas/Operation"
    Operation:
      type: string
      minLength: 5
      maxLength: 50
      pattern: lex:[a-zA-Z*]+$
    ConditionMap:
      type: object
      properties: {}
    CreateResourcePolicyStatementResponse:
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the bot or bot alias that the resource policy is attached to.
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: The current revision of the resource policy. Use the revision ID to make sure that you are updating the most current version of a resource policy when you add a policy statement to a resource, delete a resource, or update a resource.
    BuiltInOrCustomSlotTypeId:
      type: string
      minLength: 1
      maxLength: 25
      pattern: ^((AMAZON\.)[a-zA-Z_]+?|[0-9a-zA-Z]+)$
    SlotValueElicitationSetting:
      description: Specifies the elicitation setting details eliciting a slot.
      type: object
      properties:
        defaultValueSpecification:
          $ref: "#/components/schemas/SlotDefaultValueSpecification"
          description: A list of default values for a slot. Default values are used when Amazon Lex hasn't determined a value for a slot. You can specify default values from context variables, session attributes, and defined values.
        slotConstraint:
          $ref: "#/components/schemas/SlotConstraint"
          description: Specifies whether the slot is required or optional.
        promptSpecification:
          $ref: "#/components/schemas/PromptSpecification"
          description: The prompt that Amazon Lex uses to elicit the slot value from the user.
        sampleUtterances:
          $ref: "#/components/schemas/SampleUtterancesList"
          description: If you know a specific pattern that users might respond to an Amazon Lex request for a slot value, you can provide those utterances to improve accuracy. This is optional. In most cases, Amazon Lex is capable of understanding user utterances.
        waitAndContinueSpecification:
          $ref: "#/components/schemas/WaitAndContinueSpecification"
        slotCaptureSetting:
          $ref: "#/components/schemas/SlotCaptureSetting"
          description: Specifies the settings that Amazon Lex uses when a slot value is successfully entered by a user.
        slotResolutionSetting:
          $ref: "#/components/schemas/SlotResolutionSetting"
          description: An object containing information about whether assisted slot resolution is turned on for the slot or not.
      required:
        - slotConstraint
    SlotDefaultValueSpecification:
      description: Defines a list of values that Amazon Lex should use as the default value for a slot.
      type: object
      properties:
        defaultValueList:
          $ref: "#/components/schemas/SlotDefaultValueList"
          description: A list of default values. Amazon Lex chooses the default value to use in the order that they are presented in the list.
      required:
        - defaultValueList
    SlotDefaultValueList:
      type: array
      items:
        $ref: "#/components/schemas/SlotDefaultValue"
    SlotDefaultValue:
      description: Specifies the default value to use when a user doesn't provide a value for a slot.
      type: object
      properties:
        defaultValue:
          $ref: "#/components/schemas/SlotDefaultValueString"
          description: The default value to use when a user doesn't provide a value for a slot.
      required:
        - defaultValue
    SlotDefaultValueString:
      type: string
      minLength: 1
      maxLength: 202
    SlotConstraint:
      type: string
      enum:
        - Required
        - Optional
    WaitAndContinueSpecification:
      description: Specifies the prompts that Amazon Lex uses while a bot is waiting for customer input.
      type: object
      properties:
        waitingResponse:
          $ref: "#/components/schemas/ResponseSpecification"
          description: The response that Amazon Lex sends to indicate that the bot is waiting for the conversation to continue.
        continueResponse:
          $ref: "#/components/schemas/ResponseSpecification"
          description: The response that Amazon Lex sends to indicate that the bot is ready to continue the conversation.
        stillWaitingResponse:
          $ref: "#/components/schemas/StillWaitingResponseSpecification"
          description: A response that Amazon Lex sends periodically to the user to indicate that the bot is still waiting for input from the user.
        active:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Specifies whether the bot will wait for a user to respond. When this field is false, wait and continue responses for a slot aren't used. If the active field isn't specified, the default is true.
      required:
        - waitingResponse
        - continueResponse
    StillWaitingResponseSpecification:
      description: Defines the messages that Amazon Lex sends to a user to remind them that the bot is waiting for a response.
      type: object
      properties:
        messageGroups:
          $ref: "#/components/schemas/MessageGroupsList"
          description: One or more message groups, each containing one or more messages, that define the prompts that Amazon Lex sends to the user.
        frequencyInSeconds:
          $ref: "#/components/schemas/StillWaitingResponseFrequency"
          description: How often a message should be sent to the user. Minimum of 1 second, maximum of 5 minutes.
        timeoutInSeconds:
          $ref: "#/components/schemas/StillWaitingResponseTimeout"
          description: If Amazon Lex waits longer than this length of time for a response, it will stop sending messages.
        allowInterrupt:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Indicates that the user can interrupt the response by speaking while the message is being played.
      required:
        - messageGroups
        - frequencyInSeconds
        - timeoutInSeconds
    StillWaitingResponseFrequency:
      type: integer
      minimum: 1
      maximum: 300
    StillWaitingResponseTimeout:
      type: integer
      minimum: 1
      maximum: 900
    SlotCaptureSetting:
      description: Settings used when Amazon Lex successfully captures a slot value from a user.
      type: object
      properties:
        captureResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        captureNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot runs when the slot value is captured before the code hook times out.
        captureConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate after the slot value is captured.
        failureResponse:
          $ref: "#/components/schemas/ResponseSpecification"
        failureNextStep:
          $ref: "#/components/schemas/DialogState"
          description: Specifies the next step that the bot runs when the slot value code is not recognized.
        failureConditional:
          $ref: "#/components/schemas/ConditionalSpecification"
          description: A list of conditional branches to evaluate when the slot value isn't captured.
        codeHook:
          $ref: "#/components/schemas/DialogCodeHookInvocationSetting"
          description: Code hook called after Amazon Lex successfully captures a slot value.
        elicitationCodeHook:
          $ref: "#/components/schemas/ElicitationCodeHookInvocationSetting"
          description: Code hook called when Amazon Lex doesn't capture a slot value.
    SlotResolutionSetting:
      description: Contains information about whether assisted slot resolution is turned on for the slot or not.
      type: object
      properties:
        slotResolutionStrategy:
          $ref: "#/components/schemas/SlotResolutionStrategy"
          description: Specifies whether assisted slot resolution is turned on for the slot or not. If the value is EnhancedFallback, assisted slot resolution is activated when Amazon Lex defaults to the AMAZON.FallbackIntent. If the value is Default, assisted slot resolution is turned off.
      required:
        - slotResolutionStrategy
    SlotResolutionStrategy:
      type: string
      enum:
        - EnhancedFallback
        - Default
    ObfuscationSetting:
      description: Determines whether Amazon Lex obscures slot values in conversation logs.
      type: object
      properties:
        obfuscationSettingType:
          $ref: "#/components/schemas/ObfuscationSettingType"
          description: Value that determines whether Amazon Lex obscures slot values in conversation logs. The default is to obscure the values.
      required:
        - obfuscationSettingType
    ObfuscationSettingType:
      type: string
      enum:
        - None
        - DefaultObfuscation
    MultipleValuesSetting:
      description: Indicates whether a slot can return multiple values.
      type: object
      properties:
        allowMultipleValues:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether a slot can return multiple values. When true, the slot may return more than one value in a response. When false, the slot returns only a single value. Multi-value slots are only available in the en-US locale. If you set this value to true in any other locale, Amazon Lex throws a ValidationException. If the allowMutlipleValues is not set, the default value is false.
    SubSlotSetting:
      description: Specifications for the constituent sub slots and the expression for the composite slot.
      type: object
      properties:
        expression:
          $ref: "#/components/schemas/SubSlotExpression"
          description: The expression text for defining the constituent sub slots in the composite slot using logical AND and OR operators.
        slotSpecifications:
          type: object
          properties: {}
          description: Specifications for the constituent sub slots of a composite slot.
    SubSlotExpression:
      type: string
      minLength: 0
      maxLength: 640
      pattern: "[0-9A-Za-z_\\-\\s\\(\\)]+"
    CreateSlotResponse:
      type: object
      properties:
        slotId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier associated with the slot. Use this to identify the slot when you update or delete it.
        slotName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the slot.
        description:
          $ref: "#/components/schemas/Description"
          description: The description associated with the slot.
        slotTypeId:
          $ref: "#/components/schemas/BuiltInOrCustomSlotTypeId"
          description: The unique identifier of the slot type associated with this slot.
        valueElicitationSetting:
          $ref: "#/components/schemas/SlotValueElicitationSetting"
          description: The value elicitation settings specified for the slot.
        obfuscationSetting:
          $ref: "#/components/schemas/ObfuscationSetting"
          description: Indicates whether the slot is configured to obfuscate values in Amazon CloudWatch logs.
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot associated with the slot.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot associated with the slot.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The language and local specified for the slot.
        intentId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the intent associated with the slot.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the date and time that the slot was created.
        multipleValuesSetting:
          $ref: "#/components/schemas/MultipleValuesSetting"
          description: Indicates whether the slot returns multiple values in one response.
        subSlotSetting:
          $ref: "#/components/schemas/SubSlotSetting"
          description: Specifications for the constituent sub slots and the expression for the composite slot.
    SlotTypeValues:
      type: array
      items:
        $ref: "#/components/schemas/SlotTypeValue"
    SlotTypeValue:
      description: Each slot type can have a set of values. Each SlotTypeValue represents a value that the slot type can take.
      type: object
      properties:
        sampleValue:
          $ref: "#/components/schemas/SampleValue"
          description: The value of the slot type entry.
        synonyms:
          $ref: "#/components/schemas/SynonymList"
          description: Additional values related to the slot type entry.
    SampleValue:
      description: Defines one of the values for a slot type.
      type: object
      properties:
        value:
          $ref: "#/components/schemas/Value"
          description: The value that can be used for a slot type.
      required:
        - value
    Value:
      type: string
      minLength: 1
      maxLength: 140
    SynonymList:
      type: array
      items:
        $ref: "#/components/schemas/SampleValue"
    SlotValueSelectionSetting:
      description: Contains settings used by Amazon Lex to select a slot value.
      type: object
      properties:
        resolutionStrategy:
          $ref: "#/components/schemas/SlotValueResolutionStrategy"
          description: "Determines the slot resolution strategy that Amazon Lex uses to return slot type values. The field can be set to one of the following values: ORIGINAL_VALUE - Returns the value entered by the user, if the user value is similar to the slot value. TOP_RESOLUTION - If there is a resolution list for the slot, return the first value in the resolution list as the slot type value. If there is no resolution list, null is returned. If you don't specify the valueSelectionStrategy, the default is ORIGINAL_VALUE."
        regexFilter:
          $ref: "#/components/schemas/SlotValueRegexFilter"
          description: A regular expression used to validate the value of a slot.
        advancedRecognitionSetting:
          $ref: "#/components/schemas/AdvancedRecognitionSetting"
          description: Provides settings that enable advanced recognition settings for slot values. You can use this to enable using slot values as a custom vocabulary for recognizing user utterances.
      required:
        - resolutionStrategy
    SlotValueResolutionStrategy:
      type: string
      enum:
        - OriginalValue
        - TopResolution
        - Concatenation
    SlotValueRegexFilter:
      description: Provides a regular expression used to validate the value of a slot.
      type: object
      properties:
        pattern_:
          $ref: "#/components/schemas/RegexPattern"
          description: 'A regular expression used to validate the value of a slot. Use a standard regular expression. Amazon Lex supports the following characters in the regular expression: A-Z, a-z 0-9 Unicode characters ("\⁠u`<Unicode>`") Represent Unicode characters with four digits, for example "\⁠u0041" or "\⁠u005A". The following regular expression operators are not supported: Infinite repeaters: *, +, or {x,} with no upper bound. Wild card (.)'
      required:
        - pattern_
    RegexPattern:
      type: string
      minLength: 1
      maxLength: 300
    AdvancedRecognitionSetting:
      description: Provides settings that enable advanced recognition settings for slot values.
      type: object
      properties:
        audioRecognitionStrategy:
          $ref: "#/components/schemas/AudioRecognitionStrategy"
          description: Enables using the slot values as a custom vocabulary for recognizing user utterances.
    AudioRecognitionStrategy:
      type: string
      enum:
        - UseSlotValuesAsCustomVocabulary
    SlotTypeSignature:
      type: string
    ExternalSourceSetting:
      description: Provides information about the external source of the slot type's definition.
      type: object
      properties:
        grammarSlotTypeSetting:
          $ref: "#/components/schemas/GrammarSlotTypeSetting"
          description: Settings required for a slot type based on a grammar that you provide.
    GrammarSlotTypeSetting:
      description: Settings requried for a slot type based on a grammar that you provide.
      type: object
      properties:
        source:
          $ref: "#/components/schemas/GrammarSlotTypeSource"
          description: The source of the grammar used to create the slot type.
    GrammarSlotTypeSource:
      description: Describes the Amazon S3 bucket name and location for the grammar that is the source for the slot type.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the Amazon S3 bucket that contains the grammar source.
        s3ObjectKey:
          $ref: "#/components/schemas/S3ObjectPath"
          description: The path to the grammar in the Amazon S3 bucket.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The KMS key required to decrypt the contents of the grammar, if any.
      required:
        - s3BucketName
        - s3ObjectKey
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: ^[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9]$
    S3ObjectPath:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: "[\\.\\-\\!\\*\\_\\'\\(\\)a-zA-Z0-9][\\.\\-\\!\\*\\_\\'\\(\\)\\/a-zA-Z0-9]*$"
    CompositeSlotTypeSetting:
      description: A composite slot is a combination of two or more slots that capture multiple pieces of information in a single user input.
      type: object
      properties:
        subSlots:
          $ref: "#/components/schemas/SubSlotTypeList"
          description: Subslots in the composite slot.
    SubSlotTypeList:
      type: array
      items:
        $ref: "#/components/schemas/SubSlotTypeComposition"
    SubSlotTypeComposition:
      description: Subslot type composition.
      type: object
      properties:
        name:
