          description: Specifies whether to sort the aggregated utterances in ascending or descending order.
      required:
        - attribute
        - order
    AggregatedUtterancesSortAttribute:
      type: string
      enum:
        - HitCount
        - MissedCount
    SortOrder:
      type: string
      enum:
        - Ascending
        - Descending
