    AnalyticsIntentMetrics:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsIntentMetric"
    AnalyticsIntentMetric:
      description: Contains the metric and the summary statistic you want to calculate, and the order in which to sort the results, for the intents in the bot.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsIntentMetricName"
          description: The metric for which you want to get intent summary statistics. Count – The number of times the intent was invoked. Success – The number of times the intent succeeded. Failure – The number of times the intent failed. Switched – The number of times there was a switch to a different intent. Dropped – The number of times the user dropped the intent.
        statistic:
          $ref: "#/components/schemas/AnalyticsMetricStatistic"
          description: The summary statistic to calculate. Sum – The total count for the category you provide in name. Average – The total count divided by the number of intents in the category you provide in name. Max – The highest count in the category you provide in name.
        order:
          $ref: "#/components/schemas/AnalyticsSortOrder"
          description: Specifies whether to sort the results in ascending or descending order.
      required:
        - name
        - statistic
    AnalyticsIntentMetricName:
      type: string
      enum:
        - Count
        - Success
        - Failure
        - Switched
        - Dropped
    AnalyticsMetricStatistic:
      type: string
      enum:
        - Sum
        - Avg
        - Max
    AnalyticsSortOrder:
      type: string
      enum:
        - Ascending
        - Descending
    AnalyticsBinByList:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsBinBySpecification"
    AnalyticsBinBySpecification:
      description: Contains the time metric, interval, and method by which to bin the analytics data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsBinByName"
          description: Specifies the time metric by which to bin the analytics data.
        interval:
          $ref: "#/components/schemas/AnalyticsInterval"
          description: Specifies the interval of time by which to bin the analytics data.
        order:
          $ref: "#/components/schemas/AnalyticsSortOrder"
          description: Specifies whether to bin the analytics data in ascending or descending order. If this field is left blank, the default order is by the key of the bin in descending order.
      required:
        - name
        - interval
    AnalyticsBinByName:
      type: string
      enum:
        - ConversationStartTime
        - UtteranceTimestamp
    AnalyticsInterval:
      type: string
      enum:
        - OneHour
        - OneDay
    AnalyticsIntentGroupByList:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsIntentGroupBySpecification"
    AnalyticsIntentGroupBySpecification:
      description: Contains the category by which to group the intents.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsIntentField"
          description: Specifies whether to group the intent stages by their name or their end state.
      required:
        - name
    AnalyticsIntentField:
      type: string
      enum:
        - IntentName
        - IntentEndState
        - IntentLevel
    AnalyticsIntentFilters:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsIntentFilter"
    AnalyticsIntentFilter:
      description: 'Contains fields describing a condition by which to filter the intents. The expression may be understood as name operator values. For example: IntentName CO Book – The intent name contains the string "Book." BotVersion EQ 2 – The bot version is equal to two. The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. SessionId – EQ. OriginatingRequestId – EQ. IntentName – EQ, CO. IntentEndState – EQ, CO.'
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsIntentFilterName"
          description: "The category by which to filter the intents. The descriptions for each option are as follows: BotAlias – The name of the bot alias. BotVersion – The version of the bot. LocaleId – The locale of the bot. Modality – The modality of the session with the bot (audio, DTMF, or text). Channel – The channel that the bot is integrated with. SessionId – The identifier of the session with the bot. OriginatingRequestId – The identifier of the first request in a session. IntentName – The name of the intent. IntentEndState – The final state of the intent."
        operator:
          $ref: "#/components/schemas/AnalyticsFilterOperator"
          description: "The operation by which to filter the category. The following operations are possible: CO – Contains EQ – Equals GT – Greater than LT – Less than The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. SessionId – EQ. OriginatingRequestId – EQ. IntentName – EQ, CO. IntentEndState – EQ, CO."
        values:
          $ref: "#/components/schemas/AnalyticsFilterValues"
          description: An array containing the values of the category by which to apply the operator to filter the results. You can provide multiple values if the operator is EQ or CO. If you provide multiple values, you filter for results that equal/contain any of the values. For example, if the name, operator, and values fields are Modality, EQ, and [Speech, Text], the operation filters for results where the modality was either Speech or Text.
      required:
        - name
        - operator
        - values
    AnalyticsIntentFilterName:
      type: string
      enum:
        - BotAliasId
        - BotVersion
        - LocaleId
        - Modality
        - Channel
        - SessionId
        - OriginatingRequestId
        - IntentName
        - IntentEndState
    AnalyticsFilterOperator:
      type: string
      enum:
        - EQ
        - GT
        - LT
    AnalyticsFilterValues:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsFilterValue"
    AnalyticsFilterValue:
      type: string
