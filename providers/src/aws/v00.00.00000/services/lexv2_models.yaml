      type: string
      enum:
        - Utterance
    FilterValues:
      type: array
      items:
        $ref: "#/components/schemas/FilterValue"
    FilterValue:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[0-9a-zA-Z_()\s-]+$
    AggregatedUtterancesFilterOperator:
      type: string
      enum:
        - CO
        - EQ
    ListAggregatedUtterancesResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot that contains the utterances.
        botAliasId:
          $ref: "#/components/schemas/BotAliasId"
          description: The identifier of the bot alias that contains the utterances. If you specified the bot version, the bot alias ID isn't returned.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The identifier of the bot version that contains the utterances. If you specified the bot alias, the bot version isn't returned.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale that the utterances are in.
        aggregationDuration:
          $ref: "#/components/schemas/UtteranceAggregationDuration"
          description: The time period used to aggregate the utterance data.
        aggregationWindowStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the aggregation window begins. Only data collected after this time is returned in the results.
        aggregationWindowEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the aggregation window ends. Only data collected between the start time and the end time are returned in the results.
        aggregationLastRefreshedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last date and time that the aggregated data was collected. The time period depends on the length of the aggregation window. Hours - for 1 hour time window, every half hour; otherwise every hour. Days - every 6 hours Weeks - for a one week time window, every 12 hours; otherwise, every day
        aggregatedUtterancesSummaries:
          $ref: "#/components/schemas/AggregatedUtterancesSummaryList"
          description: Summaries of the aggregated utterance data. Each response contains information about the number of times that the utterance was seen during the time period, whether it was detected or missed, and when it was seen during the time period.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates whether there are more results to return in a response to the ListAggregatedUtterances operation. If the nextToken field is present, you send the contents as the nextToken parameter of a ListAggregatedUtterances operation request to get the next page of results.
    AggregatedUtterancesSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/AggregatedUtterancesSummary"
    AggregatedUtterancesSummary:
      description: Provides summary information for aggregated utterances. The ListAggregatedUtterances operations combines all instances of the same utterance into a single aggregated summary.
      type: object
      properties:
        utterance:
          $ref: "#/components/schemas/Utterance"
          description: The text of the utterance. If the utterance was used with the RecognizeUtterance operation, the text is the transcription of the audio utterance.
        hitCount:
          $ref: "#/components/schemas/HitCount"
          description: The number of times that the utterance was detected by Amazon Lex during the time period. When an utterance is detected, it activates an intent or a slot.
        missedCount:
          $ref: "#/components/schemas/MissedCount"
          description: The number of times that the utterance was missed by Amazon Lex An utterance is missed when it doesn't activate an intent or slot.
        utteranceFirstRecordedInAggregationDuration:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the utterance was first recorded in the time window for aggregation. An utterance may have been sent to Amazon Lex before that time, but only utterances within the time window are counted.
        utteranceLastRecordedInAggregationDuration:
          $ref: "#/components/schemas/Timestamp"
          description: The last date and time that an utterance was recorded in the time window for aggregation. An utterance may be sent to Amazon Lex after that time, but only utterances within the time window are counted.
        containsDataFromDeletedResources:
          $ref: "#/components/schemas/BoxedBoolean"
          description: Aggregated utterance data may contain utterances from versions of your bot that have since been deleted. When the aggregated contains this kind of data, this field is set to true.
    HitCount:
      type: integer
    MissedCount:
      type: integer
