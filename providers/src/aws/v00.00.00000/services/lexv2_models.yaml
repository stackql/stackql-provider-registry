      properties:
        name:
          $ref: "#/components/schemas/AnalyticsUtteranceMetricName"
          description: The metric for which you want to get utterance summary statistics. Count – The number of utterances. Missed – The number of utterances that Amazon Lex failed to recognize. Detected – The number of utterances that Amazon Lex managed to detect. UtteranceTimestamp – The date and time of the utterance.
