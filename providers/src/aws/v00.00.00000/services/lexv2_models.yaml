      properties:
        name:
          $ref: "#/components/schemas/AnalyticsSessionSortByName"
          description: The measure by which to sort the session analytics data. conversationStartTime – The date and time when the conversation began. A conversation is defined as a unique combination of a sessionId and an originatingRequestId. numberOfTurns – The number of turns that the session took. conversationDurationSeconds – The duration of the conversation in seconds.
