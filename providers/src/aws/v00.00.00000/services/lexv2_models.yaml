          description: The object representing the Amazon S3 bucket containing the transcript, as well as the associated metadata.
        encryptionSetting:
          $ref: "#/components/schemas/EncryptionSetting"
          description: The object representing the passwords that were used to encrypt the data related to the bot recommendation results, as well as the KMS key ARN used to encrypt the associated metadata.
        botRecommendationResults:
          $ref: "#/components/schemas/BotRecommendationResults"
          description: The object representing the URL of the bot definition, the URL of the associated transcript and a statistical summary of the bot recommendation results.
    BotRecommendationStatus:
      type: string
      enum:
        - Processing
        - Deleting
        - Deleted
        - Downloading
        - Updating
        - Available
        - Failed
        - Stopping
        - Stopped
    TranscriptSourceSetting:
      description: Indicates the setting of the location where the transcript is stored.
      type: object
      properties:
        s3BucketTranscriptSource:
          $ref: "#/components/schemas/S3BucketTranscriptSource"
          description: Indicates the setting of the Amazon S3 bucket where the transcript is stored.
    S3BucketTranscriptSource:
      description: The object representing the Amazon S3 bucket containing the transcript, as well as the associated metadata.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the bucket containing the transcript and the associated metadata.
        pathFormat:
          $ref: "#/components/schemas/PathFormat"
          description: The object that contains a path format that will be applied when Amazon Lex reads the transcript file in the bucket you provide. Specify this object if you only want Lex to read a subset of files in your Amazon S3 bucket.
        transcriptFormat:
          $ref: "#/components/schemas/TranscriptFormat"
          description: The format of the transcript content. Currently, Genie only supports the Amazon Lex transcript format.
        transcriptFilter:
          $ref: "#/components/schemas/TranscriptFilter"
          description: The object that contains the filter which will be applied when Amazon Lex reads through the Amazon S3 bucket. Specify this object if you want Amazon Lex to read only a subset of the Amazon S3 bucket based on the filter you provide.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The ARN of the KMS key that customer use to encrypt their Amazon S3 bucket. Only use this field if your bucket is encrypted using a customer managed KMS key.
      required:
        - s3BucketName
        - transcriptFormat
    PathFormat:
      description: The object that contains a path format that will be applied when Amazon Lex reads the transcript file in the bucket you provide. Specify this object if you only want Lex to read a subset of files in your Amazon S3 bucket.
      type: object
      properties:
        objectPrefixes:
          $ref: "#/components/schemas/ObjectPrefixes"
          description: A list of Amazon S3 prefixes that points to sub-folders in the Amazon S3 bucket. Specify this list if you only want Lex to read the files under this set of sub-folders.
    ObjectPrefixes:
      type: array
      items:
        $ref: "#/components/schemas/ObjectPrefix"
    ObjectPrefix:
      type: string
      minLength: 1
      pattern: ^[\/]?+[a-zA-Z0-9!_.*'()-]+(\/[a-zA-Z0-9!_.*'()-]+)*$
    TranscriptFormat:
      type: string
      enum:
        - Lex
    TranscriptFilter:
      description: The object representing the filter that Amazon Lex will use to select the appropriate transcript.
      type: object
      properties:
        lexTranscriptFilter:
          $ref: "#/components/schemas/LexTranscriptFilter"
          description: The object representing the filter that Amazon Lex will use to select the appropriate transcript when the transcript format is the Amazon Lex format.
    LexTranscriptFilter:
      description: The object that contains transcript filter details that are associated with a bot recommendation.
      type: object
      properties:
        dateRangeFilter:
          $ref: "#/components/schemas/DateRangeFilter"
          description: The object that contains a date range filter that will be applied to the transcript. Specify this object if you want Amazon Lex to only read the files that are within the date range.
    DateRangeFilter:
      description: The object used for specifying the data range that the customer wants Amazon Lex to read through in the input transcripts.
      type: object
      properties:
        startDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp indicating the start date for the date range filter.
        endDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp indicating the end date for the date range filter.
      required:
        - startDateTime
        - endDateTime
    EncryptionSetting:
      description: The object representing the passwords that were used to encrypt the data related to the bot recommendation, as well as the KMS key ARN used to encrypt the associated metadata.
      type: object
      properties:
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The KMS key ARN used to encrypt the metadata associated with the bot recommendation.
        botLocaleExportPassword:
          $ref: "#/components/schemas/FilePassword"
          description: The password used to encrypt the recommended bot recommendation file.
        associatedTranscriptsPassword:
          $ref: "#/components/schemas/FilePassword"
          description: The password used to encrypt the associated transcript file.
    FilePassword:
      type: string
      minLength: 0
      maxLength: 1024
    BotRecommendationResults:
      description: The object representing the URL of the bot definition, the URL of the associated transcript, and a statistical summary of the bot recommendation results.
      type: object
      properties:
        botLocaleExportUrl:
          $ref: "#/components/schemas/PresignedS3Url"
          description: The presigned URL link of the recommended bot definition.
        associatedTranscriptsUrl:
          $ref: "#/components/schemas/PresignedS3Url"
          description: The presigned url link of the associated transcript.
        statistics:
          $ref: "#/components/schemas/BotRecommendationResultStatistics"
          description: The statistical summary of the bot recommendation results.
    BotRecommendationResultStatistics:
      description: A statistical summary of the bot recommendation results.
      type: object
      properties:
        intents:
          $ref: "#/components/schemas/IntentStatistics"
          description: Statistical information about about the intents associated with the bot recommendation results.
        slotTypes:
          $ref: "#/components/schemas/SlotTypeStatistics"
          description: Statistical information about the slot types associated with the bot recommendation results.
    IntentStatistics:
      description: The object that contains the statistical summary of recommended intents associated with the bot recommendation.
      type: object
      properties:
        discoveredIntentCount:
          $ref: "#/components/schemas/Count"
          description: The number of recommended intents associated with the bot recommendation.
    Count:
      type: integer
    SlotTypeStatistics:
      description: The object that contains the statistical summary of the recommended slot type associated with the bot recommendation.
      type: object
      properties:
        discoveredSlotTypeCount:
          $ref: "#/components/schemas/Count"
          description: The number of recommended slot types associated with the bot recommendation.
    DescribeBotReplicaResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique bot ID of the replicated bot being monitored.
        replicaRegion:
          $ref: "#/components/schemas/ReplicaRegion"
          description: The region of the replicated bot being monitored.
        sourceRegion:
          $ref: "#/components/schemas/ReplicaRegion"
          description: The source region of the replicated bot being monitored.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The creation date and time of the replicated bot being monitored.
        botReplicaStatus:
          $ref: "#/components/schemas/BotReplicaStatus"
          description: The operational status of the replicated bot being monitored.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: The failure reasons the bot being monitored failed to replicate.
    DescribeBotResourceGenerationResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot for which the generation request was made.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot for which the generation request was made.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale of the bot for which the generation request was made.
        generationId:
          $ref: "#/components/schemas/Id"
          description: The generation ID for which to return the generation details.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: A list of reasons why the generation of bot resources through natural language description failed.
        generationStatus:
          $ref: "#/components/schemas/GenerationStatus"
          description: The status of the generation request.
        generationInputPrompt:
          $ref: "#/components/schemas/GenerationInput"
          description: The prompt used in the generation request.
        generatedBotLocaleUrl:
          $ref: "#/components/schemas/PresignedS3Url"
          description: The Amazon S3 location of the generated bot locale configuration.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the item was generated.
        modelArn:
          $ref: "#/components/schemas/BedrockModelArn"
          description: The ARN of the model used to generate the bot resources.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the generated item was updated.
    GenerationStatus:
      type: string
      enum:
        - Failed
        - Complete
        - InProgress
    GenerationInput:
      type: string
      minLength: 100
      maxLength: 2000
    DescribeBotVersionResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot that contains the version.
        botName:
          $ref: "#/components/schemas/Name"
          description: The name of the bot that contains the version.
        botVersion:
          $ref: "#/components/schemas/NumericalBotVersion"
          description: The version of the bot that was described.
        description:
          $ref: "#/components/schemas/Description"
          description: The description specified for the bot.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that has permission to access the bot version.
        dataPrivacy:
          $ref: "#/components/schemas/DataPrivacy"
          description: Data privacy settings for the bot version.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The number of seconds that a session with the bot remains active before it is discarded by Amazon Lex.
        botStatus:
          $ref: "#/components/schemas/BotStatus"
          description: The current status of the bot. When the status is Available, the bot version is ready for use.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: If the botStatus is Failed, this contains a list of reasons that the version couldn't be built.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of the date and time that the bot version was created.
        parentBotNetworks:
          $ref: "#/components/schemas/ParentBotNetworks"
          description: A list of the networks to which the bot version you described belongs.
        botType:
          $ref: "#/components/schemas/BotType"
          description: The type of the bot in the version that was described.
        botMembers:
          $ref: "#/components/schemas/BotMembers"
          description: The members of bot network in the version that was described.
    DescribeCustomVocabularyMetadataResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot that contains the custom vocabulary.
        botVersion:
          $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that contains the custom vocabulary to describe.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale that contains the custom vocabulary to describe.
        customVocabularyStatus:
          $ref: "#/components/schemas/CustomVocabularyStatus"
          description: The status of the custom vocabulary. If the status is Ready the custom vocabulary is ready to use.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the custom vocabulary was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the custom vocabulary was last updated.
    DescribeExportResponse:
      type: object
      properties:
        exportId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the described export.
        resourceSpecification:
          $ref: "#/components/schemas/ExportResourceSpecification"
          description: The bot, bot ID, and optional locale ID of the exported bot or bot locale.
        fileFormat:
          $ref: "#/components/schemas/ImportExportFileFormat"
          description: The file format used in the files that describe the resource.
        exportStatus:
          $ref: "#/components/schemas/ExportStatus"
          description: The status of the export. When the status is Complete the export archive file is available for download.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: If the exportStatus is failed, contains one or more reasons why the export could not be completed.
        downloadUrl:
          $ref: "#/components/schemas/PresignedS3Url"
          description: A pre-signed S3 URL that points to the bot or bot locale archive. The URL is only available for 5 minutes after calling the DescribeExport operation.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the export was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last date and time that the export was updated.
    DescribeImportResponse:
      type: object
      properties:
        importId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the described import.
        resourceSpecification:
          $ref: "#/components/schemas/ImportResourceSpecification"
          description: The specifications of the imported bot, bot locale, or custom vocabulary.
        importedResourceId:
          $ref: "#/components/schemas/ImportedResourceId"
          description: The unique identifier that Amazon Lex assigned to the resource created by the import.
        importedResourceName:
          $ref: "#/components/schemas/Name"
          description: The name of the imported resource.
        mergeStrategy:
          $ref: "#/components/schemas/MergeStrategy"
          description: The strategy used when there was a name conflict between the imported resource and an existing resource. When the merge strategy is FailOnConflict existing resources are not overwritten and the import fails.
        importStatus:
          $ref: "#/components/schemas/ImportStatus"
          description: The status of the import process. When the status is Completed the resource is imported and ready for use.
        failureReasons:
          $ref: "#/components/schemas/FailureReasons"
          description: If the importStatus field is Failed, this provides one or more reasons for the failure.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the import was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the import was last updated.
    ImportResourceSpecification:
      description: Provides information about the bot or bot locale that you want to import. You can specify the botImportSpecification or the botLocaleImportSpecification, but not both.
      type: object
      properties:
        botImportSpecification:
          $ref: "#/components/schemas/BotImportSpecification"
          description: Parameters for importing a bot.
        botLocaleImportSpecification:
          $ref: "#/components/schemas/BotLocaleImportSpecification"
          description: Parameters for importing a bot locale.
        customVocabularyImportSpecification:
          $ref: "#/components/schemas/CustomVocabularyImportSpecification"
        testSetImportResourceSpecification:
          $ref: "#/components/schemas/TestSetImportResourceSpecification"
          description: Specifications for the test set that is imported.
    BotImportSpecification:
      description: Provides the bot parameters required for importing a bot.
      type: object
      properties:
        botName:
          $ref: "#/components/schemas/Name"
          description: The name that Amazon Lex should use for the bot.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role used to build and run the bot.
        dataPrivacy:
          $ref: "#/components/schemas/DataPrivacy"
        errorLogSettings:
          $ref: "#/components/schemas/ErrorLogSettings"
          description: Allows you to configure destinations where error logs will be published during the bot import process.
        idleSessionTTLInSeconds:
          $ref: "#/components/schemas/SessionTTL"
          description: The time, in seconds, that Amazon Lex should keep information about a user's conversation with the bot. A user interaction remains active for the amount of time specified. If no conversation occurs during this time, the session expires and Amazon Lex deletes any data provided before the timeout. You can specify between 60 (1 minute) and 86,400 (24 hours) seconds.
        botTags:
          type: object
          properties: {}
          description: A list of tags to add to the bot. You can only add tags when you import a bot. You can't use the UpdateBot operation to update tags. To update tags, use the TagResource operation.
        testBotAliasTags:
          type: object
          properties: {}
          description: A list of tags to add to the test alias for a bot. You can only add tags when you import a bot. You can't use the UpdateAlias operation to update tags. To update tags on the test alias, use the TagResource operation.
      required:
        - botName
        - roleArn
        - dataPrivacy
    BotLocaleImportSpecification:
      description: Provides the bot locale parameters required for importing a bot locale.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot to import the locale to.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot to import the locale to. This can only be the DRAFT version of the bot.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale that the bot will be used in. The string must match one of the supported locales. All of the intents, slot types, and slots used in the bot must have the same locale. For more information, see Supported languages.
        nluIntentConfidenceThreshold:
          $ref: "#/components/schemas/ConfidenceThreshold"
          description: "Determines the threshold where Amazon Lex will insert the AMAZON.FallbackIntent, AMAZON.KendraSearchIntent, or both when returning alternative intents. AMAZON.FallbackIntent and AMAZON.KendraSearchIntent are only inserted if they are configured for the bot. For example, suppose a bot is configured with the confidence threshold of 0.80 and the AMAZON.FallbackIntent. Amazon Lex returns three alternative intents with the following confidence scores: IntentA (0.70), IntentB (0.60), IntentC (0.50). The response from the PostText operation would be: AMAZON.FallbackIntent IntentA IntentB IntentC"
        voiceSettings:
          $ref: "#/components/schemas/VoiceSettings"
        speechRecognitionSettings:
          $ref: "#/components/schemas/SpeechRecognitionSettings"
          description: Speech-to-text settings to apply when importing the bot locale configuration.
        speechDetectionSensitivity:
          $ref: "#/components/schemas/SpeechDetectionSensitivity"
          description: The sensitivity level for voice activity detection (VAD) in the bot locale. This setting helps optimize speech recognition accuracy by adjusting how the system responds to background noise during voice interactions.
        unifiedSpeechSettings:
          $ref: "#/components/schemas/UnifiedSpeechSettings"
          description: Unified speech settings to apply when importing the bot locale configuration.
        audioFillerSettings:
          $ref: "#/components/schemas/AudioFillerSettings"
          description: Audio filler settings to apply when importing the bot locale configuration. Audio filler requires unifiedSpeechSettings (speech-to-speech) to be enabled when enabled is true.
      required:
        - botId
        - botVersion
        - localeId
    CustomVocabularyImportSpecification:
      description: Provides the parameters required for importing a custom vocabulary.
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot to import the custom vocabulary to.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot to import the custom vocabulary to.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The identifier of the local to import the custom vocabulary to. The value must be en_GB.
      required:
        - botId
        - botVersion
        - localeId
    TestSetImportResourceSpecification:
      description: Contains information about the test set that is imported.
      type: object
      properties:
        testSetName:
          $ref: "#/components/schemas/Name"
          description: The name of the test set.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the test set.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that has permission to access the test set.
        storageLocation:
          $ref: "#/components/schemas/TestSetStorageLocation"
          description: Contains information about the location that Amazon Lex uses to store the test-set.
        importInputLocation:
          $ref: "#/components/schemas/TestSetImportInputLocation"
          description: Contains information about the input location from where test-set should be imported.
        modality:
          $ref: "#/components/schemas/TestSetModality"
          description: Specifies whether the test-set being imported contains written or spoken data.
        testSetTags:
          type: object
          properties: {}
          description: A list of tags to add to the test set. You can only add tags when you import/generate a new test set. You can't use the UpdateTestSet operation to update tags. To update tags, use the TagResource operation.
      required:
        - testSetName
        - roleArn
        - storageLocation
        - importInputLocation
        - modality
    TestSetStorageLocation:
      description: Contains information about the location in which the test set is stored.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the Amazon S3 bucket in which the test set is stored.
        s3Path:
          $ref: "#/components/schemas/S3ObjectPath"
          description: The path inside the Amazon S3 bucket where the test set is stored.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services Key Management Service (KMS) key for encrypting the test set.
      required:
        - s3BucketName
        - s3Path
    TestSetImportInputLocation:
      description: Contains information about the Amazon S3 location from which the test set is imported.
      type: object
      properties:
        s3BucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the Amazon S3 bucket.
        s3Path:
          $ref: "#/components/schemas/S3ObjectPath"
          description: The path inside the Amazon S3 bucket pointing to the test-set CSV file.
      required:
        - s3BucketName
        - s3Path
    TestSetModality:
      type: string
      enum:
        - Text
        - Audio
    ImportedResourceId:
      type: string
      minLength: 5
      maxLength: 10
      pattern: ^([0-9a-zA-Z_])+$
    MergeStrategy:
      type: string
      enum:
        - Overwrite
        - FailOnConflict
        - Append
    DescribeIntentResponse:
      type: object
      properties:
        intentId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier assigned to the intent when it was created.
        intentName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the intent.
        intentDisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: The display name specified for the intent.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the intent.
        parentIntentSignature:
          $ref: "#/components/schemas/IntentSignature"
          description: The identifier of the built-in intent that this intent is derived from, if any.
        sampleUtterances:
          $ref: "#/components/schemas/SampleUtterancesList"
          description: User utterances that trigger this intent.
        dialogCodeHook:
          $ref: "#/components/schemas/DialogCodeHookSettings"
          description: The Lambda function called during each turn of a conversation with the intent.
        fulfillmentCodeHook:
          $ref: "#/components/schemas/FulfillmentCodeHookSettings"
          description: The Lambda function called when the intent is complete and ready for fulfillment.
        slotPriorities:
          $ref: "#/components/schemas/SlotPrioritiesList"
          description: The list that determines the priority that slots should be elicited from the user.
        intentConfirmationSetting:
          $ref: "#/components/schemas/IntentConfirmationSetting"
          description: Prompts that Amazon Lex sends to the user to confirm completion of an intent.
        intentClosingSetting:
          $ref: "#/components/schemas/IntentClosingSetting"
          description: The response that Amazon Lex sends to when the intent is closed.
        inputContexts:
          $ref: "#/components/schemas/InputContextsList"
          description: A list of contexts that must be active for the intent to be considered for sending to the user.
        outputContexts:
          $ref: "#/components/schemas/OutputContextsList"
          description: A list of contexts that are activated when the intent is fulfilled.
        kendraConfiguration:
          $ref: "#/components/schemas/KendraConfiguration"
          description: Configuration information required to use the AMAZON.KendraSearchIntent intent.
        botId:
          $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with the intent.
        botVersion:
          $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot associated with the intent.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The language and locale specified for the intent.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of the date and time that the intent was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp of the date and time that the intent was last updated.
        initialResponseSetting:
          $ref: "#/components/schemas/InitialResponseSetting"
          description: Configuration setting for a response sent to the user before Amazon Lex starts eliciting slots.
        qnAIntentConfiguration:
          $ref: "#/components/schemas/QnAIntentConfiguration"
          description: Details about the configuration of the built-in Amazon.QnAIntent.
        qInConnectIntentConfiguration:
          $ref: "#/components/schemas/QInConnectIntentConfiguration"
          description: Qinconnect intent configuration details for the describe intent response.
    SlotPrioritiesList:
      type: array
      items:
        $ref: "#/components/schemas/SlotPriority"
    SlotPriority:
      description: Sets the priority that Amazon Lex should use when eliciting slot values from a user.
      type: object
      properties:
        priority:
          $ref: "#/components/schemas/PriorityValue"
          description: The priority that Amazon Lex should apply to the slot.
        slotId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the slot.
      required:
        - priority
        - slotId
    PriorityValue:
      type: integer
      minimum: 0
      maximum: 100
    DescribeResourcePolicyResponse:
      type: object
      properties:
        resourceArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the bot or bot alias that the resource policy is attached to.
        policy:
          $ref: "#/components/schemas/Policy"
          description: The JSON structure that contains the resource policy. For more information about the contents of a JSON policy document, see IAM JSON policy reference .
        revisionId:
          $ref: "#/components/schemas/RevisionId"
          description: The current revision of the resource policy. Use the revision ID to make sure that you are updating the most current version of a resource policy when you add a policy statement to a resource, delete a resource, or update a resource.
    DescribeSlotResponse:
      type: object
      properties:
        slotId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier generated for the slot.
        slotName:
          $ref: "#/components/schemas/Name"
          description: The name specified for the slot.
        description:
          $ref: "#/components/schemas/Description"
          description: The description specified for the slot.
        slotTypeId:
          $ref: "#/components/schemas/BuiltInOrCustomSlotTypeId"
          description: The identifier of the slot type that determines the values entered into the slot.
        valueElicitationSetting:
          $ref: "#/components/schemas/SlotValueElicitationSetting"
