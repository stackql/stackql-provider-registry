        - NumberOfTurns
        - Duration
    AnalyticsSessionFilters:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsSessionFilter"
    AnalyticsSessionFilter:
      description: 'Contains fields describing a condition by which to filter the sessions. The expression may be understood as name operator values. For example: LocaleId EQ en – The locale is "en". Duration GT 200 – The duration is greater than 200 seconds. The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. Duration – EQ, GT, LT. conversationEndState – EQ, CO. SessionId – EQ. OriginatingRequestId – EQ. IntentPath – EQ.'
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsSessionFilterName"
          description: "The category by which to filter the sessions. The descriptions for each option are as follows: BotAlias – The name of the bot alias. BotVersion – The version of the bot. LocaleId – The locale of the bot. Modality – The modality of the session with the bot (audio, DTMF, or text). Channel – The channel that the bot is integrated with. Duration – The duration of the session. conversationEndState – The final state of the session. SessionId – The identifier of the session with the bot. OriginatingRequestId – The identifier of the first request in a session. IntentPath – The order of intents taken in a session."
        operator:
          $ref: "#/components/schemas/AnalyticsFilterOperator"
          description: "The operation by which to filter the category. The following operations are possible: CO – Contains EQ – Equals GT – Greater than LT – Less than The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. Duration – EQ, GT, LT. conversationEndState – EQ, CO. SessionId – EQ. OriginatingRequestId – EQ. IntentPath – EQ."
        values:
          $ref: "#/components/schemas/AnalyticsFilterValues"
          description: An array containing the values of the category by which to apply the operator to filter the results. You can provide multiple values if the operator is EQ or CO. If you provide multiple values, you filter for results that equal/contain any of the values. For example, if the name, operator, and values fields are Modality, EQ, and [Speech, Text], the operation filters for results where the modality was either Speech or Text.
      required:
        - name
        - operator
        - values
    AnalyticsSessionFilterName:
      type: string
      enum:
        - BotAliasId
        - BotVersion
        - LocaleId
        - Modality
        - Channel
        - Duration
        - ConversationEndState
        - SessionId
        - OriginatingRequestId
        - IntentPath
    ListSessionAnalyticsDataResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that the sessions belong to.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response from the ListSessionAnalyticsData operation contains more results than specified in the maxResults parameter, a token is returned in the response. Use the returned token in the nextToken parameter of a ListSessionAnalyticsData request to return the next page of results. For a complete set of results, call the ListSessionAnalyticsData operation until the nextToken returned in the response is null.
        sessions:
          $ref: "#/components/schemas/SessionSpecifications"
          description: A list of objects, each of which contains information about a session with the bot.
    SessionSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/SessionSpecification"
    SessionSpecification:
      description: An object containing information about a specific session.
      type: object
      properties:
        botAliasId:
          $ref: "#/components/schemas/BotAliasId"
          description: The identifier of the alias of the bot that the session was held with.
        botVersion:
          $ref: "#/components/schemas/NumericalBotVersion"
          description: The version of the bot that the session was held with.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale of the bot that the session was held with.
        channel:
          $ref: "#/components/schemas/AnalyticsChannel"
          description: The channel that is integrated with the bot that the session was held with.
        sessionId:
          $ref: "#/components/schemas/AnalyticsSessionId"
          description: The identifier of the session.
        conversationStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the conversation began. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        conversationEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the conversation ended. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        conversationDurationSeconds:
          $ref: "#/components/schemas/AnalyticsLongValue"
          description: The duration of the conversation in seconds. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        conversationEndState:
          $ref: "#/components/schemas/ConversationEndState"
          description: The final state of the conversation. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        mode:
          $ref: "#/components/schemas/AnalyticsModality"
          description: "The mode of the session. The possible values are as follows: Speech – The session was spoken. Text – The session was written. DTMF – The session used a touch-tone keypad (Dual Tone Multi-Frequency). MultiMode – The session used multiple modes."
        numberOfTurns:
          $ref: "#/components/schemas/AnalyticsLongValue"
          description: The number of turns that the session took.
        invokedIntentSamples:
          $ref: "#/components/schemas/InvokedIntentSamples"
          description: A list of objects containing the name of an intent that was invoked.
        originatingRequestId:
          $ref: "#/components/schemas/AnalyticsOriginatingRequestId"
          description: The identifier of the first request in a session.
