openapi: 3.0.0
info:
  version: "2020-08-07"
  title: Amazon Lex Model Building V2
  description: Amazon Lex Model Building V2
  x-serviceName: lex
  x-serviceAlias: lexv2_models
  x-protocol: rest-json
  x-apiVersion: "2020-08-07"
  x-endpointPrefix: models-v2-lex
  x-jsonVersion: "1.1"
servers:
  - url: https://models-v2-lex.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for lexv2-models
paths:
  /bots/{bot_id}/botversions/{bot_version}/botlocales/{locale_id}/customvocabulary/DEFAULT/batchcreate:
    put:
      operationId: BatchCreateCustomVocabularyItem
      description: Create a batch of custom vocabulary items for a given bot locale's custom vocabulary.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported Languages .
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customVocabularyItemList:
                  $ref: "#/components/schemas/CreateCustomVocabularyItemsList"
              required:
                - customVocabularyItemList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateCustomVocabularyItemResponse"
  /bots/{bot_id}/botversions/{bot_version}/botlocales/{locale_id}/customvocabulary/DEFAULT/batchdelete:
    post:
      operationId: BatchDeleteCustomVocabularyItem
      description: Delete a batch of custom vocabulary items for a given bot locale's custom vocabulary.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported Languages .
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customVocabularyItemList:
                  $ref: "#/components/schemas/DeleteCustomVocabularyItemsList"
              required:
                - customVocabularyItemList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteCustomVocabularyItemResponse"
  /bots/{bot_id}/botversions/{bot_version}/botlocales/{locale_id}/customvocabulary/DEFAULT/batchupdate:
    put:
      operationId: BatchUpdateCustomVocabularyItem
      description: Update a batch of custom vocabulary items for a given bot locale's custom vocabulary.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this custom vocabulary
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The identifier of the version of the bot associated with this custom vocabulary.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this custom vocabulary is used. The string must match one of the supported locales. For more information, see Supported Languages .
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customVocabularyItemList:
                  $ref: "#/components/schemas/UpdateCustomVocabularyItemsList"
              required:
                - customVocabularyItemList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateCustomVocabularyItemResponse"
  /bots/{bot_id}/botversions/{bot_version}/botlocales/{locale_id}/:
    post:
      operationId: BuildBotLocale
      description: Builds a bot, its intents, and its slot types into a specific locale. A bot can be built into multiple locales. At runtime the locale is used to choose a specific build of the bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to build. The identifier is returned in the response from the CreateBot operation.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot to build. This can only be the draft version of the bot.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale that the bot will be used in. The string must match one of the supported locales. All of the intents, slot types, and slots used in the bot must have the same locale. For more information, see Supported languages.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildBotLocaleResponse"
    delete:
      operationId: DeleteBotLocale
      description: Removes a locale from a bot. When you delete a locale, all intents, slots, and slot types defined for the locale are also deleted.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that contains the locale.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot that contains the locale.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale that will be deleted. The string must match one of the supported locales. For more information, see Supported languages.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBotLocaleResponse"
    get:
      operationId: DescribeBotLocale
      description: Describes the settings that a bot has for a specific locale.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with the locale.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The version of the bot associated with the locale.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The unique identifier of the locale to describe. The string must match one of the supported locales. For more information, see Supported languages.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeBotLocaleResponse"
    put:
      operationId: UpdateBotLocale
      description: Updates the settings that a bot has for a specific locale.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that contains the locale.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot that contains the locale to be updated. The version can only be the DRAFT version.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale to update. The string must match one of the supported locales. For more information, see Supported languages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                nluIntentConfidenceThreshold:
                  $ref: "#/components/schemas/ConfidenceThreshold"
                voiceSettings:
                  $ref: "#/components/schemas/VoiceSettings"
                unifiedSpeechSettings:
                  $ref: "#/components/schemas/UnifiedSpeechSettings"
                audioFillerSettings:
                  $ref: "#/components/schemas/AudioFillerSettings"
                speechRecognitionSettings:
                  $ref: "#/components/schemas/SpeechRecognitionSettings"
                generativeAISettings:
                  $ref: "#/components/schemas/GenerativeAISettings"
                speechDetectionSensitivity:
                  $ref: "#/components/schemas/SpeechDetectionSensitivity"
              required:
                - nluIntentConfidenceThreshold
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBotLocaleResponse"
  /bots/:
    put:
      operationId: CreateBot
      description: Creates an Amazon Lex conversational bot.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                botName:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
                dataPrivacy:
                  $ref: "#/components/schemas/DataPrivacy"
                idleSessionTTLInSeconds:
                  $ref: "#/components/schemas/SessionTTL"
                botTags:
                  $ref: "#/components/schemas/TagMap"
                testBotAliasTags:
                  $ref: "#/components/schemas/TagMap"
                botType:
                  $ref: "#/components/schemas/BotType"
                botMembers:
                  $ref: "#/components/schemas/BotMembers"
                errorLogSettings:
                  $ref: "#/components/schemas/ErrorLogSettings"
              required:
                - botName
                - roleArn
                - dataPrivacy
                - idleSessionTTLInSeconds
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotResponse"
    post:
      operationId: ListBots
      description: Gets a list of available bots.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortBy:
                  $ref: "#/components/schemas/BotSortBy"
                filters:
                  $ref: "#/components/schemas/BotFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotsResponse"
  /bots/{bot_id}/botaliases/:
    put:
      operationId: CreateBotAlias
      description: Creates an alias for the specified version of a bot. Use an alias to enable you to change the version of a bot without updating applications that use the bot. For example, you can create an alias called "PROD" that your applications use to call the Amazon Lex bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that the alias applies to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                botAliasName:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                botVersion:
                  $ref: "#/components/schemas/NumericalBotVersion"
                botAliasLocaleSettings:
                  $ref: "#/components/schemas/BotAliasLocaleSettingsMap"
                conversationLogSettings:
                  $ref: "#/components/schemas/ConversationLogSettings"
                sentimentAnalysisSettings:
                  $ref: "#/components/schemas/SentimentAnalysisSettings"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - botAliasName
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotAliasResponse"
    post:
      operationId: ListBotAliases
      description: Gets a list of aliases for the specified bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to list aliases for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotAliasesResponse"
  /bots/{bot_id}/botversions/{bot_version}/botlocales/:
    put:
      operationId: CreateBotLocale
      description: Creates a locale in the bot. The locale contains the intents and slot types that the bot uses in conversations with users in the specified language and locale. You must add a locale to a bot before you can add intents and slot types to the bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to create the locale for.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot to create the locale for. This can only be the draft version of the bot.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                localeId:
                  $ref: "#/components/schemas/LocaleId"
                description:
                  $ref: "#/components/schemas/Description"
                nluIntentConfidenceThreshold:
                  $ref: "#/components/schemas/ConfidenceThreshold"
                voiceSettings:
                  $ref: "#/components/schemas/VoiceSettings"
                unifiedSpeechSettings:
                  $ref: "#/components/schemas/UnifiedSpeechSettings"
                audioFillerSettings:
                  $ref: "#/components/schemas/AudioFillerSettings"
                speechRecognitionSettings:
                  $ref: "#/components/schemas/SpeechRecognitionSettings"
                generativeAISettings:
                  $ref: "#/components/schemas/GenerativeAISettings"
                speechDetectionSensitivity:
                  $ref: "#/components/schemas/SpeechDetectionSensitivity"
              required:
                - localeId
                - nluIntentConfidenceThreshold
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotLocaleResponse"
    post:
      operationId: ListBotLocales
      description: Gets a list of locales for the specified bot.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to list locales for.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The version of the bot to list locales for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortBy:
                  $ref: "#/components/schemas/BotLocaleSortBy"
                filters:
                  $ref: "#/components/schemas/BotLocaleFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotLocalesResponse"
  /bots/{bot_id}/replicas/:
    put:
      operationId: CreateBotReplica
      description: Action to create a replication of the source bot in the secondary region.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The request for the unique bot ID of the source bot to be replicated in the secondary region.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                replicaRegion:
                  $ref: "#/components/schemas/ReplicaRegion"
              required:
                - replicaRegion
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotReplicaResponse"
    post:
      operationId: ListBotReplicas
      description: The action to list the replicated bots.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The request for the unique bot IDs in the list of replicated bots.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotReplicasResponse"
  /bots/{bot_id}/botversions/:
    put:
      operationId: CreateBotVersion
      description: Creates an immutable version of the bot. When you create the first version of a bot, Amazon Lex sets the version number to 1. Subsequent bot versions increase in an increment of 1. The version number will always represent the total number of versions created of the bot, not the current number of versions. If a bot version is deleted, that bot version number will not be reused.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to create the version for.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/Description"
                botVersionLocaleSpecification:
                  $ref: "#/components/schemas/BotVersionLocaleSpecification"
              required:
                - botVersionLocaleSpecification
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBotVersionResponse"
    post:
      operationId: ListBotVersions
      description: Gets information about all of the versions of a bot. The ListBotVersions operation returns a summary of each version of a bot. For example, if a bot has three numbered versions, the ListBotVersions operation returns for summaries, one for each numbered version and one for the DRAFT version. The ListBotVersions operation always returns at least one version, the DRAFT version.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot to list versions for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortBy:
                  $ref: "#/components/schemas/BotVersionSortBy"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBotVersionsResponse"
  /exports/:
    put:
      operationId: CreateExport
      description: Creates a zip archive containing the contents of a bot or a bot locale. The archive contains a directory structure that contains JSON files that define the bot. You can create an archive that contains the complete definition of a bot, or you can specify that the archive contain only the definition of a single bot locale. For more information about exporting bots, and about the structure of the export archive, see Importing and exporting bots
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resourceSpecification:
                  $ref: "#/components/schemas/ExportResourceSpecification"
                fileFormat:
                  $ref: "#/components/schemas/ImportExportFileFormat"
                filePassword:
                  $ref: "#/components/schemas/ImportExportFilePassword"
              required:
                - resourceSpecification
                - fileFormat
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExportResponse"
    post:
      operationId: ListExports
      description: Lists the exports for a bot, bot locale, or custom vocabulary. Exports are kept in the list for 7 days.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                botId:
                  $ref: "#/components/schemas/Id"
                botVersion:
                  $ref: "#/components/schemas/BotVersion"
                sortBy:
                  $ref: "#/components/schemas/ExportSortBy"
                filters:
                  $ref: "#/components/schemas/ExportFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                localeId:
                  $ref: "#/components/schemas/LocaleId"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExportsResponse"
  /bots/{bot_id}/botversions/{bot_version}/botlocales/{locale_id}/intents/:
    put:
      operationId: CreateIntent
      description: "Creates an intent. To define the interaction between the user and your bot, you define one or more intents. For example, for a pizza ordering bot you would create an OrderPizza intent. When you create an intent, you must provide a name. You can optionally provide the following: Sample utterances. For example, \"I want to order a pizza\" and \"Can I order a pizza.\" You can't provide utterances for built-in intents. Information to be gathered. You specify slots for the information that you bot requests from the user. You can specify standard slot types, such as date and time, or custom slot types for your application. How the intent is fulfilled. You can provide a Lambda function or configure the intent to return the intent information to your client application. If you use a Lambda function, Amazon Lex invokes the function when all of the intent information is available. A confirmation prompt to send to the user to confirm an intent. For example, \"Shall I order your pizza?\" A conclusion statement to send to the user after the intent is fulfilled. For example, \"I ordered your pizza.\" A follow-up prompt that asks the user for additional activity. For example, \"Do you want a drink with your pizza?\""
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The identifier of the bot associated with this intent.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DraftBotVersion"
          description: The version of the bot associated with this intent.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale where this intent is used. All of the bots, slot types, and slots used by the intent must have the same locale. For more information, see Supported languages.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                intentName:
                  $ref: "#/components/schemas/Name"
                intentDisplayName:
                  $ref: "#/components/schemas/DisplayName"
                description:
                  $ref: "#/components/schemas/Description"
                parentIntentSignature:
                  $ref: "#/components/schemas/IntentSignature"
                sampleUtterances:
                  $ref: "#/components/schemas/SampleUtterancesList"
                dialogCodeHook:
                  $ref: "#/components/schemas/DialogCodeHookSettings"
                fulfillmentCodeHook:
                  $ref: "#/components/schemas/FulfillmentCodeHookSettings"
                intentConfirmationSetting:
                  $ref: "#/components/schemas/IntentConfirmationSetting"
                intentClosingSetting:
                  $ref: "#/components/schemas/IntentClosingSetting"
                inputContexts:
                  $ref: "#/components/schemas/InputContextsList"
                outputContexts:
                  $ref: "#/components/schemas/OutputContextsList"
                kendraConfiguration:
                  $ref: "#/components/schemas/KendraConfiguration"
                initialResponseSetting:
                  $ref: "#/components/schemas/InitialResponseSetting"
                qnAIntentConfiguration:
                  $ref: "#/components/schemas/QnAIntentConfiguration"
                qInConnectIntentConfiguration:
                  $ref: "#/components/schemas/QInConnectIntentConfiguration"
              required:
                - intentName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIntentResponse"
    post:
      operationId: ListIntents
      description: Get a list of intents that meet the specified criteria.
      parameters:
        - name: bot_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that contains the intent.
        - name: bot_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BotVersion"
          description: The version of the bot that contains the intent.
        - name: locale_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LocaleId"
          description: The identifier of the language and locale of the intents to list. The string must match one of the supported locales. For more information, see Supported languages.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sortBy:
                  $ref: "#/components/schemas/IntentSortBy"
                filters:
                  $ref: "#/components/schemas/IntentFilters"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIntentsResponse"
  /policy/{resource_arn}/:
    post:
      operationId: CreateResourcePolicy
      description: Creates a new resource policy with the specified policy statements.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
