        items_:
          $ref: "#/components/schemas/IntentClassificationTestResultItemList"
          description: A list of the results for the intent classification test.
      required:
        - items_
    IntentClassificationTestResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/IntentClassificationTestResultItem"
    IntentClassificationTestResultItem:
      description: Information for an intent that is classified by the test workbench.
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/Name"
          description: The name of the intent.
        multiTurnConversation:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the conversation involves multiple turns or not.
        resultCounts:
          $ref: "#/components/schemas/IntentClassificationTestResultItemCounts"
          description: The result of the intent classification test.
      required:
        - intentName
        - multiTurnConversation
        - resultCounts
    IntentClassificationTestResultItemCounts:
      description: The number of items in the intent classification test.
      type: object
      properties:
        totalResultCount:
          $ref: "#/components/schemas/Count"
          description: The total number of results in the intent classification test.
        speechTranscriptionResultCounts:
          type: object
          properties: {}
          description: The number of matched, mismatched, and execution error results for speech transcription for the intent.
        intentMatchResultCounts:
          type: object
          properties: {}
          description: The number of matched and mismatched results for intent recognition for the intent.
      required:
        - totalResultCount
        - intentMatchResultCounts
    IntentLevelSlotResolutionTestResults:
      description: Indicates the success or failure of slots at the intent level.
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/IntentLevelSlotResolutionTestResultItemList"
          description: Indicates the items for the slot level resolution for the intents.
      required:
        - items_
    IntentLevelSlotResolutionTestResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/IntentLevelSlotResolutionTestResultItem"
    IntentLevelSlotResolutionTestResultItem:
      description: Information about intent-level slot resolution in a test result.
      type: object
      properties:
        intentName:
          $ref: "#/components/schemas/Name"
          description: The name of the intent that was recognized.
        multiTurnConversation:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the conversation involves multiple turns or not.
        slotResolutionResults:
          $ref: "#/components/schemas/SlotResolutionTestResultItems"
          description: The results for the slot resolution in the test execution result.
      required:
        - intentName
        - multiTurnConversation
        - slotResolutionResults
    SlotResolutionTestResultItems:
      type: array
      items:
        $ref: "#/components/schemas/SlotResolutionTestResultItem"
    SlotResolutionTestResultItem:
      description: Information about the success and failure rate of slot resolution in the results of a test execution.
      type: object
      properties:
        slotName:
          $ref: "#/components/schemas/TestResultSlotName"
          description: The name of the slot.
        resultCounts:
          $ref: "#/components/schemas/SlotResolutionTestResultItemCounts"
          description: A result for slot resolution in the results of a test execution.
      required:
        - slotName
        - resultCounts
    SlotResolutionTestResultItemCounts:
      description: Information about the counts for a slot resolution in the results of a test execution.
      type: object
      properties:
        totalResultCount:
          $ref: "#/components/schemas/Count"
          description: The total number of results.
        speechTranscriptionResultCounts:
          type: object
          properties: {}
          description: The number of matched, mismatched and execution error results for speech transcription for the slot.
        slotMatchResultCounts:
          type: object
          properties: {}
          description: The number of matched and mismatched results for slot resolution for the slot.
      required:
        - totalResultCount
        - slotMatchResultCounts
    UtteranceLevelTestResults:
      description: Contains information about the utterances in the results of the test set execution.
      type: object
      properties:
        items_:
          $ref: "#/components/schemas/UtteranceLevelTestResultItemList"
          description: Contains information about an utterance in the results of the test set execution.
      required:
        - items_
    UtteranceLevelTestResultItemList:
      type: array
      items:
        $ref: "#/components/schemas/UtteranceLevelTestResultItem"
    UtteranceLevelTestResultItem:
      description: Contains information about multiple utterances in the results of a test set execution.
      type: object
      properties:
        recordNumber:
          $ref: "#/components/schemas/RecordNumber"
          description: The record number of the result.
        conversationId:
          $ref: "#/components/schemas/TestSetConversationId"
          description: The unique identifier for the conversation associated with the result.
        turnResult:
          $ref: "#/components/schemas/TestSetTurnResult"
          description: Contains information about the turn associated with the result.
      required:
        - recordNumber
        - turnResult
    RecordNumber:
      type: integer
      format: int64
      minimum: 1
      maximum: 200000
    TestSetTurnResult:
      description: Contains information about the results of the analysis of a turn in the test set.
      type: object
      properties:
        agent:
          $ref: "#/components/schemas/AgentTurnResult"
          description: Contains information about the agent messages in the turn.
        user:
          $ref: "#/components/schemas/UserTurnResult"
          description: Contains information about the user messages in the turn.
    AgentTurnResult:
      description: The information about the agent turn in a test set execution.
      type: object
      properties:
        expectedAgentPrompt:
          $ref: "#/components/schemas/TestSetAgentPrompt"
          description: The expected agent prompt for the agent turn in a test set execution.
        actualAgentPrompt:
          $ref: "#/components/schemas/TestSetAgentPrompt"
          description: The actual agent prompt for the agent turn in a test set execution.
        errorDetails:
          $ref: "#/components/schemas/ExecutionErrorDetails"
        actualElicitedSlot:
          $ref: "#/components/schemas/TestResultSlotName"
          description: The actual elicited slot for the agent turn in a test set execution.
        actualIntent:
          $ref: "#/components/schemas/Name"
          description: The actual intent for the agent turn in a test set execution.
      required:
        - expectedAgentPrompt
    TestSetAgentPrompt:
      type: string
      minLength: 1
      maxLength: 1024
    ExecutionErrorDetails:
      description: Details about an error in an execution of a test set.
      type: object
      properties:
        errorCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: The error code for the error.
        errorMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: The message describing the error.
      required:
        - errorCode
        - errorMessage
    NonEmptyString:
      type: string
      minLength: 1
    UserTurnResult:
      description: Contains the results for the user turn by the test execution.
      type: object
      properties:
        input:
          $ref: "#/components/schemas/UserTurnInputSpecification"
          description: Contains information about the user messages in the turn in the input.
        expectedOutput:
          $ref: "#/components/schemas/UserTurnOutputSpecification"
          description: Contains information about the expected output for the user turn.
        actualOutput:
          $ref: "#/components/schemas/UserTurnOutputSpecification"
          description: Contains information about the actual output for the user turn.
        errorDetails:
          $ref: "#/components/schemas/ExecutionErrorDetails"
        endToEndResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: Specifies whether the expected and actual outputs match or not, or if there is an error in execution.
        intentMatchResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: Specifies whether the expected and actual intents match or not.
        slotMatchResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: Specifies whether the expected and actual slots match or not.
        speechTranscriptionResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: Specifies whether the expected and actual speech transcriptions match or not, or if there is an error in execution.
        conversationLevelResult:
          $ref: "#/components/schemas/ConversationLevelResultDetail"
          description: Contains information about the results related to the conversation associated with the user turn.
      required:
        - input
        - expectedOutput
    UserTurnInputSpecification:
      description: Contains information about the user messages in the turn in the input.
      type: object
      properties:
        utteranceInput:
          $ref: "#/components/schemas/UtteranceInputSpecification"
          description: The utterance input in the user turn.
        requestAttributes:
          type: object
          properties: {}
          description: Request attributes of the user turn.
        sessionState:
          $ref: "#/components/schemas/InputSessionStateSpecification"
          description: Contains information about the session state in the input.
      required:
        - utteranceInput
    UtteranceInputSpecification:
      description: Contains information about input of an utterance.
      type: object
      properties:
        textInput:
          $ref: "#/components/schemas/TestSetUtteranceText"
          description: A text input transcription of the utterance. It is only applicable for test-sets containing text data.
        audioInput:
          $ref: "#/components/schemas/UtteranceAudioInputSpecification"
          description: Contains information about the audio input for an utterance.
    TestSetUtteranceText:
      type: string
      minLength: 1
      maxLength: 1024
    UtteranceAudioInputSpecification:
      description: Contains information about the audio for an utterance.
      type: object
      properties:
        audioFileS3Location:
          $ref: "#/components/schemas/AudioFileS3Location"
          description: Amazon S3 file pointing to the audio.
      required:
        - audioFileS3Location
    AudioFileS3Location:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: ^s3://([a-z0-9\\.-]+)/(.+)$
    InputSessionStateSpecification:
      description: Specifications for the current state of the dialog between the user and the bot in the test set.
      type: object
      properties:
        sessionAttributes:
          type: object
          properties: {}
          description: Session attributes for the session state.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextList"
          description: Active contexts for the session state.
        runtimeHints:
          $ref: "#/components/schemas/RuntimeHints"
          description: Runtime hints for the session state.
    ActiveContextList:
      type: array
      items:
        $ref: "#/components/schemas/ActiveContext"
    ActiveContext:
      description: The active context used in the test execution.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActiveContextName"
          description: The name of active context.
      required:
        - name
    ActiveContextName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^([A-Za-z]_?)+$
    RuntimeHints:
      description: You can provide Amazon Lex with hints to the phrases that a customer is likely to use for a slot. When a slot with hints is resolved, the phrases in the runtime hints are preferred in the resolution. You can provide hints for a maximum of 100 intents. You can provide a maximum of 100 slots. Before you can use runtime hints with an existing bot, you must first rebuild the bot. For more information, see Using runtime hints to improve recognition of slot values.
      type: object
      properties:
        slotHints:
          type: object
          properties: {}
          description: A list of the slots in the intent that should have runtime hints added, and the phrases that should be added for each slot. The first level of the slotHints map is the name of the intent. The second level is the name of the slot within the intent. For more information, see Using hints to improve accuracy. The intent name and slot name must exist.
    UserTurnOutputSpecification:
      description: Contains results that are output for the user turn by the test execution.
      type: object
      properties:
        intent:
          $ref: "#/components/schemas/UserTurnIntentOutput"
          description: Contains information about the intent.
        activeContexts:
          $ref: "#/components/schemas/ActiveContextList"
          description: The contexts that are active in the turn.
        transcript:
          $ref: "#/components/schemas/TestSetUtteranceText"
          description: The transcript that is output for the user turn by the test execution.
      required:
        - intent
    UserTurnIntentOutput:
      description: Contains information about the intent that is output for the turn by the test execution.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
          description: The name of the intent.
        slots:
          type: object
          properties: {}
          description: The slots associated with the intent.
      required:
        - name
    ConversationLevelResultDetail:
      description: The conversation level details of the conversation used in the test set.
      type: object
      properties:
        endToEndResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: The success or failure of the streaming of the conversation.
        speechTranscriptionResult:
          $ref: "#/components/schemas/TestResultMatchStatus"
          description: The speech transcription success or failure details of the conversation.
      required:
        - endToEndResult
    TestExecutionSortBy:
      description: Contains information about the method by which to sort the instances of test executions you have carried out.
      type: object
      properties:
        attribute:
          $ref: "#/components/schemas/TestExecutionSortAttribute"
          description: Specifies whether to sort the test set executions by the date and time at which the test sets were created.
        order:
          $ref: "#/components/schemas/SortOrder"
          description: Specifies whether to sort in ascending or descending order.
      required:
        - attribute
        - order
    TestExecutionSortAttribute:
      type: string
      enum:
        - TestSetName
        - CreationDateTime
    ListTestExecutionsResponse:
      type: object
      properties:
        testExecutions:
          $ref: "#/components/schemas/TestExecutionSummaryList"
          description: The list of test executions.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates whether there are more results to return in a response to the ListTestExecutions operation. If the nextToken field is present, you send the contents as the nextToken parameter of a ListTestExecutions operation request to get the next page of results.
    TestExecutionSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/TestExecutionSummary"
    TestExecutionSummary:
      description: Summarizes metadata about the test execution.
      type: object
      properties:
        testExecutionId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the test execution.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the test execution was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the test execution was last updated.
        testExecutionStatus:
          $ref: "#/components/schemas/TestExecutionStatus"
          description: The current status of the test execution.
        testSetId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the test set used in the test execution.
        testSetName:
          $ref: "#/components/schemas/Name"
          description: The name of the test set used in the test execution.
        target:
          $ref: "#/components/schemas/TestExecutionTarget"
          description: Contains information about the bot used for the test execution..
        apiMode:
          $ref: "#/components/schemas/TestExecutionApiMode"
          description: Specifies whether the API mode for the test execution is streaming or non-streaming.
        testExecutionModality:
          $ref: "#/components/schemas/TestExecutionModality"
          description: Specifies whether the data used for the test execution is written or spoken.
    ListTestSetRecordsResponse:
      type: object
      properties:
        testSetRecords:
          $ref: "#/components/schemas/TestSetTurnRecordList"
          description: The list of records from the test set.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates whether there are more records to return in a response to the ListTestSetRecords operation. If the nextToken field is present, you send the contents as the nextToken parameter of a ListTestSetRecords operation request to get the next page of records.
    TestSetTurnRecordList:
      type: array
      items:
        $ref: "#/components/schemas/TestSetTurnRecord"
    TestSetTurnRecord:
      description: Contains information about a turn in a test set.
      type: object
      properties:
        recordNumber:
          $ref: "#/components/schemas/RecordNumber"
          description: The record number associated with the turn.
        conversationId:
          $ref: "#/components/schemas/TestSetConversationId"
          description: The unique identifier for the conversation associated with the turn.
        turnNumber:
          $ref: "#/components/schemas/TurnNumber"
          description: The number of turns that has elapsed up to that turn.
        turnSpecification:
          $ref: "#/components/schemas/TurnSpecification"
          description: Contains information about the agent or user turn depending upon type of turn.
      required:
        - recordNumber
        - turnSpecification
    TurnNumber:
      type: integer
      minimum: 0
      maximum: 30
    TurnSpecification:
      description: Contains information about the messages in the turn.
      type: object
      properties:
        agentTurn:
          $ref: "#/components/schemas/AgentTurnSpecification"
          description: Contains information about the agent messages in the turn.
        userTurn:
          $ref: "#/components/schemas/UserTurnSpecification"
          description: Contains information about the user messages in the turn.
    AgentTurnSpecification:
      description: The specification of an agent turn.
      type: object
      properties:
        agentPrompt:
          $ref: "#/components/schemas/TestSetAgentPrompt"
          description: The agent prompt for the agent turn in a test set.
      required:
        - agentPrompt
    UserTurnSpecification:
      description: Contains information about the expected and input values for the user turn.
      type: object
      properties:
        input:
          $ref: "#/components/schemas/UserTurnInputSpecification"
          description: Contains information about the user messages in the turn in the input.
        expected:
          $ref: "#/components/schemas/UserTurnOutputSpecification"
          description: Contains results about the expected output for the user turn.
      required:
        - input
        - expected
    TestSetSortBy:
      description: Contains information about the methods by which to sort the test set.
      type: object
      properties:
        attribute:
          $ref: "#/components/schemas/TestSetSortAttribute"
          description: Specifies whether to sort the test sets by name or by the time they were last updated.
        order:
          $ref: "#/components/schemas/SortOrder"
          description: Specifies whether to sort in ascending or descending order.
      required:
        - attribute
        - order
    TestSetSortAttribute:
      type: string
      enum:
        - TestSetName
        - LastUpdatedDateTime
    ListTestSetsResponse:
      type: object
      properties:
        testSets:
          $ref: "#/components/schemas/TestSetSummaryList"
          description: The selected test sets in a list of test sets.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates whether there are more results to return in a response to the ListTestSets operation. If the nextToken field is present, you send the contents as the nextToken parameter of a ListTestSets operation request to get the next page of results.
    TestSetSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/TestSetSummary"
    TestSetSummary:
      description: Contains summary information about the test set.
      type: object
      properties:
        testSetId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the test set.
        testSetName:
          $ref: "#/components/schemas/Name"
          description: The name of the test set.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the test set.
        modality:
          $ref: "#/components/schemas/TestSetModality"
          description: Specifies whether the test set contains written or spoken data.
        status:
          $ref: "#/components/schemas/TestSetStatus"
          description: The status of the test set.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role that has permission to access the test set.
        numTurns:
          $ref: "#/components/schemas/Count"
          description: The number of turns in the test set.
        storageLocation:
          $ref: "#/components/schemas/TestSetStorageLocation"
          description: Contains information about the location at which the test set is stored.
        creationDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the test set was created.
        lastUpdatedDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time at which the test set was last updated.
    UtteranceDataSortBy:
      description: An object specifying the measure and method by which to sort the utterance data.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsUtteranceSortByName"
          description: The measure by which to sort the utterance analytics data. Count – The number of utterances. UtteranceTimestamp – The date and time of the utterance.
        order:
          $ref: "#/components/schemas/AnalyticsSortOrder"
          description: Specifies whether to sort the results in ascending or descending order.
      required:
        - name
        - order
    AnalyticsUtteranceSortByName:
      type: string
      enum:
        - UtteranceTimestamp
    AnalyticsUtteranceFilters:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsUtteranceFilter"
    AnalyticsUtteranceFilter:
      description: 'Contains fields describing a condition by which to filter the utterances. The expression may be understood as name operator values. For example: LocaleId EQ Book – The locale is the string "en". UtteranceText CO help – The text of the utterance contains the string "help". The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. SessionId – EQ. OriginatingRequestId – EQ. UtteranceState – EQ. UtteranceText – EQ, CO.'
      type: object
      properties:
        name:
          $ref: "#/components/schemas/AnalyticsUtteranceFilterName"
          description: "The category by which to filter the utterances. The descriptions for each option are as follows: BotAlias – The name of the bot alias. BotVersion – The version of the bot. LocaleId – The locale of the bot. Modality – The modality of the session with the bot (audio, DTMF, or text). Channel – The channel that the bot is integrated with. SessionId – The identifier of the session with the bot. OriginatingRequestId – The identifier of the first request in a session. UtteranceState – The state of the utterance. UtteranceText – The text in the utterance."
        operator:
          $ref: "#/components/schemas/AnalyticsFilterOperator"
          description: "The operation by which to filter the category. The following operations are possible: CO – Contains EQ – Equals GT – Greater than LT – Less than The operators that each filter supports are listed below: BotAlias – EQ. BotVersion – EQ. LocaleId – EQ. Modality – EQ. Channel – EQ. SessionId – EQ. OriginatingRequestId – EQ. UtteranceState – EQ. UtteranceText – EQ, CO."
        values:
          $ref: "#/components/schemas/AnalyticsFilterValues"
          description: An array containing the values of the category by which to apply the operator to filter the results. You can provide multiple values if the operator is EQ or CO. If you provide multiple values, you filter for results that equal/contain any of the values. For example, if the name, operator, and values fields are Modality, EQ, and [Speech, Text], the operation filters for results where the modality was either Speech or Text.
      required:
        - name
        - operator
        - values
    AnalyticsUtteranceFilterName:
      type: string
      enum:
        - BotAliasId
        - BotVersion
        - LocaleId
        - Modality
        - Channel
        - SessionId
        - OriginatingRequestId
        - UtteranceState
        - UtteranceText
    ListUtteranceAnalyticsDataResponse:
      type: object
      properties:
        botId:
          $ref: "#/components/schemas/Id"
          description: The unique identifier of the bot that the utterances belong to.
        nextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the response from the ListUtteranceAnalyticsData operation contains more results than specified in the maxResults parameter, a token is returned in the response. Use the returned token in the nextToken parameter of a ListUtteranceAnalyticsData request to return the next page of results. For a complete set of results, call the ListUtteranceAnalyticsData operation until the nextToken returned in the response is null.
        utterances:
          $ref: "#/components/schemas/UtteranceSpecifications"
          description: A list of objects, each of which contains information about an utterance in a user session with your bot.
    UtteranceSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/UtteranceSpecification"
    UtteranceSpecification:
      description: An object containing information about a specific utterance.
      type: object
      properties:
        botAliasId:
          $ref: "#/components/schemas/BotAliasId"
          description: The identifier of the alias of the bot that the utterance was made to.
        botVersion:
          $ref: "#/components/schemas/NumericalBotVersion"
          description: The version of the bot that the utterance was made to.
        localeId:
          $ref: "#/components/schemas/LocaleId"
          description: The locale of the bot that the utterance was made to.
        sessionId:
          $ref: "#/components/schemas/AnalyticsSessionId"
          description: The identifier of the session that the utterance was made in.
        channel:
          $ref: "#/components/schemas/AnalyticsChannel"
          description: The channel that is integrated with the bot that the utterance was made to.
        mode:
          $ref: "#/components/schemas/AnalyticsModality"
          description: "The mode of the session. The possible values are as follows: Speech – The session consisted of spoken dialogue. Text – The session consisted of written dialogue. DTMF – The session consisted of touch-tone keypad (Dual Tone Multi-Frequency) key presses. MultiMode – The session consisted of multiple modes."
        conversationStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the conversation in which the utterance took place began. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        conversationEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the conversation in which the utterance took place ended. A conversation is defined as a unique combination of a sessionId and an originatingRequestId.
        utterance:
          $ref: "#/components/schemas/String"
          description: The text of the utterance.
        utteranceTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the utterance took place.
        audioVoiceDurationMillis:
          $ref: "#/components/schemas/AnalyticsLongValue"
          description: The duration in milliseconds of the audio associated with the utterance.
        utteranceUnderstood:
          $ref: "#/components/schemas/UtteranceUnderstood"
          description: Specifies whether the bot understood the utterance or not.
        inputType:
          $ref: "#/components/schemas/String"
          description: "The input type of the utterance. The possible values are as follows: PCM format: audio data must be in little-endian byte order. audio/l16; rate=16000; channels=1 audio/x-l16; sample-rate=16000; channel-count=1 audio/lpcm; sample-rate=8000; sample-size-bits=16; channel-count=1; is-big-endian=false Opus format audio/x-cbr-opus-with-preamble;preamble-size=0;bit-rate=256000;frame-size-milliseconds=4 Text format text/plain; charset=utf-8"
        outputType:
          $ref: "#/components/schemas/String"
          description: "The output type of the utterance. The possible values are as follows: audio/mpeg audio/ogg audio/pcm (16 KHz) audio/ (defaults to mpeg) text/plain; charset=utf-8"
        associatedIntentName:
          $ref: "#/components/schemas/Name"
          description: The name of the intent that the utterance is associated to.
        associatedSlotName:
          $ref: "#/components/schemas/Name"
          description: The name of the slot that the utterance is associated to.
        intentState:
          $ref: "#/components/schemas/IntentState"
