      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                botName:
                  $ref: "#/components/schemas/Name"
                description:
                  $ref: "#/components/schemas/Description"
                roleArn:
                  $ref: "#/components/schemas/RoleArn"
