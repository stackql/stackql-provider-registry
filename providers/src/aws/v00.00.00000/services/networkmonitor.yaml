openapi: 3.0.0
info:
  version: "2023-08-01"
  title: Amazon CloudWatch Network Monitor
  description: Amazon CloudWatch Network Monitor
  x-serviceName: networkmonitor
  x-serviceAlias: networkmonitor
  x-protocol: rest-json
  x-apiVersion: "2023-08-01"
  x-endpointPrefix: networkmonitor
  x-jsonVersion: "1.1"
servers:
  - url: https://networkmonitor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for networkmonitor
paths:
  /monitors:
    post:
      operationId: CreateMonitor
      description: "Creates a monitor between a source subnet and destination IP address. Within a monitor you'll create one or more probes that monitor network traffic between your source Amazon Web Services VPC subnets and your destination IP addresses. Each probe then aggregates and sends metrics to Amazon CloudWatch. You can also create a monitor with probes using this command. For each probe, you define the following: source—The subnet IDs where the probes will be created. destination— The target destination IP address for the probe. destinationPort—Required only if the protocol is TCP. protocol—The communication protocol between the source and destination. This will be either TCP or ICMP. packetSize—The size of the packets. This must be a number between 56 and 8500. (Optional) tags —Key-value pairs created and assigned to the probe."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monitorName:
                  $ref: "#/components/schemas/ResourceName"
                probes:
                  $ref: "#/components/schemas/CreateMonitorProbeInputList"
                aggregationPeriod:
                  $ref: "#/components/schemas/AggregationPeriod"
                clientToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - monitorName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMonitorOutput"
    get:
      operationId: ListMonitors
      description: Returns a list of all of your monitors.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PaginationToken"
          description: The token for the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return with a single call. To retrieve the remaining results, make another call with the returned nextToken value. If MaxResults is given a value larger than 100, only 100 results are returned.
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The list of all monitors and their states.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMonitorsOutput"
  /monitors/{monitor_name}/probes:
    post:
      operationId: CreateProbe
      description: Create a probe within a monitor. Once you create a probe, and it begins monitoring your network traffic, you'll incur billing charges for that probe. This action requires the monitorName parameter. Run ListMonitors to get a list of monitor names. Note the name of the monitorName you want to create the probe for.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to associated with the probe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                probe:
                  $ref: "#/components/schemas/ProbeInput"
                clientToken:
                  $ref: "#/components/schemas/String"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - probe
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProbeOutput"
  /monitors/{monitor_name}:
    delete:
      operationId: DeleteMonitor
      description: Deletes a specified monitor. This action requires the monitorName parameter. Run ListMonitors to get a list of monitor names.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMonitorOutput"
    get:
      operationId: GetMonitor
      description: Returns details about a specific monitor. This action requires the monitorName parameter. Run ListMonitors to get a list of monitor names.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor that details are returned for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMonitorOutput"
    patch:
      operationId: UpdateMonitor
      description: Updates the aggregationPeriod for a monitor. Monitors support an aggregationPeriod of either 30 or 60 seconds. This action requires the monitorName and probeId parameter. Run ListMonitors to get a list of monitor names.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                aggregationPeriod:
                  $ref: "#/components/schemas/AggregationPeriod"
              required:
                - aggregationPeriod
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMonitorOutput"
  /monitors/{monitor_name}/probes/{probe_id}:
    delete:
      operationId: DeleteProbe
      description: Deletes the specified probe. Once a probe is deleted you'll no longer incur any billing fees for that probe. This action requires both the monitorName and probeId parameters. Run ListMonitors to get a list of monitor names. Run GetMonitor to get a list of probes and probe IDs. You can only delete a single probe at a time using this action.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor to delete.
        - name: probe_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe to delete.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteProbeOutput"
    get:
      operationId: GetProbe
      description: Returns the details about a probe. This action requires both the monitorName and probeId parameters. Run ListMonitors to get a list of monitor names. Run GetMonitor to get a list of probes and probe IDs.
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor associated with the probe. Run ListMonitors to get a list of monitor names.
        - name: probe_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe to get information about. Run GetMonitor action to get a list of probes and probe IDs for the monitor.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProbeOutput"
    patch:
      operationId: UpdateProbe
      description: "Updates a monitor probe. This action requires both the monitorName and probeId parameters. Run ListMonitors to get a list of monitor names. Run GetMonitor to get a list of probes and probe IDs. You can update the following para create a monitor with probes using this command. For each probe, you define the following: state—The state of the probe. destination— The target destination IP address for the probe. destinationPort—Required only if the protocol is TCP. protocol—The communication protocol between the source and destination. This will be either TCP or ICMP. packetSize—The size of the packets. This must be a number between 56 and 8500. (Optional) tags —Key-value pairs created and assigned to the probe."
      parameters:
        - name: monitor_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor that the probe was updated for.
        - name: probe_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  $ref: "#/components/schemas/ProbeState"
                destination:
                  $ref: "#/components/schemas/Destination"
                destinationPort:
                  $ref: "#/components/schemas/Port"
                protocol:
                  $ref: "#/components/schemas/Protocol"
                packetSize:
                  $ref: "#/components/schemas/PacketSize"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProbeOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags assigned to this resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
    post:
      operationId: TagResource
      description: Adds key-value pairs to a monitor or probe.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the monitor or probe to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
    delete:
      operationId: UntagResource
      description: Removes a key-value pair from a monitor or probe.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of the monitor or probe that the tag should be removed from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The key-value pa
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9_-]+"
    CreateMonitorProbeInputList:
      type: array
      items:
        $ref: "#/components/schemas/CreateMonitorProbeInput"
    CreateMonitorProbeInput:
      description: Creates a monitor probe.
      type: object
      properties:
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the subnet.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The destination IP address. This must be either IPV4 or IPV6.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The port associated with the destination. This is required only if the protocol is TCP and must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol used for the network traffic between the source and destination. This must be either TCP or ICMP.
        packetSize:
          $ref: "#/components/schemas/PacketSize"
          description: The size of the packets sent between the source and destination. This must be a number between 56 and 8500.
        probeTags:
          type: object
          properties: {}
          description: The list of key-value pairs created and assigned to the monitor.
      required:
        - sourceArn
        - destination
        - protocol
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:.*
    Destination:
      type: string
      minLength: 1
      maxLength: 255
    Port:
      type: integer
      minimum: 0
      maximum: 65536
    Protocol:
      type: string
      enum:
        - TCP
        - ICMP
    PacketSize:
      type: integer
      minimum: 56
      maximum: 8500
    AggregationPeriod:
      type: integer
      format: int64
      minimum: 30
    String:
      type: string
    TagMap:
      type: object
      properties: {}
    CreateMonitorOutput:
      type: object
      properties:
        monitorArn:
          $ref: "#/components/schemas/MonitorArn"
          description: The ARN of the monitor.
        monitorName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        state:
          $ref: "#/components/schemas/MonitorState"
          description: The state of the monitor.
        aggregationPeriod:
          $ref: "#/components/schemas/AggregationPeriod"
          description: The number of seconds that metrics are aggregated by and sent to Amazon CloudWatch. This will be either 30 or 60.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs assigned to the monitor.
      required:
        - monitorArn
        - monitorName
        - state
    MonitorArn:
      type: string
      minLength: 20
      maxLength: 512
      pattern: arn:.*
    MonitorState:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - INACTIVE
        - ERROR
        - DELETING
    ProbeInput:
      description: Defines a probe when creating a probe or monitor.
      type: object
      properties:
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the subnet.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The destination IP address. This must be either IPV4 or IPV6.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The port associated with the destination. This is required only if the protocol is TCP and must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol used for the network traffic between the source and destination. This must be either TCP or ICMP.
        packetSize:
          $ref: "#/components/schemas/PacketSize"
          description: The size of the packets sent between the source and destination. This must be a number between 56 and 8500.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs created and assigned to the monitor.
      required:
        - sourceArn
        - destination
        - protocol
    CreateProbeOutput:
      type: object
      properties:
        probeId:
          $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe for which details are returned.
        probeArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe.
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The destination IP address for the monitor. This must be either an IPv4 or IPv6 address.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The port associated with the destination. This is required only if the protocol is TCP and must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol used for the network traffic between the source and destination. This must be either TCP or ICMP.
        packetSize:
          $ref: "#/components/schemas/PacketSize"
          description: The size of the packets sent between the source and destination. This must be a number between 56 and 8500.
        addressFamily:
          $ref: "#/components/schemas/AddressFamily"
          description: Indicates whether the IP address is IPV4 or IPV6.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the source VPC or subnet.
        state:
          $ref: "#/components/schemas/ProbeState"
          description: The state of the probe.
        createdAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date that the probe was created.
        modifiedAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date when the probe was last modified.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs assigned to the probe.
      required:
        - sourceArn
        - destination
        - protocol
    ProbeId:
      type: string
      pattern: probe-[a-z0-9A-Z-]{21,64}
    AddressFamily:
      type: string
      enum:
        - IPV4
        - IPV6
    VpcId:
      type: string
      pattern: vpc-[a-zA-Z0-9]{8,32}
    ProbeState:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - INACTIVE
        - ERROR
        - DELETING
        - DELETED
    Iso8601Timestamp:
      type: string
      format: date-time
    DeleteMonitorOutput:
      type: object
    DeleteProbeOutput:
      type: object
    GetMonitorOutput:
      type: object
      properties:
        monitorArn:
          $ref: "#/components/schemas/MonitorArn"
          description: The ARN of the selected monitor.
        monitorName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        state:
          $ref: "#/components/schemas/MonitorState"
          description: Lists the status of the state of each monitor.
        aggregationPeriod:
          $ref: "#/components/schemas/AggregationPeriod"
          description: The aggregation period for the specified monitor.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs assigned to the monitor.
        probes:
          $ref: "#/components/schemas/ProbeList"
          description: The details about each probe associated with that monitor.
        createdAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date when the monitor was created.
        modifiedAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date when the monitor was last modified.
      required:
        - monitorArn
        - monitorName
        - state
        - aggregationPeriod
        - createdAt
        - modifiedAt
    ProbeList:
      type: array
      items:
        $ref: "#/components/schemas/Probe"
    Probe:
      description: Describes information about a network monitor probe.
      type: object
      properties:
        probeId:
          $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe.
        probeArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe.
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe source subnet.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The destination for the probe. This should be either an IPV4 or IPV6.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The destination port for the probe. This is required only if the protocol is TCP and must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The network protocol for the destination. This can be either TCP or ICMP. If the protocol is TCP, then port is also required.
        packetSize:
          $ref: "#/components/schemas/PacketSize"
          description: The size of the packets traveling between the source and destination. This must be a number between 56 and
        addressFamily:
          $ref: "#/components/schemas/AddressFamily"
          description: The IPv4 or IPv6 address for the probe.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the source VPC subnet.
        state:
          $ref: "#/components/schemas/ProbeState"
          description: The state of the probe.
        createdAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date the probe was created.
        modifiedAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date that the probe was last modified.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs created and assigned to the probe.
      required:
        - sourceArn
        - destination
        - protocol
    GetProbeOutput:
      type: object
      properties:
        probeId:
          $ref: "#/components/schemas/ProbeId"
          description: The ID of the probe for which details are returned.
        probeArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe.
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The ARN of the probe.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The destination IP address for the monitor. This must be either an IPv4 or IPv6 address.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The port associated with the destination. This is required only if the protocol is TCP and must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The protocol used for the network traffic between the source and destination. This must be either TCP or ICMP.
        packetSize:
          $ref: "#/components/schemas/PacketSize"
          description: The size of the packets sent between the source and destination. This must be a number between 56 and 8500.
        addressFamily:
          $ref: "#/components/schemas/AddressFamily"
          description: Indicates whether the IP address is IPV4 or IPV6.
        vpcId:
          $ref: "#/components/schemas/VpcId"
          description: The ID of the source VPC or subnet.
        state:
          $ref: "#/components/schemas/ProbeState"
          description: The state of the probe.
        createdAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date that the probe was created.
        modifiedAt:
          $ref: "#/components/schemas/Iso8601Timestamp"
          description: The time and date that the probe was last modified.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs assigned to the probe.
      required:
        - sourceArn
        - destination
        - protocol
    PaginationToken:
      type: string
      minLength: 0
      maxLength: 4096
    MaxResults:
      type: integer
      minimum: 1
      maximum: 25
    ListMonitorsOutput:
      type: object
      properties:
        monitors:
          $ref: "#/components/schemas/MonitorList"
          description: Lists individual details about each of your monitors.
        nextToken:
          $ref: "#/components/schemas/String"
          description: The token for the next page of results.
      required:
        - monitors
    MonitorList:
      type: array
      items:
        $ref: "#/components/schemas/MonitorSummary"
    MonitorSummary:
      description: Displays summary information about a monitor.
      type: object
      properties:
        monitorArn:
          $ref: "#/components/schemas/MonitorArn"
          description: The ARN of the monitor.
        monitorName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor.
        state:
          $ref: "#/components/schemas/MonitorState"
          description: The state of the monitor.
        aggregationPeriod:
          $ref: "#/components/schemas/AggregationPeriod"
          description: The time, in seconds, that metrics are collected and sent to Amazon CloudWatch. Valid values are either 30 or 60.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs assigned to the monitor.
      required:
        - monitorArn
        - monitorName
        - state
    ListTagsForResourceOutput:
      type: object
      properties:
        tags:
          type: object
          properties: {}
          description: Lists the tags assigned to the resource.
    TagResourceOutput:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    UntagResourceOutput:
      type: object
    UpdateMonitorOutput:
      type: object
      properties:
        monitorArn:
          $ref: "#/components/schemas/MonitorArn"
          description: The ARN of the monitor that was updated.
        monitorName:
          $ref: "#/components/schemas/ResourceName"
          description: The name of the monitor that was updated.
        state:
          $ref: "#/components/schemas/MonitorState"
          description: The state of the updated monitor.
        aggregationPeriod:
          $ref: "#/components/schemas/AggregationPeriod"
          description: The changed aggregation period.
        tags:
          type: object
          properties: {}
          description: The list of key-value pairs associated with the monitor.
      required:
        - monitorArn
        - monitorName
        - state
    UpdateProbeOutput:
      type: object
      properties:
        probeId:
          $ref: "#/components/schemas/ProbeId"
          description: The updated ID of the probe.
        probeArn:
          $ref: "#/components/schemas/Arn"
          description: The updated ARN of the probe.
        sourceArn:
          $ref: "#/components/schemas/Arn"
          description: The updated ARN of the source subnet.
        destination:
          $ref: "#/components/schemas/Destination"
          description: The updated destination IP address for the probe.
        destinationPort:
          $ref: "#/components/schemas/Port"
          description: The updated destination port. This must be a number between 1 and 65536.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: The updated protocol for the probe.
        packetSize:
