    Participant:
      description: Object describing a participant that has joined a stage.
      type: object
      properties:
        participantId:
          $ref: "#/components/schemas/ParticipantId"
          description: Unique identifier for this participant, assigned by IVS.
        userId:
          $ref: "#/components/schemas/UserId"
          description: Customer-assigned name to help identify the token; this can be used to link a participant to a user in the customer’s own systems. This can be any UTF-8 encoded text. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        state:
          $ref: "#/components/schemas/ParticipantState"
          description: Whether the participant is connected to or disconnected from the stage.
        firstJoinTime:
          $ref: "#/components/schemas/Time"
          description: ISO 8601 timestamp (returned as a string) when the participant first joined the stage session.
        attributes:
          type: object
          properties: {}
          description: Application-provided attributes to encode into the token and attach to a stage. Map keys and values can contain UTF-8 encoded text. The maximum length of this field is 1 KB total. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        published:
          $ref: "#/components/schemas/Published"
          description: Whether the participant ever published to the stage session.
        ispName:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s Internet Service Provider.
        osName:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s operating system.
        osVersion:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s operating system version.
        browserName:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s browser.
        browserVersion:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s browser version.
        sdkVersion:
          $ref: "#/components/schemas/ParticipantClientAttribute"
          description: The participant’s SDK version.
        recordingS3BucketName:
          $ref: "#/components/schemas/ParticipantRecordingS3BucketName"
          description: Name of the S3 bucket to where the participant is being recorded, if individual participant recording is enabled, or "" (empty string), if recording is not enabled.
        recordingS3Prefix:
          $ref: "#/components/schemas/ParticipantRecordingS3Prefix"
          description: S3 prefix of the S3 bucket where the participant is being recorded, if individual participant recording is enabled, or "" (empty string), if recording is not enabled. If individual participant recording merge is enabled, and if a stage publisher disconnects from a stage and then reconnects, IVS tries to record to the same S3 prefix as the previous session. See Merge Fragmented Individual Participant Recordings.
        recordingState:
          $ref: "#/components/schemas/ParticipantRecordingState"
          description: The participant’s recording state.
        protocol:
          $ref: "#/components/schemas/ParticipantProtocol"
          description: Type of ingest protocol that the participant employs for broadcasting.
        replicationType:
          $ref: "#/components/schemas/ReplicationType"
          description: "Indicates if the participant has been replicated to another stage or is a replica from another stage. Default: NONE."
        replicationState:
          $ref: "#/components/schemas/ReplicationState"
          description: The participant's replication state.
        sourceStageArn:
          $ref: "#/components/schemas/StageArn"
          description: Source stage ARN from which this participant is replicated, if replicationType is REPLICA.
        sourceSessionId:
          $ref: "#/components/schemas/StageSessionId"
          description: ID of the session within the source stage, if replicationType is REPLICA.
        redundantIngest:
          $ref: "#/components/schemas/RedundantIngest"
          description: Indicates whether redundant ingest is enabled for the participant.
        ingestConfigurationArn:
          $ref: "#/components/schemas/IngestConfigurationArn"
          description: The participant’s ingest configuration.
    ParticipantState:
