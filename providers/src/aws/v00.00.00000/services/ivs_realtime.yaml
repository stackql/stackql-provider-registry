openapi: 3.0.0
info:
  version: "2020-07-14"
  title: Amazon Interactive Video Service RealTime
  description: Amazon Interactive Video Service RealTime
  x-serviceName: ivs
  x-serviceAlias: ivs_realtime
  x-protocol: rest-json
  x-apiVersion: "2020-07-14"
  x-endpointPrefix: ivsrealtime
servers:
  - url: https://ivsrealtime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ivs-realtime
paths:
  /CreateEncoderConfiguration:
    post:
      operationId: CreateEncoderConfiguration
      description: Creates an EncoderConfiguration object.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/EncoderConfigurationName"
                video:
                  $ref: "#/components/schemas/Video"
                tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEncoderConfigurationResponse"
  /CreateIngestConfiguration:
    post:
      operationId: CreateIngestConfiguration
      description: Creates a new IngestConfiguration resource, used to specify the ingest protocol for a stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/IngestConfigurationName"
                stageArn:
                  $ref: "#/components/schemas/IngestConfigurationStageArn"
                userId:
                  $ref: "#/components/schemas/UserId"
                attributes:
                  $ref: "#/components/schemas/ParticipantAttributes"
                ingestProtocol:
                  $ref: "#/components/schemas/IngestProtocol"
                insecureIngest:
                  $ref: "#/components/schemas/InsecureIngest"
                redundantIngest:
                  $ref: "#/components/schemas/RedundantIngest"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ingestProtocol
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIngestConfigurationResponse"
  /CreateParticipantToken:
    post:
      operationId: CreateParticipantToken
      description: Creates an additional token for a specified stage. This can be done after stage creation or when tokens expire. Tokens always are scoped to the stage for which they are created. Encryption keys are owned by Amazon IVS and never used directly by your application.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                duration:
                  $ref: "#/components/schemas/ParticipantTokenDurationMinutes"
                userId:
                  $ref: "#/components/schemas/ParticipantTokenUserId"
                attributes:
                  $ref: "#/components/schemas/ParticipantTokenAttributes"
                capabilities:
                  $ref: "#/components/schemas/ParticipantTokenCapabilities"
              required:
                - stageArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateParticipantTokenResponse"
  /CreateStage:
    post:
      operationId: CreateStage
      description: Creates a new stage (and optionally participant tokens).
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/StageName"
                participantTokenConfigurations:
                  $ref: "#/components/schemas/ParticipantTokenConfigurations"
                tags:
                  $ref: "#/components/schemas/Tags"
                autoParticipantRecordingConfiguration:
                  $ref: "#/components/schemas/AutoParticipantRecordingConfiguration"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStageResponse"
  /CreateStorageConfiguration:
    post:
      operationId: CreateStorageConfiguration
      description: Creates a new storage configuration, used to enable recording to Amazon S3. When a StorageConfiguration is created, IVS will modify the S3 bucketPolicy of the provided bucket. This will ensure that IVS has sufficient permissions to write content to the provided bucket.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/StorageConfigurationName"
                s3:
                  $ref: "#/components/schemas/S3StorageConfiguration"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - s3
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateStorageConfigurationResponse"
  /DeleteEncoderConfiguration:
    post:
      operationId: DeleteEncoderConfiguration
      description: Deletes an EncoderConfiguration resource. Ensures that no Compositions are using this template; otherwise, returns an error.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/EncoderConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEncoderConfigurationResponse"
  /DeleteIngestConfiguration:
    post:
      operationId: DeleteIngestConfiguration
      description: Deletes a specified IngestConfiguration, so it can no longer be used to broadcast. An IngestConfiguration cannot be deleted if the publisher is actively streaming to a stage, unless force is set to true.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/IngestConfigurationArn"
                force:
                  $ref: "#/components/schemas/Boolean"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIngestConfigurationResponse"
  /DeletePublicKey:
    post:
      operationId: DeletePublicKey
      description: Deletes the specified public key used to sign stage participant tokens. This invalidates future participant tokens generated using the key pair’s private key.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PublicKeyArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePublicKeyResponse"
  /DeleteStage:
    post:
      operationId: DeleteStage
      description: Shuts down and deletes the specified stage (disconnecting all participants). This operation also removes the stageArn from the associated IngestConfiguration, if there are participants using the IngestConfiguration to publish to the stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StageArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStageResponse"
  /DeleteStorageConfiguration:
    post:
      operationId: DeleteStorageConfiguration
      description: Deletes the storage configuration for the specified ARN. If you try to delete a storage configuration that is used by a Composition, you will get an error (409 ConflictException). To avoid this, for all Compositions that reference the storage configuration, first use StopComposition and wait for it to complete, then use DeleteStorageConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StorageConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteStorageConfigurationResponse"
  /DisconnectParticipant:
    post:
      operationId: DisconnectParticipant
      description: Disconnects a specified participant from a specified stage. If the participant is publishing using an IngestConfiguration, DisconnectParticipant also updates the stageArn in the IngestConfiguration to be an empty string.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                participantId:
                  $ref: "#/components/schemas/ParticipantTokenId"
                reason:
                  $ref: "#/components/schemas/DisconnectParticipantReason"
              required:
                - stageArn
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisconnectParticipantResponse"
  /GetComposition:
    post:
      operationId: GetComposition
      description: Get information about the specified Composition resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/CompositionArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCompositionResponse"
  /GetEncoderConfiguration:
    post:
      operationId: GetEncoderConfiguration
      description: Gets information about the specified EncoderConfiguration resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/EncoderConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEncoderConfigurationResponse"
  /GetIngestConfiguration:
    post:
      operationId: GetIngestConfiguration
      description: Gets information about the specified IngestConfiguration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/IngestConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIngestConfigurationResponse"
  /GetParticipant:
    post:
      operationId: GetParticipant
      description: Gets information about the specified participant token.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                sessionId:
                  $ref: "#/components/schemas/StageSessionId"
                participantId:
                  $ref: "#/components/schemas/ParticipantId"
              required:
                - stageArn
                - sessionId
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetParticipantResponse"
  /GetPublicKey:
    post:
      operationId: GetPublicKey
      description: Gets information for the specified public key.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PublicKeyArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPublicKeyResponse"
  /GetStage:
    post:
      operationId: GetStage
      description: Gets information for the specified stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StageArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStageResponse"
  /GetStageSession:
    post:
      operationId: GetStageSession
      description: Gets information for the specified stage session.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                sessionId:
                  $ref: "#/components/schemas/StageSessionId"
              required:
                - stageArn
                - sessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStageSessionResponse"
  /GetStorageConfiguration:
    post:
      operationId: GetStorageConfiguration
      description: Gets the storage configuration for the specified ARN.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StorageConfigurationArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetStorageConfigurationResponse"
  /ImportPublicKey:
    post:
      operationId: ImportPublicKey
      description: Import a public key to be used for signing stage participant tokens.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                publicKeyMaterial:
                  $ref: "#/components/schemas/PublicKeyMaterial"
                name:
                  $ref: "#/components/schemas/PublicKeyName"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - publicKeyMaterial
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPublicKeyResponse"
  /ListCompositions:
    post:
      operationId: ListCompositions
      description: Gets summary information about all Compositions in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filterByStageArn:
                  $ref: "#/components/schemas/StageArn"
                filterByEncoderConfigurationArn:
                  $ref: "#/components/schemas/EncoderConfigurationArn"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxCompositionResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCompositionsResponse"
  /ListEncoderConfigurations:
    post:
      operationId: ListEncoderConfigurations
      description: Gets summary information about all EncoderConfigurations in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxEncoderConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEncoderConfigurationsResponse"
  /ListIngestConfigurations:
    post:
      operationId: ListIngestConfigurations
      description: Lists all IngestConfigurations in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filterByStageArn:
                  $ref: "#/components/schemas/StageArn"
                filterByState:
                  $ref: "#/components/schemas/IngestConfigurationState"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxIngestConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIngestConfigurationsResponse"
  /ListParticipantEvents:
    post:
      operationId: ListParticipantEvents
      description: Lists events for a specified participant that occurred during a specified stage session.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                sessionId:
                  $ref: "#/components/schemas/StageSessionId"
                participantId:
                  $ref: "#/components/schemas/ParticipantId"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxParticipantEventResults"
              required:
                - stageArn
                - sessionId
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListParticipantEventsResponse"
  /ListParticipantReplicas:
    post:
      operationId: ListParticipantReplicas
      description: Lists all the replicas for a participant from a source stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceStageArn:
                  $ref: "#/components/schemas/StageArn"
                participantId:
                  $ref: "#/components/schemas/ParticipantId"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxParticipantReplicaResults"
              required:
                - sourceStageArn
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListParticipantReplicasResponse"
  /ListParticipants:
    post:
      operationId: ListParticipants
      description: Lists all participants in a specified stage session.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                sessionId:
                  $ref: "#/components/schemas/StageSessionId"
                filterByUserId:
                  $ref: "#/components/schemas/UserId"
                filterByPublished:
                  $ref: "#/components/schemas/Published"
                filterByState:
                  $ref: "#/components/schemas/ParticipantState"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxParticipantResults"
                filterByRecordingState:
                  $ref: "#/components/schemas/ParticipantRecordingFilterByRecordingState"
              required:
                - stageArn
                - sessionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListParticipantsResponse"
  /ListPublicKeys:
    post:
      operationId: ListPublicKeys
      description: Gets summary information about all public keys in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxPublicKeyResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPublicKeysResponse"
  /ListStageSessions:
    post:
      operationId: ListStageSessions
      description: Gets all sessions for a specified stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStageSessionResults"
              required:
                - stageArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStageSessionsResponse"
  /ListStages:
    post:
      operationId: ListStages
      description: Gets summary information about all stages in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStageResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStagesResponse"
  /ListStorageConfigurations:
    post:
      operationId: ListStorageConfigurations
      description: Gets summary information about all storage configurations in your account, in the AWS region where the API request is processed.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextToken:
                  $ref: "#/components/schemas/PaginationToken"
                maxResults:
                  $ref: "#/components/schemas/MaxStorageConfigurationResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStorageConfigurationsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Gets information about AWS tags for the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be retrieved. The ARN must be URL-encoded.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds or updates tags for the AWS resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be tagged. The ARN must be URL-encoded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from the resource with the specified ARN.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to be untagged. The ARN must be URL-encoded.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Array of tag keys (strings) for the tags to be removed. See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /StartComposition:
    post:
      operationId: StartComposition
      description: "Starts a Composition from a stage based on the configuration provided in the request. A Composition is an ephemeral resource that exists after this operation returns successfully. Composition stops and the resource is deleted: When StopComposition is called. After a 1-minute timeout, when all participants are disconnected from the stage. After a 1-minute timeout, if there are no participants in the stage when StartComposition is called. When broadcasting to the IVS channel fails and all retries are exhausted. When broadcasting is disconnected and all attempts to reconnect are exhausted."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stageArn:
                  $ref: "#/components/schemas/StageArn"
                idempotencyToken:
                  $ref: "#/components/schemas/CompositionClientToken"
                layout:
                  $ref: "#/components/schemas/LayoutConfiguration"
                destinations:
                  $ref: "#/components/schemas/DestinationConfigurationList"
                tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - stageArn
                - destinations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCompositionResponse"
  /StartParticipantReplication:
    post:
      operationId: StartParticipantReplication
      description: Starts replicating a publishing participant from a source stage to a destination stage.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceStageArn:
                  $ref: "#/components/schemas/StageArn"
                destinationStageArn:
                  $ref: "#/components/schemas/StageArn"
                participantId:
                  $ref: "#/components/schemas/ParticipantId"
                reconnectWindowSeconds:
                  $ref: "#/components/schemas/ReconnectWindowSeconds"
                attributes:
                  $ref: "#/components/schemas/ParticipantAttributes"
              required:
                - sourceStageArn
                - destinationStageArn
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartParticipantReplicationResponse"
  /StopComposition:
    post:
      operationId: StopComposition
      description: Stops and deletes a Composition resource. Any broadcast from the Composition resource is stopped.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/CompositionArn"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopCompositionResponse"
  /StopParticipantReplication:
    post:
      operationId: StopParticipantReplication
      description: Stops a replicated participant session.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceStageArn:
                  $ref: "#/components/schemas/StageArn"
                destinationStageArn:
                  $ref: "#/components/schemas/StageArn"
                participantId:
                  $ref: "#/components/schemas/ParticipantId"
              required:
                - sourceStageArn
                - destinationStageArn
                - participantId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopParticipantReplicationResponse"
  /UpdateIngestConfiguration:
    post:
      operationId: UpdateIngestConfiguration
      description: Updates a specified IngestConfiguration. Only the stage ARN attached to the IngestConfiguration can be updated. An IngestConfiguration that is active cannot be updated.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/IngestConfigurationArn"
                stageArn:
                  $ref: "#/components/schemas/IngestConfigurationStageArn"
                redundantIngest:
                  $ref: "#/components/schemas/RedundantIngest"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIngestConfigurationResponse"
  /UpdateStage:
    post:
      operationId: UpdateStage
      description: Updates a stage’s configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/StageArn"
                name:
                  $ref: "#/components/schemas/StageName"
                autoParticipantRecordingConfiguration:
                  $ref: "#/components/schemas/AutoParticipantRecordingConfiguration"
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStageResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    EncoderConfigurationName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    Video:
      description: Settings for video.
      type: object
      properties:
        width:
          $ref: "#/components/schemas/Width"
          description: "Video-resolution width. This must be an even number. Note that the maximum value is determined by width times height, such that the maximum total pixels is 2073600 (1920x1080 or 1080x1920). Default: 1280."
        height:
          $ref: "#/components/schemas/Height"
          description: "Video-resolution height. This must be an even number. Note that the maximum value is determined by width times height, such that the maximum total pixels is 2073600 (1920x1080 or 1080x1920). Default: 720."
        framerate:
          $ref: "#/components/schemas/Framerate"
          description: "Video frame rate, in fps. Default: 30."
        bitrate:
          $ref: "#/components/schemas/Bitrate"
          description: "Bitrate for generated output, in bps. Default: 2500000."
    Width:
      type: integer
      minimum: 2
      maximum: 1920
    Height:
      type: integer
      minimum: 2
      maximum: 1920
    Framerate:
      type: number
      format: float
      minimum: 1
      maximum: 60
    Bitrate:
      type: integer
      minimum: 1
      maximum: 8500000
    Tags:
      type: object
      properties: {}
    CreateEncoderConfigurationResponse:
      type: object
      properties:
        encoderConfiguration:
          $ref: "#/components/schemas/EncoderConfiguration"
          description: The EncoderConfiguration that was created.
    EncoderConfiguration:
      description: Settings for transcoding.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/EncoderConfigurationArn"
          description: ARN of the EncoderConfiguration resource.
        name:
          $ref: "#/components/schemas/EncoderConfigurationName"
          description: Optional name to identify the resource.
        video:
          $ref: "#/components/schemas/Video"
          description: "Video configuration. Default: video resolution 1280x720, bitrate 2500 kbps, 30 fps"
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
      required:
        - arn
    EncoderConfigurationArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:encoder-configuration/[a-zA-Z0-9-]+
    IngestConfigurationName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    IngestConfigurationStageArn:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^$|^arn:aws:ivs:[a-z0-9-]+:[0-9]+:stage/[a-zA-Z0-9-]+$
    UserId:
      type: string
      minLength: 0
      maxLength: 128
    ParticipantAttributes:
      type: object
      properties: {}
    IngestProtocol:
      type: string
      enum:
        - RTMP
        - RTMPS
    InsecureIngest:
      type: boolean
    RedundantIngest:
      type: boolean
    CreateIngestConfigurationResponse:
      type: object
      properties:
        ingestConfiguration:
          $ref: "#/components/schemas/IngestConfiguration"
          description: The IngestConfiguration that was created.
    IngestConfiguration:
      description: Object specifying an ingest configuration.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/IngestConfigurationName"
          description: Ingest name
        arn:
          $ref: "#/components/schemas/IngestConfigurationArn"
          description: Ingest configuration ARN.
        ingestProtocol:
          $ref: "#/components/schemas/IngestProtocol"
          description: Type of ingest protocol that the user employs for broadcasting.
        streamKey:
          $ref: "#/components/schemas/StreamKey"
          description: Ingest-key value for the RTMP(S) protocol.
        stageArn:
          $ref: "#/components/schemas/IngestConfigurationStageArn"
          description: ARN of the stage with which the IngestConfiguration is associated.
        participantId:
          $ref: "#/components/schemas/ParticipantId"
          description: ID of the participant within the stage.
        state:
          $ref: "#/components/schemas/IngestConfigurationState"
          description: State of the ingest configuration. It is ACTIVE if a publisher currently is publishing to the stage associated with the ingest configuration.
        userId:
          $ref: "#/components/schemas/UserId"
          description: Customer-assigned name to help identify the participant using the IngestConfiguration; this can be used to link a participant to a user in the customer’s own systems. This can be any UTF-8 encoded text. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        redundantIngest:
          $ref: "#/components/schemas/RedundantIngest"
          description: Indicates whether redundant ingest is enabled for the ingest configuration.
        redundantIngestCredentials:
          $ref: "#/components/schemas/RedundantIngestCredentials"
          description: A list of redundant ingest credentials, present only when redundantIngest is set to true. See Redundant Ingest in IVS RTMP Publishing for details.
        attributes:
          type: object
          properties: {}
          description: Application-provided attributes to to store in the IngestConfiguration and attach to a stage. Map keys and values can contain UTF-8 encoded text. The maximum length of this field is 1 KB total. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
      required:
        - arn
        - ingestProtocol
        - streamKey
        - stageArn
        - participantId
        - state
    IngestConfigurationArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:ingest-configuration/[a-zA-Z0-9-]+
    StreamKey:
      type: string
      pattern: rt_[0-9]+_[a-z0-9-]+_[a-zA-Z0-9-]+_.+
    ParticipantId:
      type: string
      minLength: 0
      maxLength: 64
      pattern: "[a-zA-Z0-9-]*"
    IngestConfigurationState:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
    RedundantIngestCredentials:
      type: array
      items:
        $ref: "#/components/schemas/RedundantIngestCredential"
    RedundantIngestCredential:
      description: An object representing a redundant ingest credential.
      type: object
      properties:
        participantId:
          $ref: "#/components/schemas/ParticipantId"
          description: ID of the participant within the stage.
        streamKey:
          $ref: "#/components/schemas/StreamKey"
          description: Ingest-key value.
    StageArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:stage/[a-zA-Z0-9-]+
    ParticipantTokenDurationMinutes:
      type: integer
      minimum: 1
      maximum: 20160
    ParticipantTokenUserId:
      type: string
      minLength: 0
      maxLength: 128
    ParticipantTokenAttributes:
      type: object
      properties: {}
    ParticipantTokenCapabilities:
      type: array
      items:
        $ref: "#/components/schemas/ParticipantTokenCapability"
    ParticipantTokenCapability:
      type: string
      enum:
        - PUBLISH
        - SUBSCRIBE
    CreateParticipantTokenResponse:
      type: object
      properties:
        participantToken:
          $ref: "#/components/schemas/ParticipantToken"
          description: The participant token that was created.
    ParticipantToken:
      description: "Object specifying a participant token in a stage. Important: Treat tokens as opaque; i.e., do not build functionality based on token contents. The format of tokens could change in the future."
      type: object
      properties:
        participantId:
          $ref: "#/components/schemas/ParticipantTokenId"
          description: Unique identifier for this participant token, assigned by IVS.
        token:
          $ref: "#/components/schemas/ParticipantTokenString"
          description: The issued client token, encrypted.
        userId:
          $ref: "#/components/schemas/ParticipantTokenUserId"
          description: Customer-assigned name to help identify the token; this can be used to link a participant to a user in the customer’s own systems. This can be any UTF-8 encoded text. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        attributes:
          type: object
          properties: {}
          description: Application-provided attributes to encode into the token and attach to a stage. Map keys and values can contain UTF-8 encoded text. The maximum length of this field is 1 KB total. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        duration:
          $ref: "#/components/schemas/ParticipantTokenDurationMinutes"
          description: "Duration (in minutes), after which the participant token expires. Default: 720 (12 hours)."
        capabilities:
          $ref: "#/components/schemas/ParticipantTokenCapabilities"
          description: Set of capabilities that the user is allowed to perform in the stage.
        expirationTime:
          $ref: "#/components/schemas/ParticipantTokenExpirationTime"
          description: ISO 8601 timestamp (returned as a string) for when this token expires.
    ParticipantTokenId:
      type: string
      minLength: 0
      maxLength: 64
      pattern: "[a-zA-Z0-9-_]*"
    ParticipantTokenString:
      type: string
    ParticipantTokenExpirationTime:
      type: string
      format: date-time
    StageName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    ParticipantTokenConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/ParticipantTokenConfiguration"
    ParticipantTokenConfiguration:
      description: Object specifying a participant token configuration in a stage.
      type: object
      properties:
        duration:
          $ref: "#/components/schemas/ParticipantTokenDurationMinutes"
          description: "Duration (in minutes), after which the corresponding participant token expires. Default: 720 (12 hours)."
        userId:
          $ref: "#/components/schemas/ParticipantTokenUserId"
          description: Customer-assigned name to help identify the token; this can be used to link a participant to a user in the customer’s own systems. This can be any UTF-8 encoded text. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        attributes:
          type: object
          properties: {}
          description: Application-provided attributes to encode into the corresponding participant token and attach to a stage. Map keys and values can contain UTF-8 encoded text. The maximum length of this field is 1 KB total. This field is exposed to all stage participants and should not be used for personally identifying, confidential, or sensitive information.
        capabilities:
          $ref: "#/components/schemas/ParticipantTokenCapabilities"
          description: Set of capabilities that the user is allowed to perform in the stage.
    AutoParticipantRecordingConfiguration:
      description: Object specifying a configuration for individual participant recording.
      type: object
      properties:
        storageConfigurationArn:
          $ref: "#/components/schemas/AutoParticipantRecordingStorageConfigurationArn"
          description: 'ARN of the StorageConfiguration resource to use for individual participant recording. Default: "" (empty string, no storage configuration is specified). Individual participant recording cannot be started unless a storage configuration is specified, when a Stage is created or updated. To disable individual participant recording, set this to ""; other fields in this object will get reset to their defaults when sending "".'
        mediaTypes:
          $ref: "#/components/schemas/ParticipantRecordingMediaTypeList"
          description: "Types of media to be recorded. Default: AUDIO_VIDEO."
        thumbnailConfiguration:
          $ref: "#/components/schemas/ParticipantThumbnailConfiguration"
          description: A complex type that allows you to enable/disable the recording of thumbnails for individual participant recording and modify the interval at which thumbnails are generated for the live session.
        recordingReconnectWindowSeconds:
          $ref: "#/components/schemas/ParticipantRecordingReconnectWindowSeconds"
          description: If a stage publisher disconnects and then reconnects within the specified interval, the multiple recordings will be considered a single recording and merged together. The default value is 0, which disables merging.
        hlsConfiguration:
          $ref: "#/components/schemas/ParticipantRecordingHlsConfiguration"
          description: HLS configuration object for individual participant recording.
        recordParticipantReplicas:
          $ref: "#/components/schemas/RecordParticipantReplicas"
          description: "Optional field to disable replica participant recording. If this is set to false when a participant is a replica, replica participants are not recorded. Default: true."
      required:
        - storageConfigurationArn
    AutoParticipantRecordingStorageConfigurationArn:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^$|^arn:aws:ivs:[a-z0-9-]+:[0-9]+:storage-configuration/[a-zA-Z0-9-]+$
    ParticipantRecordingMediaTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ParticipantRecordingMediaType"
    ParticipantRecordingMediaType:
      type: string
      enum:
        - AUDIO_VIDEO
        - AUDIO_ONLY
        - NONE
    ParticipantThumbnailConfiguration:
      description: An object representing a configuration of thumbnails for recorded video from an individual participant.
      type: object
      properties:
        targetIntervalSeconds:
          $ref: "#/components/schemas/ThumbnailIntervalSeconds"
          description: "The targeted thumbnail-generation interval in seconds. This is configurable only if recordingMode is INTERVAL. Default: 60."
        storage:
          $ref: "#/components/schemas/ThumbnailStorageTypeList"
          description: "Indicates the format in which thumbnails are recorded. SEQUENTIAL records all generated thumbnails in a serial manner, to the media/thumbnails/high directory. LATEST saves the latest thumbnail in media/latest_thumbnail/high/thumb.jpg and overwrites it at the interval specified by targetIntervalSeconds. You can enable both SEQUENTIAL and LATEST. Default: SEQUENTIAL."
        recordingMode:
          $ref: "#/components/schemas/ThumbnailRecordingMode"
          description: "Thumbnail recording mode. Default: DISABLED."
    ThumbnailIntervalSeconds:
      type: integer
      minimum: 1
      maximum: 86400
    ThumbnailStorageTypeList:
      type: array
      items:
        $ref: "#/components/schemas/ThumbnailStorageType"
    ThumbnailStorageType:
      type: string
      enum:
        - SEQUENTIAL
        - LATEST
    ThumbnailRecordingMode:
      type: string
      enum:
        - INTERVAL
        - DISABLED
    ParticipantRecordingReconnectWindowSeconds:
      type: integer
      minimum: 0
      maximum: 300
    ParticipantRecordingHlsConfiguration:
      description: An object representing a configuration of participant HLS recordings for individual participant recording.
      type: object
      properties:
        targetSegmentDurationSeconds:
          $ref: "#/components/schemas/ParticipantRecordingTargetSegmentDurationSeconds"
          description: "Defines the target duration for recorded segments generated when recording a stage participant. Segments may have durations longer than the specified value when needed to ensure each segment begins with a keyframe. Default: 6."
    ParticipantRecordingTargetSegmentDurationSeconds:
      type: integer
      minimum: 2
      maximum: 10
    RecordParticipantReplicas:
      type: boolean
    CreateStageResponse:
      type: object
      properties:
        stage:
          $ref: "#/components/schemas/Stage"
          description: The stage that was created.
        participantTokens:
          $ref: "#/components/schemas/ParticipantTokenList"
          description: Participant tokens attached to the stage. These correspond to the participants in the request.
    Stage:
      description: Object specifying a stage.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/StageArn"
          description: Stage ARN.
        name:
          $ref: "#/components/schemas/StageName"
          description: Stage name.
        activeSessionId:
          $ref: "#/components/schemas/StageSessionId"
          description: ID of the active session within the stage.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
        autoParticipantRecordingConfiguration:
          $ref: "#/components/schemas/AutoParticipantRecordingConfiguration"
          description: Configuration object for individual participant recording, attached to the stage.
        endpoints:
          $ref: "#/components/schemas/StageEndpoints"
          description: Summary information about various endpoints for a stage.
      required:
        - arn
    StageSessionId:
      type: string
      minLength: 16
      maxLength: 16
      pattern: st-[a-zA-Z0-9]+
    StageEndpoints:
      description: Summary information about various endpoints for a stage. We recommend that you cache these values at stage creation; the values can be cached for up to 14 days.
      type: object
      properties:
        events:
          $ref: "#/components/schemas/StageEndpoint"
          description: Events endpoint.
        whip:
          $ref: "#/components/schemas/StageEndpoint"
          description: The endpoint to be used for IVS real-time streaming using the WHIP protocol.
        rtmp:
          $ref: "#/components/schemas/StageEndpoint"
          description: The endpoint to be used for IVS real-time streaming using the RTMP protocol.
        rtmps:
          $ref: "#/components/schemas/StageEndpoint"
          description: The endpoint to be used for IVS real-time streaming using the RTMPS protocol.
    StageEndpoint:
      type: string
      minLength: 0
      maxLength: 2048
    ParticipantTokenList:
      type: array
      items:
        $ref: "#/components/schemas/ParticipantToken"
    StorageConfigurationName:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    S3StorageConfiguration:
      description: A complex type that describes an S3 location where recorded videos will be stored.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: Location (S3 bucket name) where recorded videos will be stored. Note that the StorageConfiguration and S3 bucket must be in the same region as the Composition.
      required:
        - bucketName
    S3BucketName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-z0-9-.]+"
    CreateStorageConfigurationResponse:
      type: object
      properties:
        storageConfiguration:
          $ref: "#/components/schemas/StorageConfiguration"
          description: The StorageConfiguration that was created.
    StorageConfiguration:
      description: A complex type that describes a location where recorded videos will be stored.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/StorageConfigurationArn"
          description: ARN of the storage configuration.
        name:
          $ref: "#/components/schemas/StorageConfigurationName"
          description: Name of the storage configuration.
        s3:
          $ref: "#/components/schemas/S3StorageConfiguration"
          description: An S3 destination configuration where recorded videos will be stored.
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
      required:
        - arn
    StorageConfigurationArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:storage-configuration/[a-zA-Z0-9-]+
    DeleteEncoderConfigurationResponse:
      type: object
    Boolean:
      type: boolean
    DeleteIngestConfigurationResponse:
      type: object
    PublicKeyArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:public-key/[a-zA-Z0-9-]+
    DeletePublicKeyResponse:
      type: object
    DeleteStageResponse:
      type: object
    DeleteStorageConfigurationResponse:
      type: object
    DisconnectParticipantReason:
      type: string
      minLength: 0
      maxLength: 128
    DisconnectParticipantResponse:
      type: object
    CompositionArn:
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws:ivs:[a-z0-9-]+:[0-9]+:composition/[a-zA-Z0-9-]+
    GetCompositionResponse:
      type: object
      properties:
        composition:
          $ref: "#/components/schemas/Composition"
          description: The Composition that was returned.
    Composition:
      description: Object specifying a Composition resource.
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/CompositionArn"
          description: ARN of the Composition resource.
        stageArn:
          $ref: "#/components/schemas/StageArn"
          description: ARN of the stage used as input
        state:
          $ref: "#/components/schemas/CompositionState"
          description: State of the Composition.
        layout:
          $ref: "#/components/schemas/LayoutConfiguration"
          description: Layout object to configure composition parameters.
        destinations:
          $ref: "#/components/schemas/DestinationList"
          description: Array of Destination objects. A Composition can contain either one destination (channel or s3) or two (one channel and one s3).
        tags:
          type: object
          properties: {}
          description: Tags attached to the resource. Array of maps, each of the form string:string (key:value). See Best practices and strategies in Tagging AWS Resources and Tag Editor for details, including restrictions that apply to tags and "Tag naming limits and requirements"; Amazon IVS has no constraints on tags beyond what is documented there.
        startTime:
          $ref: "#/components/schemas/Time"
          description: UTC time of the Composition start. This is an ISO 8601 timestamp; note that this is returned as a string.
        endTime:
          $ref: "#/components/schemas/Time"
          description: UTC time of the Composition end. This is an ISO 8601 timestamp; note that this is returned as a string.
      required:
        - arn
        - stageArn
        - state
        - layout
        - destinations
    CompositionState:
      type: string
      enum:
        - STARTING
        - ACTIVE
        - STOPPING
        - FAILED
        - STOPPED
    LayoutConfiguration:
      description: Configuration information of supported layouts for server-side composition.
      type: object
      properties:
        grid:
          $ref: "#/components/schemas/GridConfiguration"
          description: "Configuration related to grid layout. Default: Grid layout."
        pip:
          $ref: "#/components/schemas/PipConfiguration"
          description: Configuration related to PiP layout.
    GridConfiguration:
      description: Configuration information specific to Grid layout, for server-side composition. See "Layouts" in Server-Side Composition.
      type: object
      properties:
        featuredParticipantAttribute:
          $ref: "#/components/schemas/AttributeKey"
          description: 'This attribute name identifies the featured slot. A participant with this attribute set to "true" (as a string value) in ParticipantTokenConfiguration is placed in the featured slot. Default: "" (no featured participant).'
        omitStoppedVideo:
          $ref: "#/components/schemas/OmitStoppedVideo"
          description: "Determines whether to omit participants with stopped video in the composition. Default: false."
        videoAspectRatio:
          $ref: "#/components/schemas/VideoAspectRatio"
          description: "Sets the non-featured participant display mode, to control the aspect ratio of video tiles. VIDEO is 16:9, SQUARE is 1:1, and PORTRAIT is 3:4. Default: VIDEO."
        videoFillMode:
          $ref: "#/components/schemas/VideoFillMode"
          description: "Defines how video content fits within the participant tile: FILL (stretched), COVER (cropped), or CONTAIN (letterboxed). When not set, videoFillMode defaults to COVER fill mode for participants in the grid and to CONTAIN fill mode for featured participants."
        gridGap:
          $ref: "#/components/schemas/GridGap"
          description: "Specifies the spacing between participant tiles in pixels. Default: 2."
        participantOrderAttribute:
          $ref: "#/components/schemas/AttributeKey"
          description: Attribute name in ParticipantTokenConfiguration identifying the participant ordering key. Participants with participantOrderAttribute set to "" or not specified are ordered based on their arrival time into the stage.
    AttributeKey:
      type: string
      minLength: 0
      maxLength: 128
      pattern: "[a-zA-Z0-9-_]*"
    OmitStoppedVideo:
      type: boolean
    VideoAspectRatio:
      type: string
      enum:
        - AUTO
        - VIDEO
        - SQUARE
        - PORTRAIT
    VideoFillMode:
      type: string
      enum:
        - FILL
        - COVER
        - CONTAIN
    GridGap:
      type: integer
      minimum: 0
    PipConfiguration:
      description: Configuration information specific to Picture-in-Picture (PiP) layout, for server-side composition.
      type: object
      properties:
        featuredParticipantAttribute:
          $ref: "#/components/schemas/AttributeKey"
          description: 'This attribute name identifies the featured slot. A participant with this attribute set to "true" (as a string value) in ParticipantTokenConfiguration is placed in the featured slot. Default: "" (no featured participant).'
        omitStoppedVideo:
          $ref: "#/components/schemas/OmitStoppedVideo"
          description: "Determines whether to omit participants with stopped video in the composition. Default: false."
        videoFillMode:
          $ref: "#/components/schemas/VideoFillMode"
          description: "Defines how video content fits within the participant tile: FILL (stretched), COVER (cropped), or CONTAIN (letterboxed). Default: COVER."
        gridGap:
          $ref: "#/components/schemas/GridGap"
          description: "Specifies the spacing between participant tiles in pixels. Default: 0."
        pipParticipantAttribute:
          $ref: "#/components/schemas/AttributeKey"
          description: 'Specifies the participant for the PiP window. A participant with this attribute set to "true" (as a string value) in ParticipantTokenConfiguration is placed in the PiP slot. Default: "" (no PiP participant).'
        pipBehavior:
          $ref: "#/components/schemas/PipBehavior"
          description: "Defines PiP behavior when all participants have left: STATIC (maintains original position/size) or DYNAMIC (expands to full composition). Default: STATIC."
        pipOffset:
          $ref: "#/components/schemas/PipOffset"
          description: "Sets the PiP window’s offset position in pixels from the closest edges determined by PipPosition. Default: 0."
        pipPosition:
          $ref: "#/components/schemas/PipPosition"
          description: "Determines the corner position of the PiP window. Default: BOTTOM_RIGHT."
        pipWidth:
          $ref: "#/components/schemas/PipWidth"
          description: Specifies the width of the PiP window in pixels. When this is not set explicitly, pipWidth’s value will be based on the size of the composition and the aspect ratio of the participant’s video.
        pipHeight:
          $ref: "#/components/schemas/PipHeight"
          description: Specifies the height of the PiP window in pixels. When this is not set explicitly, pipHeight’s value will be based on the size of the composition and the aspect ratio of the participant’s video.
        participantOrderAttribute:
          $ref: "#/components/schemas/AttributeKey"
          description: Attribute name in ParticipantTokenConfiguration identifying the participant ordering key. Participants with participantOrderAttribute set to "" or not specified are ordered based on their arrival time into the stage.
    PipBehavior:
      type: string
      enum:
        - STATIC
        - DYNAMIC
    PipOffset:
      type: integer
      minimum: 0
    PipPosition:
      type: string
      enum:
        - TOP_LEFT
        - TOP_RIGHT
        - BOTTOM_LEFT
        - BOTTOM_RIGHT
    PipWidth:
      type: integer
      minimum: 1
    PipHeight:
      type: integer
      minimum: 1
    DestinationList:
