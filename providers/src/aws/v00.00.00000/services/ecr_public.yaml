          description: The nextToken value to include in a future DescribeRepositories request. When the results of a DescribeRepositories request exceed maxResults, this value can be used to retrieve the next page of results. If there are no more results to return, this value is null.
    RepositoryList:
      type: array
      items:
        $ref: "#/components/schemas/Repository"
    GetAuthorizationTokenResponse:
      type: object
      properties:
        authorizationData:
