    AuthorizationData:
      description: An authorization token data object that corresponds to a public registry.
      type: object
      properties:
        authorizationToken:
          $ref: "#/components/schemas/Base64"
          description: A base64-encoded string that contains authorization data for a public Amazon ECR registry. When the string is decoded, it's presented in the format user:password for public registry authentication using docker login.
