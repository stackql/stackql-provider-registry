        Geometry:
          $ref: "#/components/schemas/PlaceGeometry"
        AddressNumber:
          $ref: "#/components/schemas/SensitiveString"
          description: The numerical portion of an address, such as a building number.
        Street:
          $ref: "#/components/schemas/SensitiveString"
          description: The name for a street or a road to identify a location. For example, Main Street.
        Neighborhood:
          $ref: "#/components/schemas/SensitiveString"
          description: The name of a community district. For example, Downtown.
        Municipality:
          $ref: "#/components/schemas/SensitiveString"
          description: A name for a local area, such as a city or town name. For example, Toronto.
        SubRegion:
          $ref: "#/components/schemas/SensitiveString"
          description: A county, or an area that's part of a larger region. For example, Metro Vancouver.
        Region:
          $ref: "#/components/schemas/SensitiveString"
          description: A name for an area or geographical division, such as a province or state name. For example, British Columbia.
        Country:
          $ref: "#/components/schemas/SensitiveString"
          description: A country/region specified using ISO 3166 3-digit country/region code. For example, CAN.
        PostalCode:
          $ref: "#/components/schemas/SensitiveString"
