    ApiKeyRestrictions:
      description: API Restrictions on the allowed actions, resources, and referers for an API key resource.
      type: object
      properties:
        AllowActions:
          $ref: "#/components/schemas/ApiKeyRestrictionsAllowActionsList"
          description: A list of allowed actions that an API key resource grants permissions to perform. You must have at least one action for each type of resource. For example, if you have a place resource, you must include at least one place action. The following are valid values for the actions. Map actions geo:GetMap* - Allows all actions needed for map rendering. geo-maps:GetTile - Allows retrieving map tiles. geo-maps:GetStaticMap - Allows retrieving static map images. geo-maps:* - Allows all actions related to map functionalities. Place actions geo:SearchPlaceIndexForText - Allows geocoding. geo:SearchPlaceIndexForPosition - Allows reverse geocoding. geo:SearchPlaceIndexForSuggestions - Allows generating suggestions from text. GetPlace - Allows finding a place by place ID. geo-places:Geocode - Allows geocoding using place information. geo-places:ReverseGeocode - Allows reverse geocoding from location coordinates. geo-places:SearchNearby - Allows searching for places near a location. geo-places:SearchText - Allows searching for places based on text input. geo-places:Autocomplete - Allows auto-completion of place names based on text input. geo-places:Suggest - Allows generating suggestions for places based on partial input. geo-places:GetPlace - Allows finding a place by its ID. geo-places:* - Allows all actions related to place services. Route actions geo:CalculateRoute - Allows point to point routing. geo:CalculateRouteMatrix - Allows calculating a matrix of routes. geo-routes:CalculateRoutes - Allows calculating multiple routes between points. geo-routes:CalculateRouteMatrix - Allows calculating a matrix of routes between points. geo-routes:CalculateIsolines - Allows calculating isolines for a given area. geo-routes:OptimizeWaypoints - Allows optimizing the order of waypoints in a route. geo-routes:SnapToRoads - Allows snapping a route to the nearest roads. geo-routes:* - Allows all actions related to routing functionalities. You must use these strings exactly. For example, to provide access to map rendering, the only valid action is geo:GetMap* as an input to the list. ["geo:GetMap*"] is valid but ["geo:GetMapTile"] is not. Similarly, you cannot use ["geo:SearchPlaceIndexFor*"] - you must list each of the Place actions separately.
        AllowResources:
          $ref: "#/components/schemas/ApiKeyRestrictionsAllowResourcesList"
          description: A list of allowed resource ARNs that a API key bearer can perform actions on. The ARN must be the correct ARN for a map, place, or route ARN. You may include wildcards in the resource-id to match multiple resources of the same type. The resources must be in the same partition, region, and account-id as the key that is being created. Other than wildcards, you must include the full ARN, including the arn, partition, service, region, account-id and resource-id delimited by colons (:). No spaces allowed, even with wildcards. For example, arn:aws:geo:region:account-id:map/ExampleMap*. For more information about ARN format, see Amazon Resource Names (ARNs).
        AllowReferers:
          $ref: "#/components/schemas/ApiKeyRestrictionsAllowReferersList"
          description: "An optional list of allowed HTTP referers for which requests must originate from. Requests using this API key from other domains will not be allowed. Requirements: Contain only alphanumeric characters (A–Z, a–z, 0–9) or any symbols in this list $\\-._+!*`(),;/?:@=& May contain a percent (%) if followed by 2 hexadecimal digits (A-F, a-f, 0-9); this is used for URL encoding purposes. May contain wildcard characters question mark (?) and asterisk (*). Question mark (?) will replace any single character (including hexadecimal digits). Asterisk (*) will replace any multiple characters (including multiple hexadecimal digits). No spaces allowed. For example, https://example.com."
        AllowAndroidApps:
          $ref: "#/components/schemas/ApiKeyRestrictionsAllowAndroidAppsList"
          description: An optional list of allowed Android applications for which requests must originate from. Requests using this API key from other sources will not be allowed.
        AllowAppleApps:
          $ref: "#/components/schemas/ApiKeyRestrictionsAllowAppleAppsList"
          description: An optional list of allowed Apple applications for which requests must originate from. Requests using this API key from other sources will not be allowed.
      required:
        - AllowActions
        - AllowResources
    ApiKeyRestrictionsAllowActionsList:
      type: array
      items:
        $ref: "#/components/schemas/ApiKeyAction"
    ApiKeyAction:
      type: string
      minLength: 5
      maxLength: 200
      pattern: (geo|geo-routes|geo-places|geo-maps):\w*\*?
    ApiKeyRestrictionsAllowResourcesList:
      type: array
      items:
        $ref: "#/components/schemas/GeoArnV2"
    GeoArnV2:
      type: string
      minLength: 0
      maxLength: 1600
      pattern: .*(^arn(:[a-z0-9]+([.-][a-z0-9]+)*):geo(:([a-z0-9]+([.-][a-z0-9]+)*))(:[0-9]+):((\*)|([-a-z]+[/][*-._\w]+))$)|(^arn(:[a-z0-9]+([.-][a-z0-9]+)*):(geo-routes|geo-places|geo-maps)(:((\*)|([a-z0-9]+([.-][a-z0-9]+)*)))::((provider[\/][*-._\w]+))$).*
    ApiKeyRestrictionsAllowReferersList:
      type: array
      items:
        $ref: "#/components/schemas/RefererPattern"
    RefererPattern:
      type: string
      minLength: 0
      maxLength: 253
      pattern: ([\w!$&()*+,./:;=?@\x{60}-]|%([\dA-Fa-f]{2}|[\dA-Fa-f]?\*))+
    ApiKeyRestrictionsAllowAndroidAppsList:
      type: array
      items:
        $ref: "#/components/schemas/AndroidApp"
    AndroidApp:
      description: Unique identifying information for an Android app. Consists of a package name and a 20 byte SHA-1 certificate fingerprint.
      type: object
      properties:
        Package:
          $ref: "#/components/schemas/AndroidPackageName"
          description: "Unique package name identifier for an Android app. Example: com.mydomain.appname"
        CertificateFingerprint:
          $ref: "#/components/schemas/Sha1CertificateFingerprint"
          description: "20 byte SHA-1 certificate fingerprint associated with the Android app signing certificate. Example: BB:0D:AC:74:D3:21:E1:43:67:71:9B:62:91:AF:A1:66:6E:44:5D:75"
      required:
        - Package
        - CertificateFingerprint
    AndroidPackageName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ([A-Za-z][A-Za-z\d_]*\.)+[A-Za-z][A-Za-z\d_]*
    Sha1CertificateFingerprint:
      type: string
      minLength: 59
      maxLength: 59
      pattern: ([A-Fa-f0-9]{2}:){19}[A-Fa-f0-9]{2}
    ApiKeyRestrictionsAllowAppleAppsList:
      type: array
      items:
        $ref: "#/components/schemas/AppleApp"
    AppleApp:
      description: Unique identifying information for an Apple app (iOS, macOS, tvOS and watchOS). Consists of an Apple Bundle ID.
      type: object
      properties:
        BundleId:
          $ref: "#/components/schemas/AppleBundleId"
          description: "The unique identifier of the app across all Apple platforms (iOS, macOS, tvOS and watchOS). Example: com.mydomain.appname"
      required:
        - BundleId
    AppleBundleId:
      type: string
      minLength: 1
      maxLength: 155
      pattern: "[A-Za-z0-9\\-]+(\\.[A-Za-z0-9\\-]+)+"
    Boolean:
      type: boolean
    CreateKeyResponse:
      type: object
      properties:
        Key:
