        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[-._\\w]+"
    Arn:
      type: string
      minLength: 0
      maxLength: 1600
      pattern: arn(:[a-z0-9]+([.-][a-z0-9]+)*){2}(:([a-z0-9]+([.-][a-z0-9]+)*)?){2}:([^/].*)?
    AssociateTrackerConsumerResponse:
      type: object
    BatchDeleteDevicePositionHistoryRequestDeviceIdsList:
      type: array
      items:
        $ref: "#/components/schemas/Id"
    Id:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[-._\\p{L}\\p{N}]+"
    BatchDeleteDevicePositionHistoryResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchDeleteDevicePositionHistoryErrorList"
          description: Contains error details for each device history that failed to delete.
      required:
        - Errors
    BatchDeleteDevicePositionHistoryErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteDevicePositionHistoryError"
    BatchDeleteDevicePositionHistoryError:
      description: Contains the tracker resource details.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The ID of the device for this position.
        Error:
          $ref: "#/components/schemas/BatchItemError"
      required:
        - DeviceId
        - Error
    BatchItemError:
      description: Contains the batch request error details associated with the request.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/BatchItemErrorCode"
          description: The error code associated with the batch request error.
        Message:
          $ref: "#/components/schemas/String"
          description: A message with the reason for the batch request error.
    BatchItemErrorCode:
      type: string
      enum:
        - AccessDeniedError
        - ConflictError
        - InternalServerError
        - ResourceNotFoundError
        - ThrottlingError
        - ValidationError
    String:
      type: string
    BatchDeleteGeofenceRequestGeofenceIdsList:
      type: array
      items:
        $ref: "#/components/schemas/Id"
    BatchDeleteGeofenceResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchDeleteGeofenceErrorList"
          description: Contains error details for each geofence that failed to delete.
      required:
        - Errors
    BatchDeleteGeofenceErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchDeleteGeofenceError"
    BatchDeleteGeofenceError:
      description: Contains error details for each geofence that failed to delete from the geofence collection.
      type: object
      properties:
        GeofenceId:
          $ref: "#/components/schemas/Id"
          description: The geofence associated with the error message.
        Error:
          $ref: "#/components/schemas/BatchItemError"
          description: Contains details associated to the batch error.
      required:
        - GeofenceId
        - Error
    BatchEvaluateGeofencesRequestDevicePositionUpdatesList:
      type: array
      items:
        $ref: "#/components/schemas/DevicePositionUpdate"
    DevicePositionUpdate:
      description: Contains the position update details for a device.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The device associated to the position update.
        SampleTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp at which the device's position was determined. Uses ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ"
        Position:
          $ref: "#/components/schemas/Position"
          description: "The latest device position defined in WGS 84 format: [X or longitude, Y or latitude]."
        Accuracy:
          $ref: "#/components/schemas/PositionalAccuracy"
          description: The accuracy of the device position.
        PositionProperties:
          type: object
          properties: {}
          description: 'Associates one of more properties with the position update. A property is a key-value pair stored with the position update and added to any geofence event the update may trigger. Format: "key" : "value"'
      required:
        - DeviceId
        - SampleTime
        - Position
    Timestamp:
      type: string
      format: date-time
    Position:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    Double:
      type: number
      format: double
    PositionalAccuracy:
      description: Defines the level of certainty of the position.
      type: object
      properties:
        Horizontal:
          $ref: "#/components/schemas/PositionalAccuracyHorizontalDouble"
          description: Estimated maximum distance, in meters, between the measured position and the true position of a device, along the Earth's surface.
      required:
        - Horizontal
    PositionalAccuracyHorizontalDouble:
      type: number
      format: double
      minimum: 0
      maximum: 10000000
    BatchEvaluateGeofencesResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchEvaluateGeofencesErrorList"
          description: Contains error details for each device that failed to evaluate its position against the given geofence collection.
      required:
        - Errors
    BatchEvaluateGeofencesErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchEvaluateGeofencesError"
    BatchEvaluateGeofencesError:
      description: Contains error details for each device that failed to evaluate its position against the geofences in a given geofence collection.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The device associated with the position evaluation error.
        SampleTime:
          $ref: "#/components/schemas/Timestamp"
          description: "Specifies a timestamp for when the error occurred in ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ"
        Error:
          $ref: "#/components/schemas/BatchItemError"
          description: Contains details associated to the batch error.
      required:
        - DeviceId
        - SampleTime
        - Error
    BatchGetDevicePositionRequestTrackerNameString:
      type: string
      minLength: 1
      pattern: "[-._\\w]+"
    BatchGetDevicePositionRequestDeviceIdsList:
      type: array
      items:
        $ref: "#/components/schemas/Id"
    BatchGetDevicePositionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchGetDevicePositionErrorList"
          description: Contains error details for each device that failed to send its position to the tracker resource.
        DevicePositions:
          $ref: "#/components/schemas/DevicePositionList"
          description: Contains device position details such as the device ID, position, and timestamps for when the position was received and sampled.
      required:
        - Errors
        - DevicePositions
    BatchGetDevicePositionErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetDevicePositionError"
    BatchGetDevicePositionError:
      description: Contains error details for each device that didn't return a position.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The ID of the device that didn't return a position.
        Error:
          $ref: "#/components/schemas/BatchItemError"
          description: Contains details related to the error code.
      required:
        - DeviceId
        - Error
    DevicePositionList:
      type: array
      items:
        $ref: "#/components/schemas/DevicePosition"
    DevicePosition:
      description: Contains the device position details.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The device whose position you retrieved.
        SampleTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp at which the device's position was determined. Uses ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ."
        ReceivedTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp for when the tracker resource received the device position in ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ."
        Position:
          $ref: "#/components/schemas/Position"
          description: The last known device position.
        Accuracy:
          $ref: "#/components/schemas/PositionalAccuracy"
          description: The accuracy of the device position.
        PositionProperties:
          type: object
          properties: {}
          description: The properties associated with the position.
      required:
        - SampleTime
        - ReceivedTime
        - Position
    BatchPutGeofenceRequestEntriesList:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutGeofenceRequestEntry"
    BatchPutGeofenceRequestEntry:
      description: Contains geofence geometry details.
      type: object
      properties:
        GeofenceId:
          $ref: "#/components/schemas/Id"
          description: The identifier for the geofence to be stored in a given geofence collection.
        Geometry:
          $ref: "#/components/schemas/GeofenceGeometry"
          description: Contains the details to specify the position of the geofence. Can be a circle, a polygon, or a multipolygon. Polygon and MultiPolygon geometries can be defined using their respective parameters, or encoded in Geobuf format using the Geobuf parameter. Including multiple geometry types in the same request will return a validation error. The geofence Polygon and MultiPolygon formats support a maximum of 1,000 total vertices. The Geobuf format supports a maximum of 100,000 vertices.
        GeofenceProperties:
          type: object
          properties: {}
          description: 'Associates one of more properties with the geofence. A property is a key-value pair stored with the geofence and added to any geofence event triggered with that geofence. Format: "key" : "value"'
      required:
        - GeofenceId
        - Geometry
    GeofenceGeometry:
      description: Contains the geofence geometry details. A geofence geometry can be a circle, a polygon, or a multipolygon. Polygon and MultiPolygon geometries can be defined using their respective parameters, or encoded in Geobuf format using the Geobuf parameter. Including multiple geometry types in the same request will return a validation error. Amazon Location doesn't currently support polygons that cross the antimeridian.
      type: object
      properties:
        Polygon:
          $ref: "#/components/schemas/GeofenceGeometryPolygonList"
          description: "A Polygon is a list of up to 250 linear rings which represent the shape of a geofence. This list must include 1 exterior ring (representing the outer perimeter of the geofence), and can optionally include up to 249 interior rings (representing polygonal spaces within the perimeter, which are excluded from the geofence area). A linear ring is an array of 4 or more vertices, where the first and last vertex are the same (to form a closed boundary). Each vertex is a 2-dimensional point represented as an array of doubles of length 2: [longitude, latitude]. Each linear ring is represented as an array of arrays of doubles ([[longitude, latitude], [longitude, latitude], ...]). The vertices for the exterior ring must be listed in counter-clockwise sequence. Vertices for all interior rings must be listed in clockwise sequence. The list of linear rings that describe the entire Polygon is represented as an array of arrays of arrays of doubles ([[[longitude, latitude], [longitude, latitude], ...], [[longitude, latitude], [longitude, latitude], ...], ...]). The exterior ring must be listed first, before any interior rings. The following additional requirements and limitations apply to geometries defined using the Polygon parameter: The entire Polygon must consist of no more than 1,000 vertices, including all vertices from the exterior ring and all interior rings. Rings must not touch or cross each other. All interior rings must be fully contained within the exterior ring. Interior rings must not contain other interior rings. No ring is permitted to intersect itself."
        Circle:
          $ref: "#/components/schemas/Circle"
          description: A circle on the earth, as defined by a center point and a radius.
        Geobuf:
          $ref: "#/components/schemas/Base64EncodedGeobuf"
          description: "Geobuf is a compact binary encoding for geographic data that provides lossless compression of GeoJSON polygons. The Geobuf must be Base64-encoded. This parameter can contain a Geobuf-encoded GeoJSON geometry object of type Polygon OR MultiPolygon. For more information and specific configuration requirements for these object types, see Polygon and MultiPolygon. The following limitations apply specifically to geometries defined using the Geobuf parameter, and supercede the corresponding limitations of the Polygon and MultiPolygon parameters: A Polygon in Geobuf format can have up to 25,000 rings and up to 100,000 total vertices, including all vertices from all component rings. A MultiPolygon in Geobuf format can contain up to 10,000 Polygons and up to 100,000 total vertices, including all vertices from all component Polygons."
        MultiPolygon:
          $ref: "#/components/schemas/GeofenceGeometryMultiPolygonList"
          description: "A MultiPolygon is a list of up to 250 Polygon elements which represent the shape of a geofence. The Polygon components of a MultiPolygon geometry can define separate geographical areas that are considered part of the same geofence, perimeters of larger exterior areas with smaller interior spaces that are excluded from the geofence, or some combination of these use cases to form complex geofence boundaries. For more information and specific configuration requirements for the Polygon components that form a MultiPolygon, see Polygon. The following additional requirements and limitations apply to geometries defined using the MultiPolygon parameter: The entire MultiPolygon must consist of no more than 1,000 vertices, including all vertices from all component Polygons. Each edge of a component Polygon must intersect no more than 5 edges from other Polygons. Parallel edges that are shared but do not cross are not counted toward this limit. The total number of intersecting edges of component Polygons must be no more than 100,000. Parallel edges that are shared but do not cross are not counted toward this limit."
    GeofenceGeometryPolygonList:
      type: array
      items:
        $ref: "#/components/schemas/LinearRing"
    LinearRing:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    Circle:
      description: A circle on the earth, as defined by a center point and a radius.
      type: object
      properties:
        Center:
          $ref: "#/components/schemas/Position"
          description: A single point geometry, specifying the center of the circle, using WGS 84 coordinates, in the form [longitude, latitude].
        Radius:
          $ref: "#/components/schemas/SensitiveDouble"
          description: The radius of the circle in meters. Must be greater than zero and no larger than 100,000 (100 kilometers).
      required:
        - Center
        - Radius
    SensitiveDouble:
      type: number
      format: double
    Base64EncodedGeobuf:
      type: string
      format: byte
      minLength: 0
      maxLength: 700000
    GeofenceGeometryMultiPolygonList:
      type: array
      items:
        $ref: "#/components/schemas/LinearRings"
    LinearRings:
      type: array
      items:
        $ref: "#/components/schemas/LinearRing"
    BatchPutGeofenceResponse:
      type: object
      properties:
        Successes:
          $ref: "#/components/schemas/BatchPutGeofenceSuccessList"
          description: Contains each geofence that was successfully stored in a geofence collection.
        Errors:
          $ref: "#/components/schemas/BatchPutGeofenceErrorList"
          description: Contains additional error details for each geofence that failed to be stored in a geofence collection.
      required:
        - Successes
        - Errors
    BatchPutGeofenceSuccessList:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutGeofenceSuccess"
    BatchPutGeofenceSuccess:
      description: Contains a summary of each geofence that was successfully stored in a given geofence collection.
      type: object
      properties:
        GeofenceId:
          $ref: "#/components/schemas/Id"
          description: The geofence successfully stored in a geofence collection.
        CreateTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp for when the geofence was stored in a geofence collection in ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ"
        UpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp for when the geofence was last updated in ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ"
      required:
        - GeofenceId
        - CreateTime
        - UpdateTime
    BatchPutGeofenceErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchPutGeofenceError"
    BatchPutGeofenceError:
      description: Contains error details for each geofence that failed to be stored in a given geofence collection.
      type: object
      properties:
        GeofenceId:
          $ref: "#/components/schemas/Id"
          description: The geofence associated with the error message.
        Error:
          $ref: "#/components/schemas/BatchItemError"
          description: Contains details associated to the batch error.
      required:
        - GeofenceId
        - Error
    BatchUpdateDevicePositionRequestUpdatesList:
      type: array
      items:
        $ref: "#/components/schemas/DevicePositionUpdate"
    BatchUpdateDevicePositionResponse:
      type: object
      properties:
        Errors:
          $ref: "#/components/schemas/BatchUpdateDevicePositionErrorList"
          description: Contains error details for each device that failed to update its position.
      required:
        - Errors
    BatchUpdateDevicePositionErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateDevicePositionError"
    BatchUpdateDevicePositionError:
      description: Contains error details for each device that failed to update its position.
      type: object
      properties:
        DeviceId:
          $ref: "#/components/schemas/Id"
          description: The device associated with the failed location update.
        SampleTime:
          $ref: "#/components/schemas/Timestamp"
          description: "The timestamp at which the device position was determined. Uses ISO 8601 format: YYYY-MM-DDThh:mm:ss.sssZ."
        Error:
          $ref: "#/components/schemas/BatchItemError"
          description: Contains details related to the error code such as the error code and error message.
      required:
        - DeviceId
        - SampleTime
        - Error
    ApiKey:
      type: string
      minLength: 0
      maxLength: 1000
    CalculateRouteRequestWaypointPositionsList:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    TravelMode:
      type: string
      enum:
        - Car
        - Truck
        - Walking
        - Bicycle
        - Motorcycle
    SensitiveBoolean:
      type: boolean
    DistanceUnit:
      type: string
      enum:
        - Kilometers
        - Miles
    CalculateRouteCarModeOptions:
      description: Contains details about additional route preferences for requests that specify TravelMode as Car.
      type: object
      properties:
        AvoidFerries:
          $ref: "#/components/schemas/SensitiveBoolean"
          description: "Avoids ferries when calculating routes. Default Value: false Valid Values: false | true"
        AvoidTolls:
          $ref: "#/components/schemas/SensitiveBoolean"
          description: "Avoids tolls when calculating routes. Default Value: false Valid Values: false | true"
    CalculateRouteTruckModeOptions:
      description: Contains details about additional route preferences for requests that specify TravelMode as Truck.
      type: object
      properties:
        AvoidFerries:
          $ref: "#/components/schemas/SensitiveBoolean"
          description: "Avoids ferries when calculating routes. Default Value: false Valid Values: false | true"
        AvoidTolls:
          $ref: "#/components/schemas/SensitiveBoolean"
          description: "Avoids tolls when calculating routes. Default Value: false Valid Values: false | true"
        Dimensions:
          $ref: "#/components/schemas/TruckDimensions"
          description: Specifies the truck's dimension specifications including length, height, width, and unit of measurement. Used to avoid roads that can't support the truck's dimensions.
        Weight:
          $ref: "#/components/schemas/TruckWeight"
          description: Specifies the truck's weight specifications including total weight and unit of measurement. Used to avoid roads that can't support the truck's weight.
    TruckDimensions:
      description: Contains details about the truck dimensions in the unit of measurement that you specify. Used to filter out roads that can't support or allow the specified dimensions for requests that specify TravelMode as Truck.
      type: object
      properties:
        Length:
          $ref: "#/components/schemas/TruckDimensionsLengthDouble"
          description: The length of the truck. For example, 15.5. For routes calculated with a HERE resource, this value must be between 0 and 300 meters.
        Height:
          $ref: "#/components/schemas/TruckDimensionsHeightDouble"
          description: The height of the truck. For example, 4.5. For routes calculated with a HERE resource, this value must be between 0 and 50 meters.
        Width:
          $ref: "#/components/schemas/TruckDimensionsWidthDouble"
          description: The width of the truck. For example, 4.5. For routes calculated with a HERE resource, this value must be between 0 and 50 meters.
        Unit:
          $ref: "#/components/schemas/DimensionUnit"
          description: "Specifies the unit of measurement for the truck dimensions. Default Value: Meters"
    TruckDimensionsLengthDouble:
      type: number
      format: double
      minimum: 0
    TruckDimensionsHeightDouble:
      type: number
      format: double
      minimum: 0
    TruckDimensionsWidthDouble:
      type: number
      format: double
      minimum: 0
    DimensionUnit:
      type: string
      enum:
        - Meters
        - Feet
    TruckWeight:
      description: Contains details about the truck's weight specifications. Used to avoid roads that can't support or allow the total weight for requests that specify TravelMode as Truck.
      type: object
      properties:
        Total:
          $ref: "#/components/schemas/TruckWeightTotalDouble"
          description: The total weight of the truck. For example, 3500.
        Unit:
          $ref: "#/components/schemas/VehicleWeightUnit"
          description: "The unit of measurement to use for the truck weight. Default Value: Kilograms"
    TruckWeightTotalDouble:
      type: number
      format: double
      minimum: 0
    VehicleWeightUnit:
      type: string
      enum:
        - Kilograms
        - Pounds
    OptimizationMode:
      type: string
      enum:
        - FastestRoute
        - ShortestRoute
    CalculateRouteResponse:
      description: Returns the result of the route calculation. Metadata includes legs and route summary.
      type: object
      properties:
        Legs:
          $ref: "#/components/schemas/LegList"
          description: "Contains details about each path between a pair of positions included along a route such as: StartPosition, EndPosition, Distance, DurationSeconds, Geometry, and Steps. The number of legs returned corresponds to one fewer than the total number of positions in the request. For example, a route with a departure position and destination position returns one leg with the positions snapped to a nearby road: The StartPosition is the departure position. The EndPosition is the destination position. A route with a waypoint between the departure and destination position returns two legs with the positions snapped to a nearby road: Leg 1: The StartPosition is the departure position . The EndPosition is the waypoint positon. Leg 2: The StartPosition is the waypoint position. The EndPosition is the destination position."
        Summary:
          $ref: "#/components/schemas/CalculateRouteSummary"
          description: "Contains information about the whole route, such as: RouteBBox, DataSource, Distance, DistanceUnit, and DurationSeconds."
      required:
        - Legs
        - Summary
    LegList:
      type: array
      items:
        $ref: "#/components/schemas/Leg"
    Leg:
      description: "Contains the calculated route's details for each path between a pair of positions. The number of legs returned corresponds to one fewer than the total number of positions in the request. For example, a route with a departure position and destination position returns one leg with the positions snapped to a nearby road: The StartPosition is the departure position. The EndPosition is the destination position. A route with a waypoint between the departure and destination position returns two legs with the positions snapped to a nearby road: Leg 1: The StartPosition is the departure position . The EndPosition is the waypoint positon. Leg 2: The StartPosition is the waypoint position. The EndPosition is the destination position."
      type: object
      properties:
        StartPosition:
          $ref: "#/components/schemas/Position"
          description: The starting position of the leg. Follows the format [longitude,latitude]. If the StartPosition isn't located on a road, it's snapped to a nearby road.
        EndPosition:
          $ref: "#/components/schemas/Position"
          description: The terminating position of the leg. Follows the format [longitude,latitude]. If the EndPosition isn't located on a road, it's snapped to a nearby road.
        Distance:
          $ref: "#/components/schemas/LegDistanceDouble"
          description: The distance between the leg's StartPosition and EndPosition along a calculated route. The default measurement is Kilometers unless the request specifies a DistanceUnit of Miles.
        DurationSeconds:
          $ref: "#/components/schemas/LegDurationSecondsDouble"
          description: The estimated travel time between the leg's StartPosition and EndPosition. The travel mode and departure time that you specify in the request determines the calculated time.
        Geometry:
          $ref: "#/components/schemas/LegGeometry"
          description: Contains the calculated route's path as a linestring geometry.
        Steps:
          $ref: "#/components/schemas/StepList"
          description: Contains a list of steps, which represent subsections of a leg. Each step provides instructions for how to move to the next step in the leg such as the step's start position, end position, travel distance, travel duration, and geometry offset.
      required:
        - StartPosition
        - EndPosition
        - Distance
        - DurationSeconds
        - Steps
    LegDistanceDouble:
      type: number
      format: double
      minimum: 0
    LegDurationSecondsDouble:
      type: number
      format: double
      minimum: 0
    LegGeometry:
      description: Contains the geometry details for each path between a pair of positions. Used in plotting a route leg on a map.
      type: object
      properties:
        LineString:
          $ref: "#/components/schemas/LineString"
          description: An ordered list of positions used to plot a route on a map. The first position is closest to the start position for the leg, and the last position is the closest to the end position for the leg. For example, [[-123.117, 49.284],[-123.115, 49.285],[-123.115, 49.285]]
    LineString:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    StepList:
      type: array
      items:
        $ref: "#/components/schemas/Step"
    Step:
      description: Represents an element of a leg within a route. A step contains instructions for how to move to the next step in the leg.
      type: object
      properties:
        StartPosition:
          $ref: "#/components/schemas/Position"
          description: The starting position of a step. If the position is the first step in the leg, this position is the same as the start position of the leg.
        EndPosition:
          $ref: "#/components/schemas/Position"
          description: The end position of a step. If the position the last step in the leg, this position is the same as the end position of the leg.
        Distance:
          $ref: "#/components/schemas/StepDistanceDouble"
          description: The travel distance between the step's StartPosition and EndPosition.
        DurationSeconds:
          $ref: "#/components/schemas/StepDurationSecondsDouble"
          description: The estimated travel time, in seconds, from the step's StartPosition to the EndPosition. . The travel mode and departure time that you specify in the request determines the calculated time.
        GeometryOffset:
          $ref: "#/components/schemas/StepGeometryOffsetInteger"
          description: Represents the start position, or index, in a sequence of steps within the leg's line string geometry. For example, the index of the first step in a leg geometry is 0. Included in the response for queries that set IncludeLegGeometry to True.
      required:
        - StartPosition
        - EndPosition
        - Distance
        - DurationSeconds
    StepDistanceDouble:
      type: number
      format: double
      minimum: 0
    StepDurationSecondsDouble:
      type: number
      format: double
      minimum: 0
    StepGeometryOffsetInteger:
      type: integer
      minimum: 0
    CalculateRouteSummary:
      description: A summary of the calculated route.
      type: object
      properties:
        RouteBBox:
          $ref: "#/components/schemas/BoundingBox"
          description: "Specifies a geographical box surrounding a route. Used to zoom into a route when displaying it in a map. For example, [min x, min y, max x, max y]. The first 2 bbox parameters describe the lower southwest corner: The first bbox position is the X coordinate or longitude of the lower southwest corner. The second bbox position is the Y coordinate or latitude of the lower southwest corner. The next 2 bbox parameters describe the upper northeast corner: The third bbox position is the X coordinate, or longitude of the upper northeast corner. The fourth bbox position is the Y coordinate, or latitude of the upper northeast corner."
        DataSource:
          $ref: "#/components/schemas/String"
          description: "The data provider of traffic and road network data used to calculate the route. Indicates one of the available providers: Esri Grab Here For more information about data providers, see Amazon Location Service data providers."
        Distance:
          $ref: "#/components/schemas/CalculateRouteSummaryDistanceDouble"
          description: The total distance covered by the route. The sum of the distance travelled between every stop on the route. If Esri is the data source for the route calculator, the route distance can’t be greater than 400 km. If the route exceeds 400 km, the response is a 400 RoutesValidationException error.
        DurationSeconds:
          $ref: "#/components/schemas/CalculateRouteSummaryDurationSecondsDouble"
          description: The total travel time for the route measured in seconds. The sum of the travel time between every stop on the route.
        DistanceUnit:
          $ref: "#/components/schemas/DistanceUnit"
          description: The unit of measurement for route distances.
      required:
        - RouteBBox
        - DataSource
        - Distance
        - DurationSeconds
        - DistanceUnit
    BoundingBox:
      type: array
      items:
        $ref: "#/components/schemas/Double"
    CalculateRouteSummaryDistanceDouble:
      type: number
      format: double
      minimum: 0
    CalculateRouteSummaryDurationSecondsDouble:
      type: number
      format: double
      minimum: 0
    CalculateRouteMatrixRequestDeparturePositionsList:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    CalculateRouteMatrixRequestDestinationPositionsList:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    CalculateRouteMatrixResponse:
      description: Returns the result of the route matrix calculation.
      type: object
      properties:
        RouteMatrix:
          $ref: "#/components/schemas/RouteMatrix"
          description: The calculated route matrix containing the results for all pairs of DeparturePositions to DestinationPositions. Each row corresponds to one entry in DeparturePositions. Each entry in the row corresponds to the route from that entry in DeparturePositions to an entry in DestinationPositions.
        SnappedDeparturePositions:
          $ref: "#/components/schemas/CalculateRouteMatrixResponseSnappedDeparturePositionsList"
          description: For routes calculated using an Esri route calculator resource, departure positions are snapped to the closest road. For Esri route calculator resources, this returns the list of departure/origin positions used for calculation of the RouteMatrix.
        SnappedDestinationPositions:
          $ref: "#/components/schemas/CalculateRouteMatrixResponseSnappedDestinationPositionsList"
          description: The list of destination positions for the route matrix used for calculation of the RouteMatrix.
        Summary:
          $ref: "#/components/schemas/CalculateRouteMatrixSummary"
          description: Contains information about the route matrix, DataSource, DistanceUnit, RouteCount and ErrorCount.
      required:
        - RouteMatrix
        - Summary
    RouteMatrix:
      type: array
      items:
        $ref: "#/components/schemas/RouteMatrixRow"
    RouteMatrixRow:
      type: array
      items:
        $ref: "#/components/schemas/RouteMatrixEntry"
    RouteMatrixEntry:
      description: The result for the calculated route of one DeparturePosition DestinationPosition pair.
      type: object
      properties:
        Distance:
          $ref: "#/components/schemas/RouteMatrixEntryDistanceDouble"
          description: The total distance of travel for the route.
        DurationSeconds:
          $ref: "#/components/schemas/RouteMatrixEntryDurationSecondsDouble"
          description: The expected duration of travel for the route.
        Error:
          $ref: "#/components/schemas/RouteMatrixEntryError"
          description: An error corresponding to the calculation of a route between the DeparturePosition and DestinationPosition.
    RouteMatrixEntryDistanceDouble:
      type: number
      format: double
      minimum: 0
    RouteMatrixEntryDurationSecondsDouble:
      type: number
      format: double
      minimum: 0
    RouteMatrixEntryError:
      description: "An error corresponding to the calculation of a route between the DeparturePosition and DestinationPosition. The error code can be one of the following: RouteNotFound - Unable to find a valid route with the given parameters. RouteTooLong - Route calculation went beyond the maximum size of a route and was terminated before completion. PositionsNotFound - One or more of the input positions were not found on the route network. DestinationPositionNotFound - The destination position was not found on the route network. DeparturePositionNotFound - The departure position was not found on the route network. OtherValidationError - The given inputs were not valid or a route was not found. More information is given in the error Message"
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/RouteMatrixErrorCode"
          description: The type of error which occurred for the route calculation.
        Message:
          $ref: "#/components/schemas/String"
          description: A message about the error that occurred for the route calculation.
      required:
        - Code
    RouteMatrixErrorCode:
      type: string
      enum:
        - RouteNotFound
        - RouteTooLong
        - PositionsNotFound
        - DestinationPositionNotFound
        - DeparturePositionNotFound
        - OtherValidationError
    CalculateRouteMatrixResponseSnappedDeparturePositionsList:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    CalculateRouteMatrixResponseSnappedDestinationPositionsList:
      type: array
      items:
        $ref: "#/components/schemas/Position"
    CalculateRouteMatrixSummary:
      description: A summary of the calculated route matrix.
      type: object
      properties:
        DataSource:
          $ref: "#/components/schemas/String"
          description: "The data provider of traffic and road network data used to calculate the routes. Indicates one of the available providers: Esri Grab Here For more information about data providers, see Amazon Location Service data providers."
        RouteCount:
          $ref: "#/components/schemas/CalculateRouteMatrixSummaryRouteCountInteger"
          description: The count of cells in the route matrix. Equal to the number of DeparturePositions multiplied by the number of DestinationPositions.
        ErrorCount:
          $ref: "#/components/schemas/CalculateRouteMatrixSummaryErrorCountInteger"
          description: The count of error results in the route matrix. If this number is 0, all routes were calculated successfully.
        DistanceUnit:
          $ref: "#/components/schemas/DistanceUnit"
          description: The unit of measurement for route distances.
      required:
        - DataSource
        - RouteCount
        - ErrorCount
        - DistanceUnit
    CalculateRouteMatrixSummaryRouteCountInteger:
      type: integer
      minimum: 1
      maximum: 160000
    CalculateRouteMatrixSummaryErrorCountInteger:
      type: integer
      minimum: 1
      maximum: 160000
