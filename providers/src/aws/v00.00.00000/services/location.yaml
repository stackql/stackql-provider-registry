  /places/v0/indexes/{index_name}/search/suggestions:
    post:
      operationId: SearchPlaceIndexForSuggestions
      description: This operation is no longer current and may be deprecated in the future. We recommend you upgrade to Suggest or Autocomplete unless you require Grab data. SearchPlaceIndexForSuggestions is part of a previous Amazon Location Service Places API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The version 2 Suggest operation gives better results for typeahead place search suggestions with fuzzy matching, while the version 2 Autocomplete operation gives better results for address completion based on partial input. If you are using an Amazon Web Services SDK or the Amazon Web Services CLI, note that the Places API version 2 is found under geo-places or geo_places, not under location. Since Grab is not yet fully supported in Places API version 2, we recommend you continue using API version 1 when using Grab. Generates suggestions for addresses and points of interest based on partial or misspelled free-form text. This operation is also known as autocomplete, autosuggest, or fuzzy matching. Optional parameters let you narrow your search results by bounding box or country, or bias your search toward a specific position on the globe. You can search for suggested place names near a specified position by using BiasPosition, or filter results within a bounding box by using FilterBBox. These parameters are mutually exclusive; using both BiasPosition and FilterBBox in the same command returns an error.
      parameters:
        - name: index_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the place index resource you want to use for the search.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: The optional API key to authorize the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Text:
