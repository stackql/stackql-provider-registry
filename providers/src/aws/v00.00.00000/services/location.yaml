          description: The text of the place suggestion, typically formatted as an address string.
        PlaceId:
          $ref: "#/components/schemas/PlaceId"
          description: The unique identifier of the Place. You can use this with the GetPlace operation to find the place again later, or to get full information for the Place. The GetPlace request must use the same PlaceIndex resource as the SearchPlaceIndexForSuggestions that generated the Place ID. For SearchPlaceIndexForSuggestions operations, the PlaceId is returned by place indexes that use Esri, Grab, or HERE as data providers.
        Categories:
          $ref: "#/components/schemas/PlaceCategoryList"
          description: The Amazon Location categories that describe the Place. For more information about using categories, including a list of Amazon Location categories, see Categories and filtering, in the Amazon Location Service developer guide.
        SupplementalCategories:
          $ref: "#/components/schemas/PlaceSupplementalCategoryList"
          description: Categories from the data provider that describe the Place that are not mapped to any Amazon Location categories.
      required:
        - Text
    SearchPlaceIndexForTextRequestTextString:
      type: string
      minLength: 1
      maxLength: 200
    SearchPlaceIndexForTextResponse:
      type: object
      properties:
        Summary:
          $ref: "#/components/schemas/SearchPlaceIndexForTextSummary"
          description: Contains a summary of the request. Echoes the input values for BiasPosition, FilterBBox, FilterCountries, Language, MaxResults, and Text. Also includes the DataSource of the place index and the bounding box, ResultBBox, which surrounds the search results.
        Results:
          $ref: "#/components/schemas/SearchForTextResultList"
          description: A list of Places matching the input text. Each result contains additional information about the specific point of interest. Not all response properties are included with all responses. Some properties may only be returned by specific data partners.
      required:
        - Summary
        - Results
    SearchPlaceIndexForTextSummary:
      description: A summary of the request sent by using SearchPlaceIndexForText.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/SensitiveString"
          description: The search text specified in the request.
        BiasPosition:
          $ref: "#/components/schemas/Position"
          description: Contains the coordinates for the optional bias position specified in the request. This parameter contains a pair of numbers. The first number represents the X coordinate, or longitude; the second number represents the Y coordinate, or latitude. For example, [-123.1174, 49.2847] represents the position with longitude -123.1174 and latitude 49.2847.
        FilterBBox:
          $ref: "#/components/schemas/BoundingBox"
          description: Contains the coordinates for the optional bounding box specified in the request.
        FilterCountries:
          $ref: "#/components/schemas/CountryCodeList"
          description: Contains the optional country filter specified in the request.
        MaxResults:
          $ref: "#/components/schemas/PlaceIndexSearchResultLimit"
          description: Contains the optional result count limit specified in the request.
        ResultBBox:
          $ref: "#/components/schemas/BoundingBox"
          description: The bounding box that fully contains all search results. If you specified the optional FilterBBox parameter in the request, ResultBBox is contained within FilterBBox.
        DataSource:
          $ref: "#/components/schemas/String"
          description: "The geospatial data provider attached to the place index resource specified in the request. Values can be one of the following: Esri Grab Here For more information about data providers, see Amazon Location Service data providers."
        Language:
          $ref: "#/components/schemas/LanguageTag"
          description: The preferred language used to return results. Matches the language in the request. The value is a valid BCP 47 language tag, for example, en for English.
        FilterCategories:
          $ref: "#/components/schemas/FilterPlaceCategoryList"
          description: The optional category filter specified in the request.
      required:
        - Text
        - DataSource
    SearchForTextResultList:
      type: array
      items:
        $ref: "#/components/schemas/SearchForTextResult"
    SearchForTextResult:
      description: Contains a search result from a text search query that is run on a place index resource.
      type: object
      properties:
        Place:
          $ref: "#/components/schemas/Place"
          description: Details about the search result, such as its address and position.
        Distance:
          $ref: "#/components/schemas/SearchForTextResultDistanceDouble"
          description: The distance in meters of a great-circle arc between the bias position specified and the result. Distance will be returned only if a bias position was specified in the query. A great-circle arc is the shortest path on a sphere, in this case the Earth. This returns the shortest distance between two locations.
        Relevance:
          $ref: "#/components/schemas/SearchForTextResultRelevanceDouble"
          description: The relative confidence in the match for a result among the results returned. For example, if more fields for an address match (including house number, street, city, country/region, and postal code), the relevance score is closer to 1. Returned only when the partner selected is Esri or Grab.
        PlaceId:
          $ref: "#/components/schemas/PlaceId"
          description: The unique identifier of the place. You can use this with the GetPlace operation to find the place again later. For SearchPlaceIndexForText operations, the PlaceId is returned only by place indexes that use HERE or Grab as a data provider.
      required:
        - Place
    SearchForTextResultDistanceDouble:
      type: number
      format: double
      minimum: 0
    SearchForTextResultRelevanceDouble:
      type: number
      format: double
      minimum: 0
      maximum: 1
    ClientToken:
