openapi: 3.0.0
info:
  version: "2020-11-19"
  title: Amazon Location Service
  description: Amazon Location Service
  x-serviceName: geo
  x-serviceAlias: location
  x-protocol: rest-json
  x-apiVersion: "2020-11-19"
  x-endpointPrefix: geo
servers:
  - url: https://geo.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for location
paths:
  /tracking/v0/trackers/{tracker_name}/consumers:
    post:
      operationId: AssociateTrackerConsumer
      description: Creates an association between a geofence collection and a tracker resource. This allows the tracker resource to communicate location data to the linked geofence collection. You can associate up to five geofence collections to each tracker resource. Currently not supported — Cross-account configurations, such as creating associations between a tracker resource in one account and a geofence collection in another account.
      parameters:
        - name: tracker_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the tracker resource to be associated with a geofence collection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConsumerArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - ConsumerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateTrackerConsumerResponse"
  /tracking/v0/trackers/{tracker_name}/delete-positions:
    post:
      operationId: BatchDeleteDevicePositionHistory
      description: Deletes the position history of one or more devices from a tracker resource.
      parameters:
        - name: tracker_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the tracker resource to delete the device position history from.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceIds:
                  $ref: "#/components/schemas/BatchDeleteDevicePositionHistoryRequestDeviceIdsList"
              required:
                - DeviceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteDevicePositionHistoryResponse"
  /geofencing/v0/collections/{collection_name}/delete-geofences:
    post:
      operationId: BatchDeleteGeofence
      description: Deletes a batch of geofences from a geofence collection. This operation deletes the resource permanently.
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The geofence collection storing the geofences to be deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GeofenceIds:
                  $ref: "#/components/schemas/BatchDeleteGeofenceRequestGeofenceIdsList"
              required:
                - GeofenceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteGeofenceResponse"
  /geofencing/v0/collections/{collection_name}/positions:
    post:
      operationId: BatchEvaluateGeofences
      description: "Evaluates device positions against the geofence geometries from a given geofence collection. This operation always returns an empty response because geofences are asynchronously evaluated. The evaluation determines if the device has entered or exited a geofenced area, and then publishes one of the following events to Amazon EventBridge: ENTER if Amazon Location determines that the tracked device has entered a geofenced area. EXIT if Amazon Location determines that the tracked device has exited a geofenced area. The last geofence that a device was observed within is tracked for 30 days after the most recent device position update. Geofence evaluation uses the given device position. It does not account for the optional Accuracy of a DevicePositionUpdate. The DeviceID is used as a string to represent the device. You do not need to have a Tracker associated with the DeviceID."
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The geofence collection used in evaluating the position of devices against its geofences.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DevicePositionUpdates:
                  $ref: "#/components/schemas/BatchEvaluateGeofencesRequestDevicePositionUpdatesList"
              required:
                - DevicePositionUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEvaluateGeofencesResponse"
  /tracking/v0/trackers/{tracker_name}/get-positions:
    post:
      operationId: BatchGetDevicePosition
      description: Lists the latest device positions for requested devices.
      parameters:
        - name: tracker_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BatchGetDevicePositionRequestTrackerNameString"
          description: The tracker resource retrieving the device position.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceIds:
                  $ref: "#/components/schemas/BatchGetDevicePositionRequestDeviceIdsList"
              required:
                - DeviceIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetDevicePositionResponse"
  /geofencing/v0/collections/{collection_name}/put-geofences:
    post:
      operationId: BatchPutGeofence
      description: A batch request for storing geofence geometries into a given geofence collection, or updates the geometry of an existing geofence if a geofence ID is included in the request.
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The geofence collection storing the geofences.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Entries:
                  $ref: "#/components/schemas/BatchPutGeofenceRequestEntriesList"
              required:
                - Entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPutGeofenceResponse"
  /tracking/v0/trackers/{tracker_name}/positions:
    post:
      operationId: BatchUpdateDevicePosition
      description: 'Uploads position update data for one or more devices to a tracker resource (up to 10 devices per batch). Amazon Location uses the data when it reports the last known device position and position history. Amazon Location retains location data for 30 days. Position updates are handled based on the PositionFiltering property of the tracker. When PositionFiltering is set to TimeBased, updates are evaluated against linked geofence collections, and location data is stored at a maximum of one position per 30 second interval. If your update frequency is more often than every 30 seconds, only one update per 30 seconds is stored for each unique device ID. When PositionFiltering is set to DistanceBased filtering, location data is stored and evaluated against linked geofence collections only if the device has moved more than 30 m (98.4 ft). When PositionFiltering is set to AccuracyBased filtering, location data is stored and evaluated against linked geofence collections only if the device has moved more than the measured accuracy. For example, if two consecutive updates from a device have a horizontal accuracy of 5 m and 10 m, the second update is neither stored or evaluated if the device has moved less than 15 m. If PositionFiltering is set to AccuracyBased filtering, Amazon Location uses the default value { "Horizontal": 0} when accuracy is not provided on a DevicePositionUpdate.'
      parameters:
        - name: tracker_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the tracker resource to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Updates:
                  $ref: "#/components/schemas/BatchUpdateDevicePositionRequestUpdatesList"
              required:
                - Updates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateDevicePositionResponse"
  /routes/v0/calculators/{calculator_name}/calculate/route:
    post:
      operationId: CalculateRoute
      description: "This operation is no longer current and may be deprecated in the future. We recommend you upgrade to CalculateRoutes or CalculateIsolines unless you require Grab data. CalculateRoute is part of a previous Amazon Location Service Routes API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The version 2 CalculateRoutes operation gives better results for point-to-point routing, while the version 2 CalculateIsolines operation adds support for calculating service areas and travel time envelopes. If you are using an Amazon Web Services SDK or the Amazon Web Services CLI, note that the Routes API version 2 is found under geo-routes or geo_routes, not under location. Since Grab is not yet fully supported in Routes API version 2, we recommend you continue using API version 1 when using Grab. Calculates a route given the following required parameters: DeparturePosition and DestinationPosition. Requires that you first create a route calculator resource. By default, a request that doesn't specify a departure time uses the best time of day to travel with the best traffic conditions when calculating the route. Additional options include: Specifying a departure time using either DepartureTime or DepartNow. This calculates a route based on predictive traffic data at the given time. You can't specify both DepartureTime and DepartNow in a single request. Specifying both parameters returns a validation error. Specifying a travel mode using TravelMode sets the transportation mode used to calculate the routes. This also lets you specify additional route preferences in CarModeOptions if traveling by Car, or TruckModeOptions if traveling by Truck. If you specify walking for the travel mode and your data provider is Esri, the start and destination must be within 40km."
      parameters:
        - name: calculator_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the route calculator resource that you want to use to calculate the route.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: The optional API key to authorize the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeparturePosition:
                  $ref: "#/components/schemas/Position"
                DestinationPosition:
                  $ref: "#/components/schemas/Position"
                WaypointPositions:
                  $ref: "#/components/schemas/CalculateRouteRequestWaypointPositionsList"
                TravelMode:
                  $ref: "#/components/schemas/TravelMode"
                DepartureTime:
                  $ref: "#/components/schemas/Timestamp"
                DepartNow:
                  $ref: "#/components/schemas/SensitiveBoolean"
                DistanceUnit:
                  $ref: "#/components/schemas/DistanceUnit"
                IncludeLegGeometry:
                  $ref: "#/components/schemas/SensitiveBoolean"
                CarModeOptions:
                  $ref: "#/components/schemas/CalculateRouteCarModeOptions"
                TruckModeOptions:
                  $ref: "#/components/schemas/CalculateRouteTruckModeOptions"
                ArrivalTime:
                  $ref: "#/components/schemas/Timestamp"
                OptimizeFor:
                  $ref: "#/components/schemas/OptimizationMode"
              required:
                - DeparturePosition
                - DestinationPosition
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateRouteResponse"
  /routes/v0/calculators/{calculator_name}/calculate/route-matrix:
    post:
      operationId: CalculateRouteMatrix
      description: "This operation is no longer current and may be deprecated in the future. We recommend you upgrade to the V2 CalculateRouteMatrix unless you require Grab data. This version of CalculateRouteMatrix is part of a previous Amazon Location Service Routes API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The version 2 CalculateRouteMatrix operation gives better results for matrix routing calculations. If you are using an Amazon Web Services SDK or the Amazon Web Services CLI, note that the Routes API version 2 is found under geo-routes or geo_routes, not under location. Since Grab is not yet fully supported in Routes API version 2, we recommend you continue using API version 1 when using Grab. Start your version 2 API journey with the Routes V2 API Reference or the Developer Guide. Calculates a route matrix given the following required parameters: DeparturePositions and DestinationPositions. CalculateRouteMatrix calculates routes and returns the travel time and travel distance from each departure position to each destination position in the request. For example, given departure positions A and B, and destination positions X and Y, CalculateRouteMatrix will return time and distance for routes from A to X, A to Y, B to X, and B to Y (in that order). The number of results returned (and routes calculated) will be the number of DeparturePositions times the number of DestinationPositions. Your account is charged for each route calculated, not the number of requests. Requires that you first create a route calculator resource. By default, a request that doesn't specify a departure time uses the best time of day to travel with the best traffic conditions when calculating routes. Additional options include: Specifying a departure time using either DepartureTime or DepartNow. This calculates routes based on predictive traffic data at the given time. You can't specify both DepartureTime and DepartNow in a single request. Specifying both parameters returns a validation error. Specifying a travel mode using TravelMode sets the transportation mode used to calculate the routes. This also lets you specify additional route preferences in CarModeOptions if traveling by Car, or TruckModeOptions if traveling by Truck."
      parameters:
        - name: calculator_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the route calculator resource that you want to use to calculate the route matrix.
        - name: key
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ApiKey"
          description: The optional API key to authorize the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeparturePositions:
                  $ref: "#/components/schemas/CalculateRouteMatrixRequestDeparturePositionsList"
                DestinationPositions:
                  $ref: "#/components/schemas/CalculateRouteMatrixRequestDestinationPositionsList"
                TravelMode:
                  $ref: "#/components/schemas/TravelMode"
                DepartureTime:
                  $ref: "#/components/schemas/Timestamp"
                DepartNow:
                  $ref: "#/components/schemas/SensitiveBoolean"
                DistanceUnit:
                  $ref: "#/components/schemas/DistanceUnit"
                CarModeOptions:
                  $ref: "#/components/schemas/CalculateRouteCarModeOptions"
                TruckModeOptions:
                  $ref: "#/components/schemas/CalculateRouteTruckModeOptions"
              required:
                - DeparturePositions
                - DestinationPositions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalculateRouteMatrixResponse"
  /metadata/v0/jobs/cancel-job:
    post:
      operationId: CancelJob
      description: CancelJob cancels a job that is currently running or pending. If the job is already in a terminal state (Completed, Failed, or Cancelled), the operation returns successfully with the current status. For more information, see Job concepts in the Amazon Location Service Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                JobId:
                  $ref: "#/components/schemas/JobId"
              required:
                - JobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobResponse"
  /geofencing/v0/collections:
    post:
      operationId: CreateGeofenceCollection
      description: Creates a geofence collection, which manages and stores geofences.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CollectionName:
                  $ref: "#/components/schemas/ResourceName"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                PricingPlanDataSource:
                  $ref: "#/components/schemas/String"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
              required:
                - CollectionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGeofenceCollectionResponse"
  /metadata/v0/keys:
    post:
      operationId: CreateKey
      description: Creates an API key resource in your Amazon Web Services account, which lets you grant actions for Amazon Location resources to the API key bearer. For more information, see Use API keys to authenticate in the Amazon Location Service Developer Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                KeyName:
                  $ref: "#/components/schemas/ResourceName"
                Restrictions:
                  $ref: "#/components/schemas/ApiKeyRestrictions"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                ExpireTime:
                  $ref: "#/components/schemas/Timestamp"
                NoExpiry:
                  $ref: "#/components/schemas/Boolean"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - KeyName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateKeyResponse"
  /maps/v0/maps:
    post:
      operationId: CreateMap
      description: This operation is no longer current and may be deprecated in the future. We recommend upgrading to the Maps API V2 unless you require Grab data. CreateMap is part of a previous Amazon Location Service Maps API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The Maps API version 2 has a simplified interface that can be used without creating or managing map resources. If you are using an AWS SDK or the AWS CLI, note that the Maps API version 2 is found under geo-maps or geo_maps, not under location. Since Grab is not yet fully supported in Maps API version 2, we recommend you continue using API version 1 when using Grab. Start your version 2 API journey with the Maps V2 API Reference or the Developer Guide. Creates a map resource in your Amazon Web Services account, which provides map tiles of different styles sourced from global location data providers. If your application is tracking or routing assets you use in your business, such as delivery vehicles or employees, you must not use Esri as your geolocation provider. See section 82 of the Amazon Web Services service terms for more details.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MapName:
                  $ref: "#/components/schemas/ResourceName"
                Configuration:
                  $ref: "#/components/schemas/MapConfiguration"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - MapName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMapResponse"
  /places/v0/indexes:
    post:
      operationId: CreatePlaceIndex
      description: This operation is no longer current and may be deprecated in the future. We recommend you upgrade to the Places API V2 unless you require Grab data. CreatePlaceIndex is part of a previous Amazon Location Service Places API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The Places API version 2 has a simplified interface that can be used without creating or managing place index resources. If you are using an Amazon Web Services SDK or the Amazon Web Services CLI, note that the Places API version 2 is found under geo-places or geo_places, not under location. Since Grab is not yet fully supported in Places API version 2, we recommend you continue using API version 1 when using Grab. Start your version 2 API journey with the Places V2 API Reference or the Developer Guide. Creates a place index resource in your Amazon Web Services account. Use a place index resource to geocode addresses and other text queries by using the SearchPlaceIndexForText operation, and reverse geocode coordinates by using the SearchPlaceIndexForPosition operation, and enable autosuggestions by using the SearchPlaceIndexForSuggestions operation. If your application is tracking or routing assets you use in your business, such as delivery vehicles or employees, you must not use Esri as your geolocation provider. See section 82 of the Amazon Web Services service terms for more details.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                IndexName:
                  $ref: "#/components/schemas/ResourceName"
                DataSource:
                  $ref: "#/components/schemas/String"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                DataSourceConfiguration:
                  $ref: "#/components/schemas/DataSourceConfiguration"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - IndexName
                - DataSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlaceIndexResponse"
  /routes/v0/calculators:
    post:
      operationId: CreateRouteCalculator
      description: This operation is no longer current and may be deprecated in the future. We recommend you upgrade to the Routes API V2 unless you require Grab data. CreateRouteCalculator is part of a previous Amazon Location Service Routes API (version 1) which has been superseded by a more intuitive, powerful, and complete API (version 2). The Routes API version 2 has a simplified interface that can be used without creating or managing route calculator resources. If you are using an Amazon Web Services SDK or the Amazon Web Services CLI, note that the Routes API version 2 is found under geo-routes or geo_routes, not under location. Since Grab is not yet fully supported in Routes API version 2, we recommend you continue using API version 1 when using Grab. Start your version 2 API journey with the Routes V2 API Reference or the Developer Guide. Creates a route calculator resource in your Amazon Web Services account. You can send requests to a route calculator resource to estimate travel time, distance, and get directions. A route calculator sources traffic and road network data from your chosen data provider. If your application is tracking or routing assets you use in your business, such as delivery vehicles or employees, you must not use Esri as your geolocation provider. See section 82 of the Amazon Web Services service terms for more details.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CalculatorName:
                  $ref: "#/components/schemas/ResourceName"
                DataSource:
                  $ref: "#/components/schemas/String"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - CalculatorName
                - DataSource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouteCalculatorResponse"
  /tracking/v0/trackers:
    post:
      operationId: CreateTracker
      description: Creates a tracker resource in your Amazon Web Services account, which lets you retrieve current and historical location of devices.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TrackerName:
                  $ref: "#/components/schemas/ResourceName"
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                PricingPlanDataSource:
                  $ref: "#/components/schemas/String"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                PositionFiltering:
                  $ref: "#/components/schemas/PositionFiltering"
                EventBridgeEnabled:
                  $ref: "#/components/schemas/Boolean"
                KmsKeyEnableGeospatialQueries:
                  $ref: "#/components/schemas/Boolean"
              required:
                - TrackerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrackerResponse"
  /geofencing/v0/collections/{collection_name}:
    delete:
      operationId: DeleteGeofenceCollection
      description: Deletes a geofence collection from your Amazon Web Services account. This operation deletes the resource permanently. If the geofence collection is the target of a tracker resource, the devices will no longer be monitored.
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the geofence collection to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGeofenceCollectionResponse"
    get:
      operationId: DescribeGeofenceCollection
      description: Retrieves the geofence collection details.
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the geofence collection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGeofenceCollectionResponse"
    patch:
      operationId: UpdateGeofenceCollection
      description: Updates the specified properties of a given geofence collection.
      parameters:
        - name: collection_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the geofence collection to update.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                PricingPlan:
                  $ref: "#/components/schemas/PricingPlan"
                PricingPlanDataSource:
                  $ref: "#/components/schemas/String"
                Description:
                  $ref: "#/components/schemas/ResourceDescription"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateGeofenceCollectionResponse"
  /metadata/v0/keys/{key_name}:
    delete:
      operationId: DeleteKey
      description: Deletes the specified API key. The API key must have been deactivated more than 90 days previously. For more information, see Use API keys to authenticate in the Amazon Location Service Developer Guide.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the API key to delete.
        - name: forceDelete
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: "ForceDelete bypasses an API key's expiry conditions and deletes the key. Set the parameter true to delete the key or to false to not preemptively delete the API key. Valid values: true, or false. Required: No This action is irreversible. Only use ForceDelete if you are certain the key is no longer in use."
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteKeyResponse"
    get:
      operationId: DescribeKey
      description: Retrieves the API key resource details. For more information, see Use API keys to authenticate in the Amazon Location Service Developer Guide.
      parameters:
        - name: key_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceName"
          description: The name of the API key resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeKeyResponse"
    patch:
      operationId: UpdateKey
      description: Updates the specified properties of a given API key resource.
      parameters:
        - name: key_name
          in: path
          required: true
