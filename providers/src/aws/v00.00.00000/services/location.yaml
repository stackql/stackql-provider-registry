        UnitType:
          $ref: "#/components/schemas/SensitiveString"
          description: For addresses with a UnitNumber, the type of unit. For example, Apartment. Returned only for a place index that uses Esri as a data provider.
        UnitNumber:
          $ref: "#/components/schemas/SensitiveString"
          description: For addresses with multiple units, the unit identifier. Can include numbers and letters, for example 3B or Unit 123. Returned only for a place index that uses Esri or Grab as a data provider. Is not returned for SearchPlaceIndexForPosition.
