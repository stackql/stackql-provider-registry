    PortalOptions:
      description: A structure that describes the options for the access portal associated with an application.
      type: object
      properties:
        SignInOptions:
          $ref: "#/components/schemas/SignInOptions"
          description: A structure that describes the sign-in options for the access portal.
        Visibility:
          $ref: "#/components/schemas/ApplicationVisibility"
          description: Indicates whether this application is visible in the access portal.
    SignInOptions:
      description: A structure that describes the sign-in options for an application portal.
      type: object
      properties:
        Origin:
          $ref: "#/components/schemas/SignInOrigin"
          description: "This determines how IAM Identity Center navigates the user to the target application. It can be one of the following values: APPLICATION: IAM Identity Center redirects the customer to the configured ApplicationUrl. IDENTITY_CENTER: IAM Identity Center uses SAML identity-provider initiated authentication to sign the customer directly into a SAML-based application."
        ApplicationUrl:
          $ref: "#/components/schemas/ApplicationUrl"
          description: The URL that accepts authentication requests for an application. This is a required parameter if the Origin parameter is APPLICATION.
      required:
        - Origin
    SignInOrigin:
      type: string
      enum:
        - IDENTITY_CENTER
        - APPLICATION
    ApplicationUrl:
      type: string
      minLength: 1
      maxLength: 512
      pattern: http(s)?:\/\/[-a-zA-Z0-9+&@#\/%?=~_|!:,.;]*[-a-zA-Z0-9+&bb@#\/%?=~_|]
    ApplicationVisibility:
      type: string
