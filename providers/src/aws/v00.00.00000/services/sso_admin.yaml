          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInstanceResponse"
  /UpdateInstanceAccessControlAttributeConfiguration:
    post:
      operationId: UpdateInstanceAccessControlAttributeConfiguration
      description: Updates the IAM Identity Center identity store attributes that you can use with the IAM Identity Center instance for attributes-based access control (ABAC). When using an external identity provider as an identity source, you can pass attributes through the SAML assertion as an alternative to configuring attributes from the IAM Identity Center identity store. If a SAML assertion passes any of these attributes, IAM Identity Center replaces the attribute value with the value from the IAM Identity Center identity store. For more information about ABAC, see Attribute-Based Access Control in the IAM Identity Center User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.UpdateInstanceAccessControlAttributeConfiguration
            default: SWBExternalService.UpdateInstanceAccessControlAttributeConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed.
                InstanceAccessControlAttributeConfiguration:
                  $ref: "#/components/schemas/InstanceAccessControlAttributeConfiguration"
                  description: Updates the attributes for your ABAC configuration.
              required:
                - InstanceArn
                - InstanceAccessControlAttributeConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateInstanceAccessControlAttributeConfigurationResponse"
  /UpdatePermissionSet:
    post:
      operationId: UpdatePermissionSet
      description: Updates an existing permission set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.UpdatePermissionSet
            default: SWBExternalService.UpdatePermissionSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                PermissionSetArn:
                  $ref: "#/components/schemas/PermissionSetArn"
                  description: The ARN of the permission set.
                Description:
                  $ref: "#/components/schemas/PermissionSetDescription"
                  description: The description of the PermissionSet.
                SessionDuration:
                  $ref: "#/components/schemas/Duration"
                  description: The length of time that the application user sessions are valid for in the ISO-8601 standard.
                RelayState:
                  $ref: "#/components/schemas/RelayState"
                  description: Used to redirect users within the application during the federation authentication process.
              required:
                - InstanceArn
                - PermissionSetArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePermissionSetResponse"
  /UpdateTrustedTokenIssuer:
    post:
      operationId: UpdateTrustedTokenIssuer
      description: Updates the name of the trusted token issuer, or the path of a source attribute or destination attribute for a trusted token issuer configuration. Updating this trusted token issuer configuration might cause users to lose access to any applications that are configured to use the trusted token issuer.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.UpdateTrustedTokenIssuer
            default: SWBExternalService.UpdateTrustedTokenIssuer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TrustedTokenIssuerArn:
                  $ref: "#/components/schemas/TrustedTokenIssuerArn"
                  description: Specifies the ARN of the trusted token issuer configuration that you want to update.
                Name:
                  $ref: "#/components/schemas/TrustedTokenIssuerName"
                  description: Specifies the updated name to be applied to the trusted token issuer configuration.
                TrustedTokenIssuerConfiguration:
                  $ref: "#/components/schemas/TrustedTokenIssuerUpdateConfiguration"
                  description: Specifies a structure with settings to apply to the specified trusted token issuer. The settings that you can provide are determined by the type of the trusted token issuer that you are updating.
              required:
                - TrustedTokenIssuerArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrustedTokenIssuerResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    InstanceArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:aws(-[a-z]{1,5}){0,3}:sso:::instance/(sso)?ins-[a-zA-Z0-9-.]{16}
    RegionName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: ([a-z]+-){2,3}\d
    AddRegionResponse:
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/RegionStatus"
          description: The status of the Region after the Add operation. The status is ADDING when the asynchronous workflow is in progress and changes to ACTIVE when complete.
    RegionStatus:
      type: string
      enum:
        - ACTIVE
        - ADDING
        - REMOVING
    PermissionSetArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:aws(-[a-z]{1,5}){0,3}:sso:::permissionSet/(sso)?ins-[a-zA-Z0-9-.]{16}/ps-[a-zA-Z0-9-./]{16}
    CustomerManagedPolicyReference:
      description: Specifies the name and path of a customer managed policy. You must have an IAM policy that matches the name and path in each Amazon Web Services account where you want to deploy your permission set.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ManagedPolicyName"
          description: The name of the IAM policy that you have configured in each account where you want to deploy your permission set.
        Path:
          $ref: "#/components/schemas/ManagedPolicyPath"
          description: The path to the IAM policy that you have configured in each account where you want to deploy your permission set. The default is /. For more information, see Friendly names and paths in the IAM User Guide.
      required:
        - Name
    ManagedPolicyName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\w+=,.@-]+"
    ManagedPolicyPath:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ((/[A-Za-z0-9\.,\+@=_-]+)*)/
    AttachCustomerManagedPolicyReferenceToPermissionSetResponse:
      type: object
    ManagedPolicyArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws(-[a-z]{1,5}){0,3}:iam::aws:policy((/[A-Za-z0-9\.,\+@=_-]+)*)/([A-Za-z0-9\.,\+=@_-]+)
    AttachManagedPolicyToPermissionSetResponse:
      type: object
    TargetId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d{12}
    TargetType:
      type: string
      enum:
        - AWS_ACCOUNT
    PrincipalType:
      type: string
      enum:
        - USER
        - GROUP
    PrincipalId:
      type: string
      minLength: 1
      maxLength: 47
      pattern: ([0-9a-f]{10}-|)[A-Fa-f0-9]{8}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{4}-[A-Fa-f0-9]{12}
    CreateAccountAssignmentResponse:
      type: object
      properties:
        AccountAssignmentCreationStatus:
          $ref: "#/components/schemas/AccountAssignmentOperationStatus"
          description: The status object for the account assignment creation operation.
    AccountAssignmentOperationStatus:
      description: The status of the creation or deletion operation of an assignment that a principal needs to access an account.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/StatusValues"
          description: The status of the permission set provisioning process.
        RequestId:
          $ref: "#/components/schemas/UUId"
          description: The identifier for tracking the request operation that is generated by the universally unique identifier (UUID) workflow.
        FailureReason:
          $ref: "#/components/schemas/Reason"
          description: The message that contains an error or exception in case of an operation failure.
        TargetId:
          $ref: "#/components/schemas/TargetId"
          description: TargetID is an Amazon Web Services account identifier, (For example, 123456789012).
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: The entity type for which the assignment will be created.
        PermissionSetArn:
          $ref: "#/components/schemas/PermissionSetArn"
          description: The ARN of the permission set. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
        PrincipalType:
          $ref: "#/components/schemas/PrincipalType"
          description: The entity type for which the assignment will be created.
        PrincipalId:
          $ref: "#/components/schemas/PrincipalId"
          description: An identifier for an object in IAM Identity Center, such as a user or group. PrincipalIds are GUIDs (For example, f81d4fae-7dec-11d0-a765-00a0c91e6bf6). For more information about PrincipalIds in IAM Identity Center, see the IAM Identity Center Identity Store API Reference.
        CreatedDate:
          $ref: "#/components/schemas/Date"
          description: The date that the permission set was created.
    StatusValues:
      type: string
      enum:
        - IN_PROGRESS
        - FAILED
        - SUCCEEDED
    UUId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: \b[0-9a-f]{8}\b-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-\b[0-9a-f]{12}\b
    Reason:
      type: string
