    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: \d{12}
    DescribeApplicationAssignmentResponse:
      type: object
      properties:
        PrincipalType:
          $ref: "#/components/schemas/PrincipalType"
          description: The entity type for which the assignment will be created.
