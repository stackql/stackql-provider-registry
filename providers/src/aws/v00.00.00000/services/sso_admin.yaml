        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    ApplicationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ClientToken:
      type: string
