openapi: 3.0.0
info:
  version: "2020-07-20"
  title: AWS Single Sign-On Admin
  description: AWS Single Sign-On Admin
  x-serviceName: sso
  x-serviceAlias: sso_admin
  x-protocol: json
  x-apiVersion: "2020-07-20"
  x-endpointPrefix: sso
  x-targetPrefix: SWBExternalService
  x-jsonVersion: "1.1"
servers:
  - url: https://sso.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for sso-admin
paths:
  /AddRegion:
    post:
      operationId: AddRegion
      description: "Adds a Region to an IAM Identity Center instance. This operation initiates an asynchronous workflow to replicate the IAM Identity Center instance to the target Region. The Region status is set to ADDING at first and changes to ACTIVE when the workflow completes. To use this operation, your IAM Identity Center instance and the target Region must meet the requirements described in the IAM Identity Center User Guide. The following actions are related to AddRegion: RemoveRegion DescribeRegion ListRegions"
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.AddRegion
            default: SWBExternalService.AddRegion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The Amazon Resource Name (ARN) of the IAM Identity Center instance to replicate to the target Region.
                RegionName:
                  $ref: "#/components/schemas/RegionName"
                  description: The name of the Amazon Web Services Region to add to the IAM Identity Center instance. The Region name must be 1-32 characters long and follow the pattern of Amazon Web Services Region names (for example, us-east-1).
              required:
                - InstanceArn
                - RegionName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddRegionResponse"
  /AttachCustomerManagedPolicyReferenceToPermissionSet:
    post:
      operationId: AttachCustomerManagedPolicyReferenceToPermissionSet
      description: Attaches the specified customer managed policy to the specified PermissionSet.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.AttachCustomerManagedPolicyReferenceToPermissionSet
            default: SWBExternalService.AttachCustomerManagedPolicyReferenceToPermissionSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed.
                PermissionSetArn:
                  $ref: "#/components/schemas/PermissionSetArn"
                  description: The ARN of the PermissionSet.
                CustomerManagedPolicyReference:
                  $ref: "#/components/schemas/CustomerManagedPolicyReference"
                  description: Specifies the name and path of a customer managed policy. You must have an IAM policy that matches the name and path in each Amazon Web Services account where you want to deploy your permission set.
              required:
                - InstanceArn
                - PermissionSetArn
                - CustomerManagedPolicyReference
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachCustomerManagedPolicyReferenceToPermissionSetResponse"
  /AttachManagedPolicyToPermissionSet:
    post:
      operationId: AttachManagedPolicyToPermissionSet
      description: Attaches an Amazon Web Services managed policy ARN to a permission set. If the permission set is already referenced by one or more account assignments, you will need to call ProvisionPermissionSet after this operation. Calling ProvisionPermissionSet applies the corresponding IAM policy updates to all assigned accounts.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.AttachManagedPolicyToPermissionSet
            default: SWBExternalService.AttachManagedPolicyToPermissionSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                PermissionSetArn:
                  $ref: "#/components/schemas/PermissionSetArn"
                  description: The ARN of the PermissionSet that the managed policy should be attached to.
                ManagedPolicyArn:
                  $ref: "#/components/schemas/ManagedPolicyArn"
                  description: The Amazon Web Services managed policy ARN to be attached to a permission set.
              required:
                - InstanceArn
                - PermissionSetArn
                - ManagedPolicyArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachManagedPolicyToPermissionSetResponse"
  /CreateAccountAssignment:
    post:
      operationId: CreateAccountAssignment
      description: Assigns access to a principal for a specified Amazon Web Services account using a specified permission set. The term principal here refers to a user or group that is defined in IAM Identity Center. As part of a successful CreateAccountAssignment call, the specified permission set will automatically be provisioned to the account in the form of an IAM policy. That policy is attached to the IAM role created in IAM Identity Center. If the permission set is subsequently updated, the corresponding IAM policies attached to roles in your accounts will not be updated automatically. In this case, you must call ProvisionPermissionSet to make these updates. After a successful response, call DescribeAccountAssignmentCreationStatus to describe the status of an assignment creation request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateAccountAssignment
            default: SWBExternalService.CreateAccountAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                TargetId:
                  $ref: "#/components/schemas/TargetId"
                  description: TargetID is an Amazon Web Services account identifier, (For example, 123456789012).
                TargetType:
                  $ref: "#/components/schemas/TargetType"
                  description: The entity type for which the assignment will be created.
                PermissionSetArn:
                  $ref: "#/components/schemas/PermissionSetArn"
                  description: The ARN of the permission set that the admin wants to grant the principal access to.
                PrincipalType:
                  $ref: "#/components/schemas/PrincipalType"
                  description: The entity type for which the assignment will be created.
                PrincipalId:
                  $ref: "#/components/schemas/PrincipalId"
                  description: An identifier for an object in IAM Identity Center, such as a user or group. PrincipalIds are GUIDs (For example, f81d4fae-7dec-11d0-a765-00a0c91e6bf6). For more information about PrincipalIds in IAM Identity Center, see the IAM Identity Center Identity Store API Reference.
              required:
                - InstanceArn
                - TargetId
                - TargetType
                - PermissionSetArn
                - PrincipalType
                - PrincipalId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAccountAssignmentResponse"
  /CreateApplication:
    post:
      operationId: CreateApplication
      description: Creates an OAuth 2.0 customer managed application in IAM Identity Center for the given application provider. This API does not support creating SAML 2.0 customer managed applications or Amazon Web Services managed applications. To learn how to create an Amazon Web Services managed application, see the application user guide. You can create a SAML 2.0 customer managed application in the Amazon Web Services Management Console only. See Setting up customer managed SAML 2.0 applications. For more information on these application types, see Amazon Web Services managed applications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateApplication
            default: SWBExternalService.CreateApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the instance of IAM Identity Center under which the operation will run. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                ApplicationProviderArn:
                  $ref: "#/components/schemas/ApplicationProviderArn"
                  description: The ARN of the application provider under which the operation will run.
                Name:
                  $ref: "#/components/schemas/ApplicationNameType"
                  description: The name of the .
                Description:
                  $ref: "#/components/schemas/Description"
                  description: The description of the .
                PortalOptions:
                  $ref: "#/components/schemas/PortalOptions"
                  description: A structure that describes the options for the portal associated with an application.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies tags to be attached to the application.
                Status:
                  $ref: "#/components/schemas/ApplicationStatus"
                  description: Specifies whether the application is enabled or disabled.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
              required:
                - InstanceArn
                - ApplicationProviderArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
  /CreateApplicationAssignment:
    post:
      operationId: CreateApplicationAssignment
      description: Grant application access to a user or group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateApplicationAssignment
            default: SWBExternalService.CreateApplicationAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: The ARN of the application for which the assignment is created.
                PrincipalId:
                  $ref: "#/components/schemas/PrincipalId"
                  description: An identifier for an object in IAM Identity Center, such as a user or group. PrincipalIds are GUIDs (For example, f81d4fae-7dec-11d0-a765-00a0c91e6bf6). For more information about PrincipalIds in IAM Identity Center, see the IAM Identity Center Identity Store API Reference.
                PrincipalType:
                  $ref: "#/components/schemas/PrincipalType"
                  description: The entity type for which the assignment will be created.
              required:
                - ApplicationArn
                - PrincipalId
                - PrincipalType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationAssignmentResponse"
  /CreateInstance:
    post:
      operationId: CreateInstance
      description: "Creates an instance of IAM Identity Center for a standalone Amazon Web Services account that is not managed by Organizations or a member Amazon Web Services account in an organization. You can create only one instance per account and across all Amazon Web Services Regions. The CreateInstance request is rejected if the following apply: The instance is created within the organization management account. An instance already exists in the same account."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateInstance
            default: SWBExternalService.CreateInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NameType"
                  description: The name of the instance of IAM Identity Center.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies tags to be attached to the instance of IAM Identity Center.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInstanceResponse"
  /CreateInstanceAccessControlAttributeConfiguration:
    post:
      operationId: CreateInstanceAccessControlAttributeConfiguration
      description: Enables the attributes-based access control (ABAC) feature for the specified IAM Identity Center instance. You can also specify new attributes to add to your ABAC configuration during the enabling process. For more information about ABAC, see Attribute-Based Access Control in the IAM Identity Center User Guide. After a successful response, call DescribeInstanceAccessControlAttributeConfiguration to validate that InstanceAccessControlAttributeConfiguration was created.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateInstanceAccessControlAttributeConfiguration
            default: SWBExternalService.CreateInstanceAccessControlAttributeConfiguration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed.
                InstanceAccessControlAttributeConfiguration:
                  $ref: "#/components/schemas/InstanceAccessControlAttributeConfiguration"
                  description: Specifies the IAM Identity Center identity store attributes to add to your ABAC configuration. When using an external identity provider as an identity source, you can pass attributes through the SAML assertion. Doing so provides an alternative to configuring attributes from the IAM Identity Center identity store. If a SAML assertion passes any of these attributes, IAM Identity Center will replace the attribute value with the value from the IAM Identity Center identity store.
              required:
                - InstanceArn
                - InstanceAccessControlAttributeConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInstanceAccessControlAttributeConfigurationResponse"
  /CreatePermissionSet:
    post:
      operationId: CreatePermissionSet
      description: Creates a permission set within a specified IAM Identity Center instance. To grant users and groups access to Amazon Web Services account resources, use CreateAccountAssignment .
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreatePermissionSet
            default: SWBExternalService.CreatePermissionSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/PermissionSetName"
                  description: The name of the PermissionSet.
                Description:
                  $ref: "#/components/schemas/PermissionSetDescription"
                  description: The description of the PermissionSet.
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                SessionDuration:
                  $ref: "#/components/schemas/Duration"
                  description: The length of time that the application user sessions are valid in the ISO-8601 standard.
                RelayState:
                  $ref: "#/components/schemas/RelayState"
                  description: Used to redirect users within the application during the federation authentication process.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags to attach to the new PermissionSet.
              required:
                - Name
                - InstanceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePermissionSetResponse"
  /CreateTrustedTokenIssuer:
    post:
      operationId: CreateTrustedTokenIssuer
      description: Creates a connection to a trusted token issuer in an instance of IAM Identity Center. A trusted token issuer enables trusted identity propagation to be used with applications that authenticate outside of Amazon Web Services. This trusted token issuer describes an external identity provider (IdP) that can generate claims or assertions in the form of access tokens for a user. Applications enabled for IAM Identity Center can use these tokens for authentication.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.CreateTrustedTokenIssuer
            default: SWBExternalService.CreateTrustedTokenIssuer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: Specifies the ARN of the instance of IAM Identity Center to contain the new trusted token issuer configuration.
                Name:
                  $ref: "#/components/schemas/TrustedTokenIssuerName"
                  description: Specifies the name of the new trusted token issuer configuration.
                TrustedTokenIssuerType:
                  $ref: "#/components/schemas/TrustedTokenIssuerType"
                  description: Specifies the type of the new trusted token issuer.
                TrustedTokenIssuerConfiguration:
                  $ref: "#/components/schemas/TrustedTokenIssuerConfiguration"
                  description: Specifies settings that apply to the new trusted token issuer configuration. The settings that are available depend on what TrustedTokenIssuerType you specify.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Specifies a unique, case-sensitive ID that you provide to ensure the idempotency of the request. This lets you safely retry the request without accidentally performing the same operation a second time. Passing the same value to a later call to an operation requires that you also pass the same value for all other parameters. We recommend that you use a UUID type of value.. If you don't provide this value, then Amazon Web Services generates a random one for you. If you retry the operation with the same ClientToken, but with different parameters, the retry fails with an IdempotentParameterMismatch error.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Specifies tags to be attached to the new trusted token issuer configuration.
              required:
                - InstanceArn
                - TrustedTokenIssuerType
                - TrustedTokenIssuerConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrustedTokenIssuerResponse"
  /DeleteAccountAssignment:
    post:
      operationId: DeleteAccountAssignment
      description: Deletes a principal's access from a specified Amazon Web Services account using a specified permission set. After a successful response, call DescribeAccountAssignmentDeletionStatus to describe the status of an assignment deletion request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteAccountAssignment
            default: SWBExternalService.DeleteAccountAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
                TargetId:
                  $ref: "#/components/schemas/TargetId"
                  description: TargetID is an Amazon Web Services account identifier, (For example, 123456789012).
                TargetType:
                  $ref: "#/components/schemas/TargetType"
                  description: The entity type for which the assignment will be deleted.
                PermissionSetArn:
                  $ref: "#/components/schemas/PermissionSetArn"
                  description: The ARN of the permission set that will be used to remove access.
                PrincipalType:
                  $ref: "#/components/schemas/PrincipalType"
                  description: The entity type for which the assignment will be deleted.
                PrincipalId:
                  $ref: "#/components/schemas/PrincipalId"
                  description: An identifier for an object in IAM Identity Center, such as a user or group. PrincipalIds are GUIDs (For example, f81d4fae-7dec-11d0-a765-00a0c91e6bf6). For more information about PrincipalIds in IAM Identity Center, see the IAM Identity Center Identity Store API Reference.
              required:
                - InstanceArn
                - TargetId
                - TargetType
                - PermissionSetArn
                - PrincipalType
                - PrincipalId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAccountAssignmentResponse"
  /DeleteApplication:
    post:
      operationId: DeleteApplication
      description: Deletes the association with the application. The connected service resource still exists.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteApplication
            default: SWBExternalService.DeleteApplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: Specifies the ARN of the application. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
              required:
                - ApplicationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationResponse"
  /DeleteApplicationAccessScope:
    post:
      operationId: DeleteApplicationAccessScope
      description: Deletes an IAM Identity Center access scope from an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteApplicationAccessScope
            default: SWBExternalService.DeleteApplicationAccessScope
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: Specifies the ARN of the application with the access scope to delete.
                Scope:
                  $ref: "#/components/schemas/Scope"
                  description: Specifies the name of the access scope to remove from the application.
              required:
                - ApplicationArn
      responses:
        "200":
          description: Success
  /DeleteApplicationAssignment:
    post:
      operationId: DeleteApplicationAssignment
      description: Revoke application access to an application by deleting application assignments for a user or group.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteApplicationAssignment
            default: SWBExternalService.DeleteApplicationAssignment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: Specifies the ARN of the application.
                PrincipalId:
                  $ref: "#/components/schemas/PrincipalId"
                  description: An identifier for an object in IAM Identity Center, such as a user or group. PrincipalIds are GUIDs (For example, f81d4fae-7dec-11d0-a765-00a0c91e6bf6). For more information about PrincipalIds in IAM Identity Center, see the IAM Identity Center Identity Store API Reference.
                PrincipalType:
                  $ref: "#/components/schemas/PrincipalType"
                  description: The entity type for which the assignment will be deleted.
              required:
                - ApplicationArn
                - PrincipalId
                - PrincipalType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteApplicationAssignmentResponse"
  /DeleteApplicationAuthenticationMethod:
    post:
      operationId: DeleteApplicationAuthenticationMethod
      description: Deletes an authentication method from an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteApplicationAuthenticationMethod
            default: SWBExternalService.DeleteApplicationAuthenticationMethod
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: Specifies the ARN of the application with the authentication method to delete.
                AuthenticationMethodType:
                  $ref: "#/components/schemas/AuthenticationMethodType"
                  description: Specifies the authentication method type to delete from the application.
              required:
                - ApplicationArn
                - AuthenticationMethodType
      responses:
        "200":
          description: Success
  /DeleteApplicationGrant:
    post:
      operationId: DeleteApplicationGrant
      description: Deletes a grant from an application.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteApplicationGrant
            default: SWBExternalService.DeleteApplicationGrant
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ApplicationArn:
                  $ref: "#/components/schemas/ApplicationArn"
                  description: Specifies the ARN of the application with the grant to delete.
                GrantType:
                  $ref: "#/components/schemas/GrantType"
                  description: Specifies the type of grant to delete from the application.
              required:
                - ApplicationArn
                - GrantType
      responses:
        "200":
          description: Success
  /DeleteInlinePolicyFromPermissionSet:
    post:
      operationId: DeleteInlinePolicyFromPermissionSet
      description: Deletes the inline policy from a specified permission set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - SWBExternalService.DeleteInlinePolicyFromPermissionSet
            default: SWBExternalService.DeleteInlinePolicyFromPermissionSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                InstanceArn:
                  $ref: "#/components/schemas/InstanceArn"
                  description: The ARN of the IAM Identity Center instance under which the operation will be executed. For more information about ARNs, see Amazon Resource Names (ARNs) and Amazon Web Services Service Namespaces in the Amazon Web Services General Reference.
