      type: object
      properties:
        OidcJwtConfiguration:
          $ref: "#/components/schemas/OidcJwtConfiguration"
          description: A structure that describes the settings for a trusted token issuer that works with OpenID Connect (OIDC) by using JSON Web Tokens (JWT).
    OidcJwtConfiguration:
      description: A structure that describes configuration settings for a trusted token issuer that supports OpenID Connect (OIDC) and JSON Web Tokens (JWTs).
      type: object
