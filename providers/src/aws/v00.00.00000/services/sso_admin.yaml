        - AccessControlAttributes
    AccessControlAttributeList:
      type: array
      items:
        $ref: "#/components/schemas/AccessControlAttribute"
    AccessControlAttribute:
      description: These are IAM Identity Center identity store attributes that you can configure for use in attributes-based access control (ABAC). You can create permissions policies that determine who can access your Amazon Web Services resources based upon the configured attribute values. When you enable ABAC and specify AccessControlAttributes, IAM Identity Center passes the attribute values of the authenticated user into IAM for use in policy evaluation.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/AccessControlAttributeKey"
          description: The name of the attribute associated with your identities in your identity source. This is used to map a specified attribute in your identity source with an attribute in IAM Identity Center.
        Value:
          $ref: "#/components/schemas/AccessControlAttributeValue"
          description: The value used for mapping a specified attribute to an identity source.
      required:
        - Key
        - Value
    AccessControlAttributeKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[\\p{L}\\p{Z}\\p{N}_.:\\/=+\\-@]+"
    AccessControlAttributeValue:
      description: The value used for mapping a specified attribute to an identity source. For more information, see Attribute mappings in the IAM Identity Center User Guide.
      type: object
      properties:
        Source:
          $ref: "#/components/schemas/AccessControlAttributeValueSourceList"
          description: The identity source to use when mapping a specified attribute to IAM Identity Center.
      required:
