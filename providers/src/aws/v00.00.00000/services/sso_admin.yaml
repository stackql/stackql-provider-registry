        IdentityStoreArn:
          $ref: "#/components/schemas/IdentityStoreArn"
          description: The ARN of the identity store that is connected to the instance of IAM Identity Center.
    ApplicationArn:
      type: string
      minLength: 10
      maxLength: 1224
      pattern: arn:aws(-[a-z]{1,5}){0,3}:sso::\d{12}:application/(sso)?ins-[a-zA-Z0-9-.]{16}/apl-[a-zA-Z0-9]{16}
    IdentityStoreArn:
