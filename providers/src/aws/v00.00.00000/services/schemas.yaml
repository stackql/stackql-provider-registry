openapi: 3.0.0
info:
  version: "2019-12-02"
  title: Schemas
  description: Schemas
  x-serviceName: schemas
  x-serviceAlias: schemas
  x-protocol: rest-json
  x-apiVersion: "2019-12-02"
  x-endpointPrefix: schemas
  x-jsonVersion: "1.1"
servers:
  - url: https://schemas.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for schemas
paths:
  /v1/discoverers:
    post:
      operationId: CreateDiscoverer
      description: Creates a discoverer.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
                SourceArn:
                  $ref: "#/components/schemas/__stringMin20Max1600"
                CrossAccount:
                  $ref: "#/components/schemas/__boolean"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - SourceArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDiscovererResponse"
    get:
      operationId: ListDiscoverers
      description: List the discoverers.
      parameters:
        - name: discovererIdPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only those discoverer IDs that start with the specified prefix.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integer"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results to return. To request the first page, leave NextToken empty. The token will expire in 24 hours, and cannot be shared with other accounts.
        - name: sourceArnPrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only those ARNs that start with the specified prefix.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDiscoverersResponse"
  /v1/registries/name/{registry_name}:
    post:
      operationId: CreateRegistry
      description: Creates a registry.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRegistryResponse"
    delete:
      operationId: DeleteRegistry
      description: Deletes a Registry.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeRegistry
      description: Describes the registry.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRegistryResponse"
    put:
      operationId: UpdateRegistry
      description: Updates a registry.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRegistryResponse"
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}:
    post:
      operationId: CreateSchema
      description: Creates a schema definition. Inactive schemas will be deleted after two years.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Content:
                  $ref: "#/components/schemas/__stringMin1Max100000"
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Type:
                  $ref: "#/components/schemas/Type"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSchemaResponse"
    delete:
      operationId: DeleteSchema
      description: Delete a schema definition.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeSchema
      description: Retrieve the schema definition.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schemaVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only this schema version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSchemaResponse"
    put:
      operationId: UpdateSchema
      description: Updates the schema definition Inactive schemas will be deleted after two years.
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientTokenId:
                  $ref: "#/components/schemas/__stringMin0Max36"
                Content:
                  $ref: "#/components/schemas/__stringMin1Max100000"
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
                Type:
                  $ref: "#/components/schemas/Type"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSchemaResponse"
  /v1/discoverers/id/{discoverer_id}:
    delete:
      operationId: DeleteDiscoverer
      description: Deletes a discoverer.
      parameters:
        - name: discoverer_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
      responses:
        "204":
          description: Success
    get:
      operationId: DescribeDiscoverer
      description: Describes the discoverer.
      parameters:
        - name: discoverer_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDiscovererResponse"
    put:
      operationId: UpdateDiscoverer
      description: Updates the discoverer
      parameters:
        - name: discoverer_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max256"
                CrossAccount:
                  $ref: "#/components/schemas/__boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDiscovererResponse"
  /v1/policy:
    delete:
      operationId: DeleteResourcePolicy
      description: Delete the resource-based policy attached to the specified registry.
      parameters:
        - name: registryName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      responses:
        "204":
          description: Success
    get:
      operationId: GetResourcePolicy
      description: Retrieves the resource-based policy attached to a given registry.
      parameters:
        - name: registryName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePolicyResponse"
    put:
      operationId: PutResourcePolicy
      description: The name of the policy.
      parameters:
        - name: registryName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Policy:
                  $ref: "#/components/schemas/__string"
                RevisionId:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyResponse"
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}/version/{schema_version}:
    delete:
      operationId: DeleteSchemaVersion
      description: Delete the schema version definition
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schema_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The version number of the schema
      responses:
        "204":
          description: Success
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}/language/{language}:
    get:
      operationId: DescribeCodeBinding
      description: Describe the code binding URI.
      parameters:
        - name: language
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The language of the code binding.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schemaVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only this schema version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCodeBindingResponse"
    post:
      operationId: PutCodeBinding
      description: Put code binding URI
      parameters:
        - name: language
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The language of the code binding.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schemaVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only this schema version.
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutCodeBindingResponse"
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}/export:
    get:
      operationId: ExportSchema
      parameters:
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schemaVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only this schema version.
        - name: type
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportSchemaResponse"
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}/language/{language}/source:
    get:
      operationId: GetCodeBindingSource
      description: Get the code binding source URI.
      parameters:
        - name: language
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The language of the code binding.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
        - name: schemaVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only this schema version.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCodeBindingSourceResponse"
  /v1/discover:
    post:
      operationId: GetDiscoveredSchema
      description: Get the discovered schema that was generated based on sampled events.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Events:
                  $ref: "#/components/schemas/__listOfGetDiscoveredSchemaVersionItemInput"
                Type:
                  $ref: "#/components/schemas/Type"
              required:
                - Events
                - Type
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDiscoveredSchemaResponse"
  /v1/registries:
    get:
      operationId: ListRegistries
      description: List the registries.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integer"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results to return. To request the first page, leave NextToken empty. The token will expire in 24 hours, and cannot be shared with other accounts.
        - name: registryNamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only those registry names that start with the specified prefix.
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Can be set to Local or AWS to limit responses to your custom registries, or the ones provided by AWS.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRegistriesResponse"
  /v1/registries/name/{registry_name}/schemas/name/{schema_name}/versions:
    get:
      operationId: ListSchemaVersions
      description: Provides a list of the schema versions and related information.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integer"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results to return. To request the first page, leave NextToken empty. The token will expire in 24 hours, and cannot be shared with other accounts.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schema_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the schema.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemaVersionsResponse"
  /v1/registries/name/{registry_name}/schemas:
    get:
      operationId: ListSchemas
      description: List the schemas.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integer"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results to return. To request the first page, leave NextToken empty. The token will expire in 24 hours, and cannot be shared with other accounts.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
        - name: schemaNamePrefix
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only those schema names that start with the specified prefix.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSchemasResponse"
  /tags/{resource-arn}:
    get:
      operationId: ListTagsForResource
      description: Get tags for resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Add tags to a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes tags from a resource.
      parameters:
        - name: resource-arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ARN of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__listOf__string"
          description: Keys of key-value pairs.
      responses:
        "204":
          description: Success
  /v1/registries/name/{registry_name}/schemas/search:
    get:
      operationId: SearchSchemas
      description: Search the schemas
      parameters:
        - name: keywords
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Specifying this limits the results to only schemas that include the provided keywords.
        - name: limit
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__integer"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token that specifies the next page of results to return. To request the first page, leave NextToken empty. The token will expire in 24 hours, and cannot be shared with other accounts.
        - name: registry_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The name of the registry.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchSchemasResponse"
  /v1/discoverers/id/{discoverer_id}/start:
    post:
      operationId: StartDiscoverer
      description: Starts the discoverer
      parameters:
        - name: discoverer_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartDiscovererResponse"
  /v1/discoverers/id/{discoverer_id}/stop:
    post:
      operationId: StopDiscoverer
      description: Stops the discoverer
      parameters:
        - name: discoverer_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDiscovererResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __stringMin0Max256:
      type: string
      minLength: 0
      maxLength: 256
    __stringMin20Max1600:
      type: string
      minLength: 20
      maxLength: 1600
    __boolean:
      type: boolean
    Tags:
      description: Key-value pairs associated with a resource.
      type: object
      properties: {}
    CreateDiscovererResponse:
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/__string"
          description: The description of the discoverer.
        DiscovererArn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the discoverer.
        DiscovererId:
          $ref: "#/components/schemas/__string"
          description: The ID of the discoverer.
        SourceArn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the event bus.
        State:
          $ref: "#/components/schemas/DiscovererState"
          description: The state of the discoverer.
        CrossAccount:
          $ref: "#/components/schemas/__boolean"
          description: The Status if the discoverer will discover schemas from events sent from another account.
        Tags:
          type: object
          properties: {}
          description: Tags associated with the resource.
    __string:
      type: string
    DiscovererState:
      type: string
      enum:
        - STARTED
        - STOPPED
    CreateRegistryResponse:
      type: object
      properties:
        Description:
          $ref: "#/components/schemas/__string"
          description: The description of the registry.
        RegistryArn:
          $ref: "#/components/schemas/__string"
          description: The ARN of the registry.
        RegistryName:
          $ref: "#/components/schemas/__string"
          description: The name of the registry.
        Tags:
          type: object
          properties: {}
          description: Tags associated with the registry.
    __stringMin1Max100000:
