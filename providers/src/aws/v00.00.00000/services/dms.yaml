    CreateInstanceProfileResponse:
      type: object
      properties:
        InstanceProfile:
          $ref: "#/components/schemas/InstanceProfile"
          description: The instance profile that was created.
    InstanceProfile:
      description: Provides information that defines an instance profile.
      type: object
      properties:
        InstanceProfileArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) string that uniquely identifies the instance profile.
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone where the instance profile runs.
        KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the KMS key that is used to encrypt the connection parameters for the instance profile. If you don't specify a value for the KmsKeyArn parameter, then DMS uses an Amazon Web Services owned encryption key to encrypt your resources.
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies the accessibility options for the instance profile. A value of true represents an instance profile with a public IP address. A value of false represents an instance profile with a private IP address. The default value is true.
        NetworkType:
          $ref: "#/components/schemas/String"
          description: Specifies the network type for the instance profile. A value of IPV4 represents an instance profile with IPv4 network type and only supports IPv4 addressing. A value of IPV6 represents an instance profile with IPv6 network type and only supports IPv6 addressing. A value of DUAL represents an instance profile with dual network type that supports IPv4 and IPv6 addressing.
        InstanceProfileName:
          $ref: "#/components/schemas/String"
          description: The user-friendly name for the instance profile.
        Description:
          $ref: "#/components/schemas/String"
          description: A description of the instance profile. Descriptions can have up to 31 characters. A description can contain only ASCII letters, digits, and hyphens ('-'). Also, it can't end with a hyphen or contain two consecutive hyphens, and can only begin with a letter.
        InstanceProfileCreationTime:
          $ref: "#/components/schemas/Iso8601DateTime"
          description: The time the instance profile was created.
        SubnetGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the subnet group that is associated with the instance profile.
        VpcSecurityGroups:
          $ref: "#/components/schemas/StringList"
          description: The VPC security groups that are used with the instance profile. The VPC security group must work with the VPC containing the instance profile.
    DataProviderDescriptorDefinitionList:
