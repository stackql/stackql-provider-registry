    TableStatistics:
      description: Provides a collection of table statistics in response to a request by the DescribeTableStatistics operation.
      type: object
      properties:
        SchemaName:
          $ref: "#/components/schemas/String"
          description: The schema name.
        TableName:
          $ref: "#/components/schemas/String"
          description: The name of the table.
        Inserts:
          $ref: "#/components/schemas/Long"
          description: The number of insert actions performed on a table.
        Deletes:
          $ref: "#/components/schemas/Long"
          description: The number of delete actions performed on a table.
        Updates:
          $ref: "#/components/schemas/Long"
          description: The number of update actions performed on a table.
        Ddls:
          $ref: "#/components/schemas/Long"
          description: The data definition language (DDL) used to build and modify the structure of your tables.
        AppliedInserts:
          $ref: "#/components/schemas/LongOptional"
          description: The number of insert actions applied on a target table.
        AppliedDeletes:
          $ref: "#/components/schemas/LongOptional"
          description: The number of delete actions applied on a target table.
        AppliedUpdates:
          $ref: "#/components/schemas/LongOptional"
          description: The number of update actions applied on a target table.
        AppliedDdls:
          $ref: "#/components/schemas/LongOptional"
          description: The number of data definition language (DDL) statements used to build and modify the structure of your tables applied on the target.
        FullLoadRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows added during the full load operation.
        FullLoadCondtnlChkFailedRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows that failed conditional checks during the full load operation (valid only for migrations where DynamoDB is the target).
        FullLoadErrorRows:
          $ref: "#/components/schemas/Long"
          description: The number of rows that failed to load during the full load operation (valid only for migrations where DynamoDB is the target).
        FullLoadStartTime:
          $ref: "#/components/schemas/TStamp"
          description: The time when the full load operation started.
        FullLoadEndTime:
          $ref: "#/components/schemas/TStamp"
          description: The time when the full load operation completed.
        FullLoadReloaded:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates if the table was reloaded (true) or loaded as part of a new full load operation (false).
        LastUpdateTime:
          $ref: "#/components/schemas/TStamp"
          description: The last time a table was updated.
        TableState:
          $ref: "#/components/schemas/String"
          description: "The state of the tables described. Valid states: Table does not exist | Before load | Full load | Table completed | Table cancelled | Table error | Table is being reloaded"
        ValidationPendingRecords:
          $ref: "#/components/schemas/Long"
          description: The number of records that have yet to be validated.
        ValidationFailedRecords:
          $ref: "#/components/schemas/Long"
          description: The number of records that failed validation.
        ValidationSuspendedRecords:
          $ref: "#/components/schemas/Long"
          description: The number of records that couldn't be validated.
        ValidationState:
          $ref: "#/components/schemas/String"
          description: "The validation state of the table. This parameter can have the following values: Not enabled – Validation isn't enabled for the table in the migration task. Pending records – Some records in the table are waiting for validation. Mismatched records – Some records in the table don't match between the source and target. Suspended records – Some records in the table couldn't be validated. No primary key –The table couldn't be validated because it has no primary key. Table error – The table wasn't validated because it's in an error state and some data wasn't migrated. Validated – All rows in the table are validated. If the table is updated, the status can change from Validated. Error – The table couldn't be validated because of an unexpected error. Pending validation – The table is waiting validation. Preparing table – Preparing the table enabled in the migration task for validation. Pending revalidation – All rows in the table are pending validation after the table was updated."
        ValidationStateDetails:
          $ref: "#/components/schemas/String"
          description: Additional details about the state of validation.
        ResyncState:
          $ref: "#/components/schemas/String"
          description: "Records the current state of table resynchronization in the migration task. This parameter can have the following values: Not enabled – Resync is not enabled for the table in the migration task. Pending – The tables are waiting for resync. In progress – Resync in progress for some records in the table. No primary key – The table could not be resynced because it has no primary key. Last resync at: date/time – Resync session is finished at time. Time provided in UTC format."
        ResyncRowsAttempted:
          $ref: "#/components/schemas/LongOptional"
          description: Records the total number of mismatched data rows where the system attempted to apply fixes in the target database.
        ResyncRowsSucceeded:
          $ref: "#/components/schemas/LongOptional"
          description: Records the total number of mismatched data rows where fixes were successfully applied in the target database.
        ResyncRowsFailed:
          $ref: "#/components/schemas/LongOptional"
          description: Records the total number of mismatched data rows where fix attempts failed in the target database.
        ResyncProgress:
          $ref: "#/components/schemas/DoubleOptional"
          description: Calculates the percentage of failed validations that were successfully resynced to the system.
