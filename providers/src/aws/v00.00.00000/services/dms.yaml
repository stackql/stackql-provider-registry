    CancelReplicationTaskAssessmentRunResponse:
      type: object
      properties:
        ReplicationTaskAssessmentRun:
          $ref: "#/components/schemas/ReplicationTaskAssessmentRun"
          description: The ReplicationTaskAssessmentRun object for the canceled assessment run.
    ReplicationTaskAssessmentRun:
      description: Provides information that describes a premigration assessment run that you have started using the StartReplicationTaskAssessmentRun operation. Some of the information appears based on other operations that can return the ReplicationTaskAssessmentRun object.
      type: object
      properties:
        ReplicationTaskAssessmentRunArn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) of this assessment run.
        ReplicationTaskArn:
          $ref: "#/components/schemas/String"
          description: ARN of the migration task associated with this premigration assessment run.
        Status:
          $ref: "#/components/schemas/String"
          description: 'Assessment run status. This status can have one of the following values: "cancelling" – The assessment run was canceled by the CancelReplicationTaskAssessmentRun operation. "deleting" – The assessment run was deleted by the DeleteReplicationTaskAssessmentRun operation. "failed" – At least one individual assessment completed with a failed status. "error-provisioning" – An internal error occurred while resources were provisioned (during provisioning status). "error-executing" – An internal error occurred while individual assessments ran (during running status). "invalid state" – The assessment run is in an unknown state. "passed" – All individual assessments have completed, and none has a failed status. "provisioning" – Resources required to run individual assessments are being provisioned. "running" – Individual assessments are being run. "starting" – The assessment run is starting, but resources are not yet being provisioned for individual assessments. "warning" – At least one individual assessment completed with a warning status or all individual assessments were skipped (completed with a skipped status).'
        ReplicationTaskAssessmentRunCreationDate:
          $ref: "#/components/schemas/TStamp"
          description: Date on which the assessment run was created using the StartReplicationTaskAssessmentRun operation.
        AssessmentProgress:
          $ref: "#/components/schemas/ReplicationTaskAssessmentRunProgress"
          description: Indication of the completion progress for the individual assessments specified to run.
        LastFailureMessage:
          $ref: "#/components/schemas/String"
          description: Last message generated by an individual assessment failure.
        ServiceAccessRoleArn:
          $ref: "#/components/schemas/String"
          description: ARN of the service role used to start the assessment run using the StartReplicationTaskAssessmentRun operation. The role must allow the iam:PassRole action.
        ResultLocationBucket:
          $ref: "#/components/schemas/String"
          description: Amazon S3 bucket where DMS stores the results of this assessment run.
        ResultLocationFolder:
          $ref: "#/components/schemas/String"
          description: Folder in an Amazon S3 bucket where DMS stores the results of this assessment run.
        ResultEncryptionMode:
          $ref: "#/components/schemas/String"
          description: Encryption mode used to encrypt the assessment run results.
        ResultKmsKeyArn:
          $ref: "#/components/schemas/String"
          description: ARN of the KMS encryption key used to encrypt the assessment run results.
        AssessmentRunName:
          $ref: "#/components/schemas/String"
          description: Unique name of the assessment run.
        IsLatestTaskAssessmentRun:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that the following PreflightAssessmentRun is the latest for the ReplicationTask. The status is either true or false.
        ResultStatistic:
          $ref: "#/components/schemas/ReplicationTaskAssessmentRunResultStatistic"
          description: Result statistics for a completed assessment run, showing aggregated statistics of IndividualAssessments for how many assessments were passed, failed, or encountered issues such as errors or warnings.
    ReplicationTaskAssessmentRunProgress:
      description: The progress values reported by the AssessmentProgress response element.
      type: object
      properties:
        IndividualAssessmentCount:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that are specified to run.
        IndividualAssessmentCompletedCount:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that have completed, successfully or not.
    Integer:
      type: integer
    Boolean:
      type: boolean
    ReplicationTaskAssessmentRunResultStatistic:
      description: The object containing the result statistics for a completed assessment run.
      type: object
      properties:
        Passed:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that successfully passed all checks in the assessment run.
        Failed:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that failed to meet the criteria defined in the assessment run.
        Error:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that encountered a critical error and could not complete properly.
        Warning:
          $ref: "#/components/schemas/Integer"
          description: Indicates that the recent completed AssessmentRun triggered a warning.
        Cancelled:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that were cancelled during the assessment run.
        Skipped:
          $ref: "#/components/schemas/Integer"
          description: The number of individual assessments that were skipped during the assessment run.
