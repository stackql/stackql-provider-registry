          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationInstanceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication instance.
                EndpointArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) string that uniquely identifies the endpoint.
              required:
                - ReplicationInstanceArn
                - EndpointArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"
  /UpdateSubscriptionsToEventBridge:
    post:
      operationId: UpdateSubscriptionsToEventBridge
      description: Migrates 10 active and enabled Amazon SNS subscriptions at a time and converts them to corresponding Amazon EventBridge rules. By default, this operation migrates subscriptions only when all your replication instance versions are 3.4.5 or higher. If any replication instances are from versions earlier than 3.4.5, the operation raises an error and tells you to upgrade these instances to version 3.4.5 or higher. To enable migration regardless of version, set the Force option to true. However, if you don't upgrade instances earlier than version 3.4.5, some types of events might not be available when you use Amazon EventBridge. To call this operation, make sure that you have certain permissions added to your user account. For more information, see Migrating event subscriptions to Amazon EventBridge in the Amazon Web Services Database Migration Service User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.UpdateSubscriptionsToEventBridge
            default: AmazonDMSv20160101.UpdateSubscriptionsToEventBridge
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ForceMove:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: When set to true, this operation migrates DMS subscriptions for Amazon SNS notifications no matter what your replication instance version is. If not set or set to false, this operation runs only when all your replication instances are from DMS version 3.4.5 or higher.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriptionsToEventBridgeResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "A user-defined key-value pair that describes metadata added to an DMS resource and that is used by operations such as the following: AddTagsToResource ListTagsForResource RemoveTagsFromResource"
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: "A key is the required name of the tag. The string value can be 1-128 Unicode characters in length and can't be prefixed with \"aws:\" or \"dms:\". The string can only contain only the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regular expressions: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          $ref: "#/components/schemas/String"
          description: "A value is the optional value of the tag. The string value can be 1-256 Unicode characters in length and can't be prefixed with \"aws:\" or \"dms:\". The string can only contain only the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regular expressions: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        ResourceArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) string that uniquely identifies the resource for which the tag is created.
    AddTagsToResourceResponse:
      type: object
    ApplyPendingMaintenanceActionResponse:
      type: object
      properties:
        ResourcePendingMaintenanceActions:
          $ref: "#/components/schemas/ResourcePendingMaintenanceActions"
          description: The DMS resource that the pending maintenance action will be applied to.
    ResourcePendingMaintenanceActions:
      description: Identifies an DMS resource and any pending actions for it.
      type: object
      properties:
        ResourceIdentifier:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the DMS resource that the pending maintenance action applies to. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN) for DMS in the DMS documentation.
        PendingMaintenanceActionDetails:
          $ref: "#/components/schemas/PendingMaintenanceActionDetails"
          description: Detailed information about the pending maintenance action.
    PendingMaintenanceActionDetails:
      type: array
      items:
        $ref: "#/components/schemas/PendingMaintenanceAction"
    PendingMaintenanceAction:
      description: Describes a maintenance action pending for an DMS resource, including when and how it will be applied. This data type is a response element to the DescribePendingMaintenanceActions operation.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/String"
          description: The type of pending maintenance action that is available for the resource.
        AutoAppliedAfterDate:
          $ref: "#/components/schemas/TStamp"
          description: The date of the maintenance window when the action is to be applied. The maintenance action is applied to the resource during its first maintenance window after this date. If this date is specified, any next-maintenance opt-in requests are ignored.
        ForcedApplyDate:
          $ref: "#/components/schemas/TStamp"
          description: The date when the maintenance action will be automatically applied. The maintenance action is applied to the resource on this date regardless of the maintenance window for the resource. If this date is specified, any immediate opt-in requests are ignored.
        OptInStatus:
          $ref: "#/components/schemas/String"
          description: The type of opt-in request that has been received for the resource.
        CurrentApplyDate:
          $ref: "#/components/schemas/TStamp"
          description: The effective date when the pending maintenance action will be applied to the resource. This date takes into account opt-in requests received from the ApplyPendingMaintenanceAction API operation, and also the AutoAppliedAfterDate and ForcedApplyDate parameter values. This value is blank if an opt-in request has not been received and nothing has been specified for AutoAppliedAfterDate or ForcedApplyDate.
        Description:
          $ref: "#/components/schemas/String"
          description: A description providing more detail about the maintenance action.
    TStamp:
      type: string
      format: date-time
    StartRecommendationsRequestEntryList:
