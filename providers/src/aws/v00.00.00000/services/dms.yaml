                  description: The properties of metadata model in JSON format. This object is a Union. Only one member of this object can be specified or returned.
              required:
                - MigrationProjectIdentifier
                - SelectionRules
                - MetadataModelName
                - Properties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetadataModelCreationResponse"
  /StartMetadataModelExportAsScript:
    post:
      operationId: StartMetadataModelExportAsScript
      description: Saves your converted code to a file as a SQL script, and stores this file on your Amazon S3 bucket.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartMetadataModelExportAsScript
            default: AmazonDMSv20160101.StartMetadataModelExportAsScript
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/MigrationProjectIdentifier"
                  description: The migration project name or Amazon Resource Name (ARN).
                SelectionRules:
                  $ref: "#/components/schemas/String"
                  description: A value that specifies the database objects to export.
                Origin:
                  $ref: "#/components/schemas/OriginTypeValue"
                  description: Whether to export the metadata model from the source or the target.
                FileName:
                  $ref: "#/components/schemas/String"
                  description: The name of the model file to create in the Amazon S3 bucket.
              required:
                - MigrationProjectIdentifier
                - SelectionRules
                - Origin
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetadataModelExportAsScriptResponse"
  /StartMetadataModelExportToTarget:
    post:
      operationId: StartMetadataModelExportToTarget
      description: Applies converted database objects to your target database.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartMetadataModelExportToTarget
            default: AmazonDMSv20160101.StartMetadataModelExportToTarget
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/MigrationProjectIdentifier"
                  description: The migration project name or Amazon Resource Name (ARN).
                SelectionRules:
                  $ref: "#/components/schemas/String"
                  description: A value that specifies the database objects to export.
                OverwriteExtensionPack:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Whether to overwrite the migration project extension pack. An extension pack is an add-on module that emulates functions present in a source database that are required when converting objects to the target database.
              required:
                - MigrationProjectIdentifier
                - SelectionRules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetadataModelExportToTargetResponse"
  /StartMetadataModelImport:
    post:
      operationId: StartMetadataModelImport
      description: Loads the metadata for all the dependent database objects of the parent object. This operation uses your project's Amazon S3 bucket as a metadata cache to improve performance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartMetadataModelImport
            default: AmazonDMSv20160101.StartMetadataModelImport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/MigrationProjectIdentifier"
                  description: The migration project name or Amazon Resource Name (ARN).
                SelectionRules:
                  $ref: "#/components/schemas/String"
                  description: A value that specifies the database objects to import.
                Origin:
                  $ref: "#/components/schemas/OriginTypeValue"
                  description: Whether to load metadata to the source or target database.
                Refresh:
                  $ref: "#/components/schemas/Boolean"
                  description: If true, DMS loads metadata for the specified objects from the source database.
              required:
                - MigrationProjectIdentifier
                - SelectionRules
                - Origin
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMetadataModelImportResponse"
  /StartRecommendations:
    post:
      operationId: StartRecommendations
      description: "End of support notice: On May 20, 2026, Amazon Web Services will end support for Amazon Web Services DMS Fleet Advisor;. After May 20, 2026, you will no longer be able to access the Amazon Web Services DMS Fleet Advisor; console or Amazon Web Services DMS Fleet Advisor; resources. For more information, see Amazon Web Services DMS Fleet Advisor end of support. Starts the analysis of your source database to provide recommendations of target engines. You can create recommendations for multiple source databases using BatchStartRecommendations."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartRecommendations
            default: AmazonDMSv20160101.StartRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DatabaseId:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the source database to analyze and provide recommendations for.
                Settings:
                  $ref: "#/components/schemas/RecommendationSettings"
                  description: "The settings in JSON format that Fleet Advisor uses to determine target engine recommendations. These parameters include target instance sizing and availability and durability settings. For target instance sizing, Fleet Advisor supports the following two options: total capacity and resource utilization. For availability and durability, Fleet Advisor supports the following two options: production (Multi-AZ deployments) and Dev/Test (Single-AZ deployments)."
              required:
                - DatabaseId
                - Settings
      responses:
        "200":
          description: Success
  /StartReplication:
    post:
      operationId: StartReplication
      description: For a given DMS Serverless replication configuration, DMS connects to the source endpoint and collects the metadata to analyze the replication workload. Using this metadata, DMS then computes and provisions the required capacity and starts replicating to the target endpoint using the server resources that DMS has provisioned for the DMS Serverless replication.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartReplication
            default: AmazonDMSv20160101.StartReplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationConfigArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name of the replication for which to start replication.
                StartReplicationType:
                  $ref: "#/components/schemas/String"
                  description: The replication type. When the replication type is full-load or full-load-and-cdc, the only valid value for the first run of the replication is start-replication. This option will start the replication. You can also use ReloadTables to reload specific tables that failed during replication instead of restarting the replication. The resume-processing option isn't applicable for a full-load replication, because you can't resume partially loaded tables during the full load phase. For a full-load-and-cdc replication, DMS migrates table data, and then applies data changes that occur on the source. To load all the tables again, and start capturing source changes, use reload-target. Otherwise use resume-processing, to replicate the changes from the last stop position.
                PremigrationAssessmentSettings:
                  $ref: "#/components/schemas/String"
                  description: "User-defined settings for the premigration assessment. The possible values are: ResultLocationFolder: The folder within an Amazon S3 bucket where you want DMS to store the results of this assessment run. ResultEncryptionMode: The supported values are SSE_KMS and SSE_S3. If these values are not provided, then the files are not encrypted at rest. For more information, see Creating Amazon Web Services KMS keys to encrypt Amazon S3 target objects. ResultKmsKeyArn: The ARN of a customer KMS encryption key that you specify when you set ResultEncryptionMode to SSE_KMS. IncludeOnly: A space-separated list of names for specific individual assessments that you want to include. These names come from the default list of individual assessments that Database Migration Service supports for the associated migration. Exclude: A space-separated list of names for specific individual assessments that you want to exclude. These names come from the default list of individual assessments that Database Migration Service supports for the associated migration. FailOnAssessmentFailure: A configurable setting you can set to true (the default setting) or false. Use this setting to to stop the replication from starting automatically if the assessment fails. This can help you evaluate the issue that is preventing the replication from running successfully."
                CdcStartTime:
                  $ref: "#/components/schemas/TStamp"
                  description: Indicates the start time for a change data capture (CDC) operation. Use either CdcStartTime or CdcStartPosition to specify when you want a CDC operation to start. Specifying both values results in an error.
                CdcStartPosition:
                  $ref: "#/components/schemas/String"
                  description: Indicates when you want a change data capture (CDC) operation to start. Use either CdcStartPosition or CdcStartTime to specify when you want a CDC operation to start. Specifying both values results in an error. The value can be in date, checkpoint, or LSN/SCN format.
                CdcStopPosition:
                  $ref: "#/components/schemas/String"
                  description: Indicates when you want a change data capture (CDC) operation to stop. The value can be either server time or commit time.
              required:
                - ReplicationConfigArn
                - StartReplicationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReplicationResponse"
  /StartReplicationTask:
    post:
      operationId: StartReplicationTask
      description: Starts the replication task. For more information about DMS tasks, see Working with Migration Tasks in the Database Migration Service User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartReplicationTask
            default: AmazonDMSv20160101.StartReplicationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication task to be started.
                StartReplicationTaskType:
                  $ref: "#/components/schemas/StartReplicationTaskTypeValue"
                  description: The type of replication task to start. start-replication is the only valid action that can be used for the first time a task with the migration type of full-loadfull-load, full-load-and-cdc or cdc is run. Any other action used for the first time on a given task, such as resume-processing and reload-target will result in data errors. You can also use ReloadTables to reload specific tables that failed during migration instead of restarting the task. For a full-load task, the resume-processing option will reload any tables that were partially loaded or not yet loaded during the full load phase. For a full-load-and-cdc task, DMS migrates table data, and then applies data changes that occur on the source. To load all the tables again, and start capturing source changes, use reload-target. Otherwise use resume-processing, to replicate the changes from the last stop position. For a cdc only task, to start from a specific position, you must use start-replication and also specify the start position. Check the source endpoint DMS documentation for any limitations. For example, not all sources support starting from a time. resume-processing is only available for previously executed tasks.
                CdcStartTime:
                  $ref: "#/components/schemas/TStamp"
                  description: "Indicates the start time for a change data capture (CDC) operation. Use either CdcStartTime or CdcStartPosition to specify when you want a CDC operation to start. Specifying both values results in an error. Timestamp Example: --cdc-start-time “2018-03-08T12:12:12”"
                CdcStartPosition:
                  $ref: "#/components/schemas/String"
                  description: 'Indicates when you want a change data capture (CDC) operation to start. Use either CdcStartPosition or CdcStartTime to specify when you want a CDC operation to start. Specifying both values results in an error. The value can be in date, checkpoint, or LSN/SCN format. Date Example: --cdc-start-position “2018-03-08T12:12:12” Checkpoint Example: --cdc-start-position "checkpoint:V1#27#mysql-bin-changelog.157832:1975:-1:2002:677883278264080:mysql-bin-changelog.157832:1876#0#0#*#0#93" LSN Example: --cdc-start-position “mysql-bin-changelog.000024:373” When you use this task setting with a source PostgreSQL database, a logical replication slot should already be created and associated with the source endpoint. You can verify this by setting the slotName extra connection attribute to the name of this logical replication slot. For more information, see Extra Connection Attributes When Using PostgreSQL as a Source for DMS.'
                CdcStopPosition:
                  $ref: "#/components/schemas/String"
                  description: "Indicates when you want a change data capture (CDC) operation to stop. The value can be either server time or commit time. Server time example: --cdc-stop-position “server_time:2018-02-09T12:12:12” Commit time example: --cdc-stop-position “commit_time:2018-02-09T12:12:12“"
              required:
                - ReplicationTaskArn
                - StartReplicationTaskType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReplicationTaskResponse"
  /StartReplicationTaskAssessment:
    post:
      operationId: StartReplicationTaskAssessment
      description: "Starts the replication task assessment for unsupported data types in the source database. You can only use this operation for a task if the following conditions are true: The task must be in the stopped state. The task must have successful connections to the source and target. If either of these conditions are not met, an InvalidResourceStateFault error will result. For information about DMS task assessments, see Creating a task assessment report in the Database Migration Service User Guide."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartReplicationTaskAssessment
            default: AmazonDMSv20160101.StartReplicationTaskAssessment
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication task.
              required:
                - ReplicationTaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReplicationTaskAssessmentResponse"
  /StartReplicationTaskAssessmentRun:
    post:
      operationId: StartReplicationTaskAssessmentRun
      description: Starts a new premigration assessment run for one or more individual assessments of a migration task. The assessments that you can specify depend on the source and target database engine and the migration type defined for the given task. To run this operation, your migration task must already be created. After you run this operation, you can review the status of each individual assessment. You can also run the migration task manually after the assessment run and its individual assessments complete.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StartReplicationTaskAssessmentRun
            default: AmazonDMSv20160101.StartReplicationTaskAssessmentRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: Amazon Resource Name (ARN) of the migration task associated with the premigration assessment run that you want to start.
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: ARN of the service role needed to start the assessment run. The role must allow the iam:PassRole action.
                ResultLocationBucket:
                  $ref: "#/components/schemas/String"
                  description: Amazon S3 bucket where you want DMS to store the results of this assessment run.
                ResultLocationFolder:
                  $ref: "#/components/schemas/String"
                  description: Folder within an Amazon S3 bucket where you want DMS to store the results of this assessment run.
                ResultEncryptionMode:
                  $ref: "#/components/schemas/String"
                  description: "Encryption mode that you can specify to encrypt the results of this assessment run. If you don't specify this request parameter, DMS stores the assessment run results without encryption. You can specify one of the options following: \"SSE_S3\" – The server-side encryption provided as a default by Amazon S3. \"SSE_KMS\" – Key Management Service (KMS) encryption. This encryption can use either a custom KMS encryption key that you specify or the default KMS encryption key that DMS provides."
                ResultKmsKeyArn:
                  $ref: "#/components/schemas/String"
                  description: ARN of a custom KMS encryption key that you specify when you set ResultEncryptionMode to "SSE_KMS".
                AssessmentRunName:
                  $ref: "#/components/schemas/String"
                  description: Unique name to identify the assessment run.
                IncludeOnly:
                  $ref: "#/components/schemas/IncludeTestList"
                  description: Space-separated list of names for specific individual assessments that you want to include. These names come from the default list of individual assessments that DMS supports for the associated migration task. This task is specified by ReplicationTaskArn. You can't set a value for IncludeOnly if you also set a value for Exclude in the API operation. To identify the names of the default individual assessments that DMS supports for the associated migration task, run the DescribeApplicableIndividualAssessments operation using its own ReplicationTaskArn request parameter.
                Exclude:
                  $ref: "#/components/schemas/ExcludeTestList"
                  description: Space-separated list of names for specific individual assessments that you want to exclude. These names come from the default list of individual assessments that DMS supports for the associated migration task. This task is specified by ReplicationTaskArn. You can't set a value for Exclude if you also set a value for IncludeOnly in the API operation. To identify the names of the default individual assessments that DMS supports for the associated migration task, run the DescribeApplicableIndividualAssessments operation using its own ReplicationTaskArn request parameter.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the premigration assessment run that you want to start.
              required:
                - ReplicationTaskArn
                - ServiceAccessRoleArn
                - ResultLocationBucket
                - AssessmentRunName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartReplicationTaskAssessmentRunResponse"
  /StopDataMigration:
    post:
