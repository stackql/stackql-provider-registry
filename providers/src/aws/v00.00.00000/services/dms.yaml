    DescribeRecommendationLimitationsResponse:
      type: object
      properties:
        NextToken:
          $ref: "#/components/schemas/String"
          description: The unique pagination token returned for you to pass to a subsequent request. Fleet Advisor returns this token when the number of records in the response is greater than the MaxRecords value. To retrieve the next page, make the call again using the returned token and keeping all other arguments unchanged.
        Limitations:
