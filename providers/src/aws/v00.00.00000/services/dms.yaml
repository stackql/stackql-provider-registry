          $ref: "#/components/schemas/String"
          description: 'The reason the replication task was stopped. This response parameter can return one of the following values: "Stop Reason NORMAL" "Stop Reason RECOVERABLE_ERROR" "Stop Reason FATAL_ERROR" "Stop Reason FULL_LOAD_ONLY_FINISHED" "Stop Reason STOPPED_AFTER_FULL_LOAD" – Full load completed, with cached changes not applied "Stop Reason STOPPED_AFTER_CACHED_EVENTS" – Full load completed, with cached changes applied "Stop Reason EXPRESS_LICENSE_LIMITS_REACHED" "Stop Reason STOPPED_AFTER_DDL_APPLY" – User-defined stop task after DDL applied "Stop Reason STOPPED_DUE_TO_LOW_MEMORY" "Stop Reason STOPPED_DUE_TO_LOW_DISK" "Stop Reason STOPPED_AT_SERVER_TIME" – User-defined server time for stopping task "Stop Reason STOPPED_AT_COMMIT_TIME" – User-defined commit time for stopping task "Stop Reason RECONFIGURATION_RESTART" "Stop Reason RECYCLE_TASK"'
        FailureMessages:
          $ref: "#/components/schemas/StringList"
          description: Error and other information about why a serverless replication failed.
        ReplicationStats:
          $ref: "#/components/schemas/ReplicationStats"
