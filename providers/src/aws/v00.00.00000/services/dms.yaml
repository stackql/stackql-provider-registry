      description: Modifies an existing DMS Serverless replication configuration that you can use to start a replication. This command includes input validation and logic to check the state of any replication that uses this configuration. You can only modify a replication configuration before any replication that uses it has started. As soon as you have initially started a replication with a given configuiration, you can't modify that configuration, even if you stop it. Other run statuses that allow you to run this command include FAILED and CREATED. A provisioning state that allows you to run this command is FAILED_PROVISION.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyReplicationConfig
            default: AmazonDMSv20160101.ModifyReplicationConfig
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationConfigArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name of the replication to modify.
                ReplicationConfigIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The new replication config to apply to the replication.
                ReplicationType:
                  $ref: "#/components/schemas/MigrationTypeValue"
                  description: The type of replication.
                TableMappings:
                  $ref: "#/components/schemas/String"
                  description: Table mappings specified in the replication.
                ReplicationSettings:
                  $ref: "#/components/schemas/String"
                  description: The settings for the replication.
                SupplementalSettings:
                  $ref: "#/components/schemas/String"
                  description: Additional settings for the replication.
                ComputeConfig:
                  $ref: "#/components/schemas/ComputeConfig"
                  description: Configuration parameters for provisioning an DMS Serverless replication.
                SourceEndpointArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the source endpoint for this DMS serverless replication configuration.
                TargetEndpointArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the target endpoint for this DMS serverless replication configuration.
