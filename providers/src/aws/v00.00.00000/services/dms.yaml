          description: The Amazon S3 bucket that Database Migration Service Serverless created to store the results of this assessment run.
        ResultLocationFolder:
          $ref: "#/components/schemas/String"
          description: The folder within an Amazon S3 bucket where you want Database Migration Service to store the results of this assessment run.
        ResultEncryptionMode:
          $ref: "#/components/schemas/String"
          description: The supported values are SSE_KMS and SSE_S3. If these values are not provided, then the files are not encrypted at rest. For more information, see Creating Amazon Web Services KMS keys to encrypt Amazon S3 target objects.
        ResultKmsKeyArn:
