          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyMigrationProject
            default: AmazonDMSv20160101.ModifyMigrationProject
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the migration project. Identifiers must begin with a letter and must contain only ASCII letters, digits, and hyphens. They can't end with a hyphen, or contain two consecutive hyphens.
                MigrationProjectName:
                  $ref: "#/components/schemas/String"
                  description: A user-friendly name for the migration project.
                SourceDataProviderDescriptors:
                  $ref: "#/components/schemas/DataProviderDescriptorDefinitionList"
                  description: Information about the source data provider, including the name, ARN, and Amazon Web Services Secrets Manager parameters.
                TargetDataProviderDescriptors:
                  $ref: "#/components/schemas/DataProviderDescriptorDefinitionList"
