                ResourceArnList:
                  $ref: "#/components/schemas/ArnList"
                  description: List of ARNs that identify multiple DMS resources that you want to list tags for. This returns a list of keys (tag names) and their associated tag values. It also returns each tag's associated ResourceArn value, which is the ARN of the resource for which each listed tag is created.
      responses:
