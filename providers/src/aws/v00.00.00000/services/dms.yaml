  /ModifyDataMigration:
    post:
      operationId: ModifyDataMigration
      description: Modifies an existing DMS data migration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyDataMigration
            default: AmazonDMSv20160101.ModifyDataMigration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataMigrationIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier (name or ARN) of the data migration to modify.
                DataMigrationName:
                  $ref: "#/components/schemas/String"
                  description: The new name for the data migration.
                EnableCloudwatchLogs:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Whether to enable Cloudwatch logs for the data migration.
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The new service access role ARN for the data migration.
                DataMigrationType:
                  $ref: "#/components/schemas/MigrationTypeValue"
                  description: The new migration type for the data migration.
                SourceDataSettings:
                  $ref: "#/components/schemas/SourceDataSettings"
                  description: The new information about the source data provider for the data migration.
                TargetDataSettings:
                  $ref: "#/components/schemas/TargetDataSettings"
                  description: The new information about the target data provider for the data migration.
                NumberOfJobs:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of parallel jobs that trigger parallel threads to unload the tables from the source, and then load them to the target.
                SelectionRules:
                  $ref: "#/components/schemas/SecretString"
                  description: A JSON-formatted string that defines what objects to include and exclude from the migration.
              required:
                - DataMigrationIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyDataMigrationResponse"
  /ModifyDataProvider:
    post:
      operationId: ModifyDataProvider
      description: Modifies the specified data provider using the provided settings. You must remove the data provider from all migration projects before you can modify it.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyDataProvider
            default: AmazonDMSv20160101.ModifyDataProvider
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataProviderIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier of the data provider. Identifiers must begin with a letter and must contain only ASCII letters, digits, and hyphens. They can't end with a hyphen, or contain two consecutive hyphens.
                DataProviderName:
                  $ref: "#/components/schemas/String"
                  description: The name of the data provider.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A user-friendly description of the data provider.
                Engine:
                  $ref: "#/components/schemas/String"
                  description: The type of database engine for the data provider. Valid values include "aurora", "aurora-postgresql", "mysql", "oracle", "postgres", "sqlserver", redshift, mariadb, mongodb, db2, db2-zos, docdb, and sybase. A value of "aurora" represents Amazon Aurora MySQL-Compatible Edition.
                Virtual:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Indicates whether the data provider is virtual.
                ExactSettings:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: "If this attribute is Y, the current call to ModifyDataProvider replaces all existing data provider settings with the exact settings that you specify in this call. If this attribute is N, the current call to ModifyDataProvider does two things: It replaces any data provider settings that already exist with new values, for settings with the same names. It creates new data provider settings that you specify in the call, for settings with different names."
                Settings:
                  $ref: "#/components/schemas/DataProviderSettings"
                  description: The settings in JSON format for a data provider.
              required:
                - DataProviderIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyDataProviderResponse"
  /ModifyEndpoint:
    post:
      operationId: ModifyEndpoint
      description: Modifies the specified endpoint. For a MySQL source or target endpoint, don't explicitly specify the database using the DatabaseName request parameter on the ModifyEndpoint API call. Specifying DatabaseName when you modify a MySQL endpoint replicates all the task tables to this single database. For MySQL endpoints, you specify the database only when you specify the schema in the table-mapping rules of the DMS task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyEndpoint
            default: AmazonDMSv20160101.ModifyEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) string that uniquely identifies the endpoint.
                EndpointIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The database endpoint identifier. Identifiers must begin with a letter and must contain only ASCII letters, digits, and hyphens. They can't end with a hyphen or contain two consecutive hyphens.
                EndpointType:
                  $ref: "#/components/schemas/ReplicationEndpointTypeValue"
                  description: The type of endpoint. Valid values are source and target.
                EngineName:
                  $ref: "#/components/schemas/String"
                  description: The database engine name. Valid values, depending on the EndpointType, include "mysql", "oracle", "postgres", "mariadb", "aurora", "aurora-postgresql", "redshift", "s3", "db2", "db2-zos", "azuredb", "sybase", "dynamodb", "mongodb", "kinesis", "kafka", "elasticsearch", "documentdb", "sqlserver", "neptune", and "babelfish".
                Username:
                  $ref: "#/components/schemas/String"
                  description: The user name to be used to login to the endpoint database.
                Password:
                  $ref: "#/components/schemas/SecretString"
                  description: The password to be used to login to the endpoint database.
                ServerName:
                  $ref: "#/components/schemas/String"
                  description: The name of the server where the endpoint database resides.
                Port:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The port used by the endpoint database.
                DatabaseName:
                  $ref: "#/components/schemas/String"
                  description: The name of the endpoint database. For a MySQL source or target endpoint, do not specify DatabaseName.
                ExtraConnectionAttributes:
                  $ref: "#/components/schemas/String"
                  description: Additional attributes associated with the connection. To reset this parameter, pass the empty string ("") as an argument.
                CertificateArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the certificate used for SSL connection.
                SslMode:
                  $ref: "#/components/schemas/DmsSslModeValue"
                  description: The SSL mode used to connect to the endpoint. The default value is none.
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) for the IAM role you want to use to modify the endpoint. The role must allow the iam:PassRole action.
                ExternalTableDefinition:
                  $ref: "#/components/schemas/String"
                  description: The external table definition.
                DynamoDbSettings:
                  $ref: "#/components/schemas/DynamoDbSettings"
                  description: Settings in JSON format for the target Amazon DynamoDB endpoint. For information about other available settings, see Using Object Mapping to Migrate Data to DynamoDB in the Database Migration Service User Guide.
                S3Settings:
                  $ref: "#/components/schemas/S3Settings"
                  description: Settings in JSON format for the target Amazon S3 endpoint. For more information about the available settings, see Extra Connection Attributes When Using Amazon S3 as a Target for DMS in the Database Migration Service User Guide.
                DmsTransferSettings:
                  $ref: "#/components/schemas/DmsTransferSettings"
                  description: 'The settings in JSON format for the DMS transfer type of source endpoint. Attributes include the following: serviceAccessRoleArn - The Amazon Resource Name (ARN) used by the service access IAM role. The role must allow the iam:PassRole action. BucketName - The name of the S3 bucket to use. Shorthand syntax for these settings is as follows: ServiceAccessRoleArn=string ,BucketName=string JSON syntax for these settings is as follows: { "ServiceAccessRoleArn": "string", "BucketName": "string"}'
                MongoDbSettings:
                  $ref: "#/components/schemas/MongoDbSettings"
                  description: Settings in JSON format for the source MongoDB endpoint. For more information about the available settings, see the configuration properties section in Endpoint configuration settings when using MongoDB as a source for Database Migration Service in the Database Migration Service User Guide.
                KinesisSettings:
                  $ref: "#/components/schemas/KinesisSettings"
                  description: Settings in JSON format for the target endpoint for Amazon Kinesis Data Streams. For more information about the available settings, see Using object mapping to migrate data to a Kinesis data stream in the Database Migration Service User Guide.
                KafkaSettings:
                  $ref: "#/components/schemas/KafkaSettings"
                  description: Settings in JSON format for the target Apache Kafka endpoint. For more information about the available settings, see Using object mapping to migrate data to a Kafka topic in the Database Migration Service User Guide.
                ElasticsearchSettings:
                  $ref: "#/components/schemas/ElasticsearchSettings"
                  description: Settings in JSON format for the target OpenSearch endpoint. For more information about the available settings, see Extra Connection Attributes When Using OpenSearch as a Target for DMS in the Database Migration Service User Guide.
                NeptuneSettings:
                  $ref: "#/components/schemas/NeptuneSettings"
                  description: Settings in JSON format for the target Amazon Neptune endpoint. For more information about the available settings, see Specifying graph-mapping rules using Gremlin and R2RML for Amazon Neptune as a target in the Database Migration Service User Guide.
                RedshiftSettings:
                  $ref: "#/components/schemas/RedshiftSettings"
                PostgreSQLSettings:
                  $ref: "#/components/schemas/PostgreSQLSettings"
                  description: Settings in JSON format for the source and target PostgreSQL endpoint. For information about other available settings, see Extra connection attributes when using PostgreSQL as a source for DMS and Extra connection attributes when using PostgreSQL as a target for DMS in the Database Migration Service User Guide.
                MySQLSettings:
                  $ref: "#/components/schemas/MySQLSettings"
                  description: Settings in JSON format for the source and target MySQL endpoint. For information about other available settings, see Extra connection attributes when using MySQL as a source for DMS and Extra connection attributes when using a MySQL-compatible database as a target for DMS in the Database Migration Service User Guide.
                OracleSettings:
                  $ref: "#/components/schemas/OracleSettings"
                  description: Settings in JSON format for the source and target Oracle endpoint. For information about other available settings, see Extra connection attributes when using Oracle as a source for DMS and Extra connection attributes when using Oracle as a target for DMS in the Database Migration Service User Guide.
                SybaseSettings:
                  $ref: "#/components/schemas/SybaseSettings"
                  description: Settings in JSON format for the source and target SAP ASE endpoint. For information about other available settings, see Extra connection attributes when using SAP ASE as a source for DMS and Extra connection attributes when using SAP ASE as a target for DMS in the Database Migration Service User Guide.
                MicrosoftSQLServerSettings:
                  $ref: "#/components/schemas/MicrosoftSQLServerSettings"
                  description: Settings in JSON format for the source and target Microsoft SQL Server endpoint. For information about other available settings, see Extra connection attributes when using SQL Server as a source for DMS and Extra connection attributes when using SQL Server as a target for DMS in the Database Migration Service User Guide.
                IBMDb2Settings:
                  $ref: "#/components/schemas/IBMDb2Settings"
                  description: Settings in JSON format for the source IBM Db2 LUW endpoint. For information about other available settings, see Extra connection attributes when using Db2 LUW as a source for DMS in the Database Migration Service User Guide.
                DocDbSettings:
                  $ref: "#/components/schemas/DocDbSettings"
                  description: Settings in JSON format for the source DocumentDB endpoint. For more information about the available settings, see the configuration properties section in Using DocumentDB as a Target for Database Migration Service in the Database Migration Service User Guide.
                RedisSettings:
                  $ref: "#/components/schemas/RedisSettings"
                  description: Settings in JSON format for the Redis target endpoint.
                ExactSettings:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: "If this attribute is Y, the current call to ModifyEndpoint replaces all existing endpoint settings with the exact settings that you specify in this call. If this attribute is N, the current call to ModifyEndpoint does two things: It replaces any endpoint settings that already exist with new values, for settings with the same names. It creates new endpoint settings that you specify in the call, for settings with different names. For example, if you call create-endpoint ... --endpoint-settings '{\"a\":1}' ..., the endpoint has the following endpoint settings: '{\"a\":1}'. If you then call modify-endpoint ... --endpoint-settings '{\"b\":2}' ... for the same endpoint, the endpoint has the following settings: '{\"a\":1,\"b\":2}'. However, suppose that you follow this with a call to modify-endpoint ... --endpoint-settings '{\"b\":2}' --exact-settings ... for that same endpoint again. Then the endpoint has the following settings: '{\"b\":2}'. All existing settings are replaced with the exact settings that you specify."
                GcpMySQLSettings:
                  $ref: "#/components/schemas/GcpMySQLSettings"
                  description: Settings in JSON format for the source GCP MySQL endpoint.
                TimestreamSettings:
                  $ref: "#/components/schemas/TimestreamSettings"
                  description: Settings in JSON format for the target Amazon Timestream endpoint.
              required:
                - EndpointArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyEndpointResponse"
