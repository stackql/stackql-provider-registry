        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.DescribeTableStatistics
            default: AmazonDMSv20160101.DescribeTableStatistics
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication task.
                MaxRecords:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: "The maximum number of records to include in the response. If more records exist than the specified MaxRecords value, a pagination token called a marker is included in the response so that the remaining results can be retrieved. Default: 100 Constraints: Minimum 20, maximum 500."
                Marker:
                  $ref: "#/components/schemas/String"
                  description: An optional pagination token provided by a previous request. If this parameter is specified, the response includes only records beyond the marker, up to the value specified by MaxRecords.
                Filters:
                  $ref: "#/components/schemas/FilterList"
                  description: "Filters applied to table statistics. Valid filter names: schema-name | table-name | table-state A combination of filters creates an AND condition where each record matches all specified filters."
              required:
                - ReplicationTaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeTableStatisticsResponse"
