        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.DescribeApplicableIndividualAssessments
            default: AmazonDMSv20160101.DescribeApplicableIndividualAssessments
