                CertificatePem:
                  $ref: "#/components/schemas/SecretString"
                  description: The contents of a .pem file, which contains an X.509 certificate.
                CertificateWallet:
                  $ref: "#/components/schemas/CertificateWallet"
                  description: "The location of an imported Oracle Wallet certificate for use with SSL. Provide the name of a .sso file using the fileb:// prefix. You can't provide the certificate inline. Example: filebase64(\"${path.root}/rds-ca-2019-root.sso\")"
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags associated with the certificate.
                KmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: An KMS key identifier that is used to encrypt the certificate. If you don't specify a value for the KmsKeyId parameter, then DMS uses your default encryption key. KMS creates the default encryption key for your Amazon Web Services account. Your Amazon Web Services account has a different default encryption key for each Amazon Web Services Region.
              required:
                - CertificateIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCertificateResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all metadata tags attached to an DMS resource, including replication instance, endpoint, subnet group, and migration task. For more information, see Tag data type description.
