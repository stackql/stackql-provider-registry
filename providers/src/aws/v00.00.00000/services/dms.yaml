  /ModifyReplicationTask:
    post:
      operationId: ModifyReplicationTask
      description: Modifies the specified replication task. You can't modify the task endpoints. The task must be stopped before you can modify it. For more information about DMS tasks, see Working with Migration Tasks in the Database Migration Service User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyReplicationTask
            default: AmazonDMSv20160101.ModifyReplicationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication task.
                ReplicationTaskIdentifier:
                  $ref: "#/components/schemas/String"
                  description: "The replication task identifier. Constraints: Must contain 1-255 alphanumeric characters or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens."
                MigrationType:
                  $ref: "#/components/schemas/MigrationTypeValue"
                  description: "The migration type. Valid values: full-load | cdc | full-load-and-cdc"
                TableMappings:
                  $ref: "#/components/schemas/String"
                  description: When using the CLI or boto3, provide the path of the JSON file that contains the table mappings. Precede the path with file://. For example, --table-mappings file://mappingfile.json. When working with the DMS API, provide the JSON as the parameter value.
                ReplicationTaskSettings:
                  $ref: "#/components/schemas/String"
                  description: JSON file that contains settings for the task, such as task metadata settings.
                CdcStartTime:
                  $ref: "#/components/schemas/TStamp"
                  description: "Indicates the start time for a change data capture (CDC) operation. Use either CdcStartTime or CdcStartPosition to specify when you want a CDC operation to start. Specifying both values results in an error. Timestamp Example: --cdc-start-time “2018-03-08T12:12:12”"
                CdcStartPosition:
                  $ref: "#/components/schemas/String"
                  description: 'Indicates when you want a change data capture (CDC) operation to start. Use either CdcStartPosition or CdcStartTime to specify when you want a CDC operation to start. Specifying both values results in an error. The value can be in date, checkpoint, or LSN/SCN format. Date Example: --cdc-start-position “2018-03-08T12:12:12” Checkpoint Example: --cdc-start-position "checkpoint:V1#27#mysql-bin-changelog.157832:1975:-1:2002:677883278264080:mysql-bin-changelog.157832:1876#0#0#*#0#93" LSN Example: --cdc-start-position “mysql-bin-changelog.000024:373” When you use this task setting with a source PostgreSQL database, a logical replication slot should already be created and associated with the source endpoint. You can verify this by setting the slotName extra connection attribute to the name of this logical replication slot. For more information, see Extra Connection Attributes When Using PostgreSQL as a Source for DMS.'
                CdcStopPosition:
                  $ref: "#/components/schemas/String"
                  description: "Indicates when you want a change data capture (CDC) operation to stop. The value can be either server time or commit time. Server time example: --cdc-stop-position “server_time:2018-02-09T12:12:12” Commit time example: --cdc-stop-position “commit_time:2018-02-09T12:12:12“"
                TaskData:
                  $ref: "#/components/schemas/String"
                  description: Supplemental information that the task requires to migrate the data for certain source and target endpoints. For more information, see Specifying Supplemental Data for Task Settings in the Database Migration Service User Guide.
              required:
                - ReplicationTaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyReplicationTaskResponse"
