    Progress:
      description: Provides information about the progress of the schema conversion operation.
      type: object
      properties:
        ProgressPercent:
          $ref: "#/components/schemas/DoubleOptional"
          description: The percent complete for the current step of the schema conversion operation.
        TotalObjects:
          $ref: "#/components/schemas/Long"
          description: The number of objects in this schema conversion operation.
        ProgressStep:
          $ref: "#/components/schemas/String"
          description: "The step of the schema conversion operation. This parameter can store one of the following values: IN_PROGRESS – The operation is running. LOADING_METADATA – Loads metadata from the source database. COUNTING_OBJECTS – Determines the number of objects involved in the operation. ANALYZING – Analyzes the source database objects. CONVERTING – Converts the source database objects to a format compatible with the target database. APPLYING – Applies the converted code to the target database. FINISHED – The operation completed successfully."
        ProcessedObject:
          $ref: "#/components/schemas/ProcessedObject"
          description: The name of the database object that the schema conversion operation currently uses.
    DoubleOptional:
      type: number
      format: double
    Long:
      type: integer
      format: int64
    ProcessedObject:
