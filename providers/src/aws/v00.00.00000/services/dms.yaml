          description: Whether to enable CloudWatch logging for the data migration.
        SelectionRules:
          $ref: "#/components/schemas/SecretString"
          description: A JSON-formatted string that defines what objects to include and exclude from the migration.
    DataMigrationStatistics:
      description: Information about the data migration run, including start and stop time, latency, and migration progress.
      type: object
      properties:
