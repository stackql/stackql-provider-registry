        StartReplicationType:
          $ref: "#/components/schemas/String"
          description: The type of replication to start.
        CdcStartTime:
          $ref: "#/components/schemas/TStamp"
          description: Indicates the start time for a change data capture (CDC) operation. Use either CdcStartTime or CdcStartPosition to specify when you want a CDC operation to start. Specifying both values results in an error.
        CdcStartPosition:
          $ref: "#/components/schemas/String"
          description: Indicates the start time for a change data capture (CDC) operation. Use either CdcStartTime or CdcStartPosition to specify when you want a CDC operation to start. Specifying both values results in an error.
        CdcStopPosition:
          $ref: "#/components/schemas/String"
          description: Indicates when you want a change data capture (CDC) operation to stop. The value can be either server time or commit time.
        RecoveryCheckpoint:
          $ref: "#/components/schemas/String"
          description: Indicates the last checkpoint that occurred during a change data capture (CDC) operation. You can provide this value to the CdcStartPosition parameter to start a CDC operation that begins at that checkpoint.
        ReplicationCreateTime:
          $ref: "#/components/schemas/TStamp"
          description: The time the serverless replication was created.
