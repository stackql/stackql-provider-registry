        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopDataMigrationResponse"
  /StopReplication:
    post:
      operationId: StopReplication
      description: For a given DMS Serverless replication configuration, DMS stops any and all ongoing DMS Serverless replications. This command doesn't deprovision the stopped replications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StopReplication
            default: AmazonDMSv20160101.StopReplication
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationConfigArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name of the replication to stop.
              required:
                - ReplicationConfigArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopReplicationResponse"
  /StopReplicationTask:
    post:
      operationId: StopReplicationTask
      description: Stops the replication task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.StopReplicationTask
            default: AmazonDMSv20160101.StopReplicationTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name(ARN) of the replication task to be stopped.
              required:
                - ReplicationTaskArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopReplicationTaskResponse"
  /TestConnection:
