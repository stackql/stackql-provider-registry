openapi: 3.0.0
info:
  version: "2016-01-01"
  title: AWS Database Migration Service
  description: AWS Database Migration Service
  x-serviceName: dms
  x-serviceAlias: dms
  x-protocol: json
  x-apiVersion: "2016-01-01"
  x-endpointPrefix: dms
  x-targetPrefix: AmazonDMSv20160101
  x-jsonVersion: "1.1"
servers:
  - url: https://dms.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for dms
paths:
  /AddTagsToResource:
    post:
      operationId: AddTagsToResource
      description: Adds metadata tags to an DMS resource, including replication instance, endpoint, subnet group, and migration task. These tags can also be used with cost allocation reporting to track cost associated with DMS resources, or used in a Condition statement in an IAM policy for DMS. For more information, see Tag data type description.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.AddTagsToResource
            default: AmazonDMSv20160101.AddTagsToResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/String"
                  description: Identifies the DMS resource to which tags should be added. The value for this parameter is an Amazon Resource Name (ARN). For DMS, you can tag a replication instance, an endpoint, or a replication task.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the resource.
              required:
                - ResourceArn
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTagsToResourceResponse"
  /ApplyPendingMaintenanceAction:
    post:
      operationId: ApplyPendingMaintenanceAction
      description: Applies a pending maintenance action to a resource (for example, to a replication instance).
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ApplyPendingMaintenanceAction
            default: AmazonDMSv20160101.ApplyPendingMaintenanceAction
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationInstanceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the DMS resource that the pending maintenance action applies to.
                ApplyAction:
                  $ref: "#/components/schemas/String"
                  description: "The pending maintenance action to apply to this resource. Valid values: os-upgrade, system-update, db-upgrade, os-patch"
                OptInType:
                  $ref: "#/components/schemas/String"
                  description: "A value that specifies the type of opt-in request, or undoes an opt-in request. You can't undo an opt-in request of type immediate. Valid values: immediate - Apply the maintenance action immediately. next-maintenance - Apply the maintenance action during the next maintenance window for the resource. undo-opt-in - Cancel any existing next-maintenance opt-in requests."
              required:
                - ReplicationInstanceArn
                - ApplyAction
                - OptInType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionResponse"
  /BatchStartRecommendations:
    post:
      operationId: BatchStartRecommendations
      description: "End of support notice: On May 20, 2026, Amazon Web Services will end support for Amazon Web Services DMS Fleet Advisor;. After May 20, 2026, you will no longer be able to access the Amazon Web Services DMS Fleet Advisor; console or Amazon Web Services DMS Fleet Advisor; resources. For more information, see Amazon Web Services DMS Fleet Advisor end of support. Starts the analysis of up to 20 source databases to recommend target engines for each source database. This is a batch version of StartRecommendations. The result of analysis of each source database is reported individually in the response. Because the batch request can result in a combination of successful and unsuccessful actions, you should check for batch errors even when the call returns an HTTP status code of 200."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.BatchStartRecommendations
            default: AmazonDMSv20160101.BatchStartRecommendations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Data:
                  $ref: "#/components/schemas/StartRecommendationsRequestEntryList"
                  description: Provides information about source databases to analyze. After this analysis, Fleet Advisor recommends target engines for each source database.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStartRecommendationsResponse"
  /CancelMetadataModelConversion:
    post:
      operationId: CancelMetadataModelConversion
      description: Cancels a single metadata model conversion operation that was started with StartMetadataModelConversion.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CancelMetadataModelConversion
            default: AmazonDMSv20160101.CancelMetadataModelConversion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/MigrationProjectIdentifier"
                  description: The migration project name or Amazon Resource Name (ARN).
                RequestIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier for the metadata model conversion operation to cancel. This operation was initiated by StartMetadataModelConversion.
              required:
                - MigrationProjectIdentifier
                - RequestIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMetadataModelConversionResponse"
  /CancelMetadataModelCreation:
    post:
      operationId: CancelMetadataModelCreation
      description: Cancels a single metadata model creation operation that was started with StartMetadataModelCreation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CancelMetadataModelCreation
            default: AmazonDMSv20160101.CancelMetadataModelCreation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/MigrationProjectIdentifier"
                  description: The migration project name or Amazon Resource Name (ARN).
                RequestIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The identifier for the metadata model creation operation to cancel. This operation was initiated by StartMetadataModelCreation.
              required:
                - MigrationProjectIdentifier
                - RequestIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelMetadataModelCreationResponse"
  /CancelReplicationTaskAssessmentRun:
    post:
      operationId: CancelReplicationTaskAssessmentRun
      description: Cancels a single premigration assessment run. This operation prevents any individual assessments from running if they haven't started running. It also attempts to cancel any individual assessments that are currently running.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CancelReplicationTaskAssessmentRun
            default: AmazonDMSv20160101.CancelReplicationTaskAssessmentRun
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationTaskAssessmentRunArn:
                  $ref: "#/components/schemas/String"
                  description: Amazon Resource Name (ARN) of the premigration assessment run to be canceled.
              required:
                - ReplicationTaskAssessmentRunArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelReplicationTaskAssessmentRunResponse"
  /CreateDataMigration:
    post:
      operationId: CreateDataMigration
      description: Creates a data migration using the provided settings.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateDataMigration
            default: AmazonDMSv20160101.CreateDataMigration
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataMigrationName:
                  $ref: "#/components/schemas/String"
                  description: "A user-friendly name for the data migration. Data migration names have the following constraints: Must begin with a letter, and can only contain ASCII letters, digits, and hyphens. Can't end with a hyphen or contain two consecutive hyphens. Length must be from 1 to 255 characters."
                MigrationProjectIdentifier:
                  $ref: "#/components/schemas/String"
                  description: An identifier for the migration project.
                DataMigrationType:
                  $ref: "#/components/schemas/MigrationTypeValue"
                  description: Specifies if the data migration is full-load only, change data capture (CDC) only, or full-load and CDC.
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) for the service access role that you want to use to create the data migration.
                EnableCloudwatchLogs:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Specifies whether to enable CloudWatch logs for the data migration.
                SourceDataSettings:
                  $ref: "#/components/schemas/SourceDataSettings"
                  description: Specifies information about the source data provider.
                TargetDataSettings:
                  $ref: "#/components/schemas/TargetDataSettings"
                  description: Specifies information about the target data provider.
                NumberOfJobs:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The number of parallel jobs that trigger parallel threads to unload the tables from the source, and then load them to the target.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the data migration.
                SelectionRules:
                  $ref: "#/components/schemas/SecretString"
                  description: An optional JSON string specifying what tables, views, and schemas to include or exclude from the migration.
              required:
                - MigrationProjectIdentifier
                - DataMigrationType
                - ServiceAccessRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataMigrationResponse"
  /CreateDataProvider:
    post:
      operationId: CreateDataProvider
      description: Creates a data provider using the provided settings. A data provider stores a data store type and location information about your database.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateDataProvider
            default: AmazonDMSv20160101.CreateDataProvider
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                DataProviderName:
                  $ref: "#/components/schemas/String"
                  description: A user-friendly name for the data provider.
                Description:
                  $ref: "#/components/schemas/String"
                  description: A user-friendly description of the data provider.
                Engine:
                  $ref: "#/components/schemas/String"
                  description: The type of database engine for the data provider. Valid values include "aurora", "aurora-postgresql", "mysql", "oracle", "postgres", "sqlserver", redshift, mariadb, mongodb, db2, db2-zos, docdb, and sybase. A value of "aurora" represents Amazon Aurora MySQL-Compatible Edition.
                Virtual:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Indicates whether the data provider is virtual.
                Settings:
                  $ref: "#/components/schemas/DataProviderSettings"
                  description: The settings in JSON format for a data provider.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the data provider.
              required:
                - Engine
                - Settings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDataProviderResponse"
  /CreateEndpoint:
    post:
      operationId: CreateEndpoint
      description: Creates an endpoint using the provided settings. For a MySQL source or target endpoint, don't explicitly specify the database using the DatabaseName request parameter on the CreateEndpoint API call. Specifying DatabaseName when you create a MySQL endpoint replicates all the task tables to this single database. For MySQL endpoints, you specify the database only when you specify the schema in the table-mapping rules of the DMS task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateEndpoint
            default: AmazonDMSv20160101.CreateEndpoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                EndpointIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The database endpoint identifier. Identifiers must begin with a letter and must contain only ASCII letters, digits, and hyphens. They can't end with a hyphen, or contain two consecutive hyphens.
                EndpointType:
                  $ref: "#/components/schemas/ReplicationEndpointTypeValue"
                  description: The type of endpoint. Valid values are source and target.
                EngineName:
                  $ref: "#/components/schemas/String"
                  description: The type of engine for the endpoint. Valid values, depending on the EndpointType value, include "mysql", "oracle", "postgres", "mariadb", "aurora", "aurora-postgresql", "opensearch", "redshift", "s3", "db2", "db2-zos", "azuredb", "sybase", "dynamodb", "mongodb", "kinesis", "kafka", "elasticsearch", "docdb", "sqlserver", "neptune", "babelfish", redshift-serverless, aurora-serverless, aurora-postgresql-serverless, gcp-mysql, azure-sql-managed-instance, redis, dms-transfer.
                Username:
                  $ref: "#/components/schemas/String"
                  description: The user name to be used to log in to the endpoint database.
                Password:
                  $ref: "#/components/schemas/SecretString"
                  description: The password to be used to log in to the endpoint database.
                ServerName:
                  $ref: "#/components/schemas/String"
                  description: The name of the server where the endpoint database resides.
                Port:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The port used by the endpoint database.
                DatabaseName:
                  $ref: "#/components/schemas/String"
                  description: The name of the endpoint database. For a MySQL source or target endpoint, do not specify DatabaseName. To migrate to a specific database, use this setting and targetDbType.
                ExtraConnectionAttributes:
                  $ref: "#/components/schemas/String"
                  description: Additional attributes associated with the connection. Each attribute is specified as a name-value pair associated by an equal sign (=). Multiple attributes are separated by a semicolon (;) with no additional white space. For information on the attributes available for connecting your source or target endpoint, see Working with DMS Endpoints in the Database Migration Service User Guide.
                KmsKeyId:
                  $ref: "#/components/schemas/String"
                  description: An KMS key identifier that is used to encrypt the connection parameters for the endpoint. If you don't specify a value for the KmsKeyId parameter, then DMS uses your default encryption key. KMS creates the default encryption key for your Amazon Web Services account. Your Amazon Web Services account has a different default encryption key for each Amazon Web Services Region.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the endpoint.
                CertificateArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) for the certificate.
                SslMode:
                  $ref: "#/components/schemas/DmsSslModeValue"
                  description: The Secure Sockets Layer (SSL) mode to use for the SSL connection. The default is none
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) for the service access role that you want to use to create the endpoint. The role must allow the iam:PassRole action.
                ExternalTableDefinition:
                  $ref: "#/components/schemas/String"
                  description: The external table definition.
                DynamoDbSettings:
                  $ref: "#/components/schemas/DynamoDbSettings"
                  description: Settings in JSON format for the target Amazon DynamoDB endpoint. For information about other available settings, see Using Object Mapping to Migrate Data to DynamoDB in the Database Migration Service User Guide.
                S3Settings:
                  $ref: "#/components/schemas/S3Settings"
                  description: Settings in JSON format for the target Amazon S3 endpoint. For more information about the available settings, see Extra Connection Attributes When Using Amazon S3 as a Target for DMS in the Database Migration Service User Guide.
                DmsTransferSettings:
                  $ref: "#/components/schemas/DmsTransferSettings"
                  description: 'The settings in JSON format for the DMS transfer type of source endpoint. Possible settings include the following: ServiceAccessRoleArn - The Amazon Resource Name (ARN) used by the service access IAM role. The role must allow the iam:PassRole action. BucketName - The name of the S3 bucket to use. Shorthand syntax for these settings is as follows: ServiceAccessRoleArn=string,BucketName=string JSON syntax for these settings is as follows: { "ServiceAccessRoleArn": "string", "BucketName": "string", }'
                MongoDbSettings:
                  $ref: "#/components/schemas/MongoDbSettings"
                  description: Settings in JSON format for the source MongoDB endpoint. For more information about the available settings, see Endpoint configuration settings when using MongoDB as a source for Database Migration Service in the Database Migration Service User Guide.
                KinesisSettings:
                  $ref: "#/components/schemas/KinesisSettings"
                  description: Settings in JSON format for the target endpoint for Amazon Kinesis Data Streams. For more information about the available settings, see Using object mapping to migrate data to a Kinesis data stream in the Database Migration Service User Guide.
                KafkaSettings:
                  $ref: "#/components/schemas/KafkaSettings"
                  description: Settings in JSON format for the target Apache Kafka endpoint. For more information about the available settings, see Using object mapping to migrate data to a Kafka topic in the Database Migration Service User Guide.
                ElasticsearchSettings:
                  $ref: "#/components/schemas/ElasticsearchSettings"
                  description: Settings in JSON format for the target OpenSearch endpoint. For more information about the available settings, see Extra Connection Attributes When Using OpenSearch as a Target for DMS in the Database Migration Service User Guide.
                NeptuneSettings:
                  $ref: "#/components/schemas/NeptuneSettings"
                  description: Settings in JSON format for the target Amazon Neptune endpoint. For more information about the available settings, see Specifying graph-mapping rules using Gremlin and R2RML for Amazon Neptune as a target in the Database Migration Service User Guide.
                RedshiftSettings:
                  $ref: "#/components/schemas/RedshiftSettings"
                PostgreSQLSettings:
                  $ref: "#/components/schemas/PostgreSQLSettings"
                  description: Settings in JSON format for the source and target PostgreSQL endpoint. For information about other available settings, see Extra connection attributes when using PostgreSQL as a source for DMS and Extra connection attributes when using PostgreSQL as a target for DMS in the Database Migration Service User Guide.
                MySQLSettings:
                  $ref: "#/components/schemas/MySQLSettings"
                  description: Settings in JSON format for the source and target MySQL endpoint. For information about other available settings, see Extra connection attributes when using MySQL as a source for DMS and Extra connection attributes when using a MySQL-compatible database as a target for DMS in the Database Migration Service User Guide.
                OracleSettings:
                  $ref: "#/components/schemas/OracleSettings"
                  description: Settings in JSON format for the source and target Oracle endpoint. For information about other available settings, see Extra connection attributes when using Oracle as a source for DMS and Extra connection attributes when using Oracle as a target for DMS in the Database Migration Service User Guide.
                SybaseSettings:
                  $ref: "#/components/schemas/SybaseSettings"
                  description: Settings in JSON format for the source and target SAP ASE endpoint. For information about other available settings, see Extra connection attributes when using SAP ASE as a source for DMS and Extra connection attributes when using SAP ASE as a target for DMS in the Database Migration Service User Guide.
                MicrosoftSQLServerSettings:
                  $ref: "#/components/schemas/MicrosoftSQLServerSettings"
                  description: Settings in JSON format for the source and target Microsoft SQL Server endpoint. For information about other available settings, see Extra connection attributes when using SQL Server as a source for DMS and Extra connection attributes when using SQL Server as a target for DMS in the Database Migration Service User Guide.
                IBMDb2Settings:
                  $ref: "#/components/schemas/IBMDb2Settings"
                  description: Settings in JSON format for the source IBM Db2 LUW endpoint. For information about other available settings, see Extra connection attributes when using Db2 LUW as a source for DMS in the Database Migration Service User Guide.
                ResourceIdentifier:
                  $ref: "#/components/schemas/String"
                  description: A friendly name for the resource identifier at the end of the EndpointArn response parameter that is returned in the created Endpoint object. The value for this parameter can have up to 31 characters. It can contain only ASCII letters, digits, and hyphen ('-'). Also, it can't end with a hyphen or contain two consecutive hyphens, and can only begin with a letter, such as Example-App-ARN1. For example, this value might result in the EndpointArn value arn:aws:dms:eu-west-1:012345678901:rep:Example-App-ARN1. If you don't specify a ResourceIdentifier value, DMS generates a default identifier value for the end of EndpointArn.
                DocDbSettings:
                  $ref: "#/components/schemas/DocDbSettings"
                RedisSettings:
                  $ref: "#/components/schemas/RedisSettings"
                  description: Settings in JSON format for the target Redis endpoint.
                GcpMySQLSettings:
                  $ref: "#/components/schemas/GcpMySQLSettings"
                  description: Settings in JSON format for the source GCP MySQL endpoint.
                TimestreamSettings:
                  $ref: "#/components/schemas/TimestreamSettings"
                  description: Settings in JSON format for the target Amazon Timestream endpoint.
              required:
                - EndpointIdentifier
                - EndpointType
                - EngineName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEndpointResponse"
  /CreateEventSubscription:
    post:
      operationId: CreateEventSubscription
      description: Creates an DMS event notification subscription. You can specify the type of source (SourceType) you want to be notified of, provide a list of DMS source IDs (SourceIds) that triggers the events, and provide a list of event categories (EventCategories) for events you want to be notified of. If you specify both the SourceType and SourceIds, such as SourceType = replication-instance and SourceIdentifier = my-replinstance, you will be notified of all the replication instance events for the specified source. If you specify a SourceType but don't specify a SourceIdentifier, you receive notice of the events for that source type for all your DMS sources. If you don't specify either SourceType nor SourceIdentifier, you will be notified of events generated from all DMS sources belonging to your customer account. For more information about DMS events, see Working with Events and Notifications in the Database Migration Service User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateEventSubscription
            default: AmazonDMSv20160101.CreateEventSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                SubscriptionName:
                  $ref: "#/components/schemas/String"
                  description: The name of the DMS event notification subscription. This name must be less than 255 characters.
                SnsTopicArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the Amazon SNS topic created for event notification. The ARN is created by Amazon SNS when you create a topic and subscribe to it.
                SourceType:
                  $ref: "#/components/schemas/String"
                  description: "The type of DMS resource that generates the events. For example, if you want to be notified of events generated by a replication instance, you set this parameter to replication-instance. If this value isn't specified, all events are returned. Valid values: replication-instance | replication-task"
                EventCategories:
                  $ref: "#/components/schemas/EventCategoriesList"
                  description: A list of event categories for a source type that you want to subscribe to. For more information, see Working with Events and Notifications in the Database Migration Service User Guide.
                SourceIds:
                  $ref: "#/components/schemas/SourceIdsList"
                  description: A list of identifiers for which DMS provides notification events. If you don't specify a value, notifications are provided for all sources. If you specify multiple values, they must be of the same type. For example, if you specify a database instance ID, then all of the other values must be database instance IDs.
                Enabled:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: A Boolean value; set to true to activate the subscription, or set to false to create the subscription but not activate it.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: One or more tags to be assigned to the event subscription.
              required:
                - SubscriptionName
                - SnsTopicArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventSubscriptionResponse"
  /CreateFleetAdvisorCollector:
    post:
      operationId: CreateFleetAdvisorCollector
      description: "End of support notice: On May 20, 2026, Amazon Web Services will end support for Amazon Web Services DMS Fleet Advisor;. After May 20, 2026, you will no longer be able to access the Amazon Web Services DMS Fleet Advisor; console or Amazon Web Services DMS Fleet Advisor; resources. For more information, see Amazon Web Services DMS Fleet Advisor end of support. Creates a Fleet Advisor collector using the specified parameters."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateFleetAdvisorCollector
            default: AmazonDMSv20160101.CreateFleetAdvisorCollector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                CollectorName:
                  $ref: "#/components/schemas/String"
                  description: The name of your Fleet Advisor collector (for example, sample-collector).
                Description:
                  $ref: "#/components/schemas/String"
                  description: A summary description of your Fleet Advisor collector.
                ServiceAccessRoleArn:
                  $ref: "#/components/schemas/String"
                  description: The IAM role that grants permissions to access the specified Amazon S3 bucket.
                S3BucketName:
                  $ref: "#/components/schemas/String"
                  description: The Amazon S3 bucket that the Fleet Advisor collector uses to store inventory metadata.
              required:
                - CollectorName
                - ServiceAccessRoleArn
                - S3BucketName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFleetAdvisorCollectorResponse"
  /CreateInstanceProfile:
    post:
      operationId: CreateInstanceProfile
      description: Creates the instance profile using the specified parameters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.CreateInstanceProfile
            default: AmazonDMSv20160101.CreateInstanceProfile
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                AvailabilityZone:
                  $ref: "#/components/schemas/String"
                  description: The Availability Zone where the instance profile will be created. The default value is a random, system-chosen Availability Zone in the Amazon Web Services Region where your data provider is created, for examplem us-east-1d.
                KmsKeyArn:
                  $ref: "#/components/schemas/String"
