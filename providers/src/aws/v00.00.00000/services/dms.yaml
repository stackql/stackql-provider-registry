                $ref: "#/components/schemas/ModifyReplicationConfigResponse"
  /ModifyReplicationInstance:
    post:
      operationId: ModifyReplicationInstance
      description: Modifies the replication instance to apply new settings. You can change one or more parameters by specifying these parameters and the new values in the request. Some settings are applied during the maintenance window.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonDMSv20160101.ModifyReplicationInstance
            default: AmazonDMSv20160101.ModifyReplicationInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ReplicationInstanceArn:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Resource Name (ARN) of the replication instance.
                AllocatedStorage:
                  $ref: "#/components/schemas/IntegerOptional"
                  description: The amount of storage (in gigabytes) to be allocated for the replication instance.
                ApplyImmediately:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates whether the changes should be applied immediately or during the next maintenance window.
                ReplicationInstanceClass:
                  $ref: "#/components/schemas/ReplicationInstanceClass"
                  description: The compute and memory capacity of the replication instance as defined for the specified replication instance class. For example to specify the instance class dms.c4.large, set this parameter to "dms.c4.large". For more information on the settings and capacities for the available replication instance classes, see Selecting the right DMS replication instance for your migration.
                VpcSecurityGroupIds:
                  $ref: "#/components/schemas/VpcSecurityGroupIdList"
                  description: Specifies the VPC security group to be used with the replication instance. The VPC security group must work with the VPC containing the replication instance.
                PreferredMaintenanceWindow:
                  $ref: "#/components/schemas/String"
                  description: "The weekly time range (in UTC) during which system maintenance can occur, which might result in an outage. Changing this parameter does not result in an outage, except in the following situation, and the change is asynchronously applied as soon as possible. If moving this window to the current time, there must be at least 30 minutes between the current time and end of the window to ensure pending changes are applied. Default: Uses existing setting Format: ddd:hh24:mi-ddd:hh24:mi Valid Days: Mon | Tue | Wed | Thu | Fri | Sat | Sun Constraints: Must be at least 30 minutes"
                MultiAZ:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: Specifies whether the replication instance is a Multi-AZ deployment. You can't set the AvailabilityZone parameter if the Multi-AZ parameter is set to true.
                EngineVersion:
                  $ref: "#/components/schemas/String"
                  description: The engine version number of the replication instance. When modifying a major engine version of an instance, also set AllowMajorVersionUpgrade to true.
                AllowMajorVersionUpgrade:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates that major version upgrades are allowed. Changing this parameter does not result in an outage, and the change is asynchronously applied as soon as possible. This parameter must be set to true when specifying a value for the EngineVersion parameter that is a different major version than the replication instance's current version.
                AutoMinorVersionUpgrade:
                  $ref: "#/components/schemas/BooleanOptional"
                  description: "A value that indicates that minor version upgrades are applied automatically to the replication instance during the maintenance window. Changing this parameter doesn't result in an outage, except in the case described following. The change is asynchronously applied as soon as possible. An outage does result if these factors apply: This parameter is set to true during the maintenance window. A newer minor version is available. DMS has enabled automatic patching for the given engine version."
                ReplicationInstanceIdentifier:
                  $ref: "#/components/schemas/String"
                  description: The replication instance identifier. This parameter is stored as a lowercase string.
                NetworkType:
                  $ref: "#/components/schemas/String"
                  description: The type of IP address protocol used by a replication instance, such as IPv4 only or Dual-stack that supports both IPv4 and IPv6 addressing. IPv6 only is not yet supported.
                KerberosAuthenticationSettings:
                  $ref: "#/components/schemas/KerberosAuthenticationSettings"
                  description: Specifies the settings required for kerberos authentication when modifying a replication instance.
              required:
                - ReplicationInstanceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModifyReplicationInstanceResponse"
  /ModifyReplicationSubnetGroup:
