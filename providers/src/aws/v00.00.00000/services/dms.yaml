        Status:
          $ref: "#/components/schemas/String"
          description: "This describes the assessment run status. The status can be one of the following values: cancelling: The assessment run was canceled. deleting: The assessment run was deleted. failed: At least one individual assessment completed with a failed status. error-provisioning: An internal error occurred while resources were provisioned (during the provisioning status). error-executing An internal error occurred while individual assessments ran (during the running status). invalid state: The assessment run is in an unknown state. passed: All individual assessments have completed and none have a failed status. provisioning: The resources required to run individual assessments are being provisioned. running: Individual assessments are being run. starting: The assessment run is starting, but resources are not yet being provisioned for individual assessments. warning: At least one individual assessment completed with a warning status."
        PremigrationAssessmentRunCreationDate:
