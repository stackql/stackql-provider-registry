    OrganizationFeatureConfigurationResult:
      description: A list of features which will be configured for the organization.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/OrgFeature"
          description: The name of the feature that is configured for the member accounts within the organization.
        AutoEnable:
          $ref: "#/components/schemas/OrgFeatureStatus"
          description: "Describes the status of the feature that is configured for the member accounts within the organization. NEW: Indicates that when a new account joins the organization, they will have the feature enabled automatically. ALL: Indicates that all accounts in the organization have the feature enabled automatically. This includes NEW accounts that join the organization and accounts that may have been suspended or removed from the organization in GuardDuty. NONE: Indicates that the feature will not be automatically enabled for any account in the organization. In this case, each account will be managed individually by the administrator."
        AdditionalConfiguration:
          $ref: "#/components/schemas/OrganizationAdditionalConfigurationResults"
          description: The additional configuration that is configured for the member accounts within the organization.
    OrgFeature:
      type: string
