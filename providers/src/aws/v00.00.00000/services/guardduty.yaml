      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the identified threat.
        Severity:
          $ref: "#/components/schemas/String"
          description: Severity of threat identified as part of the malware scan.
        ItemCount:
          $ref: "#/components/schemas/Integer"
          description: Total number of files infected with given threat.
        FilePaths:
          $ref: "#/components/schemas/FilePaths"
          description: List of infected files in EBS volume with details.
    FilePaths:
      type: array
      items:
        $ref: "#/components/schemas/ScanFilePath"
    ScanFilePath:
      description: Contains details of infected file including name, file path and hash.
      type: object
      properties:
        FilePath:
          $ref: "#/components/schemas/String"
          description: The file path of the infected file.
        VolumeArn:
          $ref: "#/components/schemas/String"
          description: EBS volume ARN details of the infected file.
        Hash:
          $ref: "#/components/schemas/String"
          description: The hash value of the infected file.
        FileName:
          $ref: "#/components/schemas/String"
          description: File name of the infected file.
    RuntimeDetails:
      description: Information about the process and any required context values for a specific finding.
      type: object
      properties:
        Process:
          $ref: "#/components/schemas/ProcessDetails"
          description: Information about the observed process.
        Context:
          $ref: "#/components/schemas/RuntimeContext"
          description: Additional information about the suspicious activity.
    ProcessDetails:
      description: Information about the observed process.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the process.
        ExecutablePath:
          $ref: "#/components/schemas/String"
          description: The absolute path of the process executable file.
        ExecutableSha256:
          $ref: "#/components/schemas/String"
          description: The SHA256 hash of the process executable.
        NamespacePid:
          $ref: "#/components/schemas/Integer"
          description: The ID of the child process.
        Pwd:
          $ref: "#/components/schemas/String"
          description: The present working directory of the process.
        Pid:
          $ref: "#/components/schemas/Integer"
          description: The ID of the process.
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the process started. This is in UTC format.
        Uuid:
          $ref: "#/components/schemas/String"
          description: The unique ID assigned to the process by GuardDuty.
        ParentUuid:
          $ref: "#/components/schemas/String"
          description: The unique ID of the parent process. This ID is assigned to the parent process by GuardDuty.
        User:
          $ref: "#/components/schemas/String"
          description: The user that executed the process.
        UserId:
          $ref: "#/components/schemas/Integer"
          description: The unique ID of the user that executed the process.
        Euid:
          $ref: "#/components/schemas/Integer"
          description: The effective user ID of the user that executed the process.
        Lineage:
          $ref: "#/components/schemas/Lineage"
          description: Information about the process's lineage.
    Lineage:
      type: array
      items:
        $ref: "#/components/schemas/LineageObject"
    LineageObject:
      description: Information about the runtime process details.
      type: object
      properties:
        StartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The time when the process started. This is in UTC format.
        NamespacePid:
          $ref: "#/components/schemas/Integer"
          description: The process ID of the child process.
        UserId:
          $ref: "#/components/schemas/Integer"
          description: The user ID of the user that executed the process.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the process.
        Pid:
          $ref: "#/components/schemas/Integer"
          description: The ID of the process.
        Uuid:
          $ref: "#/components/schemas/String"
          description: The unique ID assigned to the process by GuardDuty.
        ExecutablePath:
          $ref: "#/components/schemas/String"
          description: The absolute path of the process executable file.
        Euid:
          $ref: "#/components/schemas/Integer"
          description: The effective user ID that was used to execute the process.
        ParentUuid:
          $ref: "#/components/schemas/String"
          description: The unique ID of the parent process. This ID is assigned to the parent process by GuardDuty.
    RuntimeContext:
      description: Additional information about the suspicious activity.
      type: object
      properties:
        ModifyingProcess:
          $ref: "#/components/schemas/ProcessDetails"
          description: Information about the process that modified the current process. This is available for multiple finding types.
        ModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the process modified the current process. The timestamp is in UTC date string format.
        ScriptPath:
          $ref: "#/components/schemas/String"
          description: The path to the script that was executed.
        LibraryPath:
          $ref: "#/components/schemas/String"
          description: The path to the new library that was loaded.
        LdPreloadValue:
          $ref: "#/components/schemas/String"
          description: The value of the LD_PRELOAD environment variable.
        SocketPath:
          $ref: "#/components/schemas/String"
          description: The path to the docket socket that was accessed.
        RuncBinaryPath:
          $ref: "#/components/schemas/String"
          description: The path to the leveraged runc implementation.
        ReleaseAgentPath:
          $ref: "#/components/schemas/String"
          description: The path in the container that modified the release agent file.
        MountSource:
          $ref: "#/components/schemas/String"
          description: The path on the host that is mounted by the container.
        MountTarget:
          $ref: "#/components/schemas/String"
          description: The path in the container that is mapped to the host directory.
        FileSystemType:
          $ref: "#/components/schemas/String"
          description: Represents the type of mounted fileSystem.
        Flags:
          $ref: "#/components/schemas/FlagsList"
          description: Represents options that control the behavior of a runtime operation or action. For example, a filesystem mount operation may contain a read-only flag.
        ModuleName:
          $ref: "#/components/schemas/String"
          description: The name of the module loaded into the kernel.
        ModuleFilePath:
          $ref: "#/components/schemas/String"
          description: The path to the module loaded into the kernel.
        ModuleSha256:
          $ref: "#/components/schemas/String"
          description: The SHA256 hash of the module.
        ShellHistoryFilePath:
          $ref: "#/components/schemas/String"
          description: The path to the modified shell history file.
        TargetProcess:
          $ref: "#/components/schemas/ProcessDetails"
          description: Information about the process that had its memory overwritten by the current process.
        AddressFamily:
          $ref: "#/components/schemas/String"
          description: Represents the communication protocol associated with the address. For example, the address family AF_INET is used for IP version of 4 protocol.
        IanaProtocolNumber:
          $ref: "#/components/schemas/Integer"
          description: Specifies a particular protocol within the address family. Usually there is a single protocol in address families. For example, the address family AF_INET only has the IP protocol.
        MemoryRegions:
          $ref: "#/components/schemas/MemoryRegionsList"
          description: Specifies the Region of a process's address space such as stack and heap.
        ToolName:
          $ref: "#/components/schemas/String"
          description: Name of the potentially suspicious tool.
        ToolCategory:
          $ref: "#/components/schemas/String"
          description: Category that the tool belongs to. Some of the examples are Backdoor Tool, Pentest Tool, Network Scanner, and Network Sniffer.
        ServiceName:
          $ref: "#/components/schemas/String"
          description: Name of the security service that has been potentially disabled.
        CommandLineExample:
          $ref: "#/components/schemas/String"
          description: Example of the command line involved in the suspicious activity.
        ThreatFilePath:
          $ref: "#/components/schemas/String"
          description: The suspicious file path for which the threat intelligence details were found.
    FlagsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    MemoryRegionsList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Detection:
      description: Contains information about the detected behavior.
      type: object
      properties:
        Anomaly:
          $ref: "#/components/schemas/Anomaly"
          description: The details about the anomalous activity that caused GuardDuty to generate the finding.
        Sequence:
          $ref: "#/components/schemas/Sequence"
          description: The details about the attack sequence.
    Anomaly:
      description: Contains information about the anomalies.
      type: object
      properties:
        Profiles:
          type: object
          properties: {}
          description: Information about the types of profiles.
        Unusual:
          $ref: "#/components/schemas/AnomalyUnusual"
          description: Information about the behavior of the anomalies.
    AnomalyUnusual:
      description: Contains information about the behavior of the anomaly that is new to GuardDuty.
      type: object
      properties:
        Behavior:
          type: object
          properties: {}
          description: The behavior of the anomalous activity that caused GuardDuty to generate the finding.
    Sequence:
      description: Contains information about the GuardDuty attack sequence finding.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/String"
          description: Unique identifier of the attack sequence.
        Description:
          $ref: "#/components/schemas/SequenceDescription"
          description: Description of the attack sequence.
        Actors:
          $ref: "#/components/schemas/Actors"
          description: Contains information about the actors involved in the attack sequence.
        Resources:
          $ref: "#/components/schemas/Resources"
          description: Contains information about the resources involved in the attack sequence.
        Endpoints:
          $ref: "#/components/schemas/NetworkEndpoints"
          description: Contains information about the network endpoints that were used in the attack sequence.
        Signals:
          $ref: "#/components/schemas/Signals"
          description: Contains information about the signals involved in the attack sequence.
        SequenceIndicators:
          $ref: "#/components/schemas/Indicators"
          description: Contains information about the indicators observed in the attack sequence.
        AdditionalSequenceTypes:
          $ref: "#/components/schemas/AdditionalSequenceTypes"
          description: Additional types of sequences that may be associated with the attack sequence finding, providing further context about the nature of the detected threat.
      required:
        - Uid
        - Description
        - Signals
    SequenceDescription:
      type: string
      minLength: 0
      maxLength: 4096
    Actors:
      type: array
      items:
        $ref: "#/components/schemas/Actor"
    Actor:
      description: Information about the actors involved in an attack sequence.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/String"
          description: ID of the threat actor.
        User:
          $ref: "#/components/schemas/User"
          description: Contains information about the user credentials used by the threat actor.
        Session:
          $ref: "#/components/schemas/Session"
          description: Contains information about the user session where the activity initiated.
        Process:
          $ref: "#/components/schemas/ActorProcess"
          description: Contains information about the process associated with the threat actor. This includes details such as process name, path, execution time, and unique identifiers that help track the actor's activities within the system.
      required:
        - Id
    User:
      description: Contains information about the user involved in the attack sequence.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the user.
        Uid:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the user.
        Type:
          $ref: "#/components/schemas/String"
          description: The type of the user.
        CredentialUid:
          $ref: "#/components/schemas/String"
          description: The credentials of the user ID.
        Account:
          $ref: "#/components/schemas/Account"
          description: Contains information about the Amazon Web Services account within which the activity took place. This is not necessarily the account that owns the user identity.
      required:
        - Name
        - Uid
        - Type
    Account:
      description: Contains information about the Amazon Web Services account within which the activity took place.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account ID within which the activity took place. This may differ from the account that owns the user identity.
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the member's Amazon Web Services account.
      required:
        - Uid
    Session:
      description: Contains information about the authenticated session.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the session.
        MfaStatus:
          $ref: "#/components/schemas/MfaStatus"
          description: Indicates whether or not multi-factor authencation (MFA) was used during authentication. In Amazon Web Services CloudTrail, you can find this value as userIdentity.sessionContext.attributes.mfaAuthenticated.
        CreatedTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp for when the session was created. In Amazon Web Services CloudTrail, you can find this value as userIdentity.sessionContext.attributes.creationDate.
        Issuer:
          $ref: "#/components/schemas/String"
          description: Identifier of the session issuer. In Amazon Web Services CloudTrail, you can find this value as userIdentity.sessionContext.sessionIssuer.arn.
    MfaStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    ActorProcess:
      description: Contains information about a process involved in a GuardDuty finding, including process identification, execution details, and file information.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/ProcessName"
          description: The name of the process as it appears in the system.
        Path:
          $ref: "#/components/schemas/ProcessPath"
          description: The full file path to the process executable on the system.
        Sha256:
          $ref: "#/components/schemas/ProcessSha256"
          description: The SHA256 hash of the process executable file, which can be used for identification and verification purposes.
      required:
        - Name
        - Path
    ProcessName:
      type: string
      minLength: 0
      maxLength: 4096
    ProcessPath:
      type: string
      minLength: 0
      maxLength: 4096
    ProcessSha256:
      type: string
      minLength: 0
      maxLength: 1024
    Resources:
      type: array
      items:
        $ref: "#/components/schemas/ResourceV2"
    ResourceV2:
      description: Contains information about the Amazon Web Services resource that is associated with the GuardDuty finding.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the resource.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the resource.
        AccountId:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services account ID to which the resource belongs.
        ResourceType:
          $ref: "#/components/schemas/FindingResourceType"
          description: The type of the Amazon Web Services resource.
        Region:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services Region where the resource belongs.
        Service:
          $ref: "#/components/schemas/String"
          description: The Amazon Web Services service of the resource.
        CloudPartition:
          $ref: "#/components/schemas/String"
          description: The cloud partition within the Amazon Web Services Region to which the resource belongs.
        Tags:
          $ref: "#/components/schemas/Tags"
          description: Contains information about the tags associated with the resource.
        Data:
          $ref: "#/components/schemas/ResourceData"
          description: Contains information about the Amazon Web Services resource associated with the activity that prompted GuardDuty to generate a finding.
      required:
        - Uid
        - ResourceType
    FindingResourceType:
      type: string
      enum:
        - EC2_INSTANCE
        - EC2_NETWORK_INTERFACE
        - S3_BUCKET
        - S3_OBJECT
        - ACCESS_KEY
        - EKS_CLUSTER
        - KUBERNETES_WORKLOAD
        - CONTAINER
        - ECS_CLUSTER
        - ECS_TASK
        - AUTOSCALING_AUTO_SCALING_GROUP
        - IAM_INSTANCE_PROFILE
        - CLOUDFORMATION_STACK
        - EC2_LAUNCH_TEMPLATE
        - EC2_VPC
        - EC2_IMAGE
    ResourceData:
      description: Contains information about the Amazon Web Services resource that is associated with the activity that prompted GuardDuty to generate a finding.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: Contains information about the Amazon S3 bucket.
        Ec2Instance:
          $ref: "#/components/schemas/Ec2Instance"
          description: Contains information about the Amazon EC2 instance.
        AccessKey:
          $ref: "#/components/schemas/AccessKey"
          description: Contains information about the IAM access key details of a user that involved in the GuardDuty finding.
        Ec2NetworkInterface:
          $ref: "#/components/schemas/Ec2NetworkInterface"
          description: Contains information about the elastic network interface of the Amazon EC2 instance.
        S3Object:
          $ref: "#/components/schemas/S3Object"
          description: Contains information about the Amazon S3 object.
        EksCluster:
          $ref: "#/components/schemas/EksCluster"
          description: Contains detailed information about the Amazon EKS cluster associated with the activity that prompted GuardDuty to generate a finding.
        KubernetesWorkload:
          $ref: "#/components/schemas/KubernetesWorkload"
          description: Contains detailed information about the Kubernetes workload associated with the activity that prompted GuardDuty to generate a finding.
        Container:
          $ref: "#/components/schemas/ContainerFindingResource"
          description: Contains detailed information about the container associated with the activity that prompted GuardDuty to generate a finding.
        EcsCluster:
          $ref: "#/components/schemas/EcsCluster"
          description: Contains detailed information about the Amazon ECS cluster associated with the activity that prompted GuardDuty to generate a finding.
        EcsTask:
          $ref: "#/components/schemas/EcsTask"
          description: Contains detailed information about the Amazon ECS task associated with the activity that prompted GuardDuty to generate a finding.
        IamInstanceProfile:
          $ref: "#/components/schemas/IamInstanceProfileV2"
          description: Contains detailed information about the IAM instance profile associated with the activity that prompted GuardDuty to generate a finding.
        AutoscalingAutoScalingGroup:
          $ref: "#/components/schemas/AutoscalingAutoScalingGroup"
          description: Contains detailed information about the Auto Scaling Group associated with the activity that prompted GuardDuty to generate a finding.
        Ec2LaunchTemplate:
          $ref: "#/components/schemas/Ec2LaunchTemplate"
          description: Contains detailed information about the EC2 launch template associated with the activity that prompted GuardDuty to generate a finding.
        Ec2Vpc:
          $ref: "#/components/schemas/Ec2Vpc"
          description: Contains detailed information about the EC2 VPC associated with the activity that prompted GuardDuty to generate a finding.
        Ec2Image:
          $ref: "#/components/schemas/Ec2Image"
          description: Contains detailed information about the EC2 Image associated with the activity that prompted GuardDuty to generate a finding.
        CloudformationStack:
          $ref: "#/components/schemas/CloudformationStack"
          description: Contains detailed information about the CloudFormation stack associated with the activity that prompted GuardDuty to generate a finding.
    S3Bucket:
      description: Contains information about the Amazon S3 bucket policies and encryption.
      type: object
      properties:
        OwnerId:
          $ref: "#/components/schemas/String"
          description: The owner ID of the associated S3Amazon S3bucket.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the Amazon S3 bucket was created.
        EncryptionType:
          $ref: "#/components/schemas/String"
          description: The type of encryption used for the Amazon S3 buckets and its objects. For more information, see Protecting data with server-side encryption in the Amazon S3 User Guide.
        EncryptionKeyArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the encryption key that is used to encrypt the Amazon S3 bucket and its objects.
        EffectivePermission:
          $ref: "#/components/schemas/String"
          description: Describes the effective permissions on this S3 bucket, after factoring all the attached policies.
        PublicReadAccess:
          $ref: "#/components/schemas/PublicAccessStatus"
          description: Indicates whether or not the public read access is allowed for an Amazon S3 bucket.
        PublicWriteAccess:
          $ref: "#/components/schemas/PublicAccessStatus"
          description: Indicates whether or not the public write access is allowed for an Amazon S3 bucket.
        AccountPublicAccess:
          $ref: "#/components/schemas/PublicAccessConfiguration"
          description: Contains information about the public access policies that apply to the Amazon S3 bucket at the account level.
        BucketPublicAccess:
          $ref: "#/components/schemas/PublicAccessConfiguration"
          description: Contains information about public access policies that apply to the Amazon S3 bucket.
        S3ObjectUids:
          $ref: "#/components/schemas/S3ObjectUids"
          description: Represents a list of Amazon S3 object identifiers.
    PublicAccessStatus:
      type: string
      enum:
        - BLOCKED
        - ALLOWED
    PublicAccessConfiguration:
      description: Describes public access policies that apply to the Amazon S3 bucket. For information about each of the following settings, see Blocking public access to your Amazon S3 storage in the Amazon S3 User Guide.
      type: object
      properties:
        PublicAclAccess:
          $ref: "#/components/schemas/PublicAccessStatus"
          description: Indicates whether or not there is a setting that allows public access to the Amazon S3 buckets through access control lists (ACLs).
        PublicPolicyAccess:
          $ref: "#/components/schemas/PublicAccessStatus"
          description: Indicates whether or not there is a setting that allows public access to the Amazon S3 bucket policy.
        PublicAclIgnoreBehavior:
          $ref: "#/components/schemas/PublicAclIgnoreBehavior"
          description: Indicates whether or not there is a setting that ignores all public access control lists (ACLs) on the Amazon S3 bucket and the objects that it contains.
        PublicBucketRestrictBehavior:
          $ref: "#/components/schemas/PublicBucketRestrictBehavior"
          description: Indicates whether or not there is a setting that restricts access to the bucket with specified policies.
    PublicAclIgnoreBehavior:
      type: string
      enum:
        - IGNORED
        - NOT_IGNORED
    PublicBucketRestrictBehavior:
      type: string
      enum:
        - RESTRICTED
        - NOT_RESTRICTED
    S3ObjectUids:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Ec2Instance:
      description: Details about the potentially impacted Amazon EC2 instance resource.
      type: object
      properties:
        AvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The availability zone of the Amazon EC2 instance. For more information, see Availability zones in the Amazon EC2 User Guide.
        ImageDescription:
          $ref: "#/components/schemas/String"
          description: The image description of the Amazon EC2 instance.
        InstanceState:
          $ref: "#/components/schemas/String"
          description: The state of the Amazon EC2 instance. For more information, see Amazon EC2 instance state changes in the Amazon EC2 User Guide.
        IamInstanceProfile:
          $ref: "#/components/schemas/IamInstanceProfile"
        InstanceType:
          $ref: "#/components/schemas/String"
          description: Type of the Amazon EC2 instance.
        OutpostArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the Amazon Web Services Outpost. This shows applicable Amazon Web Services Outposts instances.
        Platform:
          $ref: "#/components/schemas/String"
          description: The platform of the Amazon EC2 instance.
        ProductCodes:
          $ref: "#/components/schemas/ProductCodes"
          description: The product code of the Amazon EC2 instance.
        Ec2NetworkInterfaceUids:
          $ref: "#/components/schemas/Ec2NetworkInterfaceUids"
          description: The ID of the network interface.
    Ec2NetworkInterfaceUids:
      type: array
      items:
        $ref: "#/components/schemas/String"
    AccessKey:
      description: Contains information about the access keys.
      type: object
      properties:
        PrincipalId:
          $ref: "#/components/schemas/String"
          description: Principal ID of the user.
        UserName:
          $ref: "#/components/schemas/String"
          description: Name of the user.
        UserType:
          $ref: "#/components/schemas/String"
          description: Type of the user.
    Ec2NetworkInterface:
      description: Contains information about the elastic network interface of the Amazon EC2 instance.
      type: object
      properties:
        Ipv6Addresses:
          $ref: "#/components/schemas/Ipv6Addresses"
          description: A list of IPv6 addresses for the Amazon EC2 instance.
        PrivateIpAddresses:
          $ref: "#/components/schemas/PrivateIpAddresses"
          description: Other private IP address information of the Amazon EC2 instance.
        PublicIp:
          $ref: "#/components/schemas/String"
          description: The public IP address of the Amazon EC2 instance.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroups"
          description: The security groups associated with the Amazon EC2 instance.
        SubNetId:
          $ref: "#/components/schemas/String"
          description: The subnet ID of the Amazon EC2 instance.
        VpcId:
          $ref: "#/components/schemas/String"
          description: The VPC ID of the Amazon EC2 instance.
    S3Object:
      description: Contains information about the Amazon S3 object.
      type: object
      properties:
        ETag:
          $ref: "#/components/schemas/String"
          description: The entity tag is a hash of the Amazon S3 object. The ETag reflects changes only to the contents of an object, and not its metadata.
        Key:
          $ref: "#/components/schemas/String"
          description: The key of the Amazon S3 object.
        VersionId:
          $ref: "#/components/schemas/String"
          description: The version Id of the Amazon S3 object.
    EksCluster:
      description: Contains information about the Amazon EKS cluster involved in a GuardDuty finding, including cluster identification, status, and network configuration.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that uniquely identifies the Amazon EKS cluster involved in the finding.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp indicating when the Amazon EKS cluster was created, in UTC format.
        Status:
          $ref: "#/components/schemas/ClusterStatus"
          description: The current status of the Amazon EKS cluster.
        VpcId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Virtual Private Cloud (Amazon VPC) associated with the Amazon EKS cluster.
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the Amazon EC2 instances that serve as worker nodes in the Amazon EKS cluster.
    ClusterStatus:
      type: string
      enum:
        - CREATING
        - ACTIVE
        - DELETING
        - FAILED
        - UPDATING
        - PENDING
    Ec2InstanceUids:
      type: array
      items:
        $ref: "#/components/schemas/Ec2InstanceUid"
    Ec2InstanceUid:
      type: string
      minLength: 0
      maxLength: 256
    KubernetesWorkload:
      description: Contains information about Kubernetes workloads involved in a GuardDuty finding, including pods, deployments, and other Kubernetes resources.
      type: object
      properties:
        ContainerUids:
          $ref: "#/components/schemas/ContainerUids"
          description: A list of unique identifiers for the containers that are part of the Kubernetes workload.
        Namespace:
          $ref: "#/components/schemas/String"
          description: The Kubernetes namespace in which the workload is running, providing logical isolation within the cluster.
        KubernetesResourcesTypes:
          $ref: "#/components/schemas/KubernetesResourcesTypes"
          description: The types of Kubernetes resources involved in the workload.
    ContainerUids:
      type: array
      items:
        $ref: "#/components/schemas/ContainerUid"
    ContainerUid:
      type: string
      minLength: 0
      maxLength: 256
    KubernetesResourcesTypes:
      type: string
      enum:
        - PODS
        - JOBS
        - CRONJOBS
        - DEPLOYMENTS
        - DAEMONSETS
        - STATEFULSETS
        - REPLICASETS
        - REPLICATIONCONTROLLERS
    ContainerFindingResource:
      description: Contains information about container resources involved in a GuardDuty finding. This structure provides details about containers that were identified as part of suspicious or malicious activity.
      type: object
      properties:
        Image:
          $ref: "#/components/schemas/String"
          description: The container image information, including the image name and tag used to run the container that was involved in the finding.
        ImageUid:
          $ref: "#/components/schemas/ContainerImageUid"
          description: The unique ID associated with the container image.
      required:
        - Image
    ContainerImageUid:
      type: string
      minLength: 1
      maxLength: 1024
    EcsCluster:
      description: Contains information about the Amazon ECS cluster involved in a GuardDuty finding, including cluster identification and status.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/EcsClusterStatus"
          description: The current status of the Amazon ECS cluster.
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the Amazon EC2 instances that serve as container instances in the Amazon ECS cluster.
    EcsClusterStatus:
      type: string
      enum:
        - ACTIVE
        - PROVISIONING
        - DEPROVISIONING
        - FAILED
        - INACTIVE
    EcsTask:
      description: Contains information about Amazon ECS task involved in a GuardDuty finding, including task definition and container identifiers.
      type: object
      properties:
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp indicating when the Amazon ECS task was created, in UTC format.
        TaskDefinitionArn:
          $ref: "#/components/schemas/String"
          description: The ARN of task definition which describes the container and volume definitions of the Amazon ECS task.
        LaunchType:
          $ref: "#/components/schemas/EcsLaunchType"
          description: The infrastructure type on which the Amazon ECS task runs.
        ContainerUids:
          $ref: "#/components/schemas/ContainerUids"
          description: A list of unique identifiers for the containers associated with the Amazon ECS task.
    EcsLaunchType:
      type: string
      enum:
        - FARGATE
        - EC2
    IamInstanceProfileV2:
      description: Contains information about the IAM instance profile involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that share the same IAM instance profile.
    AutoscalingAutoScalingGroup:
      description: Contains information about the Auto Scaling Group involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that are part of the same Auto Scaling Group.
    Ec2LaunchTemplate:
      description: Contains information about the Amazon EC2 launch template involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that share the same Amazon EC2 launch template.
        Version:
          $ref: "#/components/schemas/LaunchTemplateVersion"
          description: Version of the EC2 launch template.
    LaunchTemplateVersion:
      type: string
      minLength: 0
      maxLength: 256
    Ec2Vpc:
      description: Contains information about the Amazon EC2 VPC involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that were launched within the same Virtual Private Cloud (VPC).
    Ec2Image:
      description: Contains information about the Amazon EC2 Image involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that were launched with the same Amazon Machine Image (AMI).
    CloudformationStack:
      description: Contains information about the CloudFormation stack involved in a GuardDuty finding, including unique identifiers of the Amazon EC2 instances.
      type: object
      properties:
        Ec2InstanceUids:
          $ref: "#/components/schemas/Ec2InstanceUids"
          description: A list of unique identifiers for the compromised Amazon EC2 instances that were created as part of the same CloudFormation stack.
    NetworkEndpoints:
      type: array
      items:
        $ref: "#/components/schemas/NetworkEndpoint"
    NetworkEndpoint:
      description: Contains information about network endpoints that were observed in the attack sequence.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/String"
          description: The ID of the network endpoint.
        Ip:
          $ref: "#/components/schemas/String"
          description: The IP address associated with the network endpoint.
        Domain:
          $ref: "#/components/schemas/String"
          description: The domain information for the network endpoint.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The port number associated with the network endpoint.
        Location:
          $ref: "#/components/schemas/NetworkGeoLocation"
          description: Information about the location of the network endpoint.
        AutonomousSystem:
          $ref: "#/components/schemas/AutonomousSystem"
          description: The Autonomous System (AS) of the network endpoint.
        Connection:
          $ref: "#/components/schemas/NetworkConnection"
          description: Information about the network connection.
      required:
        - Id
    NetworkGeoLocation:
      description: Contains information about network endpoint location.
      type: object
      properties:
        City:
          $ref: "#/components/schemas/String"
          description: The name of the city.
        Country:
          $ref: "#/components/schemas/String"
          description: The name of the country.
        Latitude:
          $ref: "#/components/schemas/Double"
          description: The latitude information of the endpoint location.
        Longitude:
          $ref: "#/components/schemas/Double"
          description: The longitude information of the endpoint location.
      required:
        - City
        - Country
        - Latitude
        - Longitude
    AutonomousSystem:
      description: Contains information about the Autonomous System (AS) associated with the network endpoints involved in an attack sequence.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Name associated with the Autonomous System (AS).
        Number:
          $ref: "#/components/schemas/Integer"
          description: The unique number that identifies the Autonomous System (AS).
      required:
        - Name
        - Number
    NetworkConnection:
      description: Contains information about the network connection.
      type: object
      properties:
        Direction:
          $ref: "#/components/schemas/NetworkDirection"
          description: The direction in which the network traffic is flowing.
      required:
        - Direction
    NetworkDirection:
      type: string
      enum:
        - INBOUND
        - OUTBOUND
    Signals:
      type: array
      items:
        $ref: "#/components/schemas/Signal"
    Signal:
      description: Contains information about the signals involved in the attack sequence.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/String"
          description: The unique identifier of the signal.
        Type:
          $ref: "#/components/schemas/SignalType"
          description: "The type of the signal used to identify an attack sequence. Signals can be GuardDuty findings or activities observed in data sources that GuardDuty monitors. For more information, see Foundational data sources in the Amazon GuardDuty User Guide. A signal type can be one of the valid values listed in this API. Here are the related descriptions: FINDING - Individually generated GuardDuty finding. CLOUD_TRAIL - Activity observed from CloudTrail logs S3_DATA_EVENTS - Activity observed from CloudTrail data events for S3. Activities associated with this type will show up only when you have enabled GuardDuty S3 Protection feature in your account. For more information about S3 Protection and steps to enable it, see S3 Protection in the Amazon GuardDuty User Guide."
        Description:
          $ref: "#/components/schemas/SignalDescription"
          description: The description of the signal.
        Name:
          $ref: "#/components/schemas/String"
          description: The name of the signal. For example, when signal type is FINDING, the signal name is the name of the finding.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the first finding or activity related to this signal was observed.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when this signal was last observed.
        FirstSeenAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the first finding or activity related to this signal was observed.
        LastSeenAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the last finding or activity related to this signal was observed.
        Severity:
          $ref: "#/components/schemas/Double"
          description: The severity associated with the signal. For more information about severity, see Findings severity levels in the Amazon GuardDuty User Guide.
        Count:
          $ref: "#/components/schemas/Integer"
          description: The number of times this signal was observed.
        ResourceUids:
          $ref: "#/components/schemas/ResourceUids"
          description: Information about the unique identifiers of the resources involved in the signal.
        ActorIds:
          $ref: "#/components/schemas/ActorIds"
          description: Information about the IDs of the threat actors involved in the signal.
        EndpointIds:
          $ref: "#/components/schemas/EndpointIds"
          description: Information about the endpoint IDs associated with this signal.
        SignalIndicators:
          $ref: "#/components/schemas/Indicators"
          description: Contains information about the indicators associated with the signals.
      required:
        - Uid
        - Type
        - Name
        - CreatedAt
        - UpdatedAt
        - FirstSeenAt
        - LastSeenAt
        - Count
    SignalType:
      type: string
      enum:
        - FINDING
        - CLOUD_TRAIL
        - S3_DATA_EVENTS
        - EKS_AUDIT_LOGS
        - FLOW_LOGS
        - DNS_LOGS
        - RUNTIME_MONITORING
    SignalDescription:
      type: string
      minLength: 0
      maxLength: 2000
    ResourceUids:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ActorIds:
      type: array
      items:
        $ref: "#/components/schemas/String"
    EndpointIds:
      type: array
      items:
        $ref: "#/components/schemas/String"
    Indicators:
      type: array
      items:
        $ref: "#/components/schemas/Indicator"
    Indicator:
      description: Contains information about the indicators that include a set of signals observed in an attack sequence.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/IndicatorType"
          description: Specific indicator keys observed in the attack sequence. For description of the valid values for key, see Attack sequence finding details in the Amazon GuardDuty User Guide.
        Values:
          $ref: "#/components/schemas/IndicatorValues"
          description: Values associated with each indicator key. For example, if the indicator key is SUSPICIOUS_NETWORK, then the value will be the name of the network. If the indicator key is ATTACK_TACTIC, then the value will be one of the MITRE tactics.
        Title:
          $ref: "#/components/schemas/IndicatorTitle"
          description: Title describing the indicator.
      required:
        - Key
    IndicatorType:
      type: string
      enum:
        - SUSPICIOUS_USER_AGENT
        - SUSPICIOUS_NETWORK
        - MALICIOUS_IP
        - TOR_IP
        - ATTACK_TACTIC
        - HIGH_RISK_API
        - ATTACK_TECHNIQUE
        - UNUSUAL_API_FOR_ACCOUNT
        - UNUSUAL_ASN_FOR_ACCOUNT
        - UNUSUAL_ASN_FOR_USER
        - SUSPICIOUS_PROCESS
        - MALICIOUS_DOMAIN
        - MALICIOUS_PROCESS
        - CRYPTOMINING_IP
        - CRYPTOMINING_DOMAIN
        - CRYPTOMINING_PROCESS
        - MALICIOUS_FILE
    IndicatorValues:
      type: array
      items:
        $ref: "#/components/schemas/IndicatorValueString"
    IndicatorValueString:
      type: string
      minLength: 1
      maxLength: 256
    IndicatorTitle:
      type: string
      minLength: 1
      maxLength: 256
    AdditionalSequenceTypes:
      type: array
      items:
        $ref: "#/components/schemas/FindingType"
    MalwareScanDetails:
      description: Information about the malware scan that generated a GuardDuty finding.
      type: object
      properties:
        Threats:
          $ref: "#/components/schemas/Threats"
          description: Information about the detected threats associated with the generated GuardDuty finding.
        ScanId:
          $ref: "#/components/schemas/String"
          description: The unique identifier for the malware scan.
        ScanType:
          $ref: "#/components/schemas/MalwareProtectionScanType"
          description: The type of malware scan performed.
        ScanCategory:
          $ref: "#/components/schemas/ScanCategory"
          description: The category of the malware scan.
        ScanConfiguration:
          $ref: "#/components/schemas/MalwareProtectionFindingsScanConfiguration"
          description: The configuration settings used for the malware scan.
        UniqueThreatCount:
          $ref: "#/components/schemas/Integer"
          description: The number of unique malware threats detected during the scan.
    Threats:
      type: array
      items:
        $ref: "#/components/schemas/Threat"
    Threat:
      description: Information about the detected threats associated with the generated finding.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/String"
          description: Name of the detected threat that caused GuardDuty to generate this finding.
        Source:
          $ref: "#/components/schemas/String"
          description: Source of the threat that generated this finding.
        ItemPaths:
          $ref: "#/components/schemas/ItemPaths"
          description: Information about the nested item path and hash of the protected resource.
        Count:
          $ref: "#/components/schemas/Long"
          description: The number of occurrences of this specific threat detected during the scan.
        Hash:
          $ref: "#/components/schemas/String"
          description: The hash identifier of the detected malware threat.
        ItemDetails:
          $ref: "#/components/schemas/ItemDetailsList"
          description: Detailed information about the detected malware threat.
    ItemPaths:
      type: array
      items:
        $ref: "#/components/schemas/ItemPath"
    ItemPath:
      description: Information about the nested item path and hash of the protected resource.
      type: object
      properties:
        NestedItemPath:
          $ref: "#/components/schemas/String"
          description: The nested item path where the infected file was found.
        Hash:
          $ref: "#/components/schemas/String"
          description: The hash value of the infected resource.
    ItemDetailsList:
      type: array
      items:
        $ref: "#/components/schemas/ItemDetails"
    ItemDetails:
      description: Contains detailed information about where a threat was detected.
      type: object
      properties:
        ResourceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: Amazon Resource Name (ARN) of the resource where the threat was detected.
        ItemPath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The path where the threat was detected.
        Hash:
          $ref: "#/components/schemas/String"
          description: The hash value of the infected item.
        AdditionalInfo:
          $ref: "#/components/schemas/AdditionalInfo"
          description: Additional information about the detected threat item.
    AdditionalInfo:
      description: Contains additional information about the detected threat.
      type: object
      properties:
        VersionId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version ID of the S3 object, if applicable.
        DeviceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The device name of the EBS volume, if applicable.
    MalwareProtectionScanType:
      type: string
      enum:
        - BACKUP_INITIATED
        - ON_DEMAND
        - GUARDDUTY_INITIATED
    ScanCategory:
      type: string
      enum:
        - FULL_SCAN
        - INCREMENTAL_SCAN
    MalwareProtectionFindingsScanConfiguration:
      description: Contains finding configuration details about the malware scan.
      type: object
      properties:
        TriggerType:
          $ref: "#/components/schemas/TriggerType"
          description: The event that triggered the malware scan.
        IncrementalScanDetails:
          $ref: "#/components/schemas/IncrementalScanDetails"
    IncrementalScanDetails:
      description: Contains information about the incremental scan configuration.
      type: object
      properties:
        BaselineResourceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: Amazon Resource Name (ARN) of the baseline resource used for incremental scanning. The scan will only process changes since this baseline resource was created.
      required:
        - BaselineResourceArn
    FindingStatisticTypes:
      type: array
      items:
        $ref: "#/components/schemas/FindingStatisticType"
    FindingStatisticType:
      type: string
      enum:
        - COUNT_BY_SEVERITY
    GroupByType:
      type: string
      enum:
        - ACCOUNT
        - DATE
        - FINDING_TYPE
        - RESOURCE
        - SEVERITY
    MaxResults100:
      type: integer
      minimum: 1
      maximum: 100
    GetFindingsStatisticsResponse:
      type: object
      properties:
        FindingStatistics:
          $ref: "#/components/schemas/FindingStatistics"
          description: The finding statistics object.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination parameter to be used on the next list operation to retrieve more items. This parameter is currently not supported.
      required:
        - FindingStatistics
    FindingStatistics:
      description: Contains information about finding statistics.
      type: object
      properties:
        CountBySeverity:
          type: object
          properties: {}
          description: Represents a list of map of severity to count statistics for a set of findings.
        GroupedByAccount:
          $ref: "#/components/schemas/GroupedByAccount"
          description: Represents a list of map of accounts with a findings count associated with each account.
        GroupedByDate:
          $ref: "#/components/schemas/GroupedByDate"
          description: Represents a list of map of dates with a count of total findings generated on each date per severity level.
        GroupedByFindingType:
          $ref: "#/components/schemas/GroupedByFindingType"
          description: Represents a list of map of finding types with a count of total findings generated for each type. Based on the orderBy parameter, this request returns either the most occurring finding types or the least occurring finding types. If the orderBy parameter is ASC, this will represent the least occurring finding types in your account; otherwise, this will represent the most occurring finding types. The default value of orderBy is DESC.
        GroupedByResource:
          $ref: "#/components/schemas/GroupedByResource"
          description: Represents a list of map of top resources with a count of total findings.
        GroupedBySeverity:
          $ref: "#/components/schemas/GroupedBySeverity"
          description: Represents a list of map of total findings for each severity level.
    GroupedByAccount:
      type: array
      items:
        $ref: "#/components/schemas/AccountStatistics"
    AccountStatistics:
      description: Represents a list of map of accounts with the number of findings associated with each account.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account.
        LastGeneratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the finding for this account was last generated.
        TotalFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of findings associated with an account.
    GroupedByDate:
      type: array
      items:
        $ref: "#/components/schemas/DateStatistics"
    DateStatistics:
      description: Represents list a map of dates with a count of total findings generated on each date.
      type: object
      properties:
        Date:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the total findings count is observed. For example, Date would look like "2024-09-05T17:00:00-07:00" whereas LastGeneratedAt would look like 2024-09-05T17:12:29-07:00".
        LastGeneratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the last finding in the findings count, was generated.
        Severity:
          $ref: "#/components/schemas/Double"
          description: The severity of the findings generated on each date.
        TotalFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of findings that were generated per severity level on each date.
    GroupedByFindingType:
      type: array
      items:
        $ref: "#/components/schemas/FindingTypeStatistics"
    FindingTypeStatistics:
      description: Information about each finding type associated with the groupedByFindingType statistics.
      type: object
      properties:
        FindingType:
          $ref: "#/components/schemas/String"
          description: Name of the finding type.
        LastGeneratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which this finding type was last generated in your environment.
        TotalFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of findings associated with generated for each distinct finding type.
    GroupedByResource:
      type: array
      items:
        $ref: "#/components/schemas/ResourceStatistics"
    ResourceStatistics:
      description: Information about each resource type associated with the groupedByResource statistics.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/String"
          description: The ID of the Amazon Web Services account.
        LastGeneratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the statistics for this resource was last generated.
        ResourceId:
          $ref: "#/components/schemas/String"
          description: ID associated with each resource. The following list provides the mapping of the resource type and resource ID. Mapping of resource and resource ID AccessKey - resource.accessKeyDetails.accessKeyId Container - resource.containerDetails.id ECSCluster - resource.ecsClusterDetails.name EKSCluster - resource.eksClusterDetails.name Instance - resource.instanceDetails.instanceId KubernetesCluster - resource.kubernetesDetails.kubernetesWorkloadDetails.name Lambda - resource.lambdaDetails.functionName RDSDBInstance - resource.rdsDbInstanceDetails.dbInstanceIdentifier S3Bucket - resource.s3BucketDetails.name S3Object - resource.s3BucketDetails.name
        ResourceType:
          $ref: "#/components/schemas/String"
          description: The type of resource.
        TotalFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of findings associated with this resource.
    GroupedBySeverity:
      type: array
      items:
        $ref: "#/components/schemas/SeverityStatistics"
    SeverityStatistics:
      description: Information about severity level for each finding type.
      type: object
      properties:
        LastGeneratedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which a finding type for a specific severity was last generated.
        Severity:
          $ref: "#/components/schemas/Double"
          description: The severity level associated with each finding type.
        TotalFindings:
          $ref: "#/components/schemas/Integer"
          description: The total number of findings associated with this severity.
    GetIPSetResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/Name"
          description: The user-friendly name for the IPSet.
        Format:
          $ref: "#/components/schemas/IpSetFormat"
          description: The format of the file that contains the IPSet.
        Location:
          $ref: "#/components/schemas/Location"
          description: The URI of the file that contains the IPSet.
        Status:
          $ref: "#/components/schemas/IpSetStatus"
          description: The status of IPSet file that was uploaded.
        Tags:
          type: object
          properties: {}
          description: The tags of the IPSet resource.
        ExpectedBucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID that owns the Amazon S3 bucket specified in the location parameter. This field appears in the response only if it was provided during IPSet creation or update.
      required:
        - Name
        - Format
        - Location
        - Status
    IpSetStatus:
      type: string
      enum:
        - INACTIVE
        - ACTIVATING
        - ACTIVE
        - DEACTIVATING
        - ERROR
        - DELETE_PENDING
        - DELETED
      minLength: 1
      maxLength: 300
    GetInvitationsCountResponse:
      type: object
      properties:
        InvitationsCount:
          $ref: "#/components/schemas/Integer"
          description: The number of received invitations.
    GetMalwareProtectionPlanResponse:
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) of the protected resource.
        Role:
          $ref: "#/components/schemas/String"
          description: Amazon Resource Name (ARN) of the IAM role that includes the permissions to scan and add tags to the associated protected resource.
        ProtectedResource:
          $ref: "#/components/schemas/CreateProtectedResource"
          description: Information about the protected resource that is associated with the created Malware Protection plan. Presently, S3Bucket is the only supported protected resource.
        Actions:
          $ref: "#/components/schemas/MalwareProtectionPlanActions"
          description: Information about whether the tags will be added to the S3 object after scanning.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp when the Malware Protection plan resource was created.
        Status:
          $ref: "#/components/schemas/MalwareProtectionPlanStatus"
          description: Malware Protection plan status.
        StatusReasons:
          $ref: "#/components/schemas/MalwareProtectionPlanStatusReasonsList"
          description: Information about the issue code and message associated to the status of your Malware Protection plan.
        Tags:
          type: object
          properties: {}
          description: Tags added to the Malware Protection plan resource.
    MalwareProtectionPlanStatus:
      type: string
      enum:
        - ACTIVE
        - WARNING
        - ERROR
    MalwareProtectionPlanStatusReasonsList:
      type: array
      items:
        $ref: "#/components/schemas/MalwareProtectionPlanStatusReason"
    MalwareProtectionPlanStatusReason:
      description: Information about the issue code and message associated to the status of your Malware Protection plan.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/String"
          description: Issue code.
        Message:
          $ref: "#/components/schemas/String"
          description: Issue message that specifies the reason. For information about potential troubleshooting steps, see Troubleshooting Malware Protection for S3 status issues in the Amazon GuardDuty User Guide.
    GetMalwareScanResponse:
      type: object
      properties:
        ScanId:
          $ref: "#/components/schemas/NonEmptyString"
          description: A unique identifier associated with the malware scan. Each malware scan has a corresponding scan ID. Using this scan ID, you can monitor the status of your malware scan.
        DetectorId:
          $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with the request, if it belongs to an account which is a GuardDuty customer. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        AdminDetectorId:
          $ref: "#/components/schemas/DetectorId"
          description: The unique detector ID of the administrator account that the request is associated with. If the account is an administrator, the AdminDetectorId will be the same as the one used for DetectorId. If the customer is not a GuardDuty customer, this field will not be present.. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        ResourceArn:
