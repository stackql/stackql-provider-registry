          $ref: "#/components/schemas/AccountId"
          description: The unique ID of the Amazon Web Services account.
        ResourceDetails:
          $ref: "#/components/schemas/CoverageResourceDetails"
          description: Information about the resource for which the coverage statistics are retrieved.
        CoverageStatus:
          $ref: "#/components/schemas/CoverageStatus"
          description: Represents the status of the EKS cluster coverage.
        Issue:
          $ref: "#/components/schemas/String"
          description: Represents the reason why a coverage status was UNHEALTHY for the EKS cluster.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp at which the coverage details for the resource were last updated. This is in UTC format.
    CoverageResourceDetails:
      description: Information about the resource for each individual EKS cluster.
      type: object
      properties:
        EksClusterDetails:
          $ref: "#/components/schemas/CoverageEksClusterDetails"
          description: EKS cluster details involved in the coverage statistics.
        EcsClusterDetails:
          $ref: "#/components/schemas/CoverageEcsClusterDetails"
          description: Information about the Amazon ECS cluster that is assessed for runtime coverage.
        Ec2InstanceDetails:
          $ref: "#/components/schemas/CoverageEc2InstanceDetails"
          description: Information about the Amazon EC2 instance assessed for runtime coverage.
        ResourceType:
          $ref: "#/components/schemas/ResourceType"
          description: The type of Amazon Web Services resource.
    CoverageEksClusterDetails:
      description: Information about the EKS cluster that has a coverage status.
      type: object
      properties:
        ClusterName:
          $ref: "#/components/schemas/String"
          description: Name of the EKS cluster.
        CoveredNodes:
          $ref: "#/components/schemas/Long"
          description: Represents the nodes within the EKS cluster that have a HEALTHY coverage status.
        CompatibleNodes:
          $ref: "#/components/schemas/Long"
          description: Represents all the nodes within the EKS cluster in your account.
        AddonDetails:
          $ref: "#/components/schemas/AddonDetails"
          description: Information about the installed EKS add-on.
        ManagementType:
          $ref: "#/components/schemas/ManagementType"
          description: Indicates how the Amazon EKS add-on GuardDuty agent is managed for this EKS cluster. AUTO_MANAGED indicates GuardDuty deploys and manages updates for this resource. MANUAL indicates that you are responsible to deploy, update, and manage the Amazon EKS add-on GuardDuty agent for this resource.
    AddonDetails:
      description: Information about the installed EKS add-on (GuardDuty security agent).
      type: object
      properties:
        AddonVersion:
          $ref: "#/components/schemas/String"
          description: Version of the installed EKS add-on.
        AddonStatus:
          $ref: "#/components/schemas/String"
          description: Status of the installed EKS add-on.
    ManagementType:
      type: string
      enum:
        - AUTO_MANAGED
        - MANUAL
        - DISABLED
    CoverageEcsClusterDetails:
      description: Contains information about Amazon ECS cluster runtime coverage details.
      type: object
      properties:
        ClusterName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon ECS cluster.
        FargateDetails:
          $ref: "#/components/schemas/FargateDetails"
          description: Information about the Fargate details associated with the Amazon ECS cluster.
        ContainerInstanceDetails:
          $ref: "#/components/schemas/ContainerInstanceDetails"
          description: Information about the Amazon ECS container running on Amazon EC2 instance.
    FargateDetails:
      description: Contains information about Amazon Web Services Fargate details associated with an Amazon ECS cluster.
      type: object
      properties:
        Issues:
          $ref: "#/components/schemas/Issues"
          description: Runtime coverage issues identified for the resource running on Amazon Web Services Fargate.
        ManagementType:
          $ref: "#/components/schemas/ManagementType"
          description: Indicates how the GuardDuty security agent is managed for this resource. AUTO_MANAGED indicates that GuardDuty deploys and manages updates for this resource. DISABLED indicates that the deployment of the GuardDuty security agent is disabled for this resource. The MANUAL status doesn't apply to the Amazon Web Services Fargate (Amazon ECS only) woprkloads.
    Issues:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ContainerInstanceDetails:
      description: Contains information about the Amazon EC2 instance that is running the Amazon ECS container.
      type: object
      properties:
        CoveredContainerInstances:
          $ref: "#/components/schemas/Long"
          description: Represents the nodes in the Amazon ECS cluster that has a HEALTHY coverage status.
        CompatibleContainerInstances:
          $ref: "#/components/schemas/Long"
          description: Represents total number of nodes in the Amazon ECS cluster.
    CoverageEc2InstanceDetails:
      description: Contains information about the Amazon EC2 instance runtime coverage details.
      type: object
      properties:
        InstanceId:
          $ref: "#/components/schemas/String"
          description: The Amazon EC2 instance ID.
        InstanceType:
          $ref: "#/components/schemas/String"
          description: The instance type of the Amazon EC2 instance.
        ClusterArn:
          $ref: "#/components/schemas/String"
          description: The cluster ARN of the Amazon ECS cluster running on the Amazon EC2 instance.
        AgentDetails:
          $ref: "#/components/schemas/AgentDetails"
          description: Information about the installed security agent.
        ManagementType:
          $ref: "#/components/schemas/ManagementType"
          description: Indicates how the GuardDuty security agent is managed for this resource. AUTO_MANAGED indicates that GuardDuty deploys and manages updates for this resource. MANUAL indicates that you are responsible to deploy, update, and manage the GuardDuty security agent updates for this resource. The DISABLED status doesn't apply to Amazon EC2 instances and Amazon EKS clusters.
    AgentDetails:
      description: Information about the installed GuardDuty security agent.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/String"
          description: Version of the installed GuardDuty security agent.
    ResourceType:
