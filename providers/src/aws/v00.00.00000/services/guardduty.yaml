  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists tags for a resource. Tagging is currently supported for detectors, finding filters, IP sets, threat intel sets, and publishing destination, with a limit of 50 tags per resource. When invoked, this operation returns all assigned tags for a given resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardDutyArn"
          description: The Amazon Resource Name (ARN) for the given GuardDuty resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds tags to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardDutyArn"
          description: The Amazon Resource Name (ARN) for the GuardDuty resource to apply a tag to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GuardDutyArn"
          description: The Amazon Resource Name (ARN) for the resource to remove tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to remove from the resource.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /object-malware-scan/send:
    post:
      operationId: SendObjectMalwareScan
      description: Initiates a malware scan for a specific S3 object. This API allows you to perform on-demand malware scanning of individual objects in S3 buckets that have Malware Protection for S3 enabled. When you use this API, the Amazon Web Services service terms for GuardDuty Malware Protection apply. For more information, see Amazon Web Services service terms for GuardDuty Malware Protection.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                S3Object:
                  $ref: "#/components/schemas/S3ObjectForSendObjectMalwareScan"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendObjectMalwareScanResponse"
  /malware-scan/start:
    post:
      operationId: StartMalwareScan
      description: Initiates the malware scan. Invoking this API will automatically create the Service-linked role in the corresponding account if the resourceArn belongs to an EC2 instance. When the malware scan starts, you can use the associated scan ID to track the status of the scan. For more information, see ListMalwareScans and GetMalwareScan. When you use this API, the Amazon Web Services service terms for GuardDuty Malware Protection apply. For more information, see Amazon Web Services service terms for GuardDuty Malware Protection.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                ScanConfiguration:
                  $ref: "#/components/schemas/StartMalwareScanConfiguration"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMalwareScanResponse"
  /detector/{detector_id}/member/start:
    post:
      operationId: StartMonitoringMembers
      description: Turns on GuardDuty monitoring of the specified member accounts. Use this operation to restart monitoring of accounts that you stopped monitoring with the StopMonitoringMembers operation.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty administrator account associated with the member accounts to monitor. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/AccountIds"
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartMonitoringMembersResponse"
  /detector/{detector_id}/member/stop:
    post:
      operationId: StopMonitoringMembers
      description: Stops GuardDuty monitoring for the specified member accounts. Use the StartMonitoringMembers operation to restart monitoring for those accounts. With autoEnableOrganizationMembers configuration for your organization set to ALL, you'll receive an error if you attempt to stop monitoring the member accounts in your organization.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector associated with the GuardDuty administrator account that is monitoring member accounts. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/AccountIds"
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopMonitoringMembersResponse"
  /detector/{detector_id}/findings/unarchive:
    post:
      operationId: UnarchiveFindings
      description: Unarchives GuardDuty findings specified by the findingIds.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The ID of the detector associated with the findings to unarchive. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingIds:
                  $ref: "#/components/schemas/FindingIds"
              required:
                - FindingIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnarchiveFindingsResponse"
  /detector/{detector_id}/findings/feedback:
    post:
      operationId: UpdateFindingsFeedback
      description: Marks the specified GuardDuty findings as useful or not useful.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The ID of the detector that is associated with the findings for which you want to update the feedback. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingIds:
                  $ref: "#/components/schemas/FindingIds"
                Feedback:
                  $ref: "#/components/schemas/Feedback"
                Comments:
                  $ref: "#/components/schemas/SensitiveString"
              required:
                - FindingIds
                - Feedback
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFindingsFeedbackResponse"
  /detector/{detector_id}/member/detector/update:
    post:
      operationId: UpdateMemberDetectors
      description: Contains information on member accounts to be updated. Specifying both EKS Runtime Monitoring (EKS_RUNTIME_MONITORING) and Runtime Monitoring (RUNTIME_MONITORING) will cause an error. You can add only one of these two features because Runtime Monitoring already includes the threat detection for Amazon EKS resources. For more information, see Runtime Monitoring. There might be regional differences because some data sources might not be available in all the Amazon Web Services Regions where GuardDuty is presently supported. For more information, see Regions and endpoints.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The detector ID of the administrator account. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountIds:
                  $ref: "#/components/schemas/AccountIds"
                DataSources:
                  $ref: "#/components/schemas/DataSourceConfigurations"
                Features:
                  $ref: "#/components/schemas/MemberFeaturesConfigurations"
              required:
                - AccountIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMemberDetectorsResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DetectorId:
      type: string
      minLength: 1
      maxLength: 300
    String:
      type: string
    AcceptAdministratorInvitationResponse:
      type: object
    AcceptInvitationResponse:
      type: object
    FindingIds:
      type: array
      items:
        $ref: "#/components/schemas/FindingId"
    FindingId:
      type: string
      minLength: 1
      maxLength: 300
    ArchiveFindingsResponse:
      type: object
    Boolean:
      type: boolean
    ClientToken:
      type: string
      minLength: 0
      maxLength: 64
    FindingPublishingFrequency:
      type: string
      enum:
        - FIFTEEN_MINUTES
        - ONE_HOUR
        - SIX_HOURS
    DataSourceConfigurations:
      description: Contains information about which data sources are enabled.
      type: object
      properties:
        S3Logs:
          $ref: "#/components/schemas/S3LogsConfiguration"
          description: Describes whether S3 data event logs are enabled as a data source.
        Kubernetes:
          $ref: "#/components/schemas/KubernetesConfiguration"
          description: Describes whether any Kubernetes logs are enabled as data sources.
        MalwareProtection:
          $ref: "#/components/schemas/MalwareProtectionConfiguration"
          description: Describes whether Malware Protection is enabled as a data source.
    S3LogsConfiguration:
      description: Describes whether S3 data event logs will be enabled as a data source.
      type: object
      properties:
        Enable:
          $ref: "#/components/schemas/Boolean"
          description: The status of S3 data event logs as a data source.
      required:
        - Enable
    KubernetesConfiguration:
      description: Describes whether any Kubernetes data sources are enabled.
      type: object
      properties:
        AuditLogs:
          $ref: "#/components/schemas/KubernetesAuditLogsConfiguration"
          description: The status of Kubernetes audit logs as a data source.
      required:
        - AuditLogs
    KubernetesAuditLogsConfiguration:
      description: Describes whether Kubernetes audit logs are enabled as a data source.
      type: object
      properties:
        Enable:
          $ref: "#/components/schemas/Boolean"
          description: The status of Kubernetes audit logs as a data source.
      required:
        - Enable
    MalwareProtectionConfiguration:
      description: Describes whether Malware Protection will be enabled as a data source.
      type: object
      properties:
        ScanEc2InstanceWithFindings:
          $ref: "#/components/schemas/ScanEc2InstanceWithFindings"
          description: Describes the configuration of Malware Protection for EC2 instances with findings.
    ScanEc2InstanceWithFindings:
      description: Describes whether Malware Protection for EC2 instances with findings will be enabled as a data source.
      type: object
      properties:
        EbsVolumes:
          $ref: "#/components/schemas/Boolean"
          description: Describes the configuration for scanning EBS volumes as data source.
    TagMap:
      type: object
      properties: {}
    DetectorFeatureConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/DetectorFeatureConfiguration"
    DetectorFeatureConfiguration:
      description: Contains information about a GuardDuty feature. Specifying both EKS Runtime Monitoring (EKS_RUNTIME_MONITORING) and Runtime Monitoring (RUNTIME_MONITORING) will cause an error. You can add only one of these two features because Runtime Monitoring already includes the threat detection for Amazon EKS resources. For more information, see Runtime Monitoring.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/DetectorFeature"
          description: The name of the feature.
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: The status of the feature.
        AdditionalConfiguration:
          $ref: "#/components/schemas/DetectorAdditionalConfigurations"
          description: Additional configuration for a resource.
    DetectorFeature:
      type: string
      enum:
        - S3_DATA_EVENTS
        - EKS_AUDIT_LOGS
        - EBS_MALWARE_PROTECTION
        - RDS_LOGIN_EVENTS
        - LAMBDA_NETWORK_LOGS
        - EKS_RUNTIME_MONITORING
        - RUNTIME_MONITORING
    FeatureStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    DetectorAdditionalConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/DetectorAdditionalConfiguration"
    DetectorAdditionalConfiguration:
      description: Information about the additional configuration for a feature in your GuardDuty account.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FeatureAdditionalConfiguration"
          description: Name of the additional configuration.
        Status:
          $ref: "#/components/schemas/FeatureStatus"
          description: Status of the additional configuration.
    FeatureAdditionalConfiguration:
      type: string
      enum:
        - EKS_ADDON_MANAGEMENT
        - ECS_FARGATE_AGENT_MANAGEMENT
        - EC2_AGENT_MANAGEMENT
    CreateDetectorResponse:
      type: object
      properties:
        DetectorId:
          $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the created detector.
        UnprocessedDataSources:
          $ref: "#/components/schemas/UnprocessedDataSourcesResult"
          description: Specifies the data sources that couldn't be enabled when GuardDuty was enabled for the first time.
    UnprocessedDataSourcesResult:
      description: Specifies the names of the data sources that couldn't be enabled.
      type: object
      properties:
        MalwareProtection:
          $ref: "#/components/schemas/MalwareProtectionConfigurationResult"
    MalwareProtectionConfigurationResult:
      description: An object that contains information on the status of all Malware Protection data sources.
      type: object
      properties:
        ScanEc2InstanceWithFindings:
          $ref: "#/components/schemas/ScanEc2InstanceWithFindingsResult"
          description: Describes the configuration of Malware Protection for EC2 instances with findings.
        ServiceRole:
          $ref: "#/components/schemas/String"
          description: The GuardDuty Malware Protection service role.
    ScanEc2InstanceWithFindingsResult:
      description: An object that contains information on the status of whether Malware Protection for EC2 instances with findings will be enabled as a data source.
      type: object
      properties:
        EbsVolumes:
          $ref: "#/components/schemas/EbsVolumesResult"
          description: Describes the configuration of scanning EBS volumes as a data source.
    EbsVolumesResult:
      description: Describes the configuration of scanning EBS volumes as a data source.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/DataSourceStatus"
          description: Describes whether scanning EBS volumes is enabled as a data source.
        Reason:
          $ref: "#/components/schemas/String"
          description: Specifies the reason why scanning EBS volumes (Malware Protection) was not enabled as a data source.
    DataSourceStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
      minLength: 1
      maxLength: 300
    FilterName:
      type: string
      minLength: 3
      maxLength: 64
    FilterDescription:
      type: string
      minLength: 0
      maxLength: 512
    FilterAction:
      type: string
      enum:
        - NOOP
        - ARCHIVE
      minLength: 1
      maxLength: 300
    FilterRank:
      type: integer
      minimum: 1
      maximum: 100
    FindingCriteria:
      description: Contains information about the criteria used for querying findings.
      type: object
      properties:
        Criterion:
          type: object
          properties: {}
          description: Represents a map of finding properties that match specified conditions and values when querying findings.
    CreateFilterResponse:
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/FilterName"
          description: The name of the successfully created filter.
      required:
        - Name
    Name:
      type: string
      minLength: 1
      maxLength: 300
    IpSetFormat:
      type: string
      enum:
        - TXT
        - STIX
        - OTX_CSV
        - ALIEN_VAULT
        - PROOF_POINT
        - FIRE_EYE
      minLength: 1
      maxLength: 300
    Location:
      type: string
      minLength: 1
      maxLength: 300
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
    CreateIPSetResponse:
      type: object
      properties:
        IpSetId:
          $ref: "#/components/schemas/String"
          description: The ID of the IPSet resource.
      required:
        - IpSetId
    CreateProtectedResource:
      description: Information about the protected resource that is associated with the created Malware Protection plan. Presently, S3Bucket is the only supported protected resource.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/CreateS3BucketResource"
          description: Information about the protected S3 bucket resource.
    CreateS3BucketResource:
      description: Information about the protected S3 bucket resource.
      type: object
      properties:
        BucketName:
          $ref: "#/components/schemas/String"
          description: Name of the S3 bucket.
        ObjectPrefixes:
          $ref: "#/components/schemas/MalwareProtectionPlanObjectPrefixesList"
          description: Information about the specified object prefixes. The S3 object will be scanned only if it belongs to any of the specified object prefixes.
    MalwareProtectionPlanObjectPrefixesList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    MalwareProtectionPlanActions:
      description: Information about whether the tags will be added to the S3 object after scanning.
      type: object
      properties:
        Tagging:
          $ref: "#/components/schemas/MalwareProtectionPlanTaggingAction"
          description: Indicates whether the scanned S3 object will have tags about the scan result.
    MalwareProtectionPlanTaggingAction:
      description: Information about adding tags to the scanned S3 object after the scan result.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/MalwareProtectionPlanTaggingActionStatus"
          description: Indicates whether or not the tags will added.
    MalwareProtectionPlanTaggingActionStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CreateMalwareProtectionPlanResponse:
      type: object
      properties:
        MalwareProtectionPlanId:
          $ref: "#/components/schemas/String"
          description: A unique identifier associated with the Malware Protection plan resource.
    AccountDetails:
      type: array
      items:
        $ref: "#/components/schemas/AccountDetail"
    AccountDetail:
      description: Contains information about the account.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The member account ID.
        Email:
          $ref: "#/components/schemas/Email"
          description: "The email address of the member account. The following list includes the rules for a valid email address: The email address must be a minimum of 6 and a maximum of 64 characters long. All characters must be 7-bit ASCII characters. There must be one and only one @ symbol, which separates the local name from the domain name. The local name can't contain any of the following characters: whitespace, \" ' ( ) < > [ ] : ' , \\ | % & The local name can't begin with a dot (.). The domain name can consist of only the characters [a-z], [A-Z], [0-9], hyphen (-), or dot (.). The domain name can't begin or end with a dot (.) or hyphen (-). The domain name must contain at least one dot."
      required:
        - AccountId
        - Email
    Email:
      type: string
      minLength: 1
      maxLength: 64
    CreateMembersResponse:
      type: object
      properties:
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccounts"
          description: A list of objects that include the accountIds of the unprocessed accounts and a result string that explains why each was unprocessed.
      required:
        - UnprocessedAccounts
    UnprocessedAccounts:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedAccount"
    UnprocessedAccount:
      description: Contains information about the accounts that weren't processed.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID.
        Result:
          $ref: "#/components/schemas/String"
          description: A reason why the account hasn't been processed.
      required:
        - AccountId
        - Result
    DestinationType:
      type: string
      enum:
        - S3
      minLength: 1
      maxLength: 300
    DestinationProperties:
      description: Contains the Amazon Resource Name (ARN) of the resource to publish to, such as an S3 bucket, and the ARN of the KMS key to use to encrypt published findings.
      type: object
      properties:
        DestinationArn:
          $ref: "#/components/schemas/String"
          description: "The ARN of the resource to publish to. To specify an S3 bucket folder use the following format: arn:aws:s3:::DOC-EXAMPLE-BUCKET/myFolder/"
        KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the KMS key to use for encryption.
    CreatePublishingDestinationResponse:
      type: object
      properties:
        DestinationId:
          $ref: "#/components/schemas/String"
          description: The ID of the publishing destination that is created.
      required:
        - DestinationId
    FindingTypes:
      type: array
      items:
        $ref: "#/components/schemas/FindingType"
    FindingType:
      type: string
      minLength: 1
      maxLength: 100
    CreateSampleFindingsResponse:
      type: object
    ThreatEntitySetFormat:
      type: string
      enum:
        - TXT
        - STIX
        - OTX_CSV
        - ALIEN_VAULT
        - PROOF_POINT
        - FIRE_EYE
      minLength: 1
      maxLength: 300
    ExpectedBucketOwner:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]+"
    CreateThreatEntitySetResponse:
      type: object
      properties:
        ThreatEntitySetId:
          $ref: "#/components/schemas/String"
          description: The ID returned by GuardDuty after creation of the threat entity set resource.
      required:
        - ThreatEntitySetId
    ThreatIntelSetFormat:
      type: string
      enum:
        - TXT
        - STIX
        - OTX_CSV
        - ALIEN_VAULT
        - PROOF_POINT
        - FIRE_EYE
      minLength: 1
      maxLength: 300
    CreateThreatIntelSetResponse:
      type: object
      properties:
        ThreatIntelSetId:
          $ref: "#/components/schemas/String"
          description: The ID of the ThreatIntelSet resource.
      required:
        - ThreatIntelSetId
    TrustedEntitySetFormat:
      type: string
      enum:
        - TXT
        - STIX
        - OTX_CSV
        - ALIEN_VAULT
        - PROOF_POINT
        - FIRE_EYE
      minLength: 1
      maxLength: 300
    CreateTrustedEntitySetResponse:
      type: object
      properties:
        TrustedEntitySetId:
          $ref: "#/components/schemas/String"
          description: The ID returned by GuardDuty after creation of the trusted entity set resource.
      required:
        - TrustedEntitySetId
    AccountIds:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    DeclineInvitationsResponse:
      type: object
      properties:
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccounts"
          description: A list of objects that contain the unprocessed account and a result string that explains why it was unprocessed.
      required:
        - UnprocessedAccounts
    DeleteDetectorResponse:
      type: object
    DeleteFilterResponse:
      type: object
    DeleteIPSetResponse:
      type: object
    DeleteInvitationsResponse:
      type: object
      properties:
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccounts"
          description: A list of objects that contain the unprocessed account and a result string that explains why it was unprocessed.
      required:
        - UnprocessedAccounts
    DeleteMembersResponse:
      type: object
      properties:
        UnprocessedAccounts:
          $ref: "#/components/schemas/UnprocessedAccounts"
          description: The accounts that could not be processed.
      required:
        - UnprocessedAccounts
    DeletePublishingDestinationResponse:
      type: object
    DeleteThreatEntitySetResponse:
      type: object
    DeleteThreatIntelSetResponse:
      type: object
    DeleteTrustedEntitySetResponse:
      type: object
    IntegerValueWithMax:
      type: integer
      minimum: 1
      maximum: 50
    FilterCriteria:
      description: Represents the criteria to be used in the filter for describing scan entries.
      type: object
      properties:
        FilterCriterion:
          $ref: "#/components/schemas/FilterCriterionList"
          description: Represents a condition that when matched will be added to the response of the operation.
    FilterCriterionList:
      type: array
      items:
        $ref: "#/components/schemas/FilterCriterion"
    FilterCriterion:
      description: Represents a condition that when matched will be added to the response of the operation. Irrespective of using any filter criteria, an administrator account can view the scan entries for all of its member accounts. However, each member account can view the scan entries only for their own account.
      type: object
      properties:
        CriterionKey:
          $ref: "#/components/schemas/CriterionKey"
          description: An enum value representing possible scan properties to match with given scan entries.
        FilterCondition:
          $ref: "#/components/schemas/FilterCondition"
          description: Contains information about the condition.
    CriterionKey:
      type: string
      enum:
        - EC2_INSTANCE_ARN
        - SCAN_ID
        - ACCOUNT_ID
        - GUARDDUTY_FINDING_ID
        - SCAN_START_TIME
        - SCAN_STATUS
        - SCAN_TYPE
    FilterCondition:
      description: Contains information about the condition.
      type: object
      properties:
        EqualsValue:
          $ref: "#/components/schemas/NonEmptyString"
          description: Represents an equal condition to be applied to a single field when querying for scan entries.
        GreaterThan:
          $ref: "#/components/schemas/LongValue"
          description: Represents a greater than condition to be applied to a single field when querying for scan entries.
        LessThan:
          $ref: "#/components/schemas/LongValue"
          description: Represents a less than condition to be applied to a single field when querying for scan entries.
    NonEmptyString:
      type: string
      minLength: 1
      maxLength: 200
    LongValue:
      type: integer
      format: int64
    SortCriteria:
      description: Contains information about the criteria used for sorting findings.
      type: object
      properties:
        AttributeName:
          $ref: "#/components/schemas/String"
          description: Represents the finding attribute, such as accountId, that sorts the findings.
        OrderBy:
          $ref: "#/components/schemas/OrderBy"
          description: The order by which the sorted findings are to be displayed.
    OrderBy:
      type: string
      enum:
        - ASC
        - DESC
    DescribeMalwareScansResponse:
      type: object
      properties:
        Scans:
          $ref: "#/components/schemas/Scans"
          description: Contains information about malware scans associated with GuardDuty Malware Protection for EC2.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination parameter to be used on the next list operation to retrieve more items.
      required:
        - Scans
    Scans:
      type: array
      items:
        $ref: "#/components/schemas/Scan"
    Scan:
      description: Contains information about malware scans associated with GuardDuty Malware Protection for EC2.
      type: object
      properties:
        DetectorId:
          $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with the request. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        AdminDetectorId:
          $ref: "#/components/schemas/DetectorId"
          description: The unique detector ID of the administrator account that the request is associated with. If the account is an administrator, the AdminDetectorId will be the same as the one used for DetectorId. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        ScanId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique scan ID associated with a scan entry.
        ScanStatus:
          $ref: "#/components/schemas/ScanStatus"
          description: An enum value representing possible scan statuses.
        FailureReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: Represents the reason for FAILED scan status.
        ScanStartTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the scan was triggered.
        ScanEndTime:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the scan was finished.
        TriggerDetails:
          $ref: "#/components/schemas/TriggerDetails"
          description: Specifies the reason why the scan was initiated.
        ResourceDetails:
          $ref: "#/components/schemas/ResourceDetails"
          description: Represents the resources that were scanned in the scan entry.
        ScanResultDetails:
          $ref: "#/components/schemas/ScanResultDetails"
          description: Represents the result of the scan.
        AccountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID for the account that belongs to the scan.
        TotalBytes:
          $ref: "#/components/schemas/PositiveLong"
          description: Represents total bytes that were scanned.
        FileCount:
          $ref: "#/components/schemas/PositiveLong"
          description: Represents the number of files that were scanned.
        AttachedVolumes:
          $ref: "#/components/schemas/VolumeDetails"
          description: List of volumes that were attached to the original instance to be scanned.
        ScanType:
          $ref: "#/components/schemas/ScanType"
          description: Specifies the scan type that invoked the malware scan.
    ScanStatus:
      type: string
      enum:
        - RUNNING
        - COMPLETED
        - FAILED
        - SKIPPED
    Timestamp:
      type: string
      format: date-time
    TriggerDetails:
      description: Represents the reason the scan was triggered.
      type: object
      properties:
        GuardDutyFindingId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the GuardDuty finding that triggered the malware scan.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the scan trigger.
        TriggerType:
          $ref: "#/components/schemas/TriggerType"
          description: Specifies the trigger type that started the malware scan.
    TriggerType:
      type: string
      enum:
        - BACKUP
        - GUARDDUTY
    ResourceDetails:
      description: Represents the resources that were scanned in the scan entry.
      type: object
      properties:
        InstanceArn:
          $ref: "#/components/schemas/InstanceArn"
          description: Instance ARN that was scanned in the scan entry.
    InstanceArn:
      type: string
      pattern: arn:(aws|aws-cn|aws-us-gov):[a-z]+:[a-z]+(-[0-9]+|-[a-z]+)+:([0-9]{12}):[a-z\-]+\/[a-zA-Z0-9]*
    ScanResultDetails:
      description: Represents the result of the scan.
      type: object
      properties:
        ScanResult:
          $ref: "#/components/schemas/ScanResult"
          description: An enum value representing possible scan results.
    ScanResult:
      type: string
      enum:
        - CLEAN
        - INFECTED
    PositiveLong:
      type: integer
      format: int64
      minimum: 0
    VolumeDetails:
      type: array
      items:
        $ref: "#/components/schemas/VolumeDetail"
    VolumeDetail:
      description: Contains EBS volume details.
      type: object
      properties:
        VolumeArn:
          $ref: "#/components/schemas/String"
          description: EBS volume ARN information.
        VolumeType:
          $ref: "#/components/schemas/String"
          description: The EBS volume type.
        DeviceName:
          $ref: "#/components/schemas/String"
          description: The device name for the EBS volume.
        VolumeSizeInGB:
          $ref: "#/components/schemas/Integer"
          description: EBS volume size in GB.
        EncryptionType:
          $ref: "#/components/schemas/String"
          description: EBS volume encryption type.
        SnapshotArn:
          $ref: "#/components/schemas/String"
          description: Snapshot ARN of the EBS volume.
        KmsKeyArn:
          $ref: "#/components/schemas/String"
          description: KMS key ARN used to encrypt the EBS volume.
    Integer:
      type: integer
    ScanType:
      type: string
      enum:
        - GUARDDUTY_INITIATED
        - ON_DEMAND
    MaxResults:
      type: integer
      minimum: 1
      maximum: 50
    DescribeOrganizationConfigurationResponse:
      type: object
      properties:
        AutoEnable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether GuardDuty is automatically enabled for accounts added to the organization. Even though this is still supported, we recommend using AutoEnableOrganizationMembers to achieve the similar results.
        MemberAccountLimitReached:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the maximum number of allowed member accounts are already associated with the delegated administrator account for your organization.
        DataSources:
          $ref: "#/components/schemas/OrganizationDataSourceConfigurationsResult"
          description: Describes which data sources are enabled automatically for member accounts.
        Features:
          $ref: "#/components/schemas/OrganizationFeaturesConfigurationsResults"
          description: A list of features that are configured for this organization.
        NextToken:
          $ref: "#/components/schemas/String"
          description: The pagination parameter to be used on the next list operation to retrieve more items.
        AutoEnableOrganizationMembers:
          $ref: "#/components/schemas/AutoEnableMembers"
          description: "Indicates the auto-enablement configuration of GuardDuty or any of the corresponding protection plans for the member accounts in the organization. NEW: Indicates that when a new account joins the organization, they will have GuardDuty or any of the corresponding protection plans enabled automatically. ALL: Indicates that all accounts in the organization have GuardDuty and any of the corresponding protection plans enabled automatically. This includes NEW accounts that join the organization and accounts that may have been suspended or removed from the organization in GuardDuty. NONE: Indicates that GuardDuty or any of the corresponding protection plans will not be automatically enabled for any account in the organization. The administrator must manage GuardDuty for each account in the organization individually. When you update the auto-enable setting from ALL or NEW to NONE, this action doesn't disable the corresponding option for your existing accounts. This configuration will apply to the new accounts that join the organization. After you update the auto-enable settings, no new account will have the corresponding option as enabled."
      required:
        - MemberAccountLimitReached
    OrganizationDataSourceConfigurationsResult:
      description: An object that contains information on which data sources are automatically enabled for new members within the organization.
      type: object
      properties:
        S3Logs:
          $ref: "#/components/schemas/OrganizationS3LogsConfigurationResult"
          description: Describes whether S3 data event logs are enabled as a data source.
        Kubernetes:
          $ref: "#/components/schemas/OrganizationKubernetesConfigurationResult"
          description: Describes the configuration of Kubernetes data sources.
        MalwareProtection:
          $ref: "#/components/schemas/OrganizationMalwareProtectionConfigurationResult"
          description: Describes the configuration of Malware Protection data source for an organization.
      required:
        - S3Logs
