        SkippedResourcesCount:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: The total number of resources that were skipped during the scan.
        FailedResourcesCount:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: The total number of resources that failed to be scanned.
        ScannedResources:
          $ref: "#/components/schemas/ScannedResources"
          description: A list of resources along with their metadata that were scanned as part of the malware scan operation.
        ScanConfiguration:
          $ref: "#/components/schemas/ScanConfiguration"
          description: Information about the scan configuration used for the malware scan.
        ScanCategory:
          $ref: "#/components/schemas/ScanCategory"
          description: The category of the malware scan, indicating the type of scan performed.
        ScanStatus:
          $ref: "#/components/schemas/MalwareProtectionScanStatus"
          description: A value representing the current status of the malware scan.
        ScanStatusReason:
          $ref: "#/components/schemas/ScanStatusReason"
          description: Represents the reason for the current scan status, if applicable.
        ScanType:
          $ref: "#/components/schemas/MalwareProtectionScanType"
          description: A value representing the initiator of the scan.
        ScanStartedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp representing when the malware scan was started.
        ScanCompletedAt:
          $ref: "#/components/schemas/Timestamp"
