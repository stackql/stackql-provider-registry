openapi: 3.0.0
info:
  version: "2017-11-28"
  title: Amazon GuardDuty
  description: Amazon GuardDuty
  x-serviceName: guardduty
  x-serviceAlias: guardduty
  x-protocol: rest-json
  x-apiVersion: "2017-11-28"
  x-endpointPrefix: guardduty
servers:
  - url: https://guardduty.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for guardduty
paths:
  /detector/{detector_id}/administrator:
    post:
      operationId: AcceptAdministratorInvitation
      description: Accepts the invitation to be a member account and get monitored by a GuardDuty administrator account that sent the invitation.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty member account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AdministratorId:
                  $ref: "#/components/schemas/String"
                InvitationId:
                  $ref: "#/components/schemas/String"
              required:
                - AdministratorId
                - InvitationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAdministratorInvitationResponse"
    get:
      operationId: GetAdministratorAccount
      description: "Provides the details of the GuardDuty administrator account associated with the current GuardDuty member account. Based on the type of account that runs this API, the following list shows how the API behavior varies: When the GuardDuty administrator account runs this API, it will return success (HTTP 200) but no content. When a member account runs this API, it will return the details of the GuardDuty administrator account that is associated with this calling member account. When an individual account (not associated with an organization) runs this API, it will return success (HTTP 200) but no content."
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty member account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdministratorAccountResponse"
  /detector/{detector_id}/master:
    post:
      operationId: AcceptInvitation
      description: Accepts the invitation to be monitored by a GuardDuty administrator account.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty member account. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MasterId:
                  $ref: "#/components/schemas/String"
                InvitationId:
                  $ref: "#/components/schemas/String"
              required:
                - MasterId
                - InvitationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResponse"
    get:
      operationId: GetMasterAccount
      description: Provides the details for the GuardDuty administrator account associated with the current GuardDuty member account.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty member account. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMasterAccountResponse"
  /detector/{detector_id}/findings/archive:
    post:
      operationId: ArchiveFindings
      description: Archives GuardDuty findings that are specified by the list of finding IDs. Only the administrator account can archive findings. Member accounts don't have permission to archive findings from their accounts.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The ID of the detector that specifies the GuardDuty service whose findings you want to archive. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingIds:
                  $ref: "#/components/schemas/FindingIds"
              required:
                - FindingIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveFindingsResponse"
  /detector:
    post:
      operationId: CreateDetector
      description: Creates a single GuardDuty detector. A detector is a resource that represents the GuardDuty service. To start using GuardDuty, you must create a detector in each Region where you enable the service. You can have only one detector per account per Region. All data sources are enabled in a new detector by default. When you don't specify any features, with an exception to RUNTIME_MONITORING, all the optional features are enabled by default. When you specify some of the features, any feature that is not specified in the API call gets enabled by default, with an exception to RUNTIME_MONITORING. Specifying both EKS Runtime Monitoring (EKS_RUNTIME_MONITORING) and Runtime Monitoring (RUNTIME_MONITORING) will cause an error. You can add only one of these two features because Runtime Monitoring already includes the threat detection for Amazon EKS resources. For more information, see Runtime Monitoring. There might be regional differences because some data sources might not be available in all the Amazon Web Services Regions where GuardDuty is presently supported. For more information, see Regions and endpoints.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Enable:
                  $ref: "#/components/schemas/Boolean"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                FindingPublishingFrequency:
                  $ref: "#/components/schemas/FindingPublishingFrequency"
                DataSources:
                  $ref: "#/components/schemas/DataSourceConfigurations"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                Features:
                  $ref: "#/components/schemas/DetectorFeatureConfigurations"
              required:
                - Enable
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDetectorResponse"
    get:
      operationId: ListDetectors
      description: Lists detectorIds of all the existing Amazon GuardDuty detector resources.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items that you want in the response. The default value is 50. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDetectorsOutputDisplay"
  /detector/{detector_id}/filter:
    post:
      operationId: CreateFilter
      description: Creates a filter using the specified finding criteria. The maximum number of saved filters per Amazon Web Services account per Region is 100. For more information, see Quotas for GuardDuty.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The detector ID associated with the GuardDuty account for which you want to create a filter. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/FilterName"
                Description:
                  $ref: "#/components/schemas/FilterDescription"
                Action:
                  $ref: "#/components/schemas/FilterAction"
                Rank:
                  $ref: "#/components/schemas/FilterRank"
                FindingCriteria:
                  $ref: "#/components/schemas/FindingCriteria"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - FindingCriteria
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFilterResponse"
    get:
      operationId: ListFilters
      description: Returns a paginated list of the current filters.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with the filter. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items that you want in the response. The default value is 50. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFiltersOutputDisplay"
  /detector/{detector_id}/ipset:
    post:
      operationId: CreateIPSet
      description: Creates a new IPSet, which is called a trusted IP list in the console user interface. An IPSet is a list of IP addresses that are trusted for secure communication with Amazon Web Services infrastructure and applications. GuardDuty doesn't generate findings for IP addresses that are included in IPSets. Only users from the administrator account can use this operation.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty account for which you want to create an IPSet. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Format:
                  $ref: "#/components/schemas/IpSetFormat"
                Location:
                  $ref: "#/components/schemas/Location"
                Activate:
                  $ref: "#/components/schemas/Boolean"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ExpectedBucketOwner:
                  $ref: "#/components/schemas/AccountId"
              required:
                - Activate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIPSetResponse"
    get:
      operationId: ListIPSets
      description: Lists the IPSets of the GuardDuty service specified by the detector ID. If you use this operation from a member account, the IPSets returned are the IPSets from the associated administrator account.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with IPSet. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items you want in the response. The default value is 50. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIPSetsOutputDisplay"
  /malware-protection-plan:
    post:
      operationId: CreateMalwareProtectionPlan
      description: Creates a new Malware Protection plan for the protected resource. When you create a Malware Protection plan, the Amazon Web Services service terms for GuardDuty Malware Protection apply. For more information, see Amazon Web Services service terms for GuardDuty Malware Protection.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Role:
                  $ref: "#/components/schemas/String"
                ProtectedResource:
                  $ref: "#/components/schemas/CreateProtectedResource"
                Actions:
                  $ref: "#/components/schemas/MalwareProtectionPlanActions"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ProtectedResource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMalwareProtectionPlanResponse"
    get:
      operationId: ListMalwareProtectionPlans
      description: Lists the Malware Protection plan IDs associated with the protected resources in your Amazon Web Services account.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data. The default page size is 100 plans.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMalwareProtectionPlansResponse"
  /detector/{detector_id}/member:
    post:
      operationId: CreateMembers
      description: Creates member accounts of the current Amazon Web Services account by specifying a list of Amazon Web Services account IDs. This step is a prerequisite for managing the associated member accounts either by invitation or through an organization. As a delegated administrator, using CreateMembers will enable GuardDuty in the added member accounts, with the exception of the organization delegated administrator account. A delegated administrator must enable GuardDuty prior to being added as a member. When you use CreateMembers as an Organizations delegated administrator, GuardDuty applies your organization's auto-enable settings to the member accounts in this request, irrespective of the accounts being new or existing members. For more information about the existing auto-enable settings for your organization, see DescribeOrganizationConfiguration. If you disassociate a member account that was added by invitation, the member account details obtained from this API, including the associated email addresses, will be retained. This is done so that the delegated administrator can invoke the InviteMembers API without the need to invoke the CreateMembers API again. To remove the details associated with a member account, the delegated administrator must invoke the DeleteMembers API. When the member accounts added through Organizations are later disassociated, you (administrator) can't invite them by calling the InviteMembers API. You can create an association with these member accounts again only by calling the CreateMembers API.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty account for which you want to associate member accounts. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountDetails:
                  $ref: "#/components/schemas/AccountDetails"
              required:
                - AccountDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembersResponse"
    get:
      operationId: ListMembers
      description: Lists details about all member accounts for the current GuardDuty administrator account.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with the member. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items you want in the response. The default value is 50. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
        - name: onlyAssociated
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Specifies whether to only return associated members or to return all members (including members who haven't been invited yet or have been disassociated). Member accounts must have been previously associated with the GuardDuty administrator account using Create Members .
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMembersResponse"
  /detector/{detector_id}/publishingDestination:
    post:
      operationId: CreatePublishingDestination
      description: Creates a publishing destination where you can export your GuardDuty findings. Before you start exporting the findings, the destination resource must exist.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The ID of the GuardDuty detector associated with the publishing destination. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DestinationType:
                  $ref: "#/components/schemas/DestinationType"
                DestinationProperties:
                  $ref: "#/components/schemas/DestinationProperties"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - DestinationType
                - DestinationProperties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePublishingDestinationResponse"
    get:
      operationId: ListPublishingDestinations
      description: Returns a list of publishing destinations associated with the specified detectorId.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The detector ID for which you want to retrieve the publishing destination. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return in the response.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A token to use for paginating results that are returned in the response. Set the value of this parameter to null for the first request to a list action. For subsequent calls, use the NextToken value returned from the previous request to continue listing results after the first page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPublishingDestinationsResponse"
  /detector/{detector_id}/findings/create:
    post:
      operationId: CreateSampleFindings
      description: Generates sample findings of types specified by the list of finding types. If 'NULL' is specified for findingTypes, the API generates sample findings of all supported finding types.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The ID of the detector for which you need to create sample findings. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingTypes:
                  $ref: "#/components/schemas/FindingTypes"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSampleFindingsResponse"
  /detector/{detector_id}/threatentityset:
    post:
      operationId: CreateThreatEntitySet
      description: Creates a new threat entity set. In a threat entity set, you can provide known malicious IP addresses and domains for your Amazon Web Services environment. GuardDuty generates findings based on the entries in the threat entity sets. Only users of the administrator account can manage entity sets, which automatically apply to member accounts.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty account for which you want to create a threat entity set. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Format:
                  $ref: "#/components/schemas/ThreatEntitySetFormat"
                Location:
                  $ref: "#/components/schemas/Location"
                ExpectedBucketOwner:
                  $ref: "#/components/schemas/ExpectedBucketOwner"
                Activate:
                  $ref: "#/components/schemas/Boolean"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - Activate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateThreatEntitySetResponse"
    get:
      operationId: ListThreatEntitySets
      description: Lists the threat entity sets associated with the specified GuardDuty detector ID. If you use this operation from a member account, the threat entity sets that are returned as a response, belong to the administrator account.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the GuardDuty detector that is associated with this threat entity set. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items you want in the response. The default value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter when paginating results. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThreatEntitySetsOutputDisplay"
  /detector/{detector_id}/threatintelset:
    post:
      operationId: CreateThreatIntelSet
      description: Creates a new ThreatIntelSet. ThreatIntelSets consist of known malicious IP addresses. GuardDuty generates findings based on ThreatIntelSets. Only users of the administrator account can use this operation.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector of the GuardDuty account for which you want to create a threatIntelSet. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/Name"
                Format:
                  $ref: "#/components/schemas/ThreatIntelSetFormat"
                Location:
                  $ref: "#/components/schemas/Location"
                Activate:
                  $ref: "#/components/schemas/Boolean"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ExpectedBucketOwner:
                  $ref: "#/components/schemas/AccountId"
              required:
                - Activate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateThreatIntelSetResponse"
    get:
      operationId: ListThreatIntelSets
      description: Lists the ThreatIntelSets of the GuardDuty service specified by the detector ID. If you use this operation from a member account, the ThreatIntelSets associated with the administrator account are returned.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
          description: The unique ID of the detector that is associated with the threatIntelSet. To find the detectorId in the current Region, see the Settings page in the GuardDuty console, or run the ListDetectors API.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: You can use this parameter to indicate the maximum number of items that you want in the response. The default value is 50. The maximum value is 50.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: You can use this parameter to paginate results in the response. Set the value of this parameter to null on your first call to the list action. For subsequent calls to the action, fill nextToken in the request with the value of NextToken from the previous response to continue listing data.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListThreatIntelSetsOutputDisplay"
  /detector/{detector_id}/trustedentityset:
    post:
      operationId: CreateTrustedEntitySet
      description: Creates a new trusted entity set. In the trusted entity set, you can provide IP addresses and domains that you believe are secure for communication in your Amazon Web Services environment. GuardDuty will not generate findings for the entries that are specified in a trusted entity set. At any given time, you can have only one trusted entity set. Only users of the administrator account can manage the entity sets, which automatically apply to member accounts.
      parameters:
        - name: detector_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DetectorId"
