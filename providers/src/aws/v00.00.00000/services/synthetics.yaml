openapi: 3.0.0
info:
  version: "2017-10-11"
  title: Synthetics
  description: Synthetics
  x-serviceName: synthetics
  x-serviceAlias: synthetics
  x-protocol: rest-json
  x-apiVersion: "2017-10-11"
  x-endpointPrefix: synthetics
  x-jsonVersion: "1.1"
servers:
  - url: https://synthetics.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for synthetics
paths:
  /group/{group_identifier}/associate:
    patch:
      operationId: AssociateResource
      description: Associates a canary with a group. Using groups can help you with managing and automating your canaries, and you can also view aggregated run results and statistics for all canaries in a group. You must run this operation in the Region where the canary exists.
      parameters:
        - name: group_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupIdentifier"
          description: Specifies the group. You can specify the group name, the ARN, or the group ID as the GroupIdentifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/CanaryArn"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateResourceResponse"
  /canary:
    post:
      operationId: CreateCanary
      description: Creates a canary. Canaries are scripts that monitor your endpoints and APIs from the outside-in. Canaries help you check the availability and latency of your web services and troubleshoot anomalies by investigating load time data, screenshots of the UI, logs, and metrics. You can set up a canary to run continuously or just once. Do not use CreateCanary to modify an existing canary. Use UpdateCanary instead. To create canaries, you must have the CloudWatchSyntheticsFullAccess policy. If you are creating a new IAM role for the canary, you also need the iam:CreateRole, iam:CreatePolicy and iam:AttachRolePolicy permissions. For more information, see Necessary Roles and Permissions. Do not include secrets or proprietary information in your canary names. The canary name makes up part of the Amazon Resource Name (ARN) for the canary, and the ARN is included in outbound calls over the internet. For more information, see Security Considerations for Synthetics Canaries.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/CanaryName"
                Code:
                  $ref: "#/components/schemas/CanaryCodeInput"
                ArtifactS3Location:
                  $ref: "#/components/schemas/String"
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                Schedule:
                  $ref: "#/components/schemas/CanaryScheduleInput"
                RunConfig:
                  $ref: "#/components/schemas/CanaryRunConfigInput"
                SuccessRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                FailureRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                RuntimeVersion:
                  $ref: "#/components/schemas/String"
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfigInput"
                ResourcesToReplicateTags:
                  $ref: "#/components/schemas/ResourceList"
                ProvisionedResourceCleanup:
                  $ref: "#/components/schemas/ProvisionedResourceCleanupSetting"
                BrowserConfigs:
                  $ref: "#/components/schemas/BrowserConfigs"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ArtifactConfig:
                  $ref: "#/components/schemas/ArtifactConfigInput"
              required:
                - Code
                - ArtifactS3Location
                - ExecutionRoleArn
                - Schedule
                - RuntimeVersion
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCanaryResponse"
  /group:
    post:
      operationId: CreateGroup
      description: Creates a group which you can use to associate canaries with each other, including cross-Region canaries. Using groups can help you with managing and automating your canaries, and you can also view aggregated run results and statistics for all canaries in a group. Groups are global resources. When you create a group, it is replicated across Amazon Web Services Regions, and you can view it and add canaries to it from any Region. Although the group ARN format reflects the Region name where it was created, a group is not constrained to any Region. This means that you can put canaries from multiple Regions into the same group, and then use that group to view and manage all of those canaries in a single view. Groups are supported in all Regions except the Regions that are disabled by default. For more information about these Regions, see Enabling a Region. Each group can contain as many as 10 canaries. You can have as many as 20 groups in your account. Any single canary can be a member of up to 10 groups.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/GroupName"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - Name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupResponse"
  /canary/{name}:
    delete:
      operationId: DeleteCanary
      description: "Permanently deletes the specified canary. If the canary's ProvisionedResourceCleanup field is set to AUTOMATIC or you specify DeleteLambda in this operation as true, CloudWatch Synthetics also deletes the Lambda functions and layers that are used by the canary. Other resources used and created by the canary are not automatically deleted. After you delete a canary, you should also delete the following: The CloudWatch alarms created for this canary. These alarms have a name of Synthetics-Alarm-first-198-characters-of-canary-name-canaryId-alarm number Amazon S3 objects and buckets, such as the canary's artifact location. IAM roles created for the canary. If they were created in the console, these roles have the name role/service-role/CloudWatchSyntheticsRole-First-21-Characters-of-CanaryName CloudWatch Logs log groups created for the canary. These logs groups have the name /aws/lambda/cwsyn-First-21-Characters-of-CanaryName Before you delete a canary, you might want to use GetCanary to display the information about this canary. Make note of the information returned by this operation so that you can delete these resources after you delete the canary."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to delete. To find the names of your canaries, use DescribeCanaries.
        - name: deleteLambda
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/boolean"
          description: "Specifies whether to also delete the Lambda functions and layers used by this canary. The default is false. Your setting for this parameter is used only if the canary doesn't have AUTOMATIC for its ProvisionedResourceCleanup field. If that field is set to AUTOMATIC, then the Lambda functions and layers will be deleted when this canary is deleted. Type: Boolean"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCanaryResponse"
    get:
      operationId: GetCanary
      description: Retrieves complete information about one canary. You must specify the name of the canary that you want. To get a list of canaries and their names, use DescribeCanaries.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want details for.
        - name: dryRunId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: The DryRunId associated with an existing canary’s dry run. You can use this DryRunId to retrieve information about the dry run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCanaryResponse"
    patch:
      operationId: UpdateCanary
      description: "Updates the configuration of a canary that has already been created. For multibrowser canaries, you can add or remove browsers by updating the browserConfig list in the update call. For example: To add Firefox to a canary that currently uses Chrome, specify browserConfigs as [CHROME, FIREFOX] To remove Firefox and keep only Chrome, specify browserConfigs as [CHROME] You can't use this operation to update the tags of an existing canary. To change the tags of an existing canary, use TagResource. When you use the dryRunId field when updating a canary, the only other field you can provide is the Schedule. Adding any other field will thrown an exception."
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to update. To find the names of your canaries, use DescribeCanaries. You cannot change the name of a canary that has already been created.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Code:
                  $ref: "#/components/schemas/CanaryCodeInput"
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                RuntimeVersion:
                  $ref: "#/components/schemas/String"
                Schedule:
                  $ref: "#/components/schemas/CanaryScheduleInput"
                RunConfig:
                  $ref: "#/components/schemas/CanaryRunConfigInput"
                SuccessRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                FailureRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfigInput"
                VisualReference:
                  $ref: "#/components/schemas/VisualReferenceInput"
                ArtifactS3Location:
                  $ref: "#/components/schemas/String"
                ArtifactConfig:
                  $ref: "#/components/schemas/ArtifactConfigInput"
                ProvisionedResourceCleanup:
                  $ref: "#/components/schemas/ProvisionedResourceCleanupSetting"
                DryRunId:
                  $ref: "#/components/schemas/UUID"
                VisualReferences:
                  $ref: "#/components/schemas/VisualReferences"
                BrowserConfigs:
                  $ref: "#/components/schemas/BrowserConfigs"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateCanaryResponse"
  /group/{group_identifier}:
    delete:
      operationId: DeleteGroup
      description: Deletes a group. The group doesn't need to be empty to be deleted. If there are canaries in the group, they are not deleted when you delete the group. Groups are a global resource that appear in all Regions, but the request to delete a group must be made from its home Region. You can find the home Region of a group within its ARN.
      parameters:
        - name: group_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupIdentifier"
          description: Specifies which group to delete. You can specify the group name, the ARN, or the group ID as the GroupIdentifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGroupResponse"
    get:
      operationId: GetGroup
      description: Returns information about one group. Groups are a global resource, so you can use this operation from any Region.
      parameters:
        - name: group_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupIdentifier"
          description: Specifies the group to return information for. You can specify the group name, the ARN, or the group ID as the GroupIdentifier.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetGroupResponse"
  /canaries:
    post:
      operationId: DescribeCanaries
      description: This operation returns a list of the canaries in your account, along with full details about each canary. This operation supports resource-level authorization using an IAM policy and the Names parameter. If you specify the Names parameter, the operation is successful only if you have authorization to view all the canaries that you specify in your request. If you do not have permission to view any of the canaries, the request fails with a 403 response. You are required to use the Names parameter if you are logged on to a user or role that has an IAM policy that restricts which canaries that you are allowed to view. For more information, see Limiting a user to viewing specific canaries.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                MaxResults:
                  $ref: "#/components/schemas/MaxCanaryResults"
                Names:
                  $ref: "#/components/schemas/DescribeCanariesNameFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCanariesResponse"
  /canaries/last-run:
    post:
      operationId: DescribeCanariesLastRun
      description: Use this operation to see information from the most recent run of each canary that you have created. This operation supports resource-level authorization using an IAM policy and the Names parameter. If you specify the Names parameter, the operation is successful only if you have authorization to view all the canaries that you specify in your request. If you do not have permission to view any of the canaries, the request fails with a 403 response. You are required to use the Names parameter if you are logged on to a user or role that has an IAM policy that restricts which canaries that you are allowed to view. For more information, see Limiting a user to viewing specific canaries.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                MaxResults:
                  $ref: "#/components/schemas/MaxSize100"
                Names:
                  $ref: "#/components/schemas/DescribeCanariesLastRunNameFilter"
                BrowserType:
                  $ref: "#/components/schemas/BrowserType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeCanariesLastRunResponse"
  /runtime-versions:
    post:
      operationId: DescribeRuntimeVersions
      description: Returns a list of Synthetics canary runtime versions. For more information, see Canary Runtime Versions.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                MaxResults:
                  $ref: "#/components/schemas/MaxSize100"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeRuntimeVersionsResponse"
  /group/{group_identifier}/disassociate:
    patch:
      operationId: DisassociateResource
      description: Removes a canary from a group. You must run this operation in the Region where the canary exists.
      parameters:
        - name: group_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupIdentifier"
          description: Specifies the group. You can specify the group name, the ARN, or the group ID as the GroupIdentifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/CanaryArn"
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateResourceResponse"
  /canary/{name}/runs:
    post:
      operationId: GetCanaryRuns
      description: Retrieves a list of runs for a specified canary.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to see runs for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/Token"
                MaxResults:
                  $ref: "#/components/schemas/MaxSize100"
                DryRunId:
                  $ref: "#/components/schemas/UUID"
                RunType:
                  $ref: "#/components/schemas/RunType"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCanaryRunsResponse"
  /resource/{resource_arn}/groups:
    post:
      operationId: ListAssociatedGroups
      description: Returns a list of the groups that the specified canary is associated with. The canary that you specify must be in the current Region.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryArn"
          description: The ARN of the canary that you want to view groups for.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxGroupResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssociatedGroupsResponse"
  /group/{group_identifier}/resources:
    post:
      operationId: ListGroupResources
      description: This operation returns a list of the ARNs of the canaries that are associated with the specified group.
      parameters:
        - name: group_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupIdentifier"
          description: Specifies the group to return information for. You can specify the group name, the ARN, or the group ID as the GroupIdentifier.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxGroupResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupResourcesOutputDisplay"
  /groups:
    post:
      operationId: ListGroups
      description: Returns a list of all groups in the account, displaying their names, unique IDs, and ARNs. The groups from all Regions are returned.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                MaxResults:
                  $ref: "#/components/schemas/MaxGroupResults"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Displays the tags associated with a canary or group.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the canary or group that you want to view tags for. The ARN format of a canary is arn:aws:synthetics:Region:account-id:canary:canary-name . The ARN format of a group is arn:aws:synthetics:Region:account-id:group:group-name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified canary or group. Tags can help you organize and categorize your resources. You can also use them to scope user permissions, by granting a user permission to access or change only resources with certain tag values. Tags don't have any semantic meaning to Amazon Web Services and are interpreted strictly as strings of characters. You can use the TagResource action with a resource that already has tags. If you specify a new tag key for the resource, this tag is appended to the list of tags associated with the resource. If you specify a tag key that is already associated with the resource, the new tag value that you specify replaces the previous value for that tag. You can associate as many as 50 tags with a canary or group.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the canary or group that you're adding tags to. The ARN format of a canary is arn:aws:synthetics:Region:account-id:canary:canary-name . The ARN format of a group is arn:aws:synthetics:Region:account-id:group:group-name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the canary or group that you're removing tags from. The ARN format of a canary is arn:aws:synthetics:Region:account-id:canary:canary-name . The ARN format of a group is arn:aws:synthetics:Region:account-id:group:group-name
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The list of tag keys to remove from the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /canary/{name}/start:
    post:
      operationId: StartCanary
      description: Use this operation to run a canary that has already been created. The frequency of the canary runs is determined by the value of the canary's Schedule. To see a canary's schedule, use GetCanary.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to run. To find canary names, use DescribeCanaries.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCanaryResponse"
  /canary/{name}/dry-run/start:
    post:
      operationId: StartCanaryDryRun
      description: Use this operation to start a dry run for a canary that has already been created
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to dry run. To find canary names, use DescribeCanaries.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Code:
                  $ref: "#/components/schemas/CanaryCodeInput"
                RuntimeVersion:
                  $ref: "#/components/schemas/String"
                RunConfig:
                  $ref: "#/components/schemas/CanaryRunConfigInput"
                VpcConfig:
                  $ref: "#/components/schemas/VpcConfigInput"
                ExecutionRoleArn:
                  $ref: "#/components/schemas/RoleArn"
                SuccessRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                FailureRetentionPeriodInDays:
                  $ref: "#/components/schemas/MaxSize1024"
                VisualReference:
                  $ref: "#/components/schemas/VisualReferenceInput"
                ArtifactS3Location:
                  $ref: "#/components/schemas/String"
                ArtifactConfig:
                  $ref: "#/components/schemas/ArtifactConfigInput"
                ProvisionedResourceCleanup:
                  $ref: "#/components/schemas/ProvisionedResourceCleanupSetting"
                BrowserConfigs:
                  $ref: "#/components/schemas/BrowserConfigs"
                VisualReferences:
                  $ref: "#/components/schemas/VisualReferences"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartCanaryDryRunResponse"
  /canary/{name}/stop:
    post:
      operationId: StopCanary
      description: Stops the canary to prevent all future runs. If the canary is currently running,the run that is in progress completes on its own, publishes metrics, and uploads artifacts, but it is not recorded in Synthetics as a completed run. You can use StartCanary to start it running again with the canary’s current schedule at any point in the future.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanaryName"
          description: The name of the canary that you want to stop. To find the names of your canaries, use ListCanaries.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopCanaryResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GroupIdentifier:
      type: string
      minLength: 1
      maxLength: 128
    CanaryArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:synthetics:[a-z]{2,4}(-[a-z]{2,4})?-[a-z]+-\d{1}:\d{12}:canary:[0-9a-z_\-]{1,255}
    AssociateResourceResponse:
      type: object
    CanaryName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: ^[0-9a-z_\-]+$
    CanaryCodeInput:
      description: Use this structure to input your script code for the canary. This structure contains the Lambda handler with the location where the canary should start running the script. If the script is stored in an Amazon S3 bucket, the bucket name, key, and version are also included. If the script was passed into the canary directly, the script code is contained in the value of Zipfile. If you are uploading your canary scripts with an Amazon S3 bucket, your zip file should include your script in a certain folder structure. For Node.js canaries, the folder structure must be nodejs/node_modules/myCanaryFilename.js For more information, see Packaging your Node.js canary files For Python canaries, the folder structure must be python/myCanaryFilename.py or python/myFolder/myCanaryFilename.py For more information, see Packaging your Python canary files
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/String"
          description: If your canary script is located in Amazon S3, specify the bucket name here. Do not include s3:// as the start of the bucket name.
        S3Key:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 key of your script. For more information, see Working with Amazon S3 Objects.
        S3Version:
          $ref: "#/components/schemas/String"
          description: The Amazon S3 version ID of your script.
        ZipFile:
          $ref: "#/components/schemas/Blob"
          description: If you input your canary script directly into the canary instead of referring to an Amazon S3 location, the value of this parameter is the base64-encoded contents of the .zip file that contains the script. It must be smaller than 225 Kb. For large canary scripts, we recommend that you use an Amazon S3 location instead of inputting it directly with this parameter.
        Handler:
          $ref: "#/components/schemas/CodeHandler"
          description: The entry point to use for the source code when running the canary. For canaries that use the syn-python-selenium-1.0 runtime or a syn-nodejs.puppeteer runtime earlier than syn-nodejs.puppeteer-3.4, the handler must be specified as fileName.handler. For syn-python-selenium-1.1, syn-nodejs.puppeteer-3.4, and later runtimes, the handler can be specified as fileName.functionName , or you can specify a folder where canary scripts reside as folder/fileName.functionName . This field is required when you don't specify BlueprintTypes and is not allowed when you specify BlueprintTypes.
        BlueprintTypes:
          $ref: "#/components/schemas/BlueprintTypes"
          description: BlueprintTypes is a list of templates that enable simplified canary creation. You can create canaries for common monitoring scenarios by providing only a JSON configuration file instead of writing custom scripts. The only supported value is multi-checks. Multi-checks monitors HTTP/DNS/SSL/TCP endpoints with built-in authentication schemes (Basic, API Key, OAuth, SigV4) and assertion capabilities. When you specify BlueprintTypes, the Handler field cannot be specified since the blueprint provides a pre-defined entry point. BlueprintTypes is supported only on canaries for syn-nodejs-3.0 runtime or later.
        Dependencies:
          $ref: "#/components/schemas/Dependencies"
          description: A list of dependencies that should be used for running this canary. Specify the dependencies as a key-value pair, where the key is the type of dependency and the value is the dependency reference.
    String:
      type: string
      minLength: 1
      maxLength: 1024
    Blob:
      type: string
      format: byte
      minLength: 1
      maxLength: 10000000
    CodeHandler:
      type: string
      minLength: 0
      maxLength: 128
      pattern: ^(([0-9a-zA-Z_-]+(\/|\.))*[0-9A-Za-z_\\-]+(\.|::)[A-Za-z_][A-Za-z0-9_]*)?$
    BlueprintTypes:
      type: array
      items:
        $ref: "#/components/schemas/BlueprintType"
    BlueprintType:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9a-zA-Z_\\-\\.]+"
    Dependencies:
      type: array
      items:
        $ref: "#/components/schemas/Dependency"
    Dependency:
      description: A structure that contains information about a dependency for a canary.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/DependencyType"
          description: The type of dependency. Valid value is LambdaLayer.
        Reference:
          $ref: "#/components/schemas/String"
          description: The dependency reference. For Lambda layers, this is the ARN of the Lambda layer. For more information about Lambda ARN format, see Lambda.
      required:
        - Reference
    DependencyType:
      type: string
      enum:
        - LambdaLayer
    RoleArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/?[a-zA-Z_0-9+=,.@\-_/]+
    CanaryScheduleInput:
      description: This structure specifies how often a canary is to make runs and the date and time when it should stop making runs.
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/String"
          description: A rate expression or a cron expression that defines how often the canary is to run. For a rate expression, The syntax is rate(number unit). unit can be minute, minutes, or hour. For example, rate(1 minute) runs the canary once a minute, rate(10 minutes) runs it once every 10 minutes, and rate(1 hour) runs it once every hour. You can specify a frequency between rate(1 minute) and rate(1 hour). Specifying rate(0 minute) or rate(0 hour) is a special value that causes the canary to run only once when it is started. Use cron(expression) to specify a cron expression. You can't schedule a canary to wait for more than a year before running. For information about the syntax for cron expressions, see Scheduling canary runs using cron.
        DurationInSeconds:
          $ref: "#/components/schemas/MaxOneYearInSeconds"
          description: How long, in seconds, for the canary to continue making regular runs according to the schedule in the Expression value. If you specify 0, the canary continues making runs until you stop it. If you omit this field, the default of 0 is used.
        RetryConfig:
          $ref: "#/components/schemas/RetryConfigInput"
          description: A structure that contains the retry configuration for a canary
      required:
        - Expression
    MaxOneYearInSeconds:
      type: integer
      format: int64
      minimum: 0
      maximum: 31622400
    RetryConfigInput:
      description: This structure contains information about the canary's retry configuration. The default account level concurrent execution limit from Lambda is 1000. When you have more than 1000 canaries, it's possible there are more than 1000 Lambda invocations due to retries and the console might hang. For more information on the Lambda execution limit, see Understanding Lambda function scaling. For canary with MaxRetries = 2, you need to set the CanaryRunConfigInput.TimeoutInSeconds to less than 600 seconds to avoid validation errors.
      type: object
      properties:
        MaxRetries:
          $ref: "#/components/schemas/MaxRetries"
          description: The maximum number of retries. The value must be less than or equal to 2.
      required:
        - MaxRetries
    MaxRetries:
      type: integer
      minimum: 0
      maximum: 2
    CanaryRunConfigInput:
      description: A structure that contains input information for a canary run.
      type: object
      properties:
        TimeoutInSeconds:
          $ref: "#/components/schemas/MaxFifteenMinutesInSeconds"
          description: How long the canary is allowed to run before it must stop. You can't set this time to be longer than the frequency of the runs of this canary. If you omit this field, the frequency of the canary is used as this value, up to a maximum of 14 minutes.
        MemoryInMB:
          $ref: "#/components/schemas/MaxSize3008"
          description: The maximum amount of memory available to the canary while it is running, in MB. This value must be a multiple of 64.
        ActiveTracing:
          $ref: "#/components/schemas/NullableBoolean"
          description: Specifies whether this canary is to use active X-Ray tracing when it runs. Active tracing enables this canary run to be displayed in the ServiceLens and X-Ray service maps even if the canary does not hit an endpoint that has X-Ray tracing enabled. Using X-Ray tracing incurs charges. For more information, see Canaries and X-Ray tracing. You can enable active tracing only for canaries that use version syn-nodejs-2.0 or later for their canary runtime.
        EnvironmentVariables:
          type: object
          properties: {}
          description: "Specifies the keys and values to use for any environment variables used in the canary script. Use the following format: { \"key1\" : \"value1\", \"key2\" : \"value2\", ...} Keys must start with a letter and be at least two characters. The total size of your environment variables cannot exceed 4 KB. You can't specify any Lambda reserved environment variables as the keys for your environment variables. For more information about reserved keys, see Runtime environment variables. Environment variable keys and values are encrypted at rest using Amazon Web Services owned KMS keys. However, the environment variables are not encrypted on the client side. Do not store sensitive information in them."
        EphemeralStorage:
          $ref: "#/components/schemas/EphemeralStorageSize"
          description: Specifies the amount of ephemeral storage (in MB) to allocate for the canary run during execution. This temporary storage is used for storing canary run artifacts (which are uploaded to an Amazon S3 bucket at the end of the run), and any canary browser operations. This temporary storage is cleared after the run is completed. Default storage value is 1024 MB.
    MaxFifteenMinutesInSeconds:
      type: integer
      minimum: 3
      maximum: 840
    MaxSize3008:
      type: integer
      minimum: 960
      maximum: 3008
    NullableBoolean:
      type: boolean
    EphemeralStorageSize:
      type: integer
      minimum: 1024
      maximum: 10240
    MaxSize1024:
      type: integer
      minimum: 1
      maximum: 1024
    VpcConfigInput:
      description: If this canary is to test an endpoint in a VPC, this structure contains information about the subnets and security groups of the VPC endpoint. For more information, see Running a Canary in a VPC.
      type: object
      properties:
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The IDs of the subnets where this canary is to run.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The IDs of the security groups for this canary.
        Ipv6AllowedForDualStack:
          $ref: "#/components/schemas/NullableBoolean"
          description: Set this to true to allow outbound IPv6 traffic on VPC canaries that are connected to dual-stack subnets. The default is false
    SubnetIds:
      type: array
      items:
        $ref: "#/components/schemas/SubnetId"
    SubnetId:
      type: string
    SecurityGroupIds:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
    ResourceList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceToTag"
    ResourceToTag:
      type: string
      enum:
        - lambda-function
    ProvisionedResourceCleanupSetting:
      type: string
      enum:
        - AUTOMATIC
        - "OFF"
    BrowserConfigs:
      type: array
      items:
        $ref: "#/components/schemas/BrowserConfig"
    BrowserConfig:
      description: A structure that specifies the browser type to use for a canary run.
      type: object
      properties:
        BrowserType:
          $ref: "#/components/schemas/BrowserType"
          description: The browser type associated with this browser configuration.
    BrowserType:
      type: string
      enum:
        - CHROME
        - FIREFOX
    TagMap:
      type: object
      properties: {}
    ArtifactConfigInput:
      description: A structure that contains the configuration for canary artifacts, including the encryption-at-rest settings for artifacts that the canary uploads to Amazon S3.
      type: object
      properties:
        S3Encryption:
          $ref: "#/components/schemas/S3EncryptionConfig"
          description: A structure that contains the configuration of the encryption-at-rest settings for artifacts that the canary uploads to Amazon S3. Artifact encryption functionality is available only for canaries that use Synthetics runtime version syn-nodejs-puppeteer-3.3 or later. For more information, see Encrypting canary artifacts
    S3EncryptionConfig:
      description: A structure that contains the configuration of encryption-at-rest settings for canary artifacts that the canary uploads to Amazon S3. For more information, see Encrypting canary artifacts
      type: object
      properties:
        EncryptionMode:
          $ref: "#/components/schemas/EncryptionMode"
          description: The encryption method to use for artifacts created by this canary. Specify SSE_S3 to use server-side encryption (SSE) with an Amazon S3-managed key. Specify SSE-KMS to use server-side encryption with a customer-managed KMS key. If you omit this parameter, an Amazon Web Services-managed KMS key is used.
        KmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The ARN of the customer-managed KMS key to use, if you specify SSE-KMS for EncryptionMode
    EncryptionMode:
      type: string
      enum:
        - SSE_S3
        - SSE_KMS
    KmsKeyArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:kms:[a-z]{2,4}(-[a-z]{2,4})?-[a-z]+-\d{1}:\d{12}:key/[\w\-\/]+
    CreateCanaryResponse:
      type: object
      properties:
        Canary:
          $ref: "#/components/schemas/Canary"
          description: The full details about the canary you have created.
    Canary:
      description: This structure contains all information about one canary in your account.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/UUID"
          description: The unique ID of this canary.
        Name:
          $ref: "#/components/schemas/CanaryName"
          description: The name of the canary.
        Code:
          $ref: "#/components/schemas/CanaryCodeOutput"
        ExecutionRoleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM role used to run the canary. This role must include lambda.amazonaws.com as a principal in the trust policy.
        Schedule:
          $ref: "#/components/schemas/CanaryScheduleOutput"
          description: A structure that contains information about how often the canary is to run, and when these runs are to stop.
        RunConfig:
          $ref: "#/components/schemas/CanaryRunConfigOutput"
        SuccessRetentionPeriodInDays:
          $ref: "#/components/schemas/MaxSize1024"
          description: The number of days to retain data about successful runs of this canary. This setting affects the range of information returned by GetCanaryRuns, as well as the range of information displayed in the Synthetics console.
        FailureRetentionPeriodInDays:
          $ref: "#/components/schemas/MaxSize1024"
          description: The number of days to retain data about failed runs of this canary. This setting affects the range of information returned by GetCanaryRuns, as well as the range of information displayed in the Synthetics console.
        Status:
          $ref: "#/components/schemas/CanaryStatus"
          description: A structure that contains information about the canary's status.
        Timeline:
          $ref: "#/components/schemas/CanaryTimeline"
          description: A structure that contains information about when the canary was created, modified, and most recently run.
        ArtifactS3Location:
          $ref: "#/components/schemas/String"
          description: The location in Amazon S3 where Synthetics stores artifacts from the runs of this canary. Artifacts include the log file, screenshots, and HAR files.
        EngineArn:
          $ref: "#/components/schemas/FunctionArn"
          description: The ARN of the Lambda function that is used as your canary's engine. For more information about Lambda ARN format, see Resources and Conditions for Lambda Actions.
        RuntimeVersion:
          $ref: "#/components/schemas/String"
          description: Specifies the runtime version to use for the canary. For more information about runtime versions, see Canary Runtime Versions.
        VpcConfig:
          $ref: "#/components/schemas/VpcConfigOutput"
        VisualReference:
          $ref: "#/components/schemas/VisualReferenceOutput"
          description: If this canary performs visual monitoring by comparing screenshots, this structure contains the ID of the canary run to use as the baseline for screenshots, and the coordinates of any parts of the screen to ignore during the visual monitoring comparison.
        ProvisionedResourceCleanup:
          $ref: "#/components/schemas/ProvisionedResourceCleanupSetting"
          description: Specifies whether to also delete the Lambda functions and layers used by this canary when the canary is deleted. If it is AUTOMATIC, the Lambda functions and layers will be deleted when the canary is deleted. If the value of this parameter is OFF, then the value of the DeleteLambda parameter of the DeleteCanary operation determines whether the Lambda functions and layers will be deleted.
        BrowserConfigs:
          $ref: "#/components/schemas/BrowserConfigs"
          description: A structure that specifies the browser type to use for a canary run. CloudWatch Synthetics supports running canaries on both CHROME and FIREFOX browsers. If not specified, browserConfigs defaults to Chrome.
        EngineConfigs:
          $ref: "#/components/schemas/EngineConfigs"
          description: A list of engine configurations for the canary, one for each browser type that the canary is configured to run on. All runtime versions syn-nodejs-puppeteer-11.0 and above, and syn-nodejs-playwright-3.0 and above, use engineConfigs only. You can no longer use engineArn in these versions. Runtime versions older than syn-nodejs-puppeteer-11.0 and syn-nodejs-playwright-3.0 continue to support engineArn to ensure backward compatibility.
        VisualReferences:
          $ref: "#/components/schemas/VisualReferencesOutput"
          description: A list of visual reference configurations for the canary, one for each browser type that the canary is configured to run on. Visual references are used for visual monitoring comparisons. syn-nodejs-puppeteer-11.0 and above, and syn-nodejs-playwright-3.0 and above, only supports visualReferences. visualReference field is not supported. Versions older than syn-nodejs-puppeteer-11.0 supports both visualReference and visualReferences for backward compatibility. It is recommended to use visualReferences for consistency and future compatibility.
        Tags:
          type: object
          properties: {}
          description: The list of key-value pairs that are associated with the canary.
        ArtifactConfig:
          $ref: "#/components/schemas/ArtifactConfigOutput"
          description: A structure that contains the configuration for canary artifacts, including the encryption-at-rest settings for artifacts that the canary uploads to Amazon S3.
        DryRunConfig:
          $ref: "#/components/schemas/DryRunConfigOutput"
          description: Returns the dry run configurations for a canary.
    UUID:
      type: string
      pattern: ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$
    CanaryCodeOutput:
      description: This structure contains information about the canary's Lambda handler and where its code is stored by CloudWatch Synthetics.
      type: object
      properties:
        SourceLocationArn:
          $ref: "#/components/schemas/String"
          description: The ARN of the Lambda layer where Synthetics stores the canary script code.
        Handler:
          $ref: "#/components/schemas/String"
          description: The entry point to use for the source code when running the canary. This field is required when you don't specify BlueprintTypes and is not allowed when you specify BlueprintTypes.
        BlueprintTypes:
          $ref: "#/components/schemas/BlueprintTypes"
          description: BlueprintTypes is a list of templates that enable simplified canary creation. You can create canaries for common monitoring scenarios by providing only a JSON configuration file instead of writing custom scripts. The only supported value is multi-checks. Multi-checks monitors HTTP/DNS/SSL/TCP endpoints with built-in authentication schemes (Basic, API Key, OAuth, SigV4) and assertion capabilities. When you specify BlueprintTypes, the Handler field cannot be specified since the blueprint provides a pre-defined entry point. BlueprintTypes is supported only on canaries for syn-nodejs-3.0 runtime or later.
        Dependencies:
          $ref: "#/components/schemas/Dependencies"
          description: A list of dependencies that are used for running this canary. The dependencies are specified as a key-value pair, where the key is the type of dependency and the value is the dependency reference.
    CanaryScheduleOutput:
      description: How long, in seconds, for the canary to continue making regular runs according to the schedule in the Expression value.
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/String"
          description: A rate expression or a cron expression that defines how often the canary is to run. For a rate expression, The syntax is rate(number unit). unit can be minute, minutes, or hour. For example, rate(1 minute) runs the canary once a minute, rate(10 minutes) runs it once every 10 minutes, and rate(1 hour) runs it once every hour. You can specify a frequency between rate(1 minute) and rate(1 hour). Specifying rate(0 minute) or rate(0 hour) is a special value that causes the canary to run only once when it is started. Use cron(expression) to specify a cron expression. For information about the syntax for cron expressions, see Scheduling canary runs using cron.
        DurationInSeconds:
          $ref: "#/components/schemas/MaxOneYearInSeconds"
          description: How long, in seconds, for the canary to continue making regular runs after it was created. The runs are performed according to the schedule in the Expression value.
        RetryConfig:
          $ref: "#/components/schemas/RetryConfigOutput"
          description: A structure that contains the retry configuration for a canary
    RetryConfigOutput:
      description: This structure contains information about the canary's retry configuration.
      type: object
      properties:
        MaxRetries:
          $ref: "#/components/schemas/MaxRetries"
          description: The maximum number of retries. The value must be less than or equal to 2.
    CanaryRunConfigOutput:
      description: A structure that contains information about a canary run.
      type: object
      properties:
        TimeoutInSeconds:
          $ref: "#/components/schemas/MaxFifteenMinutesInSeconds"
          description: How long the canary is allowed to run before it must stop.
        MemoryInMB:
          $ref: "#/components/schemas/MaxSize3008"
          description: The maximum amount of memory available to the canary while it is running, in MB. This value must be a multiple of 64.
        ActiveTracing:
          $ref: "#/components/schemas/NullableBoolean"
          description: Displays whether this canary run used active X-Ray tracing.
        EphemeralStorage:
          $ref: "#/components/schemas/EphemeralStorageSize"
          description: Specifies the amount of ephemeral storage (in MB) to allocate for the canary run during execution. This temporary storage is used for storing canary run artifacts (which are uploaded to an Amazon S3 bucket at the end of the run), and any canary browser operations. This temporary storage is cleared after the run is completed. Default storage value is 1024 MB.
    CanaryStatus:
      description: A structure that contains the current state of the canary.
      type: object
      properties:
        State:
          $ref: "#/components/schemas/CanaryState"
          description: The current state of the canary.
        StateReason:
          $ref: "#/components/schemas/String"
          description: If the canary creation or update failed, this field provides details on the failure.
        StateReasonCode:
          $ref: "#/components/schemas/CanaryStateReasonCode"
          description: If the canary creation or update failed, this field displays the reason code.
    CanaryState:
      type: string
      enum:
        - CREATING
        - READY
        - STARTING
        - RUNNING
        - UPDATING
        - STOPPING
        - STOPPED
        - ERROR
        - DELETING
    CanaryStateReasonCode:
      type: string
      enum:
        - INVALID_PERMISSIONS
        - CREATE_PENDING
        - CREATE_IN_PROGRESS
        - CREATE_FAILED
        - UPDATE_PENDING
        - UPDATE_IN_PROGRESS
        - UPDATE_COMPLETE
        - ROLLBACK_COMPLETE
        - ROLLBACK_FAILED
        - DELETE_IN_PROGRESS
        - DELETE_FAILED
        - SYNC_DELETE_IN_PROGRESS
    CanaryTimeline:
      description: This structure contains information about when the canary was created and modified.
      type: object
      properties:
        Created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the canary was created.
        LastModified:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the canary was most recently modified.
        LastStarted:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the canary's most recent run started.
        LastStopped:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that the canary's most recent run ended.
    Timestamp:
      type: string
      format: date-time
    FunctionArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: arn:(aws[a-zA-Z-]*)?:lambda:[a-z]{2,4}(-[a-z]{2,4})?-[a-z]+-\d{1}:\d{12}:function:[a-zA-Z0-9-_]+(:(\$LATEST|[a-zA-Z0-9-_]+))?
    VpcConfigOutput:
      description: If this canary is to test an endpoint in a VPC, this structure contains information about the subnets and security groups of the VPC endpoint. For more information, see Running a Canary in a VPC.
      type: object
      properties:
        VpcId:
          $ref: "#/components/schemas/VpcId"
          description: The IDs of the VPC where this canary is to run.
        SubnetIds:
          $ref: "#/components/schemas/SubnetIds"
          description: The IDs of the subnets where this canary is to run.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: The IDs of the security groups for this canary.
        Ipv6AllowedForDualStack:
          $ref: "#/components/schemas/NullableBoolean"
          description: Indicates whether this canary allows outbound IPv6 traffic if it is connected to dual-stack subnets.
    VpcId:
      type: string
    VisualReferenceOutput:
      description: If this canary performs visual monitoring by comparing screenshots, this structure contains the ID of the canary run that is used as the baseline for screenshots, and the coordinates of any parts of those screenshots that are ignored during visual monitoring comparison. Visual monitoring is supported only on canaries running the syn-puppeteer-node-3.2 runtime or later.
      type: object
      properties:
        BaseScreenshots:
          $ref: "#/components/schemas/BaseScreenshots"
          description: An array of screenshots that are used as the baseline for comparisons during visual monitoring.
        BaseCanaryRunId:
          $ref: "#/components/schemas/String"
          description: The ID of the canary run that produced the baseline screenshots that are used for visual monitoring comparisons by this canary.
        BrowserType:
          $ref: "#/components/schemas/BrowserType"
          description: The browser type associated with this visual reference.
    BaseScreenshots:
      type: array
      items:
        $ref: "#/components/schemas/BaseScreenshot"
    BaseScreenshot:
      description: A structure representing a screenshot that is used as a baseline during visual monitoring comparisons made by the canary.
      type: object
      properties:
        ScreenshotName:
          $ref: "#/components/schemas/String"
          description: The name of the screenshot. This is generated the first time the canary is run after the UpdateCanary operation that specified for this canary to perform visual monitoring.
        IgnoreCoordinates:
          $ref: "#/components/schemas/BaseScreenshotIgnoreCoordinates"
          description: Coordinates that define the part of a screen to ignore during screenshot comparisons. To obtain the coordinates to use here, use the CloudWatch console to draw the boundaries on the screen. For more information, see Editing or deleting a canary
      required:
        - ScreenshotName
    BaseScreenshotIgnoreCoordinates:
      type: array
      items:
        $ref: "#/components/schemas/BaseScreenshotConfigIgnoreCoordinate"
    BaseScreenshotConfigIgnoreCoordinate:
      type: string
      pattern: ^(-?\d{1,5}\.?\d{0,2},){3}(-?\d{1,5}\.?\d{0,2}){1}$
    EngineConfigs:
      type: array
      items:
        $ref: "#/components/schemas/EngineConfig"
    EngineConfig:
      description: A structure of engine configurations for the canary, one for each browser type that the canary is configured to run on.
      type: object
      properties:
        EngineArn:
          $ref: "#/components/schemas/FunctionArn"
          description: Each engine configuration contains the ARN of the Lambda function that is used as the canary's engine for a specific browser type.
        BrowserType:
          $ref: "#/components/schemas/BrowserType"
          description: The browser type associated with this engine configuration.
    VisualReferencesOutput:
      type: array
      items:
        $ref: "#/components/schemas/VisualReferenceOutput"
    ArtifactConfigOutput:
      description: A structure that contains the configuration for canary artifacts, including the encryption-at-rest settings for artifacts that the canary uploads to Amazon S3.
      type: object
      properties:
        S3Encryption:
