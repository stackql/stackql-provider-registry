openapi: 3.0.0
info:
  version: "2023-01-27"
  title: Timestream InfluxDB
  description: Timestream InfluxDB
  x-serviceName: timestream-influxdb
  x-serviceAlias: timestream_influxdb
  x-protocol: json
  x-apiVersion: "2023-01-27"
  x-endpointPrefix: timestream-influxdb
  x-targetPrefix: AmazonTimestreamInfluxDB
  x-jsonVersion: "1.0"
servers:
  - url: https://timestream-influxdb.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for timestream-influxdb
paths:
  /CreateDbCluster:
    post:
      operationId: CreateDbCluster
      description: Creates a new Timestream for InfluxDB cluster.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonTimestreamInfluxDB.CreateDbCluster
            default: AmazonTimestreamInfluxDB.CreateDbCluster
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/DbClusterName"
                  description: The name that uniquely identifies the DB cluster when interacting with the Amazon Timestream for InfluxDB API and CLI commands. This name will also be a prefix included in the endpoint. DB cluster names must be unique per customer and per region.
                username:
                  $ref: "#/components/schemas/Username"
                  description: The username of the initial admin user created in InfluxDB. Must start with a letter and can't end with a hyphen or contain two consecutive hyphens. For example, my-user1. This username will allow you to access the InfluxDB UI to perform various administrative tasks and also use the InfluxDB CLI to create an operator token. These attributes will be stored in a secret created in Secrets Manager in your account.
                password:
                  $ref: "#/components/schemas/Password"
                  description: The password of the initial admin user created in InfluxDB. This password will allow you to access the InfluxDB UI to perform various administrative tasks and also use the InfluxDB CLI to create an operator token. These attributes will be stored in a secret created in Secrets Manager in your account.
                organization:
                  $ref: "#/components/schemas/Organization"
                  description: The name of the initial organization for the initial admin user in InfluxDB. An InfluxDB organization is a workspace for a group of users.
                bucket:
                  $ref: "#/components/schemas/Bucket"
                  description: The name of the initial InfluxDB bucket. All InfluxDB data is stored in a bucket. A bucket combines the concept of a database and a retention period (the duration of time that each data point persists). A bucket belongs to an organization.
                port:
                  $ref: "#/components/schemas/Port"
                  description: "The port number on which InfluxDB accepts connections. Valid Values: 1024-65535 Default: 8086 for InfluxDB v2, 8181 for InfluxDB v3 Constraints: The value can't be 2375-2376, 7788-7799, 8090, or 51678-51680"
                dbParameterGroupIdentifier:
                  $ref: "#/components/schemas/DbParameterGroupIdentifier"
                  description: The ID of the DB parameter group to assign to your DB cluster. DB parameter groups specify how the database is configured. For example, DB parameter groups can specify the limit for query concurrency.
                dbInstanceType:
                  $ref: "#/components/schemas/DbInstanceType"
                  description: The Timestream for InfluxDB DB instance type to run InfluxDB on.
                dbStorageType:
                  $ref: "#/components/schemas/DbStorageType"
                  description: "The Timestream for InfluxDB DB storage type to read and write InfluxDB data. You can choose between three different types of provisioned Influx IOPS Included storage according to your workload requirements: Influx I/O Included 3000 IOPS Influx I/O Included 12000 IOPS Influx I/O Included 16000 IOPS"
                allocatedStorage:
                  $ref: "#/components/schemas/AllocatedStorage"
                  description: The amount of storage to allocate for your DB storage type in GiB (gibibytes).
                networkType:
                  $ref: "#/components/schemas/NetworkType"
                  description: Specifies whether the network type of the Timestream for InfluxDB cluster is IPv4, which can communicate over IPv4 protocol only, or DUAL, which can communicate over both IPv4 and IPv6 protocols.
                publiclyAccessible:
                  $ref: "#/components/schemas/Boolean"
                  description: Configures the Timestream for InfluxDB cluster with a public IP to facilitate access from outside the VPC.
                vpcSubnetIds:
                  $ref: "#/components/schemas/VpcSubnetIdList"
                  description: A list of VPC subnet IDs to associate with the DB cluster. Provide at least two VPC subnet IDs in different Availability Zones when deploying with a Multi-AZ standby.
                vpcSecurityGroupIds:
                  $ref: "#/components/schemas/VpcSecurityGroupIdList"
                  description: A list of VPC security group IDs to associate with the Timestream for InfluxDB cluster.
                deploymentType:
                  $ref: "#/components/schemas/ClusterDeploymentType"
                  description: Specifies the type of cluster to create.
                failoverMode:
                  $ref: "#/components/schemas/FailoverMode"
                  description: Specifies the behavior of failure recovery when the primary node of the cluster fails.
                logDeliveryConfiguration:
                  $ref: "#/components/schemas/LogDeliveryConfiguration"
                  description: Configuration for sending InfluxDB engine logs to a specified S3 bucket.
                maintenanceSchedule:
                  $ref: "#/components/schemas/MaintenanceSchedule"
                  description: Specifies the maintenance schedule for the DB cluster, including the preferred maintenance window and timezone.
                tags:
                  $ref: "#/components/schemas/RequestTagMap"
                  description: A list of key-value pairs to associate with the DB instance.
              required:
                - name
                - dbInstanceType
                - vpcSubnetIds
                - vpcSecurityGroupIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDbClusterOutput"
  /CreateDbInstance:
    post:
      operationId: CreateDbInstance
      description: Creates a new Timestream for InfluxDB DB instance.
