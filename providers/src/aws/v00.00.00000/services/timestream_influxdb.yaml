    InfluxDBv3CoreParameters:
      description: All the customer-modifiable InfluxDB v3 Core parameters in Timestream for InfluxDB.
      type: object
      properties:
        queryFileLimit:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersQueryFileLimitInteger"
          description: "Limits the number of Parquet files a query can access. If a query attempts to read more than this limit, InfluxDB 3 returns an error. Default: 432"
        queryLogSize:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersQueryLogSizeInteger"
          description: "Defines the size of the query log. Up to this many queries remain in the log before older queries are evicted to make room for new ones. Default: 1000"
        logFilter:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersLogFilterString"
          description: Sets the filter directive for logs.
        logFormat:
          $ref: "#/components/schemas/LogFormats"
          description: "Defines the message format for logs. Default: full"
        dataFusionNumThreads:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionNumThreadsInteger"
          description: Sets the maximum number of DataFusion runtime threads to use.
        dataFusionRuntimeType:
          $ref: "#/components/schemas/DataFusionRuntimeType"
          description: "Specifies the DataFusion tokio runtime type. Default: multi-thread"
        dataFusionRuntimeDisableLifoSlot:
          $ref: "#/components/schemas/Boolean"
          description: Disables the LIFO slot of the DataFusion runtime.
        dataFusionRuntimeEventInterval:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionRuntimeEventIntervalInteger"
          description: "Sets the number of scheduler ticks after which the scheduler of the DataFusion tokio runtime polls for external events–for example: timers, I/O."
        dataFusionRuntimeGlobalQueueInterval:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionRuntimeGlobalQueueIntervalInteger"
          description: Sets the number of scheduler ticks after which the scheduler of the DataFusion runtime polls the global task queue.
        dataFusionRuntimeMaxBlockingThreads:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionRuntimeMaxBlockingThreadsInteger"
          description: Specifies the limit for additional threads spawned by the DataFusion runtime.
        dataFusionRuntimeMaxIoEventsPerTick:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionRuntimeMaxIoEventsPerTickInteger"
          description: Configures the maximum number of events processed per tick by the tokio DataFusion runtime.
        dataFusionRuntimeThreadKeepAlive:
          $ref: "#/components/schemas/Duration"
          description: Sets a custom timeout for a thread in the blocking pool of the tokio DataFusion runtime.
        dataFusionRuntimeThreadPriority:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionRuntimeThreadPriorityInteger"
          description: "Sets the thread priority for tokio DataFusion runtime workers. Default: 10"
        dataFusionMaxParquetFanout:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionMaxParquetFanoutInteger"
          description: "When multiple parquet files are required in a sorted way (deduplication for example), specifies the maximum fanout. Default: 1000"
        dataFusionUseCachedParquetLoader:
          $ref: "#/components/schemas/Boolean"
          description: Uses a cached parquet loader when reading parquet files from the object store.
        dataFusionConfig:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersDataFusionConfigString"
          description: Provides custom configuration to DataFusion as a comma-separated list of key:value pairs.
        maxHttpRequestSize:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersMaxHttpRequestSizeLong"
          description: "Specifies the maximum size of HTTP requests. Default: 10485760"
        forceSnapshotMemThreshold:
          $ref: "#/components/schemas/PercentOrAbsoluteLong"
          description: "Specifies the threshold for the internal memory buffer. Supports either a percentage (portion of available memory) or absolute value in MB–for example: 70% or 100 Default: 70%"
        walSnapshotSize:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersWalSnapshotSizeInteger"
          description: "Defines the number of WAL files to attempt to remove in a snapshot. This, multiplied by the interval, determines how often snapshots are taken. Default: 600"
        walMaxWriteBufferSize:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersWalMaxWriteBufferSizeInteger"
          description: "Specifies the maximum number of write requests that can be buffered before a flush must be executed and succeed. Default: 100000"
        snapshottedWalFilesToKeep:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersSnapshottedWalFilesToKeepInteger"
          description: "Specifies the number of snapshotted WAL files to retain in the object store. Flushing the WAL files does not clear the WAL files immediately; they are deleted when the number of snapshotted WAL files exceeds this number. Default: 300"
        preemptiveCacheAge:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the interval to prefetch into the Parquet cache during compaction. Default: 3d"
        parquetMemCachePrunePercentage:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersParquetMemCachePrunePercentageFloat"
          description: "Specifies the percentage of entries to prune during a prune operation on the in-memory Parquet cache. Default: 0.1"
        parquetMemCachePruneInterval:
          $ref: "#/components/schemas/Duration"
          description: "Sets the interval to check if the in-memory Parquet cache needs to be pruned. Default: 1s"
        disableParquetMemCache:
          $ref: "#/components/schemas/Boolean"
          description: Disables the in-memory Parquet cache. By default, the cache is enabled.
        parquetMemCacheQueryPathDuration:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the time window for caching recent Parquet files in memory. Default: 5h"
        lastCacheEvictionInterval:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the interval to evict expired entries from the Last-N-Value cache, expressed as a human-readable duration–for example: 20s, 1m, 1h. Default: 10s"
        distinctCacheEvictionInterval:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the interval to evict expired entries from the distinct value cache, expressed as a human-readable duration–for example: 20s, 1m, 1h. Default: 10s"
        gen1Duration:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the duration that Parquet files are arranged into. Data timestamps land each row into a file of this duration. Supported durations are 1m, 5m, and 10m. These files are known as “generation 1” files that the compactor in InfluxDB 3 Enterprise can merge into larger generations. Default: 10m"
        execMemPoolBytes:
          $ref: "#/components/schemas/PercentOrAbsoluteLong"
          description: "Specifies the size of memory pool used during query execution. Can be given as absolute value in bytes or as a percentage of the total available memory–for example: 8000000000 or 10%. Default: 20%"
        parquetMemCacheSize:
          $ref: "#/components/schemas/PercentOrAbsoluteLong"
          description: "Specifies the size of the in-memory Parquet cache in megabytes or percentage of total available memory. Default: 20%"
        walReplayFailOnError:
          $ref: "#/components/schemas/Boolean"
          description: "Determines whether WAL replay should fail when encountering errors. Default: false"
        walReplayConcurrencyLimit:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersWalReplayConcurrencyLimitInteger"
          description: "Concurrency limit during WAL replay. Setting this number too high can lead to OOM. The default is dynamically determined. Default: max(num_cpus, 10)"
        tableIndexCacheMaxEntries:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersTableIndexCacheMaxEntriesInteger"
          description: "Specifies the maximum number of entries in the table index cache. Default: 1000"
        tableIndexCacheConcurrencyLimit:
          $ref: "#/components/schemas/InfluxDBv3CoreParametersTableIndexCacheConcurrencyLimitInteger"
          description: "Limits the concurrency level for table index cache operations. Default: 8"
        gen1LookbackDuration:
          $ref: "#/components/schemas/Duration"
          description: "Specifies how far back to look when creating generation 1 Parquet files. Default: 24h"
        retentionCheckInterval:
          $ref: "#/components/schemas/Duration"
          description: "The interval at which retention policies are checked and enforced. Enter as a human-readable time–for example: 30m or 1h. Default: 30m"
        deleteGracePeriod:
          $ref: "#/components/schemas/Duration"
          description: "Specifies the grace period before permanently deleting data. Default: 24h"
        hardDeleteDefaultDuration:
          $ref: "#/components/schemas/Duration"
          description: "Sets the default duration for hard deletion of data. Default: 90d"
