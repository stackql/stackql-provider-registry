                  description: Update the DB cluster to use the specified port.
                dbInstanceType:
                  $ref: "#/components/schemas/DbInstanceType"
                  description: Update the DB cluster to use the specified DB instance Type.
                failoverMode:
                  $ref: "#/components/schemas/FailoverMode"
                  description: Update the DB cluster's failover behavior.
                maintenanceSchedule:
                  $ref: "#/components/schemas/MaintenanceSchedule"
                  description: Specifies the maintenance schedule for the DB cluster, including the preferred maintenance window and timezone.
              required:
                - dbClusterId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDbClusterOutput"
  /UpdateDbInstance:
    post:
      operationId: UpdateDbInstance
      description: Updates a Timestream for InfluxDB DB instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonTimestreamInfluxDB.UpdateDbInstance
            default: AmazonTimestreamInfluxDB.UpdateDbInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                identifier:
                  $ref: "#/components/schemas/DbInstanceIdentifier"
                  description: The id of the DB instance.
                logDeliveryConfiguration:
                  $ref: "#/components/schemas/LogDeliveryConfiguration"
                  description: Configuration for sending InfluxDB engine logs to send to specified S3 bucket.
                dbParameterGroupIdentifier:
                  $ref: "#/components/schemas/DbParameterGroupIdentifier"
                  description: The id of the DB parameter group to assign to your DB instance. DB parameter groups specify how the database is configured. For example, DB parameter groups can specify the limit for query concurrency.
                port:
                  $ref: "#/components/schemas/Port"
                  description: "The port number on which InfluxDB accepts connections. If you change the Port value, your database restarts immediately. Valid Values: 1024-65535 Default: 8086 Constraints: The value can't be 2375-2376, 7788-7799, 8090, or 51678-51680"
                dbInstanceType:
                  $ref: "#/components/schemas/DbInstanceType"
                  description: The Timestream for InfluxDB DB instance type to run InfluxDB on.
                deploymentType:
                  $ref: "#/components/schemas/DeploymentType"
                  description: Specifies whether the DB instance will be deployed as a standalone instance or with a Multi-AZ standby for high availability.
                dbStorageType:
                  $ref: "#/components/schemas/DbStorageType"
                  description: The Timestream for InfluxDB DB storage type that InfluxDB stores data on.
                allocatedStorage:
                  $ref: "#/components/schemas/AllocatedStorage"
                  description: The amount of storage to allocate for your DB storage type (in gibibytes).
                maintenanceSchedule:
                  $ref: "#/components/schemas/MaintenanceSchedule"
                  description: Specifies the maintenance schedule for the DB instance, including the preferred maintenance window and timezone.
              required:
                - identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDbInstanceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    DbClusterName:
      type: string
      minLength: 3
      maxLength: 40
      pattern: "[a-zA-z][a-zA-Z0-9]*(-[a-zA-Z0-9]+)*"
    Username:
      type: string
      minLength: 1
      maxLength: 64
    Password:
      type: string
      minLength: 8
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    Organization:
      type: string
      minLength: 1
      maxLength: 64
    Bucket:
      type: string
      minLength: 2
      maxLength: 64
      pattern: '[^_"][^"]*'
    Port:
      type: integer
      minimum: 1024
      maximum: 65535
    DbParameterGroupIdentifier:
      type: string
      minLength: 3
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    DbInstanceType:
      type: string
      enum:
        - db.influx.medium
        - db.influx.large
        - db.influx.xlarge
        - db.influx.2xlarge
        - db.influx.4xlarge
        - db.influx.8xlarge
        - db.influx.12xlarge
        - db.influx.16xlarge
        - db.influx.24xlarge
    DbStorageType:
      type: string
      enum:
        - InfluxIOIncludedT1
        - InfluxIOIncludedT2
        - InfluxIOIncludedT3
    AllocatedStorage:
      type: integer
      minimum: 20
      maximum: 15360
    NetworkType:
      type: string
      enum:
        - IPV4
        - DUAL
    Boolean:
      type: boolean
    VpcSubnetIdList:
      type: array
      items:
        $ref: "#/components/schemas/VpcSubnetId"
    VpcSubnetId:
      type: string
      minLength: 0
      maxLength: 64
      pattern: subnet-[a-z0-9]+
    VpcSecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/VpcSecurityGroupId"
    VpcSecurityGroupId:
      type: string
      minLength: 0
      maxLength: 64
      pattern: sg-[a-z0-9]+
    ClusterDeploymentType:
      type: string
      enum:
        - MULTI_NODE_READ_REPLICAS
    FailoverMode:
      type: string
      enum:
        - AUTOMATIC
        - NO_FAILOVER
    LogDeliveryConfiguration:
      description: Configuration for sending InfluxDB engine logs to send to specified S3 bucket.
      type: object
      properties:
        s3Configuration:
          $ref: "#/components/schemas/S3Configuration"
          description: Configuration for S3 bucket log delivery.
      required:
        - s3Configuration
    S3Configuration:
      description: Configuration for S3 bucket log delivery.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3ConfigurationBucketNameString"
          description: The name of the S3 bucket to deliver logs to.
        enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether log delivery to the S3 bucket is enabled.
      required:
        - bucketName
        - enabled
    S3ConfigurationBucketNameString:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[0-9a-z]+[0-9a-z\\.\\-]*[0-9a-z]+"
    MaintenanceSchedule:
      description: Specifies the maintenance schedule for a DB instance or cluster, defining when maintenance operations such as patching can be performed.
      type: object
      properties:
        timezone:
          $ref: "#/components/schemas/IanaTimezone"
          description: "The IANA timezone identifier for the maintenance window. Format: Region/City or UTC. For example, America/New_York or UTC."
        preferredMaintenanceWindow:
          $ref: "#/components/schemas/MaintenanceWindow"
          description: "The preferred maintenance window in the format ddd:HH:MM-ddd:HH:MM (UTC). Day must be one of: Mon, Tue, Wed, Thu, Fri, Sat, Sun. For example, Sun:02:00-Sun:06:00. Provide an empty string to let the system choose a window."
      required:
        - timezone
        - preferredMaintenanceWindow
    IanaTimezone:
      description: "IANA timezone identifier. Format: Region/City or UTC See: https://www.iana.org/time-zones"
      type: string
      minLength: 1
      maxLength: 64
      pattern: (UTC|[A-Za-z_]+/[A-Za-z0-9_]+(/[A-Za-z0-9_]+)?)
    MaintenanceWindow:
      description: 'Preferred maintenance window in format "ddd:HH:MM-ddd:HH:MM" Format requirements: Day: Mon, Tue, Wed, Thu, Fri, Sat, Sun Hour: 00-23 (24-hour format, 2 digits) Minute: 00-59 (2 digits) Provide empty string to let the system choose a window. Examples: "Sun:02:00-Sun:06:00" (4-hour window Sunday morning) "Sat:23:00-Sun:03:00" (cross-midnight window) "" or (system chooses)'
      type: string
      minLength: 0
      maxLength: 19
      pattern: $|^(Mon|Tue|Wed|Thu|Fri|Sat|Sun):([01]\d|2[0-3]):[0-5]\d-(Mon|Tue|Wed|Thu|Fri|Sat|Sun):([01]\d|2[0-3]):[0-5]\d
    RequestTagMap:
      type: object
      properties: {}
    CreateDbClusterOutput:
      type: object
      properties:
        dbClusterId:
          $ref: "#/components/schemas/DbClusterId"
          description: A service-generated unique identifier.
        dbClusterStatus:
          $ref: "#/components/schemas/ClusterStatus"
          description: The status of the DB cluster.
    DbClusterId:
      type: string
      minLength: 3
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    ClusterStatus:
      type: string
      enum:
        - CREATING
        - UPDATING
        - DELETING
        - AVAILABLE
        - FAILED
        - DELETED
        - MAINTENANCE
        - UPDATING_INSTANCE_TYPE
        - REBOOTING
        - REBOOT_FAILED
        - PARTIALLY_AVAILABLE
    DbInstanceName:
      type: string
      minLength: 3
      maxLength: 40
      pattern: "[a-zA-Z][a-zA-Z0-9]*(-[a-zA-Z0-9]+)*"
    DeploymentType:
      type: string
      enum:
        - SINGLE_AZ
        - WITH_MULTIAZ_STANDBY
    CreateDbInstanceOutput:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/DbInstanceId"
          description: A service-generated unique identifier.
        name:
          $ref: "#/components/schemas/DbInstanceName"
          description: The customer-supplied name that uniquely identifies the DB instance when interacting with the Amazon Timestream for InfluxDB API and CLI commands.
        arn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the DB instance.
        status:
          $ref: "#/components/schemas/Status"
          description: The status of the DB instance.
        endpoint:
          $ref: "#/components/schemas/String"
          description: The endpoint used to connect to InfluxDB. The default InfluxDB port is 8086.
        port:
          $ref: "#/components/schemas/Port"
          description: The port number on which InfluxDB accepts connections. The default value is 8086.
        networkType:
          $ref: "#/components/schemas/NetworkType"
          description: Specifies whether the networkType of the Timestream for InfluxDB instance is IPV4, which can communicate over IPv4 protocol only, or DUAL, which can communicate over both IPv4 and IPv6 protocols.
        dbInstanceType:
          $ref: "#/components/schemas/DbInstanceType"
          description: The Timestream for InfluxDB instance type that InfluxDB runs on.
        dbStorageType:
          $ref: "#/components/schemas/DbStorageType"
          description: The Timestream for InfluxDB DB storage type that InfluxDB stores data on.
        allocatedStorage:
          $ref: "#/components/schemas/AllocatedStorage"
          description: The amount of storage allocated for your DB storage type (in gibibytes).
        deploymentType:
          $ref: "#/components/schemas/DeploymentType"
          description: Specifies whether the Timestream for InfluxDB is deployed as Single-AZ or with a MultiAZ Standby for High availability.
        vpcSubnetIds:
          $ref: "#/components/schemas/VpcSubnetIdList"
          description: A list of VPC subnet IDs associated with the DB instance.
        publiclyAccessible:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the DB instance has a public IP to facilitate access.
        vpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security group IDs associated with the DB instance.
        dbParameterGroupIdentifier:
          $ref: "#/components/schemas/DbParameterGroupIdentifier"
          description: The id of the DB parameter group assigned to your DB instance.
        availabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone in which the DB instance resides.
        secondaryAvailabilityZone:
          $ref: "#/components/schemas/String"
          description: The Availability Zone in which the standby instance is located when deploying with a MultiAZ standby instance.
        logDeliveryConfiguration:
          $ref: "#/components/schemas/LogDeliveryConfiguration"
          description: Configuration for sending InfluxDB engine logs to send to specified S3 bucket.
        influxAuthParametersSecretArn:
          $ref: "#/components/schemas/String"
          description: "The Amazon Resource Name (ARN) of the Secrets Manager secret containing the initial InfluxDB authorization parameters. The secret value is a JSON formatted key-value pair holding InfluxDB authorization values: organization, bucket, username, and password."
        dbClusterId:
          $ref: "#/components/schemas/DbClusterId"
          description: Specifies the DbCluster to which this DbInstance belongs to.
        instanceMode:
          $ref: "#/components/schemas/InstanceMode"
          description: Specifies the DbInstance's role in the cluster.
        instanceModes:
          $ref: "#/components/schemas/InstanceModeList"
          description: Specifies the DbInstance's roles in the cluster.
        maintenanceSchedule:
          $ref: "#/components/schemas/MaintenanceSchedule"
          description: The maintenance schedule for the DB instance.
        lastMaintenanceTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of the last completed maintenance operation on the DB instance.
        nextMaintenanceTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of the next scheduled maintenance operation on the DB instance.
      required:
        - id
        - name
        - arn
        - vpcSubnetIds
    DbInstanceId:
      type: string
      minLength: 3
      maxLength: 64
      pattern: "[a-zA-Z0-9]+"
    Arn:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:aws[a-z\-]*:timestream\-influxdb:[a-z0-9\-]+:[0-9]{12}:(db\-instance|db\-cluster|db\-parameter\-group)/[a-zA-Z0-9]{3,64}
    Status:
      type: string
      enum:
        - CREATING
        - AVAILABLE
        - DELETING
        - MODIFYING
        - UPDATING
        - DELETED
        - FAILED
        - UPDATING_DEPLOYMENT_TYPE
        - UPDATING_INSTANCE_TYPE
        - MAINTENANCE
        - REBOOTING
        - REBOOT_FAILED
    String:
      type: string
    InstanceMode:
      type: string
      enum:
        - PRIMARY
        - STANDBY
        - REPLICA
        - INGEST
        - QUERY
        - COMPACT
        - PROCESS
    InstanceModeList:
      type: array
      items:
        $ref: "#/components/schemas/InstanceMode"
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    DbParameterGroupName:
      type: string
      minLength: 3
      maxLength: 64
      pattern: "[a-zA-Z][a-zA-Z0-9]*(-[a-zA-Z0-9]+)*"
    CreateDbParameterGroupInputDescriptionString:
      type: string
      minLength: 0
      maxLength: 500
    Parameters:
      description: The parameters that comprise the parameter group.
      type: object
      properties:
        InfluxDBv2:
          $ref: "#/components/schemas/InfluxDBv2Parameters"
          description: All the customer-modifiable InfluxDB v2 parameters in Timestream for InfluxDB.
        InfluxDBv3Core:
          $ref: "#/components/schemas/InfluxDBv3CoreParameters"
          description: All the customer-modifiable InfluxDB v3 Core parameters in Timestream for InfluxDB.
        InfluxDBv3Enterprise:
          $ref: "#/components/schemas/InfluxDBv3EnterpriseParameters"
          description: All the customer-modifiable InfluxDB v3 Enterprise parameters in Timestream for InfluxDB.
    InfluxDBv2Parameters:
      description: All the customer-modifiable InfluxDB v2 parameters in Timestream for InfluxDB.
      type: object
      properties:
        fluxLogEnabled:
          $ref: "#/components/schemas/Boolean"
          description: "Include option to show detailed logs for Flux queries. Default: false"
        logLevel:
          $ref: "#/components/schemas/LogLevel"
          description: "Log output level. InfluxDB outputs log entries with severity levels greater than or equal to the level specified. Default: info"
        noTasks:
          $ref: "#/components/schemas/Boolean"
          description: "Disable the task scheduler. If problematic tasks prevent InfluxDB from starting, use this option to start InfluxDB without scheduling or executing tasks. Default: false"
        queryConcurrency:
          $ref: "#/components/schemas/InfluxDBv2ParametersQueryConcurrencyInteger"
          description: "Number of queries allowed to execute concurrently. Setting to 0 allows an unlimited number of concurrent queries. Default: 0"
        queryQueueSize:
          $ref: "#/components/schemas/InfluxDBv2ParametersQueryQueueSizeInteger"
          description: "Maximum number of queries allowed in execution queue. When queue limit is reached, new queries are rejected. Setting to 0 allows an unlimited number of queries in the queue. Default: 0"
        tracingType:
          $ref: "#/components/schemas/TracingType"
          description: Enable tracing in InfluxDB and specifies the tracing type. Tracing is disabled by default.
        metricsDisabled:
          $ref: "#/components/schemas/Boolean"
          description: "Disable the HTTP /metrics endpoint which exposes internal InfluxDB metrics. Default: false"
        httpIdleTimeout:
          $ref: "#/components/schemas/Duration"
          description: "Maximum duration the server should keep established connections alive while waiting for new requests. Set to 0 for no timeout. Default: 3 minutes"
        httpReadHeaderTimeout:
          $ref: "#/components/schemas/Duration"
          description: "Maximum duration the server should try to read HTTP headers for new requests. Set to 0 for no timeout. Default: 10 seconds"
        httpReadTimeout:
          $ref: "#/components/schemas/Duration"
          description: "Maximum duration the server should try to read the entirety of new requests. Set to 0 for no timeout. Default: 0"
        httpWriteTimeout:
          $ref: "#/components/schemas/Duration"
          description: "Maximum duration the server should spend processing and responding to write requests. Set to 0 for no timeout. Default: 0"
        influxqlMaxSelectBuckets:
          $ref: "#/components/schemas/InfluxDBv2ParametersInfluxqlMaxSelectBucketsLong"
          description: "Maximum number of group by time buckets a SELECT statement can create. 0 allows an unlimited number of buckets. Default: 0"
        influxqlMaxSelectPoint:
          $ref: "#/components/schemas/InfluxDBv2ParametersInfluxqlMaxSelectPointLong"
          description: "Maximum number of points a SELECT statement can process. 0 allows an unlimited number of points. InfluxDB checks the point count every second (so queries exceeding the maximum aren’t immediately aborted). Default: 0"
        influxqlMaxSelectSeries:
          $ref: "#/components/schemas/InfluxDBv2ParametersInfluxqlMaxSelectSeriesLong"
          description: "Maximum number of series a SELECT statement can return. 0 allows an unlimited number of series. Default: 0"
        pprofDisabled:
          $ref: "#/components/schemas/Boolean"
          description: "Disable the /debug/pprof HTTP endpoint. This endpoint provides runtime profiling data and can be helpful when debugging. Default: true"
        queryInitialMemoryBytes:
          $ref: "#/components/schemas/InfluxDBv2ParametersQueryInitialMemoryBytesLong"
          description: "Initial bytes of memory allocated for a query. Default: 0"
        queryMaxMemoryBytes:
          $ref: "#/components/schemas/InfluxDBv2ParametersQueryMaxMemoryBytesLong"
          description: "Maximum number of queries allowed in execution queue. When queue limit is reached, new queries are rejected. Setting to 0 allows an unlimited number of queries in the queue. Default: 0"
        queryMemoryBytes:
          $ref: "#/components/schemas/InfluxDBv2ParametersQueryMemoryBytesLong"
          description: "Maximum bytes of memory allowed for a single query. Must be greater or equal to queryInitialMemoryBytes. Default: 0"
        sessionLength:
          $ref: "#/components/schemas/InfluxDBv2ParametersSessionLengthInteger"
          description: "Specifies the Time to Live (TTL) in minutes for newly created user sessions. Default: 60"
        sessionRenewDisabled:
          $ref: "#/components/schemas/Boolean"
          description: "Disables automatically extending a user’s session TTL on each request. By default, every request sets the session’s expiration time to five minutes from now. When disabled, sessions expire after the specified session length and the user is redirected to the login page, even if recently active. Default: false"
        storageCacheMaxMemorySize:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageCacheMaxMemorySizeLong"
          description: "Maximum size (in bytes) a shard’s cache can reach before it starts rejecting writes. Must be greater than storageCacheSnapShotMemorySize and lower than instance’s total memory capacity. We recommend setting it to below 15% of the total memory capacity. Default: 1073741824"
        storageCacheSnapshotMemorySize:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageCacheSnapshotMemorySizeLong"
          description: "Size (in bytes) at which the storage engine will snapshot the cache and write it to a TSM file to make more memory available. Must not be greater than storageCacheMaxMemorySize. Default: 26214400"
        storageCacheSnapshotWriteColdDuration:
          $ref: "#/components/schemas/Duration"
          description: "Duration at which the storage engine will snapshot the cache and write it to a new TSM file if the shard hasn’t received writes or deletes. Default: 10 minutes"
        storageCompactFullWriteColdDuration:
          $ref: "#/components/schemas/Duration"
          description: "Duration at which the storage engine will compact all TSM files in a shard if it hasn't received writes or deletes. Default: 4 hours"
        storageCompactThroughputBurst:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageCompactThroughputBurstLong"
          description: "Rate limit (in bytes per second) that TSM compactions can write to disk. Default: 50331648"
        storageMaxConcurrentCompactions:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageMaxConcurrentCompactionsInteger"
          description: "Maximum number of full and level compactions that can run concurrently. A value of 0 results in 50% of runtime.GOMAXPROCS(0) used at runtime. Any number greater than zero limits compactions to that value. This setting does not apply to cache snapshotting. Default: 0"
        storageMaxIndexLogFileSize:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageMaxIndexLogFileSizeLong"
          description: "Size (in bytes) at which an index write-ahead log (WAL) file will compact into an index file. Lower sizes will cause log files to be compacted more quickly and result in lower heap usage at the expense of write throughput. Default: 1048576"
        storageNoValidateFieldSize:
          $ref: "#/components/schemas/Boolean"
          description: "Skip field size validation on incoming write requests. Default: false"
        storageRetentionCheckInterval:
          $ref: "#/components/schemas/Duration"
          description: "Interval of retention policy enforcement checks. Must be greater than 0. Default: 30 minutes"
        storageSeriesFileMaxConcurrentSnapshotCompactions:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageSeriesFileMaxConcurrentSnapshotCompactionsInteger"
          description: "Maximum number of snapshot compactions that can run concurrently across all series partitions in a database. Default: 0"
        storageSeriesIdSetCacheSize:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageSeriesIdSetCacheSizeLong"
          description: "Size of the internal cache used in the TSI index to store previously calculated series results. Cached results are returned quickly rather than needing to be recalculated when a subsequent query with the same tag key/value predicate is executed. Setting this value to 0 will disable the cache and may decrease query performance. Default: 100"
        storageWalMaxConcurrentWrites:
          $ref: "#/components/schemas/InfluxDBv2ParametersStorageWalMaxConcurrentWritesInteger"
          description: "Maximum number writes to the WAL directory to attempt at the same time. Setting this value to 0 results in number of processing units available x2. Default: 0"
        storageWalMaxWriteDelay:
          $ref: "#/components/schemas/Duration"
          description: "Maximum amount of time a write request to the WAL directory will wait when the maximum number of concurrent active writes to the WAL directory has been met. Set to 0 to disable the timeout. Default: 10 minutes"
        uiDisabled:
          $ref: "#/components/schemas/Boolean"
          description: "Disable the InfluxDB user interface (UI). The UI is enabled by default. Default: false"
    LogLevel:
      type: string
      enum:
        - debug
        - info
        - error
    InfluxDBv2ParametersQueryConcurrencyInteger:
      type: integer
      minimum: 0
      maximum: 256
    InfluxDBv2ParametersQueryQueueSizeInteger:
      type: integer
      minimum: 0
      maximum: 256
    TracingType:
      type: string
      enum:
        - log
        - jaeger
        - disabled
    Duration:
      description: Duration for InfluxDB parameters in Timestream for InfluxDB.
      type: object
      properties:
        durationType:
          $ref: "#/components/schemas/DurationType"
          description: The type of duration for InfluxDB parameters.
        value:
          $ref: "#/components/schemas/DurationValueLong"
          description: The value of duration for InfluxDB parameters.
      required:
        - durationType
        - value
    DurationType:
      type: string
      enum:
        - hours
        - minutes
        - seconds
        - milliseconds
        - days
    DurationValueLong:
      type: integer
      format: int64
      minimum: 0
    InfluxDBv2ParametersInfluxqlMaxSelectBucketsLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersInfluxqlMaxSelectPointLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersInfluxqlMaxSelectSeriesLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersQueryInitialMemoryBytesLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersQueryMaxMemoryBytesLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersQueryMemoryBytesLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersSessionLengthInteger:
      type: integer
      minimum: 1
      maximum: 2880
    InfluxDBv2ParametersStorageCacheMaxMemorySizeLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersStorageCacheSnapshotMemorySizeLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersStorageCompactThroughputBurstLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
    InfluxDBv2ParametersStorageMaxConcurrentCompactionsInteger:
      type: integer
      minimum: 0
      maximum: 64
    InfluxDBv2ParametersStorageMaxIndexLogFileSizeLong:
      type: integer
      format: int64
      minimum: 0
      maximum: 1000000000000
