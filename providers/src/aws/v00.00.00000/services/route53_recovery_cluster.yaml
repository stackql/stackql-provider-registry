              algorithm: naive
        update_routing_control_state:
          operation:
            $ref: "#/paths/~1UpdateRoutingControlState/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        update_routing_control_states:
          operation:
            $ref: "#/paths/~1UpdateRoutingControlStates/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.0
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/routing_control_states/methods/get_routing_control_state"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/routing_control_states/methods/update_routing_control_state"
