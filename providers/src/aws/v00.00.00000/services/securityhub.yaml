        - ErrorCode
    UnprocessedErrorCode:
      type: string
      enum:
        - INVALID_INPUT
        - ACCESS_DENIED
        - NOT_FOUND
        - RESOURCE_NOT_FOUND
        - LIMIT_EXCEEDED
    StandardsControlAssociationIds:
