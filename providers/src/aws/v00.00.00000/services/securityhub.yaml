        TaskData:
          $ref: "#/components/schemas/NonEmptyString"
          description: Supplemental information that the task requires to migrate the data for certain source and target endpoints.
    AwsDmsReplicationInstanceDetails:
      description: Provides details about an Database Migration Service (DMS) replication instance. DMS uses a replication instance to connect to your source data store, read the source data, and format the data for consumption by the target data store.
      type: object
      properties:
        AllocatedStorage:
          $ref: "#/components/schemas/Integer"
          description: The amount of storage (in gigabytes) that is allocated for the replication instance.
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether minor engine upgrades are applied automatically to the replication instance during the maintenance window.
        AvailabilityZone:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Availability Zone that the replication instance is created in. The default value is a random, system-chosen Availability Zone in the endpoint's Amazon Web Services Region, such as us-east-1d.
        EngineVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The engine version number of the replication instance. If an engine version number is not specified when a replication instance is created, the default is the latest engine version available.
        KmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: An KMS key identifier that is used to encrypt the data on the replication instance. If you don't specify a value for the KmsKeyId parameter, DMS uses your default encryption key. KMS creates the default encryption key for your Amazon Web Services account. Your Amazon Web Services account has a different default encryption key for each Amazon Web Services Region.
        MultiAZ:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether the replication instance is deployed across multiple Availability Zones (AZs). You can't set the AvailabilityZone parameter if the MultiAZ parameter is set to true.
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/NonEmptyString"
          description: The maintenance window times for the replication instance. Upgrades to the replication instance are performed during this time.
        PubliclyAccessible:
          $ref: "#/components/schemas/Boolean"
          description: Specifies the accessibility options for the replication instance. A value of true represents an instance with a public IP address. A value of false represents an instance with a private IP address. The default value is true.
        ReplicationInstanceClass:
          $ref: "#/components/schemas/NonEmptyString"
          description: The compute and memory capacity of the replication instance as defined for the specified replication instance class.
        ReplicationInstanceIdentifier:
          $ref: "#/components/schemas/NonEmptyString"
          description: The replication instance identifier.
        ReplicationSubnetGroup:
          $ref: "#/components/schemas/AwsDmsReplicationInstanceReplicationSubnetGroupDetails"
          description: The subnet group for the replication instance.
        VpcSecurityGroups:
          $ref: "#/components/schemas/AwsDmsReplicationInstanceVpcSecurityGroupsList"
          description: The virtual private cloud (VPC) security group for the replication instance.
    AwsDmsReplicationInstanceReplicationSubnetGroupDetails:
