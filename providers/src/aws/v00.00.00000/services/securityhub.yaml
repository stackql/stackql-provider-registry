        ResourceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of a resource type. The only supported resource type is Amazon EC2 instances with Windows VSS. The only valid value is EC2.
    AwsBackupBackupPlanRuleList:
      type: array
      items:
        $ref: "#/components/schemas/AwsBackupBackupPlanRuleDetails"
