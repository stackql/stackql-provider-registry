          description: The name of the security group.
        PeeringStatus:
          $ref: "#/components/schemas/NonEmptyString"
          description: The status of a VPC peering connection, if applicable.
        UserId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of an Amazon Web Services account. For a referenced security group in another VPC, the account ID of the referenced security group is returned in the response. If the referenced security group is deleted, this value is not returned. [EC2-Classic] Required when adding or removing rules that reference a security group in another VPC.
        VpcId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the VPC for the referenced security group, if applicable.
        VpcPeeringConnectionId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the VPC peering connection, if applicable.
