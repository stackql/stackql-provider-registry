      description: Defines the data boundary for a findings query. Scopes determine which organizational units or organizations to retrieve data from.
      type: object
      properties:
        AwsOrganizations:
          $ref: "#/components/schemas/AwsOrganizationScopeList"
          description: A list of Organizations scopes to include in the query results. Each entry in the list specifies an organization or organizational unit to include for the delegated administrator's account. If the list specifies multiple entries, the entries are combined using OR logic.
    AwsOrganizationScopeList:
      description: A list of Organizations scopes. You can specify up to 10 entries.
      type: array
      items:
        $ref: "#/components/schemas/AwsOrganizationScope"
    AwsOrganizationScope:
      description: "Specifies an Organizations scope. Data from the specified organization or organizational unit is included in the response. To scope to a specific organizational unit, provide OrganizationalUnitId. You can optionally include OrganizationId. If you omit OrganizationId, Security Hub uses the caller's organization ID. To scope to the delegated administrator's entire organization, provide only OrganizationId. The organization ID and organizational unit must belong to the delegated administrator's own organization. Each request must use one scoping approach: either scope to the entire organization by providing an AwsOrganizationScope entry with only OrganizationId, or scope to specific organizational units by providing AwsOrganizationScope entries with OrganizationalUnitId. You can't combine both approaches in the same request."
      type: object
      properties:
        OrganizationId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier (ID) of the organization (for example, o-abcd1234567890). The organization must be the delegated administrator's own organization. If you omit this value and provide OrganizationalUnitId, Security Hub uses the caller's organization ID.
        OrganizationalUnitId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier (ID) of the organizational unit (OU) (for example, ou-ab12-cd345678). The OU must exist within the delegated administrator's own organization. When specified, the results include only data from accounts in this OU.
