        SnapshotCreateTime:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the snapshot was taken. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        Engine:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the database engine that you want to use for this DB instance.
        AllocatedStorage:
          $ref: "#/components/schemas/Integer"
