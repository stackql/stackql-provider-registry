          description: The source of the certificate identified by Certificate. Note that in CloudFront, this attribute is deprecated.
        CloudFrontDefaultCertificate:
          $ref: "#/components/schemas/Boolean"
          description: Whether the distribution uses the CloudFront domain name. If set to false, then you provide either AcmCertificateArn or IamCertificateId.
        IamCertificateId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the IAM certificate. Used if the certificate is stored in IAM. If you provide IamCertificateId, then you also must provide MinimumProtocolVersion and SslSupportMethod.
        MinimumProtocolVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The security policy that CloudFront uses for HTTPS connections with viewers. If SslSupportMethod is sni-only, then MinimumProtocolVersion must be TLSv1 or higher.
        SslSupportMethod:
          $ref: "#/components/schemas/NonEmptyString"
          description: The viewers that the distribution accepts HTTPS connections from.
