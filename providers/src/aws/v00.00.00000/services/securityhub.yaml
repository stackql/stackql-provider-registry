    AwsSageMakerNotebookInstanceDetails:
      description: Provides details about an Amazon SageMaker AI notebook instance.
      type: object
      properties:
        AcceleratorTypes:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: A list of Amazon Elastic Inference instance types to associate with the notebook instance. Currently, only one instance type can be associated with a notebook instance.
        AdditionalCodeRepositories:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: An array of up to three Git repositories associated with the notebook instance. These can be either the names of Git repositories stored as resources in your account, or the URL of Git repositories in CodeCommit or in any other Git repository. These repositories are cloned at the same level as the default repository of your notebook instance. For more information, see Associating Git repositories with SageMaker AI notebook instances in the Amazon SageMaker AI Developer Guide.
        DefaultCodeRepository:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Git repository associated with the notebook instance as its default code repository. This can be either the name of a Git repository stored as a resource in your account, or the URL of a Git repository in CodeCommit or in any other Git repository. When you open a notebook instance, it opens in the directory that contains this repository. For more information, see Associating Git repositories with SageMaker AI notebook instances in the Amazon SageMaker AI Developer Guide.
        DirectInternetAccess:
          $ref: "#/components/schemas/NonEmptyString"
          description: Sets whether SageMaker AI provides internet access to the notebook instance. If you set this to Disabled, this notebook instance is able to access resources only in your VPC, and is not be able to connect to SageMaker AI training and endpoint services unless you configure a Network Address Translation (NAT) Gateway in your VPC.
        FailureReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: If status of the instance is Failed, the reason it failed.
        InstanceMetadataServiceConfiguration:
          $ref: "#/components/schemas/AwsSageMakerNotebookInstanceMetadataServiceConfigurationDetails"
          description: Information on the IMDS configuration of the notebook instance.
        InstanceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of machine learning (ML) compute instance to launch for the notebook instance.
        KmsKeyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of an Key Management Service (KMS) key that SageMaker AI uses to encrypt data on the storage volume attached to your notebook instance. The KMS key you provide must be enabled. For information, see Enabling and disabling keys in the Key Management Service Developer Guide.
        NetworkInterfaceId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The network interface ID that SageMaker AI created when the instance was created.
        NotebookInstanceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the notebook instance.
        NotebookInstanceLifecycleConfigName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of a notebook instance lifecycle configuration.
        NotebookInstanceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the new notebook instance.
        NotebookInstanceStatus:
          $ref: "#/components/schemas/NonEmptyString"
          description: The status of the notebook instance.
        PlatformIdentifier:
          $ref: "#/components/schemas/NonEmptyString"
          description: The platform identifier of the notebook instance runtime environment.
        RoleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the IAM role associated with the instance.
        RootAccess:
          $ref: "#/components/schemas/NonEmptyString"
          description: Whether root access is enabled or disabled for users of the notebook instance.
        SecurityGroups:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The VPC security group IDs.
        SubnetId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the VPC subnet to which you have a connectivity from your ML compute instance.
        Url:
          $ref: "#/components/schemas/NonEmptyString"
          description: The URL that you use to connect to the Jupyter notebook that is running in your notebook instance.
        VolumeSizeInGB:
          $ref: "#/components/schemas/Integer"
          description: The size, in GB, of the ML storage volume to attach to the notebook instance.
    AwsSageMakerNotebookInstanceMetadataServiceConfigurationDetails:
