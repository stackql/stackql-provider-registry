          $ref: "#/components/schemas/NonEmptyString"
          description: The percentile statistic for the metric associated with the alarm.
        InsufficientDataActions:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The actions to execute when this alarm transitions to the INSUFFICIENT_DATA state from any other state. Each action is specified as an ARN.
        MetricName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the metric associated with the alarm. This is required for an alarm based on a metric. For an alarm based on a math expression, you use Metrics instead and you can't specify MetricName.
        Namespace:
          $ref: "#/components/schemas/NonEmptyString"
          description: The namespace of the metric associated with the alarm. This is required for an alarm based on a metric. For an alarm based on a math expression, you can't specify Namespace and you use Metrics instead.
        OkActions:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The actions to execute when this alarm transitions to the OK state from any other state. Each action is specified as an ARN.
        Period:
          $ref: "#/components/schemas/Integer"
          description: The period, in seconds, over which the statistic is applied. This is required for an alarm based on a metric.
        Statistic:
          $ref: "#/components/schemas/NonEmptyString"
          description: The statistic for the metric associated with the alarm, other than percentile. For percentile statistics, use ExtendedStatistic. For an alarm based on a metric, you must specify either Statistic or ExtendedStatistic but not both. For an alarm based on a math expression, you can't specify Statistic. Instead, you use Metrics.
        Threshold:
          $ref: "#/components/schemas/Double"
          description: The value to compare with the specified statistic.
        ThresholdMetricId:
          $ref: "#/components/schemas/NonEmptyString"
          description: n an alarm based on an anomaly detection model, this is the ID of the ANOMALY_DETECTION_BAND function used as the threshold for the alarm.
        TreatMissingData:
          $ref: "#/components/schemas/NonEmptyString"
          description: Sets how this alarm is to handle missing data points.
        Unit:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unit of the metric associated with the alarm.
