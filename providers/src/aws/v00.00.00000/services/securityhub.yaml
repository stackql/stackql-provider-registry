openapi: 3.0.0
info:
  version: "2018-10-26"
  title: AWS SecurityHub
  description: AWS SecurityHub
  x-serviceName: securityhub
  x-serviceAlias: securityhub
  x-protocol: rest-json
  x-apiVersion: "2018-10-26"
  x-endpointPrefix: securityhub
  x-jsonVersion: "1.1"
servers:
  - url: https://securityhub.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for securityhub
paths:
  /administrator:
    post:
      operationId: AcceptAdministratorInvitation
      description: We recommend using Organizations instead of Security Hub CSPM invitations to manage your member accounts. For information, see Managing Security Hub CSPM administrator and member accounts with Organizations in the Security Hub CSPM User Guide. Accepts the invitation to be a member account and be monitored by the Security Hub CSPM administrator account that the invitation was sent from. This operation is only used by member accounts that are not added through Organizations. When the member account accepts the invitation, permission is granted to the administrator account to view findings generated in the member account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AdministratorId:
                  $ref: "#/components/schemas/NonEmptyString"
                InvitationId:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - AdministratorId
                - InvitationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAdministratorInvitationResponse"
    get:
      operationId: GetAdministratorAccount
      description: Provides the details for the Security Hub CSPM administrator account for the current member account. Can be used by both member accounts that are managed using Organizations and accounts that were invited manually.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAdministratorAccountResponse"
  /master:
    post:
      operationId: AcceptInvitation
      description: This method is deprecated. Instead, use AcceptAdministratorInvitation. The Security Hub CSPM console continues to use AcceptInvitation. It will eventually change to use AcceptAdministratorInvitation. Any IAM policies that specifically control access to this function must continue to use AcceptInvitation. You should also add AcceptAdministratorInvitation to your policies to ensure that the correct permissions are in place after the console begins to use AcceptAdministratorInvitation. Accepts the invitation to be a member account and be monitored by the Security Hub CSPM administrator account that the invitation was sent from. This operation is only used by member accounts that are not added through Organizations. When the member account accepts the invitation, permission is granted to the administrator account to view findings generated in the member account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MasterId:
                  $ref: "#/components/schemas/NonEmptyString"
                InvitationId:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - MasterId
                - InvitationId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResponse"
    get:
      operationId: GetMasterAccount
      description: This method is deprecated. Instead, use GetAdministratorAccount. The Security Hub CSPM console continues to use GetMasterAccount. It will eventually change to use GetAdministratorAccount. Any IAM policies that specifically control access to this function must continue to use GetMasterAccount. You should also add GetAdministratorAccount to your policies to ensure that the correct permissions are in place after the console begins to use GetAdministratorAccount. Provides the details for the Security Hub CSPM administrator account for the current member account. Can be used by both member accounts that are managed using Organizations and accounts that were invited manually.
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMasterAccountResponse"
  /automationrules/delete:
    post:
      operationId: BatchDeleteAutomationRules
      description: Deletes one or more automation rules.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AutomationRulesArns:
                  $ref: "#/components/schemas/AutomationRulesArnsList"
              required:
                - AutomationRulesArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteAutomationRulesResponse"
  /standards/deregister:
    post:
      operationId: BatchDisableStandards
      description: Disables the standards specified by the provided StandardsSubscriptionArns. For more information, see Security Standards section of the Security Hub CSPM User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StandardsSubscriptionArns:
                  $ref: "#/components/schemas/StandardsSubscriptionArns"
              required:
                - StandardsSubscriptionArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDisableStandardsResponse"
  /standards/register:
    post:
      operationId: BatchEnableStandards
      description: Enables the standards specified by the provided StandardsArn. To obtain the ARN for a standard, use the DescribeStandards operation. For more information, see the Security Standards section of the Security Hub CSPM User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StandardsSubscriptionRequests:
                  $ref: "#/components/schemas/StandardsSubscriptionRequests"
              required:
                - StandardsSubscriptionRequests
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEnableStandardsResponse"
  /automationrules/get:
    post:
      operationId: BatchGetAutomationRules
      description: Retrieves a list of details for automation rules based on rule Amazon Resource Names (ARNs).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AutomationRulesArns:
                  $ref: "#/components/schemas/AutomationRulesArnsList"
              required:
                - AutomationRulesArns
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetAutomationRulesResponse"
  /configurationPolicyAssociation/batchget:
    post:
      operationId: BatchGetConfigurationPolicyAssociations
      description: Returns associations between an Security Hub CSPM configuration and a batch of target accounts, organizational units, or the root. Only the Security Hub CSPM delegated administrator can invoke this operation from the home Region. A configuration can refer to a configuration policy or to a self-managed configuration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConfigurationPolicyAssociationIdentifiers:
                  $ref: "#/components/schemas/ConfigurationPolicyAssociationsList"
              required:
                - ConfigurationPolicyAssociationIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetConfigurationPolicyAssociationsResponse"
  /securityControls/batchGet:
    post:
      operationId: BatchGetSecurityControls
      description: Provides details about a batch of security controls for the current Amazon Web Services account and Amazon Web Services Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecurityControlIds:
                  $ref: "#/components/schemas/StringList"
              required:
                - SecurityControlIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetSecurityControlsResponse"
  /associations/batchGet:
    post:
      operationId: BatchGetStandardsControlAssociations
      description: For a batch of security controls and standards, identifies whether each control is currently enabled or disabled in a standard. Calls to this operation return a RESOURCE_NOT_FOUND_EXCEPTION error when the standard subscription for the association has a NOT_READY_FOR_UPDATES value for StandardsControlsUpdatable.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StandardsControlAssociationIds:
                  $ref: "#/components/schemas/StandardsControlAssociationIds"
              required:
                - StandardsControlAssociationIds
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetStandardsControlAssociationsResponse"
  /findings/import:
    post:
      operationId: BatchImportFindings
      description: "Imports security findings generated by a finding provider into Security Hub CSPM. This action is requested by the finding provider to import its findings into Security Hub CSPM. BatchImportFindings must be called by one of the following: The Amazon Web Services account that is associated with a finding if you are using the default product ARN or are a partner sending findings from within a customer's Amazon Web Services account. In these cases, the identifier of the account that you are calling BatchImportFindings from needs to be the same as the AwsAccountId attribute for the finding. An Amazon Web Services account that Security Hub CSPM has allow-listed for an official partner integration. In this case, you can call BatchImportFindings from the allow-listed account and send findings from different customer accounts in the same batch. The maximum allowed size for a finding is 240 Kb. An error is returned for any finding larger than 240 Kb. After a finding is created, BatchImportFindings cannot be used to update the following finding fields and objects, which Security Hub CSPM customers use to manage their investigation workflow. Note UserDefinedFields VerificationState Workflow Finding providers also should not use BatchImportFindings to update the following attributes. Confidence Criticality RelatedFindings Severity Types Instead, finding providers use FindingProviderFields to provide values for these attributes."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Findings:
                  $ref: "#/components/schemas/BatchImportFindingsRequestFindingList"
              required:
                - Findings
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportFindingsResponse"
  /automationrules/update:
    patch:
      operationId: BatchUpdateAutomationRules
      description: Updates one or more automation rules based on rule Amazon Resource Names (ARNs) and input parameters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                UpdateAutomationRulesRequestItems:
                  $ref: "#/components/schemas/UpdateAutomationRulesRequestItemsList"
              required:
                - UpdateAutomationRulesRequestItems
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateAutomationRulesResponse"
  /findings/batchupdate:
    patch:
      operationId: BatchUpdateFindings
      description: "Used by Security Hub CSPM customers to update information about their investigation into one or more findings. Requested by administrator accounts or member accounts. Administrator accounts can update findings for their account and their member accounts. A member account can update findings only for their own account. Administrator and member accounts can use this operation to update the following fields and objects for one or more findings: Confidence Criticality Note RelatedFindings Severity Types UserDefinedFields VerificationState Workflow If you use this operation to update a finding, your updates don’t affect the value for the UpdatedAt field of the finding. Also note that it can take several minutes for Security Hub CSPM to process your request and update each finding specified in the request. You can configure IAM policies to restrict access to fields and field values. For example, you might not want member accounts to be able to suppress findings or change the finding severity. For more information see Configuring access to BatchUpdateFindings in the Security Hub CSPM User Guide."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingIdentifiers:
                  $ref: "#/components/schemas/AwsSecurityFindingIdentifierList"
                Note:
                  $ref: "#/components/schemas/NoteUpdate"
                Severity:
                  $ref: "#/components/schemas/SeverityUpdate"
                VerificationState:
                  $ref: "#/components/schemas/VerificationState"
                Confidence:
                  $ref: "#/components/schemas/RatioScale"
                Criticality:
                  $ref: "#/components/schemas/RatioScale"
                Types:
                  $ref: "#/components/schemas/TypeList"
                UserDefinedFields:
                  $ref: "#/components/schemas/FieldMap"
                Workflow:
                  $ref: "#/components/schemas/WorkflowUpdate"
                RelatedFindings:
                  $ref: "#/components/schemas/RelatedFindingList"
              required:
                - FindingIdentifiers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateFindingsResponse"
  /findingsv2/batchupdatev2:
    patch:
      operationId: BatchUpdateFindingsV2
      description: "Updates information about a customer's investigation into a finding. Delegated administrator accounts can update findings for their account and their member accounts. Member accounts can update findings for their own account. BatchUpdateFindings and BatchUpdateFindingsV2 both use securityhub:BatchUpdateFindings in the Action element of an IAM policy statement. You must have permission to perform the securityhub:BatchUpdateFindings action. You can configure IAM policies to restrict access to specific finding fields or field values by using the securityhub:OCSFSyntaxPath/`<fieldName>` condition key, where `<fieldName>` is one of the following supported fields: SeverityId, StatusId, or Comment. To prevent a user from updating a specific field, use a Null condition with securityhub:OCSFSyntaxPath/`<fieldName>` set to \"false\". To prevent a user from setting a field to a specific value, use a StringEquals condition with securityhub:OCSFSyntaxPath/`<fieldName>` set to the disallowed value or list of values. Updates from BatchUpdateFindingsV2 don't affect the value of finding_info.modified_time, finding_info.modified_time_dt, time, or time_dt for a finding."
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                MetadataUids:
                  $ref: "#/components/schemas/MetadataUidList"
                FindingIdentifiers:
                  $ref: "#/components/schemas/OcsfFindingIdentifierList"
                Comment:
                  $ref: "#/components/schemas/NonEmptyString"
                SeverityId:
                  $ref: "#/components/schemas/Integer"
                StatusId:
                  $ref: "#/components/schemas/Integer"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateFindingsV2Response"
  /associations:
    patch:
      operationId: BatchUpdateStandardsControlAssociations
      description: For a batch of security controls and standards, this operation updates the enablement status of a control in a standard.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                StandardsControlAssociationUpdates:
                  $ref: "#/components/schemas/StandardsControlAssociationUpdates"
              required:
                - StandardsControlAssociationUpdates
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateStandardsControlAssociationsResponse"
    get:
      operationId: ListStandardsControlAssociations
      description: Specifies whether a control is currently enabled or disabled in each enabled standard in the calling account. This operation omits standards control associations for standard subscriptions where StandardsControlsUpdatable has value NOT_READY_FOR_UPDATES.
      parameters:
        - name: SecurityControlId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the control (identified with SecurityControlId, SecurityControlArn, or a mix of both parameters) that you want to determine the enablement status of in each enabled standard.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Optional pagination parameter.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: An optional parameter that limits the total results of the API response to the specified number. If this parameter isn't provided in the request, the results include the first 25 standard and control associations. The results also include a NextToken parameter that you can use in a subsequent API call to get the next 25 associations. This repeats until all associations for the specified control are returned. The number of results is limited by the number of supported Security Hub CSPM standards that you've enabled in the calling account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListStandardsControlAssociationsResponse"
  /actionTargets:
    post:
      operationId: CreateActionTarget
      description: Creates a custom action target in Security Hub CSPM. You can use custom actions on findings and insights in Security Hub CSPM to trigger target actions in Amazon CloudWatch Events.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyString"
                Description:
                  $ref: "#/components/schemas/NonEmptyString"
                Id:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - Id
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateActionTargetResponse"
  /aggregatorv2/create:
    post:
      operationId: CreateAggregatorV2
      description: Enables aggregation across Amazon Web Services Regions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RegionLinkingMode:
                  $ref: "#/components/schemas/NonEmptyString"
                LinkedRegions:
                  $ref: "#/components/schemas/StringList"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - RegionLinkingMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAggregatorV2Response"
  /automationrules/create:
    post:
      operationId: CreateAutomationRule
      description: Creates an automation rule based on input parameters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
                RuleStatus:
                  $ref: "#/components/schemas/RuleStatus"
                RuleOrder:
                  $ref: "#/components/schemas/RuleOrderValue"
                RuleName:
                  $ref: "#/components/schemas/NonEmptyString"
                Description:
                  $ref: "#/components/schemas/NonEmptyString"
                IsTerminal:
                  $ref: "#/components/schemas/Boolean"
                Criteria:
                  $ref: "#/components/schemas/AutomationRulesFindingFilters"
                Actions:
                  $ref: "#/components/schemas/ActionList"
              required:
                - RuleOrder
                - RuleName
                - Description
                - Criteria
                - Actions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomationRuleResponse"
  /automationrulesv2/create:
    post:
      operationId: CreateAutomationRuleV2
      description: Creates a V2 automation rule.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RuleName:
                  $ref: "#/components/schemas/NonEmptyString"
                RuleStatus:
                  $ref: "#/components/schemas/RuleStatusV2"
                Description:
                  $ref: "#/components/schemas/NonEmptyString"
                RuleOrder:
                  $ref: "#/components/schemas/RuleOrderValueV2"
                Criteria:
                  $ref: "#/components/schemas/Criteria"
                Actions:
                  $ref: "#/components/schemas/AutomationRulesActionListV2"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - RuleName
                - RuleOrder
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAutomationRuleV2Response"
  /configurationPolicy/create:
    post:
      operationId: CreateConfigurationPolicy
      description: Creates a configuration policy with the defined configuration. Only the Security Hub CSPM delegated administrator can invoke this operation from the home Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyString"
                Description:
                  $ref: "#/components/schemas/NonEmptyString"
                ConfigurationPolicy:
                  $ref: "#/components/schemas/Policy"
                Tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - ConfigurationPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConfigurationPolicyResponse"
  /connectorsv2:
    post:
      operationId: CreateConnectorV2
      description: Grants permission to create a connectorV2 based on input parameters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyString"
                Description:
                  $ref: "#/components/schemas/NonEmptyString"
                Provider:
                  $ref: "#/components/schemas/ProviderConfiguration"
                KmsKeyArn:
                  $ref: "#/components/schemas/NonEmptyString"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - Provider
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorV2Response"
    get:
      operationId: ListConnectorsV2
      description: Grants permission to retrieve a list of connectorsV2 and their metadata for the calling account.
      parameters:
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The pagination token per the Amazon Web Services Pagination standard
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned.
        - name: ProviderName
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorProviderName"
          description: The name of the third-party provider.
        - name: ConnectorStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectorStatus"
          description: The status for the connectorV2.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsV2Response"
  /findingAggregator/create:
    post:
      operationId: CreateFindingAggregator
      description: The aggregation Region is now called the home Region. Used to enable cross-Region aggregation. This operation can be invoked from the home Region only. For information about how cross-Region aggregation works, see Understanding cross-Region aggregation in Security Hub CSPM in the Security Hub CSPM User Guide.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RegionLinkingMode:
                  $ref: "#/components/schemas/NonEmptyString"
                Regions:
                  $ref: "#/components/schemas/StringList"
              required:
                - RegionLinkingMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFindingAggregatorResponse"
  /insights:
    post:
      operationId: CreateInsight
      description: Creates a custom insight in Security Hub CSPM. An insight is a consolidation of findings that relate to a security issue that requires attention or remediation. To group the related findings in the insight, use the GroupByAttribute.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/NonEmptyString"
                Filters:
                  $ref: "#/components/schemas/AwsSecurityFindingFilters"
                GroupByAttribute:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - GroupByAttribute
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInsightResponse"
  /members:
    post:
      operationId: CreateMembers
      description: "Creates a member association in Security Hub CSPM between the specified accounts and the account used to make the request, which is the administrator account. If you are integrated with Organizations, then the administrator account is designated by the organization management account. CreateMembers is always used to add accounts that are not organization members. For accounts that are managed using Organizations, CreateMembers is only used in the following cases: Security Hub CSPM is not configured to automatically add new organization accounts. The account was disassociated or deleted in Security Hub CSPM. This action can only be used by an account that has Security Hub CSPM enabled. To enable Security Hub CSPM, you can use the EnableSecurityHub operation. For accounts that are not organization members, you create the account association and then send an invitation to the member account. To send the invitation, you use the InviteMembers operation. If the account owner accepts the invitation, the account becomes a member account in Security Hub CSPM. Accounts that are managed using Organizations don't receive an invitation. They automatically become a member account in Security Hub CSPM. If the organization account does not have Security Hub CSPM enabled, then Security Hub CSPM and the default standards are automatically enabled. Note that Security Hub CSPM cannot be enabled automatically for the organization management account. The organization management account must enable Security Hub CSPM before the administrator account enables it as a member account. For organization accounts that already have Security Hub CSPM enabled, Security Hub CSPM does not make any other changes to those accounts. It does not change their enabled standards or controls. A permissions policy is added that permits the administrator account to view the findings generated in the member account. To remove the association between the administrator and member accounts, use the DisassociateFromMasterAccount or DisassociateMembers operation."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountDetails:
                  $ref: "#/components/schemas/AccountDetailsList"
              required:
                - AccountDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembersResponse"
    get:
      operationId: ListMembers
      description: Lists details about all member accounts for the current Security Hub CSPM administrator account. The results include both member accounts that belong to an organization and member accounts that were invited manually.
      parameters:
        - name: OnlyAssociated
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
