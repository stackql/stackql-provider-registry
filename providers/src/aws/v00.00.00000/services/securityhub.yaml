        Interval:
          $ref: "#/components/schemas/Integer"
          description: The approximate interval, in seconds, between health checks of an individual instance.
        Target:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The instance that is being checked. The target specifies the protocol and port. The available protocols are TCP, SSL, HTTP, and HTTPS. The range of valid ports is 1 through 65535. For the HTTP and HTTPS protocols, the target also specifies the ping path. For the TCP protocol, the target is specified as TCP: `<port>` . For the SSL protocol, the target is specified as SSL.`<port>` . For the HTTP and HTTPS protocols, the target is specified as `<protocol>`:`<port>`/<path to ping> ."
        Timeout:
          $ref: "#/components/schemas/Integer"
          description: The amount of time, in seconds, during which no response means a failed health check.
        UnhealthyThreshold:
          $ref: "#/components/schemas/Integer"
          description: The number of consecutive health check failures that must occur before the instance is moved to the Unhealthy state.
    AwsElbLoadBalancerInstances:
      type: array
      items:
        $ref: "#/components/schemas/AwsElbLoadBalancerInstance"
