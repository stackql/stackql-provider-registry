          $ref: "#/components/schemas/StringList"
          description: Specifies the location of the LDAP server, such as Amazon Web Services Directory Service for Microsoft Active Directory.
        RoleBase:
          $ref: "#/components/schemas/NonEmptyString"
          description: The distinguished name of the node in the directory information tree (DIT) to search for roles or groups.
        RoleName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The group name attribute in a role entry whose value is the name of that role.
        RoleSearchMatching:
          $ref: "#/components/schemas/NonEmptyString"
          description: The LDAP search filter used to find roles within the roleBase.
        RoleSearchSubtree:
          $ref: "#/components/schemas/Boolean"
          description: The directory search scope for the role. If set to true, the scope is to search the entire subtree.
        ServiceAccountUsername:
          $ref: "#/components/schemas/NonEmptyString"
          description: A username for the service account, which is an account in your LDAP server that has access to initiate a connection.
        UserBase:
          $ref: "#/components/schemas/NonEmptyString"
          description: Selects a particular subtree of the directory information tree (DIT) to search for user entries.
        UserRoleName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the LDAP attribute in the user's directory entry for the user's group membership.
        UserSearchMatching:
          $ref: "#/components/schemas/NonEmptyString"
          description: The LDAP search filter used to find users within the userBase.
        UserSearchSubtree:
          $ref: "#/components/schemas/Boolean"
          description: The directory search scope for the user. If set to true, the scope is to search the entire subtree.
