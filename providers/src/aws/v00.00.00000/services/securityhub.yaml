      type: object
      properties:
        Code:
          $ref: "#/components/schemas/Integer"
          description: The ICMP code for which to deny or allow access. To deny or allow all codes, use the value -1.
        Type:
          $ref: "#/components/schemas/Integer"
          description: The ICMP type for which to deny or allow access. To deny or allow all types, use the value -1.
