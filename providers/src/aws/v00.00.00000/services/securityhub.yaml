          description: Describes the type of finding change event, such as a call to BatchImportFindings (by an integrated Amazon Web Services service or third party partner integration) or BatchUpdateFindings (by a Security Hub CSPM customer).
        Identity:
          $ref: "#/components/schemas/NonEmptyString"
