        SecurityControlId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of a security control across standards. Values for this field typically consist of an Amazon Web Services service name and a number, such as APIGateway.3.
        SecurityControlArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of a security control across standards, such as arn:aws:securityhub:eu-central-1:123456789012:security-control/S3.1. This parameter doesn't mention a specific standard.
        AssociationStatus:
          $ref: "#/components/schemas/AssociationStatus"
          description: Specifies whether a control is enabled or disabled in a specified standard.
        RelatedRequirements:
          $ref: "#/components/schemas/RelatedRequirementsList"
          description: The requirement that underlies a control in the compliance framework related to the standard.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The time at which the enablement status of the control in the specified standard was last updated.
        UpdatedReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason for updating the enablement status of a control in a specified standard.
        StandardsControlTitle:
          $ref: "#/components/schemas/NonEmptyString"
          description: The title of a control. This field may reference a specific standard.
        StandardsControlDescription:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of a control. This typically summarizes how Security Hub CSPM evaluates the control and the conditions under which it produces a failed finding. This parameter may reference a specific standard.
        StandardsControlArns:
          $ref: "#/components/schemas/StandardsControlArnList"
          description: Provides the input parameter that Security Hub CSPM uses to call the UpdateStandardsControl API. This API can be used to enable or disable a control in a specified standard.
      required:
        - StandardsArn
        - SecurityControlId
        - SecurityControlArn
        - AssociationStatus
    AssociationStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    RelatedRequirementsList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    StandardsControlArnList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    UnprocessedStandardsControlAssociations:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedStandardsControlAssociation"
    UnprocessedStandardsControlAssociation:
      description: Provides details about which control's enablement status couldn't be retrieved in a specified standard when calling BatchUpdateStandardsControlAssociations. This parameter also provides details about why the request was unprocessed.
      type: object
      properties:
        StandardsControlAssociationId:
          $ref: "#/components/schemas/StandardsControlAssociationId"
          description: An array with one or more objects that includes a security control (identified with SecurityControlId, SecurityControlArn, or a mix of both parameters) and the Amazon Resource Name (ARN) of a standard. This parameter shows the specific controls for which the enablement status couldn't be retrieved in specified standards when calling BatchUpdateStandardsControlAssociations.
        ErrorCode:
          $ref: "#/components/schemas/UnprocessedErrorCode"
          description: The error code for the unprocessed standard and control association. The NOT_FOUND value has been deprecated and replaced by the RESOURCE_NOT_FOUND value.
        ErrorReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason why the standard and control association was unprocessed.
      required:
        - StandardsControlAssociationId
        - ErrorCode
    BatchImportFindingsRequestFindingList:
      type: array
      items:
        $ref: "#/components/schemas/AwsSecurityFinding"
    AwsSecurityFinding:
      description: Provides a consistent format for Security Hub CSPM findings. AwsSecurityFinding format allows you to share findings between Amazon Web Services security services and third-party solutions. A finding is a potential security issue generated either by Amazon Web Services services or by the integrated third-party solutions and standards checks.
      type: object
      properties:
        SchemaVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The schema version that a finding is formatted for. The value is 2018-10-08.
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The security findings provider-specific identifier for a finding. Length Constraints: Minimum length of 1. Maximum length of 512."
        ProductArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The ARN generated by Security Hub CSPM that uniquely identifies a product that generates findings. This can be the ARN for a third-party product that is integrated with Security Hub CSPM, or the ARN for a custom integration. Length Constraints: Minimum length of 12. Maximum length of 2048."
        ProductName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the product that generated the finding. Security Hub CSPM populates this attribute automatically for each finding. You cannot update this attribute with BatchImportFindings or BatchUpdateFindings. The exception to this is a custom integration. When you use the Security Hub CSPM console or API to filter findings by product name, you use this attribute. Length Constraints: Minimum length of 1. Maximum length of 128."
        CompanyName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the company for the product that generated the finding. Security Hub CSPM populates this attribute automatically for each finding. You cannot update this attribute with BatchImportFindings or BatchUpdateFindings. The exception to this is a custom integration. When you use the Security Hub CSPM console or API to filter findings by company name, you use this attribute. Length Constraints: Minimum length of 1. Maximum length of 128."
        Region:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The Region from which the finding was generated. Security Hub CSPM populates this attribute automatically for each finding. You cannot update it using BatchImportFindings or BatchUpdateFindings. Length Constraints: Minimum length of 1. Maximum length of 16."
        GeneratorId:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The identifier for the solution-specific component (a discrete unit of logic) that generated a finding. In various security findings providers' solutions, this generator can be called a rule, a check, a detector, a plugin, or something else. Length Constraints: Minimum length of 1. Maximum length of 512."
        AwsAccountId:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The Amazon Web Services account ID that a finding is generated in. Length Constraints: 12."
        Types:
          $ref: "#/components/schemas/TypeList"
          description: "One or more finding types in the format of namespace/category/classifier that classify a finding. Valid namespace values are: Software and Configuration Checks | TTPs | Effects | Unusual Behaviors | Sensitive Data Identifications Array Members: Maximum number of 50 items."
        FirstObservedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the security findings provider first observed the potential security issue that a finding captured. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        LastObservedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the security findings provider most recently observed a change in the resource that is involved in the finding. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        CreatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the security findings provider created the potential security issue that a finding captured. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        UpdatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the security findings provider last updated the finding record. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        Severity:
          $ref: "#/components/schemas/Severity"
          description: A finding's severity.
        Confidence:
          $ref: "#/components/schemas/Integer"
          description: A finding's confidence. Confidence is defined as the likelihood that a finding accurately identifies the behavior or issue that it was intended to identify. Confidence is scored on a 0-100 basis using a ratio scale, where 0 means zero percent confidence and 100 means 100 percent confidence.
        Criticality:
          $ref: "#/components/schemas/Integer"
          description: The level of importance assigned to the resources associated with the finding. A score of 0 means that the underlying resources have no criticality, and a score of 100 is reserved for the most critical resources.
        Title:
          $ref: "#/components/schemas/NonEmptyString"
          description: "A finding's title. Title is a required property. Length Constraints: Minimum length of 1. Maximum length of 256."
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: "A finding's description. Description is a required property. Length Constraints: Minimum length of 1. Maximum length of 1024."
        Remediation:
          $ref: "#/components/schemas/Remediation"
          description: A data type that describes the remediation options for a finding.
        SourceUrl:
          $ref: "#/components/schemas/NonEmptyString"
          description: A URL that links to a page about the current finding in the security findings provider's solution.
        ProductFields:
          type: object
          properties: {}
          description: A data type where security findings providers can include additional solution-specific details that aren't part of the defined AwsSecurityFinding format. Can contain up to 50 key-value pairs. For each key-value pair, the key can contain up to 128 characters, and the value can contain up to 2048 characters.
        UserDefinedFields:
          type: object
          properties: {}
          description: A list of name/value string pairs associated with the finding. These are custom, user-defined fields added to a finding. Can contain up to 50 key-value pairs. For each key-value pair, the key can contain up to 128 characters, and the value can contain up to 1024 characters.
        Malware:
          $ref: "#/components/schemas/MalwareList"
          description: "A list of malware related to a finding. Array Members: Maximum number of 5 items."
        Network:
          $ref: "#/components/schemas/Network"
          description: The details of network-related information about a finding.
        NetworkPath:
          $ref: "#/components/schemas/NetworkPathList"
          description: Provides information about a network path that is relevant to a finding. Each entry under NetworkPath represents a component of that path.
        Process:
          $ref: "#/components/schemas/ProcessDetails"
          description: The details of process-related information about a finding.
        Threats:
          $ref: "#/components/schemas/ThreatList"
          description: "Details about the threat detected in a security finding and the file paths that were affected by the threat. Array Members: Minimum number of 1 item. Maximum number of 32 items."
        ThreatIntelIndicators:
          $ref: "#/components/schemas/ThreatIntelIndicatorList"
          description: "Threat intelligence details related to a finding. Array Members: Minimum number of 1 item. Maximum number of 5 items."
        Resources:
          $ref: "#/components/schemas/ResourceList"
          description: "A set of resource data types that describe the resources that the finding refers to. Array Members: Minimum number of 1 item. Maximum number of 32 items."
        Compliance:
          $ref: "#/components/schemas/Compliance"
          description: This data type is exclusive to findings that are generated as the result of a check run against a specific rule in a supported security standard, such as CIS Amazon Web Services Foundations. Contains security standard-related finding details.
        VerificationState:
          $ref: "#/components/schemas/VerificationState"
          description: Indicates the veracity of a finding.
        WorkflowState:
          $ref: "#/components/schemas/WorkflowState"
          description: The workflow state of a finding.
        Workflow:
          $ref: "#/components/schemas/Workflow"
          description: Provides information about the status of the investigation into a finding.
        RecordState:
          $ref: "#/components/schemas/RecordState"
          description: The record state of a finding.
        RelatedFindings:
          $ref: "#/components/schemas/RelatedFindingList"
          description: "A list of related findings. Array Members: Minimum number of 1 item. Maximum number of 10 items."
        Note:
          $ref: "#/components/schemas/Note"
          description: A user-defined note added to a finding.
        Vulnerabilities:
          $ref: "#/components/schemas/VulnerabilityList"
          description: Provides a list of vulnerabilities associated with the findings.
        PatchSummary:
          $ref: "#/components/schemas/PatchSummary"
          description: Provides an overview of the patch compliance status for an instance against a selected compliance standard.
        Action:
          $ref: "#/components/schemas/Action"
          description: Provides details about an action that affects or that was taken on a resource.
        FindingProviderFields:
          $ref: "#/components/schemas/FindingProviderFields"
          description: In a BatchImportFindings request, finding providers use FindingProviderFields to provide and update their own values for confidence, criticality, related findings, severity, and types.
        Sample:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the finding is a sample finding.
        GeneratorDetails:
          $ref: "#/components/schemas/GeneratorDetails"
          description: Provides metadata for the Amazon CodeGuru detector associated with a finding. This field pertains to findings that relate to Lambda functions. Amazon Inspector identifies policy violations and vulnerabilities in Lambda function code based on internal detectors developed in collaboration with Amazon CodeGuru. Security Hub CSPM receives those findings.
        ProcessedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that indicates when Security Hub CSPM received a finding and begins to process it. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        AwsAccountName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the Amazon Web Services account from which a finding was generated. Length Constraints: Minimum length of 1. Maximum length of 50."
        Detection:
          $ref: "#/components/schemas/Detection"
          description: Provides details about an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      required:
        - SchemaVersion
        - Id
        - ProductArn
        - GeneratorId
        - AwsAccountId
        - CreatedAt
        - UpdatedAt
        - Title
        - Description
        - Resources
    Severity:
      description: The severity of the finding. The finding provider can provide the initial severity. The finding provider can only update the severity if it hasn't been updated using BatchUpdateFindings. The finding must have either Label or Normalized populated. If only one of these attributes is populated, then Security Hub CSPM automatically populates the other one. If neither attribute is populated, then the finding is invalid. Label is the preferred attribute.
      type: object
      properties:
        Product:
          $ref: "#/components/schemas/Double"
          description: Deprecated. This attribute isn't included in findings. Instead of providing Product, provide Original. The native severity as defined by the Amazon Web Services service or integrated partner product that generated the finding.
        Label:
          $ref: "#/components/schemas/SeverityLabel"
          description: The severity value of the finding. The allowed values are the following. INFORMATIONAL - No issue was found. LOW - The issue does not require action on its own. MEDIUM - The issue must be addressed but not urgently. HIGH - The issue must be addressed as a priority. CRITICAL - The issue must be remediated immediately to avoid it escalating. If you provide Normalized and don't provide Label, then Label is set automatically as follows. 0 - INFORMATIONAL 1–39 - LOW 40–69 - MEDIUM 70–89 - HIGH 90–100 - CRITICAL
        Normalized:
          $ref: "#/components/schemas/Integer"
          description: Deprecated. The normalized severity of a finding. Instead of providing Normalized, provide Label. The value of Normalized can be an integer between 0 and 100. If you provide Label and don't provide Normalized, then Normalized is set automatically as follows. INFORMATIONAL - 0 LOW - 1 MEDIUM - 40 HIGH - 70 CRITICAL - 90
        Original:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The native severity from the finding product that generated the finding. Length Constraints: Minimum length of 1. Maximum length of 64."
    Remediation:
      description: Details about the remediation steps for a finding.
      type: object
      properties:
        Recommendation:
          $ref: "#/components/schemas/Recommendation"
          description: A recommendation on the steps to take to remediate the issue identified by a finding.
    Recommendation:
      description: A recommendation on how to remediate the issue identified in a finding.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Describes the recommended steps to take to remediate an issue identified in a finding. Length Constraints: Minimum of 1 length. Maximum of 512 length."
        Url:
          $ref: "#/components/schemas/NonEmptyString"
          description: A URL to a page or site that contains information about how to remediate a finding.
    MalwareList:
      type: array
      items:
        $ref: "#/components/schemas/Malware"
    Malware:
      description: A list of malware related to a finding.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the malware that was observed. Length Constraints: Minimum of 1. Maximum of 64."
        Type:
          $ref: "#/components/schemas/MalwareType"
          description: The type of the malware that was observed.
        Path:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The file system path of the malware that was observed. Length Constraints: Minimum of 1. Maximum of 512."
        State:
          $ref: "#/components/schemas/MalwareState"
          description: The state of the malware that was observed.
      required:
        - Name
    MalwareType:
      type: string
      enum:
        - ADWARE
        - BLENDED_THREAT
        - BOTNET_AGENT
        - COIN_MINER
        - EXPLOIT_KIT
        - KEYLOGGER
        - MACRO
        - POTENTIALLY_UNWANTED
        - SPYWARE
        - RANSOMWARE
        - REMOTE_ACCESS
        - ROOTKIT
        - TROJAN
        - VIRUS
        - WORM
    MalwareState:
      type: string
      enum:
        - OBSERVED
        - REMOVAL_FAILED
        - REMOVED
    Network:
      description: The details of network-related information about a finding.
      type: object
      properties:
        Direction:
          $ref: "#/components/schemas/NetworkDirection"
          description: The direction of network traffic associated with a finding.
        Protocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The protocol of network-related information about a finding. Length Constraints: Minimum of 1. Maximum of 16."
        OpenPortRange:
          $ref: "#/components/schemas/PortRange"
          description: The range of open ports that is present on the network.
        SourceIpV4:
          $ref: "#/components/schemas/NonEmptyString"
          description: The source IPv4 address of network-related information about a finding.
        SourceIpV6:
          $ref: "#/components/schemas/NonEmptyString"
          description: The source IPv6 address of network-related information about a finding.
        SourcePort:
          $ref: "#/components/schemas/Integer"
          description: The source port of network-related information about a finding.
        SourceDomain:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The source domain of network-related information about a finding. Length Constraints: Minimum of 1. Maximum of 128."
        SourceMac:
          $ref: "#/components/schemas/NonEmptyString"
          description: The source media access control (MAC) address of network-related information about a finding.
        DestinationIpV4:
          $ref: "#/components/schemas/NonEmptyString"
          description: The destination IPv4 address of network-related information about a finding.
        DestinationIpV6:
          $ref: "#/components/schemas/NonEmptyString"
          description: The destination IPv6 address of network-related information about a finding.
        DestinationPort:
          $ref: "#/components/schemas/Integer"
          description: The destination port of network-related information about a finding.
        DestinationDomain:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The destination domain of network-related information about a finding. Length Constraints: Minimum of 1. Maximum of 128."
    NetworkDirection:
      type: string
      enum:
        - IN
        - OUT
    PortRange:
      description: A range of ports.
      type: object
      properties:
        Begin:
          $ref: "#/components/schemas/Integer"
          description: The first port in the port range.
        End:
          $ref: "#/components/schemas/Integer"
          description: The last port in the port range.
    NetworkPathList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkPathComponent"
    NetworkPathComponent:
      description: Information about a network path component.
      type: object
      properties:
        ComponentId:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The identifier of a component in the network path. Length Constraints: Minimum of 1. Maximum of 32."
        ComponentType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of component. Length Constraints: Minimum of 1. Maximum of 32."
        Egress:
          $ref: "#/components/schemas/NetworkHeader"
          description: Information about the component that comes after the current component in the network path.
        Ingress:
          $ref: "#/components/schemas/NetworkHeader"
          description: Information about the component that comes before the current node in the network path.
    NetworkHeader:
      description: Details about a network path component that occurs before or after the current component.
      type: object
      properties:
        Protocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The protocol used for the component. Length Constraints: Minimum of 1. Maximum of 16."
        Destination:
          $ref: "#/components/schemas/NetworkPathComponentDetails"
          description: Information about the destination of the component.
        Source:
          $ref: "#/components/schemas/NetworkPathComponentDetails"
          description: Information about the origin of the component.
    NetworkPathComponentDetails:
      description: Information about the destination of the next component in the network path.
      type: object
      properties:
        Address:
          $ref: "#/components/schemas/StringList"
          description: The IP addresses of the destination.
        PortRanges:
          $ref: "#/components/schemas/PortRangeList"
          description: A list of port ranges for the destination.
    PortRangeList:
      type: array
      items:
        $ref: "#/components/schemas/PortRange"
    ProcessDetails:
      description: The details of process-related information about a finding.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the process. Length Constraints: Minimum of 1. Maximum of 64."
        Path:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The path to the process executable. Length Constraints: Minimum of 1. Maximum of 512."
        Pid:
          $ref: "#/components/schemas/Integer"
          description: The process ID.
        ParentPid:
          $ref: "#/components/schemas/Integer"
          description: The parent process ID. This field accepts positive integers between O and 2147483647.
        LaunchedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the process was launched. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        TerminatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the process was terminated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
    ThreatList:
      type: array
      items:
        $ref: "#/components/schemas/Threat"
    Threat:
      description: Provides information about the threat detected in a security finding and the file paths that were affected by the threat.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the threat. Length Constraints: Minimum of 1 length. Maximum of 128 length."
        Severity:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The severity of the threat. Length Constraints: Minimum of 1 length. Maximum of 128 length."
        ItemCount:
          $ref: "#/components/schemas/Integer"
          description: This total number of items in which the threat has been detected.
        FilePaths:
          $ref: "#/components/schemas/FilePathList"
          description: "Provides information about the file paths that were affected by the threat. Array Members: Minimum number of 1 item. Maximum number of 5 items."
    FilePathList:
      type: array
      items:
        $ref: "#/components/schemas/FilePaths"
    FilePaths:
      description: Provides information about the file paths that were affected by the threat.
      type: object
      properties:
        FilePath:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Path to the infected or suspicious file on the resource it was detected on. Length Constraints: Minimum of 1 length. Maximum of 128 length."
        FileName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the infected or suspicious file corresponding to the hash. Length Constraints: Minimum of 1 length. Maximum of 128 length."
        ResourceId:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The Amazon Resource Name (ARN) of the resource on which the threat was detected. Length Constraints: Minimum of 1 length. Maximum of 128 length."
        Hash:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The hash value for the infected or suspicious file. Length Constraints: Minimum of 1 length. Maximum of 128 length."
    ThreatIntelIndicatorList:
      type: array
      items:
        $ref: "#/components/schemas/ThreatIntelIndicator"
    ThreatIntelIndicator:
      description: Details about the threat intelligence related to a finding.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/ThreatIntelIndicatorType"
          description: The type of threat intelligence indicator.
        Value:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The value of a threat intelligence indicator. Length Constraints: Minimum of 1 length. Maximum of 512 length."
        Category:
          $ref: "#/components/schemas/ThreatIntelIndicatorCategory"
          description: The category of a threat intelligence indicator.
        LastObservedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the most recent instance of a threat intelligence indicator was observed. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        Source:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The source of the threat intelligence indicator. Length Constraints: Minimum of 1 length. Maximum of 64 length."
        SourceUrl:
          $ref: "#/components/schemas/NonEmptyString"
          description: The URL to the page or site where you can get more information about the threat intelligence indicator.
    ThreatIntelIndicatorType:
      type: string
      enum:
        - DOMAIN
        - EMAIL_ADDRESS
        - HASH_MD5
        - HASH_SHA1
        - HASH_SHA256
        - HASH_SHA512
        - IPV4_ADDRESS
        - IPV6_ADDRESS
        - MUTEX
        - PROCESS
        - URL
    ThreatIntelIndicatorCategory:
      type: string
      enum:
        - BACKDOOR
        - CARD_STEALER
        - COMMAND_AND_CONTROL
        - DROP_SITE
        - EXPLOIT_SITE
        - KEYLOGGER
    ResourceList:
      type: array
      items:
        $ref: "#/components/schemas/Resource"
    Resource:
      description: A resource related to a finding.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of the resource that details are provided for. If possible, set Type to one of the supported resource types. For example, if the resource is an EC2 instance, then set Type to AwsEc2Instance. If the resource does not match any of the provided types, then set Type to Other. Length Constraints: Minimum length of 1. Maximum length of 256."
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The canonical identifier for the given resource type.
        Partition:
          $ref: "#/components/schemas/Partition"
          description: The canonical Amazon Web Services partition name that the Region is assigned to.
        Region:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The canonical Amazon Web Services external Region name where this resource is located. Length Constraints: Minimum length of 1. Maximum length of 16."
        ResourceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: Identifies the role of the resource in the finding. A resource is either the actor or target of the finding activity,
        Tags:
          type: object
          properties: {}
          description: A list of Amazon Web Services tags associated with a resource at the time the finding was processed. Tags must follow Amazon Web Services tag naming limits and requirements.
        DataClassification:
          $ref: "#/components/schemas/DataClassificationDetails"
          description: Contains information about sensitive data that was detected on the resource.
        Details:
          $ref: "#/components/schemas/ResourceDetails"
          description: Additional details about the resource related to a finding.
        ApplicationName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the application that is related to a finding.
        ApplicationArn:
          $ref: "#/components/schemas/NonEmptyString"
