        $ref: "#/components/schemas/AwsEc2SecurityGroupIpPermission"
    AwsEc2SecurityGroupIpPermission:
      description: An IP permission for an EC2 security group.
      type: object
      properties:
        IpProtocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: The IP protocol name (tcp, udp, icmp, icmpv6) or number. [VPC only] Use -1 to specify all protocols. When authorizing security group rules, specifying -1 or a protocol number other than tcp, udp, icmp, or icmpv6 allows traffic on all ports, regardless of any port range you specify. For tcp, udp, and icmp, you must specify a port range. For icmpv6, the port range is optional. If you omit the port range, traffic for all types and codes is allowed.
        FromPort:
          $ref: "#/components/schemas/Integer"
          description: The start of the port range for the TCP and UDP protocols, or an ICMP/ICMPv6 type number. A value of -1 indicates all ICMP/ICMPv6 types. If you specify all ICMP/ICMPv6 types, you must specify all codes.
        ToPort:
          $ref: "#/components/schemas/Integer"
          description: The end of the port range for the TCP and UDP protocols, or an ICMP/ICMPv6 code. A value of -1 indicates all ICMP/ICMPv6 codes. If you specify all ICMP/ICMPv6 types, you must specify all codes.
        UserIdGroupPairs:
          $ref: "#/components/schemas/AwsEc2SecurityGroupUserIdGroupPairList"
          description: The security group and Amazon Web Services account ID pairs.
        IpRanges:
          $ref: "#/components/schemas/AwsEc2SecurityGroupIpRangeList"
          description: The IPv4 ranges.
        Ipv6Ranges:
          $ref: "#/components/schemas/AwsEc2SecurityGroupIpv6RangeList"
          description: The IPv6 ranges.
        PrefixListIds:
          $ref: "#/components/schemas/AwsEc2SecurityGroupPrefixListIdList"
          description: "[VPC only] The prefix list IDs for an Amazon Web Services service. With outbound rules, this is the Amazon Web Services service to access through a VPC endpoint from instances associated with the security group."
    AwsEc2SecurityGroupUserIdGroupPairList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEc2SecurityGroupUserIdGroupPair"
    AwsEc2SecurityGroupUserIdGroupPair:
      description: A relationship between a security group and a user.
      type: object
      properties:
        GroupId:
          $ref: "#/components/schemas/NonEmptyString"
