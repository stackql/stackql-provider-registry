      type: object
      properties:
        DataId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier for the predicate.
        Negated:
          $ref: "#/components/schemas/Boolean"
          description: If set to true, then the rule actions are performed on requests that match the predicate settings. If set to false, then the rule actions are performed on all requests except those that match the predicate settings.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of predicate. Valid values are as follows: ByteMatch GeoMatch IPMatch RegexMatch SizeConstraint SqlInjectionMatch XssMatch"
    AwsWafRegionalRateBasedRuleDetails:
