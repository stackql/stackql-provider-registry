          description: The KMS key used to encrypt the build output artifacts. You can specify either the ARN of the KMS key or, if available, the KMS key alias (using the format alias/alias-name).
        Artifacts:
          $ref: "#/components/schemas/AwsCodeBuildProjectArtifactsList"
          description: Information about the build artifacts for the CodeBuild project.
        Environment:
          $ref: "#/components/schemas/AwsCodeBuildProjectEnvironment"
          description: Information about the build environment for this build project.
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the build project.
        Source:
          $ref: "#/components/schemas/AwsCodeBuildProjectSource"
          description: Information about the build input source code for this build project.
        ServiceRole:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the IAM role that enables CodeBuild to interact with dependent Amazon Web Services services on behalf of the Amazon Web Services account.
        LogsConfig:
          $ref: "#/components/schemas/AwsCodeBuildProjectLogsConfigDetails"
          description: Information about logs for the build project.
        VpcConfig:
          $ref: "#/components/schemas/AwsCodeBuildProjectVpcConfig"
          description: Information about the VPC configuration that CodeBuild accesses.
        SecondaryArtifacts:
          $ref: "#/components/schemas/AwsCodeBuildProjectArtifactsList"
          description: Information about the secondary artifacts for the CodeBuild project.
    AwsCodeBuildProjectArtifactsList:
      type: array
      items:
        $ref: "#/components/schemas/AwsCodeBuildProjectArtifactsDetails"
    AwsCodeBuildProjectArtifactsDetails:
      description: Information about the build artifacts for the CodeBuild project.
      type: object
      properties:
        ArtifactIdentifier:
          $ref: "#/components/schemas/NonEmptyString"
          description: An identifier for the artifact definition.
        EncryptionDisabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether to disable encryption on the artifact. Only valid when Type is S3.
        Location:
          $ref: "#/components/schemas/NonEmptyString"
          description: Only used when Type is S3. The name of the S3 bucket where the artifact is located.
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: Only used when Type is S3. The name of the artifact. Used with NamepaceType and Path to determine the pattern for storing the artifact.
        NamespaceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: Only used when Type is S3. The value to use for the namespace. Used with Name and Path to determine the pattern for storing the artifact.
        OverrideArtifactName:
          $ref: "#/components/schemas/Boolean"
          description: Whether the name specified in the buildspec file overrides the artifact name.
        Packaging:
          $ref: "#/components/schemas/NonEmptyString"
          description: Only used when Type is S3. The type of output artifact to create.
        Path:
          $ref: "#/components/schemas/NonEmptyString"
          description: Only used when Type is S3. The path to the artifact. Used with Name and NamespaceType to determine the pattern for storing the artifact.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of build artifact.
    AwsCodeBuildProjectEnvironment:
      description: Information about the build environment for this build project.
      type: object
      properties:
        Certificate:
          $ref: "#/components/schemas/NonEmptyString"
          description: The certificate to use with this build project.
        EnvironmentVariables:
          $ref: "#/components/schemas/AwsCodeBuildProjectEnvironmentEnvironmentVariablesList"
          description: A set of environment variables to make available to builds for the build project.
        PrivilegedMode:
          $ref: "#/components/schemas/Boolean"
          description: Whether to allow the Docker daemon to run inside a Docker container. Set to true if the build project is used to build Docker images.
        ImagePullCredentialsType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of credentials CodeBuild uses to pull images in your build. Valid values: CODEBUILD specifies that CodeBuild uses its own credentials. This requires that you modify your ECR repository policy to trust the CodeBuild service principal. SERVICE_ROLE specifies that CodeBuild uses your build project's service role. When you use a cross-account or private registry image, you must use SERVICE_ROLE credentials. When you use an CodeBuild curated image, you must use CODEBUILD credentials."
        RegistryCredential:
          $ref: "#/components/schemas/AwsCodeBuildProjectEnvironmentRegistryCredential"
          description: The credentials for access to a private registry.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of build environment to use for related builds. The environment type ARM_CONTAINER is available only in Regions US East (N. Virginia), US East (Ohio), US West (Oregon), Europe (Ireland), Asia Pacific (Mumbai), Asia Pacific (Tokyo), Asia Pacific (Sydney), and Europe (Frankfurt). The environment type LINUX_CONTAINER with compute type build.general1.2xlarge is available only in Regions US East (N. Virginia), US East (N. Virginia), US West (Oregon), Canada (Central), Europe (Ireland), Europe (London), Europe (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Seoul), Asia Pacific (Singapore), Asia Pacific (Sydney), China (Beijing), and China (Ningxia). The environment type LINUX_GPU_CONTAINER is available only in Regions US East (N. Virginia), US East (N. Virginia), US West (Oregon), Canada (Central), Europe (Ireland), Europe (London), Europe (Frankfurt), Asia Pacific (Tokyo), Asia Pacific (Seoul), Asia Pacific (Singapore), Asia Pacific (Sydney), China (Beijing), and China (Ningxia). Valid values: WINDOWS_CONTAINER | LINUX_CONTAINER | LINUX_GPU_CONTAINER | ARM_CONTAINER"
    AwsCodeBuildProjectEnvironmentEnvironmentVariablesList:
      type: array
      items:
        $ref: "#/components/schemas/AwsCodeBuildProjectEnvironmentEnvironmentVariablesDetails"
    AwsCodeBuildProjectEnvironmentEnvironmentVariablesDetails:
      description: Information about an environment variable that is available to builds for the build project.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the environment variable.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of environment variable.
        Value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The value of the environment variable.
    AwsCodeBuildProjectEnvironmentRegistryCredential:
      description: The credentials for access to a private registry.
      type: object
      properties:
        Credential:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN or name of credentials created using Secrets Manager. The credential can use the name of the credentials only if they exist in your current Amazon Web Services Region.
        CredentialProvider:
          $ref: "#/components/schemas/NonEmptyString"
          description: The service that created the credentials to access a private Docker registry. The valid value, SECRETS_MANAGER, is for Secrets Manager.
    AwsCodeBuildProjectSource:
      description: Information about the build input source code for this build project.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of repository that contains the source code to be built. Valid values are: BITBUCKET - The source code is in a Bitbucket repository. CODECOMMIT - The source code is in an CodeCommit repository. CODEPIPELINE - The source code settings are specified in the source action of a pipeline in CodePipeline. GITHUB - The source code is in a GitHub repository. GITHUB_ENTERPRISE - The source code is in a GitHub Enterprise repository. NO_SOURCE - The project does not have input source code. S3 - The source code is in an S3 input bucket."
        Location:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Information about the location of the source code to be built. Valid values include: For source code settings that are specified in the source action of a pipeline in CodePipeline, location should not be specified. If it is specified, CodePipeline ignores it. This is because CodePipeline uses the settings in a pipeline's source action instead of this value. For source code in an CodeCommit repository, the HTTPS clone URL to the repository that contains the source code and the build spec file (for example, https://git-codecommit.region-ID.amazonaws.com/v1/repos/repo-name ). For source code in an S3 input bucket, one of the following. The path to the ZIP file that contains the source code (for example, bucket-name/path/to/object-name.zip). The path to the folder that contains the source code (for example, bucket-name/path/to/source-code/folder/). For source code in a GitHub repository, the HTTPS clone URL to the repository that contains the source and the build spec file. For source code in a Bitbucket repository, the HTTPS clone URL to the repository that contains the source and the build spec file."
        GitCloneDepth:
          $ref: "#/components/schemas/Integer"
          description: Information about the Git clone depth for the build project.
        InsecureSsl:
          $ref: "#/components/schemas/Boolean"
          description: Whether to ignore SSL warnings while connecting to the project source code.
    AwsCodeBuildProjectLogsConfigDetails:
      description: Information about logs for the build project.
      type: object
      properties:
        CloudWatchLogs:
          $ref: "#/components/schemas/AwsCodeBuildProjectLogsConfigCloudWatchLogsDetails"
          description: Information about CloudWatch Logs for the build project.
        S3Logs:
          $ref: "#/components/schemas/AwsCodeBuildProjectLogsConfigS3LogsDetails"
          description: Information about logs built to an S3 bucket for a build project.
    AwsCodeBuildProjectLogsConfigCloudWatchLogsDetails:
      description: Information about CloudWatch Logs for the build project.
