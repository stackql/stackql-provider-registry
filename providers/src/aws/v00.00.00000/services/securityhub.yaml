        Status:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The status of the certificate. Valid values: PENDING_VALIDATION | ISSUED | INACTIVE | EXPIRED | VALIDATION_TIMED_OUT | REVOKED | FAILED"
        Subject:
