          description: The maximum number of results to return. This operation currently only returns a single result.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFindingAggregatorsResponse"
  /invitations:
    get:
      operationId: ListInvitations
      description: We recommend using Organizations instead of Security Hub CSPM invitations to manage your member accounts. For information, see Managing Security Hub CSPM administrator and member accounts with Organizations in the Security Hub CSPM User Guide. Lists all Security Hub CSPM membership invitations that were sent to the calling account. Only accounts that are managed by invitation can use this operation. Accounts that are managed using the integration with Organizations don't receive invitations.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CrossAccountMaxResults"
          description: The maximum number of items to return in the response.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that is required for pagination. On your first call to the ListInvitations operation, set the value of this parameter to NULL. For subsequent calls to the operation, to continue listing data, set the value of this parameter to the value returned from the previous response.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInvitationsResponse"
  /organization/admin:
    get:
      operationId: ListOrganizationAdminAccounts
      description: Lists the Security Hub CSPM administrator accounts. Can only be called by the organization management account.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AdminsMaxResults"
          description: The maximum number of items to return in the response.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token that is required for pagination. On your first call to the ListOrganizationAdminAccounts operation, set the value of this parameter to NULL. For subsequent calls to the operation, to continue listing data, set the value of this parameter to the value returned from the previous response.
        - name: Feature
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SecurityHubFeature"
          description: The feature where the delegated administrator account is listed. Defaults to Security Hub CSPM if not specified.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationAdminAccountsResponse"
  /securityControls/definitions:
    get:
      operationId: ListSecurityControlDefinitions
      description: Lists all of the security controls that apply to a specified standard.
      parameters:
        - name: StandardsArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the standard that you want to view controls for.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Optional pagination parameter.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: An optional parameter that limits the total results of the API response to the specified number. If this parameter isn't provided in the request, the results include the first 25 security controls that apply to the specified standard. The results also include a NextToken parameter that you can use in a subsequent API call to get the next 25 controls. This repeats until all controls for the standard are returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSecurityControlDefinitionsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags associated with a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to retrieve tags for.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to apply the tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource to remove the tags from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys associated with the tags to remove from the resource. You can remove up to 50 tags at a time.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /connectorsv2/register:
    post:
      operationId: RegisterConnectorV2
      description: Grants permission to complete the authorization based on input parameters.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AuthCode:
                  $ref: "#/components/schemas/NonEmptyString"
                AuthState:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - AuthCode
                - AuthState
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterConnectorV2Response"
  /configurationPolicyAssociation/associate:
    post:
      operationId: StartConfigurationPolicyAssociation
      description: Associates a target account, organizational unit, or the root with a specified configuration. The target can be associated with a configuration policy or self-managed behavior. Only the Security Hub CSPM delegated administrator can invoke this operation from the home Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConfigurationPolicyIdentifier:
                  $ref: "#/components/schemas/NonEmptyString"
                Target:
                  $ref: "#/components/schemas/Target"
              required:
                - ConfigurationPolicyIdentifier
                - Target
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConfigurationPolicyAssociationResponse"
  /configurationPolicyAssociation/disassociate:
    post:
      operationId: StartConfigurationPolicyDisassociation
      description: Disassociates a target account, organizational unit, or the root from a specified configuration. When you disassociate a configuration from its target, the target inherits the configuration of the closest parent. If there’s no configuration to inherit, the target retains its settings but becomes a self-managed account. A target can be disassociated from a configuration policy or self-managed behavior. Only the Security Hub CSPM delegated administrator can invoke this operation from the home Region.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Target:
                  $ref: "#/components/schemas/Target"
                ConfigurationPolicyIdentifier:
                  $ref: "#/components/schemas/NonEmptyString"
              required:
                - ConfigurationPolicyIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartConfigurationPolicyDisassociationResponse"
  /aggregatorv2/update/{aggregator_v2_arn}:
    patch:
      operationId: UpdateAggregatorV2
      description: Udpates the configuration for the Aggregator V2.
      parameters:
        - name: aggregator_v2_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the Aggregator V2.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                RegionLinkingMode:
                  $ref: "#/components/schemas/NonEmptyString"
                LinkedRegions:
                  $ref: "#/components/schemas/StringList"
              required:
                - RegionLinkingMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAggregatorV2Response"
  /findingAggregator/update:
    patch:
      operationId: UpdateFindingAggregator
      description: The aggregation Region is now called the home Region. Updates cross-Region aggregation settings. You can use this operation to update the Region linking mode and the list of included or excluded Amazon Web Services Regions. However, you can't use this operation to change the home Region. You can invoke this operation from the current home Region only.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                FindingAggregatorArn:
                  $ref: "#/components/schemas/NonEmptyString"
                RegionLinkingMode:
                  $ref: "#/components/schemas/NonEmptyString"
                Regions:
                  $ref: "#/components/schemas/StringList"
              required:
                - FindingAggregatorArn
                - RegionLinkingMode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFindingAggregatorResponse"
  /securityControl/update:
    patch:
      operationId: UpdateSecurityControl
      description: Updates the properties of a security control.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SecurityControlId:
                  $ref: "#/components/schemas/NonEmptyString"
                Parameters:
                  $ref: "#/components/schemas/Parameters"
                LastUpdateReason:
                  $ref: "#/components/schemas/AlphaNumericNonEmptyString"
              required:
                - SecurityControlId
                - Parameters
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSecurityControlResponse"
  /standards/control/{standards_control_arn}:
    patch:
      operationId: UpdateStandardsControl
      description: Used to control whether an individual security standard control is enabled or disabled. Calls to this operation return a RESOURCE_NOT_FOUND_EXCEPTION error when the standard subscription for the control has StandardsControlsUpdatable value NOT_READY_FOR_UPDATES.
      parameters:
        - name: standards_control_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the security standard control to enable or disable.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ControlStatus:
                  $ref: "#/components/schemas/ControlStatus"
                DisabledReason:
                  $ref: "#/components/schemas/NonEmptyString"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateStandardsControlResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    NonEmptyString:
      type: string
      pattern: .*\S.*
    AcceptAdministratorInvitationResponse:
      type: object
    AcceptInvitationResponse:
      type: object
    AutomationRulesArnsList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchDeleteAutomationRulesResponse:
      type: object
      properties:
        ProcessedAutomationRules:
          $ref: "#/components/schemas/AutomationRulesArnsList"
          description: A list of properly processed rule ARNs.
        UnprocessedAutomationRules:
          $ref: "#/components/schemas/UnprocessedAutomationRulesList"
          description: A list of objects containing RuleArn, ErrorCode, and ErrorMessage. This parameter tells you which automation rules the request didn't delete and why.
    UnprocessedAutomationRulesList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedAutomationRule"
    UnprocessedAutomationRule:
      description: A list of objects containing RuleArn, ErrorCode, and ErrorMessage. This parameter tells you which automation rules the request didn't process and why.
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) for the unprocessed automation rule.
        ErrorCode:
          $ref: "#/components/schemas/Integer"
          description: The error code associated with the unprocessed automation rule.
        ErrorMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: An error message describing why a request didn't process a specific rule.
    Integer:
      type: integer
    StandardsSubscriptionArns:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchDisableStandardsResponse:
      type: object
      properties:
        StandardsSubscriptions:
          $ref: "#/components/schemas/StandardsSubscriptions"
          description: The details of the standards subscriptions that were disabled.
    StandardsSubscriptions:
      type: array
      items:
        $ref: "#/components/schemas/StandardsSubscription"
    StandardsSubscription:
      description: A resource that represents your subscription to a supported standard.
      type: object
      properties:
        StandardsSubscriptionArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the resource that represents your subscription to the standard.
        StandardsArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the standard.
        StandardsInput:
          type: object
          properties: {}
          description: A key-value pair of input for the standard.
        StandardsStatus:
          $ref: "#/components/schemas/StandardsStatus"
          description: "The status of your subscription to the standard. Possible values are: PENDING - The standard is in the process of being enabled. Or the standard is already enabled and Security Hub CSPM is adding new controls to the standard. READY - The standard is enabled. INCOMPLETE - The standard could not be enabled completely. One or more errors (StandardsStatusReason) occurred when Security Hub CSPM attempted to enable the standard. DELETING - The standard is in the process of being disabled. FAILED - The standard could not be disabled. One or more errors (StandardsStatusReason) occurred when Security Hub CSPM attempted to disable the standard."
        StandardsControlsUpdatable:
          $ref: "#/components/schemas/StandardsControlsUpdatable"
          description: "Specifies whether you can retrieve information about and configure individual controls that apply to the standard. Possible values are: READY_FOR_UPDATES - Controls in the standard can be retrieved and configured. NOT_READY_FOR_UPDATES - Controls in the standard cannot be retrieved or configured."
        StandardsStatusReason:
          $ref: "#/components/schemas/StandardsStatusReason"
          description: The reason for the current status.
      required:
        - StandardsSubscriptionArn
        - StandardsArn
        - StandardsInput
        - StandardsStatus
    StandardsStatus:
      type: string
      enum:
        - PENDING
        - READY
        - FAILED
        - DELETING
        - INCOMPLETE
    StandardsControlsUpdatable:
      type: string
      enum:
        - READY_FOR_UPDATES
        - NOT_READY_FOR_UPDATES
    StandardsStatusReason:
      description: The reason for the current status of your subscription to the standard.
      type: object
      properties:
        StatusReasonCode:
          $ref: "#/components/schemas/StatusReasonCode"
          description: The reason code that represents the reason for the current status of a standard subscription.
      required:
        - StatusReasonCode
    StatusReasonCode:
      type: string
      enum:
        - NO_AVAILABLE_CONFIGURATION_RECORDER
        - MAXIMUM_NUMBER_OF_CONFIG_RULES_EXCEEDED
        - INTERNAL_ERROR
    StandardsSubscriptionRequests:
      type: array
      items:
        $ref: "#/components/schemas/StandardsSubscriptionRequest"
    StandardsSubscriptionRequest:
      description: The standard that you want to enable.
      type: object
      properties:
        StandardsArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the standard that you want to enable. To view the list of available standards and their ARNs, use the DescribeStandards operation.
        StandardsInput:
          type: object
          properties: {}
          description: A key-value pair of input for the standard.
      required:
        - StandardsArn
    BatchEnableStandardsResponse:
      type: object
      properties:
        StandardsSubscriptions:
          $ref: "#/components/schemas/StandardsSubscriptions"
          description: The details of the standards subscriptions that were enabled.
    BatchGetAutomationRulesResponse:
      type: object
      properties:
        Rules:
          $ref: "#/components/schemas/AutomationRulesConfigList"
          description: A list of rule details for the provided rule ARNs.
        UnprocessedAutomationRules:
          $ref: "#/components/schemas/UnprocessedAutomationRulesList"
          description: A list of objects containing RuleArn, ErrorCode, and ErrorMessage. This parameter tells you which automation rules the request didn't retrieve and why.
    AutomationRulesConfigList:
      type: array
      items:
        $ref: "#/components/schemas/AutomationRulesConfig"
    AutomationRulesConfig:
      description: Defines the configuration of an automation rule.
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of a rule.
        RuleStatus:
          $ref: "#/components/schemas/RuleStatus"
          description: Whether the rule is active after it is created. If this parameter is equal to ENABLED, Security Hub CSPM starts applying the rule to findings and finding updates after the rule is created.
        RuleOrder:
          $ref: "#/components/schemas/RuleOrderValue"
          description: An integer ranging from 1 to 1000 that represents the order in which the rule action is applied to findings. Security Hub CSPM applies rules with lower values for this parameter first.
        RuleName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the rule.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: A description of the rule.
        IsTerminal:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether a rule is the last to be applied with respect to a finding that matches the rule criteria. This is useful when a finding matches the criteria for multiple rules, and each rule has different actions. If a rule is terminal, Security Hub CSPM applies the rule action to a finding that matches the rule criteria and doesn't evaluate other rules for the finding. By default, a rule isn't terminal.
        Criteria:
          $ref: "#/components/schemas/AutomationRulesFindingFilters"
          description: A set of Amazon Web Services Security Finding Format finding field attributes and corresponding expected values that Security Hub CSPM uses to filter findings. If a rule is enabled and a finding matches the conditions specified in this parameter, Security Hub CSPM applies the rule action to the finding.
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: One or more actions to update finding fields if a finding matches the defined criteria of the rule.
        CreatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the rule was created. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: A timestamp that indicates when the rule was most recently updated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        CreatedBy:
          $ref: "#/components/schemas/NonEmptyString"
          description: The principal that created a rule.
    RuleStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    RuleOrderValue:
      type: integer
      minimum: 1
      maximum: 1000
    Boolean:
      type: boolean
    AutomationRulesFindingFilters:
      description: The criteria that determine which findings a rule applies to.
      type: object
      properties:
        ProductArn:
          $ref: "#/components/schemas/StringFilterList"
          description: "The Amazon Resource Name (ARN) for a third-party product that generated a finding in Security Hub CSPM. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        AwsAccountId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The Amazon Web Services account ID in which a finding was generated. Array Members: Minimum number of 1 item. Maximum number of 100 items."
        Id:
          $ref: "#/components/schemas/StringFilterList"
          description: "The product-specific identifier for a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        GeneratorId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The identifier for the solution-specific component that generated a finding. Array Members: Minimum number of 1 item. Maximum number of 100 items."
        Type:
          $ref: "#/components/schemas/StringFilterList"
          description: "One or more finding types in the format of namespace/category/classifier that classify a finding. For a list of namespaces, classifiers, and categories, see Types taxonomy for ASFF in the Security Hub CSPM User Guide. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        FirstObservedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: "A timestamp that indicates when the potential security issue captured by a finding was first observed by the security findings product. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        LastObservedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: "A timestamp that indicates when the security findings provider most recently observed a change in the resource that is involved in the finding. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        CreatedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: "A timestamp that indicates when this finding record was created. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        UpdatedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: "A timestamp that indicates when the finding record was most recently updated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        Confidence:
          $ref: "#/components/schemas/NumberFilterList"
          description: "The likelihood that a finding accurately identifies the behavior or issue that it was intended to identify. Confidence is scored on a 0–100 basis using a ratio scale. A value of 0 means 0 percent confidence, and a value of 100 means 100 percent confidence. For example, a data exfiltration detection based on a statistical deviation of network traffic has low confidence because an actual exfiltration hasn't been verified. For more information, see Confidence in the Security Hub CSPM User Guide. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        Criticality:
          $ref: "#/components/schemas/NumberFilterList"
          description: "The level of importance that is assigned to the resources that are associated with a finding. Criticality is scored on a 0–100 basis, using a ratio scale that supports only full integers. A score of 0 means that the underlying resources have no criticality, and a score of 100 is reserved for the most critical resources. For more information, see Criticality in the Security Hub CSPM User Guide. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        Title:
          $ref: "#/components/schemas/StringFilterList"
          description: "A finding's title. Array Members: Minimum number of 1 item. Maximum number of 100 items."
        Description:
          $ref: "#/components/schemas/StringFilterList"
          description: "A finding's description. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        SourceUrl:
          $ref: "#/components/schemas/StringFilterList"
          description: "Provides a URL that links to a page about the current finding in the finding product. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ProductName:
          $ref: "#/components/schemas/StringFilterList"
          description: "Provides the name of the product that generated the finding. For control-based findings, the product name is Security Hub CSPM. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        CompanyName:
          $ref: "#/components/schemas/StringFilterList"
          description: "The name of the company for the product that generated the finding. For control-based findings, the company is Amazon Web Services. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        SeverityLabel:
          $ref: "#/components/schemas/StringFilterList"
          description: "The severity value of the finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceType:
          $ref: "#/components/schemas/StringFilterList"
          description: "The type of resource that the finding pertains to. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The identifier for the given resource type. For Amazon Web Services resources that are identified by Amazon Resource Names (ARNs), this is the ARN. For Amazon Web Services resources that lack ARNs, this is the identifier as defined by the Amazon Web Services service that created the resource. For non-Amazon Web Services resources, this is a unique identifier that is associated with the resource. Array Members: Minimum number of 1 item. Maximum number of 100 items."
        ResourcePartition:
          $ref: "#/components/schemas/StringFilterList"
          description: "The partition in which the resource that the finding pertains to is located. A partition is a group of Amazon Web Services Regions. Each Amazon Web Services account is scoped to one partition. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceRegion:
          $ref: "#/components/schemas/StringFilterList"
          description: "The Amazon Web Services Region where the resource that a finding pertains to is located. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceTags:
          $ref: "#/components/schemas/MapFilterList"
          description: "A list of Amazon Web Services tags associated with a resource at the time the finding was processed. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceDetailsOther:
          $ref: "#/components/schemas/MapFilterList"
          description: "Custom fields and values about the resource that a finding pertains to. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ComplianceStatus:
          $ref: "#/components/schemas/StringFilterList"
          description: "The result of a security check. This field is only used for findings generated from controls. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ComplianceSecurityControlId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The security control ID for which a finding was generated. Security control IDs are the same across standards. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ComplianceAssociatedStandardsId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The unique identifier of a standard in which a control is enabled. This field consists of the resource portion of the Amazon Resource Name (ARN) returned for a standard in the DescribeStandards API response. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        VerificationState:
          $ref: "#/components/schemas/StringFilterList"
          description: "Provides the veracity of a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        WorkflowStatus:
          $ref: "#/components/schemas/StringFilterList"
          description: "Provides information about the status of the investigation into a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        RecordState:
          $ref: "#/components/schemas/StringFilterList"
          description: "Provides the current state of a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        RelatedFindingsProductArn:
          $ref: "#/components/schemas/StringFilterList"
          description: "The ARN for the product that generated a related finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        RelatedFindingsId:
          $ref: "#/components/schemas/StringFilterList"
          description: "The product-generated identifier for a related finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        NoteText:
          $ref: "#/components/schemas/StringFilterList"
          description: "The text of a user-defined note that's added to a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        NoteUpdatedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: "The timestamp of when the note was updated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        NoteUpdatedBy:
          $ref: "#/components/schemas/StringFilterList"
          description: "The principal that created a note. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        UserDefinedFields:
          $ref: "#/components/schemas/MapFilterList"
          description: "A list of user-defined name and value string pairs added to a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceApplicationArn:
          $ref: "#/components/schemas/StringFilterList"
          description: "The Amazon Resource Name (ARN) of the application that is related to a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        ResourceApplicationName:
          $ref: "#/components/schemas/StringFilterList"
          description: "The name of the application that is related to a finding. Array Members: Minimum number of 1 item. Maximum number of 20 items."
        AwsAccountName:
          $ref: "#/components/schemas/StringFilterList"
          description: "The name of the Amazon Web Services account in which a finding was generated. Array Members: Minimum number of 1 item. Maximum number of 20 items."
    StringFilterList:
      type: array
      items:
        $ref: "#/components/schemas/StringFilter"
    StringFilter:
      description: A string filter for filtering Security Hub CSPM findings.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The string filter value. Filter values are case sensitive. For example, the product name for control-based findings is Security Hub CSPM. If you provide security hub as the filter value, there's no match.
        Comparison:
          $ref: "#/components/schemas/StringFilterComparison"
          description: "The condition to apply to a string value when filtering Security Hub CSPM findings. To search for values that have the filter value, use one of the following comparison operators: To search for values that include the filter value, use CONTAINS. For example, the filter Title CONTAINS CloudFront matches findings that have a Title that includes the string CloudFront. To search for values that exactly match the filter value, use EQUALS. For example, the filter AwsAccountId EQUALS 123456789012 only matches findings that have an account ID of 123456789012. To search for values that start with the filter value, use PREFIX. For example, the filter ResourceRegion PREFIX us matches findings that have a ResourceRegion that starts with us. A ResourceRegion that starts with a different value, such as af, ap, or ca, doesn't match. CONTAINS, EQUALS, and PREFIX filters on the same field are joined by OR. A finding matches if it matches any one of those filters. For example, the filters Title CONTAINS CloudFront OR Title CONTAINS CloudWatch match a finding that includes either CloudFront, CloudWatch, or both strings in the title. To search for values that don’t have the filter value, use one of the following comparison operators: To search for values that exclude the filter value, use NOT_CONTAINS. For example, the filter Title NOT_CONTAINS CloudFront matches findings that have a Title that excludes the string CloudFront. To search for values other than the filter value, use NOT_EQUALS. For example, the filter AwsAccountId NOT_EQUALS 123456789012 only matches findings that have an account ID other than 123456789012. To search for values that don't start with the filter value, use PREFIX_NOT_EQUALS. For example, the filter ResourceRegion PREFIX_NOT_EQUALS us matches findings with a ResourceRegion that starts with a value other than us. NOT_CONTAINS, NOT_EQUALS, and PREFIX_NOT_EQUALS filters on the same field are joined by AND. A finding matches only if it matches all of those filters. For example, the filters Title NOT_CONTAINS CloudFront AND Title NOT_CONTAINS CloudWatch match a finding that excludes both CloudFront and CloudWatch in the title. You can’t have both a CONTAINS filter and a NOT_CONTAINS filter on the same field. Similarly, you can't provide both an EQUALS filter and a NOT_EQUALS or PREFIX_NOT_EQUALS filter on the same field. Combining filters in this way returns an error. CONTAINS filters can only be used with other CONTAINS filters. NOT_CONTAINS filters can only be used with other NOT_CONTAINS filters. You can combine PREFIX filters with NOT_EQUALS or PREFIX_NOT_EQUALS filters for the same field. Security Hub CSPM first processes the PREFIX filters, and then the NOT_EQUALS or PREFIX_NOT_EQUALS filters. For example, for the following filters, Security Hub CSPM first identifies findings that have resource types that start with either AwsIam or AwsEc2. It then excludes findings that have a resource type of AwsIamPolicy and findings that have a resource type of AwsEc2NetworkInterface. ResourceType PREFIX AwsIam ResourceType PREFIX AwsEc2 ResourceType NOT_EQUALS AwsIamPolicy ResourceType NOT_EQUALS AwsEc2NetworkInterface The CONTAINS operator works with automation rules V1 and V2. The NOT_CONTAINS operator works only with automation rules V1. The CONTAINS_WORD operator works only in the GetFindingsV2, GetFindingStatisticsV2, GetResourcesV2, and GetResourcesStatisticsV2 APIs. For more information, see Automation rules in the Security Hub CSPM User Guide."
    StringFilterComparison:
      type: string
      enum:
        - EQUALS
        - PREFIX
        - NOT_EQUALS
        - PREFIX_NOT_EQUALS
        - CONTAINS
        - NOT_CONTAINS
        - CONTAINS_WORD
    DateFilterList:
      type: array
      items:
        $ref: "#/components/schemas/DateFilter"
    DateFilter:
      description: A date filter for querying findings.
      type: object
      properties:
        Start:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that provides the start date for the date filter. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        End:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that provides the end date for the date filter. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        DateRange:
          $ref: "#/components/schemas/DateRange"
          description: A date range for the date filter.
    DateRange:
      description: A date range for the date filter.
      type: object
      properties:
        Value:
          $ref: "#/components/schemas/Integer"
          description: A date range value for the date filter.
        Unit:
          $ref: "#/components/schemas/DateRangeUnit"
          description: A date range unit for the date filter.
        Comparison:
          $ref: "#/components/schemas/DateRangeComparison"
          description: The condition to apply to a date range filter. If you specify WITHIN, Security Hub filters for dates within the specified date range. If you specify OLDER_THAN, Security Hub filters for dates before the specified date range. If you don't specify a value, the default is WITHIN.
    DateRangeUnit:
      type: string
      enum:
        - DAYS
    DateRangeComparison:
      type: string
      enum:
        - WITHIN
        - OLDER_THAN
    NumberFilterList:
      type: array
      items:
        $ref: "#/components/schemas/NumberFilter"
    NumberFilter:
      description: A number filter for querying findings.
      type: object
      properties:
        Gte:
          $ref: "#/components/schemas/Double"
          description: The greater-than-equal condition to be applied to a single field when querying for findings.
        Lte:
          $ref: "#/components/schemas/Double"
          description: The less-than-equal condition to be applied to a single field when querying for findings.
        Eq:
          $ref: "#/components/schemas/Double"
          description: The equal-to condition to be applied to a single field when querying for findings.
        Gt:
          $ref: "#/components/schemas/Double"
          description: The greater-than condition to be applied to a single field when querying for findings.
        Lt:
          $ref: "#/components/schemas/Double"
          description: The less-than condition to be applied to a single field when querying for findings.
    Double:
      type: number
      format: double
    MapFilterList:
      type: array
      items:
        $ref: "#/components/schemas/MapFilter"
    MapFilter:
      description: A map filter for filtering Security Hub CSPM findings. Each map filter provides the field to check for, the value to check for, and the comparison operator.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/NonEmptyString"
          description: The key of the map filter. For example, for ResourceTags, Key identifies the name of the tag. For UserDefinedFields, Key is the name of the field.
        Value:
          $ref: "#/components/schemas/NonEmptyString"
          description: The value for the key in the map filter. Filter values are case sensitive. For example, one of the values for a tag called Department might be Security. If you provide security as the filter value, then there's no match.
        Comparison:
          $ref: "#/components/schemas/MapFilterComparison"
          description: "The condition to apply to the key value when filtering Security Hub CSPM findings with a map filter. To search for values that have the filter value, use one of the following comparison operators: To search for values that include the filter value, use CONTAINS. For example, for the ResourceTags field, the filter Department CONTAINS Security matches findings that include the value Security for the Department tag. In the same example, a finding with a value of Security team for the Department tag is a match. To search for values that exactly match the filter value, use EQUALS. For example, for the ResourceTags field, the filter Department EQUALS Security matches findings that have the value Security for the Department tag. CONTAINS and EQUALS filters on the same field are joined by OR. A finding matches if it matches any one of those filters. For example, the filters Department CONTAINS Security OR Department CONTAINS Finance match a finding that includes either Security, Finance, or both values. To search for values that don't have the filter value, use one of the following comparison operators: To search for values that exclude the filter value, use NOT_CONTAINS. For example, for the ResourceTags field, the filter Department NOT_CONTAINS Finance matches findings that exclude the value Finance for the Department tag. To search for values other than the filter value, use NOT_EQUALS. For example, for the ResourceTags field, the filter Department NOT_EQUALS Finance matches findings that don’t have the value Finance for the Department tag. NOT_CONTAINS and NOT_EQUALS filters on the same field are joined by AND. A finding matches only if it matches all of those filters. For example, the filters Department NOT_CONTAINS Security AND Department NOT_CONTAINS Finance match a finding that excludes both the Security and Finance values. CONTAINS filters can only be used with other CONTAINS filters. NOT_CONTAINS filters can only be used with other NOT_CONTAINS filters. You can’t have both a CONTAINS filter and a NOT_CONTAINS filter on the same field. Similarly, you can’t have both an EQUALS filter and a NOT_EQUALS filter on the same field. Combining filters in this way returns an error. CONTAINS and NOT_CONTAINS operators can be used only with automation rules. For more information, see Automation rules in the Security Hub CSPM User Guide."
    MapFilterComparison:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - CONTAINS
        - NOT_CONTAINS
    ActionList:
      type: array
      items:
        $ref: "#/components/schemas/AutomationRulesAction"
    AutomationRulesAction:
      description: One or more actions that Security Hub CSPM takes when a finding matches the defined criteria of a rule.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/AutomationRulesActionType"
          description: Specifies the type of action that Security Hub CSPM takes when a finding matches the defined criteria of a rule.
        FindingFieldsUpdate:
          $ref: "#/components/schemas/AutomationRulesFindingFieldsUpdate"
          description: Specifies that the automation rule action is an update to a finding field.
    AutomationRulesActionType:
      type: string
      enum:
        - FINDING_FIELDS_UPDATE
    AutomationRulesFindingFieldsUpdate:
      description: Identifies the finding fields that the automation rule action updates when a finding matches the defined criteria.
      type: object
      properties:
        Note:
          $ref: "#/components/schemas/NoteUpdate"
        Severity:
          $ref: "#/components/schemas/SeverityUpdate"
        VerificationState:
          $ref: "#/components/schemas/VerificationState"
          description: The rule action updates the VerificationState field of a finding.
        Confidence:
          $ref: "#/components/schemas/RatioScale"
          description: The rule action updates the Confidence field of a finding.
        Criticality:
          $ref: "#/components/schemas/RatioScale"
          description: The rule action updates the Criticality field of a finding.
        Types:
          $ref: "#/components/schemas/TypeList"
          description: The rule action updates the Types field of a finding.
        UserDefinedFields:
          type: object
          properties: {}
          description: The rule action updates the UserDefinedFields field of a finding.
        Workflow:
          $ref: "#/components/schemas/WorkflowUpdate"
        RelatedFindings:
          $ref: "#/components/schemas/RelatedFindingList"
          description: The rule action updates the RelatedFindings field of a finding.
    NoteUpdate:
      description: The updated note.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/NonEmptyString"
          description: The updated note text.
        UpdatedBy:
          $ref: "#/components/schemas/NonEmptyString"
          description: The principal that updated the note.
      required:
        - Text
        - UpdatedBy
    SeverityUpdate:
      description: Updates to the severity information for a finding.
      type: object
      properties:
        Normalized:
          $ref: "#/components/schemas/RatioScale"
          description: The normalized severity for the finding. This attribute is to be deprecated in favor of Label. If you provide Normalized and don't provide Label, Label is set automatically as follows. 0 - INFORMATIONAL 1–39 - LOW 40–69 - MEDIUM 70–89 - HIGH 90–100 - CRITICAL
        Product:
          $ref: "#/components/schemas/Double"
          description: The native severity as defined by the Amazon Web Services service or integrated partner product that generated the finding.
        Label:
          $ref: "#/components/schemas/SeverityLabel"
          description: The severity value of the finding. The allowed values are the following. INFORMATIONAL - No issue was found. LOW - The issue does not require action on its own. MEDIUM - The issue must be addressed but not urgently. HIGH - The issue must be addressed as a priority. CRITICAL - The issue must be remediated immediately to avoid it escalating.
    RatioScale:
      type: integer
      minimum: 0
      maximum: 100
    SeverityLabel:
      type: string
      enum:
        - INFORMATIONAL
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    VerificationState:
      type: string
      enum:
        - UNKNOWN
        - TRUE_POSITIVE
        - FALSE_POSITIVE
        - BENIGN_POSITIVE
    TypeList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    WorkflowUpdate:
      description: Used to update information about the investigation into the finding.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/WorkflowStatus"
          description: "The status of the investigation into the finding. The workflow status is specific to an individual finding. It does not affect the generation of new findings. For example, setting the workflow status to SUPPRESSED or RESOLVED does not prevent a new finding for the same issue. The allowed values are the following. NEW - The initial state of a finding, before it is reviewed. Security Hub CSPM also resets WorkFlowStatus from NOTIFIED or RESOLVED to NEW in the following cases: The record state changes from ARCHIVED to ACTIVE. The compliance status changes from PASSED to either WARNING, FAILED, or NOT_AVAILABLE. NOTIFIED - Indicates that you notified the resource owner about the security issue. Used when the initial reviewer is not the resource owner, and needs intervention from the resource owner. RESOLVED - The finding was reviewed and remediated and is now considered resolved. SUPPRESSED - Indicates that you reviewed the finding and don't believe that any action is needed. The finding is no longer updated."
    WorkflowStatus:
      type: string
      enum:
        - NEW
        - NOTIFIED
        - RESOLVED
        - SUPPRESSED
    RelatedFindingList:
      type: array
      items:
        $ref: "#/components/schemas/RelatedFinding"
    RelatedFinding:
      description: Details about a related finding.
      type: object
      properties:
        ProductArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the product that generated a related finding.
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The product-generated identifier for a related finding.
      required:
        - ProductArn
        - Id
    Timestamp:
      type: string
      format: date-time
    ConfigurationPolicyAssociationsList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationPolicyAssociation"
    ConfigurationPolicyAssociation:
      description: Provides details about the association between an Security Hub CSPM configuration and a target account, organizational unit, or the root. An association can exist between a target and a configuration policy, or between a target and self-managed behavior.
      type: object
      properties:
        Target:
          $ref: "#/components/schemas/Target"
          description: The target account, organizational unit, or the root.
    Target:
      description: The target account, organizational unit, or the root that is associated with an Security Hub CSPM configuration. The configuration can be a configuration policy or self-managed behavior.
      type: object
      properties:
        AccountId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Web Services account ID of the target account.
        OrganizationalUnitId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The organizational unit ID of the target organizational unit.
        RootId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the organization root.
    BatchGetConfigurationPolicyAssociationsResponse:
      type: object
      properties:
        ConfigurationPolicyAssociations:
          $ref: "#/components/schemas/ConfigurationPolicyAssociationList"
          description: Describes associations for the target accounts, OUs, or the root.
        UnprocessedConfigurationPolicyAssociations:
          $ref: "#/components/schemas/UnprocessedConfigurationPolicyAssociationList"
          description: An array of configuration policy associations, one for each configuration policy association identifier, that was specified in the request but couldn’t be processed due to an error.
    ConfigurationPolicyAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/ConfigurationPolicyAssociationSummary"
    ConfigurationPolicyAssociationSummary:
      description: An object that contains the details of a configuration policy association that’s returned in a ListConfigurationPolicyAssociations request.
      type: object
      properties:
        ConfigurationPolicyId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The universally unique identifier (UUID) of the configuration policy.
        TargetId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the target account, organizational unit, or the root.
        TargetType:
          $ref: "#/components/schemas/TargetType"
          description: Specifies whether the target is an Amazon Web Services account, organizational unit, or the root.
        AssociationType:
          $ref: "#/components/schemas/AssociationType"
          description: Indicates whether the association between the specified target and the configuration was directly applied by the Security Hub CSPM delegated administrator or inherited from a parent.
        UpdatedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time, in UTC and ISO 8601 format, that the configuration policy association was last updated.
        AssociationStatus:
          $ref: "#/components/schemas/ConfigurationPolicyAssociationStatus"
          description: The current status of the association between the specified target and the configuration.
        AssociationStatusMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: The explanation for a FAILED value for AssociationStatus.
    TargetType:
      type: string
      enum:
        - ACCOUNT
        - ORGANIZATIONAL_UNIT
        - ROOT
    AssociationType:
      type: string
      enum:
        - INHERITED
        - APPLIED
    ConfigurationPolicyAssociationStatus:
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
    UnprocessedConfigurationPolicyAssociationList:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedConfigurationPolicyAssociation"
    UnprocessedConfigurationPolicyAssociation:
      description: An array of configuration policy associations, one for each configuration policy association identifier, that was specified in a BatchGetConfigurationPolicyAssociations request but couldn’t be processed due to an error.
      type: object
      properties:
        ConfigurationPolicyAssociationIdentifiers:
          $ref: "#/components/schemas/ConfigurationPolicyAssociation"
          description: Configuration policy association identifiers that were specified in a BatchGetConfigurationPolicyAssociations request but couldn’t be processed due to an error.
        ErrorCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: An HTTP status code that identifies why the configuration policy association failed.
        ErrorReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: A string that identifies why the configuration policy association failed.
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    BatchGetSecurityControlsResponse:
      type: object
      properties:
        SecurityControls:
          $ref: "#/components/schemas/SecurityControls"
          description: An array that returns the identifier, Amazon Resource Name (ARN), and other details about a security control. The same information is returned whether the request includes SecurityControlId or SecurityControlArn.
        UnprocessedIds:
          $ref: "#/components/schemas/UnprocessedSecurityControls"
          description: A security control (identified with SecurityControlId, SecurityControlArn, or a mix of both parameters) for which details cannot be returned.
      required:
        - SecurityControls
    SecurityControls:
      type: array
      items:
        $ref: "#/components/schemas/SecurityControl"
    SecurityControl:
      description: A security control in Security Hub CSPM describes a security best practice related to a specific resource.
      type: object
      properties:
        SecurityControlId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of a security control across standards. Values for this field typically consist of an Amazon Web Services service name and a number, such as APIGateway.3.
        SecurityControlArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) for a security control across standards, such as arn:aws:securityhub:eu-central-1:123456789012:security-control/S3.1. This parameter doesn't mention a specific standard.
        Title:
          $ref: "#/components/schemas/NonEmptyString"
          description: The title of a security control.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of a security control across standards. This typically summarizes how Security Hub CSPM evaluates the control and the conditions under which it produces a failed finding. This parameter doesn't reference a specific standard.
        RemediationUrl:
          $ref: "#/components/schemas/NonEmptyString"
          description: A link to Security Hub CSPM documentation that explains how to remediate a failed finding for a security control.
        SeverityRating:
          $ref: "#/components/schemas/SeverityRating"
          description: The severity of a security control. For more information about how Security Hub CSPM determines control severity, see Assigning severity to control findings in the Security Hub CSPM User Guide.
        SecurityControlStatus:
          $ref: "#/components/schemas/ControlStatus"
          description: The enablement status of a security control in a specific standard.
        UpdateStatus:
          $ref: "#/components/schemas/UpdateStatus"
          description: Identifies whether customizable properties of a security control are reflected in Security Hub CSPM findings. A status of READY indicates that Security Hub CSPM uses the current control parameter values when running security checks of the control. A status of UPDATING indicates that all security checks might not use the current parameter values.
        Parameters:
          type: object
          properties: {}
          description: An object that identifies the name of a control parameter, its current value, and whether it has been customized.
        LastUpdateReason:
          $ref: "#/components/schemas/AlphaNumericNonEmptyString"
          description: The most recent reason for updating the customizable properties of a security control. This differs from the UpdateReason field of the BatchUpdateStandardsControlAssociations API, which tracks the reason for updating the enablement status of a control. This field accepts alphanumeric characters in addition to white spaces, dashes, and underscores.
      required:
        - SecurityControlId
        - SecurityControlArn
        - Title
        - Description
        - RemediationUrl
        - SeverityRating
        - SecurityControlStatus
    SeverityRating:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
    ControlStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    UpdateStatus:
      type: string
      enum:
        - READY
        - UPDATING
    AlphaNumericNonEmptyString:
      type: string
      pattern: ^([^\u0000-\u007F]|[-_ a-zA-Z0-9])+$
    UnprocessedSecurityControls:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedSecurityControl"
    UnprocessedSecurityControl:
      description: Provides details about a security control for which a response couldn't be returned.
      type: object
      properties:
        SecurityControlId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The control (identified with SecurityControlId, SecurityControlArn, or a mix of both parameters) for which a response couldn't be returned.
        ErrorCode:
          $ref: "#/components/schemas/UnprocessedErrorCode"
          description: The error code for the unprocessed security control. The NOT_FOUND value has been deprecated and replaced by the RESOURCE_NOT_FOUND value.
        ErrorReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason why the security control was unprocessed.
      required:
