        NotBefore:
          $ref: "#/components/schemas/NonEmptyString"
          description: The time before which the certificate is not valid. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        Options:
          $ref: "#/components/schemas/AwsCertificateManagerCertificateOptions"
          description: Provides a value that specifies whether to add the certificate to a transparency log.
        RenewalEligibility:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Whether the certificate is eligible for renewal. Valid values: ELIGIBLE | INELIGIBLE"
        RenewalSummary:
          $ref: "#/components/schemas/AwsCertificateManagerCertificateRenewalSummary"
          description: Information about the status of the Certificate Manager managed renewal for the certificate. Provided only when the certificate type is AMAZON_ISSUED.
        Serial:
