          description: Customizable text that will be displayed in a banner on Amazon Web Services provided clients when a VPN session is established.
    CodeRepositoryDetails:
      description: Details about an external code repository with which you can connect your Amazon Web Services resources. The connection is established through Amazon Inspector.
      type: object
      properties:
        ProviderType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of repository provider.
        ProjectName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the project in the code repository.
        CodeSecurityIntegrationArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the code security integration associated with the repository.
    Compliance:
      description: This object typically provides details about a control finding, such as applicable standards and the status of control checks. While finding providers can add custom content in Compliance object fields, they are typically used to review details of Security Hub CSPM control findings.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/ComplianceStatus"
          description: Typically summarizes the result of a control check. For Security Hub CSPM controls, valid values for Status are as follows. PASSED - Standards check passed for all evaluated resources. WARNING - Some information is missing or this check is not supported for your configuration. FAILED - Standards check failed for at least one evaluated resource. NOT_AVAILABLE - Check could not be performed due to a service outage, API error, or because the result of the Config evaluation was NOT_APPLICABLE. If the Config evaluation result was NOT_APPLICABLE for a Security Hub CSPM control, Security Hub CSPM automatically archives the finding after 3 days.
        RelatedRequirements:
          $ref: "#/components/schemas/RelatedRequirementsList"
          description: "Typically provides the industry or regulatory framework requirements that are related to a control. The check for that control is aligned with these requirements. Array Members: Maximum number of 32 items."
        StatusReasons:
          $ref: "#/components/schemas/StatusReasonsList"
          description: Typically used to provide a list of reasons for the value of Status.
        SecurityControlId:
          $ref: "#/components/schemas/NonEmptyString"
          description: Typically provides the unique identifier of a control across standards. For Security Hub CSPM controls, this field consists of an Amazon Web Services service and a unique number, such as APIGateway.5.
        AssociatedStandards:
          $ref: "#/components/schemas/AssociatedStandardsList"
          description: Typically provides an array of enabled security standards in which a security control is currently enabled.
        SecurityControlParameters:
          $ref: "#/components/schemas/SecurityControlParametersList"
          description: Typically an object that includes security control parameter names and values.
    ComplianceStatus:
      type: string
      enum:
        - PASSED
        - WARNING
        - FAILED
        - NOT_AVAILABLE
    StatusReasonsList:
      type: array
      items:
        $ref: "#/components/schemas/StatusReason"
    StatusReason:
      description: Provides additional context for the value of Compliance.Status.
      type: object
      properties:
        ReasonCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: A code that represents a reason for the control status. For the list of status reason codes and their meanings, see Compliance details for control findings in the Security Hub CSPM User Guide.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The corresponding description for the status reason code.
      required:
        - ReasonCode
    AssociatedStandardsList:
      type: array
      items:
        $ref: "#/components/schemas/AssociatedStandard"
    AssociatedStandard:
      description: Information about an enabled security standard in which a security control is enabled.
      type: object
      properties:
        StandardsId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of a standard in which a control is enabled. This field consists of the resource portion of the Amazon Resource Name (ARN) returned for a standard in the DescribeStandards API response.
    SecurityControlParametersList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityControlParameter"
    SecurityControlParameter:
      description: A parameter that a security control accepts.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of a
        Value:
          $ref: "#/components/schemas/TypeList"
          description: The current value of a control parameter.
    WorkflowState:
      type: string
      enum:
        - NEW
        - ASSIGNED
        - IN_PROGRESS
        - DEFERRED
        - RESOLVED
    Workflow:
      description: Provides details about the status of the investigation into a finding.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/WorkflowStatus"
          description: "The status of the investigation into the finding. The workflow status is specific to an individual finding. It does not affect the generation of new findings. For example, setting the workflow status to SUPPRESSED or RESOLVED does not prevent a new finding for the same issue. The allowed values are the following. NEW - The initial state of a finding, before it is reviewed. Security Hub CSPM also resets the workflow status from NOTIFIED or RESOLVED to NEW in the following cases: RecordState changes from ARCHIVED to ACTIVE. ComplianceStatus changes from PASSED to either WARNING, FAILED, or NOT_AVAILABLE. NOTIFIED - Indicates that you notified the resource owner about the security issue. Used when the initial reviewer is not the resource owner, and needs intervention from the resource owner. SUPPRESSED - Indicates that you reviewed the finding and don't believe that any action is needed. The finding is no longer updated. RESOLVED - The finding was reviewed and remediated and is now considered resolved."
    RecordState:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED
    Note:
      description: A user-defined note added to a finding.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The text of a note. Length Constraints: Minimum of 1. Maximum of 512."
        UpdatedBy:
          $ref: "#/components/schemas/NonEmptyString"
          description: The principal that created a note.
        UpdatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that indicates when the note was updated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
      required:
        - Text
        - UpdatedBy
        - UpdatedAt
    VulnerabilityList:
      type: array
      items:
        $ref: "#/components/schemas/Vulnerability"
    Vulnerability:
      description: A vulnerability associated with a finding.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the vulnerability.
        VulnerablePackages:
          $ref: "#/components/schemas/SoftwarePackageList"
          description: List of software packages that have the vulnerability.
        Cvss:
          $ref: "#/components/schemas/CvssList"
          description: CVSS scores from the advisory related to the vulnerability.
        RelatedVulnerabilities:
          $ref: "#/components/schemas/StringList"
          description: List of vulnerabilities that are related to this vulnerability.
        Vendor:
          $ref: "#/components/schemas/VulnerabilityVendor"
          description: Information about the vendor that generates the vulnerability report.
        ReferenceUrls:
          $ref: "#/components/schemas/StringList"
          description: A list of URLs that provide additional information about the vulnerability.
        FixAvailable:
          $ref: "#/components/schemas/VulnerabilityFixAvailable"
          description: "Specifies if all vulnerable packages in a finding have a value for FixedInVersion and Remediation. This field is evaluated for each vulnerability Id based on the number of vulnerable packages that have a value for both FixedInVersion and Remediation. Valid values are as follows: YES if all vulnerable packages have a value for both FixedInVersion and Remediation NO if no vulnerable packages have a value for FixedInVersion and Remediation PARTIAL otherwise"
        EpssScore:
          $ref: "#/components/schemas/Double"
          description: The Exploit Prediction Scoring System (EPSS) score for a finding.
        ExploitAvailable:
          $ref: "#/components/schemas/VulnerabilityExploitAvailable"
          description: Whether an exploit is available for a finding.
        LastKnownExploitAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: The date and time of the last exploit associated with a finding discovered in your environment.
        CodeVulnerabilities:
          $ref: "#/components/schemas/VulnerabilityCodeVulnerabilitiesList"
          description: The vulnerabilities found in your Lambda function code. This field pertains to findings that Security Hub CSPM receives from Amazon Inspector.
      required:
        - Id
    SoftwarePackageList:
      type: array
      items:
        $ref: "#/components/schemas/SoftwarePackage"
    SoftwarePackage:
      description: Information about a software package.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the software package.
        Version:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version of the software package.
        Epoch:
          $ref: "#/components/schemas/NonEmptyString"
          description: The epoch of the software package.
        Release:
          $ref: "#/components/schemas/NonEmptyString"
          description: The release of the software package.
        Architecture:
          $ref: "#/components/schemas/NonEmptyString"
          description: The architecture used for the software package.
        PackageManager:
          $ref: "#/components/schemas/NonEmptyString"
          description: The source of the package.
        FilePath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The file system path to the package manager inventory file.
        FixedInVersion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version of the software package in which the vulnerability has been resolved.
        Remediation:
          $ref: "#/components/schemas/NonEmptyString"
          description: Describes the actions a customer can take to resolve the vulnerability in the software package.
        SourceLayerHash:
          $ref: "#/components/schemas/NonEmptyString"
          description: The source layer hash of the vulnerable package.
        SourceLayerArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the source layer.
    CvssList:
      type: array
      items:
        $ref: "#/components/schemas/Cvss"
    Cvss:
      description: CVSS scores from the advisory related to the vulnerability.
      type: object
      properties:
        Version:
          $ref: "#/components/schemas/NonEmptyString"
          description: The version of CVSS for the CVSS score.
        BaseScore:
          $ref: "#/components/schemas/Double"
          description: The base CVSS score.
        BaseVector:
          $ref: "#/components/schemas/NonEmptyString"
          description: The base scoring vector for the CVSS score.
        Source:
          $ref: "#/components/schemas/NonEmptyString"
          description: The origin of the original CVSS score and vector.
        Adjustments:
          $ref: "#/components/schemas/AdjustmentList"
          description: Adjustments to the CVSS metrics.
    AdjustmentList:
      type: array
      items:
        $ref: "#/components/schemas/Adjustment"
    Adjustment:
      description: An adjustment to the CVSS metric.
      type: object
      properties:
        Metric:
          $ref: "#/components/schemas/NonEmptyString"
          description: The metric to adjust.
        Reason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason for the adjustment.
    VulnerabilityVendor:
      description: A vendor that generates a vulnerability report.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the vendor.
        Url:
          $ref: "#/components/schemas/NonEmptyString"
          description: The URL of the vulnerability advisory.
        VendorSeverity:
          $ref: "#/components/schemas/NonEmptyString"
          description: The severity that the vendor assigned to the vulnerability.
        VendorCreatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the vulnerability advisory was created. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        VendorUpdatedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the vulnerability advisory was last updated. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
      required:
        - Name
    VulnerabilityFixAvailable:
      type: string
      enum:
        - "YES"
        - "NO"
        - PARTIAL
    VulnerabilityExploitAvailable:
      type: string
      enum:
        - "YES"
        - "NO"
    VulnerabilityCodeVulnerabilitiesList:
      type: array
      items:
        $ref: "#/components/schemas/VulnerabilityCodeVulnerabilities"
    VulnerabilityCodeVulnerabilities:
      description: Provides details about the vulnerabilities found in your Lambda function code. This field pertains to findings that Security Hub CSPM receives from Amazon Inspector.
      type: object
      properties:
        Cwes:
          $ref: "#/components/schemas/TypeList"
          description: The Common Weakness Enumeration (CWE) item associated with the detected code vulnerability.
        FilePath:
          $ref: "#/components/schemas/CodeVulnerabilitiesFilePath"
          description: Provides details about where a code vulnerability is located in your Lambda function.
        SourceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the Lambda layer in which the code vulnerability is located.
    CodeVulnerabilitiesFilePath:
      description: Provides details about where a code vulnerability is located in your Lambda function.
      type: object
      properties:
        EndLine:
          $ref: "#/components/schemas/Integer"
          description: The line number of the last line of code in which the vulnerability is located.
        FileName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the file in which the code vulnerability is located.
        FilePath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The file path to the code in which the vulnerability is located.
        StartLine:
          $ref: "#/components/schemas/Integer"
          description: The line number of the first line of code in which the vulnerability is located.
    PatchSummary:
      description: Provides an overview of the patch compliance status for an instance against a selected compliance standard.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The identifier of the compliance standard that was used to determine the patch compliance status. Length Constraints: Minimum length of 1. Maximum length of 256."
        InstalledCount:
          $ref: "#/components/schemas/Integer"
          description: The number of patches from the compliance standard that were installed successfully. The value can be an integer from 0 to 100000.
        MissingCount:
          $ref: "#/components/schemas/Integer"
          description: The number of patches that are part of the compliance standard but are not installed. The count includes patches that failed to install. The value can be an integer from 0 to 100000.
        FailedCount:
          $ref: "#/components/schemas/Integer"
          description: The number of patches from the compliance standard that failed to install. The value can be an integer from 0 to 100000.
        InstalledOtherCount:
          $ref: "#/components/schemas/Integer"
          description: The number of installed patches that are not part of the compliance standard. The value can be an integer from 0 to 100000.
        InstalledRejectedCount:
          $ref: "#/components/schemas/Integer"
          description: The number of patches that are installed but are also on a list of patches that the customer rejected. The value can be an integer from 0 to 100000.
        InstalledPendingReboot:
          $ref: "#/components/schemas/Integer"
          description: The number of patches that were applied, but that require the instance to be rebooted in order to be marked as installed. The value can be an integer from 0 to 100000.
        OperationStartTime:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the operation started. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        OperationEndTime:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the operation completed. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        RebootOption:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The reboot option specified for the instance. Length Constraints: Minimum length of 1. Maximum length of 256."
        Operation:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of patch operation performed. For Patch Manager, the values are SCAN and INSTALL. Length Constraints: Minimum length of 1. Maximum length of 256."
      required:
        - Id
    Action:
      description: "Provides details about one of the following actions that affects or that was taken on a resource: A remote IP address issued an Amazon Web Services API call A DNS request was received A remote IP address attempted to connect to an EC2 instance A remote IP address attempted a port probe on an EC2 instance"
      type: object
      properties:
        ActionType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of action that was detected. The possible action types are: NETWORK_CONNECTION AWS_API_CALL DNS_REQUEST PORT_PROBE"
        NetworkConnectionAction:
          $ref: "#/components/schemas/NetworkConnectionAction"
          description: Included if ActionType is NETWORK_CONNECTION. Provides details about the network connection that was detected.
        AwsApiCallAction:
          $ref: "#/components/schemas/AwsApiCallAction"
          description: Included if ActionType is AWS_API_CALL. Provides details about the API call that was detected.
        DnsRequestAction:
          $ref: "#/components/schemas/DnsRequestAction"
          description: Included if ActionType is DNS_REQUEST. Provides details about the DNS request that was detected.
        PortProbeAction:
          $ref: "#/components/schemas/PortProbeAction"
          description: Included if ActionType is PORT_PROBE. Provides details about the port probe that was detected.
    NetworkConnectionAction:
      description: Provided if ActionType is NETWORK_CONNECTION. It provides details about the attempted network connection that was detected.
      type: object
      properties:
        ConnectionDirection:
          $ref: "#/components/schemas/NonEmptyString"
          description: The direction of the network connection request (IN or OUT).
        RemoteIpDetails:
          $ref: "#/components/schemas/ActionRemoteIpDetails"
          description: Information about the remote IP address that issued the network connection request.
        RemotePortDetails:
          $ref: "#/components/schemas/ActionRemotePortDetails"
          description: Information about the port on the remote IP address.
        LocalPortDetails:
          $ref: "#/components/schemas/ActionLocalPortDetails"
          description: Information about the port on the EC2 instance.
        Protocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The protocol used to make the network connection request. Length Constraints: Minimum length of 1. Maximum length of 64."
        Blocked:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the network connection attempt was blocked.
    ActionRemoteIpDetails:
      description: For AwsApiAction, NetworkConnectionAction, and PortProbeAction, RemoteIpDetails provides information about the remote IP address that was involved in the action.
      type: object
      properties:
        IpAddressV4:
          $ref: "#/components/schemas/NonEmptyString"
          description: The IP address.
        Organization:
          $ref: "#/components/schemas/IpOrganizationDetails"
          description: The internet service provider (ISP) organization associated with the remote IP address.
        Country:
          $ref: "#/components/schemas/Country"
          description: The country where the remote IP address is located.
        City:
          $ref: "#/components/schemas/City"
          description: The city where the remote IP address is located.
        GeoLocation:
          $ref: "#/components/schemas/GeoLocation"
          description: The coordinates of the location of the remote IP address.
    IpOrganizationDetails:
      description: Provides information about an internet provider.
      type: object
      properties:
        Asn:
          $ref: "#/components/schemas/Integer"
          description: The Autonomous System Number (ASN) of the internet provider
        AsnOrg:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the organization that registered the ASN.
        Isp:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ISP information for the internet provider.
        Org:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the internet provider.
    Country:
      description: Information about a country.
      type: object
      properties:
        CountryCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: The 2-letter ISO 3166 country code for the country.
        CountryName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the country.
    City:
      description: Information about a city.
      type: object
      properties:
        CityName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the city.
    GeoLocation:
      description: Provides the latitude and longitude coordinates of a location.
      type: object
      properties:
        Lon:
          $ref: "#/components/schemas/Double"
          description: The longitude of the location.
        Lat:
          $ref: "#/components/schemas/Double"
          description: The latitude of the location.
    ActionRemotePortDetails:
      description: Provides information about the remote port that was involved in an attempted network connection.
      type: object
      properties:
        Port:
          $ref: "#/components/schemas/Integer"
          description: The number of the port.
        PortName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The port name of the remote connection. Length Constraints: 128."
    ActionLocalPortDetails:
      description: For NetworkConnectionAction and PortProbeDetails, LocalPortDetails provides information about the local port that was involved in the action.
      type: object
      properties:
        Port:
          $ref: "#/components/schemas/Integer"
          description: The number of the port.
        PortName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The port name of the local connection. Length Constraints: 128."
    AwsApiCallAction:
      description: Provided if ActionType is AWS_API_CALL. It provides details about the API call that was detected.
      type: object
      properties:
        Api:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the API method that was issued. Length Constraints: 128."
        ServiceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the Amazon Web Services service that the API method belongs to. Length Constraints: 128."
        CallerType:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates whether the API call originated from a remote IP address (remoteip) or from a DNS domain (domain).
        RemoteIpDetails:
          $ref: "#/components/schemas/ActionRemoteIpDetails"
          description: Provided if CallerType is remoteip. Provides information about the remote IP address that the API call originated from.
        DomainDetails:
          $ref: "#/components/schemas/AwsApiCallActionDomainDetails"
          description: Provided if CallerType is domain. Provides information about the DNS domain that the API call originated from.
        AffectedResources:
          type: object
          properties: {}
          description: Identifies the resources that were affected by the API call.
        FirstSeen:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that indicates when the API call was first observed. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        LastSeen:
          $ref: "#/components/schemas/NonEmptyString"
          description: A timestamp that indicates when the API call was most recently observed. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
    AwsApiCallActionDomainDetails:
      description: Provided if CallerType is domain. It provides information about the DNS domain that issued the API call.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The name of the DNS domain that issued the API call. Length Constraints: 128."
    DnsRequestAction:
      description: Provided if ActionType is DNS_REQUEST. It provides details about the DNS request that was detected.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The DNS domain that is associated with the DNS request. Length Constraints: 128."
        Protocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The protocol that was used for the DNS request. Length Constraints: Minimum length of 1. Maximum length of 64."
        Blocked:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the DNS request was blocked.
    PortProbeAction:
      description: Provided if ActionType is PORT_PROBE. It provides details about the attempted port probe that was detected.
      type: object
      properties:
        PortProbeDetails:
          $ref: "#/components/schemas/PortProbeDetailList"
          description: Information about the ports affected by the port probe.
        Blocked:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the port probe was blocked.
    PortProbeDetailList:
      type: array
      items:
        $ref: "#/components/schemas/PortProbeDetail"
    PortProbeDetail:
      description: A port scan that was part of the port probe. For each scan, PortProbeDetails provides information about the local IP address and port that were scanned, and the remote IP address that the scan originated from.
      type: object
      properties:
        LocalPortDetails:
          $ref: "#/components/schemas/ActionLocalPortDetails"
          description: Provides information about the port that was scanned.
        LocalIpDetails:
          $ref: "#/components/schemas/ActionLocalIpDetails"
          description: Provides information about the IP address where the scanned port is located.
        RemoteIpDetails:
          $ref: "#/components/schemas/ActionRemoteIpDetails"
          description: Provides information about the remote IP address that performed the scan.
    ActionLocalIpDetails:
      description: Provides information about the IP address where the scanned port is located.
      type: object
      properties:
        IpAddressV4:
          $ref: "#/components/schemas/NonEmptyString"
          description: The IP address.
    FindingProviderFields:
      description: "In a BatchImportFindings request, finding providers use FindingProviderFields to provide and update values for the following fields: Confidence Criticality RelatedFindings Severity Types The preceding fields are nested under the FindingProviderFields object, but also have analogues of the same name as top-level ASFF fields. When a new finding is sent to Security Hub CSPM by a finding provider, Security Hub CSPM populates the FindingProviderFields object automatically, if it is empty, based on the corresponding top-level fields. Finding providers can update FindingProviderFields only by using the BatchImportFindings operation. Finding providers can't update this object with the BatchUpdateFindings operation. Customers can update the top-level fields by using the BatchUpdateFindings operation. Customers can't update FindingProviderFields. For information about how Security Hub CSPM handles updates from BatchImportFindings to FindingProviderFields and to the corresponding top-level attributes, see Using FindingProviderFields in the Security Hub CSPM User Guide."
      type: object
      properties:
        Confidence:
          $ref: "#/components/schemas/RatioScale"
          description: A finding's confidence. Confidence is defined as the likelihood that a finding accurately identifies the behavior or issue that it was intended to identify. Confidence is scored on a 0-100 basis using a ratio scale, where 0 means zero percent confidence and 100 means 100 percent confidence.
        Criticality:
          $ref: "#/components/schemas/RatioScale"
          description: The level of importance assigned to the resources associated with the finding. A score of 0 means that the underlying resources have no criticality, and a score of 100 is reserved for the most critical resources.
        RelatedFindings:
          $ref: "#/components/schemas/RelatedFindingList"
          description: A list of findings that are related to the current finding.
        Severity:
          $ref: "#/components/schemas/FindingProviderSeverity"
          description: The severity of a finding.
        Types:
          $ref: "#/components/schemas/TypeList"
          description: "One or more finding types in the format of namespace/category/classifier that classify a finding. Valid namespace values are: Software and Configuration Checks | TTPs | Effects | Unusual Behaviors | Sensitive Data Identifications"
    FindingProviderSeverity:
      description: "The severity assigned to a finding by the finding provider. This object may include one or more of the following attributes: Label Normalized Original Product If a BatchImportFindings request for a new finding only provides Label or only provides Normalized, Security Hub CSPM automatically populates the value of the other field. The Normalized and Product attributes are included in the FindingProviderSeverity structure to preserve the historical information associated with the finding, even if the top-level Severity object is later modified using the BatchUpdateFindings operation. If the top-level Finding.Severity object is present, but Finding.FindingProviderFields isn't present, Security Hub CSPM creates the FindingProviderFields.Severity object and copies the entire Finding.Severity object into it. This ensures that the original, provider-supplied details are retained within the FindingProviderFields.Severity object, even if the top-level Severity object is overwritten."
      type: object
      properties:
        Label:
          $ref: "#/components/schemas/SeverityLabel"
          description: The severity label assigned to the finding by the finding provider.
        Original:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The finding provider's original value for the severity. Length Constraints: Minimum length of 1. Maximum length of 64."
    GeneratorDetails:
      description: Provides metadata for the Amazon CodeGuru detector associated with a finding. This field pertains to findings that relate to Lambda functions. Amazon Inspector identifies policy violations and vulnerabilities in Lambda function code based on internal detectors developed in collaboration with Amazon CodeGuru. Security Hub CSPM receives those findings.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the detector used to identify the code vulnerability.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the detector used to identify the code vulnerability.
        Labels:
          $ref: "#/components/schemas/TypeList"
          description: "An array of tags used to identify the detector associated with the finding. Array Members: Minimum number of 0 items. Maximum number of 10 items."
    Detection:
      description: A top-level object field that provides details about an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Sequence:
          $ref: "#/components/schemas/Sequence"
          description: Provides details about an attack sequence.
    Sequence:
      description: Contains information about an Amazon GuardDuty Extended Threat Detection attack sequence finding. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Unique identifier of the attack sequence.
        Actors:
          $ref: "#/components/schemas/ActorsList"
          description: Provides information about the actors involved in the attack sequence.
        Endpoints:
          $ref: "#/components/schemas/NetworkEndpointsList"
          description: Contains information about the network endpoints that were used in the attack sequence.
        Signals:
          $ref: "#/components/schemas/SignalsList"
          description: Contains information about the signals involved in the attack sequence.
        SequenceIndicators:
          $ref: "#/components/schemas/IndicatorsList"
          description: Contains information about the indicators observed in the attack sequence. The values for SignalIndicators are a subset of the values for SequenceIndicators, but the values for these fields don't always match 1:1.
    ActorsList:
      type: array
      items:
        $ref: "#/components/schemas/Actor"
    Actor:
      description: Information about the threat actor identified in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ID of the threat actor.
        User:
          $ref: "#/components/schemas/ActorUser"
          description: Contains information about the user credentials used by the threat actor.
        Session:
          $ref: "#/components/schemas/ActorSession"
          description: Contains information about the user session where the activity initiated.
    ActorUser:
      description: Contains information about the credentials used by the threat actor identified in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the threat actor.
        Uid:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the threat actor.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of user.
        CredentialUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Unique identifier of the threat actor’s user credentials.
        Account:
          $ref: "#/components/schemas/UserAccount"
          description: The account of the threat actor.
    UserAccount:
      description: Provides Amazon Web Services account information of the user involved in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier of the user account involved in the attack sequence.
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the user account involved in the attack sequence.
    ActorSession:
      description: Contains information about the authenticated session used by the threat actor identified in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Uid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Unique identifier of the session.
        MfaStatus:
          $ref: "#/components/schemas/ActorSessionMfaStatus"
          description: Indicates whether multi-factor authentication (MFA) was used for authentication during the session. In CloudTrail, you can find this value as userIdentity.sessionContext.attributes.mfaAuthenticated.
        CreatedTime:
          $ref: "#/components/schemas/Long"
          description: The timestamp for when the session was created. In CloudTrail, you can find this value as userIdentity.sessionContext.attributes.creationDate.
        Issuer:
          $ref: "#/components/schemas/NonEmptyString"
          description: The issuer of the session. In CloudTrail, you can find this value as userIdentity.sessionContext.sessionIssuer.arn.
    ActorSessionMfaStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    NetworkEndpointsList:
      type: array
      items:
        $ref: "#/components/schemas/NetworkEndpoint"
    NetworkEndpoint:
      description: Contains information about network endpoints involved in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide. This field can provide information about the network endpoints associated with the resource in the attack sequence finding, or about a specific network endpoint used for the attack.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the network endpoint involved in the attack sequence.
        Ip:
          $ref: "#/components/schemas/NonEmptyString"
          description: The IP address used in the network endpoint.
        Domain:
          $ref: "#/components/schemas/NonEmptyString"
          description: The domain information for the network endpoint.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The port number associated with the network endpoint.
        Location:
          $ref: "#/components/schemas/NetworkGeoLocation"
          description: Information about the location of the network endpoint.
        AutonomousSystem:
          $ref: "#/components/schemas/NetworkAutonomousSystem"
          description: The Autonomous System Number (ASN) of the network endpoint.
        Connection:
          $ref: "#/components/schemas/NetworkConnection"
          description: Information about the network connection.
    NetworkGeoLocation:
      description: Contains information about the location of a network endpoint involved in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        City:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the city.
        Country:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the country.
        Lat:
          $ref: "#/components/schemas/Double"
          description: The latitude information of the endpoint location.
        Lon:
          $ref: "#/components/schemas/Double"
          description: The longitude information of the endpoint location.
    NetworkAutonomousSystem:
      description: Contains information about the Autonomous System (AS) of the network endpoints involved in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name associated with the AS.
        Number:
          $ref: "#/components/schemas/Integer"
          description: The unique number that identifies the AS.
    NetworkConnection:
      description: Contains information about the network connection involved in an Amazon GuardDuty Extended Threat Detection attack sequence. GuardDuty generates an attack sequence finding when multiple events align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Direction:
          $ref: "#/components/schemas/ConnectionDirection"
          description: The direction in which the network traffic is flowing.
    ConnectionDirection:
      type: string
      enum:
        - INBOUND
        - OUTBOUND
    SignalsList:
      type: array
      items:
        $ref: "#/components/schemas/Signal"
    Signal:
      description: Contains information about the signals involved in an Amazon GuardDuty Extended Threat Detection attack sequence. An attack sequence is a type of threat detected by GuardDuty. GuardDuty generates an attack sequence finding when multiple events, or signals, align to a potentially suspicious activity. When GuardDuty and Security Hub CSPM are integrated, GuardDuty sends attack sequence findings to Security Hub CSPM. A signal can be an API activity or a finding that GuardDuty uses to detect an attack sequence finding.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of the signal used to identify an attack sequence. Signals can be GuardDuty findings or activities observed in data sources that GuardDuty monitors. For more information, see GuardDuty foundational data sources in the Amazon GuardDuty User Guide. A signal type can be one of the following values. Here are the related descriptions: FINDING - Individually generated GuardDuty finding. CLOUD_TRAIL - Activity observed from CloudTrail logs S3_DATA_EVENTS - Activity observed from CloudTrail data events for Amazon Simple Storage Service (S3). Activities associated with this type will show up only when you have enabled GuardDuty S3 Protection feature in your account. For more information about S3 Protection and the steps to enable it, see S3 Protection in the Amazon GuardDuty User Guide."
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the signal.
        Title:
          $ref: "#/components/schemas/NonEmptyString"
          description: The description of the GuardDuty finding.
        ProductArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the product that generated the signal.
        ResourceIds:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The ARN or ID of the Amazon Web Services resource associated with the signal.
        SignalIndicators:
          $ref: "#/components/schemas/IndicatorsList"
          description: Contains information about the indicators associated with the signals in this attack sequence finding. The values for SignalIndicators are a subset of the values for SequenceIndicators, but the values for these fields don't always match 1:1.
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the GuardDuty signal. For example, when signal type is FINDING, the signal name is the name of the finding.
        CreatedAt:
          $ref: "#/components/schemas/Long"
          description: The timestamp when the first finding or activity related to this signal was observed.
        UpdatedAt:
          $ref: "#/components/schemas/Long"
          description: The timestamp when this signal was last observed.
        FirstSeenAt:
          $ref: "#/components/schemas/Long"
          description: The timestamp when the first finding or activity related to this signal was observed.
        LastSeenAt:
          $ref: "#/components/schemas/Long"
          description: The timestamp when the last finding or activity related to this signal was observed.
        Severity:
          $ref: "#/components/schemas/Double"
          description: The severity associated with the signal. For more information about severity, see Severity levels for GuardDuty findings in the Amazon GuardDuty User Guide.
        Count:
          $ref: "#/components/schemas/Integer"
          description: The number of times this signal was observed.
        ActorIds:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The IDs of the threat actors involved in the signal.
        EndpointIds:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: Information about the endpoint IDs associated with this signal.
    IndicatorsList:
      type: array
      items:
        $ref: "#/components/schemas/Indicator"
    Indicator:
      description: Contains information about the indicators observed in an Amazon GuardDuty Extended Threat Detection attack sequence. Indicators include a set of signals, which can be API activities or findings that GuardDuty uses to detect an attack sequence finding. GuardDuty generates an attack sequence finding when multiple signals align to a potentially suspicious activity. To receive GuardDuty attack sequence findings in Security Hub CSPM, you must have GuardDuty and GuardDuty S3 Protection enabled. For more information, see GuardDuty Extended Threat Detection in the Amazon GuardDuty User Guide.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the indicator that’s present in the attack sequence finding.
        Values:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: Values associated with each indicator key. For example, if the indicator key is SUSPICIOUS_NETWORK, then the value will be the name of the network. If the indicator key is ATTACK_TACTIC, then the value will be one of the MITRE tactics.
        Title:
          $ref: "#/components/schemas/NonEmptyString"
          description: The title describing the indicator.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of indicator.
    BatchImportFindingsResponse:
      type: object
      properties:
        FailedCount:
          $ref: "#/components/schemas/Integer"
          description: The number of findings that failed to import.
        SuccessCount:
          $ref: "#/components/schemas/Integer"
          description: The number of findings that were successfully imported.
        FailedFindings:
          $ref: "#/components/schemas/ImportFindingsErrorList"
          description: The list of findings that failed to import.
      required:
        - FailedCount
        - SuccessCount
    ImportFindingsErrorList:
      type: array
      items:
        $ref: "#/components/schemas/ImportFindingsError"
    ImportFindingsError:
      description: The list of the findings that cannot be imported. For each finding, the list provides the error.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the finding that could not be updated.
        ErrorCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: The code of the error returned by the BatchImportFindings operation.
        ErrorMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: The message of the error returned by the BatchImportFindings operation.
      required:
        - Id
        - ErrorCode
        - ErrorMessage
    UpdateAutomationRulesRequestItemsList:
      type: array
      items:
        $ref: "#/components/schemas/UpdateAutomationRulesRequestItem"
    UpdateAutomationRulesRequestItem:
      description: Specifies the parameters to update in an existing automation rule.
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) for the rule.
        RuleStatus:
          $ref: "#/components/schemas/RuleStatus"
          description: Whether the rule is active after it is created. If this parameter is equal to ENABLED, Security Hub CSPM starts applying the rule to findings and finding updates after the rule is created. To change the value of this parameter after creating a rule, use BatchUpdateAutomationRules .
        RuleOrder:
          $ref: "#/components/schemas/RuleOrderValue"
          description: An integer ranging from 1 to 1000 that represents the order in which the rule action is applied to findings. Security Hub CSPM applies rules with lower values for this parameter first.
        Description:
          $ref: "#/components/schemas/NonEmptyString"
          description: A description of the rule.
        RuleName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the rule.
        IsTerminal:
          $ref: "#/components/schemas/Boolean"
          description: Specifies whether a rule is the last to be applied with respect to a finding that matches the rule criteria. This is useful when a finding matches the criteria for multiple rules, and each rule has different actions. If a rule is terminal, Security Hub CSPM applies the rule action to a finding that matches the rule criteria and doesn't evaluate other rules for the finding. By default, a rule isn't terminal.
        Criteria:
          $ref: "#/components/schemas/AutomationRulesFindingFilters"
          description: A set of ASFF finding field attributes and corresponding expected values that Security Hub CSPM uses to filter findings. If a rule is enabled and a finding matches the conditions specified in this parameter, Security Hub CSPM applies the rule action to the finding.
        Actions:
          $ref: "#/components/schemas/ActionList"
          description: One or more actions to update finding fields if a finding matches the conditions specified in Criteria.
      required:
        - RuleArn
    BatchUpdateAutomationRulesResponse:
      type: object
      properties:
        ProcessedAutomationRules:
          $ref: "#/components/schemas/AutomationRulesArnsList"
          description: A list of properly processed rule ARNs.
        UnprocessedAutomationRules:
          $ref: "#/components/schemas/UnprocessedAutomationRulesList"
          description: A list of objects containing RuleArn, ErrorCode, and ErrorMessage. This parameter tells you which automation rules the request didn't update and why.
    AwsSecurityFindingIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/AwsSecurityFindingIdentifier"
    AwsSecurityFindingIdentifier:
      description: Identifies which finding to get the finding history for.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the finding that was specified by the finding provider.
        ProductArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN generated by Security Hub CSPM that uniquely identifies a product that generates findings. This can be the ARN for a third-party product that is integrated with Security Hub CSPM, or the ARN for a custom integration.
      required:
        - Id
        - ProductArn
    FieldMap:
      type: object
      properties: {}
    BatchUpdateFindingsResponse:
      type: object
      properties:
        ProcessedFindings:
          $ref: "#/components/schemas/AwsSecurityFindingIdentifierList"
          description: The list of findings that were updated successfully.
        UnprocessedFindings:
          $ref: "#/components/schemas/BatchUpdateFindingsUnprocessedFindingsList"
          description: The list of findings that were not updated.
      required:
        - ProcessedFindings
        - UnprocessedFindings
    BatchUpdateFindingsUnprocessedFindingsList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateFindingsUnprocessedFinding"
    BatchUpdateFindingsUnprocessedFinding:
      description: A finding from a BatchUpdateFindings request that Security Hub CSPM was unable to update.
      type: object
      properties:
        FindingIdentifier:
          $ref: "#/components/schemas/AwsSecurityFindingIdentifier"
          description: The identifier of the finding that was not updated.
        ErrorCode:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The code associated with the error. Possible values are: ConcurrentUpdateError - Another request attempted to update the finding while this request was being processed. This error may also occur if you call BatchUpdateFindings and BatchImportFindings at the same time. DuplicatedFindingIdentifier - The request included two or more findings with the same FindingIdentifier. FindingNotFound - The FindingIdentifier included in the request did not match an existing finding. FindingSizeExceeded - The finding size was greater than the permissible value of 240 KB. InternalFailure - An internal service failure occurred when updating the finding. InvalidInput - The finding update contained an invalid value that did not satisfy the Amazon Web Services Security Finding Format syntax."
        ErrorMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The message associated with the error. Possible values are: Concurrent finding updates detected Finding Identifier is duplicated Finding Not Found Finding size exceeded 240 KB Internal service failure Invalid Input"
      required:
        - FindingIdentifier
        - ErrorCode
        - ErrorMessage
    MetadataUidList:
      type: array
      items:
        $ref: "#/components/schemas/NonEmptyString"
    OcsfFindingIdentifierList:
      type: array
      items:
        $ref: "#/components/schemas/OcsfFindingIdentifier"
    OcsfFindingIdentifier:
      description: Provides a standard to identify security findings using OCSF.
      type: object
      properties:
        CloudAccountUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Finding cloud.account.uid, which is a unique identifier in the Amazon Web Services account..
        FindingInfoUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Finding finding_info.uid, which is a unique identifier for the finding from the finding provider.
        MetadataProductUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: Finding metadata.product.uid, which is a unique identifier for the product.
      required:
        - CloudAccountUid
        - FindingInfoUid
        - MetadataProductUid
    BatchUpdateFindingsV2Response:
      type: object
      properties:
        ProcessedFindings:
          $ref: "#/components/schemas/BatchUpdateFindingsV2ProcessedFindingsList"
          description: The list of findings that were updated successfully.
        UnprocessedFindings:
          $ref: "#/components/schemas/BatchUpdateFindingsV2UnprocessedFindingsList"
          description: The list of V2 findings that were not updated.
      required:
        - ProcessedFindings
        - UnprocessedFindings
    BatchUpdateFindingsV2ProcessedFindingsList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateFindingsV2ProcessedFinding"
    BatchUpdateFindingsV2ProcessedFinding:
      description: The list of findings that were updated.
      type: object
      properties:
        FindingIdentifier:
          $ref: "#/components/schemas/OcsfFindingIdentifier"
          description: The finding identifier of a processed finding.
        MetadataUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: The metadata.uid of a processed finding.
    BatchUpdateFindingsV2UnprocessedFindingsList:
      type: array
      items:
        $ref: "#/components/schemas/BatchUpdateFindingsV2UnprocessedFinding"
    BatchUpdateFindingsV2UnprocessedFinding:
      description: The list of findings that were not updated.
      type: object
      properties:
        FindingIdentifier:
          $ref: "#/components/schemas/OcsfFindingIdentifier"
          description: The finding identifier of an unprocessed finding.
        MetadataUid:
          $ref: "#/components/schemas/NonEmptyString"
          description: The metadata.uid of an unprocessed finding.
        ErrorCode:
          $ref: "#/components/schemas/BatchUpdateFindingsV2UnprocessedFindingErrorCode"
          description: Indicates the specific type of error preventing successful processing of a finding during a batch update operation.
        ErrorMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: A detailed description of why a finding could not be processed during a batch update operation.
    BatchUpdateFindingsV2UnprocessedFindingErrorCode:
      type: string
      enum:
        - ResourceNotFoundException
        - ValidationException
        - InternalServerException
        - ConflictException
    StandardsControlAssociationUpdates:
      type: array
      items:
        $ref: "#/components/schemas/StandardsControlAssociationUpdate"
    StandardsControlAssociationUpdate:
      description: An array of requested updates to the enablement status of controls in specified standards. The objects in the array include a security control ID, the Amazon Resource Name (ARN) of the standard, the requested enablement status, and the reason for updating the enablement status.
      type: object
      properties:
        StandardsArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the standard in which you want to update the control's enablement status.
        SecurityControlId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier for the security control whose enablement status you want to update.
        AssociationStatus:
          $ref: "#/components/schemas/AssociationStatus"
          description: The desired enablement status of the control in the standard.
        UpdatedReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason for updating the control's enablement status in the standard.
      required:
        - StandardsArn
        - SecurityControlId
        - AssociationStatus
    BatchUpdateStandardsControlAssociationsResponse:
      type: object
      properties:
        UnprocessedAssociationUpdates:
          $ref: "#/components/schemas/UnprocessedStandardsControlAssociationUpdates"
          description: A security control (identified with SecurityControlId, SecurityControlArn, or a mix of both parameters) whose enablement status in a specified standard couldn't be updated.
    UnprocessedStandardsControlAssociationUpdates:
      type: array
      items:
        $ref: "#/components/schemas/UnprocessedStandardsControlAssociationUpdate"
    UnprocessedStandardsControlAssociationUpdate:
      description: Provides details about which control's enablement status could not be updated in a specified standard when calling the BatchUpdateStandardsControlAssociations API. This parameter also provides details about why the request was unprocessed.
      type: object
      properties:
        StandardsControlAssociationUpdate:
          $ref: "#/components/schemas/StandardsControlAssociationUpdate"
          description: An array of control and standard associations for which an update failed when calling BatchUpdateStandardsControlAssociations.
        ErrorCode:
          $ref: "#/components/schemas/UnprocessedErrorCode"
          description: The error code for the unprocessed update of the control's enablement status in the specified standard. The NOT_FOUND value has been deprecated and replaced by the RESOURCE_NOT_FOUND value.
        ErrorReason:
          $ref: "#/components/schemas/NonEmptyString"
          description: The reason why a control's enablement status in the specified standard couldn't be updated.
      required:
        - StandardsControlAssociationUpdate
        - ErrorCode
    CreateActionTargetResponse:
      type: object
      properties:
        ActionTargetArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) for the custom action target.
      required:
        - ActionTargetArn
    TagMap:
      type: object
      properties: {}
    ClientToken:
      type: string
      minLength: 1
      maxLength: 63
      pattern: ^[\x21-\x7E]{1,64}$
    CreateAggregatorV2Response:
      type: object
      properties:
        AggregatorV2Arn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the AggregatorV2.
        AggregationRegion:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Web Services Region where data is aggregated.
        RegionLinkingMode:
          $ref: "#/components/schemas/NonEmptyString"
          description: Determines how Regions are linked to an Aggregator V2.
        LinkedRegions:
          $ref: "#/components/schemas/StringList"
          description: The list of Regions that are linked to the aggregation Region.
    CreateAutomationRuleResponse:
      type: object
      properties:
        RuleArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of the automation rule that you created.
    RuleStatusV2:
      type: string
      enum:
        - ENABLED
        - DISABLED
    RuleOrderValueV2:
      type: number
      format: float
      minimum: 1
      maximum: 1000
    Criteria:
      description: Defines the parameters and conditions used to evaluate and filter security findings.
      type: object
      properties:
        OcsfFindingCriteria:
          $ref: "#/components/schemas/OcsfFindingFilters"
          description: The filtering conditions that align with OCSF standards.
    OcsfFindingFilters:
      description: Specifies the filtering criteria for security findings using OCSF.
      type: object
      properties:
        CompositeFilters:
          $ref: "#/components/schemas/CompositeFilterList"
          description: Enables the creation of complex filtering conditions by combining filter criteria.
