          $ref: "#/components/schemas/AwsElbLoadBalancerListener"
          description: Information about the listener.
        PolicyNames:
          $ref: "#/components/schemas/StringList"
          description: The policies enabled for the listener.
    AwsElbLoadBalancerListener:
      description: Information about a load balancer listener.
      type: object
      properties:
        InstancePort:
          $ref: "#/components/schemas/Integer"
          description: The port on which the instance is listening.
        InstanceProtocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The protocol to use to route traffic to instances. Valid values: HTTP | HTTPS | TCP | SSL"
        LoadBalancerPort:
          $ref: "#/components/schemas/Integer"
          description: "The port on which the load balancer is listening. On EC2-VPC, you can specify any port from the range 1-65535. On EC2-Classic, you can specify any port from the following list: 25, 80, 443, 465, 587, 1024-65535."
        Protocol:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The load balancer transport protocol to use for routing. Valid values: HTTP | HTTPS | TCP | SSL"
        SslCertificateId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the server certificate.
    AwsElbLoadBalancerAttributes:
      description: Contains attributes for the load balancer.
      type: object
      properties:
        AccessLog:
          $ref: "#/components/schemas/AwsElbLoadBalancerAccessLog"
          description: Information about the access log configuration for the load balancer. If the access log is enabled, the load balancer captures detailed information about all requests. It delivers the information to a specified S3 bucket.
        ConnectionDraining:
          $ref: "#/components/schemas/AwsElbLoadBalancerConnectionDraining"
          description: Information about the connection draining configuration for the load balancer. If connection draining is enabled, the load balancer allows existing requests to complete before it shifts traffic away from a deregistered or unhealthy instance.
        ConnectionSettings:
          $ref: "#/components/schemas/AwsElbLoadBalancerConnectionSettings"
          description: Connection settings for the load balancer. If an idle timeout is configured, the load balancer allows connections to remain idle for the specified duration. When a connection is idle, no data is sent over the connection.
        CrossZoneLoadBalancing:
          $ref: "#/components/schemas/AwsElbLoadBalancerCrossZoneLoadBalancing"
          description: Cross-zone load balancing settings for the load balancer. If cross-zone load balancing is enabled, the load balancer routes the request traffic evenly across all instances regardless of the Availability Zones.
        AdditionalAttributes:
          $ref: "#/components/schemas/AwsElbLoadBalancerAdditionalAttributeList"
          description: Any additional attributes for a load balancer.
    AwsElbLoadBalancerAccessLog:
      description: Contains information about the access log configuration for the load balancer.
      type: object
      properties:
        EmitInterval:
          $ref: "#/components/schemas/Integer"
          description: The interval in minutes for publishing the access logs. You can publish access logs either every 5 minutes or every 60 minutes.
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether access logs are enabled for the load balancer.
        S3BucketName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the S3 bucket where the access logs are stored.
        S3BucketPrefix:
          $ref: "#/components/schemas/NonEmptyString"
          description: The logical hierarchy that was created for the S3 bucket. If a prefix is not provided, the log is placed at the root level of the bucket.
    AwsElbLoadBalancerConnectionDraining:
      description: Contains information about the connection draining configuration for the load balancer.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether connection draining is enabled for the load balancer.
        Timeout:
          $ref: "#/components/schemas/Integer"
          description: The maximum time, in seconds, to keep the existing connections open before deregistering the instances.
    AwsElbLoadBalancerConnectionSettings:
      description: Contains connection settings for the load balancer.
      type: object
      properties:
        IdleTimeout:
          $ref: "#/components/schemas/Integer"
          description: The time, in seconds, that the connection can be idle (no data is sent over the connection) before it is closed by the load balancer.
    AwsElbLoadBalancerCrossZoneLoadBalancing:
      description: Contains cross-zone load balancing settings for the load balancer.
