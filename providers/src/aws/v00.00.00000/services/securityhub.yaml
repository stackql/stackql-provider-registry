        CdcStartTime:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates the start time for a CDC operation. CdcStartPosition or CCdcStartTime specifies when you want a CDC operation to start. Only a value for one of these fields is included.
        CdcStopPosition:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when you want a CDC operation to stop. The value can be either server time or commit time.
        MigrationType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The migration type.
        Id:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the replication task.
        ResourceIdentifier:
          $ref: "#/components/schemas/NonEmptyString"
          description: A display name for the resource identifier at the end of the EndpointArn response parameter. If you don't specify a ResourceIdentifier value, DMS generates a default identifier value for the end of EndpointArn.
        ReplicationInstanceArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Amazon Resource Name (ARN) of a replication instance.
        ReplicationTaskIdentifier:
          $ref: "#/components/schemas/NonEmptyString"
          description: The user-defined replication task identifier or name.
        ReplicationTaskSettings:
          $ref: "#/components/schemas/NonEmptyString"
          description: The settings for the replication task.
        SourceEndpointArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the source endpoint.
        TableMappings:
          $ref: "#/components/schemas/NonEmptyString"
          description: The table mappings for the replication task, in JSON format.
