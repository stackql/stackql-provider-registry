      description: Defines settings for a method for the stage.
      type: object
      properties:
        MetricsEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether CloudWatch metrics are enabled for the method.
        LoggingLevel:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The logging level for this method. The logging level affects the log entries that are pushed to CloudWatch Logs. If the logging level is ERROR, then the logs only include error-level entries. If the logging level is INFO, then the logs include both ERROR events and extra informational events. Valid values: OFF | ERROR | INFO"
        DataTraceEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether data trace logging is enabled for the method. Data trace logging affects the log entries that are pushed to CloudWatch Logs.
        ThrottlingBurstLimit:
          $ref: "#/components/schemas/Integer"
          description: The throttling burst limit for the method.
        ThrottlingRateLimit:
          $ref: "#/components/schemas/Double"
          description: The throttling rate limit for the method.
