        OriginReadTimeout:
          $ref: "#/components/schemas/Integer"
          description: Specifies how long, in seconds, CloudFront waits for a response from the origin.
        OriginSslProtocols:
          $ref: "#/components/schemas/AwsCloudFrontDistributionOriginSslProtocols"
