          description: The name of an IAM user.
        ResourceContainerName:
          $ref: "#/components/schemas/StringFilterList"
          description: The name of the container related to a finding.
        ResourceContainerImageId:
          $ref: "#/components/schemas/StringFilterList"
          description: The identifier of the image related to a finding.
        ResourceContainerImageName:
          $ref: "#/components/schemas/StringFilterList"
          description: The name of the image related to a finding.
        ResourceContainerLaunchedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: A timestamp that identifies when the container was started. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        ResourceDetailsOther:
          $ref: "#/components/schemas/MapFilterList"
          description: The details of a resource that doesn't have a specific subfield for the resource type defined.
        ComplianceStatus:
          $ref: "#/components/schemas/StringFilterList"
          description: Exclusive to findings that are generated as the result of a check run against a specific rule in a supported standard, such as CIS Amazon Web Services Foundations. Contains security standard-related finding details.
        VerificationState:
          $ref: "#/components/schemas/StringFilterList"
          description: The veracity of a finding.
        WorkflowState:
          $ref: "#/components/schemas/StringFilterList"
          description: The workflow state of a finding. Note that this field is deprecated. To search for a finding based on its workflow status, use WorkflowStatus.
        WorkflowStatus:
          $ref: "#/components/schemas/StringFilterList"
          description: "The status of the investigation into a finding. Allowed values are the following. NEW - The initial state of a finding, before it is reviewed. Security Hub CSPM also resets the workflow status from NOTIFIED or RESOLVED to NEW in the following cases: RecordState changes from ARCHIVED to ACTIVE. Compliance.Status changes from PASSED to either WARNING, FAILED, or NOT_AVAILABLE. NOTIFIED - Indicates that the resource owner has been notified about the security issue. Used when the initial reviewer is not the resource owner, and needs intervention from the resource owner. If one of the following occurs, the workflow status is changed automatically from NOTIFIED to NEW: RecordState changes from ARCHIVED to ACTIVE. Compliance.Status changes from PASSED to FAILED, WARNING, or NOT_AVAILABLE. SUPPRESSED - Indicates that you reviewed the finding and don't believe that any action is needed. The workflow status of a SUPPRESSED finding does not change if RecordState changes from ARCHIVED to ACTIVE. RESOLVED - The finding was reviewed and remediated and is now considered resolved. The finding remains RESOLVED unless one of the following occurs: RecordState changes from ARCHIVED to ACTIVE. Compliance.Status changes from PASSED to FAILED, WARNING, or NOT_AVAILABLE. In those cases, the workflow status is automatically reset to NEW. For findings from controls, if Compliance.Status is PASSED, then Security Hub CSPM automatically sets the workflow status to RESOLVED."
        RecordState:
          $ref: "#/components/schemas/StringFilterList"
          description: The updated record state for the finding.
        RelatedFindingsProductArn:
          $ref: "#/components/schemas/StringFilterList"
          description: The ARN of the solution that generated a related finding.
        RelatedFindingsId:
          $ref: "#/components/schemas/StringFilterList"
          description: The solution-generated identifier for a related finding.
        NoteText:
          $ref: "#/components/schemas/StringFilterList"
          description: The text of a note.
        NoteUpdatedAt:
          $ref: "#/components/schemas/DateFilterList"
          description: The timestamp of when the note was updated.
        NoteUpdatedBy:
          $ref: "#/components/schemas/StringFilterList"
          description: The principal that created a note.
        Keyword:
          $ref: "#/components/schemas/KeywordFilterList"
          description: A keyword for a finding.
        FindingProviderFieldsConfidence:
          $ref: "#/components/schemas/NumberFilterList"
          description: The finding provider value for the finding confidence. Confidence is defined as the likelihood that a finding accurately identifies the behavior or issue that it was intended to identify. Confidence is scored on a 0-100 basis using a ratio scale, where 0 means zero percent confidence and 100 means 100 percent confidence.
        FindingProviderFieldsCriticality:
          $ref: "#/components/schemas/NumberFilterList"
          description: The finding provider value for the level of importance assigned to the resources associated with the findings. A score of 0 means that the underlying resources have no criticality, and a score of 100 is reserved for the most critical resources.
        FindingProviderFieldsRelatedFindingsId:
          $ref: "#/components/schemas/StringFilterList"
          description: The finding identifier of a related finding that is identified by the finding provider.
        FindingProviderFieldsRelatedFindingsProductArn:
          $ref: "#/components/schemas/StringFilterList"
          description: The ARN of the solution that generated a related finding that is identified by the finding provider.
        FindingProviderFieldsSeverityLabel:
          $ref: "#/components/schemas/StringFilterList"
          description: The finding provider value for the severity label.
        FindingProviderFieldsSeverityOriginal:
          $ref: "#/components/schemas/StringFilterList"
          description: The finding provider's original value for the severity.
        FindingProviderFieldsTypes:
          $ref: "#/components/schemas/StringFilterList"
          description: "One or more finding types that the finding provider assigned to the finding. Uses the format of namespace/category/classifier that classify a finding. Valid namespace values are: Software and Configuration Checks | TTPs | Effects | Unusual Behaviors | Sensitive Data Identifications"
        Sample:
          $ref: "#/components/schemas/BooleanFilterList"
          description: Indicates whether or not sample findings are included in the filter results.
        ComplianceSecurityControlId:
          $ref: "#/components/schemas/StringFilterList"
          description: The unique identifier of a control across standards. Values for this field typically consist of an Amazon Web Services service and a number, such as APIGateway.5.
        ComplianceAssociatedStandardsId:
          $ref: "#/components/schemas/StringFilterList"
          description: The unique identifier of a standard in which a control is enabled. This field consists of the resource portion of the Amazon Resource Name (ARN) returned for a standard in the DescribeStandards API response.
        VulnerabilitiesExploitAvailable:
          $ref: "#/components/schemas/StringFilterList"
          description: Indicates whether a software vulnerability in your environment has a known exploit. You can filter findings by this field only if you use Security Hub CSPM and Amazon Inspector.
        VulnerabilitiesFixAvailable:
          $ref: "#/components/schemas/StringFilterList"
          description: Indicates whether a vulnerability is fixed in a newer version of the affected software packages. You can filter findings by this field only if you use Security Hub CSPM and Amazon Inspector.
        ComplianceSecurityControlParametersName:
          $ref: "#/components/schemas/StringFilterList"
          description: The name of a security control parameter.
        ComplianceSecurityControlParametersValue:
          $ref: "#/components/schemas/StringFilterList"
          description: The current value of a security control parameter.
        AwsAccountName:
          $ref: "#/components/schemas/StringFilterList"
          description: The name of the Amazon Web Services account in which a finding is generated.
        ResourceApplicationName:
          $ref: "#/components/schemas/StringFilterList"
          description: The name of the application that is related to a finding.
        ResourceApplicationArn:
          $ref: "#/components/schemas/StringFilterList"
          description: The ARN of the application that is related to a finding.
