        ImportedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates when the certificate was imported. Provided if the certificate type is IMPORTED. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        InUseBy:
          $ref: "#/components/schemas/StringList"
          description: The list of ARNs for the Amazon Web Services resources that use the certificate.
        IssuedAt:
          $ref: "#/components/schemas/NonEmptyString"
