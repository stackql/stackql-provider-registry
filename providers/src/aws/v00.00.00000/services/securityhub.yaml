          $ref: "#/components/schemas/Boolean"
          description: Specifies that an KMS key should be used for at-rest encryption. Set to true by default if no value is provided (for example, for RabbitMQ brokers).
    AwsAmazonMqBrokerLdapServerMetadataDetails:
      description: The metadata of the Lightweight Directory Access Protocol (LDAP) server used to authenticate and authorize connections to the broker. This is an optional failover server.
      type: object
      properties:
