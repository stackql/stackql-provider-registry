          $ref: "#/components/schemas/Integer"
          description: The minimum amount of the Auto Scaling group's capacity that must be fulfilled by On-Demand Instances.
        OnDemandPercentageAboveBaseCapacity:
          $ref: "#/components/schemas/Integer"
          description: The percentage of On-Demand Instances and Spot Instances for additional capacity beyond OnDemandBaseCapacity.
        SpotAllocationStrategy:
          $ref: "#/components/schemas/NonEmptyString"
          description: "How to allocate instances across Spot Instance pools. Valid values are as follows: lowest-price capacity-optimized capacity-optimized-prioritized"
        SpotInstancePools:
          $ref: "#/components/schemas/Integer"
          description: The number of Spot Instance pools across which to allocate your Spot Instances.
        SpotMaxPrice:
          $ref: "#/components/schemas/NonEmptyString"
          description: The maximum price per unit hour that you are willing to pay for a Spot Instance.
