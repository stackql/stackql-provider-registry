        PrivateIpAddresses:
          $ref: "#/components/schemas/AwsEc2LaunchTemplateDataNetworkInterfaceSetPrivateIpAddressesList"
          description: One or more private IPv4 addresses.
        SecondaryPrivateIpAddressCount:
