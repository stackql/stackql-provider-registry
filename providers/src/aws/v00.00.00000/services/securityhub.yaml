          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the alarm. If you don't specify a name, CloudFront generates a unique physical ID and uses that ID for the alarm name.
        ComparisonOperator:
          $ref: "#/components/schemas/NonEmptyString"
