    AwsEcsServiceCapacityProviderStrategyList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEcsServiceCapacityProviderStrategyDetails"
    AwsEcsServiceCapacityProviderStrategyDetails:
      description: Strategy item for the capacity provider strategy that the service uses.
      type: object
      properties:
        Base:
          $ref: "#/components/schemas/Integer"
          description: The minimum number of tasks to run on the capacity provider. Only one strategy item can specify a value for Base. The value must be between 0 and 100000.
        CapacityProvider:
          $ref: "#/components/schemas/NonEmptyString"
          description: The short name of the capacity provider.
        Weight:
          $ref: "#/components/schemas/Integer"
          description: The relative percentage of the total number of tasks that should use the capacity provider. If no weight is specified, the default value is 0. At least one capacity provider must have a weight greater than 0. The value can be between 0 and 1000.
    AwsEcsServiceDeploymentConfigurationDetails:
      description: Optional deployment parameters for the service.
      type: object
      properties:
        DeploymentCircuitBreaker:
          $ref: "#/components/schemas/AwsEcsServiceDeploymentConfigurationDeploymentCircuitBreakerDetails"
          description: Determines whether a service deployment fails if a service cannot reach a steady state.
        MaximumPercent:
          $ref: "#/components/schemas/Integer"
          description: For a service that uses the rolling update (ECS) deployment type, the maximum number of tasks in a service that are allowed in the RUNNING or PENDING state during a deployment, and for tasks that use the EC2 launch type, when any container instances are in the DRAINING state. Provided as a percentage of the desired number of tasks. The default value is 200%. For a service that uses the blue/green (CODE_DEPLOY) or EXTERNAL deployment types, and tasks that use the EC2 launch type, the maximum number of tasks in the service that remain in the RUNNING state while the container instances are in the DRAINING state. For the Fargate launch type, the maximum percent value is not used.
        MinimumHealthyPercent:
          $ref: "#/components/schemas/Integer"
          description: For a service that uses the rolling update (ECS) deployment type, the minimum number of tasks in a service that must remain in the RUNNING state during a deployment, and while any container instances are in the DRAINING state if the service contains tasks using the EC2 launch type. Expressed as a percentage of the desired number of tasks. The default value is 100%. For a service that uses the blue/green (CODE_DEPLOY) or EXTERNAL deployment types and tasks that use the EC2 launch type, the minimum number of the tasks in the service that remain in the RUNNING state while the container instances are in the DRAINING state. For the Fargate launch type, the minimum healthy percent value is not used.
    AwsEcsServiceDeploymentConfigurationDeploymentCircuitBreakerDetails:
      description: Determines whether a service deployment fails if a service cannot reach a steady state.
      type: object
      properties:
        Enable:
          $ref: "#/components/schemas/Boolean"
          description: Whether to enable the deployment circuit breaker logic for the service.
        Rollback:
          $ref: "#/components/schemas/Boolean"
          description: Whether to roll back the service if a service deployment fails. If rollback is enabled, when a service deployment fails, the service is rolled back to the last deployment that completed successfully.
    AwsEcsServiceDeploymentControllerDetails:
      description: Information about the deployment controller type that the service uses.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The rolling update (ECS) deployment type replaces the current running version of the container with the latest version. The blue/green (CODE_DEPLOY) deployment type uses the blue/green deployment model that is powered by CodeDeploy. This deployment model a new deployment of a service can be verified before production traffic is sent to it. The external (EXTERNAL) deployment type allows the use of any third-party deployment controller for full control over the deployment process for an Amazon ECS service. Valid values: ECS | CODE_DEPLOY | EXTERNAL"
    AwsEcsServiceLoadBalancersList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEcsServiceLoadBalancersDetails"
    AwsEcsServiceLoadBalancersDetails:
      description: Information about a load balancer that the service uses.
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the container to associate with the load balancer.
        ContainerPort:
          $ref: "#/components/schemas/Integer"
          description: The port on the container to associate with the load balancer. This port must correspond to a containerPort in the task definition the tasks in the service are using. For tasks that use the EC2 launch type, the container instance they are launched on must allow ingress traffic on the hostPort of the port mapping.
        LoadBalancerName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the load balancer to associate with the Amazon ECS service or task set. Only specified when using a Classic Load Balancer. For an Application Load Balancer or a Network Load Balancer, the load balancer name is omitted.
        TargetGroupArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the Elastic Load Balancing target group or groups associated with a service or task set. Only specified when using an Application Load Balancer or a Network Load Balancer. For a Classic Load Balancer, the target group ARN is omitted.
    AwsEcsServiceNetworkConfigurationDetails:
      description: For tasks that use the awsvpc networking mode, the VPC subnet and security group configuration.
      type: object
      properties:
        AwsVpcConfiguration:
          $ref: "#/components/schemas/AwsEcsServiceNetworkConfigurationAwsVpcConfigurationDetails"
          description: The VPC subnet and security group configuration.
    AwsEcsServiceNetworkConfigurationAwsVpcConfigurationDetails:
      description: For tasks that use the awsvpc networking mode, the VPC subnet and security group configuration.
      type: object
      properties:
        AssignPublicIp:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Whether the task's elastic network interface receives a public IP address. The default value is DISABLED. Valid values: ENABLED | DISABLED"
        SecurityGroups:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The IDs of the security groups associated with the task or service. You can provide up to five security groups.
        Subnets:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The IDs of the subnets associated with the task or service. You can provide up to 16 subnets.
    AwsEcsServicePlacementConstraintsList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEcsServicePlacementConstraintsDetails"
    AwsEcsServicePlacementConstraintsDetails:
      description: A placement constraint for the tasks in the service.
      type: object
      properties:
        Expression:
          $ref: "#/components/schemas/NonEmptyString"
          description: A cluster query language expression to apply to the constraint. You cannot specify an expression if the constraint type is distinctInstance.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of constraint. Use distinctInstance to run each task in a particular group on a different container instance. Use memberOf to restrict the selection to a group of valid candidates. Valid values: distinctInstance | memberOf"
    AwsEcsServicePlacementStrategiesList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEcsServicePlacementStrategiesDetails"
    AwsEcsServicePlacementStrategiesDetails:
      description: A placement strategy that determines how to place the tasks for the service.
      type: object
      properties:
        Field:
          $ref: "#/components/schemas/NonEmptyString"
          description: The field to apply the placement strategy against. For the spread placement strategy, valid values are instanceId (or host, which has the same effect), or any platform or custom attribute that is applied to a container instance, such as attribute:ecs.availability-zone. For the binpack placement strategy, valid values are cpu and memory. For the random placement strategy, this attribute is not used.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The type of placement strategy. The random placement strategy randomly places tasks on available candidates. The spread placement strategy spreads placement across available candidates evenly based on the value of Field. The binpack strategy places tasks on available candidates that have the least available amount of the resource that is specified in Field. Valid values: random | spread | binpack"
    AwsEcsServiceServiceRegistriesList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEcsServiceServiceRegistriesDetails"
    AwsEcsServiceServiceRegistriesDetails:
      description: Information about a service discovery registry to assign to the service.
      type: object
      properties:
        ContainerName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The container name value to use for the service discovery service. If the task definition uses the bridge or host network mode, you must specify ContainerName and ContainerPort. If the task definition uses the awsvpc network mode and a type SRV DNS record, you must specify either ContainerName and ContainerPort, or Port , but not both.
        ContainerPort:
          $ref: "#/components/schemas/Integer"
          description: The port value to use for the service discovery service. If the task definition uses the bridge or host network mode, you must specify ContainerName and ContainerPort. If the task definition uses the awsvpc network mode and a type SRV DNS record, you must specify either ContainerName and ContainerPort, or Port , but not both.
        Port:
          $ref: "#/components/schemas/Integer"
          description: The port value to use for a service discovery service that specifies an SRV record. This field can be used if both the awsvpcawsvpc network mode and SRV records are used.
        RegistryArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the service registry.
    AwsAutoScalingLaunchConfigurationDetails:
      description: Details about a launch configuration.
      type: object
      properties:
        AssociatePublicIpAddress:
          $ref: "#/components/schemas/Boolean"
          description: For Auto Scaling groups that run in a VPC, specifies whether to assign a public IP address to the group's instances.
        BlockDeviceMappings:
          $ref: "#/components/schemas/AwsAutoScalingLaunchConfigurationBlockDeviceMappingsList"
          description: Specifies the block devices for the instance.
        ClassicLinkVpcId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of a ClassicLink-enabled VPC that EC2-Classic instances are linked to.
        ClassicLinkVpcSecurityGroups:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The identifiers of one or more security groups for the VPC that is specified in ClassicLinkVPCId.
        CreatedTime:
          $ref: "#/components/schemas/NonEmptyString"
          description: The creation date and time for the launch configuration. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        EbsOptimized:
          $ref: "#/components/schemas/Boolean"
          description: Whether the launch configuration is optimized for Amazon EBS I/O.
        IamInstanceProfile:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name or the ARN of the instance profile associated with the IAM role for the instance. The instance profile contains the IAM role.
        ImageId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the Amazon Machine Image (AMI) that is used to launch EC2 instances.
        InstanceMonitoring:
          $ref: "#/components/schemas/AwsAutoScalingLaunchConfigurationInstanceMonitoringDetails"
          description: Indicates the type of monitoring for instances in the group.
        InstanceType:
          $ref: "#/components/schemas/NonEmptyString"
          description: The instance type for the instances.
        KernelId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the kernel associated with the AMI.
        KeyName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the key pair.
        LaunchConfigurationName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the launch configuration.
        PlacementTenancy:
          $ref: "#/components/schemas/NonEmptyString"
          description: The tenancy of the instance. An instance with dedicated tenancy runs on isolated, single-tenant hardware and can only be launched into a VPC.
        RamdiskId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the RAM disk associated with the AMI.
        SecurityGroups:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The security groups to assign to the instances in the Auto Scaling group.
        SpotPrice:
          $ref: "#/components/schemas/NonEmptyString"
          description: The maximum hourly price to be paid for any Spot Instance that is launched to fulfill the request.
        UserData:
          $ref: "#/components/schemas/NonEmptyString"
          description: The user data to make available to the launched EC2 instances. Must be base64-encoded text.
        MetadataOptions:
          $ref: "#/components/schemas/AwsAutoScalingLaunchConfigurationMetadataOptions"
          description: The metadata options for the instances.
    AwsAutoScalingLaunchConfigurationBlockDeviceMappingsList:
      type: array
      items:
        $ref: "#/components/schemas/AwsAutoScalingLaunchConfigurationBlockDeviceMappingsDetails"
    AwsAutoScalingLaunchConfigurationBlockDeviceMappingsDetails:
      description: A block device for the instance.
      type: object
      properties:
        DeviceName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The device name that is exposed to the EC2 instance. For example, /dev/sdh or xvdh.
        Ebs:
          $ref: "#/components/schemas/AwsAutoScalingLaunchConfigurationBlockDeviceMappingsEbsDetails"
          description: Parameters that are used to automatically set up Amazon EBS volumes when an instance is launched.
        NoDevice:
          $ref: "#/components/schemas/Boolean"
          description: Whether to suppress the device that is included in the block device mapping of the Amazon Machine Image (AMI). If NoDevice is true, then you cannot specify Ebs.>
        VirtualName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the virtual device (for example, ephemeral0). You can provide either VirtualName or Ebs, but not both.
    AwsAutoScalingLaunchConfigurationBlockDeviceMappingsEbsDetails:
      description: Parameters that are used to automatically set up EBS volumes when an instance is launched.
      type: object
      properties:
        DeleteOnTermination:
          $ref: "#/components/schemas/Boolean"
          description: Whether to delete the volume when the instance is terminated.
        Encrypted:
          $ref: "#/components/schemas/Boolean"
          description: Whether to encrypt the volume.
        Iops:
          $ref: "#/components/schemas/Integer"
          description: The number of input/output (I/O) operations per second (IOPS) to provision for the volume. Only supported for gp3 or io1 volumes. Required for io1 volumes. Not used with standard, gp2, st1, or sc1 volumes.
        SnapshotId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The snapshot ID of the volume to use. You must specify either VolumeSize or SnapshotId.
        VolumeSize:
          $ref: "#/components/schemas/Integer"
          description: "The volume size, in GiBs. The following are the supported volumes sizes for each volume type: gp2 and gp3: 1-16,384 io1: 4-16,384 st1 and sc1: 125-16,384 standard: 1-1,024 You must specify either SnapshotId or VolumeSize. If you specify both SnapshotId and VolumeSize, the volume size must be equal or greater than the size of the snapshot."
        VolumeType:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The volume type. Valid values are as follows: gp2 gp3 io1 sc1 st1 standard"
    AwsAutoScalingLaunchConfigurationInstanceMonitoringDetails:
      description: Information about the type of monitoring for instances in the group.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Boolean"
          description: If set to true, then instances in the group launch with detailed monitoring. If set to false, then instances in the group launch with basic monitoring.
    AwsAutoScalingLaunchConfigurationMetadataOptions:
      description: The metadata options for the instances.
      type: object
      properties:
        HttpEndpoint:
          $ref: "#/components/schemas/NonEmptyString"
          description: Enables or disables the HTTP metadata endpoint on your instances. By default, the metadata endpoint is enabled.
        HttpPutResponseHopLimit:
          $ref: "#/components/schemas/Integer"
          description: The HTTP PUT response hop limit for instance metadata requests. The larger the number, the further instance metadata requests can travel.
        HttpTokens:
          $ref: "#/components/schemas/NonEmptyString"
          description: Indicates whether token usage is required or optional for metadata requests. By default, token usage is optional.
    AwsEc2VpnConnectionDetails:
      description: Details about an Amazon EC2 VPN connection.
      type: object
      properties:
        VpnConnectionId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the VPN connection.
        State:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The current state of the VPN connection. Valid values are as follows: available deleted deleting pending"
        CustomerGatewayId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the customer gateway that is at your end of the VPN connection.
        CustomerGatewayConfiguration:
          $ref: "#/components/schemas/NonEmptyString"
          description: The configuration information for the VPN connection's customer gateway, in the native XML format.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: The type of VPN connection.
        VpnGatewayId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the virtual private gateway that is at the Amazon Web Services side of the VPN connection.
        Category:
          $ref: "#/components/schemas/NonEmptyString"
          description: The category of the VPN connection. VPN indicates an Amazon Web Services VPN connection. VPN-Classic indicates an Amazon Web Services Classic VPN connection.
        VgwTelemetry:
          $ref: "#/components/schemas/AwsEc2VpnConnectionVgwTelemetryList"
          description: Information about the VPN tunnel.
        Options:
          $ref: "#/components/schemas/AwsEc2VpnConnectionOptionsDetails"
          description: The VPN connection options.
        Routes:
          $ref: "#/components/schemas/AwsEc2VpnConnectionRoutesList"
          description: The static routes that are associated with the VPN connection.
        TransitGatewayId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier of the transit gateway that is associated with the VPN connection.
    AwsEc2VpnConnectionVgwTelemetryList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEc2VpnConnectionVgwTelemetryDetails"
    AwsEc2VpnConnectionVgwTelemetryDetails:
      description: Information about the VPN tunnel.
      type: object
      properties:
        AcceptedRouteCount:
          $ref: "#/components/schemas/Integer"
          description: The number of accepted routes.
        CertificateArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the VPN tunnel endpoint certificate.
        LastStatusChange:
          $ref: "#/components/schemas/NonEmptyString"
          description: The date and time of the last change in status. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
        OutsideIpAddress:
          $ref: "#/components/schemas/NonEmptyString"
          description: The Internet-routable IP address of the virtual private gateway's outside interface.
        Status:
          $ref: "#/components/schemas/NonEmptyString"
          description: The status of the VPN tunnel. Valid values are DOWN or UP.
        StatusMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: If an error occurs, a description of the error.
    AwsEc2VpnConnectionOptionsDetails:
      description: VPN connection options.
      type: object
      properties:
        StaticRoutesOnly:
          $ref: "#/components/schemas/Boolean"
          description: Whether the VPN connection uses static routes only.
        TunnelOptions:
          $ref: "#/components/schemas/AwsEc2VpnConnectionOptionsTunnelOptionsList"
          description: The VPN tunnel options.
    AwsEc2VpnConnectionOptionsTunnelOptionsList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEc2VpnConnectionOptionsTunnelOptionsDetails"
    AwsEc2VpnConnectionOptionsTunnelOptionsDetails:
      description: The VPN tunnel options.
      type: object
      properties:
        DpdTimeoutSeconds:
          $ref: "#/components/schemas/Integer"
          description: The number of seconds after which a Dead Peer Detection (DPD) timeout occurs.
        IkeVersions:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The Internet Key Exchange (IKE) versions that are permitted for the VPN tunnel.
        OutsideIpAddress:
          $ref: "#/components/schemas/NonEmptyString"
          description: The external IP address of the VPN tunnel.
        Phase1DhGroupNumbers:
          $ref: "#/components/schemas/IntegerList"
          description: The permitted Diffie-Hellman group numbers for the VPN tunnel for phase 1 IKE negotiations.
        Phase1EncryptionAlgorithms:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The permitted encryption algorithms for the VPN tunnel for phase 1 IKE negotiations.
        Phase1IntegrityAlgorithms:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The permitted integrity algorithms for the VPN tunnel for phase 1 IKE negotiations.
        Phase1LifetimeSeconds:
          $ref: "#/components/schemas/Integer"
          description: The lifetime for phase 1 of the IKE negotiation, in seconds.
        Phase2DhGroupNumbers:
          $ref: "#/components/schemas/IntegerList"
          description: The permitted Diffie-Hellman group numbers for the VPN tunnel for phase 2 IKE negotiations.
        Phase2EncryptionAlgorithms:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The permitted encryption algorithms for the VPN tunnel for phase 2 IKE negotiations.
        Phase2IntegrityAlgorithms:
          $ref: "#/components/schemas/NonEmptyStringList"
          description: The permitted integrity algorithms for the VPN tunnel for phase 2 IKE negotiations.
        Phase2LifetimeSeconds:
          $ref: "#/components/schemas/Integer"
          description: The lifetime for phase 2 of the IKE negotiation, in seconds.
        PreSharedKey:
          $ref: "#/components/schemas/NonEmptyString"
          description: The preshared key to establish initial authentication between the virtual private gateway and the customer gateway.
        RekeyFuzzPercentage:
          $ref: "#/components/schemas/Integer"
          description: The percentage of the rekey window, which is determined by RekeyMarginTimeSeconds during which the rekey time is randomly selected.
        RekeyMarginTimeSeconds:
          $ref: "#/components/schemas/Integer"
          description: The margin time, in seconds, before the phase 2 lifetime expires, during which the Amazon Web Services side of the VPN connection performs an IKE rekey.
        ReplayWindowSize:
          $ref: "#/components/schemas/Integer"
          description: The number of packets in an IKE replay window.
        TunnelInsideCidr:
          $ref: "#/components/schemas/NonEmptyString"
          description: The range of inside IPv4 addresses for the tunnel.
    IntegerList:
      type: array
      items:
        $ref: "#/components/schemas/Integer"
    AwsEc2VpnConnectionRoutesList:
      type: array
      items:
        $ref: "#/components/schemas/AwsEc2VpnConnectionRoutesDetails"
    AwsEc2VpnConnectionRoutesDetails:
      description: A static routes associated with the VPN connection.
      type: object
      properties:
        DestinationCidrBlock:
