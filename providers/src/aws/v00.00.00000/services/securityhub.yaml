        ImagePublishedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: The date and time when the image was pushed to the repository. For more information about the validation and formatting of timestamp fields in Security Hub CSPM, see Timestamps.
    AwsOpenSearchServiceDomainDetails:
