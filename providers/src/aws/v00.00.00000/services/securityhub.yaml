    DescribeHubResponse:
      type: object
      properties:
        HubArn:
          $ref: "#/components/schemas/NonEmptyString"
          description: The ARN of the Hub resource that was retrieved.
        SubscribedAt:
          $ref: "#/components/schemas/NonEmptyString"
          description: The date and time when Security Hub CSPM was enabled in the account.
        AutoEnableControls:
          $ref: "#/components/schemas/Boolean"
          description: Whether to automatically enable new controls when they are added to standards that are enabled. If set to true, then new controls for enabled standards are enabled automatically. If set to false, then new controls are not enabled. When you automatically enable new controls, you can interact with the controls in the console and programmatically immediately after release. However, automatically enabled controls have a temporary default status of DISABLED. It can take up to several days for Security Hub CSPM to process the control release and designate the control as ENABLED in your account. During the processing period, you can manually enable or disable a control, and Security Hub CSPM will maintain that designation regardless of whether you have AutoEnableControls set to true.
        ControlFindingGenerator:
          $ref: "#/components/schemas/ControlFindingGenerator"
          description: Specifies whether the calling account has consolidated control findings turned on. If the value for this field is set to SECURITY_CONTROL, Security Hub CSPM generates a single finding for a control check even when the check applies to multiple enabled standards. If the value for this field is set to STANDARD_CONTROL, Security Hub CSPM generates separate findings for a control check when the check applies to multiple enabled standards. The value for this field in a member account matches the value in the administrator account. For accounts that aren't part of an organization, the default value of this field is SECURITY_CONTROL if you enabled Security Hub CSPM on or after February 23, 2023.
    ControlFindingGenerator:
      type: string
      enum:
        - STANDARD_CONTROL
        - SECURITY_CONTROL
    DescribeOrganizationConfigurationResponse:
      type: object
      properties:
        AutoEnable:
          $ref: "#/components/schemas/Boolean"
          description: Whether to automatically enable Security Hub CSPM in new member accounts when they join the organization. If set to true, then Security Hub CSPM is automatically enabled in new accounts. If set to false, then Security Hub CSPM isn't enabled in new accounts automatically. The default value is false. If the ConfigurationType of your organization is set to CENTRAL, then this field is set to false and can't be changed in the home Region and linked Regions. However, in that case, the delegated administrator can create a configuration policy in which Security Hub CSPM is enabled and associate the policy with new organization accounts.
        MemberAccountLimitReached:
          $ref: "#/components/schemas/Boolean"
          description: Whether the maximum number of allowed member accounts are already associated with the Security Hub CSPM administrator account.
        AutoEnableStandards:
          $ref: "#/components/schemas/AutoEnableStandards"
          description: Whether to automatically enable Security Hub CSPM default standards in new member accounts when they join the organization. If equal to DEFAULT, then Security Hub CSPM default standards are automatically enabled for new member accounts. If equal to NONE, then default standards are not automatically enabled for new member accounts. The default value of this parameter is equal to DEFAULT. If the ConfigurationType of your organization is set to CENTRAL, then this field is set to NONE and can't be changed in the home Region and linked Regions. However, in that case, the delegated administrator can create a configuration policy in which specific security standards are enabled and associate the policy with new organization accounts.
        OrganizationConfiguration:
          $ref: "#/components/schemas/OrganizationConfiguration"
    AutoEnableStandards:
      type: string
      enum:
        - NONE
        - DEFAULT
    OrganizationConfiguration:
      description: Provides information about the way an organization is configured in Security Hub CSPM.
      type: object
      properties:
        ConfigurationType:
          $ref: "#/components/schemas/OrganizationConfigurationConfigurationType"
          description: Indicates whether the organization uses local or central configuration. If you use local configuration, the Security Hub CSPM delegated administrator can set AutoEnable to true and AutoEnableStandards to DEFAULT. This automatically enables Security Hub CSPM and default security standards in new organization accounts. These new account settings must be set separately in each Amazon Web Services Region, and settings may be different in each Region. If you use central configuration, the delegated administrator can create configuration policies. Configuration policies can be used to configure Security Hub CSPM, security standards, and security controls in multiple accounts and Regions. If you want new organization accounts to use a specific configuration, you can create a configuration policy and associate it with the root or specific organizational units (OUs). New accounts will inherit the policy from the root or their assigned OU.
        Status:
          $ref: "#/components/schemas/OrganizationConfigurationStatus"
          description: Describes whether central configuration could be enabled as the ConfigurationType for the organization. If your ConfigurationType is local configuration, then the value of Status is always ENABLED.
        StatusMessage:
          $ref: "#/components/schemas/NonEmptyString"
          description: Provides an explanation if the value of Status is equal to FAILED when ConfigurationType is equal to CENTRAL.
    OrganizationConfigurationConfigurationType:
      type: string
      enum:
        - CENTRAL
        - LOCAL
    OrganizationConfigurationStatus:
      type: string
      enum:
        - PENDING
        - ENABLED
        - FAILED
