    AwsWafWebAclDetails:
      description: Provides information about an WAF web access control list (web ACL).
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/NonEmptyString"
          description: A friendly name or description of the web ACL. You can't change the name of a web ACL after you create it.
        DefaultAction:
          $ref: "#/components/schemas/NonEmptyString"
          description: The action to perform if none of the rules contained in the web ACL match.
        Rules:
          $ref: "#/components/schemas/AwsWafWebAclRuleList"
          description: An array that contains the action for each rule in a web ACL, the priority of the rule, and the ID of the rule.
        WebAclId:
          $ref: "#/components/schemas/NonEmptyString"
          description: A unique identifier for a web ACL.
    AwsWafWebAclRuleList:
      type: array
      items:
        $ref: "#/components/schemas/AwsWafWebAclRule"
    AwsWafWebAclRule:
      description: Details for a rule in an WAF web ACL.
      type: object
      properties:
        Action:
          $ref: "#/components/schemas/WafAction"
          description: Specifies the action that CloudFront or WAF takes when a web request matches the conditions in the rule.
        ExcludedRules:
          $ref: "#/components/schemas/WafExcludedRuleList"
          description: Rules to exclude from a rule group.
        OverrideAction:
          $ref: "#/components/schemas/WafOverrideAction"
          description: Use the OverrideAction to test your RuleGroup. Any rule in a RuleGroup can potentially block a request. If you set the OverrideAction to None, the RuleGroup blocks a request if any individual rule in the RuleGroup matches the request and is configured to block that request. However, if you first want to test the RuleGroup, set the OverrideAction to Count. The RuleGroup then overrides any block action specified by individual rules contained within the group. Instead of blocking matching requests, those requests are counted. ActivatedRule|OverrideAction applies only when updating or adding a RuleGroup to a web ACL. In this case you don't use ActivatedRule Action. For all other update requests, ActivatedRule Action is used instead of ActivatedRule OverrideAction.
        Priority:
          $ref: "#/components/schemas/Integer"
          description: Specifies the order in which the rules in a web ACL are evaluated. Rules with a lower value for Priority are evaluated before rules with a higher value. The value must be a unique integer. If you add multiple rules to a web ACL, the values don't need to be consecutive.
        RuleId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The identifier for a rule.
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "The rule type. Valid values: REGULAR | RATE_BASED | GROUP The default is REGULAR."
    WafAction:
      description: Details about the action that CloudFront or WAF takes when a web request matches the conditions in the rule.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: "Specifies how you want WAF to respond to requests that match the settings in a rule. Valid settings include the following: ALLOW - WAF allows requests BLOCK - WAF blocks requests COUNT - WAF increments a counter of the requests that match all of the conditions in the rule. WAF then continues to inspect the web request based on the remaining rules in the web ACL. You can't specify COUNT for the default action for a web ACL."
    WafExcludedRuleList:
      type: array
      items:
        $ref: "#/components/schemas/WafExcludedRule"
    WafExcludedRule:
      description: Details about a rule to exclude from a rule group.
      type: object
      properties:
        RuleId:
          $ref: "#/components/schemas/NonEmptyString"
          description: The unique identifier for the rule to exclude from the rule group.
    WafOverrideAction:
      description: Details about an override action for a rule.
      type: object
      properties:
        Type:
          $ref: "#/components/schemas/NonEmptyString"
          description: COUNT overrides the action specified by the individual rule within a RuleGroup . If set to NONE, the rule's action takes place.
    AwsRdsDbSnapshotDetails:
