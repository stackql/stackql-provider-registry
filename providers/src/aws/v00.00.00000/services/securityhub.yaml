        HttpMethod:
          $ref: "#/components/schemas/NonEmptyString"
          description: The HTTP method. You can use an asterisk (*) as a wildcard to apply method settings to multiple methods.
        ResourcePath:
          $ref: "#/components/schemas/NonEmptyString"
          description: The resource path for this method. Forward slashes (/) are encoded as ~1 . The initial slash must include a forward slash. For example, the path value /resource/subresource must be encoded as /~1resource~1subresource. To specify the root path, use only a slash (/). You can use an asterisk (*) as a wildcard to apply method settings to multiple methods.
