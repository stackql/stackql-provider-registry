        MaintenanceTrackName:
          $ref: "#/components/schemas/NonEmptyString"
          description: The name of the maintenance track for the cluster.
        ManualSnapshotRetentionPeriod:
          $ref: "#/components/schemas/Integer"
          description: "The default number of days to retain a manual snapshot. If the value is -1, the snapshot is retained indefinitely. This setting doesn't change the retention period of existing snapshots. Valid values: Either -1 or an integer between 1 and 3,653"
        MasterUsername:
          $ref: "#/components/schemas/NonEmptyString"
          description: The master user name for the cluster. This name is used to connect to the database that is specified in as the value of DBName.
        NextMaintenanceWindowStartTime:
