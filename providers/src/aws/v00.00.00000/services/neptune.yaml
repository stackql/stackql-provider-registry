    DBClusterDisplay:
      type: object
      properties:
        AllocatedStorage:
          type: integer
          description: AllocatedStorage always returns 1, because Neptune DB cluster storage size is not fixed, but instead automatically adjusts as needed.
        AvailabilityZones:
          type: string
          description: Provides the list of EC2 Availability Zones that instances in the DB cluster can be created in.
        BackupRetentionPeriod:
          type: integer
          description: Specifies the number of days for which automatic DB snapshots are retained.
        CharacterSetName:
          type: string
          description: Not supported by Neptune.
        DatabaseName:
          type: string
          description: Contains the name of the initial database of this DB cluster that was provided at create time, if one was specified when the DB cluster was created. This same name is returned for the life of the DB cluster.
        DBClusterIdentifier:
          type: string
          description: Contains a user-supplied DB cluster identifier. This identifier is the unique key that identifies a DB cluster.
        DBClusterParameterGroup:
          type: string
          description: Specifies the name of the DB cluster parameter group for the DB cluster.
        DBSubnetGroup:
          type: string
          description: Specifies information on the subnet group associated with the DB cluster, including the name, description, and subnets in the subnet group.
        Status:
          type: string
          description: Specifies the current state of this DB cluster.
        PercentProgress:
          type: string
          description: Specifies the progress of the operation as a percentage.
        EarliestRestorableTime:
          type: string
          description: Specifies the earliest time to which a database can be restored with point-in-time restore.
        Endpoint:
          type: string
          description: Specifies the connection endpoint for the primary instance of the DB cluster.
        ReaderEndpoint:
          type: string
          description: The reader endpoint for the DB cluster. The reader endpoint for a DB cluster load-balances connections across the Read Replicas that are available in a DB cluster. As clients request new connections to the reader endpoint, Neptune distributes the connection requests among the Read Replicas in the DB cluster. This functionality can help balance your read workload across multiple Read Replicas in your DB cluster. If a failover occurs, and the Read Replica that you are connected to is promoted to be the primary instance, your connection is dropped. To continue sending your read workload to other Read Replicas in the cluster, you can then reconnect to the reader endpoint.
        MultiAZ:
          type: boolean
          description: Specifies whether the DB cluster has instances in multiple Availability Zones.
        Engine:
          type: string
          description: Provides the name of the database engine to be used for this DB cluster.
        EngineVersion:
          type: string
          description: Indicates the database engine version.
        LatestRestorableTime:
          type: string
          description: Specifies the latest time to which a database can be restored with point-in-time restore.
        Port:
          type: integer
          description: Specifies the port that the database engine is listening on.
        MasterUsername:
          type: string
          description: Not supported by Neptune.
        DBClusterOptionGroupMemberships:
          type: string
          description: Not supported by Neptune.
        PreferredBackupWindow:
          type: string
          description: Specifies the daily time range during which automated backups are created if automated backups are enabled, as determined by the BackupRetentionPeriod.
        PreferredMaintenanceWindow:
          type: string
          description: Specifies the weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC).
        ReplicationSourceIdentifier:
          type: string
          description: Not supported by Neptune.
        ReadReplicaIdentifiers:
          type: string
          description: Contains one or more identifiers of the Read Replicas associated with this DB cluster.
        DBClusterMembers:
          type: string
          description: Provides the list of instances that make up the DB cluster.
        VpcSecurityGroups:
          type: string
          description: Provides a list of VPC security groups that the DB cluster belongs to.
        HostedZoneId:
          type: string
          description: Specifies the ID that Amazon Route 53 assigns when you create a hosted zone.
        StorageEncrypted:
          type: boolean
          description: Specifies whether the DB cluster is encrypted.
        KmsKeyId:
          type: string
          description: If StorageEncrypted is true, the Amazon KMS key identifier for the encrypted DB cluster.
        DbClusterResourceId:
          type: string
          description: The Amazon Region-unique, immutable identifier for the DB cluster. This identifier is found in Amazon CloudTrail log entries whenever the Amazon KMS key for the DB cluster is accessed.
        DBClusterArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB cluster.
        AssociatedRoles:
          type: string
          description: Provides a list of the Amazon Identity and Access Management (IAM) roles that are associated with the DB cluster. IAM roles that are associated with a DB cluster grant permission for the DB cluster to access other Amazon services on your behalf.
        IAMDatabaseAuthenticationEnabled:
          type: boolean
          description: True if mapping of Amazon Identity and Access Management (IAM) accounts to database accounts is enabled, and otherwise false.
        CloneGroupId:
          type: string
          description: Identifies the clone group to which the DB cluster is associated.
        ClusterCreateTime:
          type: string
          description: Specifies the time when the DB cluster was created, in Universal Coordinated Time (UTC).
        CopyTagsToSnapshot:
          type: boolean
          description: If set to true, tags are copied to any snapshot of the DB cluster that is created.
        EnabledCloudwatchLogsExports:
          type: string
          description: "A list of the log types that this DB cluster is configured to export to CloudWatch Logs. Valid log types are: audit (to publish audit logs to CloudWatch) and slowquery (to publish slow-query logs to CloudWatch). See Publishing Neptune logs to Amazon CloudWatch logs."
        PendingModifiedValues:
          type: string
          description: This data type is used as a response element in the ModifyDBCluster operation and contains changes that will be applied during the next maintenance window.
        DeletionProtection:
          type: boolean
          description: Indicates whether or not the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled.
        CrossAccountClone:
          type: boolean
          description: If set to true, the DB cluster can be cloned across accounts.
        AutomaticRestartTime:
          type: string
          description: Time at which the DB cluster will be automatically restarted.
        ServerlessV2ScalingConfiguration:
          type: string
          description: Shows the scaling configuration for a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
        GlobalClusterIdentifier:
          type: string
          description: Contains a user-supplied global database cluster identifier. This identifier is the unique key that identifies a global database.
        IOOptimizedNextAllowedModificationTime:
          type: string
          description: The next time you can modify the DB cluster to use the iopt1 storage type.
        StorageType:
          type: string
          description: "The storage type used by the DB cluster. Valid Values: standard – ( the default ) Provides cost-effective database storage for applications with moderate to small I/O usage. iopt1 – Enables I/O-Optimized storage that's designed to meet the needs of I/O-intensive graph workloads that require predictable pricing with low I/O latency and consistent I/O throughput. Neptune I/O-Optimized storage is only available starting with engine release 1.3.0.0."
    CreateDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    CreateDBClusterMessage:
      type: object
      properties:
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: A list of EC2 Availability Zones that instances in the DB cluster can be created in.
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35"
        CharacterSetName:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: If set to true, tags are copied to any snapshot of the DB cluster that is created.
        DatabaseName:
          $ref: "#/components/schemas/String"
          description: The name for your database of up to 64 alpha-numeric characters. If you do not provide a name, Amazon Neptune will not create a database in the DB cluster you are creating.
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The DB cluster identifier. This parameter is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster1"
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with this DB cluster. If this argument is omitted, the default is used. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of EC2 VPC security groups to associate with this DB cluster.
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "A DB subnet group to associate with this DB cluster. Constraints: Must match the name of an existing DBSubnetGroup. Must not be default. Example: mySubnetgroup"
        Engine:
          $ref: "#/components/schemas/String"
          description: "The name of the database engine to be used for this DB cluster. Valid Values: neptune"
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: "The version number of the database engine to use for the new DB cluster. Example: 1.2.1.0"
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the instances in the DB cluster accept connections. Default: 8182"
        MasterUsername:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        MasterUserPassword:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region. To see the time blocks available, see Neptune Maintenance Window in the Amazon Neptune User Guide. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region, occurring on a random day of the week. To see the time blocks available, see Neptune Maintenance Window in the Amazon Neptune User Guide. Valid Days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Constraints: Minimum 30-minute window."
        ReplicationSourceIdentifier:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the source DB instance or DB cluster if this DB cluster is created as a Read Replica.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to assign to the new DB cluster.
        StorageEncrypted:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB cluster is encrypted.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon KMS key identifier for an encrypted DB cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are creating a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. If an encryption key is not specified in KmsKeyId: If ReplicationSourceIdentifier identifies an encrypted source, then Amazon Neptune will use the encryption key used to encrypt the source. Otherwise, Amazon Neptune will use your default encryption key. If the StorageEncrypted parameter is true and ReplicationSourceIdentifier is not specified, then Amazon Neptune will use your default encryption key. Amazon KMS creates the default encryption key for your Amazon account. Your Amazon account has a different default encryption key for each Amazon Region. If you create a Read Replica of an encrypted DB cluster in another Amazon Region, you must set KmsKeyId to a KMS key ID that is valid in the destination Amazon Region. This key is used to encrypt the Read Replica in that Amazon Region."
        PreSignedUrl:
          $ref: "#/components/schemas/String"
          description: This parameter is not currently supported.
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "If set to true, enables Amazon Identity and Access Management (IAM) authentication for the entire DB cluster (this cannot be set at an instance level). Default: false."
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: "A list of the log types that this DB cluster should export to CloudWatch Logs. Valid log types are: audit (to publish audit logs) and slowquery (to publish slow-query logs). See Publishing Neptune logs to Amazon CloudWatch logs."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is enabled.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: The ID of the Neptune global database to which this new DB cluster should be added.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "The storage type for the new DB cluster. Valid Values: standard – ( the default ) Configures cost-effective database storage for applications with moderate to small I/O usage. When set to standard, the storage type is not returned in the response. iopt1 – Enables I/O-Optimized storage that's designed to meet the needs of I/O-intensive graph workloads that require predictable pricing with low I/O latency and consistent I/O throughput. Neptune I/O-Optimized storage is only available starting with engine release 1.3.0.0."
      required:
        - DBClusterIdentifier
        - Engine
