  /?Action=SwitchoverGlobalCluster&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_SwitchoverGlobalCluster
      description: Switches over the specified secondary DB cluster to be the new primary DB cluster in the global database cluster. Switchover operations were previously called "managed planned failovers." Promotes the specified secondary cluster to assume full read/write capabilities and demotes the current primary cluster to a secondary (read-only) cluster, maintaining the original replication topology. All secondary clusters are synchronized with the primary at the beginning of the process so the new primary continues operations for the global database without losing any data. Your database is unavailable for a short time while the primary and selected secondary clusters are assuming their new roles. This operation is intended for controlled environments, for operations such as "regional rotation" or to fall back to the original primary after a global database failover.
      parameters:
        - name: GlobalClusterIdentifier
          in: query
          required: true
          description: "The identifier of the global database cluster to switch over. This parameter isn't case-sensitive. Constraints: Must match the identifier of an existing global database cluster."
          schema:
            $ref: "#/components/schemas/GlobalClusterIdentifier"
        - name: TargetDbClusterIdentifier
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the secondary Neptune DB cluster that you want to promote to primary for the global database.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SwitchoverGlobalClusterOutputDisplay"
    post:
      operationId: POST_SwitchoverGlobalCluster
      description: Switches over the specified secondary DB cluster to be the new primary DB cluster in the global database cluster. Switchover operations were previously called "managed planned failovers." Promotes the specified secondary cluster to assume full read/write capabilities and demotes the current primary cluster to a secondary (read-only) cluster, maintaining the original replication topology. All secondary clusters are synchronized with the primary at the beginning of the process so the new primary continues operations for the global database without losing any data. Your database is unavailable for a short time while the primary and selected secondary clusters are assuming their new roles. This operation is intended for controlled environments, for operations such as "regional rotation" or to fall back to the original primary after a global database failover.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/SwitchoverGlobalClusterOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/SwitchoverGlobalClusterMessage"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    String:
      type: string
    AddRoleToDBClusterMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The name of the DB cluster to associate the IAM role with.
        RoleArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the IAM role to associate with the Neptune DB cluster, for example arn:aws:iam::123456789012:role/NeptuneAccessRole.
        FeatureName:
          $ref: "#/components/schemas/String"
          description: The name of the feature for the Neptune DB cluster that the IAM role is to be associated with. For the list of supported feature names, see DBEngineVersion.
      required:
        - DBClusterIdentifier
        - RoleArn
    EventSubscriptionDisplay:
      type: object
      properties:
        CustomerAwsId:
          type: string
          description: The Amazon customer account associated with the event notification subscription.
        CustSubscriptionId:
          type: string
          description: The event notification subscription Id.
        SnsTopicArn:
          type: string
          description: The topic ARN of the event notification subscription.
        Status:
          type: string
          description: 'The status of the event notification subscription. Constraints: Can be one of the following: creating | modifying | deleting | active | no-permission | topic-not-exist The status "no-permission" indicates that Neptune no longer has permission to post to the SNS topic. The status "topic-not-exist" indicates that the topic was deleted after the subscription was created.'
        SubscriptionCreationTime:
          type: string
          description: The time the event notification subscription was created.
        SourceType:
          type: string
          description: The source type for the event notification subscription.
        SourceIdsList:
          type: string
          description: A list of source IDs for the event notification subscription.
        EventCategoriesList:
          type: string
          description: A list of event categories for the event notification subscription.
        Enabled:
          type: boolean
          description: A Boolean value indicating if the subscription is enabled. True indicates the subscription is enabled.
        EventSubscriptionArn:
          type: string
          description: The Amazon Resource Name (ARN) for the event subscription.
    AddSourceIdentifierToSubscriptionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/EventSubscriptionDisplay"
    AddSourceIdentifierToSubscriptionMessage:
      type: object
      properties:
        SubscriptionName:
          $ref: "#/components/schemas/String"
          description: The name of the event notification subscription you want to add a source identifier to.
        SourceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the event source to be added. Constraints: If the source type is a DB instance, then a DBInstanceIdentifier must be supplied. If the source type is a DB security group, a DBSecurityGroupName must be supplied. If the source type is a DB parameter group, a DBParameterGroupName must be supplied. If the source type is a DB snapshot, a DBSnapshotIdentifier must be supplied."
      required:
        - SubscriptionName
        - SourceIdentifier
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to an Amazon Neptune resource consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: "A key is the required name of the tag. The string value can be from 1 to 128 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          $ref: "#/components/schemas/String"
          description: "A value is the optional value of the tag. The string value can be from 1 to 256 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
    AddTagsToResourceMessage:
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/String"
          description: The Amazon Neptune resource that the tags are added to. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an Amazon Resource Name (ARN).
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the Amazon Neptune resource.
      required:
        - ResourceName
        - Tags
    ResourcePendingMaintenanceActionsDisplay:
      type: object
      properties:
        ResourceIdentifier:
          type: string
          description: The ARN of the resource that has pending maintenance actions.
        PendingMaintenanceActionDetails:
          type: string
          description: A list that provides details about the pending maintenance actions for the resource.
    ApplyPendingMaintenanceActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ResourcePendingMaintenanceActionsDisplay"
    ApplyPendingMaintenanceActionMessage:
      type: object
      properties:
        ResourceIdentifier:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that the pending maintenance action applies to. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN).
        ApplyAction:
          $ref: "#/components/schemas/String"
          description: "The pending maintenance action to apply to this resource. Valid values: system-update, db-upgrade"
        OptInType:
          $ref: "#/components/schemas/String"
          description: "A value that specifies the type of opt-in request, or undoes an opt-in request. An opt-in request of type immediate can't be undone. Valid values: immediate - Apply the maintenance action immediately. next-maintenance - Apply the maintenance action during the next maintenance window for the resource. undo-opt-in - Cancel any existing next-maintenance opt-in requests."
      required:
        - ResourceIdentifier
        - ApplyAction
        - OptInType
    DBClusterParameterGroupDisplay:
      type: object
      properties:
        DBClusterParameterGroupName:
          type: string
          description: Provides the name of the DB cluster parameter group.
        DBParameterGroupFamily:
          type: string
          description: Provides the name of the DB parameter group family that this DB cluster parameter group is compatible with.
        Description:
          type: string
          description: Provides the customer-specified description for this DB cluster parameter group.
        DBClusterParameterGroupArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB cluster parameter group.
    CopyDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupDisplay"
    CopyDBClusterParameterGroupMessage:
      type: object
      properties:
        SourceDBClusterParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier or Amazon Resource Name (ARN) for the source DB cluster parameter group. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN). Constraints: Must specify a valid DB cluster parameter group. If the source DB cluster parameter group is in the same Amazon Region as the copy, specify a valid DB parameter group identifier, for example my-db-cluster-param-group, or a valid ARN. If the source DB parameter group is in a different Amazon Region than the copy, specify a valid DB cluster parameter group ARN, for example arn:aws:rds:us-east-1:123456789012:cluster-pg:custom-cluster-group1."
        TargetDBClusterParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the copied DB cluster parameter group. Constraints: Cannot be null, empty, or blank Must contain from 1 to 255 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens Example: my-cluster-param-group1"
        TargetDBClusterParameterGroupDescription:
          $ref: "#/components/schemas/String"
          description: A description for the copied DB cluster parameter group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the copied DB cluster parameter group.
      required:
        - SourceDBClusterParameterGroupIdentifier
        - TargetDBClusterParameterGroupIdentifier
        - TargetDBClusterParameterGroupDescription
    BooleanOptional:
      type: boolean
    DBClusterSnapshotDisplay:
      type: object
      properties:
        AvailabilityZones:
          type: string
          description: Provides the list of EC2 Availability Zones that instances in the DB cluster snapshot can be restored in.
        DBClusterSnapshotIdentifier:
          type: string
          description: Specifies the identifier for a DB cluster snapshot. Must match the identifier of an existing snapshot. After you restore a DB cluster using a DBClusterSnapshotIdentifier, you must specify the same DBClusterSnapshotIdentifier for any future updates to the DB cluster. When you specify this property for an update, the DB cluster is not restored from the snapshot again, and the data in the database is not changed. However, if you don't specify the DBClusterSnapshotIdentifier, an empty DB cluster is created, and the original DB cluster is deleted. If you specify a property that is different from the previous snapshot restore property, the DB cluster is restored from the snapshot specified by the DBClusterSnapshotIdentifier, and the original DB cluster is deleted.
        DBClusterIdentifier:
          type: string
          description: Specifies the DB cluster identifier of the DB cluster that this DB cluster snapshot was created from.
        SnapshotCreateTime:
          type: string
          description: Provides the time when the snapshot was taken, in Universal Coordinated Time (UTC).
        Engine:
          type: string
          description: Specifies the name of the database engine.
        AllocatedStorage:
          type: integer
          description: Specifies the allocated storage size in gibibytes (GiB).
        Status:
          type: string
          description: Specifies the status of this DB cluster snapshot.
        Port:
          type: integer
          description: Specifies the port that the DB cluster was listening on at the time of the snapshot.
        VpcId:
          type: string
          description: Provides the VPC ID associated with the DB cluster snapshot.
        ClusterCreateTime:
          type: string
          description: Specifies the time when the DB cluster was created, in Universal Coordinated Time (UTC).
        MasterUsername:
          type: string
          description: Not supported by Neptune.
        EngineVersion:
          type: string
          description: Provides the version of the database engine for this DB cluster snapshot.
        LicenseModel:
          type: string
          description: Provides the license model information for this DB cluster snapshot.
        SnapshotType:
          type: string
          description: Provides the type of the DB cluster snapshot.
        PercentProgress:
          type: integer
          description: Specifies the percentage of the estimated data that has been transferred.
        StorageEncrypted:
          type: boolean
          description: Specifies whether the DB cluster snapshot is encrypted.
        KmsKeyId:
          type: string
          description: If StorageEncrypted is true, the Amazon KMS key identifier for the encrypted DB cluster snapshot.
        DBClusterSnapshotArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB cluster snapshot.
        SourceDBClusterSnapshotArn:
          type: string
          description: If the DB cluster snapshot was copied from a source DB cluster snapshot, the Amazon Resource Name (ARN) for the source DB cluster snapshot, otherwise, a null value.
        IAMDatabaseAuthenticationEnabled:
          type: boolean
          description: True if mapping of Amazon Identity and Access Management (IAM) accounts to database accounts is enabled, and otherwise false.
        StorageType:
          type: string
          description: The storage type associated with the DB cluster snapshot.
    CopyDBClusterSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterSnapshotDisplay"
    CopyDBClusterSnapshotMessage:
      type: object
      properties:
        SourceDBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: 'The identifier of the DB cluster snapshot to copy. This parameter is not case-sensitive. If the source DB cluster snapshot is in a different region or owned by another account, specify the snapshot ARN. Constraints: Must specify a valid system snapshot in the "available" state. Specify a valid DB snapshot identifier. Example: my-cluster-snapshot1'
        TargetDBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the new DB cluster snapshot to create from the source DB cluster snapshot. This parameter is not case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-snapshot2"
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The Amazon KMS key ID for an encrypted DB cluster snapshot. The KMS key ID is the Amazon Resource Name (ARN), KMS key identifier, or the KMS key alias for the KMS encryption key. If you copy an encrypted DB cluster snapshot from your Amazon account, you can specify a value for KmsKeyId to encrypt the copy with a new KMS encryption key. If you don't specify a value for KmsKeyId, then the copy of the DB cluster snapshot is encrypted with the same KMS key as the source DB cluster snapshot. If you copy an encrypted DB cluster snapshot that is shared from another Amazon account, then you must specify a value for KmsKeyId. KMS encryption keys are specific to the Amazon Region that they are created in, and you can't use encryption keys from one Amazon Region in another Amazon Region. You cannot encrypt an unencrypted DB cluster snapshot when you copy it. If you try to copy an unencrypted DB cluster snapshot and specify a value for the KmsKeyId parameter, an error is returned.
        PreSignedUrl:
          $ref: "#/components/schemas/String"
          description: Not currently supported.
        CopyTags:
          $ref: "#/components/schemas/BooleanOptional"
          description: True to copy all tags from the source DB cluster snapshot to the target DB cluster snapshot, and otherwise false. The default is false.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to assign to the new DB cluster snapshot copy.
      required:
        - SourceDBClusterSnapshotIdentifier
        - TargetDBClusterSnapshotIdentifier
    DBParameterGroupDisplay:
      type: object
      properties:
        DBParameterGroupName:
          type: string
          description: Provides the name of the DB parameter group.
        DBParameterGroupFamily:
          type: string
          description: Provides the name of the DB parameter group family that this DB parameter group is compatible with.
        Description:
          type: string
          description: Provides the customer-specified description for this DB parameter group.
        DBParameterGroupArn:
          type: string
          description: The Amazon Resource Name (ARN) for the DB parameter group.
    CopyDBParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBParameterGroupDisplay"
    CopyDBParameterGroupMessage:
      type: object
      properties:
        SourceDBParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier or ARN for the source DB parameter group. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN). Constraints: Must specify a valid DB parameter group. Must specify a valid DB parameter group identifier, for example my-db-param-group, or a valid ARN."
        TargetDBParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the copied DB parameter group. Constraints: Cannot be null, empty, or blank. Must contain from 1 to 255 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-db-parameter-group"
        TargetDBParameterGroupDescription:
          $ref: "#/components/schemas/String"
          description: A description for the copied DB parameter group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the copied DB parameter group.
      required:
        - SourceDBParameterGroupIdentifier
        - TargetDBParameterGroupIdentifier
        - TargetDBParameterGroupDescription
    AvailabilityZones:
      type: array
      items:
        $ref: "#/components/schemas/String"
    IntegerOptional:
      type: integer
    VpcSecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    LogTypeList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ServerlessV2ScalingConfiguration:
      description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
      type: object
      properties:
        MinCapacity:
          $ref: "#/components/schemas/DoubleOptional"
          description: The minimum number of Neptune capacity units (NCUs) for a DB instance in a Neptune Serverless cluster. You can specify NCU values in half-step increments, such as 8, 8.5, 9, and so on.
        MaxCapacity:
          $ref: "#/components/schemas/DoubleOptional"
          description: The maximum number of Neptune capacity units (NCUs) for a DB instance in a Neptune Serverless cluster. You can specify NCU values in half-step increments, such as 40, 40.5, 41, and so on.
    DoubleOptional:
      type: number
      format: double
    GlobalClusterIdentifier:
      type: string
      minLength: 1
      maxLength: 255
