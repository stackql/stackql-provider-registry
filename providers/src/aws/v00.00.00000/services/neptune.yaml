openapi: 3.0.0
info:
  version: "2014-10-31"
  title: Amazon Neptune
  description: Amazon Neptune
  x-serviceName: rds
  x-serviceAlias: neptune
  x-protocol: query
  x-apiVersion: "2014-10-31"
  x-endpointPrefix: rds
servers:
  - url: https://rds.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for neptune
paths:
  /?Action=AddRoleToDBCluster&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddRoleToDBCluster
      description: Associates an Identity and Access Management (IAM) role with an Neptune DB cluster.
      parameters:
        - name: DBClusterIdentifier
          in: query
          required: true
          description: The name of the DB cluster to associate the IAM role with.
          schema:
            $ref: "#/components/schemas/String"
        - name: RoleArn
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the IAM role to associate with the Neptune DB cluster, for example arn:aws:iam::123456789012:role/NeptuneAccessRole.
          schema:
            $ref: "#/components/schemas/String"
        - name: FeatureName
          in: query
          required: false
          description: The name of the feature for the Neptune DB cluster that the IAM role is to be associated with. For the list of supported feature names, see DBEngineVersion.
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AddRoleToDBCluster
      description: Associates an Identity and Access Management (IAM) role with an Neptune DB cluster.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddRoleToDBClusterMessage"
  /?Action=AddSourceIdentifierToSubscription&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddSourceIdentifierToSubscription
      description: Adds a source identifier to an existing event notification subscription.
      parameters:
        - name: SubscriptionName
          in: query
          required: true
          description: The name of the event notification subscription you want to add a source identifier to.
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceIdentifier
          in: query
          required: true
          description: "The identifier of the event source to be added. Constraints: If the source type is a DB instance, then a DBInstanceIdentifier must be supplied. If the source type is a DB security group, a DBSecurityGroupName must be supplied. If the source type is a DB parameter group, a DBParameterGroupName must be supplied. If the source type is a DB snapshot, a DBSnapshotIdentifier must be supplied."
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionOutputDisplay"
    post:
      operationId: POST_AddSourceIdentifierToSubscription
      description: Adds a source identifier to an existing event notification subscription.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionMessage"
  /?Action=AddTagsToResource&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddTagsToResource
      description: Adds metadata tags to an Amazon Neptune resource. These tags can also be used with cost allocation reporting to track cost associated with Amazon Neptune resources, or used in a Condition statement in an IAM policy for Amazon Neptune.
      parameters:
        - name: ResourceName
          in: query
          required: true
          description: The Amazon Neptune resource that the tags are added to. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an Amazon Resource Name (ARN).
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: true
          description: The tags to be assigned to the Amazon Neptune resource.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AddTagsToResource
      description: Adds metadata tags to an Amazon Neptune resource. These tags can also be used with cost allocation reporting to track cost associated with Amazon Neptune resources, or used in a Condition statement in an IAM policy for Amazon Neptune.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddTagsToResourceMessage"
  /?Action=ApplyPendingMaintenanceAction&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ApplyPendingMaintenanceAction
      description: Applies a pending maintenance action to a resource (for example, to a DB instance).
      parameters:
        - name: ResourceIdentifier
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the resource that the pending maintenance action applies to. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN).
          schema:
            $ref: "#/components/schemas/String"
        - name: ApplyAction
          in: query
          required: true
          description: "The pending maintenance action to apply to this resource. Valid values: system-update, db-upgrade"
          schema:
            $ref: "#/components/schemas/String"
        - name: OptInType
          in: query
          required: true
          description: "A value that specifies the type of opt-in request, or undoes an opt-in request. An opt-in request of type immediate can't be undone. Valid values: immediate - Apply the maintenance action immediately. next-maintenance - Apply the maintenance action during the next maintenance window for the resource. undo-opt-in - Cancel any existing next-maintenance opt-in requests."
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionOutputDisplay"
    post:
      operationId: POST_ApplyPendingMaintenanceAction
      description: Applies a pending maintenance action to a resource (for example, to a DB instance).
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ApplyPendingMaintenanceActionMessage"
  /?Action=CopyDBClusterParameterGroup&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CopyDBClusterParameterGroup
      description: Copies the specified DB cluster parameter group.
      parameters:
        - name: SourceDBClusterParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier or Amazon Resource Name (ARN) for the source DB cluster parameter group. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN). Constraints: Must specify a valid DB cluster parameter group. If the source DB cluster parameter group is in the same Amazon Region as the copy, specify a valid DB parameter group identifier, for example my-db-cluster-param-group, or a valid ARN. If the source DB parameter group is in a different Amazon Region than the copy, specify a valid DB cluster parameter group ARN, for example arn:aws:rds:us-east-1:123456789012:cluster-pg:custom-cluster-group1."
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier for the copied DB cluster parameter group. Constraints: Cannot be null, empty, or blank Must contain from 1 to 255 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens Example: my-cluster-param-group1"
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterParameterGroupDescription
          in: query
          required: true
          description: A description for the copied DB cluster parameter group.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the copied DB cluster parameter group.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterParameterGroupOutputDisplay"
    post:
      operationId: POST_CopyDBClusterParameterGroup
      description: Copies the specified DB cluster parameter group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterParameterGroupOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CopyDBClusterParameterGroupMessage"
  /?Action=CopyDBClusterSnapshot&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CopyDBClusterSnapshot
      description: Copies a snapshot of a DB cluster. To copy a DB cluster snapshot from a shared manual DB cluster snapshot, SourceDBClusterSnapshotIdentifier must be the Amazon Resource Name (ARN) of the shared DB cluster snapshot.
      parameters:
        - name: SourceDBClusterSnapshotIdentifier
          in: query
          required: true
          description: 'The identifier of the DB cluster snapshot to copy. This parameter is not case-sensitive. If the source DB cluster snapshot is in a different region or owned by another account, specify the snapshot ARN. Constraints: Must specify a valid system snapshot in the "available" state. Specify a valid DB snapshot identifier. Example: my-cluster-snapshot1'
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterSnapshotIdentifier
          in: query
          required: true
          description: "The identifier of the new DB cluster snapshot to create from the source DB cluster snapshot. This parameter is not case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-snapshot2"
          schema:
            $ref: "#/components/schemas/String"
        - name: KmsKeyId
          in: query
          required: false
          description: The Amazon KMS key ID for an encrypted DB cluster snapshot. The KMS key ID is the Amazon Resource Name (ARN), KMS key identifier, or the KMS key alias for the KMS encryption key. If you copy an encrypted DB cluster snapshot from your Amazon account, you can specify a value for KmsKeyId to encrypt the copy with a new KMS encryption key. If you don't specify a value for KmsKeyId, then the copy of the DB cluster snapshot is encrypted with the same KMS key as the source DB cluster snapshot. If you copy an encrypted DB cluster snapshot that is shared from another Amazon account, then you must specify a value for KmsKeyId. KMS encryption keys are specific to the Amazon Region that they are created in, and you can't use encryption keys from one Amazon Region in another Amazon Region. You cannot encrypt an unencrypted DB cluster snapshot when you copy it. If you try to copy an unencrypted DB cluster snapshot and specify a value for the KmsKeyId parameter, an error is returned.
          schema:
            $ref: "#/components/schemas/String"
        - name: PreSignedUrl
          in: query
          required: false
          description: Not currently supported.
          schema:
            $ref: "#/components/schemas/String"
        - name: CopyTags
          in: query
          required: false
          description: True to copy all tags from the source DB cluster snapshot to the target DB cluster snapshot, and otherwise false. The default is false.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: Tags
          in: query
          required: false
          description: The tags to assign to the new DB cluster snapshot copy.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterSnapshotOutputDisplay"
    post:
      operationId: POST_CopyDBClusterSnapshot
      description: Copies a snapshot of a DB cluster. To copy a DB cluster snapshot from a shared manual DB cluster snapshot, SourceDBClusterSnapshotIdentifier must be the Amazon Resource Name (ARN) of the shared DB cluster snapshot.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterSnapshotOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CopyDBClusterSnapshotMessage"
  /?Action=CopyDBParameterGroup&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CopyDBParameterGroup
      description: Copies the specified DB parameter group.
      parameters:
        - name: SourceDBParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier or ARN for the source DB parameter group. For information about creating an ARN, see Constructing an Amazon Resource Name (ARN). Constraints: Must specify a valid DB parameter group. Must specify a valid DB parameter group identifier, for example my-db-param-group, or a valid ARN."
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier for the copied DB parameter group. Constraints: Cannot be null, empty, or blank. Must contain from 1 to 255 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-db-parameter-group"
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBParameterGroupDescription
          in: query
          required: true
          description: A description for the copied DB parameter group.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the copied DB parameter group.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBParameterGroupOutputDisplay"
    post:
      operationId: POST_CopyDBParameterGroup
      description: Copies the specified DB parameter group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBParameterGroupOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CopyDBParameterGroupMessage"
  /?Action=CreateDBCluster&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateDBCluster
      description: Creates a new Amazon Neptune DB cluster. You can use the ReplicationSourceIdentifier parameter to create the DB cluster as a Read Replica of another DB cluster or Amazon Neptune DB instance. Note that when you create a new cluster using CreateDBCluster directly, deletion protection is disabled by default (when you create a new production cluster in the console, deletion protection is enabled by default). You can only delete a DB cluster if its DeletionProtection field is set to false.
      parameters:
        - name: AvailabilityZones
          in: query
          required: false
          description: A list of EC2 Availability Zones that instances in the DB cluster can be created in.
          schema:
            $ref: "#/components/schemas/AvailabilityZones"
        - name: BackupRetentionPeriod
          in: query
          required: false
          description: "The number of days for which automated backups are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: CharacterSetName
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: CopyTagsToSnapshot
          in: query
          required: false
          description: If set to true, tags are copied to any snapshot of the DB cluster that is created.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: DatabaseName
          in: query
          required: false
          description: The name for your database of up to 64 alpha-numeric characters. If you do not provide a name, Amazon Neptune will not create a database in the DB cluster you are creating.
          schema:
            $ref: "#/components/schemas/String"
        - name: DBClusterIdentifier
          in: query
          required: true
          description: "The DB cluster identifier. This parameter is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. First character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster1"
          schema:
            $ref: "#/components/schemas/String"
        - name: DBClusterParameterGroupName
          in: query
          required: false
          description: "The name of the DB cluster parameter group to associate with this DB cluster. If this argument is omitted, the default is used. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
          schema:
            $ref: "#/components/schemas/String"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: A list of EC2 VPC security groups to associate with this DB cluster.
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: DBSubnetGroupName
          in: query
          required: false
          description: "A DB subnet group to associate with this DB cluster. Constraints: Must match the name of an existing DBSubnetGroup. Must not be default. Example: mySubnetgroup"
          schema:
            $ref: "#/components/schemas/String"
        - name: Engine
          in: query
          required: false
          description: "The name of the database engine to be used for this DB cluster. Valid Values: neptune"
          schema:
            $ref: "#/components/schemas/String"
        - name: EngineVersion
          in: query
          required: false
          description: "The version number of the database engine to use for the new DB cluster. Example: 1.2.1.0"
          schema:
            $ref: "#/components/schemas/String"
        - name: Port
          in: query
          required: false
          description: "The port number on which the instances in the DB cluster accept connections. Default: 8182"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: MasterUsername
          in: query
          required: false
          description: Not supported by Neptune.
          schema:
            $ref: "#/components/schemas/String"
        - name: MasterUserPassword
          in: query
          required: false
          description: Not supported by Neptune.
          schema:
            $ref: "#/components/schemas/String"
        - name: OptionGroupName
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: PreferredBackupWindow
          in: query
          required: false
          description: "The daily time range during which automated backups are created if automated backups are enabled using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region. To see the time blocks available, see Neptune Maintenance Window in the Amazon Neptune User Guide. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
          schema:
            $ref: "#/components/schemas/String"
        - name: PreferredMaintenanceWindow
          in: query
          required: false
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region, occurring on a random day of the week. To see the time blocks available, see Neptune Maintenance Window in the Amazon Neptune User Guide. Valid Days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Constraints: Minimum 30-minute window."
          schema:
            $ref: "#/components/schemas/String"
        - name: ReplicationSourceIdentifier
          in: query
          required: false
          description: The Amazon Resource Name (ARN) of the source DB instance or DB cluster if this DB cluster is created as a Read Replica.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags to assign to the new DB cluster.
          schema:
            $ref: "#/components/schemas/TagList"
        - name: StorageEncrypted
          in: query
          required: false
          description: Specifies whether the DB cluster is encrypted.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: KmsKeyId
          in: query
          required: false
          description: "The Amazon KMS key identifier for an encrypted DB cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are creating a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. If an encryption key is not specified in KmsKeyId: If ReplicationSourceIdentifier identifies an encrypted source, then Amazon Neptune will use the encryption key used to encrypt the source. Otherwise, Amazon Neptune will use your default encryption key. If the StorageEncrypted parameter is true and ReplicationSourceIdentifier is not specified, then Amazon Neptune will use your default encryption key. Amazon KMS creates the default encryption key for your Amazon account. Your Amazon account has a different default encryption key for each Amazon Region. If you create a Read Replica of an encrypted DB cluster in another Amazon Region, you must set KmsKeyId to a KMS key ID that is valid in the destination Amazon Region. This key is used to encrypt the Read Replica in that Amazon Region."
          schema:
            $ref: "#/components/schemas/String"
        - name: PreSignedUrl
          in: query
          required: false
          description: This parameter is not currently supported.
          schema:
            $ref: "#/components/schemas/String"
        - name: EnableIAMDatabaseAuthentication
          in: query
          required: false
          description: "If set to true, enables Amazon Identity and Access Management (IAM) authentication for the entire DB cluster (this cannot be set at an instance level). Default: false."
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: EnableCloudwatchLogsExports
          in: query
          required: false
          description: "A list of the log types that this DB cluster should export to CloudWatch Logs. Valid log types are: audit (to publish audit logs) and slowquery (to publish slow-query logs). See Publishing Neptune logs to Amazon CloudWatch logs."
          schema:
            $ref: "#/components/schemas/LogTypeList"
        - name: DeletionProtection
          in: query
          required: false
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is enabled.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ServerlessV2ScalingConfiguration
          in: query
          required: false
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
          schema:
            $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        - name: GlobalClusterIdentifier
          in: query
          required: false
          description: The ID of the Neptune global database to which this new DB cluster should be added.
          schema:
            $ref: "#/components/schemas/GlobalClusterIdentifier"
        - name: StorageType
          in: query
          required: false
          description: "The storage type for the new DB cluster. Valid Values: standard – ( the default ) Configures cost-effective database storage for applications with moderate to small I/O usage. When set to standard, the storage type is not returned in the response. iopt1 – Enables I/O-Optimized storage that's designed to meet the needs of I/O-intensive graph workloads that require predictable pricing with low I/O latency and consistent I/O throughput. Neptune I/O-Optimized storage is only available starting with engine release 1.3.0.0."
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDBClusterOutputDisplay"
    post:
      operationId: POST_CreateDBCluster
