            $ref: "#/components/schemas/AttributeValueList"
        - name: ValuesToRemove
          in: query
          required: false
          description: A list of DB cluster snapshot attributes to remove from the attribute specified by AttributeName. To remove authorization for other Amazon accounts to copy or restore a manual DB cluster snapshot, set this list to include one or more Amazon account identifiers, or all to remove authorization for any Amazon account to copy or restore the DB cluster snapshot. If you specify all, an Amazon account whose account ID is explicitly added to the restore attribute can still copy or restore a manual DB cluster snapshot.
          schema:
            $ref: "#/components/schemas/AttributeValueList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyDBClusterSnapshotAttributeOutputDisplay"
    post:
      operationId: POST_ModifyDBClusterSnapshotAttribute
      description: Adds an attribute and values to, or removes an attribute and values from, a manual DB cluster snapshot. To share a manual DB cluster snapshot with other Amazon accounts, specify restore as the AttributeName and use the ValuesToAdd parameter to add a list of IDs of the Amazon accounts that are authorized to restore the manual DB cluster snapshot. Use the value all to make the manual DB cluster snapshot public, which means that it can be copied or restored by all Amazon accounts. Do not add the all value for any manual DB cluster snapshots that contain private information that you don't want available to all Amazon accounts. If a manual DB cluster snapshot is encrypted, it can be shared, but only by specifying a list of authorized Amazon account IDs for the ValuesToAdd parameter. You can't use all as a value for that parameter in this case. To view which Amazon accounts have access to copy or restore a manual DB cluster snapshot, or whether a manual DB cluster snapshot public or private, use the DescribeDBClusterSnapshotAttributes API action.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyDBClusterSnapshotAttributeOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ModifyDBClusterSnapshotAttributeMessage"
  /?Action=ModifyDBInstance&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ModifyDBInstance
      description: Modifies settings for a DB instance. You can change one or more database configuration parameters by specifying these parameters and the new values in the request. To learn what modifications you can make to your DB instance, call DescribeValidDBInstanceModifications before you call ModifyDBInstance.
      parameters:
        - name: DBInstanceIdentifier
          in: query
          required: true
          description: "The DB instance identifier. This value is stored as a lowercase string. Constraints: Must match the identifier of an existing DBInstance."
          schema:
            $ref: "#/components/schemas/String"
        - name: AllocatedStorage
          in: query
          required: false
          description: Not supported by Neptune.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DBInstanceClass
          in: query
          required: false
          description: "The new compute and memory capacity of the DB instance, for example, db.m4.large. Not all DB instance classes are available in all Amazon Regions. If you modify the DB instance class, an outage occurs during the change. The change is applied during the next maintenance window, unless ApplyImmediately is specified as true for this request. Default: Uses existing setting"
          schema:
            $ref: "#/components/schemas/String"
        - name: DBSubnetGroupName
          in: query
          required: false
          description: "The new DB subnet group for the DB instance. You can use this parameter to move your DB instance to a different VPC. Changing the subnet group causes an outage during the change. The change is applied during the next maintenance window, unless you specify true for the ApplyImmediately parameter. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetGroup"
          schema:
            $ref: "#/components/schemas/String"
        - name: DBSecurityGroups
          in: query
          required: false
          description: "A list of DB security groups to authorize on this DB instance. Changing this setting doesn't result in an outage and the change is asynchronously applied as soon as possible. Constraints: If supplied, must match existing DBSecurityGroups."
          schema:
            $ref: "#/components/schemas/DBSecurityGroupNameList"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: "A list of EC2 VPC security groups to authorize on this DB instance. This change is asynchronously applied as soon as possible. Not applicable. The associated list of EC2 VPC security groups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: If supplied, must match existing VpcSecurityGroupIds."
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: ApplyImmediately
          in: query
          required: false
          description: "Specifies whether the modifications in this request and any pending modifications are asynchronously applied as soon as possible, regardless of the PreferredMaintenanceWindow setting for the DB instance. If this parameter is set to false, changes to the DB instance are applied during the next maintenance window. Some parameter changes can cause an outage and are applied on the next call to RebootDBInstance, or the next failure reboot. Default: false"
          schema:
            $ref: "#/components/schemas/Boolean"
        - name: MasterUserPassword
          in: query
          required: false
          description: Not supported by Neptune.
          schema:
            $ref: "#/components/schemas/String"
        - name: DBParameterGroupName
          in: query
          required: false
          description: "The name of the DB parameter group to apply to the DB instance. Changing this setting doesn't result in an outage. The parameter group name itself is changed immediately, but the actual parameter changes are not applied until you reboot the instance without failover. The db instance will NOT be rebooted automatically and the parameter changes will NOT be applied during the next maintenance window. Default: Uses existing setting Constraints: The DB parameter group must be in the same DB parameter group family as this DB instance."
          schema:
            $ref: "#/components/schemas/String"
        - name: BackupRetentionPeriod
          in: query
          required: false
          description: "Not applicable. The retention period for automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Default: Uses existing setting"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: PreferredBackupWindow
          in: query
          required: false
          description: "The daily time range during which automated backups are created if automated backups are enabled. Not applicable. The daily time range for creating automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: Must be in the format hh24:mi-hh24:mi Must be in Universal Time Coordinated (UTC) Must not conflict with the preferred maintenance window Must be at least 30 minutes"
          schema:
            $ref: "#/components/schemas/String"
        - name: PreferredMaintenanceWindow
          in: query
          required: false
          description: "The weekly time range (in UTC) during which system maintenance can occur, which might result in an outage. Changing this parameter doesn't result in an outage, except in the following situation, and the change is asynchronously applied as soon as possible. If there are pending actions that cause a reboot, and the maintenance window is changed to include the current time, then changing this parameter will cause a reboot of the DB instance. If moving this window to the current time, there must be at least 30 minutes between the current time and end of the window to ensure pending changes are applied. Default: Uses existing setting Format: ddd:hh24:mi-ddd:hh24:mi Valid Days: Mon | Tue | Wed | Thu | Fri | Sat | Sun Constraints: Must be at least 30 minutes"
          schema:
            $ref: "#/components/schemas/String"
        - name: MultiAZ
          in: query
          required: false
          description: Specifies if the DB instance is a Multi-AZ deployment. Changing this parameter doesn't result in an outage and the change is applied during the next maintenance window unless the ApplyImmediately parameter is set to true for this request.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: EngineVersion
          in: query
          required: false
          description: The version number of the database engine to upgrade to. Currently, setting this parameter has no effect. To upgrade your database engine to the most recent release, use the ApplyPendingMaintenanceAction API.
          schema:
            $ref: "#/components/schemas/String"
        - name: AllowMajorVersionUpgrade
          in: query
          required: false
          description: Indicates that major version upgrades are allowed. Changing this parameter doesn't result in an outage and the change is asynchronously applied as soon as possible.
          schema:
            $ref: "#/components/schemas/Boolean"
        - name: AutoMinorVersionUpgrade
          in: query
          required: false
          description: Indicates that minor version upgrades are applied automatically to the DB instance during the maintenance window. Changing this parameter doesn't result in an outage except in the following case and the change is asynchronously applied as soon as possible. An outage will result if this parameter is set to true during the maintenance window, and a newer minor version is available, and Neptune has enabled auto patching for that engine version.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: LicenseModel
          in: query
          required: false
          description: Not supported by Neptune.
          schema:
            $ref: "#/components/schemas/String"
        - name: Iops
          in: query
          required: false
          description: "The new Provisioned IOPS (I/O operations per second) value for the instance. Changing this setting doesn't result in an outage and the change is applied during the next maintenance window unless the ApplyImmediately parameter is set to true for this request. Default: Uses existing setting"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: OptionGroupName
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: NewDBInstanceIdentifier
          in: query
          required: false
          description: "The new DB instance identifier for the DB instance when renaming a DB instance. When you change the DB instance identifier, an instance reboot will occur immediately if you set Apply Immediately to true, or will occur during the next maintenance window if Apply Immediately to false. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: mydbinstance"
          schema:
            $ref: "#/components/schemas/String"
        - name: StorageType
          in: query
          required: false
          description: Not applicable. In Neptune the storage type is managed at the DB Cluster level.
          schema:
            $ref: "#/components/schemas/String"
        - name: TdeCredentialArn
          in: query
          required: false
          description: The ARN from the key store with which to associate the instance for TDE encryption.
          schema:
            $ref: "#/components/schemas/String"
        - name: TdeCredentialPassword
          in: query
          required: false
          description: The password for the given ARN from the key store in order to access the device.
          schema:
            $ref: "#/components/schemas/SensitiveString"
        - name: CACertificateIdentifier
          in: query
          required: false
          description: Indicates the certificate that needs to be associated with the instance.
          schema:
            $ref: "#/components/schemas/String"
        - name: Domain
          in: query
          required: false
          description: Not supported.
          schema:
            $ref: "#/components/schemas/String"
        - name: CopyTagsToSnapshot
          in: query
          required: false
          description: True to copy all tags from the DB instance to snapshots of the DB instance, and otherwise false. The default is false.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: MonitoringInterval
          in: query
          required: false
          description: "The interval, in seconds, between points when Enhanced Monitoring metrics are collected for the DB instance. To disable collecting Enhanced Monitoring metrics, specify 0. The default is 0. If MonitoringRoleArn is specified, then you must also set MonitoringInterval to a value other than 0. Valid Values: 0, 1, 5, 10, 15, 30, 60"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DBPortNumber
          in: query
          required: false
          description: "The port number on which the database accepts connections. The value of the DBPortNumber parameter must not match any of the port values specified for options in the option group for the DB instance. Your database will restart when you change the DBPortNumber value regardless of the value of the ApplyImmediately parameter. Default: 8182"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: PubliclyAccessible
          in: query
          required: false
          description: Indicates whether the DB instance is publicly accessible. When the DB instance is publicly accessible and you connect from outside of the DB instance's virtual private cloud (VPC), its Domain Name System (DNS) endpoint resolves to the public IP address. When you connect from within the same VPC as the DB instance, the endpoint resolves to the private IP address. Access to the DB instance is ultimately controlled by the security group it uses. That public access isn't permitted if the security group assigned to the DB cluster doesn't permit it. When the DB instance isn't publicly accessible, it is an internal DB instance with a DNS name that resolves to a private IP address.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: MonitoringRoleArn
          in: query
          required: false
          description: The ARN for the IAM role that permits Neptune to send enhanced monitoring metrics to Amazon CloudWatch Logs. For example, arn:aws:iam:123456789012:role/emaccess. If MonitoringInterval is set to a value other than 0, then you must supply a MonitoringRoleArn value.
          schema:
            $ref: "#/components/schemas/String"
        - name: DomainIAMRoleName
          in: query
          required: false
          description: Not supported
          schema:
            $ref: "#/components/schemas/String"
        - name: PromotionTier
          in: query
          required: false
          description: "A value that specifies the order in which a Read Replica is promoted to the primary instance after a failure of the existing primary instance. Default: 1 Valid Values: 0 - 15"
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: EnableIAMDatabaseAuthentication
          in: query
          required: false
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. You can enable IAM database authentication for the following database engines Not applicable. Mapping Amazon IAM accounts to database accounts is managed by the DB cluster. For more information, see ModifyDBCluster. Default: false"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: EnablePerformanceInsights
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: PerformanceInsightsKMSKeyId
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: CloudwatchLogsExportConfiguration
          in: query
          required: false
          description: The configuration setting for the log types to be enabled for export to CloudWatch Logs for a specific DB instance or DB cluster.
          schema:
            $ref: "#/components/schemas/CloudwatchLogsExportConfiguration"
        - name: DeletionProtection
          in: query
          required: false
          description: A value that indicates whether the DB instance has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled. See Deleting a DB Instance.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyDBInstanceOutputDisplay"
    post:
      operationId: POST_ModifyDBInstance
      description: Modifies settings for a DB instance. You can change one or more database configuration parameters by specifying these parameters and the new values in the request. To learn what modifications you can make to your DB instance, call DescribeValidDBInstanceModifications before you call ModifyDBInstance.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ModifyDBInstanceOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ModifyDBInstanceMessage"
  /?Action=ModifyDBParameterGroup&Version=2014-10-31:
