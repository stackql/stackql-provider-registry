        - SubnetIds
    ModifyEventSubscriptionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/EventSubscriptionDisplay"
    ModifyEventSubscriptionMessage:
      type: object
      properties:
        SubscriptionName:
          $ref: "#/components/schemas/String"
          description: The name of the event notification subscription.
        SnsTopicArn:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the SNS topic created for event notification. The ARN is created by Amazon SNS when you create a topic and subscribe to it.
        SourceType:
          $ref: "#/components/schemas/String"
          description: "The type of source that is generating the events. For example, if you want to be notified of events generated by a DB instance, you would set this parameter to db-instance. if this value is not specified, all events are returned. Valid values: db-instance | db-parameter-group | db-security-group | db-snapshot"
        EventCategories:
          $ref: "#/components/schemas/EventCategoriesList"
          description: A list of event categories for a SourceType that you want to subscribe to. You can see a list of the categories for a given SourceType by using the DescribeEventCategories action.
        Enabled:
          $ref: "#/components/schemas/BooleanOptional"
          description: A Boolean value; set to true to activate the subscription.
      required:
        - SubscriptionName
    ModifyGlobalClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalClusterDisplay"
    ModifyGlobalClusterMessage:
      type: object
      properties:
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: "The DB cluster identifier for the global cluster being modified. This parameter is not case-sensitive. Constraints: Must match the identifier of an existing global database cluster."
        NewGlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: "A new cluster identifier to assign to the global database. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Can't end with a hyphen or contain two consecutive hyphens Example: my-cluster2"
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Indicates whether the global database has deletion protection enabled. The global database cannot be deleted when deletion protection is enabled.
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: "The version number of the database engine to which you want to upgrade. Changing this parameter will result in an outage. The change is applied during the next maintenance window unless ApplyImmediately is enabled. To list all of the available Neptune engine versions, use the following command:"
        AllowMajorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: "A value that indicates whether major version upgrades are allowed. Constraints: You must allow major version upgrades if you specify a value for the EngineVersion parameter that is a different major version than the DB cluster's current version. If you upgrade the major version of a global database, the cluster and DB instance parameter groups are set to the default parameter groups for the new version, so you will need to apply any custom parameter groups after completing the upgrade."
      required:
        - GlobalClusterIdentifier
    PromoteReadReplicaDBClusterOutputDisplay:
      type: object
