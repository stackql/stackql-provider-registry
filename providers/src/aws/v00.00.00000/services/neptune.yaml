    FailoverDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    FailoverDBClusterMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "A DB cluster identifier to force a failover for. This parameter is not case-sensitive. Constraints: Must match the identifier of an existing DBCluster."
        TargetDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: The name of the instance to promote to the primary instance. You must specify the instance identifier for an Read Replica in the DB cluster. For example, mydbcluster-replica1.
    FailoverGlobalClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalClusterDisplay"
    FailoverGlobalClusterMessage:
      type: object
      properties:
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: "Identifier of the Neptune global database that should be failed over. The identifier is the unique key assigned by the user when the Neptune global database was created. In other words, it's the name of the global database that you want to fail over. Constraints: Must match the identifier of an existing Neptune global database."
        TargetDbClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the secondary Neptune DB cluster that you want to promote to primary for the global database.
        AllowDataLoss:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to allow data loss for this global database cluster operation. Allowing data loss triggers a global failover operation. If you don't specify AllowDataLoss, the global database cluster operation defaults to a switchover. Constraints: Can't be specified together with the Switchover parameter."
        Switchover:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to switch over this global database cluster. Constraints: Can't be specified together with the AllowDataLoss parameter."
      required:
        - GlobalClusterIdentifier
        - TargetDbClusterIdentifier
    TagDisplay:
      type: object
      properties:
        Key:
          type: string
          description: "A key is the required name of the tag. The string value can be from 1 to 128 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          type: string
          description: "A value is the optional value of the tag. The string value can be from 1 to 256 Unicode characters in length and can't be prefixed with aws: or rds:. The string can only contain the set of Unicode letters, digits, white-space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
    ListTagsForResourceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/TagDisplay"
    ListTagsForResourceMessage:
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/String"
          description: The Amazon Neptune resource with tags to be listed. This value is an Amazon Resource Name (ARN). For information about creating an ARN, see Constructing an Amazon Resource Name (ARN).
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: This parameter is not currently supported.
      required:
        - ResourceName
    CloudwatchLogsExportConfiguration:
      description: "The configuration setting for the log types to be enabled for export to CloudWatch Logs for a specific DB instance or DB cluster. The EnableLogTypes and DisableLogTypes arrays determine which logs will be exported (or not exported) to CloudWatch Logs. Valid log types are: audit (to publish audit logs) and slowquery (to publish slow-query logs). See Publishing Neptune logs to Amazon CloudWatch logs."
      type: object
      properties:
        EnableLogTypes:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of log types to enable.
        DisableLogTypes:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of log types to disable.
    ModifyDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    ModifyDBClusterMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The DB cluster identifier for the cluster being modified. This parameter is not case-sensitive. Constraints: Must match the identifier of an existing DBCluster."
        NewDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The new DB cluster identifier for the DB cluster when renaming a DB cluster. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens The first character must be a letter Cannot end with a hyphen or contain two consecutive hyphens Example: my-cluster2"
        ApplyImmediately:
          $ref: "#/components/schemas/Boolean"
          description: "A value that specifies whether the modifications in this request and any pending modifications are asynchronously applied as soon as possible, regardless of the PreferredMaintenanceWindow setting for the DB cluster. If this parameter is set to false, changes to the DB cluster are applied during the next maintenance window. The ApplyImmediately parameter only affects NewDBClusterIdentifier values. If you set the ApplyImmediately parameter value to false, then changes to NewDBClusterIdentifier values are applied during the next maintenance window. All other changes are applied immediately, regardless of the value of the ApplyImmediately parameter. Default: false"
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35"
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the DB cluster parameter group to use for the DB cluster.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security groups that the DB cluster will belong to.
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the DB cluster accepts connections. Constraints: Value must be 1150-65535 Default: The same port as the original DB cluster."
        MasterUserPassword:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Region, occurring on a random day of the week. Valid Days: Mon, Tue, Wed, Thu, Fri, Sat, Sun. Constraints: Minimum 30-minute window."
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. Default: false"
        CloudwatchLogsExportConfiguration:
          $ref: "#/components/schemas/CloudwatchLogsExportConfiguration"
          description: The configuration setting for the log types to be enabled for export to CloudWatch Logs for a specific DB cluster. See Using the CLI to publish Neptune audit logs to CloudWatch Logs.
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the database engine to which you want to upgrade. Changing this parameter results in an outage. The change is applied during the next maintenance window unless the ApplyImmediately parameter is set to true. For a list of valid engine versions, see Engine Releases for Amazon Neptune, or call DescribeDBEngineVersions.
        AllowMajorVersionUpgrade:
          $ref: "#/components/schemas/Boolean"
          description: "A value that indicates whether upgrades between different major versions are allowed. Constraints: You must set the allow-major-version-upgrade flag when providing an EngineVersion parameter that uses a different major version than the DB cluster's current version."
        DBInstanceParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB parameter group to apply to all instances of the DB cluster. When you apply a parameter group using DBInstanceParameterGroupName, parameter changes aren't applied during the next maintenance window but instead are applied immediately. Default: The existing name setting Constraints: The DB parameter group must be in the same DB parameter group family as the target DB cluster version. The DBInstanceParameterGroupName parameter is only valid in combination with the AllowMajorVersionUpgrade parameter."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: If set to true, tags are copied to any snapshot of the DB cluster that is created.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "The storage type to associate with the DB cluster. Valid Values: standard – ( the default ) Configures cost-effective database storage for applications with moderate to small I/O usage. iopt1 – Enables I/O-Optimized storage that's designed to meet the needs of I/O-intensive graph workloads that require predictable pricing with low I/O latency and consistent I/O throughput. Neptune I/O-Optimized storage is only available starting with engine release 1.3.0.0."
      required:
        - DBClusterIdentifier
    ModifyDBClusterEndpointOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ModifyDBClusterEndpointOutputDisplay"
    ModifyDBClusterEndpointMessage:
      type: object
      properties:
        DBClusterEndpointIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier of the endpoint to modify. This parameter is stored as a lowercase string.
        EndpointType:
          $ref: "#/components/schemas/String"
          description: "The type of the endpoint. One of: READER, WRITER, ANY."
        StaticMembers:
          $ref: "#/components/schemas/StringList"
          description: List of DB instance identifiers that are part of the custom endpoint group.
        ExcludedMembers:
          $ref: "#/components/schemas/StringList"
          description: List of DB instance identifiers that aren't part of the custom endpoint group. All other eligible instances are reachable through the custom endpoint. Only relevant if the list of static members is empty.
      required:
        - DBClusterEndpointIdentifier
    ParametersList:
      type: array
      items:
        $ref: "#/components/schemas/Parameter"
    Parameter:
      description: Specifies a parameter.
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/String"
          description: Specifies the name of the parameter.
        ParameterValue:
          $ref: "#/components/schemas/String"
          description: Specifies the value of the parameter.
        Description:
          $ref: "#/components/schemas/String"
          description: Provides a description of the parameter.
        Source:
          $ref: "#/components/schemas/String"
          description: Indicates the source of the parameter value.
        ApplyType:
          $ref: "#/components/schemas/String"
          description: Specifies the engine specific parameters type.
        DataType:
          $ref: "#/components/schemas/String"
          description: Specifies the valid data type for the parameter.
        AllowedValues:
          $ref: "#/components/schemas/String"
          description: Specifies the valid range of values for the parameter.
        IsModifiable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether (true) or not (false) the parameter can be modified. Some parameters have security or operational implications that prevent them from being changed.
        MinimumEngineVersion:
          $ref: "#/components/schemas/String"
          description: The earliest engine version to which the parameter can apply.
        ApplyMethod:
          $ref: "#/components/schemas/ApplyMethod"
          description: Indicates when to apply parameter updates.
    ApplyMethod:
      type: string
      enum:
        - immediate
        - pending-reboot
    DBClusterParameterGroupNameMessageDisplay:
      type: object
      properties:
        DBClusterParameterGroupName:
          type: string
          description: "The name of the DB cluster parameter group. Constraints: Must be 1 to 255 letters or numbers. First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens This value is stored as a lowercase string."
    ModifyDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupNameMessageDisplay"
    ModifyDBClusterParameterGroupMessage:
      type: object
      properties:
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the DB cluster parameter group to modify.
        Parameters:
          $ref: "#/components/schemas/ParametersList"
          description: A list of parameters in the DB cluster parameter group to modify.
      required:
        - DBClusterParameterGroupName
        - Parameters
    AttributeValueList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ModifyDBClusterSnapshotAttributeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterSnapshotAttributesResultDisplay"
    ModifyDBClusterSnapshotAttributeMessage:
      type: object
      properties:
        DBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier for the DB cluster snapshot to modify the attributes for.
        AttributeName:
          $ref: "#/components/schemas/String"
          description: The name of the DB cluster snapshot attribute to modify. To manage authorization for other Amazon accounts to copy or restore a manual DB cluster snapshot, set this value to restore.
        ValuesToAdd:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of DB cluster snapshot attributes to add to the attribute specified by AttributeName. To authorize other Amazon accounts to copy or restore a manual DB cluster snapshot, set this list to include one or more Amazon account IDs, or all to make the manual DB cluster snapshot restorable by any Amazon account. Do not add the all value for any manual DB cluster snapshots that contain private information that you don't want available to all Amazon accounts.
        ValuesToRemove:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of DB cluster snapshot attributes to remove from the attribute specified by AttributeName. To remove authorization for other Amazon accounts to copy or restore a manual DB cluster snapshot, set this list to include one or more Amazon account identifiers, or all to remove authorization for any Amazon account to copy or restore the DB cluster snapshot. If you specify all, an Amazon account whose account ID is explicitly added to the restore attribute can still copy or restore a manual DB cluster snapshot.
      required:
        - DBClusterSnapshotIdentifier
        - AttributeName
    ModifyDBInstanceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    ModifyDBInstanceMessage:
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The DB instance identifier. This value is stored as a lowercase string. Constraints: Must match the identifier of an existing DBInstance."
        AllocatedStorage:
          $ref: "#/components/schemas/IntegerOptional"
          description: Not supported by Neptune.
        DBInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The new compute and memory capacity of the DB instance, for example, db.m4.large. Not all DB instance classes are available in all Amazon Regions. If you modify the DB instance class, an outage occurs during the change. The change is applied during the next maintenance window, unless ApplyImmediately is specified as true for this request. Default: Uses existing setting"
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The new DB subnet group for the DB instance. You can use this parameter to move your DB instance to a different VPC. Changing the subnet group causes an outage during the change. The change is applied during the next maintenance window, unless you specify true for the ApplyImmediately parameter. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetGroup"
        DBSecurityGroups:
          $ref: "#/components/schemas/DBSecurityGroupNameList"
          description: "A list of DB security groups to authorize on this DB instance. Changing this setting doesn't result in an outage and the change is asynchronously applied as soon as possible. Constraints: If supplied, must match existing DBSecurityGroups."
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: "A list of EC2 VPC security groups to authorize on this DB instance. This change is asynchronously applied as soon as possible. Not applicable. The associated list of EC2 VPC security groups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: If supplied, must match existing VpcSecurityGroupIds."
        ApplyImmediately:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether the modifications in this request and any pending modifications are asynchronously applied as soon as possible, regardless of the PreferredMaintenanceWindow setting for the DB instance. If this parameter is set to false, changes to the DB instance are applied during the next maintenance window. Some parameter changes can cause an outage and are applied on the next call to RebootDBInstance, or the next failure reboot. Default: false"
        MasterUserPassword:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        DBParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB parameter group to apply to the DB instance. Changing this setting doesn't result in an outage. The parameter group name itself is changed immediately, but the actual parameter changes are not applied until you reboot the instance without failover. The db instance will NOT be rebooted automatically and the parameter changes will NOT be applied during the next maintenance window. Default: Uses existing setting Constraints: The DB parameter group must be in the same DB parameter group family as this DB instance."
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "Not applicable. The retention period for automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Default: Uses existing setting"
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled. Not applicable. The daily time range for creating automated backups is managed by the DB cluster. For more information, see ModifyDBCluster. Constraints: Must be in the format hh24:mi-hh24:mi Must be in Universal Time Coordinated (UTC) Must not conflict with the preferred maintenance window Must be at least 30 minutes"
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range (in UTC) during which system maintenance can occur, which might result in an outage. Changing this parameter doesn't result in an outage, except in the following situation, and the change is asynchronously applied as soon as possible. If there are pending actions that cause a reboot, and the maintenance window is changed to include the current time, then changing this parameter will cause a reboot of the DB instance. If moving this window to the current time, there must be at least 30 minutes between the current time and end of the window to ensure pending changes are applied. Default: Uses existing setting Format: ddd:hh24:mi-ddd:hh24:mi Valid Days: Mon | Tue | Wed | Thu | Fri | Sat | Sun Constraints: Must be at least 30 minutes"
        MultiAZ:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies if the DB instance is a Multi-AZ deployment. Changing this parameter doesn't result in an outage and the change is applied during the next maintenance window unless the ApplyImmediately parameter is set to true for this request.
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: The version number of the database engine to upgrade to. Currently, setting this parameter has no effect. To upgrade your database engine to the most recent release, use the ApplyPendingMaintenanceAction API.
        AllowMajorVersionUpgrade:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that major version upgrades are allowed. Changing this parameter doesn't result in an outage and the change is asynchronously applied as soon as possible.
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: Indicates that minor version upgrades are applied automatically to the DB instance during the maintenance window. Changing this parameter doesn't result in an outage except in the following case and the change is asynchronously applied as soon as possible. An outage will result if this parameter is set to true during the maintenance window, and a newer minor version is available, and Neptune has enabled auto patching for that engine version.
        LicenseModel:
          $ref: "#/components/schemas/String"
          description: Not supported by Neptune.
        Iops:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The new Provisioned IOPS (I/O operations per second) value for the instance. Changing this setting doesn't result in an outage and the change is applied during the next maintenance window unless the ApplyImmediately parameter is set to true for this request. Default: Uses existing setting"
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        NewDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The new DB instance identifier for the DB instance when renaming a DB instance. When you change the DB instance identifier, an instance reboot will occur immediately if you set Apply Immediately to true, or will occur during the next maintenance window if Apply Immediately to false. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: mydbinstance"
        StorageType:
          $ref: "#/components/schemas/String"
          description: Not applicable. In Neptune the storage type is managed at the DB Cluster level.
        TdeCredentialArn:
          $ref: "#/components/schemas/String"
          description: The ARN from the key store with which to associate the instance for TDE encryption.
        TdeCredentialPassword:
          $ref: "#/components/schemas/SensitiveString"
          description: The password for the given ARN from the key store in order to access the device.
        CACertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: Indicates the certificate that needs to be associated with the instance.
        Domain:
          $ref: "#/components/schemas/String"
          description: Not supported.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: True to copy all tags from the DB instance to snapshots of the DB instance, and otherwise false. The default is false.
        MonitoringInterval:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The interval, in seconds, between points when Enhanced Monitoring metrics are collected for the DB instance. To disable collecting Enhanced Monitoring metrics, specify 0. The default is 0. If MonitoringRoleArn is specified, then you must also set MonitoringInterval to a value other than 0. Valid Values: 0, 1, 5, 10, 15, 30, 60"
        DBPortNumber:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the database accepts connections. The value of the DBPortNumber parameter must not match any of the port values specified for options in the option group for the DB instance. Your database will restart when you change the DBPortNumber value regardless of the value of the ApplyImmediately parameter. Default: 8182"
        PubliclyAccessible:
          $ref: "#/components/schemas/BooleanOptional"
          description: Indicates whether the DB instance is publicly accessible. When the DB instance is publicly accessible and you connect from outside of the DB instance's virtual private cloud (VPC), its Domain Name System (DNS) endpoint resolves to the public IP address. When you connect from within the same VPC as the DB instance, the endpoint resolves to the private IP address. Access to the DB instance is ultimately controlled by the security group it uses. That public access isn't permitted if the security group assigned to the DB cluster doesn't permit it. When the DB instance isn't publicly accessible, it is an internal DB instance with a DNS name that resolves to a private IP address.
        MonitoringRoleArn:
          $ref: "#/components/schemas/String"
          description: The ARN for the IAM role that permits Neptune to send enhanced monitoring metrics to Amazon CloudWatch Logs. For example, arn:aws:iam:123456789012:role/emaccess. If MonitoringInterval is set to a value other than 0, then you must supply a MonitoringRoleArn value.
        DomainIAMRoleName:
          $ref: "#/components/schemas/String"
          description: Not supported
        PromotionTier:
          $ref: "#/components/schemas/IntegerOptional"
          description: "A value that specifies the order in which a Read Replica is promoted to the primary instance after a failure of the existing primary instance. Default: 1 Valid Values: 0 - 15"
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. You can enable IAM database authentication for the following database engines Not applicable. Mapping Amazon IAM accounts to database accounts is managed by the DB cluster. For more information, see ModifyDBCluster. Default: false"
        EnablePerformanceInsights:
          $ref: "#/components/schemas/BooleanOptional"
          description: (Not supported by Neptune)
        PerformanceInsightsKMSKeyId:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        CloudwatchLogsExportConfiguration:
          $ref: "#/components/schemas/CloudwatchLogsExportConfiguration"
          description: The configuration setting for the log types to be enabled for export to CloudWatch Logs for a specific DB instance or DB cluster.
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether the DB instance has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled. See Deleting a DB Instance.
      required:
        - DBInstanceIdentifier
    DBParameterGroupNameMessageDisplay:
      type: object
      properties:
        DBParameterGroupName:
          type: string
          description: Provides the name of the DB parameter group.
    ModifyDBParameterGroupOutputDisplay:
      type: object
      properties:
