    get:
      operationId: GET_RestoreDBClusterToPointInTime
      description: Restores a DB cluster to an arbitrary point in time. Users can restore to any point in time before LatestRestorableTime for up to BackupRetentionPeriod days. The target DB cluster is created from the source DB cluster with the same configuration as the original DB cluster, except that the new DB cluster is created with the default DB security group. This action only restores the DB cluster, not the DB instances for that DB cluster. You must invoke the CreateDBInstance action to create DB instances for the restored DB cluster, specifying the identifier of the restored DB cluster in DBClusterIdentifier. You can create DB instances only after the RestoreDBClusterToPointInTime action has completed and the DB cluster is available.
      parameters:
        - name: DBClusterIdentifier
          in: query
          required: true
          description: "The name of the new DB cluster to be created. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens"
          schema:
            $ref: "#/components/schemas/String"
        - name: RestoreType
          in: query
          required: false
          description: "The type of restore to be performed. You can specify one of the following values: full-copy - The new DB cluster is restored as a full copy of the source DB cluster. copy-on-write - The new DB cluster is restored as a clone of the source DB cluster. If you don't specify a RestoreType value, then the new DB cluster is restored as a full copy of the source DB cluster."
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceDBClusterIdentifier
          in: query
          required: true
          description: "The identifier of the source DB cluster from which to restore. Constraints: Must match the identifier of an existing DBCluster."
          schema:
            $ref: "#/components/schemas/String"
        - name: RestoreToTime
          in: query
          required: false
          description: "The date and time to restore the DB cluster to. Valid Values: Value must be a time in Universal Coordinated Time (UTC) format Constraints: Must be before the latest restorable time for the DB instance Must be specified if UseLatestRestorableTime parameter is not provided Cannot be specified if UseLatestRestorableTime parameter is true Cannot be specified if RestoreType parameter is copy-on-write Example: 2015-03-07T23:45:00Z"
          schema:
            $ref: "#/components/schemas/TStamp"
        - name: UseLatestRestorableTime
          in: query
          required: false
          description: "A value that is set to true to restore the DB cluster to the latest restorable backup time, and false otherwise. Default: false Constraints: Cannot be specified if RestoreToTime parameter is provided."
          schema:
            $ref: "#/components/schemas/Boolean"
        - name: Port
          in: query
          required: false
          description: "The port number on which the new DB cluster accepts connections. Constraints: Value must be 1150-65535 Default: The same port as the original DB cluster."
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DBSubnetGroupName
          in: query
          required: false
          description: "The DB subnet group name to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
          schema:
            $ref: "#/components/schemas/String"
        - name: OptionGroupName
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: A list of VPC security groups that the new DB cluster belongs to.
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: Tags
          in: query
          required: false
          description: The tags to be applied to the restored DB cluster.
          schema:
            $ref: "#/components/schemas/TagList"
        - name: KmsKeyId
          in: query
          required: false
          description: "The Amazon KMS key identifier to use when restoring an encrypted DB cluster from an encrypted DB cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. You can restore to a new DB cluster and encrypt the new DB cluster with a KMS key that is different than the KMS key used to encrypt the source DB cluster. The new DB cluster is encrypted with the KMS key identified by the KmsKeyId parameter. If you do not specify a value for the KmsKeyId parameter, then the following will occur: If the DB cluster is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the source DB cluster. If the DB cluster is not encrypted, then the restored DB cluster is not encrypted. If DBClusterIdentifier refers to a DB cluster that is not encrypted, then the restore request is rejected."
          schema:
            $ref: "#/components/schemas/String"
        - name: EnableIAMDatabaseAuthentication
          in: query
          required: false
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. Default: false"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: EnableCloudwatchLogsExports
          in: query
          required: false
          description: The list of logs that the restored DB cluster is to export to CloudWatch Logs.
          schema:
            $ref: "#/components/schemas/LogTypeList"
        - name: DBClusterParameterGroupName
          in: query
          required: false
          description: "The name of the DB cluster parameter group to associate with the new DB cluster. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
          schema:
            $ref: "#/components/schemas/String"
        - name: DeletionProtection
          in: query
          required: false
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ServerlessV2ScalingConfiguration
          in: query
          required: false
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
          schema:
            $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        - name: StorageType
          in: query
          required: false
          description: "Specifies the storage type to be associated with the DB cluster. Valid values: standard, iopt1 Default: standard"
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreDBClusterToPointInTimeOutputDisplay"
    post:
      operationId: POST_RestoreDBClusterToPointInTime
      description: Restores a DB cluster to an arbitrary point in time. Users can restore to any point in time before LatestRestorableTime for up to BackupRetentionPeriod days. The target DB cluster is created from the source DB cluster with the same configuration as the original DB cluster, except that the new DB cluster is created with the default DB security group. This action only restores the DB cluster, not the DB instances for that DB cluster. You must invoke the CreateDBInstance action to create DB instances for the restored DB cluster, specifying the identifier of the restored DB cluster in DBClusterIdentifier. You can create DB instances only after the RestoreDBClusterToPointInTime action has completed and the DB cluster is available.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreDBClusterToPointInTimeOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/RestoreDBClusterToPointInTimeMessage"
  /?Action=StartDBCluster&Version=2014-10-31:
