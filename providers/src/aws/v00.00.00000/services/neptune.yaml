    ResetDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupNameMessageDisplay"
    ResetDBClusterParameterGroupMessage:
      type: object
      properties:
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the DB cluster parameter group to reset.
        ResetAllParameters:
          $ref: "#/components/schemas/Boolean"
          description: A value that is set to true to reset all parameters in the DB cluster parameter group to their default values, and false otherwise. You can't use this parameter if there is a list of parameter names specified for the Parameters parameter.
        Parameters:
          $ref: "#/components/schemas/ParametersList"
          description: A list of parameter names in the DB cluster parameter group to reset to the default values. You can't use this parameter if the ResetAllParameters parameter is set to true.
      required:
        - DBClusterParameterGroupName
    ResetDBParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBParameterGroupNameMessageDisplay"
    ResetDBParameterGroupMessage:
      type: object
      properties:
        DBParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB parameter group. Constraints: Must match the name of an existing DBParameterGroup."
        ResetAllParameters:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether (true) or not (false) to reset all parameters in the DB parameter group to default values. Default: true"
        Parameters:
          $ref: "#/components/schemas/ParametersList"
          description: "To reset the entire DB parameter group, specify the DBParameterGroup name and ResetAllParameters parameters. To reset specific parameters, provide a list of the following: ParameterName and ApplyMethod. A maximum of 20 parameters can be modified in a single request. Valid Values (for Apply method): pending-reboot"
      required:
        - DBParameterGroupName
    RestoreDBClusterFromSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterFromSnapshotMessage:
      type: object
      properties:
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: Provides the list of EC2 Availability Zones that instances in the restored DB cluster can be created in.
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster to create from the DB snapshot or DB cluster snapshot. This parameter isn't case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens Example: my-snapshot-id"
        SnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the DB snapshot or DB cluster snapshot to restore from. You can use either the name or the Amazon Resource Name (ARN) to specify a DB cluster snapshot. However, you can use only the ARN to specify a DB snapshot. Constraints: Must match the identifier of an existing Snapshot."
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for the new DB cluster. Default: The same as source Constraint: Must be compatible with the engine of the source"
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: The version of the database engine to use for the new DB cluster.
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new DB cluster accepts connections. Constraints: Value must be 1150-65535 Default: The same port as the original DB cluster."
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB subnet group to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
        DatabaseName:
          $ref: "#/components/schemas/String"
          description: Not supported.
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security groups that the new DB cluster will belong to.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the restored DB cluster.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon KMS key identifier to use when restoring an encrypted DB cluster from a DB snapshot or DB cluster snapshot. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. If you do not specify a value for the KmsKeyId parameter, then the following will occur: If the DB snapshot or DB cluster snapshot in SnapshotIdentifier is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the DB snapshot or DB cluster snapshot. If the DB snapshot or DB cluster snapshot in SnapshotIdentifier is not encrypted, then the restored DB cluster is not encrypted."
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. Default: false"
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs that the restored DB cluster is to export to Amazon CloudWatch Logs.
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with the new DB cluster. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: If set to true, tags are copied to any snapshot of the restored DB cluster that is created.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB cluster. Valid values: standard, iopt1 Default: standard"
      required:
        - DBClusterIdentifier
        - SnapshotIdentifier
        - Engine
    RestoreDBClusterToPointInTimeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterToPointInTimeMessage:
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the new DB cluster to be created. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens"
        RestoreType:
          $ref: "#/components/schemas/String"
          description: "The type of restore to be performed. You can specify one of the following values: full-copy - The new DB cluster is restored as a full copy of the source DB cluster. copy-on-write - The new DB cluster is restored as a clone of the source DB cluster. If you don't specify a RestoreType value, then the new DB cluster is restored as a full copy of the source DB cluster."
        SourceDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the source DB cluster from which to restore. Constraints: Must match the identifier of an existing DBCluster."
        RestoreToTime:
          $ref: "#/components/schemas/TStamp"
          description: "The date and time to restore the DB cluster to. Valid Values: Value must be a time in Universal Coordinated Time (UTC) format Constraints: Must be before the latest restorable time for the DB instance Must be specified if UseLatestRestorableTime parameter is not provided Cannot be specified if UseLatestRestorableTime parameter is true Cannot be specified if RestoreType parameter is copy-on-write Example: 2015-03-07T23:45:00Z"
        UseLatestRestorableTime:
          $ref: "#/components/schemas/Boolean"
          description: "A value that is set to true to restore the DB cluster to the latest restorable backup time, and false otherwise. Default: false Constraints: Cannot be specified if RestoreToTime parameter is provided."
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new DB cluster accepts connections. Constraints: Value must be 1150-65535 Default: The same port as the original DB cluster."
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The DB subnet group name to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
        OptionGroupName:
          $ref: "#/components/schemas/String"
          description: (Not supported by Neptune)
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security groups that the new DB cluster belongs to.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be applied to the restored DB cluster.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon KMS key identifier to use when restoring an encrypted DB cluster from an encrypted DB cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. You can restore to a new DB cluster and encrypt the new DB cluster with a KMS key that is different than the KMS key used to encrypt the source DB cluster. The new DB cluster is encrypted with the KMS key identified by the KmsKeyId parameter. If you do not specify a value for the KmsKeyId parameter, then the following will occur: If the DB cluster is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the source DB cluster. If the DB cluster is not encrypted, then the restored DB cluster is not encrypted. If DBClusterIdentifier refers to a DB cluster that is not encrypted, then the restore request is rejected."
        EnableIAMDatabaseAuthentication:
          $ref: "#/components/schemas/BooleanOptional"
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. Default: false"
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of logs that the restored DB cluster is to export to CloudWatch Logs.
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with the new DB cluster. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
        StorageType:
          $ref: "#/components/schemas/String"
          description: "Specifies the storage type to be associated with the DB cluster. Valid values: standard, iopt1 Default: standard"
      required:
        - DBClusterIdentifier
        - SourceDBClusterIdentifier
