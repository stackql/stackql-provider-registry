  /?Action=RestoreDBClusterFromSnapshot&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_RestoreDBClusterFromSnapshot
      description: Creates a new DB cluster from a DB snapshot or DB cluster snapshot. If a DB snapshot is specified, the target DB cluster is created from the source DB snapshot with a default configuration and default security group. If a DB cluster snapshot is specified, the target DB cluster is created from the source DB cluster restore point with the same configuration as the original source DB cluster, except that the new DB cluster is created with the default security group.
      parameters:
        - name: AvailabilityZones
          in: query
          required: false
          description: Provides the list of EC2 Availability Zones that instances in the restored DB cluster can be created in.
          schema:
            $ref: "#/components/schemas/AvailabilityZones"
        - name: DBClusterIdentifier
          in: query
          required: true
          description: "The name of the DB cluster to create from the DB snapshot or DB cluster snapshot. This parameter isn't case-sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens First character must be a letter Cannot end with a hyphen or contain two consecutive hyphens Example: my-snapshot-id"
          schema:
            $ref: "#/components/schemas/String"
        - name: SnapshotIdentifier
          in: query
          required: true
          description: "The identifier for the DB snapshot or DB cluster snapshot to restore from. You can use either the name or the Amazon Resource Name (ARN) to specify a DB cluster snapshot. However, you can use only the ARN to specify a DB snapshot. Constraints: Must match the identifier of an existing Snapshot."
          schema:
            $ref: "#/components/schemas/String"
        - name: Engine
          in: query
          required: false
          description: "The database engine to use for the new DB cluster. Default: The same as source Constraint: Must be compatible with the engine of the source"
          schema:
            $ref: "#/components/schemas/String"
        - name: EngineVersion
          in: query
          required: false
          description: The version of the database engine to use for the new DB cluster.
          schema:
            $ref: "#/components/schemas/String"
        - name: Port
          in: query
          required: false
          description: "The port number on which the new DB cluster accepts connections. Constraints: Value must be 1150-65535 Default: The same port as the original DB cluster."
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DBSubnetGroupName
          in: query
          required: false
          description: "The name of the DB subnet group to use for the new DB cluster. Constraints: If supplied, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
          schema:
            $ref: "#/components/schemas/String"
        - name: DatabaseName
          in: query
          required: false
          description: Not supported.
          schema:
            $ref: "#/components/schemas/String"
        - name: OptionGroupName
          in: query
          required: false
          description: (Not supported by Neptune)
          schema:
            $ref: "#/components/schemas/String"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: A list of VPC security groups that the new DB cluster will belong to.
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the restored DB cluster.
          schema:
            $ref: "#/components/schemas/TagList"
        - name: KmsKeyId
          in: query
          required: false
          description: "The Amazon KMS key identifier to use when restoring an encrypted DB cluster from a DB snapshot or DB cluster snapshot. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a DB cluster with the same Amazon account that owns the KMS encryption key used to encrypt the new DB cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. If you do not specify a value for the KmsKeyId parameter, then the following will occur: If the DB snapshot or DB cluster snapshot in SnapshotIdentifier is encrypted, then the restored DB cluster is encrypted using the KMS key that was used to encrypt the DB snapshot or DB cluster snapshot. If the DB snapshot or DB cluster snapshot in SnapshotIdentifier is not encrypted, then the restored DB cluster is not encrypted."
          schema:
            $ref: "#/components/schemas/String"
        - name: EnableIAMDatabaseAuthentication
          in: query
          required: false
          description: "True to enable mapping of Amazon Identity and Access Management (IAM) accounts to database accounts, and otherwise false. Default: false"
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: EnableCloudwatchLogsExports
          in: query
          required: false
          description: The list of logs that the restored DB cluster is to export to Amazon CloudWatch Logs.
          schema:
            $ref: "#/components/schemas/LogTypeList"
        - name: DBClusterParameterGroupName
          in: query
          required: false
          description: "The name of the DB cluster parameter group to associate with the new DB cluster. Constraints: If supplied, must match the name of an existing DBClusterParameterGroup."
          schema:
            $ref: "#/components/schemas/String"
        - name: DeletionProtection
          in: query
          required: false
          description: A value that indicates whether the DB cluster has deletion protection enabled. The database can't be deleted when deletion protection is enabled. By default, deletion protection is disabled.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: CopyTagsToSnapshot
          in: query
          required: false
          description: If set to true, tags are copied to any snapshot of the restored DB cluster that is created.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: ServerlessV2ScalingConfiguration
          in: query
          required: false
          description: Contains the scaling configuration of a Neptune Serverless DB cluster. For more information, see Using Amazon Neptune Serverless in the Amazon Neptune User Guide.
          schema:
            $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        - name: StorageType
          in: query
          required: false
          description: "Specifies the storage type to be associated with the DB cluster. Valid values: standard, iopt1 Default: standard"
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/RestoreDBClusterFromSnapshotOutputDisplay"
    post:
      operationId: POST_RestoreDBClusterFromSnapshot
      description: Creates a new DB cluster from a DB snapshot or DB cluster snapshot. If a DB snapshot is specified, the target DB cluster is created from the source DB snapshot with a default configuration and default security group. If a DB cluster snapshot is specified, the target DB cluster is created from the source DB cluster restore point with the same configuration as the original source DB cluster, except that the new DB cluster is created with the default security group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
