openapi: 3.0.0
info:
  version: "2020-09-18"
  title: AWS IoT Core Device Advisor
  description: AWS IoT Core Device Advisor
  x-serviceName: iotdeviceadvisor
  x-serviceAlias: iotdeviceadvisor
  x-protocol: rest-json
  x-apiVersion: "2020-09-18"
  x-endpointPrefix: api.iotdeviceadvisor
  x-jsonVersion: "1.1"
servers:
  - url: https://api.iotdeviceadvisor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for iotdeviceadvisor
paths:
  /suiteDefinitions:
    post:
      operationId: CreateSuiteDefinition
      description: Creates a Device Advisor test suite. Requires permission to access the CreateSuiteDefinition action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                suiteDefinitionConfiguration:
                  $ref: "#/components/schemas/SuiteDefinitionConfiguration"
                tags:
                  $ref: "#/components/schemas/TagMap"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - suiteDefinitionConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSuiteDefinitionResponse"
    get:
      operationId: ListSuiteDefinitions
      description: Lists the Device Advisor test suites you have created. Requires permission to access the ListSuiteDefinitions action.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at once.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token used to get the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSuiteDefinitionsResponse"
  /suiteDefinitions/{suite_definition_id}:
    delete:
      operationId: DeleteSuiteDefinition
      description: Deletes a Device Advisor test suite. Requires permission to access the DeleteSuiteDefinition action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite to be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSuiteDefinitionResponse"
    get:
      operationId: GetSuiteDefinition
      description: Gets information about a Device Advisor test suite. Requires permission to access the GetSuiteDefinition action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite to get.
        - name: suiteDefinitionVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SuiteDefinitionVersion"
          description: Suite definition version of the test suite to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSuiteDefinitionResponse"
    patch:
      operationId: UpdateSuiteDefinition
      description: Updates a Device Advisor test suite. Requires permission to access the UpdateSuiteDefinition action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite to be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                suiteDefinitionConfiguration:
                  $ref: "#/components/schemas/SuiteDefinitionConfiguration"
              required:
                - suiteDefinitionConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSuiteDefinitionResponse"
  /endpoint:
    get:
      operationId: GetEndpoint
      description: Gets information about an Device Advisor endpoint.
      parameters:
        - name: thingArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The thing ARN of the device. This is an optional parameter.
        - name: certificateArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The certificate ARN of the device. This is an optional parameter.
        - name: deviceRoleArn
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The device role ARN of the device. This is an optional parameter.
        - name: authenticationMethod
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AuthenticationMethod"
          description: The authentication method used during the device connection.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEndpointResponse"
  /suiteDefinitions/{suite_definition_id}/suiteRuns/{suite_run_id}:
    get:
      operationId: GetSuiteRun
      description: Gets information about a Device Advisor test suite run. Requires permission to access the GetSuiteRun action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID for the test suite run.
        - name: suite_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite run ID for the test suite run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSuiteRunResponse"
  /suiteDefinitions/{suite_definition_id}/suiteRuns/{suite_run_id}/report:
    get:
      operationId: GetSuiteRunReport
      description: Gets a report download link for a successful Device Advisor qualifying test suite run. Requires permission to access the GetSuiteRunReport action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite.
        - name: suite_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite run ID of the test suite run.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSuiteRunReportResponse"
  /suiteRuns:
    get:
      operationId: ListSuiteRuns
      description: Lists runs of the specified Device Advisor test suite. You can list all runs of the test suite, or the runs of a specific version of the test suite. Requires permission to access the ListSuiteRuns action.
      parameters:
        - name: suiteDefinitionId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: Lists the test suite runs of the specified test suite based on suite definition ID.
        - name: suiteDefinitionVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SuiteDefinitionVersion"
          description: Must be passed along with suiteDefinitionId. Lists the test suite runs of the specified test suite based on suite definition version.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return at once.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Token"
          description: A token to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSuiteRunsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags attached to an IoT Device Advisor resource. Requires permission to access the ListTagsForResource action.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The resource ARN of the IoT Device Advisor resource. This can be SuiteDefinition ARN or SuiteRun ARN.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds to and modifies existing tags of an IoT Device Advisor resource. Requires permission to access the TagResource action.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The resource ARN of an IoT Device Advisor resource. This can be SuiteDefinition ARN or SuiteRun ARN.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from an IoT Device Advisor resource. Requires permission to access the UntagResource action.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AmazonResourceName"
          description: The resource ARN of an IoT Device Advisor resource. This can be SuiteDefinition ARN or SuiteRun ARN.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: List of tag keys to remove from the IoT Device Advisor resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /suiteDefinitions/{suite_definition_id}/suiteRuns:
    post:
      operationId: StartSuiteRun
      description: Starts a Device Advisor test suite run. Requires permission to access the StartSuiteRun action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                suiteDefinitionVersion:
                  $ref: "#/components/schemas/SuiteDefinitionVersion"
                suiteRunConfiguration:
                  $ref: "#/components/schemas/SuiteRunConfiguration"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - suiteRunConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSuiteRunResponse"
  /suiteDefinitions/{suite_definition_id}/suiteRuns/{suite_run_id}/stop:
    post:
      operationId: StopSuiteRun
      description: Stops a Device Advisor test suite run that is currently running. Requires permission to access the StopSuiteRun action.
      parameters:
        - name: suite_definition_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite run to be stopped.
        - name: suite_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: Suite run ID of the test suite run to be stopped.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSuiteRunResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    SuiteDefinitionConfiguration:
      description: Gets the suite definition configuration.
      type: object
      properties:
        suiteDefinitionName:
          $ref: "#/components/schemas/SuiteDefinitionName"
          description: Gets the suite definition name. This is a required parameter.
        devices:
          $ref: "#/components/schemas/DeviceUnderTestList"
          description: Gets the devices configured.
        intendedForQualification:
          $ref: "#/components/schemas/IntendedForQualificationBoolean"
          description: Gets the tests intended for qualification in a suite.
        isLongDurationTest:
          $ref: "#/components/schemas/IsLongDurationTestBoolean"
          description: Verifies if the test suite is a long duration test.
        rootGroup:
          $ref: "#/components/schemas/RootGroup"
          description: Gets the test suite root group. This is a required parameter. For updating or creating the latest qualification suite, if intendedForQualification is set to true, rootGroup can be an empty string. If intendedForQualification is false, rootGroup cannot be an empty string. If rootGroup is empty, and intendedForQualification is set to true, all the qualification tests are included, and the configuration is default. For a qualification suite, the minimum length is 0, and the maximum is 2048. For a non-qualification suite, the minimum length is 1, and the maximum is 2048.
        devicePermissionRoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Gets the device permission ARN. This is a required parameter.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: Sets the MQTT protocol that is configured in the suite definition.
      required:
        - suiteDefinitionName
        - rootGroup
        - devicePermissionRoleArn
    SuiteDefinitionName:
      type: string
      minLength: 1
      maxLength: 256
    DeviceUnderTestList:
      type: array
      items:
        $ref: "#/components/schemas/DeviceUnderTest"
    DeviceUnderTest:
      description: Information of a test device. A thing ARN, certificate ARN or device role ARN is required.
      type: object
      properties:
        thingArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Lists device's thing ARN.
        certificateArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Lists device's certificate ARN.
        deviceRoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: Lists device's role ARN.
    AmazonResourceName:
      type: string
      minLength: 20
      maxLength: 2048
    IntendedForQualificationBoolean:
      type: boolean
    IsLongDurationTestBoolean:
      type: boolean
    RootGroup:
      type: string
      minLength: 0
      maxLength: 2048
    Protocol:
      type: string
      enum:
        - MqttV3_1_1
        - MqttV5
        - MqttV3_1_1_OverWebSocket
        - MqttV5_OverWebSocket
    TagMap:
      type: object
      properties: {}
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[\u0021-\u007E]+$
    CreateSuiteDefinitionResponse:
      type: object
      properties:
        suiteDefinitionId:
          $ref: "#/components/schemas/UUID"
          description: The UUID of the test suite created.
        suiteDefinitionArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the test suite.
        suiteDefinitionName:
          $ref: "#/components/schemas/SuiteDefinitionName"
          description: The suite definition name of the test suite. This is a required parameter.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp of when the test suite was created.
    UUID:
      type: string
      minLength: 12
      maxLength: 36
    Timestamp:
      type: string
      format: date-time
    DeleteSuiteDefinitionResponse:
      type: object
    AuthenticationMethod:
      type: string
      enum:
        - X509ClientCertificate
        - SignatureVersion4
    GetEndpointResponse:
      type: object
      properties:
        endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The response of an Device Advisor endpoint.
    Endpoint:
      type: string
      minLength: 45
      maxLength: 75
    SuiteDefinitionVersion:
      type: string
      minLength: 2
      maxLength: 255
    GetSuiteDefinitionResponse:
      type: object
      properties:
        suiteDefinitionId:
          $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the suite definition.
        suiteDefinitionArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the suite definition.
        suiteDefinitionVersion:
          $ref: "#/components/schemas/SuiteDefinitionVersion"
          description: Suite definition version of the suite definition.
        latestVersion:
          $ref: "#/components/schemas/SuiteDefinitionVersion"
          description: Latest suite definition version of the suite definition.
        suiteDefinitionConfiguration:
          $ref: "#/components/schemas/SuiteDefinitionConfiguration"
          description: Suite configuration of the suite definition.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: Date (in Unix epoch time) when the suite definition was created.
        lastModifiedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Date (in Unix epoch time) when the suite definition was last modified.
        tags:
          type: object
          properties: {}
          description: Tags attached to the suite definition.
    GetSuiteRunResponse:
      type: object
      properties:
        suiteDefinitionId:
          $ref: "#/components/schemas/UUID"
          description: Suite definition ID for the test suite run.
        suiteDefinitionVersion:
          $ref: "#/components/schemas/SuiteDefinitionVersion"
          description: Suite definition version for the test suite run.
        suiteRunId:
          $ref: "#/components/schemas/UUID"
          description: Suite run ID for the test suite run.
        suiteRunArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The ARN of the suite run.
        suiteRunConfiguration:
          $ref: "#/components/schemas/SuiteRunConfiguration"
          description: Suite run configuration for the test suite run.
        testResult:
          $ref: "#/components/schemas/TestResult"
          description: Test results for the test suite run.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: Date (in Unix epoch time) when the test suite run started.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: Date (in Unix epoch time) when the test suite run ended.
        status:
          $ref: "#/components/schemas/SuiteRunStatus"
          description: Status for the test suite run.
        errorReason:
          $ref: "#/components/schemas/ErrorReason"
          description: Error reason for any test suite run failure.
        tags:
          type: object
          properties: {}
          description: The tags attached to the suite run.
    SuiteRunConfiguration:
      description: Gets suite run configuration.
      type: object
      properties:
        primaryDevice:
          $ref: "#/components/schemas/DeviceUnderTest"
          description: Sets the primary device for the test suite run. This requires a thing ARN or a certificate ARN.
        selectedTestList:
          $ref: "#/components/schemas/SelectedTestList"
          description: Sets test case list.
        parallelRun:
          $ref: "#/components/schemas/ParallelRun"
          description: TRUE if multiple test suites run in parallel.
      required:
        - primaryDevice
    SelectedTestList:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    ParallelRun:
      type: boolean
    TestResult:
      description: Show each group result.
      type: object
      properties:
        groups:
          $ref: "#/components/schemas/GroupResultList"
          description: Show each group of test results.
    GroupResultList:
      description: Group Result list.
      type: array
      items:
        $ref: "#/components/schemas/GroupResult"
    GroupResult:
      description: Show Group Result.
      type: object
      properties:
        groupId:
          $ref: "#/components/schemas/UUID"
          description: Group result ID.
        groupName:
          $ref: "#/components/schemas/GroupName"
          description: Group Result Name.
        tests:
          $ref: "#/components/schemas/TestCaseRuns"
          description: Tests under Group Result.
    GroupName:
      type: string
    TestCaseRuns:
      description: Tests under each group result.
      type: array
      items:
        $ref: "#/components/schemas/TestCaseRun"
    TestCaseRun:
      description: Provides the test case run.
      type: object
      properties:
        testCaseRunId:
          $ref: "#/components/schemas/UUID"
          description: Provides the test case run ID.
        testCaseDefinitionId:
          $ref: "#/components/schemas/UUID"
          description: Provides the test case run definition ID.
        testCaseDefinitionName:
          $ref: "#/components/schemas/TestCaseDefinitionName"
          description: Provides the test case run definition name.
        status:
          $ref: "#/components/schemas/Status"
          description: "Provides the test case run status. Status is one of the following: PASS: Test passed. FAIL: Test failed. PENDING: Test has not started running but is scheduled. RUNNING: Test is running. STOPPING: Test is performing cleanup steps. You will see this status only if you stop a suite run. STOPPED Test is stopped. You will see this status only if you stop a suite run. PASS_WITH_WARNINGS: Test passed with warnings. ERORR: Test faced an error when running due to an internal issue."
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: Provides test case run start time.
        endTime:
          $ref: "#/components/schemas/Timestamp"
          description: Provides test case run end time.
        logUrl:
          $ref: "#/components/schemas/LogUrl"
          description: Provides test case run log URL.
        warnings:
          $ref: "#/components/schemas/Warnings"
          description: Provides test case run warnings.
        failure:
          $ref: "#/components/schemas/Failure"
          description: Provides test case run failure result.
        testScenarios:
          $ref: "#/components/schemas/TestCaseScenariosList"
          description: Provides the test scenarios for the test case run.
    TestCaseDefinitionName:
      type: string
    Status:
      type: string
      enum:
        - PASS
        - FAIL
        - CANCELED
        - PENDING
        - RUNNING
        - STOPPING
        - STOPPED
        - PASS_WITH_WARNINGS
        - ERROR
    LogUrl:
      type: string
    Warnings:
      type: string
    Failure:
      type: string
    TestCaseScenariosList:
      type: array
      items:
        $ref: "#/components/schemas/TestCaseScenario"
    TestCaseScenario:
      description: Provides test case scenario.
      type: object
      properties:
        testCaseScenarioId:
          $ref: "#/components/schemas/TestCaseScenarioId"
          description: Provides test case scenario ID.
        testCaseScenarioType:
          $ref: "#/components/schemas/TestCaseScenarioType"
          description: "Provides test case scenario type. Type is one of the following: Advanced Basic"
        status:
          $ref: "#/components/schemas/TestCaseScenarioStatus"
          description: "Provides the test case scenario status. Status is one of the following: PASS: Test passed. FAIL: Test failed. PENDING: Test has not started running but is scheduled. RUNNING: Test is running. STOPPING: Test is performing cleanup steps. You will see this status only if you stop a suite run. STOPPED Test is stopped. You will see this status only if you stop a suite run. PASS_WITH_WARNINGS: Test passed with warnings. ERORR: Test faced an error when running due to an internal issue."
        failure:
          $ref: "#/components/schemas/Failure"
          description: Provides test case scenario failure result.
        systemMessage:
          $ref: "#/components/schemas/SystemMessage"
          description: Provides test case scenario system messages if any.
    TestCaseScenarioId:
      type: string
    TestCaseScenarioType:
      type: string
      enum:
        - Advanced
        - Basic
    TestCaseScenarioStatus:
      type: string
      enum:
        - PASS
        - FAIL
        - CANCELED
        - PENDING
        - RUNNING
        - STOPPING
        - STOPPED
        - PASS_WITH_WARNINGS
        - ERROR
    SystemMessage:
      type: string
    SuiteRunStatus:
      type: string
      enum:
        - PASS
        - FAIL
        - CANCELED
        - PENDING
        - RUNNING
        - STOPPING
        - STOPPED
        - PASS_WITH_WARNINGS
        - ERROR
    ErrorReason:
      type: string
    GetSuiteRunReportResponse:
      type: object
      properties:
        qualificationReportDownloadUrl:
          $ref: "#/components/schemas/QualificationReportDownloadUrl"
          description: Download URL of the qualification report.
    QualificationReportDownloadUrl:
      type: string
    MaxResults:
      type: integer
      minimum: 1
      maximum: 50
    Token:
      type: string
      maxLength: 2000
    ListSuiteDefinitionsResponse:
      type: object
      properties:
        suiteDefinitionInformationList:
          $ref: "#/components/schemas/SuiteDefinitionInformationList"
          description: An array of objects that provide summaries of information about the suite definitions in the list.
        nextToken:
          $ref: "#/components/schemas/Token"
          description: A token used to get the next set of results.
    SuiteDefinitionInformationList:
      type: array
      items:
        $ref: "#/components/schemas/SuiteDefinitionInformation"
    SuiteDefinitionInformation:
      description: Information about the suite definition.
      type: object
      properties:
        suiteDefinitionId:
          $ref: "#/components/schemas/UUID"
          description: Suite definition ID of the test suite.
        suiteDefinitionName:
          $ref: "#/components/schemas/SuiteDefinitionName"
          description: Suite name of the test suite.
        defaultDevices:
          $ref: "#/components/schemas/DeviceUnderTestList"
          description: Specifies the devices that are under test for the test suite.
        intendedForQualification:
          $ref: "#/components/schemas/IntendedForQualificationBoolean"
          description: Specifies if the test suite is intended for qualification.
        isLongDurationTest:
          $ref: "#/components/schemas/IsLongDurationTestBoolean"
          description: Verifies if the test suite is a long duration test.
        protocol:
          $ref: "#/components/schemas/Protocol"
          description: Gets the MQTT protocol that is configured in the suite definition.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: Date (in Unix epoch time) when the test suite was created.
    ListSuiteRunsResponse:
      type: object
      properties:
        suiteRunsList:
