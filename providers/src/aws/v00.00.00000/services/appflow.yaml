      type: object
      properties:
        maxPageSize:
          $ref: "#/components/schemas/SAPODataMaxPageSize"
          description: The maximum number of records that Amazon AppFlow receives in each page of the response from your SAP application. For transfers of OData records, the maximum page size is 3,000. For transfers of data that comes from an ODP provider, the maximum page size is 10,000.
      required:
