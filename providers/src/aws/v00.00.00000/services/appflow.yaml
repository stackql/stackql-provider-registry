      type: object
      properties:
        putFailuresCount:
          $ref: "#/components/schemas/Long"
          description: Specifies the failure count for the attempted flow.
        executionMessage:
          $ref: "#/components/schemas/ExecutionMessage"
          description: Specifies the error message that appears if a flow fails.
    ExecutionMessage:
      type: string
      maxLength: 2048
      pattern: "[\\s\\w/!@#+=.-]*"
