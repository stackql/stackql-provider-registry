          description: The intermediate bucket that Amazon AppFlow uses when moving data into Amazon Redshift.
        bucketPrefix:
          $ref: "#/components/schemas/BucketPrefix"
          description: The object key for the bucket in which Amazon AppFlow places the destination files.
        errorHandlingConfig:
          $ref: "#/components/schemas/ErrorHandlingConfig"
          description: The settings that determine how Amazon AppFlow handles an error when placing data in the Amazon Redshift destination. For example, this setting would determine if the flow should fail after one insertion error, or continue and attempt to insert every record regardless of the initial failure. ErrorHandlingConfig is a part of the destination connector details.
