    SAPODataParallelismConfig:
      description: Sets the number of concurrent processes that transfer OData records from your SAP instance. A concurrent process is query that retrieves a batch of records as part of a flow run. Amazon AppFlow can run multiple concurrent processes in parallel to transfer data faster.
      type: object
      properties:
        maxParallelism:
