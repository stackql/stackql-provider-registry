        - object
        - intermediateBucketName
    ErrorHandlingConfig:
      description: The settings that determine how Amazon AppFlow handles an error when placing data in the destination. For example, this setting would determine if the flow should fail after one insertion error, or continue and attempt to insert every record regardless of the initial failure. ErrorHandlingConfig is a part of the destination connector details.
      type: object
      properties:
        failOnFirstDestinationError:
          $ref: "#/components/schemas/Boolean"
          description: Specifies if the flow should fail after the first instance of a failure when attempting to place data in the destination.
        bucketPrefix:
          $ref: "#/components/schemas/BucketPrefix"
          description: Specifies the Amazon S3 bucket prefix.
        bucketName:
          $ref: "#/components/schemas/BucketName"
          description: Specifies the name of the Amazon S3 bucket.
