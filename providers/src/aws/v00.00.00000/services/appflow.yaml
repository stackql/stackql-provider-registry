    TriggerConfig:
      description: The trigger settings that determine how and when Amazon AppFlow runs the specified flow.
      type: object
      properties:
        triggerType:
          $ref: "#/components/schemas/TriggerType"
          description: Specifies the type of flow trigger. This can be OnDemand, Scheduled, or Event.
        triggerProperties:
          $ref: "#/components/schemas/TriggerProperties"
          description: Specifies the configuration details of a schedule-triggered flow as defined by the user. Currently, these settings only apply to the Scheduled trigger type.
      required:
        - triggerType
    TriggerType:
      type: string
      enum:
        - Scheduled
        - Event
        - OnDemand
    TriggerProperties:
      description: Specifies the configuration details that control the trigger for a flow. Currently, these settings only apply to the Scheduled trigger type.
      type: object
      properties:
        Scheduled:
          $ref: "#/components/schemas/ScheduledTriggerProperties"
          description: Specifies the configuration details of a schedule-triggered flow as defined by the user.
    ScheduledTriggerProperties:
      description: Specifies the configuration details of a schedule-triggered flow as defined by the user. Currently, these settings only apply to the Scheduled trigger type.
      type: object
      properties:
        scheduleExpression:
          $ref: "#/components/schemas/ScheduleExpression"
          description: The scheduling expression that determines the rate at which the schedule will run, for example rate(5minutes).
        dataPullMode:
          $ref: "#/components/schemas/DataPullMode"
          description: Specifies whether a scheduled flow has an incremental data transfer or a complete data transfer for each flow run.
        scheduleStartTime:
          $ref: "#/components/schemas/Date"
          description: The time at which the scheduled flow starts. The time is formatted as a timestamp that follows the ISO 8601 standard, such as 2022-04-26T13:00:00-07:00.
        scheduleEndTime:
          $ref: "#/components/schemas/Date"
          description: The time at which the scheduled flow ends. The time is formatted as a timestamp that follows the ISO 8601 standard, such as 2022-04-27T13:00:00-07:00.
        timezone:
          $ref: "#/components/schemas/Timezone"
          description: Specifies the time zone used when referring to the dates and times of a scheduled flow, such as America/New_York. This time zone is only a descriptive label. It doesn't affect how Amazon AppFlow interprets the timestamps that you specify to schedule the flow. If you want to schedule a flow by using times in a particular time zone, indicate the time zone as a UTC offset in your timestamps. For example, the UTC offsets for the America/New_York timezone are -04:00 EDT and -05:00 EST.
        scheduleOffset:
          $ref: "#/components/schemas/ScheduleOffset"
          description: Specifies the optional offset that is added to the time interval for a schedule-triggered flow.
        firstExecutionFrom:
          $ref: "#/components/schemas/Date"
          description: Specifies the date range for the records to import from the connector in the first flow run.
        flowErrorDeactivationThreshold:
          $ref: "#/components/schemas/FlowErrorDeactivationThreshold"
          description: Defines how many times a scheduled flow fails consecutively before Amazon AppFlow deactivates it.
      required:
        - scheduleExpression
    ScheduleExpression:
      type: string
      maxLength: 256
      pattern: .*
    DataPullMode:
      type: string
      enum:
        - Incremental
        - Complete
    Date:
      type: string
      format: date-time
    Timezone:
      type: string
      maxLength: 256
      pattern: .*
    ScheduleOffset:
      type: integer
      format: int64
      minimum: 0
      maximum: 36000
    FlowErrorDeactivationThreshold:
      type: integer
      minimum: 1
      maximum: 100
