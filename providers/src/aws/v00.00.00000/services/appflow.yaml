openapi: 3.0.0
info:
  version: "2020-08-23"
  title: Amazon Appflow
  description: Amazon Appflow
  x-serviceName: appflow
  x-serviceAlias: appflow
  x-protocol: rest-json
  x-apiVersion: "2020-08-23"
  x-endpointPrefix: appflow
  x-jsonVersion: "1.1"
servers:
  - url: https://appflow.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appflow
paths:
  /cancel-flow-executions:
    post:
      operationId: CancelFlowExecutions
      description: Cancels active runs for a flow. You can cancel all of the active runs for a flow, or you can cancel specific runs by providing their IDs. You can cancel a flow run only when the run is in progress. You can't cancel a run that has already completed or failed. You also can't cancel a run that's scheduled to occur but hasn't started yet. To prevent a scheduled run, you can deactivate the flow with the StopFlow action. You cannot resume a run after you cancel it. When you send your request, the status for each run becomes CancelStarted. When the cancellation completes, the status becomes Canceled. When you cancel a run, you still incur charges for any data that the run already processed before the cancellation. If the run had already written some data to the flow destination, then that data remains in the destination. If you configured the flow to use a batch API (such as the Salesforce Bulk API 2.0), then the run will finish reading or writing its entire batch of data after the cancellation. For these operations, the data processing charges for Amazon AppFlow apply. For the pricing information, see Amazon AppFlow pricing.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                executionIds:
                  $ref: "#/components/schemas/ExecutionIds"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelFlowExecutionsResponse"
  /create-connector-profile:
    post:
      operationId: CreateConnectorProfile
      description: Creates a new connector profile associated with your Amazon Web Services account. There is a soft quota of 100 connector profiles per Amazon Web Services account. If you need more connector profiles than this quota allows, you can submit a request to the Amazon AppFlow team through the Amazon AppFlow support channel. In each connector profile that you create, you can provide the credentials and properties for only one connector.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                kmsArn:
                  $ref: "#/components/schemas/KMSArn"
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
                connectionMode:
                  $ref: "#/components/schemas/ConnectionMode"
                connectorProfileConfig:
                  $ref: "#/components/schemas/ConnectorProfileConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - connectorProfileName
                - connectorType
                - connectionMode
                - connectorProfileConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorProfileResponse"
  /create-flow:
    post:
      operationId: CreateFlow
      description: Enables your application to create a new flow using Amazon AppFlow. You must create a connector profile before calling this API. Please note that the Request Syntax below shows syntax for multiple destinations, however, you can only transfer data to one item in this list at a time. Amazon AppFlow does not currently support flows to multiple destinations at once.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                description:
                  $ref: "#/components/schemas/FlowDescription"
                kmsArn:
                  $ref: "#/components/schemas/KMSArn"
                triggerConfig:
                  $ref: "#/components/schemas/TriggerConfig"
                sourceFlowConfig:
                  $ref: "#/components/schemas/SourceFlowConfig"
                destinationFlowConfigList:
                  $ref: "#/components/schemas/DestinationFlowConfigList"
                tasks:
                  $ref: "#/components/schemas/Tasks"
                tags:
                  $ref: "#/components/schemas/TagMap"
                metadataCatalogConfig:
                  $ref: "#/components/schemas/MetadataCatalogConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - flowName
                - triggerConfig
                - sourceFlowConfig
                - destinationFlowConfigList
                - tasks
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateFlowResponse"
  /delete-connector-profile:
    post:
      operationId: DeleteConnectorProfile
      description: Enables you to delete an existing connector profile.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                forceDelete:
                  $ref: "#/components/schemas/Boolean"
              required:
                - connectorProfileName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteConnectorProfileResponse"
  /delete-flow:
    post:
      operationId: DeleteFlow
      description: Enables your application to delete an existing flow. Before deleting the flow, Amazon AppFlow validates the request by checking the flow configuration and status. You can delete flows one at a time.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                forceDelete:
                  $ref: "#/components/schemas/Boolean"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteFlowResponse"
  /describe-connector:
    post:
      operationId: DescribeConnector
      description: Describes the given custom connector registered in your Amazon Web Services account. This API can be used for custom connectors that are registered in your account and also for Amazon authored connectors.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
              required:
                - connectorType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorResponse"
  /describe-connector-entity:
    post:
      operationId: DescribeConnectorEntity
      description: Provides details regarding the entity used with the connector, with a description of the data model for each field in that entity.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorEntityName:
                  $ref: "#/components/schemas/EntityName"
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                apiVersion:
                  $ref: "#/components/schemas/ApiVersion"
              required:
                - connectorEntityName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorEntityResponse"
  /describe-connector-profiles:
    post:
      operationId: DescribeConnectorProfiles
      description: Returns a list of connector-profile details matching the provided connector-profile names and connector-types. Both input lists are optional, and you can use them to filter the result. If no names or connector-types are provided, returns all connector profiles in a paginated form. If there is no match, this operation returns an empty list.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileNames:
                  $ref: "#/components/schemas/ConnectorProfileNameList"
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorProfilesResponse"
  /describe-connectors:
    post:
      operationId: DescribeConnectors
      description: Describes the connectors vended by Amazon AppFlow for specified connector types. If you don't specify a connector type, this operation describes all connectors vended by Amazon AppFlow. If there are more connectors than can be returned in one page, the response contains a nextToken object, which can be be passed in to the next call to the DescribeConnectors API operation to retrieve the next page.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorTypes:
                  $ref: "#/components/schemas/ConnectorTypeList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeConnectorsResponse"
  /describe-flow:
    post:
      operationId: DescribeFlow
      description: Provides a description of the specified flow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFlowResponse"
  /describe-flow-execution-records:
    post:
      operationId: DescribeFlowExecutionRecords
      description: Fetches the execution history of the flow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeFlowExecutionRecordsResponse"
  /list-connector-entities:
    post:
      operationId: ListConnectorEntities
      description: Returns the list of available connector entities supported by Amazon AppFlow. For example, you can query Salesforce for Account and Opportunity entities, or query ServiceNow for the Incident entity.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                entitiesPath:
                  $ref: "#/components/schemas/EntitiesPath"
                apiVersion:
                  $ref: "#/components/schemas/ApiVersion"
                maxResults:
                  $ref: "#/components/schemas/ListEntitiesMaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorEntitiesResponse"
  /list-connectors:
    post:
      operationId: ListConnectors
      description: Returns the list of all registered custom connectors in your Amazon Web Services account. This API lists only custom connectors registered in this account, not the Amazon Web Services authored connectors.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsResponse"
  /list-flows:
    post:
      operationId: ListFlows
      description: Lists all of the flows associated with your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Retrieves the tags that are associated with a specified flow.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the specified flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Applies a tag to the specified flow.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the flow that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from the specified flow.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ARN"
          description: The Amazon Resource Name (ARN) of the flow that you want to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys associated with the tag that you want to remove from your flow.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /register-connector:
    post:
      operationId: RegisterConnector
      description: Registers a new custom connector with your Amazon Web Services account. Before you can register the connector, you must deploy the associated AWS lambda function in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
                description:
                  $ref: "#/components/schemas/Description"
                connectorProvisioningType:
                  $ref: "#/components/schemas/ConnectorProvisioningType"
                connectorProvisioningConfig:
                  $ref: "#/components/schemas/ConnectorProvisioningConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterConnectorResponse"
  /reset-connector-metadata-cache:
    post:
      operationId: ResetConnectorMetadataCache
      description: Resets metadata about your connector entities that Amazon AppFlow stored in its cache. Use this action when you want Amazon AppFlow to return the latest information about the data that you have in a source application. Amazon AppFlow returns metadata about your entities when you use the ListConnectorEntities or DescribeConnectorEntities actions. Following these actions, Amazon AppFlow caches the metadata to reduce the number of API requests that it must send to the source application. Amazon AppFlow automatically resets the cache once every hour, but you can use this action when you want to get the latest metadata right away.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                connectorType:
                  $ref: "#/components/schemas/ConnectorType"
                connectorEntityName:
                  $ref: "#/components/schemas/EntityName"
                entitiesPath:
                  $ref: "#/components/schemas/EntitiesPath"
                apiVersion:
                  $ref: "#/components/schemas/ApiVersion"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetConnectorMetadataCacheResponse"
  /start-flow:
    post:
      operationId: StartFlow
      description: Activates an existing flow. For on-demand flows, this operation runs the flow immediately. For schedule and event-triggered flows, this operation activates the flow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartFlowResponse"
  /stop-flow:
    post:
      operationId: StopFlow
      description: Deactivates the existing flow. For on-demand flows, this operation returns an unsupportedOperationException error message. For schedule and event-triggered flows, this operation deactivates the flow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
              required:
                - flowName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopFlowResponse"
  /unregister-connector:
    post:
      operationId: UnregisterConnector
      description: Unregisters the custom connector registered in your account that matches the connector label provided in the request.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
                forceDelete:
                  $ref: "#/components/schemas/Boolean"
              required:
                - connectorLabel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnregisterConnectorResponse"
  /update-connector-profile:
    post:
      operationId: UpdateConnectorProfile
      description: Updates a given connector profile associated with your account.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorProfileName:
                  $ref: "#/components/schemas/ConnectorProfileName"
                connectionMode:
                  $ref: "#/components/schemas/ConnectionMode"
                connectorProfileConfig:
                  $ref: "#/components/schemas/ConnectorProfileConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - connectorProfileName
                - connectionMode
                - connectorProfileConfig
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectorProfileResponse"
  /update-connector-registration:
    post:
      operationId: UpdateConnectorRegistration
      description: "Updates a custom connector that you've previously registered. This operation updates the connector with one of the following: The latest version of the AWS Lambda function that's assigned to the connector A new AWS Lambda function that you specify"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connectorLabel:
                  $ref: "#/components/schemas/ConnectorLabel"
                description:
                  $ref: "#/components/schemas/Description"
                connectorProvisioningConfig:
                  $ref: "#/components/schemas/ConnectorProvisioningConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - connectorLabel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectorRegistrationResponse"
  /update-flow:
    post:
      operationId: UpdateFlow
      description: Updates an existing flow.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flowName:
                  $ref: "#/components/schemas/FlowName"
                description:
                  $ref: "#/components/schemas/FlowDescription"
                triggerConfig:
                  $ref: "#/components/schemas/TriggerConfig"
                sourceFlowConfig:
                  $ref: "#/components/schemas/SourceFlowConfig"
                destinationFlowConfigList:
                  $ref: "#/components/schemas/DestinationFlowConfigList"
                tasks:
                  $ref: "#/components/schemas/Tasks"
                metadataCatalogConfig:
                  $ref: "#/components/schemas/MetadataCatalogConfig"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - flowName
                - triggerConfig
                - sourceFlowConfig
                - destinationFlowConfigList
                - tasks
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateFlowResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    FlowName:
      type: string
      maxLength: 256
      pattern: "[a-zA-Z0-9][\\w!@#.-]+"
    ExecutionIds:
      type: array
      items:
        $ref: "#/components/schemas/ExecutionId"
    ExecutionId:
      type: string
      maxLength: 256
      pattern: \S+
    CancelFlowExecutionsResponse:
      type: object
      properties:
        invalidExecutions:
          $ref: "#/components/schemas/ExecutionIds"
          description: The IDs of runs that Amazon AppFlow couldn't cancel. These runs might be ineligible for canceling because they haven't started yet or have already completed.
    ConnectorProfileName:
      type: string
      maxLength: 256
      pattern: "[\\w/!@#+=.-]+"
    KMSArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws:kms:.*:[0-9]+:.*
    ConnectorType:
      type: string
      enum:
        - Salesforce
        - Singular
        - Slack
        - Redshift
        - S3
        - Marketo
        - Googleanalytics
        - Zendesk
        - Servicenow
        - Datadog
        - Trendmicro
        - Snowflake
        - Dynatrace
        - Infornexus
        - Amplitude
        - Veeva
        - EventBridge
        - LookoutMetrics
        - Upsolver
        - Honeycode
        - CustomerProfiles
        - SAPOData
        - CustomConnector
        - Pardot
    ConnectorLabel:
      type: string
      maxLength: 256
      pattern: "[a-zA-Z0-9][\\w!@#.-]+"
    ConnectionMode:
      type: string
      enum:
        - Public
        - Private
    ConnectorProfileConfig:
      description: Defines the connector-specific configuration and credentials for the connector profile.
      type: object
      properties:
        connectorProfileProperties:
          $ref: "#/components/schemas/ConnectorProfileProperties"
          description: The connector-specific properties of the profile configuration.
        connectorProfileCredentials:
          $ref: "#/components/schemas/ConnectorProfileCredentials"
          description: The connector-specific credentials required by each connector.
      required:
        - connectorProfileProperties
    ConnectorProfileProperties:
      description: The connector-specific profile properties required by each connector.
      type: object
      properties:
        Amplitude:
          $ref: "#/components/schemas/AmplitudeConnectorProfileProperties"
          description: The connector-specific properties required by Amplitude.
        Datadog:
          $ref: "#/components/schemas/DatadogConnectorProfileProperties"
          description: The connector-specific properties required by Datadog.
        Dynatrace:
          $ref: "#/components/schemas/DynatraceConnectorProfileProperties"
          description: The connector-specific properties required by Dynatrace.
        GoogleAnalytics:
          $ref: "#/components/schemas/GoogleAnalyticsConnectorProfileProperties"
          description: The connector-specific properties required Google Analytics.
        Honeycode:
          $ref: "#/components/schemas/HoneycodeConnectorProfileProperties"
          description: The connector-specific properties required by Amazon Honeycode.
        InforNexus:
          $ref: "#/components/schemas/InforNexusConnectorProfileProperties"
          description: The connector-specific properties required by Infor Nexus.
        Marketo:
          $ref: "#/components/schemas/MarketoConnectorProfileProperties"
          description: The connector-specific properties required by Marketo.
        Redshift:
          $ref: "#/components/schemas/RedshiftConnectorProfileProperties"
          description: The connector-specific properties required by Amazon Redshift.
        Salesforce:
          $ref: "#/components/schemas/SalesforceConnectorProfileProperties"
          description: The connector-specific properties required by Salesforce.
        ServiceNow:
          $ref: "#/components/schemas/ServiceNowConnectorProfileProperties"
          description: The connector-specific properties required by serviceNow.
        Singular:
          $ref: "#/components/schemas/SingularConnectorProfileProperties"
          description: The connector-specific properties required by Singular.
        Slack:
