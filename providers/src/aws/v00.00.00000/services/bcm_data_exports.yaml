openapi: 3.0.0
info:
  version: "2023-11-26"
  title: AWS Billing and Cost Management Data Exports
  description: AWS Billing and Cost Management Data Exports
  x-serviceName: bcm-data-exports
  x-serviceAlias: bcm_data_exports
  x-protocol: json
  x-apiVersion: "2023-11-26"
  x-endpointPrefix: bcm-data-exports
  x-targetPrefix: AWSBillingAndCostManagementDataExports
  x-jsonVersion: "1.1"
servers:
  - url: https://bcm-data-exports.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bcm-data-exports
paths:
  /CreateExport:
    post:
      operationId: CreateExport
      description: Creates a data export and specifies the data query, the delivery preference, and any optional resource tags. A DataQuery consists of both a QueryStatement and TableConfigurations. The QueryStatement is an SQL statement. Data Exports only supports a limited subset of the SQL syntax. For more information on the SQL syntax that is supported, see Data query. To view the available tables and columns, see the Data Exports table dictionary. The TableConfigurations is a collection of specified TableProperties for the table being queried in the QueryStatement. TableProperties are additional configurations you can provide to change the data and schema of a table. Each table can have different TableProperties. However, tables are not required to have any TableProperties. Each table property has a default value that it assumes if not specified. For more information on table configurations, see Data query. To view the table properties available for each table, see the Data Exports table dictionary or use the ListTables API to get a response of all tables and their available properties.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.CreateExport
            default: AWSBillingAndCostManagementDataExports.CreateExport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Export:
                  $ref: "#/components/schemas/Export"
                  description: The details of the export, including data query, name, description, and destination configuration.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: An optional list of tags to associate with the specified export. Each tag consists of a key and a value, and each key must be unique for the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateExportResponse"
  /DeleteExport:
    post:
      operationId: DeleteExport
      description: Deletes an existing data export.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.DeleteExport
            default: AWSBillingAndCostManagementDataExports.DeleteExport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExportArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for this export.
              required:
                - ExportArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteExportResponse"
  /GetExecution:
    post:
      operationId: GetExecution
      description: Exports data based on the source data update.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.GetExecution
            default: AWSBillingAndCostManagementDataExports.GetExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExportArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) of the Export object that generated this specific execution.
                ExecutionId:
                  $ref: "#/components/schemas/GenericString"
                  description: The ID for this specific execution.
              required:
                - ExportArn
                - ExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExecutionResponse"
  /GetExport:
    post:
      operationId: GetExport
      description: Views the definition of an existing data export.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.GetExport
            default: AWSBillingAndCostManagementDataExports.GetExport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExportArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for this export.
              required:
                - ExportArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetExportResponse"
  /GetTable:
    post:
      operationId: GetTable
      description: Returns the metadata for the specified table and table properties. This includes the list of columns in the table schema, their data types, and column descriptions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.GetTable
            default: AWSBillingAndCostManagementDataExports.GetTable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                TableName:
                  $ref: "#/components/schemas/TableName"
                  description: The name of the table.
                TableProperties:
                  $ref: "#/components/schemas/TableProperties"
                  description: TableProperties are additional configurations you can provide to change the data and schema of a table. Each table can have different TableProperties. Tables are not required to have any TableProperties. Each table property has a default value that it assumes if not specified.
              required:
                - TableName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTableResponse"
  /ListExecutions:
    post:
      operationId: ListExecutions
      description: Lists the historical executions for the export.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.ListExecutions
            default: AWSBillingAndCostManagementDataExports.ListExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExportArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for this export.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of objects that are returned for the request.
                NextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results.
              required:
                - ExportArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExecutionsResponse"
  /ListExports:
    post:
      operationId: ListExports
      description: Lists all data export definitions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.ListExports
            default: AWSBillingAndCostManagementDataExports.ListExports
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of objects that are returned for the request.
                NextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListExportsResponse"
  /ListTables:
    post:
      operationId: ListTables
      description: Lists all available tables in data exports.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.ListTables
            default: AWSBillingAndCostManagementDataExports.ListTables
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of objects that are returned for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTablesResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: List tags associated with an existing data export.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.ListTagsForResource
            default: AWSBillingAndCostManagementDataExports.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The unique identifier for the resource.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of objects that are returned for the request.
                NextToken:
                  $ref: "#/components/schemas/NextPageToken"
                  description: The token to retrieve the next set of results.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags for an existing data export definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.TagResource
            default: AWSBillingAndCostManagementDataExports.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The unique identifier for the resource.
                ResourceTags:
                  $ref: "#/components/schemas/ResourceTagList"
                  description: The tags to associate with the resource. Each tag consists of a key and a value, and each key must be unique for the resource.
              required:
                - ResourceArn
                - ResourceTags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Deletes tags associated with an existing data export definition.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.UntagResource
            default: AWSBillingAndCostManagementDataExports.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/Arn"
                  description: The unique identifier for the resource.
                ResourceTagKeys:
                  $ref: "#/components/schemas/ResourceTagKeyList"
                  description: The tag keys that are associated with the resource ARN.
              required:
                - ResourceArn
                - ResourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateExport:
    post:
      operationId: UpdateExport
      description: Updates an existing data export by overwriting all export parameters. All export parameters must be provided in the UpdateExport request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSBillingAndCostManagementDataExports.UpdateExport
            default: AWSBillingAndCostManagementDataExports.UpdateExport
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ExportArn:
                  $ref: "#/components/schemas/Arn"
                  description: The Amazon Resource Name (ARN) for this export.
                Export:
                  $ref: "#/components/schemas/Export"
                  description: The name and query details for the export.
              required:
                - ExportArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateExportResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Export:
      description: The details that are available for an export.
      type: object
      properties:
        ExportArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for this export.
        Name:
          $ref: "#/components/schemas/ExportName"
          description: The name of this specific data export.
        Description:
          $ref: "#/components/schemas/GenericString"
          description: The description for this specific data export.
        DataQuery:
          $ref: "#/components/schemas/DataQuery"
          description: The data query for this specific data export.
        DestinationConfigurations:
          $ref: "#/components/schemas/DestinationConfigurations"
          description: The destination configuration for this specific data export.
        RefreshCadence:
          $ref: "#/components/schemas/RefreshCadence"
          description: The cadence for Amazon Web Services to update the export in your S3 bucket.
      required:
        - Name
        - DataQuery
        - DestinationConfigurations
        - RefreshCadence
    Arn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:aws[-a-z0-9]*:(bcm-data-exports):[-a-z0-9]*:[0-9]{12}:[-a-zA-Z0-9/:_]+
    ExportName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9A-Za-z\\-_]+"
    GenericString:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    DataQuery:
      description: The SQL query of column selections and row filters from the data table you want.
      type: object
      properties:
        QueryStatement:
          $ref: "#/components/schemas/QueryStatement"
          description: The query statement.
        TableConfigurations:
          type: object
          properties: {}
          description: The table configuration.
      required:
        - QueryStatement
    QueryStatement:
      type: string
      minLength: 1
      maxLength: 36000
      pattern: "[\\S\\s]*"
    DestinationConfigurations:
      description: The destinations used for data exports.
      type: object
      properties:
        S3Destination:
          $ref: "#/components/schemas/S3Destination"
          description: An object that describes the destination of the data exports file.
      required:
        - S3Destination
    S3Destination:
      description: Describes the destination Amazon Simple Storage Service (Amazon S3) bucket name and object keys of a data exports file.
      type: object
      properties:
        S3Bucket:
          $ref: "#/components/schemas/GenericString"
          description: The name of the Amazon S3 bucket used as the destination of a data export file.
        S3BucketOwner:
          $ref: "#/components/schemas/AccountId"
          description: The AWS Account ID that owns the S3 bucket used as the destination for the data export.
        S3Prefix:
          $ref: "#/components/schemas/GenericString"
          description: The S3 path prefix you want prepended to the name of your data export.
        S3Region:
          $ref: "#/components/schemas/GenericString"
          description: The S3 bucket Region.
        S3OutputConfigurations:
          $ref: "#/components/schemas/S3OutputConfigurations"
          description: The output configuration for the data export.
      required:
        - S3Bucket
        - S3Prefix
        - S3Region
        - S3OutputConfigurations
    AccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[0-9]{12}"
    S3OutputConfigurations:
      description: The compression type, file format, and overwrite preference for the data export.
      type: object
      properties:
        OutputType:
          $ref: "#/components/schemas/S3OutputType"
          description: The output type for the data export.
        Format:
          $ref: "#/components/schemas/FormatOption"
          description: The file format for the data export.
        Compression:
          $ref: "#/components/schemas/CompressionOption"
          description: The compression type for the data export.
        Overwrite:
          $ref: "#/components/schemas/OverwriteOption"
          description: The rule to follow when generating a version of the data export file. You have the choice to overwrite the previous version or to be delivered in addition to the previous versions. Overwriting exports can save on Amazon S3 storage costs. Creating new export versions allows you to track the changes in cost and usage data over time.
      required:
        - OutputType
        - Format
        - Compression
        - Overwrite
    S3OutputType:
      type: string
      enum:
        - CUSTOM
        - ATHENA
        - REDSHIFT
    FormatOption:
      type: string
      enum:
        - TEXT_OR_CSV
        - PARQUET
    CompressionOption:
      type: string
      enum:
        - GZIP
        - PARQUET
    OverwriteOption:
      type: string
      enum:
        - CREATE_NEW_REPORT
        - OVERWRITE_REPORT
    RefreshCadence:
      description: The cadence for Amazon Web Services to update the data export in your S3 bucket.
      type: object
      properties:
        Frequency:
          $ref: "#/components/schemas/FrequencyOption"
          description: The frequency that data exports are updated. The export refreshes each time the source data updates, up to three times daily.
      required:
        - Frequency
    FrequencyOption:
      type: string
      enum:
        - SYNCHRONOUS
    ResourceTagList:
      type: array
      items:
        $ref: "#/components/schemas/ResourceTag"
    ResourceTag:
      description: The tag structure that contains a tag key and value.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/ResourceTagKey"
          description: The key that's associated with the tag.
        Value:
          $ref: "#/components/schemas/ResourceTagValue"
          description: The value that's associated with the tag.
      required:
        - Key
        - Value
    ResourceTagKey:
      type: string
      minLength: 1
      maxLength: 128
    ResourceTagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateExportResponse:
      type: object
      properties:
        ExportArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for this export.
    DeleteExportResponse:
      type: object
      properties:
        ExportArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for this export.
    GetExecutionResponse:
      type: object
      properties:
        ExecutionId:
          $ref: "#/components/schemas/GenericString"
          description: The ID for this specific execution.
        Export:
          $ref: "#/components/schemas/Export"
          description: The export data for this specific execution. This export data is a snapshot from when the execution was generated. The data could be different from the current export data if the export was updated since the execution was generated.
        ExecutionStatus:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The status of this specific execution.
    ExecutionStatus:
      description: The status of the execution.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/ExecutionStatusCode"
          description: The code for the status of the execution.
        StatusReason:
          $ref: "#/components/schemas/ExecutionStatusReason"
          description: The reason for the failed status.
        CreatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time when the execution was created.
        CompletedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time when the execution was completed.
        LastUpdatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The time when the execution was last updated.
    ExecutionStatusCode:
      type: string
      enum:
        - INITIATION_IN_PROCESS
        - QUERY_QUEUED
        - QUERY_IN_PROCESS
        - QUERY_FAILURE
        - DELIVERY_IN_PROCESS
        - DELIVERY_SUCCESS
        - DELIVERY_FAILURE
    ExecutionStatusReason:
      type: string
      enum:
        - INSUFFICIENT_PERMISSION
        - BILL_OWNER_CHANGED
        - INTERNAL_FAILURE
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    GetExportResponse:
      type: object
      properties:
        Export:
          $ref: "#/components/schemas/Export"
          description: The data for this specific export.
        ExportStatus:
          $ref: "#/components/schemas/ExportStatus"
          description: The status of this specific export.
    ExportStatus:
      description: The status of the data export.
      type: object
      properties:
        StatusCode:
          $ref: "#/components/schemas/ExportStatusCode"
          description: The status code for the request.
        StatusReason:
          $ref: "#/components/schemas/ExecutionStatusReason"
          description: The description for the status code.
        CreatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of when the export was created.
        LastUpdatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of when the export was updated.
        LastRefreshedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: The timestamp of when the export was last generated.
    ExportStatusCode:
      type: string
      enum:
        - HEALTHY
        - UNHEALTHY
    TableName:
      type: string
      minLength: 0
      maxLength: 1024
      pattern: "[\\S\\s]*"
    TableProperties:
      type: object
      properties: {}
    GetTableResponse:
      type: object
      properties:
        TableName:
          $ref: "#/components/schemas/TableName"
          description: The name of the table.
        Description:
          $ref: "#/components/schemas/GenericString"
          description: The table description.
        TableProperties:
          type: object
          properties: {}
          description: TableProperties are additional configurations you can provide to change the data and schema of a table. Each table can have different TableProperties. Tables are not required to have any TableProperties. Each table property has a default value that it assumes if not specified.
        Schema:
          $ref: "#/components/schemas/ColumnList"
          description: The schema of the table.
    ColumnList:
      type: array
      items:
        $ref: "#/components/schemas/Column"
    Column:
      description: Includes basic information for a data column such as its description, name, and type.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/GenericString"
          description: The column name.
        Type:
          $ref: "#/components/schemas/GenericString"
          description: The kind of data a column stores.
        Description:
          $ref: "#/components/schemas/GenericString"
          description: The description for a column.
    MaxResults:
      type: integer
      minimum: 1
      maximum: 300
    NextPageToken:
      type: string
      minLength: 0
      maxLength: 8192
      pattern: "[\\S\\s]*"
    ListExecutionsResponse:
      type: object
      properties:
        Executions:
          $ref: "#/components/schemas/ExecutionReferenceList"
          description: The list of executions.
        NextToken:
          $ref: "#/components/schemas/NextPageToken"
          description: The token to retrieve the next set of results.
    ExecutionReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/ExecutionReference"
    ExecutionReference:
      description: The reference for the data export update.
      type: object
      properties:
        ExecutionId:
          $ref: "#/components/schemas/GenericString"
          description: The ID for this specific execution.
        ExecutionStatus:
          $ref: "#/components/schemas/ExecutionStatus"
          description: The status of this specific execution.
      required:
        - ExecutionId
        - ExecutionStatus
    ListExportsResponse:
      type: object
      properties:
        Exports:
          $ref: "#/components/schemas/ExportReferenceList"
          description: The details of the exports, including name and export status.
        NextToken:
          $ref: "#/components/schemas/NextPageToken"
          description: The token to retrieve the next set of results.
    ExportReferenceList:
      type: array
      items:
        $ref: "#/components/schemas/ExportReference"
    ExportReference:
      description: The reference details for a given export.
      type: object
      properties:
        ExportArn:
          $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) for this export.
        ExportName:
          $ref: "#/components/schemas/ExportName"
          description: The name of this specific data export.
