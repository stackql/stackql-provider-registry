openapi: 3.0.0
info:
  version: "2018-05-10"
  title: PcaConnectorAd
  description: PcaConnectorAd
  x-serviceName: pca-connector-ad
  x-serviceAlias: pca_connector_ad
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: pca-connector-ad
  x-jsonVersion: "1.1"
servers:
  - url: https://pca-connector-ad.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for pca-connector-ad
paths:
  /connectors:
    post:
      operationId: CreateConnector
      description: Creates a connector between Amazon Web Services Private CA and an Active Directory. You must specify the private CA, directory ID, and security groups.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CertificateAuthorityArn:
                  $ref: "#/components/schemas/CertificateAuthorityArn"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                Tags:
                  $ref: "#/components/schemas/Tags"
                VpcInformation:
                  $ref: "#/components/schemas/VpcInformation"
              required:
                - CertificateAuthorityArn
                - DirectoryId
                - VpcInformation
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectorResponse"
    get:
      operationId: ListConnectors
      description: Lists the connectors that you created by using the https://docs.aws.amazon.com/pca-connector-ad/latest/APIReference/API_CreateConnector action.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectorsResponse"
  /directoryRegistrations:
    post:
      operationId: CreateDirectoryRegistration
      description: Creates a directory registration that authorizes communication between Amazon Web Services Private CA and an Active Directory
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                DirectoryId:
                  $ref: "#/components/schemas/DirectoryId"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - DirectoryId
      responses:
        "202":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectoryRegistrationResponse"
    get:
      operationId: ListDirectoryRegistrations
      description: Lists the directory registrations that you created by using the https://docs.aws.amazon.com/pca-connector-ad/latest/APIReference/API_CreateDirectoryRegistration action.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDirectoryRegistrationsResponse"
  /directoryRegistrations/{directory_registration_arn}/servicePrincipalNames/{connector_arn}:
    post:
      operationId: CreateServicePrincipalName
      description: Creates a service principal name (SPN) for the service account in Active Directory. Kerberos authentication uses SPNs to associate a service instance with a service sign-in account.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
      responses:
        "202":
          description: Success
    delete:
      operationId: DeleteServicePrincipalName
      description: Deletes the service principal name (SPN) used by a connector to authenticate with your Active Directory.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
      responses:
        "202":
          description: Success
    get:
      operationId: GetServicePrincipalName
      description: Lists the service principal name that the connector uses to authenticate with Active Directory.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetServicePrincipalNameResponse"
  /templates:
    post:
      operationId: CreateTemplate
      description: Creates an Active Directory compatible certificate template. The connectors issues certificates using these templates based on the requester’s Active Directory group membership.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                ConnectorArn:
                  $ref: "#/components/schemas/ConnectorArn"
                Definition:
                  $ref: "#/components/schemas/TemplateDefinition"
                Name:
                  $ref: "#/components/schemas/TemplateName"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - ConnectorArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateResponse"
    get:
      operationId: ListTemplates
      description: Lists the templates, if any, that are associated with a connector.
      parameters:
        - name: ConnectorArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTemplatesResponse"
  /templates/{template_arn}/accessControlEntries:
    post:
      operationId: CreateTemplateGroupAccessControlEntry
      description: Create a group access control entry. Allow or deny Active Directory groups from enrolling and/or autoenrolling with the template based on the group security identifiers (SIDs).
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AccessRights:
                  $ref: "#/components/schemas/AccessRights"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                GroupDisplayName:
                  $ref: "#/components/schemas/DisplayName"
                GroupSecurityIdentifier:
                  $ref: "#/components/schemas/GroupSecurityIdentifier"
              required:
                - AccessRights
                - GroupDisplayName
                - GroupSecurityIdentifier
      responses:
        "200":
          description: Success
    get:
      operationId: ListTemplateGroupAccessControlEntries
      description: Lists group access control entries you created.
      parameters:
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTemplateGroupAccessControlEntriesResponse"
  /connectors/{connector_arn}:
    delete:
      operationId: DeleteConnector
      description: Deletes a connector for Active Directory. You must provide the Amazon Resource Name (ARN) of the connector that you want to delete. You can find the ARN by calling the https://docs.aws.amazon.com/pca-connector-ad/latest/APIReference/API_ListConnectors action. Deleting a connector does not deregister your directory with Amazon Web Services Private CA. You can deregister your directory by calling the https://docs.aws.amazon.com/pca-connector-ad/latest/APIReference/API_DeleteDirectoryRegistration action.
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
      responses:
        "202":
          description: Success
    get:
      operationId: GetConnector
      description: Lists information about your connector. You specify the connector on input by its ARN (Amazon Resource Name).
      parameters:
        - name: connector_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ConnectorArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateConnector.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectorResponse"
  /directoryRegistrations/{directory_registration_arn}:
    delete:
      operationId: DeleteDirectoryRegistration
      description: Deletes a directory registration. Deleting a directory registration deauthorizes Amazon Web Services Private CA with the directory.
      parameters:
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
      responses:
        "202":
          description: Success
    get:
      operationId: GetDirectoryRegistration
      description: A structure that contains information about your directory registration.
      parameters:
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDirectoryRegistrationResponse"
  /templates/{template_arn}:
    delete:
      operationId: DeleteTemplate
      description: Deletes a template. Certificates issued using the template are still valid until they are revoked or expired.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      responses:
        "202":
          description: Success
    get:
      operationId: GetTemplate
      description: Retrieves a certificate template that the connector uses to issue certificates from a private CA.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemplateResponse"
    patch:
      operationId: UpdateTemplate
      description: Update template configuration to define the information included in certificates.
      parameters:
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Definition:
                  $ref: "#/components/schemas/TemplateDefinition"
                ReenrollAllCertificateHolders:
                  $ref: "#/components/schemas/Boolean"
      responses:
        "200":
          description: Success
  /templates/{template_arn}/accessControlEntries/{group_security_identifier}:
    delete:
      operationId: DeleteTemplateGroupAccessControlEntry
      description: Deletes a group access control entry.
      parameters:
        - name: group_security_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupSecurityIdentifier"
          description: Security identifier (SID) of the group object from Active Directory. The SID starts with "S-".
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      responses:
        "200":
          description: Success
    get:
      operationId: GetTemplateGroupAccessControlEntry
      description: Retrieves the group access control entries for a template.
      parameters:
        - name: group_security_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupSecurityIdentifier"
          description: Security identifier (SID) of the group object from Active Directory. The SID starts with "S-".
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTemplateGroupAccessControlEntryResponse"
    patch:
      operationId: UpdateTemplateGroupAccessControlEntry
      description: Update a group access control entry you created using CreateTemplateGroupAccessControlEntry.
      parameters:
        - name: group_security_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GroupSecurityIdentifier"
          description: Security identifier (SID) of the group object from Active Directory. The SID starts with "S-".
        - name: template_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/TemplateArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateTemplate.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AccessRights:
                  $ref: "#/components/schemas/AccessRights"
                GroupDisplayName:
                  $ref: "#/components/schemas/DisplayName"
      responses:
        "200":
          description: Success
  /directoryRegistrations/{directory_registration_arn}/servicePrincipalNames:
    get:
      operationId: ListServicePrincipalNames
      description: Lists the service principal names that the connector uses to authenticate with Active Directory.
      parameters:
        - name: directory_registration_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
        - name: MaxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Use this parameter when paginating results to specify the maximum number of items to return in the response on each page. If additional items exist beyond the number you specify, the NextToken element is sent in the response. Use this NextToken value in a subsequent request to retrieve additional items.
        - name: NextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Use this parameter when paginating results in a subsequent request after you receive a response with truncated results. Set it to the value of the NextToken parameter from the response you just received.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicePrincipalNamesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags, if any, that are associated with your resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that was returned when you created the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to your resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that was returned when you created the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "204":
          description: Success
    delete:
      operationId: UntagResource
      description: Removes one or more tags from your resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) that was returned when you created the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: Specifies a list of tag keys that you want to remove from the specified resources.
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    CertificateAuthorityArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: ^arn:[\w-]+:acm-pca:[\w-]+:[0-9]+:certificate-authority\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}$
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[!-~]+$
    DirectoryId:
      type: string
      pattern: ^d-[0-9a-f]{10}$
    Tags:
      type: object
      properties: {}
    VpcInformation:
      description: Information about your VPC and security groups used with the connector.
      type: object
      properties:
        IpAddressType:
          $ref: "#/components/schemas/IpAddressType"
          description: The VPC IP address type.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIdList"
          description: The security groups used with the connector. You can use a maximum of 4 security groups with a connector.
      required:
        - SecurityGroupIds
    IpAddressType:
      type: string
      enum:
        - IPV4
        - DUALSTACK
    SecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/SecurityGroupId"
    SecurityGroupId:
      type: string
      minLength: 11
      maxLength: 20
      pattern: ^(?:sg-[0-9a-f]{8}|sg-[0-9a-f]{17})$
    CreateConnectorResponse:
      type: object
      properties:
        ConnectorArn:
          $ref: "#/components/schemas/ConnectorArn"
          description: If successful, the Amazon Resource Name (ARN) of the connector for Active Directory.
    ConnectorArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: ^arn:[\w-]+:pca-connector-ad:[\w-]+:[0-9]+:connector\/[0-9a-f]{8}(-[0-9a-f]{4}){3}-[0-9a-f]{12}$
    CreateDirectoryRegistrationResponse:
      type: object
      properties:
        DirectoryRegistrationArn:
          $ref: "#/components/schemas/DirectoryRegistrationArn"
          description: The Amazon Resource Name (ARN) that was returned when you called CreateDirectoryRegistration.
    DirectoryRegistrationArn:
      type: string
      minLength: 5
      maxLength: 200
      pattern: ^arn:[\w-]+:pca-connector-ad:[\w-]+:[0-9]+:directory-registration\/d-[0-9a-f]{10}$
    TemplateDefinition:
      description: Template configuration to define the information included in certificates. Define certificate validity and renewal periods, certificate request handling and enrollment options, key usage extensions, application policies, and cryptography settings.
      type: object
      properties:
        TemplateV2:
          $ref: "#/components/schemas/TemplateV2"
          description: Template configuration to define the information included in certificates. Define certificate validity and renewal periods, certificate request handling and enrollment options, key usage extensions, application policies, and cryptography settings.
        TemplateV3:
          $ref: "#/components/schemas/TemplateV3"
          description: Template configuration to define the information included in certificates. Define certificate validity and renewal periods, certificate request handling and enrollment options, key usage extensions, application policies, and cryptography settings.
        TemplateV4:
          $ref: "#/components/schemas/TemplateV4"
          description: Template configuration to define the information included in certificates. Define certificate validity and renewal periods, certificate request handling and enrollment options, key usage extensions, application policies, and cryptography settings.
    TemplateV2:
      description: v2 template schema that uses Legacy Cryptographic Providers.
      type: object
      properties:
        CertificateValidity:
          $ref: "#/components/schemas/CertificateValidity"
          description: Certificate validity describes the validity and renewal periods of a certificate.
        EnrollmentFlags:
          $ref: "#/components/schemas/EnrollmentFlagsV2"
          description: Enrollment flags describe the enrollment settings for certificates such as using the existing private key and deleting expired or revoked certificates.
        Extensions:
          $ref: "#/components/schemas/ExtensionsV2"
          description: Extensions describe the key usage extensions and application policies for a template.
        GeneralFlags:
          $ref: "#/components/schemas/GeneralFlagsV2"
          description: General flags describe whether the template is used for computers or users and if the template can be used with autoenrollment.
        PrivateKeyAttributes:
          $ref: "#/components/schemas/PrivateKeyAttributesV2"
          description: Private key attributes allow you to specify the minimal key length, key spec, and cryptographic providers for the private key of a certificate for v2 templates. V2 templates allow you to use Legacy Cryptographic Service Providers.
        PrivateKeyFlags:
          $ref: "#/components/schemas/PrivateKeyFlagsV2"
          description: Private key flags for v2 templates specify the client compatibility, if the private key can be exported, and if user input is required when using a private key.
        SubjectNameFlags:
          $ref: "#/components/schemas/SubjectNameFlagsV2"
          description: Subject name flags describe the subject name and subject alternate name that is included in a certificate.
        SupersededTemplates:
          $ref: "#/components/schemas/TemplateNameList"
          description: List of templates in Active Directory that are superseded by this template.
      required:
        - CertificateValidity
        - EnrollmentFlags
        - Extensions
        - GeneralFlags
        - PrivateKeyAttributes
        - PrivateKeyFlags
        - SubjectNameFlags
    CertificateValidity:
      description: Information describing the end of the validity period of the certificate. This parameter sets the “Not After” date for the certificate. Certificate validity is the period of time during which a certificate is valid. Validity can be expressed as an explicit date and time when the certificate expires, or as a span of time after issuance, stated in days, months, or years. For more information, see Validity in RFC 5280. This value is unaffected when ValidityNotBefore is also specified. For example, if Validity is set to 20 days in the future, the certificate will expire 20 days from issuance time regardless of the ValidityNotBefore value.
      type: object
      properties:
        RenewalPeriod:
          $ref: "#/components/schemas/ValidityPeriod"
          description: Renewal period is the period of time before certificate expiration when a new certificate will be requested.
        ValidityPeriod:
          $ref: "#/components/schemas/ValidityPeriod"
          description: Information describing the end of the validity period of the certificate. This parameter sets the “Not After” date for the certificate. Certificate validity is the period of time during which a certificate is valid. Validity can be expressed as an explicit date and time when the certificate expires, or as a span of time after issuance, stated in days, months, or years. For more information, see Validity in RFC 5280. This value is unaffected when ValidityNotBefore is also specified. For example, if Validity is set to 20 days in the future, the certificate will expire 20 days from issuance time regardless of the ValidityNotBefore value.
      required:
        - RenewalPeriod
        - ValidityPeriod
    ValidityPeriod:
      description: Information describing the end of the validity period of the certificate. This parameter sets the “Not After” date for the certificate. Certificate validity is the period of time during which a certificate is valid. Validity can be expressed as an explicit date and time when the certificate expires, or as a span of time after issuance, stated in hours, days, months, or years. For more information, see Validity in RFC 5280. This value is unaffected when ValidityNotBefore is also specified. For example, if Validity is set to 20 days in the future, the certificate will expire 20 days from issuance time regardless of the ValidityNotBefore value.
      type: object
      properties:
        Period:
          $ref: "#/components/schemas/ValidityPeriodPeriodLong"
          description: The numeric value for the validity period.
        PeriodType:
          $ref: "#/components/schemas/ValidityPeriodType"
          description: The unit of time. You can select hours, days, weeks, months, and years.
      required:
        - Period
        - PeriodType
    ValidityPeriodPeriodLong:
      type: integer
      format: int64
      minimum: 1
      maximum: 8766000
    ValidityPeriodType:
      type: string
      enum:
        - HOURS
        - DAYS
        - WEEKS
        - MONTHS
        - YEARS
    EnrollmentFlagsV2:
      description: Template configurations for v2 template schema.
