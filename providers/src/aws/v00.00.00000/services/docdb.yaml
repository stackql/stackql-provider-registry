          description: "The type of source that is generating the events. For example, if you want to be notified of events generated by an instance, set this parameter to db-instance. If this value is not specified, all events are returned. Valid values: db-instance, db-parameter-group, db-security-group"
        EventCategories:
          $ref: "#/components/schemas/EventCategoriesList"
          description: A list of event categories for a SourceType that you want to subscribe to.
        Enabled:
