    ListTagsForResourceMessage:
      description: Represents the input to ListTagsForResource.
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/String"
          description: The Amazon DocumentDB resource with tags to be listed. This value is an Amazon Resource Name (ARN).
        Filters:
          $ref: "#/components/schemas/FilterList"
          description: This parameter is not currently supported.
      required:
        - ResourceName
    CloudwatchLogsExportConfiguration:
      description: The configuration setting for the log types to be enabled for export to Amazon CloudWatch Logs for a specific instance or cluster. The EnableLogTypes and DisableLogTypes arrays determine which logs are exported (or not exported) to CloudWatch Logs. The values within these arrays depend on the engine that is being used.
      type: object
      properties:
        EnableLogTypes:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of log types to enable.
        DisableLogTypes:
          $ref: "#/components/schemas/LogTypeList"
          description: The list of log types to disable.
    ModifyDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    ModifyDBClusterMessage:
      description: Represents the input to ModifyDBCluster.
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The cluster identifier for the cluster that is being modified. This parameter is not case sensitive. Constraints: Must match the identifier of an existing DBCluster."
        NewDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The new cluster identifier for the cluster when renaming a cluster. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster2"
        ApplyImmediately:
          $ref: "#/components/schemas/Boolean"
          description: "A value that specifies whether the changes in this request and any pending changes are asynchronously applied as soon as possible, regardless of the PreferredMaintenanceWindow setting for the cluster. If this parameter is set to false, changes to the cluster are applied during the next maintenance window. The ApplyImmediately parameter affects only the NewDBClusterIdentifier and MasterUserPassword values. If you set this parameter value to false, the changes to the NewDBClusterIdentifier and MasterUserPassword values are applied during the next maintenance window. All other changes are applied immediately, regardless of the value of the ApplyImmediately parameter. Default: false"
        BackupRetentionPeriod:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The number of days for which automated backups are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35."
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the cluster parameter group to use for the cluster.
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of virtual private cloud (VPC) security groups that the cluster will belong to.
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the cluster accepts connections. Constraints: Must be a value from 1150 to 65535. Default: The same port as the original cluster."
        MasterUserPassword:
          $ref: "#/components/schemas/String"
          description: 'The password for the master database user. This password can contain any printable ASCII character except forward slash (/), double quote ("), or the "at" symbol (@). Constraints: Must contain from 8 to 100 characters.'
        PreferredBackupWindow:
          $ref: "#/components/schemas/String"
          description: "The daily time range during which automated backups are created if automated backups are enabled, using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region, occurring on a random day of the week. Valid days: Mon, Tue, Wed, Thu, Fri, Sat, Sun Constraints: Minimum 30-minute window."
        CloudwatchLogsExportConfiguration:
          $ref: "#/components/schemas/CloudwatchLogsExportConfiguration"
          description: The configuration setting for the log types to be enabled for export to Amazon CloudWatch Logs for a specific instance or cluster. The EnableLogTypes and DisableLogTypes arrays determine which logs are exported (or not exported) to CloudWatch Logs.
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: 'The version number of the database engine to which you want to upgrade. Changing this parameter results in an outage. The change is applied during the next maintenance window unless ApplyImmediately is enabled. To list all of the available engine versions for Amazon DocumentDB use the following command: aws docdb describe-db-engine-versions --engine docdb --query "DBEngineVersions[].EngineVersion"'
        AllowMajorVersionUpgrade:
          $ref: "#/components/schemas/Boolean"
          description: "A value that indicates whether major version upgrades are allowed. Constraints: You must allow major version upgrades when specifying a value for the EngineVersion parameter that is a different major version than the cluster's current version. Since some parameters are version specific, changing them requires executing a new ModifyDBCluster API call after the in-place MVU completes. Performing an MVU directly impacts the following parameters: MasterUserPassword NewDBClusterIdentifier VpcSecurityGroupIds Port"
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether this cluster can be deleted. If DeletionProtection is enabled, the cluster cannot be deleted unless it is modified and DeletionProtection is disabled. DeletionProtection protects clusters from being accidentally deleted.
        StorageType:
          $ref: "#/components/schemas/String"
          description: The storage type to associate with the DB cluster. For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of an Amazon DocumentDB Serverless cluster.
        ManageMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether to manage the master user password with Amazon Web Services Secrets Manager. If the cluster doesn't manage the master user password with Amazon Web Services Secrets Manager, you can turn on this management. In this case, you can't specify MasterUserPassword. If the cluster already manages the master user password with Amazon Web Services Secrets Manager, and you specify that the master user password is not managed with Amazon Web Services Secrets Manager, then you must specify MasterUserPassword. In this case, Amazon DocumentDB deletes the secret and uses the new password for the master user specified by MasterUserPassword.
        MasterUserSecretKmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if both of the following conditions are met: The cluster doesn't manage the master user password in Amazon Web Services Secrets Manager. If the cluster already manages the master user password in Amazon Web Services Secrets Manager, you can't change the KMS key that is used to encrypt the secret. You are enabling ManageMasterUserPassword to manage the master user password in Amazon Web Services Secrets Manager. If you are turning on ManageMasterUserPassword and don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region."
        RotateMasterUserPassword:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to rotate the secret managed by Amazon Web Services Secrets Manager for the master user password. This setting is valid only if the master user password is managed by Amazon DocumentDB in Amazon Web Services Secrets Manager for the cluster. The secret value contains the updated password. Constraint: You must apply the change immediately when rotating the master user password."
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the cluster. The network type is determined by the DBSubnetGroup specified for the cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see DocumentDB clusters in a VPC in the Amazon DocumentDB Developer Guide. Valid Values: IPV4 | DUAL"
      required:
        - DBClusterIdentifier
    ParametersList:
      type: array
      items:
        $ref: "#/components/schemas/Parameter"
    Parameter:
      description: Detailed information about an individual parameter.
      type: object
      properties:
        ParameterName:
          $ref: "#/components/schemas/String"
          description: Specifies the name of the parameter.
        ParameterValue:
          $ref: "#/components/schemas/String"
          description: "Specifies the value of the parameter. Must be one or more of the cluster parameter's AllowedValues in CSV format: Valid values are: enabled: The cluster accepts secure connections using TLS version 1.0 through 1.3. disabled: The cluster does not accept secure connections using TLS. fips-140-3: The cluster only accepts secure connections per the requirements of the Federal Information Processing Standards (FIPS) publication 140-3. Only supported starting with Amazon DocumentDB 5.0 (engine version 3.0.3727) clusters in these regions: ca-central-1, us-west-2, us-east-1, us-east-2, us-gov-east-1, us-gov-west-1. tls1.2+: The cluster accepts secure connections using TLS version 1.2 and above. Only supported starting with Amazon DocumentDB 4.0 (engine version 2.0.10980) and Amazon DocumentDB 5.0 (engine version 3.0.11051). tls1.3+: The cluster accepts secure connections using TLS version 1.3 and above. Only supported starting with Amazon DocumentDB 4.0 (engine version 2.0.10980) and Amazon DocumentDB 5.0 (engine version 3.0.11051)."
        Description:
          $ref: "#/components/schemas/String"
          description: Provides a description of the parameter.
        Source:
          $ref: "#/components/schemas/String"
          description: Indicates the source of the parameter value.
        ApplyType:
          $ref: "#/components/schemas/String"
          description: Specifies the engine-specific parameters type.
        DataType:
          $ref: "#/components/schemas/String"
          description: Specifies the valid data type for the parameter.
        AllowedValues:
          $ref: "#/components/schemas/String"
          description: Specifies the valid range of values for the parameter.
        IsModifiable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether (true) or not (false) the parameter can be modified. Some parameters have security or operational implications that prevent them from being changed.
        MinimumEngineVersion:
          $ref: "#/components/schemas/String"
          description: The earliest engine version to which the parameter can apply.
        ApplyMethod:
          $ref: "#/components/schemas/ApplyMethod"
          description: Indicates when to apply parameter updates.
    ApplyMethod:
      type: string
      enum:
        - immediate
        - pending-reboot
    DBClusterParameterGroupNameMessageDisplay:
      type: object
      properties:
        DBClusterParameterGroupName:
          type: string
          description: "The name of a cluster parameter group. Constraints: Must be from 1 to 255 letters or numbers. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. This value is stored as a lowercase string."
    ModifyDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupNameMessageDisplay"
    ModifyDBClusterParameterGroupMessage:
      description: Represents the input to ModifyDBClusterParameterGroup.
      type: object
      properties:
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the cluster parameter group to modify.
        Parameters:
          $ref: "#/components/schemas/ParametersList"
          description: A list of parameters in the cluster parameter group to modify.
      required:
