        SubscriptionName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon DocumentDB event notification subscription that you want to remove a source identifier from.
        SourceIdentifier:
          $ref: "#/components/schemas/String"
          description: The source identifier to be removed from the subscription, such as the instance identifier for an instance, or the name of a security group.
      required:
