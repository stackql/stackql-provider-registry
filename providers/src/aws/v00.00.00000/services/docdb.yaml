    AttributeValueList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    ModifyDBClusterSnapshotAttributeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterSnapshotAttributesResultDisplay"
    ModifyDBClusterSnapshotAttributeMessage:
      description: Represents the input to ModifyDBClusterSnapshotAttribute.
      type: object
      properties:
        DBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: The identifier for the cluster snapshot to modify the attributes for.
        AttributeName:
          $ref: "#/components/schemas/String"
          description: The name of the cluster snapshot attribute to modify. To manage authorization for other Amazon Web Services accounts to copy or restore a manual cluster snapshot, set this value to restore.
        ValuesToAdd:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of cluster snapshot attributes to add to the attribute specified by AttributeName. To authorize other Amazon Web Services accounts to copy or restore a manual cluster snapshot, set this list to include one or more Amazon Web Services account IDs. To make the manual cluster snapshot restorable by any Amazon Web Services account, set it to all. Do not add the all value for any manual cluster snapshots that contain private information that you don't want to be available to all Amazon Web Services accounts.
        ValuesToRemove:
          $ref: "#/components/schemas/AttributeValueList"
          description: A list of cluster snapshot attributes to remove from the attribute specified by AttributeName. To remove authorization for other Amazon Web Services accounts to copy or restore a manual cluster snapshot, set this list to include one or more Amazon Web Services account identifiers. To remove authorization for any Amazon Web Services account to copy or restore the cluster snapshot, set it to all . If you specify all, an Amazon Web Services account whose account ID is explicitly added to the restore attribute can still copy or restore a manual cluster snapshot.
      required:
        - DBClusterSnapshotIdentifier
        - AttributeName
    ModifyDBInstanceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBInstanceDisplay"
    ModifyDBInstanceMessage:
      description: Represents the input to ModifyDBInstance.
      type: object
      properties:
        DBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The instance identifier. This value is stored as a lowercase string. Constraints: Must match the identifier of an existing DBInstance."
        DBInstanceClass:
          $ref: "#/components/schemas/String"
          description: "The new compute and memory capacity of the instance; for example, db.r5.large. Not all instance classes are available in all Amazon Web Services Regions. If you modify the instance class, an outage occurs during the change. The change is applied during the next maintenance window, unless ApplyImmediately is specified as true for this request. Default: Uses existing setting."
        ApplyImmediately:
          $ref: "#/components/schemas/Boolean"
          description: "Specifies whether the modifications in this request and any pending modifications are asynchronously applied as soon as possible, regardless of the PreferredMaintenanceWindow setting for the instance. If this parameter is set to false, changes to the instance are applied during the next maintenance window. Some parameter changes can cause an outage and are applied on the next reboot. Default: false"
        PreferredMaintenanceWindow:
          $ref: "#/components/schemas/String"
          description: "The weekly time range (in UTC) during which system maintenance can occur, which might result in an outage. Changing this parameter doesn't result in an outage except in the following situation, and the change is asynchronously applied as soon as possible. If there are pending actions that cause a reboot, and the maintenance window is changed to include the current time, changing this parameter causes a reboot of the instance. If you are moving this window to the current time, there must be at least 30 minutes between the current time and end of the window to ensure that pending changes are applied. Default: Uses existing setting. Format: ddd:hh24:mi-ddd:hh24:mi Valid days: Mon, Tue, Wed, Thu, Fri, Sat, Sun Constraints: Must be at least 30 minutes."
        AutoMinorVersionUpgrade:
          $ref: "#/components/schemas/BooleanOptional"
          description: This parameter does not apply to Amazon DocumentDB. Amazon DocumentDB does not perform minor version upgrades regardless of the value set.
        NewDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The new instance identifier for the instance when renaming an instance. When you change the instance identifier, an instance reboot occurs immediately if you set Apply Immediately to true. It occurs during the next maintenance window if you set Apply Immediately to false. This value is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: mydbinstance"
        CACertificateIdentifier:
          $ref: "#/components/schemas/String"
          description: Indicates the certificate that needs to be associated with the instance.
        CopyTagsToSnapshot:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether to copy all tags from the DB instance to snapshots of the DB instance. By default, tags are not copied.
        PromotionTier:
          $ref: "#/components/schemas/IntegerOptional"
          description: "A value that specifies the order in which an Amazon DocumentDB replica is promoted to the primary instance after a failure of the existing primary instance. Default: 1 Valid values: 0-15"
        EnablePerformanceInsights:
          $ref: "#/components/schemas/BooleanOptional"
          description: A value that indicates whether to enable Performance Insights for the DB Instance. For more information, see Using Amazon Performance Insights.
        PerformanceInsightsKMSKeyId:
          $ref: "#/components/schemas/String"
          description: The KMS key identifier for encryption of Performance Insights data. The KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. If you do not specify a value for PerformanceInsightsKMSKeyId, then Amazon DocumentDB uses your default KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services region.
        CertificateRotationRestart:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether the DB instance is restarted when you rotate your SSL/TLS certificate. By default, the DB instance is restarted when you rotate your SSL/TLS certificate. The certificate is not updated until the DB instance is restarted. Set this parameter only if you are not using SSL/TLS to connect to the DB instance. If you are using SSL/TLS to connect to the DB instance, see Updating Your Amazon DocumentDB TLS Certificates and Encrypting Data in Transit in the Amazon DocumentDB Developer Guide.
      required:
        - DBInstanceIdentifier
