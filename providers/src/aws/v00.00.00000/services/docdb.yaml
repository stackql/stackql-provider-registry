      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_FailoverGlobalCluster
      description: Promotes the specified secondary DB cluster to be the primary DB cluster in the global cluster when failing over a global cluster occurs. Use this operation to respond to an unplanned event, such as a regional disaster in the primary region. Failing over can result in a loss of write transaction data that wasn't replicated to the chosen secondary before the failover event occurred. However, the recovery process that promotes a DB instance on the chosen seconday DB cluster to be the primary writer DB instance guarantees that the data is in a transactionally consistent state.
      parameters:
        - name: GlobalClusterIdentifier
          in: query
          required: true
          description: "The identifier of the Amazon DocumentDB global cluster to apply this operation. The identifier is the unique key assigned by the user when the cluster is created. In other words, it's the name of the global cluster. Constraints: Must match the identifier of an existing global cluster. Minimum length of 1. Maximum length of 255. Pattern: [A-Za-z][0-9A-Za-z-:._]*"
          schema:
            $ref: "#/components/schemas/GlobalClusterIdentifier"
        - name: TargetDbClusterIdentifier
          in: query
          required: true
          description: "The identifier of the secondary Amazon DocumentDB cluster that you want to promote to the primary for the global cluster. Use the Amazon Resource Name (ARN) for the identifier so that Amazon DocumentDB can locate the cluster in its Amazon Web Services region. Constraints: Must match the identifier of an existing secondary cluster. Minimum length of 1. Maximum length of 255. Pattern: [A-Za-z][0-9A-Za-z-:._]*"
          schema:
            $ref: "#/components/schemas/DBClusterIdentifier"
        - name: AllowDataLoss
          in: query
          required: false
          description: "Specifies whether to allow data loss for this global cluster operation. Allowing data loss triggers a global failover operation. If you don't specify AllowDataLoss, the global cluster operation defaults to a switchover. Constraints: Can't be specified together with the Switchover parameter."
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: Switchover
          in: query
          required: false
          description: "Specifies whether to switch over this global database cluster. Constraints: Can't be specified together with the AllowDataLoss parameter."
          schema:
            $ref: "#/components/schemas/BooleanOptional"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/FailoverGlobalClusterOutputDisplay"
    post:
      operationId: POST_FailoverGlobalCluster
      description: Promotes the specified secondary DB cluster to be the primary DB cluster in the global cluster when failing over a global cluster occurs. Use this operation to respond to an unplanned event, such as a regional disaster in the primary region. Failing over can result in a loss of write transaction data that wasn't replicated to the chosen secondary before the failover event occurred. However, the recovery process that promotes a DB instance on the chosen seconday DB cluster to be the primary writer DB instance guarantees that the data is in a transactionally consistent state.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/FailoverGlobalClusterOutputDisplay"
      parameters: []
      requestBody:
        content:
