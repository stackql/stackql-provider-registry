        SnsTopicArn:
          type: string
          description: The topic ARN of the Amazon DocumentDB event notification subscription.
        Status:
          type: string
          description: "The status of the Amazon DocumentDB event notification subscription. Constraints: Can be one of the following: creating, modifying, deleting, active, no-permission, topic-not-exist The no-permission status indicates that Amazon DocumentDB no longer has permission to post to the SNS topic. The topic-not-exist status indicates that the topic was deleted after the subscription was created."
        SubscriptionCreationTime:
          type: string
          description: The time at which the Amazon DocumentDB event notification subscription was created.
        SourceType:
          type: string
          description: The source type for the Amazon DocumentDB event notification subscription.
        SourceIdsList:
          type: string
          description: A list of source IDs for the Amazon DocumentDB event notification subscription.
        EventCategoriesList:
          type: string
          description: A list of event categories for the Amazon DocumentDB event notification subscription.
        Enabled:
          type: boolean
          description: A Boolean value indicating whether the subscription is enabled. A value of true indicates that the subscription is enabled.
        EventSubscriptionArn:
          type: string
          description: The Amazon Resource Name (ARN) for the event subscription.
    AddSourceIdentifierToSubscriptionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/EventSubscriptionDisplay"
    AddSourceIdentifierToSubscriptionMessage:
      description: Represents the input to AddSourceIdentifierToSubscription.
      type: object
      properties:
        SubscriptionName:
          $ref: "#/components/schemas/String"
          description: The name of the Amazon DocumentDB event notification subscription that you want to add a source identifier to.
        SourceIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the event source to be added: If the source type is an instance, a DBInstanceIdentifier must be provided. If the source type is a security group, a DBSecurityGroupName must be provided. If the source type is a parameter group, a DBParameterGroupName must be provided. If the source type is a snapshot, a DBSnapshotIdentifier must be provided."
      required:
        - SubscriptionName
        - SourceIdentifier
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Metadata assigned to an Amazon DocumentDB resource consisting of a key-value pair.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/String"
          description: "The required name of the tag. The string value can be from 1 to 128 Unicode characters in length and can't be prefixed with \"aws:\" or \"rds:\". The string can contain only the set of Unicode letters, digits, white space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          $ref: "#/components/schemas/String"
          description: "The optional value of the tag. The string value can be from 1 to 256 Unicode characters in length and can't be prefixed with \"aws:\" or \"rds:\". The string can contain only the set of Unicode letters, digits, white space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
    AddTagsToResourceMessage:
      description: Represents the input to AddTagsToResource.
      type: object
      properties:
        ResourceName:
          $ref: "#/components/schemas/String"
          description: The Amazon DocumentDB resource that the tags are added to. This value is an Amazon Resource Name .
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the Amazon DocumentDB resource.
      required:
        - ResourceName
        - Tags
    ResourcePendingMaintenanceActionsDisplay:
      type: object
      properties:
        ResourceIdentifier:
          type: string
          description: The Amazon Resource Name (ARN) of the resource that has pending maintenance actions.
        PendingMaintenanceActionDetails:
          type: string
          description: A list that provides details about the pending maintenance actions for the resource.
    ApplyPendingMaintenanceActionOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ResourcePendingMaintenanceActionsDisplay"
    ApplyPendingMaintenanceActionMessage:
      description: Represents the input to ApplyPendingMaintenanceAction.
      type: object
      properties:
        ResourceIdentifier:
          $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the resource that the pending maintenance action applies to.
        ApplyAction:
          $ref: "#/components/schemas/String"
          description: "The pending maintenance action to apply to this resource. Valid values: system-update, db-upgrade"
        OptInType:
          $ref: "#/components/schemas/String"
          description: "A value that specifies the type of opt-in request or undoes an opt-in request. An opt-in request of type immediate can't be undone. Valid values: immediate - Apply the maintenance action immediately. next-maintenance - Apply the maintenance action during the next maintenance window for the resource. undo-opt-in - Cancel any existing next-maintenance opt-in requests."
      required:
        - ResourceIdentifier
        - ApplyAction
        - OptInType
    DBClusterParameterGroupDisplay:
      type: object
      properties:
        DBClusterParameterGroupName:
          type: string
          description: Provides the name of the cluster parameter group.
        DBParameterGroupFamily:
          type: string
          description: Provides the name of the parameter group family that this cluster parameter group is compatible with.
        Description:
          type: string
          description: Provides the customer-specified description for this cluster parameter group.
        DBClusterParameterGroupArn:
          type: string
          description: The Amazon Resource Name (ARN) for the cluster parameter group.
    CopyDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupDisplay"
    CopyDBClusterParameterGroupMessage:
      description: Represents the input to CopyDBClusterParameterGroup.
      type: object
      properties:
        SourceDBClusterParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier or Amazon Resource Name (ARN) for the source cluster parameter group. Constraints: Must specify a valid cluster parameter group. If the source cluster parameter group is in the same Amazon Web Services Region as the copy, specify a valid parameter group identifier; for example, my-db-cluster-param-group, or a valid ARN. If the source parameter group is in a different Amazon Web Services Region than the copy, specify a valid cluster parameter group ARN; for example, arn:aws:rds:us-east-1:123456789012:sample-cluster:sample-parameter-group."
        TargetDBClusterParameterGroupIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the copied cluster parameter group. Constraints: Cannot be null, empty, or blank. Must contain from 1 to 255 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-param-group1"
        TargetDBClusterParameterGroupDescription:
          $ref: "#/components/schemas/String"
          description: A description for the copied cluster parameter group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags that are to be assigned to the parameter group.
      required:
        - SourceDBClusterParameterGroupIdentifier
        - TargetDBClusterParameterGroupIdentifier
        - TargetDBClusterParameterGroupDescription
    BooleanOptional:
      type: boolean
    DBClusterSnapshotDisplay:
      type: object
      properties:
        AvailabilityZones:
          type: string
          description: Provides the list of Amazon EC2 Availability Zones that instances in the cluster snapshot can be restored in.
        DBClusterSnapshotIdentifier:
          type: string
          description: Specifies the identifier for the cluster snapshot.
        DBClusterIdentifier:
          type: string
          description: Specifies the cluster identifier of the cluster that this cluster snapshot was created from.
        SnapshotCreateTime:
          type: string
          description: Provides the time when the snapshot was taken, in UTC.
        Engine:
          type: string
          description: Specifies the name of the database engine.
        Status:
          type: string
          description: Specifies the status of this cluster snapshot.
        Port:
          type: integer
          description: Specifies the port that the cluster was listening on at the time of the snapshot.
        VpcId:
          type: string
          description: Provides the virtual private cloud (VPC) ID that is associated with the cluster snapshot.
        ClusterCreateTime:
          type: string
          description: Specifies the time when the cluster was created, in Universal Coordinated Time (UTC).
        MasterUsername:
          type: string
          description: Provides the master user name for the cluster snapshot.
        EngineVersion:
          type: string
          description: Provides the version of the database engine for this cluster snapshot.
        SnapshotType:
          type: string
          description: Provides the type of the cluster snapshot.
        PercentProgress:
          type: integer
          description: Specifies the percentage of the estimated data that has been transferred.
        StorageEncrypted:
          type: boolean
          description: Specifies whether the cluster snapshot is encrypted.
        KmsKeyId:
          type: string
          description: If StorageEncrypted is true, the KMS key identifier for the encrypted cluster snapshot.
        DBClusterSnapshotArn:
          type: string
          description: The Amazon Resource Name (ARN) for the cluster snapshot.
        SourceDBClusterSnapshotArn:
          type: string
          description: If the cluster snapshot was copied from a source cluster snapshot, the ARN for the source cluster snapshot; otherwise, a null value.
        StorageType:
          type: string
          description: Storage type associated with your cluster snapshot For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard
    CopyDBClusterSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterSnapshotDisplay"
    CopyDBClusterSnapshotMessage:
      description: Represents the input to CopyDBClusterSnapshot.
      type: object
      properties:
        SourceDBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the cluster snapshot to copy. This parameter is not case sensitive. Constraints: Must specify a valid cluster snapshot in the available state. If the source cluster snapshot is in the same Amazon Web Services Region as the copy, specify a valid snapshot identifier. If the source cluster snapshot is in a different Amazon Web Services Region or owned by another Amazon Web Services account, specify the snapshot ARN. Example: my-cluster-snapshot1"
        TargetDBClusterSnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the new cluster snapshot to create from the source cluster snapshot. This parameter is not case sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-snapshot2"
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: The KMS key ID for an encrypted cluster snapshot. The KMS key ID is the Amazon Resource Name (ARN), KMS key identifier, or the KMS key alias for the KMS encryption key. If you copy an encrypted cluster snapshot from your Amazon Web Services account, you can specify a value for KmsKeyId to encrypt the copy with a new KMS encryption key. If you don't specify a value for KmsKeyId, then the copy of the cluster snapshot is encrypted with the same KMS key as the source cluster snapshot. If you copy an encrypted cluster snapshot that is shared from another Amazon Web Services account, then you must specify a value for KmsKeyId. To copy an encrypted cluster snapshot to another Amazon Web Services Region, set KmsKeyId to the KMS key ID that you want to use to encrypt the copy of the cluster snapshot in the destination Region. KMS encryption keys are specific to the Amazon Web Services Region that they are created in, and you can't use encryption keys from one Amazon Web Services Region in another Amazon Web Services Region. If you copy an unencrypted cluster snapshot and specify a value for the KmsKeyId parameter, an error is returned.
        PreSignedUrl:
          $ref: "#/components/schemas/String"
          description: "The URL that contains a Signature Version 4 signed request for theCopyDBClusterSnapshot API action in the Amazon Web Services Region that contains the source cluster snapshot to copy. You must use the PreSignedUrl parameter when copying a cluster snapshot from another Amazon Web Services Region. If you are using an Amazon Web Services SDK tool or the CLI, you can specify SourceRegion (or --source-region for the CLI) instead of specifying PreSignedUrl manually. Specifying SourceRegion autogenerates a pre-signed URL that is a valid request for the operation that can be executed in the source Amazon Web Services Region. The presigned URL must be a valid request for the CopyDBClusterSnapshot API action that can be executed in the source Amazon Web Services Region that contains the cluster snapshot to be copied. The presigned URL request must contain the following parameter values: SourceRegion - The ID of the region that contains the snapshot to be copied. SourceDBClusterSnapshotIdentifier - The identifier for the the encrypted cluster snapshot to be copied. This identifier must be in the Amazon Resource Name (ARN) format for the source Amazon Web Services Region. For example, if you are copying an encrypted cluster snapshot from the us-east-1 Amazon Web Services Region, then your SourceDBClusterSnapshotIdentifier looks something like the following: arn:aws:rds:us-east-1:12345678012:sample-cluster:sample-cluster-snapshot. TargetDBClusterSnapshotIdentifier - The identifier for the new cluster snapshot to be created. This parameter isn't case sensitive."
        CopyTags:
          $ref: "#/components/schemas/BooleanOptional"
          description: Set to true to copy all tags from the source cluster snapshot to the target cluster snapshot, and otherwise false. The default is false.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the cluster snapshot.
      required:
        - SourceDBClusterSnapshotIdentifier
        - TargetDBClusterSnapshotIdentifier
    AvailabilityZones:
      type: array
      items:
        $ref: "#/components/schemas/String"
    IntegerOptional:
      type: integer
    VpcSecurityGroupIdList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    LogTypeList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    GlobalClusterIdentifier:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z][0-9A-Za-z-:._]*"
    ServerlessV2ScalingConfiguration:
      description: Sets the scaling configuration of an Amazon DocumentDB Serverless cluster.
      type: object
      properties:
        MinCapacity:
          $ref: "#/components/schemas/DoubleOptional"
          description: The minimum number of Amazon DocumentDB capacity units (DCUs) for an instance in an Amazon DocumentDB Serverless cluster. You can specify DCU values in half-step increments, such as 8, 8.5, 9, and so on.
        MaxCapacity:
          $ref: "#/components/schemas/DoubleOptional"
          description: The maximum number of Amazon DocumentDB capacity units (DCUs) for an instance in an Amazon DocumentDB Serverless cluster. You can specify DCU values in half-step increments, such as 32, 32.5, 33, and so on.
    DoubleOptional:
      type: number
      format: double
    DBClusterDisplay:
      type: object
      properties:
        AvailabilityZones:
          type: string
          description: Provides the list of Amazon EC2 Availability Zones that instances in the cluster can be created in.
        BackupRetentionPeriod:
          type: integer
          description: Specifies the number of days for which automatic snapshots are retained.
        DBClusterIdentifier:
          type: string
          description: Contains a user-supplied cluster identifier. This identifier is the unique key that identifies a cluster.
        DBClusterParameterGroup:
          type: string
          description: Specifies the name of the cluster parameter group for the cluster.
        DBSubnetGroup:
          type: string
          description: Specifies information on the subnet group that is associated with the cluster, including the name, description, and subnets in the subnet group.
        Status:
          type: string
          description: Specifies the current state of this cluster.
        PercentProgress:
          type: string
          description: Specifies the progress of the operation as a percentage.
        EarliestRestorableTime:
          type: string
          description: The earliest time to which a database can be restored with point-in-time restore.
        Endpoint:
          type: string
          description: Specifies the connection endpoint for the primary instance of the cluster.
        ReaderEndpoint:
          type: string
          description: The reader endpoint for the cluster. The reader endpoint for a cluster load balances connections across the Amazon DocumentDB replicas that are available in a cluster. As clients request new connections to the reader endpoint, Amazon DocumentDB distributes the connection requests among the Amazon DocumentDB replicas in the cluster. This functionality can help balance your read workload across multiple Amazon DocumentDB replicas in your cluster. If a failover occurs, and the Amazon DocumentDB replica that you are connected to is promoted to be the primary instance, your connection is dropped. To continue sending your read workload to other Amazon DocumentDB replicas in the cluster, you can then reconnect to the reader endpoint.
        MultiAZ:
          type: boolean
          description: Specifies whether the cluster has instances in multiple Availability Zones.
        Engine:
          type: string
          description: Provides the name of the database engine to be used for this cluster.
        EngineVersion:
          type: string
          description: Indicates the database engine version.
        LatestRestorableTime:
          type: string
          description: Specifies the latest time to which a database can be restored with point-in-time restore.
        Port:
          type: integer
          description: Specifies the port that the database engine is listening on.
        MasterUsername:
          type: string
          description: Contains the master user name for the cluster.
        PreferredBackupWindow:
          type: string
          description: Specifies the daily time range during which automated backups are created if automated backups are enabled, as determined by the BackupRetentionPeriod.
        PreferredMaintenanceWindow:
          type: string
          description: Specifies the weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC).
        ReplicationSourceIdentifier:
          type: string
          description: Contains the identifier of the source cluster if this cluster is a secondary cluster.
        ReadReplicaIdentifiers:
          type: string
          description: Contains one or more identifiers of the secondary clusters that are associated with this cluster.
        DBClusterMembers:
          type: string
          description: Provides the list of instances that make up the cluster.
        VpcSecurityGroups:
          type: string
          description: Provides a list of virtual private cloud (VPC) security groups that the cluster belongs to.
        HostedZoneId:
          type: string
          description: Specifies the ID that Amazon Route 53 assigns when you create a hosted zone.
        StorageEncrypted:
          type: boolean
          description: Specifies whether the cluster is encrypted.
        KmsKeyId:
          type: string
          description: If StorageEncrypted is true, the KMS key identifier for the encrypted cluster.
        DbClusterResourceId:
          type: string
          description: The Amazon Web Services Region-unique, immutable identifier for the cluster. This identifier is found in CloudTrail log entries whenever the KMS key for the cluster is accessed.
        DBClusterArn:
          type: string
          description: The Amazon Resource Name (ARN) for the cluster.
        AssociatedRoles:
          type: string
          description: Provides a list of the Identity and Access Management (IAM) roles that are associated with the cluster. (IAM) roles that are associated with a cluster grant permission for the cluster to access other Amazon Web Services services on your behalf.
        CloneGroupId:
          type: string
          description: Identifies the clone group to which the DB cluster is associated.
        ClusterCreateTime:
          type: string
          description: Specifies the time when the cluster was created, in Universal Coordinated Time (UTC).
        EnabledCloudwatchLogsExports:
          type: string
          description: A list of log types that this cluster is configured to export to Amazon CloudWatch Logs.
        DeletionProtection:
          type: boolean
          description: Specifies whether this cluster can be deleted. If DeletionProtection is enabled, the cluster cannot be deleted unless it is modified and DeletionProtection is disabled. DeletionProtection protects clusters from being accidentally deleted.
        IOOptimizedNextAllowedModificationTime:
          type: string
          description: The next time you can modify the Amazon DocumentDB cluster to use the iopt1 storage type.
        StorageType:
          type: string
          description: Storage type associated with your cluster For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard
        ServerlessV2ScalingConfiguration:
          type: string
          description: The scaling configuration of an Amazon DocumentDB Serverless cluster.
        MasterUserSecret:
          type: string
          description: The secret managed by Amazon DocumentDB in Amazon Web Services Secrets Manager for the master user password.
        NetworkType:
          type: string
          description: "The network type of the cluster. The network type is determined by the DBSubnetGroup specified for the cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see DocumentDB clusters in a VPC in the Amazon DocumentDB Developer Guide. Valid Values: IPV4 | DUAL"
