        - TagKeys
    ResetDBClusterParameterGroupOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterParameterGroupNameMessageDisplay"
    ResetDBClusterParameterGroupMessage:
      description: Represents the input to ResetDBClusterParameterGroup.
      type: object
      properties:
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: The name of the cluster parameter group to reset.
        ResetAllParameters:
          $ref: "#/components/schemas/Boolean"
          description: A value that is set to true to reset all parameters in the cluster parameter group to their default values, and false otherwise. You can't use this parameter if there is a list of parameter names specified for the Parameters parameter.
        Parameters:
          $ref: "#/components/schemas/ParametersList"
          description: A list of parameter names in the cluster parameter group to reset to the default values. You can't use this parameter if the ResetAllParameters parameter is set to true.
      required:
        - DBClusterParameterGroupName
    RestoreDBClusterFromSnapshotOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterFromSnapshotMessage:
      description: Represents the input to RestoreDBClusterFromSnapshot.
      type: object
      properties:
        AvailabilityZones:
          $ref: "#/components/schemas/AvailabilityZones"
          description: Provides the list of Amazon EC2 Availability Zones that instances in the restored DB cluster can be created in.
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the cluster to create from the snapshot or cluster snapshot. This parameter isn't case sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-snapshot-id"
        SnapshotIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier for the snapshot or cluster snapshot to restore from. You can use either the name or the Amazon Resource Name (ARN) to specify a cluster snapshot. However, you can use only the ARN to specify a snapshot. Constraints: Must match the identifier of an existing snapshot."
        Engine:
          $ref: "#/components/schemas/String"
          description: "The database engine to use for the new cluster. Default: The same as source. Constraint: Must be compatible with the engine of the source."
        EngineVersion:
          $ref: "#/components/schemas/String"
          description: The version of the database engine to use for the new cluster.
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new cluster accepts connections. Constraints: Must be a value from 1150 to 65535. Default: The same port as the original cluster."
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the subnet group to use for the new cluster. Constraints: If provided, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of virtual private cloud (VPC) security groups that the new cluster will belong to.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the restored cluster.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The KMS key identifier to use when restoring an encrypted cluster from a DB snapshot or cluster snapshot. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a cluster with the same Amazon Web Services account that owns the KMS encryption key used to encrypt the new cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. If you do not specify a value for the KmsKeyId parameter, then the following occurs: If the snapshot or cluster snapshot in SnapshotIdentifier is encrypted, then the restored cluster is encrypted using the KMS key that was used to encrypt the snapshot or the cluster snapshot. If the snapshot or the cluster snapshot in SnapshotIdentifier is not encrypted, then the restored DB cluster is not encrypted."
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: A list of log types that must be enabled for exporting to Amazon CloudWatch Logs.
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether this cluster can be deleted. If DeletionProtection is enabled, the cluster cannot be deleted unless it is modified and DeletionProtection is disabled. DeletionProtection protects clusters from being accidentally deleted.
        DBClusterParameterGroupName:
          $ref: "#/components/schemas/String"
          description: "The name of the DB cluster parameter group to associate with this DB cluster. Type: String. Required: No. If this argument is omitted, the default DB cluster parameter group is used. If supplied, must match the name of an existing default DB cluster parameter group. The string must consist of from 1 to 255 letters, numbers or hyphens. Its first character must be a letter, and it cannot end with a hyphen or contain two consecutive hyphens."
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of an Amazon DocumentDB Serverless cluster.
        StorageType:
          $ref: "#/components/schemas/String"
          description: The storage type to associate with the DB cluster. For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the cluster. The network type is determined by the DBSubnetGroup specified for the cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see DocumentDB clusters in a VPC in the Amazon DocumentDB Developer Guide. Valid Values: IPV4 | DUAL"
      required:
        - DBClusterIdentifier
        - SnapshotIdentifier
        - Engine
    RestoreDBClusterToPointInTimeOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    RestoreDBClusterToPointInTimeMessage:
      description: Represents the input to RestoreDBClusterToPointInTime.
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The name of the new cluster to be created. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens."
        RestoreType:
          $ref: "#/components/schemas/String"
          description: "The type of restore to be performed. You can specify one of the following values: full-copy - The new DB cluster is restored as a full copy of the source DB cluster. copy-on-write - The new DB cluster is restored as a clone of the source DB cluster. Constraints: You can't specify copy-on-write if the engine version of the source DB cluster is earlier than 1.11. If you don't specify a RestoreType value, then the new DB cluster is restored as a full copy of the source DB cluster."
        SourceDBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "The identifier of the source cluster from which to restore. Constraints: Must match the identifier of an existing DBCluster."
        RestoreToTime:
          $ref: "#/components/schemas/TStamp"
          description: "The date and time to restore the cluster to. Valid values: A time in Universal Coordinated Time (UTC) format. Constraints: Must be before the latest restorable time for the instance. Must be specified if the UseLatestRestorableTime parameter is not provided. Cannot be specified if the UseLatestRestorableTime parameter is true. Cannot be specified if the RestoreType parameter is copy-on-write. Example: 2015-03-07T23:45:00Z"
        UseLatestRestorableTime:
          $ref: "#/components/schemas/Boolean"
          description: "A value that is set to true to restore the cluster to the latest restorable backup time, and false otherwise. Default: false Constraints: Cannot be specified if the RestoreToTime parameter is provided."
        Port:
          $ref: "#/components/schemas/IntegerOptional"
          description: "The port number on which the new cluster accepts connections. Constraints: Must be a value from 1150 to 65535. Default: The default port for the engine."
        DBSubnetGroupName:
          $ref: "#/components/schemas/String"
          description: "The subnet group name to use for the new cluster. Constraints: If provided, must match the name of an existing DBSubnetGroup. Example: mySubnetgroup"
        VpcSecurityGroupIds:
          $ref: "#/components/schemas/VpcSecurityGroupIdList"
          description: A list of VPC security groups that the new cluster belongs to.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags to be assigned to the restored cluster.
        KmsKeyId:
          $ref: "#/components/schemas/String"
          description: "The KMS key identifier to use when restoring an encrypted cluster from an encrypted cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are restoring a cluster with the same Amazon Web Services account that owns the KMS encryption key used to encrypt the new cluster, then you can use the KMS key alias instead of the ARN for the KMS encryption key. You can restore to a new cluster and encrypt the new cluster with an KMS key that is different from the KMS key used to encrypt the source cluster. The new DB cluster is encrypted with the KMS key identified by the KmsKeyId parameter. If you do not specify a value for the KmsKeyId parameter, then the following occurs: If the cluster is encrypted, then the restored cluster is encrypted using the KMS key that was used to encrypt the source cluster. If the cluster is not encrypted, then the restored cluster is not encrypted. If DBClusterIdentifier refers to a cluster that is not encrypted, then the restore request is rejected."
        EnableCloudwatchLogsExports:
          $ref: "#/components/schemas/LogTypeList"
          description: A list of log types that must be enabled for exporting to Amazon CloudWatch Logs.
        DeletionProtection:
          $ref: "#/components/schemas/BooleanOptional"
          description: Specifies whether this cluster can be deleted. If DeletionProtection is enabled, the cluster cannot be deleted unless it is modified and DeletionProtection is disabled. DeletionProtection protects clusters from being accidentally deleted.
        ServerlessV2ScalingConfiguration:
          $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
          description: Contains the scaling configuration of an Amazon DocumentDB Serverless cluster.
        StorageType:
          $ref: "#/components/schemas/String"
          description: The storage type to associate with the DB cluster. For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard
        NetworkType:
          $ref: "#/components/schemas/String"
          description: "The network type of the cluster. The network type is determined by the DBSubnetGroup specified for the cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see DocumentDB clusters in a VPC in the Amazon DocumentDB Developer Guide. Valid Values: IPV4 | DUAL"
      required:
        - DBClusterIdentifier
        - SourceDBClusterIdentifier
    StartDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    StartDBClusterMessage:
      type: object
