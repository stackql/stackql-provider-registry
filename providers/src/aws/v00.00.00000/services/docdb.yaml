openapi: 3.0.0
info:
  version: "2014-10-31"
  title: Amazon DocumentDB with MongoDB compatibility
  description: Amazon DocumentDB with MongoDB compatibility
  x-serviceName: rds
  x-serviceAlias: docdb
  x-protocol: query
  x-apiVersion: "2014-10-31"
  x-endpointPrefix: rds
servers:
  - url: https://rds.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for docdb
paths:
  /?Action=AddSourceIdentifierToSubscription&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddSourceIdentifierToSubscription
      description: Adds a source identifier to an existing event notification subscription.
      parameters:
        - name: SubscriptionName
          in: query
          required: true
          description: The name of the Amazon DocumentDB event notification subscription that you want to add a source identifier to.
          schema:
            $ref: "#/components/schemas/String"
        - name: SourceIdentifier
          in: query
          required: true
          description: "The identifier of the event source to be added: If the source type is an instance, a DBInstanceIdentifier must be provided. If the source type is a security group, a DBSecurityGroupName must be provided. If the source type is a parameter group, a DBParameterGroupName must be provided. If the source type is a snapshot, a DBSnapshotIdentifier must be provided."
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionOutputDisplay"
    post:
      operationId: POST_AddSourceIdentifierToSubscription
      description: Adds a source identifier to an existing event notification subscription.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddSourceIdentifierToSubscriptionMessage"
  /?Action=AddTagsToResource&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_AddTagsToResource
      description: Adds metadata tags to an Amazon DocumentDB resource. You can use these tags with cost allocation reporting to track costs that are associated with Amazon DocumentDB resources or in a Condition statement in an Identity and Access Management (IAM) policy for Amazon DocumentDB.
      parameters:
        - name: ResourceName
          in: query
          required: true
          description: The Amazon DocumentDB resource that the tags are added to. This value is an Amazon Resource Name .
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: true
          description: The tags to be assigned to the Amazon DocumentDB resource.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
    post:
      operationId: POST_AddTagsToResource
      description: Adds metadata tags to an Amazon DocumentDB resource. You can use these tags with cost allocation reporting to track costs that are associated with Amazon DocumentDB resources or in a Condition statement in an Identity and Access Management (IAM) policy for Amazon DocumentDB.
      responses:
        "200":
          description: Success
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/AddTagsToResourceMessage"
  /?Action=ApplyPendingMaintenanceAction&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_ApplyPendingMaintenanceAction
      description: Applies a pending maintenance action to a resource (for example, to an Amazon DocumentDB instance).
      parameters:
        - name: ResourceIdentifier
          in: query
          required: true
          description: The Amazon Resource Name (ARN) of the resource that the pending maintenance action applies to.
          schema:
            $ref: "#/components/schemas/String"
        - name: ApplyAction
          in: query
          required: true
          description: "The pending maintenance action to apply to this resource. Valid values: system-update, db-upgrade"
          schema:
            $ref: "#/components/schemas/String"
        - name: OptInType
          in: query
          required: true
          description: "A value that specifies the type of opt-in request or undoes an opt-in request. An opt-in request of type immediate can't be undone. Valid values: immediate - Apply the maintenance action immediately. next-maintenance - Apply the maintenance action during the next maintenance window for the resource. undo-opt-in - Cancel any existing next-maintenance opt-in requests."
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionOutputDisplay"
    post:
      operationId: POST_ApplyPendingMaintenanceAction
      description: Applies a pending maintenance action to a resource (for example, to an Amazon DocumentDB instance).
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/ApplyPendingMaintenanceActionOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/ApplyPendingMaintenanceActionMessage"
  /?Action=CopyDBClusterParameterGroup&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CopyDBClusterParameterGroup
      description: Copies the specified cluster parameter group.
      parameters:
        - name: SourceDBClusterParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier or Amazon Resource Name (ARN) for the source cluster parameter group. Constraints: Must specify a valid cluster parameter group. If the source cluster parameter group is in the same Amazon Web Services Region as the copy, specify a valid parameter group identifier; for example, my-db-cluster-param-group, or a valid ARN. If the source parameter group is in a different Amazon Web Services Region than the copy, specify a valid cluster parameter group ARN; for example, arn:aws:rds:us-east-1:123456789012:sample-cluster:sample-parameter-group."
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterParameterGroupIdentifier
          in: query
          required: true
          description: "The identifier for the copied cluster parameter group. Constraints: Cannot be null, empty, or blank. Must contain from 1 to 255 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-param-group1"
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterParameterGroupDescription
          in: query
          required: true
          description: A description for the copied cluster parameter group.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags that are to be assigned to the parameter group.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterParameterGroupOutputDisplay"
    post:
      operationId: POST_CopyDBClusterParameterGroup
      description: Copies the specified cluster parameter group.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterParameterGroupOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CopyDBClusterParameterGroupMessage"
  /?Action=CopyDBClusterSnapshot&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CopyDBClusterSnapshot
      description: Copies a snapshot of a cluster. To copy a cluster snapshot from a shared manual cluster snapshot, SourceDBClusterSnapshotIdentifier must be the Amazon Resource Name (ARN) of the shared cluster snapshot. You can only copy a shared DB cluster snapshot, whether encrypted or not, in the same Amazon Web Services Region. To cancel the copy operation after it is in progress, delete the target cluster snapshot identified by TargetDBClusterSnapshotIdentifier while that cluster snapshot is in the copying status.
      parameters:
        - name: SourceDBClusterSnapshotIdentifier
          in: query
          required: true
          description: "The identifier of the cluster snapshot to copy. This parameter is not case sensitive. Constraints: Must specify a valid cluster snapshot in the available state. If the source cluster snapshot is in the same Amazon Web Services Region as the copy, specify a valid snapshot identifier. If the source cluster snapshot is in a different Amazon Web Services Region or owned by another Amazon Web Services account, specify the snapshot ARN. Example: my-cluster-snapshot1"
          schema:
            $ref: "#/components/schemas/String"
        - name: TargetDBClusterSnapshotIdentifier
          in: query
          required: true
          description: "The identifier of the new cluster snapshot to create from the source cluster snapshot. This parameter is not case sensitive. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster-snapshot2"
          schema:
            $ref: "#/components/schemas/String"
        - name: KmsKeyId
          in: query
          required: false
          description: The KMS key ID for an encrypted cluster snapshot. The KMS key ID is the Amazon Resource Name (ARN), KMS key identifier, or the KMS key alias for the KMS encryption key. If you copy an encrypted cluster snapshot from your Amazon Web Services account, you can specify a value for KmsKeyId to encrypt the copy with a new KMS encryption key. If you don't specify a value for KmsKeyId, then the copy of the cluster snapshot is encrypted with the same KMS key as the source cluster snapshot. If you copy an encrypted cluster snapshot that is shared from another Amazon Web Services account, then you must specify a value for KmsKeyId. To copy an encrypted cluster snapshot to another Amazon Web Services Region, set KmsKeyId to the KMS key ID that you want to use to encrypt the copy of the cluster snapshot in the destination Region. KMS encryption keys are specific to the Amazon Web Services Region that they are created in, and you can't use encryption keys from one Amazon Web Services Region in another Amazon Web Services Region. If you copy an unencrypted cluster snapshot and specify a value for the KmsKeyId parameter, an error is returned.
          schema:
            $ref: "#/components/schemas/String"
        - name: PreSignedUrl
          in: query
          required: false
          description: "The URL that contains a Signature Version 4 signed request for theCopyDBClusterSnapshot API action in the Amazon Web Services Region that contains the source cluster snapshot to copy. You must use the PreSignedUrl parameter when copying a cluster snapshot from another Amazon Web Services Region. If you are using an Amazon Web Services SDK tool or the CLI, you can specify SourceRegion (or --source-region for the CLI) instead of specifying PreSignedUrl manually. Specifying SourceRegion autogenerates a pre-signed URL that is a valid request for the operation that can be executed in the source Amazon Web Services Region. The presigned URL must be a valid request for the CopyDBClusterSnapshot API action that can be executed in the source Amazon Web Services Region that contains the cluster snapshot to be copied. The presigned URL request must contain the following parameter values: SourceRegion - The ID of the region that contains the snapshot to be copied. SourceDBClusterSnapshotIdentifier - The identifier for the the encrypted cluster snapshot to be copied. This identifier must be in the Amazon Resource Name (ARN) format for the source Amazon Web Services Region. For example, if you are copying an encrypted cluster snapshot from the us-east-1 Amazon Web Services Region, then your SourceDBClusterSnapshotIdentifier looks something like the following: arn:aws:rds:us-east-1:12345678012:sample-cluster:sample-cluster-snapshot. TargetDBClusterSnapshotIdentifier - The identifier for the new cluster snapshot to be created. This parameter isn't case sensitive."
          schema:
            $ref: "#/components/schemas/String"
        - name: CopyTags
          in: query
          required: false
          description: Set to true to copy all tags from the source cluster snapshot to the target cluster snapshot, and otherwise false. The default is false.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the cluster snapshot.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterSnapshotOutputDisplay"
    post:
      operationId: POST_CopyDBClusterSnapshot
      description: Copies a snapshot of a cluster. To copy a cluster snapshot from a shared manual cluster snapshot, SourceDBClusterSnapshotIdentifier must be the Amazon Resource Name (ARN) of the shared cluster snapshot. You can only copy a shared DB cluster snapshot, whether encrypted or not, in the same Amazon Web Services Region. To cancel the copy operation after it is in progress, delete the target cluster snapshot identified by TargetDBClusterSnapshotIdentifier while that cluster snapshot is in the copying status.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CopyDBClusterSnapshotOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CopyDBClusterSnapshotMessage"
  /?Action=CreateDBCluster&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateDBCluster
      description: Creates a new Amazon DocumentDB cluster.
      parameters:
        - name: AvailabilityZones
          in: query
          required: false
          description: A list of Amazon EC2 Availability Zones that instances in the cluster can be created in.
          schema:
            $ref: "#/components/schemas/AvailabilityZones"
        - name: BackupRetentionPeriod
          in: query
          required: false
          description: "The number of days for which automated backups are retained. You must specify a minimum value of 1. Default: 1 Constraints: Must be a value from 1 to 35."
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: DBClusterIdentifier
          in: query
          required: true
          description: "The cluster identifier. This parameter is stored as a lowercase string. Constraints: Must contain from 1 to 63 letters, numbers, or hyphens. The first character must be a letter. Cannot end with a hyphen or contain two consecutive hyphens. Example: my-cluster"
          schema:
            $ref: "#/components/schemas/String"
        - name: DBClusterParameterGroupName
          in: query
          required: false
          description: The name of the cluster parameter group to associate with this cluster.
          schema:
            $ref: "#/components/schemas/String"
        - name: VpcSecurityGroupIds
          in: query
          required: false
          description: A list of EC2 VPC security groups to associate with this cluster.
          schema:
            $ref: "#/components/schemas/VpcSecurityGroupIdList"
        - name: DBSubnetGroupName
          in: query
          required: false
          description: "A subnet group to associate with this cluster. Constraints: Must match the name of an existing DBSubnetGroup. Must not be default. Example: mySubnetgroup"
          schema:
            $ref: "#/components/schemas/String"
        - name: Engine
          in: query
          required: false
          description: "The name of the database engine to be used for this cluster. Valid values: docdb"
          schema:
            $ref: "#/components/schemas/String"
        - name: EngineVersion
          in: query
          required: false
          description: The version number of the database engine to use. The --engine-version will default to the latest major engine version. For production workloads, we recommend explicitly declaring this parameter with the intended major engine version.
          schema:
            $ref: "#/components/schemas/String"
        - name: Port
          in: query
          required: false
          description: The port number on which the instances in the cluster accept connections.
          schema:
            $ref: "#/components/schemas/IntegerOptional"
        - name: MasterUsername
          in: query
          required: false
          description: "The name of the master user for the cluster. Constraints: Must be from 1 to 63 letters or numbers. The first character must be a letter. Cannot be a reserved word for the chosen database engine."
          schema:
            $ref: "#/components/schemas/String"
        - name: MasterUserPassword
          in: query
          required: false
          description: 'The password for the master database user. This password can contain any printable ASCII character except forward slash (/), double quote ("), or the "at" symbol (@). Constraints: Must contain from 8 to 100 characters.'
          schema:
            $ref: "#/components/schemas/String"
        - name: PreferredBackupWindow
          in: query
          required: false
          description: "The daily time range during which automated backups are created if automated backups are enabled using the BackupRetentionPeriod parameter. The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region. Constraints: Must be in the format hh24:mi-hh24:mi. Must be in Universal Coordinated Time (UTC). Must not conflict with the preferred maintenance window. Must be at least 30 minutes."
          schema:
            $ref: "#/components/schemas/String"
        - name: PreferredMaintenanceWindow
          in: query
          required: false
          description: "The weekly time range during which system maintenance can occur, in Universal Coordinated Time (UTC). Format: ddd:hh24:mi-ddd:hh24:mi The default is a 30-minute window selected at random from an 8-hour block of time for each Amazon Web Services Region, occurring on a random day of the week. Valid days: Mon, Tue, Wed, Thu, Fri, Sat, Sun Constraints: Minimum 30-minute window."
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the cluster.
          schema:
            $ref: "#/components/schemas/TagList"
        - name: StorageEncrypted
          in: query
          required: false
          description: Specifies whether the cluster is encrypted.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: KmsKeyId
          in: query
          required: false
          description: "The KMS key identifier for an encrypted cluster. The KMS key identifier is the Amazon Resource Name (ARN) for the KMS encryption key. If you are creating a cluster using the same Amazon Web Services account that owns the KMS encryption key that is used to encrypt the new cluster, you can use the KMS key alias instead of the ARN for the KMS encryption key. If an encryption key is not specified in KmsKeyId: If the StorageEncrypted parameter is true, Amazon DocumentDB uses your default encryption key. KMS creates the default encryption key for your Amazon Web Services account. Your Amazon Web Services account has a different default encryption key for each Amazon Web Services Regions."
          schema:
            $ref: "#/components/schemas/String"
        - name: PreSignedUrl
          in: query
          required: false
          description: Not currently supported.
          schema:
            $ref: "#/components/schemas/String"
        - name: EnableCloudwatchLogsExports
          in: query
          required: false
          description: A list of log types that need to be enabled for exporting to Amazon CloudWatch Logs. You can enable audit logs or profiler logs. For more information, see Auditing Amazon DocumentDB Events and Profiling Amazon DocumentDB Operations.
          schema:
            $ref: "#/components/schemas/LogTypeList"
        - name: DeletionProtection
          in: query
          required: false
          description: Specifies whether this cluster can be deleted. If DeletionProtection is enabled, the cluster cannot be deleted unless it is modified and DeletionProtection is disabled. DeletionProtection protects clusters from being accidentally deleted.
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: GlobalClusterIdentifier
          in: query
          required: false
          description: The cluster identifier of the new global cluster.
          schema:
            $ref: "#/components/schemas/GlobalClusterIdentifier"
        - name: StorageType
          in: query
          required: false
          description: The storage type to associate with the DB cluster. For information on storage types for Amazon DocumentDB clusters, see Cluster storage configurations in the Amazon DocumentDB Developer Guide. Valid values for storage type - standard | iopt1 Default value is standard When you create an Amazon DocumentDB cluster with the storage type set to iopt1, the storage type is returned in the response. The storage type isn't returned when you set it to standard.
          schema:
            $ref: "#/components/schemas/String"
        - name: ServerlessV2ScalingConfiguration
          in: query
          required: false
          description: Contains the scaling configuration of an Amazon DocumentDB Serverless cluster.
          schema:
            $ref: "#/components/schemas/ServerlessV2ScalingConfiguration"
        - name: ManageMasterUserPassword
          in: query
          required: false
          description: "Specifies whether to manage the master user password with Amazon Web Services Secrets Manager. Constraint: You can't manage the master user password with Amazon Web Services Secrets Manager if MasterUserPassword is specified."
          schema:
            $ref: "#/components/schemas/BooleanOptional"
        - name: MasterUserSecretKmsKeyId
          in: query
          required: false
          description: The Amazon Web Services KMS key identifier to encrypt a secret that is automatically generated and managed in Amazon Web Services Secrets Manager. This setting is valid only if the master user password is managed by Amazon DocumentDB in Amazon Web Services Secrets Manager for the DB cluster. The Amazon Web Services KMS key identifier is the key ARN, key ID, alias ARN, or alias name for the KMS key. To use a KMS key in a different Amazon Web Services account, specify the key ARN or alias ARN. If you don't specify MasterUserSecretKmsKeyId, then the aws/secretsmanager KMS key is used to encrypt the secret. If the secret is in a different Amazon Web Services account, then you can't use the aws/secretsmanager KMS key to encrypt the secret, and you must use a customer managed KMS key. There is a default KMS key for your Amazon Web Services account. Your Amazon Web Services account has a different default KMS key for each Amazon Web Services Region.
          schema:
            $ref: "#/components/schemas/String"
        - name: NetworkType
          in: query
          required: false
          description: "The network type of the cluster. The network type is determined by the DBSubnetGroup specified for the cluster. A DBSubnetGroup can support only the IPv4 protocol or the IPv4 and the IPv6 protocols (DUAL). For more information, see DocumentDB clusters in a VPC in the Amazon DocumentDB Developer Guide. Valid Values: IPV4 | DUAL"
          schema:
            $ref: "#/components/schemas/String"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDBClusterOutputDisplay"
    post:
      operationId: POST_CreateDBCluster
      description: Creates a new Amazon DocumentDB cluster.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDBClusterOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateDBClusterMessage"
  /?Action=CreateDBClusterParameterGroup&Version=2014-10-31:
    parameters:
      - $ref: "#/components/parameters/X-Amz-Content-Sha256"
      - $ref: "#/components/parameters/X-Amz-Date"
      - $ref: "#/components/parameters/X-Amz-Algorithm"
      - $ref: "#/components/parameters/X-Amz-Credential"
      - $ref: "#/components/parameters/X-Amz-Security-Token"
      - $ref: "#/components/parameters/X-Amz-Signature"
      - $ref: "#/components/parameters/X-Amz-SignedHeaders"
    get:
      operationId: GET_CreateDBClusterParameterGroup
      description: Creates a new cluster parameter group. Parameters in a cluster parameter group apply to all of the instances in a cluster. A cluster parameter group is initially created with the default parameters for the database engine used by instances in the cluster. In Amazon DocumentDB, you cannot make modifications directly to the default.docdb3.6 cluster parameter group. If your Amazon DocumentDB cluster is using the default cluster parameter group and you want to modify a value in it, you must first create a new parameter group or copy an existing parameter group, modify it, and then apply the modified parameter group to your cluster. For the new cluster parameter group and associated settings to take effect, you must then reboot the instances in the cluster without failover. For more information, see Modifying Amazon DocumentDB Cluster Parameter Groups.
      parameters:
        - name: DBClusterParameterGroupName
          in: query
          required: true
          description: "The name of the cluster parameter group. Constraints: Must not match the name of an existing DBClusterParameterGroup. This value is stored as a lowercase string."
          schema:
            $ref: "#/components/schemas/String"
        - name: DBParameterGroupFamily
          in: query
          required: true
          description: The cluster parameter group family name.
          schema:
            $ref: "#/components/schemas/String"
        - name: Description
          in: query
          required: false
          description: The description for the cluster parameter group.
          schema:
            $ref: "#/components/schemas/String"
        - name: Tags
          in: query
          required: false
          description: The tags to be assigned to the cluster parameter group.
          schema:
            $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDBClusterParameterGroupOutputDisplay"
    post:
      operationId: POST_CreateDBClusterParameterGroup
      description: Creates a new cluster parameter group. Parameters in a cluster parameter group apply to all of the instances in a cluster. A cluster parameter group is initially created with the default parameters for the database engine used by instances in the cluster. In Amazon DocumentDB, you cannot make modifications directly to the default.docdb3.6 cluster parameter group. If your Amazon DocumentDB cluster is using the default cluster parameter group and you want to modify a value in it, you must first create a new parameter group or copy an existing parameter group, modify it, and then apply the modified parameter group to your cluster. For the new cluster parameter group and associated settings to take effect, you must then reboot the instances in the cluster without failover. For more information, see Modifying Amazon DocumentDB Cluster Parameter Groups.
      responses:
        "200":
          description: Success
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/CreateDBClusterParameterGroupOutputDisplay"
      parameters: []
      requestBody:
        content:
          text/xml:
            schema:
              $ref: "#/components/schemas/CreateDBClusterParameterGroupMessage"
  /?Action=CreateDBClusterSnapshot&Version=2014-10-31:
    parameters:
