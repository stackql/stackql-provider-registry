          description: "The maximum number of records to include in the response. If more records exist than the specified MaxRecords value, a pagination token (marker) is included in the response so that the remaining results can be retrieved. Default: 100 Constraints: Minimum 20, maximum 100."
    FailoverDBClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/DBClusterDisplay"
    FailoverDBClusterMessage:
      description: Represents the input to FailoverDBCluster.
      type: object
      properties:
        DBClusterIdentifier:
          $ref: "#/components/schemas/String"
          description: "A cluster identifier to force a failover for. This parameter is not case sensitive. Constraints: Must match the identifier of an existing DBCluster."
        TargetDBInstanceIdentifier:
          $ref: "#/components/schemas/String"
          description: The name of the instance to promote to the primary instance. You must specify the instance identifier for an Amazon DocumentDB replica in the cluster. For example, mydbcluster-replica1.
    DBClusterIdentifier:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z][0-9A-Za-z-:._]*"
    FailoverGlobalClusterOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/GlobalClusterDisplay"
    FailoverGlobalClusterMessage:
      type: object
      properties:
        GlobalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: "The identifier of the Amazon DocumentDB global cluster to apply this operation. The identifier is the unique key assigned by the user when the cluster is created. In other words, it's the name of the global cluster. Constraints: Must match the identifier of an existing global cluster. Minimum length of 1. Maximum length of 255. Pattern: [A-Za-z][0-9A-Za-z-:._]*"
        TargetDbClusterIdentifier:
          $ref: "#/components/schemas/DBClusterIdentifier"
          description: "The identifier of the secondary Amazon DocumentDB cluster that you want to promote to the primary for the global cluster. Use the Amazon Resource Name (ARN) for the identifier so that Amazon DocumentDB can locate the cluster in its Amazon Web Services region. Constraints: Must match the identifier of an existing secondary cluster. Minimum length of 1. Maximum length of 255. Pattern: [A-Za-z][0-9A-Za-z-:._]*"
        AllowDataLoss:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to allow data loss for this global cluster operation. Allowing data loss triggers a global failover operation. If you don't specify AllowDataLoss, the global cluster operation defaults to a switchover. Constraints: Can't be specified together with the Switchover parameter."
        Switchover:
          $ref: "#/components/schemas/BooleanOptional"
          description: "Specifies whether to switch over this global database cluster. Constraints: Can't be specified together with the AllowDataLoss parameter."
      required:
        - GlobalClusterIdentifier
        - TargetDbClusterIdentifier
    TagDisplay:
      type: object
      properties:
        Key:
          type: string
          description: "The required name of the tag. The string value can be from 1 to 128 Unicode characters in length and can't be prefixed with \"aws:\" or \"rds:\". The string can contain only the set of Unicode letters, digits, white space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
        Value:
          type: string
          description: "The optional value of the tag. The string value can be from 1 to 256 Unicode characters in length and can't be prefixed with \"aws:\" or \"rds:\". The string can contain only the set of Unicode letters, digits, white space, '_', '.', '/', '=', '+', '-' (Java regex: \"^([\\\\p{L}\\\\p{Z}\\\\p{N}_.:/=+\\\\-]*)$\")."
    ListTagsForResourceOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
