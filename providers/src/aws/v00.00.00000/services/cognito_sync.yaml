openapi: 3.0.0
info:
  version: "2014-06-30"
  title: Amazon Cognito Sync
  description: Amazon Cognito Sync
  x-serviceName: cognito-sync
  x-serviceAlias: cognito_sync
  x-protocol: rest-json
  x-apiVersion: "2014-06-30"
  x-endpointPrefix: cognito-sync
  x-jsonVersion: "1.1"
servers:
  - url: https://cognito-sync.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for cognito-sync
paths:
  /identitypools/{identity_pool_id}/bulkpublish:
    post:
      operationId: BulkPublish
      description: Initiates a bulk publish of all existing datasets for an Identity Pool to the configured stream. Customers are limited to one successful bulk publish per 24 hours. Bulk publish is an asynchronous request, customers can see the status of the request via the GetBulkPublishDetails operation. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPublishResponse"
  /identitypools/{identity_pool_id}/identities/{identity_id}/datasets/{dataset_name}:
    delete:
      operationId: DeleteDataset
      description: Deletes the specific dataset. The dataset will be deleted permanently, and the action can't be undone. Datasets that this dataset was merged with will no longer report the merge. Any subsequent operation on this dataset will result in a ResourceNotFoundException. This API can be called with temporary user credentials provided by Cognito Identity or with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: A string of up to 128 characters. Allowed characters are a-z, A-Z, 0-9, '_' (underscore), '-' (dash), and '.' (dot).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDatasetResponse"
    get:
      operationId: DescribeDataset
      description: Gets meta data about a dataset by identity and dataset name. With Amazon Cognito Sync, each identity has access only to its own data. Thus, the credentials used to make this API call need to have access to the identity data. This API can be called with temporary user credentials provided by Cognito Identity or with developer credentials. You should use Cognito Identity credentials to make this API call.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: A string of up to 128 characters. Allowed characters are a-z, A-Z, 0-9, '_' (underscore), '-' (dash), and '.' (dot).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeDatasetResponse"
    post:
      operationId: UpdateRecords
      description: Posts updates to records and adds and deletes records for a dataset and user. The sync count in the record patch is your last known sync count for that record. The server will reject an UpdateRecords request with a ResourceConflictException if you try to patch a record with a new value but a stale sync count. For example, if the sync count on the server is 5 for a key called highScore and you try and submit a new highScore with sync count of 4, the request will be rejected. To obtain the current sync count for a record, call ListRecords. On a successful update of the record, the response returns the new sync count for that record. You should present that sync count the next time you try to update that same record. When the record does not exist, specify the sync count as 0. This API can be called with temporary user credentials provided by Cognito Identity or with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: A string of up to 128 characters. Allowed characters are a-z, A-Z, 0-9, '_' (underscore), '-' (dash), and '.' (dot).
        - name: x-amz-Client-Context
          in: header
          required: false
          schema:
            $ref: "#/components/schemas/ClientContext"
          description: Intended to supply a device ID that will populate the lastModifiedBy field referenced in other methods. The ClientContext field is not yet implemented.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                RecordPatches:
                  $ref: "#/components/schemas/RecordPatchList"
                SyncSessionToken:
                  $ref: "#/components/schemas/SyncSessionToken"
              required:
                - SyncSessionToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRecordsResponse"
  /identitypools/{identity_pool_id}:
    get:
      operationId: DescribeIdentityPoolUsage
      description: Gets usage details (for example, data storage) about a particular identity pool. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeIdentityPoolUsageResponse"
  /identitypools/{identity_pool_id}/identities/{identity_id}:
    get:
      operationId: DescribeIdentityUsage
      description: Gets usage information for an identity, including number of datasets and data usage. This API can be called with temporary user credentials provided by Cognito Identity or with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeIdentityUsageResponse"
  /identitypools/{identity_pool_id}/getBulkPublishDetails:
    post:
      operationId: GetBulkPublishDetails
      description: Get the status of the last BulkPublish operation for an identity pool. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBulkPublishDetailsResponse"
  /identitypools/{identity_pool_id}/events:
    get:
      operationId: GetCognitoEvents
      description: Gets the events and the corresponding Lambda functions associated with an identity pool. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: The Cognito Identity Pool ID for the request
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCognitoEventsResponse"
    post:
      operationId: SetCognitoEvents
      description: Sets the AWS Lambda function for a given event type for an identity pool. This request only updates the key/value pair specified. Other key/values pairs are not updated. To remove a key value pair, pass a empty value for the particular key. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: The Cognito Identity Pool to use when configuring Cognito Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Events:
                  $ref: "#/components/schemas/Events"
      responses:
        "200":
          description: Success
  /identitypools/{identity_pool_id}/configuration:
    get:
      operationId: GetIdentityPoolConfiguration
      description: Gets the configuration settings of an identity pool. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. This is the ID of the pool for which to return a configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIdentityPoolConfigurationResponse"
    post:
      operationId: SetIdentityPoolConfiguration
      description: Sets the necessary configuration for push sync. This API can only be called with developer credentials. You cannot call this API with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. This is the ID of the pool to modify.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                PushSync:
                  $ref: "#/components/schemas/PushSync"
                CognitoStreams:
                  $ref: "#/components/schemas/CognitoStreams"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetIdentityPoolConfigurationResponse"
  /identitypools/{identity_pool_id}/identities/{identity_id}/datasets:
    get:
      operationId: ListDatasets
      description: Lists datasets for an identity. With Amazon Cognito Sync, each identity has access only to its own data. Thus, the credentials used to make this API call need to have access to the identity data. ListDatasets can be called with temporary user credentials provided by Cognito Identity or with developer credentials. You should use the Cognito Identity credentials to make this API call.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token for obtaining the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IntegerString"
          description: The maximum number of results to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDatasetsResponse"
  /identitypools:
    get:
      operationId: ListIdentityPoolUsage
      description: Gets a list of identity pools registered with Cognito. ListIdentityPoolUsage can only be called with developer credentials. You cannot make this API call with the temporary user credentials provided by Cognito Identity.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token for obtaining the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IntegerString"
          description: The maximum number of results to be returned.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIdentityPoolUsageResponse"
  /identitypools/{identity_pool_id}/identities/{identity_id}/datasets/{dataset_name}/records:
    get:
      operationId: ListRecords
      description: Gets paginated records, optionally changed after a particular sync count for a dataset and identity. With Amazon Cognito Sync, each identity has access only to its own data. Thus, the credentials used to make this API call need to have access to the identity data. ListRecords can be called with temporary user credentials provided by Cognito Identity or with developer credentials. You should use Cognito Identity credentials to make this API call.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: A string of up to 128 characters. Allowed characters are a-z, A-Z, 0-9, '_' (underscore), '-' (dash), and '.' (dot).
        - name: lastSyncCount
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Long"
          description: The last server sync count for this record.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: A pagination token for obtaining the next page of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/IntegerString"
          description: The maximum number of results to be returned.
        - name: syncSessionToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SyncSessionToken"
          description: A token containing a session ID, identity ID, and expiration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecordsResponse"
  /identitypools/{identity_pool_id}/identity/{identity_id}/device:
    post:
      operationId: RegisterDevice
      description: Registers a device to receive push sync notifications. This API can only be called with temporary credentials provided by Cognito Identity. You cannot call this API with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. Here, the ID of the pool that the identity belongs to.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: The unique ID for this identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Platform:
                  $ref: "#/components/schemas/Platform"
                Token:
                  $ref: "#/components/schemas/PushToken"
              required:
                - Platform
                - Token
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterDeviceResponse"
  /identitypools/{identity_pool_id}/identities/{identity_id}/datasets/{dataset_name}/subscriptions/{device_id}:
    post:
      operationId: SubscribeToDataset
      description: Subscribes to receive notifications when a dataset is modified by another device. This API can only be called with temporary credentials provided by Cognito Identity. You cannot call this API with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. The ID of the pool to which the identity belongs.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: Unique ID for this identity.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset to subcribe to.
        - name: device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The unique ID generated for this device by Cognito.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeToDatasetResponse"
    delete:
      operationId: UnsubscribeFromDataset
      description: Unsubscribes from receiving notifications when a dataset is modified by another device. This API can only be called with temporary credentials provided by Cognito Identity. You cannot call this API with developer credentials.
      parameters:
        - name: identity_pool_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. The ID of the pool to which this identity belongs.
        - name: identity_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/IdentityId"
          description: Unique ID for this identity.
        - name: dataset_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DatasetName"
          description: The name of the dataset from which to unsubcribe.
        - name: device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The unique ID generated for this device by Cognito.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribeFromDatasetResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    IdentityPoolId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    BulkPublishResponse:
      description: The output for the BulkPublish operation.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
    IdentityId:
      type: string
      minLength: 1
      maxLength: 55
      pattern: "[\\w-]+:[0-9a-f-]+"
    DatasetName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9_.:-]+"
    DeleteDatasetResponse:
      description: Response to a successful DeleteDataset request.
      type: object
      properties:
        Dataset:
          $ref: "#/components/schemas/Dataset"
          description: A collection of data for an identity pool. An identity pool can have multiple datasets. A dataset is per identity and can be general or associated with a particular entity in an application (like a saved game). Datasets are automatically created if they don't exist. Data is synced by dataset, and a dataset can hold up to 1MB of key-value pairs.
    Dataset:
      description: A collection of data for an identity pool. An identity pool can have multiple datasets. A dataset is per identity and can be general or associated with a particular entity in an application (like a saved game). Datasets are automatically created if they don't exist. Data is synced by dataset, and a dataset can hold up to 1MB of key-value pairs.
      type: object
      properties:
        IdentityId:
          $ref: "#/components/schemas/IdentityId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        DatasetName:
          $ref: "#/components/schemas/DatasetName"
          description: A string of up to 128 characters. Allowed characters are a-z, A-Z, 0-9, '_' (underscore), '-' (dash), and '.' (dot).
        CreationDate:
          $ref: "#/components/schemas/Date"
          description: Date on which the dataset was created.
        LastModifiedDate:
          $ref: "#/components/schemas/Date"
          description: Date when the dataset was last modified.
        LastModifiedBy:
          $ref: "#/components/schemas/String"
          description: The device that made the last change to this dataset.
        DataStorage:
          $ref: "#/components/schemas/Long"
          description: Total size in bytes of the records in this dataset.
        NumRecords:
          $ref: "#/components/schemas/Long"
          description: Number of records in this dataset.
    Date:
      type: string
      format: date-time
    String:
      type: string
    Long:
      type: integer
      format: int64
    DescribeDatasetResponse:
      description: Response to a successful DescribeDataset request.
      type: object
      properties:
        Dataset:
          $ref: "#/components/schemas/Dataset"
          description: Meta data for a collection of data for an identity. An identity can have multiple datasets. A dataset can be general or associated with a particular entity in an application (like a saved game). Datasets are automatically created if they don't exist. Data is synced by dataset, and a dataset can hold up to 1MB of key-value pairs.
    DescribeIdentityPoolUsageResponse:
      description: Response to a successful DescribeIdentityPoolUsage request.
      type: object
      properties:
        IdentityPoolUsage:
          $ref: "#/components/schemas/IdentityPoolUsage"
          description: Information about the usage of the identity pool.
    IdentityPoolUsage:
      description: Usage information for the identity pool.
      type: object
      properties:
        IdentityPoolId:
          $ref: "#/components/schemas/IdentityPoolId"
          description: A name-spaced GUID (for example, us-east-1:23EC4050-6AEA-7089-A2DD-08002EXAMPLE) created by Amazon Cognito. GUID generation is unique within a region.
        SyncSessionsCount:
          $ref: "#/components/schemas/Long"
          description: Number of sync sessions for the identity pool.
        DataStorage:
          $ref: "#/components/schemas/Long"
          description: Data storage information for the identity pool.
