openapi: 3.0.0
info:
  version: "2017-09-08"
  title: AWSServerlessApplicationRepository
  description: AWSServerlessApplicationRepository
  x-serviceName: serverlessrepo
  x-serviceAlias: serverlessrepo
  x-protocol: rest-json
  x-apiVersion: "2017-09-08"
  x-endpointPrefix: serverlessrepo
  x-jsonVersion: "1.1"
servers:
  - url: https://serverlessrepo.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for serverlessrepo
paths:
  /applications:
    post:
      operationId: CreateApplication
      description: Creates an application, optionally including an AWS SAM file to create the first application version in the same call.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Author:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                HomePageUrl:
                  $ref: "#/components/schemas/__string"
                Labels:
                  $ref: "#/components/schemas/__listOf__string"
                LicenseBody:
                  $ref: "#/components/schemas/__string"
                LicenseUrl:
                  $ref: "#/components/schemas/__string"
                Name:
                  $ref: "#/components/schemas/__string"
                ReadmeBody:
                  $ref: "#/components/schemas/__string"
                ReadmeUrl:
                  $ref: "#/components/schemas/__string"
                SemanticVersion:
                  $ref: "#/components/schemas/__string"
                SourceCodeArchiveUrl:
                  $ref: "#/components/schemas/__string"
                SourceCodeUrl:
                  $ref: "#/components/schemas/__string"
                SpdxLicenseId:
                  $ref: "#/components/schemas/__string"
                TemplateBody:
                  $ref: "#/components/schemas/__string"
                TemplateUrl:
                  $ref: "#/components/schemas/__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationResponse"
    get:
      operationId: ListApplications
      description: Lists applications owned by the requester.
      parameters:
        - name: maxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxItems"
          description: The total number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token to specify where to start paginating.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationsResponse"
  /applications/{application_id}/versions/{semantic_version}:
    put:
      operationId: CreateApplicationVersion
      description: Creates an application version.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        - name: semantic_version
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The semantic version of the new version.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                SourceCodeArchiveUrl:
                  $ref: "#/components/schemas/__string"
                SourceCodeUrl:
                  $ref: "#/components/schemas/__string"
                TemplateBody:
                  $ref: "#/components/schemas/__string"
                TemplateUrl:
                  $ref: "#/components/schemas/__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApplicationVersionResponse"
  /applications/{application_id}/changesets:
    post:
      operationId: CreateCloudFormationChangeSet
      description: Creates an AWS CloudFormation change set for the given application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Capabilities:
                  $ref: "#/components/schemas/__listOf__string"
                ChangeSetName:
                  $ref: "#/components/schemas/__string"
                ClientToken:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                NotificationArns:
                  $ref: "#/components/schemas/__listOf__string"
                ParameterOverrides:
                  $ref: "#/components/schemas/__listOfParameterValue"
                ResourceTypes:
                  $ref: "#/components/schemas/__listOf__string"
                RollbackConfiguration:
                  $ref: "#/components/schemas/RollbackConfiguration"
                SemanticVersion:
                  $ref: "#/components/schemas/__string"
                StackName:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/__listOfTag"
                TemplateId:
                  $ref: "#/components/schemas/__string"
              required:
                - StackName
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudFormationChangeSetResponse"
  /applications/{application_id}/templates:
    post:
      operationId: CreateCloudFormationTemplate
      description: Creates an AWS CloudFormation template.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                SemanticVersion:
                  $ref: "#/components/schemas/__string"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudFormationTemplateResponse"
  /applications/{application_id}:
    delete:
      operationId: DeleteApplication
      description: Deletes the specified application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      responses:
        "204":
          description: Success
    get:
      operationId: GetApplication
      description: Gets the specified application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        - name: semanticVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The semantic version of the application to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationResponse"
    patch:
      operationId: UpdateApplication
      description: Updates the specified application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Author:
                  $ref: "#/components/schemas/__string"
                Description:
                  $ref: "#/components/schemas/__string"
                HomePageUrl:
                  $ref: "#/components/schemas/__string"
                Labels:
                  $ref: "#/components/schemas/__listOf__string"
                ReadmeBody:
                  $ref: "#/components/schemas/__string"
                ReadmeUrl:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateApplicationResponse"
  /applications/{application_id}/policy:
    get:
      operationId: GetApplicationPolicy
      description: Retrieves the policy for the application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApplicationPolicyResponse"
    put:
      operationId: PutApplicationPolicy
      description: Sets the permission policy for an application. For the list of actions supported for this operation, see Application Permissions .
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Statements:
                  $ref: "#/components/schemas/__listOfApplicationPolicyStatement"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutApplicationPolicyResponse"
  /applications/{application_id}/templates/{template_id}:
    get:
      operationId: GetCloudFormationTemplate
      description: Gets the specified AWS CloudFormation template.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: "The UUID returned by CreateCloudFormationTemplate. Pattern: [0-9a-fA-F]{8}\\-[0-9a-fA-F]{4}\\-[0-9a-fA-F]{4}\\-[0-9a-fA-F]{4}\\-[0-9a-fA-F]{12}"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCloudFormationTemplateResponse"
  /applications/{application_id}/dependencies:
    get:
      operationId: ListApplicationDependencies
      description: Retrieves the list of applications nested in the containing application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        - name: maxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxItems"
          description: The total number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token to specify where to start paginating.
        - name: semanticVersion
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The semantic version of the application to get.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationDependenciesResponse"
  /applications/{application_id}/versions:
    get:
      operationId: ListApplicationVersions
      description: Lists versions for the specified application.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
        - name: maxItems
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxItems"
          description: The total number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token to specify where to start paginating.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListApplicationVersionsResponse"
  /applications/{application_id}/unshare:
    post:
      operationId: UnshareApplication
      description: Unshares an application from an AWS Organization. This operation can be called only from the organization's master account.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The Amazon Resource Name (ARN) of the application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                OrganizationId:
                  $ref: "#/components/schemas/__string"
              required:
                - OrganizationId
      responses:
        "204":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    __string:
      type: string
    __listOf__string:
      type: array
      items:
        $ref: "#/components/schemas/__string"
    CreateApplicationResponse:
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The application Amazon Resource Name (ARN).
        Author:
          $ref: "#/components/schemas/__string"
          description: The name of the author publishing the app. Minimum length=1. Maximum length=127. Pattern "^[a-z0-9](([a-z0-9]|-(?!-))*[a-z0-9])?$";
        CreationTime:
          $ref: "#/components/schemas/__string"
          description: The date and time this resource was created.
        Description:
          $ref: "#/components/schemas/__string"
          description: The description of the application. Minimum length=1. Maximum length=256
        HomePageUrl:
          $ref: "#/components/schemas/__string"
          description: A URL with more information about the application, for example the location of your GitHub repository for the application.
        IsVerifiedAuthor:
          $ref: "#/components/schemas/__boolean"
          description: Whether the author of this application has been verified. This means means that AWS has made a good faith review, as a reasonable and prudent service provider, of the information provided by the requester and has confirmed that the requester's identity is as claimed.
        Labels:
          $ref: "#/components/schemas/__listOf__string"
          description: 'Labels to improve discovery of apps in search results. Minimum length=1. Maximum length=127. Maximum number of labels: 10 Pattern: "^[a-zA-Z0-9+\\-_:\\/@]+$";'
        LicenseUrl:
          $ref: "#/components/schemas/__string"
          description: A link to a license file of the app that matches the spdxLicenseID value of your application. Maximum size 5 MB
        Name:
          $ref: "#/components/schemas/__string"
          description: 'The name of the application. Minimum length=1. Maximum length=140 Pattern: "[a-zA-Z0-9\\-]+";'
        ReadmeUrl:
          $ref: "#/components/schemas/__string"
          description: A link to the readme file in Markdown language that contains a more detailed description of the application and how it works. Maximum size 5 MB
        SpdxLicenseId:
          $ref: "#/components/schemas/__string"
          description: A valid identifier from https://spdx.org/licenses/.
        VerifiedAuthorUrl:
          $ref: "#/components/schemas/__string"
          description: The URL to the public profile of a verified author. This URL is submitted by the author.
        Version:
          $ref: "#/components/schemas/Version"
          description: Version information about the application.
    __boolean:
      type: boolean
    Version:
      description: Application version details.
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The application Amazon Resource Name (ARN).
        CreationTime:
          $ref: "#/components/schemas/__string"
          description: The date and time this resource was created.
        ParameterDefinitions:
          $ref: "#/components/schemas/__listOfParameterDefinition"
          description: An array of parameter types supported by the application.
        RequiredCapabilities:
          $ref: "#/components/schemas/__listOfCapability"
          description: "A list of values that you must specify before you can deploy certain applications. Some applications might include resources that can affect permissions in your AWS account, for example, by creating new AWS Identity and Access Management (IAM) users. For those applications, you must explicitly acknowledge their capabilities by specifying this parameter. The only valid values are CAPABILITY_IAM, CAPABILITY_NAMED_IAM, CAPABILITY_RESOURCE_POLICY, and CAPABILITY_AUTO_EXPAND. The following resources require you to specify CAPABILITY_IAM or CAPABILITY_NAMED_IAM: AWS::IAM::Group, AWS::IAM::InstanceProfile, AWS::IAM::Policy, and AWS::IAM::Role. If the application contains IAM resources, you can specify either CAPABILITY_IAM or CAPABILITY_NAMED_IAM. If the application contains IAM resources with custom names, you must specify CAPABILITY_NAMED_IAM. The following resources require you to specify CAPABILITY_RESOURCE_POLICY: AWS::Lambda::Permission, AWS::IAM:Policy, AWS::ApplicationAutoScaling::ScalingPolicy, AWS::S3::BucketPolicy, AWS::SQS::QueuePolicy, and AWS::SNS::TopicPolicy. Applications that contain one or more nested applications require you to specify CAPABILITY_AUTO_EXPAND. If your application template contains any of the above resources, we recommend that you review all permissions associated with the application before deploying. If you don't specify this parameter for an application that requires capabilities, the call will fail."
        ResourcesSupported:
          $ref: "#/components/schemas/__boolean"
          description: Whether all of the AWS resources contained in this application are supported in the region in which it is being retrieved.
        SemanticVersion:
          $ref: "#/components/schemas/__string"
          description: "The semantic version of the application: https://semver.org/"
        SourceCodeArchiveUrl:
          $ref: "#/components/schemas/__string"
          description: A link to the S3 object that contains the ZIP archive of the source code for this version of your application. Maximum size 50 MB
        SourceCodeUrl:
          $ref: "#/components/schemas/__string"
          description: A link to a public repository for the source code of your application, for example the URL of a specific GitHub commit.
        TemplateUrl:
          $ref: "#/components/schemas/__string"
          description: A link to the packaged AWS SAM template of your application.
      required:
        - TemplateUrl
        - ParameterDefinitions
        - ResourcesSupported
        - CreationTime
        - RequiredCapabilities
        - ApplicationId
        - SemanticVersion
    __listOfParameterDefinition:
      type: array
      items:
        $ref: "#/components/schemas/ParameterDefinition"
    ParameterDefinition:
      description: Parameters supported by the application.
      type: object
      properties:
        AllowedPattern:
          $ref: "#/components/schemas/__string"
          description: A regular expression that represents the patterns to allow for String types.
        AllowedValues:
          $ref: "#/components/schemas/__listOf__string"
          description: An array containing the list of values allowed for the parameter.
        ConstraintDescription:
          $ref: "#/components/schemas/__string"
          description: 'A string that explains a constraint when the constraint is violated. For example, without a constraint description, a parameter that has an allowed pattern of [A-Za-z0-9]+ displays the following error message when the user specifies an invalid value: Malformed input-Parameter MyParameter must match pattern [A-Za-z0-9]+ By adding a constraint description, such as "must contain only uppercase and lowercase letters and numbers," you can display the following customized error message: Malformed input-Parameter MyParameter must contain only uppercase and lowercase letters and numbers.'
        DefaultValue:
          $ref: "#/components/schemas/__string"
          description: A value of the appropriate type for the template to use if no value is specified when a stack is created. If you define constraints for the parameter, you must specify a value that adheres to those constraints.
        Description:
          $ref: "#/components/schemas/__string"
          description: A string of up to 4,000 characters that describes the parameter.
        MaxLength:
          $ref: "#/components/schemas/__integer"
          description: An integer value that determines the largest number of characters that you want to allow for String types.
        MaxValue:
          $ref: "#/components/schemas/__integer"
          description: A numeric value that determines the largest numeric value that you want to allow for Number types.
        MinLength:
          $ref: "#/components/schemas/__integer"
          description: An integer value that determines the smallest number of characters that you want to allow for String types.
        MinValue:
          $ref: "#/components/schemas/__integer"
          description: A numeric value that determines the smallest numeric value that you want to allow for Number types.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of the parameter.
        NoEcho:
          $ref: "#/components/schemas/__boolean"
          description: Whether to mask the parameter value whenever anyone makes a call that describes the stack. If you set the value to true, the parameter value is masked with asterisks (*****).
        ReferencedByResources:
          $ref: "#/components/schemas/__listOf__string"
          description: A list of AWS SAM resources that use this parameter.
        Type:
          $ref: "#/components/schemas/__string"
          description: 'The type of the parameter. Valid values: String | Number | List`<Number>` | CommaDelimitedList String: A literal string. For example, users can specify "MyUserName". Number: An integer or float. AWS CloudFormation validates the parameter value as a number. However, when you use the parameter elsewhere in your template (for example, by using the Ref intrinsic function), the parameter value becomes a string. For example, users might specify "8888". List`<Number>`: An array of integers or floats that are separated by commas. AWS CloudFormation validates the parameter value as numbers. However, when you use the parameter elsewhere in your template (for example, by using the Ref intrinsic function), the parameter value becomes a list of strings. For example, users might specify "80,20", and then Ref results in ["80","20"]. CommaDelimitedList: An array of literal strings that are separated by commas. The total number of strings should be one more than the total number of commas. Also, each member string is space-trimmed. For example, users might specify "test,dev,prod", and then Ref results in ["test","dev","prod"].'
      required:
        - ReferencedByResources
        - Name
    __integer:
      type: integer
    __listOfCapability:
      type: array
      items:
        $ref: "#/components/schemas/Capability"
    Capability:
      description: Values that must be specified in order to deploy some applications.
      type: string
      enum:
        - CAPABILITY_IAM
        - CAPABILITY_NAMED_IAM
        - CAPABILITY_AUTO_EXPAND
        - CAPABILITY_RESOURCE_POLICY
    CreateApplicationVersionResponse:
      type: object
      properties:
        ApplicationId:
          $ref: "#/components/schemas/__string"
          description: The application Amazon Resource Name (ARN).
        CreationTime:
          $ref: "#/components/schemas/__string"
          description: The date and time this resource was created.
        ParameterDefinitions:
          $ref: "#/components/schemas/__listOfParameterDefinition"
          description: An array of parameter types supported by the application.
        RequiredCapabilities:
          $ref: "#/components/schemas/__listOfCapability"
          description: "A list of values that you must specify before you can deploy certain applications. Some applications might include resources that can affect permissions in your AWS account, for example, by creating new AWS Identity and Access Management (IAM) users. For those applications, you must explicitly acknowledge their capabilities by specifying this parameter. The only valid values are CAPABILITY_IAM, CAPABILITY_NAMED_IAM, CAPABILITY_RESOURCE_POLICY, and CAPABILITY_AUTO_EXPAND. The following resources require you to specify CAPABILITY_IAM or CAPABILITY_NAMED_IAM: AWS::IAM::Group, AWS::IAM::InstanceProfile, AWS::IAM::Policy, and AWS::IAM::Role. If the application contains IAM resources, you can specify either CAPABILITY_IAM or CAPABILITY_NAMED_IAM. If the application contains IAM resources with custom names, you must specify CAPABILITY_NAMED_IAM. The following resources require you to specify CAPABILITY_RESOURCE_POLICY: AWS::Lambda::Permission, AWS::IAM:Policy, AWS::ApplicationAutoScaling::ScalingPolicy, AWS::S3::BucketPolicy, AWS::SQS::QueuePolicy, and AWS::SNS::TopicPolicy. Applications that contain one or more nested applications require you to specify CAPABILITY_AUTO_EXPAND. If your application template contains any of the above resources, we recommend that you review all permissions associated with the application before deploying. If you don't specify this parameter for an application that requires capabilities, the call will fail."
        ResourcesSupported:
          $ref: "#/components/schemas/__boolean"
          description: Whether all of the AWS resources contained in this application are supported in the region in which it is being retrieved.
        SemanticVersion:
          $ref: "#/components/schemas/__string"
          description: "The semantic version of the application: https://semver.org/"
        SourceCodeArchiveUrl:
          $ref: "#/components/schemas/__string"
          description: A link to the S3 object that contains the ZIP archive of the source code for this version of your application. Maximum size 50 MB
        SourceCodeUrl:
          $ref: "#/components/schemas/__string"
          description: A link to a public repository for the source code of your application, for example the URL of a specific GitHub commit.
        TemplateUrl:
          $ref: "#/components/schemas/__string"
          description: A link to the packaged AWS SAM template of your application.
    __listOfParameterValue:
      type: array
      items:
        $ref: "#/components/schemas/ParameterValue"
    ParameterValue:
      description: Parameter value of the application.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/__string"
          description: The key associated with the parameter. If you don't specify a key and value for a particular parameter, AWS CloudFormation uses the default value that is specified in your template.
        Value:
          $ref: "#/components/schemas/__string"
          description: The input value associated with the parameter.
      required:
        - Value
        - Name
    RollbackConfiguration:
      description: This property corresponds to the AWS CloudFormation RollbackConfiguration Data Type.
      type: object
      properties:
        MonitoringTimeInMinutes:
          $ref: "#/components/schemas/__integer"
          description: This property corresponds to the content of the same name for the AWS CloudFormation RollbackConfiguration Data Type.
        RollbackTriggers:
          $ref: "#/components/schemas/__listOfRollbackTrigger"
          description: This property corresponds to the content of the same name for the AWS CloudFormation RollbackConfiguration Data Type.
    __listOfRollbackTrigger:
      type: array
      items:
        $ref: "#/components/schemas/RollbackTrigger"
    RollbackTrigger:
      description: This property corresponds to the AWS CloudFormation RollbackTrigger Data Type.
      type: object
      properties:
        Arn:
          $ref: "#/components/schemas/__string"
          description: This property corresponds to the content of the same name for the AWS CloudFormation RollbackTrigger Data Type.
        Type:
          $ref: "#/components/schemas/__string"
          description: This property corresponds to the content of the same name for the AWS CloudFormation RollbackTrigger Data Type.
      required:
        - Type
        - Arn
    __listOfTag:
      type: array
      items:
