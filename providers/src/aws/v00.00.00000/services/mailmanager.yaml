          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                TrafficPolicyName:
                  $ref: "#/components/schemas/TrafficPolicyName"
                  description: A user-friendly name for the traffic policy resource.
                PolicyStatements:
                  $ref: "#/components/schemas/PolicyStatementList"
                  description: Conditional statements for filtering email traffic.
                DefaultAction:
                  $ref: "#/components/schemas/AcceptAction"
                  description: Default action instructs the traﬃc policy to either Allow or Deny (block) messages that fall outside of (or not addressed by) the conditions of your policy statements
                MaxMessageSizeBytes:
                  $ref: "#/components/schemas/MaxMessageSizeBytes"
                  description: The maximum message size in bytes of email which is allowed in by this traffic policy—anything larger will be blocked.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - TrafficPolicyName
                - PolicyStatements
                - DefaultAction
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTrafficPolicyResponse"
