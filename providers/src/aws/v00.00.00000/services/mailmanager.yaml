  /TagResource:
    post:
      operationId: TagResource
      description: Adds one or more tags (keys and values) to a specified resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.TagResource
