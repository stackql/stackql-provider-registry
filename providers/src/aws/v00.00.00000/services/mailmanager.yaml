                RelayName:
                  $ref: "#/components/schemas/RelayName"
                  description: The name of the relay resource.
                ServerName:
                  $ref: "#/components/schemas/RelayServerName"
                  description: The destination relay server address.
                ServerPort:
                  $ref: "#/components/schemas/RelayServerPort"
                  description: The destination relay server port.
                Authentication:
                  $ref: "#/components/schemas/RelayAuthentication"
                  description: Authentication for the relay destination server—specify the secretARN where the SMTP credentials are stored.
              required:
                - RelayId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelayResponse"
  /UpdateRuleSet:
    post:
      operationId: UpdateRuleSet
      description: Update attributes of an already provisioned rule set.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.UpdateRuleSet
            default: MailManagerSvc.UpdateRuleSet
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                RuleSetId:
                  $ref: "#/components/schemas/RuleSetId"
                  description: The identifier of a rule set you want to update.
                RuleSetName:
                  $ref: "#/components/schemas/RuleSetName"
                  description: A user-friendly name for the rule set resource.
                Rules:
                  $ref: "#/components/schemas/Rules"
                  description: A new set of rules to replace the current rules of the rule set—these rules will override all the rules of the rule set.
              required:
                - RuleSetId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRuleSetResponse"
  /UpdateTrafficPolicy:
    post:
      operationId: UpdateTrafficPolicy
      description: Update attributes of an already provisioned traffic policy resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.UpdateTrafficPolicy
            default: MailManagerSvc.UpdateTrafficPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                TrafficPolicyId:
                  $ref: "#/components/schemas/TrafficPolicyId"
                  description: The identifier of the traffic policy that you want to update.
                TrafficPolicyName:
                  $ref: "#/components/schemas/TrafficPolicyName"
                  description: A user-friendly name for the traffic policy resource.
                PolicyStatements:
                  $ref: "#/components/schemas/PolicyStatementList"
                  description: The list of conditions to be updated for filtering email traffic.
                DefaultAction:
                  $ref: "#/components/schemas/AcceptAction"
                  description: Default action instructs the traﬃc policy to either Allow or Deny (block) messages that fall outside of (or not addressed by) the conditions of your policy statements
                MaxMessageSizeBytes:
                  $ref: "#/components/schemas/MaxMessageSizeBytes"
                  description: The maximum message size in bytes of email which is allowed in by this traffic policy—anything larger will be blocked.
              required:
                - TrafficPolicyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTrafficPolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    IdempotencyToken:
      type: string
      minLength: 1
      maxLength: 128
    AddonSubscriptionId:
      type: string
      minLength: 4
      maxLength: 67
      pattern: as-[a-zA-Z0-9]{1,64}
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key-value pair (the value is optional), that you can define and assign to Amazon Web Services resources.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: The key of the key-value tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The value of the key-value tag.
      required:
        - Key
        - Value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[a-zA-Z0-9/_\\+=\\.:@\\-]+"
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[a-zA-Z0-9/_\\+=\\.:@\\-]*"
    CreateAddonInstanceResponse:
      type: object
      properties:
        AddonInstanceId:
          $ref: "#/components/schemas/AddonInstanceId"
          description: The unique ID of the Add On instance created by this API.
      required:
        - AddonInstanceId
    AddonInstanceId:
      type: string
      minLength: 4
      maxLength: 67
      pattern: ai-[a-zA-Z0-9]{1,64}
    AddonName:
      type: string
    CreateAddonSubscriptionResponse:
      type: object
      properties:
        AddonSubscriptionId:
          $ref: "#/components/schemas/AddonSubscriptionId"
          description: The unique ID of the Add On subscription created by this API.
      required:
        - AddonSubscriptionId
    AddressListName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    CreateAddressListResponse:
      type: object
      properties:
        AddressListId:
          $ref: "#/components/schemas/AddressListId"
          description: The identifier of the created address list.
      required:
        - AddressListId
    AddressListId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9-]+"
    JobName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9_.-]+"
    ImportDataFormat:
      description: The import data format contains the specifications of the input file that would be passed to the address list import job.
      type: object
      properties:
        ImportDataType:
          $ref: "#/components/schemas/ImportDataType"
          description: The type of file that would be passed as an input for the address list import job.
      required:
        - ImportDataType
    ImportDataType:
      type: string
      enum:
        - CSV
        - JSON
    CreateAddressListImportJobResponse:
      type: object
      properties:
        JobId:
          $ref: "#/components/schemas/JobId"
          description: The identifier of the created import job.
        PreSignedUrl:
          $ref: "#/components/schemas/PreSignedUrl"
          description: The pre-signed URL target for uploading the input file.
      required:
        - JobId
        - PreSignedUrl
    JobId:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[a-zA-Z0-9-]+"
    PreSignedUrl:
      type: string
    ArchiveNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9][a-zA-Z0-9_-]*[a-zA-Z0-9]"
    ArchiveRetention:
      description: The retention policy for an email archive that specifies how long emails are kept before being automatically deleted.
      type: object
      properties:
        RetentionPeriod:
          $ref: "#/components/schemas/RetentionPeriod"
          description: The enum value sets the period for retaining emails in an archive.
    RetentionPeriod:
      type: string
      enum:
        - THREE_MONTHS
        - SIX_MONTHS
        - NINE_MONTHS
        - ONE_YEAR
        - EIGHTEEN_MONTHS
        - TWO_YEARS
        - THIRTY_MONTHS
        - THREE_YEARS
        - FOUR_YEARS
        - FIVE_YEARS
        - SIX_YEARS
        - SEVEN_YEARS
        - EIGHT_YEARS
        - NINE_YEARS
        - TEN_YEARS
        - PERMANENT
    KmsKeyArn:
      type: string
      pattern: arn:aws(|-cn|-us-gov|-eusc):kms:[a-z0-9-]{1,20}:[0-9]{12}:(key|alias)/.+
    CreateArchiveResponse:
      description: The response from creating a new email archive.
      type: object
      properties:
        ArchiveId:
          $ref: "#/components/schemas/ArchiveIdString"
          description: The unique identifier for the newly created archive.
      required:
        - ArchiveId
    ArchiveIdString:
      type: string
      minLength: 1
      maxLength: 66
    IngressPointName:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[A-Za-z0-9_\\-]+"
    IngressPointType:
      type: string
      enum:
        - OPEN
        - AUTH
        - MTLS
    RuleSetId:
      type: string
      minLength: 1
      maxLength: 100
    TrafficPolicyId:
      type: string
      minLength: 1
      maxLength: 100
    IngressPointConfiguration:
      description: The configuration of the ingress endpoint resource.
      type: object
      properties:
        SmtpPassword:
          $ref: "#/components/schemas/SmtpPassword"
          description: The password of the ingress endpoint resource.
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The SecretsManager::Secret ARN of the ingress endpoint resource.
        TlsAuthConfiguration:
          $ref: "#/components/schemas/TlsAuthConfiguration"
          description: The mutual TLS authentication configuration of the ingress endpoint resource.
    SmtpPassword:
      type: string
      minLength: 8
      maxLength: 64
      pattern: "[A-Za-z0-9!@#$%^&*()_+\\-=\\[\\]{}|.,?]+"
    SecretArn:
      type: string
      pattern: arn:(aws|aws-cn|aws-us-gov|aws-eusc):secretsmanager:[a-z0-9-]+:\d{12}:secret:[a-zA-Z0-9/_+=,.@-]+
    TlsAuthConfiguration:
      description: The mutual TLS authentication configuration for an ingress endpoint.
      type: object
      properties:
        TrustStore:
          $ref: "#/components/schemas/TrustStore"
          description: The trust store configuration for mutual TLS authentication.
    TrustStore:
      description: The trust store used for mutual TLS authentication. It contains the certificate authority (CA) certificates and optional certificate revocation list (CRL).
      type: object
      properties:
        CAContent:
          $ref: "#/components/schemas/CAContent"
          description: The PEM-encoded certificate authority (CA) certificates bundle for the trust store.
        CrlContent:
          $ref: "#/components/schemas/CrlContent"
          description: The PEM-encoded certificate revocation lists (CRLs) for the trust store. There can be one CRL per certificate authority (CA) in the trust store.
        KmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon Resource Name (ARN) of the KMS key used to encrypt the trust store contents.
      required:
        - CAContent
    CAContent:
      type: string
      minLength: 1
      maxLength: 500000
      pattern: "[\\P{C}\\s]*"
    CrlContent:
      type: string
      minLength: 1
      maxLength: 500000
      pattern: "[\\P{C}\\s]*"
    NetworkConfiguration:
      description: The network type (IPv4-only, Dual-Stack, PrivateLink) of the ingress endpoint resource.
      type: object
      properties:
        PublicNetworkConfiguration:
          $ref: "#/components/schemas/PublicNetworkConfiguration"
          description: Specifies the network configuration for the public ingress point.
        PrivateNetworkConfiguration:
          $ref: "#/components/schemas/PrivateNetworkConfiguration"
          description: Specifies the network configuration for the private ingress point.
    PublicNetworkConfiguration:
      description: Specifies the network configuration for the public ingress point.
      type: object
      properties:
        IpType:
          $ref: "#/components/schemas/IpType"
          description: The IP address type for the public ingress point. Valid values are IPV4 and DUAL_STACK.
      required:
        - IpType
    IpType:
      type: string
      enum:
        - IPV4
        - DUAL_STACK
    PrivateNetworkConfiguration:
      description: Specifies the network configuration for the private ingress point.
      type: object
      properties:
        VpcEndpointId:
          $ref: "#/components/schemas/VpcEndpointId"
          description: The identifier of the VPC endpoint to associate with this private ingress point.
      required:
        - VpcEndpointId
    VpcEndpointId:
      type: string
      pattern: vpce-[a-zA-Z0-9]{17}
    TlsPolicy:
      type: string
      enum:
        - REQUIRED
        - OPTIONAL
        - FIPS
    CreateIngressPointResponse:
      type: object
      properties:
        IngressPointId:
          $ref: "#/components/schemas/IngressPointId"
          description: The unique identifier for a previously created ingress endpoint.
      required:
        - IngressPointId
    IngressPointId:
      type: string
      minLength: 1
      maxLength: 100
    RelayName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9-_]+"
    RelayServerName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9-\\.]+"
    RelayServerPort:
      type: integer
      minimum: 1
      maximum: 65535
    RelayAuthentication:
      description: Authentication for the relay destination server—specify the secretARN where the SMTP credentials are stored, or specify an empty NoAuthentication structure if the relay destination server does not require SMTP credential authentication.
      type: object
      properties:
        SecretArn:
          $ref: "#/components/schemas/SecretArn"
          description: The ARN of the secret created in secrets manager where the relay server's SMTP credentials are stored.
        NoAuthentication:
          $ref: "#/components/schemas/NoAuthentication"
          description: Keep an empty structure if the relay destination server does not require SMTP credential authentication.
    NoAuthentication:
      description: Explicitly indicate that the relay destination server does not require SMTP credential authentication.
      type: object
    CreateRelayResponse:
      type: object
      properties:
        RelayId:
          $ref: "#/components/schemas/RelayId"
          description: A unique identifier of the created relay resource.
      required:
        - RelayId
    RelayId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9-]+"
    RuleSetName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_.-]+"
    Rules:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: A rule contains conditions, "unless conditions" and actions. For each envelope recipient of an email, if all conditions match and none of the "unless conditions" match, then all of the actions are executed sequentially. If no conditions are provided, the rule always applies and the actions are implicitly executed. If only "unless conditions" are provided, the rule applies if the email does not match the evaluation of the "unless conditions".
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/RuleName"
          description: The user-friendly name of the rule.
        Conditions:
          $ref: "#/components/schemas/RuleConditions"
          description: The conditions of this rule. All conditions must match the email for the actions to be executed. An empty list of conditions means that all emails match, but are still subject to any "unless conditions"
        Unless:
          $ref: "#/components/schemas/RuleConditions"
          description: The "unless conditions" of this rule. None of the conditions can match the email for the actions to be executed. If any of these conditions do match the email, then the actions are not executed.
        Actions:
          $ref: "#/components/schemas/RuleActions"
          description: The list of actions to execute when the conditions match the incoming email, and none of the "unless conditions" match.
      required:
        - Actions
    RuleName:
      type: string
      minLength: 1
      maxLength: 32
      pattern: "[a-zA-Z0-9_.-]+"
    RuleConditions:
      type: array
      items:
        $ref: "#/components/schemas/RuleCondition"
    RuleCondition:
      description: The conditional expression used to evaluate an email for determining if a rule action should be taken.
      type: object
      properties:
        BooleanExpression:
          $ref: "#/components/schemas/RuleBooleanExpression"
          description: The condition applies to a boolean expression passed in this field.
        StringExpression:
          $ref: "#/components/schemas/RuleStringExpression"
          description: The condition applies to a string expression passed in this field.
        NumberExpression:
          $ref: "#/components/schemas/RuleNumberExpression"
          description: The condition applies to a number expression passed in this field.
        IpExpression:
          $ref: "#/components/schemas/RuleIpExpression"
          description: The condition applies to an IP address expression passed in this field.
        VerdictExpression:
          $ref: "#/components/schemas/RuleVerdictExpression"
          description: The condition applies to a verdict expression passed in this field.
        DmarcExpression:
          $ref: "#/components/schemas/RuleDmarcExpression"
          description: The condition applies to a DMARC policy expression passed in this field.
    RuleBooleanExpression:
      description: A boolean expression to be used in a rule condition.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/RuleBooleanToEvaluate"
          description: The operand on which to perform a boolean condition operation.
        Operator:
          $ref: "#/components/schemas/RuleBooleanOperator"
          description: The matching operator for a boolean condition expression.
      required:
        - Evaluate
        - Operator
    RuleBooleanToEvaluate:
      description: The union type representing the allowed types of operands for a boolean condition.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleBooleanEmailAttribute"
          description: The boolean type representing the allowed attribute types for an email.
        Analysis:
          $ref: "#/components/schemas/Analysis"
          description: The Add On ARN and its returned value to evaluate in a boolean condition expression.
        IsInAddressList:
          $ref: "#/components/schemas/RuleIsInAddressList"
          description: The structure representing the address lists and address list attribute that will be used in evaluation of boolean expression.
    RuleBooleanEmailAttribute:
      type: string
      enum:
        - READ_RECEIPT_REQUESTED
        - TLS
        - TLS_WRAPPED
    Analysis:
      description: The result of an analysis can be used in conditions to trigger actions. Analyses can inspect the email content and report a certain aspect of the email.
      type: object
      properties:
        Analyzer:
          $ref: "#/components/schemas/AnalyzerArn"
          description: The Amazon Resource Name (ARN) of an Add On.
        ResultField:
          $ref: "#/components/schemas/ResultField"
          description: The returned value from an Add On.
      required:
        - Analyzer
        - ResultField
    AnalyzerArn:
      type: string
      pattern: "[a-zA-Z0-9:_/+=,@.#-]+"
    ResultField:
      type: string
      minLength: 1
      maxLength: 256
      pattern: (addon\.)?[\sa-zA-Z0-9_]+
    RuleIsInAddressList:
      description: The structure type for a boolean condition that provides the address lists and address list attribute to evaluate.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleAddressListEmailAttribute"
          description: The email attribute that needs to be evaluated against the address list.
        AddressLists:
          $ref: "#/components/schemas/RuleAddressListArnList"
          description: The address lists that will be used for evaluation.
      required:
        - Attribute
        - AddressLists
    RuleAddressListEmailAttribute:
      type: string
      enum:
        - RECIPIENT
        - MAIL_FROM
        - SENDER
        - FROM
        - TO
        - CC
    RuleAddressListArnList:
      type: array
      items:
        $ref: "#/components/schemas/AddressListArn"
    AddressListArn:
      type: string
    RuleBooleanOperator:
      type: string
      enum:
        - IS_TRUE
        - IS_FALSE
    RuleStringExpression:
      description: A string expression is evaluated against strings or substrings of the email.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/RuleStringToEvaluate"
          description: The string to evaluate in a string condition expression.
        Operator:
          $ref: "#/components/schemas/RuleStringOperator"
          description: The matching operator for a string condition expression.
        Values:
          $ref: "#/components/schemas/RuleStringList"
          description: The string(s) to be evaluated in a string condition expression. For all operators, except for NOT_EQUALS, if multiple values are given, the values are processed as an OR. That is, if any of the values match the email's string using the given operator, the condition is deemed to match. However, for NOT_EQUALS, the condition is only deemed to match if none of the given strings match the email's string.
      required:
        - Evaluate
        - Operator
        - Values
    RuleStringToEvaluate:
      description: The string to evaluate in a string condition expression.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleStringEmailAttribute"
          description: The email attribute to evaluate in a string condition expression.
        MimeHeaderAttribute:
          $ref: "#/components/schemas/MimeHeaderAttribute"
          description: The email MIME X-Header attribute to evaluate in a string condition expression.
        Analysis:
          $ref: "#/components/schemas/Analysis"
          description: The Add On ARN and its returned value to evaluate in a string condition expression.
        ClientCertificateAttribute:
          $ref: "#/components/schemas/RuleClientCertificateAttribute"
          description: The client certificate attribute to evaluate in a string condition expression.
    RuleStringEmailAttribute:
      type: string
      enum:
        - MAIL_FROM
        - HELO
        - RECIPIENT
        - SENDER
        - FROM
        - SUBJECT
        - TO
        - CC
    MimeHeaderAttribute:
      type: string
      pattern: X-[a-zA-Z0-9-]{1,256}
    RuleClientCertificateAttribute:
      description: The client certificate attribute to evaluate in a rule condition. These attributes are extracted from the client certificate presented during mutual TLS authentication.
      type: string
      enum:
        - CN
        - SAN_RFC822_NAME
        - SAN_DNS_NAME
        - SAN_DIRECTORY_NAME
        - SAN_UNIFORM_RESOURCE_IDENTIFIER
        - SAN_IP_ADDRESS
        - SAN_REGISTERED_ID
        - SERIAL_NUMBER
    RuleStringOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - STARTS_WITH
        - ENDS_WITH
        - CONTAINS
    RuleStringList:
      type: array
      items:
        $ref: "#/components/schemas/RuleStringValue"
    RuleStringValue:
      type: string
      minLength: 1
      maxLength: 4096
    RuleNumberExpression:
      description: A number expression to match numeric conditions with integers from the incoming email.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/RuleNumberToEvaluate"
          description: The number to evaluate in a numeric condition expression.
        Operator:
          $ref: "#/components/schemas/RuleNumberOperator"
          description: The operator for a numeric condition expression.
        Value:
          $ref: "#/components/schemas/Double"
          description: The value to evaluate in a numeric condition expression.
      required:
        - Evaluate
        - Operator
        - Value
    RuleNumberToEvaluate:
      description: The number to evaluate in a numeric condition expression.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleNumberEmailAttribute"
          description: An email attribute that is used as the number to evaluate.
    RuleNumberEmailAttribute:
      type: string
      enum:
        - MESSAGE_SIZE
    RuleNumberOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - LESS_THAN
        - GREATER_THAN
        - LESS_THAN_OR_EQUAL
        - GREATER_THAN_OR_EQUAL
    Double:
      type: number
      format: double
    RuleIpExpression:
      description: An IP address expression matching certain IP addresses within a given range of IP addresses.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/RuleIpToEvaluate"
          description: The IP address to evaluate in this condition.
        Operator:
          $ref: "#/components/schemas/RuleIpOperator"
          description: The operator to evaluate the IP address.
        Values:
          $ref: "#/components/schemas/RuleIpValueList"
          description: The IP CIDR blocks in format "x.y.z.w/n" (eg 10.0.0.0/8) to match with the email's IP address. For the operator CIDR_MATCHES, if multiple values are given, they are evaluated as an OR. That is, if the IP address is contained within any of the given CIDR ranges, the condition is deemed to match. For NOT_CIDR_MATCHES, if multiple CIDR ranges are given, the condition is deemed to match if the IP address is not contained in any of the given CIDR ranges.
      required:
        - Evaluate
        - Operator
        - Values
    RuleIpToEvaluate:
      description: The IP address to evaluate for this condition.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleIpEmailAttribute"
          description: The attribute of the email to evaluate.
    RuleIpEmailAttribute:
      type: string
      enum:
        - SOURCE_IP
    RuleIpOperator:
      type: string
      enum:
        - CIDR_MATCHES
        - NOT_CIDR_MATCHES
    RuleIpValueList:
      type: array
      items:
        $ref: "#/components/schemas/RuleIpStringValue"
    RuleIpStringValue:
      type: string
      minLength: 1
      maxLength: 43
      pattern: (([0-9]|.|:|/)*)
    RuleVerdictExpression:
      description: A verdict expression is evaluated against verdicts of the email.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/RuleVerdictToEvaluate"
          description: The verdict to evaluate in a verdict condition expression.
        Operator:
          $ref: "#/components/schemas/RuleVerdictOperator"
          description: The matching operator for a verdict condition expression.
        Values:
          $ref: "#/components/schemas/RuleVerdictValueList"
          description: The values to match with the email's verdict using the given operator. For the EQUALS operator, if multiple values are given, the condition is deemed to match if any of the given verdicts match that of the email. For the NOT_EQUALS operator, if multiple values are given, the condition is deemed to match of none of the given verdicts match the verdict of the email.
      required:
        - Evaluate
        - Operator
        - Values
    RuleVerdictToEvaluate:
      description: The verdict to evaluate in a verdict condition expression.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/RuleVerdictAttribute"
          description: The email verdict attribute to evaluate in a string verdict expression.
        Analysis:
          $ref: "#/components/schemas/Analysis"
          description: The Add On ARN and its returned value to evaluate in a verdict condition expression.
    RuleVerdictAttribute:
      type: string
      enum:
        - SPF
        - DKIM
    RuleVerdictOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
    RuleVerdictValueList:
      type: array
      items:
        $ref: "#/components/schemas/RuleVerdict"
    RuleVerdict:
      type: string
      enum:
        - PASS
        - FAIL
        - GRAY
        - PROCESSING_FAILED
    RuleDmarcExpression:
      description: A DMARC policy expression. The condition matches if the given DMARC policy matches that of the incoming email.
      type: object
      properties:
        Operator:
          $ref: "#/components/schemas/RuleDmarcOperator"
          description: The operator to apply to the DMARC policy of the incoming email.
        Values:
          $ref: "#/components/schemas/RuleDmarcValueList"
          description: The values to use for the given DMARC policy operator. For the operator EQUALS, if multiple values are given, they are evaluated as an OR. That is, if any of the given values match, the condition is deemed to match. For the operator NOT_EQUALS, if multiple values are given, they are evaluated as an AND. That is, only if the email's DMARC policy is not equal to any of the given values, then the condition is deemed to match.
      required:
        - Operator
        - Values
    RuleDmarcOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
    RuleDmarcValueList:
      type: array
      items:
        $ref: "#/components/schemas/RuleDmarcPolicy"
    RuleDmarcPolicy:
      type: string
      enum:
        - NONE
        - QUARANTINE
        - REJECT
    RuleActions:
      type: array
      items:
        $ref: "#/components/schemas/RuleAction"
    RuleAction:
      description: The action for a rule to take. Only one of the contained actions can be set.
      type: object
      properties:
        Drop:
          $ref: "#/components/schemas/DropAction"
          description: This action terminates the evaluation of rules in the rule set.
        Relay:
          $ref: "#/components/schemas/RelayAction"
          description: This action relays the email to another SMTP server.
        Archive:
          $ref: "#/components/schemas/ArchiveAction"
          description: This action archives the email. This can be used to deliver an email to an archive.
        WriteToS3:
          $ref: "#/components/schemas/S3Action"
          description: This action writes the MIME content of the email to an S3 bucket.
        Send:
          $ref: "#/components/schemas/SendAction"
          description: This action sends the email to the internet.
        AddHeader:
          $ref: "#/components/schemas/AddHeaderAction"
          description: This action adds a header. This can be used to add arbitrary email headers.
        ReplaceRecipient:
          $ref: "#/components/schemas/ReplaceRecipientAction"
          description: The action replaces certain or all recipients with a different set of recipients.
        DeliverToMailbox:
          $ref: "#/components/schemas/DeliverToMailboxAction"
          description: This action delivers an email to a WorkMail mailbox.
        DeliverToQBusiness:
          $ref: "#/components/schemas/DeliverToQBusinessAction"
          description: This action delivers an email to an Amazon Q Business application for ingestion into its knowledge base.
        PublishToSns:
          $ref: "#/components/schemas/SnsAction"
          description: This action publishes the email content to an Amazon SNS topic.
        Bounce:
          $ref: "#/components/schemas/BounceAction"
          description: This action sends a bounce response for the email.
        InvokeLambda:
          $ref: "#/components/schemas/InvokeLambdaAction"
          description: This action invokes an Amazon Web Services Lambda function to process the email.
    DropAction:
      description: This action causes processing to stop and the email to be dropped. If the action applies only to certain recipients, only those recipients are dropped, and processing continues for other recipients.
      type: object
    RelayAction:
      description: The action relays the email via SMTP to another specific SMTP server.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the specified relay has been deleted.
        Relay:
          $ref: "#/components/schemas/IdOrArn"
          description: The identifier of the relay resource to be used when relaying an email.
        MailFrom:
          $ref: "#/components/schemas/MailFrom"
          description: This action specifies whether to preserve or replace original mail from address while relaying received emails to a destination server.
      required:
        - Relay
    ActionFailurePolicy:
      type: string
      enum:
        - CONTINUE
        - DROP
    IdOrArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z0-9:_/+=,@.#-]+"
    MailFrom:
      type: string
      enum:
        - REPLACE
        - PRESERVE
    ArchiveAction:
      description: The action to archive the email by delivering the email to an Amazon SES archive.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the specified archive has been deleted.
        TargetArchive:
          $ref: "#/components/schemas/NameOrArn"
          description: The identifier of the archive to send the email to.
      required:
        - TargetArchive
    NameOrArn:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[a-zA-Z0-9:_/+=,@.#-]+"
    S3Action:
      description: Writes the MIME content of the email to an S3 bucket.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the specified the bucket has been deleted.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM Role to use while writing to S3. This role must have access to the s3:PutObject, kms:Encrypt, and kms:GenerateDataKey APIs for the given bucket.
        S3Bucket:
          $ref: "#/components/schemas/S3Bucket"
          description: The bucket name of the S3 bucket to write to.
        S3Prefix:
          $ref: "#/components/schemas/S3Prefix"
          description: The S3 prefix to use for the write to the s3 bucket.
        S3SseKmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: The KMS Key ID to use to encrypt the message in S3.
      required:
        - RoleArn
        - S3Bucket
    IamRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "[a-zA-Z0-9:_/+=,@.#-]+"
    S3Bucket:
      type: string
      minLength: 1
      maxLength: 62
      pattern: "[a-zA-Z0-9.-]+"
    S3Prefix:
      type: string
      minLength: 1
      maxLength: 62
      pattern: "[a-zA-Z0-9!_.*'()/-]+"
    KmsKeyId:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: "[a-zA-Z0-9-:/]+"
    SendAction:
      description: Sends the email to the internet using the ses:SendRawEmail API.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the caller does not have the permissions to call the sendRawEmail API.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the role to use for this action. This role must have access to the ses:SendRawEmail API.
      required:
        - RoleArn
    AddHeaderAction:
      description: The action to add a header to a message. When executed, this action will add the given header to the message.
      type: object
      properties:
        HeaderName:
          $ref: "#/components/schemas/HeaderName"
          description: The name of the header to add to an email. The header must be prefixed with "X-". Headers are added regardless of whether the header name pre-existed in the email.
        HeaderValue:
          $ref: "#/components/schemas/HeaderValue"
          description: The value of the header to add to the email.
      required:
        - HeaderName
        - HeaderValue
    HeaderName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[xX]\\-[a-zA-Z0-9\\-]+"
    HeaderValue:
      type: string
      minLength: 1
      maxLength: 128
    ReplaceRecipientAction:
      description: This action replaces the email envelope recipients with the given list of recipients. If the condition of this action applies only to a subset of recipients, only those recipients are replaced with the recipients specified in the action. The message contents and headers are unaffected by this action, only the envelope recipients are updated.
      type: object
      properties:
        ReplaceWith:
          $ref: "#/components/schemas/Recipients"
          description: This action specifies the replacement recipient email addresses to insert.
    Recipients:
      type: array
      items:
        $ref: "#/components/schemas/EmailAddress"
    EmailAddress:
      type: string
      minLength: 0
      maxLength: 254
      pattern: "[a-zA-Z0-9._+-]+@[a-zA-Z0-9.-]+"
    DeliverToMailboxAction:
      description: This action to delivers an email to a mailbox.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the mailbox ARN is no longer valid.
        MailboxArn:
          $ref: "#/components/schemas/NameOrArn"
          description: The Amazon Resource Name (ARN) of a WorkMail organization to deliver the email to.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of an IAM role to use to execute this action. The role must have access to the workmail:DeliverToMailbox API.
      required:
        - MailboxArn
        - RoleArn
    DeliverToQBusinessAction:
      description: The action to deliver incoming emails to an Amazon Q Business application for indexing.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the specified application has been deleted or the role lacks necessary permissions to call the qbusiness:BatchPutDocument API.
        ApplicationId:
          $ref: "#/components/schemas/QBusinessApplicationId"
          description: The unique identifier of the Amazon Q Business application instance where the email content will be delivered.
        IndexId:
          $ref: "#/components/schemas/QBusinessIndexId"
          description: The identifier of the knowledge base index within the Amazon Q Business application where the email content will be stored and indexed.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM Role to use while delivering to Amazon Q Business. This role must have access to the qbusiness:BatchPutDocument API for the given application and index.
      required:
        - ApplicationId
        - IndexId
        - RoleArn
    QBusinessApplicationId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-z0-9-]+"
    QBusinessIndexId:
      type: string
      minLength: 36
      maxLength: 36
      pattern: "[a-z0-9-]+"
    SnsAction:
      description: The action to publish the email content to an Amazon SNS topic. When executed, this action will send the email as a notification to the specified SNS topic.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, specified SNS topic has been deleted or the role lacks necessary permissions to call the sns:Publish API.
        TopicArn:
          $ref: "#/components/schemas/SnsTopicArn"
          description: The Amazon Resource Name (ARN) of the Amazon SNS Topic to which notification for the email received will be published.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM Role to use while writing to Amazon SNS. This role must have access to the sns:Publish API for the given topic.
        Encoding:
          $ref: "#/components/schemas/SnsNotificationEncoding"
          description: The encoding to use for the email within the Amazon SNS notification. The default value is UTF-8. Use BASE64 if you need to preserve all special characters, especially when the original message uses a different encoding format.
        PayloadType:
          $ref: "#/components/schemas/SnsNotificationPayloadType"
          description: The expected payload type within the Amazon SNS notification. CONTENT attempts to publish the full email content with 20KB of headers content. HEADERS extracts up to 100KB of header content to include in the notification, email content will not be included to the notification. The default value is CONTENT.
      required:
        - TopicArn
        - RoleArn
    SnsTopicArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:(aws|aws-cn|aws-us-gov|aws-eusc):sns:[a-z0-9-]+:\d{12}:[\w\-]{1,256}
    SnsNotificationEncoding:
      type: string
      enum:
        - UTF-8
        - BASE64
    SnsNotificationPayloadType:
      type: string
      enum:
        - HEADERS
        - CONTENT
    BounceAction:
      description: The action to send a bounce response for the email. When executed, this action generates a non-delivery report (bounce) back to the sender.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the caller does not have the permissions to call the SendBounce API.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role to use to send the bounce message.
        Sender:
          $ref: "#/components/schemas/EmailAddress"
          description: The sender email address of the bounce message.
        StatusCode:
          $ref: "#/components/schemas/StatusCode"
          description: The enhanced status code for the bounce, in the format of x.y.z (e.g. 5.1.1).
        SmtpReplyCode:
          $ref: "#/components/schemas/SmtpReplyCode"
          description: The SMTP reply code for the bounce, as defined by RFC 5321.
        DiagnosticMessage:
          $ref: "#/components/schemas/DiagnosticMessage"
          description: The diagnostic message included in the Diagnostic-Code header of the bounce.
        Message:
          $ref: "#/components/schemas/BounceMessage"
          description: The human-readable text to include in the bounce message.
      required:
        - RoleArn
        - Sender
        - StatusCode
        - SmtpReplyCode
        - DiagnosticMessage
    StatusCode:
      type: string
      minLength: 5
      maxLength: 9
      pattern: "[45]\\.[0-9]{1,3}\\.[0-9]{1,3}"
    SmtpReplyCode:
      type: string
      minLength: 3
      maxLength: 3
      pattern: "[45][0-9][0-9]"
    DiagnosticMessage:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\x20-\\x7e]+"
    BounceMessage:
      type: string
      minLength: 1
      maxLength: 500
      pattern: "[\\r\\n\\x20-\\x7e]+"
    InvokeLambdaAction:
      description: The action to invoke an Amazon Web Services Lambda function for processing the email.
      type: object
      properties:
        ActionFailurePolicy:
          $ref: "#/components/schemas/ActionFailurePolicy"
          description: A policy that states what to do in the case of failure. The action will fail if there are configuration errors. For example, the Amazon Web Services Lambda function no longer exists.
        FunctionArn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The Amazon Resource Name (ARN) of the Lambda function to invoke.
        InvocationType:
          $ref: "#/components/schemas/LambdaInvocationType"
          description: The invocation type of the Lambda function. Use EVENT for asynchronous invocation or REQUEST_RESPONSE for synchronous invocation.
        RoleArn:
          $ref: "#/components/schemas/IamRoleArn"
          description: The Amazon Resource Name (ARN) of the IAM role to use to invoke the Lambda function.
        RetryTimeMinutes:
          $ref: "#/components/schemas/LambdaRetryTimeMinutes"
