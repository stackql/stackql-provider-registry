        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                RelayName:
                  $ref: "#/components/schemas/RelayName"
                  description: The unique name of the relay resource.
                ServerName:
                  $ref: "#/components/schemas/RelayServerName"
                  description: The destination relay server address.
                ServerPort:
                  $ref: "#/components/schemas/RelayServerPort"
                  description: The destination relay server port.
                Authentication:
                  $ref: "#/components/schemas/RelayAuthentication"
                  description: Authentication for the relay destination server—specify the secretARN where the SMTP credentials are stored.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - RelayName
                - ServerName
                - ServerPort
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRelayResponse"
