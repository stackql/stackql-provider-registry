      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddressListImportJobResponse"
  /CreateArchive:
    post:
      operationId: CreateArchive
      description: Creates a new email archive resource for storing and retaining emails.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateArchive
            default: MailManagerSvc.CreateArchive
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token Amazon SES uses to recognize retries of this request.
                ArchiveName:
                  $ref: "#/components/schemas/ArchiveNameString"
                  description: A unique name for the new archive.
                Retention:
                  $ref: "#/components/schemas/ArchiveRetention"
                  description: The period for retaining emails in the archive before automatic deletion.
                KmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
                  description: The Amazon Resource Name (ARN) of the KMS key for encrypting emails in the archive.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - ArchiveName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArchiveResponse"
  /CreateIngressPoint:
    post:
      operationId: CreateIngressPoint
      description: Provision a new ingress endpoint resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateIngressPoint
            default: MailManagerSvc.CreateIngressPoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                IngressPointName:
                  $ref: "#/components/schemas/IngressPointName"
                  description: A user friendly name for an ingress endpoint resource.
                Type:
                  $ref: "#/components/schemas/IngressPointType"
                  description: The type of the ingress endpoint to create.
                RuleSetId:
                  $ref: "#/components/schemas/RuleSetId"
                  description: The identifier of an existing rule set that you attach to an ingress endpoint resource.
                TrafficPolicyId:
                  $ref: "#/components/schemas/TrafficPolicyId"
                  description: The identifier of an existing traffic policy that you attach to an ingress endpoint resource.
                IngressPointConfiguration:
                  $ref: "#/components/schemas/IngressPointConfiguration"
                  description: If you choose an Authenticated ingress endpoint, you must configure either an SMTP password or a secret ARN.
                NetworkConfiguration:
                  $ref: "#/components/schemas/NetworkConfiguration"
                  description: Specifies the network configuration for the ingress point. This allows you to create an IPv4-only, Dual-Stack, or PrivateLink type of ingress point. If not specified, the default network type is IPv4-only.
                TlsPolicy:
                  $ref: "#/components/schemas/TlsPolicy"
                  description: The Transport Layer Security (TLS) policy for the ingress point. The FIPS value is only valid in US and Canada regions.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - IngressPointName
                - RuleSetId
                - TrafficPolicyId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIngressPointResponse"
  /CreateRelay:
    post:
      operationId: CreateRelay
      description: Creates a relay resource which can be used in rules to relay incoming emails to defined relay destinations.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
