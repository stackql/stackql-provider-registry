          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateAddressListImportJob
            default: MailManagerSvc.CreateAddressListImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                AddressListId:
                  $ref: "#/components/schemas/AddressListId"
                  description: The unique identifier of the address list for importing addresses to.
                Name:
                  $ref: "#/components/schemas/JobName"
                  description: A user-friendly name for the import job.
                ImportDataFormat:
                  $ref: "#/components/schemas/ImportDataFormat"
                  description: The format of the input for an import job.
              required:
                - AddressListId
