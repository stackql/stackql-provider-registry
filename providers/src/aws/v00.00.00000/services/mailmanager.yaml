    PolicyStatementList:
      type: array
      items:
        $ref: "#/components/schemas/PolicyStatement"
    PolicyStatement:
      description: The structure containing traffic policy conditions and actions.
      type: object
      properties:
        Conditions:
          $ref: "#/components/schemas/PolicyConditions"
          description: The list of conditions to apply to incoming messages for filtering email traffic.
        Action:
          $ref: "#/components/schemas/AcceptAction"
          description: The action that informs a traffic policy resource to either allow or block the email if it matches a condition in the policy statement.
