        - Conditions
        - Action
    PolicyConditions:
      type: array
      items:
        $ref: "#/components/schemas/PolicyCondition"
    PolicyCondition:
      description: The email traffic filtering conditions which are contained in a traffic policy resource.
      type: object
      properties:
        StringExpression:
          $ref: "#/components/schemas/IngressStringExpression"
          description: This represents a string based condition matching on the incoming mail. It performs the string operation configured in 'Operator' and evaluates the 'Protocol' object against the 'Value'.
        IpExpression:
          $ref: "#/components/schemas/IngressIpv4Expression"
          description: This represents an IP based condition matching on the incoming mail. It performs the operation configured in 'Operator' and evaluates the 'Protocol' object against the 'Value'.
        Ipv6Expression:
          $ref: "#/components/schemas/IngressIpv6Expression"
          description: This represents an IPv6 based condition matching on the incoming mail. It performs the operation configured in 'Operator' and evaluates the 'Protocol' object against the 'Value'.
        TlsExpression:
          $ref: "#/components/schemas/IngressTlsProtocolExpression"
          description: This represents a TLS based condition matching on the incoming mail. It performs the operation configured in 'Operator' and evaluates the 'Protocol' object against the 'Value'.
        BooleanExpression:
          $ref: "#/components/schemas/IngressBooleanExpression"
          description: This represents a boolean type condition matching on the incoming mail. It performs the boolean operation configured in 'Operator' and evaluates the 'Protocol' object against the 'Value'.
    IngressStringExpression:
      description: The structure for a string based condition matching on the incoming mail.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/IngressStringToEvaluate"
          description: The left hand side argument of a string condition expression.
        Operator:
          $ref: "#/components/schemas/IngressStringOperator"
          description: The matching operator for a string condition expression.
        Values:
          $ref: "#/components/schemas/StringList"
          description: The right hand side argument of a string condition expression.
      required:
        - Evaluate
        - Operator
        - Values
    IngressStringToEvaluate:
      description: The union type representing the allowed types for the left hand side of a string condition.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/IngressStringEmailAttribute"
          description: The enum type representing the allowed attribute types for a string condition.
        Analysis:
          $ref: "#/components/schemas/IngressAnalysis"
          description: The structure type for a string condition stating the Add On ARN and its returned value.
    IngressStringEmailAttribute:
      type: string
      enum:
        - RECIPIENT
    IngressAnalysis:
      description: The Add On ARN and its returned value that is evaluated in a policy statement's conditional expression to either deny or block the incoming email.
      type: object
      properties:
        Analyzer:
          $ref: "#/components/schemas/AnalyzerArn"
          description: The Amazon Resource Name (ARN) of an Add On.
        ResultField:
          $ref: "#/components/schemas/ResultField"
          description: The returned value from an Add On.
      required:
        - Analyzer
        - ResultField
    IngressStringOperator:
      type: string
      enum:
        - EQUALS
        - NOT_EQUALS
        - STARTS_WITH
        - ENDS_WITH
        - CONTAINS
    StringList:
      type: array
      items:
        $ref: "#/components/schemas/String"
    String:
      type: string
    IngressIpv4Expression:
      description: The union type representing the allowed types for the left hand side of an IP condition.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/IngressIpToEvaluate"
          description: The left hand side argument of an IP condition expression.
        Operator:
          $ref: "#/components/schemas/IngressIpOperator"
          description: The matching operator for an IP condition expression.
        Values:
          $ref: "#/components/schemas/Ipv4Cidrs"
          description: The right hand side argument of an IP condition expression.
      required:
        - Evaluate
        - Operator
        - Values
    IngressIpToEvaluate:
      description: The structure for an IP based condition matching on the incoming mail.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/IngressIpv4Attribute"
          description: An enum type representing the allowed attribute types for an IP condition.
    IngressIpv4Attribute:
      type: string
      enum:
        - SENDER_IP
    IngressIpOperator:
      type: string
      enum:
        - CIDR_MATCHES
        - NOT_CIDR_MATCHES
    Ipv4Cidrs:
      type: array
      items:
        $ref: "#/components/schemas/Ipv4Cidr"
    Ipv4Cidr:
      type: string
      pattern: ((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)/([0-9]|[12][0-9]|3[0-2])
    IngressIpv6Expression:
      description: The union type representing the allowed types for the left hand side of an IPv6 condition.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/IngressIpv6ToEvaluate"
          description: The left hand side argument of an IPv6 condition expression.
        Operator:
          $ref: "#/components/schemas/IngressIpOperator"
          description: The matching operator for an IPv6 condition expression.
        Values:
          $ref: "#/components/schemas/Ipv6Cidrs"
          description: The right hand side argument of an IPv6 condition expression.
      required:
        - Evaluate
        - Operator
        - Values
    IngressIpv6ToEvaluate:
      description: The structure for an IPv6 based condition matching on the incoming mail.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/IngressIpv6Attribute"
          description: An enum type representing the allowed attribute types for an IPv6 condition.
    IngressIpv6Attribute:
      type: string
      enum:
        - SENDER_IPV6
    Ipv6Cidrs:
      type: array
      items:
        $ref: "#/components/schemas/Ipv6Cidr"
    Ipv6Cidr:
      type: string
      minLength: 0
      maxLength: 49
      pattern: (([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))\/(12[0-8]|1[0-1][0-9]|[1-9][0-9]|[0-9])
    IngressTlsProtocolExpression:
      description: The structure for a TLS related condition matching on the incoming mail.
      type: object
      properties:
        Evaluate:
          $ref: "#/components/schemas/IngressTlsProtocolToEvaluate"
          description: The left hand side argument of a TLS condition expression.
        Operator:
          $ref: "#/components/schemas/IngressTlsProtocolOperator"
          description: The matching operator for a TLS condition expression.
        Value:
          $ref: "#/components/schemas/IngressTlsProtocolAttribute"
          description: The right hand side argument of a TLS condition expression.
      required:
        - Evaluate
        - Operator
        - Value
    IngressTlsProtocolToEvaluate:
      description: The union type representing the allowed types for the left hand side of a TLS condition.
      type: object
      properties:
        Attribute:
          $ref: "#/components/schemas/IngressTlsAttribute"
          description: The enum type representing the allowed attribute types for the TLS condition.
    IngressTlsAttribute:
      type: string
      enum:
        - TLS_PROTOCOL
    IngressTlsProtocolOperator:
      type: string
      enum:
        - MINIMUM_TLS_VERSION
        - IS
    IngressTlsProtocolAttribute:
      type: string
      enum:
        - TLS1_2
        - TLS1_3
    IngressBooleanExpression:
      description: The structure for a boolean condition matching on the incoming mail.
