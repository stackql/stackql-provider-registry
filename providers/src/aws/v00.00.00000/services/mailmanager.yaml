  /UpdateIngressPoint:
    post:
      operationId: UpdateIngressPoint
      description: Update attributes of a provisioned ingress endpoint resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.UpdateIngressPoint
            default: MailManagerSvc.UpdateIngressPoint
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                IngressPointId:
                  $ref: "#/components/schemas/IngressPointId"
                  description: The identifier for the ingress endpoint you want to update.
                IngressPointName:
                  $ref: "#/components/schemas/IngressPointName"
                  description: A user friendly name for the ingress endpoint resource.
                StatusToUpdate:
                  $ref: "#/components/schemas/IngressPointStatusToUpdate"
                  description: The update status of an ingress endpoint.
                RuleSetId:
                  $ref: "#/components/schemas/RuleSetId"
                  description: The identifier of an existing rule set that you attach to an ingress endpoint resource.
                TrafficPolicyId:
                  $ref: "#/components/schemas/TrafficPolicyId"
                  description: The identifier of an existing traffic policy that you attach to an ingress endpoint resource.
                IngressPointConfiguration:
                  $ref: "#/components/schemas/IngressPointConfiguration"
                  description: If you choose an Authenticated ingress endpoint, you must configure either an SMTP password or a secret ARN.
                TlsPolicy:
                  $ref: "#/components/schemas/TlsPolicy"
                  description: The Transport Layer Security (TLS) policy for the ingress point. Valid values are REQUIRED, OPTIONAL. Only ingress endpoints using REQUIRED or OPTIONAL as TlsPolicy can be updated.
              required:
                - IngressPointId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIngressPointResponse"
  /UpdateRelay:
    post:
      operationId: UpdateRelay
      description: Updates the attributes of an existing relay resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.UpdateRelay
