openapi: 3.0.0
info:
  version: "2023-10-17"
  title: MailManager
  description: MailManager
  x-serviceName: ses
  x-serviceAlias: mailmanager
  x-protocol: json
  x-apiVersion: "2023-10-17"
  x-endpointPrefix: mail-manager
  x-targetPrefix: MailManagerSvc
  x-jsonVersion: "1.0"
servers:
  - url: https://mail-manager.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mailmanager
paths:
  /CreateAddonInstance:
    post:
      operationId: CreateAddonInstance
      description: Creates an Add On instance for the subscription indicated in the request. The resulting Amazon Resource Name (ARN) can be used in a conditional statement for a rule set or traffic policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateAddonInstance
            default: MailManagerSvc.CreateAddonInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                AddonSubscriptionId:
                  $ref: "#/components/schemas/AddonSubscriptionId"
                  description: The unique ID of a previously created subscription that an Add On instance is created for. You can only have one instance per subscription.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - AddonSubscriptionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddonInstanceResponse"
  /CreateAddonSubscription:
    post:
      operationId: CreateAddonSubscription
      description: Creates a subscription for an Add On representing the acceptance of its terms of use and additional pricing. The subscription can then be used to create an instance for use in rule sets or traffic policies.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateAddonSubscription
            default: MailManagerSvc.CreateAddonSubscription
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                AddonName:
                  $ref: "#/components/schemas/AddonName"
                  description: The name of the Add On to subscribe to. You can only have one subscription for each Add On name.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - AddonName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddonSubscriptionResponse"
  /CreateAddressList:
    post:
      operationId: CreateAddressList
      description: Creates a new address list.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MailManagerSvc.CreateAddressList
            default: MailManagerSvc.CreateAddressList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: A unique token that Amazon SES uses to recognize subsequent retries of the same request.
                AddressListName:
                  $ref: "#/components/schemas/AddressListName"
                  description: A user-friendly name for the address list.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - AddressListName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAddressListResponse"
  /CreateAddressListImportJob:
