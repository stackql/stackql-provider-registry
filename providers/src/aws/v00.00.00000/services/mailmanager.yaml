        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource that you want to tag.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: 'The tags used to organize, track, or control access for the resource. For example, { "tags": {"key1":"value1", "key2":"value2"} }.'
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
