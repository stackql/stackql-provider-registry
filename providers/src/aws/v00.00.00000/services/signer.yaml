openapi: 3.0.0
info:
  version: "2017-08-25"
  title: AWS Signer
  description: AWS Signer
  x-serviceName: signer
  x-serviceAlias: signer
  x-protocol: rest-json
  x-apiVersion: "2017-08-25"
  x-endpointPrefix: signer
  x-jsonVersion: "1.1"
servers:
  - url: https://signer.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for signer
paths:
  /signing-profiles/{profile_name}/permissions:
    post:
      operationId: AddProfilePermission
      description: Adds cross-account permissions to a signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: The human-readable name of the signing profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profileVersion:
                  $ref: "#/components/schemas/ProfileVersion"
                action:
                  $ref: "#/components/schemas/String"
                principal:
                  $ref: "#/components/schemas/String"
                revisionId:
                  $ref: "#/components/schemas/String"
                statementId:
                  $ref: "#/components/schemas/String"
              required:
                - action
                - principal
                - statementId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddProfilePermissionResponse"
    get:
      operationId: ListProfilePermissions
      description: Lists the cross-account permissions associated with a signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: Name of the signing profile containing the cross-account permissions.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: String for specifying the next set of paginated results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilePermissionsResponse"
  /signing-profiles/{profile_name}:
    delete:
      operationId: CancelSigningProfile
      description: Changes the state of an ACTIVE signing profile to CANCELED. A canceled profile is still viewable with the ListSigningProfiles operation, but it cannot perform new signing jobs. See Data Retention for more information on scheduled deletion of a canceled signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: The name of the signing profile to be canceled.
      responses:
        "200":
          description: Success
    get:
      operationId: GetSigningProfile
      description: Returns information on a specific signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: The name of the target signing profile.
        - name: profileOwner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: The AWS account ID of the profile owner.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSigningProfileResponse"
    put:
      operationId: PutSigningProfile
      description: Creates a signing profile. A signing profile is a code-signing template that can be used to carry out a pre-defined signing job.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: The name of the signing profile to be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signingMaterial:
                  $ref: "#/components/schemas/SigningMaterial"
                signatureValidityPeriod:
                  $ref: "#/components/schemas/SignatureValidityPeriod"
                platformId:
                  $ref: "#/components/schemas/PlatformId"
                overrides:
                  $ref: "#/components/schemas/SigningPlatformOverrides"
                signingParameters:
                  $ref: "#/components/schemas/SigningParameters"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - platformId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutSigningProfileResponse"
  /signing-jobs/{job_id}:
    get:
      operationId: DescribeSigningJob
      description: Returns information about a specific code signing job. You specify the job by using the jobId value that is returned by the StartSigningJob operation.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: The ID of the signing job on input.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSigningJobResponse"
  /revocations:
    get:
      operationId: GetRevocationStatus
      description: Retrieves the revocation status of one or more of the signing profile, signing job, and signing certificate.
      parameters:
        - name: signatureTimestamp
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: The timestamp of the signature that validates the profile or job.
        - name: platformId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PlatformId"
          description: The ID of a signing platform.
        - name: profileVersionArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The version of a signing profile.
        - name: jobArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The ARN of a signing job.
        - name: certificateHashes
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/CertificateHashes"
          description: "A list of composite signed hashes that identify certificates. A certificate identifier consists of a subject certificate TBS hash (signed by the parent CA) combined with a parent CA TBS hash (signed by the parent CA’s CA). Root certificates are defined as their own CA. The following example shows how to calculate a hash for this parameter using OpenSSL commands: openssl asn1parse -in childCert.pem -strparse 4 -out childCert.tbs openssl sha384 < childCert.tbs -binary > childCertTbsHash openssl asn1parse -in parentCert.pem -strparse 4 -out parentCert.tbs openssl sha384 < parentCert.tbs -binary > parentCertTbsHash xxd -p childCertTbsHash > certificateHash.hex xxd -p parentCertTbsHash >> certificateHash.hex cat certificateHash.hex | tr -d '\\n'"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRevocationStatusOutputDisplay"
  /signing-platforms/{platform_id}:
    get:
      operationId: GetSigningPlatform
      description: Returns information on a specific signing platform.
      parameters:
        - name: platform_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/PlatformId"
          description: The ID of the target signing platform.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetSigningPlatformResponse"
  /signing-jobs:
    get:
      operationId: ListSigningJobs
      description: Lists all your signing jobs. You can use the maxResults parameter to limit the number of signing jobs that are returned in the response. If additional jobs remain to be listed, AWS Signer returns a nextToken value. Use this value in subsequent calls to ListSigningJobs to fetch the remaining values. You can continue calling ListSigningJobs with your maxResults parameter and with new values that Signer returns in the nextToken parameter until all of your signing jobs have been returned.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SigningStatus"
          description: A status value with which to filter your results.
        - name: platformId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PlatformId"
          description: The ID of microcontroller platform that you specified for the distribution of your code image.
        - name: requestedBy
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RequestedBy"
          description: The IAM principal that requested the signing job.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: Specifies the maximum number of items to return in the response. Use this parameter when paginating results. If additional items exist beyond the number you specify, the nextToken element is set in the response. Use the nextToken value in a subsequent request to retrieve additional items.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: String for specifying the next set of paginated results to return. After you receive a response with truncated results, use this parameter in a subsequent request. Set it to the value of nextToken from the response that you just received.
        - name: isRevoked
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/bool"
          description: Filters results to return only signing jobs with revoked signatures.
        - name: signatureExpiresBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Filters results to return only signing jobs with signatures expiring before a specified timestamp.
        - name: signatureExpiresAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Filters results to return only signing jobs with signatures expiring after a specified timestamp.
        - name: jobInvoker
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: Filters results to return only signing jobs initiated by a specified IAM entity.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSigningJobsResponse"
    post:
      operationId: StartSigningJob
      description: "Initiates a signing job to be performed on the code provided. Signing jobs are viewable by the ListSigningJobs operation. Note the following requirements: You must create an Amazon S3 source bucket. For more information, see Creating a Bucket in the Amazon S3 Getting Started Guide. Your S3 source bucket must be version enabled. You must create an S3 destination bucket. AWS Signer uses your S3 destination bucket to write your signed code. You specify the name of the source and destination buckets when calling the StartSigningJob operation. You must ensure the S3 buckets are from the same Region as the signing profile. Cross-Region signing isn't supported. You must also specify a request token that identifies your request to Signer. You can call the DescribeSigningJob and the ListSigningJobs actions after you call StartSigningJob. For a Java example that shows how to use this action, see StartSigningJob."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  $ref: "#/components/schemas/Source"
                destination:
                  $ref: "#/components/schemas/Destination"
                profileName:
                  $ref: "#/components/schemas/ProfileName"
                clientRequestToken:
                  $ref: "#/components/schemas/ClientRequestToken"
                profileOwner:
                  $ref: "#/components/schemas/AccountId"
              required:
                - source
                - destination
                - profileName
                - clientRequestToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSigningJobResponse"
  /signing-platforms:
    get:
      operationId: ListSigningPlatforms
      description: Lists all signing platforms available in AWS Signer that match the request parameters. If additional jobs remain to be listed, Signer returns a nextToken value. Use this value in subsequent calls to ListSigningJobs to fetch the remaining values. You can continue calling ListSigningJobs with your maxResults parameter and with new values that Signer returns in the nextToken parameter until all of your signing jobs have been returned.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The category type of a signing platform.
        - name: partner
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Any partner entities connected to a signing platform.
        - name: target
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The validation template that is used by the target signing platform.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to be returned by this operation.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: Value for specifying the next set of paginated results to return. After you receive a response with truncated results, use this parameter in a subsequent request. Set it to the value of nextToken from the response that you just received.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSigningPlatformsResponse"
  /signing-profiles:
    get:
      operationId: ListSigningProfiles
      description: Lists all available signing profiles in your AWS account. Returns only profiles with an ACTIVE status unless the includeCanceled request field is set to true. If additional jobs remain to be listed, AWS Signer returns a nextToken value. Use this value in subsequent calls to ListSigningJobs to fetch the remaining values. You can continue calling ListSigningJobs with your maxResults parameter and with new values that Signer returns in the nextToken parameter until all of your signing jobs have been returned.
      parameters:
        - name: includeCanceled
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/bool"
          description: Designates whether to include profiles with the status of CANCELED.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of profiles to be returned.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: Value for specifying the next set of paginated results to return. After you receive a response with truncated results, use this parameter in a subsequent request. Set it to the value of nextToken from the response that you just received.
        - name: platformId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PlatformId"
          description: Filters results to return only signing jobs initiated for a specified signing platform.
        - name: statuses
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Statuses"
          description: Filters results to return only signing jobs with statuses in the specified list.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSigningProfilesResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of the tags associated with a signing profile resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the signing profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds one or more tags to a signing profile. Tags are labels that you can use to identify and organize your AWS resources. Each tag consists of a key and an optional value. To specify the signing profile, use its Amazon Resource Name (ARN). To specify the tag, use a key-value pair.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the signing profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes one or more tags from a signing profile. To remove the tags, specify a list of tag keys.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) for the signing profile.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: A list of tag keys to be removed from the signing profile.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /signing-profiles/{profile_name}/permissions/{statement_id}:
    delete:
      operationId: RemoveProfilePermission
      description: Removes cross-account permissions from a signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: A human-readable name for the signing profile with permissions to be removed.
        - name: revisionId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: An identifier for the current revision of the signing profile permissions.
        - name: statement_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: A unique identifier for the cross-account permissions statement.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveProfilePermissionResponse"
  /signing-jobs/{job_id}/revoke:
    put:
      operationId: RevokeSignature
      description: Changes the state of a signing job to REVOKED. This indicates that the signature is no longer valid.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
          description: ID of the signing job to be revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobOwner:
                  $ref: "#/components/schemas/AccountId"
                reason:
                  $ref: "#/components/schemas/RevocationReasonString"
              required:
                - reason
      responses:
        "200":
          description: Success
  /signing-profiles/{profile_name}/revoke:
    put:
      operationId: RevokeSigningProfile
      description: Changes the state of a signing profile to REVOKED. This indicates that signatures generated using the signing profile after an effective start date are no longer valid. A revoked profile is still viewable with the ListSigningProfiles operation, but it cannot perform new signing jobs. See Data Retention for more information on scheduled deletion of a revoked signing profile.
      parameters:
        - name: profile_name
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProfileName"
          description: The name of the signing profile to be revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profileVersion:
                  $ref: "#/components/schemas/ProfileVersion"
                reason:
                  $ref: "#/components/schemas/RevocationReasonString"
                effectiveTime:
                  $ref: "#/components/schemas/Timestamp"
              required:
                - profileVersion
                - reason
                - effectiveTime
      responses:
        "200":
          description: Success
  /signing-jobs/with-payload:
    post:
      operationId: SignPayload
      description: Signs a binary payload and returns a signature envelope.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profileName:
                  $ref: "#/components/schemas/ProfileName"
                profileOwner:
                  $ref: "#/components/schemas/AccountId"
                payload:
                  $ref: "#/components/schemas/Payload"
                payloadFormat:
                  $ref: "#/components/schemas/String"
              required:
                - profileName
                - payload
                - payloadFormat
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignPayloadResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ProfileName:
      type: string
      minLength: 2
      maxLength: 64
      pattern: ^[a-zA-Z0-9_]{2,}
    ProfileVersion:
      type: string
      minLength: 10
      maxLength: 10
      pattern: ^[a-zA-Z0-9]{10}$
    String:
      type: string
    AddProfilePermissionResponse:
      type: object
      properties:
        revisionId:
          $ref: "#/components/schemas/String"
          description: A unique identifier for the current profile revision.
    JobId:
      type: string
    DescribeSigningJobResponse:
      type: object
      properties:
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The ID of the signing job on output.
        source:
          $ref: "#/components/schemas/Source"
          description: The object that contains the name of your S3 bucket or your raw code.
        signingMaterial:
          $ref: "#/components/schemas/SigningMaterial"
          description: The Amazon Resource Name (ARN) of your code signing certificate.
        platformId:
          $ref: "#/components/schemas/PlatformId"
          description: The microcontroller platform to which your signed code image will be distributed.
        platformDisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: A human-readable name for the signing platform associated with the signing job.
        profileName:
          $ref: "#/components/schemas/ProfileName"
          description: The name of the profile that initiated the signing operation.
        profileVersion:
          $ref: "#/components/schemas/ProfileVersion"
          description: The version of the signing profile used to initiate the signing job.
        overrides:
          $ref: "#/components/schemas/SigningPlatformOverrides"
          description: A list of any overrides that were applied to the signing operation.
        signingParameters:
          type: object
          properties: {}
          description: Map of user-assigned key-value pairs used during signing. These values contain any information that you specified for use in your signing job.
        createdAt:
          $ref: "#/components/schemas/Timestamp"
          description: Date and time that the signing job was created.
        completedAt:
          $ref: "#/components/schemas/Timestamp"
          description: Date and time that the signing job was completed.
        signatureExpiresAt:
          $ref: "#/components/schemas/Timestamp"
          description: Thr expiration timestamp for the signature generated by the signing job.
        requestedBy:
          $ref: "#/components/schemas/RequestedBy"
          description: The IAM principal that requested the signing job.
        status:
          $ref: "#/components/schemas/SigningStatus"
          description: Status of the signing job.
        statusReason:
          $ref: "#/components/schemas/StatusReason"
          description: String value that contains the status reason.
        revocationRecord:
          $ref: "#/components/schemas/SigningJobRevocationRecord"
          description: A revocation record if the signature generated by the signing job has been revoked. Contains a timestamp and the ID of the IAM entity that revoked the signature.
        signedObject:
          $ref: "#/components/schemas/SignedObject"
          description: Name of the S3 bucket where the signed code image is saved by AWS Signer.
        jobOwner:
          $ref: "#/components/schemas/AccountId"
          description: The AWS account ID of the job owner.
        jobInvoker:
          $ref: "#/components/schemas/AccountId"
          description: The IAM entity that initiated the signing job.
    Source:
      description: An S3Source object that contains information about the S3 bucket where you saved your unsigned code.
      type: object
      properties:
        s3:
          $ref: "#/components/schemas/S3Source"
          description: The S3Source object.
    S3Source:
      description: Information about the Amazon S3 bucket where you saved your unsigned code.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/BucketName"
          description: Name of the S3 bucket.
        key:
          $ref: "#/components/schemas/Key"
          description: Key name of the bucket object that contains your unsigned code.
        version:
          $ref: "#/components/schemas/Version"
          description: Version of your source image in your version enabled S3 bucket.
      required:
        - bucketName
        - key
        - version
    BucketName:
      type: string
    Key:
      type: string
    Version:
      type: string
    SigningMaterial:
      description: The ACM certificate that is used to sign your code.
      type: object
      properties:
        certificateArn:
          $ref: "#/components/schemas/CertificateArn"
          description: The Amazon Resource Name (ARN) of the certificates that is used to sign your code.
      required:
        - certificateArn
    CertificateArn:
      type: string
    PlatformId:
      type: string
    DisplayName:
      type: string
    SigningPlatformOverrides:
      description: Any overrides that are applied to the signing configuration of a signing platform.
      type: object
      properties:
        signingConfiguration:
          $ref: "#/components/schemas/SigningConfigurationOverrides"
          description: A signing configuration that overrides the default encryption or hash algorithm of a signing job.
        signingImageFormat:
          $ref: "#/components/schemas/ImageFormat"
          description: A signed image is a JSON object. When overriding the default signing platform configuration, a customer can select either of two signing formats, JSONEmbedded or JSONDetached. (A third format value, JSON, is reserved for future use.) With JSONEmbedded, the signing image has the payload embedded in it. With JSONDetached, the payload is not be embedded in the signing image.
    SigningConfigurationOverrides:
      description: A signing configuration that overrides the default encryption or hash algorithm of a signing job.
