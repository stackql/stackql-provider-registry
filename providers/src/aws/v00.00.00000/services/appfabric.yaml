openapi: 3.0.0
info:
  version: "2023-05-19"
  title: AppFabric
  description: AppFabric
  x-serviceName: appfabric
  x-serviceAlias: appfabric
  x-protocol: rest-json
  x-apiVersion: "2023-05-19"
  x-endpointPrefix: appfabric
  x-jsonVersion: "1.1"
servers:
  - url: https://appfabric.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for appfabric
paths:
  /useraccess/batchget:
    post:
      operationId: BatchGetUserAccessTasks
      description: Gets user access details in a batch request. This action polls data from the tasks that are kicked off by the StartUserAccessTasks action.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appBundleIdentifier:
                  $ref: "#/components/schemas/Identifier"
                taskIdList:
                  $ref: "#/components/schemas/TaskIdList"
              required:
                - appBundleIdentifier
                - taskIdList
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetUserAccessTasksResponse"
  /appbundles/{app_bundle_identifier}/appauthorizations/{app_authorization_identifier}/connect:
    post:
      operationId: ConnectAppAuthorization
      description: Establishes a connection between Amazon Web Services AppFabric and an application, which allows AppFabric to call the APIs of the application.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle that contains the app authorization to use for the request.
        - name: app_authorization_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app authorization to use for the request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                authRequest:
                  $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectAppAuthorizationResponse"
  /appbundles/{app_bundle_identifier}/appauthorizations:
    post:
      operationId: CreateAppAuthorization
      description: Creates an app authorization within an app bundle, which allows AppFabric to connect to an application.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                app:
                  $ref: "#/components/schemas/String255"
                credential:
                  $ref: "#/components/schemas/Credential"
                tenant:
                  $ref: "#/components/schemas/Tenant"
                authType:
                  $ref: "#/components/schemas/AuthType"
                clientToken:
                  $ref: "#/components/schemas/UUID"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - app
                - credential
                - tenant
                - authType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppAuthorizationResponse"
    get:
      operationId: ListAppAuthorizations
      description: Returns a list of all app authorizations configured for an app bundle.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String2048"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppAuthorizationsResponse"
  /appbundles:
    post:
      operationId: CreateAppBundle
      description: Creates an app bundle to collect data from an application using AppFabric.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/UUID"
                customerManagedKeyIdentifier:
                  $ref: "#/components/schemas/Identifier"
                tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAppBundleResponse"
    get:
      operationId: ListAppBundles
      description: Returns a list of app bundles.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String2048"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAppBundlesResponse"
  /appbundles/{app_bundle_identifier}/ingestions:
    post:
      operationId: CreateIngestion
      description: Creates a data ingestion for an application.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                app:
                  $ref: "#/components/schemas/String255"
                tenantId:
                  $ref: "#/components/schemas/TenantIdentifier"
                ingestionType:
                  $ref: "#/components/schemas/IngestionType"
                clientToken:
                  $ref: "#/components/schemas/UUID"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - app
                - tenantId
                - ingestionType
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIngestionResponse"
    get:
      operationId: ListIngestions
      description: Returns a list of all ingestions configured for an app bundle.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIngestionsResponse"
  /appbundles/{app_bundle_identifier}/ingestions/{ingestion_identifier}/ingestiondestinations:
    post:
      operationId: CreateIngestionDestination
      description: Creates an ingestion destination, which specifies how an application's ingested data is processed by Amazon Web Services AppFabric and where it's delivered.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                processingConfiguration:
                  $ref: "#/components/schemas/ProcessingConfiguration"
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
                clientToken:
                  $ref: "#/components/schemas/UUID"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - processingConfiguration
                - destinationConfiguration
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateIngestionDestinationResponse"
    get:
      operationId: ListIngestionDestinations
      description: Returns a list of all ingestion destinations configured for an ingestion.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results that are returned per call. You can use nextToken to obtain further pages of results. This is only an upper limit. The actual number of results returned per call might be fewer than the specified maximum.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: If nextToken is returned, there are more results available. The value of nextToken is a unique pagination token for each page. Make the call again using the returned token to retrieve the next page. Keep all other arguments unchanged. Each pagination token expires after 24 hours. Using an expired pagination token will return an HTTP 400 InvalidToken error.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIngestionDestinationsResponse"
  /appbundles/{app_bundle_identifier}/appauthorizations/{app_authorization_identifier}:
    delete:
      operationId: DeleteAppAuthorization
      description: Deletes an app authorization. You must delete the associated ingestion before you can delete an app authorization.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: app_authorization_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app authorization to use for the request.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppAuthorizationResponse"
    get:
      operationId: GetAppAuthorization
      description: Returns information about an app authorization.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: app_authorization_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app authorization to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppAuthorizationResponse"
    patch:
      operationId: UpdateAppAuthorization
      description: Updates an app authorization within an app bundle, which allows AppFabric to connect to an application. If the app authorization was in a connected state, updating the app authorization will set it back to a PendingConnect state.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: app_authorization_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app authorization to use for the request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                credential:
                  $ref: "#/components/schemas/Credential"
                tenant:
                  $ref: "#/components/schemas/Tenant"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAppAuthorizationResponse"
  /appbundles/{app_bundle_identifier}:
    delete:
      operationId: DeleteAppBundle
      description: Deletes an app bundle. You must delete all associated app authorizations before you can delete an app bundle.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The ID or Amazon Resource Name (ARN) of the app bundle that needs to be deleted.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAppBundleResponse"
    get:
      operationId: GetAppBundle
      description: Returns information about an app bundle.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppBundleResponse"
  /appbundles/{app_bundle_identifier}/ingestions/{ingestion_identifier}:
    delete:
      operationId: DeleteIngestion
      description: Deletes an ingestion. You must stop (disable) the ingestion and you must delete all associated ingestion destinations before you can delete an app ingestion.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIngestionResponse"
    get:
      operationId: GetIngestion
      description: Returns information about an ingestion.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIngestionResponse"
  /appbundles/{app_bundle_identifier}/ingestions/{ingestion_identifier}/ingestiondestinations/{ingestion_destination_identifier}:
    delete:
      operationId: DeleteIngestionDestination
      description: Deletes an ingestion destination. This deletes the association between an ingestion and it's destination. It doesn't delete previously ingested data or the storage destination, such as the Amazon S3 bucket where the data is delivered. If the ingestion destination is deleted while the associated ingestion is enabled, the ingestion will fail and is eventually disabled.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: ingestion_destination_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion destination to use for the request.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIngestionDestinationResponse"
    get:
      operationId: GetIngestionDestination
      description: Returns information about an ingestion destination.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: ingestion_destination_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion destination to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIngestionDestinationResponse"
    patch:
      operationId: UpdateIngestionDestination
      description: Updates an ingestion destination, which specifies how an application's ingested data is processed by Amazon Web Services AppFabric and where it's delivered.
      parameters:
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: ingestion_destination_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion destination to use for the request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                destinationConfiguration:
                  $ref: "#/components/schemas/DestinationConfiguration"
              required:
                - destinationConfiguration
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIngestionDestinationResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Returns a list of tags for a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource for which you want to retrieve tags.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns one or more tags (key-value pairs) to the specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource that you want to tag.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag or tags from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the resource that you want to untag.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The keys of the key-value pairs for the tag or tags you want to remove from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /appbundles/{app_bundle_identifier}/ingestions/{ingestion_identifier}/start:
    post:
      operationId: StartIngestion
      description: Starts (enables) an ingestion, which collects data from an application.
      parameters:
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartIngestionResponse"
  /useraccess/start:
    post:
      operationId: StartUserAccessTasks
      description: Starts the tasks to search user access status for a specific email address. The tasks are stopped when the user access status data is found. The tasks are terminated when the API calls to the application time out.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                appBundleIdentifier:
                  $ref: "#/components/schemas/Identifier"
                email:
                  $ref: "#/components/schemas/Email"
              required:
                - appBundleIdentifier
                - email
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartUserAccessTasksResponse"
  /appbundles/{app_bundle_identifier}/ingestions/{ingestion_identifier}/stop:
    post:
      operationId: StopIngestion
      description: Stops (disables) an ingestion.
      parameters:
        - name: ingestion_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the ingestion to use for the request.
        - name: app_bundle_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Identifier"
          description: The Amazon Resource Name (ARN) or Universal Unique Identifier (UUID) of the app bundle to use for the request.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopIngestionResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Identifier:
      type: string
      minLength: 1
      maxLength: 1011
      pattern: arn:.+$|^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}
    TaskIdList:
      type: array
      items:
        $ref: "#/components/schemas/UUID"
    UUID:
      type: string
