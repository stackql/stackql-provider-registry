        PipelineLockingSettings:
          $ref: "#/components/schemas/PipelineLockingSettings"
        DisabledLockingSettings:
          $ref: "#/components/schemas/DisabledLockingSettings"
    EpochLockingSettings:
      description: Epoch Locking Settings
      type: object
      properties:
        CustomEpoch:
          $ref: "#/components/schemas/__string"
          description: Optional. Enter a value here to use a custom epoch, instead of the standard epoch (which started at 1970-01-01T00:00:00 UTC). Specify the start time of the custom epoch, in YYYY-MM-DDTHH:MM:SS in UTC. The time must be 2000-01-01T00:00:00 or later. Always set the MM:SS portion to 00:00.
        JamSyncTime:
          $ref: "#/components/schemas/__string"
          description: Optional. Enter a time for the jam sync. The default is midnight UTC. When epoch locking is enabled, MediaLive performs a daily jam sync on every output encode to ensure timecodes don’t diverge from the wall clock. The jam sync applies only to encodes with frame rate of 29.97 or 59.94 FPS. To override, enter a time in HH:MM:SS in UTC. Always set the MM:SS portion to 00:00.
    PipelineLockingSettings:
      description: Pipeline Locking Settings
      type: object
      properties:
        PipelineLockingMethod:
          $ref: "#/components/schemas/PipelineLockingMethod"
          description: "The method to use to lock the video frames in the pipelines. sourceTimecode (default): Use the timecode in the source. videoAlignment: Lock frames that the encoder identifies as having matching content. If videoAlignment is selected, existing timecodes will not be used for any locking decisions."
        CustomEpoch:
          $ref: "#/components/schemas/__string"
          description: Optional. Only applies to CMAF Ingest Output Group and MediaPackage V2 Output Group Only. Enter a value here to use a custom epoch, instead of the standard epoch (which started at 1970-01-01T00:00:00 UTC). Specify the start time of the custom epoch, in YYYY-MM-DDTHH:MM:SS in UTC. The time must be 2000-01-01T00:00:00 or later. Always set the MM:SS portion to 00:00.
    PipelineLockingMethod:
      description: Pipeline Locking Method
      type: string
      enum:
        - SOURCE_TIMECODE
        - VIDEO_ALIGNMENT
    DisabledLockingSettings:
      description: Disabled Locking Settings
      type: object
      properties:
        CustomEpoch:
