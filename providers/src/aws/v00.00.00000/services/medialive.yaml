    Av1Settings:
      description: Av1 Settings
      type: object
      properties:
        AfdSignaling:
          $ref: "#/components/schemas/AfdSignaling"
          description: "Configures whether MediaLive will write AFD values into the video. AUTO: MediaLive will try to preserve the input AFD value (in cases where multiple AFD values are valid). FIXED: the AFD value will be the value configured in the fixedAfd parameter. NONE: MediaLive won't write AFD into the video"
        BufSize:
          $ref: "#/components/schemas/__integerMin50000Max24000000"
          description: The size of the buffer (HRD buffer model) in bits.
        ColorSpaceSettings:
          $ref: "#/components/schemas/Av1ColorSpaceSettings"
          description: Specify the type of color space to apply or choose to pass through. The default is to pass through the color space that is in the source.
        FixedAfd:
          $ref: "#/components/schemas/FixedAfd"
          description: Complete this property only if you set the afdSignaling property to FIXED. Choose the AFD value (4 bits) to write on all frames of the video encode.
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1Max3003"
          description: The denominator for the framerate. Framerate is a fraction, for example, 24000 / 1001.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin1"
          description: The numerator for the framerate. Framerate is a fraction, for example, 24000 / 1001.
        GopSize:
          $ref: "#/components/schemas/__doubleMin0"
          description: The GOP size (keyframe interval). If GopSizeUnits is frames, GopSize must be a whole number and must be greater than or equal to 1. If GopSizeUnits is seconds, GopSize must be greater than 0, but it can be a decimal.
        GopSizeUnits:
          $ref: "#/components/schemas/Av1GopSizeUnits"
          description: "Choose the units for the GOP size: FRAMES or SECONDS. For SECONDS, MediaLive converts the size into a frame count at run time."
        Level:
          $ref: "#/components/schemas/Av1Level"
          description: Sets the level. This parameter is one of the properties of the encoding scheme for AV1.
        LookAheadRateControl:
          $ref: "#/components/schemas/Av1LookAheadRateControl"
          description: Sets the amount of lookahead. A value of LOW can decrease latency and memory usage. A value of HIGH can produce better quality for certain content.
        MaxBitrate:
          $ref: "#/components/schemas/__integerMin50000Max12000000"
          description: The maximum bitrate to assign. For recommendations, see the description for qvbrQualityLevel.
        MinIInterval:
          $ref: "#/components/schemas/__integerMin0Max30"
          description: Applies only if you enable SceneChangeDetect. Sets the interval between frames. This property ensures a minimum separation between repeated (cadence) I-frames and any I-frames inserted by scene change detection (SCD frames). Enter a number for the interval, measured in number of frames. If an SCD frame and a cadence frame are closer than the specified number of frames, MediaLive shrinks or stretches the GOP to include the SCD frame. Then normal cadence resumes in the next GOP. For GOP stretch to succeed, you must enable LookAheadRateControl. Note that the maximum GOP stretch = (GOP size) + (Minimum I-interval) - 1
        ParDenominator:
          $ref: "#/components/schemas/__integerMin1"
          description: The denominator for the output pixel aspect ratio (PAR).
        ParNumerator:
          $ref: "#/components/schemas/__integerMin1"
          description: The numerator for the output pixel aspect ratio (PAR).
        QvbrQualityLevel:
          $ref: "#/components/schemas/__integerMin1Max10"
          description: "Controls the target quality for the video encode. With QVBR rate control mode, the final quality is the target quality, constrained by the maxBitrate. Set values for the qvbrQualityLevel property and maxBitrate property that suit your most important viewing devices. To let MediaLive set the quality level (AUTO mode), leave the qvbrQualityLevel field empty. In this case, MediaLive uses the maximum bitrate, and the quality follows from that: more complex content might have a lower quality. Or set a target quality level and a maximum bitrate. With more complex content, MediaLive will try to achieve the target quality, but it won't exceed the maximum bitrate. With less complex content, This option will use only the bitrate needed to reach the target quality. Recommended values are: Primary screen: qvbrQualityLevel: Leave empty. maxBitrate: 4,000,000 PC or tablet: qvbrQualityLevel: Leave empty. maxBitrate: 1,500,000 to 3,000,000 Smartphone: qvbrQualityLevel: Leave empty. maxBitrate: 1,000,000 to 1,500,000"
        SceneChangeDetect:
          $ref: "#/components/schemas/Av1SceneChangeDetect"
          description: Controls whether MediaLive inserts I-frames when it detects a scene change. ENABLED or DISABLED.
        TimecodeBurninSettings:
          $ref: "#/components/schemas/TimecodeBurninSettings"
          description: Configures the timecode burn-in feature. If you enable this feature, the timecode will become part of the video.
        Bitrate:
          $ref: "#/components/schemas/__integerMin50000Max12000000"
          description: Average bitrate in bits/second. Required when the rate control mode is CBR. Not used for QVBR.
        RateControlMode:
          $ref: "#/components/schemas/Av1RateControlMode"
          description: "Rate control mode. QVBR: Quality will match the specified quality level except when it is constrained by the maximum bitrate. Recommended if you or your viewers pay for bandwidth. CBR: Quality varies, depending on the video complexity. Recommended only if you distribute your assets to devices that cannot handle variable bitrates."
        MinBitrate:
          $ref: "#/components/schemas/__integerMin0Max8000000"
          description: Used for QVBR rate control mode only. Optional. Enter a minimum bitrate if you want to keep the output bitrate about a threshold, in order to prevent the downstream system from de-allocating network bandwidth for this output.
        SpatialAq:
          $ref: "#/components/schemas/Av1SpatialAq"
          description: "Spatial AQ makes adjustments within each frame based on spatial variation of content complexity. Enabled: MediaLive will determine the appropriate level of spatial AQ to apply. Disabled: No spatial AQ. For more information, see the topic about video adaptive quantization in the MediaLive user guide."
        TemporalAq:
          $ref: "#/components/schemas/Av1TemporalAq"
          description: "Temporal AQ makes adjustments within each frame based on variations in content complexity over time. Enabled: MediaLive will determine the appropriate level of temporal AQ to apply. Disabled: No temporal AQ. For more information, see the topic about video adaptive quantization in the MediaLive user guide."
        TimecodeInsertion:
          $ref: "#/components/schemas/Av1TimecodeInsertionBehavior"
          description: "Controls how MediaLive inserts timecodes into the video output encode. DISABLED: Do not insert timecodes. METADATA_OBU: Include timecodes. MediaLive inserts timecode metadata based on the timecode from the source specified in the Timecode Config property. The timecode metadata is a metadata OBU (Open Bitstream Unit) of type METADATA_TYPE_TIMECODE, in accordance with https://aomediacodec.github.io/av1-spec/#metadata-timecode-syntax."
        BitDepth:
          $ref: "#/components/schemas/Av1BitDepth"
          description: Specifies the bit depth for the output encode. Choose a value. Or leave the field empty to use the default, which is 8 bit.
      required:
        - FramerateNumerator
        - FramerateDenominator
