openapi: 3.0.0
info:
  version: "2017-10-14"
  title: AWS Elemental MediaLive
  description: AWS Elemental MediaLive
  x-serviceName: medialive
  x-serviceAlias: medialive
  x-protocol: rest-json
  x-apiVersion: "2017-10-14"
  x-endpointPrefix: medialive
  x-jsonVersion: "1.1"
servers:
  - url: https://medialive.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for medialive
paths:
  /prod/inputDevices/{input_device_id}/accept:
    post:
      operationId: AcceptInputDeviceTransfer
      description: Accept an incoming input device transfer. The ownership of the device will transfer to your AWS account.
      parameters:
        - name: input_device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID of the input device to accept. For example, hd-123456789abcdef.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInputDeviceTransferResponse"
  /prod/batch/delete:
    post:
      operationId: BatchDelete
      description: Starts delete of resources.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelIds:
                  $ref: "#/components/schemas/__listOf__string"
                InputIds:
                  $ref: "#/components/schemas/__listOf__string"
                InputSecurityGroupIds:
                  $ref: "#/components/schemas/__listOf__string"
                MultiplexIds:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDeleteResponse"
  /prod/batch/start:
    post:
      operationId: BatchStart
      description: Starts existing resources
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelIds:
                  $ref: "#/components/schemas/__listOf__string"
                MultiplexIds:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStartResponse"
  /prod/batch/stop:
    post:
      operationId: BatchStop
      description: Stops running resources
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ChannelIds:
                  $ref: "#/components/schemas/__listOf__string"
                MultiplexIds:
                  $ref: "#/components/schemas/__listOf__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStopResponse"
  /prod/channels/{channel_id}/schedule:
    put:
      operationId: BatchUpdateSchedule
      description: Update a channel schedule
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Id of the channel whose schedule is being updated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Creates:
                  $ref: "#/components/schemas/BatchScheduleActionCreateRequest"
                Deletes:
                  $ref: "#/components/schemas/BatchScheduleActionDeleteRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateScheduleResponse"
    delete:
      operationId: DeleteSchedule
      description: Delete all schedule actions on a channel.
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Id of the channel whose schedule is being deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteScheduleResponse"
    get:
      operationId: DescribeSchedule
      description: Get a channel schedule
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: Id of the channel whose schedule is being updated.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeScheduleResponse"
  /prod/inputDevices/{input_device_id}/cancel:
    post:
      operationId: CancelInputDeviceTransfer
      description: Cancel an input device transfer that you have requested.
      parameters:
        - name: input_device_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The unique ID of the input device to cancel. For example, hd-123456789abcdef.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelInputDeviceTransferResponse"
  /prod/claimDevice:
    post:
      operationId: ClaimDevice
      description: Send a request to claim an AWS Elemental device that you have purchased from a third-party vendor. After the request succeeds, you will own the device.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Id:
                  $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimDeviceResponse"
  /prod/channels:
    post:
      operationId: CreateChannel
      description: Creates a new channel
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                CdiInputSpecification:
                  $ref: "#/components/schemas/CdiInputSpecification"
                ChannelClass:
                  $ref: "#/components/schemas/ChannelClass"
                Destinations:
                  $ref: "#/components/schemas/__listOfOutputDestination"
                EncoderSettings:
                  $ref: "#/components/schemas/EncoderSettings"
                InputAttachments:
                  $ref: "#/components/schemas/__listOfInputAttachment"
                InputSpecification:
                  $ref: "#/components/schemas/InputSpecification"
                LogLevel:
                  $ref: "#/components/schemas/LogLevel"
                Maintenance:
                  $ref: "#/components/schemas/MaintenanceCreateSettings"
                Name:
                  $ref: "#/components/schemas/__string"
                RequestId:
                  $ref: "#/components/schemas/__string"
                Reserved:
                  $ref: "#/components/schemas/__string"
                RoleArn:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Vpc:
                  $ref: "#/components/schemas/VpcOutputSettings"
                AnywhereSettings:
                  $ref: "#/components/schemas/AnywhereSettings"
                ChannelEngineVersion:
                  $ref: "#/components/schemas/ChannelEngineVersionRequest"
                DryRun:
                  $ref: "#/components/schemas/__boolean"
                LinkedChannelSettings:
                  $ref: "#/components/schemas/LinkedChannelSettings"
                ChannelSecurityGroups:
                  $ref: "#/components/schemas/__listOf__string"
                InferenceSettings:
                  $ref: "#/components/schemas/InferenceSettings"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
    get:
      operationId: ListChannels
      description: Produces list of channels that have been created
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelsResponse"
  /prod/clusters/{cluster_id}/channelplacementgroups:
    post:
      operationId: CreateChannelPlacementGroup
      description: Create a ChannelPlacementGroup in the specified Cluster. As part of the create operation, you specify the Nodes to attach the group to.After you create a ChannelPlacementGroup, you add Channels to the group (you do this by modifying the Channels to add them to a specific group). You now have an association of Channels to ChannelPlacementGroup, and ChannelPlacementGroup to Nodes. This association means that all the Channels in the group are able to run on any of the Nodes associated with the group.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the cluster.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Name:
                  $ref: "#/components/schemas/__string"
                Nodes:
                  $ref: "#/components/schemas/__listOf__string"
                RequestId:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelPlacementGroupResponse"
    get:
      operationId: ListChannelPlacementGroups
      description: Retrieve the list of ChannelPlacementGroups in the specified Cluster.
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: The ID of the cluster
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChannelPlacementGroupsResponse"
  /prod/cloudwatch-alarm-templates:
    post:
      operationId: CreateCloudWatchAlarmTemplate
      description: Creates a cloudwatch alarm template to dynamically generate cloudwatch metric alarms on targeted resource types.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ComparisonOperator:
                  $ref: "#/components/schemas/CloudWatchAlarmTemplateComparisonOperator"
                DatapointsToAlarm:
                  $ref: "#/components/schemas/__integerMin1"
                Description:
                  $ref: "#/components/schemas/__stringMin0Max1024"
                EvaluationPeriods:
                  $ref: "#/components/schemas/__integerMin1"
                GroupIdentifier:
                  $ref: "#/components/schemas/__stringPatternS"
                MetricName:
                  $ref: "#/components/schemas/__stringMax64"
                Name:
                  $ref: "#/components/schemas/__stringMin1Max255PatternS"
                Period:
                  $ref: "#/components/schemas/__integerMin10Max86400"
                Statistic:
                  $ref: "#/components/schemas/CloudWatchAlarmTemplateStatistic"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                TargetResourceType:
                  $ref: "#/components/schemas/CloudWatchAlarmTemplateTargetResourceType"
                Threshold:
                  $ref: "#/components/schemas/__double"
                TreatMissingData:
                  $ref: "#/components/schemas/CloudWatchAlarmTemplateTreatMissingData"
                RequestId:
                  $ref: "#/components/schemas/__stringMin1Max256PatternS"
              required:
                - ComparisonOperator
                - EvaluationPeriods
                - GroupIdentifier
                - MetricName
                - TargetResourceType
                - TreatMissingData
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudWatchAlarmTemplateResponse"
    get:
      operationId: ListCloudWatchAlarmTemplates
      description: Lists cloudwatch alarm templates.
      parameters:
        - name: groupIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A cloudwatch alarm template group's identifier. Can be either be its id or current name.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to retrieve the next set of results in paginated list responses.
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Represents the scope of a resource, with options for all scopes, AWS provided resources, or local resources.
        - name: signalMapIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A signal map's identifier. Can be either be its id or current name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCloudWatchAlarmTemplatesResponse"
  /prod/cloudwatch-alarm-template-groups:
    post:
      operationId: CreateCloudWatchAlarmTemplateGroup
      description: Creates a cloudwatch alarm template group to group your cloudwatch alarm templates and to attach to signal maps for dynamically creating alarms.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max1024"
                Name:
                  $ref: "#/components/schemas/__stringMin1Max255PatternS"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                RequestId:
                  $ref: "#/components/schemas/__stringMin1Max256PatternS"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCloudWatchAlarmTemplateGroupResponse"
    get:
      operationId: ListCloudWatchAlarmTemplateGroups
      description: Lists cloudwatch alarm template groups.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to retrieve the next set of results in paginated list responses.
        - name: scope
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: Represents the scope of a resource, with options for all scopes, AWS provided resources, or local resources.
        - name: signalMapIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A signal map's identifier. Can be either be its id or current name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCloudWatchAlarmTemplateGroupsResponse"
  /prod/clusters:
    post:
      operationId: CreateCluster
      description: Create a new Cluster.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ClusterType:
                  $ref: "#/components/schemas/ClusterType"
                InstanceRoleArn:
                  $ref: "#/components/schemas/__string"
                Name:
                  $ref: "#/components/schemas/__string"
                NetworkSettings:
                  $ref: "#/components/schemas/ClusterNetworkSettingsCreateRequest"
                RequestId:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClusterResponse"
    get:
      operationId: ListClusters
      description: Retrieve the list of Clusters.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClustersResponse"
  /prod/eventbridge-rule-templates:
    post:
      operationId: CreateEventBridgeRuleTemplate
      description: Creates an eventbridge rule template to monitor events and send notifications to your targeted resources.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max1024"
                EventTargets:
                  $ref: "#/components/schemas/__listOfEventBridgeRuleTemplateTarget"
                EventType:
                  $ref: "#/components/schemas/EventBridgeRuleTemplateEventType"
                GroupIdentifier:
                  $ref: "#/components/schemas/__stringPatternS"
                Name:
                  $ref: "#/components/schemas/__stringMin1Max255PatternS"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                RequestId:
                  $ref: "#/components/schemas/__stringMin1Max256PatternS"
              required:
                - EventType
                - GroupIdentifier
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventBridgeRuleTemplateResponse"
    get:
      operationId: ListEventBridgeRuleTemplates
      description: Lists eventbridge rule templates.
      parameters:
        - name: groupIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: An eventbridge rule template group's identifier. Can be either be its id or current name.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to retrieve the next set of results in paginated list responses.
        - name: signalMapIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A signal map's identifier. Can be either be its id or current name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventBridgeRuleTemplatesResponse"
  /prod/eventbridge-rule-template-groups:
    post:
      operationId: CreateEventBridgeRuleTemplateGroup
      description: Creates an eventbridge rule template group to group your eventbridge rule templates and to attach to signal maps for dynamically creating notification rules.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/__stringMin0Max1024"
                Name:
                  $ref: "#/components/schemas/__stringMin1Max255PatternS"
                Tags:
                  $ref: "#/components/schemas/TagMap"
                RequestId:
                  $ref: "#/components/schemas/__stringMin1Max256PatternS"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventBridgeRuleTemplateGroupResponse"
    get:
      operationId: ListEventBridgeRuleTemplateGroups
      description: Lists eventbridge rule template groups.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A token used to retrieve the next set of results in paginated list responses.
        - name: signalMapIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: A signal map's identifier. Can be either be its id or current name.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEventBridgeRuleTemplateGroupsResponse"
  /prod/inputs:
    post:
      operationId: CreateInput
      description: Create an input
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Destinations:
                  $ref: "#/components/schemas/__listOfInputDestinationRequest"
                InputDevices:
                  $ref: "#/components/schemas/__listOfInputDeviceSettings"
                InputSecurityGroups:
                  $ref: "#/components/schemas/__listOf__string"
                MediaConnectFlows:
                  $ref: "#/components/schemas/__listOfMediaConnectFlowRequest"
                Name:
                  $ref: "#/components/schemas/__string"
                RequestId:
                  $ref: "#/components/schemas/__string"
                RoleArn:
                  $ref: "#/components/schemas/__string"
                Sources:
                  $ref: "#/components/schemas/__listOfInputSourceRequest"
                Tags:
                  $ref: "#/components/schemas/Tags"
                Type:
                  $ref: "#/components/schemas/InputType"
                Vpc:
                  $ref: "#/components/schemas/InputVpcRequest"
                SrtSettings:
                  $ref: "#/components/schemas/SrtSettingsRequest"
                InputNetworkLocation:
                  $ref: "#/components/schemas/InputNetworkLocation"
                MulticastSettings:
                  $ref: "#/components/schemas/MulticastSettingsCreateRequest"
                Smpte2110ReceiverGroupSettings:
                  $ref: "#/components/schemas/Smpte2110ReceiverGroupSettings"
                SdiSources:
                  $ref: "#/components/schemas/InputSdiSources"
                RouterSettings:
                  $ref: "#/components/schemas/RouterSettings"
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInputResponse"
    get:
      operationId: ListInputs
      description: Produces list of inputs that have been created
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInputsResponse"
  /prod/inputSecurityGroups:
    post:
      operationId: CreateInputSecurityGroup
      description: Creates a Input Security Group
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/Tags"
                WhitelistRules:
                  $ref: "#/components/schemas/__listOfInputWhitelistRuleCidr"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInputSecurityGroupResponse"
    get:
      operationId: ListInputSecurityGroups
      description: Produces a list of Input Security Groups for an account
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInputSecurityGroupsResponse"
  /prod/multiplexes:
    post:
      operationId: CreateMultiplex
      description: Create a new multiplex.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AvailabilityZones:
                  $ref: "#/components/schemas/__listOf__string"
                MultiplexSettings:
                  $ref: "#/components/schemas/MultiplexSettings"
                Name:
                  $ref: "#/components/schemas/__string"
                RequestId:
                  $ref: "#/components/schemas/__string"
                Tags:
                  $ref: "#/components/schemas/Tags"
              required:
                - AvailabilityZones
                - MultiplexSettings
                - RequestId
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMultiplexResponse"
    get:
      operationId: ListMultiplexes
      description: Retrieve a list of the existing multiplexes.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of items to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/__string"
          description: The token to retrieve the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListMultiplexesResponse"
  /prod/multiplexes/{multiplex_id}/programs:
    post:
      operationId: CreateMultiplexProgram
      description: Create a new program in the multiplex.
      parameters:
        - name: multiplex_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/__string"
          description: ID of the multiplex where the program is to be created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                MultiplexProgramSettings:
                  $ref: "#/components/schemas/MultiplexProgramSettings"
                ProgramName:
                  $ref: "#/components/schemas/__string"
                RequestId:
                  $ref: "#/components/schemas/__string"
              required:
                - MultiplexProgramSettings
                - ProgramName
                - RequestId
      responses:
        "201":
