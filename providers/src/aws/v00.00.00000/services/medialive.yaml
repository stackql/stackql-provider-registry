    MultiplexM2tsSettings:
      description: Multiplex M2ts Settings
      type: object
      properties:
        AbsentInputAudioBehavior:
          $ref: "#/components/schemas/M2tsAbsentInputAudioBehavior"
          description: When set to drop, output audio streams will be removed from the program if the selected input audio stream is removed from the input. This allows the output audio configuration to dynamically change based on input configuration. If this is set to encodeSilence, all output audio streams will output encoded silence when not connected to an active input stream.
        Arib:
          $ref: "#/components/schemas/M2tsArib"
          description: When set to enabled, uses ARIB-compliant field muxing and removes video descriptor.
        AudioBufferModel:
          $ref: "#/components/schemas/M2tsAudioBufferModel"
          description: When set to dvb, uses DVB buffer model for Dolby Digital audio. When set to atsc, the ATSC model is used.
        AudioFramesPerPes:
          $ref: "#/components/schemas/__integerMin0"
          description: The number of audio frames to insert for each PES packet.
        AudioStreamType:
          $ref: "#/components/schemas/M2tsAudioStreamType"
          description: When set to atsc, uses stream type = 0x81 for AC3 and stream type = 0x87 for EAC3. When set to dvb, uses stream type = 0x06.
        CcDescriptor:
          $ref: "#/components/schemas/M2tsCcDescriptor"
          description: When set to enabled, generates captionServiceDescriptor in PMT.
        Ebif:
          $ref: "#/components/schemas/M2tsEbifControl"
          description: If set to passthrough, passes any EBIF data from the input source to this output.
        EsRateInPes:
          $ref: "#/components/schemas/M2tsEsRateInPes"
          description: Include or exclude the ES Rate field in the PES header.
        Klv:
          $ref: "#/components/schemas/M2tsKlv"
          description: If set to passthrough, passes any KLV data from the input source to this output.
        NielsenId3Behavior:
          $ref: "#/components/schemas/M2tsNielsenId3Behavior"
          description: If set to passthrough, Nielsen inaudible tones for media tracking will be detected in the input audio and an equivalent ID3 tag will be inserted in the output.
        PcrControl:
          $ref: "#/components/schemas/M2tsPcrControl"
          description: When set to pcrEveryPesPacket, a Program Clock Reference value is inserted for every Packetized Elementary Stream (PES) header. This parameter is effective only when the PCR PID is the same as the video or audio elementary stream.
        PcrPeriod:
          $ref: "#/components/schemas/__integerMin0Max500"
          description: Maximum time in milliseconds between Program Clock Reference (PCRs) inserted into the transport stream.
        Scte35Control:
          $ref: "#/components/schemas/M2tsScte35Control"
          description: Optionally pass SCTE-35 signals from the input source to this output.
        Scte35PrerollPullupMilliseconds:
          $ref: "#/components/schemas/__doubleMin0Max5000"
          description: Defines the amount SCTE-35 preroll will be increased (in milliseconds) on the output. Preroll is the amount of time between the presence of a SCTE-35 indication in a transport stream and the PTS of the video frame it references. Zero means don't add pullup (it doesn't mean set the preroll to zero). Negative pullup is not supported, which means that you can't make the preroll shorter. Be aware that latency in the output will increase by the pullup amount.
    RtmpOutputSettings:
      description: Rtmp Output Settings
      type: object
      properties:
        CertificateMode:
          $ref: "#/components/schemas/RtmpOutputCertificateMode"
          description: If set to verifyAuthenticity, verify the tls certificate chain to a trusted Certificate Authority (CA). This will cause rtmps outputs with self-signed certificates to fail.
        ConnectionRetryInterval:
          $ref: "#/components/schemas/__integerMin1"
          description: Number of seconds to wait before retrying a connection to the Flash Media server if the connection is lost.
        Destination:
          $ref: "#/components/schemas/OutputLocationRef"
          description: The RTMP endpoint excluding the stream name (eg. rtmp://host/appname). For connection to Akamai, a username and password must be supplied. URI fields accept format identifiers.
        NumRetries:
          $ref: "#/components/schemas/__integerMin0"
          description: Number of retry attempts.
      required:
        - Destination
    RtmpOutputCertificateMode:
      description: Rtmp Output Certificate Mode
      type: string
      enum:
        - SELF_SIGNED
        - VERIFY_AUTHENTICITY
    UdpOutputSettings:
      description: Udp Output Settings
      type: object
      properties:
        BufferMsec:
          $ref: "#/components/schemas/__integerMin0Max10000"
          description: UDP output buffering in milliseconds. Larger values increase latency through the transcoder but simultaneously assist the transcoder in maintaining a constant, low-jitter UDP/RTP output while accommodating clock recovery, input switching, input disruptions, picture reordering, etc.
        ContainerSettings:
          $ref: "#/components/schemas/UdpContainerSettings"
        Destination:
          $ref: "#/components/schemas/OutputLocationRef"
          description: Destination address and port number for RTP or UDP packets. Can be unicast or multicast RTP or UDP (eg. rtp://239.10.10.10:5001 or udp://10.100.100.100:5002).
        FecOutputSettings:
          $ref: "#/components/schemas/FecOutputSettings"
          description: Settings for enabling and adjusting Forward Error Correction on UDP outputs.
      required:
        - Destination
        - ContainerSettings
    UdpContainerSettings:
      description: Udp Container Settings
      type: object
      properties:
        M2tsSettings:
          $ref: "#/components/schemas/M2tsSettings"
    FecOutputSettings:
      description: Fec Output Settings
      type: object
      properties:
        ColumnDepth:
          $ref: "#/components/schemas/__integerMin4Max20"
          description: Parameter D from SMPTE 2022-1. The height of the FEC protection matrix. The number of transport stream packets per column error correction packet. Must be between 4 and 20, inclusive.
        IncludeFec:
          $ref: "#/components/schemas/FecOutputIncludeFec"
          description: Enables column only or column and row based FEC
        RowLength:
          $ref: "#/components/schemas/__integerMin1Max20"
          description: Parameter L from SMPTE 2022-1. The width of the FEC protection matrix. Must be between 1 and 20, inclusive. If only Column FEC is used, then larger values increase robustness. If Row FEC is used, then this is the number of transport stream packets per row error correction packet, and the value must be between 4 and 20, inclusive, if includeFec is columnAndRow. If includeFec is column, this value must be 1 to 20, inclusive.
    __integerMin4Max20:
      description: Placeholder documentation for __integerMin4Max20
      type: integer
    FecOutputIncludeFec:
      description: Fec Output Include Fec
      type: string
      enum:
        - COLUMN
        - COLUMN_AND_ROW
    __integerMin1Max20:
      description: Placeholder documentation for __integerMin1Max20
      type: integer
    CmafIngestOutputSettings:
      description: Cmaf Ingest Output Settings
      type: object
      properties:
        NameModifier:
          $ref: "#/components/schemas/__string"
          description: String concatenated to the end of the destination filename. Required for multiple outputs of the same type.
    SrtOutputSettings:
      description: Srt Output Settings
      type: object
      properties:
        BufferMsec:
          $ref: "#/components/schemas/__integerMin0Max10000"
          description: "SRT output buffering in milliseconds. A higher value increases latency through the encoder. But the benefits are that it helps to maintain a constant, low-jitter SRT output, and it accommodates clock recovery, input switching, input disruptions, picture reordering, and so on. Range: 0-10000 milliseconds."
        ContainerSettings:
          $ref: "#/components/schemas/UdpContainerSettings"
        Destination:
          $ref: "#/components/schemas/OutputLocationRef"
        EncryptionType:
          $ref: "#/components/schemas/SrtEncryptionType"
          description: The encryption level for the content. Valid values are AES128, AES192, AES256. You and the downstream system should plan how to set this field because the values must not conflict with each other.
        Latency:
          $ref: "#/components/schemas/__integerMin40Max16000"
          description: "The latency value, in milliseconds, that is proposed during the SRT connection handshake. SRT will choose the maximum of the values proposed by the sender and receiver. On the sender side, latency is the amount of time a packet is held to give it a chance to be delivered successfully. On the receiver side, latency is the amount of time the packet is held before delivering to the application, aiding in packet recovery and matching as closely as possible the packet timing of the sender. Range: 40-16000 milliseconds."
      required:
        - Destination
        - ContainerSettings
    SrtEncryptionType:
      description: Srt Encryption Type
      type: string
      enum:
        - AES128
        - AES192
        - AES256
    __integerMin40Max16000:
      description: Placeholder documentation for __integerMin40Max16000
      type: integer
    MediaConnectRouterOutputSettings:
      description: Media Connect Router Output Settings
      type: object
      properties:
        ConnectedRouterInputs:
          $ref: "#/components/schemas/MediaConnectRouterOutputConnectionMap"
          description: This parameter is deprecated and unused.
        ContainerSettings:
          $ref: "#/components/schemas/MediaConnectRouterContainerSettings"
        Destination:
          $ref: "#/components/schemas/OutputLocationRef"
          description: Destination for this MediaConnect Router Output. The referenced OutputDestination must have MediaConnect Router settings configured.
      required:
        - Destination
        - ContainerSettings
    MediaConnectRouterOutputConnectionMap:
      description: Map of MediaLive pipeline IDs to the ARNs of the MediaConnect Router Inputs to which this Output is connected.
      type: object
      properties:
        Pipeline0:
          $ref: "#/components/schemas/__string"
          description: The ARN of the MediaConnect Router Input connected to pipeline 0.
        Pipeline1:
          $ref: "#/components/schemas/__string"
          description: The ARN of the MediaConnect Router Input connected to pipeline 1.
    MediaConnectRouterContainerSettings:
      description: Media Connect Router Container Settings
      type: object
      properties:
        M2tsSettings:
          $ref: "#/components/schemas/M2tsSettings"
    TimecodeConfig:
      description: Timecode Config
      type: object
      properties:
        Source:
          $ref: "#/components/schemas/TimecodeConfigSource"
          description: 'Identifies the source for the timecode that will be associated with the events outputs. -Embedded (embedded): Initialize the output timecode with timecode from the the source. If no embedded timecode is detected in the source, the system falls back to using "Start at 0" (zerobased). -System Clock (systemclock): Use the UTC time. -Start at 0 (zerobased): The time of the first frame of the event will be 00:00:00:00.'
        SyncThreshold:
          $ref: "#/components/schemas/__integerMin1Max1000000"
          description: Threshold in frames beyond which output timecode is resynchronized to the input timecode. Discrepancies below this threshold are permitted to avoid unnecessary discontinuities in the output timecode. No timecode sync when this is not specified.
      required:
        - Source
    TimecodeConfigSource:
      description: Timecode Config Source
      type: string
      enum:
        - EMBEDDED
        - SYSTEMCLOCK
        - ZEROBASED
    __integerMin1Max1000000:
      description: Placeholder documentation for __integerMin1Max1000000
      type: integer
    __listOfVideoDescription:
      description: Placeholder documentation for __listOfVideoDescription
      type: array
      items:
        $ref: "#/components/schemas/VideoDescription"
    VideoDescription:
      description: Video settings for this stream.
      type: object
      properties:
        CodecSettings:
          $ref: "#/components/schemas/VideoCodecSettings"
          description: Video codec settings.
        Height:
          $ref: "#/components/schemas/__integer"
          description: Output video height, in pixels. Must be an even number. For most codecs, you can leave this field and width blank in order to use the height and width (resolution) from the source. Note, however, that leaving blank is not recommended. For the Frame Capture codec, height and width are required.
        Name:
          $ref: "#/components/schemas/__string"
          description: The name of this VideoDescription. Outputs will use this name to uniquely identify this Description. Description names should be unique within this Live Event.
        RespondToAfd:
          $ref: "#/components/schemas/VideoDescriptionRespondToAfd"
          description: "Indicates how MediaLive will respond to the AFD values that might be in the input video. If you do not know what AFD signaling is, or if your downstream system has not given you guidance, choose PASSTHROUGH. RESPOND: MediaLive clips the input video using a formula that uses the AFD values (configured in afdSignaling ), the input display aspect ratio, and the output display aspect ratio. MediaLive also includes the AFD values in the output, unless the codec for this encode is FRAME_CAPTURE. PASSTHROUGH: MediaLive ignores the AFD values and does not clip the video. But MediaLive does include the values in the output. NONE: MediaLive does not clip the input video and does not include the AFD values in the output"
        ScalingBehavior:
          $ref: "#/components/schemas/VideoDescriptionScalingBehavior"
          description: Configures how MediaLive transforms the video picture to match the output frame. Use STRETCH_TO_OUTPUT to stretch the video to fill the output frame. The video might get distorted. Use DEFAULT to insert pillar boxes or letter boxes around the video to fill the output frame. The video won't get distorted. Use SMART_CROP to enable the smart crop feature that uses the Elemental Inference service to crop the frame using AI - see the MediaLive User Guide for more information.
        Sharpness:
          $ref: "#/components/schemas/__integerMin0Max100"
          description: Changes the strength of the anti-alias filter used for scaling. 0 is the softest setting, 100 is the sharpest. A setting of 50 is recommended for most content.
        Width:
          $ref: "#/components/schemas/__integer"
          description: Output video width, in pixels. Must be an even number. For most codecs, you can leave this field and height blank in order to use the height and width (resolution) from the source. Note, however, that leaving blank is not recommended. For the Frame Capture codec, height and width are required.
      required:
        - Name
    VideoCodecSettings:
      description: Video Codec Settings
      type: object
      properties:
        FrameCaptureSettings:
          $ref: "#/components/schemas/FrameCaptureSettings"
        H264Settings:
          $ref: "#/components/schemas/H264Settings"
        H265Settings:
          $ref: "#/components/schemas/H265Settings"
        Mpeg2Settings:
          $ref: "#/components/schemas/Mpeg2Settings"
        Av1Settings:
          $ref: "#/components/schemas/Av1Settings"
    FrameCaptureSettings:
      description: Frame Capture Settings
      type: object
      properties:
        CaptureInterval:
          $ref: "#/components/schemas/__integerMin1Max3600000"
          description: The frequency at which to capture frames for inclusion in the output. May be specified in either seconds or milliseconds, as specified by captureIntervalUnits.
        CaptureIntervalUnits:
          $ref: "#/components/schemas/FrameCaptureIntervalUnit"
          description: Unit for the frame capture interval.
        TimecodeBurninSettings:
          $ref: "#/components/schemas/TimecodeBurninSettings"
          description: Timecode burn-in settings
    __integerMin1Max3600000:
      description: Placeholder documentation for __integerMin1Max3600000
      type: integer
    FrameCaptureIntervalUnit:
      description: Frame Capture Interval Unit
      type: string
      enum:
        - MILLISECONDS
        - SECONDS
    TimecodeBurninSettings:
      description: Timecode Burnin Settings
      type: object
      properties:
        FontSize:
          $ref: "#/components/schemas/TimecodeBurninFontSize"
          description: Choose a timecode burn-in font size
        Position:
          $ref: "#/components/schemas/TimecodeBurninPosition"
          description: Choose a timecode burn-in output position
        Prefix:
          $ref: "#/components/schemas/__stringMax255"
          description: Create a timecode burn-in prefix (optional)
      required:
        - Position
        - FontSize
    TimecodeBurninFontSize:
      description: Timecode Burnin Font Size
      type: string
      enum:
        - EXTRA_SMALL_10
        - LARGE_48
        - MEDIUM_32
        - SMALL_16
    TimecodeBurninPosition:
      description: Timecode Burnin Position
      type: string
      enum:
        - BOTTOM_CENTER
        - BOTTOM_LEFT
        - BOTTOM_RIGHT
        - MIDDLE_CENTER
        - MIDDLE_LEFT
        - MIDDLE_RIGHT
        - TOP_CENTER
        - TOP_LEFT
        - TOP_RIGHT
    H264Settings:
      description: H264 Settings
      type: object
      properties:
        AdaptiveQuantization:
          $ref: "#/components/schemas/H264AdaptiveQuantization"
          description: "Enables or disables adaptive quantization (AQ), which is a technique MediaLive can apply to video on a frame-by-frame basis to produce more compression without losing quality. There are three types of adaptive quantization: spatial, temporal, and flicker. We recommend that you set the field to Auto. For more information about all the options, see the topic about video adaptive quantization in the MediaLive user guide."
        AfdSignaling:
          $ref: "#/components/schemas/AfdSignaling"
          description: Indicates that AFD values will be written into the output stream. If afdSignaling is "auto", the system will try to preserve the input AFD value (in cases where multiple AFD values are valid). If set to "fixed", the AFD value will be the value configured in the fixedAfd parameter.
        Bitrate:
          $ref: "#/components/schemas/__integerMin1000"
          description: Average bitrate in bits/second. Required when the rate control mode is VBR or CBR. Not used for QVBR. In an MS Smooth output group, each output must have a unique value when its bitrate is rounded down to the nearest multiple of 1000.
        BufFillPct:
          $ref: "#/components/schemas/__integerMin0Max100"
          description: Percentage of the buffer that should initially be filled (HRD buffer model).
        BufSize:
          $ref: "#/components/schemas/__integerMin0"
          description: Size of buffer (HRD buffer model) in bits.
        ColorMetadata:
          $ref: "#/components/schemas/H264ColorMetadata"
          description: Includes colorspace metadata in the output.
        ColorSpaceSettings:
          $ref: "#/components/schemas/H264ColorSpaceSettings"
          description: Specify the type of color space to apply or choose to pass through. The default is to pass through the color space that is in the source.
        EntropyEncoding:
          $ref: "#/components/schemas/H264EntropyEncoding"
          description: Entropy encoding mode. Use cabac (must be in Main or High profile) or cavlc.
        FilterSettings:
          $ref: "#/components/schemas/H264FilterSettings"
          description: Optional. Both filters reduce bandwidth by removing imperceptible details. You can enable one of the filters. We recommend that you try both filters and observe the results to decide which one to use. The Temporal Filter reduces bandwidth by removing imperceptible details in the content. It combines perceptual filtering and motion compensated temporal filtering (MCTF). It operates independently of the compression level. The Bandwidth Reduction filter is a perceptual filter located within the encoding loop. It adapts to the current compression level to filter imperceptible signals. This filter works only when the resolution is 1080p or lower.
        FixedAfd:
          $ref: "#/components/schemas/FixedAfd"
          description: Four bit AFD value to write on all frames of video in the output stream. Only valid when afdSignaling is set to 'Fixed'.
        FlickerAq:
          $ref: "#/components/schemas/H264FlickerAq"
          description: Flicker AQ makes adjustments within each frame to reduce flicker or 'pop' on I-frames. The value to enter in this field depends on the value in the Adaptive quantization field. For more information, see the topic about video adaptive quantization in the MediaLive user guide.
        ForceFieldPictures:
          $ref: "#/components/schemas/H264ForceFieldPictures"
          description: 'This setting applies only when scan type is "interlaced." It controls whether coding is performed on a field basis or on a frame basis. (When the video is progressive, the coding is always performed on a frame basis.) enabled: Force MediaLive to code on a field basis, so that odd and even sets of fields are coded separately. disabled: Code the two sets of fields separately (on a field basis) or together (on a frame basis using PAFF), depending on what is most appropriate for the content.'
        FramerateControl:
          $ref: "#/components/schemas/H264FramerateControl"
          description: This field indicates how the output video frame rate is specified. If "specified" is selected then the output video frame rate is determined by framerateNumerator and framerateDenominator, else if "initializeFromSource" is selected then the output video frame rate will be set equal to the input video frame rate of the first input.
        FramerateDenominator:
          $ref: "#/components/schemas/__integerMin1"
          description: Framerate denominator.
        FramerateNumerator:
          $ref: "#/components/schemas/__integerMin1"
          description: Framerate numerator - framerate is a fraction, e.g. 24000 / 1001 = 23.976 fps.
        GopBReference:
          $ref: "#/components/schemas/H264GopBReference"
          description: Documentation update needed
        GopClosedCadence:
          $ref: "#/components/schemas/__integerMin0"
          description: Frequency of closed GOPs. In streaming applications, it is recommended that this be set to 1 so a decoder joining mid-stream will receive an IDR frame as quickly as possible. Setting this value to 0 will break output segmenting.
        GopNumBFrames:
          $ref: "#/components/schemas/__integerMin0Max7"
          description: Number of B-frames between reference frames.
        GopSize:
          $ref: "#/components/schemas/__double"
          description: GOP size (keyframe interval) in units of either frames or seconds per gopSizeUnits. If gopSizeUnits is frames, gopSize must be an integer and must be greater than or equal to 1. If gopSizeUnits is seconds, gopSize must be greater than 0, but need not be an integer.
        GopSizeUnits:
          $ref: "#/components/schemas/H264GopSizeUnits"
          description: Indicates if the gopSize is specified in frames or seconds. If seconds the system will convert the gopSize into a frame count at run time.
        Level:
          $ref: "#/components/schemas/H264Level"
          description: H.264 Level.
        LookAheadRateControl:
          $ref: "#/components/schemas/H264LookAheadRateControl"
          description: Amount of lookahead. A value of low can decrease latency and memory usage, while high can produce better quality for certain content.
        MaxBitrate:
          $ref: "#/components/schemas/__integerMin1000"
          description: "For QVBR: See the tooltip for Quality level For VBR: Set the maximum bitrate in order to accommodate expected spikes in the complexity of the video."
        MinIInterval:
          $ref: "#/components/schemas/__integerMin0Max30"
          description: "Only meaningful if sceneChangeDetect is set to enabled. Defaults to 5 if multiplex rate control is used. Enforces separation between repeated (cadence) I-frames and I-frames inserted by Scene Change Detection. If a scene change I-frame is within I-interval frames of a cadence I-frame, the GOP is shrunk and/or stretched to the scene change I-frame. GOP stretch requires enabling lookahead as well as setting I-interval. The normal cadence resumes for the next GOP. Note: Maximum GOP stretch = GOP size + Min-I-interval - 1"
        NumRefFrames:
          $ref: "#/components/schemas/__integerMin1Max6"
          description: Number of reference frames to use. The encoder may use more than requested if using B-frames and/or interlaced encoding.
        ParControl:
          $ref: "#/components/schemas/H264ParControl"
          description: This field indicates how the output pixel aspect ratio is specified. If "specified" is selected then the output video pixel aspect ratio is determined by parNumerator and parDenominator, else if "initializeFromSource" is selected then the output pixsel aspect ratio will be set equal to the input video pixel aspect ratio of the first input.
        ParDenominator:
          $ref: "#/components/schemas/__integerMin1"
          description: Pixel Aspect Ratio denominator.
        ParNumerator:
          $ref: "#/components/schemas/__integerMin1"
          description: Pixel Aspect Ratio numerator.
        Profile:
          $ref: "#/components/schemas/H264Profile"
          description: H.264 Profile.
        QualityLevel:
          $ref: "#/components/schemas/H264QualityLevel"
          description: "Leave as STANDARD_QUALITY or choose a different value (which might result in additional costs to run the channel). - ENHANCED_QUALITY: Produces a slightly better video quality without an increase in the bitrate. Has an effect only when the Rate control mode is QVBR or CBR. If this channel is in a MediaLive multiplex, the value must be ENHANCED_QUALITY. - STANDARD_QUALITY: Valid for any Rate control mode."
        QvbrQualityLevel:
          $ref: "#/components/schemas/__integerMin1Max10"
          description: 'Controls the target quality for the video encode. Applies only when the rate control mode is QVBR. You can set a target quality or you can let MediaLive determine the best quality. To set a target quality, enter values in the QVBR quality level field and the Max bitrate field. Enter values that suit your most important viewing devices. Recommended values are: - Primary screen: Quality level: 8 to 10. Max bitrate: 4M - PC or tablet: Quality level: 7. Max bitrate: 1.5M to 3M - Smartphone: Quality level: 6. Max bitrate: 1M to 1.5M To let MediaLive decide, leave the QVBR quality level field empty, and in Max bitrate enter the maximum rate you want in the video. For more information, see the section called "Video - rate control mode" in the MediaLive user guide'
        RateControlMode:
          $ref: "#/components/schemas/H264RateControlMode"
          description: "Rate control mode. QVBR: Quality will match the specified quality level except when it is constrained by the maximum bitrate. Recommended if you or your viewers pay for bandwidth. VBR: Quality and bitrate vary, depending on the video complexity. Recommended instead of QVBR if you want to maintain a specific average bitrate over the duration of the channel. CBR: Quality varies, depending on the video complexity. Recommended only if you distribute your assets to devices that cannot handle variable bitrates. Multiplex: This rate control mode is only supported (and is required) when the video is being delivered to a MediaLive Multiplex in which case the rate control configuration is controlled by the properties within the Multiplex Program."
        ScanType:
          $ref: "#/components/schemas/H264ScanType"
          description: Sets the scan type of the output to progressive or top-field-first interlaced.
        SceneChangeDetect:
          $ref: "#/components/schemas/H264SceneChangeDetect"
          description: "Scene change detection. - On: inserts I-frames when scene change is detected. - Off: does not force an I-frame when scene change is detected."
        Slices:
          $ref: "#/components/schemas/__integerMin1Max32"
          description: Number of slices per picture. Must be less than or equal to the number of macroblock rows for progressive pictures, and less than or equal to half the number of macroblock rows for interlaced pictures. This field is optional; when no value is specified the encoder will choose the number of slices based on encode resolution.
        Softness:
          $ref: "#/components/schemas/__integerMin0Max128"
          description: Softness. Selects quantizer matrix, larger values reduce high-frequency content in the encoded image. If not set to zero, must be greater than 15.
        SpatialAq:
          $ref: "#/components/schemas/H264SpatialAq"
          description: Spatial AQ makes adjustments within each frame based on spatial variation of content complexity. The value to enter in this field depends on the value in the Adaptive quantization field. For more information, see the topic about video adaptive quantization in the MediaLive user guide.
        SubgopLength:
          $ref: "#/components/schemas/H264SubGopLength"
          description: If set to fixed, use gopNumBFrames B-frames per sub-GOP. If set to dynamic, optimize the number of B-frames used for each sub-GOP to improve visual quality.
        Syntax:
          $ref: "#/components/schemas/H264Syntax"
          description: Produces a bitstream compliant with SMPTE RP-2027.
        TemporalAq:
          $ref: "#/components/schemas/H264TemporalAq"
          description: Temporal makes adjustments within each frame based on variations in content complexity over time. The value to enter in this field depends on the value in the Adaptive quantization field. For more information, see the topic about video adaptive quantization in the MediaLive user guide.
        TimecodeInsertion:
          $ref: "#/components/schemas/H264TimecodeInsertionBehavior"
          description: "Determines how timecodes should be inserted into the video elementary stream. - 'disabled': Do not include timecodes - 'picTimingSei': Pass through picture timing SEI messages from the source specified in Timecode Config"
        TimecodeBurninSettings:
          $ref: "#/components/schemas/TimecodeBurninSettings"
          description: Timecode burn-in settings
        MinQp:
          $ref: "#/components/schemas/__integerMin1Max51"
          description: Sets the minimum QP. If you aren't familiar with quantization adjustment, leave the field empty. MediaLive will apply an appropriate value.
        MinBitrate:
          $ref: "#/components/schemas/__integerMin0"
          description: Used for QVBR rate control mode only. Optional. Enter a minimum bitrate if you want to keep the output bitrate about a threshold, in order to prevent the downstream system from de-allocating network bandwidth for this output.
    H264AdaptiveQuantization:
      description: H264 Adaptive Quantization
      type: string
      enum:
        - AUTO
        - HIGH
        - HIGHER
        - LOW
        - MAX
        - MEDIUM
        - "OFF"
    AfdSignaling:
      description: Afd Signaling
      type: string
      enum:
        - AUTO
        - FIXED
        - NONE
    __integerMin1000:
      description: Placeholder documentation for __integerMin1000
      type: integer
    H264ColorMetadata:
      description: H264 Color Metadata
      type: string
      enum:
        - IGNORE
        - INSERT
    H264ColorSpaceSettings:
      description: H264 Color Space Settings
      type: object
      properties:
        ColorSpacePassthroughSettings:
          $ref: "#/components/schemas/ColorSpacePassthroughSettings"
        Rec601Settings:
          $ref: "#/components/schemas/Rec601Settings"
        Rec709Settings:
          $ref: "#/components/schemas/Rec709Settings"
    ColorSpacePassthroughSettings:
      description: Passthrough applies no color space conversion to the output
      type: object
    Rec601Settings:
      description: Rec601 Settings
      type: object
    Rec709Settings:
      description: Rec709 Settings
      type: object
    H264EntropyEncoding:
      description: H264 Entropy Encoding
      type: string
      enum:
        - CABAC
        - CAVLC
    H264FilterSettings:
      description: H264 Filter Settings
      type: object
      properties:
        TemporalFilterSettings:
          $ref: "#/components/schemas/TemporalFilterSettings"
        BandwidthReductionFilterSettings:
          $ref: "#/components/schemas/BandwidthReductionFilterSettings"
    TemporalFilterSettings:
      description: Temporal Filter Settings
      type: object
      properties:
        PostFilterSharpening:
          $ref: "#/components/schemas/TemporalFilterPostFilterSharpening"
          description: "If you enable this filter, the results are the following: - If the source content is noisy (it contains excessive digital artifacts), the filter cleans up the source. - If the source content is already clean, the filter tends to decrease the bitrate, especially when the rate control mode is QVBR."
        Strength:
          $ref: "#/components/schemas/TemporalFilterStrength"
          description: Choose a filter strength. We recommend a strength of 1 or 2. A higher strength might take out good information, resulting in an image that is overly soft.
    TemporalFilterPostFilterSharpening:
      description: Temporal Filter Post Filter Sharpening
      type: string
