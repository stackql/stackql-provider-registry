openapi: 3.0.0
info:
  version: "2024-06-13"
  title: Runtime for Amazon Bedrock Data Automation
  description: Runtime for Amazon Bedrock Data Automation
  x-serviceName: bedrock
  x-serviceAlias: bedrock_data_automation_runtime
  x-protocol: json
  x-apiVersion: "2024-06-13"
  x-endpointPrefix: bedrock-data-automation-runtime
  x-targetPrefix: AmazonBedrockKeystoneRuntimeService
  x-jsonVersion: "1.1"
servers:
  - url: https://bedrock-data-automation-runtime.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for bedrock-data-automation-runtime
paths:
  /GetDataAutomationStatus:
    post:
      operationId: GetDataAutomationStatus
      description: API used to get data automation status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.GetDataAutomationStatus
            default: AmazonBedrockKeystoneRuntimeService.GetDataAutomationStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                invocationArn:
                  $ref: "#/components/schemas/InvocationArn"
                  description: Invocation arn.
              required:
                - invocationArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDataAutomationStatusResponse"
  /InvokeDataAutomation:
    post:
      operationId: InvokeDataAutomation
      description: "Sync API: Invoke data automation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.InvokeDataAutomation
            default: AmazonBedrockKeystoneRuntimeService.InvokeDataAutomation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                inputConfiguration:
                  $ref: "#/components/schemas/SyncInputConfiguration"
                  description: Input configuration.
                dataAutomationConfiguration:
                  $ref: "#/components/schemas/DataAutomationConfiguration"
                  description: Data automation configuration.
                blueprints:
                  $ref: "#/components/schemas/BlueprintList"
                  description: Blueprint list.
                dataAutomationProfileArn:
                  $ref: "#/components/schemas/DataAutomationProfileArn"
                  description: Data automation profile ARN
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: Encryption configuration.
                outputConfiguration:
                  $ref: "#/components/schemas/OutputConfiguration"
                  description: Output configuration.
              required:
                - inputConfiguration
                - dataAutomationProfileArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeDataAutomationResponse"
  /InvokeDataAutomationAsync:
    post:
      operationId: InvokeDataAutomationAsync
      description: "Async API: Invoke data automation."
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.InvokeDataAutomationAsync
            default: AmazonBedrockKeystoneRuntimeService.InvokeDataAutomationAsync
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/IdempotencyToken"
                  description: Idempotency token.
                inputConfiguration:
                  $ref: "#/components/schemas/InputConfiguration"
                  description: Input configuration.
                outputConfiguration:
                  $ref: "#/components/schemas/OutputConfiguration"
                  description: Output configuration.
                dataAutomationConfiguration:
                  $ref: "#/components/schemas/DataAutomationConfiguration"
                  description: Data automation configuration.
                encryptionConfiguration:
                  $ref: "#/components/schemas/EncryptionConfiguration"
                  description: Encryption configuration.
                notificationConfiguration:
                  $ref: "#/components/schemas/NotificationConfiguration"
                  description: Notification configuration.
                blueprints:
                  $ref: "#/components/schemas/BlueprintList"
                  description: Blueprint list.
                dataAutomationProfileArn:
                  $ref: "#/components/schemas/DataAutomationProfileArn"
                  description: Data automation profile ARN
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: List of tags.
              required:
                - inputConfiguration
                - outputConfiguration
                - dataAutomationProfileArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvokeDataAutomationAsyncResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: List tags for an Amazon Bedrock Data Automation resource
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.ListTagsForResource
            default: AmazonBedrockKeystoneRuntimeService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
              required:
                - resourceARN
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Tag an Amazon Bedrock Data Automation resource
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.TagResource
            default: AmazonBedrockKeystoneRuntimeService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
                tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - resourceARN
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Untag an Amazon Bedrock Data Automation resource
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AmazonBedrockKeystoneRuntimeService.UntagResource
            default: AmazonBedrockKeystoneRuntimeService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceARN:
                  $ref: "#/components/schemas/TaggableResourceArn"
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
              required:
                - resourceARN
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    InvocationArn:
      description: Invocation arn.
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws(|-cn|-iso|-iso-[a-z]|-us-gov):bedrock:[a-zA-Z0-9-]*:[0-9]{12}:data-automation-invocation/[a-zA-Z0-9-_]+
    GetDataAutomationStatusResponse:
      description: Response of GetDataAutomationStatus API.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/AutomationJobStatus"
          description: Job Status.
        errorType:
          $ref: "#/components/schemas/String"
          description: Error Type.
        errorMessage:
          $ref: "#/components/schemas/String"
          description: Error Message.
        outputConfiguration:
          $ref: "#/components/schemas/OutputConfiguration"
          description: Output configuration.
        jobSubmissionTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Job Submission time.
        jobCompletionTime:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: Job completion time.
        jobDurationInSeconds:
          $ref: "#/components/schemas/Integer"
          description: Job duration in seconds.
    AutomationJobStatus:
      description: List of status supported by automation jobs
      type: string
      enum:
        - Created
        - InProgress
        - Success
        - ServiceError
        - ClientError
    String:
      type: string
    OutputConfiguration:
      description: Output configuration.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: S3 uri.
      required:
        - s3Uri
    S3Uri:
      description: A path in S3
      type: string
      minLength: 1
      maxLength: 1024
      pattern: s3://[a-z0-9][\.\-a-z0-9]{1,61}[a-z0-9](/[^\x00-\x1F\x7F\{^}%`\]">\[~<#|]*)?
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    Integer:
      type: integer
    SyncInputConfiguration:
      description: Input configuration for synchronous API
      type: object
      properties:
        bytes:
          $ref: "#/components/schemas/Blob"
          description: Input data as bytes
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: S3 URI of the input data
    Blob:
      type: string
      format: byte
    DataAutomationConfiguration:
      description: Data automation configuration.
      type: object
      properties:
        dataAutomationProjectArn:
          $ref: "#/components/schemas/DataAutomationArn"
          description: Data automation project arn.
        stage:
          $ref: "#/components/schemas/DataAutomationStage"
          description: Data automation stage.
      required:
        - dataAutomationProjectArn
    DataAutomationArn:
      description: Data automation arn.
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws(|-cn|-iso|-iso-[a-z]|-us-gov):bedrock:[a-zA-Z0-9-]*:(aws|[0-9]{12}):data-automation-project/[a-zA-Z0-9-_]+
    DataAutomationStage:
      description: Data automation stage.
      type: string
      enum:
        - LIVE
        - DEVELOPMENT
    BlueprintList:
      description: Blueprint list.
      type: array
      items:
        $ref: "#/components/schemas/Blueprint"
    Blueprint:
      description: Structure for single blueprint entity.
      type: object
      properties:
        blueprintArn:
          $ref: "#/components/schemas/BlueprintArn"
          description: Arn of blueprint.
        version:
          $ref: "#/components/schemas/BlueprintVersion"
          description: Version of blueprint.
        stage:
          $ref: "#/components/schemas/BlueprintStage"
          description: Stage of blueprint.
      required:
        - blueprintArn
    BlueprintArn:
      description: ARN of a Blueprint
      type: string
      minLength: 0
      maxLength: 128
      pattern: arn:aws(|-cn|-iso|-iso-[a-z]|-us-gov):bedrock:[a-zA-Z0-9-]*:(aws|[0-9]{12}):blueprint/(bedrock-data-insights-public-[a-zA-Z0-9-_]{1,30}|bedrock-data-automation-public-[a-zA-Z0-9-_]{1,30}|[a-zA-Z0-9-]{12,36})
    BlueprintVersion:
      description: Blueprint version.
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[0-9]*"
    BlueprintStage:
      description: Blueprint stage enum.
      type: string
      enum:
        - DEVELOPMENT
        - LIVE
    DataAutomationProfileArn:
      description: Data automation profile arn.
      type: string
      minLength: 1
      maxLength: 128
      pattern: arn:aws(|-cn|-iso|-iso-[a-z]|-us-gov):bedrock:[a-zA-Z0-9-]*:(aws|[0-9]{12}):data-automation-profile/[a-zA-Z0-9-_.]+
    EncryptionConfiguration:
      description: Encryption configuration.
      type: object
      properties:
        kmsKeyId:
          $ref: "#/components/schemas/KMSKeyId"
          description: Customer KMS key used for encryption
        kmsEncryptionContext:
          type: object
          properties: {}
          description: KMS encryption context.
      required:
        - kmsKeyId
    KMSKeyId:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: "[A-Za-z0-9][A-Za-z0-9:_/+=,@.-]+"
    InvokeDataAutomationResponse:
      description: Invoke Data Automation Response
      type: object
      properties:
        outputConfiguration:
          $ref: "#/components/schemas/OutputConfiguration"
          description: Output configuration
        semanticModality:
          $ref: "#/components/schemas/SemanticModality"
          description: Detected semantic modality
        outputSegments:
          $ref: "#/components/schemas/OutputSegmentList"
          description: List of outputs for each logical sub-doc
      required:
        - semanticModality
    SemanticModality:
      description: Semantic modality enum
      type: string
      enum:
        - DOCUMENT
        - IMAGE
        - AUDIO
        - VIDEO
    OutputSegmentList:
      description: Output segment list
      type: array
      items:
        $ref: "#/components/schemas/OutputSegment"
    OutputSegment:
      description: Results for an output segment
      type: object
      properties:
        customOutputStatus:
          $ref: "#/components/schemas/CustomOutputStatus"
          description: Status of blueprint match
        customOutput:
          $ref: "#/components/schemas/String"
          description: Custom output response
        standardOutput:
          $ref: "#/components/schemas/String"
          description: Standard output response
    CustomOutputStatus:
      description: Custom output status enum
      type: string
      enum:
        - MATCH
        - NO_MATCH
    IdempotencyToken:
      description: Client specified token used for idempotency checks
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[a-zA-Z0-9](-*[a-zA-Z0-9]){1,256}"
    InputConfiguration:
      description: Input configuration.
      type: object
      properties:
        s3Uri:
          $ref: "#/components/schemas/S3Uri"
          description: S3 uri.
        assetProcessingConfiguration:
          $ref: "#/components/schemas/AssetProcessingConfiguration"
          description: Asset processing configuration
      required:
        - s3Uri
    AssetProcessingConfiguration:
      description: Config containing asset processing related knobs for all modalities
      type: object
      properties:
        video:
          $ref: "#/components/schemas/VideoAssetProcessingConfiguration"
          description: Video asset processing configuration
    VideoAssetProcessingConfiguration:
      description: Video asset processing configuration
      type: object
      properties:
        segmentConfiguration:
          $ref: "#/components/schemas/VideoSegmentConfiguration"
          description: Delimits the segment of the input that will be processed
    VideoSegmentConfiguration:
      description: Delimits the segment of the input that will be processed
      type: object
      properties:
        timestampSegment:
          $ref: "#/components/schemas/TimestampSegment"
          description: Timestamp segment
    TimestampSegment:
      description: Timestamp segment
      type: object
      properties:
        startTimeMillis:
          $ref: "#/components/schemas/TimestampSegmentStartTimeMillisLong"
          description: Start timestamp in milliseconds
        endTimeMillis:
          $ref: "#/components/schemas/TimestampSegmentEndTimeMillisLong"
          description: End timestamp in milliseconds
      required:
        - startTimeMillis
        - endTimeMillis
    TimestampSegmentStartTimeMillisLong:
      type: integer
      format: int64
      minimum: 0
    TimestampSegmentEndTimeMillisLong:
      type: integer
      format: int64
      minimum: 300000
    NotificationConfiguration:
      description: Notification configuration.
      type: object
      properties:
        eventBridgeConfiguration:
          $ref: "#/components/schemas/EventBridgeConfiguration"
          description: Event bridge configuration.
      required:
        - eventBridgeConfiguration
    EventBridgeConfiguration:
      description: Event bridge configuration.
      type: object
      properties:
        eventBridgeEnabled:
          $ref: "#/components/schemas/Boolean"
          description: Event bridge flag.
      required:
        - eventBridgeEnabled
    Boolean:
      type: boolean
    TagList:
      description: List of tags
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Key value pair of a tag
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
        value:
          $ref: "#/components/schemas/TagValue"
      required:
        - key
        - value
    TagKey:
      description: Defines the context of the tag.
      type: string
      minLength: 1
      maxLength: 128
      pattern: (?!aws:)[\p{L}\p{Z}\p{N}_.:/=+\-@]*
    TagValue:
      description: Defines the value within the context. e.g. <key=reason, value=training>.
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    InvokeDataAutomationAsyncResponse:
      description: Invoke Data Automation Async Response
      type: object
      properties:
        invocationArn:
          $ref: "#/components/schemas/InvocationArn"
          description: ARN of the automation job
      required:
        - invocationArn
    TaggableResourceArn:
      description: ARN of a taggable resource
      type: string
      minLength: 20
      maxLength: 1011
      pattern: arn:aws(|-cn|-iso|-iso-[a-z]|-us-gov):bedrock:[a-zA-Z0-9-]*:[0-9]{12}:data-automation-invocation/[a-zA-Z0-9-_]+
    ListTagsForResourceResponse:
      type: object
      properties:
        tags:
          $ref: "#/components/schemas/TagList"
    TagResourceResponse:
      type: object
    TagKeyList:
      description: List of tag keys
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceResponse:
      type: object
  x-stackQL-resources:
    data_automation_status:
      id: aws.bedrock_data_automation_runtime.data_automation_status
      name: data_automation_status
      title: data_automation_status
      methods:
        get_data_automation_status:
          operation:
            $ref: "#/paths/~1GetDataAutomationStatus/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/data_automation_status/methods/get_data_automation_status"
        insert: []
        update: []
        delete: []
    tags:
      id: aws.bedrock_data_automation_runtime.tags
      name: tags
      title: tags
      methods:
        list_tags_for_resource:
          operation:
            $ref: "#/paths/~1ListTagsForResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        tag_resource:
          operation:
            $ref: "#/paths/~1TagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
        untag_resource:
          operation:
            $ref: "#/paths/~1UntagResource/post"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
            mediaType: application/x-amz-json-1.1
            base: "{}"
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/tags/methods/list_tags_for_resource"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/tags/methods/tag_resource"
          - $ref: "#/components/x-stackQL-resources/tags/methods/untag_resource"
        delete: []
