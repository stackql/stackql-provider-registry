          $ref: "#/components/schemas/RouteAnalysisCompletionReasonCode"
          description: The reason code. Available only if a connection is not found. BLACKHOLE_ROUTE_FOR_DESTINATION_FOUND - Found a black hole route with the destination CIDR block. CYCLIC_PATH_DETECTED - Found the same resource multiple times while traversing the path. INACTIVE_ROUTE_FOR_DESTINATION_FOUND - Found an inactive route with the destination CIDR block. MAX_HOPS_EXCEEDED - Analysis exceeded 64 hops without finding the destination. ROUTE_NOT_FOUND - Cannot find a route table with the destination CIDR block. TGW_ATTACH_ARN_NO_MATCH - Found an attachment, but not with the correct destination ARN. TGW_ATTACH_NOT_FOUND - Cannot find an attachment. TGW_ATTACH_NOT_IN_TGW - Found an attachment, but not to the correct transit gateway. TGW_ATTACH_STABLE_ROUTE_TABLE_NOT_FOUND - The state of the route table association is not associated.
