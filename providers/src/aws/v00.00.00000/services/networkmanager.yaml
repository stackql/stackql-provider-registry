      description: Gets the status of the Service Linked Role (SLR) deployment for the accounts in a given Amazon Web Services Organization.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationServiceAccessStatusResponse"
    post:
      operationId: StartOrganizationServiceAccessUpdate
      description: Enables the Network Manager service for an Amazon Web Services Organization. This can only be called by a management account within the organization.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Action:
                  $ref: "#/components/schemas/Action"
              required:
                - Action
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartOrganizationServiceAccessUpdateResponse"
  /peerings:
    get:
      operationId: ListPeerings
      description: Lists the peerings for a core network.
      parameters:
        - name: coreNetworkId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of a core network.
        - name: peeringType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PeeringType"
          description: Returns a list of a peering requests.
        - name: edgeLocation
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExternalRegionCode"
          description: Returns a list edge locations for the
        - name: state
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PeeringState"
          description: Returns a list of the peering request states.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPeeringsResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags for a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Tags a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - Tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from a specified resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The Amazon Resource Name (ARN) of the resource.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys to remove from the specified resource.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /routing-policy-label:
    post:
      operationId: PutAttachmentRoutingPolicyLabel
      description: Applies a routing policy label to an attachment for traffic routing decisions.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CoreNetworkId:
                  $ref: "#/components/schemas/CoreNetworkId"
                AttachmentId:
                  $ref: "#/components/schemas/AttachmentId"
                RoutingPolicyLabel:
                  $ref: "#/components/schemas/ConstrainedString"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CoreNetworkId
                - AttachmentId
                - RoutingPolicyLabel
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAttachmentRoutingPolicyLabelResponse"
  /attachments/{attachment_id}/reject:
    post:
      operationId: RejectAttachment
      description: Rejects a core network attachment request.
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectAttachmentResponse"
  /routing-policy-label/core-network/{core_network_id}/attachment/{attachment_id}:
    delete:
      operationId: RemoveAttachmentRoutingPolicyLabel
      description: Removes a routing policy label from an attachment.
      parameters:
        - name: core_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of the core network containing the attachment.
        - name: attachment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment to remove the routing policy label from.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveAttachmentRoutingPolicyLabelResponse"
  /core-networks/{core_network_id}/core-network-policy-versions/{policy_version_id}/restore:
    post:
      operationId: RestoreCoreNetworkPolicyVersion
      description: Restores a previous policy version as a new, immutable version of a core network policy. A subsequent change set is created showing the differences between the LIVE policy and restored policy.
      parameters:
        - name: core_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of a core network.
        - name: policy_version_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Integer"
          description: The ID of the policy version to restore.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreCoreNetworkPolicyVersionResponse"
  /global-networks/{global_network_id}/route-analyses:
    post:
      operationId: StartRouteAnalysis
      description: Starts analyzing the routing path between the specified source and destination. For more information, see Route Analyzer.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Source:
                  $ref: "#/components/schemas/RouteAnalysisEndpointOptionsSpecification"
                Destination:
                  $ref: "#/components/schemas/RouteAnalysisEndpointOptionsSpecification"
                IncludeReturnPath:
                  $ref: "#/components/schemas/Boolean"
                UseMiddleboxes:
                  $ref: "#/components/schemas/Boolean"
              required:
                - Source
                - Destination
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartRouteAnalysisResponse"
  /global-networks/{global_network_id}/network-resources/{resource_arn}/metadata:
    patch:
      operationId: UpdateNetworkResourceMetadata
      description: Updates the resource metadata for the specified global network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Metadata:
                  $ref: "#/components/schemas/NetworkResourceMetadataMap"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateNetworkResourceMetadataResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    AttachmentId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: ^attachment-([0-9a-f]{8,17})$
    AcceptAttachmentResponse:
      type: object
      properties:
        Attachment:
          $ref: "#/components/schemas/Attachment"
          description: The response to the attachment request.
    Attachment:
      description: Describes a core network attachment.
      type: object
      properties:
        CoreNetworkId:
          $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of a core network.
        CoreNetworkArn:
          $ref: "#/components/schemas/CoreNetworkArn"
          description: The ARN of a core network.
        AttachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment.
        OwnerAccountId:
          $ref: "#/components/schemas/AWSAccountId"
          description: The ID of the attachment account owner.
        AttachmentType:
          $ref: "#/components/schemas/AttachmentType"
          description: The type of attachment.
        State:
          $ref: "#/components/schemas/AttachmentState"
          description: The state of the attachment.
        EdgeLocation:
          $ref: "#/components/schemas/ExternalRegionCode"
          description: The Region where the edge is located. This is returned for all attachment types except a Direct Connect gateway attachment, which instead returns EdgeLocations.
        EdgeLocations:
          $ref: "#/components/schemas/ExternalRegionCodeList"
          description: The edge locations that the Direct Connect gateway is associated with. This is returned only for Direct Connect gateway attachments. All other attachment types retrun EdgeLocation.
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The attachment resource ARN.
        AttachmentPolicyRuleNumber:
          $ref: "#/components/schemas/Integer"
          description: The policy rule number associated with the attachment.
        SegmentName:
          $ref: "#/components/schemas/ConstrainedString"
          description: The name of the segment attachment.
        NetworkFunctionGroupName:
          $ref: "#/components/schemas/NetworkFunctionGroupName"
          description: The name of the network function group.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The tags associated with the attachment.
        ProposedSegmentChange:
          $ref: "#/components/schemas/ProposedSegmentChange"
          description: The attachment to move from one segment to another.
        ProposedNetworkFunctionGroupChange:
          $ref: "#/components/schemas/ProposedNetworkFunctionGroupChange"
          description: Describes a proposed change to a network function group associated with the attachment.
        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the attachment was created.
        UpdatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the attachment was last updated.
        LastModificationErrors:
          $ref: "#/components/schemas/AttachmentErrorList"
          description: Describes the error associated with the attachment request.
    CoreNetworkId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: ^core-network-([0-9a-f]{8,17})$
    CoreNetworkArn:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\s\\S]*"
    AWSAccountId:
      type: string
      minLength: 12
      maxLength: 12
      pattern: "[\\s\\S]*"
    AttachmentType:
      type: string
      enum:
        - CONNECT
        - SITE_TO_SITE_VPN
        - VPC
        - DIRECT_CONNECT_GATEWAY
        - TRANSIT_GATEWAY_ROUTE_TABLE
    AttachmentState:
      type: string
      enum:
        - REJECTED
        - PENDING_ATTACHMENT_ACCEPTANCE
        - CREATING
        - FAILED
        - AVAILABLE
        - UPDATING
        - PENDING_NETWORK_UPDATE
        - PENDING_TAG_ACCEPTANCE
        - DELETING
    ExternalRegionCode:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[\\s\\S]*"
    ExternalRegionCodeList:
      type: array
      items:
        $ref: "#/components/schemas/ExternalRegionCode"
    ResourceArn:
      type: string
      minLength: 0
      maxLength: 1500
      pattern: "[\\s\\S]*"
    Integer:
      type: integer
    ConstrainedString:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\s\\S]*"
    NetworkFunctionGroupName:
      type: string
      pattern: "[\\s\\S]*"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Describes a tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: "The tag key. Constraints: Maximum length of 128 characters."
        Value:
          $ref: "#/components/schemas/TagValue"
          description: "The tag value. Constraints: Maximum length of 256 characters."
    TagKey:
      type: string
      minLength: 0
      maxLength: 10000000
      pattern: "[\\s\\S]*"
    TagValue:
      type: string
      minLength: 0
      maxLength: 10000000
      pattern: "[\\s\\S]*"
    ProposedSegmentChange:
      description: Describes a proposed segment change. In some cases, the segment change must first be evaluated and accepted.
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The list of key-value tags that changed for the segment.
        AttachmentPolicyRuleNumber:
          $ref: "#/components/schemas/Integer"
          description: The rule number in the policy document that applies to this change.
        SegmentName:
          $ref: "#/components/schemas/ConstrainedString"
          description: The name of the segment to change.
    ProposedNetworkFunctionGroupChange:
      description: Describes proposed changes to a network function group.
      type: object
      properties:
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The list of proposed changes to the key-value tags associated with the network function group.
        AttachmentPolicyRuleNumber:
          $ref: "#/components/schemas/Integer"
          description: The proposed new attachment policy rule number for the network function group.
        NetworkFunctionGroupName:
          $ref: "#/components/schemas/ConstrainedString"
          description: The proposed name change for the network function group name.
    DateTime:
      type: string
      format: date-time
    AttachmentErrorList:
      type: array
      items:
        $ref: "#/components/schemas/AttachmentError"
    AttachmentError:
      description: Describes the error associated with an attachment request.
      type: object
      properties:
        Code:
          $ref: "#/components/schemas/AttachmentErrorCode"
          description: The error code for the attachment request.
        Message:
          $ref: "#/components/schemas/ServerSideString"
          description: The message associated with the error code.
        ResourceArn:
          $ref: "#/components/schemas/ResourceArn"
          description: The ARN of the requested attachment resource.
        RequestId:
          $ref: "#/components/schemas/ServerSideString"
          description: The ID of the attachment request.
    AttachmentErrorCode:
      type: string
      enum:
        - VPC_NOT_FOUND
        - SUBNET_NOT_FOUND
        - SUBNET_DUPLICATED_IN_AVAILABILITY_ZONE
        - SUBNET_NO_FREE_ADDRESSES
        - SUBNET_UNSUPPORTED_AVAILABILITY_ZONE
        - SUBNET_NO_IPV6_CIDRS
        - VPN_CONNECTION_NOT_FOUND
        - MAXIMUM_NO_ENCAP_LIMIT_EXCEEDED
        - DIRECT_CONNECT_GATEWAY_NOT_FOUND
        - DIRECT_CONNECT_GATEWAY_EXISTING_ATTACHMENTS
        - DIRECT_CONNECT_GATEWAY_NO_PRIVATE_VIF
        - VPN_EXISTING_ASSOCIATIONS
        - VPC_UNSUPPORTED_FEATURES
    ServerSideString:
      type: string
      minLength: 0
      maxLength: 10000000
      pattern: "[\\s\\S]*"
    GlobalNetworkId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[\\s\\S]*"
    ConnectPeerId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: ^connect-peer-([0-9a-f]{8,17})$
    DeviceId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[\\s\\S]*"
    LinkId:
      type: string
      minLength: 0
      maxLength: 50
      pattern: "[\\s\\S]*"
    AssociateConnectPeerResponse:
      type: object
      properties:
        ConnectPeerAssociation:
          $ref: "#/components/schemas/ConnectPeerAssociation"
          description: The response to the Connect peer request.
    ConnectPeerAssociation:
      description: Describes a core network Connect peer association.
      type: object
      properties:
        ConnectPeerId:
          $ref: "#/components/schemas/ConnectPeerId"
          description: The ID of the Connect peer.
        GlobalNetworkId:
          $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        DeviceId:
          $ref: "#/components/schemas/DeviceId"
          description: The ID of the device to connect to.
        LinkId:
          $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
        State:
          $ref: "#/components/schemas/ConnectPeerAssociationState"
          description: The state of the Connect peer association.
    ConnectPeerAssociationState:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - DELETING
        - DELETED
    CustomerGatewayArn:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\s\\S]*"
    AssociateCustomerGatewayResponse:
      type: object
      properties:
        CustomerGatewayAssociation:
          $ref: "#/components/schemas/CustomerGatewayAssociation"
          description: The customer gateway association.
    CustomerGatewayAssociation:
      description: Describes the association between a customer gateway, a device, and a link.
      type: object
      properties:
        CustomerGatewayArn:
          $ref: "#/components/schemas/CustomerGatewayArn"
          description: The Amazon Resource Name (ARN) of the customer gateway.
        GlobalNetworkId:
          $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        DeviceId:
          $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        LinkId:
          $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
        State:
          $ref: "#/components/schemas/CustomerGatewayAssociationState"
          description: The association state.
    CustomerGatewayAssociationState:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - DELETING
        - DELETED
    AssociateLinkResponse:
      type: object
      properties:
        LinkAssociation:
          $ref: "#/components/schemas/LinkAssociation"
          description: The link association.
    LinkAssociation:
      description: Describes the association between a device and a link.
      type: object
      properties:
        GlobalNetworkId:
          $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        DeviceId:
          $ref: "#/components/schemas/DeviceId"
          description: The device ID for the link association.
        LinkId:
          $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
        LinkAssociationState:
          $ref: "#/components/schemas/LinkAssociationState"
          description: The state of the association.
    LinkAssociationState:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - DELETING
        - DELETED
    TransitGatewayConnectPeerArn:
      type: string
      minLength: 0
      maxLength: 500
      pattern: "[\\s\\S]*"
    AssociateTransitGatewayConnectPeerResponse:
      type: object
      properties:
        TransitGatewayConnectPeerAssociation:
          $ref: "#/components/schemas/TransitGatewayConnectPeerAssociation"
          description: The transit gateway Connect peer association.
    TransitGatewayConnectPeerAssociation:
      description: Describes a transit gateway Connect peer association.
      type: object
      properties:
        TransitGatewayConnectPeerArn:
          $ref: "#/components/schemas/TransitGatewayConnectPeerArn"
          description: The Amazon Resource Name (ARN) of the transit gateway Connect peer.
        GlobalNetworkId:
          $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        DeviceId:
          $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        LinkId:
          $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
        State:
          $ref: "#/components/schemas/TransitGatewayConnectPeerAssociationState"
          description: The state of the association.
    TransitGatewayConnectPeerAssociationState:
      type: string
      enum:
        - PENDING
        - AVAILABLE
        - DELETING
        - DELETED
    ConnectAttachmentOptions:
      description: Describes a core network Connect attachment options.
      type: object
      properties:
        Protocol:
          $ref: "#/components/schemas/TunnelProtocol"
          description: The protocol used for the attachment connection.
    TunnelProtocol:
      type: string
      enum:
        - GRE
        - NO_ENCAP
    ClientToken:
      type: string
      minLength: 0
      maxLength: 256
      pattern: "[\\s\\S]*"
    CreateConnectAttachmentResponse:
      type: object
      properties:
        ConnectAttachment:
          $ref: "#/components/schemas/ConnectAttachment"
          description: The response to a Connect attachment request.
    ConnectAttachment:
      description: Describes a core network Connect attachment.
      type: object
      properties:
        Attachment:
          $ref: "#/components/schemas/Attachment"
          description: The attachment details.
        TransportAttachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The ID of the transport attachment.
        Options:
          $ref: "#/components/schemas/ConnectAttachmentOptions"
          description: Options for connecting an attachment.
    IPAddress:
      type: string
      minLength: 1
      maxLength: 50
      pattern: "[\\s\\S]*"
    BgpOptions:
      description: Describes the BGP options.
      type: object
      properties:
        PeerAsn:
          $ref: "#/components/schemas/Long"
          description: The Peer ASN of the BGP.
    Long:
      type: integer
      format: int64
    ConstrainedStringList:
      type: array
      items:
        $ref: "#/components/schemas/ConstrainedString"
    SubnetArn:
      type: string
      minLength: 0
      maxLength: 500
      pattern: ^arn:[^:]{1,63}:ec2:[^:]{0,63}:[^:]{0,63}:subnet\/subnet-[0-9a-f]{8,17}$|^$
    CreateConnectPeerResponse:
      type: object
      properties:
        ConnectPeer:
          $ref: "#/components/schemas/ConnectPeer"
          description: The response to the request.
    ConnectPeer:
      description: Describes a core network Connect peer.
      type: object
      properties:
        CoreNetworkId:
          $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of a core network.
        ConnectAttachmentId:
          $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment to connect.
        ConnectPeerId:
          $ref: "#/components/schemas/ConnectPeerId"
          description: The ID of the Connect peer.
        EdgeLocation:
          $ref: "#/components/schemas/ExternalRegionCode"
          description: The Connect peer Regions where edges are located.
        State:
          $ref: "#/components/schemas/ConnectPeerState"
          description: The state of the Connect peer.
        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the Connect peer was created.
        Configuration:
          $ref: "#/components/schemas/ConnectPeerConfiguration"
          description: The configuration of the Connect peer.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: The list of key-value tags associated with the Connect peer.
        SubnetArn:
          $ref: "#/components/schemas/SubnetArn"
          description: The subnet ARN for the Connect peer. This only applies only when the protocol is NO_ENCAP.
        LastModificationErrors:
          $ref: "#/components/schemas/ConnectPeerErrorList"
          description: Describes the error associated with the attachment request.
    ConnectPeerState:
      type: string
      enum:
        - CREATING
        - FAILED
        - AVAILABLE
        - DELETING
    ConnectPeerConfiguration:
      description: Describes a core network Connect peer configuration.
      type: object
      properties:
        CoreNetworkAddress:
