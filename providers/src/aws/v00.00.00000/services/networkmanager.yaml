openapi: 3.0.0
info:
  version: "2019-07-05"
  title: AWS Network Manager
  description: AWS Network Manager
  x-serviceName: networkmanager
  x-serviceAlias: networkmanager
  x-protocol: rest-json
  x-apiVersion: "2019-07-05"
  x-endpointPrefix: networkmanager
  x-jsonVersion: "1.1"
servers:
  - url: https://networkmanager.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for networkmanager
paths:
  /attachments/{attachment_id}/accept:
    post:
      operationId: AcceptAttachment
      description: Accepts a core network attachment request. Once the attachment request is accepted by a core network owner, the attachment is created and connected to a core network.
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptAttachmentResponse"
  /global-networks/{global_network_id}/connect-peer-associations:
    post:
      operationId: AssociateConnectPeer
      description: Associates a core network Connect peer with a device and optionally, with a link. If you specify a link, it must be associated with the specified device. You can only associate core network Connect peers that have been created on a core network Connect attachment on a core network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of your global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConnectPeerId:
                  $ref: "#/components/schemas/ConnectPeerId"
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                LinkId:
                  $ref: "#/components/schemas/LinkId"
              required:
                - ConnectPeerId
                - DeviceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateConnectPeerResponse"
    get:
      operationId: GetConnectPeerAssociations
      description: Returns information about a core network Connect peer associations.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: connectPeerIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectPeerIdList"
          description: The IDs of the Connect peers.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectPeerAssociationsResponse"
  /global-networks/{global_network_id}/customer-gateway-associations:
    post:
      operationId: AssociateCustomerGateway
      description: Associates a customer gateway with a device and optionally, with a link. If you specify a link, it must be associated with the specified device. You can only associate customer gateways that are connected to a VPN attachment on a transit gateway or core network registered in your global network. When you register a transit gateway or core network, customer gateways that are connected to the transit gateway are automatically included in the global network. To list customer gateways that are connected to a transit gateway, use the DescribeVpnConnections EC2 API and filter by transit-gateway-id. You cannot associate a customer gateway with more than one device and link.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerGatewayArn:
                  $ref: "#/components/schemas/CustomerGatewayArn"
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                LinkId:
                  $ref: "#/components/schemas/LinkId"
              required:
                - CustomerGatewayArn
                - DeviceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateCustomerGatewayResponse"
    get:
      operationId: GetCustomerGatewayAssociations
      description: Gets the association information for customer gateways that are associated with devices and links in your global network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: customerGatewayArns
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CustomerGatewayArnList"
          description: One or more customer gateway Amazon Resource Names (ARNs). The maximum is 10.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCustomerGatewayAssociationsResponse"
  /global-networks/{global_network_id}/link-associations:
    post:
      operationId: AssociateLink
      description: Associates a link to a device. A device can be associated to multiple links and a link can be associated to multiple devices. The device and link must be in the same global network and the same site.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                LinkId:
                  $ref: "#/components/schemas/LinkId"
              required:
                - DeviceId
                - LinkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateLinkResponse"
    delete:
      operationId: DisassociateLink
      description: Disassociates an existing device from a link. You must first disassociate any customer gateways that are associated with the link.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: deviceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        - name: linkId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateLinkResponse"
    get:
      operationId: GetLinkAssociations
      description: Gets the link associations for a device or a link. Either the device ID or the link ID must be specified.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: deviceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        - name: linkId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LinkId"
          description: The ID of the link.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLinkAssociationsResponse"
  /global-networks/{global_network_id}/transit-gateway-connect-peer-associations:
    post:
      operationId: AssociateTransitGatewayConnectPeer
      description: Associates a transit gateway Connect peer with a device, and optionally, with a link. If you specify a link, it must be associated with the specified device. You can only associate transit gateway Connect peers that have been created on a transit gateway that's registered in your global network. You cannot associate a transit gateway Connect peer with more than one device and link.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                TransitGatewayConnectPeerArn:
                  $ref: "#/components/schemas/TransitGatewayConnectPeerArn"
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                LinkId:
                  $ref: "#/components/schemas/LinkId"
              required:
                - TransitGatewayConnectPeerArn
                - DeviceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateTransitGatewayConnectPeerResponse"
    get:
      operationId: GetTransitGatewayConnectPeerAssociations
      description: Gets information about one or more of your transit gateway Connect peer associations in a global network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: transitGatewayConnectPeerArns
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TransitGatewayConnectPeerArnList"
          description: One or more transit gateway Connect peer Amazon Resource Names (ARNs).
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTransitGatewayConnectPeerAssociationsResponse"
  /connect-attachments:
    post:
      operationId: CreateConnectAttachment
      description: Creates a core network Connect attachment from a specified core network attachment. A core network Connect attachment is a GRE-based tunnel attachment that you can use to establish a connection between a core network and an appliance. A core network Connect attachment uses an existing VPC attachment as the underlying transport mechanism.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CoreNetworkId:
                  $ref: "#/components/schemas/CoreNetworkId"
                EdgeLocation:
                  $ref: "#/components/schemas/ExternalRegionCode"
                TransportAttachmentId:
                  $ref: "#/components/schemas/AttachmentId"
                RoutingPolicyLabel:
                  $ref: "#/components/schemas/ConstrainedString"
                Options:
                  $ref: "#/components/schemas/ConnectAttachmentOptions"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CoreNetworkId
                - EdgeLocation
                - TransportAttachmentId
                - Options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectAttachmentResponse"
  /connect-peers:
    post:
      operationId: CreateConnectPeer
      description: Creates a core network Connect peer for a specified core network connect attachment between a core network and an appliance. The peer address and transit gateway address must be the same IP address family (IPv4 or IPv6).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ConnectAttachmentId:
                  $ref: "#/components/schemas/AttachmentId"
                CoreNetworkAddress:
                  $ref: "#/components/schemas/IPAddress"
                PeerAddress:
                  $ref: "#/components/schemas/IPAddress"
                BgpOptions:
                  $ref: "#/components/schemas/BgpOptions"
                InsideCidrBlocks:
                  $ref: "#/components/schemas/ConstrainedStringList"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                SubnetArn:
                  $ref: "#/components/schemas/SubnetArn"
              required:
                - ConnectAttachmentId
                - PeerAddress
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectPeerResponse"
    get:
      operationId: ListConnectPeers
      description: Returns a list of core network Connect peers.
      parameters:
        - name: coreNetworkId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CoreNetworkId"
          description: The ID of a core network.
        - name: connectAttachmentId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AttachmentId"
          description: The ID of the attachment.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectPeersResponse"
  /global-networks/{global_network_id}/connections:
    post:
      operationId: CreateConnection
      description: Creates a connection between two devices. The devices can be a physical or virtual appliance that connects to a third-party appliance in a VPC, or a physical appliance that connects to another physical appliance in an on-premises network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                DeviceId:
                  $ref: "#/components/schemas/DeviceId"
                ConnectedDeviceId:
                  $ref: "#/components/schemas/DeviceId"
                LinkId:
                  $ref: "#/components/schemas/LinkId"
                ConnectedLinkId:
                  $ref: "#/components/schemas/LinkId"
                Description:
                  $ref: "#/components/schemas/ConstrainedString"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - DeviceId
                - ConnectedDeviceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionResponse"
    get:
      operationId: GetConnections
      description: Gets information about one or more of your connections in a global network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: connectionIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConnectionIdList"
          description: One or more connection IDs.
        - name: deviceId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceId"
          description: The ID of the device.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionsResponse"
  /core-networks:
    post:
      operationId: CreateCoreNetwork
      description: Creates a core network as part of your global network, and optionally, with a core network policy.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                GlobalNetworkId:
                  $ref: "#/components/schemas/GlobalNetworkId"
                Description:
                  $ref: "#/components/schemas/ConstrainedString"
                Tags:
                  $ref: "#/components/schemas/TagList"
                PolicyDocument:
                  $ref: "#/components/schemas/CoreNetworkPolicyDocument"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - GlobalNetworkId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCoreNetworkResponse"
    get:
      operationId: ListCoreNetworks
      description: Returns a list of owned and shared core networks.
      parameters:
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCoreNetworksResponse"
  /prefix-list:
    post:
      operationId: CreateCoreNetworkPrefixListAssociation
      description: Creates an association between a core network and a prefix list for routing control.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CoreNetworkId:
                  $ref: "#/components/schemas/CoreNetworkId"
                PrefixListArn:
                  $ref: "#/components/schemas/PrefixListArn"
                PrefixListAlias:
                  $ref: "#/components/schemas/ConstrainedString"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CoreNetworkId
                - PrefixListArn
                - PrefixListAlias
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCoreNetworkPrefixListAssociationResponse"
  /global-networks/{global_network_id}/devices:
    post:
      operationId: CreateDevice
      description: Creates a new device in a global network. If you specify both a site ID and a location, the location of the site is used for visualization in the Network Manager console.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                AWSLocation:
                  $ref: "#/components/schemas/AWSLocation"
                Description:
                  $ref: "#/components/schemas/ConstrainedString"
                Type:
                  $ref: "#/components/schemas/ConstrainedString"
                Vendor:
                  $ref: "#/components/schemas/ConstrainedString"
                Model:
                  $ref: "#/components/schemas/ConstrainedString"
                SerialNumber:
                  $ref: "#/components/schemas/ConstrainedString"
                Location:
                  $ref: "#/components/schemas/Location"
                SiteId:
                  $ref: "#/components/schemas/SiteId"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeviceResponse"
    get:
      operationId: GetDevices
      description: Gets information about one or more of your devices in a global network.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: deviceIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/DeviceIdList"
          description: One or more device IDs. The maximum is 10.
        - name: siteId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID of the site.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDevicesResponse"
  /direct-connect-gateway-attachments:
    post:
      operationId: CreateDirectConnectGatewayAttachment
      description: Creates an Amazon Web Services Direct Connect gateway attachment
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CoreNetworkId:
                  $ref: "#/components/schemas/CoreNetworkId"
                DirectConnectGatewayArn:
                  $ref: "#/components/schemas/DirectConnectGatewayArn"
                RoutingPolicyLabel:
                  $ref: "#/components/schemas/ConstrainedString"
                EdgeLocations:
                  $ref: "#/components/schemas/ExternalRegionCodeList"
                Tags:
                  $ref: "#/components/schemas/TagList"
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - CoreNetworkId
                - DirectConnectGatewayArn
                - EdgeLocations
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDirectConnectGatewayAttachmentResponse"
  /global-networks:
    post:
      operationId: CreateGlobalNetwork
      description: Creates a new, empty global network.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ConstrainedString"
                Tags:
                  $ref: "#/components/schemas/TagList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGlobalNetworkResponse"
    get:
      operationId: DescribeGlobalNetworks
      description: Describes one or more global networks. By default, all global networks are described. To describe the objects in your global network, you must use the appropriate Get* action. For example, to list the transit gateways in your global network, use GetTransitGatewayRegistrations.
      parameters:
        - name: globalNetworkIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/GlobalNetworkIdList"
          description: The IDs of one or more global networks. The maximum is 10.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeGlobalNetworksResponse"
  /global-networks/{global_network_id}/links:
    post:
      operationId: CreateLink
      description: Creates a new link for a specified site.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Description:
                  $ref: "#/components/schemas/ConstrainedString"
                Type:
                  $ref: "#/components/schemas/ConstrainedString"
                Bandwidth:
                  $ref: "#/components/schemas/Bandwidth"
                Provider:
                  $ref: "#/components/schemas/ConstrainedString"
                SiteId:
                  $ref: "#/components/schemas/SiteId"
                Tags:
                  $ref: "#/components/schemas/TagList"
              required:
                - SiteId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLinkResponse"
    get:
      operationId: GetLinks
      description: Gets information about one or more links in a specified global network. If you specify the site ID, you cannot specify the type or provider in the same request. You can specify the type and provider in the same request.
      parameters:
        - name: global_network_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/GlobalNetworkId"
          description: The ID of the global network.
        - name: linkIds
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/LinkIdList"
          description: One or more link IDs. The maximum is 10.
        - name: siteId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/SiteId"
          description: The ID of the site.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConstrainedString"
          description: The link type.
        - name: provider
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ConstrainedString"
          description: The link provider.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return.
        - name: nextToken
