      description: Basic details used in creating a response plan. The response plan is then used to create an incident record.
      type: object
      properties:
        dedupeString:
          $ref: "#/components/schemas/DedupeString"
          description: The string Incident Manager uses to prevent the same root cause from creating multiple incidents in the same account. A deduplication string is a term or phrase the system uses to check for duplicate incidents. If you specify a deduplication string, Incident Manager searches for open incidents that contain the same string in the dedupeString field when it creates the incident. If a duplicate is detected, Incident Manager deduplicates the newer incident into the existing incident. By default, Incident Manager automatically deduplicates multiple incidents created by the same Amazon CloudWatch alarm or Amazon EventBridge event. You don't have to enter your own deduplication string to prevent duplication for these resource types.
        impact:
          $ref: "#/components/schemas/Impact"
          description: The impact of the incident on your customers and applications. Supported impact codes 1 - Critical 2 - High 3 - Medium 4 - Low 5 - No Impact
        incidentTags:
          type: object
          properties: {}
          description: Tags to assign to the template. When the StartIncident API action is called, Incident Manager assigns the tags specified in the template to the incident.
        notificationTargets:
          $ref: "#/components/schemas/NotificationTargetSet"
          description: The Amazon SNS targets that are notified when updates are made to an incident.
        summary:
          $ref: "#/components/schemas/IncidentSummary"
          description: The summary of the incident. The summary is a brief synopsis of what occurred, what's currently happening, and context.
        title_:
          $ref: "#/components/schemas/IncidentTitle"
          description: The title of the incident.
      required:
        - impact
        - title_
