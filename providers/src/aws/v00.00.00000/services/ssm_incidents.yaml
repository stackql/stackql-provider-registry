openapi: 3.0.0
info:
  version: "2018-05-10"
  title: AWS Systems Manager Incident Manager
  description: AWS Systems Manager Incident Manager
  x-serviceName: ssm-incidents
  x-serviceAlias: ssm_incidents
  x-protocol: rest-json
  x-apiVersion: "2018-05-10"
  x-endpointPrefix: ssm-incidents
  x-jsonVersion: "1.1"
servers:
  - url: https://ssm-incidents.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for ssm-incidents
paths:
  /batchGetIncidentFindings:
    post:
      operationId: BatchGetIncidentFindings
      description: Retrieves details about all specified findings for an incident, including descriptive details about each finding. A finding represents a recent application environment change made by an CodeDeploy deployment or an CloudFormation stack creation or update that can be investigated as a potential cause of the incident.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                findingIds:
                  $ref: "#/components/schemas/FindingIdList"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - findingIds
                - incidentRecordArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetIncidentFindingsOutput"
  /createReplicationSet:
    post:
      operationId: CreateReplicationSet
      description: A replication set replicates and encrypts your data to the provided Regions with the provided KMS key.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                regions:
                  $ref: "#/components/schemas/RegionMapInput"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - regions
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReplicationSetOutput"
  /createResponsePlan:
    post:
      operationId: CreateResponsePlan
      description: Creates a response plan that automates the initial response to incidents. A response plan engages contacts, starts chat channel collaboration, and initiates runbooks at the beginning of an incident.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actions:
                  $ref: "#/components/schemas/ActionsList"
                chatChannel:
                  $ref: "#/components/schemas/ChatChannel"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                displayName:
                  $ref: "#/components/schemas/ResponsePlanDisplayName"
                engagements:
                  $ref: "#/components/schemas/EngagementSet"
                incidentTemplate:
                  $ref: "#/components/schemas/IncidentTemplate"
                integrations:
                  $ref: "#/components/schemas/Integrations"
                name:
                  $ref: "#/components/schemas/ResponsePlanName"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - incidentTemplate
                - name
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateResponsePlanOutput"
  /createTimelineEvent:
    post:
      operationId: CreateTimelineEvent
      description: Creates a custom timeline event on the incident details page of an incident record. Incident Manager automatically creates timeline events that mark key moments during an incident. You can create custom timeline events to mark important events that Incident Manager can detect automatically.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                eventData:
                  $ref: "#/components/schemas/EventData"
                eventReferences:
                  $ref: "#/components/schemas/EventReferenceList"
                eventTime:
                  $ref: "#/components/schemas/Timestamp"
                eventType:
                  $ref: "#/components/schemas/TimelineEventType"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - eventData
                - eventTime
                - eventType
                - incidentRecordArn
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTimelineEventOutput"
  /deleteIncidentRecord:
    post:
      operationId: DeleteIncidentRecord
      description: Delete an incident record from Incident Manager.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/Arn"
              required:
                - arn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteIncidentRecordOutput"
  /deleteReplicationSet:
    post:
      operationId: DeleteReplicationSet
      description: Deletes all Regions in your replication set. Deleting the replication set deletes all Incident Manager data.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the replication set you're deleting.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteReplicationSetOutput"
  /deleteResourcePolicy:
    post:
      operationId: DeleteResourcePolicy
      description: Deletes the resource policy that Resource Access Manager uses to share your Incident Manager resource.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policyId:
                  $ref: "#/components/schemas/PolicyId"
                resourceArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - policyId
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResourcePolicyOutput"
  /deleteResponsePlan:
    post:
      operationId: DeleteResponsePlan
      description: Deletes the specified response plan. Deleting a response plan stops all linked CloudWatch alarms and EventBridge events from creating an incident with this response plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/Arn"
              required:
                - arn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponsePlanOutput"
  /deleteTimelineEvent:
    post:
      operationId: DeleteTimelineEvent
      description: Deletes a timeline event from an incident.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  $ref: "#/components/schemas/UUID"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - eventId
                - incidentRecordArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTimelineEventOutput"
  /getIncidentRecord:
    get:
      operationId: GetIncidentRecord
      description: Returns the details for the specified incident record.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the incident record.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetIncidentRecordOutput"
  /getReplicationSet:
    get:
      operationId: GetReplicationSet
      description: Retrieve your Incident Manager replication set.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the replication set you want to retrieve.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetReplicationSetOutput"
  /getResourcePolicies:
    post:
      operationId: GetResourcePolicies
      description: Retrieves the resource policies attached to the specified response plan.
      parameters:
        - name: resourceArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the response plan with the attached resource policy.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResourcePoliciesOutput"
  /getResponsePlan:
    get:
      operationId: GetResponsePlan
      description: Retrieves the details of the specified response plan.
      parameters:
        - name: arn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the response plan.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetResponsePlanOutput"
  /getTimelineEvent:
    get:
      operationId: GetTimelineEvent
      description: Retrieves a timeline event based on its ID and incident record.
      parameters:
        - name: eventId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
          description: The ID of the event. You can get an event's ID when you create it, or by using ListTimelineEvents.
        - name: incidentRecordArn
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/Arn"
          description: The Amazon Resource Name (ARN) of the incident that includes the timeline event.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTimelineEventOutput"
  /listIncidentFindings:
    post:
      operationId: ListIncidentFindings
      description: Retrieves a list of the IDs of findings, plus their last modified times, that have been identified for a specified incident. A finding represents a recent application environment change made by an CloudFormation stack creation or update or an CodeDeploy deployment that can be investigated as a potential cause of the incident.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/ListIncidentFindingsInputMaxResultsInteger"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - incidentRecordArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIncidentFindingsOutput"
  /listIncidentRecords:
    post:
      operationId: ListIncidentRecords
      description: Lists all incident records in your account. Use this command to retrieve the Amazon Resource Name (ARN) of the incident record you want to update.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/FilterList"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIncidentRecordsOutput"
  /listRelatedItems:
    post:
      operationId: ListRelatedItems
      description: List all related items for an incident record.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
              required:
                - incidentRecordArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRelatedItemsOutput"
  /listReplicationSets:
    post:
      operationId: ListReplicationSets
      description: Lists details about the replication set configured in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReplicationSetsOutputDisplay"
  /listResponsePlans:
    post:
      operationId: ListResponsePlans
      description: Lists all response plans in your account.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponsePlansOutput"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags that are attached to the specified response plan or incident.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the response plan or incident.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Adds a tag to a response plan.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the response plan you're adding the tags to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes a tag from a resource.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String"
          description: The Amazon Resource Name (ARN) of the response plan you're removing a tag from.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The name of the tag to remove from the response plan.
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /listTimelineEvents:
    post:
      operationId: ListTimelineEvents
      description: Lists timeline events for the specified incident record.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  $ref: "#/components/schemas/FilterList"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                sortBy:
                  $ref: "#/components/schemas/TimelineEventSort"
                sortOrder:
                  $ref: "#/components/schemas/SortOrder"
              required:
                - incidentRecordArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTimelineEventsOutput"
  /putResourcePolicy:
    post:
      operationId: PutResourcePolicy
      description: Adds a resource policy to the specified response plan. The resource policy is used to share the response plan using Resource Access Manager (RAM). For more information about cross-account sharing, see Cross-Region and cross-account incident management.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                policy:
                  $ref: "#/components/schemas/Policy"
                resourceArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - policy
                - resourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutResourcePolicyOutput"
  /startIncident:
    post:
      operationId: StartIncident
      description: Used to start an incident from CloudWatch alarms, EventBridge events, or manually.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                impact:
                  $ref: "#/components/schemas/Impact"
                relatedItems:
                  $ref: "#/components/schemas/RelatedItemList"
                responsePlanArn:
                  $ref: "#/components/schemas/Arn"
                title:
                  $ref: "#/components/schemas/IncidentTitle"
                triggerDetails:
                  $ref: "#/components/schemas/TriggerDetails"
              required:
                - responsePlanArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartIncidentOutput"
  /updateDeletionProtection:
    post:
      operationId: UpdateDeletionProtection
      description: Update deletion protection to either allow or deny deletion of the final Region in a replication set.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                deletionProtected:
                  $ref: "#/components/schemas/Boolean"
              required:
                - arn
                - deletionProtected
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDeletionProtectionOutput"
  /updateIncidentRecord:
    post:
      operationId: UpdateIncidentRecord
      description: Update the details of an incident record. You can use this operation to update an incident record from the defined chat channel. For more information about using actions in chat channels, see Interacting through chat.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/Arn"
                chatChannel:
                  $ref: "#/components/schemas/ChatChannel"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                impact:
                  $ref: "#/components/schemas/Impact"
                notificationTargets:
                  $ref: "#/components/schemas/NotificationTargetSet"
                status:
                  $ref: "#/components/schemas/IncidentRecordStatus"
                summary:
                  $ref: "#/components/schemas/IncidentSummary"
                title:
                  $ref: "#/components/schemas/IncidentTitle"
              required:
                - arn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateIncidentRecordOutput"
  /updateRelatedItems:
    post:
      operationId: UpdateRelatedItems
      description: Add or remove related items from the related items tab of an incident record.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
                relatedItemsUpdate:
                  $ref: "#/components/schemas/RelatedItemsUpdate"
              required:
                - incidentRecordArn
                - relatedItemsUpdate
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRelatedItemsOutput"
  /updateReplicationSet:
    post:
      operationId: UpdateReplicationSet
      description: Add or delete Regions from your replication set.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actions:
                  $ref: "#/components/schemas/UpdateReplicationSetInputActionsList"
                arn:
                  $ref: "#/components/schemas/Arn"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - actions
                - arn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReplicationSetOutput"
  /updateResponsePlan:
    post:
      operationId: UpdateResponsePlan
      description: Updates the specified response plan.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                actions:
                  $ref: "#/components/schemas/ActionsList"
                arn:
                  $ref: "#/components/schemas/Arn"
                chatChannel:
                  $ref: "#/components/schemas/ChatChannel"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                displayName:
                  $ref: "#/components/schemas/ResponsePlanDisplayName"
                engagements:
                  $ref: "#/components/schemas/EngagementSet"
                incidentTemplateDedupeString:
                  $ref: "#/components/schemas/DedupeString"
                incidentTemplateImpact:
                  $ref: "#/components/schemas/Impact"
                incidentTemplateNotificationTargets:
                  $ref: "#/components/schemas/NotificationTargetSet"
                incidentTemplateSummary:
                  $ref: "#/components/schemas/IncidentSummary"
                incidentTemplateTags:
                  $ref: "#/components/schemas/TagMapUpdate"
                incidentTemplateTitle:
                  $ref: "#/components/schemas/IncidentTitle"
                integrations:
                  $ref: "#/components/schemas/Integrations"
              required:
                - arn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponsePlanOutput"
  /updateTimelineEvent:
    post:
      operationId: UpdateTimelineEvent
      description: Updates a timeline event. You can update events of type Custom Event.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                eventData:
                  $ref: "#/components/schemas/EventData"
                eventId:
                  $ref: "#/components/schemas/UUID"
                eventReferences:
                  $ref: "#/components/schemas/EventReferenceList"
                eventTime:
                  $ref: "#/components/schemas/Timestamp"
                eventType:
                  $ref: "#/components/schemas/TimelineEventType"
                incidentRecordArn:
                  $ref: "#/components/schemas/Arn"
              required:
                - eventId
                - incidentRecordArn
      responses:
        "204":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTimelineEventOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    FindingIdList:
      type: array
      items:
        $ref: "#/components/schemas/FindingId"
    FindingId:
      type: string
      minLength: 0
      maxLength: 128
    Arn:
      type: string
      minLength: 0
      maxLength: 1000
      pattern: ^arn:aws(-cn|-us-gov)?:[a-z0-9-]*:[a-z0-9-]*:([0-9]{12})?:.+$
    BatchGetIncidentFindingsOutput:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchGetIncidentFindingsErrorList"
          description: A list of errors encountered during the operation.
        findings:
          $ref: "#/components/schemas/FindingList"
          description: Information about the requested findings.
      required:
        - errors
        - findings
    BatchGetIncidentFindingsErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetIncidentFindingsError"
    BatchGetIncidentFindingsError:
      description: Details about an error returned for a BatchGetIncidentFindings operation.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/String"
          description: The code associated with an error that was returned for a BatchGetIncidentFindings operation.
        findingId:
          $ref: "#/components/schemas/FindingId"
