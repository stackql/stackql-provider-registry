      description: The metric policy that is associated with the container. A metric policy allows AWS Elemental MediaStore to send metrics to Amazon CloudWatch. In the policy, you must indicate whether you want MediaStore to send container-level metrics. You can also include rules to define groups of objects that you want MediaStore to send object-level metrics for. To view examples of how to construct a metric policy for your use case, see Example Metric Policies.
      type: object
      properties:
        ContainerLevelMetrics:
          $ref: "#/components/schemas/ContainerLevelMetrics"
          description: A setting to enable or disable metrics at the container level.
        MetricPolicyRules:
          $ref: "#/components/schemas/MetricPolicyRules"
          description: A parameter that holds an array of rules that enable metrics at the object level. This parameter is optional, but if you choose to include it, you must also include at least one rule. By default, you can include up to five rules. You can also request a quota increase to allow up to 300 rules per policy.
      required:
        - ContainerLevelMetrics
    ContainerLevelMetrics:
      type: string
      enum:
        - ENABLED
        - DISABLED
    MetricPolicyRules:
      type: array
      items:
        $ref: "#/components/schemas/MetricPolicyRule"
    MetricPolicyRule:
      description: A setting that enables metrics at the object level. Each rule contains an object group and an object group name. If the policy includes the MetricPolicyRules parameter, you must include at least one rule. Each metric policy can include up to five rules by default. You can also request a quota increase to allow up to 300 rules per policy.
      type: object
      properties:
