openapi: 3.0.0
info:
  version: "2017-09-01"
  title: AWS Elemental MediaStore
  description: AWS Elemental MediaStore
  x-serviceName: mediastore
  x-serviceAlias: mediastore
  x-protocol: json
  x-apiVersion: "2017-09-01"
  x-endpointPrefix: mediastore
  x-targetPrefix: MediaStore_20170901
  x-jsonVersion: "1.1"
servers:
  - url: https://mediastore.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for mediastore
paths:
  /CreateContainer:
    post:
      operationId: CreateContainer
      description: Creates a storage container to hold objects. A container is similar to a bucket in the Amazon S3 service.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.CreateContainer
            default: MediaStore_20170901.CreateContainer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name for the container. The name must be from 1 to 255 characters. Container names must be unique to your AWS account within a specific region. As an example, you could create a container named movies in every region, as long as you don’t have an existing container with that name.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: An array of key:value pairs that you define. These values can be anything that you want. Typically, the tag key represents a category (such as "environment") and the tag value represents a specific value within that category (such as "test," "development," or "production"). You can add up to 50 tags to each container. For more information about tagging, including naming and usage conventions, see Tagging Resources in MediaStore.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateContainerOutput"
  /DeleteContainer:
    post:
      operationId: DeleteContainer
      description: Deletes the specified container. Before you make a DeleteContainer request, delete any objects in the container or in any folders in the container. You can delete only empty containers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DeleteContainer
            default: MediaStore_20170901.DeleteContainer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container to delete.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContainerOutput"
  /DeleteContainerPolicy:
    post:
      operationId: DeleteContainerPolicy
      description: Deletes the access policy that is associated with the specified container.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DeleteContainerPolicy
            default: MediaStore_20170901.DeleteContainerPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that holds the policy.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContainerPolicyOutput"
  /DeleteCorsPolicy:
    post:
      operationId: DeleteCorsPolicy
      description: Deletes the cross-origin resource sharing (CORS) configuration information that is set for the container. To use this operation, you must have permission to perform the MediaStore:DeleteCorsPolicy action. The container owner has this permission by default and can grant this permission to others.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DeleteCorsPolicy
            default: MediaStore_20170901.DeleteCorsPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container to remove the policy from.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCorsPolicyOutput"
  /DeleteLifecyclePolicy:
    post:
      operationId: DeleteLifecyclePolicy
      description: Removes an object lifecycle policy from a container. It takes up to 20 minutes for the change to take effect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DeleteLifecyclePolicy
            default: MediaStore_20170901.DeleteLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that holds the object lifecycle policy.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteLifecyclePolicyOutput"
  /DeleteMetricPolicy:
    post:
      operationId: DeleteMetricPolicy
      description: Deletes the metric policy that is associated with the specified container. If there is no metric policy associated with the container, MediaStore doesn't send metrics to CloudWatch.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DeleteMetricPolicy
            default: MediaStore_20170901.DeleteMetricPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that is associated with the metric policy that you want to delete.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMetricPolicyOutput"
  /DescribeContainer:
    post:
      operationId: DescribeContainer
      description: Retrieves the properties of the requested container. This request is commonly used to retrieve the endpoint of a container. An endpoint is a value assigned by the service when a new container is created. A container's endpoint does not change after it has been assigned. The DescribeContainer request returns a single Container object based on ContainerName. To return all Container objects that are associated with a specified AWS account, use ListContainers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.DescribeContainer
            default: MediaStore_20170901.DescribeContainer
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container to query.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeContainerOutput"
  /GetContainerPolicy:
    post:
      operationId: GetContainerPolicy
      description: Retrieves the access policy for the specified container. For information about the data that is included in an access policy, see the AWS Identity and Access Management User Guide.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.GetContainerPolicy
            default: MediaStore_20170901.GetContainerPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetContainerPolicyOutput"
  /GetCorsPolicy:
    post:
      operationId: GetCorsPolicy
      description: Returns the cross-origin resource sharing (CORS) configuration information that is set for the container. To use this operation, you must have permission to perform the MediaStore:GetCorsPolicy action. By default, the container owner has this permission and can grant it to others.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.GetCorsPolicy
            default: MediaStore_20170901.GetCorsPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that the policy is assigned to.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCorsPolicyOutput"
  /GetLifecyclePolicy:
    post:
      operationId: GetLifecyclePolicy
      description: Retrieves the object lifecycle policy that is assigned to a container.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.GetLifecyclePolicy
            default: MediaStore_20170901.GetLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that the object lifecycle policy is assigned to.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetLifecyclePolicyOutput"
  /GetMetricPolicy:
    post:
      operationId: GetMetricPolicy
      description: Returns the metric policy for the specified container.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.GetMetricPolicy
            default: MediaStore_20170901.GetMetricPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that is associated with the metric policy.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMetricPolicyOutput"
  /ListContainers:
    post:
      operationId: ListContainers
      description: Lists the properties of all containers in AWS Elemental MediaStore. You can query to receive all the containers in one response. Or you can include the MaxResults parameter to receive a limited number of containers in each response. In this case, the response includes a token. To get the next set of containers, send the command again, this time with the NextToken parameter (with the returned token as its value). The next set of responses appears, with a token if there are still more containers to receive. See also DescribeContainer, which gets the properties of one container.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.ListContainers
            default: MediaStore_20170901.ListContainers
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                NextToken:
                  $ref: "#/components/schemas/PaginationToken"
                  description: Only if you used MaxResults in the first command, enter the token (which was included in the previous response) to obtain the next set of containers. This token is included in a response only if there actually are more containers to list.
                MaxResults:
                  $ref: "#/components/schemas/ContainerListLimit"
                  description: Enter the maximum number of containers in the response. Use from 1 to 255 characters.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListContainersOutput"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Returns a list of the tags assigned to the specified container.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.ListTagsForResource
            default: MediaStore_20170901.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ContainerARN"
                  description: The Amazon Resource Name (ARN) for the container.
              required:
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceOutput"
  /PutContainerPolicy:
    post:
      operationId: PutContainerPolicy
      description: Creates an access policy for the specified container to restrict the users and clients that can access it. For information about the data that is included in an access policy, see the AWS Identity and Access Management User Guide. For this release of the REST API, you can create only one policy for a container. If you enter PutContainerPolicy twice, the second command modifies the existing policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.PutContainerPolicy
            default: MediaStore_20170901.PutContainerPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container.
                Policy:
                  $ref: "#/components/schemas/ContainerPolicy"
                  description: "The contents of the policy, which includes the following: One Version tag One Statement tag that contains the standard tags for the policy."
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutContainerPolicyOutput"
  /PutCorsPolicy:
    post:
      operationId: PutCorsPolicy
      description: Sets the cross-origin resource sharing (CORS) configuration on a container so that the container can service cross-origin requests. For example, you might want to enable a request whose origin is http://www.example.com to access your AWS Elemental MediaStore container at my.example.container.com by using the browser's XMLHttpRequest capability. To enable CORS on a container, you attach a CORS policy to the container. In the CORS policy, you configure rules that identify origins and the HTTP methods that can be executed on your container. The policy can contain up to 398,000 characters. You can add up to 100 rules to a CORS policy. If more than one rule applies, the service uses the first applicable rule listed. To learn more about CORS, see Cross-Origin Resource Sharing (CORS) in AWS Elemental MediaStore.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.PutCorsPolicy
            default: MediaStore_20170901.PutCorsPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that you want to assign the CORS policy to.
                CorsPolicy:
                  $ref: "#/components/schemas/CorsPolicy"
                  description: The CORS policy to apply to the container.
              required:
                - ContainerName
                - CorsPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutCorsPolicyOutput"
  /PutLifecyclePolicy:
    post:
      operationId: PutLifecyclePolicy
      description: Writes an object lifecycle policy to a container. If the container already has an object lifecycle policy, the service replaces the existing policy with the new policy. It takes up to 20 minutes for the change to take effect. For information about how to construct an object lifecycle policy, see Components of an Object Lifecycle Policy.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.PutLifecyclePolicy
            default: MediaStore_20170901.PutLifecyclePolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that you want to assign the object lifecycle policy to.
                LifecyclePolicy:
                  $ref: "#/components/schemas/LifecyclePolicy"
                  description: The object lifecycle policy to apply to the container.
              required:
                - ContainerName
                - LifecyclePolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutLifecyclePolicyOutput"
  /PutMetricPolicy:
    post:
      operationId: PutMetricPolicy
      description: The metric policy that you want to add to the container. A metric policy allows AWS Elemental MediaStore to send metrics to Amazon CloudWatch. It takes up to 20 minutes for the new policy to take effect.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.PutMetricPolicy
            default: MediaStore_20170901.PutMetricPolicy
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that you want to add the metric policy to.
                MetricPolicy:
                  $ref: "#/components/schemas/MetricPolicy"
                  description: "The metric policy that you want to associate with the container. In the policy, you must indicate whether you want MediaStore to send container-level metrics. You can also include up to five rules to define groups of objects that you want MediaStore to send object-level metrics for. If you include rules in the policy, construct each rule with both of the following: An object group that defines which objects to include in the group. The definition can be a path or a file name, but it can't have more than 900 characters. Valid characters are: a-z, A-Z, 0-9, _ (underscore), = (equal), : (colon), . (period), - (hyphen), ~ (tilde), / (forward slash), and * (asterisk). Wildcards (*) are acceptable. An object group name that allows you to refer to the object group. The name can't have more than 30 characters. Valid characters are: a-z, A-Z, 0-9, and _ (underscore)."
              required:
                - ContainerName
                - MetricPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutMetricPolicyOutput"
  /StartAccessLogging:
    post:
      operationId: StartAccessLogging
      description: Starts access logging on the specified container. When you enable access logging on a container, MediaStore delivers access logs for objects stored in that container to Amazon CloudWatch Logs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.StartAccessLogging
            default: MediaStore_20170901.StartAccessLogging
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that you want to start access logging on.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartAccessLoggingOutput"
  /StopAccessLogging:
    post:
      operationId: StopAccessLogging
      description: Stops access logging on the specified container. When you stop access logging on a container, MediaStore stops sending access logs to Amazon CloudWatch Logs. These access logs are not saved and are not retrievable.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.StopAccessLogging
            default: MediaStore_20170901.StopAccessLogging
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ContainerName:
                  $ref: "#/components/schemas/ContainerName"
                  description: The name of the container that you want to stop access logging on.
              required:
                - ContainerName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopAccessLoggingOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to the specified AWS Elemental MediaStore container. Tags are key:value pairs that you can associate with AWS resources. For example, the tag key might be "customer" and the tag value might be "companyA." You can specify one or more tags to add to each container. You can add up to 50 tags to each container. For more information about tagging, including naming and usage conventions, see Tagging Resources in MediaStore.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.TagResource
            default: MediaStore_20170901.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ContainerARN"
                  description: The Amazon Resource Name (ARN) for the container.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: "An array of key:value pairs that you want to add to the container. You need to specify only the tags that you want to add or update. For example, suppose a container already has two tags (customer:CompanyA and priority:High). You want to change the priority tag and also add a third tag (type:Contract). For TagResource, you specify the following tags: priority:Medium, type:Contract. The result is that your container has three tags: customer:CompanyA, priority:Medium, and type:Contract."
              required:
                - Resource
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from the specified container. You can specify one or more tags to remove.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - MediaStore_20170901.UntagResource
            default: MediaStore_20170901.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                Resource:
                  $ref: "#/components/schemas/ContainerARN"
                  description: The Amazon Resource Name (ARN) for the container.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A comma-separated list of keys for tags that you want to remove from the container. For example, if your container has two tags (customer:CompanyA and priority:High) and you want to remove one of the tags (priority:High), you specify the key for the tag that you want to remove (priority).
              required:
                - Resource
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ContainerName:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[\\w-]+"
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A collection of tags associated with a container. Each tag consists of a key:value pair, which can be anything you define. Typically, the tag key represents a category (such as "environment") and the tag value represents a specific value within that category (such as "test," "development," or "production"). You can add up to 50 tags to each container. For more information about tagging, including naming and usage conventions, see Tagging Resources in MediaStore.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Part of the key:value pair that defines a tag. You can use a tag key to describe a category of information, such as "customer." Tag keys are case-sensitive.
        Value:
          $ref: "#/components/schemas/TagValue"
