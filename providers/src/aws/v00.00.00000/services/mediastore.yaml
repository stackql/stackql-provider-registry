      required:
        - Container
    Container:
      description: This section describes operations that you can perform on an AWS Elemental MediaStore container.
      type: object
      properties:
        Endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: The DNS endpoint of the container. Use the endpoint to identify the specific container when sending requests to the data plane. The service assigns this value when the container is created. Once the value has been assigned, it does not change.
        CreationTime:
          $ref: "#/components/schemas/TimeStamp"
          description: Unix timestamp.
        ARN:
          $ref: "#/components/schemas/ContainerARN"
          description: "The Amazon Resource Name (ARN) of the container. The ARN has the following format: arn:aws:`<region>`:<account that owns this container>:container/<name of container> For example: arn:aws:mediastore:us-west-2:111122223333:container/movies"
        Name:
          $ref: "#/components/schemas/ContainerName"
          description: The name of the container.
        Status:
          $ref: "#/components/schemas/ContainerStatus"
          description: "The status of container creation or deletion. The status is one of the following: CREATING, ACTIVE, or DELETING. While the service is creating the container, the status is CREATING. When the endpoint is available, the status changes to ACTIVE."
        AccessLoggingEnabled:
          $ref: "#/components/schemas/ContainerAccessLoggingEnabled"
          description: The state of access logging on the container. This value is false by default, indicating that AWS Elemental MediaStore does not send access logs to Amazon CloudWatch Logs. When you enable access logging on the container, MediaStore changes this value to true, indicating that the service delivers access logs for objects stored in that container to CloudWatch Logs.
    Endpoint:
