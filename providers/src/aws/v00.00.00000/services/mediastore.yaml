      minLength: 1
      maxLength: 255
      pattern: "[\\u0009\\u000A\\u000D\\u0020-\\u00FF]+"
    TimeStamp:
      type: string
      format: date-time
    ContainerARN:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: arn:aws:mediastore:[a-z]+-[a-z]+-\d:\d{12}:container/[\w-]{1,255}
    ContainerStatus:
