        - value
    ClientRequestToken:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^[a-zA-Z0-9-]+$
    SourceRevisionOverrideList:
      type: array
      items:
        $ref: "#/components/schemas/SourceRevisionOverride"
    SourceRevisionOverride:
      description: A list that allows you to specify, or override, the source revision for a pipeline execution that's being started. A source revision is the version with all the changes to your application code, or source artifact, for the pipeline execution. For the S3_OBJECT_VERSION_ID and S3_OBJECT_KEY types of source revisions, either of the types can be used independently, or they can be used together to override the source with a specific ObjectKey and VersionID.
      type: object
      properties:
        actionName:
          $ref: "#/components/schemas/ActionName"
          description: The name of the action where the override will be applied.
        revisionType:
          $ref: "#/components/schemas/SourceRevisionType"
          description: The type of source revision, based on the source provider. For example, the revision type for the CodeCommit action provider is the commit ID.
        revisionValue:
          $ref: "#/components/schemas/Revision"
          description: The source revision, or version of your source artifact, with the changes that you want to run in the pipeline execution.
      required:
        - actionName
        - revisionType
        - revisionValue
    SourceRevisionType:
      type: string
      enum:
        - COMMIT_ID
        - IMAGE_DIGEST
        - S3_OBJECT_VERSION_ID
        - S3_OBJECT_KEY
    StartPipelineExecutionOutput:
      description: Represents the output of a StartPipelineExecution action.
      type: object
      properties:
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The unique system-generated ID of the pipeline execution that was started.
    StopPipelineExecutionOutput:
      type: object
      properties:
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The unique system-generated ID of the pipeline execution that was stopped.
    TagResourceOutput:
      type: object
    TagKeyList:
      type: array
      items:
        $ref: "#/components/schemas/TagKey"
    UntagResourceOutput:
      type: object
    UpdatePipelineOutput:
      description: Represents the output of an UpdatePipeline action.
      type: object
      properties:
        pipeline:
          $ref: "#/components/schemas/PipelineDeclaration"
          description: The structure of the updated pipeline.
