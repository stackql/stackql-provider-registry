openapi: 3.0.0
info:
  version: "2015-07-09"
  title: AWS CodePipeline
  description: AWS CodePipeline
  x-serviceName: codepipeline
  x-serviceAlias: codepipeline
  x-protocol: json
  x-apiVersion: "2015-07-09"
  x-endpointPrefix: codepipeline
  x-targetPrefix: CodePipeline_20150709
  x-jsonVersion: "1.1"
servers:
  - url: https://codepipeline.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for codepipeline
paths:
  /AcknowledgeJob:
    post:
      operationId: AcknowledgeJob
      description: Returns information about a specified job and whether that job has been received by the job worker. Used for custom actions only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.AcknowledgeJob
            default: CodePipeline_20150709.AcknowledgeJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/JobId"
                  description: The unique system-generated ID of the job for which you want to confirm receipt.
                nonce:
                  $ref: "#/components/schemas/Nonce"
                  description: A system-generated random number that CodePipeline uses to ensure that the job is being worked on by only one job worker. Get this number from the response of the PollForJobs request that returned this job.
              required:
                - jobId
                - nonce
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeJobOutput"
  /AcknowledgeThirdPartyJob:
    post:
      operationId: AcknowledgeThirdPartyJob
      description: Confirms a job worker has received the specified job. Used for partner actions only.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.AcknowledgeThirdPartyJob
            default: CodePipeline_20150709.AcknowledgeThirdPartyJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/ThirdPartyJobId"
                  description: The unique system-generated ID of the job.
                nonce:
                  $ref: "#/components/schemas/Nonce"
                  description: A system-generated random number that CodePipeline uses to ensure that the job is being worked on by only one job worker. Get this number from the response to a GetThirdPartyJobDetails request.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: The clientToken portion of the clientId and clientToken pair used to verify that the calling entity is allowed access to the job and its details.
              required:
                - jobId
                - nonce
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcknowledgeThirdPartyJobOutput"
  /CreateCustomActionType:
    post:
      operationId: CreateCustomActionType
      description: Creates a new custom action that can be used in all pipelines associated with the Amazon Web Services account. Only used for custom actions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.CreateCustomActionType
            default: CodePipeline_20150709.CreateCustomActionType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                category:
                  $ref: "#/components/schemas/ActionCategory"
                  description: The category of the custom action, such as a build action or a test action.
                provider:
                  $ref: "#/components/schemas/ActionProvider"
                  description: The provider of the service used in the custom action, such as CodeDeploy.
                version:
                  $ref: "#/components/schemas/Version"
                  description: The version identifier of the custom action.
                settings:
                  $ref: "#/components/schemas/ActionTypeSettings"
                  description: URLs that provide users information about this custom action.
                configurationProperties:
                  $ref: "#/components/schemas/ActionConfigurationPropertyList"
                  description: The configuration properties for the custom action. You can refer to a name in the configuration properties of the custom action within the URL templates by following the format of {Config:name}, as long as the configuration property is both required and not secret. For more information, see Create a Custom Action for a Pipeline.
                inputArtifactDetails:
                  $ref: "#/components/schemas/ArtifactDetails"
                  description: The details of the input artifact for the action, such as its commit ID.
                outputArtifactDetails:
                  $ref: "#/components/schemas/ArtifactDetails"
                  description: The details of the output artifact of the action, such as its commit ID.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the custom action.
              required:
                - category
                - provider
                - version
                - inputArtifactDetails
                - outputArtifactDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCustomActionTypeOutput"
  /CreatePipeline:
    post:
      operationId: CreatePipeline
      description: Creates a pipeline. In the pipeline structure, you must include either artifactStore or artifactStores in your pipeline, but you cannot use both. If you create a cross-region action in your pipeline, you must use artifactStores.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.CreatePipeline
            default: CodePipeline_20150709.CreatePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipeline:
                  $ref: "#/components/schemas/PipelineDeclaration"
                  description: Represents the structure of actions and stages to be performed in the pipeline.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags for the pipeline.
              required:
                - pipeline
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePipelineOutput"
  /DeleteCustomActionType:
    post:
      operationId: DeleteCustomActionType
      description: Marks a custom action as deleted. PollForJobs for the custom action fails after the action is marked for deletion. Used for custom actions only. To re-create a custom action after it has been deleted you must use a string in the version field that has never been used before. This string can be an incremented version number, for example. To restore a deleted custom action, use a JSON file that is identical to the deleted action, including the original string in the version field.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.DeleteCustomActionType
            default: CodePipeline_20150709.DeleteCustomActionType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                category:
                  $ref: "#/components/schemas/ActionCategory"
                  description: The category of the custom action that you want to delete, such as source or deploy.
                provider:
                  $ref: "#/components/schemas/ActionProvider"
                  description: The provider of the service used in the custom action, such as CodeDeploy.
                version:
                  $ref: "#/components/schemas/Version"
                  description: The version of the custom action to delete.
              required:
                - category
                - provider
                - version
      responses:
        "200":
          description: Success
  /DeletePipeline:
    post:
      operationId: DeletePipeline
      description: Deletes the specified pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.DeletePipeline
            default: CodePipeline_20150709.DeletePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline to be deleted.
              required:
                - name
      responses:
        "200":
          description: Success
  /DeleteWebhook:
    post:
      operationId: DeleteWebhook
      description: Deletes a previously created webhook by name. Deleting the webhook stops CodePipeline from starting a pipeline every time an external event occurs. The API returns successfully when trying to delete a webhook that is already deleted. If a deleted webhook is re-created by calling PutWebhook with the same name, it will have a different URL.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.DeleteWebhook
            default: CodePipeline_20150709.DeleteWebhook
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/WebhookName"
                  description: The name of the webhook you want to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWebhookOutput"
  /DeregisterWebhookWithThirdParty:
    post:
      operationId: DeregisterWebhookWithThirdParty
      description: Removes the connection between the webhook that was created by CodePipeline and the external tool with events to be detected. Currently supported only for webhooks that target an action type of GitHub.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.DeregisterWebhookWithThirdParty
            default: CodePipeline_20150709.DeregisterWebhookWithThirdParty
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                webhookName:
                  $ref: "#/components/schemas/WebhookName"
                  description: The name of the webhook you want to deregister.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeregisterWebhookWithThirdPartyOutput"
  /DisableStageTransition:
    post:
      operationId: DisableStageTransition
      description: Prevents artifacts in a pipeline from transitioning to the next stage in the pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.DisableStageTransition
            default: CodePipeline_20150709.DisableStageTransition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline in which you want to disable the flow of artifacts from one stage to another.
                stageName:
                  $ref: "#/components/schemas/StageName"
                  description: The name of the stage where you want to disable the inbound or outbound transition of artifacts.
                transitionType:
                  $ref: "#/components/schemas/StageTransitionType"
                  description: Specifies whether artifacts are prevented from transitioning into the stage and being processed by the actions in that stage (inbound), or prevented from transitioning from the stage after they have been processed by the actions in that stage (outbound).
                reason:
                  $ref: "#/components/schemas/DisabledReason"
                  description: The reason given to the user that a stage is disabled, such as waiting for manual approval or manual tests. This message is displayed in the pipeline console UI.
              required:
                - pipelineName
                - stageName
                - transitionType
                - reason
      responses:
        "200":
          description: Success
  /EnableStageTransition:
    post:
      operationId: EnableStageTransition
      description: Enables artifacts in a pipeline to transition to a stage in a pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.EnableStageTransition
            default: CodePipeline_20150709.EnableStageTransition
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline in which you want to enable the flow of artifacts from one stage to another.
                stageName:
                  $ref: "#/components/schemas/StageName"
                  description: The name of the stage where you want to enable the transition of artifacts, either into the stage (inbound) or from that stage to the next stage (outbound).
                transitionType:
                  $ref: "#/components/schemas/StageTransitionType"
                  description: Specifies whether artifacts are allowed to enter the stage and be processed by the actions in that stage (inbound) or whether already processed artifacts are allowed to transition to the next stage (outbound).
              required:
                - pipelineName
                - stageName
                - transitionType
      responses:
        "200":
          description: Success
  /GetActionType:
    post:
      operationId: GetActionType
      description: Returns information about an action type created for an external provider, where the action is to be used by customers of the external provider. The action can be created with any supported integration model.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetActionType
            default: CodePipeline_20150709.GetActionType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                category:
                  $ref: "#/components/schemas/ActionCategory"
                  description: "Defines what kind of action can be taken in the stage. The following are the valid values: Source Build Test Deploy Approval Invoke Compute"
                owner:
                  $ref: "#/components/schemas/ActionTypeOwner"
                  description: "The creator of an action type that was created with any supported integration model. There are two valid values: AWS and ThirdParty."
                provider:
                  $ref: "#/components/schemas/ActionProvider"
                  description: The provider of the action type being called. The provider name is specified when the action type is created.
                version:
                  $ref: "#/components/schemas/Version"
                  description: A string that describes the action type version.
              required:
                - category
                - owner
                - provider
                - version
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetActionTypeOutput"
  /GetJobDetails:
    post:
      operationId: GetJobDetails
      description: Returns information about a job. Used for custom actions only. When this API is called, CodePipeline returns temporary credentials for the S3 bucket used to store artifacts for the pipeline, if the action requires access to that S3 bucket for input or output artifacts. This API also returns any secret values defined for the action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetJobDetails
            default: CodePipeline_20150709.GetJobDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/JobId"
                  description: The unique system-generated ID for the job.
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJobDetailsOutput"
  /GetPipeline:
    post:
      operationId: GetPipeline
      description: Returns the metadata, structure, stages, and actions of a pipeline. Can be used to return the entire structure of a pipeline in JSON format, which can then be modified and used to update the pipeline structure with UpdatePipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetPipeline
            default: CodePipeline_20150709.GetPipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline for which you want to get information. Pipeline names must be unique in an Amazon Web Services account.
                version:
                  $ref: "#/components/schemas/PipelineVersion"
                  description: The version number of the pipeline. If you do not specify a version, defaults to the current version.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineOutput"
  /GetPipelineExecution:
    post:
      operationId: GetPipelineExecution
      description: Returns information about an execution of a pipeline, including details about artifacts, the pipeline execution ID, and the name, version, and status of the pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetPipelineExecution
            default: CodePipeline_20150709.GetPipelineExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline about which you want to get execution details.
                pipelineExecutionId:
                  $ref: "#/components/schemas/PipelineExecutionId"
                  description: The ID of the pipeline execution about which you want to get execution details.
              required:
                - pipelineName
                - pipelineExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineExecutionOutput"
  /GetPipelineState:
    post:
      operationId: GetPipelineState
      description: Returns information about the state of a pipeline, including the stages and actions. Values returned in the revisionId and revisionUrl fields indicate the source revision information, such as the commit ID, for the current state.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetPipelineState
            default: CodePipeline_20150709.GetPipelineState
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline about which you want to get information.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPipelineStateOutput"
  /GetThirdPartyJobDetails:
    post:
      operationId: GetThirdPartyJobDetails
      description: Requests the details of a job for a third party action. Used for partner actions only. When this API is called, CodePipeline returns temporary credentials for the S3 bucket used to store artifacts for the pipeline, if the action requires access to that S3 bucket for input or output artifacts. This API also returns any secret values defined for the action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.GetThirdPartyJobDetails
            default: CodePipeline_20150709.GetThirdPartyJobDetails
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/ThirdPartyJobId"
                  description: The unique system-generated ID used for identifying the job.
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: The clientToken portion of the clientId and clientToken pair used to verify that the calling entity is allowed access to the job and its details.
              required:
                - jobId
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetThirdPartyJobDetailsOutput"
  /ListActionExecutions:
    post:
      operationId: ListActionExecutions
      description: Lists the action executions that have occurred in a pipeline.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.ListActionExecutions
            default: CodePipeline_20150709.ListActionExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline for which you want to list action execution history.
                filter:
                  $ref: "#/components/schemas/ActionExecutionFilter"
                  description: Input information used to filter action execution history.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value. Action execution history is retained for up to 12 months, based on action execution start times. Default value is 100.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token that was returned from the previous ListActionExecutions call, which can be used to return the next set of action executions in the list.
              required:
                - pipelineName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionExecutionsOutput"
  /ListActionTypes:
    post:
      operationId: ListActionTypes
      description: Gets a summary of all CodePipeline action types associated with your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.ListActionTypes
            default: CodePipeline_20150709.ListActionTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                actionOwnerFilter:
                  $ref: "#/components/schemas/ActionOwner"
                  description: Filters the list of action types to those created by a specified entity.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An identifier that was returned from the previous list action types call, which can be used to return the next set of action types in the list.
                regionFilter:
                  $ref: "#/components/schemas/AWSRegionName"
                  description: The Region to filter on for the list of action types.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListActionTypesOutput"
  /ListDeployActionExecutionTargets:
    post:
      operationId: ListDeployActionExecutionTargets
      description: Lists the targets for the deploy action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.ListDeployActionExecutionTargets
            default: CodePipeline_20150709.ListDeployActionExecutionTargets
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline with the deploy action.
                actionExecutionId:
                  $ref: "#/components/schemas/ActionExecutionId"
                  description: The execution ID for the deploy action.
                filters:
                  $ref: "#/components/schemas/TargetFilterList"
                  description: Filters the targets for a specified deploy action.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: An identifier that was returned from the previous list action types call, which can be used to return the next set of action types in the list.
              required:
                - actionExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeployActionExecutionTargetsOutput"
  /ListPipelineExecutions:
    post:
      operationId: ListPipelineExecutions
      description: Gets a summary of the most recent executions for a pipeline. When applying the filter for pipeline executions that have succeeded in the stage, the operation returns all executions in the current pipeline version beginning on February 1, 2024.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.ListPipelineExecutions
            default: CodePipeline_20150709.ListPipelineExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipelineName:
                  $ref: "#/components/schemas/PipelineName"
                  description: The name of the pipeline for which you want to get execution summary information.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of results to return in a single call. To retrieve the remaining results, make another call with the returned nextToken value. Pipeline history is limited to the most recent 12 months, based on pipeline execution start times. Default value is 100.
                filter:
                  $ref: "#/components/schemas/PipelineExecutionFilter"
                  description: The pipeline execution to filter on.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token that was returned from the previous ListPipelineExecutions call, which can be used to return the next set of pipeline executions in the list.
              required:
                - pipelineName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPipelineExecutionsOutput"
  /ListPipelines:
    post:
      operationId: ListPipelines
      description: Gets a summary of all of the pipelines associated with your account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.ListPipelines
            default: CodePipeline_20150709.ListPipelines
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                nextToken:
