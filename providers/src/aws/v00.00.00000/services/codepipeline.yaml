        webhooks:
          $ref: "#/components/schemas/WebhookList"
          description: The JSON detail returned for each webhook in the list output for the ListWebhooks call.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: If the amount of returned information is significantly large, an identifier is also returned and can be used in a subsequent ListWebhooks call to return the next set of webhooks in the list.
    WebhookList:
      type: array
      items:
        $ref: "#/components/schemas/ListWebhookItem"
    ListWebhookItem:
      description: The detail returned for each webhook after listing webhooks, such as the webhook URL, the webhook name, and the webhook ARN.
      type: object
      properties:
        definition:
          $ref: "#/components/schemas/WebhookDefinition"
          description: The detail returned for each webhook, such as the webhook authentication type and filter rules.
        url:
          $ref: "#/components/schemas/WebhookUrl"
          description: A unique URL generated by CodePipeline. When a POST request is made to this URL, the defined pipeline is started as long as the body of the post request satisfies the defined authentication and filtering conditions. Deleting and re-creating a webhook makes the old URL invalid and generates a new one.
        errorMessage:
          $ref: "#/components/schemas/WebhookErrorMessage"
          description: The text of the error message about the webhook.
        errorCode:
          $ref: "#/components/schemas/WebhookErrorCode"
          description: The number code of the error.
        lastTriggered:
          $ref: "#/components/schemas/WebhookLastTriggered"
          description: The date and time a webhook was last successfully triggered, in timestamp format.
        arn:
          $ref: "#/components/schemas/WebhookArn"
          description: The Amazon Resource Name (ARN) of the webhook.
        tags:
          $ref: "#/components/schemas/TagList"
          description: Specifies the tags applied to the webhook.
      required:
        - definition
        - url
    WebhookDefinition:
      description: Represents information about a webhook and its definition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/WebhookName"
          description: The name of the webhook.
        targetPipeline:
          $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline you want to connect to the webhook.
        targetAction:
          $ref: "#/components/schemas/ActionName"
          description: The name of the action in a pipeline you want to connect to the webhook. The action must be from the source (first) stage of the pipeline.
        filters:
          $ref: "#/components/schemas/WebhookFilters"
          description: A list of rules applied to the body/payload sent in the POST request to a webhook URL. All defined rules must pass for the request to be accepted and the pipeline started.
        authentication:
          $ref: "#/components/schemas/WebhookAuthenticationType"
          description: Supported options are GITHUB_HMAC, IP, and UNAUTHENTICATED. When creating CodePipeline webhooks, do not use your own credentials or reuse the same secret token across multiple webhooks. For optimal security, generate a unique secret token for each webhook you create. The secret token is an arbitrary string that you provide, which GitHub uses to compute and sign the webhook payloads sent to CodePipeline, for protecting the integrity and authenticity of the webhook payloads. Using your own credentials or reusing the same token across multiple webhooks can lead to security vulnerabilities. If a secret token was provided, it will be redacted in the response. For information about the authentication scheme implemented by GITHUB_HMAC, see Securing your webhooks on the GitHub Developer website. IP rejects webhooks trigger requests unless they originate from an IP address in the IP range whitelisted in the authentication configuration. UNAUTHENTICATED accepts all webhook trigger requests regardless of origin.
        authenticationConfiguration:
          $ref: "#/components/schemas/WebhookAuthConfiguration"
          description: Properties that configure the authentication applied to incoming webhook trigger requests. The required properties depend on the authentication type. For GITHUB_HMAC, only the SecretToken property must be set. For IP, only the AllowedIPRange property must be set to a valid CIDR range. For UNAUTHENTICATED, no properties can be set.
      required:
        - name
        - targetPipeline
        - targetAction
        - filters
        - authentication
        - authenticationConfiguration
    WebhookFilters:
      type: array
      items:
        $ref: "#/components/schemas/WebhookFilterRule"
    WebhookFilterRule:
      description: The event criteria that specify when a webhook notification is sent to your URL.
      type: object
      properties:
        jsonPath:
          $ref: "#/components/schemas/JsonPath"
          description: A JsonPath expression that is applied to the body/payload of the webhook. The value selected by the JsonPath expression must match the value specified in the MatchEquals field. Otherwise, the request is ignored. For more information, see Java JsonPath implementation in GitHub.
        matchEquals:
          $ref: "#/components/schemas/MatchEquals"
          description: The value selected by the JsonPath expression must match what is supplied in the MatchEquals field. Otherwise, the request is ignored. Properties from the target action configuration can be included as placeholders in this value by surrounding the action configuration key with curly brackets. For example, if the value supplied here is "refs/heads/{Branch}" and the target action has an action configuration property called "Branch" with a value of "main", the MatchEquals value is evaluated as "refs/heads/main". For a list of action configuration properties for built-in action types, see Pipeline Structure Reference Action Requirements.
      required:
        - jsonPath
    JsonPath:
      type: string
      minLength: 1
      maxLength: 150
    MatchEquals:
      type: string
      minLength: 1
      maxLength: 150
    WebhookAuthenticationType:
      type: string
      enum:
        - GITHUB_HMAC
        - IP
        - UNAUTHENTICATED
    WebhookAuthConfiguration:
      description: The authentication applied to incoming webhook trigger requests.
      type: object
      properties:
        AllowedIPRange:
          $ref: "#/components/schemas/WebhookAuthConfigurationAllowedIPRange"
          description: The property used to configure acceptance of webhooks in an IP address range. For IP, only the AllowedIPRange property must be set. This property must be set to a valid CIDR range.
        SecretToken:
          $ref: "#/components/schemas/WebhookAuthConfigurationSecretToken"
          description: The property used to configure GitHub authentication. For GITHUB_HMAC, only the SecretToken property must be set. When creating CodePipeline webhooks, do not use your own credentials or reuse the same secret token across multiple webhooks. For optimal security, generate a unique secret token for each webhook you create. The secret token is an arbitrary string that you provide, which GitHub uses to compute and sign the webhook payloads sent to CodePipeline, for protecting the integrity and authenticity of the webhook payloads. Using your own credentials or reusing the same token across multiple webhooks can lead to security vulnerabilities. If a secret token was provided, it will be redacted in the response.
    WebhookAuthConfigurationAllowedIPRange:
      type: string
      minLength: 1
      maxLength: 100
    WebhookAuthConfigurationSecretToken:
      type: string
      minLength: 1
      maxLength: 100
    WebhookUrl:
      type: string
      minLength: 1
      maxLength: 1000
    WebhookErrorMessage:
      type: string
    WebhookErrorCode:
      type: string
    WebhookLastTriggered:
      type: string
      format: date-time
    WebhookArn:
      type: string
    ConditionType:
      type: string
      enum:
        - BEFORE_ENTRY
        - ON_SUCCESS
    MaxBatchSize:
      type: integer
      minimum: 1
    QueryParamMap:
      type: object
      properties: {}
    PollForJobsOutput:
      description: Represents the output of a PollForJobs action.
      type: object
      properties:
        jobs:
          $ref: "#/components/schemas/JobList"
          description: Information about the jobs to take action on.
    JobList:
      type: array
      items:
        $ref: "#/components/schemas/Job"
    Job:
      description: Represents information about a job.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/JobId"
          description: The unique system-generated ID of the job.
        data:
          $ref: "#/components/schemas/JobData"
          description: Other data about a job.
        nonce:
          $ref: "#/components/schemas/Nonce"
          description: A system-generated random number that CodePipeline uses to ensure that the job is being worked on by only one job worker. Use this number in an AcknowledgeJob request.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The ID of the Amazon Web Services account to use when performing the job.
    PollForThirdPartyJobsOutput:
      description: Represents the output of a PollForThirdPartyJobs action.
      type: object
      properties:
        jobs:
          $ref: "#/components/schemas/ThirdPartyJobList"
          description: Information about the jobs to take action on.
    ThirdPartyJobList:
      type: array
      items:
        $ref: "#/components/schemas/ThirdPartyJob"
    ThirdPartyJob:
      description: A response to a PollForThirdPartyJobs request returned by CodePipeline when there is a job to be worked on by a partner action.
      type: object
      properties:
        clientId:
          $ref: "#/components/schemas/ClientId"
          description: The clientToken portion of the clientId and clientToken pair used to verify that the calling entity is allowed access to the job and its details.
        jobId:
          $ref: "#/components/schemas/JobId"
          description: The identifier used to identify the job in CodePipeline.
    ClientId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    PutActionRevisionOutput:
      description: Represents the output of a PutActionRevision action.
      type: object
      properties:
        newRevision:
          $ref: "#/components/schemas/Boolean"
          description: Indicates whether the artifact revision was previously used in an execution of the specified pipeline.
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The ID of the current workflow state of the pipeline.
    ApprovalResult:
      description: Represents information about the result of an approval request.
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/ApprovalSummary"
          description: The summary of the current status of the approval request.
        status:
          $ref: "#/components/schemas/ApprovalStatus"
          description: The response submitted by a reviewer assigned to an approval action request.
      required:
        - summary
        - status
    ApprovalSummary:
      type: string
      minLength: 0
      maxLength: 512
    ApprovalStatus:
      type: string
      enum:
        - Approved
        - Rejected
    ApprovalToken:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    PutApprovalResultOutput:
      description: Represents the output of a PutApprovalResult action.
      type: object
      properties:
        approvedAt:
          $ref: "#/components/schemas/Timestamp"
          description: The timestamp showing when the approval or rejection was submitted.
    FailureDetails:
      description: Represents information about failure details.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/FailureType"
          description: The type of the failure.
        message:
          $ref: "#/components/schemas/Message"
          description: The message about the failure.
        externalExecutionId:
          $ref: "#/components/schemas/ExecutionId"
          description: The external ID of the run of the action that failed.
      required:
        - type_
        - message
    FailureType:
      type: string
      enum:
        - JobFailed
        - ConfigurationError
        - PermissionError
        - RevisionOutOfSync
        - RevisionUnavailable
        - SystemUnavailable
    CurrentRevision:
      description: Represents information about a current revision.
      type: object
      properties:
        revision:
          $ref: "#/components/schemas/Revision"
          description: The revision ID of the current version of an artifact.
        changeIdentifier:
          $ref: "#/components/schemas/RevisionChangeIdentifier"
          description: The change identifier for the current revision.
        created:
          $ref: "#/components/schemas/Time"
          description: The date and time when the most recent revision of the artifact was created, in timestamp format.
        revisionSummary:
          $ref: "#/components/schemas/RevisionSummary"
          description: The summary of the most recent revision of the artifact.
      required:
        - revision
        - changeIdentifier
    Time:
      type: string
      format: date-time
    ExecutionDetails:
      description: The details of the actions taken and results produced on an artifact as it passes through stages in the pipeline.
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/ExecutionSummary"
          description: The summary of the current status of the actions.
        externalExecutionId:
          $ref: "#/components/schemas/ExecutionId"
          description: The system-generated unique ID of this action used to identify this job worker in any external systems, such as CodeDeploy.
        percentComplete:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of work completed on the action, represented on a scale of 0 to 100 percent.
    OutputVariablesMap:
      type: object
      properties: {}
    PutWebhookOutput:
      type: object
      properties:
        webhook:
          $ref: "#/components/schemas/ListWebhookItem"
          description: The detail returned from creating the webhook, such as the webhook name, webhook URL, and webhook ARN.
