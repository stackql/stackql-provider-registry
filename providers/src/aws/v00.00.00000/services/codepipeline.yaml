          description: The version number of the pipeline.
        pipelineType:
          $ref: "#/components/schemas/PipelineType"
          description: CodePipeline provides the following pipeline types, which differ in characteristics and price, so that you can tailor your pipeline features and cost to the needs of your applications. V1 type pipelines have a JSON structure that contains standard pipeline, stage, and action-level parameters. V2 type pipelines have the same structure as a V1 type, along with additional parameters for release safety and trigger configuration. Including V2 parameters, such as triggers on Git tags, in the pipeline JSON when creating or updating a pipeline will result in the pipeline having the V2 type of pipeline and the associated costs. For information about pricing for CodePipeline, see Pricing. For information about which type of pipeline to choose, see What type of pipeline is right for me?.
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
          description: The method that the pipeline will use to handle multiple executions. The default mode is SUPERSEDED.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the pipeline was created, in timestamp format.
        updated:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time of the last update to the pipeline, in timestamp format.
