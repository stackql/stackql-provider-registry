                  description: The name of the pipeline to stop.
                pipelineExecutionId:
                  $ref: "#/components/schemas/PipelineExecutionId"
                  description: The ID of the pipeline execution to be stopped in the current stage. Use the GetPipelineState action to retrieve the current pipelineExecutionId.
                abandon:
                  $ref: "#/components/schemas/Boolean"
                  description: Use this option to stop the pipeline execution by abandoning, rather than finishing, in-progress actions. This option can lead to failed or out-of-sequence tasks.
                reason:
                  $ref: "#/components/schemas/StopPipelineExecutionReason"
                  description: Use this option to enter comments, such as the reason the pipeline was stopped.
              required:
                - pipelineName
                - pipelineExecutionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopPipelineExecutionOutput"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds to or modifies the tags of the given resource. Tags are metadata that can be used to manage a resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.TagResource
            default: CodePipeline_20150709.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource you want to add tags to.
                tags:
                  $ref: "#/components/schemas/TagList"
                  description: The tags you want to modify or add to the resource.
              required:
                - resourceArn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceOutput"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from an Amazon Web Services resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.UntagResource
            default: CodePipeline_20150709.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                resourceArn:
                  $ref: "#/components/schemas/ResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                tagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: The list of keys for the tags to be removed from the resource.
              required:
                - resourceArn
                - tagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceOutput"
  /UpdateActionType:
    post:
      operationId: UpdateActionType
      description: Updates an action type that was created with any supported integration model, where the action type is to be used by customers of the action type provider. Use a JSON file with the action definition and UpdateActionType to provide the full structure.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.UpdateActionType
            default: CodePipeline_20150709.UpdateActionType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                actionType:
                  $ref: "#/components/schemas/ActionTypeDeclaration"
                  description: The action type definition for the action type to be updated.
              required:
                - actionType
      responses:
        "200":
          description: Success
  /UpdatePipeline:
    post:
      operationId: UpdatePipeline
      description: Updates a specified pipeline with edits or changes to its structure. Use a JSON file with the pipeline structure and UpdatePipeline to provide the full structure of the pipeline. Updating the pipeline increases the version number of the pipeline by 1.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - CodePipeline_20150709.UpdatePipeline
            default: CodePipeline_20150709.UpdatePipeline
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                pipeline:
                  $ref: "#/components/schemas/PipelineDeclaration"
                  description: The name of the pipeline to be updated.
              required:
                - pipeline
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePipelineOutput"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    JobId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    Nonce:
      type: string
      minLength: 1
      maxLength: 50
    AcknowledgeJobOutput:
      description: Represents the output of an AcknowledgeJob action.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/JobStatus"
          description: Whether the job worker has received the specified job.
    JobStatus:
      type: string
      enum:
        - Created
        - Queued
        - Dispatched
        - InProgress
        - TimedOut
        - Succeeded
        - Failed
    ThirdPartyJobId:
      type: string
      minLength: 1
      maxLength: 512
    ClientToken:
      type: string
      minLength: 1
      maxLength: 256
    AcknowledgeThirdPartyJobOutput:
      description: Represents the output of an AcknowledgeThirdPartyJob action.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/JobStatus"
          description: The status information for the third party job, if any.
    ActionCategory:
      type: string
      enum:
        - Source
        - Build
        - Deploy
        - Test
        - Invoke
        - Approval
        - Compute
    ActionProvider:
      type: string
      minLength: 1
      maxLength: 35
      pattern: "[0-9A-Za-z_-]+"
    Version:
      type: string
      minLength: 1
      maxLength: 9
      pattern: "[0-9A-Za-z_-]+"
    ActionTypeSettings:
      description: Returns information about the settings for an action type.
      type: object
      properties:
        thirdPartyConfigurationUrl:
          $ref: "#/components/schemas/Url"
          description: The URL of a sign-up page where users can sign up for an external service and perform initial configuration of the action provided by that service.
        entityUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The URL returned to the CodePipeline console that provides a deep link to the resources of the external system, such as the configuration page for a CodeDeploy deployment group. This link is provided as part of the action display in the pipeline.
        executionUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The URL returned to the CodePipeline console that contains a link to the top-level landing page for the external system, such as the console page for CodeDeploy. This link is shown on the pipeline view page in the CodePipeline console and provides a link to the execution entity of the external action.
        revisionUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The URL returned to the CodePipeline console that contains a link to the page where customers can update or change the configuration of the external action.
    Url:
      type: string
      minLength: 1
      maxLength: 2048
    UrlTemplate:
      type: string
      minLength: 1
      maxLength: 2048
    ActionConfigurationPropertyList:
      type: array
      items:
        $ref: "#/components/schemas/ActionConfigurationProperty"
    ActionConfigurationProperty:
      description: Represents information about an action configuration property.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActionConfigurationKey"
          description: The name of the action configuration property.
        required_:
          $ref: "#/components/schemas/Boolean"
          description: Whether the configuration property is a required value.
        key:
          $ref: "#/components/schemas/Boolean"
          description: Whether the configuration property is a key.
        secret:
          $ref: "#/components/schemas/Boolean"
          description: Whether the configuration property is secret. Secrets are hidden from all calls except for GetJobDetails, GetThirdPartyJobDetails, PollForJobs, and PollForThirdPartyJobs. When updating a pipeline, passing * * * * * without changing any other values of the action preserves the previous value of the secret.
        queryable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that the property is used with PollForJobs. When creating a custom action, an action can have up to one queryable property. If it has one, that property must be both required and not secret. If you create a pipeline with a custom action type, and that custom action contains a queryable property, the value for that configuration property is subject to other restrictions. The value must be less than or equal to twenty (20) characters. The value can contain only alphanumeric characters, underscores, and hyphens.
        description:
          $ref: "#/components/schemas/Description"
          description: The description of the action configuration property that is displayed to users.
        type_:
          $ref: "#/components/schemas/ActionConfigurationPropertyType"
          description: The type of the configuration property.
      required:
        - name
        - required_
        - key
        - secret
    ActionConfigurationKey:
      type: string
      minLength: 1
      maxLength: 50
    Boolean:
      type: boolean
    Description:
      type: string
      minLength: 1
      maxLength: 160
    ActionConfigurationPropertyType:
      type: string
      enum:
        - String
        - Number
        - Boolean
    ArtifactDetails:
      description: Returns information about the details of an artifact.
      type: object
      properties:
        minimumCount:
          $ref: "#/components/schemas/MinimumArtifactCount"
          description: The minimum number of artifacts allowed for the action type.
        maximumCount:
          $ref: "#/components/schemas/MaximumArtifactCount"
          description: The maximum number of artifacts allowed for the action type.
      required:
        - minimumCount
        - maximumCount
    MinimumArtifactCount:
      type: integer
      minimum: 0
      maximum: 5
    MaximumArtifactCount:
      type: integer
      minimum: 0
      maximum: 5
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A tag is a key-value pair that is used to manage the resource.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/TagKey"
          description: The tag's key.
        value:
          $ref: "#/components/schemas/TagValue"
          description: The tag's value.
      required:
        - key
        - value
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
    CreateCustomActionTypeOutput:
      description: Represents the output of a CreateCustomActionType operation.
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/ActionType"
          description: Returns information about the details of an action type.
        tags:
          $ref: "#/components/schemas/TagList"
          description: Specifies the tags applied to the custom action.
      required:
        - actionType
    ActionType:
      description: Returns information about the details of an action type.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ActionTypeId"
          description: Represents information about an action type.
        settings:
          $ref: "#/components/schemas/ActionTypeSettings"
          description: The settings for the action type.
        actionConfigurationProperties:
          $ref: "#/components/schemas/ActionConfigurationPropertyList"
          description: The configuration properties for the action type.
        inputArtifactDetails:
          $ref: "#/components/schemas/ArtifactDetails"
          description: The details of the input artifact for the action, such as its commit ID.
        outputArtifactDetails:
          $ref: "#/components/schemas/ArtifactDetails"
          description: The details of the output artifact of the action, such as its commit ID.
      required:
        - id
        - inputArtifactDetails
        - outputArtifactDetails
    ActionTypeId:
      description: Represents information about an action type.
      type: object
      properties:
        category:
          $ref: "#/components/schemas/ActionCategory"
          description: A category defines what kind of action can be taken in the stage, and constrains the provider type for the action. Valid categories are limited to one of the following values. Source Build Test Deploy Invoke Approval Compute
        owner:
          $ref: "#/components/schemas/ActionOwner"
          description: "The creator of the action being called. There are three valid values for the Owner field in the action category section within your pipeline structure: AWS, ThirdParty, and Custom. For more information, see Valid Action Types and Providers in CodePipeline."
        provider:
          $ref: "#/components/schemas/ActionProvider"
          description: The provider of the service being called by the action. Valid providers are determined by the action category. For example, an action in the Deploy category type might have a provider of CodeDeploy, which would be specified as CodeDeploy. For more information, see Valid Action Types and Providers in CodePipeline.
        version:
          $ref: "#/components/schemas/Version"
          description: A string that describes the action version.
      required:
        - category
        - owner
        - provider
        - version
    ActionOwner:
      type: string
      enum:
        - AWS
        - ThirdParty
        - Custom
    PipelineDeclaration:
      description: Represents the structure of actions and stages to be performed in the pipeline.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The Amazon Resource Name (ARN) for CodePipeline to use to either perform actions with no actionRoleArn, or to use to assume roles for actions with an actionRoleArn.
        artifactStore:
          $ref: "#/components/schemas/ArtifactStore"
          description: Represents information about the S3 bucket where artifacts are stored for the pipeline. You must include either artifactStore or artifactStores in your pipeline, but you cannot use both. If you create a cross-region action in your pipeline, you must use artifactStores.
        artifactStores:
          type: object
          properties: {}
          description: A mapping of artifactStore objects and their corresponding Amazon Web Services Regions. There must be an artifact store for the pipeline Region and for each cross-region action in the pipeline. You must include either artifactStore or artifactStores in your pipeline, but you cannot use both. If you create a cross-region action in your pipeline, you must use artifactStores.
        stages:
          $ref: "#/components/schemas/PipelineStageDeclarationList"
          description: The stage in which to perform the action.
        version:
          $ref: "#/components/schemas/PipelineVersion"
          description: The version number of the pipeline. A new pipeline always has a version number of 1. This number is incremented when a pipeline is updated.
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
          description: The method that the pipeline will use to handle multiple executions. The default mode is SUPERSEDED.
        pipelineType:
          $ref: "#/components/schemas/PipelineType"
          description: CodePipeline provides the following pipeline types, which differ in characteristics and price, so that you can tailor your pipeline features and cost to the needs of your applications. V1 type pipelines have a JSON structure that contains standard pipeline, stage, and action-level parameters. V2 type pipelines have the same structure as a V1 type, along with additional parameters for release safety and trigger configuration. Including V2 parameters, such as triggers on Git tags, in the pipeline JSON when creating or updating a pipeline will result in the pipeline having the V2 type of pipeline and the associated costs. For information about pricing for CodePipeline, see Pricing. For information about which type of pipeline to choose, see What type of pipeline is right for me?.
        variables:
          $ref: "#/components/schemas/PipelineVariableDeclarationList"
          description: A list that defines the pipeline variables for a pipeline resource. Variable names can have alphanumeric and underscore characters, and the values must match [A-Za-z0-9@\-_]+.
        triggers:
          $ref: "#/components/schemas/PipelineTriggerDeclarationList"
          description: The trigger configuration specifying a type of event, such as Git tags, that starts the pipeline. When a trigger configuration is specified, default change detection for repository and branch commits is disabled.
      required:
        - name
        - roleArn
        - stages
    PipelineName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9.@\\-_]+"
    RoleArn:
      type: string
      maxLength: 1024
      pattern: arn:aws(-[\w]+)*:iam::[0-9]{12}:role/.*
    ArtifactStore:
      description: The S3 bucket where artifacts for the pipeline are stored. You must include either artifactStore or artifactStores in your pipeline, but you cannot use both. If you create a cross-region action in your pipeline, you must use artifactStores.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ArtifactStoreType"
          description: The type of the artifact store, such as S3.
        location:
          $ref: "#/components/schemas/ArtifactStoreLocation"
          description: The S3 bucket used for storing the artifacts for a pipeline. You can specify the name of an S3 bucket but not a folder in the bucket. A folder to contain the pipeline artifacts is created for you based on the name of the pipeline. You can use any S3 bucket in the same Amazon Web Services Region as the pipeline to store your pipeline artifacts.
        encryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
          description: The encryption key used to encrypt the data in the artifact store, such as an Amazon Web Services Key Management Service key. If this is undefined, the default key for Amazon S3 is used.
      required:
        - type_
        - location
    ArtifactStoreType:
      type: string
      enum:
        - S3
    ArtifactStoreLocation:
      type: string
      minLength: 3
      maxLength: 63
      pattern: "[a-zA-Z0-9\\-\\.]+"
    EncryptionKey:
      description: Represents information about the key used to encrypt data in the artifact store, such as an Amazon Web Services Key Management Service (Key Management Service) key.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/EncryptionKeyId"
          description: The ID used to identify the key. For an Amazon Web Services KMS key, you can use the key ID, the key ARN, or the alias ARN. Aliases are recognized only in the account that created the KMS key. For cross-account actions, you can only use the key ID or key ARN to identify the key. Cross-account actions involve using the role from the other account (AccountB), so specifying the key ID will use the key from the other account (AccountB).
        type_:
          $ref: "#/components/schemas/EncryptionKeyType"
          description: The type of encryption key, such as an Amazon Web Services KMS key. When creating or updating a pipeline, the value must be set to 'KMS'.
      required:
        - id
        - type_
    EncryptionKeyId:
      type: string
      minLength: 1
      maxLength: 400
    EncryptionKeyType:
      type: string
      enum:
        - KMS
    PipelineStageDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/StageDeclaration"
    StageDeclaration:
      description: Represents information about a stage and its definition.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/StageName"
          description: The name of the stage.
        blockers:
          $ref: "#/components/schemas/StageBlockerDeclarationList"
          description: Reserved for future use.
        actions:
          $ref: "#/components/schemas/StageActionDeclarationList"
          description: The actions included in a stage.
        onFailure:
          $ref: "#/components/schemas/FailureConditions"
          description: The method to use when a stage has not completed successfully. For example, configuring this field for rollback will roll back a failed stage automatically to the last successful pipeline execution in the stage.
        onSuccess:
          $ref: "#/components/schemas/SuccessConditions"
          description: The method to use when a stage has succeeded. For example, configuring this field for conditions will allow the stage to succeed when the conditions are met.
        beforeEntry:
          $ref: "#/components/schemas/BeforeEntryConditions"
          description: The method to use when a stage allows entry. For example, configuring this field for conditions will allow entry to the stage when the conditions are met.
      required:
        - name
        - actions
    StageName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9.@\\-_]+"
    StageBlockerDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/BlockerDeclaration"
    BlockerDeclaration:
      description: Reserved for future use.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/BlockerName"
          description: Reserved for future use.
        type_:
          $ref: "#/components/schemas/BlockerType"
          description: Reserved for future use.
      required:
        - name
        - type_
    BlockerName:
      type: string
      minLength: 1
      maxLength: 100
    BlockerType:
      type: string
      enum:
        - Schedule
    StageActionDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/ActionDeclaration"
    ActionDeclaration:
      description: Represents information about an action declaration.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActionName"
          description: The action declaration's name.
        actionTypeId:
          $ref: "#/components/schemas/ActionTypeId"
          description: Specifies the action type and the provider of the action.
        runOrder:
          $ref: "#/components/schemas/ActionRunOrder"
          description: The order in which actions are run.
        configuration:
          type: object
          properties: {}
          description: "The action's configuration. These are key-value pairs that specify input values for an action. For more information, see Action Structure Requirements in CodePipeline. For the list of configuration properties for the CloudFormation action type in CodePipeline, see Configuration Properties Reference in the CloudFormation User Guide. For template snippets with examples, see Using Parameter Override Functions with CodePipeline Pipelines in the CloudFormation User Guide. The values can be represented in either JSON or YAML format. For example, the JSON configuration item format is as follows: JSON: \"Configuration\" : { Key : Value },"
        commands:
          $ref: "#/components/schemas/CommandList"
          description: The shell commands to run with your compute action in CodePipeline. All commands are supported except multi-line formats. While CodeBuild logs and permissions are used, you do not need to create any resources in CodeBuild. Using compute time for this action will incur separate charges in CodeBuild.
        outputArtifacts:
          $ref: "#/components/schemas/OutputArtifactList"
          description: The name or ID of the result of the action declaration, such as a test or build artifact.
        inputArtifacts:
          $ref: "#/components/schemas/InputArtifactList"
          description: The name or ID of the artifact consumed by the action, such as a test or build artifact.
        outputVariables:
          $ref: "#/components/schemas/OutputVariableList"
          description: The list of variables that are to be exported from the compute action. This is specifically CodeBuild environment variables as used for that action.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The ARN of the IAM service role that performs the declared action. This is assumed through the roleArn for the pipeline.
        region:
          $ref: "#/components/schemas/AWSRegionName"
          description: The action declaration's Amazon Web Services Region, such as us-east-1.
        namespace:
          $ref: "#/components/schemas/ActionNamespace"
          description: The variable namespace associated with the action. All variables produced as output by this action fall under this namespace.
        timeoutInMinutes:
          $ref: "#/components/schemas/ActionTimeout"
          description: A timeout duration in minutes that can be applied against the ActionType’s default timeout value specified in Quotas for CodePipeline . This attribute is available only to the manual approval ActionType.
        environmentVariables:
          $ref: "#/components/schemas/EnvironmentVariableList"
          description: The environment variables for the action.
      required:
        - name
        - actionTypeId
    ActionName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9.@\\-_]+"
    ActionRunOrder:
      type: integer
      minimum: 1
      maximum: 999
    CommandList:
      type: array
      items:
        $ref: "#/components/schemas/Command"
    Command:
      type: string
      minLength: 1
      maxLength: 1000
    OutputArtifactList:
      type: array
      items:
        $ref: "#/components/schemas/OutputArtifact"
    OutputArtifact:
      description: Represents information about the output of an action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ArtifactName"
          description: The name of the output of an artifact, such as "My App". The input artifact of an action must exactly match the output artifact declared in a preceding action, but the input artifact does not have to be the next action in strict sequence from the action that provided the output artifact. Actions in parallel can declare different output artifacts, which are in turn consumed by different following actions. Output artifact names must be unique within a pipeline.
        files:
          $ref: "#/components/schemas/FilePathList"
          description: The files that you want to associate with the output artifact that will be exported from the compute action.
      required:
        - name
    ArtifactName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9_\\-]+"
    FilePathList:
      type: array
      items:
        $ref: "#/components/schemas/FilePath"
    FilePath:
      type: string
      minLength: 1
      maxLength: 128
    InputArtifactList:
      type: array
      items:
        $ref: "#/components/schemas/InputArtifact"
    InputArtifact:
      description: Represents information about an artifact to be worked on, such as a test or build artifact.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ArtifactName"
          description: 'The name of the artifact to be worked on (for example, "My App"). Artifacts are the files that are worked on by actions in the pipeline. See the action configuration for each action for details about artifact parameters. For example, the S3 source action input artifact is a file name (or file path), and the files are generally provided as a ZIP file. Example artifact name: SampleApp_Windows.zip The input artifact of an action must exactly match the output artifact declared in a preceding action, but the input artifact does not have to be the next action in strict sequence from the action that provided the output artifact. Actions in parallel can declare different output artifacts, which are in turn consumed by different following actions.'
      required:
        - name
    OutputVariableList:
      type: array
      items:
        $ref: "#/components/schemas/OutputVariable"
    OutputVariable:
      type: string
      minLength: 1
      maxLength: 128
    AWSRegionName:
      type: string
      minLength: 4
      maxLength: 30
    ActionNamespace:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9@\\-_]+"
    ActionTimeout:
      type: integer
      minimum: 5
      maximum: 86400
    EnvironmentVariableList:
      type: array
      items:
        $ref: "#/components/schemas/EnvironmentVariable"
    EnvironmentVariable:
      description: The environment variables for the action.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/EnvironmentVariableName"
          description: The environment variable name in the key-value pair.
        value:
          $ref: "#/components/schemas/EnvironmentVariableValue"
          description: The environment variable value in the key-value pair.
        type_:
          $ref: "#/components/schemas/EnvironmentVariableType"
          description: Specifies the type of use for the environment variable value. The value can be either PLAINTEXT or SECRETS_MANAGER. If the value is SECRETS_MANAGER, provide the Secrets reference in the EnvironmentVariable value.
      required:
        - name
        - value
    EnvironmentVariableName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9_]+"
    EnvironmentVariableValue:
      type: string
      minLength: 1
      maxLength: 2000
      pattern: .*
    EnvironmentVariableType:
      type: string
      enum:
        - PLAINTEXT
        - SECRETS_MANAGER
    FailureConditions:
      description: The configuration that specifies the result, such as rollback, to occur upon stage failure. For more information about conditions, see Stage conditions and How do stage conditions work?.
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Result"
          description: The specified result for when the failure conditions are met, such as rolling back the stage.
        retryConfiguration:
          $ref: "#/components/schemas/RetryConfiguration"
          description: The retry configuration specifies automatic retry for a failed stage, along with the configured retry mode.
        conditions:
          $ref: "#/components/schemas/ConditionList"
          description: The conditions that are configured as failure conditions. For more information about conditions, see Stage conditions and How do stage conditions work?.
    Result:
      type: string
      enum:
        - ROLLBACK
        - FAIL
        - RETRY
        - SKIP
    RetryConfiguration:
      description: The retry configuration specifies automatic retry for a failed stage, along with the configured retry mode.
      type: object
      properties:
        retryMode:
          $ref: "#/components/schemas/StageRetryMode"
          description: The method that you want to configure for automatic stage retry on stage failure. You can specify to retry only failed action in the stage or all actions in the stage.
    StageRetryMode:
      type: string
      enum:
        - FAILED_ACTIONS
        - ALL_ACTIONS
    ConditionList:
      type: array
      items:
        $ref: "#/components/schemas/Condition"
    Condition:
      description: The condition for the stage. A condition is made up of the rules and the result for the condition. For more information about conditions, see Stage conditions and How do stage conditions work?.. For more information about rules, see the CodePipeline rule reference.
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Result"
          description: The action to be done when the condition is met. For example, rolling back an execution for a failure condition.
        rules:
          $ref: "#/components/schemas/RuleDeclarationList"
          description: The rules that make up the condition.
    RuleDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/RuleDeclaration"
    RuleDeclaration:
      description: Represents information about the rule to be created for an associated condition. An example would be creating a new rule for an entry condition, such as a rule that checks for a test result before allowing the run to enter the deployment stage. For more information about conditions, see Stage conditions and How do stage conditions work?. For more information about rules, see the CodePipeline rule reference.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/RuleName"
          description: The name of the rule that is created for the condition, such as VariableCheck.
        ruleTypeId:
          $ref: "#/components/schemas/RuleTypeId"
          description: The ID for the rule type, which is made up of the combined values for category, owner, provider, and version.
        configuration:
          type: object
          properties: {}
          description: The action configuration fields for the rule.
        commands:
          $ref: "#/components/schemas/CommandList"
          description: The shell commands to run with your commands rule in CodePipeline. All commands are supported except multi-line formats. While CodeBuild logs and permissions are used, you do not need to create any resources in CodeBuild. Using compute time for this action will incur separate charges in CodeBuild.
        inputArtifacts:
          $ref: "#/components/schemas/InputArtifactList"
          description: The input artifacts fields for the rule, such as specifying an input file for the rule.
        roleArn:
          $ref: "#/components/schemas/RoleArn"
          description: The pipeline role ARN associated with the rule.
        region:
          $ref: "#/components/schemas/AWSRegionName"
          description: The Region for the condition associated with the rule.
        timeoutInMinutes:
          $ref: "#/components/schemas/RuleTimeout"
          description: The action timeout for the rule.
      required:
        - name
        - ruleTypeId
    RuleName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9.@\\-_]+"
    RuleTypeId:
      description: The ID for the rule type, which is made up of the combined values for category, owner, provider, and version. For more information about conditions, see Stage conditions. For more information about rules, see the CodePipeline rule reference.
      type: object
      properties:
        category:
          $ref: "#/components/schemas/RuleCategory"
          description: A category defines what kind of rule can be run in the stage, and constrains the provider type for the rule. The valid category is Rule.
        owner:
          $ref: "#/components/schemas/RuleOwner"
          description: The creator of the rule being called. The valid value for the Owner field in the rule category is AWS.
        provider:
          $ref: "#/components/schemas/RuleProvider"
          description: The rule provider, such as the DeploymentWindow rule. For a list of rule provider names, see the rules listed in the CodePipeline rule reference.
        version:
          $ref: "#/components/schemas/Version"
          description: A string that describes the rule version.
      required:
        - category
        - provider
    RuleCategory:
      type: string
      enum:
        - Rule
    RuleOwner:
      type: string
      enum:
        - AWS
    RuleProvider:
      type: string
      minLength: 1
      maxLength: 35
      pattern: "[0-9A-Za-z_-]+"
    RuleTimeout:
      type: integer
      minimum: 5
      maximum: 86400
    SuccessConditions:
      description: The conditions for making checks that, if met, succeed a stage. For more information about conditions, see Stage conditions and How do stage conditions work?.
      type: object
      properties:
        conditions:
          $ref: "#/components/schemas/ConditionList"
          description: The conditions that are success conditions.
      required:
        - conditions
    BeforeEntryConditions:
      description: The conditions for making checks for entry to a stage. For more information about conditions, see Stage conditions and How do stage conditions work?.
      type: object
      properties:
        conditions:
          $ref: "#/components/schemas/ConditionList"
          description: The conditions that are configured as entry conditions.
      required:
        - conditions
    PipelineVersion:
      type: integer
      minimum: 1
    ExecutionMode:
      type: string
      enum:
        - QUEUED
        - SUPERSEDED
        - PARALLEL
    PipelineType:
      type: string
      enum:
        - V1
        - V2
    PipelineVariableDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/PipelineVariableDeclaration"
    PipelineVariableDeclaration:
      description: A variable declared at the pipeline level.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/PipelineVariableName"
          description: The name of a pipeline-level variable.
        defaultValue:
          $ref: "#/components/schemas/PipelineVariableValue"
          description: The value of a pipeline-level variable.
        description:
          $ref: "#/components/schemas/PipelineVariableDescription"
          description: The description of a pipeline-level variable. It's used to add additional context about the variable, and not being used at time when pipeline executes.
      required:
        - name
    PipelineVariableName:
      type: string
      minLength: 1
      maxLength: 128
      pattern: "[A-Za-z0-9@\\-_]+"
    PipelineVariableValue:
      type: string
      minLength: 1
      maxLength: 1000
      pattern: .*
    PipelineVariableDescription:
      type: string
      minLength: 0
      maxLength: 200
      pattern: .*
    PipelineTriggerDeclarationList:
      type: array
      items:
        $ref: "#/components/schemas/PipelineTriggerDeclaration"
    PipelineTriggerDeclaration:
      description: Represents information about the specified trigger configuration, such as the filter criteria and the source stage for the action that contains the trigger. This is only supported for the CodeStarSourceConnection action type. When a trigger configuration is specified, default change detection for repository and branch commits is disabled.
      type: object
      properties:
        providerType:
          $ref: "#/components/schemas/PipelineTriggerProviderType"
          description: The source provider for the event, such as connections configured for a repository with Git tags, for the specified trigger configuration.
        gitConfiguration:
          $ref: "#/components/schemas/GitConfiguration"
          description: Provides the filter criteria and the source stage for the repository event that starts the pipeline, such as Git tags.
      required:
        - providerType
        - gitConfiguration
    PipelineTriggerProviderType:
      type: string
      enum:
        - CodeStarSourceConnection
    GitConfiguration:
      description: A type of trigger configuration for Git-based source actions. You can specify the Git configuration trigger type for all third-party Git-based source actions that are supported by the CodeStarSourceConnection action type.
      type: object
      properties:
        sourceActionName:
          $ref: "#/components/schemas/ActionName"
          description: The name of the pipeline source action where the trigger configuration, such as Git tags, is specified. The trigger configuration will start the pipeline upon the specified change only. You can only specify one trigger configuration per source action.
        push:
          $ref: "#/components/schemas/GitPushFilterList"
          description: The field where the repository event that will start the pipeline, such as pushing Git tags, is specified with details.
        pullRequest:
          $ref: "#/components/schemas/GitPullRequestFilterList"
          description: The field where the repository event that will start the pipeline is specified as pull requests.
      required:
        - sourceActionName
    GitPushFilterList:
      type: array
      items:
        $ref: "#/components/schemas/GitPushFilter"
    GitPushFilter:
      description: The event criteria that specify when a specified repository event will start the pipeline for the specified trigger configuration, such as the lists of Git tags to include and exclude.
      type: object
      properties:
        tags:
          $ref: "#/components/schemas/GitTagFilterCriteria"
          description: The field that contains the details for the Git tags trigger configuration.
        branches:
          $ref: "#/components/schemas/GitBranchFilterCriteria"
          description: The field that specifies to filter on branches for the push trigger configuration.
        filePaths:
          $ref: "#/components/schemas/GitFilePathFilterCriteria"
          description: The field that specifies to filter on file paths for the push trigger configuration.
    GitTagFilterCriteria:
      description: The Git tags specified as filter criteria for whether a Git tag repository event will start the pipeline.
      type: object
      properties:
        includes:
          $ref: "#/components/schemas/GitTagPatternList"
          description: The list of patterns of Git tags that, when pushed, are to be included as criteria that starts the pipeline.
        excludes:
          $ref: "#/components/schemas/GitTagPatternList"
          description: The list of patterns of Git tags that, when pushed, are to be excluded from starting the pipeline.
    GitTagPatternList:
      type: array
      items:
        $ref: "#/components/schemas/GitTagNamePattern"
    GitTagNamePattern:
      type: string
      minLength: 1
      maxLength: 255
    GitBranchFilterCriteria:
      description: The Git repository branches specified as filter criteria to start the pipeline.
      type: object
      properties:
        includes:
          $ref: "#/components/schemas/GitBranchPatternList"
          description: The list of patterns of Git branches that, when a commit is pushed, are to be included as criteria that starts the pipeline.
        excludes:
          $ref: "#/components/schemas/GitBranchPatternList"
          description: The list of patterns of Git branches that, when a commit is pushed, are to be excluded from starting the pipeline.
    GitBranchPatternList:
      type: array
      items:
        $ref: "#/components/schemas/GitBranchNamePattern"
    GitBranchNamePattern:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    GitFilePathFilterCriteria:
      description: The Git repository file paths specified as filter criteria to start the pipeline.
      type: object
      properties:
        includes:
          $ref: "#/components/schemas/GitFilePathPatternList"
          description: The list of patterns of Git repository file paths that, when a commit is pushed, are to be included as criteria that starts the pipeline.
        excludes:
          $ref: "#/components/schemas/GitFilePathPatternList"
          description: The list of patterns of Git repository file paths that, when a commit is pushed, are to be excluded from starting the pipeline.
    GitFilePathPatternList:
      type: array
      items:
        $ref: "#/components/schemas/GitFilePathPattern"
    GitFilePathPattern:
      type: string
      minLength: 1
      maxLength: 255
      pattern: .*
    GitPullRequestFilterList:
      type: array
      items:
        $ref: "#/components/schemas/GitPullRequestFilter"
    GitPullRequestFilter:
      description: "The event criteria for the pull request trigger configuration, such as the lists of branches or file paths to include and exclude. The following are valid values for the events for this filter: CLOSED OPEN UPDATED"
      type: object
      properties:
        events:
          $ref: "#/components/schemas/GitPullRequestEventTypeList"
          description: The field that specifies which pull request events to filter on (OPEN, UPDATED, CLOSED) for the trigger configuration.
        branches:
          $ref: "#/components/schemas/GitBranchFilterCriteria"
          description: The field that specifies to filter on branches for the pull request trigger configuration.
        filePaths:
          $ref: "#/components/schemas/GitFilePathFilterCriteria"
          description: The field that specifies to filter on file paths for the pull request trigger configuration.
    GitPullRequestEventTypeList:
      type: array
      items:
        $ref: "#/components/schemas/GitPullRequestEventType"
    GitPullRequestEventType:
      type: string
      enum:
        - OPEN
        - UPDATED
        - CLOSED
    CreatePipelineOutput:
      description: Represents the output of a CreatePipeline action.
      type: object
      properties:
        pipeline:
          $ref: "#/components/schemas/PipelineDeclaration"
          description: Represents the structure of actions and stages to be performed in the pipeline.
        tags:
          $ref: "#/components/schemas/TagList"
          description: Specifies the tags applied to the pipeline.
    WebhookName:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[A-Za-z0-9.@\\-_]+"
    DeleteWebhookOutput:
      type: object
    DeregisterWebhookWithThirdPartyOutput:
      type: object
    StageTransitionType:
      type: string
      enum:
        - Inbound
        - Outbound
    DisabledReason:
      type: string
      minLength: 1
      maxLength: 300
      pattern: "[a-zA-Z0-9!@ \\(\\)\\.\\*\\?\\-]+"
    ActionTypeOwner:
      type: string
      pattern: AWS|ThirdParty
    GetActionTypeOutput:
      type: object
      properties:
        actionType:
          $ref: "#/components/schemas/ActionTypeDeclaration"
          description: The action type information for the requested action type, such as the action type ID.
    ActionTypeDeclaration:
      description: The parameters for the action type definition that are provided when the action type is created or updated.
      type: object
      properties:
        description:
          $ref: "#/components/schemas/ActionTypeDescription"
          description: The description for the action type to be updated.
        executor:
          $ref: "#/components/schemas/ActionTypeExecutor"
          description: Information about the executor for an action type that was created with any supported integration model.
        id:
          $ref: "#/components/schemas/ActionTypeIdentifier"
          description: The action category, owner, provider, and version of the action type to be updated.
        inputArtifactDetails:
          $ref: "#/components/schemas/ActionTypeArtifactDetails"
          description: Details for the artifacts, such as application files, to be worked on by the action. For example, the minimum and maximum number of input artifacts allowed.
        outputArtifactDetails:
          $ref: "#/components/schemas/ActionTypeArtifactDetails"
          description: Details for the output artifacts, such as a built application, that are the result of the action. For example, the minimum and maximum number of output artifacts allowed.
        permissions:
          $ref: "#/components/schemas/ActionTypePermissions"
          description: Details identifying the accounts with permissions to use the action type.
        properties_:
          $ref: "#/components/schemas/ActionTypeProperties"
          description: The properties of the action type to be updated.
        urls:
          $ref: "#/components/schemas/ActionTypeUrls"
          description: The links associated with the action type to be updated.
      required:
        - executor
        - id
        - inputArtifactDetails
        - outputArtifactDetails
    ActionTypeDescription:
      type: string
      minLength: 1
      maxLength: 1024
    ActionTypeExecutor:
      description: The action engine, or executor, for an action type created for a provider, where the action is to be used by customers of the provider. The action engine is associated with the model used to create and update the action, such as the Lambda integration model.
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/ExecutorConfiguration"
          description: The action configuration properties for the action type. These properties are specified in the action definition when the action type is created.
        type_:
          $ref: "#/components/schemas/ExecutorType"
          description: The integration model used to create and update the action type, Lambda or JobWorker.
        policyStatementsTemplate:
          $ref: "#/components/schemas/PolicyStatementsTemplate"
          description: The policy statement that specifies the permissions in the CodePipeline customer account that are needed to successfully run an action. To grant permission to another account, specify the account ID as the Principal, a domain-style identifier defined by the service, for example codepipeline.amazonaws.com. The size of the passed JSON policy document cannot exceed 2048 characters.
        jobTimeout:
          $ref: "#/components/schemas/JobTimeout"
          description: The timeout in seconds for the job. An action execution can have multiple jobs. This is the timeout for a single job, not the entire action execution.
      required:
        - configuration
        - type_
    ExecutorConfiguration:
      description: The action engine, or executor, related to the supported integration model used to create and update the action type. The available executor types are Lambda and JobWorker.
      type: object
      properties:
        lambdaExecutorConfiguration:
          $ref: "#/components/schemas/LambdaExecutorConfiguration"
          description: Details about the Lambda executor of the action type.
        jobWorkerExecutorConfiguration:
          $ref: "#/components/schemas/JobWorkerExecutorConfiguration"
          description: Details about the JobWorker executor of the action type.
    LambdaExecutorConfiguration:
      description: Details about the configuration for the Lambda action engine, or executor.
      type: object
      properties:
        lambdaFunctionArn:
          $ref: "#/components/schemas/LambdaFunctionArn"
          description: The ARN of the Lambda function used by the action engine.
      required:
        - lambdaFunctionArn
    LambdaFunctionArn:
      type: string
      minLength: 1
      maxLength: 140
      pattern: arn:aws(-[\w]+)*:lambda:.+:[0-9]{12}:function:.+
    JobWorkerExecutorConfiguration:
      description: Details about the polling configuration for the JobWorker action engine, or executor.
      type: object
      properties:
        pollingAccounts:
          $ref: "#/components/schemas/PollingAccountList"
          description: The accounts in which the job worker is configured and might poll for jobs as part of the action execution.
        pollingServicePrincipals:
          $ref: "#/components/schemas/PollingServicePrincipalList"
          description: The service Principals in which the job worker is configured and might poll for jobs as part of the action execution.
    PollingAccountList:
      type: array
      items:
        $ref: "#/components/schemas/AccountId"
    AccountId:
      type: string
      pattern: "[0-9]{12}"
    PollingServicePrincipalList:
      type: array
      items:
        $ref: "#/components/schemas/ServicePrincipal"
    ServicePrincipal:
      type: string
      minLength: 1
      maxLength: 128
    ExecutorType:
      type: string
      enum:
        - JobWorker
        - Lambda
    PolicyStatementsTemplate:
      type: string
      minLength: 1
      maxLength: 2048
    JobTimeout:
      type: integer
      minimum: 60
      maximum: 43200
    ActionTypeIdentifier:
      description: Specifies the category, owner, provider, and version of the action type.
      type: object
      properties:
        category:
          $ref: "#/components/schemas/ActionCategory"
          description: "Defines what kind of action can be taken in the stage, one of the following: Source Build Test Deploy Approval Invoke"
        owner:
          $ref: "#/components/schemas/ActionTypeOwner"
          description: "The creator of the action type being called: AWS or ThirdParty."
        provider:
          $ref: "#/components/schemas/ActionProvider"
          description: The provider of the action type being called. The provider name is supplied when the action type is created.
        version:
          $ref: "#/components/schemas/Version"
          description: A string that describes the action type version.
      required:
        - category
        - owner
        - provider
        - version
    ActionTypeArtifactDetails:
      description: Information about parameters for artifacts associated with the action type, such as the minimum and maximum artifacts allowed.
      type: object
      properties:
        minimumCount:
          $ref: "#/components/schemas/MinimumActionTypeArtifactCount"
          description: The minimum number of artifacts that can be used with the action type. For example, you should specify a minimum and maximum of zero input artifacts for an action type with a category of source.
        maximumCount:
          $ref: "#/components/schemas/MaximumActionTypeArtifactCount"
          description: The maximum number of artifacts that can be used with the actiontype. For example, you should specify a minimum and maximum of zero input artifacts for an action type with a category of source.
      required:
        - minimumCount
        - maximumCount
    MinimumActionTypeArtifactCount:
      type: integer
      minimum: 0
      maximum: 10
    MaximumActionTypeArtifactCount:
      type: integer
      minimum: 0
      maximum: 10
    ActionTypePermissions:
      description: Details identifying the users with permissions to use the action type.
      type: object
      properties:
        allowedAccounts:
          $ref: "#/components/schemas/AllowedAccounts"
          description: A list of Amazon Web Services account IDs with access to use the action type in their pipelines.
      required:
        - allowedAccounts
    AllowedAccounts:
      type: array
      items:
        $ref: "#/components/schemas/AllowedAccount"
    AllowedAccount:
      type: string
      pattern: "[0-9]{12}|\\*"
    ActionTypeProperties:
      type: array
      items:
        $ref: "#/components/schemas/ActionTypeProperty"
    ActionTypeProperty:
      description: Represents information about each property specified in the action configuration, such as the description and key name that display for the customer using the action type.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActionConfigurationKey"
          description: The property name that is displayed to users.
        optional:
          $ref: "#/components/schemas/Boolean"
          description: Whether the configuration property is an optional value.
        key:
          $ref: "#/components/schemas/Boolean"
          description: Whether the configuration property is a key.
        noEcho:
          $ref: "#/components/schemas/Boolean"
          description: Whether to omit the field value entered by the customer in the log. If true, the value is not saved in CloudTrail logs for the action execution.
        queryable:
          $ref: "#/components/schemas/Boolean"
          description: Indicates that the property is used with polling. An action type can have up to one queryable property. If it has one, that property must be both required and not secret.
        description:
          $ref: "#/components/schemas/PropertyDescription"
          description: The description of the property that is displayed to users.
      required:
        - name
        - optional
        - key
        - noEcho
    PropertyDescription:
      type: string
      minLength: 1
      maxLength: 250
    ActionTypeUrls:
      description: Returns information about URLs for web pages that display to customers as links on the pipeline view, such as an external configuration page for the action type.
      type: object
      properties:
        configurationUrl:
          $ref: "#/components/schemas/Url"
          description: The URL returned to the CodePipeline console that contains a link to the page where customers can configure the external action.
        entityUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The URL returned to the CodePipeline console that provides a deep link to the resources of the external system, such as a status page. This link is provided as part of the action display in the pipeline.
        executionUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The link to an execution page for the action type in progress. For example, for a CodeDeploy action, this link is shown on the pipeline view page in the CodePipeline console, and it links to a CodeDeploy status page.
        revisionUrlTemplate:
          $ref: "#/components/schemas/UrlTemplate"
          description: The URL returned to the CodePipeline console that contains a link to the page where customers can update or change the configuration of the external action.
    GetJobDetailsOutput:
      description: Represents the output of a GetJobDetails action.
      type: object
      properties:
        jobDetails:
          $ref: "#/components/schemas/JobDetails"
          description: The details of the job. If AWSSessionCredentials is used, a long-running job can call GetJobDetails again to obtain new credentials.
    JobDetails:
      description: Represents information about the details of a job.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/JobId"
          description: The unique system-generated ID of the job.
        data:
          $ref: "#/components/schemas/JobData"
          description: Represents other information about a job required for a job worker to complete the job.
        accountId:
          $ref: "#/components/schemas/AccountId"
          description: The Amazon Web Services account ID associated with the job.
    JobData:
      description: Represents other information about a job required for a job worker to complete the job.
      type: object
      properties:
        actionTypeId:
          $ref: "#/components/schemas/ActionTypeId"
          description: Represents information about an action type.
        actionConfiguration:
          $ref: "#/components/schemas/ActionConfiguration"
          description: Represents information about an action configuration.
        pipelineContext:
          $ref: "#/components/schemas/PipelineContext"
          description: Represents information about a pipeline to a job worker. Includes pipelineArn and pipelineExecutionId for custom jobs.
        inputArtifacts:
          $ref: "#/components/schemas/ArtifactList"
          description: The artifact supplied to the job.
        outputArtifacts:
          $ref: "#/components/schemas/ArtifactList"
          description: The output of the job.
        artifactCredentials:
          $ref: "#/components/schemas/AWSSessionCredentials"
          description: Represents an Amazon Web Services session credentials object. These credentials are temporary credentials that are issued by Amazon Web Services Secure Token Service (STS). They can be used to access input and output artifacts in the S3 bucket used to store artifacts for the pipeline in CodePipeline.
        continuationToken:
          $ref: "#/components/schemas/ContinuationToken"
          description: A system-generated token, such as a deployment ID, required by a job to continue the job asynchronously.
        encryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
          description: Represents information about the key used to encrypt data in the artifact store, such as an KMS key.
    ActionConfiguration:
      description: Represents information about an action configuration.
      type: object
      properties:
        configuration:
          type: object
          properties: {}
          description: The configuration data for the action.
    PipelineContext:
      description: Represents information about a pipeline to a job worker. PipelineContext contains pipelineArn and pipelineExecutionId for custom action jobs. The pipelineArn and pipelineExecutionId fields are not populated for ThirdParty action jobs.
      type: object
      properties:
        pipelineName:
          $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline. This is a user-specified value. Pipeline names must be unique across all pipeline names under an Amazon Web Services account.
        stage:
          $ref: "#/components/schemas/StageContext"
          description: The stage of the pipeline.
        action:
          $ref: "#/components/schemas/ActionContext"
          description: The context of an action to a job worker in the stage of a pipeline.
        pipelineArn:
          $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the pipeline.
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The execution ID of the pipeline.
    StageContext:
      description: Represents information about a stage to a job worker.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/StageName"
          description: The name of the stage.
    ActionContext:
      description: Represents the context of an action in the stage of a pipeline to a job worker.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ActionName"
          description: The name of the action in the context of a job.
        actionExecutionId:
          $ref: "#/components/schemas/ActionExecutionId"
          description: The system-generated unique ID that corresponds to an action's execution.
    ActionExecutionId:
      type: string
    PipelineArn:
      type: string
      pattern: arn:aws(-[\w]+)*:codepipeline:.+:[0-9]{12}:.+
    PipelineExecutionId:
      type: string
      pattern: "[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}"
    ArtifactList:
      type: array
      items:
        $ref: "#/components/schemas/Artifact"
    Artifact:
      description: "Artifacts are the files that are worked on by actions in the pipeline. See the action configuration for each action for details about artifact parameters. For example, the S3 source action artifact is a file name (or file path), and the files are generally provided as a ZIP file. Example artifact name: SampleApp_Windows.zip"
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ArtifactName"
          description: The artifact's name.
        revision:
          $ref: "#/components/schemas/Revision"
          description: The artifact's revision ID. Depending on the type of object, this could be a commit ID (GitHub) or a revision ID (Amazon S3).
        location:
          $ref: "#/components/schemas/ArtifactLocation"
          description: The location of an artifact.
    Revision:
      type: string
      minLength: 1
      maxLength: 1500
    ArtifactLocation:
      description: Represents information about the location of an artifact.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ArtifactLocationType"
          description: The type of artifact in the location.
        s3Location:
          $ref: "#/components/schemas/S3ArtifactLocation"
          description: The S3 bucket that contains the artifact.
    ArtifactLocationType:
      type: string
      enum:
        - S3
    S3ArtifactLocation:
      description: The location of the S3 bucket that contains a revision.
      type: object
      properties:
        bucketName:
          $ref: "#/components/schemas/S3BucketName"
          description: The name of the S3 bucket.
        objectKey:
          $ref: "#/components/schemas/S3ObjectKey"
          description: The key of the object in the S3 bucket, which uniquely identifies the object in the bucket.
      required:
        - bucketName
        - objectKey
    S3BucketName:
      type: string
    S3ObjectKey:
      type: string
    AWSSessionCredentials:
      description: Represents an Amazon Web Services session credentials object. These credentials are temporary credentials that are issued by Amazon Web Services Secure Token Service (STS). They can be used to access input and output artifacts in the S3 bucket used to store artifact for the pipeline in CodePipeline.
      type: object
      properties:
        accessKeyId:
          $ref: "#/components/schemas/AccessKeyId"
          description: The access key for the session.
        secretAccessKey:
          $ref: "#/components/schemas/SecretAccessKey"
          description: The secret access key for the session.
        sessionToken:
          $ref: "#/components/schemas/SessionToken"
          description: The token for the session.
      required:
        - accessKeyId
        - secretAccessKey
        - sessionToken
    AccessKeyId:
      type: string
    SecretAccessKey:
      type: string
    SessionToken:
      type: string
    ContinuationToken:
      type: string
      minLength: 1
      maxLength: 2048
    GetPipelineOutput:
      description: Represents the output of a GetPipeline action.
      type: object
      properties:
        pipeline:
          $ref: "#/components/schemas/PipelineDeclaration"
          description: Represents the structure of actions and stages to be performed in the pipeline.
        metadata:
          $ref: "#/components/schemas/PipelineMetadata"
          description: Represents the pipeline metadata information returned as part of the output of a GetPipeline action.
    PipelineMetadata:
      description: Information about a pipeline.
      type: object
      properties:
        pipelineArn:
          $ref: "#/components/schemas/PipelineArn"
          description: The Amazon Resource Name (ARN) of the pipeline.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the pipeline was created, in timestamp format.
        updated:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the pipeline was last updated, in timestamp format.
        pollingDisabledAt:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time that polling for source changes (periodic checks) was stopped for the pipeline, in timestamp format. Pipelines that are inactive for longer than 30 days will have polling disabled for the pipeline. For more information, see pollingDisabledAt in the pipeline structure reference. For the steps to migrate your pipeline from polling to event-based change detection, see Migrate polling pipelines to use event-based change detection. You can migrate (update) a polling pipeline to use event-based change detection. For example, for a pipeline with a CodeCommit source, we recommend you migrate (update) your pipeline to use CloudWatch Events. To learn more, see Migrate polling pipelines to use event-based change detection in the CodePipeline User Guide.
    Timestamp:
      type: string
      format: date-time
    GetPipelineExecutionOutput:
      description: Represents the output of a GetPipelineExecution action.
      type: object
      properties:
        pipelineExecution:
          $ref: "#/components/schemas/PipelineExecution"
          description: Represents information about the execution of a pipeline.
    PipelineExecution:
      description: Represents information about an execution of a pipeline.
      type: object
      properties:
        pipelineName:
          $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline with the specified pipeline execution.
        pipelineVersion:
          $ref: "#/components/schemas/PipelineVersion"
          description: The version number of the pipeline with the specified pipeline execution.
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The ID of the pipeline execution.
        status:
          $ref: "#/components/schemas/PipelineExecutionStatus"
          description: "The status of the pipeline execution. Cancelled: The pipeline’s definition was updated before the pipeline execution could be completed. InProgress: The pipeline execution is currently running. Stopped: The pipeline execution was manually stopped. For more information, see Stopped Executions. Stopping: The pipeline execution received a request to be manually stopped. Depending on the selected stop mode, the execution is either completing or abandoning in-progress actions. For more information, see Stopped Executions. Succeeded: The pipeline execution was completed successfully. Superseded: While this pipeline execution was waiting for the next stage to be completed, a newer pipeline execution advanced and continued through the pipeline instead. For more information, see Superseded Executions. Failed: The pipeline execution was not completed successfully."
        statusSummary:
          $ref: "#/components/schemas/PipelineExecutionStatusSummary"
          description: A summary that contains a description of the pipeline execution status.
        artifactRevisions:
          $ref: "#/components/schemas/ArtifactRevisionList"
          description: A list of ArtifactRevision objects included in a pipeline execution.
        variables:
          $ref: "#/components/schemas/ResolvedPipelineVariableList"
          description: A list of pipeline variables used for the pipeline execution.
        trigger:
          $ref: "#/components/schemas/ExecutionTrigger"
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
          description: The method that the pipeline will use to handle multiple executions. The default mode is SUPERSEDED.
        executionType:
          $ref: "#/components/schemas/ExecutionType"
          description: The type of the pipeline execution.
        rollbackMetadata:
          $ref: "#/components/schemas/PipelineRollbackMetadata"
          description: The metadata about the execution pertaining to stage rollback.
    PipelineExecutionStatus:
      type: string
      enum:
        - Cancelled
        - InProgress
        - Stopped
        - Stopping
        - Succeeded
        - Superseded
        - Failed
    PipelineExecutionStatusSummary:
      type: string
    ArtifactRevisionList:
      type: array
      items:
        $ref: "#/components/schemas/ArtifactRevision"
    ArtifactRevision:
      description: Represents revision details of an artifact.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ArtifactName"
          description: The name of an artifact. This name might be system-generated, such as "MyApp", or defined by the user when an action is created.
        revisionId:
          $ref: "#/components/schemas/Revision"
          description: The revision ID of the artifact.
        revisionChangeIdentifier:
          $ref: "#/components/schemas/RevisionChangeIdentifier"
          description: An additional identifier for a revision, such as a commit date or, for artifacts stored in Amazon S3 buckets, the ETag value.
        revisionSummary:
          $ref: "#/components/schemas/RevisionSummary"
          description: Summary information about the most recent revision of the artifact. For GitHub and CodeCommit repositories, the commit message. For Amazon S3 buckets or actions, the user-provided content of a codepipeline-artifact-revision-summary key specified in the object metadata.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the most recent revision of the artifact was created, in timestamp format.
        revisionUrl:
          $ref: "#/components/schemas/Url"
          description: The commit ID for the artifact revision. For artifacts stored in GitHub or CodeCommit repositories, the commit ID is linked to a commit details page.
    RevisionChangeIdentifier:
      type: string
      minLength: 1
      maxLength: 100
    RevisionSummary:
      type: string
      minLength: 1
      maxLength: 2048
    ResolvedPipelineVariableList:
      type: array
      items:
        $ref: "#/components/schemas/ResolvedPipelineVariable"
    ResolvedPipelineVariable:
      description: A pipeline-level variable used for a pipeline execution.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/String"
          description: The name of a pipeline-level variable.
        resolvedValue:
          $ref: "#/components/schemas/String"
          description: The resolved value of a pipeline-level variable.
    String:
      type: string
    ExecutionTrigger:
      description: The interaction or event that started a pipeline execution.
      type: object
      properties:
        triggerType:
          $ref: "#/components/schemas/TriggerType"
          description: The type of change-detection method, command, or user interaction that started a pipeline execution.
        triggerDetail:
          $ref: "#/components/schemas/TriggerDetail"
          description: Detail related to the event that started a pipeline execution, such as the webhook ARN of the webhook that triggered the pipeline execution or the user ARN for a user-initiated start-pipeline-execution CLI command.
    TriggerType:
      type: string
      enum:
        - CreatePipeline
        - StartPipelineExecution
        - PollForSourceChanges
        - Webhook
        - CloudWatchEvent
        - PutActionRevision
        - WebhookV2
        - ManualRollback
        - AutomatedRollback
    TriggerDetail:
      type: string
      minLength: 0
      maxLength: 1024
    ExecutionType:
      type: string
      enum:
        - STANDARD
        - ROLLBACK
    PipelineRollbackMetadata:
      description: The metadata for the stage execution to be rolled back.
      type: object
      properties:
        rollbackTargetPipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The pipeline execution ID to which the stage will be rolled back.
    GetPipelineStateOutput:
      description: Represents the output of a GetPipelineState action.
      type: object
      properties:
        pipelineName:
          $ref: "#/components/schemas/PipelineName"
          description: The name of the pipeline for which you want to get the state.
        pipelineVersion:
          $ref: "#/components/schemas/PipelineVersion"
          description: The version number of the pipeline. A newly created pipeline is always assigned a version number of 1.
        stageStates:
          $ref: "#/components/schemas/StageStateList"
          description: A list of the pipeline stage output information, including stage name, state, most recent run details, whether the stage is disabled, and other data.
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the pipeline was created, in timestamp format.
        updated:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time the pipeline was last updated, in timestamp format.
    StageStateList:
      type: array
      items:
        $ref: "#/components/schemas/StageState"
    StageState:
      description: Represents information about the state of the stage.
      type: object
      properties:
        stageName:
          $ref: "#/components/schemas/StageName"
          description: The name of the stage.
        inboundExecution:
          $ref: "#/components/schemas/StageExecution"
        inboundExecutions:
          $ref: "#/components/schemas/StageExecutionList"
          description: The inbound executions for a stage.
        inboundTransitionState:
          $ref: "#/components/schemas/TransitionState"
          description: The state of the inbound transition, which is either enabled or disabled.
        actionStates:
          $ref: "#/components/schemas/ActionStateList"
          description: The state of the stage.
        latestExecution:
          $ref: "#/components/schemas/StageExecution"
          description: Information about the latest execution in the stage, including its ID and status.
        beforeEntryConditionState:
          $ref: "#/components/schemas/StageConditionState"
          description: The state of the entry conditions for a stage.
        onSuccessConditionState:
          $ref: "#/components/schemas/StageConditionState"
          description: The state of the success conditions for a stage.
        onFailureConditionState:
          $ref: "#/components/schemas/StageConditionState"
          description: The state of the failure conditions for a stage.
        retryStageMetadata:
          $ref: "#/components/schemas/RetryStageMetadata"
          description: he details of a specific automatic retry on stage failure, including the attempt number and trigger.
    StageExecution:
      description: Represents information about the run of a stage.
      type: object
      properties:
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The ID of the pipeline execution associated with the stage.
        status:
          $ref: "#/components/schemas/StageExecutionStatus"
          description: The status of the stage, or for a completed stage, the last status of the stage. A status of cancelled means that the pipeline’s definition was updated before the stage execution could be completed.
        type_:
          $ref: "#/components/schemas/ExecutionType"
          description: The type of pipeline execution for the stage, such as a rollback pipeline execution.
      required:
        - pipelineExecutionId
        - status
    StageExecutionStatus:
      type: string
      enum:
        - Cancelled
        - InProgress
        - Failed
        - Stopped
        - Stopping
        - Succeeded
        - Skipped
    StageExecutionList:
      type: array
      items:
        $ref: "#/components/schemas/StageExecution"
    TransitionState:
      description: Represents information about the state of transitions between one stage and another stage.
      type: object
      properties:
        enabled:
          $ref: "#/components/schemas/Enabled"
          description: Whether the transition between stages is enabled (true) or disabled (false).
        lastChangedBy:
          $ref: "#/components/schemas/LastChangedBy"
          description: The ID of the user who last changed the transition state.
        lastChangedAt:
          $ref: "#/components/schemas/LastChangedAt"
          description: The timestamp when the transition state was last changed.
        disabledReason:
          $ref: "#/components/schemas/DisabledReason"
          description: The user-specified reason why the transition between two stages of a pipeline was disabled.
    Enabled:
      type: boolean
    LastChangedBy:
      type: string
    LastChangedAt:
      type: string
      format: date-time
    ActionStateList:
      type: array
      items:
        $ref: "#/components/schemas/ActionState"
    ActionState:
      description: Represents information about the state of an action.
      type: object
      properties:
        actionName:
          $ref: "#/components/schemas/ActionName"
          description: The name of the action.
        currentRevision:
          $ref: "#/components/schemas/ActionRevision"
          description: Represents information about the version (or revision) of an action.
        latestExecution:
          $ref: "#/components/schemas/ActionExecution"
          description: Represents information about the run of an action.
        entityUrl:
          $ref: "#/components/schemas/Url"
          description: A URL link for more information about the state of the action, such as a deployment group details page.
        revisionUrl:
          $ref: "#/components/schemas/Url"
          description: A URL link for more information about the revision, such as a commit details page.
    ActionRevision:
      description: Represents information about the version (or revision) of an action.
      type: object
      properties:
        revisionId:
          $ref: "#/components/schemas/Revision"
          description: The system-generated unique ID that identifies the revision number of the action.
        revisionChangeId:
          $ref: "#/components/schemas/RevisionChangeIdentifier"
          description: The unique identifier of the change that set the state to this revision (for example, a deployment ID or timestamp).
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the most recent version of the action was created, in timestamp format.
      required:
        - revisionId
        - revisionChangeId
        - created
    ActionExecution:
      description: Represents information about the run of an action.
      type: object
      properties:
        actionExecutionId:
          $ref: "#/components/schemas/ActionExecutionId"
          description: ID of the workflow action execution in the current stage. Use the GetPipelineState action to retrieve the current action execution details of the current stage. For older executions, this field might be empty. The action execution ID is available for executions run on or after March 2020.
        status:
          $ref: "#/components/schemas/ActionExecutionStatus"
          description: The status of the action, or for a completed action, the last status of the action.
        summary:
          $ref: "#/components/schemas/ExecutionSummary"
          description: A summary of the run of the action.
        lastStatusChange:
          $ref: "#/components/schemas/Timestamp"
          description: The last status change of the action.
        token:
          $ref: "#/components/schemas/ActionExecutionToken"
          description: The system-generated token used to identify a unique approval request. The token for each open approval request can be obtained using the GetPipelineState command. It is used to validate that the approval request corresponding to this token is still valid.
        lastUpdatedBy:
          $ref: "#/components/schemas/LastUpdatedBy"
          description: The ARN of the user who last changed the pipeline.
        externalExecutionId:
          $ref: "#/components/schemas/ExecutionId"
          description: The external ID of the run of the action.
        externalExecutionUrl:
          $ref: "#/components/schemas/Url"
          description: The URL of a resource external to Amazon Web Services that is used when running the action (for example, an external repository URL).
        percentComplete:
          $ref: "#/components/schemas/Percentage"
          description: A percentage of completeness of the action as it runs.
        errorDetails:
          $ref: "#/components/schemas/ErrorDetails"
          description: The details of an error returned by a URL external to Amazon Web Services.
        logStreamARN:
          $ref: "#/components/schemas/LogStreamARN"
          description: The Amazon Resource Name (ARN) of the log stream for the action compute.
    ActionExecutionStatus:
      type: string
      enum:
        - InProgress
        - Abandoned
        - Succeeded
        - Failed
    ExecutionSummary:
      type: string
      minLength: 1
      maxLength: 2048
    ActionExecutionToken:
      type: string
    LastUpdatedBy:
      type: string
    ExecutionId:
      type: string
      minLength: 1
      maxLength: 1500
    Percentage:
      type: integer
      minimum: 0
      maximum: 100
    ErrorDetails:
      description: Represents information about an error in CodePipeline.
      type: object
      properties:
        code:
          $ref: "#/components/schemas/Code"
          description: The system ID or number code of the error.
        message:
          $ref: "#/components/schemas/Message"
          description: The text of the error message.
    Code:
      type: string
    Message:
      type: string
      minLength: 1
      maxLength: 5000
    LogStreamARN:
      type: string
      minLength: 1
      maxLength: 250
    StageConditionState:
      description: The state of a run of a condition for a stage.
      type: object
      properties:
        latestExecution:
          $ref: "#/components/schemas/StageConditionsExecution"
          description: Represents information about the latest run of a condition for a stage.
        conditionStates:
          $ref: "#/components/schemas/ConditionStateList"
          description: The states of the conditions for a run of a condition for a stage.
    StageConditionsExecution:
      description: Represents information about the run of a condition for a stage.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ConditionExecutionStatus"
          description: The status of a run of a condition for a stage.
        summary:
          $ref: "#/components/schemas/ExecutionSummary"
          description: A summary of the run of the condition for a stage.
    ConditionExecutionStatus:
      type: string
      enum:
        - InProgress
        - Failed
        - Errored
        - Succeeded
        - Cancelled
        - Abandoned
        - Overridden
    ConditionStateList:
      type: array
      items:
        $ref: "#/components/schemas/ConditionState"
    ConditionState:
      description: Information about the state of the condition.
      type: object
      properties:
        latestExecution:
          $ref: "#/components/schemas/ConditionExecution"
          description: The state of the latest run of the rule.
        ruleStates:
          $ref: "#/components/schemas/RuleStateList"
          description: The state of the rules for the condition.
    ConditionExecution:
      description: The run of a condition.
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ConditionExecutionStatus"
          description: The status of the run for a condition.
        summary:
          $ref: "#/components/schemas/ExecutionSummary"
          description: The summary of information about a run for a condition.
        lastStatusChange:
          $ref: "#/components/schemas/Timestamp"
          description: The last status change of the condition.
    RuleStateList:
      type: array
      items:
        $ref: "#/components/schemas/RuleState"
    RuleState:
      description: Returns information about the state of a rule. Values returned in the revisionId field indicate the rule revision information, such as the commit ID, for the current state.
      type: object
      properties:
        ruleName:
          $ref: "#/components/schemas/RuleName"
          description: The name of the rule.
        currentRevision:
          $ref: "#/components/schemas/RuleRevision"
          description: The ID of the current revision of the artifact successfully worked on by the job.
        latestExecution:
          $ref: "#/components/schemas/RuleExecution"
          description: Represents information about the latest run of an rule.
        entityUrl:
          $ref: "#/components/schemas/Url"
          description: A URL link for more information about the state of the action, such as a details page.
        revisionUrl:
          $ref: "#/components/schemas/Url"
          description: A URL link for more information about the revision, such as a commit details page.
    RuleRevision:
      description: The change to a rule that creates a revision of the rule.
      type: object
      properties:
        revisionId:
          $ref: "#/components/schemas/Revision"
          description: The system-generated unique ID that identifies the revision number of the rule.
        revisionChangeId:
          $ref: "#/components/schemas/RevisionChangeIdentifier"
          description: The unique identifier of the change that set the state to this revision (for example, a deployment ID or timestamp).
        created:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the most recent version of the rule was created, in timestamp format.
      required:
        - revisionId
        - revisionChangeId
        - created
    RuleExecution:
      description: Represents information about each time a rule is run as part of the pipeline execution for a pipeline configured with conditions.
      type: object
      properties:
        ruleExecutionId:
          $ref: "#/components/schemas/RuleExecutionId"
          description: The execution ID for the run of the rule.
        status:
          $ref: "#/components/schemas/RuleExecutionStatus"
          description: The status of the run of the rule, such as FAILED.
        summary:
          $ref: "#/components/schemas/ExecutionSummary"
          description: A summary of the run of the rule.
        lastStatusChange:
          $ref: "#/components/schemas/Timestamp"
          description: The last status change of the rule.
        token:
          $ref: "#/components/schemas/RuleExecutionToken"
          description: The system-generated token used to identify a unique request.
        lastUpdatedBy:
          $ref: "#/components/schemas/LastUpdatedBy"
          description: The ARN of the user who last changed the rule.
        externalExecutionId:
          $ref: "#/components/schemas/ExecutionId"
          description: The external ID of the run of the rule.
        externalExecutionUrl:
          $ref: "#/components/schemas/Url"
          description: The URL of a resource external to Amazon Web Services that is used when running the rule (for example, an external repository URL).
        errorDetails:
          $ref: "#/components/schemas/ErrorDetails"
    RuleExecutionId:
      type: string
      minLength: 1
      maxLength: 200
    RuleExecutionStatus:
      type: string
      enum:
        - InProgress
        - Abandoned
        - Succeeded
        - Failed
    RuleExecutionToken:
      type: string
      minLength: 1
      maxLength: 200
      pattern: "[a-zA-Z0-9\\-\\.]+"
    RetryStageMetadata:
      description: The details of a specific automatic retry on stage failure, including the attempt number and trigger.
      type: object
      properties:
        autoStageRetryAttempt:
          $ref: "#/components/schemas/RetryAttempt"
          description: The number of attempts for a specific stage with automatic retry on stage failure. One attempt is allowed for automatic stage retry on failure.
        manualStageRetryAttempt:
          $ref: "#/components/schemas/RetryAttempt"
          description: The number of attempts for a specific stage where manual retries have been made upon stage failure.
        latestRetryTrigger:
          $ref: "#/components/schemas/RetryTrigger"
          description: The latest trigger for a specific stage where manual or automatic retries have been made upon stage failure.
    RetryAttempt:
      type: integer
      minimum: 1
    RetryTrigger:
      type: string
      enum:
        - AutomatedStageRetry
        - ManualStageRetry
    GetThirdPartyJobDetailsOutput:
      description: Represents the output of a GetThirdPartyJobDetails action.
      type: object
      properties:
        jobDetails:
          $ref: "#/components/schemas/ThirdPartyJobDetails"
          description: The details of the job, including any protected values defined for the job.
    ThirdPartyJobDetails:
      description: The details of a job sent in response to a GetThirdPartyJobDetails request.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ThirdPartyJobId"
          description: The identifier used to identify the job details in CodePipeline.
        data:
          $ref: "#/components/schemas/ThirdPartyJobData"
          description: The data to be returned by the third party job worker.
        nonce:
          $ref: "#/components/schemas/Nonce"
          description: A system-generated random number that CodePipeline uses to ensure that the job is being worked on by only one job worker. Use this number in an AcknowledgeThirdPartyJob request.
    ThirdPartyJobData:
      description: Represents information about the job data for a partner action.
      type: object
      properties:
        actionTypeId:
          $ref: "#/components/schemas/ActionTypeId"
          description: Represents information about an action type.
        actionConfiguration:
          $ref: "#/components/schemas/ActionConfiguration"
          description: Represents information about an action configuration.
        pipelineContext:
          $ref: "#/components/schemas/PipelineContext"
          description: Represents information about a pipeline to a job worker. Does not include pipelineArn and pipelineExecutionId for ThirdParty jobs.
        inputArtifacts:
          $ref: "#/components/schemas/ArtifactList"
          description: The name of the artifact that is worked on by the action, if any. This name might be system-generated, such as "MyApp", or it might be defined by the user when the action is created. The input artifact name must match the name of an output artifact generated by an action in an earlier action or stage of the pipeline.
        outputArtifacts:
          $ref: "#/components/schemas/ArtifactList"
          description: The name of the artifact that is the result of the action, if any. This name might be system-generated, such as "MyBuiltApp", or it might be defined by the user when the action is created.
        artifactCredentials:
          $ref: "#/components/schemas/AWSSessionCredentials"
          description: Represents an Amazon Web Services session credentials object. These credentials are temporary credentials that are issued by Amazon Web Services Secure Token Service (STS). They can be used to access input and output artifacts in the S3 bucket used to store artifact for the pipeline in CodePipeline.
        continuationToken:
          $ref: "#/components/schemas/ContinuationToken"
          description: A system-generated token, such as a CodeDeploy deployment ID, that a job requires to continue the job asynchronously.
        encryptionKey:
          $ref: "#/components/schemas/EncryptionKey"
          description: The encryption key used to encrypt and decrypt data in the artifact store for the pipeline, such as an Amazon Web Services Key Management Service (Amazon Web Services KMS) key. This is optional and might not be present.
    ActionExecutionFilter:
