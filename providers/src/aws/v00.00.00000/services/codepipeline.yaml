    PipelineExecutionSummaryList:
      type: array
      items:
        $ref: "#/components/schemas/PipelineExecutionSummary"
    PipelineExecutionSummary:
      description: Summary information about a pipeline execution.
      type: object
      properties:
        pipelineExecutionId:
          $ref: "#/components/schemas/PipelineExecutionId"
          description: The ID of the pipeline execution.
        status:
          $ref: "#/components/schemas/PipelineExecutionStatus"
          description: "The status of the pipeline execution. InProgress: The pipeline execution is currently running. Stopped: The pipeline execution was manually stopped. For more information, see Stopped Executions. Stopping: The pipeline execution received a request to be manually stopped. Depending on the selected stop mode, the execution is either completing or abandoning in-progress actions. For more information, see Stopped Executions. Succeeded: The pipeline execution was completed successfully. Superseded: While this pipeline execution was waiting for the next stage to be completed, a newer pipeline execution advanced and continued through the pipeline instead. For more information, see Superseded Executions. Failed: The pipeline execution was not completed successfully."
        statusSummary:
          $ref: "#/components/schemas/PipelineExecutionStatusSummary"
          description: Status summary for the pipeline.
        startTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the pipeline execution began, in timestamp format.
        lastUpdateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time of the last change to the pipeline execution, in timestamp format.
        sourceRevisions:
          $ref: "#/components/schemas/SourceRevisionList"
          description: A list of the source artifact revisions that initiated a pipeline execution.
        trigger:
          $ref: "#/components/schemas/ExecutionTrigger"
          description: The interaction or event that started a pipeline execution, such as automated change detection or a StartPipelineExecution API call.
        stopTrigger:
          $ref: "#/components/schemas/StopExecutionTrigger"
          description: The interaction that stopped a pipeline execution.
        executionMode:
          $ref: "#/components/schemas/ExecutionMode"
          description: The method that the pipeline will use to handle multiple executions. The default mode is SUPERSEDED.
        executionType:
          $ref: "#/components/schemas/ExecutionType"
