openapi: 3.0.0
info:
  version: "2020-10-01"
  title: Amazon EMR Containers
  description: Amazon EMR Containers
  x-serviceName: emr-containers
  x-serviceAlias: emr_containers
  x-protocol: rest-json
  x-apiVersion: "2020-10-01"
  x-endpointPrefix: emr-containers
  x-jsonVersion: "1.1"
servers:
  - url: https://emr-containers.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for emr-containers
paths:
  /virtualclusters/{virtual_cluster_id}/jobruns/{job_run_id}:
    delete:
      operationId: CancelJobRun
      description: Cancels a job run. A job run is a unit of work, such as a Spark jar, PySpark script, or SparkSQL query, that you submit to Amazon EMR on EKS.
      parameters:
        - name: job_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job run to cancel.
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster for which the job run will be canceled.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelJobRunResponse"
    get:
      operationId: DescribeJobRun
      description: Displays detailed information about a job run. A job run is a unit of work, such as a Spark jar, PySpark script, or SparkSQL query, that you submit to Amazon EMR on EKS.
      parameters:
        - name: job_run_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job run request.
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster for which the job run is submitted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobRunResponse"
  /jobtemplates:
    post:
      operationId: CreateJobTemplate
      description: "Creates a job template. Job template stores values of StartJobRun API request in a template and can be used to start a job run. Job template allows two use cases: avoid repeating recurring StartJobRun API request values, enforcing certain values in StartJobRun API request."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceNameString"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                jobTemplateData:
                  $ref: "#/components/schemas/JobTemplateData"
                tags:
                  $ref: "#/components/schemas/TagMap"
                kmsKeyArn:
                  $ref: "#/components/schemas/KmsKeyArn"
              required:
                - name
                - clientToken
                - jobTemplateData
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobTemplateResponse"
    get:
      operationId: ListJobTemplates
      description: "Lists job templates based on a set of parameters. Job template stores values of StartJobRun API request in a template and can be used to start a job run. Job template allows two use cases: avoid repeating recurring StartJobRun API request values, enforcing certain values in StartJobRun API request."
      parameters:
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time after which the job templates were created.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time before which the job templates were created.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of job templates that can be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of job templates to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobTemplatesResponse"
  /virtualclusters/{virtual_cluster_id}/endpoints:
    post:
      operationId: CreateManagedEndpoint
      description: Creates a managed endpoint. A managed endpoint is a gateway that connects Amazon EMR Studio to Amazon EMR on EKS so that Amazon EMR Studio can communicate with your virtual cluster.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster for which a managed endpoint is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceNameString"
                type:
                  $ref: "#/components/schemas/EndpointType"
                releaseLabel:
                  $ref: "#/components/schemas/ReleaseLabel"
                executionRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                certificateArn:
                  $ref: "#/components/schemas/ACMCertArn"
                configurationOverrides:
                  $ref: "#/components/schemas/ConfigurationOverrides"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - name
                - type
                - releaseLabel
                - executionRoleArn
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateManagedEndpointResponse"
    get:
      operationId: ListManagedEndpoints
      description: Lists managed endpoints based on a set of parameters. A managed endpoint is a gateway that connects Amazon EMR Studio to Amazon EMR on EKS so that Amazon EMR Studio can communicate with your virtual cluster.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time before which the endpoints are created.
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time after which the endpoints are created.
        - name: types
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EndpointTypes"
          description: The types of the managed endpoints.
        - name: states
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EndpointStates"
          description: The states of the managed endpoints.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of managed endpoints that can be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of managed endpoints to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListManagedEndpointsResponse"
  /securityconfigurations:
    post:
      operationId: CreateSecurityConfiguration
      description: Creates a security configuration. Security configurations in Amazon EMR on EKS are templates for different security setups. You can use security configurations to configure the Lake Formation integration setup. You can also create a security configuration to re-use a security setup each time you create a virtual cluster.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                name:
                  $ref: "#/components/schemas/ResourceNameString"
                containerProvider:
                  $ref: "#/components/schemas/ContainerProvider"
                securityConfigurationData:
                  $ref: "#/components/schemas/SecurityConfigurationData"
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - clientToken
                - name
                - securityConfigurationData
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSecurityConfigurationResponse"
    get:
      operationId: ListSecurityConfigurations
      description: Lists security configurations based on a set of parameters. Security configurations in Amazon EMR on EKS are templates for different security setups. You can use security configurations to configure the Lake Formation integration setup. You can also create a security configuration to re-use a security setup each time you create a virtual cluster.
      parameters:
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time after which the security configuration was created.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time before which the security configuration was created.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of security configurations the operation can list.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of security configurations to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSecurityConfigurationsResponse"
  /virtualclusters:
    post:
      operationId: CreateVirtualCluster
      description: Creates a virtual cluster. Virtual cluster is a managed entity on Amazon EMR on EKS. You can create, describe, list and delete virtual clusters. They do not consume any additional resource in your system. A single virtual cluster maps to a single Kubernetes namespace. Given this relationship, you can model virtual clusters the same way you model Kubernetes namespaces to meet your requirements.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceNameString"
                containerProvider:
                  $ref: "#/components/schemas/ContainerProvider"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                tags:
                  $ref: "#/components/schemas/TagMap"
                securityConfigurationId:
                  $ref: "#/components/schemas/ResourceIdString"
              required:
                - name
                - containerProvider
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVirtualClusterResponse"
    get:
      operationId: ListVirtualClusters
      description: Lists information about the specified virtual cluster. Virtual cluster is a managed entity on Amazon EMR on EKS. You can create, describe, list and delete virtual clusters. They do not consume any additional resource in your system. A single virtual cluster maps to a single Kubernetes namespace. Given this relationship, you can model virtual clusters the same way you model Kubernetes namespaces to meet your requirements.
      parameters:
        - name: containerProviderId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String1024"
          description: The container provider ID of the virtual cluster.
        - name: containerProviderType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ContainerProviderType"
          description: The container provider type of the virtual cluster. Amazon EKS is the only supported type as of now.
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time after which the virtual clusters are created.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time before which the virtual clusters are created.
        - name: states
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VirtualClusterStates"
          description: The states of the requested virtual clusters.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of virtual clusters that can be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of virtual clusters to return.
        - name: eksAccessEntryIntegrated
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Boolean"
          description: Optional Boolean that specifies whether the operation should return the virtual clusters that have the access entry integration enabled or disabled. If not specified, the operation returns all applicable virtual clusters.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListVirtualClustersResponse"
  /jobtemplates/{template_id}:
    delete:
      operationId: DeleteJobTemplate
      description: "Deletes a job template. Job template stores values of StartJobRun API request in a template and can be used to start a job run. Job template allows two use cases: avoid repeating recurring StartJobRun API request values, enforcing certain values in StartJobRun API request."
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job template that will be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteJobTemplateResponse"
    get:
      operationId: DescribeJobTemplate
      description: "Displays detailed information about a specified job template. Job template stores values of StartJobRun API request in a template and can be used to start a job run. Job template allows two use cases: avoid repeating recurring StartJobRun API request values, enforcing certain values in StartJobRun API request."
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job template that will be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeJobTemplateResponse"
  /virtualclusters/{virtual_cluster_id}/endpoints/{endpoint_id}:
    delete:
      operationId: DeleteManagedEndpoint
      description: Deletes a managed endpoint. A managed endpoint is a gateway that connects Amazon EMR Studio to Amazon EMR on EKS so that Amazon EMR Studio can communicate with your virtual cluster.
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the managed endpoint.
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the endpoint's virtual cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteManagedEndpointResponse"
    get:
      operationId: DescribeManagedEndpoint
      description: Displays detailed information about a managed endpoint. A managed endpoint is a gateway that connects Amazon EMR Studio to Amazon EMR on EKS so that Amazon EMR Studio can communicate with your virtual cluster.
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: This output displays ID of the managed endpoint.
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the endpoint's virtual cluster.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeManagedEndpointResponse"
  /virtualclusters/{virtual_cluster_id}:
    delete:
      operationId: DeleteVirtualCluster
      description: Deletes a virtual cluster. Virtual cluster is a managed entity on Amazon EMR on EKS. You can create, describe, list and delete virtual clusters. They do not consume any additional resource in your system. A single virtual cluster maps to a single Kubernetes namespace. Given this relationship, you can model virtual clusters the same way you model Kubernetes namespaces to meet your requirements.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster that will be deleted.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVirtualClusterResponse"
    get:
      operationId: DescribeVirtualCluster
      description: Displays detailed information about a specified virtual cluster. Virtual cluster is a managed entity on Amazon EMR on EKS. You can create, describe, list and delete virtual clusters. They do not consume any additional resource in your system. A single virtual cluster maps to a single Kubernetes namespace. Given this relationship, you can model virtual clusters the same way you model Kubernetes namespaces to meet your requirements.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster that will be described.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeVirtualClusterResponse"
  /securityconfigurations/{security_configuration_id}:
    get:
      operationId: DescribeSecurityConfiguration
      description: Displays detailed information about a specified security configuration. Security configurations in Amazon EMR on EKS are templates for different security setups. You can use security configurations to configure the Lake Formation integration setup. You can also create a security configuration to re-use a security setup each time you create a virtual cluster.
      parameters:
        - name: security_configuration_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the security configuration.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DescribeSecurityConfigurationResponse"
  /virtualclusters/{virtual_cluster_id}/endpoints/{endpoint_id}/credentials:
    post:
      operationId: GetManagedEndpointSessionCredentials
      description: Generate a session token to connect to a managed endpoint.
      parameters:
        - name: endpoint_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String2048"
          description: The ARN of the managed endpoint for which the request is submitted.
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/String2048"
          description: The ARN of the Virtual Cluster which the Managed Endpoint belongs to.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                executionRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                credentialType:
                  $ref: "#/components/schemas/CredentialType"
                durationInSeconds:
                  $ref: "#/components/schemas/JavaInteger"
                logContext:
                  $ref: "#/components/schemas/LogContext"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
              required:
                - executionRoleArn
                - credentialType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetManagedEndpointSessionCredentialsResponse"
  /virtualclusters/{virtual_cluster_id}/jobruns:
    get:
      operationId: ListJobRuns
      description: Lists job runs based on a set of parameters. A job run is a unit of work, such as a Spark jar, PySpark script, or SparkSQL query, that you submit to Amazon EMR on EKS.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the virtual cluster for which to list the job run.
        - name: createdBefore
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time before which the job runs were submitted.
        - name: createdAfter
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Date"
          description: The date and time after which the job runs were submitted.
        - name: name
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceNameString"
          description: The name of the job run.
        - name: states
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobRunStates"
          description: The states of the job run.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of job runs that can be listed.
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for the next set of job runs to return.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobRunsResponse"
    post:
      operationId: StartJobRun
      description: Starts a job run. A job run is a unit of work, such as a Spark jar, PySpark script, or SparkSQL query, that you submit to Amazon EMR on EKS.
      parameters:
        - name: virtual_cluster_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ResourceIdString"
          description: The virtual cluster ID for which the job run request is submitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/ResourceNameString"
                clientToken:
                  $ref: "#/components/schemas/ClientToken"
                executionRoleArn:
                  $ref: "#/components/schemas/IAMRoleArn"
                releaseLabel:
                  $ref: "#/components/schemas/ReleaseLabel"
                jobDriver:
                  $ref: "#/components/schemas/JobDriver"
                configurationOverrides:
                  $ref: "#/components/schemas/ConfigurationOverrides"
                tags:
                  $ref: "#/components/schemas/TagMap"
                jobTemplateId:
                  $ref: "#/components/schemas/ResourceIdString"
                jobTemplateParameters:
                  $ref: "#/components/schemas/TemplateParameterInputMap"
                retryPolicyConfiguration:
                  $ref: "#/components/schemas/RetryPolicyConfiguration"
              required:
                - clientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartJobRunResponse"
  /tags/{resource_arn}:
    get:
      operationId: ListTagsForResource
      description: Lists the tags assigned to the resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RsiArn"
          description: The ARN of tagged resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
    post:
      operationId: TagResource
      description: Assigns tags to resources. A tag is a label that you assign to an Amazon Web Services resource. Each tag consists of a key and an optional value, both of which you define. Tags enable you to categorize your Amazon Web Services resources by attributes such as purpose, owner, or environment. When you have many resources of the same type, you can quickly identify a specific resource based on the tags you've assigned to it. For example, you can define a set of tags for your Amazon EMR on EKS clusters to help you track each cluster's owner and stack level. We recommend that you devise a consistent set of tag keys for each resource type. You can then search and filter the resources based on the tags that you add.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RsiArn"
          description: The ARN of resources.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  $ref: "#/components/schemas/TagMap"
              required:
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
    delete:
      operationId: UntagResource
      description: Removes tags from resources.
      parameters:
        - name: resource_arn
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RsiArn"
          description: The ARN of resources.
        - name: tagKeys
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TagKeyList"
          description: The tag keys of the resources.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    ResourceIdString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[0-9a-z]+"
    CancelJobRunResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output contains the ID of the cancelled job run.
        virtualClusterId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output contains the virtual cluster ID for which the job run is cancelled.
    ResourceNameString:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*\S.*
    JobTemplateData:
      description: The values of StartJobRun API requests used in job runs started using the job template.
      type: object
      properties:
        executionRoleArn:
          $ref: "#/components/schemas/ParametricIAMRoleArn"
          description: The execution role ARN of the job run.
        releaseLabel:
          $ref: "#/components/schemas/ParametricReleaseLabel"
          description: The release version of Amazon EMR.
        configurationOverrides:
          $ref: "#/components/schemas/ParametricConfigurationOverrides"
          description: The configuration settings that are used to override defaults configuration.
        jobDriver:
          $ref: "#/components/schemas/JobDriver"
        parameterConfiguration:
          type: object
          properties: {}
          description: The configuration of parameters existing in the job template.
        jobTags:
          type: object
          properties: {}
          description: The tags assigned to jobs started using the job template.
      required:
        - executionRoleArn
        - releaseLabel
        - jobDriver
    ParametricIAMRoleArn:
      type: string
      minLength: 4
      maxLength: 2048
      pattern: (^arn:(aws[a-zA-Z0-9-]*):iam::(\d{12})?:(role((\u002F)|(\u002F[\u0021-\u007F]+\u002F))[\w+=,.@-]+)$)|([\.\-_\#A-Za-z0-9\$\{\}]+)
    ParametricReleaseLabel:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ([\.\-_/A-Za-z0-9]+|\$\{[a-zA-Z]\w*\})
    ParametricConfigurationOverrides:
      description: A configuration specification to be used to override existing configurations. This data type allows job template parameters to be specified within.
      type: object
      properties:
        applicationConfiguration:
          $ref: "#/components/schemas/ConfigurationList"
          description: The configurations for the application running by the job run.
        monitoringConfiguration:
          $ref: "#/components/schemas/ParametricMonitoringConfiguration"
          description: The configurations for monitoring.
    ConfigurationList:
      type: array
      items:
        $ref: "#/components/schemas/Configuration"
    Configuration:
      description: A configuration specification to be used when provisioning virtual clusters, which can include configurations for applications and software bundled with Amazon EMR on EKS. A configuration consists of a classification, properties, and optional nested configurations. A classification refers to an application-specific configuration file. Properties are the settings you want to change in that file.
      type: object
      properties:
        classification:
          $ref: "#/components/schemas/String1024"
          description: The classification within a configuration.
        properties_:
          type: object
          properties: {}
          description: A set of properties specified within a configuration classification.
        configurations:
          $ref: "#/components/schemas/ConfigurationList"
          description: A list of additional configurations to apply within a configuration object.
      required:
        - classification
    String1024:
      type: string
      minLength: 1
      maxLength: 1024
      pattern: .*\S.*
    ParametricMonitoringConfiguration:
      description: Configuration setting for monitoring. This data type allows job template parameters to be specified within.
      type: object
      properties:
        persistentAppUI:
          $ref: "#/components/schemas/TemplateParameter"
          description: Monitoring configurations for the persistent application UI.
        cloudWatchMonitoringConfiguration:
          $ref: "#/components/schemas/ParametricCloudWatchMonitoringConfiguration"
          description: Monitoring configurations for CloudWatch.
        s3MonitoringConfiguration:
          $ref: "#/components/schemas/ParametricS3MonitoringConfiguration"
          description: Amazon S3 configuration for monitoring log publishing.
    TemplateParameter:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9\\$\\{\\}]+"
    ParametricCloudWatchMonitoringConfiguration:
      description: A configuration for CloudWatch monitoring. You can configure your jobs to send log information to CloudWatch Logs. This data type allows job template parameters to be specified within.
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/TemplateParameter"
          description: The name of the log group for log publishing.
        logStreamNamePrefix:
          $ref: "#/components/schemas/String256"
          description: The specified name prefix for log streams.
    String256:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    ParametricS3MonitoringConfiguration:
      description: Amazon S3 configuration for monitoring log publishing. You can configure your jobs to send log information to Amazon S3. This data type allows job template parameters to be specified within.
      type: object
      properties:
        logUri:
          $ref: "#/components/schemas/UriString"
          description: Amazon S3 destination URI for log publishing.
    UriString:
      type: string
      minLength: 1
      maxLength: 10280
      pattern: "[\\u0020-\\uD7FF\\uE000-\\uFFFD\\uD800\\uDBFF-\\uDC00\\uDFFF\\r\\n\\t]*"
    JobDriver:
      description: Specify the driver that the job runs on. Exactly one of the two available job drivers is required, either sparkSqlJobDriver or sparkSubmitJobDriver.
      type: object
      properties:
        sparkSubmitJobDriver:
          $ref: "#/components/schemas/SparkSubmitJobDriver"
          description: The job driver parameters specified for spark submit.
        sparkSqlJobDriver:
          $ref: "#/components/schemas/SparkSqlJobDriver"
          description: The job driver for job type.
    SparkSubmitJobDriver:
      description: The information about job driver for Spark submit.
      type: object
      properties:
        entryPoint:
          $ref: "#/components/schemas/EntryPointPath"
          description: The entry point of job application.
        entryPointArguments:
          $ref: "#/components/schemas/EntryPointArguments"
          description: The arguments for job application.
        sparkSubmitParameters:
          $ref: "#/components/schemas/SparkSubmitParameters"
          description: The Spark submit parameters that are used for job runs.
      required:
        - entryPoint
    EntryPointPath:
      type: string
      minLength: 1
      maxLength: 256
      pattern: .*\S.*
    EntryPointArguments:
      type: array
      items:
        $ref: "#/components/schemas/EntryPointArgument"
    EntryPointArgument:
      type: string
      minLength: 1
      maxLength: 10280
      pattern: .*\S.*
    SparkSubmitParameters:
      type: string
      minLength: 1
      maxLength: 102400
      pattern: .*\S.*
    SparkSqlJobDriver:
      description: The job driver for job type.
      type: object
      properties:
        entryPoint:
          $ref: "#/components/schemas/EntryPointPath"
          description: The SQL file to be executed.
        sparkSqlParameters:
          $ref: "#/components/schemas/SparkSqlParameters"
          description: The Spark parameters to be included in the Spark SQL command.
    SparkSqlParameters:
      type: string
      minLength: 1
      maxLength: 102400
      pattern: .*\S.*
    TagMap:
      type: object
      properties: {}
    KmsKeyArn:
      type: string
      minLength: 3
      maxLength: 2048
      pattern: ^(arn:(aws[a-zA-Z0-9-]*):kms:.+:(\d{12})?:key\/[(0-9a-zA-Z)-?]+|\$\{[a-zA-Z]\w*\})$
    CreateJobTemplateResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: This output display the created job template ID.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: This output displays the name of the created job template.
        arn:
          $ref: "#/components/schemas/JobTemplateArn"
          description: This output display the ARN of the created job template.
        createdAt:
          $ref: "#/components/schemas/Date"
          description: This output displays the date and time when the job template was created.
    JobTemplateArn:
      type: string
      minLength: 60
      maxLength: 1024
      pattern: ^arn:(aws[a-zA-Z0-9-]*):emr-containers:.+:(\d{12}):\/jobtemplates\/[0-9a-zA-Z]+$
    Date:
      type: string
      format: date-time
    EndpointType:
      type: string
      minLength: 1
      maxLength: 64
      pattern: .*\S.*
    ReleaseLabel:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[\\.\\-_/A-Za-z0-9]+"
    IAMRoleArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z0-9-]*):iam::(\d{12})?:(role((\u002F)|(\u002F[\u0021-\u007F]+\u002F))[\w+=,.@-]+)$
    ACMCertArn:
      type: string
      minLength: 44
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z0-9-]*):acm:.+:(\d{12}):certificate/.+$
    ConfigurationOverrides:
      description: A configuration specification to be used to override existing configurations.
      type: object
      properties:
        applicationConfiguration:
          $ref: "#/components/schemas/ConfigurationList"
          description: The configurations for the application running by the job run.
        monitoringConfiguration:
          $ref: "#/components/schemas/MonitoringConfiguration"
          description: The configurations for monitoring.
    MonitoringConfiguration:
      description: Configuration setting for monitoring.
      type: object
      properties:
        managedLogs:
          $ref: "#/components/schemas/ManagedLogs"
          description: The entity that controls configuration for managed logs.
        persistentAppUI:
          $ref: "#/components/schemas/PersistentAppUI"
          description: Monitoring configurations for the persistent application UI.
        cloudWatchMonitoringConfiguration:
          $ref: "#/components/schemas/CloudWatchMonitoringConfiguration"
          description: Monitoring configurations for CloudWatch.
        s3MonitoringConfiguration:
          $ref: "#/components/schemas/S3MonitoringConfiguration"
          description: Amazon S3 configuration for monitoring log publishing.
        containerLogRotationConfiguration:
          $ref: "#/components/schemas/ContainerLogRotationConfiguration"
          description: Enable or disable container log rotation.
    ManagedLogs:
      description: The entity that provides configuration control over managed logs.
      type: object
      properties:
        allowAWSToRetainLogs:
          $ref: "#/components/schemas/AllowAWSToRetainLogs"
          description: Determines whether Amazon Web Services can retain logs.
        encryptionKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The Amazon resource name (ARN) of the encryption key for logs.
    AllowAWSToRetainLogs:
      type: string
      enum:
        - ENABLED
        - DISABLED
    PersistentAppUI:
      type: string
      enum:
        - ENABLED
        - DISABLED
    CloudWatchMonitoringConfiguration:
      description: A configuration for CloudWatch monitoring. You can configure your jobs to send log information to CloudWatch Logs.
      type: object
      properties:
        logGroupName:
          $ref: "#/components/schemas/LogGroupName"
          description: The name of the log group for log publishing.
        logStreamNamePrefix:
          $ref: "#/components/schemas/String256"
          description: The specified name prefix for log streams.
      required:
        - logGroupName
    LogGroupName:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9]+"
    S3MonitoringConfiguration:
      description: Amazon S3 configuration for monitoring log publishing. You can configure your jobs to send log information to Amazon S3.
      type: object
      properties:
        logUri:
          $ref: "#/components/schemas/UriString"
          description: Amazon S3 destination URI for log publishing.
      required:
        - logUri
    ContainerLogRotationConfiguration:
      description: The settings for container log rotation.
      type: object
      properties:
        rotationSize:
          $ref: "#/components/schemas/RotationSize"
          description: The file size at which to rotate logs. Minimum of 2KB, Maximum of 2GB.
        maxFilesToKeep:
          $ref: "#/components/schemas/MaxFilesToKeep"
          description: The number of files to keep in container after rotation.
      required:
        - rotationSize
        - maxFilesToKeep
    RotationSize:
      type: string
      minLength: 3
      maxLength: 12
      pattern: ^\d+(\.\d+)?[KMG][Bb]?$
    MaxFilesToKeep:
      type: integer
      minimum: 1
      maximum: 50
    CreateManagedEndpointResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output contains the ID of the managed endpoint.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: The output contains the name of the managed endpoint.
        arn:
          $ref: "#/components/schemas/EndpointArn"
          description: The output contains the ARN of the managed endpoint.
        virtualClusterId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output contains the ID of the virtual cluster.
    EndpointArn:
      type: string
      minLength: 60
      maxLength: 1024
      pattern: ^arn:(aws[a-zA-Z0-9-]*):emr-containers:.+:(\d{12}):\/virtualclusters\/[0-9a-zA-Z]+\/endpoints\/[0-9a-zA-Z]+$
    ContainerProvider:
      description: The information about the container provider.
      type: object
      properties:
        type_:
          $ref: "#/components/schemas/ContainerProviderType"
          description: The type of the container provider. Amazon EKS is the only supported type as of now.
        id:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the container cluster.
        info:
          $ref: "#/components/schemas/ContainerInfo"
          description: The information about the container cluster.
      required:
        - type_
        - id
    ContainerProviderType:
      type: string
      enum:
        - EKS
    ClusterId:
      type: string
      minLength: 1
      maxLength: 100
      pattern: ^[0-9A-Za-z][A-Za-z0-9\-_]*
    ContainerInfo:
      description: The information about the container used for a job run or a managed endpoint.
      type: object
      properties:
        eksInfo:
          $ref: "#/components/schemas/EksInfo"
          description: The information about the Amazon EKS cluster.
    EksInfo:
      description: The information about the Amazon EKS cluster.
      type: object
      properties:
        namespace:
          $ref: "#/components/schemas/KubernetesNamespace"
          description: The namespaces of the Amazon EKS cluster.
        nodeLabel:
          $ref: "#/components/schemas/ResourceNameString"
          description: The nodeLabel of the nodes where the resources of this virtual cluster can get scheduled. It requires relevant scaling and policy engine addons.
    KubernetesNamespace:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "[a-z0-9]([-a-z0-9]*[a-z0-9])?"
    SecurityConfigurationData:
      description: Configurations related to the security configuration for the request.
      type: object
      properties:
        authorizationConfiguration:
          $ref: "#/components/schemas/AuthorizationConfiguration"
          description: Authorization-related configuration input for the security configuration.
    AuthorizationConfiguration:
      description: Authorization-related configuration inputs for the security configuration.
      type: object
      properties:
        lakeFormationConfiguration:
          $ref: "#/components/schemas/LakeFormationConfiguration"
          description: Lake Formation related configuration inputs for the security configuration.
        encryptionConfiguration:
          $ref: "#/components/schemas/EncryptionConfiguration"
          description: Encryption-related configuration input for the security configuration.
    LakeFormationConfiguration:
      description: Lake Formation related configuration inputs for the security configuration.
      type: object
      properties:
        authorizedSessionTagValue:
          $ref: "#/components/schemas/SessionTagValue"
          description: The session tag to authorize Amazon EMR on EKS for API calls to Lake Formation.
        secureNamespaceInfo:
          $ref: "#/components/schemas/SecureNamespaceInfo"
          description: The namespace input of the system job.
        queryEngineRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The query engine IAM role ARN that is tied to the secure Spark job. The QueryEngine role assumes the JobExecutionRole to execute all the Lake Formation calls.
    SessionTagValue:
      type: string
      minLength: 1
      maxLength: 512
      pattern: "[\\.\\-_/#A-Za-z0-9 ]+"
    SecureNamespaceInfo:
      description: Namespace inputs for the system job.
      type: object
      properties:
        clusterId:
          $ref: "#/components/schemas/ClusterId"
          description: The ID of the Amazon EKS cluster where Amazon EMR on EKS jobs run.
        namespace:
          $ref: "#/components/schemas/KubernetesNamespace"
          description: The namespace of the Amazon EKS cluster where the system jobs run.
    EncryptionConfiguration:
      description: Configurations related to encryption for the security configuration.
      type: object
      properties:
        inTransitEncryptionConfiguration:
          $ref: "#/components/schemas/InTransitEncryptionConfiguration"
          description: In-transit encryption-related input for the security configuration.
    InTransitEncryptionConfiguration:
      description: Configurations related to in-transit encryption for the security configuration.
      type: object
      properties:
        tlsCertificateConfiguration:
          $ref: "#/components/schemas/TLSCertificateConfiguration"
          description: TLS certificate-related configuration input for the security configuration.
    TLSCertificateConfiguration:
      description: Configurations related to the TLS certificate for the security configuration.
      type: object
      properties:
        certificateProviderType:
          $ref: "#/components/schemas/CertificateProviderType"
          description: "The TLS certificate type. Acceptable values: PEM or Custom."
        publicCertificateSecretArn:
          $ref: "#/components/schemas/SecretsManagerArn"
          description: Secrets Manager ARN that contains the public TLS certificate contents, used for communication between the user job and the system job.
        privateCertificateSecretArn:
          $ref: "#/components/schemas/SecretsManagerArn"
          description: Secrets Manager ARN that contains the private TLS certificate contents, used for communication between the user job and the system job.
    CertificateProviderType:
      type: string
      enum:
        - PEM
    SecretsManagerArn:
      type: string
      minLength: 3
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z0-9-]*):secretsmanager:.+:(\d{12}):secret:[0-9a-zA-Z/_+=.@-]+$
    CreateSecurityConfigurationResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the security configuration.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: The name of the security configuration.
        arn:
          $ref: "#/components/schemas/SecurityConfigurationArn"
          description: The ARN (Amazon Resource Name) of the security configuration.
    SecurityConfigurationArn:
      type: string
      minLength: 60
      maxLength: 1024
      pattern: ^arn:(aws[a-zA-Z0-9-]*):emr-containers:.+:(\d{12}):\/securityconfigurations\/[0-9a-zA-Z]+$
    CreateVirtualClusterResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: This output contains the virtual cluster ID.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: This output contains the name of the virtual cluster.
        arn:
          $ref: "#/components/schemas/VirtualClusterArn"
          description: This output contains the ARN of virtual cluster.
    VirtualClusterArn:
      type: string
      minLength: 60
      maxLength: 1024
      pattern: ^arn:(aws[a-zA-Z0-9-]*):emr-containers:.+:(\d{12}):\/virtualclusters\/[0-9a-zA-Z]+$
    DeleteJobTemplateResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: This output contains the ID of the job template that was deleted.
    DeleteManagedEndpointResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output displays the ID of the managed endpoint.
        virtualClusterId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The output displays the ID of the endpoint's virtual cluster.
    DeleteVirtualClusterResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: This output contains the ID of the virtual cluster that will be deleted.
    DescribeJobRunResponse:
      type: object
      properties:
        jobRun:
          $ref: "#/components/schemas/JobRun"
          description: The output displays information about a job run.
    JobRun:
      description: This entity describes a job run. A job run is a unit of work, such as a Spark jar, PySpark script, or SparkSQL query, that you submit to Amazon EMR on EKS.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job run.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: The name of the job run.
        virtualClusterId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job run's virtual cluster.
        arn:
          $ref: "#/components/schemas/JobArn"
          description: The ARN of job run.
        state:
          $ref: "#/components/schemas/JobRunState"
          description: The state of the job run.
        clientToken:
          $ref: "#/components/schemas/ClientToken"
          description: The client token used to start a job run.
        executionRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The execution role ARN of the job run.
        releaseLabel:
          $ref: "#/components/schemas/ReleaseLabel"
          description: The release version of Amazon EMR.
        configurationOverrides:
          $ref: "#/components/schemas/ConfigurationOverrides"
          description: The configuration settings that are used to override default configuration.
        jobDriver:
          $ref: "#/components/schemas/JobDriver"
          description: Parameters of job driver for the job run.
        createdAt:
          $ref: "#/components/schemas/Date"
          description: The date and time when the job run was created.
        createdBy:
          $ref: "#/components/schemas/RequestIdentityUserArn"
          description: The user who created the job run.
        finishedAt:
          $ref: "#/components/schemas/Date"
          description: The date and time when the job run has finished.
        stateDetails:
          $ref: "#/components/schemas/String256"
          description: Additional details of the job run state.
        failureReason:
          $ref: "#/components/schemas/FailureReason"
          description: The reasons why the job run has failed.
        tags:
          type: object
          properties: {}
          description: The assigned tags of the job run.
        retryPolicyConfiguration:
          $ref: "#/components/schemas/RetryPolicyConfiguration"
          description: The configuration of the retry policy that the job runs on.
        retryPolicyExecution:
          $ref: "#/components/schemas/RetryPolicyExecution"
          description: The current status of the retry policy executed on the job.
    JobArn:
      type: string
      minLength: 60
      maxLength: 1024
      pattern: ^arn:(aws[a-zA-Z0-9-]*):emr-containers:.+:(\d{12}):\/virtualclusters\/[0-9a-zA-Z]+\/jobruns\/[0-9a-zA-Z]+$
    JobRunState:
      type: string
      enum:
        - PENDING
        - SUBMITTED
        - RUNNING
        - FAILED
        - CANCELLED
        - CANCEL_PENDING
        - COMPLETED
    RequestIdentityUserArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: ^arn:(aws[a-zA-Z0-9-]*):(iam|sts)::(\d{12})?:[\w/+=,.@-]+$
    FailureReason:
      type: string
      enum:
        - INTERNAL_ERROR
        - USER_ERROR
        - VALIDATION_ERROR
        - CLUSTER_UNAVAILABLE
    RetryPolicyConfiguration:
      description: The configuration of the retry policy that the job runs on.
      type: object
      properties:
        maxAttempts:
          $ref: "#/components/schemas/JavaInteger"
          description: The maximum number of attempts on the job's driver.
      required:
        - maxAttempts
    JavaInteger:
      type: integer
    RetryPolicyExecution:
      description: The current status of the retry policy executed on the job.
      type: object
      properties:
        currentAttemptCount:
          $ref: "#/components/schemas/JavaInteger"
          description: The current number of attempts made on the driver of the job.
      required:
        - currentAttemptCount
    DescribeJobTemplateResponse:
      type: object
      properties:
        jobTemplate:
          $ref: "#/components/schemas/JobTemplate"
          description: This output displays information about the specified job template.
    JobTemplate:
      description: "This entity describes a job template. Job template stores values of StartJobRun API request in a template and can be used to start a job run. Job template allows two use cases: avoid repeating recurring StartJobRun API request values, enforcing certain values in StartJobRun API request."
      type: object
      properties:
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: The name of the job template.
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the job template.
        arn:
          $ref: "#/components/schemas/JobTemplateArn"
          description: The ARN of the job template.
        createdAt:
          $ref: "#/components/schemas/Date"
          description: The date and time when the job template was created.
        createdBy:
          $ref: "#/components/schemas/RequestIdentityUserArn"
          description: The user who created the job template.
        tags:
          type: object
          properties: {}
          description: The tags assigned to the job template.
        jobTemplateData:
          $ref: "#/components/schemas/JobTemplateData"
          description: The job template data which holds values of StartJobRun API request.
        kmsKeyArn:
          $ref: "#/components/schemas/KmsKeyArn"
          description: The KMS key ARN used to encrypt the job template.
        decryptionError:
          $ref: "#/components/schemas/String2048"
          description: The error message in case the decryption of job template fails.
      required:
        - jobTemplateData
    String2048:
      type: string
      minLength: 1
      maxLength: 2048
      pattern: .*\S.*
    DescribeManagedEndpointResponse:
      type: object
      properties:
        endpoint:
          $ref: "#/components/schemas/Endpoint"
          description: This output displays information about a managed endpoint.
    Endpoint:
      description: This entity represents the endpoint that is managed by Amazon EMR on EKS.
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the endpoint.
        name:
          $ref: "#/components/schemas/ResourceNameString"
          description: The name of the endpoint.
        arn:
          $ref: "#/components/schemas/EndpointArn"
          description: The ARN of the endpoint.
        virtualClusterId:
          $ref: "#/components/schemas/ResourceIdString"
          description: The ID of the endpoint's virtual cluster.
        type_:
          $ref: "#/components/schemas/EndpointType"
          description: The type of the endpoint.
        state:
          $ref: "#/components/schemas/EndpointState"
          description: The state of the endpoint.
        releaseLabel:
          $ref: "#/components/schemas/ReleaseLabel"
          description: The EMR release version to be used for the endpoint.
        executionRoleArn:
          $ref: "#/components/schemas/IAMRoleArn"
          description: The execution role ARN of the endpoint.
        certificateArn:
          $ref: "#/components/schemas/ACMCertArn"
          description: The certificate ARN of the endpoint. This field is under deprecation and will be removed in future.
        certificateAuthority:
          $ref: "#/components/schemas/Certificate"
          description: The certificate generated by emr control plane on customer behalf to secure the managed endpoint.
        configurationOverrides:
          $ref: "#/components/schemas/ConfigurationOverrides"
          description: The configuration settings that are used to override existing configurations for endpoints.
