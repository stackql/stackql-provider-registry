openapi: 3.0.0
info:
  version: "2024-07-01"
  title: AWS User Experience Customization
  description: AWS User Experience Customization
  x-serviceName: uxc
  x-serviceAlias: uxc
  x-protocol: rest-json
  x-apiVersion: "2024-07-01"
  x-endpointPrefix: uxc
servers:
  - url: https://uxc.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for uxc
paths:
  /v1/account-customizations:
    get:
      operationId: GetAccountCustomizations
      description: "Returns the current account customization settings, including account color, visible services, and visible Regions. Settings that you have not configured return their default values: visible Regions and visible services return `null`, and account color returns `none`. The visibleServices and visibleRegions settings control only the appearance of services and Regions in the Amazon Web Services Management Console. They do not restrict access through the CLI, SDKs, or other APIs."
      parameters: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountCustomizationsOutput"
    patch:
      operationId: UpdateAccountCustomizations
      description: Updates one or more account customization settings. You can update account color, visible services, and visible Regions in a single request. Only the settings that you include in the request body are modified. Omitted settings remain unchanged. To reset a setting to its default behavior, set the value to null for visible Regions and visible services, or none for account color. This operation is idempotent. The visibleServices and visibleRegions settings control only the appearance of services and Regions in the Amazon Web Services Management Console. They do not restrict access through the CLI, SDKs, or other APIs.
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                accountColor:
                  $ref: "#/components/schemas/AccountColor"
                visibleServices:
                  $ref: "#/components/schemas/ServiceList"
                visibleRegions:
                  $ref: "#/components/schemas/RegionsList"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountCustomizationsOutput"
  /v1/services:
    get:
      operationId: ListServices
      description: Returns a paginated list of Amazon Web Services service identifiers that you can use as values for the visibleServices setting in UpdateAccountCustomizations. The available services vary by Amazon Web Services partition. Use pagination to retrieve all results. The visibleServices setting controls only the appearance of services in the Amazon Web Services Management Console. It does not restrict access through the CLI, SDKs, or other APIs.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/NextToken"
          description: The token for retrieving the next page of results. Use the nextToken value from a previous response.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MaxResults"
          description: The maximum number of results to return per page.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListServicesOutputDisplay"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    GetAccountCustomizationsOutput:
      type: object
      properties:
        accountColor:
          $ref: "#/components/schemas/AccountColor"
          description: The account color preference. A value of none indicates that you have not set a color.
        visibleServices:
          $ref: "#/components/schemas/ServiceList"
          description: The list of Amazon Web Services service identifiers that are visible to the account in the Amazon Web Services Management Console. A value of null indicates that you have not configured this feature and all services are visible. For valid service identifiers, call ListServices.
        visibleRegions:
          $ref: "#/components/schemas/RegionsList"
          description: The list of Amazon Web Services Region codes that are visible to the account in the Amazon Web Services Management Console. A value of null indicates that you have not configured this feature and all Regions are visible. For a list of valid Region codes, see Amazon Web Services Regions.
    AccountColor:
      type: string
      enum:
        - none
        - pink
        - purple
        - darkBlue
        - lightBlue
        - teal
        - green
        - yellow
        - orange
        - red
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Service:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-z0-9]+(-[a-z0-9]+)*"
    RegionsList:
      type: array
      items:
        $ref: "#/components/schemas/Region"
    Region:
      type: string
      pattern: "[a-z]{2}(-[a-z]{1,10}){1,2}-[1-9]"
    NextToken:
      type: string
      minLength: 32
      maxLength: 512
      pattern: "[-A-Za-z0-9+/_]+=*"
    MaxResults:
      type: integer
      minimum: 1
      maximum: 1000
    ListServicesRowDisplay:
      type: object
      properties:
        service:
          type: string
          description: The list of available Amazon Web Services service identifiers.
    ListServicesOutputDisplay:
      type: object
      properties:
        line_items:
          type: array
          items:
            $ref: "#/components/schemas/ListServicesRowDisplay"
    UpdateAccountCustomizationsOutput:
      type: object
      properties:
        accountColor:
          $ref: "#/components/schemas/AccountColor"
          description: The current account color preference after the update.
        visibleServices:
          $ref: "#/components/schemas/ServiceList"
          description: The current list of visible service identifiers after the update.
        visibleRegions:
          $ref: "#/components/schemas/RegionsList"
          description: The current list of visible Region codes after the update.
  x-stackQL-resources:
    account_customizations:
      id: aws.uxc.account_customizations
      name: account_customizations
      title: account_customizations
      methods:
        get_account_customizations:
          operation:
            $ref: "#/paths/~1v1~1account-customizations/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
        update_account_customizations:
          operation:
            $ref: "#/paths/~1v1~1account-customizations/patch"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
          request:
            nativeCasing: pascal
          config:
            requestBodyTranslate:
              algorithm: naive
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/account_customizations/methods/get_account_customizations"
        insert: []
        update:
          - $ref: "#/components/x-stackQL-resources/account_customizations/methods/update_account_customizations"
        delete: []
    services:
      id: aws.uxc.services
      name: services
      title: services
      methods:
        list_services:
          operation:
            $ref: "#/paths/~1v1~1services/get"
          response:
            openAPIDocKey: "200"
            mediaType: application/json
            overrideMediaType: application/json
            schema_override:
              $ref: "#/components/schemas/ListServicesOutputDisplay"
            transform:
              type: golang_template_json_v0.3.0
              body: '{{- $lst := index . "services" -}}{{- $tok := index . "nextToken" -}}{"line_items": [{{- if eq (kindOf $lst) "slice" -}}{{- range $i, $v := $lst -}}{{- if $i }},{{ end }}{"service": {{ toJson $v }}}{{- end -}}{{- end -}}]{{- if $tok }}, "nextToken": {{ toJson $tok }}{{- end }}}'
            objectKey: $.line_items
          request:
            nativeCasing: pascal
          config:
            pagination:
              requestToken:
                key: nextToken
                location: query
              responseToken:
                key: $.nextToken
                location: body
      sqlVerbs:
        select:
          - $ref: "#/components/x-stackQL-resources/services/methods/list_services"
        insert: []
        update: []
        delete: []
