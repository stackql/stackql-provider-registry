                detectorId:
                  $ref: "#/components/schemas/identifier"
                  description: The detector ID.
                detectorVersionId:
                  $ref: "#/components/schemas/wholeNumberVersionString"
                  description: The detector version ID.
                description:
                  $ref: "#/components/schemas/description"
                  description: The description.
              required:
                - detectorId
                - detectorVersionId
                - description
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateDetectorVersionMetadataResult"
  /UpdateDetectorVersionStatus:
    post:
      operationId: UpdateDetectorVersionStatus
      description: "Updates the detector version’s status. You can perform the following promotions or demotions using UpdateDetectorVersionStatus: DRAFT to ACTIVE, ACTIVE to INACTIVE, and INACTIVE to ACTIVE."
      parameters:
        - name: X-Amz-Target
