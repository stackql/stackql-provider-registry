openapi: 3.0.0
info:
  version: "2019-11-15"
  title: Amazon Fraud Detector
  description: Amazon Fraud Detector
  x-serviceName: frauddetector
  x-serviceAlias: frauddetector
  x-protocol: json
  x-apiVersion: "2019-11-15"
  x-endpointPrefix: frauddetector
  x-targetPrefix: AWSHawksNestServiceFacade
  x-jsonVersion: "1.1"
servers:
  - url: https://frauddetector.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for frauddetector
paths:
  /BatchCreateVariable:
    post:
      operationId: BatchCreateVariable
      description: Creates a batch of variables.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.BatchCreateVariable
            default: AWSHawksNestServiceFacade.BatchCreateVariable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                variableEntries:
                  $ref: "#/components/schemas/VariableEntryList"
                  description: The list of variables for the batch create variable request.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - variableEntries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateVariableResult"
  /BatchGetVariable:
    post:
      operationId: BatchGetVariable
      description: Gets a batch of variables.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.BatchGetVariable
            default: AWSHawksNestServiceFacade.BatchGetVariable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                names:
                  $ref: "#/components/schemas/NameList"
                  description: The list of variable names to get.
              required:
                - names
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetVariableResult"
  /CancelBatchImportJob:
    post:
      operationId: CancelBatchImportJob
      description: Cancels an in-progress batch import job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CancelBatchImportJob
            default: AWSHawksNestServiceFacade.CancelBatchImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of an in-progress batch import job to cancel. Amazon Fraud Detector will throw an error if the batch import job is in FAILED, CANCELED, or COMPLETED state.
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBatchImportJobResult"
  /CancelBatchPredictionJob:
    post:
      operationId: CancelBatchPredictionJob
      description: Cancels the specified batch prediction job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CancelBatchPredictionJob
            default: AWSHawksNestServiceFacade.CancelBatchPredictionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the batch prediction job to cancel.
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBatchPredictionJobResult"
  /CreateBatchImportJob:
    post:
      operationId: CreateBatchImportJob
      description: Creates a batch import job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateBatchImportJob
            default: AWSHawksNestServiceFacade.CreateBatchImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the batch import job. The ID cannot be of a past job, unless the job exists in CREATE_FAILED state.
                inputPath:
                  $ref: "#/components/schemas/s3BucketLocation"
                  description: The URI that points to the Amazon S3 location of your data file.
                outputPath:
                  $ref: "#/components/schemas/s3BucketLocation"
                  description: The URI that points to the Amazon S3 location for storing your results.
                eventTypeName:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the event type.
                iamRoleArn:
                  $ref: "#/components/schemas/iamRoleArn"
                  description: The ARN of the IAM role created for Amazon S3 bucket that holds your data file. The IAM role must have read permissions to your input S3 bucket and write permissions to your output S3 bucket. For more information about bucket permissions, see User policy examples in the Amazon S3 User Guide.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key-value pairs associated with this request.
              required:
                - jobId
                - inputPath
                - outputPath
                - eventTypeName
                - iamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchImportJobResult"
  /CreateBatchPredictionJob:
    post:
      operationId: CreateBatchPredictionJob
      description: Creates a batch prediction job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateBatchPredictionJob
            default: AWSHawksNestServiceFacade.CreateBatchPredictionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the batch prediction job.
                inputPath:
                  $ref: "#/components/schemas/s3BucketLocation"
                  description: The Amazon S3 location of your training file.
                outputPath:
                  $ref: "#/components/schemas/s3BucketLocation"
                  description: The Amazon S3 location of your output file.
                eventTypeName:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the event type.
                detectorName:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the detector.
                detectorVersion:
                  $ref: "#/components/schemas/wholeNumberVersionString"
                  description: The detector version.
                iamRoleArn:
                  $ref: "#/components/schemas/iamRoleArn"
                  description: The ARN of the IAM role to use for this job request. The IAM Role must have read permissions to your input S3 bucket and write permissions to your output S3 bucket. For more information about bucket permissions, see User policy examples in the Amazon S3 User Guide.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - jobId
                - inputPath
                - outputPath
                - eventTypeName
                - detectorName
                - iamRoleArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBatchPredictionJobResult"
  /CreateDetectorVersion:
    post:
      operationId: CreateDetectorVersion
      description: Creates a detector version. The detector version starts in a DRAFT status.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateDetectorVersion
            default: AWSHawksNestServiceFacade.CreateDetectorVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                detectorId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the detector under which you want to create a new version.
                description:
                  $ref: "#/components/schemas/description"
                  description: The description of the detector version.
                externalModelEndpoints:
                  $ref: "#/components/schemas/ListOfStrings"
                  description: The Amazon Sagemaker model endpoints to include in the detector version.
                rules:
                  $ref: "#/components/schemas/RuleList"
                  description: The rules to include in the detector version.
                modelVersions:
                  $ref: "#/components/schemas/ListOfModelVersions"
                  description: The model versions to include in the detector version.
                ruleExecutionMode:
                  $ref: "#/components/schemas/RuleExecutionMode"
                  description: The rule execution mode for the rules included in the detector version. You can define and edit the rule mode at the detector version level, when it is in draft status. If you specify FIRST_MATCHED, Amazon Fraud Detector evaluates rules sequentially, first to last, stopping at the first matched rule. Amazon Fraud dectector then provides the outcomes for that single rule. If you specifiy ALL_MATCHED, Amazon Fraud Detector evaluates all rules and returns the outcomes for all matched rules. The default behavior is FIRST_MATCHED.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - detectorId
                - rules
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDetectorVersionResult"
  /CreateList:
    post:
      operationId: CreateList
      description: Creates a list. List is a set of input data for a variable in your event dataset. You use the input data in a rule that's associated with your detector. For more information, see Lists.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateList
            default: AWSHawksNestServiceFacade.CreateList
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/noDashIdentifier"
                  description: The name of the list.
                elements:
                  $ref: "#/components/schemas/ElementsList"
                  description: The names of the elements, if providing. You can also create an empty list and add elements later using the UpdateList API.
                variableType:
                  $ref: "#/components/schemas/variableType"
                  description: The variable type of the list. You can only assign the variable type with String data type. For more information, see Variable types.
                description:
                  $ref: "#/components/schemas/description"
                  description: The description of the list.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of the key and value pairs.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateListResult"
  /CreateModel:
    post:
      operationId: CreateModel
      description: Creates a model using the specified model type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateModel
            default: AWSHawksNestServiceFacade.CreateModel
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                modelId:
                  $ref: "#/components/schemas/modelIdentifier"
                  description: The model ID.
                modelType:
                  $ref: "#/components/schemas/ModelTypeEnum"
                  description: The model type.
                description:
                  $ref: "#/components/schemas/description"
                  description: The model description.
                eventTypeName:
                  $ref: "#/components/schemas/string"
                  description: The name of the event type.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - modelId
                - modelType
                - eventTypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelResult"
  /CreateModelVersion:
    post:
      operationId: CreateModelVersion
      description: Creates a version of the model using the specified model type and model id.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateModelVersion
            default: AWSHawksNestServiceFacade.CreateModelVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                modelId:
                  $ref: "#/components/schemas/modelIdentifier"
                  description: The model ID.
                modelType:
                  $ref: "#/components/schemas/ModelTypeEnum"
                  description: The model type.
                trainingDataSource:
                  $ref: "#/components/schemas/TrainingDataSourceEnum"
                  description: The training data source location in Amazon S3.
                trainingDataSchema:
                  $ref: "#/components/schemas/TrainingDataSchema"
                  description: The training data schema.
                externalEventsDetail:
                  $ref: "#/components/schemas/ExternalEventsDetail"
                  description: Details of the external events data used for model version training. Required if trainingDataSource is EXTERNAL_EVENTS.
                ingestedEventsDetail:
                  $ref: "#/components/schemas/IngestedEventsDetail"
                  description: Details of the ingested events data used for model version training. Required if trainingDataSource is INGESTED_EVENTS.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - modelId
                - modelType
                - trainingDataSource
                - trainingDataSchema
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateModelVersionResult"
  /CreateRule:
    post:
      operationId: CreateRule
      description: Creates a rule for use with the specified detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateRule
            default: AWSHawksNestServiceFacade.CreateRule
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                ruleId:
                  $ref: "#/components/schemas/identifier"
                  description: The rule ID.
                detectorId:
                  $ref: "#/components/schemas/identifier"
                  description: The detector ID for the rule's parent detector.
                description:
                  $ref: "#/components/schemas/description"
                  description: The rule description.
                expression:
                  $ref: "#/components/schemas/ruleExpression"
                  description: The rule expression.
                language:
                  $ref: "#/components/schemas/Language"
                  description: The language of the rule.
                outcomes:
                  $ref: "#/components/schemas/NonEmptyListOfStrings"
                  description: The outcome or outcomes returned when the rule expression matches.
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - ruleId
                - detectorId
                - expression
                - language
                - outcomes
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRuleResult"
  /CreateVariable:
    post:
      operationId: CreateVariable
      description: Creates a variable.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.CreateVariable
            default: AWSHawksNestServiceFacade.CreateVariable
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/string"
                  description: The name of the variable.
                dataType:
                  $ref: "#/components/schemas/DataType"
                  description: The data type of the variable.
                dataSource:
                  $ref: "#/components/schemas/DataSource"
                  description: The source of the data.
                defaultValue:
                  $ref: "#/components/schemas/string"
                  description: The default value for the variable when no value is received.
                description:
                  $ref: "#/components/schemas/string"
                  description: The description.
                variableType:
                  $ref: "#/components/schemas/string"
                  description: "The variable type. For more information see Variable types. Valid Values: AUTH_CODE | AVS | BILLING_ADDRESS_L1 | BILLING_ADDRESS_L2 | BILLING_CITY | BILLING_COUNTRY | BILLING_NAME | BILLING_PHONE | BILLING_STATE | BILLING_ZIP | CARD_BIN | CATEGORICAL | CURRENCY_CODE | EMAIL_ADDRESS | FINGERPRINT | FRAUD_LABEL | FREE_FORM_TEXT | IP_ADDRESS | NUMERIC | ORDER_ID | PAYMENT_TYPE | PHONE_NUMBER | PRICE | PRODUCT_CATEGORY | SHIPPING_ADDRESS_L1 | SHIPPING_ADDRESS_L2 | SHIPPING_CITY | SHIPPING_COUNTRY | SHIPPING_NAME | SHIPPING_PHONE | SHIPPING_STATE | SHIPPING_ZIP | USERAGENT"
                tags:
                  $ref: "#/components/schemas/tagList"
                  description: A collection of key and value pairs.
              required:
                - name
                - dataType
                - dataSource
                - defaultValue
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVariableResult"
  /DeleteBatchImportJob:
    post:
      operationId: DeleteBatchImportJob
      description: Deletes the specified batch import job ID record. This action does not delete the data that was batch imported.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteBatchImportJob
            default: AWSHawksNestServiceFacade.DeleteBatchImportJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the batch import job to delete.
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBatchImportJobResult"
  /DeleteBatchPredictionJob:
    post:
      operationId: DeleteBatchPredictionJob
      description: Deletes a batch prediction job.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteBatchPredictionJob
            default: AWSHawksNestServiceFacade.DeleteBatchPredictionJob
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                jobId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the batch prediction job to delete.
              required:
                - jobId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteBatchPredictionJobResult"
  /DeleteDetector:
    post:
      operationId: DeleteDetector
      description: Deletes the detector. Before deleting a detector, you must first delete all detector versions and rule versions associated with the detector. When you delete a detector, Amazon Fraud Detector permanently deletes the detector and the data is no longer stored in Amazon Fraud Detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteDetector
            default: AWSHawksNestServiceFacade.DeleteDetector
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                detectorId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the detector to delete.
              required:
                - detectorId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDetectorResult"
  /DeleteDetectorVersion:
    post:
      operationId: DeleteDetectorVersion
      description: Deletes the detector version. You cannot delete detector versions that are in ACTIVE status. When you delete a detector version, Amazon Fraud Detector permanently deletes the detector and the data is no longer stored in Amazon Fraud Detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteDetectorVersion
            default: AWSHawksNestServiceFacade.DeleteDetectorVersion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                detectorId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the parent detector for the detector version to delete.
                detectorVersionId:
                  $ref: "#/components/schemas/wholeNumberVersionString"
                  description: The ID of the detector version to delete.
              required:
                - detectorId
                - detectorVersionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteDetectorVersionResult"
  /DeleteEntityType:
    post:
      operationId: DeleteEntityType
      description: Deletes an entity type. You cannot delete an entity type that is included in an event type. When you delete an entity type, Amazon Fraud Detector permanently deletes that entity type and the data is no longer stored in Amazon Fraud Detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteEntityType
            default: AWSHawksNestServiceFacade.DeleteEntityType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the entity type to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEntityTypeResult"
  /DeleteEvent:
    post:
      operationId: DeleteEvent
      description: Deletes the specified event. When you delete an event, Amazon Fraud Detector permanently deletes that event and the event data is no longer stored in Amazon Fraud Detector. If deleteAuditHistory is True, event data is available through search for up to 30 seconds after the delete operation is completed.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteEvent
            default: AWSHawksNestServiceFacade.DeleteEvent
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventId:
                  $ref: "#/components/schemas/identifier"
                  description: The ID of the event to delete.
                eventTypeName:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the event type.
                deleteAuditHistory:
                  $ref: "#/components/schemas/DeleteAuditHistory"
                  description: Specifies whether or not to delete any predictions associated with the event. If set to True,
              required:
                - eventId
                - eventTypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventResult"
  /DeleteEventType:
    post:
      operationId: DeleteEventType
      description: Deletes an event type. You cannot delete an event type that is used in a detector or a model. When you delete an event type, Amazon Fraud Detector permanently deletes that event type and the data is no longer stored in Amazon Fraud Detector.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteEventType
            default: AWSHawksNestServiceFacade.DeleteEventType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the event type to delete.
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteEventTypeResult"
  /DeleteEventsByEventType:
    post:
      operationId: DeleteEventsByEventType
      description: Deletes all events of a particular event type.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - AWSHawksNestServiceFacade.DeleteEventsByEventType
            default: AWSHawksNestServiceFacade.DeleteEventsByEventType
      requestBody:
        required: true
        content:
          application/x-amz-json-1.1:
            schema:
              type: object
              properties:
                eventTypeName:
                  $ref: "#/components/schemas/identifier"
                  description: The name of the event type.
              required:
                - eventTypeName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
