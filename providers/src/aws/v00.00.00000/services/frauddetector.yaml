components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    VariableEntryList:
      type: array
      items:
        $ref: "#/components/schemas/VariableEntry"
    VariableEntry:
      description: A variable in the list of variables for the batch create variable request.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/string"
          description: The name of the variable.
        dataType:
          $ref: "#/components/schemas/string"
          description: The data type of the variable.
        dataSource:
          $ref: "#/components/schemas/string"
          description: The data source of the variable.
        defaultValue:
          $ref: "#/components/schemas/string"
          description: The default value of the variable.
        description:
          $ref: "#/components/schemas/string"
          description: The description of the variable.
        variableType:
          $ref: "#/components/schemas/string"
          description: "The type of the variable. For more information see Variable types. Valid Values: AUTH_CODE | AVS | BILLING_ADDRESS_L1 | BILLING_ADDRESS_L2 | BILLING_CITY | BILLING_COUNTRY | BILLING_NAME | BILLING_PHONE | BILLING_STATE | BILLING_ZIP | CARD_BIN | CATEGORICAL | CURRENCY_CODE | EMAIL_ADDRESS | FINGERPRINT | FRAUD_LABEL | FREE_FORM_TEXT | IP_ADDRESS | NUMERIC | ORDER_ID | PAYMENT_TYPE | PHONE_NUMBER | PRICE | PRODUCT_CATEGORY | SHIPPING_ADDRESS_L1 | SHIPPING_ADDRESS_L2 | SHIPPING_CITY | SHIPPING_COUNTRY | SHIPPING_NAME | SHIPPING_PHONE | SHIPPING_STATE | SHIPPING_ZIP | USERAGENT"
    string:
      type: string
    tagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: A key and value pair.
      type: object
      properties:
        key:
          $ref: "#/components/schemas/tagKey"
          description: A tag key.
        value:
          $ref: "#/components/schemas/tagValue"
          description: A value assigned to a tag key.
      required:
        - key
        - value
    tagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ^([\p{L}\p{Z}\p{N}_.:/=+\-@]*)$
    tagValue:
      type: string
      minLength: 0
      maxLength: 256
    BatchCreateVariableResult:
      type: object
      properties:
        errors:
          $ref: "#/components/schemas/BatchCreateVariableErrorList"
          description: Provides the errors for the BatchCreateVariable request.
    BatchCreateVariableErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchCreateVariableError"
    BatchCreateVariableError:
      description: Provides the error of the batch create variable API.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/string"
          description: The name.
        code:
          $ref: "#/components/schemas/integer"
          description: The error code.
        message:
          $ref: "#/components/schemas/string"
          description: The error message.
    integer:
      type: integer
    NameList:
      type: array
      items:
        $ref: "#/components/schemas/string"
    BatchGetVariableResult:
      type: object
      properties:
        variables:
          $ref: "#/components/schemas/VariableList"
          description: The returned variables.
        errors:
          $ref: "#/components/schemas/BatchGetVariableErrorList"
          description: The errors from the request.
    VariableList:
      type: array
      items:
        $ref: "#/components/schemas/Variable"
    Variable:
      description: The variable.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/string"
          description: The name of the variable.
        dataType:
          $ref: "#/components/schemas/DataType"
          description: The data type of the variable. For more information see Variable types.
        dataSource:
          $ref: "#/components/schemas/DataSource"
          description: The data source of the variable.
        defaultValue:
          $ref: "#/components/schemas/string"
          description: The default value of the variable.
        description:
          $ref: "#/components/schemas/string"
          description: The description of the variable.
        variableType:
          $ref: "#/components/schemas/string"
          description: "The variable type of the variable. Valid Values: AUTH_CODE | AVS | BILLING_ADDRESS_L1 | BILLING_ADDRESS_L2 | BILLING_CITY | BILLING_COUNTRY | BILLING_NAME | BILLING_PHONE | BILLING_STATE | BILLING_ZIP | CARD_BIN | CATEGORICAL | CURRENCY_CODE | EMAIL_ADDRESS | FINGERPRINT | FRAUD_LABEL | FREE_FORM_TEXT | IP_ADDRESS | NUMERIC | ORDER_ID | PAYMENT_TYPE | PHONE_NUMBER | PRICE | PRODUCT_CATEGORY | SHIPPING_ADDRESS_L1 | SHIPPING_ADDRESS_L2 | SHIPPING_CITY | SHIPPING_COUNTRY | SHIPPING_NAME | SHIPPING_PHONE | SHIPPING_STATE | SHIPPING_ZIP | USERAGENT"
        lastUpdatedTime:
          $ref: "#/components/schemas/time"
          description: The time when variable was last updated.
        createdTime:
          $ref: "#/components/schemas/time"
          description: The time when the variable was created.
        arn:
          $ref: "#/components/schemas/fraudDetectorArn"
          description: The ARN of the variable.
    DataType:
      type: string
      enum:
        - STRING
        - INTEGER
        - FLOAT
        - BOOLEAN
        - DATETIME
    DataSource:
      type: string
      enum:
        - EVENT
        - MODEL_SCORE
        - EXTERNAL_MODEL_SCORE
    time:
      type: string
      minLength: 11
      maxLength: 30
    fraudDetectorArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn\:aws[a-z-]{0,15}\:frauddetector\:[a-z0-9-]{3,20}\:[0-9]{12}\:[^\s]{2,128}$
    BatchGetVariableErrorList:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetVariableError"
    BatchGetVariableError:
      description: Provides the error of the batch get variable API.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/string"
          description: The error name.
        code:
          $ref: "#/components/schemas/integer"
          description: The error code.
        message:
          $ref: "#/components/schemas/string"
          description: The error message.
    identifier:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[0-9a-z_-]+$
    CancelBatchImportJobResult:
      type: object
    CancelBatchPredictionJobResult:
      type: object
    s3BucketLocation:
      type: string
      minLength: 1
      maxLength: 512
      pattern: ^s3:\/\/(.+)$
    iamRoleArn:
      type: string
      minLength: 1
      maxLength: 256
      pattern: ^arn\:aws[a-z-]{0,15}\:iam\:\:[0-9]{12}\:role\/[^\s]{2,64}$
    CreateBatchImportJobResult:
      type: object
    wholeNumberVersionString:
      type: string
      minLength: 1
      maxLength: 5
      pattern: ^([1-9][0-9]*)$
    CreateBatchPredictionJobResult:
      type: object
    description:
      type: string
      minLength: 1
      maxLength: 128
    ListOfStrings:
      type: array
      items:
        $ref: "#/components/schemas/string"
    RuleList:
      type: array
      items:
        $ref: "#/components/schemas/Rule"
    Rule:
      description: A rule.
      type: object
      properties:
        detectorId:
          $ref: "#/components/schemas/identifier"
          description: The detector for which the rule is associated.
        ruleId:
          $ref: "#/components/schemas/identifier"
          description: The rule ID.
        ruleVersion:
          $ref: "#/components/schemas/wholeNumberVersionString"
          description: The rule version.
      required:
        - detectorId
        - ruleId
        - ruleVersion
    ListOfModelVersions:
      type: array
      items:
        $ref: "#/components/schemas/ModelVersion"
    ModelVersion:
      description: The model version.
      type: object
      properties:
        modelId:
          $ref: "#/components/schemas/modelIdentifier"
          description: The model ID.
        modelType:
          $ref: "#/components/schemas/ModelTypeEnum"
          description: The model type.
        modelVersionNumber:
          $ref: "#/components/schemas/floatVersionString"
          description: The model version number.
        arn:
          $ref: "#/components/schemas/fraudDetectorArn"
          description: The model version ARN.
      required:
        - modelId
        - modelType
        - modelVersionNumber
    modelIdentifier:
      type: string
      minLength: 1
      maxLength: 64
      pattern: ^[0-9a-z_]+$
    ModelTypeEnum:
      type: string
      enum:
