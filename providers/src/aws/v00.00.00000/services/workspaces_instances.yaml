        Ipv6Addresses:
          $ref: "#/components/schemas/Ipv6Addresses"
          description: Specific IPv6 addresses for the interface.
        Ipv6Prefixes:
          $ref: "#/components/schemas/Ipv6Prefixes"
          description: IPv6 prefix configurations for the interface.
        Ipv6PrefixCount:
          $ref: "#/components/schemas/NonNegativeInteger"
