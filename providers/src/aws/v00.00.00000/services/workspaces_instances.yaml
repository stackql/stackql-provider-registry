openapi: 3.0.0
info:
  version: "2022-07-26"
  title: Amazon Workspaces Instances
  description: Amazon Workspaces Instances
  x-serviceName: workspaces-instances
  x-serviceAlias: workspaces_instances
  x-protocol: json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: workspaces-instances
  x-targetPrefix: EUCMIFrontendAPIService
  x-jsonVersion: "1.0"
servers:
  - url: https://workspaces-instances.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for workspaces-instances
paths:
  /AssociateVolume:
    post:
      operationId: AssociateVolume
      description: Attaches a volume to a WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.AssociateVolume
            default: EUCMIFrontendAPIService.AssociateVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: WorkSpace Instance to attach volume to.
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: Volume to be attached.
                Device:
                  $ref: "#/components/schemas/DeviceName"
                  description: Device path for volume attachment.
              required:
                - WorkspaceInstanceId
                - VolumeId
                - Device
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateVolumeResponse"
  /CreateVolume:
    post:
      operationId: CreateVolume
      description: Creates a new volume for WorkSpace Instances.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.CreateVolume
            default: EUCMIFrontendAPIService.CreateVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                AvailabilityZone:
                  $ref: "#/components/schemas/String64"
                  description: Availability zone for the volume.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique token to prevent duplicate volume creation.
                Encrypted:
                  $ref: "#/components/schemas/Boolean"
                  description: Indicates if the volume should be encrypted.
                Iops:
                  $ref: "#/components/schemas/NonNegativeInteger"
                  description: Input/output operations per second for the volume.
                KmsKeyId:
                  $ref: "#/components/schemas/KmsKeyId"
                  description: KMS key for volume encryption.
                SizeInGB:
                  $ref: "#/components/schemas/NonNegativeInteger"
                  description: Volume size in gigabytes.
                SnapshotId:
                  $ref: "#/components/schemas/SnapshotId"
                  description: Source snapshot for volume creation.
                TagSpecifications:
                  $ref: "#/components/schemas/TagSpecifications"
                  description: Metadata tags for the volume.
                Throughput:
                  $ref: "#/components/schemas/NonNegativeInteger"
                  description: Volume throughput performance.
                VolumeType:
                  $ref: "#/components/schemas/VolumeTypeEnum"
                  description: Type of EBS volume.
              required:
                - AvailabilityZone
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVolumeResponse"
  /CreateWorkspaceInstance:
    post:
      operationId: CreateWorkspaceInstance
      description: Launches a new WorkSpace Instance with specified configuration parameters, enabling programmatic workspace deployment.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.CreateWorkspaceInstance
            default: EUCMIFrontendAPIService.CreateWorkspaceInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: Unique token to ensure idempotent instance creation, preventing duplicate workspace launches.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Optional metadata tags for categorizing and managing WorkSpaces Instances.
                ManagedInstance:
                  $ref: "#/components/schemas/ManagedInstanceRequest"
                  description: Comprehensive configuration settings for the WorkSpaces Instance, including network, compute, and storage parameters.
                BillingConfiguration:
                  $ref: "#/components/schemas/BillingConfiguration"
                  description: Optional billing configuration for the WorkSpace Instance. Allows customers to specify their preferred billing mode when creating a new instance. Defaults to hourly billing if not specified.
              required:
                - ManagedInstance
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceInstanceResponse"
  /DeleteVolume:
    post:
      operationId: DeleteVolume
      description: Deletes a specified volume.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.DeleteVolume
            default: EUCMIFrontendAPIService.DeleteVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: Identifier of the volume to delete.
              required:
                - VolumeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVolumeResponse"
  /DeleteWorkspaceInstance:
    post:
      operationId: DeleteWorkspaceInstance
      description: Deletes the specified WorkSpace Usage of this API will result in deletion of the resource in question.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.DeleteWorkspaceInstance
            default: EUCMIFrontendAPIService.DeleteWorkspaceInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: Unique identifier of the WorkSpaces Instance targeted for deletion.
              required:
                - WorkspaceInstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkspaceInstanceResponse"
  /DisassociateVolume:
    post:
      operationId: DisassociateVolume
      description: Detaches a volume from a WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.DisassociateVolume
            default: EUCMIFrontendAPIService.DisassociateVolume
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: WorkSpace Instance to detach volume from.
                VolumeId:
                  $ref: "#/components/schemas/VolumeId"
                  description: Volume to be detached.
                Device:
                  $ref: "#/components/schemas/DeviceName"
                  description: Device path of volume to detach.
                DisassociateMode:
                  $ref: "#/components/schemas/DisassociateModeEnum"
                  description: Mode for volume detachment.
              required:
                - WorkspaceInstanceId
                - VolumeId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateVolumeResponse"
  /GetWorkspaceInstance:
    post:
      operationId: GetWorkspaceInstance
      description: Retrieves detailed information about a specific WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.GetWorkspaceInstance
            default: EUCMIFrontendAPIService.GetWorkspaceInstance
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: Unique identifier of the WorkSpace Instance to retrieve.
              required:
                - WorkspaceInstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetWorkspaceInstanceResponse"
  /ListInstanceTypes:
    post:
      operationId: ListInstanceTypes
      description: Retrieves a list of instance types supported by Amazon WorkSpaces Instances, enabling precise workspace infrastructure configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.ListInstanceTypes
            default: EUCMIFrontendAPIService.ListInstanceTypes
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/ListInstanceTypesMaxResults"
                  description: Maximum number of instance types to return in a single API call. Enables pagination of instance type results.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Pagination token for retrieving subsequent pages of instance type results.
                InstanceConfigurationFilter:
                  $ref: "#/components/schemas/InstanceConfigurationFilter"
                  description: Optional filter to narrow instance type results based on configuration requirements. Only returns instance types that support the specified combination of tenancy, platform type, and billing mode.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListInstanceTypesResponse"
  /ListRegions:
    post:
      operationId: ListRegions
      description: Retrieves a list of AWS regions supported by Amazon WorkSpaces Instances, enabling region discovery for workspace deployments.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.ListRegions
            default: EUCMIFrontendAPIService.ListRegions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Maximum number of regions to return in a single API call. Enables pagination of region results.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Pagination token for retrieving subsequent pages of region results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRegionsResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Retrieves tags for a WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.ListTagsForResource
            default: EUCMIFrontendAPIService.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: Unique identifier of the WorkSpace Instance.
              required:
                - WorkspaceInstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /ListWorkspaceInstances:
    post:
      operationId: ListWorkspaceInstances
      description: Retrieves a collection of WorkSpaces Instances based on specified filters.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.ListWorkspaceInstances
            default: EUCMIFrontendAPIService.ListWorkspaceInstances
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ProvisionStates:
                  $ref: "#/components/schemas/ProvisionStates"
                  description: Filter WorkSpaces Instances by their current provisioning states.
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: Maximum number of WorkSpaces Instances to return in a single response.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Pagination token for retrieving subsequent pages of WorkSpaces Instances.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspaceInstancesResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds tags to a WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.TagResource
            default: EUCMIFrontendAPIService.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: Unique identifier of the WorkSpace Instance to tag.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: Tags to be added to the WorkSpace Instance.
              required:
                - WorkspaceInstanceId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from a WorkSpace Instance.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - EUCMIFrontendAPIService.UntagResource
            default: EUCMIFrontendAPIService.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                WorkspaceInstanceId:
                  $ref: "#/components/schemas/WorkspaceInstanceId"
                  description: Unique identifier of the WorkSpace Instance to untag.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: Keys of tags to be removed.
              required:
                - WorkspaceInstanceId
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    WorkspaceInstanceId:
      type: string
      minLength: 15
      maxLength: 70
      pattern: wsinst-[0-9a-zA-Z]{8,63}
    VolumeId:
      type: string
      pattern: vol-[0-9a-zA-Z]{1,63}
    DeviceName:
      type: string
      minLength: 0
      maxLength: 32
    AssociateVolumeResponse:
      description: Confirms volume attachment.
      type: object
    String64:
      type: string
      minLength: 0
      maxLength: 64
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
    Boolean:
      type: boolean
    NonNegativeInteger:
      type: integer
      minimum: 0
    KmsKeyId:
      type: string
      minLength: 0
      maxLength: 128
    SnapshotId:
      type: string
      pattern: snap-[0-9a-zA-Z]{1,63}
    TagSpecifications:
      type: array
      items:
        $ref: "#/components/schemas/TagSpecification"
    TagSpecification:
      description: Defines tagging configuration for a resource.
      type: object
      properties:
        ResourceType:
          $ref: "#/components/schemas/ResourceTypeEnum"
          description: Type of resource being tagged.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: Collection of tags for the specified resource.
    ResourceTypeEnum:
      type: string
      enum:
        - instance
        - volume
        - spot-instances-request
        - network-interface
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: Represents a key-value metadata tag.
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: Unique identifier for the tag.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: Value associated with the tag key.
    TagKey:
      type: string
      minLength: 1
      maxLength: 128
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]+)
    TagValue:
      type: string
      minLength: 0
      maxLength: 256
      pattern: ([\p{L}\p{Z}\p{N}_.:/=+\-@]*)
    VolumeTypeEnum:
      type: string
      enum:
        - standard
        - io1
        - io2
        - gp2
        - sc1
        - st1
        - gp3
    CreateVolumeResponse:
      description: Returns the created volume identifier.
      type: object
      properties:
        VolumeId:
          $ref: "#/components/schemas/VolumeId"
          description: Unique identifier for the new volume.
    ManagedInstanceRequest:
      description: Defines comprehensive configuration for a managed WorkSpace Instance.
      type: object
      properties:
        BlockDeviceMappings:
          $ref: "#/components/schemas/BlockDeviceMappings"
          description: Configures block device mappings for storage.
        CapacityReservationSpecification:
          $ref: "#/components/schemas/CapacityReservationSpecification"
          description: Specifies capacity reservation preferences.
        CpuOptions:
          $ref: "#/components/schemas/CpuOptionsRequest"
          description: Configures CPU-specific settings.
        CreditSpecification:
          $ref: "#/components/schemas/CreditSpecificationRequest"
          description: Defines CPU credit configuration for burstable instances.
        DisableApiStop:
          $ref: "#/components/schemas/Boolean"
          description: Prevents API-initiated instance stop.
        EbsOptimized:
          $ref: "#/components/schemas/Boolean"
          description: Enables optimized EBS performance.
        EnablePrimaryIpv6:
          $ref: "#/components/schemas/Boolean"
          description: Enables primary IPv6 address configuration.
        EnclaveOptions:
          $ref: "#/components/schemas/EnclaveOptionsRequest"
          description: Configures AWS Nitro Enclave settings.
        HibernationOptions:
          $ref: "#/components/schemas/HibernationOptionsRequest"
          description: Configures instance hibernation capabilities.
        IamInstanceProfile:
          $ref: "#/components/schemas/IamInstanceProfileSpecification"
          description: Specifies IAM instance profile configuration.
        ImageId:
          $ref: "#/components/schemas/ImageId"
          description: Identifies the Amazon Machine Image (AMI) for the instance.
        InstanceMarketOptions:
          $ref: "#/components/schemas/InstanceMarketOptionsRequest"
          description: Configures marketplace-specific deployment options.
        InstanceType:
          $ref: "#/components/schemas/InstanceType"
          description: Specifies the WorkSpace Instance type.
        Ipv6Addresses:
          $ref: "#/components/schemas/Ipv6Addresses"
          description: Configures specific IPv6 addresses.
        Ipv6AddressCount:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Specifies number of IPv6 addresses to assign.
        KernelId:
          $ref: "#/components/schemas/String128"
          description: Identifies the kernel for the instance.
        KeyName:
          $ref: "#/components/schemas/String64"
          description: Specifies the key pair for instance access.
        LicenseSpecifications:
          $ref: "#/components/schemas/LicenseSpecifications"
          description: Configures license-related settings.
        MaintenanceOptions:
          $ref: "#/components/schemas/InstanceMaintenanceOptionsRequest"
          description: Defines automatic maintenance settings.
        MetadataOptions:
          $ref: "#/components/schemas/InstanceMetadataOptionsRequest"
          description: Configures instance metadata service settings.
        Monitoring:
          $ref: "#/components/schemas/RunInstancesMonitoringEnabled"
          description: Enables or disables detailed instance monitoring.
        NetworkInterfaces:
          $ref: "#/components/schemas/NetworkInterfaces"
          description: Configures network interface settings.
        NetworkPerformanceOptions:
          $ref: "#/components/schemas/InstanceNetworkPerformanceOptionsRequest"
          description: Defines network performance configuration.
        Placement:
          $ref: "#/components/schemas/Placement"
          description: Specifies instance placement preferences.
        PrivateDnsNameOptions:
          $ref: "#/components/schemas/PrivateDnsNameOptionsRequest"
          description: Configures private DNS name settings.
        PrivateIpAddress:
          $ref: "#/components/schemas/Ipv4Address"
          description: Specifies the primary private IP address.
        RamdiskId:
          $ref: "#/components/schemas/String128"
          description: Identifies the ramdisk for the instance.
        SecurityGroupIds:
          $ref: "#/components/schemas/SecurityGroupIds"
          description: Specifies security group identifiers.
        SecurityGroups:
          $ref: "#/components/schemas/SecurityGroupNames"
          description: Configures security group settings.
        SubnetId:
          $ref: "#/components/schemas/SubnetId"
          description: Identifies the subnet for the instance.
        TagSpecifications:
          $ref: "#/components/schemas/TagSpecifications"
          description: Configures resource tagging specifications.
        UserData:
          $ref: "#/components/schemas/UserData"
          description: Provides custom initialization data for the instance.
    BlockDeviceMappings:
      type: array
      items:
        $ref: "#/components/schemas/BlockDeviceMappingRequest"
    BlockDeviceMappingRequest:
      description: Defines device mapping for WorkSpace Instance storage.
      type: object
      properties:
        DeviceName:
          $ref: "#/components/schemas/DeviceName"
          description: Name of the device for storage mapping.
        Ebs:
          $ref: "#/components/schemas/EbsBlockDevice"
          description: EBS volume configuration for the device.
        NoDevice:
          $ref: "#/components/schemas/DeviceName"
          description: Indicates device should not be mapped.
        VirtualName:
          $ref: "#/components/schemas/VirtualName"
          description: Virtual device name for ephemeral storage.
    EbsBlockDevice:
      description: Defines configuration for an Elastic Block Store volume.
      type: object
      properties:
        VolumeType:
          $ref: "#/components/schemas/VolumeTypeEnum"
          description: Type of EBS volume (e.g., gp2, io1).
        Encrypted:
          $ref: "#/components/schemas/Boolean"
          description: Indicates if the volume is encrypted.
        KmsKeyId:
          $ref: "#/components/schemas/KmsKeyId"
          description: KMS key used for volume encryption.
        Iops:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Input/output operations per second for the volume.
        Throughput:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Volume data transfer rate.
        VolumeSize:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Size of the EBS volume in gigabytes.
    VirtualName:
      type: string
      pattern: ephemeral(0|[1-9][0-9]{0,2})
    CapacityReservationSpecification:
      description: Specifies capacity reservation preferences.
      type: object
      properties:
        CapacityReservationPreference:
          $ref: "#/components/schemas/CapacityReservationPreferenceEnum"
          description: Preference for using capacity reservation.
        CapacityReservationTarget:
          $ref: "#/components/schemas/CapacityReservationTarget"
          description: Specific capacity reservation target.
    CapacityReservationPreferenceEnum:
      type: string
      enum:
        - capacity-reservations-only
        - open
        - none
    CapacityReservationTarget:
      description: Identifies a specific capacity reservation.
      type: object
      properties:
        CapacityReservationId:
          $ref: "#/components/schemas/String128"
          description: Unique identifier for the capacity reservation.
        CapacityReservationResourceGroupArn:
          $ref: "#/components/schemas/ARN"
          description: ARN of the capacity reservation resource group.
    String128:
      type: string
      minLength: 0
      maxLength: 128
    ARN:
      type: string
      minLength: 0
      maxLength: 2048
      pattern: arn:.*
    CpuOptionsRequest:
      description: Configures CPU-specific settings for WorkSpace Instance.
      type: object
      properties:
        AmdSevSnp:
          $ref: "#/components/schemas/AmdSevSnpEnum"
          description: AMD Secure Encrypted Virtualization configuration.
        CoreCount:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Number of CPU cores to allocate.
        ThreadsPerCore:
          $ref: "#/components/schemas/NonNegativeInteger"
          description: Number of threads per CPU core.
    AmdSevSnpEnum:
      type: string
      enum:
        - enabled
        - disabled
    CreditSpecificationRequest:
      description: Defines CPU credit configuration for burstable instances.
      type: object
      properties:
        CpuCredits:
          $ref: "#/components/schemas/CpuCreditsEnum"
          description: CPU credit specification mode.
    CpuCreditsEnum:
