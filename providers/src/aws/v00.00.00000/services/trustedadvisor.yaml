openapi: 3.0.0
info:
  version: "2022-09-15"
  title: TrustedAdvisor Public API
  description: TrustedAdvisor Public API
  x-serviceName: trustedadvisor
  x-serviceAlias: trustedadvisor
  x-protocol: rest-json
  x-apiVersion: "2022-09-15"
  x-endpointPrefix: trustedadvisor
servers:
  - url: https://trustedadvisor.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for trustedadvisor
paths:
  /v1/batch-update-recommendation-resource-exclusion:
    put:
      operationId: BatchUpdateRecommendationResourceExclusion
      description: Update one or more exclusion statuses for a list of recommendation resources. This API supports up to 25 unique recommendation resource ARNs per request. This API currently doesn't support prioritized recommendation resources. This API updates global recommendations, eliminating the need to call the API in each AWS Region. After submitting an exclusion update, note that it might take a few minutes for the changes to be reflected in the system.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recommendationResourceExclusions:
                  $ref: "#/components/schemas/RecommendationResourceExclusionList"
              required:
                - recommendationResourceExclusions
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchUpdateRecommendationResourceExclusionResponse"
  /v1/organization-recommendations/{organization_recommendation_identifier}:
    get:
      operationId: GetOrganizationRecommendation
      description: Get a specific recommendation within an AWS Organizations organization. This API supports only prioritized recommendations and provides global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: organization_recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationRecommendationIdentifier"
          description: The Recommendation identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetOrganizationRecommendationResponse"
  /v1/recommendations/{recommendation_identifier}:
    get:
      operationId: GetRecommendation
      description: Get a specific Recommendation. This API provides global recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountRecommendationIdentifier"
          description: The Recommendation identifier
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationLanguage"
          description: The ISO 639-1 code for the language that you want your recommendations to appear in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetRecommendationResponse"
  /v1/checks:
    get:
      operationId: ListChecks
      description: List a filterable set of Checks. This API provides global recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListChecksRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListChecksRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: pillar
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationPillar"
          description: The pillar of the check
        - name: awsService
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationAwsService"
          description: The aws service associated with the check
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationSource"
          description: The source of the check
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationLanguage"
          description: The ISO 639-1 code for the language that you want your checks to appear in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListChecksResponse"
  /v1/organization-recommendations/{organization_recommendation_identifier}/accounts:
    get:
      operationId: ListOrganizationRecommendationAccounts
      description: Lists the accounts that own the resources for an organization aggregate recommendation. This API only supports prioritized recommendations and provides global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationAccountsRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationAccountsRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: organization_recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationRecommendationIdentifier"
          description: The Recommendation identifier
        - name: affectedAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: An account affected by this organization recommendation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationRecommendationAccountsResponse"
  /v1/organization-recommendations/{organization_recommendation_identifier}/resources:
    get:
      operationId: ListOrganizationRecommendationResources
      description: List Resources of a Recommendation within an Organization. This API only supports prioritized recommendations and provides global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationResourcesRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationResourcesRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceStatus"
          description: The status of the resource
        - name: exclusionStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExclusionStatus"
          description: The exclusion status of the resource
        - name: regionCode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The AWS Region code of the resource
        - name: organization_recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationRecommendationIdentifier"
          description: The AWS Organization organization's Recommendation identifier
        - name: affectedAccountId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountId"
          description: An account affected by this organization recommendation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationRecommendationResourcesResponse"
  /v1/organization-recommendations:
    get:
      operationId: ListOrganizationRecommendations
      description: List a filterable set of Recommendations within an Organization. This API only supports prioritized recommendations and provides global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationsRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListOrganizationRecommendationsRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationType"
          description: The type of the Recommendation
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationStatus"
          description: The status of the Recommendation
        - name: pillar
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationPillar"
          description: The pillar of the Recommendation
        - name: awsService
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationAwsService"
          description: The aws service associated with the Recommendation
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationSource"
          description: The source of the Recommendation
        - name: checkIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CheckIdentifier"
          description: The check identifier of the Recommendation
        - name: afterLastUpdatedAt
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: After the last update of the Recommendation
        - name: beforeLastUpdatedAt
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Before the last update of the Recommendation
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationRecommendationsResponse"
  /v1/recommendations/{recommendation_identifier}/resources:
    get:
      operationId: ListRecommendationResources
      description: List Resources of a Recommendation. This API provides global recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRecommendationResourcesRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRecommendationResourcesRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ResourceStatus"
          description: The status of the resource
        - name: exclusionStatus
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ExclusionStatus"
          description: The exclusion status of the resource
        - name: regionCode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/String"
          description: The AWS Region code of the resource
        - name: recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountRecommendationIdentifier"
          description: The Recommendation identifier
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationLanguage"
          description: The ISO 639-1 code for the language that you want your recommendations to appear in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationResourcesResponse"
  /v1/recommendations:
    get:
      operationId: ListRecommendations
      description: List a filterable set of Recommendations. This API provides global recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: nextToken
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRecommendationsRequestNextTokenString"
          description: The token for the next set of results. Use the value returned in the previous response in the next request to retrieve the next set of results.
        - name: maxResults
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ListRecommendationsRequestMaxResultsInteger"
          description: The maximum number of results to return per page.
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationType"
          description: The type of the Recommendation
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationStatus"
          description: The status of the Recommendation
        - name: pillar
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationPillar"
          description: The pillar of the Recommendation
        - name: awsService
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationAwsService"
          description: The aws service associated with the Recommendation
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationSource"
          description: The source of the Recommendation
        - name: checkIdentifier
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CheckIdentifier"
          description: The check identifier of the Recommendation
        - name: afterLastUpdatedAt
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: After the last update of the Recommendation
        - name: beforeLastUpdatedAt
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Timestamp"
          description: Before the last update of the Recommendation
        - name: language
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RecommendationLanguage"
          description: The ISO 639-1 code for the language that you want your recommendations to appear in.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecommendationsResponse"
  /v1/organization-recommendations/{organization_recommendation_identifier}/lifecycle:
    put:
      operationId: UpdateOrganizationRecommendationLifecycle
      description: Update the lifecycle of a Recommendation within an Organization. This API only supports prioritized recommendations and updates global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: organization_recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OrganizationRecommendationIdentifier"
          description: The Recommendation identifier for AWS Trusted Advisor Priority recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lifecycleStage:
                  $ref: "#/components/schemas/UpdateRecommendationLifecycleStage"
                updateReason:
                  $ref: "#/components/schemas/RecommendationUpdateReason"
                updateReasonCode:
                  $ref: "#/components/schemas/UpdateRecommendationLifecycleStageReasonCode"
              required:
                - lifecycleStage
      responses:
        "200":
          description: Success
  /v1/recommendations/{recommendation_identifier}/lifecycle:
    put:
      operationId: UpdateRecommendationLifecycle
      description: Update the lifecyle of a Recommendation. This API only supports prioritized recommendations and updates global priority recommendations, eliminating the need to call the API in each AWS Region.
      parameters:
        - name: recommendation_identifier
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AccountRecommendationIdentifier"
          description: The Recommendation identifier for AWS Trusted Advisor Priority recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lifecycleStage:
                  $ref: "#/components/schemas/UpdateRecommendationLifecycleStage"
                updateReason:
                  $ref: "#/components/schemas/RecommendationUpdateReason"
                updateReasonCode:
                  $ref: "#/components/schemas/UpdateRecommendationLifecycleStageReasonCode"
              required:
                - lifecycleStage
      responses:
        "200":
          description: Success
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    RecommendationResourceExclusionList:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationResourceExclusion"
    RecommendationResourceExclusion:
      description: The request entry for Recommendation Resource exclusion. Each entry is a combination of Recommendation Resource ARN and corresponding exclusion status
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RecommendationResourceArn"
          description: The ARN of the Recommendation Resource
        isExcluded:
          $ref: "#/components/schemas/Boolean"
          description: The exclusion status
      required:
        - arn
        - isExcluded
    RecommendationResourceArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w-]+:trustedadvisor::\d{12}:recommendation-resource\/[\w-]+\/[\w-]+
    Boolean:
      type: boolean
    BatchUpdateRecommendationResourceExclusionResponse:
      type: object
      properties:
        batchUpdateRecommendationResourceExclusionErrors:
          $ref: "#/components/schemas/UpdateRecommendationResourceExclusionErrorList"
          description: A list of recommendation resource ARNs whose exclusion status failed to update, if any
      required:
        - batchUpdateRecommendationResourceExclusionErrors
    UpdateRecommendationResourceExclusionErrorList:
      type: array
      items:
        $ref: "#/components/schemas/UpdateRecommendationResourceExclusionError"
    UpdateRecommendationResourceExclusionError:
      description: The error entry for Recommendation Resource exclusion. Each entry is a combination of Recommendation Resource ARN, error code and error message
      type: object
      properties:
        arn:
          $ref: "#/components/schemas/RecommendationResourceArn"
          description: The ARN of the Recommendation Resource
        errorCode:
          $ref: "#/components/schemas/String"
          description: The error code
        errorMessage:
          $ref: "#/components/schemas/String"
          description: The error message
    String:
      type: string
    OrganizationRecommendationIdentifier:
      type: string
      minLength: 20
      maxLength: 200
      pattern: arn:[\w-]+:trustedadvisor:::organization-recommendation\/[\w-]+
    GetOrganizationRecommendationResponse:
      type: object
      properties:
        organizationRecommendation:
          $ref: "#/components/schemas/OrganizationRecommendation"
          description: The Recommendation
    OrganizationRecommendation:
      description: A Recommendation for accounts within an Organization
      type: object
      properties:
        id:
          $ref: "#/components/schemas/String"
          description: The ID which identifies where the Recommendation was produced
        type_:
          $ref: "#/components/schemas/RecommendationType"
          description: Whether the Recommendation was automated or generated by AWS Trusted Advisor Priority
        checkArn:
          $ref: "#/components/schemas/String"
          description: The AWS Trusted Advisor Check ARN that relates to the Recommendation
        status:
          $ref: "#/components/schemas/RecommendationStatus"
          description: The status of the Recommendation
        lifecycleStage:
          $ref: "#/components/schemas/RecommendationLifecycleStage"
          description: The lifecycle stage from AWS Trusted Advisor Priority
        pillars:
          $ref: "#/components/schemas/RecommendationPillarList"
          description: The Pillars that the Recommendation is optimizing
        source:
          $ref: "#/components/schemas/RecommendationSource"
          description: The source of the Recommendation
        awsServices:
          $ref: "#/components/schemas/RecommendationAwsServiceList"
          description: The AWS Services that the Recommendation applies to
        name:
          $ref: "#/components/schemas/String"
          description: The name of the AWS Trusted Advisor Recommendation
        resourcesAggregates:
          $ref: "#/components/schemas/RecommendationResourcesAggregates"
          description: An aggregation of all resources
        pillarSpecificAggregates:
          $ref: "#/components/schemas/RecommendationPillarSpecificAggregates"
          description: The pillar aggregations for cost savings
        createdAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: When the Recommendation was created, if created by AWS Trusted Advisor Priority
        lastUpdatedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: When the Recommendation was last updated
        arn:
          $ref: "#/components/schemas/OrganizationRecommendationArn"
          description: The ARN of the Recommendation
        description:
          $ref: "#/components/schemas/String"
          description: A description for AWS Trusted Advisor recommendations
        createdBy:
          $ref: "#/components/schemas/String"
          description: The creator, if created by AWS Trusted Advisor Priority
        updatedOnBehalfOf:
          $ref: "#/components/schemas/String"
          description: The person on whose behalf a Technical Account Manager (TAM) updated the recommendation. This information is only available when a Technical Account Manager takes an action on a recommendation managed by AWS Trusted Advisor Priority
        updatedOnBehalfOfJobTitle:
          $ref: "#/components/schemas/String"
          description: The job title of the person on whose behalf a Technical Account Manager (TAM) updated the recommendation. This information is only available when a Technical Account Manager takes an action on a recommendation managed by AWS Trusted Advisor Priority
        updateReason:
          $ref: "#/components/schemas/RecommendationUpdateReason"
          description: Reason for the lifecycle stage change
        updateReasonCode:
          $ref: "#/components/schemas/UpdateRecommendationLifecycleStageReasonCode"
          description: Reason code for the lifecycle state change
        resolvedAt:
          $ref: "#/components/schemas/SyntheticTimestamp_date_time"
          description: When the Recommendation was resolved
      required:
        - id
        - type_
        - status
        - pillars
        - source
        - name
        - resourcesAggregates
        - arn
        - description
    RecommendationType:
      type: string
      enum:
        - standard
        - priority
    RecommendationStatus:
      type: string
      enum:
        - ok
        - warning
        - error
    RecommendationLifecycleStage:
      type: string
      enum:
        - in_progress
        - pending_response
        - dismissed
        - resolved
    RecommendationPillarList:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationPillar"
    RecommendationPillar:
      type: string
      enum:
        - cost_optimizing
        - performance
        - security
        - service_limits
        - fault_tolerance
        - operational_excellence
    RecommendationSource:
      type: string
      enum:
        - aws_config
        - compute_optimizer
        - cost_explorer
        - lse
        - manual
        - pse
        - rds
        - resilience
        - resilience_hub
        - security_hub
        - stir
        - ta_check
        - well_architected
        - cost_optimization_hub
    RecommendationAwsServiceList:
      type: array
      items:
        $ref: "#/components/schemas/RecommendationAwsService"
    RecommendationAwsService:
      type: string
      minLength: 2
      maxLength: 30
    RecommendationResourcesAggregates:
      description: Aggregation of Recommendation Resources
      type: object
      properties:
        okCount:
          $ref: "#/components/schemas/Long"
          description: The number of AWS resources that were flagged to be OK according to the Trusted Advisor check
        warningCount:
          $ref: "#/components/schemas/Long"
          description: The number of AWS resources that were flagged to have warning according to the Trusted Advisor check
        errorCount:
          $ref: "#/components/schemas/Long"
          description: The number of AWS resources that were flagged to have errors according to the Trusted Advisor check
        excludedCount:
          $ref: "#/components/schemas/Long"
          description: The number of AWS resources belonging to this Trusted Advisor check that were excluded by the customer
      required:
        - okCount
        - warningCount
        - errorCount
    Long:
      type: integer
      format: int64
    RecommendationPillarSpecificAggregates:
      description: Recommendation pillar aggregates
      type: object
      properties:
        costOptimizing:
          $ref: "#/components/schemas/RecommendationCostOptimizingAggregates"
          description: Cost optimizing aggregates
    RecommendationCostOptimizingAggregates:
      description: Cost optimizing aggregates for a Recommendation
      type: object
      properties:
        estimatedMonthlySavings:
          $ref: "#/components/schemas/Double"
          description: The estimated monthly savings
        estimatedPercentMonthlySavings:
          $ref: "#/components/schemas/Double"
          description: The estimated percently monthly savings
      required:
        - estimatedMonthlySavings
        - estimatedPercentMonthlySavings
    Double:
      type: number
      format: double
    SyntheticTimestamp_date_time:
      type: string
      format: date-time
    OrganizationRecommendationArn:
      type: string
      minLength: 20
      maxLength: 2048
      pattern: arn:[\w-]+:trustedadvisor:::organization-recommendation\/[\w-]+
    RecommendationUpdateReason:
      type: string
      minLength: 10
      maxLength: 4096
      pattern: "[\\s\\S]*"
    UpdateRecommendationLifecycleStageReasonCode:
      type: string
      enum:
        - non_critical_account
        - temporary_account
        - valid_business_case
        - other_methods_available
        - low_priority
        - not_applicable
        - other
    AccountRecommendationIdentifier:
      type: string
      minLength: 20
      maxLength: 200
      pattern: arn:[\w-]+:trustedadvisor::\d{12}:recommendation\/[\w-]+
    RecommendationLanguage:
      type: string
      enum:
        - en
        - ja
        - zh
        - fr
        - de
        - ko
        - zh_TW
        - it
        - es
        - pt_BR
        - id
    GetRecommendationResponse:
      type: object
      properties:
        recommendation:
          $ref: "#/components/schemas/Recommendation"
          description: The Recommendation
    Recommendation:
      description: A Recommendation for an Account
      type: object
      properties:
        id:
