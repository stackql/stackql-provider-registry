openapi: 3.0.0
info:
  version: "2022-07-26"
  title: ARC - Region switch
  description: ARC - Region switch
  x-serviceName: arc-region-switch
  x-serviceAlias: arc_region_switch
  x-protocol: json
  x-apiVersion: "2022-07-26"
  x-endpointPrefix: arc-region-switch
  x-targetPrefix: ArcRegionSwitch
  x-jsonVersion: "1.0"
servers:
  - url: https://arc-region-switch.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for arc-region-switch
paths:
  /ApprovePlanExecutionStep:
    post:
      operationId: ApprovePlanExecutionStep
      description: Approves a step in a plan execution that requires manual approval. When you create a plan, you can include approval steps that require manual intervention before the execution can proceed. This operation allows you to provide that approval. You must specify the plan ARN, execution ID, step name, and approval status. You can also provide an optional comment explaining the approval decision.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ApprovePlanExecutionStep
            default: ArcRegionSwitch.ApprovePlanExecutionStep
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The execution identifier of a plan execution.
                stepName:
                  $ref: "#/components/schemas/StepName"
                  description: The name of a step in a plan execution.
                approval:
                  $ref: "#/components/schemas/Approval"
                  description: The status of approval for a plan execution step.
                comment:
                  $ref: "#/components/schemas/ExecutionComment"
                  description: A comment that you can enter about a plan execution.
              required:
                - planArn
                - executionId
                - stepName
                - approval
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovePlanExecutionStepResponse"
  /CancelPlanExecution:
    post:
      operationId: CancelPlanExecution
      description: Cancels an in-progress plan execution. This operation stops the execution of the plan and prevents any further steps from being processed. You must specify the plan ARN and execution ID. You can also provide an optional comment explaining why the execution was canceled.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.CancelPlanExecution
            default: ArcRegionSwitch.CancelPlanExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The execution identifier of a plan execution.
                comment:
                  $ref: "#/components/schemas/ExecutionComment"
                  description: A comment that you can enter about canceling a plan execution step.
              required:
                - planArn
                - executionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelPlanExecutionResponse"
  /CreatePlan:
    post:
      operationId: CreatePlan
      description: Creates a new Region switch plan. A plan defines the steps required to shift traffic from one Amazon Web Services Region to another. You must specify a name for the plan, the primary Region, and at least one additional Region. You can also provide a description, execution role, recovery time objective, associated alarms, triggers, and workflows that define the steps to execute during a Region switch.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.CreatePlan
            default: ArcRegionSwitch.CreatePlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                description:
                  $ref: "#/components/schemas/String"
                  description: The description of a Region switch plan.
                workflows:
                  $ref: "#/components/schemas/WorkflowList"
                  description: An array of workflows included in a Region switch plan.
                executionRole:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: An execution role is a way to categorize a Region switch plan.
                recoveryTimeObjectiveMinutes:
                  $ref: "#/components/schemas/CreatePlanRequestRecoveryTimeObjectiveMinutesInteger"
                  description: Optionally, you can specify an recovery time objective for a Region switch plan, in minutes.
                associatedAlarms:
                  $ref: "#/components/schemas/AssociatedAlarmMap"
                  description: The alarms associated with a Region switch plan.
                triggers:
                  $ref: "#/components/schemas/TriggerList"
                  description: The triggers associated with a Region switch plan.
                reportConfiguration:
                  $ref: "#/components/schemas/ReportConfiguration"
                name:
                  $ref: "#/components/schemas/PlanName"
                  description: The name of a Region switch plan.
                regions:
                  $ref: "#/components/schemas/RegionList"
                  description: An array that specifies the Amazon Web Services Regions for a Region switch plan. Specify two Regions.
                recoveryApproach:
                  $ref: "#/components/schemas/RecoveryApproach"
                  description: The recovery approach for a Region switch plan, which can be active/active (activeActive) or active/passive (activePassive).
                primaryRegion:
                  $ref: "#/components/schemas/Region"
                  description: The primary Amazon Web Services Region for the application. This is the Region where the application normally runs before any Region switch occurs.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: The tags to apply to the Region switch plan.
              required:
                - workflows
                - executionRole
                - name
                - regions
                - recoveryApproach
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePlanResponse"
  /DeletePlan:
    post:
      operationId: DeletePlan
      description: Deletes a Region switch plan. You must specify the ARN of the plan to delete. You cannot delete a plan that has an active execution in progress.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.DeletePlan
            default: ArcRegionSwitch.DeletePlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePlanResponse"
  /GetPlan:
    post:
      operationId: GetPlan
      description: Retrieves detailed information about a Region switch plan. You must specify the ARN of the plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.GetPlan
            default: ArcRegionSwitch.GetPlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlanResponse"
  /GetPlanEvaluationStatus:
    post:
      operationId: GetPlanEvaluationStatus
      description: Retrieves the evaluation status of a Region switch plan. The evaluation status provides information about the last time the plan was evaluated and any warnings or issues detected.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.GetPlanEvaluationStatus
            default: ArcRegionSwitch.GetPlanEvaluationStatus
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the Region switch plan to retrieve evaluation status for.
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
              required:
                - planArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlanEvaluationStatusResponse"
  /GetPlanExecution:
    post:
      operationId: GetPlanExecution
      description: Retrieves detailed information about a specific plan execution. You must specify the plan ARN and execution ID.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.GetPlanExecution
            default: ArcRegionSwitch.GetPlanExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan with the execution to retrieve.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The execution identifier of a plan execution.
                maxResults:
                  $ref: "#/components/schemas/GetPlanExecutionStepStatesMaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
              required:
                - planArn
                - executionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlanExecutionResponse"
  /GetPlanInRegion:
    post:
      operationId: GetPlanInRegion
      description: Retrieves information about a Region switch plan in a specific Amazon Web Services Region. This operation is useful for getting Region-specific information about a plan.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.GetPlanInRegion
            default: ArcRegionSwitch.GetPlanInRegion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan in Region.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPlanInRegionResponse"
  /ListPlanExecutionEvents:
    post:
      operationId: ListPlanExecutionEvents
      description: Lists the events that occurred during a plan execution. These events provide a detailed timeline of the execution process.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListPlanExecutionEvents
            default: ArcRegionSwitch.ListPlanExecutionEvents
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The execution identifier of a plan execution.
                maxResults:
                  $ref: "#/components/schemas/ListExecutionEventsMaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
                name:
                  $ref: "#/components/schemas/StepName"
                  description: The name of the plan execution event.
              required:
                - planArn
                - executionId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlanExecutionEventsResponse"
  /ListPlanExecutions:
    post:
      operationId: ListPlanExecutions
      description: Lists the executions of a Region switch plan. This operation returns information about both current and historical executions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListPlanExecutions
            default: ArcRegionSwitch.ListPlanExecutions
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The ARN for the plan.
                maxResults:
                  $ref: "#/components/schemas/ListExecutionsMaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/String"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
                state:
                  $ref: "#/components/schemas/ExecutionState"
                  description: The state of the plan execution. For example, the plan execution might be In Progress.
              required:
                - planArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlanExecutionsResponse"
  /ListPlans:
    post:
      operationId: ListPlans
      description: Lists all Region switch plans in your Amazon Web Services account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListPlans
            default: ArcRegionSwitch.ListPlans
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlansResponse"
  /ListPlansInRegion:
    post:
      operationId: ListPlansInRegion
      description: Lists all Region switch plans in your Amazon Web Services account that are available in the current Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListPlansInRegion
            default: ArcRegionSwitch.ListPlansInRegion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                maxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlansInRegionResponse"
  /ListRoute53HealthChecks:
    post:
      operationId: ListRoute53HealthChecks
      description: List the Amazon Route 53 health checks.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListRoute53HealthChecks
            default: ArcRegionSwitch.ListRoute53HealthChecks
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the Amazon Route 53 health check request.
                hostedZoneId:
                  $ref: "#/components/schemas/Route53HostedZoneId"
                  description: The hosted zone ID for the health checks.
                recordName:
                  $ref: "#/components/schemas/Route53RecordName"
                  description: The record name for the health checks.
                maxResults:
                  $ref: "#/components/schemas/ListRoute53HealthChecksRequestMaxResultsInteger"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoute53HealthChecksResponse"
  /ListRoute53HealthChecksInRegion:
    post:
      operationId: ListRoute53HealthChecksInRegion
      description: List the Amazon Route 53 health checks in a specific Amazon Web Services Region.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListRoute53HealthChecksInRegion
            default: ArcRegionSwitch.ListRoute53HealthChecksInRegion
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the Arc Region Switch Plan.
                hostedZoneId:
                  $ref: "#/components/schemas/Route53HostedZoneId"
                  description: The hosted zone ID for the health checks.
                recordName:
                  $ref: "#/components/schemas/Route53RecordName"
                  description: The record name for the health checks.
                maxResults:
                  $ref: "#/components/schemas/ListRoute53HealthChecksInRegionRequestMaxResultsInteger"
                  description: The number of objects that you want to return with this call.
                nextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: Specifies that you want to receive the next page of results. Valid only if you received a nextToken response in the previous request. If you did, it indicates that more output is available. Set this parameter to the value provided by the previous call's nextToken response to request the next page of results.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoute53HealthChecksInRegionResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists the tags attached to a Region switch resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.ListTagsForResource
            default: ArcRegionSwitch.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the resource.
              required:
                - arn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /StartPlanExecution:
    post:
      operationId: StartPlanExecution
      description: Starts the execution of a Region switch plan. You can execute a plan in either graceful or ungraceful mode. Specifing ungraceful mode either changes the behavior of the execution blocks in a workflow or skips specific execution blocks.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.StartPlanExecution
            default: ArcRegionSwitch.StartPlanExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan to execute.
                targetRegion:
                  $ref: "#/components/schemas/String"
                  description: The Amazon Web Services Region to target with this execution. This is the Region that traffic will be shifted to or from, depending on the action.
                action:
                  $ref: "#/components/schemas/ExecutionAction"
                  description: The action to perform. Valid values are activate (to shift traffic to the target Region) or deactivate (to shift traffic away from the target Region).
                mode:
                  $ref: "#/components/schemas/ExecutionMode"
                  description: The plan execution mode. Valid values are graceful, for starting the execution in graceful mode, or ungraceful, for starting the execution in ungraceful mode.
                comment:
                  $ref: "#/components/schemas/ExecutionComment"
                  description: An optional comment explaining why the plan execution is being started.
                latestVersion:
                  $ref: "#/components/schemas/String"
                  description: A boolean value indicating whether to use the latest version of the plan. If set to false, you must specify a specific version.
                recoveryExecutionId:
                  $ref: "#/components/schemas/RecoveryExecutionId"
                  description: The execution identifier of the recovery execution that ran in the opposite region post-recovery is ran in. Required when starting a post-recovery execution.
              required:
                - planArn
                - targetRegion
                - action
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPlanExecutionResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a Region switch resource. You can assign metadata to your resources in the form of tags, which are key-value pairs.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.TagResource
            default: ArcRegionSwitch.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) for a tag that you add to a resource.
                tags:
                  $ref: "#/components/schemas/Tags"
                  description: Tags that you add to a resource. You can add a maximum of 50 tags in Region switch.
              required:
                - arn
                - tags
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes tags from a Region switch resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.UntagResource
            default: ArcRegionSwitch.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) for a tag you remove a resource from.
                resourceTagKeys:
                  $ref: "#/components/schemas/TagKeys"
                  description: Tag keys that you remove from a resource.
              required:
                - arn
                - resourceTagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdatePlan:
    post:
      operationId: UpdatePlan
      description: Updates an existing Region switch plan. You can modify the plan's description, workflows, execution role, recovery time objective, associated alarms, and triggers.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.UpdatePlan
            default: ArcRegionSwitch.UpdatePlan
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                arn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan.
                description:
                  $ref: "#/components/schemas/String"
                  description: The updated description for the Region switch plan.
                workflows:
                  $ref: "#/components/schemas/WorkflowList"
                  description: The updated workflows for the Region switch plan.
                executionRole:
                  $ref: "#/components/schemas/IamRoleArn"
                  description: The updated IAM role ARN that grants Region switch the permissions needed to execute the plan steps.
                recoveryTimeObjectiveMinutes:
                  $ref: "#/components/schemas/UpdatePlanRequestRecoveryTimeObjectiveMinutesInteger"
                  description: The updated target recovery time objective (RTO) in minutes for the plan.
                associatedAlarms:
                  $ref: "#/components/schemas/AssociatedAlarmMap"
                  description: The updated CloudWatch alarms associated with the plan.
                triggers:
                  $ref: "#/components/schemas/TriggerList"
                  description: The updated conditions that can automatically trigger the execution of the plan.
                reportConfiguration:
                  $ref: "#/components/schemas/ReportConfiguration"
                  description: The updated report configuration for the plan.
              required:
                - arn
                - workflows
                - executionRole
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePlanResponse"
  /UpdatePlanExecution:
    post:
      operationId: UpdatePlanExecution
      description: Updates an in-progress plan execution. This operation allows you to modify certain aspects of the execution, such as adding a comment or changing the action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.UpdatePlanExecution
            default: ArcRegionSwitch.UpdatePlanExecution
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan with the execution to update.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The execution identifier of a plan execution.
                action:
                  $ref: "#/components/schemas/UpdatePlanExecutionAction"
                  description: The action specified for a plan execution, for example, Switch to Graceful or Pause.
                comment:
                  $ref: "#/components/schemas/ExecutionComment"
                  description: An optional comment about the plan execution.
              required:
                - planArn
                - executionId
                - action
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePlanExecutionResponse"
  /UpdatePlanExecutionStep:
    post:
      operationId: UpdatePlanExecutionStep
      description: Updates a specific step in an in-progress plan execution. This operation allows you to modify the step's comment or action.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - ArcRegionSwitch.UpdatePlanExecutionStep
            default: ArcRegionSwitch.UpdatePlanExecutionStep
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                planArn:
                  $ref: "#/components/schemas/PlanArn"
                  description: The Amazon Resource Name (ARN) of the plan containing the execution step to update.
                executionId:
                  $ref: "#/components/schemas/ExecutionId"
                  description: The unique identifier of the plan execution containing the step to update.
                comment:
                  $ref: "#/components/schemas/ExecutionComment"
                  description: An optional comment about the plan execution.
                stepName:
                  $ref: "#/components/schemas/String"
                  description: The name of the execution step to update.
                actionToTake:
                  $ref: "#/components/schemas/UpdatePlanExecutionStepAction"
                  description: The updated action to take for the step. This can be used to skip or retry a step.
              required:
                - planArn
                - executionId
                - comment
                - stepName
                - actionToTake
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePlanExecutionStepResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    PlanArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:arc-region-switch::[0-9]{12}:plan/([a-zA-Z0-9](?:[a-zA-Z0-9-]{0,30}[a-zA-Z0-9])?):([a-z0-9]{6})
    ExecutionId:
      type: string
    StepName:
      type: string
    Approval:
      type: string
      enum:
        - approve
        - decline
    ExecutionComment:
      type: string
      minLength: 0
      maxLength: 1024
    ApprovePlanExecutionStepResponse:
      type: object
    CancelPlanExecutionResponse:
      type: object
    String:
      type: string
    WorkflowList:
      type: array
      items:
        $ref: "#/components/schemas/Workflow"
    Workflow:
      description: Represents a workflow in a Region switch plan. A workflow defines a sequence of steps to execute during a Region switch.
      type: object
      properties:
        steps:
          $ref: "#/components/schemas/Steps"
          description: The steps that make up the workflow.
        workflowTargetAction:
          $ref: "#/components/schemas/WorkflowTargetAction"
          description: The action that the workflow performs. Valid values include activate and deactivate.
        workflowTargetRegion:
          $ref: "#/components/schemas/Region"
          description: The Amazon Web Services Region that the workflow targets.
        workflowDescription:
          $ref: "#/components/schemas/String"
          description: The description of the workflow.
      required:
        - workflowTargetAction
    Steps:
      type: array
      items:
        $ref: "#/components/schemas/Step"
    Step:
      description: Represents a step in a Region switch plan workflow. Each step performs a specific action during the Region switch process.
      type: object
      properties:
        name:
          $ref: "#/components/schemas/StepName"
          description: The name of a step in a workflow.
        description:
          $ref: "#/components/schemas/String"
          description: The description of a step in a workflow.
        executionBlockConfiguration:
          $ref: "#/components/schemas/ExecutionBlockConfiguration"
          description: The configuration for an execution block in a workflow.
        executionBlockType:
          $ref: "#/components/schemas/ExecutionBlockType"
          description: The type of an execution block in a workflow.
      required:
        - name
        - executionBlockConfiguration
        - executionBlockType
    ExecutionBlockConfiguration:
      description: Execution block configurations for a workflow in a Region switch plan. An execution block represents a specific type of action to perform during a Region switch.
      type: object
      properties:
        customActionLambdaConfig:
          $ref: "#/components/schemas/CustomActionLambdaConfiguration"
          description: An Amazon Web Services Lambda execution block.
        ec2AsgCapacityIncreaseConfig:
          $ref: "#/components/schemas/Ec2AsgCapacityIncreaseConfiguration"
          description: An EC2 Auto Scaling group execution block.
        executionApprovalConfig:
          $ref: "#/components/schemas/ExecutionApprovalConfiguration"
          description: A manual approval execution block.
        arcRoutingControlConfig:
          $ref: "#/components/schemas/ArcRoutingControlConfiguration"
          description: An ARC routing control execution block.
        globalAuroraConfig:
          $ref: "#/components/schemas/GlobalAuroraConfiguration"
          description: An Aurora Global Database execution block.
        parallelConfig:
          $ref: "#/components/schemas/ParallelExecutionBlockConfiguration"
          description: A parallel configuration execution block.
        regionSwitchPlanConfig:
          $ref: "#/components/schemas/RegionSwitchPlanConfiguration"
          description: A Region switch plan execution block.
        ecsCapacityIncreaseConfig:
          $ref: "#/components/schemas/EcsCapacityIncreaseConfiguration"
          description: The capacity increase specified for the configuration.
        eksResourceScalingConfig:
          $ref: "#/components/schemas/EksResourceScalingConfiguration"
          description: An Amazon Web Services EKS resource scaling execution block.
        route53HealthCheckConfig:
          $ref: "#/components/schemas/Route53HealthCheckConfiguration"
          description: The Amazon Route 53 health check configuration.
        documentDbConfig:
          $ref: "#/components/schemas/DocumentDbConfiguration"
        rdsPromoteReadReplicaConfig:
          $ref: "#/components/schemas/RdsPromoteReadReplicaConfiguration"
          description: An Amazon RDS promote read replica execution block.
        rdsCreateCrossRegionReadReplicaConfig:
          $ref: "#/components/schemas/RdsCreateCrossRegionReplicaConfiguration"
          description: An Amazon RDS create cross-Region replica execution block.
        lambdaEventSourceMappingConfig:
          $ref: "#/components/schemas/LambdaEventSourceMappingConfiguration"
          description: A Lambda event source mapping execution block.
    CustomActionLambdaConfiguration:
      description: Configuration for Amazon Web Services Lambda functions that perform custom actions during a Region switch.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/CustomActionLambdaConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        lambdas:
          $ref: "#/components/schemas/LambdaList"
          description: The Amazon Web Services Lambda functions for the execution block.
        retryIntervalMinutes:
          $ref: "#/components/schemas/Float"
          description: The retry interval specified.
        regionToRun:
          $ref: "#/components/schemas/RegionToRunIn"
          description: The Amazon Web Services Region for the function to run in. For recovery workflows use activatingRegion or deactivatingRegion. For post-recovery workflows, use activeRegion (the Region with customer traffic) or inactiveRegion (the Region with no customer traffic).
        ungraceful:
          $ref: "#/components/schemas/LambdaUngraceful"
          description: The settings for ungraceful execution.
      required:
        - lambdas
        - retryIntervalMinutes
        - regionToRun
    CustomActionLambdaConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    LambdaList:
      type: array
      items:
        $ref: "#/components/schemas/Lambdas"
    Lambdas:
      description: Configuration for Amazon Web Services Lambda functions used in a Region switch plan.
      type: object
      properties:
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        arn:
          $ref: "#/components/schemas/LambdaArn"
          description: The Amazon Resource Name (ARN) of the Lambda function.
    IamRoleArn:
      type: string
      pattern: arn:aws[a-zA-Z0-9-]*:iam::[0-9]{12}:role/.+
    LambdaArn:
      type: string
    Float:
      type: number
      format: float
    RegionToRunIn:
      type: string
      enum:
        - activatingRegion
        - deactivatingRegion
        - activeRegion
        - inactiveRegion
    LambdaUngraceful:
      description: Configuration for handling failures when invoking Lambda functions.
      type: object
      properties:
        behavior:
          $ref: "#/components/schemas/LambdaUngracefulBehavior"
          description: The ungraceful behavior for a Lambda function, which must be set to skip.
    LambdaUngracefulBehavior:
      type: string
      enum:
        - skip
    Ec2AsgCapacityIncreaseConfiguration:
      description: Configuration for increasing the capacity of Amazon EC2 Auto Scaling groups during a Region switch.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/Ec2AsgCapacityIncreaseConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        asgs:
          $ref: "#/components/schemas/AsgList"
          description: The EC2 Auto Scaling groups for the configuration.
        ungraceful:
          $ref: "#/components/schemas/Ec2Ungraceful"
          description: The settings for ungraceful execution.
        targetPercent:
          $ref: "#/components/schemas/Integer"
          description: The target percentage that you specify for EC2 Auto Scaling groups. The default is 100.
        capacityMonitoringApproach:
          $ref: "#/components/schemas/Ec2AsgCapacityMonitoringApproach"
          description: The monitoring approach that you specify EC2 Auto Scaling groups for the configuration.
      required:
        - asgs
    Ec2AsgCapacityIncreaseConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    AsgList:
      type: array
      items:
        $ref: "#/components/schemas/Asg"
    Asg:
      description: Configuration for an Amazon EC2 Auto Scaling group used in a Region switch plan.
      type: object
      properties:
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        arn:
          $ref: "#/components/schemas/AsgArn"
          description: The Amazon Resource Name (ARN) of the EC2 Auto Scaling group.
    AsgArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:autoscaling:[a-z0-9-]+:\d{12}:autoScalingGroup:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}:autoScalingGroupName/[\S\s]{1,255}
    Ec2Ungraceful:
      description: Configuration for handling failures when performing operations on EC2 resources.
      type: object
      properties:
        minimumSuccessPercentage:
          $ref: "#/components/schemas/Ec2UngracefulMinimumSuccessPercentageInteger"
          description: The minimum success percentage that you specify for EC2 Auto Scaling groups.
      required:
        - minimumSuccessPercentage
    Ec2UngracefulMinimumSuccessPercentageInteger:
      type: integer
      minimum: 0
      maximum: 99
    Integer:
      type: integer
    Ec2AsgCapacityMonitoringApproach:
      type: string
      enum:
        - sampledMaxInLast24Hours
        - autoscalingMaxInLast24Hours
    ExecutionApprovalConfiguration:
      description: Configuration for approval steps in a Region switch plan execution. Approval steps require manual intervention before the execution can proceed.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/ExecutionApprovalConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        approvalRole:
          $ref: "#/components/schemas/RoleArn"
          description: The IAM approval role for the configuration.
      required:
        - approvalRole
    ExecutionApprovalConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    RoleArn:
      type: string
    ArcRoutingControlConfiguration:
      description: Configuration for ARC routing controls used in a Region switch plan. Routing controls are simple on/off switches that you can use to shift traffic away from an impaired Region.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/ArcRoutingControlConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        regionAndRoutingControls:
          type: object
          properties: {}
          description: The Region and ARC routing controls for the configuration.
      required:
        - regionAndRoutingControls
    ArcRoutingControlConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    GlobalAuroraConfiguration:
      description: Configuration for Amazon Aurora global databases used in a Region switch plan.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/GlobalAuroraConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        behavior:
          $ref: "#/components/schemas/GlobalAuroraDefaultBehavior"
          description: The behavior for a global database, that is, only allow switchover or also allow failover.
        ungraceful:
          $ref: "#/components/schemas/GlobalAuroraUngraceful"
          description: The settings for ungraceful execution.
        globalClusterIdentifier:
          $ref: "#/components/schemas/GlobalClusterIdentifier"
          description: The global cluster identifier for a global database.
        databaseClusterArns:
          $ref: "#/components/schemas/AuroraClusterArns"
          description: The database cluster Amazon Resource Names (ARNs) for a global database.
      required:
        - behavior
        - globalClusterIdentifier
        - databaseClusterArns
    GlobalAuroraConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    GlobalAuroraDefaultBehavior:
      type: string
      enum:
        - switchoverOnly
        - failover
    GlobalAuroraUngraceful:
      description: Configuration for handling failures when performing operations on Aurora global databases.
      type: object
      properties:
        ungraceful:
          $ref: "#/components/schemas/GlobalAuroraUngracefulBehavior"
          description: The settings for ungraceful execution.
    GlobalAuroraUngracefulBehavior:
      type: string
      enum:
        - failover
    GlobalClusterIdentifier:
      type: string
      minLength: 1
      maxLength: 255
      pattern: "[A-Za-z][0-9A-Za-z-:._]*"
    AuroraClusterArns:
      type: array
      items:
        $ref: "#/components/schemas/AuroraClusterArn"
    AuroraClusterArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:rds:[a-z0-9-]+:\d{12}:cluster:[A-Za-z][0-9A-Za-z-:._]*
    ParallelExecutionBlockConfiguration:
      description: Configuration for steps that should be executed in parallel during a Region switch.
      type: object
      properties:
        steps:
          $ref: "#/components/schemas/Steps"
          description: The steps for a parallel execution block.
      required:
        - steps
    RegionSwitchPlanConfiguration:
      description: Configuration for nested Region switch plans. This allows one Region switch plan to trigger another plan as part of its execution.
      type: object
      properties:
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        arn:
          $ref: "#/components/schemas/PlanArn"
          description: The Amazon Resource Name (ARN) of the plan configuration.
      required:
        - arn
    EcsCapacityIncreaseConfiguration:
      description: The configuration for an Amazon Web Services ECS capacity increase.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/EcsCapacityIncreaseConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        services:
          $ref: "#/components/schemas/ServiceList"
          description: The services specified for the configuration.
        ungraceful:
          $ref: "#/components/schemas/EcsUngraceful"
          description: The settings for ungraceful execution.
        targetPercent:
          $ref: "#/components/schemas/Integer"
          description: The target percentage specified for the configuration. The default is 100.
        capacityMonitoringApproach:
          $ref: "#/components/schemas/EcsCapacityMonitoringApproach"
          description: The monitoring approach specified for the configuration, for example, Most_Recent.
      required:
        - services
    EcsCapacityIncreaseConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    ServiceList:
      type: array
      items:
        $ref: "#/components/schemas/Service"
    Service:
      description: The service for a cross account role.
      type: object
      properties:
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for a service.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the service.
        clusterArn:
          $ref: "#/components/schemas/EcsClusterArn"
          description: The cluster Amazon Resource Name (ARN) for a service.
        serviceArn:
          $ref: "#/components/schemas/EcsServiceArn"
          description: The Amazon Resource Name (ARN) for a service.
    EcsClusterArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:ecs:[a-z0-9-]+:\d{12}:cluster/[a-zA-Z0-9_-]{1,255}
    EcsServiceArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:ecs:[a-z0-9-]+:\d{12}:service/[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]{1,255}
    EcsUngraceful:
      description: The settings for ungraceful execution.
      type: object
      properties:
        minimumSuccessPercentage:
          $ref: "#/components/schemas/EcsUngracefulMinimumSuccessPercentageInteger"
          description: The minimum success percentage specified for the configuration.
      required:
        - minimumSuccessPercentage
    EcsUngracefulMinimumSuccessPercentageInteger:
      type: integer
      minimum: 0
      maximum: 99
    EcsCapacityMonitoringApproach:
      type: string
      enum:
        - sampledMaxInLast24Hours
        - containerInsightsMaxInLast24Hours
    EksResourceScalingConfiguration:
      description: The Amazon Web Services EKS resource scaling configuration.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/EksResourceScalingConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        kubernetesResourceType:
          $ref: "#/components/schemas/KubernetesResourceType"
          description: The Kubernetes resource type for the configuration.
        scalingResources:
          $ref: "#/components/schemas/KubernetesScalingApps"
          description: The scaling resources for the configuration.
        eksClusters:
          $ref: "#/components/schemas/EksClusters"
          description: The clusters for the configuration.
        ungraceful:
          $ref: "#/components/schemas/EksResourceScalingUngraceful"
          description: The settings for ungraceful execution.
        targetPercent:
          $ref: "#/components/schemas/EksResourceScalingConfigurationTargetPercentInteger"
          description: The target percentage for the configuration. The default is 100.
        capacityMonitoringApproach:
          $ref: "#/components/schemas/EksCapacityMonitoringApproach"
          description: The monitoring approach for the configuration, that is, whether it was sampled in the last 24 hours or autoscaled in the last 24 hours.
      required:
        - kubernetesResourceType
    EksResourceScalingConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    KubernetesResourceType:
      description: Defines the type of Kubernetes resource to scale in an Amazon EKS cluster.
      type: object
      properties:
        apiVersion:
          $ref: "#/components/schemas/String"
          description: The API version type for the Kubernetes resource.
        kind:
          $ref: "#/components/schemas/String"
          description: The kind for the Kubernetes resource.
      required:
        - apiVersion
        - kind
    KubernetesScalingApps:
      type: array
      items:
        $ref: "#/components/schemas/KubernetesScalingApplication"
    KubernetesScalingApplication:
      type: object
      properties: {}
    EksClusters:
      type: array
      items:
        $ref: "#/components/schemas/EksCluster"
    EksCluster:
      description: The Amazon Web Services EKS cluster execution block configuration.
      type: object
      properties:
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        clusterArn:
          $ref: "#/components/schemas/EksClusterArn"
          description: The Amazon Resource Name (ARN) of an Amazon Web Services EKS cluster.
      required:
        - clusterArn
    EksClusterArn:
      type: string
      pattern: arn:aws[a-zA-Z-]*:eks:[a-z0-9-]+:\d{12}:cluster/[a-zA-Z0-9][a-zA-Z0-9-_]{0,99}
    EksResourceScalingUngraceful:
      description: The ungraceful settings for Amazon Web Services EKS resource scaling.
      type: object
      properties:
        minimumSuccessPercentage:
          $ref: "#/components/schemas/EksResourceScalingUngracefulMinimumSuccessPercentageInteger"
          description: The minimum success percentage for the configuration.
      required:
        - minimumSuccessPercentage
    EksResourceScalingUngracefulMinimumSuccessPercentageInteger:
      type: integer
      minimum: 0
      maximum: 99
    EksResourceScalingConfigurationTargetPercentInteger:
      type: integer
      minimum: 1
    EksCapacityMonitoringApproach:
      type: string
      enum:
        - sampledMaxInLast24Hours
    Route53HealthCheckConfiguration:
      description: The Amazon Route 53 health check configuration.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/Route53HealthCheckConfigurationTimeoutMinutesInteger"
          description: The Amazon Route 53 health check configuration time out (in minutes).
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        hostedZoneId:
          $ref: "#/components/schemas/Route53HostedZoneId"
          description: The Amazon Route 53 health check configuration hosted zone ID.
        recordName:
          $ref: "#/components/schemas/Route53RecordName"
          description: The Amazon Route 53 health check configuration record name.
        recordSets:
          $ref: "#/components/schemas/Route53ResourceRecordSetList"
          description: The Amazon Route 53 health check configuration record sets.
      required:
        - hostedZoneId
        - recordName
    Route53HealthCheckConfigurationTimeoutMinutesInteger:
      type: integer
      minimum: 1
    Route53HostedZoneId:
      type: string
      minLength: 1
      maxLength: 32
    Route53RecordName:
      type: string
      minLength: 1
      maxLength: 1024
    Route53ResourceRecordSetList:
      type: array
      items:
        $ref: "#/components/schemas/Route53ResourceRecordSet"
    Route53ResourceRecordSet:
      description: The Amazon Route 53 record set.
      type: object
      properties:
        recordSetIdentifier:
          $ref: "#/components/schemas/Route53ResourceRecordSetIdentifier"
          description: The Amazon Route 53 record set identifier.
        region:
          $ref: "#/components/schemas/Region"
          description: The Amazon Route 53 record set Region.
    Route53ResourceRecordSetIdentifier:
      type: string
      minLength: 1
      maxLength: 1024
    Region:
      type: string
      pattern: "[a-z]{2}-[a-z-]+-\\d+"
    DocumentDbConfiguration:
      description: Configuration for Amazon DocumentDB global clusters used in a Region switch plan.
      type: object
      properties:
        timeoutMinutes:
          $ref: "#/components/schemas/DocumentDbConfigurationTimeoutMinutesInteger"
          description: The timeout value specified for the configuration.
        crossAccountRole:
          $ref: "#/components/schemas/IamRoleArn"
          description: The cross account role for the configuration.
        externalId:
          $ref: "#/components/schemas/String"
          description: The external ID (secret key) for the configuration.
        behavior:
          $ref: "#/components/schemas/DocumentDbDefaultBehavior"
