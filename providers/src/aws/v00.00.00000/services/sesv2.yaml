          description: The content of the custom verification email.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of objects that define the tags (keys and values) that are associated with the custom verification email template.
        SuccessRedirectionURL:
          $ref: "#/components/schemas/SuccessRedirectionURL"
          description: The URL that the recipient of the verification email is sent to if his or her address is successfully verified.
        FailureRedirectionURL:
          $ref: "#/components/schemas/FailureRedirectionURL"
          description: The URL that the recipient of the verification email is sent to if his or her address is not successfully verified.
    Ip:
      description: An IPv4 address.
      type: string
    GetDedicatedIpResponse:
      description: Information about a dedicated IP address.
      type: object
      properties:
        DedicatedIp:
          $ref: "#/components/schemas/DedicatedIp"
          description: An object that contains information about a dedicated IP address.
    DedicatedIp:
      description: Contains information about a dedicated IP address that is associated with your Amazon SES account. To learn more about requesting dedicated IP addresses, see Requesting and Relinquishing Dedicated IP Addresses in the Amazon SES Developer Guide.
      type: object
      properties:
        Ip:
          $ref: "#/components/schemas/Ip"
          description: An IPv4 address.
        WarmupStatus:
          $ref: "#/components/schemas/WarmupStatus"
          description: "The warm-up status of a dedicated IP address. The status can have one of the following values: IN_PROGRESS – The IP address isn't ready to use because the dedicated IP warm-up process is ongoing. DONE – The dedicated IP warm-up process is complete, and the IP address is ready to use. NOT_APPLICABLE – The warm-up status doesn't apply to this IP address. This status is used for IP addresses in managed dedicated IP pools, where Amazon SES automatically handles the warm-up process."
        WarmupPercentage:
          $ref: "#/components/schemas/Percentage100Wrapper"
          description: "Indicates the progress of your dedicated IP warm-up: 0-100 – For standard dedicated IP addresses, this shows the warm-up completion percentage. A value of 100 means the IP address is fully warmed up and ready for use. -1 – Appears for IP addresses in managed dedicated pools where Amazon SES automatically handles the warm-up process, making the percentage not applicable."
        PoolName:
          $ref: "#/components/schemas/PoolName"
          description: The name of the dedicated IP pool that the IP address is associated with.
      required:
        - Ip
        - WarmupStatus
        - WarmupPercentage
    WarmupStatus:
      description: The warmup status of a dedicated IP.
      type: string
      enum:
        - IN_PROGRESS
        - DONE
        - NOT_APPLICABLE
    Percentage100Wrapper:
      type: integer
    GetDedicatedIpPoolResponse:
      description: The following element is returned by the service.
      type: object
      properties:
        DedicatedIpPool:
          $ref: "#/components/schemas/DedicatedIpPool"
          description: An object that contains information about a dedicated IP pool.
    DedicatedIpPool:
      description: Contains information about a dedicated IP pool.
