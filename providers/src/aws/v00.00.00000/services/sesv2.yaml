        AwsSesManagedStatus:
          $ref: "#/components/schemas/StatusRecord"
          description: The Amazon Web Services Amazon SES-managed status record for this reputation entity, including the current status, cause description, and last updated timestamp.
        SendingStatusAggregate:
          $ref: "#/components/schemas/SendingStatus"
          description: The aggregate sending status that determines whether the entity is allowed to send emails. This status is derived from both the customer-managed and Amazon Web Services Amazon SES-managed statuses. If either the customer-managed status or the Amazon Web Services Amazon SES-managed status is DISABLED, the aggregate status will be DISABLED and the entity will not be allowed to send emails. When the customer-managed status is set to REINSTATED, the entity can continue sending even if there are active reputation findings, provided the Amazon Web Services Amazon SES-managed status also permits sending. The entity can only send emails when both statuses permit sending.
        ReputationImpact:
          $ref: "#/components/schemas/RecommendationImpact"
          description: The reputation impact level for this entity, representing the highest impact reputation finding currently active. Reputation findings can be retrieved using the ListRecommendations operation.
    StatusRecord:
      description: An object that contains status information for a reputation entity, including the current status, cause description, and timestamp.
      type: object
      properties:
        Status:
          $ref: "#/components/schemas/SendingStatus"
          description: "The current sending status. This can be one of the following: ENABLED – Sending is allowed. DISABLED – Sending is prevented. REINSTATED – Sending is allowed even with active reputation findings."
        Cause:
