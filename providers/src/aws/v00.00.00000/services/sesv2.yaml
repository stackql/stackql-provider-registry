    EmailAddressList:
      type: array
      items:
        $ref: "#/components/schemas/EmailAddress"
    BulkEmailContent:
      description: An object that contains the body of the message. You can specify a template message.
      type: object
      properties:
        Template:
          $ref: "#/components/schemas/Template"
          description: The template to use for the bulk email message.
    BulkEmailEntryList:
      description: A list of BulkEmailEntry objects.
      type: array
      items:
        $ref: "#/components/schemas/BulkEmailEntry"
    BulkEmailEntry:
      type: object
      properties:
        Destination:
          $ref: "#/components/schemas/Destination"
          description: "Represents the destination of the message, consisting of To:, CC:, and BCC: fields. Amazon SES does not support the SMTPUTF8 extension, as described in RFC6531. For this reason, the local part of a destination email address (the part of the email address that precedes the @ sign) may only contain 7-bit ASCII characters. If the domain part of an address (the part after the @ sign) contains non-ASCII characters, they must be encoded using Punycode, as described in RFC3492."
        ReplacementTags:
          $ref: "#/components/schemas/MessageTagList"
          description: A list of tags, in the form of name/value pairs, to apply to an email that you send using the SendBulkTemplatedEmail operation. Tags correspond to characteristics of the email that you define, so that you can publish email sending events.
        ReplacementEmailContent:
          $ref: "#/components/schemas/ReplacementEmailContent"
          description: The ReplacementEmailContent associated with a BulkEmailEntry.
        ReplacementHeaders:
          $ref: "#/components/schemas/MessageHeaderList"
          description: "The list of message headers associated with the BulkEmailEntry data type. Headers Not Present in BulkEmailEntry: If a header is specified in Template but not in BulkEmailEntry, the header from Template will be added to the outgoing email. Headers Present in BulkEmailEntry: If a header is specified in BulkEmailEntry, it takes precedence over any header of the same name specified in Template : If the header is also defined within Template, the value from BulkEmailEntry will replace the header's value in the email. If the header is not defined within Template, it will simply be added to the email as specified in BulkEmailEntry."
      required:
        - Destination
    Destination:
      description: An object that describes the recipients for an email. Amazon SES does not support the SMTPUTF8 extension, as described in RFC6531. For this reason, the local part of a destination email address (the part of the email address that precedes the @ sign) may only contain 7-bit ASCII characters. If the domain part of an address (the part after the @ sign) contains non-ASCII characters, they must be encoded using Punycode, as described in RFC3492.
      type: object
      properties:
        ToAddresses:
          $ref: "#/components/schemas/EmailAddressList"
          description: An array that contains the email addresses of the "To" recipients for the email.
        CcAddresses:
          $ref: "#/components/schemas/EmailAddressList"
          description: An array that contains the email addresses of the "CC" (carbon copy) recipients for the email.
        BccAddresses:
          $ref: "#/components/schemas/EmailAddressList"
          description: An array that contains the email addresses of the "BCC" (blind carbon copy) recipients for the email.
    ReplacementEmailContent:
      description: The ReplaceEmailContent object to be used for a specific BulkEmailEntry. The ReplacementTemplate can be specified within this object.
      type: object
      properties:
        ReplacementTemplate:
          $ref: "#/components/schemas/ReplacementTemplate"
          description: The ReplacementTemplate associated with ReplacementEmailContent.
    ReplacementTemplate:
      description: An object which contains ReplacementTemplateData to be used for a specific BulkEmailEntry.
      type: object
      properties:
        ReplacementTemplateData:
          $ref: "#/components/schemas/EmailTemplateData"
          description: A list of replacement values to apply to the template. This parameter is a JSON object, typically consisting of key-value pairs in which the keys correspond to replacement tags in the email template.
    SendBulkEmailResponse:
      description: The following data is returned in JSON format by the service.
      type: object
      properties:
        BulkEmailEntryResults:
          $ref: "#/components/schemas/BulkEmailEntryResultList"
          description: One object per intended recipient. Check each response object and retry any messages with a failure status.
      required:
        - BulkEmailEntryResults
    BulkEmailEntryResultList:
      description: A list of BulkMailEntry objects.
      type: array
      items:
        $ref: "#/components/schemas/BulkEmailEntryResult"
    BulkEmailEntryResult:
      description: The result of the SendBulkEmail operation of each specified BulkEmailEntry.
      type: object
      properties:
        Status:
