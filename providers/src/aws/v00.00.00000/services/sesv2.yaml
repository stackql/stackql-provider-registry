      properties:
        MetricsDataSource:
          $ref: "#/components/schemas/MetricsDataSource"
        MessageInsightsDataSource:
          $ref: "#/components/schemas/MessageInsightsDataSource"
    MetricsDataSource:
      description: An object that contains details about the data source for the metrics export.
      type: object
