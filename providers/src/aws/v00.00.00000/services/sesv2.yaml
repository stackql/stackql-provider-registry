      properties:
        PoolName:
          $ref: "#/components/schemas/PoolName"
          description: The name of the dedicated IP pool.
        ScalingMode:
          $ref: "#/components/schemas/ScalingMode"
          description: The type of the dedicated IP pool. STANDARD – A dedicated IP pool where you can control which IPs are part of the pool. MANAGED – A dedicated IP pool where the reputation and number of IPs are automatically managed by Amazon SES.
      required:
        - PoolName
        - ScalingMode
    NextToken:
      type: string
    MaxItems:
      type: integer
    GetDedicatedIpsResponse:
      description: Information about the dedicated IP addresses that are associated with your Amazon Web Services account.
      type: object
      properties:
        DedicatedIps:
          $ref: "#/components/schemas/DedicatedIpList"
          description: A list of dedicated IP addresses that are associated with your Amazon Web Services account.
        NextToken:
          $ref: "#/components/schemas/NextToken"
          description: A token that indicates that there are additional dedicated IP addresses to list. To view additional addresses, issue another request to GetDedicatedIps, passing this token in the NextToken parameter.
    DedicatedIpList:
      description: A list of dedicated IP addresses that are associated with your Amazon Web Services account.
      type: array
      items:
        $ref: "#/components/schemas/DedicatedIp"
    GetDeliverabilityDashboardOptionsResponse:
      description: An object that shows the status of the Deliverability dashboard.
      type: object
      properties:
        DashboardEnabled:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether the Deliverability dashboard is enabled. If this value is true, the dashboard is enabled.
        SubscriptionExpiryDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when your current subscription to the Deliverability dashboard is scheduled to expire, if your subscription is scheduled to expire at the end of the current calendar month. This value is null if you have an active subscription that isn’t due to expire at the end of the month.
        AccountStatus:
          $ref: "#/components/schemas/DeliverabilityDashboardAccountStatus"
          description: The current status of your Deliverability dashboard subscription. If this value is PENDING_EXPIRATION, your subscription is scheduled to expire at the end of the current calendar month.
        ActiveSubscribedDomains:
          $ref: "#/components/schemas/DomainDeliverabilityTrackingOptions"
          description: An array of objects, one for each verified domain that you use to send email and currently has an active Deliverability dashboard subscription that isn’t scheduled to expire at the end of the current calendar month.
        PendingExpirationSubscribedDomains:
          $ref: "#/components/schemas/DomainDeliverabilityTrackingOptions"
          description: An array of objects, one for each verified domain that you use to send email and currently has an active Deliverability dashboard subscription that's scheduled to expire at the end of the current calendar month.
      required:
        - DashboardEnabled
    DeliverabilityDashboardAccountStatus:
      description: The current status of your Deliverability dashboard subscription. If this value is PENDING_EXPIRATION, your subscription is scheduled to expire at the end of the current calendar month.
      type: string
      enum:
        - ACTIVE
        - PENDING_EXPIRATION
        - DISABLED
    DomainDeliverabilityTrackingOptions:
      description: An object that contains information about the Deliverability dashboard subscription for a verified domain that you use to send email and currently has an active Deliverability dashboard subscription. If a Deliverability dashboard subscription is active for a domain, you gain access to reputation, inbox placement, and other metrics for the domain.
      type: array
      items:
        $ref: "#/components/schemas/DomainDeliverabilityTrackingOption"
    DomainDeliverabilityTrackingOption:
      description: An object that contains information about the Deliverability dashboard subscription for a verified domain that you use to send email and currently has an active Deliverability dashboard subscription. If a Deliverability dashboard subscription is active for a domain, you gain access to reputation, inbox placement, and other metrics for the domain.
      type: object
      properties:
        Domain:
          $ref: "#/components/schemas/Domain"
          description: A verified domain that’s associated with your Amazon Web Services account and currently has an active Deliverability dashboard subscription.
        SubscriptionStartDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date when you enabled the Deliverability dashboard for the domain.
        InboxPlacementTrackingOption:
          $ref: "#/components/schemas/InboxPlacementTrackingOption"
          description: An object that contains information about the inbox placement data settings for the domain.
    Domain:
      type: string
    InboxPlacementTrackingOption:
      description: An object that contains information about the inbox placement data settings for a verified domain that’s associated with your Amazon Web Services account. This data is available only if you enabled the Deliverability dashboard for the domain.
      type: object
      properties:
        Global:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether inbox placement data is being tracked for the domain.
        TrackedIsps:
          $ref: "#/components/schemas/IspNameList"
          description: An array of strings, one for each major email provider that the inbox placement data applies to.
    IspNameList:
      type: array
      items:
        $ref: "#/components/schemas/IspName"
    IspName:
      description: The name of an email provider.
      type: string
    GetDeliverabilityTestReportResponse:
      description: The results of the predictive inbox placement test.
      type: object
      properties:
        DeliverabilityTestReport:
          $ref: "#/components/schemas/DeliverabilityTestReport"
          description: An object that contains the results of the predictive inbox placement test.
        OverallPlacement:
          $ref: "#/components/schemas/PlacementStatistics"
          description: An object that specifies how many test messages that were sent during the predictive inbox placement test were delivered to recipients' inboxes, how many were sent to recipients' spam folders, and how many weren't delivered.
        IspPlacements:
          $ref: "#/components/schemas/IspPlacements"
          description: An object that describes how the test email was handled by several email providers, including Gmail, Hotmail, Yahoo, AOL, and others.
        Message:
          $ref: "#/components/schemas/MessageContent"
          description: An object that contains the message that you sent when you performed this predictive inbox placement test.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of objects that define the tags (keys and values) that are associated with the predictive inbox placement test.
      required:
        - DeliverabilityTestReport
        - OverallPlacement
        - IspPlacements
    DeliverabilityTestReport:
      description: An object that contains metadata related to a predictive inbox placement test.
      type: object
      properties:
        ReportId:
          $ref: "#/components/schemas/ReportId"
          description: A unique string that identifies the predictive inbox placement test.
        ReportName:
          $ref: "#/components/schemas/ReportName"
          description: A name that helps you identify a predictive inbox placement test report.
        Subject:
          $ref: "#/components/schemas/DeliverabilityTestSubject"
          description: The subject line for an email that you submitted in a predictive inbox placement test.
        FromEmailAddress:
          $ref: "#/components/schemas/EmailAddress"
          description: The sender address that you specified for the predictive inbox placement test.
        CreateDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date and time when the predictive inbox placement test was created.
        DeliverabilityTestStatus:
          $ref: "#/components/schemas/DeliverabilityTestStatus"
          description: The status of the predictive inbox placement test. If the status is IN_PROGRESS, then the predictive inbox placement test is currently running. Predictive inbox placement tests are usually complete within 24 hours of creating the test. If the status is COMPLETE, then the test is finished, and you can use the GetDeliverabilityTestReport to view the results of the test.
    DeliverabilityTestSubject:
      description: The subject line for an email that you submitted in a predictive inbox placement test.
      type: string
    PlacementStatistics:
      description: An object that contains inbox placement data for an email provider.
      type: object
      properties:
        InboxPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that arrived in recipients' inboxes during the predictive inbox placement test.
        SpamPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that arrived in recipients' spam or junk mail folders during the predictive inbox placement test.
        MissingPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that didn't arrive in recipients' inboxes at all during the predictive inbox placement test.
        SpfPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that were authenticated by using Sender Policy Framework (SPF) during the predictive inbox placement test.
        DkimPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that were authenticated by using DomainKeys Identified Mail (DKIM) during the predictive inbox placement test.
    Percentage:
      description: An object that contains information about inbox placement percentages.
      type: number
      format: double
    IspPlacements:
      type: array
      items:
        $ref: "#/components/schemas/IspPlacement"
    IspPlacement:
      description: An object that describes how email sent during the predictive inbox placement test was handled by a certain email provider.
      type: object
      properties:
        IspName:
          $ref: "#/components/schemas/IspName"
          description: The name of the email provider that the inbox placement data applies to.
        PlacementStatistics:
          $ref: "#/components/schemas/PlacementStatistics"
          description: An object that contains inbox placement metrics for a specific email provider.
    MessageContent:
      description: The body of an email message.
      type: string
    CampaignId:
      type: string
    GetDomainDeliverabilityCampaignResponse:
      description: An object that contains all the deliverability data for a specific campaign. This data is available for a campaign only if the campaign sent email by using a domain that the Deliverability dashboard is enabled for.
      type: object
      properties:
        DomainDeliverabilityCampaign:
          $ref: "#/components/schemas/DomainDeliverabilityCampaign"
          description: An object that contains the deliverability data for the campaign.
      required:
        - DomainDeliverabilityCampaign
    DomainDeliverabilityCampaign:
      description: An object that contains the deliverability data for a specific campaign. This data is available for a campaign only if the campaign sent email by using a domain that the Deliverability dashboard is enabled for (PutDeliverabilityDashboardOption operation).
      type: object
      properties:
        CampaignId:
          $ref: "#/components/schemas/CampaignId"
          description: The unique identifier for the campaign. The Deliverability dashboard automatically generates and assigns this identifier to a campaign.
        ImageUrl:
          $ref: "#/components/schemas/ImageUrl"
          description: The URL of an image that contains a snapshot of the email message that was sent.
        Subject:
          $ref: "#/components/schemas/Subject"
          description: The subject line, or title, of the email message.
        FromAddress:
          $ref: "#/components/schemas/Identity"
          description: The verified email address that the email message was sent from.
        SendingIps:
          $ref: "#/components/schemas/IpList"
          description: The IP addresses that were used to send the email message.
        FirstSeenDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The first time when the email message was delivered to any recipient's inbox. This value can help you determine how long it took for a campaign to deliver an email message.
        LastSeenDateTime:
          $ref: "#/components/schemas/Timestamp"
          description: The last time when the email message was delivered to any recipient's inbox. This value can help you determine how long it took for a campaign to deliver an email message.
        InboxCount:
          $ref: "#/components/schemas/Volume"
          description: The number of email messages that were delivered to recipients’ inboxes.
        SpamCount:
          $ref: "#/components/schemas/Volume"
          description: The number of email messages that were delivered to recipients' spam or junk mail folders.
        ReadRate:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of email messages that were opened by recipients. Due to technical limitations, this value only includes recipients who opened the message by using an email client that supports images.
        DeleteRate:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of email messages that were deleted by recipients, without being opened first. Due to technical limitations, this value only includes recipients who opened the message by using an email client that supports images.
        ReadDeleteRate:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of email messages that were opened and then deleted by recipients. Due to technical limitations, this value only includes recipients who opened the message by using an email client that supports images.
        ProjectedVolume:
          $ref: "#/components/schemas/Volume"
          description: The projected number of recipients that the email message was sent to.
        Esps:
          $ref: "#/components/schemas/Esps"
          description: The major email providers who handled the email message.
    ImageUrl:
      type: string
    Subject:
      type: string
    IpList:
      type: array
      items:
        $ref: "#/components/schemas/Ip"
    Volume:
      description: An object that contains information about inbox placement volume.
      type: integer
      format: int64
    Esps:
      type: array
      items:
        $ref: "#/components/schemas/Esp"
    Esp:
      type: string
    GetDomainStatisticsReportResponse:
      description: An object that includes statistics that are related to the domain that you specified.
      type: object
      properties:
        OverallVolume:
          $ref: "#/components/schemas/OverallVolume"
          description: An object that contains deliverability metrics for the domain that you specified. The data in this object is a summary of all of the data that was collected from the StartDate to the EndDate.
        DailyVolumes:
          $ref: "#/components/schemas/DailyVolumes"
          description: An object that contains deliverability metrics for the domain that you specified. This object contains data for each day, starting on the StartDate and ending on the EndDate.
      required:
        - OverallVolume
        - DailyVolumes
    OverallVolume:
      description: An object that contains information about email that was sent from the selected domain.
      type: object
      properties:
        VolumeStatistics:
          $ref: "#/components/schemas/VolumeStatistics"
          description: An object that contains information about the numbers of messages that arrived in recipients' inboxes and junk mail folders.
        ReadRatePercent:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of emails that were sent from the domain that were read by their recipients.
        DomainIspPlacements:
          $ref: "#/components/schemas/DomainIspPlacements"
          description: An object that contains inbox and junk mail placement metrics for individual email providers.
    VolumeStatistics:
      description: An object that contains information about the amount of email that was delivered to recipients.
      type: object
      properties:
        InboxRawCount:
          $ref: "#/components/schemas/Volume"
          description: The total number of emails that arrived in recipients' inboxes.
        SpamRawCount:
          $ref: "#/components/schemas/Volume"
          description: The total number of emails that arrived in recipients' spam or junk mail folders.
        ProjectedInbox:
          $ref: "#/components/schemas/Volume"
          description: An estimate of the percentage of emails sent from the current domain that will arrive in recipients' inboxes.
        ProjectedSpam:
          $ref: "#/components/schemas/Volume"
          description: An estimate of the percentage of emails sent from the current domain that will arrive in recipients' spam or junk mail folders.
    DomainIspPlacements:
      type: array
      items:
        $ref: "#/components/schemas/DomainIspPlacement"
    DomainIspPlacement:
      description: An object that contains inbox placement data for email sent from one of your email domains to a specific email provider.
      type: object
      properties:
        IspName:
          $ref: "#/components/schemas/IspName"
          description: The name of the email provider that the inbox placement data applies to.
        InboxRawCount:
          $ref: "#/components/schemas/Volume"
          description: The total number of messages that were sent from the selected domain to the specified email provider that arrived in recipients' inboxes.
        SpamRawCount:
          $ref: "#/components/schemas/Volume"
          description: The total number of messages that were sent from the selected domain to the specified email provider that arrived in recipients' spam or junk mail folders.
        InboxPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of messages that were sent from the selected domain to the specified email provider that arrived in recipients' inboxes.
        SpamPercentage:
          $ref: "#/components/schemas/Percentage"
          description: The percentage of messages that were sent from the selected domain to the specified email provider that arrived in recipients' spam or junk mail folders.
    DailyVolumes:
      type: array
      items:
        $ref: "#/components/schemas/DailyVolume"
    DailyVolume:
      description: An object that contains information about the volume of email sent on each day of the analysis period.
      type: object
      properties:
        StartDate:
          $ref: "#/components/schemas/Timestamp"
          description: The date that the DailyVolume metrics apply to, in Unix time.
        VolumeStatistics:
          $ref: "#/components/schemas/VolumeStatistics"
          description: An object that contains inbox placement metrics for a specific day in the analysis period.
        DomainIspPlacements:
          $ref: "#/components/schemas/DomainIspPlacements"
          description: An object that contains inbox placement metrics for a specified day in the analysis period, broken out by the recipient's email provider.
    GetEmailAddressInsightsResponse:
      description: Validation insights about an email address.
      type: object
      properties:
        MailboxValidation:
          $ref: "#/components/schemas/MailboxValidation"
          description: Detailed validation results for the email address.
    MailboxValidation:
      description: Contains detailed validation information about an email address.
      type: object
      properties:
        IsValid:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Overall validity assessment with a conﬁdence verdict.
        Evaluations:
          $ref: "#/components/schemas/EmailAddressInsightsMailboxEvaluations"
          description: Specific validation checks performed on the email address.
    EmailAddressInsightsVerdict:
      description: Contains the overall validation verdict for an email address.
      type: object
      properties:
        ConfidenceVerdict:
          $ref: "#/components/schemas/EmailAddressInsightsConfidenceVerdict"
          description: The confidence level of the validation verdict.
    EmailAddressInsightsConfidenceVerdict:
      description: "The confidence level of SES that the email address meets the validation criteria: LOW - Weak or no indication of the speciﬁc check (e.g., LOW for IsRoleAddress means the email is less likely to be a role-based address). MEDIUM - Moderate indication of the speciﬁc check (e.g., MEDIUM for IsDisposable means the email might be a disposable address). HIGH - Strong indication of the speciﬁc check (e.g., HIGH for IsRandomInput means the email is very likely randomly generated)."
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
    EmailAddressInsightsMailboxEvaluations:
      description: Contains individual validation checks performed on an email address.
      type: object
      properties:
        HasValidSyntax:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Checks that the email address follows proper RFC standards and contains valid characters in the correct format.
        HasValidDnsRecords:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Checks that the domain exists, has valid DNS records, and is conﬁgured to receive email.
        MailboxExists:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Checks that the mailbox exists and can receive messages without actually sending an email.
        IsRoleAddress:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Identiﬁes role-based addresses (such as admin@, support@, or info@) that may have lower engagement rates.
        IsDisposable:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Checks disposable or temporary email addresses that could negatively impact your sender reputation.
        IsRandomInput:
          $ref: "#/components/schemas/EmailAddressInsightsVerdict"
          description: Checks if the input appears to be random text.
    GetEmailIdentityResponse:
      description: Details about an email identity.
      type: object
      properties:
        IdentityType:
          $ref: "#/components/schemas/IdentityType"
          description: "The email identity type. Note: the MANAGED_DOMAIN identity type is not supported."
        FeedbackForwardingStatus:
          $ref: "#/components/schemas/Enabled"
          description: The feedback forwarding configuration for the identity. If the value is true, you receive email notifications when bounce or complaint events occur. These notifications are sent to the address that you specified in the Return-Path header of the original email. You're required to have a method of tracking bounces and complaints. If you haven't set up another mechanism for receiving bounce or complaint notifications (for example, by setting up an event destination), you receive an email notification when these events occur (even if this setting is disabled).
        VerifiedForSendingStatus:
          $ref: "#/components/schemas/Enabled"
          description: Specifies whether or not the identity is verified. You can only send email from verified email addresses or domains. For more information about verifying identities, see the Amazon Pinpoint User Guide.
        DkimAttributes:
          $ref: "#/components/schemas/DkimAttributes"
          description: An object that contains information about the DKIM attributes for the identity.
        MailFromAttributes:
          $ref: "#/components/schemas/MailFromAttributes"
          description: An object that contains information about the Mail-From attributes for the email identity.
        Policies:
          type: object
          properties: {}
          description: A map of policy names to policies.
        Tags:
          $ref: "#/components/schemas/TagList"
          description: An array of objects that define the tags (keys and values) that are associated with the email identity.
        ConfigurationSetName:
          $ref: "#/components/schemas/ConfigurationSetName"
          description: The configuration set used by default when sending from this identity.
        VerificationStatus:
          $ref: "#/components/schemas/VerificationStatus"
          description: "The verification status of the identity. The status can be one of the following: PENDING – The verification process was initiated, but Amazon SES hasn't yet been able to verify the identity. SUCCESS – The verification process completed successfully. FAILED – The verification process failed. TEMPORARY_FAILURE – A temporary issue is preventing Amazon SES from determining the verification status of the identity. NOT_STARTED – The verification process hasn't been initiated for the identity."
        VerificationInfo:
          $ref: "#/components/schemas/VerificationInfo"
          description: An object that contains additional information about the verification status for the identity.
    MailFromAttributes:
      description: A list of attributes that are associated with a MAIL FROM domain.
      type: object
      properties:
        MailFromDomain:
          $ref: "#/components/schemas/MailFromDomainName"
          description: The name of a domain that an email identity uses as a custom MAIL FROM domain.
        MailFromDomainStatus:
          $ref: "#/components/schemas/MailFromDomainStatus"
          description: "The status of the MAIL FROM domain. This status can have the following values: PENDING – Amazon SES hasn't started searching for the MX record yet. SUCCESS – Amazon SES detected the required MX record for the MAIL FROM domain. FAILED – Amazon SES can't find the required MX record, or the record no longer exists. TEMPORARY_FAILURE – A temporary issue occurred, which prevented Amazon SES from determining the status of the MAIL FROM domain."
        BehaviorOnMxFailure:
          $ref: "#/components/schemas/BehaviorOnMxFailure"
          description: The action to take if the required MX record can't be found when you send an email. When you set this value to USE_DEFAULT_VALUE, the mail is sent using amazonses.com as the MAIL FROM domain. When you set this value to REJECT_MESSAGE, the Amazon SES API v2 returns a MailFromDomainNotVerified error, and doesn't attempt to deliver the email. These behaviors are taken when the custom MAIL FROM domain configuration is in the Pending, Failed, and TemporaryFailure states.
      required:
        - MailFromDomain
        - MailFromDomainStatus
        - BehaviorOnMxFailure
    MailFromDomainName:
      description: The domain to use as a MAIL FROM domain.
      type: string
    MailFromDomainStatus:
      description: "The status of the MAIL FROM domain. This status can have the following values: PENDING – Amazon SES hasn't started searching for the MX record yet. SUCCESS – Amazon SES detected the required MX record for the MAIL FROM domain. FAILED – Amazon SES can't find the required MX record, or the record no longer exists. TEMPORARY_FAILURE – A temporary issue occurred, which prevented Amazon SES from determining the status of the MAIL FROM domain."
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - TEMPORARY_FAILURE
    BehaviorOnMxFailure:
      description: The action to take if the required MX record can't be found when you send an email. When you set this value to UseDefaultValue, the mail is sent using amazonses.com as the MAIL FROM domain. When you set this value to RejectMessage, the Amazon SES API v2 returns a MailFromDomainNotVerified error, and doesn't attempt to deliver the email. These behaviors are taken when the custom MAIL FROM domain configuration is in the Pending, Failed, and TemporaryFailure states.
      type: string
      enum:
        - USE_DEFAULT_VALUE
        - REJECT_MESSAGE
    VerificationStatus:
      type: string
      enum:
        - PENDING
        - SUCCESS
        - FAILED
        - TEMPORARY_FAILURE
        - NOT_STARTED
    VerificationInfo:
      description: An object that contains additional information about the verification status for the identity.
      type: object
      properties:
        LastCheckedTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The last time a verification attempt was made for this identity.
        LastSuccessTimestamp:
          $ref: "#/components/schemas/Timestamp"
          description: The last time a successful verification was made for this identity.
        ErrorType:
          $ref: "#/components/schemas/VerificationError"
          description: "Provides the reason for the failure describing why Amazon SES was not able to successfully verify the identity. Below are the possible values: INVALID_VALUE – Amazon SES was able to find the record, but the value contained within the record was invalid. Ensure you have published the correct values for the record. TYPE_NOT_FOUND – The queried hostname exists but does not have the requested type of DNS record. Ensure that you have published the correct type of DNS record. HOST_NOT_FOUND – The queried hostname does not exist or was not reachable at the time of the request. Ensure that you have published the required DNS record(s). SERVICE_ERROR – A temporary issue is preventing Amazon SES from determining the verification status of the domain. DNS_SERVER_ERROR – The DNS server encountered an issue and was unable to complete the request. REPLICATION_ACCESS_DENIED – The verification failed because the user does not have the required permissions to replicate the DKIM key from the primary region. Ensure you have the necessary permissions in both primary and replica regions. REPLICATION_PRIMARY_NOT_FOUND – The verification failed because no corresponding identity was found in the specified primary region. Ensure the identity exists in the primary region before attempting replication. REPLICATION_PRIMARY_BYO_DKIM_NOT_SUPPORTED – The verification failed because the identity in the primary region is configured with Bring Your Own DKIM (BYODKIM). DKIM key replication is only supported for identities using Easy DKIM. REPLICATION_REPLICA_AS_PRIMARY_NOT_SUPPORTED – The verification failed because the specified primary identity is a replica of another identity, and multi-level replication is not supported; the primary identity must be a non-replica identity. REPLICATION_PRIMARY_INVALID_REGION – The verification failed due to an invalid primary region specified. Ensure you provide a valid Amazon Web Services region where Amazon SES is available and different from the replica region."
        SOARecord:
          $ref: "#/components/schemas/SOARecord"
          description: An object that contains information about the start of authority (SOA) record associated with the identity.
    VerificationError:
      type: string
      enum:
        - SERVICE_ERROR
        - DNS_SERVER_ERROR
        - HOST_NOT_FOUND
        - TYPE_NOT_FOUND
        - INVALID_VALUE
        - REPLICATION_ACCESS_DENIED
        - REPLICATION_PRIMARY_NOT_FOUND
        - REPLICATION_PRIMARY_BYO_DKIM_NOT_SUPPORTED
        - REPLICATION_REPLICA_AS_PRIMARY_NOT_SUPPORTED
        - REPLICATION_PRIMARY_INVALID_REGION
