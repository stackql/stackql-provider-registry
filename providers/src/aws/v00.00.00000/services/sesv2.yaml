        - RATE
        - VOLUME
    MessageInsightsDataSource:
      description: An object that contains filters applied when performing the Message Insights export.
      type: object
      properties:
        StartDate:
          $ref: "#/components/schemas/Timestamp"
          description: Represents the start date for the export interval as a timestamp. The start date is inclusive.
        EndDate:
          $ref: "#/components/schemas/Timestamp"
          description: Represents the end date for the export interval as a timestamp. The end date is inclusive.
        Include:
          $ref: "#/components/schemas/MessageInsightsFilters"
          description: Filters for results to be included in the export file.
        Exclude:
          $ref: "#/components/schemas/MessageInsightsFilters"
          description: Filters for results to be excluded from the export file.
        MaxResults:
          $ref: "#/components/schemas/MessageInsightsExportMaxResults"
          description: The maximum number of results.
      required:
        - StartDate
        - EndDate
    MessageInsightsFilters:
      description: An object containing Message Insights filters. If you specify multiple filters, the filters are joined by AND. If you specify multiple values for a filter, the values are joined by OR. Filter values are case-sensitive. FromEmailAddress, Destination, and Subject filters support partial match. A partial match is performed by using the * wildcard character placed at the beginning (suffix match), the end (prefix match) or both ends of the string (contains match). In order to match the literal characters * or \, they must be escaped using the \ character. If no wildcard character is present, an exact match is performed.
      type: object
      properties:
        FromEmailAddress:
          $ref: "#/components/schemas/EmailAddressFilterList"
          description: The from address used to send the message.
        Destination:
          $ref: "#/components/schemas/EmailAddressFilterList"
          description: The recipient's email address.
        Subject:
          $ref: "#/components/schemas/EmailSubjectFilterList"
          description: The subject line of the message.
        Isp:
          $ref: "#/components/schemas/IspFilterList"
          description: The recipient's ISP (e.g., Gmail, Yahoo, etc.).
        LastDeliveryEvent:
          $ref: "#/components/schemas/LastDeliveryEventList"
          description: "The last delivery-related event for the email, where the ordering is as follows: SEND < BOUNCE < DELIVERY < COMPLAINT."
        LastEngagementEvent:
          $ref: "#/components/schemas/LastEngagementEventList"
          description: "The last engagement-related event for the email, where the ordering is as follows: OPEN < CLICK. Engagement events are only available if Engagement tracking is enabled."
