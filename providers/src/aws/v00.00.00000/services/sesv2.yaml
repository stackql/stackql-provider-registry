              schema:
                $ref: "#/components/schemas/TestRenderEmailTemplateResponse"
  /v2/email/reputation/entities/{reputation_entity_type}/{reputation_entity_reference}/customer-managed-status:
    put:
      operationId: UpdateReputationEntityCustomerManagedStatus
      description: Update the customer-managed sending status for a reputation entity. This allows you to enable, disable, or reinstate sending for the entity. The customer-managed status works in conjunction with the Amazon Web Services Amazon SES-managed status to determine the overall sending capability. When you update the customer-managed status, the Amazon Web Services Amazon SES-managed status remains unchanged. If Amazon Web Services Amazon SES has disabled the entity, it will not be allowed to send regardless of the customer-managed status setting. When you reinstate an entity through the customer-managed status, it can continue sending only if the Amazon Web Services Amazon SES-managed status also permits sending, even if there are active reputation findings, until the findings are resolved or new violations occur.
      parameters:
        - name: reputation_entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReputationEntityType"
          description: The type of reputation entity. Currently, only RESOURCE type entities are supported.
        - name: reputation_entity_reference
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReputationEntityReference"
          description: The unique identifier for the reputation entity. For resource-type entities, this is the Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SendingStatus:
                  $ref: "#/components/schemas/SendingStatus"
              required:
                - SendingStatus
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReputationEntityCustomerManagedStatusResponse"
  /v2/email/reputation/entities/{reputation_entity_type}/{reputation_entity_reference}/policy:
    put:
      operationId: UpdateReputationEntityPolicy
      description: Update the reputation management policy for a reputation entity. The policy determines how the entity responds to reputation findings, such as automatically pausing sending when certain thresholds are exceeded. Reputation management policies are Amazon Web Services Amazon SES-managed (predefined policies). You can select from none, standard, and strict policies.
      parameters:
        - name: reputation_entity_type
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReputationEntityType"
          description: The type of reputation entity. Currently, only RESOURCE type entities are supported.
        - name: reputation_entity_reference
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ReputationEntityReference"
          description: The unique identifier for the reputation entity. For resource-type entities, this is the Amazon Resource Name (ARN) of the resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ReputationEntityPolicy:
                  $ref: "#/components/schemas/AmazonResourceName"
              required:
                - ReputationEntityPolicy
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReputationEntityPolicyResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    BatchGetMetricDataQueries:
      type: array
      items:
        $ref: "#/components/schemas/BatchGetMetricDataQuery"
    BatchGetMetricDataQuery:
      description: Represents a single metric data query to include in a batch.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QueryIdentifier"
          description: The query identifier.
        Namespace:
          $ref: "#/components/schemas/MetricNamespace"
          description: The query namespace - e.g. VDM
        Metric:
          $ref: "#/components/schemas/Metric"
          description: "The queried metric. This can be one of the following: SEND – Emails sent eligible for tracking in the VDM dashboard. This excludes emails sent to the mailbox simulator and emails addressed to more than one recipient. COMPLAINT – Complaints received for your account. This excludes complaints from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those for emails addressed to more than one recipient PERMANENT_BOUNCE – Permanent bounces - i.e. feedback received for emails sent to non-existent mailboxes. Excludes bounces from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those for emails addressed to more than one recipient. TRANSIENT_BOUNCE – Transient bounces - i.e. feedback received for delivery failures excluding issues with non-existent mailboxes. Excludes bounces from the mailbox simulator, and those for emails addressed to more than one recipient. OPEN – Unique open events for emails including open trackers. Excludes opens for emails addressed to more than one recipient. CLICK – Unique click events for emails including wrapped links. Excludes clicks for emails addressed to more than one recipient. DELIVERY – Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator and for emails addressed to more than one recipient. DELIVERY_OPEN – Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails without open trackers. DELIVERY_CLICK – Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails without click trackers. DELIVERY_COMPLAINT – Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails addressed to recipients hosted by ISPs with which Amazon SES does not have a feedback loop agreement."
        Dimensions:
          type: object
          properties: {}
          description: An object that contains mapping between MetricDimensionName and MetricDimensionValue to filter metrics by.
        StartDate:
          $ref: "#/components/schemas/Timestamp"
          description: Represents the start date for the query interval.
        EndDate:
          $ref: "#/components/schemas/Timestamp"
          description: Represents the end date for the query interval.
      required:
        - Id
        - Namespace
        - Metric
        - StartDate
        - EndDate
    QueryIdentifier:
      type: string
      minLength: 1
      maxLength: 255
    MetricNamespace:
      type: string
      enum:
        - VDM
    Metric:
      description: "The metric to export, can be one of the following: SEND - Emails sent eligible for tracking in the VDM dashboard. This excludes emails sent to the mailbox simulator and emails addressed to more than one recipient. COMPLAINT - Complaints received for your account. This excludes complaints from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those for emails addressed to more than one recipient PERMANENT_BOUNCE - Permanent bounces - i.e., feedback received for emails sent to non-existent mailboxes. Excludes bounces from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those for emails addressed to more than one recipient. TRANSIENT_BOUNCE - Transient bounces - i.e., feedback received for delivery failures excluding issues with non-existent mailboxes. Excludes bounces from the mailbox simulator, and those for emails addressed to more than one recipient. OPEN - Unique open events for emails including open trackers. Excludes opens for emails addressed to more than one recipient. CLICK - Unique click events for emails including wrapped links. Excludes clicks for emails addressed to more than one recipient. DELIVERY - Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator and for emails addressed to more than one recipient. DELIVERY_OPEN - Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails without open trackers. DELIVERY_CLICK - Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails without click trackers. DELIVERY_COMPLAINT - Successful deliveries for email sending attempts. Excludes deliveries to the mailbox simulator, for emails addressed to more than one recipient, and emails addressed to recipients hosted by ISPs with which Amazon SES does not have a feedback loop agreement."
      type: string
      enum:
        - SEND
        - COMPLAINT
        - PERMANENT_BOUNCE
        - TRANSIENT_BOUNCE
        - OPEN
        - CLICK
        - DELIVERY
        - DELIVERY_OPEN
        - DELIVERY_CLICK
        - DELIVERY_COMPLAINT
    Timestamp:
      type: string
      format: date-time
    BatchGetMetricDataResponse:
      description: Represents the result of processing your metric data batch request
      type: object
      properties:
        Results:
          $ref: "#/components/schemas/MetricDataResultList"
          description: A list of successfully retrieved MetricDataResult.
        Errors:
          $ref: "#/components/schemas/MetricDataErrorList"
          description: A list of MetricDataError encountered while processing your metric data batch request.
    MetricDataResultList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDataResult"
    MetricDataResult:
      description: The result of a single metric data query.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QueryIdentifier"
          description: The query identifier.
        Timestamps:
          $ref: "#/components/schemas/TimestampList"
          description: A list of timestamps for the metric data results.
        Values:
          $ref: "#/components/schemas/MetricValueList"
          description: A list of values (cumulative / sum) for the metric data results.
    TimestampList:
      type: array
      items:
        $ref: "#/components/schemas/Timestamp"
    MetricValueList:
      type: array
      items:
        $ref: "#/components/schemas/Counter"
    Counter:
      type: integer
      format: int64
    MetricDataErrorList:
      type: array
      items:
        $ref: "#/components/schemas/MetricDataError"
    MetricDataError:
      description: An error corresponding to the unsuccessful processing of a single metric data query.
      type: object
      properties:
        Id:
          $ref: "#/components/schemas/QueryIdentifier"
          description: The query identifier.
        Code:
          $ref: "#/components/schemas/QueryErrorCode"
          description: "The query error code. Can be one of: INTERNAL_FAILURE – Amazon SES has failed to process one of the queries. ACCESS_DENIED – You have insufficient access to retrieve metrics based on the given query."
        Message:
          $ref: "#/components/schemas/QueryErrorMessage"
          description: The error message associated with the current query error.
    QueryErrorCode:
      type: string
      enum:
        - INTERNAL_FAILURE
        - ACCESS_DENIED
    QueryErrorMessage:
      type: string
    JobId:
      description: A string that represents a job ID.
      type: string
      minLength: 1
    CancelExportJobResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    ConfigurationSetName:
      description: The name of a configuration set. Configuration sets are groups of rules that you can apply to the emails you send. You apply a configuration set to an email by including a reference to the configuration set in the headers of the email. When you apply a configuration set to an email, all of the rules in that configuration set are applied to the email.
      type: string
    TrackingOptions:
      description: An object that defines the tracking options for a configuration set. When you use the Amazon SES API v2 to send an email, it contains an invisible image that's used to track when recipients open your email. If your email contains links, those links are changed slightly in order to track when recipients click them. These images and links include references to a domain operated by Amazon Web Services. You can optionally configure the Amazon SES to use a domain that you operate for these images and links.
      type: object
      properties:
        CustomRedirectDomain:
          $ref: "#/components/schemas/CustomRedirectDomain"
          description: The domain to use for tracking open and click events.
        HttpsPolicy:
          $ref: "#/components/schemas/HttpsPolicy"
          description: The https policy to use for tracking open and click events.
      required:
        - CustomRedirectDomain
    CustomRedirectDomain:
      description: The domain to use for tracking open and click events.
      type: string
    HttpsPolicy:
      description: The https policy to use for tracking open and click events. If the value is OPTIONAL or HttpsPolicy is not specified, the open trackers use HTTP and click tracker use the original protocol of the link. If the value is REQUIRE, both open and click tracker uses HTTPS and if the value is REQUIRE_OPEN_ONLY open tracker uses HTTPS and link tracker is same as original protocol of the link.
      type: string
      enum:
        - REQUIRE
        - REQUIRE_OPEN_ONLY
        - OPTIONAL
    DeliveryOptions:
      description: Used to associate a configuration set with a dedicated IP pool.
      type: object
      properties:
        TlsPolicy:
          $ref: "#/components/schemas/TlsPolicy"
          description: Specifies whether messages that use the configuration set are required to use Transport Layer Security (TLS). If the value is Require, messages are only delivered if a TLS connection can be established. If the value is Optional, messages can be delivered in plain text if a TLS connection can't be established.
        SendingPoolName:
          $ref: "#/components/schemas/PoolName"
          description: The name of the dedicated IP pool to associate with the configuration set.
        MaxDeliverySeconds:
          $ref: "#/components/schemas/MaxDeliverySeconds"
          description: The maximum amount of time, in seconds, that Amazon SES API v2 will attempt delivery of email. If specified, the value must greater than or equal to 300 seconds (5 minutes) and less than or equal to 50400 seconds (840 minutes).
    TlsPolicy:
      description: Specifies whether messages that use the configuration set are required to use Transport Layer Security (TLS). If the value is Require, messages are only delivered if a TLS connection can be established. If the value is Optional, messages can be delivered in plain text if a TLS connection can't be established.
      type: string
      enum:
        - REQUIRE
        - OPTIONAL
    PoolName:
      description: The name of a dedicated IP pool.
      type: string
    MaxDeliverySeconds:
      type: integer
      format: int64
      minimum: 300
      maximum: 50400
    ReputationOptions:
      description: Enable or disable collection of reputation metrics for emails that you send using this configuration set in the current Amazon Web Services Region.
      type: object
      properties:
        ReputationMetricsEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, tracking of reputation metrics is enabled for the configuration set. If false, tracking of reputation metrics is disabled for the configuration set.
        LastFreshStart:
          $ref: "#/components/schemas/LastFreshStart"
          description: The date and time (in Unix time) when the reputation metrics were last given a fresh start. When your account is given a fresh start, your reputation metrics are calculated starting from the date of the fresh start.
    Enabled:
      type: boolean
    LastFreshStart:
      description: The date and time (in Unix time) when the reputation metrics were last given a fresh start. When your account is given a fresh start, your reputation metrics are calculated starting from the date of the fresh start.
      type: string
      format: date-time
    SendingOptions:
      description: Used to enable or disable email sending for messages that use this configuration set in the current Amazon Web Services Region.
      type: object
      properties:
        SendingEnabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, email sending is enabled for the configuration set. If false, email sending is disabled for the configuration set.
    TagList:
      type: array
      items:
        $ref: "#/components/schemas/Tag"
    Tag:
      description: "An object that defines the tags that are associated with a resource. A tag is a label that you optionally define and associate with a resource. Tags can help you categorize and manage resources in different ways, such as by purpose, owner, environment, or other criteria. A resource can have as many as 50 tags. Each tag consists of a required tag key and an associated tag value, both of which you define. A tag key is a general label that acts as a category for a more specific tag value. A tag value acts as a descriptor within a tag key. A tag key can contain as many as 128 characters. A tag value can contain as many as 256 characters. The characters can be Unicode letters, digits, white space, or one of the following symbols: _ . : / = + -. The following additional restrictions apply to tags: Tag keys and values are case sensitive. For each associated resource, each tag key must be unique and it can have only one value. The aws: prefix is reserved for use by Amazon Web Services; you can’t use it in any tag keys or values that you define. In addition, you can't edit or remove tag keys or values that use this prefix. Tags that use this prefix don’t count against the limit of 50 tags per resource. You can associate tags with public or shared resources, but the tags are available only for your Amazon Web Services account, not any other accounts that share the resource. In addition, the tags are available only for resources that are located in the specified Amazon Web Services Region for your Amazon Web Services account."
      type: object
      properties:
        Key:
          $ref: "#/components/schemas/TagKey"
          description: One part of a key-value pair that defines a tag. The maximum length of a tag key is 128 characters. The minimum length is 1 character.
        Value:
          $ref: "#/components/schemas/TagValue"
          description: The optional part of a key-value pair that defines a tag. The maximum length of a tag value is 256 characters. The minimum length is 0 characters. If you don't want a resource to have a specific tag value, don't specify a value for this parameter. If you don't specify a value, Amazon SES sets the value to an empty string.
      required:
        - Key
        - Value
    TagKey:
      type: string
    TagValue:
      type: string
    SuppressionOptions:
      description: An object that contains information about the suppression list preferences for your account.
      type: object
      properties:
        SuppressedReasons:
          $ref: "#/components/schemas/SuppressionListReasons"
          description: "A list that contains the reasons that email addresses are automatically added to the suppression list for your account. This list can contain any or all of the following: COMPLAINT – Amazon SES adds an email address to the suppression list for your account when a message sent to that address results in a complaint. BOUNCE – Amazon SES adds an email address to the suppression list for your account when a message sent to that address results in a hard bounce."
        ValidationOptions:
          $ref: "#/components/schemas/SuppressionValidationOptions"
    SuppressionListReasons:
      type: array
      items:
        $ref: "#/components/schemas/SuppressionListReason"
    SuppressionListReason:
      description: "The reason that the address was added to the suppression list for your account. The value can be one of the following: COMPLAINT – Amazon SES added an email address to the suppression list for your account because a message sent to that address results in a complaint. BOUNCE – Amazon SES added an email address to the suppression list for your account because a message sent to that address results in a hard bounce."
      type: string
      enum:
        - BOUNCE
        - COMPLAINT
    SuppressionValidationOptions:
      description: Contains validation options for email address suppression.
      type: object
      properties:
        ConditionThreshold:
          $ref: "#/components/schemas/SuppressionConditionThreshold"
          description: Specifies the condition threshold settings for suppression validation.
      required:
        - ConditionThreshold
    SuppressionConditionThreshold:
      description: Contains Auto Validation settings, allowing you to suppress sending to specific destination(s) if they do not meet required threshold. For details on Auto Validation, see Auto Validation.
      type: object
      properties:
        ConditionThresholdEnabled:
          $ref: "#/components/schemas/FeatureStatus"
          description: Indicates whether Auto Validation is enabled for suppression. Set to ENABLED to enable the Auto Validation feature, or set to DISABLED to disable it.
        OverallConfidenceThreshold:
          $ref: "#/components/schemas/SuppressionConfidenceThreshold"
          description: The overall confidence threshold used to determine suppression decisions.
      required:
        - ConditionThresholdEnabled
    FeatureStatus:
      type: string
      enum:
        - ENABLED
        - DISABLED
    SuppressionConfidenceThreshold:
      description: Contains the confidence threshold settings for Auto Validation.
      type: object
      properties:
        ConfidenceVerdictThreshold:
          $ref: "#/components/schemas/SuppressionConfidenceVerdictThreshold"
          description: The confidence level threshold for suppression decisions.
      required:
        - ConfidenceVerdictThreshold
    SuppressionConfidenceVerdictThreshold:
      description: "The confidence level threshold for suppression validation: MEDIUM – Allows emails to be sent to addresses with medium or high delivery likelihood. HIGH – Allows emails to be sent only to addresses with high delivery likelihood. MANAGED – Managed confidence threshold where Amazon SES automatically determines the appropriate level."
      type: string
      enum:
        - MEDIUM
        - HIGH
        - MANAGED
    VdmOptions:
      description: An object that defines the VDM settings that apply to emails that you send using the configuration set.
      type: object
      properties:
        DashboardOptions:
          $ref: "#/components/schemas/DashboardOptions"
          description: Specifies additional settings for your VDM configuration as applicable to the Dashboard.
        GuardianOptions:
          $ref: "#/components/schemas/GuardianOptions"
          description: Specifies additional settings for your VDM configuration as applicable to the Guardian.
    DashboardOptions:
      description: An object containing additional settings for your VDM configuration as applicable to the Dashboard.
      type: object
      properties:
        EngagementMetrics:
          $ref: "#/components/schemas/FeatureStatus"
          description: "Specifies the status of your VDM engagement metrics collection. Can be one of the following: ENABLED – Amazon SES enables engagement metrics for the configuration set. DISABLED – Amazon SES disables engagement metrics for the configuration set."
    GuardianOptions:
      description: An object containing additional settings for your VDM configuration as applicable to the Guardian.
      type: object
      properties:
        OptimizedSharedDelivery:
          $ref: "#/components/schemas/FeatureStatus"
          description: "Specifies the status of your VDM optimized shared delivery. Can be one of the following: ENABLED – Amazon SES enables optimized shared delivery for the configuration set. DISABLED – Amazon SES disables optimized shared delivery for the configuration set."
    ArchivingOptions:
      description: Used to associate a configuration set with a MailManager archive.
      type: object
      properties:
        ArchiveArn:
          $ref: "#/components/schemas/ArchiveArn"
          description: The Amazon Resource Name (ARN) of the MailManager archive where the Amazon SES API v2 will archive sent emails.
    ArchiveArn:
      type: string
      minLength: 20
      maxLength: 1011
      pattern: arn:(aws|aws-[a-z-]+):ses:[a-z]{2,4}-[a-z-]+-[0-9]:[0-9]{1,20}:mailmanager-archive/a-[a-z0-9]{24,62}
    CreateConfigurationSetResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    EventDestinationName:
      description: The name of an event destination. Events include message sends, deliveries, opens, clicks, bounces, and complaints. Event destinations are places that you can send information about these events to. For example, you can send event data to Amazon SNS to receive notifications when you receive bounces or complaints, or you can use Amazon Kinesis Data Firehose to stream data to Amazon S3 for long-term storage.
      type: string
    EventDestinationDefinition:
      description: An object that defines the event destination. Specifically, it defines which services receive events from emails sent using the configuration set that the event destination is associated with. Also defines the types of events that are sent to the event destination.
      type: object
      properties:
        Enabled:
          $ref: "#/components/schemas/Enabled"
          description: If true, the event destination is enabled. When the event destination is enabled, the specified event types are sent to the destinations in this EventDestinationDefinition. If false, the event destination is disabled. When the event destination is disabled, events aren't sent to the specified destinations.
        MatchingEventTypes:
          $ref: "#/components/schemas/EventTypes"
          description: An array that specifies which events the Amazon SES API v2 should send to the destinations in this EventDestinationDefinition.
        KinesisFirehoseDestination:
          $ref: "#/components/schemas/KinesisFirehoseDestination"
          description: An object that defines an Amazon Kinesis Data Firehose destination for email events. You can use Amazon Kinesis Data Firehose to stream data to other services, such as Amazon S3 and Amazon Redshift.
        CloudWatchDestination:
          $ref: "#/components/schemas/CloudWatchDestination"
          description: An object that defines an Amazon CloudWatch destination for email events. You can use Amazon CloudWatch to monitor and gain insights on your email sending metrics.
        SnsDestination:
          $ref: "#/components/schemas/SnsDestination"
          description: An object that defines an Amazon SNS destination for email events. You can use Amazon SNS to send notifications when certain email events occur.
        EventBridgeDestination:
          $ref: "#/components/schemas/EventBridgeDestination"
          description: An object that defines an Amazon EventBridge destination for email events. You can use Amazon EventBridge to send notifications when certain email events occur.
        PinpointDestination:
          $ref: "#/components/schemas/PinpointDestination"
          description: An object that defines an Amazon Pinpoint project destination for email events. You can send email event data to a Amazon Pinpoint project to view metrics using the Transactional Messaging dashboards that are built in to Amazon Pinpoint. For more information, see Transactional Messaging Charts in the Amazon Pinpoint User Guide.
    EventTypes:
      type: array
      items:
        $ref: "#/components/schemas/EventType"
    EventType:
      description: An email sending event type. For example, email sends, opens, and bounces are all email events.
      type: string
      enum:
        - SEND
        - REJECT
        - BOUNCE
        - COMPLAINT
        - DELIVERY
        - OPEN
        - CLICK
        - RENDERING_FAILURE
        - DELIVERY_DELAY
        - SUBSCRIPTION
    KinesisFirehoseDestination:
      description: An object that defines an Amazon Kinesis Data Firehose destination for email events. You can use Amazon Kinesis Data Firehose to stream data to other services, such as Amazon S3 and Amazon Redshift.
      type: object
      properties:
        IamRoleArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the IAM role that the Amazon SES API v2 uses to send email events to the Amazon Kinesis Data Firehose stream.
        DeliveryStreamArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Kinesis Data Firehose stream that the Amazon SES API v2 sends email events to.
      required:
        - IamRoleArn
        - DeliveryStreamArn
    AmazonResourceName:
      type: string
      minLength: 1
    CloudWatchDestination:
      description: An object that defines an Amazon CloudWatch destination for email events. You can use Amazon CloudWatch to monitor and gain insights on your email sending metrics.
      type: object
      properties:
        DimensionConfigurations:
          $ref: "#/components/schemas/CloudWatchDimensionConfigurations"
          description: An array of objects that define the dimensions to use when you send email events to Amazon CloudWatch.
      required:
        - DimensionConfigurations
    CloudWatchDimensionConfigurations:
      type: array
      items:
        $ref: "#/components/schemas/CloudWatchDimensionConfiguration"
    CloudWatchDimensionConfiguration:
      description: An object that defines the dimension configuration to use when you send email events to Amazon CloudWatch.
      type: object
      properties:
        DimensionName:
          $ref: "#/components/schemas/DimensionName"
          description: "The name of an Amazon CloudWatch dimension associated with an email sending metric. The name has to meet the following criteria: It can only contain ASCII letters (a–z, A–Z), numbers (0–9), underscores (_), or dashes (-). It can contain no more than 256 characters."
        DimensionValueSource:
          $ref: "#/components/schemas/DimensionValueSource"
          description: The location where the Amazon SES API v2 finds the value of a dimension to publish to Amazon CloudWatch. To use the message tags that you specify using an X-SES-MESSAGE-TAGS header or a parameter to the SendEmail or SendRawEmail API, choose messageTag. To use your own email headers, choose emailHeader. To use link tags, choose linkTags.
        DefaultDimensionValue:
          $ref: "#/components/schemas/DefaultDimensionValue"
          description: "The default value of the dimension that is published to Amazon CloudWatch if you don't provide the value of the dimension when you send an email. This value has to meet the following criteria: Can only contain ASCII letters (a–z, A–Z), numbers (0–9), underscores (_), or dashes (-), at signs (@), and periods (.). It can contain no more than 256 characters."
      required:
        - DimensionName
        - DimensionValueSource
        - DefaultDimensionValue
    DimensionName:
      description: "The name of an Amazon CloudWatch dimension associated with an email sending metric. The name has to meet the following criteria: It can only contain ASCII letters (a-z, A-Z), numbers (0-9), underscores (_), or dashes (-). It can contain no more than 256 characters."
      type: string
    DimensionValueSource:
      description: The location where the Amazon SES API v2 finds the value of a dimension to publish to Amazon CloudWatch. To use the message tags that you specify using an X-SES-MESSAGE-TAGS header or a parameter to the SendEmail or SendRawEmail API, choose messageTag. To use your own email headers, choose emailHeader. To use link tags, choose linkTags.
      type: string
      enum:
        - MESSAGE_TAG
        - EMAIL_HEADER
        - LINK_TAG
    DefaultDimensionValue:
      description: "The default value of the dimension that is published to Amazon CloudWatch if you don't provide the value of the dimension when you send an email. This value has to meet the following criteria: It can only contain ASCII letters (a–z, A–Z), numbers (0–9), underscores (_), or dashes (-). It can contain no more than 256 characters."
      type: string
    SnsDestination:
      description: An object that defines an Amazon SNS destination for email events. You can use Amazon SNS to send notifications when certain email events occur.
      type: object
      properties:
        TopicArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon SNS topic to publish email events to. For more information about Amazon SNS topics, see the Amazon SNS Developer Guide.
      required:
        - TopicArn
    EventBridgeDestination:
      description: An object that defines an Amazon EventBridge destination for email events. You can use Amazon EventBridge to send notifications when certain email events occur.
      type: object
      properties:
        EventBusArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon EventBridge bus to publish email events to. Only the default bus is supported.
      required:
        - EventBusArn
    PinpointDestination:
      description: An object that defines an Amazon Pinpoint project destination for email events. You can send email event data to a Amazon Pinpoint project to view metrics using the Transactional Messaging dashboards that are built in to Amazon Pinpoint. For more information, see Transactional Messaging Charts in the Amazon Pinpoint User Guide.
      type: object
      properties:
        ApplicationArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the Amazon Pinpoint project to send email events to.
    CreateConfigurationSetEventDestinationResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    ContactListName:
      type: string
    EmailAddress:
      type: string
    TopicPreferenceList:
      type: array
      items:
        $ref: "#/components/schemas/TopicPreference"
    TopicPreference:
      description: The contact's preference for being opted-in to or opted-out of a topic.
      type: object
      properties:
        TopicName:
          $ref: "#/components/schemas/TopicName"
          description: The name of the topic.
        SubscriptionStatus:
          $ref: "#/components/schemas/SubscriptionStatus"
          description: The contact's subscription status to a topic which is either OPT_IN or OPT_OUT.
      required:
        - TopicName
        - SubscriptionStatus
    TopicName:
      type: string
    SubscriptionStatus:
      type: string
      enum:
        - OPT_IN
        - OPT_OUT
    UnsubscribeAll:
      type: boolean
    AttributesData:
      type: string
    CreateContactResponse:
      type: object
    Topics:
      type: array
      items:
        $ref: "#/components/schemas/Topic"
    Topic:
      description: An interest group, theme, or label within a list. Lists can have multiple topics.
      type: object
      properties:
        TopicName:
          $ref: "#/components/schemas/TopicName"
          description: The name of the topic.
        DisplayName:
          $ref: "#/components/schemas/DisplayName"
          description: The name of the topic the contact will see.
        Description:
          $ref: "#/components/schemas/Description"
          description: A description of what the topic is about, which the contact will see.
        DefaultSubscriptionStatus:
          $ref: "#/components/schemas/SubscriptionStatus"
          description: The default subscription status to be applied to a contact if the contact has not noted their preference for subscribing to a topic.
      required:
        - TopicName
        - DisplayName
        - DefaultSubscriptionStatus
    DisplayName:
      type: string
    Description:
      type: string
    CreateContactListResponse:
      type: object
    EmailTemplateName:
      description: The name of the template. You will refer to this name when you send email using the SendEmail or SendBulkEmail operations.
      type: string
      minLength: 1
    EmailTemplateSubject:
      description: The subject line of the email.
      type: string
    TemplateContent:
      description: The content of the custom verification email template.
      type: string
    SuccessRedirectionURL:
      description: The URL that the recipient of the verification email is sent to if his or her address is successfully verified.
      type: string
    FailureRedirectionURL:
      description: The URL that the recipient of the verification email is sent to if his or her address is not successfully verified.
      type: string
    CreateCustomVerificationEmailTemplateResponse:
      description: If the action is successful, the service sends back an HTTP 200 response with an empty HTTP body.
      type: object
    ScalingMode:
      type: string
      enum:
        - STANDARD
        - MANAGED
    CreateDedicatedIpPoolResponse:
      description: An HTTP 200 response if the request succeeds, or an error message if the request fails.
      type: object
    ReportName:
      description: A name that helps you identify a report generated by the Deliverability dashboard.
      type: string
    EmailContent:
      description: An object that defines the entire content of the email, including the message headers, body content, and attachments. For a simple email message, you specify the subject and provide both text and HTML versions of the message body. You can also add attachments to simple and templated messages. For a raw message, you provide a complete MIME-formatted message, which can include custom headers and attachments.
      type: object
      properties:
        Simple:
          $ref: "#/components/schemas/Message"
          description: The simple email message. The message consists of a subject, message body and attachments list.
        Raw:
          $ref: "#/components/schemas/RawMessage"
          description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. If you include attachments, they must be in a file format that the Amazon SES API v2 supports. The raw data of the message needs to base64-encoded if you are accessing Amazon SES directly through the HTTPS interface. If you are accessing Amazon SES using an Amazon Web Services SDK, the SDK takes care of the base 64-encoding for you. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
        Template:
          $ref: "#/components/schemas/Template"
          description: The template to use for the email message.
    Message:
      description: Represents the email message that you're sending. The Message object consists of a subject line and a message body.
      type: object
      properties:
        Subject:
          $ref: "#/components/schemas/Content"
          description: The subject line of the email. The subject line can only contain 7-bit ASCII characters. However, you can specify non-ASCII characters in the subject line by using encoded-word syntax, as described in RFC 2047.
        Body:
          $ref: "#/components/schemas/Body"
          description: The body of the message. You can specify an HTML version of the message, a text-only version of the message, or both.
        Headers:
          $ref: "#/components/schemas/MessageHeaderList"
          description: The list of message headers that will be added to the email message.
        Attachments:
          $ref: "#/components/schemas/AttachmentList"
          description: The List of attachments to include in your email. All recipients will receive the same attachments.
      required:
        - Subject
        - Body
    Content:
      description: An object that represents the content of the email, and optionally a character set specification.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/MessageData"
          description: The content of the message itself.
        Charset:
          $ref: "#/components/schemas/Charset"
          description: The character set for the content. Because of the constraints of the SMTP protocol, Amazon SES uses 7-bit ASCII by default. If the text includes characters outside of the ASCII range, you have to specify a character set. For example, you could specify UTF-8, ISO-8859-1, or Shift_JIS.
      required:
        - Data
    MessageData:
      type: string
    Charset:
      type: string
    Body:
      description: Represents the body of the email message.
      type: object
      properties:
        Text:
          $ref: "#/components/schemas/Content"
          description: An object that represents the version of the message that is displayed in email clients that don't support HTML, or clients where the recipient has disabled HTML rendering.
        Html:
          $ref: "#/components/schemas/Content"
          description: An object that represents the version of the message that is displayed in email clients that support HTML. HTML messages can include formatted text, hyperlinks, images, and more.
    MessageHeaderList:
      description: "A list of message headers. The list of message headers has to meet the following criteria: Can contain no more than 15 headers in one message."
      type: array
      items:
        $ref: "#/components/schemas/MessageHeader"
    MessageHeader:
      description: Contains the name and value of a message header that you add to an email.
      type: object
      properties:
        Name:
          $ref: "#/components/schemas/MessageHeaderName"
          description: "The name of the message header. The message header name has to meet the following criteria: Can contain any printable ASCII character (33 - 126) except for colon (:). Can contain no more than 126 characters."
        Value:
          $ref: "#/components/schemas/MessageHeaderValue"
          description: "The value of the message header. The message header value has to meet the following criteria: Can contain any printable ASCII character. Can contain no more than 995 characters. The combined length of the header name and value must not exceed 996 characters."
      required:
        - Name
        - Value
    MessageHeaderName:
      description: "The name of the message header. The message header name has to meet the following criteria: Can contain any printable ASCII character (33 - 126) except for colon (:). Can contain no more than 126 characters."
      type: string
      minLength: 1
      maxLength: 126
      pattern: ^[!-9;-@A-~]+$
    MessageHeaderValue:
      description: "The value of the message header. The message header value has to meet the following criteria: Can contain any printable ASCII character."
      type: string
      minLength: 1
      maxLength: 995
      pattern: "[ -~]*"
    AttachmentList:
      type: array
      items:
        $ref: "#/components/schemas/Attachment"
    Attachment:
      description: Contains metadata and attachment raw content.
      type: object
      properties:
        RawContent:
          $ref: "#/components/schemas/RawAttachmentData"
          description: The raw data of the attachment. It needs to be base64-encoded if you are accessing Amazon SES directly through the HTTPS interface. If you are accessing Amazon SES using an Amazon Web Services SDK, the SDK takes care of the base 64-encoding for you.
        ContentDisposition:
          $ref: "#/components/schemas/AttachmentContentDisposition"
          description: "A standard descriptor indicating how the attachment should be rendered in the email. Supported values: ATTACHMENT or INLINE."
        FileName:
          $ref: "#/components/schemas/AttachmentFileName"
          description: The file name for the attachment as it will appear in the email. Amazon SES restricts certain file extensions. To ensure attachments are accepted, check the Unsupported attachment types in the Amazon SES Developer Guide.
        ContentDescription:
          $ref: "#/components/schemas/AttachmentContentDescription"
          description: A brief description of the attachment content.
        ContentId:
          $ref: "#/components/schemas/AttachmentContentId"
          description: Unique identifier for the attachment, used for referencing attachments with INLINE disposition in HTML content.
        ContentTransferEncoding:
          $ref: "#/components/schemas/AttachmentContentTransferEncoding"
          description: "Specifies how the attachment is encoded. Supported values: BASE64, QUOTED_PRINTABLE, SEVEN_BIT."
        ContentType:
          $ref: "#/components/schemas/AttachmentContentType"
          description: "The MIME type of the attachment. Example: application/pdf, image/jpeg"
      required:
        - RawContent
        - FileName
    RawAttachmentData:
      type: string
      format: byte
    AttachmentContentDisposition:
      type: string
      enum:
        - ATTACHMENT
        - INLINE
    AttachmentFileName:
      type: string
      maxLength: 255
    AttachmentContentDescription:
      type: string
      maxLength: 1000
    AttachmentContentId:
      type: string
      minLength: 1
      maxLength: 78
    AttachmentContentTransferEncoding:
      type: string
      enum:
        - BASE64
        - QUOTED_PRINTABLE
        - SEVEN_BIT
    AttachmentContentType:
      type: string
      minLength: 1
      maxLength: 78
    RawMessage:
      description: Represents the raw content of an email message.
      type: object
      properties:
        Data:
          $ref: "#/components/schemas/RawMessageData"
          description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. Attachments must be in a file format that the Amazon SES supports. The raw data of the message needs to base64-encoded if you are accessing Amazon SES directly through the HTTPS interface. If you are accessing Amazon SES using an Amazon Web Services SDK, the SDK takes care of the base 64-encoding for you. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
      required:
        - Data
    RawMessageData:
      description: "The raw email message. The message has to meet the following criteria: The message has to contain a header and a body, separated by one blank line. All of the required header fields must be present in the message. Each part of a multipart MIME message must be formatted properly. Attachments must be in a file format that the Amazon SES API v2 supports. The entire message must be Base64 encoded. If any of the MIME parts in your message contain content that is outside of the 7-bit ASCII character range, you should encode that content to ensure that recipients' email clients render the message properly. The length of any single line of text in the message can't exceed 1,000 characters. This restriction is defined in RFC 5321."
      type: string
      format: byte
    Template:
      description: An object that defines the email template to use for an email message, and the values to use for any message variables in that template. An email template is a type of message template that contains content that you want to reuse in email messages that you send. You can specifiy the email template by providing the name or ARN of an email template previously saved in your Amazon SES account or by providing the full template content.
      type: object
      properties:
        TemplateName:
          $ref: "#/components/schemas/EmailTemplateName"
          description: The name of the template. You will refer to this name when you send email using the SendEmail or SendBulkEmail operations.
        TemplateArn:
          $ref: "#/components/schemas/AmazonResourceName"
          description: The Amazon Resource Name (ARN) of the template.
        TemplateContent:
          $ref: "#/components/schemas/EmailTemplateContent"
          description: The content of the template. Amazon SES supports only simple substitions when you send email using the SendEmail or SendBulkEmail operations and you provide the full template content in the request.
        TemplateData:
          $ref: "#/components/schemas/EmailTemplateData"
          description: An object that defines the values to use for message variables in the template. This object is a set of key-value pairs. Each key defines a message variable in the template. The corresponding value defines the value to use for that variable.
        Headers:
          $ref: "#/components/schemas/MessageHeaderList"
          description: The list of message headers that will be added to the email message.
        Attachments:
          $ref: "#/components/schemas/AttachmentList"
          description: The List of attachments to include in your email. All recipients will receive the same attachments.
    EmailTemplateContent:
      description: The content of the email, composed of a subject line, an HTML part, and a text-only part.
      type: object
      properties:
        Subject:
          $ref: "#/components/schemas/EmailTemplateSubject"
          description: The subject line of the email.
        Text:
          $ref: "#/components/schemas/EmailTemplateText"
          description: The email body that will be visible to recipients whose email clients do not display HTML.
        Html:
          $ref: "#/components/schemas/EmailTemplateHtml"
          description: The HTML body of the email.
    EmailTemplateText:
      description: The email body that will be visible to recipients whose email clients do not display HTML.
      type: string
    EmailTemplateHtml:
      description: The HTML body of the email.
      type: string
    EmailTemplateData:
      description: An object that defines the values to use for message variables in the template. This object is a set of key-value pairs. Each key defines a message variable in the template. The corresponding value defines the value to use for that variable.
      type: string
      maxLength: 262144
    CreateDeliverabilityTestReportResponse:
      description: Information about the predictive inbox placement test that you created.
      type: object
      properties:
        ReportId:
          $ref: "#/components/schemas/ReportId"
          description: A unique string that identifies the predictive inbox placement test.
        DeliverabilityTestStatus:
          $ref: "#/components/schemas/DeliverabilityTestStatus"
          description: The status of the predictive inbox placement test. If the status is IN_PROGRESS, then the predictive inbox placement test is currently running. Predictive inbox placement tests are usually complete within 24 hours of creating the test. If the status is COMPLETE, then the test is finished, and you can use the GetDeliverabilityTestReport to view the results of the test.
      required:
        - ReportId
        - DeliverabilityTestStatus
    ReportId:
      description: A unique string that identifies a Deliverability dashboard report.
      type: string
    DeliverabilityTestStatus:
      description: The status of a predictive inbox placement test. If the status is IN_PROGRESS, then the predictive inbox placement test is currently running. Predictive inbox placement tests are usually complete within 24 hours of creating the test. If the status is COMPLETE, then the test is finished, and you can use the GetDeliverabilityTestReport operation to view the results of the test.
      type: string
      enum:
        - IN_PROGRESS
        - COMPLETED
    Identity:
      type: string
      minLength: 1
    DkimSigningAttributes:
