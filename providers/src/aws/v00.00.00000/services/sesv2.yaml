      type: string
      minLength: 1
      maxLength: 320
    EmailSubjectFilterList:
      type: array
      items:
        $ref: "#/components/schemas/EmailSubject"
    EmailSubject:
      type: string
      minLength: 1
      maxLength: 998
    IspFilterList:
      type: array
      items:
        $ref: "#/components/schemas/Isp"
    Isp:
      type: string
    LastDeliveryEventList:
      type: array
      items:
        $ref: "#/components/schemas/DeliveryEventType"
    DeliveryEventType:
      description: "The type of delivery events: SEND - The send request was successful and SES will attempt to deliver the message to the recipient’s mail server. (If account-level or global suppression is being used, SES will still count it as a send, but delivery is suppressed.) DELIVERY - SES successfully delivered the email to the recipient's mail server. Excludes deliveries to the mailbox simulator and emails addressed to more than one recipient. TRANSIENT_BOUNCE - Feedback received for delivery failures excluding issues with non-existent mailboxes. Excludes bounces from the mailbox simulator, and those from emails addressed to more than one recipient. PERMANENT_BOUNCE - Feedback received for emails sent to non-existent mailboxes. Excludes bounces from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those from emails addressed to more than one recipient. UNDETERMINED_BOUNCE - SES was unable to determine the bounce reason. COMPLAINT - Complaint received for the email. This excludes complaints from the mailbox simulator, those originating from your account-level suppression list (if enabled), and those from emails addressed to more than one recipient."
      type: string
      enum:
        - SEND
        - DELIVERY
        - TRANSIENT_BOUNCE
        - PERMANENT_BOUNCE
        - UNDETERMINED_BOUNCE
        - COMPLAINT
    LastEngagementEventList:
      type: array
      items:
        $ref: "#/components/schemas/EngagementEventType"
    EngagementEventType:
      description: "The type of delivery events: OPEN - Open event for emails including open trackers. Excludes opens for emails addressed to more than one recipient. CLICK - Click event for emails including wrapped links. Excludes clicks for emails addressed to more than one recipient."
      type: string
      enum:
        - OPEN
        - CLICK
