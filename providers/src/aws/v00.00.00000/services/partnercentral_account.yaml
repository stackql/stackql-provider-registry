openapi: 3.0.0
info:
  version: "2025-04-04"
  title: Partner Central Account API
  description: Partner Central Account API
  x-serviceName: partnercentral-account
  x-serviceAlias: partnercentral_account
  x-protocol: json
  x-apiVersion: "2025-04-04"
  x-endpointPrefix: partnercentral-account
  x-targetPrefix: PartnerCentralAccount
  x-jsonVersion: "1.0"
servers:
  - url: https://partnercentral-account.{region}.amazonaws.com
    variables:
      region:
        default: us-east-1
        description: AWS region
    description: Regional endpoint for partnercentral-account
paths:
  /AcceptConnectionInvitation:
    post:
      operationId: AcceptConnectionInvitation
      description: Accepts a connection invitation from another partner, establishing a formal partnership connection between the two parties.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.AcceptConnectionInvitation
            default: PartnerCentralAccount.AcceptConnectionInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection invitation exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionInvitationId"
                  description: The unique identifier of the connection invitation to accept.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - Identifier
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptConnectionInvitationResponse"
  /AssociateAwsTrainingCertificationEmailDomain:
    post:
      operationId: AssociateAwsTrainingCertificationEmailDomain
      description: Associates an email domain with AWS training and certification for the partner account, enabling automatic verification of employee certifications.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.AssociateAwsTrainingCertificationEmailDomain
            default: PartnerCentralAccount.AssociateAwsTrainingCertificationEmailDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                Email:
                  $ref: "#/components/schemas/Email"
                  description: The email address used to verify domain ownership for AWS training and certification association.
                EmailVerificationCode:
                  $ref: "#/components/schemas/EmailVerificationCode"
                  description: The verification code sent to the email address to confirm domain ownership.
              required:
                - Catalog
                - Identifier
                - Email
                - EmailVerificationCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssociateAwsTrainingCertificationEmailDomainResponse"
  /CancelConnection:
    post:
      operationId: CancelConnection
      description: Cancels an existing connection between partners, terminating the partnership relationship.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.CancelConnection
            default: PartnerCentralAccount.CancelConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The unique identifier of the connection to cancel.
                ConnectionType:
                  $ref: "#/components/schemas/ConnectionType"
                  description: The type of connection to cancel (e.g., reseller, distributor, technology partner).
                Reason:
                  $ref: "#/components/schemas/CancelConnectionRequestReasonString"
                  description: The reason for canceling the connection, providing context for the termination.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - Identifier
                - ConnectionType
                - Reason
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelConnectionResponse"
  /CancelConnectionInvitation:
    post:
      operationId: CancelConnectionInvitation
      description: Cancels a pending connection invitation before it has been accepted or rejected.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.CancelConnectionInvitation
            default: PartnerCentralAccount.CancelConnectionInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection invitation exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionInvitationId"
                  description: The unique identifier of the connection invitation to cancel.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
              required:
                - Identifier
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelConnectionInvitationResponse"
  /CancelProfileUpdateTask:
    post:
      operationId: CancelProfileUpdateTask
      description: Cancels an in-progress profile update task, stopping any pending changes to the partner profile.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.CancelProfileUpdateTask
            default: PartnerCentralAccount.CancelProfileUpdateTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                TaskId:
                  $ref: "#/components/schemas/ProfileTaskId"
                  description: The unique identifier of the profile update task to cancel.
              required:
                - Identifier
                - TaskId
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelProfileUpdateTaskResponse"
  /CreateConnectionInvitation:
    post:
      operationId: CreateConnectionInvitation
      description: Creates a new connection invitation to establish a partnership with another organization.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.CreateConnectionInvitation
            default: PartnerCentralAccount.CreateConnectionInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection invitation will be created.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                ConnectionType:
                  $ref: "#/components/schemas/ConnectionType"
                  description: The type of connection being requested (e.g., reseller, distributor, technology partner).
                Email:
                  $ref: "#/components/schemas/Email"
                  description: The email address of the person to send the connection invitation to.
                Message:
                  $ref: "#/components/schemas/CreateConnectionInvitationRequestMessageString"
                  description: A custom message to include with the connection invitation.
                Name:
                  $ref: "#/components/schemas/SensitiveUnicodeString"
                  description: The name of the person sending the connection invitation.
                ReceiverIdentifier:
                  $ref: "#/components/schemas/ParticipantIdentifier"
                  description: The identifier of the organization or partner to invite for connection.
              required:
                - ClientToken
                - ConnectionType
                - Email
                - Message
                - Name
                - ReceiverIdentifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateConnectionInvitationResponse"
  /CreatePartner:
    post:
      operationId: CreatePartner
      description: Creates a new partner account in the AWS Partner Network with the specified details and configuration.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.CreatePartner
            default: PartnerCentralAccount.CreatePartner
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the partner account will be created.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                LegalName:
                  $ref: "#/components/schemas/SensitiveUnicodeString"
                  description: The legal name of the organization becoming a partner.
                PrimarySolutionType:
                  $ref: "#/components/schemas/PrimarySolutionType"
                  description: The primary type of solution or service the partner provides (e.g., consulting, software, managed services).
                AllianceLeadContact:
                  $ref: "#/components/schemas/AllianceLeadContact"
                  description: The primary contact person for alliance and partnership matters.
                EmailVerificationCode:
                  $ref: "#/components/schemas/EmailVerificationCode"
                  description: The verification code sent to the alliance lead contact's email to confirm account creation.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to associate with the partner account for organization and billing purposes.
              required:
                - LegalName
                - PrimarySolutionType
                - AllianceLeadContact
                - EmailVerificationCode
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePartnerResponse"
  /DisassociateAwsTrainingCertificationEmailDomain:
    post:
      operationId: DisassociateAwsTrainingCertificationEmailDomain
      description: Removes the association between an email domain and AWS training and certification for the partner account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.DisassociateAwsTrainingCertificationEmailDomain
            default: PartnerCentralAccount.DisassociateAwsTrainingCertificationEmailDomain
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                DomainName:
                  $ref: "#/components/schemas/DomainName"
                  description: The domain name to disassociate from AWS training and certification.
              required:
                - Catalog
                - Identifier
                - DomainName
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisassociateAwsTrainingCertificationEmailDomainResponse"
  /GetAllianceLeadContact:
    post:
      operationId: GetAllianceLeadContact
      description: Retrieves the alliance lead contact information for a partner account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetAllianceLeadContact
            default: PartnerCentralAccount.GetAllianceLeadContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllianceLeadContactResponse"
  /GetConnection:
    post:
      operationId: GetConnection
      description: Retrieves detailed information about a specific connection between partners.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetConnection
            default: PartnerCentralAccount.GetConnection
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionId"
                  description: The unique identifier of the connection to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionResponse"
  /GetConnectionInvitation:
    post:
      operationId: GetConnectionInvitation
      description: Retrieves detailed information about a specific connection invitation.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetConnectionInvitation
            default: PartnerCentralAccount.GetConnectionInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection invitation exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionInvitationId"
                  description: The unique identifier of the connection invitation to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionInvitationResponse"
  /GetConnectionPreferences:
    post:
      operationId: GetConnectionPreferences
      description: Retrieves the connection preferences for a partner account, including access settings and exclusions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetConnectionPreferences
            default: PartnerCentralAccount.GetConnectionPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetConnectionPreferencesResponse"
  /GetPartner:
    post:
      operationId: GetPartner
      description: Retrieves detailed information about a specific partner account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetPartner
            default: PartnerCentralAccount.GetPartner
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account to retrieve.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetPartnerResponse"
  /GetProfileUpdateTask:
    post:
      operationId: GetProfileUpdateTask
      description: Retrieves information about a specific profile update task.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetProfileUpdateTask
            default: PartnerCentralAccount.GetProfileUpdateTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileUpdateTaskResponse"
  /GetProfileVisibility:
    post:
      operationId: GetProfileVisibility
      description: Retrieves the visibility settings for a partner profile, determining who can see the profile information.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetProfileVisibility
            default: PartnerCentralAccount.GetProfileVisibility
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProfileVisibilityResponse"
  /GetVerification:
    post:
      operationId: GetVerification
      description: Retrieves the current status and details of a verification process for a partner account. This operation allows partners to check the progress and results of business or registrant verification processes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.GetVerification
            default: PartnerCentralAccount.GetVerification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                VerificationType:
                  $ref: "#/components/schemas/VerificationType"
                  description: The type of verification to retrieve information for. Valid values include business verification for company registration details and registrant verification for individual identity confirmation.
              required:
                - VerificationType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetVerificationResponse"
  /ListConnectionInvitations:
    post:
      operationId: ListConnectionInvitations
      description: Lists connection invitations for the partner account, with optional filtering by status, type, and other criteria.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.ListConnectionInvitations
            default: PartnerCentralAccount.ListConnectionInvitations
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for retrieving the next page of results in paginated responses.
                ConnectionType:
                  $ref: "#/components/schemas/ConnectionType"
                  description: Filter results by connection type (e.g., reseller, distributor, technology partner).
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of connection invitations to return in a single response.
                OtherParticipantIdentifiers:
                  $ref: "#/components/schemas/ListConnectionInvitationsRequestOtherParticipantIdentifiersList"
                  description: Filter results by specific participant identifiers.
                ParticipantType:
                  $ref: "#/components/schemas/ParticipantType"
                  description: Filter results by participant type (inviter or invitee).
                Status:
                  $ref: "#/components/schemas/InvitationStatus"
                  description: Filter results by invitation status (pending, accepted, rejected, canceled, expired).
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectionInvitationsResponse"
  /ListConnections:
    post:
      operationId: ListConnections
      description: Lists active connections for the partner account, with optional filtering by connection type and participant.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.ListConnections
            default: PartnerCentralAccount.ListConnections
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for retrieving the next page of results in paginated responses.
                ConnectionType:
                  $ref: "#/components/schemas/ConnectionTypeFilter"
                  description: Filter results by connection type (e.g., reseller, distributor, technology partner).
                MaxResults:
                  $ref: "#/components/schemas/MaxResults"
                  description: The maximum number of connections to return in a single response.
                OtherParticipantIdentifiers:
                  $ref: "#/components/schemas/ListConnectionsRequestOtherParticipantIdentifiersList"
                  description: Filter results by specific participant identifiers.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListConnectionsResponse"
  /ListPartners:
    post:
      operationId: ListPartners
      description: Lists partner accounts in the catalog, providing a summary view of all partners.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.ListPartners
            default: PartnerCentralAccount.ListPartners
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier to list partners from.
                NextToken:
                  $ref: "#/components/schemas/NextToken"
                  description: The token for retrieving the next page of results in paginated responses.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPartnersResponse"
  /ListTagsForResource:
    post:
      operationId: ListTagsForResource
      description: Lists all tags associated with a specific AWS Partner Central Account resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.ListTagsForResource
            default: PartnerCentralAccount.ListTagsForResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to list tags for.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTagsForResourceResponse"
  /PutAllianceLeadContact:
    post:
      operationId: PutAllianceLeadContact
      description: Creates or updates the alliance lead contact information for a partner account.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.PutAllianceLeadContact
            default: PartnerCentralAccount.PutAllianceLeadContact
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                AllianceLeadContact:
                  $ref: "#/components/schemas/AllianceLeadContact"
                  description: The alliance lead contact information to set for the partner account.
                EmailVerificationCode:
                  $ref: "#/components/schemas/EmailVerificationCode"
                  description: The verification code sent to the alliance lead contact's email to confirm the update.
              required:
                - Identifier
                - AllianceLeadContact
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutAllianceLeadContactResponse"
  /PutProfileVisibility:
    post:
      operationId: PutProfileVisibility
      description: Sets the visibility level for a partner profile, controlling who can view the profile information.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.PutProfileVisibility
            default: PartnerCentralAccount.PutProfileVisibility
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                Visibility:
                  $ref: "#/components/schemas/ProfileVisibility"
                  description: The visibility setting to apply to the partner profile.
              required:
                - Identifier
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PutProfileVisibilityResponse"
  /RejectConnectionInvitation:
    post:
      operationId: RejectConnectionInvitation
      description: Rejects a connection invitation from another partner, declining the partnership request.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.RejectConnectionInvitation
            default: PartnerCentralAccount.RejectConnectionInvitation
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier where the connection invitation exists.
                Identifier:
                  $ref: "#/components/schemas/ConnectionInvitationId"
                  description: The unique identifier of the connection invitation to reject.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                Reason:
                  $ref: "#/components/schemas/RejectConnectionInvitationRequestReasonString"
                  description: The reason for rejecting the connection invitation.
              required:
                - Identifier
                - ClientToken
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RejectConnectionInvitationResponse"
  /SendEmailVerificationCode:
    post:
      operationId: SendEmailVerificationCode
      description: Sends an email verification code to the specified email address for account verification purposes.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.SendEmailVerificationCode
            default: PartnerCentralAccount.SendEmailVerificationCode
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Email:
                  $ref: "#/components/schemas/Email"
                  description: The email address to send the verification code to.
              required:
                - Catalog
                - Email
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailVerificationCodeResponse"
  /StartProfileUpdateTask:
    post:
      operationId: StartProfileUpdateTask
      description: Initiates a profile update task to modify partner profile information asynchronously.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.StartProfileUpdateTask
            default: PartnerCentralAccount.StartProfileUpdateTask
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Identifier:
                  $ref: "#/components/schemas/PartnerIdentifier"
                  description: The unique identifier of the partner account.
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
                TaskDetails:
                  $ref: "#/components/schemas/TaskDetails"
                  description: The details of the profile updates to be performed.
              required:
                - Identifier
                - TaskDetails
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartProfileUpdateTaskResponse"
  /StartVerification:
    post:
      operationId: StartVerification
      description: Initiates a new verification process for a partner account. This operation begins the verification workflow for either business registration or individual registrant identity verification as required by AWS Partner Central.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.StartVerification
            default: PartnerCentralAccount.StartVerification
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ClientToken:
                  $ref: "#/components/schemas/ClientToken"
                  description: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request. This prevents duplicate verification processes from being started accidentally.
                VerificationDetails:
                  $ref: "#/components/schemas/VerificationDetails"
                  description: The specific details required for the verification process, including business information for business verification or personal information for registrant verification.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartVerificationResponse"
  /TagResource:
    post:
      operationId: TagResource
      description: Adds or updates tags for a specified AWS Partner Central Account resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.TagResource
            default: PartnerCentralAccount.TagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to tag.
                Tags:
                  $ref: "#/components/schemas/TagList"
                  description: A list of tags to add or update for the specified resource.
              required:
                - ResourceArn
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResourceResponse"
  /UntagResource:
    post:
      operationId: UntagResource
      description: Removes specified tags from an AWS Partner Central Account resource.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.UntagResource
            default: PartnerCentralAccount.UntagResource
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                ResourceArn:
                  $ref: "#/components/schemas/TaggableResourceArn"
                  description: The Amazon Resource Name (ARN) of the resource to remove tags from.
                TagKeys:
                  $ref: "#/components/schemas/TagKeyList"
                  description: A list of tag keys to remove from the specified resource.
              required:
                - ResourceArn
                - TagKeys
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntagResourceResponse"
  /UpdateConnectionPreferences:
    post:
      operationId: UpdateConnectionPreferences
      description: Updates the connection preferences for a partner account, modifying access settings and exclusions.
      parameters:
        - name: X-Amz-Target
          in: header
          description: Action Header
          required: false
          schema:
            type: string
            enum:
              - PartnerCentralAccount.UpdateConnectionPreferences
            default: PartnerCentralAccount.UpdateConnectionPreferences
      requestBody:
        required: true
        content:
          application/x-amz-json-1.0:
            schema:
              type: object
              properties:
                Catalog:
                  $ref: "#/components/schemas/Catalog"
                  description: The catalog identifier for the partner account.
                Revision:
                  $ref: "#/components/schemas/Revision"
                  description: The revision number of the connection preferences for optimistic locking.
                AccessType:
                  $ref: "#/components/schemas/AccessType"
                  description: The access type setting for connections (e.g., open, restricted, invitation-only).
                ExcludedParticipantIdentifiers:
                  $ref: "#/components/schemas/UpdateConnectionPreferencesRequestExcludedParticipantIdentifiersList"
                  description: The updated list of participant identifiers to exclude from connections.
              required:
                - AccessType
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateConnectionPreferencesResponse"
components:
  parameters:
    X-Amz-Content-Sha256:
      in: header
      name: X-Amz-Content-Sha256
      required: false
      schema:
        type: string
    X-Amz-Date:
      in: header
      name: X-Amz-Date
      required: false
      schema:
        type: string
    X-Amz-Algorithm:
      in: header
      name: X-Amz-Algorithm
      required: false
      schema:
        type: string
    X-Amz-Credential:
      in: header
      name: X-Amz-Credential
      required: false
      schema:
        type: string
    X-Amz-Security-Token:
      in: header
      name: X-Amz-Security-Token
      required: false
      schema:
        type: string
    X-Amz-Signature:
      in: header
      name: X-Amz-Signature
      required: false
      schema:
        type: string
    X-Amz-SignedHeaders:
      in: header
      name: X-Amz-SignedHeaders
      required: false
      schema:
        type: string
  schemas:
    Catalog:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[a-zA-Z0-9-]+"
    ConnectionInvitationId:
      type: string
      pattern: pacinv-[A-Za-z0-9]{13}
    ClientToken:
      type: string
      minLength: 1
      maxLength: 64
      pattern: "[A-Za-z0-9-_]+"
    AcceptConnectionInvitationResponse:
      type: object
      properties:
        Connection:
          $ref: "#/components/schemas/Connection"
          description: The details of the accepted connection between the two partners.
      required:
        - Connection
    Connection:
      description: Base structure containing common connection properties.
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The catalog identifier that the connection belongs to.
        Id:
          $ref: "#/components/schemas/ConnectionId"
          description: The unique identifier of the connection.
        Arn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The AWS Resource Name (ARN) of the connection.
        OtherParticipantAccountId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The AWS account ID of the other participant in the connection.
        UpdatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection was last updated.
        ConnectionTypes:
          type: object
          properties: {}
          description: The type of connection.
      required:
        - Catalog
        - Id
        - Arn
        - OtherParticipantAccountId
        - UpdatedAt
        - ConnectionTypes
    ConnectionId:
      type: string
      pattern: pac-[A-Za-z0-9]{13}
    ConnectionArn:
      type: string
      minLength: 1
      maxLength: 200
      pattern: arn:[a-zA-Z0-9-]+:partnercentral:[a-z0-9\-]*::catalog/[a-zA-Z]+/connection/pac-[A-Za-z0-9]{13}
    AwsAccountId:
      type: string
      pattern: "[0-9]{12}"
    DateTime:
      type: string
      format: date-time
    PartnerIdentifier:
      type: string
      minLength: 1
      maxLength: 200
      pattern: (partner-[A-Za-z0-9]{13}|arn:[a-z-]+:partnercentral:[a-z0-9-]+:[0-9]{12}:catalog/[A-Za-z-_]+/partner/partner-[A-Za-z0-9]{13})
    Email:
      type: string
      minLength: 1
      maxLength: 320
      pattern: "[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*"
    EmailVerificationCode:
      type: string
      minLength: 6
      maxLength: 6
      pattern: "[0-9]+"
    AssociateAwsTrainingCertificationEmailDomainResponse:
      type: object
    ConnectionType:
      type: string
      enum:
        - OPPORTUNITY_COLLABORATION
        - SUBSIDIARY
    CancelConnectionRequestReasonString:
      type: string
      minLength: 0
      maxLength: 256
    CancelConnectionResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The catalog identifier where the connection was canceled.
        Id:
          $ref: "#/components/schemas/ConnectionId"
          description: The unique identifier of the canceled connection.
        Arn:
          $ref: "#/components/schemas/ConnectionArn"
          description: The Amazon Resource Name (ARN) of the canceled connection.
        OtherParticipantAccountId:
          $ref: "#/components/schemas/AwsAccountId"
          description: The AWS account ID of the other participant in the canceled connection.
        UpdatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection was last updated (canceled).
        ConnectionTypes:
          type: object
          properties: {}
          description: The list of connection types that were active before cancellation.
      required:
        - Catalog
        - Id
        - Arn
        - OtherParticipantAccountId
        - UpdatedAt
        - ConnectionTypes
    CancelConnectionInvitationResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The catalog identifier where the connection invitation was canceled.
        Id:
          $ref: "#/components/schemas/ConnectionInvitationId"
          description: The unique identifier of the canceled connection invitation.
        Arn:
          $ref: "#/components/schemas/ConnectionInvitationArn"
          description: The Amazon Resource Name (ARN) of the canceled connection invitation.
        ConnectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The identifier of the connection associated with the canceled invitation.
        ConnectionType:
          $ref: "#/components/schemas/ConnectionType"
          description: The type of connection that was being invited for.
        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation was originally created.
        UpdatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation was last updated (canceled).
        ExpiresAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation would have expired if not canceled.
        OtherParticipantIdentifier:
          $ref: "#/components/schemas/ParticipantIdentifier"
          description: The identifier of the other participant who was invited to connect.
        ParticipantType:
          $ref: "#/components/schemas/ParticipantType"
          description: The type of participant (inviter or invitee) in the connection invitation.
        Status:
          $ref: "#/components/schemas/InvitationStatus"
          description: The current status of the connection invitation (canceled).
        InvitationMessage:
          $ref: "#/components/schemas/CancelConnectionInvitationResponseInvitationMessageString"
          description: The message that was included with the original connection invitation.
        InviterEmail:
          $ref: "#/components/schemas/Email"
          description: The email address of the person who sent the connection invitation.
        InviterName:
          $ref: "#/components/schemas/SensitiveUnicodeString"
          description: The name of the person who sent the connection invitation.
      required:
        - Catalog
        - Id
        - Arn
        - ConnectionType
        - CreatedAt
        - UpdatedAt
        - OtherParticipantIdentifier
        - ParticipantType
        - Status
        - InvitationMessage
        - InviterEmail
        - InviterName
    ConnectionInvitationArn:
      type: string
      minLength: 1
      maxLength: 200
      pattern: arn:[a-zA-Z0-9-]+:partnercentral:[a-z0-9\-]*::catalog/[a-zA-Z]+/connection-invitation/pacinv-[A-Za-z0-9]{13}
    ParticipantIdentifier:
      type: string
      minLength: 1
      maxLength: 100
      pattern: "[a-zA-Z0-9-]+"
    ParticipantType:
      type: string
      enum:
        - SENDER
        - RECEIVER
    InvitationStatus:
      type: string
      enum:
        - PENDING
        - ACCEPTED
        - REJECTED
        - CANCELED
        - EXPIRED
    CancelConnectionInvitationResponseInvitationMessageString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD\\n]+"
    SensitiveUnicodeString:
      type: string
      minLength: 1
      maxLength: 80
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD]+"
    ProfileTaskId:
      type: string
      minLength: 1
      maxLength: 80
      pattern: pprofiletask-[A-Za-z0-9]{13}
    CancelProfileUpdateTaskResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The catalog identifier for the partner account.
        Arn:
          $ref: "#/components/schemas/PartnerArn"
          description: The Amazon Resource Name (ARN) of the canceled profile update task.
        Id:
          $ref: "#/components/schemas/PartnerId"
          description: The unique identifier of the partner account.
        TaskId:
          $ref: "#/components/schemas/ProfileTaskId"
          description: The unique identifier of the canceled profile update task.
        TaskDetails:
          $ref: "#/components/schemas/TaskDetails"
          description: The details of the profile update task that was canceled.
        StartedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the profile update task was started.
        Status:
          $ref: "#/components/schemas/ProfileTaskStatus"
          description: The current status of the profile update task (canceled).
        EndedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the profile update task was ended (canceled).
        ErrorDetailList:
          $ref: "#/components/schemas/ErrorDetailList"
          description: A list of error details if any errors occurred during the profile update task.
      required:
        - Catalog
        - Arn
        - Id
        - TaskId
        - TaskDetails
        - StartedAt
        - Status
    PartnerArn:
      type: string
      minLength: 1
      maxLength: 200
      pattern: arn:[a-z-]+:partnercentral:[a-z0-9-]+:[0-9]{12}:catalog/[A-Za-z-_]+/partner/partner-[A-Za-z0-9]{13}
    PartnerId:
      type: string
      pattern: partner-[A-Za-z0-9]{13}
    TaskDetails:
      description: Contains detailed information about a profile update task including the changes to be made.
      type: object
      properties:
        DisplayName:
          $ref: "#/components/schemas/UnicodeString"
          description: The updated display name for the partner profile.
        Description:
          $ref: "#/components/schemas/TaskDetailsDescriptionString"
          description: The updated description for the partner profile.
        WebsiteUrl:
          $ref: "#/components/schemas/Url"
          description: The updated website URL for the partner profile.
        LogoUrl:
          $ref: "#/components/schemas/Url"
          description: The updated logo URL for the partner profile.
        PrimarySolutionType:
          $ref: "#/components/schemas/PrimarySolutionType"
          description: The updated primary solution type for the partner profile.
        IndustrySegments:
          $ref: "#/components/schemas/IndustrySegmentList"
          description: The updated industry segments for the partner profile.
        TranslationSourceLocale:
          $ref: "#/components/schemas/Locale"
          description: The updated translation source locale for the partner profile.
        LocalizedContents:
          $ref: "#/components/schemas/LocalizedContentList"
          description: The updated localized content for the partner profile.
      required:
        - DisplayName
        - Description
        - WebsiteUrl
        - LogoUrl
        - PrimarySolutionType
        - IndustrySegments
        - TranslationSourceLocale
    UnicodeString:
      type: string
      minLength: 1
      maxLength: 80
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD]+"
    TaskDetailsDescriptionString:
      type: string
      minLength: 1
      maxLength: 600
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD]+"
    Url:
      type: string
      minLength: 1
      maxLength: 256
      pattern: (https|HTTPS):\/\/[^\/\s]+(\/\S*)?
    PrimarySolutionType:
      type: string
      enum:
        - SOFTWARE_PRODUCTS
        - CONSULTING_SERVICES
        - PROFESSIONAL_SERVICES
        - MANAGED_SERVICES
        - HARDWARE_PRODUCTS
        - COMMUNICATION_SERVICES
        - VALUE_ADDED_RESALE_AWS_SERVICES
        - TRAINING_SERVICES
    IndustrySegmentList:
      type: array
      items:
        $ref: "#/components/schemas/IndustrySegment"
    IndustrySegment:
      type: string
      enum:
        - AGRICULTURE_MINING
        - BIOTECHNOLOGY
        - BUSINESS_CONSUMER_SERVICES
        - BUSINESS_SERV
        - COMMUNICATIONS
        - COMPUTER_HARDWARE
        - COMPUTERS_ELECTRONICS
        - COMPUTER_SOFTWARE
        - CONSUMER_GOODS
        - CONSUMER_RELATED
        - EDUCATION
        - ENERGY_UTILITIES
        - FINANCIAL_SERVICES
        - GAMING
        - GOVERNMENT
        - GOVERNMENT_EDUCATION_PUBLIC_SERVICES
        - HEALTHCARE
        - HEALTHCARE_PHARMACEUTICALS_BIOTECH
        - INDUSTRIAL_ENERGY
        - INTERNET_SPECIFIC
        - LIFE_SCIENCES
        - MANUFACTURING
        - MEDIA_ENTERTAINMENT_LEISURE
        - MEDIA_ENTERTAINMENT
        - MEDICAL_HEALTH
        - NON_PROFIT_ORGANIZATION
        - OTHER
        - PROFESSIONAL_SERVICES
        - REAL_ESTATE_CONSTRUCTION
        - RETAIL
        - RETAIL_WHOLESALE_DISTRIBUTION
        - SEMICONDUCTOR_ELECTR
        - SOFTWARE_INTERNET
        - TELECOMMUNICATIONS
        - TRANSPORTATION_LOGISTICS
        - TRAVEL_HOSPITALITY
        - WHOLESALE_DISTRIBUTION
    Locale:
      type: string
      pattern: "[a-z]{2}-[A-Z]{2}"
    LocalizedContentList:
      type: array
      items:
        $ref: "#/components/schemas/LocalizedContent"
    LocalizedContent:
      description: Contains localized content for a partner profile in a specific language or locale.
      type: object
      properties:
        DisplayName:
          $ref: "#/components/schemas/UnicodeString"
          description: The localized display name for the partner.
        Description:
          $ref: "#/components/schemas/LocalizedContentDescriptionString"
          description: The localized description of the partner's business and services.
        WebsiteUrl:
          $ref: "#/components/schemas/Url"
          description: The localized website URL for the partner.
        LogoUrl:
          $ref: "#/components/schemas/Url"
          description: The URL to the partner's logo image for this locale.
        Locale:
          $ref: "#/components/schemas/Locale"
          description: The locale or language code for the localized content.
      required:
        - DisplayName
        - Description
        - WebsiteUrl
        - LogoUrl
        - Locale
    LocalizedContentDescriptionString:
      type: string
      minLength: 1
      maxLength: 600
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD]+"
    ProfileTaskStatus:
      type: string
      enum:
        - IN_PROGRESS
        - CANCELED
        - SUCCEEDED
        - FAILED
    ErrorDetailList:
      type: array
      items:
        $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      description: Contains detailed information about an error that occurred during an operation.
      type: object
      properties:
        Locale:
          $ref: "#/components/schemas/String"
          description: The locale or language code for the error message.
        Message:
          $ref: "#/components/schemas/String"
          description: A human-readable description of the error.
        Reason:
          $ref: "#/components/schemas/ProfileValidationErrorReason"
          description: A machine-readable code or reason for the error.
      required:
        - Locale
        - Message
        - Reason
    String:
      type: string
    ProfileValidationErrorReason:
      type: string
      enum:
        - INVALID_CONTENT
        - DUPLICATE_PROFILE
        - INVALID_LOGO
        - INVALID_LOGO_URL
        - INVALID_LOGO_FILE
        - INVALID_LOGO_SIZE
        - INVALID_WEBSITE_URL
    CreateConnectionInvitationRequestMessageString:
      type: string
      minLength: 1
      maxLength: 256
      pattern: "[\\u0020-\\u007E\\u00A0-\\uD7FF\\uE000-\\uFFFD\\n]+"
    CreateConnectionInvitationResponse:
      type: object
      properties:
        Catalog:
          $ref: "#/components/schemas/Catalog"
          description: The catalog identifier where the connection invitation was created.
        Id:
          $ref: "#/components/schemas/ConnectionInvitationId"
          description: The unique identifier of the created connection invitation.
        Arn:
          $ref: "#/components/schemas/ConnectionInvitationArn"
          description: The Amazon Resource Name (ARN) of the created connection invitation.
        ConnectionId:
          $ref: "#/components/schemas/ConnectionId"
          description: The identifier of the connection associated with this invitation.
        ConnectionType:
          $ref: "#/components/schemas/ConnectionType"
          description: The type of connection being requested in the invitation.
        CreatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation was created.
        UpdatedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation was last updated.
        ExpiresAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the connection invitation will expire if not responded to.
        OtherParticipantIdentifier:
          $ref: "#/components/schemas/ParticipantIdentifier"
          description: The identifier of the organization or partner being invited.
        ParticipantType:
          $ref: "#/components/schemas/ParticipantType"
          description: The type of participant (inviter or invitee) in the connection invitation.
        Status:
          $ref: "#/components/schemas/InvitationStatus"
