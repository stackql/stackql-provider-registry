        - TaskId
        - TaskDetails
        - StartedAt
        - Status
    VerificationDetails:
      description: A union structure containing the specific details required for different types of verification processes supported by AWS Partner Central.
      type: object
      properties:
        BusinessVerificationDetails:
          $ref: "#/components/schemas/BusinessVerificationDetails"
          description: The business verification details to be used when starting a business verification process.
        RegistrantVerificationDetails:
          $ref: "#/components/schemas/RegistrantVerificationDetails"
          description: The registrant verification details to be used when starting an individual identity verification process.
    RegistrantVerificationDetails:
      description: Contains the personal information required for verifying an individual's identity as part of the partner registration process in AWS Partner Central.
      type: object
    StartVerificationResponse:
      type: object
      properties:
        VerificationType:
          $ref: "#/components/schemas/VerificationType"
          description: The type of verification that was started based on the provided verification details.
        VerificationStatus:
          $ref: "#/components/schemas/VerificationStatus"
          description: The initial status of the verification process after it has been started. Typically this will be pending or in-progress.
        VerificationStatusReason:
          $ref: "#/components/schemas/VerificationStatusReason"
          description: Additional information about the initial verification status, including any immediate feedback about the submitted verification details.
        VerificationResponseDetails:
          $ref: "#/components/schemas/VerificationResponseDetails"
          description: Initial response details specific to the type of verification started, which may include next steps or additional requirements.
        StartedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the verification process was successfully initiated.
        CompletedAt:
          $ref: "#/components/schemas/DateTime"
          description: The timestamp when the verification process was completed. This field is typically null for newly started verifications unless they complete immediately.
      required:
        - VerificationType
        - VerificationStatus
        - VerificationResponseDetails
        - StartedAt
