        - name
    MonitorProperties:
      type: object
      description: Properties specific to the monitor resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provisioningState:
          type: string
          description: 'Provisioning state of the monitor resource. Known values are: "Accepted", "Creating", "Updating", "Deleting", "Succeeded", "Failed", "Canceled", "Deleted", and "NotSpecified".'
        monitoringStatus:
          type: string
          description: 'Flag specifying if the resource monitoring is enabled or disabled. Known values are: "Enabled" and "Disabled".'
        elasticProperties:
          $ref: "#/components/schemas/ElasticProperties"
          description: Elastic cloud properties.
        userInfo:
          $ref: "#/components/schemas/UserInfo"
          description: User information.
        planDetails:
          $ref: "#/components/schemas/PlanDetails"
          description: Plan details of the monitor resource.
        version:
          type: string
          description: Version of elastic of the monitor resource.
        subscriptionState:
          type: string
          description: State of the Azure Subscription containing the monitor resource.
        saaSAzureSubscriptionStatus:
          type: string
          description: Status of Azure Subscription where Marketplace SaaS is located.
        sourceCampaignName:
          type: string
          description: Name of the marketing campaign.
        sourceCampaignId:
          type: string
          description: A unique identifier associated with the campaign.
        liftrResourceCategory:
          type: string
          description: 'Known values are: "Unknown" and "MonitorLogs".'
        liftrResourcePreference:
          type: integer
          description: The priority of the resource.
        generateApiKey:
          type: boolean
          description: Flag to determine if User API Key has to be generated and shared.
        hostingType:
          type: string
          description: 'Hosting type of the monitor resource - either Hosted deployments OR Serverless Projects. Known values are: "Hosted" and "Serverless".'
        projectDetails:
          $ref: "#/components/schemas/ProjectDetails"
          description: Project details of the monitor resource IF it belongs to Serverless offer kind.
    ElasticProperties:
      type: object
      description: Elastic Resource Properties.
      properties:
        elasticCloudUser:
          $ref: "#/components/schemas/ElasticCloudUser"
          description: Details of the user's elastic account.
        elasticCloudDeployment:
          $ref: "#/components/schemas/ElasticCloudDeployment"
          description: Details of the elastic cloud deployment.
    ElasticCloudUser:
      type: object
      description: Details of the user's elastic account. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        emailAddress:
          type: string
          description: Email of the Elastic User Account.
        id:
          type: string
          description: User Id of the elastic account of the User.
        elasticCloudSsoDefaultUrl:
          type: string
          description: Elastic cloud default dashboard sso URL of the Elastic user account.
    ElasticCloudDeployment:
      type: object
      description: Details of the user's elastic deployment associated with the monitor resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: Elastic deployment name.
        deploymentId:
          type: string
          description: Elastic deployment Id.
        azureSubscriptionId:
          type: string
          description: Associated Azure subscription Id for the elastic deployment.
        elasticsearchRegion:
          type: string
          description: Region where Deployment at Elastic side took place.
        elasticsearchServiceUrl:
          type: string
          description: Elasticsearch ingestion endpoint of the Elastic deployment.
        kibanaServiceUrl:
          type: string
          description: Kibana endpoint of the Elastic deployment.
        kibanaSsoUrl:
          type: string
          description: Kibana dashboard sso URL of the Elastic deployment.
    UserInfo:
      type: object
      description: User Information to be passed to partners.
      properties:
        firstName:
          type: string
          description: First name of the user.
        lastName:
          type: string
          description: Last name of the user.
        companyName:
          type: string
          description: Company name of the user.
        emailAddress:
          type: string
          description: Email of the user used by Elastic for contacting them if needed.
        companyInfo:
          $ref: "#/components/schemas/CompanyInfo"
          description: Company information of the user to be passed to partners.
    CompanyInfo:
      type: object
      description: Company information of the user to be passed to partners.
