          type: string
          description: 'Provisioning State of the resource. Known values are: "Accepted", "Creating", "Updating", "Deleting", "Succeeded", "Failed", "Canceled", "Deleted", and "NotSpecified".'
    PagedMonitoredSubscriptionPropertiesFlattened:
