openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Elastic
  description: This is the Microsoft Azure Elastic Management Client Library.
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2025-06-01-stackql-generated
  x-serviceAlias: elastic
  x-sdkPackage: azure-mgmt-elastic
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    ElasticTrafficFilterResponse:
      type: object
      description: List of elastic traffic filters in the account.
      properties:
        rulesets:
          type: array
          items:
            $ref: "#/components/schemas/ElasticTrafficFilter"
          description: List of elastic traffic filters in the account.
    ElasticTrafficFilter:
      type: object
      description: Elastic traffic filter object.
      properties:
        id:
          type: string
          description: Id of the elastic filter.
        name:
          type: string
          description: Name of the elastic filter.
        description:
          type: string
          description: Description of the elastic filter.
        region:
          type: string
          description: Region of the elastic filter.
        type:
          type: string
          description: 'Type of the elastic filter. Known values are: "ip" and "azure_private_endpoint".'
        includeByDefault:
          type: boolean
          description: IncludeByDefault for the elastic filter.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ElasticTrafficFilterRule"
          description: Rules in the elastic filter.
    ElasticTrafficFilterRule:
      type: object
      description: Elastic traffic filter rule object.
      properties:
        source:
          type: string
          description: IP of the elastic filter rule.
        description:
          type: string
          description: Description of the elastic filter rule.
        azureEndpointGuid:
          type: string
          description: Guid of Private Endpoint in the elastic filter rule.
        azureEndpointName:
          type: string
          description: Name of the Private Endpoint in the elastic filter rule.
        id:
          type: string
          description: Id of the elastic filter rule.
    BillingInfoResponse:
      type: object
      description: Marketplace Subscription and Organization details to which resource gets billed into.
      properties:
        marketplaceSaasInfo:
          $ref: "#/components/schemas/MarketplaceSaaSInfo"
          description: Marketplace Subscription details.
        partnerBillingEntity:
          $ref: "#/components/schemas/PartnerBillingEntity"
          description: "Partner Billing Entity details: Organization Info."
    MarketplaceSaaSInfo:
      type: object
      description: Marketplace SAAS Info of the resource.
      properties:
        marketplaceSubscription:
          $ref: "#/components/schemas/MarketplaceSaaSInfoMarketplaceSubscription"
          description: Marketplace Subscription.
        marketplaceName:
          type: string
          description: "Marketplace Subscription Details: SAAS Name."
        marketplaceResourceId:
          type: string
          description: "Marketplace Subscription Details: Resource URI."
        marketplaceStatus:
          type: string
          description: "Marketplace Subscription Details: SaaS Subscription Status."
        billedAzureSubscriptionId:
          type: string
          description: The Azure Subscription ID to which the Marketplace Subscription belongs and gets billed into.
        subscribed:
          type: boolean
          description: Flag specifying if the Marketplace status is subscribed or not.
    MarketplaceSaaSInfoMarketplaceSubscription:
      type: object
      description: Marketplace Subscription.
      properties:
        id:
          type: string
          description: Marketplace Subscription Id. This is a GUID-formatted string.
        publisherId:
          type: string
          description: Publisher Id of the Marketplace offer.
        offerId:
          type: string
          description: Offer Id of the Marketplace offer,.
    PartnerBillingEntity:
      type: object
      description: Partner Billing details associated with the resource.
      properties:
        id:
          type: string
          description: The Elastic Organization Id.
        name:
          type: string
          description: The Elastic Organization Name.
        partnerEntityUri:
          type: string
          description: Link to the elastic organization page.
    ConnectedPartnerResourcesListFormat:
      type: object
      description: Connected Partner Resources List Format.
      properties:
        properties:
          $ref: "#/components/schemas/ConnectedPartnerResourceProperties"
          description: Connected Partner Resource Properties.
    ConnectedPartnerResourceProperties:
      type: object
      description: Connected Partner Resource Properties.
      properties:
        partnerDeploymentName:
          type: string
          description: Elastic resource name.
        partnerDeploymentUri:
          type: string
          description: URL of the resource in Elastic cloud.
        azureResourceId:
          type: string
          description: The azure resource Id of the resource.
        location:
          type: string
          description: The location of the resource.
        type:
          type: string
          description: The hosting type of the resource.
    PagedConnectedPartnerResourcesListFormat:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ConnectedPartnerResourcesListFormat"
        nextLink:
          type: string
    DeploymentInfoResponse:
      type: object
      description: The properties of deployment in Elastic cloud corresponding to the Elastic monitor resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        status:
          type: string
          description: 'The Elastic deployment status. Known values are: "Healthy" and "Unhealthy".'
        version:
          type: string
          description: Version of the elasticsearch in Elastic cloud deployment.
        memoryCapacity:
          type: string
          description: RAM capacity of the elasticsearch in Elastic cloud deployment.
        diskCapacity:
          type: string
          description: Disk capacity of the elasticsearch in Elastic cloud deployment.
        elasticsearchEndPoint:
          type: string
          description: Elasticsearch endpoint in Elastic cloud deployment. This is either the aliased_endpoint if available, or the service_url otherwise.
        deploymentUrl:
          type: string
          description: Deployment URL of the elasticsearch in Elastic cloud deployment.
        marketplaceSaasInfo:
          $ref: "#/components/schemas/MarketplaceSaaSInfo"
          description: Marketplace SaaS Info of the resource.
        projectType:
          type: string
          description: Project Type - Applicable for Serverless only.
        configurationType:
          type: string
          description: ConfigurationType Type - Applicable for Serverless only.
    ElasticVersionListProperties:
      type: object
      description: Elastic Version Properties.
      properties:
        version:
          type: string
          description: Available elastic version of the given region.
    ElasticVersionListFormatFlattened:
      type: object
      description: Flattened view of ElasticVersionListFormat ('properties' hoisted to the top level).
      properties:
        version:
          type: string
          description: Available elastic version of the given region.
    PagedElasticVersionListFormatFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ElasticVersionListFormatFlattened"
        nextLink:
          type: string
    ExternalUserCreationResponse:
      type: object
      description: The properties of the response we got from elastic while creating external user. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        created:
          type: boolean
          description: Shows if user is created or updated.
    MonitoredResource:
      type: object
      description: The properties of a resource currently being monitored by the Elastic monitor resource.
      properties:
        id:
          type: string
          description: The ARM id of the resource.
        sendingLogs:
          type: string
          description: 'Flag indicating the status of the resource for sending logs operation to Elastic. Known values are: "True" and "False".'
        reasonForLogsStatus:
          type: string
          description: Reason for why the resource is sending logs (or why it is not sending).
    PagedMonitoredResource:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/MonitoredResource"
        nextLink:
          type: string
    SubscriptionList:
      type: object
      description: The request to update subscriptions needed to be monitored by the Elastic monitor resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        operation:
          type: string
          description: 'The operation for the patch on the resource. Known values are: "AddBegin", "AddComplete", "DeleteBegin", "DeleteComplete", and "Active".'
        monitoredSubscriptionList:
          type: array
          items:
            $ref: "#/components/schemas/MonitoredSubscription"
          description: List of subscriptions and the state of the monitoring.
        provisioningState:
          type: string
          description: 'Provisioning State of the resource. Known values are: "Accepted", "Creating", "Updating", "Deleting", "Succeeded", "Failed", "Canceled", "Deleted", and "NotSpecified".'
    MonitoredSubscription:
      type: object
      description: The list of subscriptions and it's monitoring status by current Elastic monitor.
      properties:
        subscriptionId:
          type: string
          description: The subscriptionId to be monitored.
        status:
          type: string
          description: 'The state of monitoring. Known values are: "InProgress", "Active", "Failed", and "Deleting".'
        error:
          type: string
          description: The reason of not monitoring the subscription.
        tagRules:
          $ref: "#/components/schemas/MonitoringTagRulesProperties"
          description: Definition of the properties for a TagRules resource.
    MonitoringTagRulesProperties:
      type: object
      description: Definition of the properties for a TagRules resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        provisioningState:
          type: string
          description: 'Provisioning state of the monitoring tag rules. Known values are: "Accepted", "Creating", "Updating", "Deleting", "Succeeded", "Failed", "Canceled", "Deleted", and "NotSpecified".'
        logRules:
          $ref: "#/components/schemas/LogRules"
          description: Rules for sending logs.
    LogRules:
      type: object
      description: Set of rules for sending logs for the Monitor resource.
      properties:
        sendAadLogs:
          type: boolean
          description: Flag specifying if AAD logs should be sent for the Monitor resource.
        sendSubscriptionLogs:
          type: boolean
          description: Flag specifying if subscription logs should be sent for the Monitor resource.
        sendActivityLogs:
          type: boolean
          description: Flag specifying if activity logs from Azure resources should be sent for the Monitor resource.
        filteringTags:
          type: array
          items:
            $ref: "#/components/schemas/FilteringTag"
          description: List of filtering tags to be used for capturing logs. This only takes effect if SendActivityLogs flag is enabled. If empty, all resources will be captured. If only Exclude action is specified, the rules will apply to the list of all available resources. If Include actions are specified, the rules will only include resources with the associated tags.
    FilteringTag:
      type: object
      description: The definition of a filtering tag. Filtering tags are used for capturing resources and include/exclude them from being monitored.
      properties:
        name:
          type: string
          description: The name (also known as the key) of the tag.
        value:
          type: string
          description: The value of the tag.
        action:
          type: string
          description: 'Valid actions for a filtering tag. Known values are: "Include" and "Exclude".'
    MonitoredSubscriptionPropertiesFlattened:
      type: object
      description: Flattened view of MonitoredSubscriptionProperties ('properties' hoisted to the top level).
      properties:
        name:
          type: string
          description: Name of the monitored subscription resource.
        id:
          type: string
          description: The id of the monitored subscription resource.
        type:
          type: string
          description: The type of the monitored subscription resource.
        operation:
          type: string
          description: 'The operation for the patch on the resource. Known values are: "AddBegin", "AddComplete", "DeleteBegin", "DeleteComplete", and "Active".'
        monitoredSubscriptionList:
          type: array
          items:
