        value:
          type: array
          items:
            $ref: "#/components/schemas/MonitoredSubscriptionPropertiesFlattened"
        nextLink:
          type: string
    MonitoredSubscriptionProperties:
      type: object
      description: The request to update subscriptions needed to be monitored by the Elastic monitor resource. Variables are only populated by the server, and will be ignored when sending a request.
      properties:
        name:
          type: string
          description: Name of the monitored subscription resource.
        id:
          type: string
          description: The id of the monitored subscription resource.
        type:
          type: string
          description: The type of the monitored subscription resource.
        properties:
          $ref: "#/components/schemas/SubscriptionList"
          description: The request to update subscriptions needed to be monitored by the Elastic monitor resource.
    ResourceSku:
      type: object
      description: Microsoft.Elastic SKU. All required parameters must be populated in order to send to server.
      properties:
        name:
          type: string
          description: Name of the SKU. Required.
