            type: string
          description: Post Rule priority. Required.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostRulesResourceFlattened"
    put:
      operationId: PostRules_begin_create_or_update
      description: Create a PostRulesResource.
      parameters:
        - name: global_rulestack_name
          in: path
          required: true
          schema:
            type: string
          description: GlobalRulestack resource name. Required.
        - name: priority
          in: path
          required: true
          schema:
            type: string
          description: Post Rule priority. Required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    etag:
                      type: string
                      description: etag info.
                    ruleName:
                      type: string
                      description: rule name. Required.
                    description:
                      type: string
                      description: rule description.
                    ruleState:
                      type: string
                      description: 'state of this rule. Known values are: "DISABLED" and "ENABLED".'
                    source:
                      $ref: "#/components/schemas/SourceAddr"
                      description: source address.
                    negateSource:
                      type: string
                      description: "cidr should not be 'any'. Known values are: \"TRUE\" and \"FALSE\"."
                    destination:
                      $ref: "#/components/schemas/DestinationAddr"
                      description: destination address.
                    negateDestination:
                      type: string
                      description: "cidr should not be 'any'. Known values are: \"TRUE\" and \"FALSE\"."
                    applications:
                      type: array
                      items:
                        type: string
                      description: array of rule applications.
                    category:
                      $ref: "#/components/schemas/Category"
                      description: rule category.
                    protocol:
                      type: string
                      description: any, application-default, TCP:number, UDP:number.
                    protocolPortList:
                      type: array
                      items:
                        type: string
                      description: prot port list.
                    inboundInspectionCertificate:
                      type: string
                      description: inbound Inspection Certificate.
                    auditComment:
                      type: string
                      description: rule comment.
                    actionType:
                      type: string
                      description: 'rule action. Known values are: "Allow", "DenySilent", "DenyResetServer", and "DenyResetBoth".'
                    enableLogging:
                      type: string
                      description: 'enable or disable logging. Known values are: "DISABLED" and "ENABLED".'
                    decryptionRuleType:
                      type: string
                      description: 'enable or disable decryption. Known values are: "SSLOutboundInspection", "SSLInboundInspection", and "None".'
                    tags:
                      type: array
                      items:
                        $ref: "#/components/schemas/TagInfo"
                      description: tag for rule.
              required:
                - properties
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostRulesResource"
