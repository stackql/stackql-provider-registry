          type: array
          items:
            $ref: "#/components/schemas/PrivateEndpointConnection"
          description: Private endpoint connections created on the workspace. Supported in both Serverless and Hybrid ComputeMode workspace.
        publicNetworkAccess:
          $ref: "#/components/schemas/PublicNetworkAccess"
          description: 'The network access type for accessing workspace. Set value to disabled to access workspace only via private link. Used to configure front-end only private link for Serverless ComputeMode workspace. Known values are: "Enabled" and "Disabled".'
        requiredNsgRules:
          $ref: "#/components/schemas/RequiredNsgRules"
          description: "Gets or sets a value indicating whether data plane (clusters) to control plane communication happen over private endpoint. Supported values are 'AllRules' and 'NoAzureDatabricksRules'. 'NoAzureServiceRules' value is for internal use only. Not allowed in Serverless ComputeMode workspace. Known values are: \"AllRules\", \"NoAzureDatabricksRules\", and \"NoAzureServiceRules\"."
