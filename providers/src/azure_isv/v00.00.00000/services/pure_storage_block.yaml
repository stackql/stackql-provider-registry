    ReservationBillingStatus:
      type: object
      description: Latest billing status for this reservation.
      properties:
        timestamp:
          type: string
          description: Timestamp for the latest update of this billing status, in RFC 3339 format. Required.
        totalUsedCapacityReported:
          type: integer
          description: Total used capacity as reported by associated storage pools. In bytes. Required.
        lowDrrPoolCount:
          type: integer
          description: How many associated storage pools reported low data reduction ratio (DRR). Required.
        drrWeightedAverage:
          type: number
          description: Weighted average of the data-reduction ratio for all associated pools. Required.
        totalNonReducibleReported:
          type: integer
          description: The sum of total used capacity for all pools with low DRR, if the DRR penalty applies. In bytes. Required.
        extraUsedCapacityNonReducible:
          type: integer
          description: Extra capacity added because of low DRR storage pools; In bytes. Required.
        extraUsedCapacityLowUsageRounding:
          type: integer
          description: Extra capacity added when rounding up low-usage pools to 30TiB. In bytes. Required.
        extraUsedCapacityNonReduciblePlanDiscount:
          type: integer
          description: Extra capacity discounted due to plan forgiving some low-DRR usage. In bytes. Required.
        totalUsedCapacityBilled:
          type: integer
          description: Total used capacity actually billed. In bytes. Required.
        totalUsedCapacityIncludedPlan:
          type: integer
          description: Total used capacity included in plan. In bytes. Required.
        totalUsedCapacityOverage:
          type: integer
          description: Total used capacity reported at on-demand price. In bytes. Required.
        totalPerformanceReported:
          type: integer
          description: The sum of all performance settings across the pools under this reservation. In MB per second. Required.
        totalPerformanceIncludedPlan:
          type: integer
          description: Total performance amount included in plan. In bytes per second. Required.
        totalPerformanceOverage:
          type: integer
          description: Total performance amount reported at on-demand price. In MB per second. Required.
