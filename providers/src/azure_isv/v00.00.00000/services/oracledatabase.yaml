          type: string
          description: Oracle Grid Infrastructure (GI) software version.
        hostname:
          type: string
          description: The hostname for the Exadata VM cluster on Exascale Infrastructure. Required.
        licenseModel:
          $ref: "#/components/schemas/LicenseModel"
          description: 'The Oracle license model that applies to the Exadata VM cluster on Exascale Infrastructure. The default is LICENSE_INCLUDED. Known values are: "LicenseIncluded" and "BringYourOwnLicense".'
        memorySizeInGbs:
          type: integer
          description: The memory that you want to be allocated in GBs. Memory is calculated based on 11 GB per VM core reserved.
        nodeCount:
          type: integer
          description: The number of nodes in the Exadata VM cluster on Exascale Infrastructure. Required.
        nsgCidrs:
          type: array
          items:
            $ref: "#/components/schemas/NsgCidr"
          description: CIDR blocks for additional NSG ingress rules. The VNET CIDRs used to provision the VM Cluster will be added by default.
        zoneOcid:
          type: string
          description: The OCID of the zone the Exadata VM cluster on Exascale Infrastructure is associated with.
        privateZoneOcid:
          type: string
          description: The OCID of the zone the Exadata VM cluster on Exascale Infrastructure is associated with.
        scanListenerPortTcp:
          type: integer
          description: The TCP Single Client Access Name (SCAN) port. The default port is 1521.
        scanListenerPortTcpSsl:
          type: integer
          description: The TCPS Single Client Access Name (SCAN) port. The default port is 2484.
        listenerPort:
          type: integer
          description: The port number configured for the listener on the Exadata VM cluster on Exascale Infrastructure.
        shape:
          type: string
          description: The shape of the Exadata VM cluster on Exascale Infrastructure resource. Required.
        sshPublicKeys:
          type: array
          items:
            type: string
          description: The public key portion of one or more key pairs used for SSH access to the Exadata VM cluster on Exascale Infrastructure. Required.
        systemVersion:
          type: string
          description: Operating system version of the image.
        timeZone:
          type: string
          description: The time zone of the Exadata VM cluster on Exascale Infrastructure. For details, see `Exadata Infrastructure Time Zones `_.
        totalEcpuCount:
          type: integer
          description: The number of Total ECPUs for an Exadata VM cluster on Exascale Infrastructure. Required.
        vmFileSystemStorage:
          $ref: "#/components/schemas/ExadbVmClusterStorageDetails"
          description: Filesystem storage details. Required.
        lifecycleDetails:
          type: string
          description: Additional information about the current lifecycle state.
        scanDnsName:
          type: string
          description: The FQDN of the DNS record for the SCAN IP addresses that are associated with the Exadata VM cluster on Exascale Infrastructure.
        scanIpIds:
          type: array
          items:
            type: string
          description: The Single Client Access Name (SCAN) IP addresses associated with the Exadata VM cluster on Exascale Infrastructure. SCAN IP addresses are typically used for load balancing and are not assigned to any interface. Oracle Clusterware directs the requests to the appropriate nodes in the cluster. **Note:** For a single-node DB system, this list is empty.
        scanDnsRecordId:
          type: string
          description: The OCID of the DNS record for the SCAN IP addresses that are associated with the Exadata VM cluster on Exascale Infrastructure.
