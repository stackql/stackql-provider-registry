        autonomousMaintenanceScheduleType:
          $ref: "#/components/schemas/AutonomousMaintenanceScheduleType"
          description: 'The maintenance schedule type of the Autonomous Database Serverless. Known values are: "Early" and "Regular".'
        characterSet:
          type: string
          description: The character set for the autonomous database.
