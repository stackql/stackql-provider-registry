          type: string
          description: Cluster subnet ocid.
        shapeAttribute:
          $ref: "#/components/schemas/ShapeAttribute"
          description: 'The type of Exascale storage used for Exadata VM cluster. Known values are: "SMART_STORAGE" and "BLOCK_STORAGE".'
