      properties:
        source:
          type: string
          description: The source of the database for creating a new database. Required. for creating a new database.
        provisioningState:
          $ref: "#/components/schemas/AzureResourceProvisioningState"
          description: 'dbSystem provisioning state. Known values are: "Succeeded", "Failed", "Canceled", and "Provisioning".'
        ociUrl:
          type: string
          description: HTTPS link to OCI resources exposed to Azure Customer via Azure Interface.
        resourceAnchorId:
          type: string
          description: Azure Resource Anchor ID. Required.
        networkAnchorId:
          type: string
          description: Azure Network Anchor ID. Required.
        clusterName:
          type: string
          description: The cluster name for Exadata and 2-node RAC virtual machine DB systems. The cluster name must begin with an alphabetic character, and may contain hyphens (-). Underscores (_) are not permitted. The cluster name can be no longer than 11 characters and is not case sensitive.
        displayName:
          type: string
          description: The user-friendly name for the DB system. The name does not have to be unique.
        initialDataStorageSizeInGb:
          type: integer
          description: Size in GB of the initial data volume that will be created and attached to a virtual machine DB system. You can scale up storage after provisioning, as needed. Note that the total storage size attached will be more than the amount you specify to allow for REDO/RECO space and software volume.
        dataStorageSizeInGbs:
          type: integer
          description: The data storage size, in gigabytes, that is currently available to the DB system. Applies only for virtual machine DB systems.
        dbSystemOptions:
          $ref: "#/components/schemas/DbSystemOptions"
          description: The DB system options.
        diskRedundancy:
          $ref: "#/components/schemas/DiskRedundancyType"
          description: 'The type of redundancy configured for the DB system. NORMAL is 2-way redundancy. HIGH is 3-way redundancy. Known values are: "High" and "Normal".'
        domain:
          type: string
          description: The domain name for the DB system.
        gridImageOcid:
          type: string
          description: The OCID of a grid infrastructure software image. This is a database software image of the type GRID_IMAGE.
        hostname:
          type: string
          description: The hostname for the DB system. Required.
        ocid:
          type: string
          description: The OCID of the DB system.
        licenseModel:
          $ref: "#/components/schemas/LicenseModel"
          description: 'The Oracle license model that applies to all the databases on the DB system. The default is LicenseIncluded. Known values are: "LicenseIncluded" and "BringYourOwnLicense".'
        lifecycleDetails:
          type: string
          description: Additional information about the current lifecycle state.
        lifecycleState:
          $ref: "#/components/schemas/DbSystemLifecycleState"
          description: 'The current state of the DB system. Known values are: "Provisioning", "Available", "Updating", "Terminating", "Terminated", "Failed", "Migrated", "MaintenanceInProgress", "NeedsAttention", and "Upgrading".'
        listenerPort:
          type: integer
          description: The port number configured for the listener on the DB system.
        memorySizeInGbs:
          type: integer
          description: Memory allocated to the DB system, in gigabytes.
        nodeCount:
          type: integer
          description: The number of nodes in the DB system. For RAC DB systems, the value is greater than 1.
        scanDnsName:
          type: string
          description: The FQDN of the DNS record for the SCAN IP addresses that are associated with the DB system.
        scanIps:
          type: array
          items:
            type: string
          description: "The list of Single Client Access Name (SCAN) IP addresses associated with the DB system. SCAN IP addresses are typically used for load balancing and are not assigned to any interface. Oracle Clusterware directs the requests to the appropriate nodes in the cluster. Note: For a single-node DB system, this list is empty."
        shape:
          type: string
          description: The shape of the DB system. The shape determines resources to allocate to the DB system. For virtual machine shapes, the number of CPU cores and memory. For bare metal and Exadata shapes, the number of CPU cores, storage, and memory. Required.
        sshPublicKeys:
          type: array
          items:
            type: string
          description: The public key portion of one or more key pairs used for SSH access to the DB system. Required.
        storageVolumePerformanceMode:
          $ref: "#/components/schemas/StorageVolumePerformanceMode"
          description: 'The block storage volume performance level. Valid values are Balanced and HighPerformance. See `Block Volume Performance `_ for more information. Known values are: "Balanced" and "HighPerformance".'
        timeZone:
          type: string
          description: The time zone of the DB system, e.g., UTC, to set the timeZone as UTC.
        version:
          type: string
          description: The Oracle Database version of the DB system.
        computeModel:
          $ref: "#/components/schemas/ComputeModel"
          description: 'The compute model for Base Database Service. This is required if using the `computeCount` parameter. If using `cpuCoreCount` then it is an error to specify `computeModel` to a non-null value. The ECPU compute model is the recommended model, and the OCPU compute model is legacy. Known values are: "ECPU" and "OCPU".'
        computeCount:
          type: integer
          description: The number of compute servers for the DB system.
        databaseEdition:
          $ref: "#/components/schemas/DbSystemDatabaseEditionType"
          description: 'The Oracle Database Edition that applies to all the databases on the DB system. Exadata DB systems and 2-node RAC DB systems require EnterpriseEditionExtremePerformance. Required. Known values are: "StandardEdition", "EnterpriseEdition", "EnterpriseEditionHighPerformance", "EnterpriseEditionExtreme", and "EnterpriseEditionDeveloper".'
        adminPassword:
          type: string
          description: "A strong password for SYS, SYSTEM, and PDB Admin. The password must be at least nine characters and contain at least two uppercase, two lowercase, two numbers, and two special characters. The special characters must be _, #, or -."
        dbVersion:
          type: string
          description: A valid Oracle Database version. For a list of supported versions, use the ListDbVersions operation. Required.
        pdbName:
          type: string
          description: The name of the pluggable database. The name must begin with an alphabetic character and can contain a maximum of thirty alphanumeric characters. Special characters are not permitted. Pluggable database should not be same as database name.
      required:
        - source
        - resourceAnchorId
        - networkAnchorId
        - hostname
        - shape
        - sshPublicKeys
        - databaseEdition
        - dbVersion
