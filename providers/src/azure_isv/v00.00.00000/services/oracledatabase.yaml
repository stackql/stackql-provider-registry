          type: string
          description: The cluster name for Exadata VM cluster on Exascale Infrastructure. The cluster name must begin with an alphabetic character, and may contain hyphens (-). Underscores (_) are not permitted. The cluster name can be no longer than 11 characters and is not case sensitive.
        backupSubnetCidr:
          type: string
          description: Client OCI backup subnet CIDR, default is 192.168.252.0/22.
        nsgUrl:
          type: string
          description: HTTPS link to OCI Network Security Group exposed to Azure Customer via the Azure Interface.
        provisioningState:
          $ref: "#/components/schemas/AzureResourceProvisioningState"
          description: 'Exadata VM cluster on Exascale Infrastructure provisioning state. Known values are: "Succeeded", "Failed", "Canceled", and "Provisioning".'
        lifecycleState:
          $ref: "#/components/schemas/ExadbVmClusterLifecycleState"
          description: 'CloudVmCluster lifecycle state. Known values are: "Provisioning", "Available", "Updating", "Terminating", "Terminated", "MaintenanceInProgress", and "Failed".'
        vnetId:
          type: string
          description: VNET for network connectivity. Required.
        subnetId:
          type: string
          description: Client subnet. Required.
        dataCollectionOptions:
          $ref: "#/components/schemas/DataCollectionOptions"
          description: Indicates user preferences for the various diagnostic collection options for the VM cluster/Cloud VM cluster/VMBM DBCS.
        displayName:
          type: string
          description: Display Name. Required.
        domain:
          type: string
          description: A domain name used for the Exadata VM cluster on Exascale Infrastructure.
        enabledEcpuCount:
          type: integer
          description: The number of ECPUs to enable for an Exadata VM cluster on Exascale Infrastructure. Required.
        exascaleDbStorageVaultId:
          type: string
          description: The Azure Resource ID of the Exadata Database Storage Vault. Required.
        gridImageOcid:
          type: string
          description: Grid Setup will be done using this Grid Image OCID. Can be obtained using giMinorVersions API.
        gridImageType:
          $ref: "#/components/schemas/GridImageType"
          description: 'The type of Grid Image. Known values are: "ReleaseUpdate" and "CustomImage".'
