          $ref: "#/components/schemas/WorkloadType"
          description: 'The Autonomous Database workload type. Known values are: "OLTP", "DW", "AJD", and "APEX".'
        displayName:
          type: string
          description: The user-friendly name for the Autonomous Database.
        isAutoScalingEnabled:
          type: boolean
          description: Indicates if auto scaling is enabled for the Autonomous Database CPU core count.
        isAutoScalingForStorageEnabled:
          type: boolean
          description: Indicates if auto scaling is enabled for the Autonomous Database storage.
        peerDbIds:
          type: array
          items:
            type: string
          description: The list of Azure resource IDs of standby databases located in Autonomous Data Guard remote regions that are associated with the source database. Note that for Autonomous Database Serverless instances, standby databases located in the same region as the source primary database do not have Azure IDs.
        peerDbId:
          type: string
          description: The Azure resource ID of the Disaster Recovery peer database, which is located in a different region from the current peer database.
        isLocalDataGuardEnabled:
          type: boolean
          description: Indicates whether the Autonomous Database has local or called in-region Data Guard enabled.
        isRemoteDataGuardEnabled:
          type: boolean
          description: Indicates whether the Autonomous Database has Cross Region Data Guard enabled.
        localDisasterRecoveryType:
          $ref: "#/components/schemas/DisasterRecoveryType"
          description: 'Indicates the local disaster recovery (DR) type of the Autonomous Database Serverless instance.Autonomous Data Guard (ADG) DR type provides business critical DR with a faster recovery time objective (RTO) during failover or switchover.Backup-based DR type provides lower cost DR with a slower RTO during failover or switchover. Known values are: "Adg" and "BackupBased".'
        timeDisasterRecoveryRoleChanged:
          type: string
          format: date-time
          description: The date and time the Disaster Recovery role was switched for the standby Autonomous Database.
        remoteDisasterRecoveryConfiguration:
