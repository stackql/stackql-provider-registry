      type: object
      properties:
        token_type:
          type: string
          description: The ID of the pattern.
        custom_pattern_version:
          type: string
          description: The version of this pattern if it's a custom pattern.
          nullable: true
        slug:
          type: string
          description: The slug of the pattern.
        display_name:
          type: string
          description: The user-friendly name for the pattern.
        alert_total:
          type: integer
          description: The total number of alerts generated by this pattern.
        alert_total_percentage:
          type: integer
          description: >-
            The percentage of all alerts that this pattern represents, rounded
            to the nearest integer.
        false_positives:
          type: integer
          description: The number of false positive alerts generated by this pattern.
        false_positive_rate:
          type: integer
          description: >-
            The percentage of alerts from this pattern that are false positives,
            rounded to the nearest integer.
        bypass_rate:
          type: integer
          description: >-
            The percentage of blocks for this pattern that were bypassed,
            rounded to the nearest integer.
        default_setting:
          type: string
          description: The default push protection setting for this pattern.
          enum:
            - disabled
            - enabled
        enterprise_setting:
          type: string
          description: >-
            The push protection setting for this pattern set at the enterprise
            level. Only present for partner patterns when the organization has a
            parent enterprise.
          enum:
            - not-set
            - disabled
            - enabled
          nullable: true
        setting:
          type: string
          description: >-
            The current push protection setting for this pattern. If this is
            `not-set`, then it inherits either the enterprise setting if it
            exists or the default setting.
          enum:
            - not-set
            - disabled
            - enabled
