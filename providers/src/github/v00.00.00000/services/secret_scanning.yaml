openapi: 3.0.3
info:
  title: secret_scanning API
  description: github API
  version: 1.1.4
paths:
  /orgs/{org}/secret-scanning/alerts:
    get:
      summary: List secret scanning alerts for an organization
      description: >-
        Lists secret scanning alerts for eligible repositories in an
        organization, from newest to oldest.


        The authenticated user must be an administrator or security manager for
        the organization to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      tags:
        - secret-scanning
      operationId: secret-scanning/list-alerts-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#list-secret-scanning-alerts-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/secret-scanning-alert-state'
        - $ref: '#/components/parameters/secret-scanning-alert-secret-type'
        - $ref: '#/components/parameters/secret-scanning-alert-exclude-secret-types'
        - $ref: '#/components/parameters/secret-scanning-alert-exclude-providers'
        - $ref: '#/components/parameters/secret-scanning-alert-providers'
        - $ref: '#/components/parameters/secret-scanning-alert-resolution'
        - $ref: '#/components/parameters/secret-scanning-alert-assignee'
        - $ref: '#/components/parameters/secret-scanning-alert-sort'
        - $ref: '#/components/parameters/direction'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/secret-scanning-pagination-before-org-repo'
        - $ref: '#/components/parameters/secret-scanning-pagination-after-org-repo'
        - $ref: '#/components/parameters/secret-scanning-alert-validity'
        - $ref: '#/components/parameters/secret-scanning-alert-publicly-leaked'
        - $ref: '#/components/parameters/secret-scanning-alert-multi-repo'
        - $ref: '#/components/parameters/secret-scanning-alert-hide-secret'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/organization-secret-scanning-alert'
              examples:
                default:
                  $ref: >-
                    #/components/examples/organization-secret-scanning-alert-list
          headers:
            Link:
              $ref: '#/components/headers/link'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
  /orgs/{org}/secret-scanning/pattern-configurations:
    get:
      summary: List organization pattern configurations
      description: >-
        Lists the secret scanning pattern configurations for an organization.


        Personal access tokens (classic) need the `read:org` scope to use this
        endpoint.
      tags:
        - secret-scanning
      operationId: secret-scanning/list-org-pattern-configs
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/push-protection#list-organization-pattern-configurations
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: push-protection
      parameters:
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secret-scanning-pattern-configuration'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-pattern-configuration'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-stackQL-resource: push_protection
    patch:
      summary: Update organization pattern configurations
      description: >-
        Updates the secret scanning pattern configurations for an organization.


        Personal access tokens (classic) need the `write:org` scope to use this
        endpoint.
      tags:
        - secret-scanning
      operationId: secret-scanning/update-org-pattern-configs
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/push-protection#update-organization-pattern-configurations
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: push-protection
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pattern_config_version:
                  $ref: '#/components/schemas/secret-scanning-row-version'
                provider_pattern_settings:
                  type: array
                  description: Pattern settings for provider patterns.
                  items:
                    type: object
                    properties:
                      token_type:
                        type: string
                        description: The ID of the pattern to configure.
                      push_protection_setting:
                        type: string
                        description: Push protection setting to set for the pattern.
                        enum:
                          - not-set
                          - disabled
                          - enabled
                custom_pattern_settings:
                  type: array
                  description: Pattern settings for custom patterns.
                  items:
                    type: object
                    properties:
                      token_type:
                        type: string
                        description: The ID of the pattern to configure.
                      custom_pattern_version:
                        $ref: '#/components/schemas/secret-scanning-row-version'
                      push_protection_setting:
                        type: string
                        description: Push protection setting to set for the pattern.
                        enum:
                          - disabled
                          - enabled
            examples:
              default:
                value:
                  pattern_config_version: 0ujsswThIGTUYm2K8FjOOfXtY1K
                  provider_pattern_settings:
                    - token_type: GITHUB_PERSONAL_ACCESS_TOKEN
                      push_protection_setting: enabled
                  custom_pattern_settings:
                    - token_type: cp_2
                      custom_pattern_version: 0ujsswThIGTUYm2K8FjOOfXtY1K
                      push_protection_setting: enabled
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pattern_config_version:
                    type: string
                    description: The updated pattern configuration version.
              examples:
                default:
                  value:
                    pattern_config_version: 0ujsswThIGTUYm2K8FjOOfXtY1K
        '400':
          $ref: '#/components/responses/bad_request'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '409':
          $ref: '#/components/responses/conflict'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-stackQL-resource: push_protection
  /repos/{owner}/{repo}/secret-scanning/alerts:
    get:
      summary: List secret scanning alerts for a repository
      description: >-
        Lists secret scanning alerts for an eligible repository, from newest to
        oldest.


        The authenticated user must be an administrator for the repository or
        for the organization that owns the repository to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      tags:
        - secret-scanning
      operationId: secret-scanning/list-alerts-for-repo
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#list-secret-scanning-alerts-for-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/secret-scanning-alert-state'
        - $ref: '#/components/parameters/secret-scanning-alert-secret-type'
        - $ref: '#/components/parameters/secret-scanning-alert-exclude-secret-types'
        - $ref: '#/components/parameters/secret-scanning-alert-exclude-providers'
        - $ref: '#/components/parameters/secret-scanning-alert-providers'
        - $ref: '#/components/parameters/secret-scanning-alert-resolution'
        - $ref: '#/components/parameters/secret-scanning-alert-assignee'
        - $ref: '#/components/parameters/secret-scanning-alert-sort'
        - $ref: '#/components/parameters/direction'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/secret-scanning-pagination-before-org-repo'
        - $ref: '#/components/parameters/secret-scanning-pagination-after-org-repo'
        - $ref: '#/components/parameters/secret-scanning-alert-validity'
        - $ref: '#/components/parameters/secret-scanning-alert-publicly-leaked'
        - $ref: '#/components/parameters/secret-scanning-alert-multi-repo'
        - $ref: '#/components/parameters/secret-scanning-alert-hide-secret'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/secret-scanning-alert'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-alert-list'
        '404':
          description: >-
            Repository is public or secret scanning is disabled for the
            repository
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
  /repos/{owner}/{repo}/secret-scanning/alerts/{alert_number}:
    get:
      summary: Get a secret scanning alert
      description: >-
        Gets a single secret scanning alert detected in an eligible repository.


        The authenticated user must be an administrator for the repository or
        for the organization that owns the repository to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      tags:
        - secret-scanning
      operationId: secret-scanning/get-alert
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#get-a-secret-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
        - $ref: '#/components/parameters/secret-scanning-alert-hide-secret'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secret-scanning-alert'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-alert-open'
        '304':
          $ref: '#/components/responses/not_modified'
        '404':
          description: >-
            Repository is public, or secret scanning is disabled for the
            repository, or the resource is not found
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
    patch:
      summary: Update a secret scanning alert
      description: >-
        Updates the status of a secret scanning alert in an eligible repository.


        You can also use this endpoint to assign or unassign an alert to a user
        who has write access to the repository.


        The authenticated user must be an administrator for the repository or
        for the organization that owns the repository to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      operationId: secret-scanning/update-alert
      tags:
        - secret-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#update-a-secret-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  $ref: '#/components/schemas/secret-scanning-alert-state'
                resolution:
                  $ref: '#/components/schemas/secret-scanning-alert-resolution'
                resolution_comment:
                  $ref: >-
                    #/components/schemas/secret-scanning-alert-resolution-comment
                assignee:
                  $ref: '#/components/schemas/secret-scanning-alert-assignee'
              required:
                - state
                - assignee
                - validity
            examples:
              default:
                value:
                  state: resolved
                  resolution: false_positive
              assign:
                summary: Assign alert to a user
                value:
                  assignee: octocat
              unassign:
                summary: Unassign alert
                value:
                  assignee: null
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secret-scanning-alert'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-alert-resolved'
        '400':
          description: >-
            Bad request, resolution comment is invalid or the resolution was not
            changed.
        '404':
          description: >-
            Repository is public, or secret scanning is disabled for the
            repository, or the resource is not found
        '422':
          description: >-
            State does not match the resolution or resolution comment, or
            assignee does not have write access to the repository
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        enabledForGitHubApps: true
        githubCloudOnly: false
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
  /repos/{owner}/{repo}/secret-scanning/alerts/{alert_number}/locations:
    get:
      summary: List locations for a secret scanning alert
      description: >-
        Lists all locations for a given secret scanning alert for an eligible
        repository.


        The authenticated user must be an administrator for the repository or
        for the organization that owns the repository to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      tags:
        - secret-scanning
      operationId: secret-scanning/list-locations-for-alert
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#list-locations-for-a-secret-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                description: List of locations where the secret was detected
                items:
                  $ref: '#/components/schemas/secret-scanning-location'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-location-list'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '404':
          description: >-
            Repository is public, or secret scanning is disabled for the
            repository, or the resource is not found
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
  /repos/{owner}/{repo}/secret-scanning/push-protection-bypasses:
    post:
      summary: Create a push protection bypass
      description: >-
        Creates a bypass for a previously push protected secret.


        The authenticated user must be the original author of the committed
        secret.


        OAuth app tokens and personal access tokens (classic) need the `repo`
        scope to use this endpoint.
      operationId: secret-scanning/create-push-protection-bypass
      tags:
        - secret-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#create-a-push-protection-bypass
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  $ref: >-
                    #/components/schemas/secret-scanning-push-protection-bypass-reason
                placeholder_id:
                  $ref: >-
                    #/components/schemas/secret-scanning-push-protection-bypass-placeholder-id
              required:
                - reason
                - placeholder_id
            examples:
              default:
                value:
                  reason: will_fix_later
                  placeholder_id: 2k4dM4tseyC5lPIsjl5emX9sPNk
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secret-scanning-push-protection-bypass'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-push-protection-bypass'
        '403':
          description: User does not have enough permissions to perform this action.
        '404':
          description: >-
            Placeholder ID not found, or push protection is disabled on this
            repository.
        '422':
          description: Bad request, input data missing or incorrect.
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        enabledForGitHubApps: true
        githubCloudOnly: false
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
  /repos/{owner}/{repo}/secret-scanning/scan-history:
    get:
      summary: Get secret scanning scan history for a repository
      description: >-
        Lists the latest default incremental and backfill scans by type for a
        repository. Scans from Copilot Secret Scanning are not included.


        > [!NOTE]

        > This endpoint requires [GitHub Advanced
        Security](https://docs.github.com/get-started/learning-about-github/about-github-advanced-security)."


        OAuth app tokens and personal access tokens (classic) need the `repo` or
        `security_events` scope to use this endpoint. If this endpoint is only
        used with public repositories, the token can use the `public_repo` scope
        instead.
      tags:
        - secret-scanning
      operationId: secret-scanning/get-scan-history
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/secret-scanning/secret-scanning#get-secret-scanning-scan-history-for-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/secret-scanning-scan-history'
              examples:
                default:
                  $ref: '#/components/examples/secret-scanning-scan-history'
        '404':
          description: >-
            Repository does not have GitHub Advanced Security or secret scanning
            enabled
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: secret-scanning
        subcategory: secret-scanning
      x-stackQL-resource: secret_scanning
components:
  schemas:
    organization-secret-scanning-alert:
      type: object
      properties:
        number:
          $ref: '#/components/schemas/alert-number'
        created_at:
          $ref: '#/components/schemas/alert-created-at'
        updated_at:
          $ref: '#/components/schemas/nullable-alert-updated-at'
        url:
          $ref: '#/components/schemas/alert-url'
        html_url:
          $ref: '#/components/schemas/alert-html-url'
        locations_url:
          type: string
          format: uri
          description: The REST API URL of the code locations for this alert.
        state:
          $ref: '#/components/schemas/secret-scanning-alert-state'
        resolution:
          $ref: '#/components/schemas/secret-scanning-alert-resolution'
        resolved_at:
          type: string
          format: date-time
          description: >-
            The time that the alert was resolved in ISO 8601 format:
            `YYYY-MM-DDTHH:MM:SSZ`.
          nullable: true
        resolved_by:
          $ref: '#/components/schemas/nullable-simple-user'
        secret_type:
          type: string
          description: The type of secret that secret scanning detected.
        secret_type_display_name:
          type: string
          description: >-
            User-friendly name for the detected secret, matching the
            `secret_type`.

            For a list of built-in patterns, see "[Supported secret scanning
            patterns](https://docs.github.com/code-security/secret-scanning/introduction/supported-secret-scanning-patterns#supported-secrets)."
        provider:
          type: string
          description: The provider of the secret that was detected.
          nullable: true
        provider_slug:
          type: string
          description: >-
            The slug identifier for the provider of the secret that was
            detected. Use this value for filtering by provider with the
            `providers` or `exclude_providers` parameters.
          nullable: true
        secret:
          type: string
          description: The secret that was detected.
        repository:
          $ref: '#/components/schemas/simple-repository'
        push_protection_bypassed:
          type: boolean
          description: Whether push protection was bypassed for the detected secret.
          nullable: true
        push_protection_bypassed_by:
          $ref: '#/components/schemas/nullable-simple-user'
        push_protection_bypassed_at:
          type: string
          format: date-time
          description: >-
            The time that push protection was bypassed in ISO 8601 format:
            `YYYY-MM-DDTHH:MM:SSZ`.
          nullable: true
        push_protection_bypass_request_reviewer:
          $ref: '#/components/schemas/nullable-simple-user'
        push_protection_bypass_request_reviewer_comment:
          type: string
          description: An optional comment when reviewing a push protection bypass.
          nullable: true
        push_protection_bypass_request_comment:
          type: string
          description: An optional comment when requesting a push protection bypass.
          nullable: true
        push_protection_bypass_request_html_url:
          type: string
          format: uri
          description: The URL to a push protection bypass request.
          nullable: true
        resolution_comment:
          type: string
          description: The comment that was optionally added when this alert was closed
          nullable: true
        validity:
          type: string
          description: The token status as of the latest validity check.
          enum:
            - active
            - inactive
            - unknown
        publicly_leaked:
          type: boolean
          description: Whether the secret was publicly leaked.
          nullable: true
        multi_repo:
          type: boolean
          description: >-
            Whether the detected secret was found in multiple repositories in
            the same organization or enterprise.
          nullable: true
        is_base64_encoded:
          type: boolean
          description: A boolean value representing whether or not alert is base64 encoded
          nullable: true
        first_location_detected:
          $ref: >-
            #/components/schemas/nullable-secret-scanning-first-detected-location
        has_more_locations:
          type: boolean
          description: >-
            A boolean value representing whether or not the token in the alert
            was detected in more than one location.
        assigned_to:
          $ref: '#/components/schemas/nullable-simple-user'
        closure_request_comment:
          type: string
          description: An optional comment from the closure request author.
          nullable: true
        closure_request_reviewer_comment:
          type: string
          description: An optional comment from the closure request reviewer.
          nullable: true
        closure_request_reviewer:
          $ref: '#/components/schemas/nullable-simple-user'
    secret-scanning-pattern-configuration:
      title: Secret scanning pattern configuration
      description: >-
        A collection of secret scanning patterns and their settings related to
        push protection.
      type: object
      properties:
        pattern_config_version:
          $ref: '#/components/schemas/secret-scanning-row-version'
        provider_pattern_overrides:
          type: array
          description: Overrides for partner patterns.
          items:
            $ref: '#/components/schemas/secret-scanning-pattern-override'
        custom_pattern_overrides:
          type: array
          description: Overrides for custom patterns defined by the organization.
          items:
            $ref: '#/components/schemas/secret-scanning-pattern-override'
    secret-scanning-row-version:
      type: string
      description: >-
        The version of the entity. This is used to confirm you're updating the
        current version of the entity and mitigate unintentionally overriding
        someone else's update.
      nullable: true
    secret-scanning-alert:
      type: object
      properties:
        number:
          $ref: '#/components/schemas/alert-number'
        created_at:
          $ref: '#/components/schemas/alert-created-at'
        updated_at:
          $ref: '#/components/schemas/nullable-alert-updated-at'
        url:
          $ref: '#/components/schemas/alert-url'
        html_url:
          $ref: '#/components/schemas/alert-html-url'
        locations_url:
          type: string
          format: uri
          description: The REST API URL of the code locations for this alert.
        state:
          $ref: '#/components/schemas/secret-scanning-alert-state'
        resolution:
          $ref: '#/components/schemas/secret-scanning-alert-resolution'
        resolved_at:
          type: string
          format: date-time
          description: >-
            The time that the alert was resolved in ISO 8601 format:
            `YYYY-MM-DDTHH:MM:SSZ`.
          nullable: true
        resolved_by:
          $ref: '#/components/schemas/nullable-simple-user'
        resolution_comment:
          type: string
          description: An optional comment to resolve an alert.
          nullable: true
        secret_type:
          type: string
          description: The type of secret that secret scanning detected.
        secret_type_display_name:
          type: string
          description: >-
            User-friendly name for the detected secret, matching the
            `secret_type`.

            For a list of built-in patterns, see "[Supported secret scanning
            patterns](https://docs.github.com/code-security/secret-scanning/introduction/supported-secret-scanning-patterns#supported-secrets)."
        provider:
          type: string
          description: The provider of the secret that was detected.
          nullable: true
        provider_slug:
          type: string
          description: >-
            The slug identifier for the provider of the secret that was
            detected. Use this value for filtering by provider with the
            `providers` or `exclude_providers` parameters.
          nullable: true
        secret:
          type: string
          description: The secret that was detected.
        push_protection_bypassed:
          type: boolean
          description: Whether push protection was bypassed for the detected secret.
          nullable: true
        push_protection_bypassed_by:
          $ref: '#/components/schemas/nullable-simple-user'
        push_protection_bypassed_at:
          type: string
          format: date-time
          description: >-
            The time that push protection was bypassed in ISO 8601 format:
            `YYYY-MM-DDTHH:MM:SSZ`.
          nullable: true
        push_protection_bypass_request_reviewer:
          $ref: '#/components/schemas/nullable-simple-user'
        push_protection_bypass_request_reviewer_comment:
          type: string
          description: An optional comment when reviewing a push protection bypass.
          nullable: true
        push_protection_bypass_request_comment:
          type: string
          description: An optional comment when requesting a push protection bypass.
          nullable: true
        push_protection_bypass_request_html_url:
          type: string
          format: uri
          description: The URL to a push protection bypass request.
          nullable: true
        validity:
          type: string
          description: The token status as of the latest validity check.
          enum:
            - active
            - inactive
            - unknown
        publicly_leaked:
          type: boolean
          description: Whether the detected secret was publicly leaked.
          nullable: true
        multi_repo:
          type: boolean
          description: >-
            Whether the detected secret was found in multiple repositories under
            the same organization or enterprise.
          nullable: true
        is_base64_encoded:
          type: boolean
          description: A boolean value representing whether or not alert is base64 encoded
          nullable: true
        first_location_detected:
          $ref: >-
            #/components/schemas/nullable-secret-scanning-first-detected-location
        has_more_locations:
          type: boolean
          description: >-
            A boolean value representing whether or not the token in the alert
            was detected in more than one location.
        assigned_to:
          $ref: '#/components/schemas/nullable-simple-user'
        closure_request_comment:
          type: string
          description: An optional comment from the closure request author.
          nullable: true
        closure_request_reviewer_comment:
          type: string
          description: An optional comment from the closure request reviewer.
          nullable: true
        closure_request_reviewer:
          $ref: '#/components/schemas/nullable-simple-user'
    secret-scanning-alert-state:
      description: >-
        Sets the state of the secret scanning alert. You must provide
        `resolution` when you set the state to `resolved`.
      type: string
      enum:
        - open
        - resolved
    secret-scanning-alert-resolution:
      type: string
      description: >-
        **Required when the `state` is `resolved`.** The reason for resolving
        the alert.
      nullable: true
      enum:
        - false_positive
        - wont_fix
        - revoked
        - used_in_tests
    secret-scanning-alert-resolution-comment:
      description: >-
        An optional comment when closing or reopening an alert. Cannot be
        updated or deleted.
      type: string
      nullable: true
    secret-scanning-alert-assignee:
      description: >-
        The username of the user to assign to the alert. Set to `null` to
        unassign the alert.
      type: string
      nullable: true
    secret-scanning-location:
      type: object
      properties:
        type:
          type: string
          enum:
            - commit
            - wiki_commit
            - issue_title
            - issue_body
            - issue_comment
            - discussion_title
            - discussion_body
            - discussion_comment
            - pull_request_title
            - pull_request_body
            - pull_request_comment
            - pull_request_review
            - pull_request_review_comment
          description: >-
            The location type. Because secrets may be found in different types
            of resources (ie. code, comments, issues, pull requests,
            discussions), this field identifies the type of resource where the
            secret was found.
          example: commit
        details:
          description: >-
            Represents a 'commit' secret scanning location type. This location
            type shows that a secret was detected inside a commit to a
            repository.
          type: object
          properties:
            path:
              type: string
              description: The file path in the repository
              example: /example/secrets.txt
            start_line:
              type: number
              description: Line number at which the secret starts in the file
            end_line:
              type: number
              description: Line number at which the secret ends in the file
            start_column:
              type: number
              description: >-
                The column at which the secret starts within the start line when
                the file is interpreted as 8BIT ASCII
            end_column:
              type: number
              description: >-
                The column at which the secret ends within the end line when the
                file is interpreted as 8BIT ASCII
            blob_sha:
              type: string
              description: SHA-1 hash ID of the associated blob
              example: af5626b4a114abcb82d63db7c8082c3c4756e51b
            blob_url:
              type: string
              description: The API URL to get the associated blob resource
            commit_sha:
              type: string
              description: SHA-1 hash ID of the associated commit
              example: af5626b4a114abcb82d63db7c8082c3c4756e51b
            commit_url:
              type: string
              description: The API URL to get the associated commit resource
            html_url:
              type: string
              format: uri
              description: The GitHub URL to get the associated commit resource.
              example: >-
                https://github.com/octocat/Hello-World/blob/af5626b/example/secrets.txt#L1-L1
            page_url:
              type: string
              description: The GitHub URL to get the associated wiki page
              example: >-
                https://github.com/octocat/Hello-World/wiki/Home/302c0b7e200761c9dd9b57e57db540ee0b4293a5
            issue_title_url:
              type: string
              format: uri
              description: The API URL to get the issue where the secret was detected.
              example: https://api.github.com/repos/octocat/Hello-World/issues/1347
            issue_body_url:
              type: string
              format: uri
              description: The API URL to get the issue where the secret was detected.
              example: https://api.github.com/repos/octocat/Hello-World/issues/1347
            issue_comment_url:
              type: string
              format: uri
              description: >-
                The API URL to get the issue comment where the secret was
                detected.
              example: >-
                https://api.github.com/repos/octocat/Hello-World/issues/comments/1081119451
            discussion_title_url:
              type: string
              format: uri
              description: The URL to the discussion where the secret was detected.
              example: https://github.com/community/community/discussions/39082
            discussion_body_url:
              type: string
              format: uri
              description: The URL to the discussion where the secret was detected.
              example: >-
                https://github.com/community/community/discussions/39082#discussion-4566270
            discussion_comment_url:
              type: string
              format: uri
              description: >-
                The API URL to get the discussion comment where the secret was
                detected.
              example: >-
                https://github.com/community/community/discussions/39082#discussioncomment-4158232
            pull_request_title_url:
              type: string
              format: uri
              description: >-
                The API URL to get the pull request where the secret was
                detected.
              example: https://api.github.com/repos/octocat/Hello-World/pulls/2846
            pull_request_body_url:
              type: string
              format: uri
              description: >-
                The API URL to get the pull request where the secret was
                detected.
              example: https://api.github.com/repos/octocat/Hello-World/pulls/2846
            pull_request_comment_url:
              type: string
              format: uri
              description: >-
                The API URL to get the pull request comment where the secret was
                detected.
              example: >-
                https://api.github.com/repos/octocat/Hello-World/issues/comments/1081119451
            pull_request_review_url:
              type: string
              format: uri
              description: >-
                The API URL to get the pull request review where the secret was
                detected.
              example: >-
                https://api.github.com/repos/octocat/Hello-World/pulls/2846/reviews/80
            pull_request_review_comment_url:
              type: string
              format: uri
              description: >-
                The API URL to get the pull request review comment where the
                secret was detected.
              example: >-
                https://api.github.com/repos/octocat/Hello-World/pulls/comments/12
          required:
            - path
            - start_line
            - end_line
            - start_column
            - end_column
            - blob_sha
            - blob_url
            - commit_sha
            - commit_url
            - page_url
            - issue_title_url
            - issue_body_url
            - issue_comment_url
            - discussion_title_url
            - discussion_body_url
            - discussion_comment_url
            - pull_request_title_url
            - pull_request_body_url
            - pull_request_comment_url
            - pull_request_review_url
            - pull_request_review_comment_url
    secret-scanning-push-protection-bypass-reason:
      description: The reason for bypassing push protection.
      type: string
      enum:
        - false_positive
        - used_in_tests
        - will_fix_later
    secret-scanning-push-protection-bypass-placeholder-id:
      description: >-
        The ID of the push protection bypass placeholder. This value is returned
        on any push protected routes.
      type: string
    secret-scanning-push-protection-bypass:
      type: object
      properties:
        reason:
          $ref: '#/components/schemas/secret-scanning-push-protection-bypass-reason'
        expire_at:
          type: string
          format: date-time
          description: >-
            The time that the bypass will expire in ISO 8601 format:
            `YYYY-MM-DDTHH:MM:SSZ`.
          nullable: true
        token_type:
          type: string
          description: The token type this bypass is for.
    secret-scanning-scan-history:
      type: object
      properties:
        incremental_scans:
          type: array
          items:
            $ref: '#/components/schemas/secret-scanning-scan'
        pattern_update_scans:
          type: array
          items:
            $ref: '#/components/schemas/secret-scanning-scan'
        backfill_scans:
          type: array
          items:
            $ref: '#/components/schemas/secret-scanning-scan'
        custom_pattern_backfill_scans:
          type: array
          items:
            description: >-
              Information on a single scan performed by secret scanning on the
              repository
            type: object
            properties:
              type:
                type: string
                description: The type of scan
              status:
                type: string
                description: >-
                  The state of the scan. Either "completed", "running", or
                  "pending"
              completed_at:
                type: string
                format: date-time
                description: >-
                  The time that the scan was completed. Empty if the scan is
                  running
                nullable: true
              started_at:
                type: string
                format: date-time
                description: >-
                  The time that the scan was started. Empty if the scan is
                  pending
                nullable: true
              pattern_name:
                type: string
                description: Name of the custom pattern for custom pattern scans
              pattern_scope:
                type: string
                description: >-
                  Level at which the custom pattern is defined, one of
                  "repository", "organization", or "enterprise"
    alert-number:
      type: integer
