  responses:
    not_found:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    service_unavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              documentation_url:
                type: string
    forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    bad_request:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
        application/scim+json:
          schema:
            $ref: '#/components/schemas/scim-error'
    conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    validation_failed:
      description: Validation failed, or the endpoint has been spammed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/validation-error'
    not_modified:
      description: Not modified
  parameters:
    org:
      name: org
      description: The organization name. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    secret-scanning-alert-state:
      name: state
      in: query
      description: >-
        Set to `open` or `resolved` to only list secret scanning alerts in a
        specific state.
      required: false
      schema:
        type: string
        enum:
          - open
          - resolved
    secret-scanning-alert-secret-type:
      name: secret_type
      in: query
      description: >-
        A comma-separated list of secret types to return. All default secret
        patterns are returned. To return generic patterns, pass the token
        name(s) in the parameter. See "[Supported secret scanning
        patterns](https://docs.github.com/code-security/secret-scanning/introduction/supported-secret-scanning-patterns#supported-secrets)"
        for a complete list of secret types.
      required: false
      schema:
        type: string
    secret-scanning-alert-exclude-secret-types:
      name: exclude_secret_types
      in: query
      description: >-
        A comma-separated list of secret types to exclude from the results. All
        default secret patterns are returned except those matching the specified
        types. Cannot be combined with the `secret_type` parameter. See
        "[Supported secret scanning
        patterns](https://docs.github.com/code-security/secret-scanning/introduction/supported-secret-scanning-patterns#supported-secrets)"
        for a complete list of secret types.
      required: false
      schema:
        type: string
    secret-scanning-alert-exclude-providers:
      name: exclude_providers
      in: query
      description: >-
        A comma-separated list of provider slugs to exclude from the results.

        Provider slugs use lowercase with underscores (e.g.,
        `github_secret_scanning`, `clojars`).

        You can find the provider slug in the `provider_slug` field of each
        alert.

        Cannot be combined with the `providers` parameter.
      required: false
      schema:
        type: string
    secret-scanning-alert-providers:
      name: providers
      in: query
      description: >-
        A comma-separated list of provider slugs to filter by.

        Provider slugs use lowercase with underscores (e.g.,
        `github_secret_scanning`, `clojars`).

        You can find the provider slug in the `provider_slug` field of each
        alert.

        Cannot be combined with the `exclude_providers` parameter.
      required: false
      schema:
        type: string
    secret-scanning-alert-resolution:
      name: resolution
      in: query
      description: >-
        A comma-separated list of resolutions. Only secret scanning alerts with
        one of these resolutions are listed. Valid resolutions are
        `false_positive`, `wont_fix`, `revoked`, `pattern_edited`,
        `pattern_deleted` or `used_in_tests`.
      required: false
      schema:
        type: string
    secret-scanning-alert-assignee:
      name: assignee
      in: query
      description: >-
        Filters alerts by assignee. Use `*` to get all assigned alerts, `none`
        to get all unassigned alerts, or a GitHub username to get alerts
        assigned to a specific user.
      required: false
      schema:
        type: string
      examples:
        assigned-to-user:
          value: octocat
          summary: Filter for alerts assigned to the user "octocat"
        all-assigned:
          value: '*'
          summary: Filter for all assigned alerts
        all-unassigned:
          value: none
          summary: Filter for all unassigned alerts
    secret-scanning-alert-sort:
      name: sort
      description: >-
        The property to sort the results by. `created` means when the alert was
        created. `updated` means when the alert was updated or resolved.
      in: query
      required: false
      schema:
        type: string
        enum:
          - created
          - updated
        default: created
    direction:
      name: direction
      description: The direction to sort the results by.
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    page:
      name: page
      description: >-
        The page number of the results to fetch. For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 1
    per-page:
      name: per_page
      description: >-
        The number of results per page (max 100). For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 30
    secret-scanning-pagination-before-org-repo:
      name: before
      description: >-
        A cursor, as given in the [Link
        header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers).
        If specified, the query only searches for events before this cursor. To
        receive an initial cursor on your first request, include an empty
        "before" query string.
      in: query
      required: false
      schema:
        type: string
    secret-scanning-pagination-after-org-repo:
      name: after
      description: >-
        A cursor, as given in the [Link
        header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers).
        If specified, the query only searches for events after this cursor.  To
        receive an initial cursor on your first request, include an empty
        "after" query string.
      in: query
      required: false
      schema:
        type: string
    secret-scanning-alert-validity:
      name: validity
      in: query
      description: >-
        A comma-separated list of validities that, when present, will return
        alerts that match the validities in this list. Valid options are
        `active`, `inactive`, and `unknown`.
      required: false
      schema:
        type: string
    secret-scanning-alert-publicly-leaked:
      name: is_publicly_leaked
      in: query
      description: >-
        A boolean value representing whether or not to filter alerts by the
        publicly-leaked tag being present.
      required: false
      schema:
        type: boolean
        default: false
    secret-scanning-alert-multi-repo:
      name: is_multi_repo
      in: query
      description: >-
        A boolean value representing whether or not to filter alerts by the
        multi-repo tag being present.
      required: false
      schema:
        type: boolean
        default: false
    secret-scanning-alert-hide-secret:
      name: hide_secret
      in: query
      description: >-
        A boolean value representing whether or not to hide literal secrets in
        the results.
      required: false
      schema:
        type: boolean
        default: false
    owner:
      name: owner
      description: The account owner of the repository. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    repo:
      name: repo
      description: >-
        The name of the repository without the `.git` extension. The name is not
        case sensitive.
      in: path
      required: true
      schema:
        type: string
    alert-number:
      name: alert_number
      in: path
      description: >-
        The number that identifies an alert. You can find this at the end of the
        URL for a code scanning alert within GitHub, and in the `number` field
        in the response from the `GET
        /repos/{owner}/{repo}/code-scanning/alerts` operation.
      required: true
      schema:
        $ref: '#/components/schemas/alert-number'
