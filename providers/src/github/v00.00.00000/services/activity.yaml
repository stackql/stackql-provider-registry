openapi: 3.0.3
info:
  title: activity API
  description: Activity APIs provide access to notifications, subscriptions, and timelines.
  version: 1.1.4
paths:
  /events:
    get:
      summary: List public events
      description: >-
        > [!NOTE]

        > This API is not built to serve real-time use cases. Depending on the
        time of day, event latency can be anywhere from 30s to 6h.
      tags:
        - activity
      operationId: activity/list-public-events
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/events#list-public-events
      parameters:
        - $ref: '#/components/parameters/public-events-per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/event'
              examples:
                default:
                  $ref: '#/components/examples/public-events-items'
        '304':
          $ref: '#/components/responses/not_modified'
        '403':
          $ref: '#/components/responses/forbidden'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: events
      x-stackQL-resource: events
  /feeds:
    get:
      summary: Get feeds
      description: >-
        Lists the feeds available to the authenticated user. The response
        provides a URL for each feed. You can then get a specific feed by
        sending a request to one of the feed URLs.


        *   **Timeline**: The GitHub global public timeline

        *   **User**: The public timeline for any user, using `uri_template`.
        For more information, see
        "[Hypermedia](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#hypermedia)."

        *   **Current user public**: The public timeline for the authenticated
        user

        *   **Current user**: The private timeline for the authenticated user

        *   **Current user actor**: The private timeline for activity created by
        the authenticated user

        *   **Current user organizations**: The private timeline for the
        organizations the authenticated user is a member of.

        *   **Security advisories**: A collection of public announcements that
        provide information about security-related vulnerabilities in software
        on GitHub.


        By default, timeline resources are returned in JSON. You can specify the
        `application/atom+xml` type in the `Accept` header to return timeline
        resources in Atom format. For more information, see "[Media
        types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."


        > [!NOTE]

        > Private feeds are only returned when [authenticating via Basic
        Auth](https://docs.github.com/rest/authentication/authenticating-to-the-rest-api#using-basic-authentication)
        since current feed URIs use the older, non revocable auth tokens.
      tags:
        - activity
      operationId: activity/get-feeds
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/feeds#get-feeds
      parameters: []
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/feed'
              examples:
                default:
                  $ref: '#/components/examples/feed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: feeds
      x-stackQL-resource: feeds
  /networks/{owner}/{repo}/events:
    get:
      summary: List public events for a network of repositories
      description: >-
        > [!NOTE]

        > This API is not built to serve real-time use cases. Depending on the
        time of day, event latency can be anywhere from 30s to 6h.
      tags:
        - activity
      operationId: activity/list-public-events-for-repo-network
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/events#list-public-events-for-a-network-of-repositories
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/event'
              examples:
                default:
                  $ref: '#/components/examples/public-repo-events-items'
        '301':
          $ref: '#/components/responses/moved_permanently'
        '304':
          $ref: '#/components/responses/not_modified'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: events
      x-stackQL-resource: events
  /notifications:
    get:
      summary: List notifications for the authenticated user
      description: >-
        List all notifications for the current user, sorted by most recently
        updated.
      tags:
        - activity
      operationId: activity/list-notifications-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#list-notifications-for-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/all'
        - $ref: '#/components/parameters/participating'
        - $ref: '#/components/parameters/since'
        - $ref: '#/components/parameters/before'
        - $ref: '#/components/parameters/page'
        - name: per_page
          description: >-
            The number of results per page (max 50). For more information, see
            "[Using pagination in the REST
            API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/thread'
              examples:
                default:
                  $ref: '#/components/examples/thread-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    put:
      summary: Mark notifications as read
      description: >-
        Marks all notifications as "read" for the current user. If the number of
        notifications is too large to complete in one request, you will receive
        a `202 Accepted` status and GitHub will run an asynchronous process to
        mark notifications as "read." To check whether any "unread"
        notifications remain, you can use the [List notifications for the
        authenticated
        user](https://docs.github.com/rest/activity/notifications#list-notifications-for-the-authenticated-user)
        endpoint and pass the query parameter `all=false`.
      tags:
        - activity
      operationId: activity/mark-notifications-as-read
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#mark-notifications-as-read
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                last_read_at:
                  description: >-
                    Describes the last point that notifications were checked.
                    Anything updated since this time will not be marked as read.
                    If you omit this parameter, all notifications are marked as
                    read. This is a timestamp in [ISO
                    8601](https://en.wikipedia.org/wiki/ISO_8601) format:
                    `YYYY-MM-DDTHH:MM:SSZ`. Default: The current timestamp.
                  type: string
                  format: date-time
                read:
                  description: Whether the notification has been read.
                  type: boolean
            examples:
              default:
                value:
                  last_read_at: '2022-06-10T00:00:00Z'
                  read: true
      responses:
        '202':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                default:
                  $ref: '#/components/examples/notifications-mark-read'
        '205':
          description: Reset Content
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
  /notifications/threads/{thread_id}:
    get:
      summary: Get a thread
      description: Gets information about a notification thread.
      tags:
        - activity
      operationId: activity/get-thread
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/notifications#get-a-thread
      parameters:
        - $ref: '#/components/parameters/thread-id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/thread'
              examples:
                default:
                  $ref: '#/components/examples/thread'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    patch:
      summary: Mark a thread as read
      description: >-
        Marks a thread as "read." Marking a thread as "read" is equivalent to
        clicking a notification in your notification inbox on GitHub:
        https://github.com/notifications.
      tags:
        - activity
      operationId: activity/mark-thread-as-read
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#mark-a-thread-as-read
      parameters:
        - $ref: '#/components/parameters/thread-id'
      responses:
        '205':
          description: Reset Content
        '304':
          $ref: '#/components/responses/not_modified'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    delete:
      summary: Mark a thread as done
      description: >-
        Marks a thread as "done." Marking a thread as "done" is equivalent to
        marking a notification in your notification inbox on GitHub as done:
        https://github.com/notifications.
      tags:
        - activity
      operationId: activity/mark-thread-as-done
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#mark-a-thread-as-done
      parameters:
        - $ref: '#/components/parameters/thread-id'
      responses:
        '204':
          description: No content
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
  /notifications/threads/{thread_id}/subscription:
    get:
      summary: Get a thread subscription for the authenticated user
      description: >-
        This checks to see if the current user is subscribed to a thread. You
        can also [get a repository
        subscription](https://docs.github.com/rest/activity/watching#get-a-repository-subscription).


        Note that subscriptions are only generated if a user is participating in
        a conversation--for example, they've replied to the thread, were
        **@mentioned**, or manually subscribe to a thread.
      tags:
        - activity
      operationId: activity/get-thread-subscription-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#get-a-thread-subscription-for-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/thread-id'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/thread-subscription'
              examples:
                default:
                  $ref: '#/components/examples/thread-subscription'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    put:
      summary: Set a thread subscription
      description: >-
        If you are watching a repository, you receive notifications for all
        threads by default. Use this endpoint to ignore future notifications for
        threads until you comment on the thread or get an **@mention**.


        You can also use this endpoint to subscribe to threads that you are
        currently not receiving notifications for or to subscribed to threads
        that you have previously ignored.


        Unsubscribing from a conversation in a repository that you are not
        watching is functionally equivalent to the [Delete a thread
        subscription](https://docs.github.com/rest/activity/notifications#delete-a-thread-subscription)
        endpoint.
      tags:
        - activity
      operationId: activity/set-thread-subscription
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#set-a-thread-subscription
      parameters:
        - $ref: '#/components/parameters/thread-id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                ignored:
                  description: Whether to block all notifications from a thread.
                  default: false
                  type: boolean
              type: object
            examples:
              default:
                value:
                  ignored: false
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/thread-subscription'
              examples:
                default:
                  $ref: '#/components/examples/thread-subscription'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    delete:
      summary: Delete a thread subscription
      description: >-
        Mutes all future notifications for a conversation until you comment on
        the thread or get an **@mention**. If you are watching the repository of
        the thread, you will still receive notifications. To ignore future
        notifications for a repository you are watching, use the [Set a thread
        subscription](https://docs.github.com/rest/activity/notifications#set-a-thread-subscription)
        endpoint and set `ignore` to `true`.
      tags:
        - activity
      operationId: activity/delete-thread-subscription
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#delete-a-thread-subscription
      parameters:
        - $ref: '#/components/parameters/thread-id'
      responses:
        '204':
          description: Response
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
  /orgs/{org}/events:
    get:
      summary: List public organization events
      description: >-
        > [!NOTE]

        > This API is not built to serve real-time use cases. Depending on the
        time of day, event latency can be anywhere from 30s to 6h.
      tags:
        - activity
      operationId: activity/list-public-org-events
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/events#list-public-organization-events
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/event'
              examples:
                200-response:
                  $ref: '#/components/examples/public-org-events-items'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: events
      x-stackQL-resource: events
  /repos/{owner}/{repo}/events:
    get:
      summary: List repository events
      description: >-
        > [!NOTE]

        > This API is not built to serve real-time use cases. Depending on the
        time of day, event latency can be anywhere from 30s to 6h.
      tags:
        - activity
      operationId: activity/list-repo-events
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/events#list-repository-events
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/event'
              examples:
                200-response:
                  $ref: '#/components/examples/repo-events-items'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: events
      x-stackQL-resource: events
  /repos/{owner}/{repo}/notifications:
    get:
      summary: List repository notifications for the authenticated user
      description: >-
        Lists all notifications for the current user in the specified
        repository.
      tags:
        - activity
      operationId: activity/list-repo-notifications-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#list-repository-notifications-for-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/all'
        - $ref: '#/components/parameters/participating'
        - $ref: '#/components/parameters/since'
        - $ref: '#/components/parameters/before'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/thread'
              examples:
                default:
                  $ref: '#/components/examples/thread-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
    put:
      summary: Mark repository notifications as read
      description: >-
        Marks all notifications in a repository as "read" for the current user.
        If the number of notifications is too large to complete in one request,
        you will receive a `202 Accepted` status and GitHub will run an
        asynchronous process to mark notifications as "read." To check whether
        any "unread" notifications remain, you can use the [List repository
        notifications for the authenticated
        user](https://docs.github.com/rest/activity/notifications#list-repository-notifications-for-the-authenticated-user)
        endpoint and pass the query parameter `all=false`.
      tags:
        - activity
      operationId: activity/mark-repo-notifications-as-read
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/notifications#mark-repository-notifications-as-read
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                last_read_at:
                  type: string
                  format: date-time
                  description: >-
                    Describes the last point that notifications were checked.
                    Anything updated since this time will not be marked as read.
                    If you omit this parameter, all notifications are marked as
                    read. This is a timestamp in [ISO
                    8601](https://en.wikipedia.org/wiki/ISO_8601) format:
                    `YYYY-MM-DDTHH:MM:SSZ`. Default: The current timestamp.
            examples:
              default:
                value:
                  last_read_at: '2019-01-01T00:00:00Z'
      responses:
        '202':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  url:
                    type: string
              examples:
                default:
                  value:
                    message: >-
                      Unread notifications couldn't be marked in a single
                      request. Notifications are being marked as read in the
                      background.
        '205':
          description: Reset Content
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: notifications
      x-stackQL-resource: notifications
  /repos/{owner}/{repo}/stargazers:
    get:
      summary: List stargazers
      description: >-
        Lists the people that have starred the repository.


        This endpoint supports the following custom media types. For more
        information, see "[Media
        types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."


        - **`application/vnd.github.star+json`**: Includes a timestamp of when
        the star was created.
      tags:
        - activity
      operationId: activity/list-stargazers-for-repo
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/starring#list-stargazers
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default-response:
                  $ref: '#/components/examples/simple-user-items-default-response'
                alternative-response-with-star-creation-timestamps:
                  $ref: >-
                    #/components/examples/stargazer-items-alternative-response-with-star-creation-timestamps
          headers:
            Link:
              $ref: '#/components/headers/link'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: starring
      x-stackQL-resource: starring
  /repos/{owner}/{repo}/subscribers:
    get:
      summary: List watchers
      description: Lists the people watching the specified repository.
      tags:
        - activity
      operationId: activity/list-watchers-for-repo
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/activity/watching#list-watchers
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default:
                  $ref: '#/components/examples/simple-user-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: activity
        subcategory: watching
      x-stackQL-resource: watching
  /repos/{owner}/{repo}/subscription:
    get:
      summary: Get a repository subscription
      description: >-
        Gets information about whether the authenticated user is subscribed to
        the repository.
      tags:
        - activity
      operationId: activity/get-repo-subscription
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/activity/watching#get-a-repository-subscription
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      responses:
        '200':
          description: if you subscribe to the repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/repository-subscription'
              examples:
                response-if-you-subscribe-to-the-repository:
                  $ref: >-
                    #/components/examples/repository-subscription-response-if-you-subscribe-to-the-repository
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          description: Not Found if you don't subscribe to the repository
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: activity
        subcategory: watching
      x-stackQL-resource: watching
    put:
      summary: Set a repository subscription
      description: >-
        If you would like to watch a repository, set `subscribed` to `true`. If
        you would like to ignore notifications made within a repository, set
        `ignored` to `true`. If you would like to stop watching a repository,
        [delete the repository's
