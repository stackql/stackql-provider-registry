      name: repo
      description: >-
        The name of the repository without the `.git` extension. The name is not
        case sensitive.
      in: path
      required: true
      schema:
        type: string
    per-page:
      name: per_page
      description: >-
        The number of results per page (max 100). For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 30
    all:
      name: all
      description: If `true`, show notifications marked as read.
      in: query
      required: false
      schema:
        type: boolean
        default: false
    participating:
      name: participating
      description: >-
        If `true`, only shows notifications in which the user is directly
        participating or mentioned.
      in: query
      required: false
      schema:
        type: boolean
        default: false
    since:
      name: since
      description: >-
        Only show results that were last updated after the given time. This is a
        timestamp in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format:
        `YYYY-MM-DDTHH:MM:SSZ`.
      in: query
      required: false
      schema:
        type: string
        format: date-time
    before:
      name: before
      description: >-
        Only show notifications updated before the given time. This is a
        timestamp in [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) format:
        `YYYY-MM-DDTHH:MM:SSZ`.
      in: query
      required: false
      schema:
        type: string
        format: date-time
    thread-id:
      name: thread_id
      description: >-
        The unique identifier of the notification thread. This corresponds to
        the value returned in the `id` field when you retrieve notifications
        (for example with the [`GET /notifications`
        operation](https://docs.github.com/rest/activity/notifications#list-notifications-for-the-authenticated-user)).
      in: path
      required: true
      schema:
        type: integer
    org:
      name: org
      description: The organization name. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    sort-starred:
      name: sort
      description: >-
        The property to sort the results by. `created` means when the repository
        was starred. `updated` means when the repository was last pushed to.
      in: query
      required: false
      schema:
        type: string
        enum:
          - created
          - updated
        default: created
    direction:
      name: direction
      description: The direction to sort the results by.
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    username:
      name: username
      description: The handle for the GitHub user account.
      in: path
      required: true
      schema:
        type: string
