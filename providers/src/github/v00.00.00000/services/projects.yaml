              type: object
              properties:
                name:
                  type: string
                  description: The name of the view.
                  example: Sprint Board
                layout:
                  type: string
                  description: The layout of the view.
                  enum:
                    - table
                    - board
                    - roadmap
                  example: board
                filter:
                  type: string
