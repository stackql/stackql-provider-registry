openapi: 3.0.3
info:
  title: projects API
  description: Endpoints to manage Projects using the REST API.
  version: 1.1.4
paths:
  /orgs/{org}/projectsV2:
    get:
      summary: List projects for organization
      description: >-
        List all projects owned by a specific organization accessible by the
        authenticated user.
      tags:
        - projects
      operationId: projects/list-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/projects#list-projects-for-organization
      parameters:
        - $ref: '#/components/parameters/org'
        - name: q
          description: Limit results to projects of the specified type.
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/pagination-before'
        - $ref: '#/components/parameters/pagination-after'
        - $ref: '#/components/parameters/per-page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/projects-v2'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: projects
      x-stackQL-resource: projects
  /orgs/{org}/projectsV2/{project_number}:
    get:
      summary: Get project for organization
      description: Get a specific organization-owned project.
      tags:
        - projects
      operationId: projects/get-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/projects#get-project-for-organization
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: projects
      x-stackQL-resource: projects
  /orgs/{org}/projectsV2/{project_number}/drafts:
    post:
      summary: Create draft item for organization owned project
      description: Create draft issue item for the specified organization owned project.
      tags:
        - projects
      operationId: projects/create-draft-item-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/drafts#create-draft-item-for-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/project-number'
      requestBody:
        required: true
        description: Details of the draft item to create in the project.
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the draft issue item to create in the project.
                body:
                  type: string
                  description: >-
                    The body content of the draft issue item to create in the
                    project.
              required:
                - title
            examples:
              title:
                summary: Example with Sample Draft Issue Title
                value:
                  title: Sample Draft Issue Title
              body:
                summary: Example with Sample Draft Issue Title and Body
                value:
                  title: Sample Draft Issue Title
                  body: This is the body content of the draft issue.
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-item-simple'
              examples:
                draft_issue:
                  $ref: '#/components/examples/projects-v2-item-simple'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: drafts
      x-stackQL-resource: drafts
  /orgs/{org}/projectsV2/{project_number}/fields:
    get:
      summary: List project fields for organization
      description: List all fields for a specific organization-owned project.
      tags:
        - projects
      operationId: projects/list-fields-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/fields#list-project-fields-for-organization
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/pagination-before'
        - $ref: '#/components/parameters/pagination-after'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/projects-v2-field'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2-field-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: fields
      x-stackQL-resource: fields
    post:
      summary: Add a field to an organization-owned project.
      description: Add a field to an organization-owned project.
      tags:
        - projects
      operationId: projects/add-field-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/fields#add-a-field-to-an-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_field_id:
                  type: integer
                  description: The ID of the IssueField to create the field for.
                name:
                  type: string
                  description: The name of the field.
                data_type:
                  type: string
                  description: The field's data type.
                  enum:
                    - text
                    - number
                    - date
                single_select_options:
                  type: array
                  description: >-
                    The options available for single select fields. At least one
                    option must be provided when creating a single select field.
                  items:
                    $ref: >-
                      #/components/schemas/projects-v2-field-single-select-option
                iteration_configuration:
                  $ref: >-
                    #/components/schemas/projects-v2-field-iteration-configuration
              required:
                - issue_field_id
                - name
                - data_type
                - single_select_options
                - iteration_configuration
              additionalProperties: false
            examples:
              text_field:
                summary: Create a text field
                value:
                  name: Team notes
                  data_type: text
              number_field:
                summary: Create a number field
                value:
                  name: Story points
                  data_type: number
              date_field:
                summary: Create a date field
                value:
                  name: Due date
                  data_type: date
              single_select_field:
                $ref: '#/components/examples/projects-v2-field-single-select-request'
              iteration_field:
                $ref: '#/components/examples/projects-v2-field-iteration-request'
      responses:
        '201':
          description: Response for adding a field to an organization-owned project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-field'
              examples:
                text_field:
                  $ref: '#/components/examples/projects-v2-field-text'
                number_field:
                  $ref: '#/components/examples/projects-v2-field-number'
                date_field:
                  $ref: '#/components/examples/projects-v2-field-date'
                single_select_field:
                  $ref: '#/components/examples/projects-v2-field-single-select'
                iteration_field:
                  $ref: '#/components/examples/projects-v2-field-iteration'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: fields
      x-stackQL-resource: fields
  /orgs/{org}/projectsV2/{project_number}/fields/{field_id}:
    get:
      summary: Get project field for organization
      description: Get a specific field for an organization-owned project.
      tags:
        - projects
      operationId: projects/get-field-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/fields#get-project-field-for-organization
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/field-id'
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-field'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2-field'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: fields
      x-stackQL-resource: fields
  /orgs/{org}/projectsV2/{project_number}/items:
    get:
      summary: List items for an organization owned project
      description: >-
        List all items for a specific organization-owned project accessible by
        the authenticated user.
      tags:
        - projects
      operationId: projects/list-items-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/items#list-items-for-an-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
        - name: q
          description: >-
            Search query to filter items, see [Filtering
            projects](https://docs.github.com/issues/planning-and-tracking-with-projects/customizing-views-in-your-project/filtering-projects)
            for more information.
          in: query
          required: false
          schema:
            type: string
        - name: fields
          description: >-
            Limit results to specific fields, by their IDs. If not specified,
            the title field will be returned.


            Example: `fields[]=123&fields[]=456&fields[]=789` or
            `fields=123,456,789`
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                maxItems: 50
                items:
                  type: string
        - $ref: '#/components/parameters/pagination-before'
        - $ref: '#/components/parameters/pagination-after'
        - $ref: '#/components/parameters/per-page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/projects-v2-item-with-content'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2-item-with-content'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: items
      x-stackQL-resource: items
    post:
      summary: Add item to organization owned project
      description: >-
        Add an issue or pull request item to the specified organization owned
        project.
      tags:
        - projects
      operationId: projects/add-item-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/items#add-item-to-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/project-number'
      requestBody:
        required: true
        description: >-
          Details of the item to add to the project. You can specify either the
          unique ID or the repository owner, name, and issue/PR number.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum:
                    - Issue
                    - PullRequest
                  description: >-
                    The type of item to add to the project. Must be either Issue
                    or PullRequest.
                id:
                  type: integer
                  description: >-
                    The unique identifier of the issue or pull request to add to
                    the project.
                owner:
                  type: string
                  description: The repository owner login.
                repo:
                  type: string
                  description: The repository name.
                number:
                  type: integer
                  description: The issue or pull request number.
              required:
                - type
                - id
                - owner
                - repo
                - number
            examples:
              issue_with_id:
                summary: Add an issue using its unique ID
                value:
                  type: Issue
                  id: 3
              pull_request_with_id:
                summary: Add a pull request using its unique ID
                value:
                  type: PullRequest
                  id: 3
              issue_with_nwo:
                summary: Add an issue using repository owner, name, and issue number
                value:
                  type: Issue
                  owner: octocat
                  repo: hello-world
                  number: 42
              pull_request_with_nwo:
                summary: Add a pull request using repository owner, name, and PR number
                value:
                  type: PullRequest
                  owner: octocat
                  repo: hello-world
                  number: 123
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-item-simple'
              examples:
                issue_with_id:
                  summary: Response for adding an issue using its unique ID
                  value:
                    $ref: '#/components/examples/projects-v2-item-simple'
                pull_request_with_id:
                  summary: Response for adding a pull request using its unique ID
                  value:
                    $ref: '#/components/examples/projects-v2-item-simple'
                issue_with_nwo:
                  summary: >-
                    Response for adding an issue using repository owner, name,
                    and issue number
                  value:
                    $ref: '#/components/examples/projects-v2-item-simple'
                pull_request_with_nwo:
                  summary: >-
                    Response for adding a pull request using repository owner,
                    name, and PR number
                  value:
                    $ref: '#/components/examples/projects-v2-item-simple'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: items
      x-stackQL-resource: items
  /orgs/{org}/projectsV2/{project_number}/items/{item_id}:
    get:
      summary: Get an item for an organization owned project
      description: Get a specific item from an organization-owned project.
      tags:
        - projects
      operationId: projects/get-org-item
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/items#get-an-item-for-an-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/item-id'
        - name: fields
          description: >-
            Limit results to specific fields, by their IDs. If not specified,
            the title field will be returned.


            Example: fields[]=123&fields[]=456&fields[]=789 or
            fields=123,456,789
          in: query
          required: false
          schema:
            oneOf:
              - type: string
              - type: array
                maxItems: 50
                items:
                  type: string
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-item-with-content'
              examples:
                default:
                  $ref: '#/components/examples/projects-v2-item-with-content'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: items
      x-stackQL-resource: items
    patch:
      summary: Update project item for organization
      description: Update a specific item in an organization-owned project.
      tags:
        - projects
      operationId: projects/update-item-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/items#update-project-item-for-organization
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/item-id'
      requestBody:
        required: true
        description: >-
          Field updates to apply to the project item. Only text, number, date,
          single select, and iteration fields are supported.
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: array
                  description: A list of field updates to apply.
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: The ID of the project field to update.
                      value:
                        description: >-
                          The new value for the field:

                          - For text, number, and date fields, provide the new
                          value directly.

                          - For single select and iteration fields, provide the
                          ID of the option or iteration.

                          - To clear the field, set this to null.
                        nullable: true
                        oneOf:
                          - type: string
                          - type: number
                    required:
                      - id
                      - value
              required:
                - fields
            examples:
              text_field:
                summary: Update a text field
                value:
                  fields:
                    - id: 123
                      value: Updated text value
              number_field:
                summary: Update a number field
                value:
                  fields:
                    - id: 456
                      value: 42.5
              date_field:
                summary: Update a date field
                value:
                  fields:
                    - id: 789
                      value: '2023-10-05'
              single_select_field:
                summary: Update a single select field
                value:
                  fields:
                    - id: 789
                      value: 47fc9ee4
              iteration_field:
                summary: Update an iteration field
                value:
                  fields:
                    - id: 1011
                      value: 866ee5b8
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-item-with-content'
              examples:
                text_field:
                  $ref: '#/components/examples/projects-v2-item-with-content'
                number_field:
                  $ref: '#/components/examples/projects-v2-item-with-content'
                date_field:
                  $ref: '#/components/examples/projects-v2-item-with-content'
                single_select_field:
                  $ref: '#/components/examples/projects-v2-item-with-content'
                iteration_field:
                  $ref: '#/components/examples/projects-v2-item-with-content'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: items
      x-stackQL-resource: items
    delete:
      summary: Delete project item for organization
      description: Delete a specific item from an organization-owned project.
      tags:
        - projects
      operationId: projects/delete-item-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/items#delete-project-item-for-organization
      parameters:
        - $ref: '#/components/parameters/project-number'
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/item-id'
      responses:
        '204':
          description: Response
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: items
      x-stackQL-resource: items
  /orgs/{org}/projectsV2/{project_number}/views:
    post:
      summary: Create a view for an organization-owned project
      description: >-
        Create a new view in an organization-owned project. Views allow you to
        customize how items in a project are displayed and filtered.
      tags:
        - projects
      operationId: projects/create-view-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/projects/views#create-a-view-for-an-organization-owned-project
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/project-number'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the view.
                  example: Sprint Board
                layout:
                  type: string
                  description: The layout of the view.
                  enum:
                    - table
                    - board
                    - roadmap
                  example: board
                filter:
                  type: string
                  description: >-
                    The filter query for the view. See [Filtering
                    projects](https://docs.github.com/issues/planning-and-tracking-with-projects/customizing-views-in-your-project/filtering-projects)
                    for more information.
                  example: is:issue is:open
                visible_fields:
                  type: array
                  description: >-
                    `visible_fields` is not applicable to `roadmap` layout
                    views.

                    For `table` and `board` layouts, this represents the field
                    IDs that should be visible in the view. If not provided, the
                    default visible fields will be used.
                  items:
                    type: integer
                  example:
                    - 123
                    - 456
                    - 789
              required:
                - name
                - layout
              additionalProperties: false
            examples:
              table_view:
                summary: Create a table view
                value:
                  name: All Issues
                  layout: table
                  filter: is:issue
                  visible_fields:
                    - 123
                    - 456
                    - 789
              board_view:
                summary: Create a board view with filter
                value:
                  name: Sprint Board
                  layout: board
                  filter: is:issue is:open label:sprint
                  visible_fields:
                    - 123
                    - 456
                    - 789
              roadmap_view:
                summary: Create a roadmap view
                value:
                  name: Product Roadmap
                  layout: roadmap
      responses:
        '201':
          description: Response for creating a view in an organization-owned project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/projects-v2-view'
              examples:
                table_view:
                  summary: Response for creating a table view
                  value:
                    $ref: '#/components/examples/projects-v2-view'
                board_view:
                  summary: Response for creating a board view with filter
                  value:
                    $ref: '#/components/examples/projects-v2-view'
                roadmap_view:
                  summary: Response for creating a roadmap view
                  value:
                    $ref: '#/components/examples/projects-v2-view'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basic-error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: projects
        subcategory: views
      x-stackQL-resource: views
  /orgs/{org}/projectsV2/{project_number}/views/{view_number}/items:
    get:
      summary: List items for an organization project view
      description: >-
        List items in an organization project with the saved view's filter
        applied.
      tags:
        - projects
