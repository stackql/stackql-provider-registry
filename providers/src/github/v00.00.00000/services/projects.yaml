components:
  schemas:
    projects-v2:
      title: Projects v2 Project
      description: A projects v2 project
      type: object
      properties:
        id:
          type: number
          description: The unique identifier of the project.
        node_id:
          type: string
          description: The node ID of the project.
        owner:
          $ref: '#/components/schemas/simple-user'
        creator:
          $ref: '#/components/schemas/simple-user'
        title:
          type: string
          description: The project title.
        description:
          type: string
          nullable: true
          description: A short description of the project.
        public:
          type: boolean
          description: Whether the project is visible to anyone with access to the owner.
        closed_at:
          type: string
          format: date-time
          example: '2022-04-28T12:00:00Z'
          nullable: true
          description: The time when the project was closed.
        created_at:
          type: string
          format: date-time
          example: '2022-04-28T12:00:00Z'
          description: The time when the project was created.
        updated_at:
          type: string
          format: date-time
          example: '2022-04-28T12:00:00Z'
          description: The time when the project was last updated.
        number:
          type: integer
          description: The project number.
        short_description:
          type: string
          nullable: true
          description: A concise summary of the project.
        deleted_at:
          type: string
          format: date-time
          example: '2022-04-28T12:00:00Z'
          nullable: true
          description: The time when the project was deleted.
        deleted_by:
          $ref: '#/components/schemas/nullable-simple-user'
        state:
          type: string
          enum:
            - open
            - closed
          description: The current state of the project.
        latest_status_update:
          $ref: '#/components/schemas/nullable-projects-v2-status-update'
        is_template:
          type: boolean
          description: Whether this project is a template
      required:
        - id
        - node_id
        - owner
        - creator
        - title
        - description
        - public
        - closed_at
        - created_at
        - updated_at
        - number
        - short_description
        - deleted_at
        - deleted_by
    projects-v2-item-simple:
      title: Projects v2 Item
      description: An item belonging to a project
      type: object
      properties:
        id:
          type: number
          description: The unique identifier of the project item.
        node_id:
          type: string
          description: The node ID of the project item.
        content:
          description: The content represented by the item.
          title: Issue
          type: object
          properties:
            id:
              type: integer
              format: int64
            node_id:
              type: string
            url:
              description: URL for the issue
              example: https://api.github.com/repositories/42/issues/1
              type: string
              format: uri
            repository_url:
              type: string
              format: uri
            labels_url:
              type: string
            comments_url:
              type: string
              format: uri
            events_url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
            number:
              description: Number uniquely identifying the issue within its repository
              example: 42
              type: integer
            state:
              description: State of the issue; either 'open' or 'closed'
              example: open
              type: string
            state_reason:
              description: The reason for the current state
              example: not_planned
              type: string
              nullable: true
              enum:
                - completed
                - reopened
                - not_planned
                - duplicate
            title:
              description: Title of the issue
              example: Widget creation fails in Safari on OS X 10.8
              type: string
            body:
              description: Contents of the issue
              example: >-
                It looks like the new widget form is broken on Safari. When I
                try and create the widget, Safari crashes. This is reproducible
                on 10.8, but not 10.9. Maybe a browser bug?
              type: string
              nullable: true
            user:
              $ref: '#/components/schemas/nullable-simple-user'
            labels:
              description: >-
                Labels to associate with this issue; pass one or more label
                names to replace the set of labels on this issue; send an empty
                array to clear all labels from the issue; note that the labels
                are silently dropped for users without push access to the
                repository
              example:
                - bug
                - registration
              type: array
              items:
                oneOf:
                  - type: string
                  - type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                      node_id:
                        type: string
                      url:
                        type: string
                        format: uri
                      name:
                        type: string
                      description:
                        type: string
                        nullable: true
                      color:
                        type: string
                        nullable: true
                      default:
                        type: boolean
            assignee:
              $ref: '#/components/schemas/nullable-simple-user'
            assignees:
              type: array
              items:
                $ref: '#/components/schemas/simple-user'
            milestone:
              $ref: '#/components/schemas/nullable-milestone'
            locked:
              type: boolean
            active_lock_reason:
              type: string
              nullable: true
            comments:
              type: integer
            pull_request:
              type: object
              properties:
                merged_at:
                  type: string
                  format: date-time
                  nullable: true
                diff_url:
                  type: string
                  format: uri
                  nullable: true
                html_url:
                  type: string
                  format: uri
                  nullable: true
                patch_url:
                  type: string
                  format: uri
                  nullable: true
                url:
                  type: string
                  format: uri
                  nullable: true
              required:
                - diff_url
                - html_url
                - patch_url
                - url
            closed_at:
              type: string
              format: date-time
              nullable: true
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            draft:
              type: boolean
            closed_by:
              $ref: '#/components/schemas/nullable-simple-user'
            body_html:
              type: string
            body_text:
              type: string
            timeline_url:
              type: string
              format: uri
            type:
              $ref: '#/components/schemas/issue-type'
            repository:
              $ref: '#/components/schemas/repository'
            performed_via_github_app:
              $ref: '#/components/schemas/nullable-integration'
            author_association:
              $ref: '#/components/schemas/author-association'
            reactions:
              $ref: '#/components/schemas/reaction-rollup'
            sub_issues_summary:
              $ref: '#/components/schemas/sub-issues-summary'
            parent_issue_url:
              description: URL to get the parent issue of this issue, if it is a sub-issue
              type: string
              format: uri
              nullable: true
            pinned_comment:
              $ref: '#/components/schemas/nullable-issue-comment'
            issue_dependencies_summary:
              $ref: '#/components/schemas/issue-dependencies-summary'
            issue_field_values:
              type: array
              items:
                $ref: '#/components/schemas/issue-field-value'
            diff_url:
              type: string
              format: uri
              example: https://github.com/octocat/Hello-World/pull/1347.diff
            patch_url:
              type: string
              format: uri
              example: https://github.com/octocat/Hello-World/pull/1347.patch
            issue_url:
              type: string
              format: uri
              example: https://api.github.com/repos/octocat/Hello-World/issues/1347
            commits_url:
              type: string
              format: uri
              example: >-
                https://api.github.com/repos/octocat/Hello-World/pulls/1347/commits
            review_comments_url:
              type: string
              format: uri
              example: >-
                https://api.github.com/repos/octocat/Hello-World/pulls/1347/comments
            review_comment_url:
              type: string
              example: >-
                https://api.github.com/repos/octocat/Hello-World/pulls/comments{/number}
            statuses_url:
              type: string
              format: uri
              example: >-
                https://api.github.com/repos/octocat/Hello-World/statuses/6dcb09b5b57875f334f61aebed695e2e4193db5e
            merged_at:
              type: string
              format: date-time
              example: '2011-01-26T19:01:12Z'
              nullable: true
            merge_commit_sha:
              type: string
              example: e5bd3914e2e596debea16f433f57875b5b90bcd6
              nullable: true
            requested_reviewers:
              type: array
              items:
                $ref: '#/components/schemas/simple-user'
            requested_teams:
              type: array
              items:
                $ref: '#/components/schemas/team'
            head:
              type: object
              properties:
                label:
                  type: string
                ref:
                  type: string
                repo:
                  $ref: '#/components/schemas/repository'
                sha:
                  type: string
                user:
                  $ref: '#/components/schemas/nullable-simple-user'
              required:
                - label
                - ref
                - repo
                - sha
                - user
            base:
              type: object
              properties:
                label:
                  type: string
                ref:
                  type: string
                repo:
                  $ref: '#/components/schemas/repository'
                sha:
                  type: string
                user:
                  $ref: '#/components/schemas/nullable-simple-user'
              required:
                - label
                - ref
                - repo
                - sha
                - user
            _links:
              type: object
              properties:
                comments:
                  $ref: '#/components/schemas/link'
                commits:
                  $ref: '#/components/schemas/link'
                statuses:
                  $ref: '#/components/schemas/link'
                html:
                  $ref: '#/components/schemas/link'
                issue:
                  $ref: '#/components/schemas/link'
                review_comments:
                  $ref: '#/components/schemas/link'
                review_comment:
                  $ref: '#/components/schemas/link'
                self:
                  $ref: '#/components/schemas/link'
              required:
                - comments
                - commits
                - statuses
                - html
                - issue
                - review_comments
                - review_comment
                - self
            auto_merge:
              $ref: '#/components/schemas/auto-merge'
          required:
            - assignee
            - closed_at
            - comments
            - comments_url
            - events_url
            - html_url
            - id
            - node_id
            - labels
            - labels_url
            - milestone
            - number
            - repository_url
            - state
            - locked
            - title
            - url
            - user
            - created_at
            - updated_at
            - _links
            - base
            - body
            - commits_url
            - diff_url
            - head
            - issue_url
            - merge_commit_sha
            - merged_at
            - patch_url
            - review_comment_url
            - review_comments_url
            - statuses_url
            - author_association
            - auto_merge
          x-github-breaking-changes:
            - changeset: deprecate_beta_media_type
              patch:
                properties:
                  pull_request:
                    type: object
                    properties:
                      merged_at:
                        nullable: false
                      diff_url:
                        nullable: false
                      html_url:
                        nullable: false
                      patch_url:
                        nullable: false
                      url:
                        nullable: false
                type: object
              version: '2026-03-10'
            - changeset: remove_singular_assignee_from_issues_and_pull_requests
              patch:
                properties:
                  assignee: null
                required:
                  - closed_at
                  - comments
                  - comments_url
                  - events_url
                  - html_url
                  - id
                  - node_id
                  - labels
                  - labels_url
                  - milestone
                  - number
                  - repository_url
                  - state
                  - locked
                  - title
                  - url
                  - user
                  - created_at
                  - updated_at
                type: object
              version: '2026-03-10'
        content_type:
