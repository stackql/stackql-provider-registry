                    for more information.
                  example: is:issue is:open
                visible_fields:
                  type: array
                  description: >-
                    `visible_fields` is not applicable to `roadmap` layout
                    views.

                    For `table` and `board` layouts, this represents the field
                    IDs that should be visible in the view. If not provided, the
                    default visible fields will be used.
