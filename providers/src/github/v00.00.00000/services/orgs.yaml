    organization-programmatic-access-grant-request:
      title: Simple Organization Programmatic Access Grant Request
      description: >-
        Minimal representation of an organization programmatic access grant
        request for enumerations
      type: object
      properties:
        id:
          type: integer
          description: >-
            Unique identifier of the request for access via fine-grained
            personal access token. The `pat_request_id` used to review PAT
            requests.
        reason:
          type: string
          nullable: true
          description: Reason for requesting access.
        owner:
          $ref: '#/components/schemas/simple-user'
        repository_selection:
          type: string
          enum:
            - none
            - all
            - subset
          description: Type of repository selection requested.
        repositories_url:
          type: string
          description: >-
            URL to the list of repositories requested to be accessed via
            fine-grained personal access token. Should only be followed when
            `repository_selection` is `subset`.
        permissions:
          type: object
          description: Permissions requested, categorized by type of permission.
          properties:
            organization:
              type: object
              additionalProperties:
                type: string
            repository:
              type: object
              additionalProperties:
                type: string
            other:
              type: object
              additionalProperties:
                type: string
        created_at:
          type: string
          description: Date and time when the request for access was created.
        token_id:
          type: integer
          description: >-
            Unique identifier of the user's token. This field can also be found
            in audit log events and the organization's settings for their PAT
            grants.
        token_name:
          type: string
          description: >-
            The name given to the user's token. This field can also be found in
            an organization's settings page for Active Tokens.
        token_expired:
          type: boolean
          description: >-
            Whether the associated fine-grained personal access token has
            expired.
        token_expires_at:
          type: string
          nullable: true
          description: >-
            Date and time when the associated fine-grained personal access token
            expires.
        token_last_used_at:
          type: string
          nullable: true
          description: >-
            Date and time when the associated fine-grained personal access token
            was last used for authentication.
      required:
        - id
        - reason
        - owner
        - repository_selection
        - repositories_url
        - permissions
        - created_at
        - token_id
        - token_name
        - token_expired
        - token_expires_at
        - token_last_used_at
