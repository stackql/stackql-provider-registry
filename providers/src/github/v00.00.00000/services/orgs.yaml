          enum:
            - organization
            - enterprise
          example: organization
        value_type:
          type: string
          example: single_select
          enum:
            - string
            - single_select
            - multi_select
            - true_false
            - url
          description: The type of the value for the property
        required:
          type: boolean
          description: Whether the property is required.
        default_value:
          nullable: true
          description: Default value of the property
          type: string
          items:
            type: string
        description:
          type: string
          nullable: true
          description: Short description of the property
        allowed_values:
          type: array
          items:
            type: string
          nullable: true
          description: |-
