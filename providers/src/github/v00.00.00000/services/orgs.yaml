openapi: 3.0.3
info:
  title: orgs API
  description: Interact with organizations.
  version: 1.1.4
paths:
  /organizations:
    get:
      summary: List organizations
      description: >-
        Lists all organizations, in the order that they were created.


        > [!NOTE]

        > Pagination is powered exclusively by the `since` parameter. Use the
        [Link
        header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers)
        to get the URL for the next page of organizations.
      tags:
        - orgs
      operationId: orgs/list
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/orgs/orgs#list-organizations
      parameters:
        - $ref: '#/components/parameters/since-org'
        - $ref: '#/components/parameters/per-page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/organization-simple'
              examples:
                default:
                  $ref: '#/components/examples/organization-simple-items'
          headers:
            Link:
              example: <https://api.github.com/organizations?since=135>; rel="next"
              schema:
                type: string
        '304':
          $ref: '#/components/responses/not_modified'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: orgs
        subcategory: orgs
      x-stackQL-resource: orgs
  /orgs/{org}:
    get:
      summary: Get an organization
      description: >-
        Gets information about an organization.


        When the value of `two_factor_requirement_enabled` is `true`, the
        organization requires all members, billing managers, outside
        collaborators, guest collaborators, repository collaborators, or
        everyone with access to any repository within the organization to enable
        [two-factor
        authentication](https://docs.github.com/articles/securing-your-account-with-two-factor-authentication-2fa/).


        To see the full details about an organization, the authenticated user
        must be an organization owner.


        OAuth app tokens and personal access tokens (classic) need the
        `admin:org` scope to see the full details about an organization.


        To see information about an organization's GitHub plan, GitHub Apps need
        the `Organization plan` permission.
      tags:
        - orgs
      operationId: orgs/get
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/orgs/orgs#get-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization-full'
              examples:
                default-response:
                  $ref: '#/components/examples/organization-full'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: orgs
        subcategory: orgs
      x-stackQL-resource: orgs
    patch:
      summary: Update an organization
      description: >-
        > [!WARNING]

        > **Closing down notice:** GitHub will replace and discontinue
        `members_allowed_repository_creation_type` in favor of more granular
        permissions. The new input parameters are
        `members_can_create_public_repositories`,
        `members_can_create_private_repositories` for all organizations and
        `members_can_create_internal_repositories` for organizations associated
        with an enterprise account using GitHub Enterprise Cloud or GitHub
        Enterprise Server 2.20+. For more information, see the [blog
        post](https://developer.github.com/changes/2019-12-03-internal-visibility-changes).


        > [!WARNING]

        > **Closing down notice:** Code security product enablement for new
        repositories through the organization API is closing down. Please use
        [code security
        configurations](https://docs.github.com/rest/code-security/configurations#set-a-code-security-configuration-as-a-default-for-an-organization)
        to set defaults instead. For more information on setting a default
        security configuration, see the
        [changelog](https://github.blog/changelog/2024-07-09-sunsetting-security-settings-defaults-parameters-in-the-organizations-rest-api/).


        Updates the organization's profile and member privileges.


        The authenticated user must be an organization owner to use this
        endpoint.


        OAuth app tokens and personal access tokens (classic) need the
        `admin:org` or `repo` scope to use this endpoint.
      tags:
        - orgs
      operationId: orgs/update
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/orgs/orgs#update-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                billing_email:
                  type: string
                  description: Billing email address. This address is not publicized.
                company:
                  type: string
                  description: The company name.
                email:
                  type: string
                  description: The publicly visible email address.
                twitter_username:
                  type: string
                  description: The Twitter username of the company.
                location:
                  type: string
                  description: The location.
                name:
                  type: string
                  description: The shorthand name of the company.
                description:
                  type: string
                  description: >-
                    The description of the company. The maximum size is 160
                    characters.
                has_organization_projects:
                  type: boolean
                  description: Whether an organization can use organization projects.
                has_repository_projects:
                  type: boolean
                  description: >-
                    Whether repositories that belong to the organization can use
                    repository projects.
                default_repository_permission:
                  type: string
                  description: >-
                    Default permission level members have for organization
                    repositories.
                  enum:
                    - read
                    - write
                    - admin
                    - none
                  default: read
                members_can_create_repositories:
                  type: boolean
                  description: >-
                    Whether of non-admin organization members can create
                    repositories. **Note:** A parameter can override this
                    parameter. See `members_allowed_repository_creation_type` in
                    this table for details.
                  default: true
                members_can_create_internal_repositories:
                  type: boolean
                  description: >-
                    Whether organization members can create internal
                    repositories, which are visible to all enterprise members.
                    You can only allow members to create internal repositories
                    if your organization is associated with an enterprise
                    account using GitHub Enterprise Cloud or GitHub Enterprise
                    Server 2.20+. For more information, see "[Restricting
                    repository creation in your
                    organization](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/restricting-repository-creation-in-your-organization)"
                    in the GitHub Help documentation.
                members_can_create_private_repositories:
                  type: boolean
                  description: >-
                    Whether organization members can create private
                    repositories, which are visible to organization members with
                    permission. For more information, see "[Restricting
                    repository creation in your
                    organization](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/restricting-repository-creation-in-your-organization)"
                    in the GitHub Help documentation.
                members_can_create_public_repositories:
                  type: boolean
                  description: >-
                    Whether organization members can create public repositories,
                    which are visible to anyone. For more information, see
                    "[Restricting repository creation in your
                    organization](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/restricting-repository-creation-in-your-organization)"
                    in the GitHub Help documentation.
                members_allowed_repository_creation_type:
                  type: string
                  description: >-
                    Specifies which types of repositories non-admin organization
                    members can create. `private` is only available to
                    repositories that are part of an organization on GitHub
                    Enterprise Cloud. 

                    **Note:** This parameter is closing down and will be removed
                    in the future. Its return value ignores internal
                    repositories. Using this parameter overrides values set in
                    `members_can_create_repositories`. See the parameter
                    deprecation notice in the operation description for details.
                  enum:
                    - all
                    - private
                    - none
                members_can_create_pages:
                  type: boolean
                  description: >-
                    Whether organization members can create GitHub Pages sites.
                    Existing published sites will not be impacted.
                  default: true
                members_can_create_public_pages:
                  type: boolean
                  description: >-
                    Whether organization members can create public GitHub Pages
                    sites. Existing published sites will not be impacted.
                  default: true
                members_can_create_private_pages:
                  type: boolean
                  description: >-
                    Whether organization members can create private GitHub Pages
                    sites. Existing published sites will not be impacted.
                  default: true
                members_can_fork_private_repositories:
                  type: boolean
                  description: >-
                    Whether organization members can fork private organization
                    repositories.
                  default: false
                web_commit_signoff_required:
                  type: boolean
                  description: >-
                    Whether contributors to organization repositories are
                    required to sign off on commits they make through GitHub's
                    web interface.
                  default: false
                blog:
                  type: string
                  example: '"http://github.blog"'
                advanced_security_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether GitHub Advanced Security is automatically enabled
                    for new repositories and repositories transferred to this
                    organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                dependabot_alerts_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether Dependabot alerts are automatically enabled for new
                    repositories and repositories transferred to this
                    organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                dependabot_security_updates_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether Dependabot security updates are automatically
                    enabled for new repositories and repositories transferred to
                    this organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                dependency_graph_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether dependency graph is automatically enabled for new
                    repositories and repositories transferred to this
                    organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                secret_scanning_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether secret scanning is automatically enabled for new
                    repositories and repositories transferred to this
                    organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                secret_scanning_push_protection_enabled_for_new_repositories:
                  type: boolean
                  description: >-
                    **Endpoint closing down notice.** Please use [code security
                    configurations](https://docs.github.com/rest/code-security/configurations)
                    instead.


                    Whether secret scanning push protection is automatically
                    enabled for new repositories and repositories transferred to
                    this organization.


                    To use this parameter, you must have admin permissions for
                    the repository or be an owner or security manager for the
                    organization that owns the repository. For more information,
                    see "[Managing security managers in your
                    organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


                    You can check which security and analysis features are
                    currently enabled by using a `GET /orgs/{org}` request.
                  deprecated: true
                secret_scanning_push_protection_custom_link_enabled:
                  type: boolean
                  description: >-
                    Whether a custom link is shown to contributors who are
                    blocked from pushing a secret by push protection.
                secret_scanning_push_protection_custom_link:
                  type: string
                  description: >-
                    If `secret_scanning_push_protection_custom_link_enabled` is
                    true, the URL that will be displayed to contributors who are
                    blocked from pushing a secret.
                deploy_keys_enabled_for_repositories:
                  type: boolean
                  description: >-
                    Controls whether or not deploy keys may be added and used
                    for repositories in the organization.
            examples:
              default:
                value:
                  billing_email: mona@github.com
                  company: GitHub
                  email: mona@github.com
                  twitter_username: github
                  location: San Francisco
                  name: github
                  description: GitHub, the company.
                  default_repository_permission: read
                  members_can_create_repositories: true
                  members_allowed_repository_creation_type: all
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization-full'
              examples:
                default:
                  $ref: '#/components/examples/organization-full'
        '409':
          $ref: '#/components/responses/conflict'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                title: Validation Error
                description: Validation Error
                type: object
                required:
                  - message
                  - documentation_url
                properties:
                  message:
                    type: string
                  documentation_url:
                    type: string
                  errors:
                    type: array
                    items:
                      type: object
                      required:
                        - code
                      properties:
                        resource:
                          type: string
                        field:
                          type: string
                        message:
                          type: string
                        code:
                          type: string
                        index:
                          type: integer
                        value:
                          oneOf:
                            - type: string
                              nullable: true
                            - type: integer
                              nullable: true
                            - type: array
                              nullable: true
                              items:
                                type: string
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: orgs
        subcategory: orgs
      x-github-breaking-changes:
        - changeset: remove_secret_scanning_custom_link_enablement_field
          patch:
            requestBody:
              content:
                application/json:
                  schema:
                    properties:
                      secret_scanning_push_protection_custom_link_enabled: null
                    type: object
          version: '2026-03-10'
      x-stackQL-resource: orgs
    delete:
      summary: Delete an organization
      description: >-
        Deletes an organization and all its repositories.


        The organization login will be unavailable for 90 days after deletion.


        Please review the Terms of Service regarding account deletion before
        using this endpoint:


        https://docs.github.com/site-policy/github-terms/github-terms-of-service
      operationId: orgs/delete
      tags:
        - orgs
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/orgs/orgs#delete-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      responses:
        '202':
          $ref: '#/components/responses/accepted'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: orgs
        subcategory: orgs
      x-github-breaking-changes:
        - changeset: change_delete_organization_trade_compliance_respose_status
          patch:
            responses:
              '451':
                $ref: '#/components/responses/validation_failed'
          version: '2026-03-10'
      x-stackQL-resource: orgs
  /orgs/{org}/artifacts/metadata/deployment-record:
    post:
      summary: Create an artifact deployment record
      description: |-
        Create or update deployment records for an artifact associated
        with an organization.
        This endpoint allows you to record information about a specific
        artifact, such as its name, digest, environments, cluster, and
        deployment.
        The deployment name has to be uniqe within a cluster (i.e a
        combination of logical, physical environment and cluster) as it
        identifies unique deployment.
        Multiple requests for the same combination of logical, physical
        environment, cluster and deployment name will only create one
        record, successive request will update the existing record.
        This allows for a stable tracking of a deployment where the actual
        deployed artifact can change over time.
      tags:
        - orgs
      operationId: orgs/create-artifact-deployment-record
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/orgs/artifact-metadata#create-an-artifact-deployment-record
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the artifact.
                  minLength: 1
                  maxLength: 256
                  example: libfoo
                digest:
                  type: string
                  description: The hex encoded digest of the artifact.
                  minLength: 71
                  maxLength: 71
                  pattern: ^sha256:[a-f0-9]{64}$
                version:
                  type: string
                  description: The artifact version.
                  minLength: 1
                  maxLength: 100
                  x-multi-segment: true
                  example: 1.2.3
                status:
                  type: string
                  description: >-
                    The status of the artifact. Can be either deployed or
                    decommissioned.
                  enum:
                    - deployed
                    - decommissioned
                logical_environment:
                  type: string
                  description: The stage of the deployment.
                  minLength: 1
                  maxLength: 128
                physical_environment:
                  type: string
                  description: The physical region of the deployment.
                  maxLength: 128
                cluster:
                  type: string
                  description: The deployment cluster.
                  maxLength: 128
                deployment_name:
                  type: string
                  description: >
                    The unique identifier for the deployment represented by the
                    new record. To accommodate differing

                    containers and namespaces within a cluster, the following
                    format is recommended:

                    {namespaceName}-{deploymentName}-{containerName}.
                  maxLength: 256
                tags:
                  type: object
                  description: The tags associated with the deployment.
                  additionalProperties:
                    type: string
                  maxProperties: 5
                runtime_risks:
                  type: array
                  description: A list of runtime risks associated with the deployment.
                  maxItems: 4
                  uniqueItems: true
                  items:
                    type: string
                    enum:
                      - critical-resource
                      - internet-exposed
                      - lateral-movement
                      - sensitive-data
                github_repository:
                  type: string
                  description: >-
                    The name of the GitHub repository associated with the
                    artifact. This should be used

                    when there are no provenance attestations available for the
                    artifact. The repository

                    must belong to the organization specified in the path
                    parameter.


                    If a provenance attestation is available for the artifact,
                    the API will use

                    the repository information from the attestation instead of
                    this parameter.
                  minLength: 1
                  maxLength: 100
                  pattern: ^[A-Za-z0-9.\-_]+$
                  example: my-github-repo
                return_records:
                  type: boolean
                  default: true
                  description: >
                    If true, the endpoint will return the created or updated
                    record in the response body.
              required:
                - name
                - digest
                - status
                - logical_environment
                - deployment_name
            examples:
              default:
                value:
                  name: awesome-image
                  digest: >-
                    sha256:1bb1e949e55dcefc6353e7b36c8897d2a107d8e8dca49d4e3c0ea8493fc0bc72
                  status: deployed
                  logical_environment: prod
                  physical_environment: pacific-east
                  cluster: moda-1
                  deployment_name: deployment-pod
                  tags:
                    data-access: sensitive
      responses:
        '200':
          description: Artifact deployment record stored successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    description: The number of deployment records created
                    type: integer
                  deployment_records:
                    type: array
                    items:
                      $ref: '#/components/schemas/artifact-deployment-record'
                required:
                  - total_count
              examples:
                default:
                  $ref: '#/components/examples/artifact-deployment-record-list'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: orgs
        subcategory: artifact-metadata
      x-stackQL-resource: artifact_metadata
  /orgs/{org}/artifacts/metadata/deployment-record/cluster/{cluster}:
    post:
      summary: Set cluster deployment records
      description: >-
        Set deployment records for a given cluster.

        If proposed records in the 'deployments' field have identical 'cluster',
        'logical_environment',

        'physical_environment', and 'deployment_name' values as existing
        records, the existing records will be updated.

        If no existing records match, new records will be created.
      tags:
        - orgs
      operationId: orgs/set-cluster-deployment-records
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/orgs/artifact-metadata#set-cluster-deployment-records
      parameters:
        - $ref: '#/components/parameters/org'
        - name: cluster
          in: path
          description: The cluster name.
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: ^[a-zA-Z0-9._-]+$
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logical_environment:
                  type: string
                  description: The stage of the deployment.
                  minLength: 1
                  maxLength: 128
                physical_environment:
                  type: string
                  description: The physical region of the deployment.
                  maxLength: 128
                deployments:
                  type: array
                  description: The list of deployments to record.
                  maxItems: 1000
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: >
                          The name of the artifact. Note that if multiple
                          deployments have identical 'digest' parameter values,

                          the name parameter must also be identical across all
                          entries.
                        minLength: 1
                        maxLength: 256
                      digest:
                        type: string
                        description: >
                          The hex encoded digest of the artifact. Note that if
                          multiple deployments have identical 'digest' parameter
                          values,

                          the name and version parameters must also be identical
                          across all entries.
                        minLength: 71
                        maxLength: 71
                        pattern: ^sha256:[a-f0-9]{64}$
                      version:
                        type: string
                        description: >
                          The artifact version. Note that if multiple
                          deployments have identical 'digest' parameter values,

                          the version parameter must also be identical across
                          all entries.
                        maxLength: 100
                        x-multi-segment: true
                        example: 1.2.3
                      status:
                        type: string
                        description: The deployment status of the artifact.
                        default: deployed
                        enum:
                          - deployed
                          - decommissioned
                      deployment_name:
                        type: string
                        description: >
                          The unique identifier for the deployment represented
                          by the new record. To accommodate differing

                          containers and namespaces within a record set, the
                          following format is recommended:

                          {namespaceName}-{deploymentName}-{containerName}.

                          The deployment_name must be unique across all entries
                          in the deployments array.
                        minLength: 1
                        maxLength: 256
                      github_repository:
                        type: string
                        description: >-
                          The name of the GitHub repository associated with the
                          artifact. This should be used

                          when there are no provenance attestations available
                          for the artifact. The repository

                          must belong to the organization specified in the path
                          parameter.


                          If a provenance attestation is available for the
                          artifact, the API will use

                          the repository information from the attestation
                          instead of this parameter.
                        maxLength: 100
                        pattern: ^[A-Za-z0-9.\-_]+$
                        example: my-github-repo
                      tags:
                        type: object
                        description: Key-value pairs to tag the deployment record.
                        additionalProperties:
                          type: string
                      runtime_risks:
                        type: array
                        description: >-
                          A list of runtime risks associated with the
                          deployment.
                        maxItems: 4
                        uniqueItems: true
                        items:
                          type: string
                          enum:
                            - critical-resource
                            - internet-exposed
                            - lateral-movement
                            - sensitive-data
                    required:
                      - name
                      - deployment_name
                      - digest
                return_records:
                  type: boolean
                  default: true
                  description: >
                    If true, the endpoint will return the set records in the
                    response body
              required:
                - logical_environment
                - deployments
