          enum:
            - read
            - write
        organization_plan:
          type: string
          description: >-
            The level of permission to grant the access token for viewing an
            organization's plan.
          enum:
            - read
        organization_projects:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            organization projects and projects public preview (where available).
          enum:
            - read
            - write
            - admin
        organization_packages:
          type: string
          description: >-
            The level of permission to grant the access token for organization
            packages published to GitHub Packages.
          enum:
            - read
            - write
        organization_secrets:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            organization secrets.
          enum:
            - read
            - write
        organization_self_hosted_runners:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            GitHub Actions self-hosted runners available to an organization.
          enum:
            - read
            - write
        organization_user_blocking:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            users blocked by the organization.
          enum:
            - read
            - write
        email_addresses:
          type: string
          description: >-
            The level of permission to grant the access token to manage the
            email addresses belonging to a user.
          enum:
            - read
            - write
        followers:
          type: string
          description: >-
            The level of permission to grant the access token to manage the
            followers belonging to a user.
          enum:
            - read
            - write
        git_ssh_keys:
          type: string
          description: >-
            The level of permission to grant the access token to manage git SSH
            keys.
          enum:
            - read
            - write
        gpg_keys:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            GPG keys belonging to a user.
          enum:
            - read
            - write
        interaction_limits:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            interaction limits on a repository.
          enum:
            - read
            - write
        profile:
          type: string
          description: >-
            The level of permission to grant the access token to manage the
            profile settings belonging to a user.
          enum:
            - write
        starring:
          type: string
          description: >-
            The level of permission to grant the access token to list and manage
