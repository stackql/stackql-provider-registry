            The level of permission to grant the access token for packages
            published to GitHub Packages.
          enum:
            - read
            - write
        pages:
          type: string
          description: >-
            The level of permission to grant the access token to retrieve Pages
            statuses, configuration, and builds, as well as create new builds.
          enum:
            - read
            - write
        pull_requests:
          type: string
          description: >-
            The level of permission to grant the access token for pull requests
            and related comments, assignees, labels, milestones, and merges.
          enum:
            - read
            - write
        repository_custom_properties:
          type: string
          description: >-
            The level of permission to grant the access token to view and edit
            custom properties for a repository, when allowed by the property.
          enum:
            - read
            - write
        repository_hooks:
          type: string
          description: >-
            The level of permission to grant the access token to manage the
            post-receive hooks for a repository.
          enum:
            - read
            - write
        repository_projects:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            repository projects, columns, and cards.
          enum:
            - read
            - write
            - admin
        secret_scanning_alerts:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            secret scanning alerts.
          enum:
            - read
            - write
        secrets:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            repository secrets.
          enum:
            - read
            - write
        security_events:
          type: string
          description: >-
            The level of permission to grant the access token to view and manage
            security events like code scanning alerts.
          enum:
            - read
            - write
        single_file:
          type: string
          description: >-
            The level of permission to grant the access token to manage just a
            single file.
          enum:
            - read
            - write
        statuses:
          type: string
          description: >-
            The level of permission to grant the access token for commit
            statuses.
          enum:
            - read
            - write
        vulnerability_alerts:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            Dependabot alerts.
          enum:
            - read
            - write
        workflows:
