        default_value:
          nullable: true
          description: Default value of the property
          type: string
          items:
            type: string
        description:
          type: string
          nullable: true
          description: Short description of the property
        allowed_values:
          type: array
          items:
            type: string
          nullable: true
          description: |-
            An ordered list of the allowed values of the property.
            The property can have up to 200 allowed values.
        values_editable_by:
          type: string
          nullable: true
          enum:
            - org_actors
            - org_and_repo_actors
