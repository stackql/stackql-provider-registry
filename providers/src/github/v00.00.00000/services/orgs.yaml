          type: string
          description: >-
            The name given to the user's token. This field can also be found in
            an organization's settings page for Active Tokens.
        token_expired:
          type: boolean
          description: >-
            Whether the associated fine-grained personal access token has
            expired.
        token_expires_at:
          type: string
          nullable: true
          description: >-
            Date and time when the associated fine-grained personal access token
            expires.
        token_last_used_at:
          type: string
          nullable: true
          description: >-
            Date and time when the associated fine-grained personal access token
            was last used for authentication.
      required:
        - id
        - owner
        - repository_selection
        - repositories_url
        - permissions
        - access_granted_at
        - token_id
        - token_name
        - token_expired
        - token_expires_at
        - token_last_used_at
    custom-property:
