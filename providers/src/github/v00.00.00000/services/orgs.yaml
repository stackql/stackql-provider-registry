    app-permissions:
      title: App Permissions
      type: object
      description: The permissions granted to the user access token.
      properties:
        actions:
          type: string
          description: >-
            The level of permission to grant the access token for GitHub Actions
            workflows, workflow runs, and artifacts.
          enum:
            - read
            - write
        administration:
          type: string
          description: >-
            The level of permission to grant the access token for repository
            creation, deletion, settings, teams, and collaborators creation.
          enum:
            - read
            - write
        artifact_metadata:
          type: string
          description: >-
            The level of permission to grant the access token to create and
            retrieve build artifact metadata records.
          enum:
            - read
            - write
        attestations:
          type: string
          description: >-
            The level of permission to create and retrieve the access token for
            repository attestations.
          enum:
            - read
            - write
        checks:
          type: string
          description: >-
            The level of permission to grant the access token for checks on
            code.
          enum:
            - read
            - write
        codespaces:
          type: string
          description: >-
            The level of permission to grant the access token to create, edit,
            delete, and list Codespaces.
          enum:
            - read
            - write
        contents:
          type: string
          description: >-
            The level of permission to grant the access token for repository
            contents, commits, branches, downloads, releases, and merges.
          enum:
            - read
            - write
        dependabot_secrets:
          type: string
          description: >-
            The level of permission to grant the access token to manage
            Dependabot secrets.
          enum:
            - read
            - write
        deployments:
          type: string
          description: >-
            The level of permission to grant the access token for deployments
            and deployment statuses.
          enum:
            - read
            - write
        discussions:
          type: string
          description: >-
            The level of permission to grant the access token for discussions
            and related comments and labels.
          enum:
            - read
            - write
        environments:
          type: string
          description: >-
            The level of permission to grant the access token for managing
            repository environments.
          enum:
            - read
            - write
        issues:
          type: string
          description: >-
            The level of permission to grant the access token for issues and
            related comments, assignees, labels, and milestones.
          enum:
            - read
            - write
        merge_queues:
          type: string
          description: >-
            The level of permission to grant the access token to manage the
            merge queues for a repository.
          enum:
            - read
            - write
        metadata:
          type: string
          description: >-
            The level of permission to grant the access token to search
