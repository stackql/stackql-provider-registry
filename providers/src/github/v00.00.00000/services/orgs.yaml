      x-stackQL-resource: members
    post:
      summary: Create an organization invitation
      description: >-
        Invite people to an organization by using their GitHub user ID or their
        email address. In order to create invitations in an organization, the
        authenticated user must be an organization owner.


        This endpoint triggers
        [notifications](https://docs.github.com/github/managing-subscriptions-and-notifications-on-github/about-notifications).
        Creating content too quickly using this endpoint may result in secondary
        rate limiting. For more information, see "[Rate limits for the
        API](https://docs.github.com/rest/using-the-rest-api/rate-limits-for-the-rest-api#about-secondary-rate-limits)"

        and "[Best practices for using the REST
        API](https://docs.github.com/rest/guides/best-practices-for-using-the-rest-api)."
      tags:
        - orgs
      operationId: orgs/create-invitation
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/orgs/members#create-an-organization-invitation
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                invitee_id:
                  type: integer
                  description: >-
                    **Required unless you provide `email`**. GitHub user ID for
                    the person you are inviting.
                email:
                  type: string
                  description: >-
                    **Required unless you provide `invitee_id`**. Email address
                    of the person you are inviting, which can be an existing
                    GitHub user.
                role:
                  type: string
                  description: |-
                    The role for the new member. 
                     * `admin` - Organization owners with full administrative rights to the organization and complete access to all repositories and teams.  
                     * `direct_member` - Non-owner organization members with ability to see other members and join teams by invitation.  
                     * `billing_manager` - Non-owner organization members with ability to manage the billing settings of your organization. 
                     * `reinstate` - The previous role assigned to the invitee before they were removed from your organization. Can be one of the roles listed above. Only works if the invitee was previously part of your organization.
                  enum:
                    - admin
                    - direct_member
                    - billing_manager
                    - reinstate
                  default: direct_member
                team_ids:
                  type: array
                  description: Specify IDs for the teams you want to invite new members to.
                  items:
                    type: integer
            examples:
              default:
                value:
                  email: octocat@github.com
                  role: direct_member
                  team_ids:
                    - 12
                    - 26
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/organization-invitation'
              examples:
                default:
                  $ref: '#/components/examples/organization-invitation'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
