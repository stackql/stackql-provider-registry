                        data:
                          oneOf:
                            - type: object
                              description: A GitHub resource (pull request, issue, etc.)
                              required:
                                - id
                              properties:
                                id:
                                  type: integer
                                  format: int64
                                  description: GitHub resource ID
                                global_id:
                                  type: string
                                  description: GraphQL global ID
                            - type: object
                              description: A Git branch reference
                              required:
                                - head_ref
