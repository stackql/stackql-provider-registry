  /agents/repos/{owner}/{repo}/tasks/{task_id}:
    get:
      summary: Get a task by repo
      description: |
        > [!NOTE]
        > This endpoint is in public preview and is subject to change.

        Returns a task by ID scoped to an owner/repo path
      tags:
        - agent-tasks
      operationId: agent-tasks/get-task-by-repo-and-id
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/agent-tasks/agent-tasks#get-a-task-by-repo
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: agent-tasks
        subcategory: agent-tasks
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: The account owner of the repository. The name is not case sensitive.
        - name: repo
          in: path
          required: true
          schema:
            type: string
          description: The name of the repository. The name is not case sensitive.
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the task.
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                type: object
