          description: The name of the repository. The name is not case sensitive.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              properties:
                prompt:
                  type: string
                  description: The user's prompt for the agent
                model:
                  type: string
                  description: >-
                    The model to use for this task. The allowed models may
                    change over time and depend on the user's GitHub Copilot
                    plan and organization policies. Currently supported values:
                    `claude-sonnet-4.6`, `claude-opus-4.6`, `gpt-5.2-codex`,
                    `gpt-5.3-codex`, `gpt-5.4`, `claude-sonnet-4.5`,
                    `claude-opus-4.5`
                create_pull_request:
                  type: boolean
                  description: Whether to create a PR.
                  default: false
                base_ref:
                  type: string
                  description: Base ref for new branch/PR
            examples:
              default:
                value:
                  prompt: Fix the login button on the homepage
                  base_ref: main
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - state
                  - created_at
                properties:
