                        format: int64
                        description: The unique identifier of the user
                  creator_type:
                    type: string
                    description: Type of the task creator
                    enum:
                      - user
                      - organization
                  user_collaborators:
                    type: array
                    items:
                      type: object
                      description: A GitHub user
                      properties:
                        id:
                          type: integer
                          format: int64
                          description: The unique identifier of the user
                    description: User objects of collaborators on this task
                    deprecated: true
                  owner:
                    description: The owner of the repository
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                        description: The unique identifier of the user
                  repository:
                    description: The repository this task belongs to
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int64
                        description: The unique identifier of the repository
                  state:
                    type: string
                    description: >-
                      Current state of the task, derived from its most recent
                      session
                    enum:
                      - queued
                      - in_progress
                      - completed
                      - failed
                      - idle
                      - waiting_for_user
