openapi: 3.0.3
info:
  title: agent_tasks API
  description: github API
  version: 1.1.4
paths:
  /agents/repos/{owner}/{repo}/tasks:
    get:
      summary: List tasks for repository
      description: |
        > [!NOTE]
        > This endpoint is in public preview and is subject to change.

        Returns a list of tasks for a specific repository
      tags:
        - agent-tasks
      operationId: agent-tasks/list-tasks-for-repo
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/agent-tasks/agent-tasks#list-tasks-for-repository
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: agent-tasks
        subcategory: agent-tasks
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          description: The account owner of the repository. The name is not case sensitive.
        - name: repo
          in: path
          required: true
          schema:
            type: string
          description: The name of the repository. The name is not case sensitive.
        - name: per_page
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 100
          description: The number of results per page (max 100).
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: The page number of the results to fetch.
        - name: sort
          in: query
          schema:
            type: string
            default: updated_at
            enum:
              - updated_at
              - created_at
          description: The field to sort results by. Can be `updated_at` or `created_at`.
        - name: direction
          in: query
          schema:
            type: string
            default: desc
            enum:
              - asc
              - desc
          description: The direction to sort results. Can be `asc` or `desc`.
        - name: state
          in: query
          schema:
            type: string
          description: >-
            Comma-separated list of task states to filter by. Can be any
            combination of: `queued`, `in_progress`, `completed`, `failed`,
            `idle`, `waiting_for_user`, `timed_out`, `cancelled`.
        - name: is_archived
          in: query
          schema:
            type: boolean
            default: false
          description: >-
            Filter by archived status. When `true`, returns only archived tasks.
            When `false` or omitted, returns only non-archived tasks. Defaults
            to `false`.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Only show tasks updated at or after this time (ISO 8601 timestamp)
        - name: creator_id
          in: query
          schema:
            type: integer
          description: Filter tasks by creator user ID
      responses:
        '200':
          description: Tasks retrieved successfully
          headers:
            Link:
              description: >
                Pagination links. Contains rel="first" (always),

                rel="prev" (when current page > 1),

                rel="next" (when more pages exist), and rel="last" (when on the
                final page).
              schema:
                type: string
              example: >-
                <https://api.github.com/agents/repos/{owner}/{repo}/tasks?page=2&per_page=30>;
                rel="next",
                <https://api.github.com/agents/repos/{owner}/{repo}/tasks?page=1&per_page=30>;
                rel="first"
          content:
            application/json:
              schema:
                type: object
                required:
                  - tasks
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - state
                        - created_at
                      properties:
                        id:
                          type: string
                          description: Unique task identifier
                        url:
                          type: string
                          description: API URL for this task
                        html_url:
                          type: string
                          description: Web URL for this task
                        name:
                          type: string
                          description: Human-readable name derived from the task prompt
                        creator:
                          oneOf:
                            - type: object
                              description: A GitHub user
                              properties:
                                id:
                                  type: integer
                                  format: int64
                                  description: The unique identifier of the user
                          description: The entity who created this task
                        creator_type:
                          type: string
                          description: Type of the task creator
                          enum:
                            - user
                            - organization
                        user_collaborators:
                          type: array
                          items:
                            type: object
                            description: A GitHub user
                            properties:
                              id:
                                type: integer
                                format: int64
                                description: The unique identifier of the user
                          description: User objects of collaborators on this task
                          deprecated: true
                        owner:
                          description: The owner of the repository
                          type: object
                          properties:
                            id:
                              type: integer
                              format: int64
                              description: The unique identifier of the user
                        repository:
                          description: The repository this task belongs to
                          type: object
                          properties:
                            id:
                              type: integer
                              format: int64
                              description: The unique identifier of the repository
                        state:
                          type: string
                          description: >-
                            Current state of the task, derived from its most
                            recent session
                          enum:
                            - queued
                            - in_progress
                            - completed
                            - failed
                            - idle
                            - waiting_for_user
                            - timed_out
                            - cancelled
                        session_count:
                          type: integer
                          format: int32
                          description: Number of sessions in this task
                        artifacts:
                          type: array
                          items:
                            type: object
                            description: A resource generated by the task
                            required:
                              - provider
                              - type
                              - data
                            properties:
                              provider:
                                type: string
                                enum:
                                  - github
                                description: Provider namespace
                              type:
                                type: string
                                enum:
                                  - pull
                                  - branch
                                description: >
                                  Type of artifact. Available Values: `pull`,
                                  `branch`.
                              data:
                                oneOf:
                                  - type: object
                                    description: >-
                                      A GitHub resource (pull request, issue,
                                      etc.)
                                    required:
                                      - id
                                    properties:
                                      id:
                                        type: integer
                                        format: int64
                                        description: GitHub resource ID
                                      global_id:
                                        type: string
                                        description: GraphQL global ID
                                  - type: object
                                    description: A Git branch reference
                                    required:
                                      - head_ref
                                      - base_ref
                                    properties:
                                      head_ref:
                                        type: string
                                        description: Head branch name
                                      base_ref:
                                        type: string
                                        description: Base branch name
                                description: Resource data (shape depends on type)
                          description: Resources created by this task (PRs, branches, etc.)
                        archived_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: >-
                            Timestamp when the task was archived, null if not
                            archived
                        updated_at:
                          type: string
                          format: date-time
                          description: Timestamp of the most recent update
                        created_at:
                          type: string
                          format: date-time
                          description: Timestamp when the task was created
                    description: List of tasks
                  total_active_count:
                    type: integer
                    format: int32
                    description: Total count of active (non-archived) tasks
                  total_archived_count:
                    type: integer
                    format: int32
                    description: Total count of archived tasks
              examples:
                default:
                  value:
                    tasks:
                      - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        url: >-
                          https://api.github.com/agents/repos/octocat/hello-world/tasks/a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        html_url: >-
                          https://github.com/octocat/hello-world/copilot/tasks/a1b2c3d4-e5f6-7890-abcd-ef1234567890
                        name: Fix the login button on the homepage
                        creator:
                          id: 1
                        creator_type: user
                        owner:
                          id: 1
                        repository:
                          id: 1296269
                        state: completed
                        session_count: 1
                        artifacts:
                          - provider: github
                            type: pull
                            data:
                              id: 42
                        archived_at: null
                        created_at: '2025-01-01T00:00:00Z'
                        updated_at: '2025-01-01T01:00:00Z'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Structured error response following GitHub REST API
                  conventions.

                  For 422 Unprocessable Entity the errors array contains
