openapi: 3.0.3
info:
  title: copilot API
  description: Endpoints to manage Copilot using the REST API.
  version: 1.1.4
paths:
  /enterprises/{enterprise}/copilot/metrics/reports/enterprise-1-day:
    get:
      summary: Get Copilot enterprise usage metrics for a specific day
      description: >-
        Use this endpoint to retrieve download links for the Copilot enterprise
        usage metrics report for a specific day. The report provides
        comprehensive usage data for Copilot features across the enterprise.


        The report contains aggregated metrics for the specified day, including
        usage statistics for various Copilot features, user engagement data, and
        feature adoption metrics. Reports are generated daily and made available
        for download through signed URLs with a limited expiration time.


        The response includes download links to the report files, along with the
        specific date of the report. The report covers a complete day for which
        data has been processed. Reports are available starting from October 10,
        2025, and historical data can be accessed for up to 1 year from the
        current date.


        Enterprise owners, billing managers, and authorized users with
        fine-grained "View Enterprise Copilot Metrics" permission can retrieve
        Copilot metrics reports for the enterprise. OAuth app tokens and
        personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:enterprise` scopes to use this
        endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-enterprise-one-day-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-enterprise-usage-metrics-for-a-specific-day
      parameters:
        - $ref: '#/components/parameters/enterprise'
        - $ref: '#/components/parameters/day'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-1-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-1-day-report'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /enterprises/{enterprise}/copilot/metrics/reports/enterprise-28-day/latest:
    get:
      summary: Get Copilot enterprise usage metrics
      description: >-
        Use this endpoint to retrieve download links for the latest 28-day
        enterprise Copilot usage metrics report. The report provides
        comprehensive usage data for Copilot features across the enterprise.


        The report contains aggregated metrics for the previous 28 days,
        including usage statistics for various Copilot features, user engagement
        data, and feature adoption metrics. Reports are generated daily and made
        available for download through signed URLs with a limited expiration
        time.


        The response includes download links to the report files, along with the
        specific date range covered by the report. The report covers a complete
        28-day period ending on the most recent day for which data has been
        processed.


        Enterprise owners, billing managers, and authorized users with
        fine-grained "View Enterprise Copilot Metrics" permission can retrieve
        Copilot metrics reports for the enterprise. OAuth app tokens and
        personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:enterprise` scopes to use this
        endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-enterprise-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-enterprise-usage-metrics
      parameters:
        - $ref: '#/components/parameters/enterprise'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-28-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-28-day-report'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /enterprises/{enterprise}/copilot/metrics/reports/users-1-day:
    get:
      summary: Get Copilot users usage metrics for a specific day
      description: >-
        Use this endpoint to retrieve download links for the Copilot user usage
        metrics report for a specific day. The report provides detailed
        user-level usage data and engagement metrics for Copilot features across
        the enterprise.


        The report contains user-specific metrics for the specified day,
        including individual user engagement statistics, feature usage patterns,
        and adoption metrics broken down by user. This report allows authorized
        users to analyze Copilot usage at the user level to understand adoption
        patterns and identify opportunities for increased engagement.


        Reports are generated daily and made available for download through
        signed URLs with a limited expiration time. The response includes
        download links to the report files, along with the specific date of the
        report. The report covers a complete day for which data has been
        processed. Reports are available starting from October 10, 2025, and
        historical data can be accessed for up to 1 year from the current date.


        Enterprise owners, billing managers, and authorized users with
        fine-grained "View Enterprise Copilot Metrics" permission can retrieve
        Copilot metrics reports for the enterprise. OAuth app tokens and
        personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:enterprise` scopes to use this
        endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-users-one-day-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-users-usage-metrics-for-a-specific-day
      parameters:
        - $ref: '#/components/parameters/enterprise'
        - $ref: '#/components/parameters/day'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-1-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-1-day-report'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /enterprises/{enterprise}/copilot/metrics/reports/users-28-day/latest:
    get:
      summary: Get Copilot users usage metrics
      description: >-
        Use this endpoint to retrieve download links for the latest 28-day
        enterprise users Copilot usage metrics report. The report provides
        detailed user-level usage data and engagement metrics for Copilot
        features across the enterprise.


        The report contains user-specific metrics for the previous 28 days,
        including individual user engagement statistics, feature usage patterns,
        and adoption metrics broken down by user. This report allows authorized
        users to analyze Copilot usage at the user level to understand adoption
        patterns and identify opportunities for increased engagement.


        Reports are generated daily and made available for download through
        signed URLs with a limited expiration time. The response includes
        download links to the report files, along with the specific date range
        covered by the report. The report covers a complete 28-day period ending
        on the most recent day for which data has been processed.


        Enterprise owners, billing managers, and authorized users with
        fine-grained "View Enterprise Copilot Metrics" permission can retrieve
        Copilot metrics reports for the enterprise. OAuth app tokens and
        personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:enterprise` scopes to use this
        endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-users-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-users-usage-metrics
      parameters:
        - $ref: '#/components/parameters/enterprise'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-28-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-28-day-report'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /orgs/{org}/copilot/billing:
    get:
      summary: Get Copilot seat information and settings for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Gets information about an organization's Copilot subscription, including
        seat breakdown

        and feature policies. To configure these settings, go to your
        organization's settings on GitHub.com.

        For more information, see "[Managing policies for Copilot in your
        organization](https://docs.github.com/copilot/managing-copilot/managing-policies-for-copilot-business-in-your-organization)."


        Only organization owners can view details about the organization's
        Copilot Business or Copilot Enterprise subscription.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/get-copilot-organization-details
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#get-copilot-seat-information-and-settings-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-organization-details'
              examples:
                default:
                  $ref: '#/components/examples/copilot-organization-details'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: There is a problem with your account's associated payment method.
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
  /orgs/{org}/copilot/billing/seats:
    get:
      summary: List all Copilot seat assignments for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Lists all Copilot seats for which an organization with a Copilot
        Business or Copilot Enterprise subscription is currently being billed.

        Only organization owners can view assigned seats.


        Each seat object contains information about the assigned user's most
        recent Copilot activity. Users must have telemetry enabled in their IDE
        for Copilot in the IDE activity to be reflected in `last_activity_at`.

        For more information about activity data, see [Metrics data properties
        for GitHub
        Copilot](https://docs.github.com/copilot/reference/metrics-data).


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/list-copilot-seats
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#list-all-copilot-seat-assignments-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/page'
        - name: per_page
          description: >-
            The number of results per page (max 100). For more information, see
            "[Using pagination in the REST
            API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_seats:
                    type: integer
                    description: >-
                      Total number of Copilot seats for the organization
                      currently being billed.
                  seats:
                    type: array
                    items:
                      $ref: '#/components/schemas/copilot-seat-details'
              examples:
                default:
                  $ref: '#/components/examples/copilot-seats-list'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
  /orgs/{org}/copilot/billing/selected_teams:
    post:
      summary: Add teams to the Copilot subscription for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Purchases a GitHub Copilot seat for all users within each specified
        team.

        The organization will be billed for each seat based on the
        organization's Copilot plan. For more information about Copilot pricing,
        see "[About billing for GitHub Copilot in your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-the-copilot-subscription-for-your-organization/about-billing-for-github-copilot-in-your-organization)."


        Only organization owners can purchase Copilot seats for their
        organization members. The organization must have a Copilot Business or
        Copilot Enterprise subscription and a configured suggestion matching
        policy.

        For more information about setting up a Copilot subscription, see
        "[Subscribing to Copilot for your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-the-copilot-subscription-for-your-organization/subscribing-to-copilot-for-your-organization)."

        For more information about setting a suggestion matching policy, see
        "[Managing policies for Copilot in your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/setting-policies-for-copilot-in-your-organization/managing-policies-for-copilot-in-your-organization#policies-for-suggestion-matching)."


        The response contains the total number of new seats that were created
        and existing seats that were refreshed.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `admin:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/add-copilot-seats-for-teams
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#add-teams-to-the-copilot-subscription-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_teams:
                  type: array
                  description: >-
                    List of team names within the organization to which to grant
                    access to GitHub Copilot.
                  items:
                    type: string
                  minItems: 1
              required:
                - selected_teams
            examples:
              default:
                value:
                  selected_teams:
                    - engteam1
                    - engteam2
                    - engteam3
        required: true
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >-
                  The total number of seats created for members of the specified
                  team(s).
                properties:
                  seats_created:
                    type: integer
                required:
                  - seats_created
              examples:
                default:
                  value:
                    seats_created: 5
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: >-
            Copilot Business or Enterprise is not enabled for this organization,
            billing has not been set up for this organization, a public code
            suggestions policy has not been set for this organization, or the
            organization's Copilot access setting is set to enable Copilot for
            all users or is unconfigured.
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
    delete:
      summary: Remove teams from the Copilot subscription for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Sets seats for all members of each team specified to "pending
        cancellation".

        This will cause the members of the specified team(s) to lose access to
        GitHub Copilot at the end of the current billing cycle unless they
        retain access through another team.

        For more information about disabling access to Copilot, see "[Revoking
        access to Copilot for members of your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-access-to-github-copilot-in-your-organization/revoking-access-to-copilot-for-members-of-your-organization)."


        Only organization owners can cancel Copilot seats for their organization
        members.


        The response contains the total number of seats set to "pending
        cancellation".


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `admin:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/cancel-copilot-seat-assignment-for-teams
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#remove-teams-from-the-copilot-subscription-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_teams:
                  type: array
                  description: >-
                    The names of teams from which to revoke access to GitHub
                    Copilot.
                  items:
                    type: string
                  minItems: 1
              required:
                - selected_teams
            examples:
              default:
                value:
                  selected_teams:
                    - engteam1
                    - engteam2
                    - engteam3
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >-
                  The total number of seats set to "pending cancellation" for
                  members of the specified team(s).
                properties:
                  seats_cancelled:
                    type: integer
                required:
                  - seats_cancelled
              examples:
                default:
                  value:
                    seats_cancelled: 5
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: >-
            Copilot Business or Enterprise is not enabled for this organization,
            billing has not been set up for this organization, a public code
            suggestions policy has not been set for this organization, or the
            organization's Copilot access setting is set to enable Copilot for
            all users or is unconfigured.
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
  /orgs/{org}/copilot/billing/selected_users:
    post:
      summary: Add users to the Copilot subscription for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Purchases a GitHub Copilot seat for each user specified.

        The organization will be billed for each seat based on the
        organization's Copilot plan. For more information about Copilot pricing,
        see "[About billing for GitHub Copilot in your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-the-copilot-subscription-for-your-organization/about-billing-for-github-copilot-in-your-organization)."


        Only organization owners can purchase Copilot seats for their
        organization members. The organization must have a Copilot Business or
        Copilot Enterprise subscription and a configured suggestion matching
        policy.

        For more information about setting up a Copilot subscription, see
        "[Subscribing to Copilot for your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-the-copilot-subscription-for-your-organization/subscribing-to-copilot-for-your-organization)."

        For more information about setting a suggestion matching policy, see
        "[Managing policies for Copilot in your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/setting-policies-for-copilot-in-your-organization/managing-policies-for-copilot-in-your-organization#policies-for-suggestion-matching)."


        The response contains the total number of new seats that were created
        and existing seats that were refreshed.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `admin:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/add-copilot-seats-for-users
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#add-users-to-the-copilot-subscription-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_usernames:
                  type: array
                  description: >-
                    The usernames of the organization members to be granted
                    access to GitHub Copilot.
                  items:
                    type: string
                  minItems: 1
              required:
                - selected_usernames
            examples:
              default:
                value:
                  selected_usernames:
                    - cooluser1
                    - hacker2
                    - octocat
        required: true
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: The total number of seats created for the specified user(s).
                properties:
                  seats_created:
                    type: integer
                required:
                  - seats_created
              examples:
                default:
                  value:
                    seats_created: 5
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: >-
            Copilot Business or Enterprise is not enabled for this organization,
            billing has not been set up for this organization, a public code
            suggestions policy has not been set for this organization, or the
            organization's Copilot access setting is set to enable Copilot for
            all users or is unconfigured.
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
    delete:
      summary: Remove users from the Copilot subscription for an organization
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Sets seats for all users specified to "pending cancellation".

        This will cause the specified users to lose access to GitHub Copilot at
        the end of the current billing cycle unless they retain access through
        team membership.

        For more information about disabling access to Copilot, see "[Revoking
        access to Copilot for members of your
        organization](https://docs.github.com/copilot/managing-copilot/managing-github-copilot-in-your-organization/managing-access-to-github-copilot-in-your-organization/revoking-access-to-copilot-for-members-of-your-organization)."


        Only organization owners can cancel Copilot seats for their organization
        members.


        The response contains the total number of seats set to "pending
        cancellation".


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `admin:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/cancel-copilot-seat-assignment-for-users
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#remove-users-from-the-copilot-subscription-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_usernames:
                  type: array
                  description: >-
                    The usernames of the organization members for which to
                    revoke access to GitHub Copilot.
                  items:
                    type: string
                  minItems: 1
              required:
                - selected_usernames
            examples:
              default:
                value:
                  selected_usernames:
                    - cooluser1
                    - hacker2
                    - octocat
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: >-
                  The total number of seats set to "pending cancellation" for
                  the specified users.
                properties:
                  seats_cancelled:
                    type: integer
                required:
                  - seats_cancelled
              examples:
                default:
                  value:
                    seats_cancelled: 5
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
