        models:
          type: array
          description: List of model metrics for a custom models and the default model.
          items:
            type: object
            properties:
              name:
                type: string
                description: >-
                  Name of the model used for Copilot Chat. If the default model
                  is used will appear as 'default'.
              is_custom_model:
                type: boolean
                description: Indicates whether a model is custom or default.
              custom_model_training_date:
                type: string
                description: The training date for the custom model (if applicable).
                nullable: true
              total_engaged_users:
                type: integer
                description: >-
                  Total number of users who prompted Copilot Chat on github.com
                  at least once for each model.
              total_chats:
                type: integer
                description: Total number of chats initiated by users on github.com.
