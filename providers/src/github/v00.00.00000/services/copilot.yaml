  /orgs/{org}/copilot/metrics:
    get:
      summary: Get Copilot metrics for an organization
      description: >-
        Use this endpoint to see a breakdown of aggregated metrics for various
        GitHub Copilot features. See the response schema tab for detailed
        metrics definitions.


        > [!NOTE]

        > This endpoint will only return results for a given day if the
        organization contained **five or more members with active Copilot
        licenses** on that day, as evaluated at the end of that day.


        The response contains metrics for up to 100 days prior. Metrics are
        processed once per day for the previous day,

        and the response will only include data up until yesterday. In order for
        an end user to be counted towards these metrics,

        they must have telemetry enabled in their IDE.


        To access this endpoint, the Copilot Metrics API access policy must be
        enabled for the organization.

        Only organization owners and owners and billing managers of the parent
        enterprise can view Copilot metrics.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot`, `read:org`, or `read:enterprise` scopes to use
        this endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-metrics-for-organization
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-metrics#get-copilot-metrics-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
        - name: since
          description: >-
            Show usage metrics since this date. This is a timestamp in [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) format
            (`YYYY-MM-DDTHH:MM:SSZ`). Maximum value is 100 days ago.
          in: query
          required: false
          schema:
            type: string
        - name: until
          description: >-
            Show usage metrics until this date. This is a timestamp in [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) format
            (`YYYY-MM-DDTHH:MM:SSZ`) and should not preceed the `since` date if
            it is passed.
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - name: per_page
          description: >-
            The number of days of metrics to display per page (max 100). For
            more information, see "[Using pagination in the REST
            API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/copilot-usage-metrics-day'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-for-day'
