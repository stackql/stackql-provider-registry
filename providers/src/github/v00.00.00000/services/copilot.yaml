        Organization Copilot Metrics" permission can retrieve Copilot metrics
        reports for the organization. OAuth app tokens and personal access
        tokens (classic) need the `read:org` scope to use this endpoint.


        For more information about organization metrics attribution, see [How
        are metrics attributed across
        organizations](https://docs.github.com/copilot/concepts/copilot-metrics#how-are-metrics-attributed-across-organizations).
      tags:
        - copilot
      operationId: copilot/copilot-organization-users-one-day-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-organization-users-usage-metrics-for-a-specific-day
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/day'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-1-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-1-day-report'
        '204':
          $ref: '#/components/responses/no_content'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /orgs/{org}/copilot/metrics/reports/users-28-day/latest:
    get:
      summary: Get Copilot organization users usage metrics
      description: >-
        Use this endpoint to retrieve download links for the latest 28-day
        organization users Copilot usage metrics report. The report provides
        detailed user-level usage data and engagement metrics for Copilot
        features across the organization.


        The report contains user-specific metrics for the previous 28 days,
        including individual user engagement statistics, feature usage patterns,
        and adoption metrics broken down by user. This report allows authorized
        users to analyze Copilot usage at the user level to understand adoption
        patterns and identify opportunities for increased engagement.


        Reports are generated daily and made available for download through
        signed URLs with a limited expiration time. The response includes
        download links to the report files, along with the specific date range
        covered by the report. The report covers a complete 28-day period ending
        on the most recent day for which data has been processed.


        Organization owners and authorized users with fine-grained "View
        Organization Copilot Metrics" permission can retrieve Copilot metrics
        reports for the organization. OAuth app tokens and personal access
        tokens (classic) need the `read:org` scope to use this endpoint.


        For more information about organization metrics attribution, see [How
        are metrics attributed across
        organizations](https://docs.github.com/copilot/concepts/copilot-metrics#how-are-metrics-attributed-across-organizations).
      tags:
        - copilot
      operationId: copilot/copilot-organization-users-usage-metrics
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-usage-metrics#get-copilot-organization-users-usage-metrics
      parameters:
        - $ref: '#/components/parameters/org'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-usage-metrics-28-day-report'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-28-day-report'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-usage-metrics
      x-stackQL-resource: copilot_usage_metrics
  /orgs/{org}/members/{username}/copilot:
    get:
      summary: Get Copilot seat assignment details for a user
      description: >-
        > [!NOTE]

        > This endpoint is in public preview and is subject to change.


        Gets the GitHub Copilot seat details for a member of an organization who
        currently has access to GitHub Copilot.


        The seat object contains information about the user's most recent
        Copilot activity. Users must have telemetry enabled in their IDE for
        Copilot in the IDE activity to be reflected in `last_activity_at`.

        For more information about activity data, see [Metrics data properties
        for GitHub
        Copilot](https://docs.github.com/copilot/reference/metrics-data).


        Only organization owners can view Copilot seat assignment details for
        members of their organization.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot` or `read:org` scopes to use this endpoint.
      tags:
        - copilot
      operationId: copilot/get-copilot-seat-details-for-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-user-management#get-copilot-seat-assignment-details-for-a-user
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/username'
      responses:
        '200':
          description: The user's GitHub Copilot seat details, including usage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/copilot-seat-details'
              examples:
                default:
                  $ref: '#/components/examples/copilot-seat-detail-active'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: >-
            Copilot Business or Enterprise is not enabled for this organization
            or the user has a pending organization invitation.
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-user-management
      x-stackQL-resource: copilot_user_management
  /orgs/{org}/team/{team_slug}/copilot/metrics:
    get:
      summary: Get Copilot metrics for a team
      description: >-
        Use this endpoint to see a breakdown of aggregated metrics for various
        GitHub Copilot features. See the response schema tab for detailed
        metrics definitions.


        > [!NOTE]

        > This endpoint will only return results for a given day if the team had
        **five or more members with active Copilot licenses** on that day, as
        evaluated at the end of that day.


        The response contains metrics for up to 100 days prior. Metrics are
        processed once per day for the previous day,

        and the response will only include data up until yesterday. In order for
        an end user to be counted towards these metrics,

        they must have telemetry enabled in their IDE.


        To access this endpoint, the Copilot Metrics API access policy must be
        enabled for the organization containing the team within GitHub settings.

        Only organization owners for the organization that contains this team
        and owners and billing managers of the parent enterprise can view
        Copilot metrics for a team.


        OAuth app tokens and personal access tokens (classic) need either the
        `manage_billing:copilot`, `read:org`, or `read:enterprise` scopes to use
        this endpoint.
      tags:
        - copilot
      operationId: copilot/copilot-metrics-for-team
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/copilot/copilot-metrics#get-copilot-metrics-for-a-team
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - name: since
          description: >-
            Show usage metrics since this date. This is a timestamp in [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) format
            (`YYYY-MM-DDTHH:MM:SSZ`). Maximum value is 100 days ago.
          in: query
          required: false
          schema:
            type: string
        - name: until
          description: >-
            Show usage metrics until this date. This is a timestamp in [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) format
            (`YYYY-MM-DDTHH:MM:SSZ`) and should not preceed the `since` date if
            it is passed.
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - name: per_page
          description: >-
            The number of days of metrics to display per page (max 100). For
            more information, see "[Using pagination in the REST
            API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/copilot-usage-metrics-day'
              examples:
                default:
                  $ref: '#/components/examples/copilot-usage-metrics-for-day'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/usage_metrics_api_disabled'
        '500':
          $ref: '#/components/responses/internal_error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: copilot
        subcategory: copilot-metrics
      x-stackQL-resource: copilot_metrics
components:
  schemas:
    copilot-usage-metrics-1-day-report:
      type: object
      title: Copilot Metrics 1 Day Report
      description: >-
        Links to download the Copilot usage metrics report for an
        enterprise/organization for a specific day.
      properties:
        download_links:
          type: array
          items:
            type: string
            format: uri
          description: >-
            The URLs to download the Copilot usage metrics report for the
            enterprise/organization for the specified day.
        report_day:
          type: string
          format: date
          description: The day of the report in `YYYY-MM-DD` format.
      required:
        - download_links
        - report_day
    copilot-usage-metrics-28-day-report:
      type: object
      title: Copilot Metrics 28 Day Report
      description: >-
        Links to download the latest Copilot usage metrics report for an
        enterprise/organization.
      properties:
        download_links:
          type: array
          items:
            type: string
            format: uri
          description: >-
            The URLs to download the latest Copilot usage metrics report for the
            enterprise/organization.
        report_start_day:
          type: string
          format: date
          description: The start date of the report period in `YYYY-MM-DD` format.
        report_end_day:
          type: string
          format: date
          description: The end date of the report period in `YYYY-MM-DD` format.
      required:
        - download_links
        - report_start_day
        - report_end_day
    copilot-organization-details:
      title: Copilot Organization Details
      description: >-
        Information about the seat breakdown and policies set for an
        organization with a Copilot Business or Copilot Enterprise subscription.
      type: object
      properties:
        seat_breakdown:
          $ref: '#/components/schemas/copilot-organization-seat-breakdown'
        public_code_suggestions:
          type: string
          description: >-
            The organization policy for allowing or blocking suggestions
            matching public code (duplication detection filter).
          enum:
            - allow
            - block
            - unconfigured
        ide_chat:
          type: string
          description: >-
            The organization policy for allowing or disallowing Copilot Chat in
            the IDE.
          enum:
            - enabled
            - disabled
            - unconfigured
        platform_chat:
          type: string
          description: >-
            The organization policy for allowing or disallowing Copilot features
            on GitHub.com.
          enum:
            - enabled
            - disabled
            - unconfigured
        cli:
          type: string
          description: The organization policy for allowing or disallowing Copilot CLI.
          enum:
            - enabled
            - disabled
            - unconfigured
        seat_management_setting:
          type: string
          description: The mode of assigning new seats.
          enum:
            - assign_all
            - assign_selected
            - disabled
            - unconfigured
        plan_type:
          type: string
          description: >-
            The Copilot plan of the organization, or the parent enterprise, when
            applicable.
          enum:
            - business
            - enterprise
      required:
        - seat_breakdown
        - public_code_suggestions
        - seat_management_setting
      additionalProperties: true
    copilot-seat-details:
      title: Copilot Business Seat Detail
      description: >-
        Information about a Copilot Business seat assignment for a user, team,
        or organization.
      type: object
      properties:
        assignee:
          $ref: '#/components/schemas/nullable-simple-user'
        organization:
          $ref: '#/components/schemas/nullable-organization-simple'
        assigning_team:
          description: >-
            The team through which the assignee is granted access to GitHub
            Copilot, if applicable.
          nullable: true
          title: Team
          type: object
          properties:
            id:
              type: integer
            node_id:
              type: string
            name:
              type: string
            slug:
              type: string
            description:
              type: string
              nullable: true
            privacy:
              type: string
            notification_setting:
              type: string
            permission:
              type: string
            permissions:
              type: object
              properties:
                pull:
                  type: boolean
                triage:
                  type: boolean
                push:
                  type: boolean
                maintain:
                  type: boolean
                admin:
                  type: boolean
              required:
                - pull
                - triage
                - push
                - maintain
                - admin
            url:
              type: string
              format: uri
            html_url:
              type: string
              format: uri
              example: https://github.com/orgs/rails/teams/core
            members_url:
              type: string
            repositories_url:
              type: string
              format: uri
            type:
              description: The ownership type of the team
              type: string
              enum:
                - enterprise
                - organization
            organization_id:
              type: integer
              description: Unique identifier of the organization to which this team belongs
              example: 37
            enterprise_id:
              type: integer
              description: Unique identifier of the enterprise to which this team belongs
              example: 42
            parent:
              $ref: '#/components/schemas/nullable-team-simple'
            sync_to_organizations:
              type: string
              description: >-
                Retired: this field will not be returned with GHEC enterprise
                teams.
              example: disabled | all
            organization_selection_type:
              type: string
              example: disabled | selected | all
            group_id:
              nullable: true
              type: string
              example: 62ab9291-fae2-468e-974b-7e45096d5021
            group_name:
              nullable: true
              type: string
              description: >-
                Retired: this field will not be returned with GHEC enterprise
                teams.
              example: Justice League
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required:
            - id
            - node_id
            - url
            - members_url
            - name
            - description
            - permission
            - html_url
            - repositories_url
            - slug
            - parent
            - type
            - created_at
            - updated_at
            - group_id
        pending_cancellation_date:
          type: string
          format: date
          nullable: true
          description: >-
            The pending cancellation date for the seat, in `YYYY-MM-DD` format.
            This will be null unless the assignee's Copilot access has been
            canceled during the current billing cycle. If the seat has been
            cancelled, this corresponds to the start of the organization's next
            billing cycle.
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Timestamp of user's last GitHub Copilot activity, in ISO 8601
            format.
        last_activity_editor:
          type: string
          nullable: true
          description: >-
            Last editor that was used by the user for a GitHub Copilot
            completion.
        last_authenticated_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            Timestamp of the last time the user authenticated with GitHub
            Copilot, in ISO 8601 format.
        created_at:
          type: string
          format: date-time
          description: >-
            Timestamp of when the assignee was last granted access to GitHub
            Copilot, in ISO 8601 format.
        updated_at:
          type: string
          format: date-time
          deprecated: true
          description: >-
            **Closing down notice:** This field is no longer relevant and is
            closing down. Use the `created_at` field to determine when the
            assignee was last granted access to GitHub Copilot. Timestamp of
            when the assignee's GitHub Copilot access was last updated, in ISO
            8601 format.
        plan_type:
          type: string
          description: >-
            The Copilot plan of the organization, or the parent enterprise, when
            applicable.
          enum:
            - business
            - enterprise
            - unknown
      required:
        - created_at
      additionalProperties: false
