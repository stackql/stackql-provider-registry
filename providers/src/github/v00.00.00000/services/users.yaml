openapi: 3.0.3
info:
  title: users API
  description: Interact with and view information about users and also current user.
  version: 1.1.4
paths:
  /user:
    get:
      summary: Get the authenticated user
      description: >-
        OAuth app tokens and personal access tokens (classic) need the `user`
        scope in order for the response to include private profile information.
      tags:
        - users
      operationId: users/get-authenticated
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/users#get-the-authenticated-user
      parameters: []
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                discriminator:
                  propertyName: user_view_type
                  mapping:
                    public: '#/components/schemas/public-user'
                    private: '#/components/schemas/private-user'
                title: Private User
                description: Private User
                type: object
                properties:
                  login:
                    type: string
                    example: octocat
                  id:
                    type: integer
                    format: int64
                    example: 1
                  user_view_type:
                    type: string
                  node_id:
                    type: string
                    example: MDQ6VXNlcjE=
                  avatar_url:
                    type: string
                    format: uri
                    example: https://github.com/images/error/octocat_happy.gif
                  gravatar_id:
                    type: string
                    example: 41d064eb2195891e12d0413f63227ea7
                    nullable: true
                  url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat
                  html_url:
                    type: string
                    format: uri
                    example: https://github.com/octocat
                  followers_url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat/followers
                  following_url:
                    type: string
                    example: >-
                      https://api.github.com/users/octocat/following{/other_user}
                  gists_url:
                    type: string
                    example: https://api.github.com/users/octocat/gists{/gist_id}
                  starred_url:
                    type: string
                    example: >-
                      https://api.github.com/users/octocat/starred{/owner}{/repo}
                  subscriptions_url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat/subscriptions
                  organizations_url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat/orgs
                  repos_url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat/repos
                  events_url:
                    type: string
                    example: https://api.github.com/users/octocat/events{/privacy}
                  received_events_url:
                    type: string
                    format: uri
                    example: https://api.github.com/users/octocat/received_events
                  type:
                    type: string
                    example: User
                  site_admin:
                    type: boolean
                  name:
                    type: string
                    example: monalisa octocat
                    nullable: true
                  company:
                    type: string
                    example: GitHub
                    nullable: true
                  blog:
                    type: string
                    example: https://github.com/blog
                    nullable: true
                  location:
                    type: string
                    example: San Francisco
                    nullable: true
                  email:
                    type: string
                    format: email
                    example: octocat@github.com
                    nullable: true
                  notification_email:
                    type: string
                    format: email
                    example: octocat@github.com
                    nullable: true
                  hireable:
                    type: boolean
                    nullable: true
                  bio:
                    type: string
                    example: There once was...
                    nullable: true
                  twitter_username:
                    type: string
                    example: monalisa
                    nullable: true
                  public_repos:
                    type: integer
                    example: 2
                  public_gists:
                    type: integer
                    example: 1
                  followers:
                    type: integer
                    example: 20
                  following:
                    type: integer
                    example: 0
                  created_at:
                    type: string
                    format: date-time
                    example: '2008-01-14T04:33:35Z'
                  updated_at:
                    type: string
                    format: date-time
                    example: '2008-01-14T04:33:35Z'
                  private_gists:
                    type: integer
                    example: 81
                  total_private_repos:
                    type: integer
                    example: 100
                  owned_private_repos:
                    type: integer
                    example: 100
                  disk_usage:
                    type: integer
                    example: 10000
                  collaborators:
                    type: integer
                    example: 8
                  two_factor_authentication:
                    type: boolean
                    example: true
                  plan:
                    type: object
                    properties:
                      collaborators:
                        type: integer
                      name:
                        type: string
                      space:
                        type: integer
                      private_repos:
                        type: integer
                    required:
                      - collaborators
                      - name
                      - space
                      - private_repos
                  business_plus:
                    type: boolean
                  ldap_dn:
                    type: string
                required:
                  - avatar_url
                  - events_url
                  - followers_url
                  - following_url
                  - gists_url
                  - gravatar_id
                  - html_url
                  - id
                  - node_id
                  - login
                  - organizations_url
                  - received_events_url
                  - repos_url
                  - site_admin
                  - starred_url
                  - subscriptions_url
                  - type
                  - url
                  - bio
                  - blog
                  - company
                  - email
                  - followers
                  - following
                  - hireable
                  - location
                  - name
                  - public_gists
                  - public_repos
                  - created_at
                  - updated_at
                  - collaborators
                  - disk_usage
                  - owned_private_repos
                  - private_gists
                  - total_private_repos
                  - two_factor_authentication
                additionalProperties: false
              examples:
                response-with-public-and-private-profile-information:
                  $ref: >-
                    #/components/examples/private-user-response-with-public-and-private-profile-information
                response-with-public-profile-information:
                  $ref: >-
                    #/components/examples/private-user-response-with-public-profile-information
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: users
      x-stackQL-resource: users
    patch:
      summary: Update the authenticated user
      description: >-
        **Note:** If your email is set to private and you send an `email`
        parameter as part of this request to update your profile, your privacy
        settings are still enforced: the email address will not be displayed on
        your public profile or via the API.
      tags:
        - users
      operationId: users/update-authenticated
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/users#update-the-authenticated-user
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: The new name of the user.
                  type: string
                  example: Omar Jahandar
                email:
                  description: The publicly visible email address of the user.
                  type: string
                  example: omar@example.com
                blog:
                  description: The new blog URL of the user.
                  type: string
                  example: blog.example.com
                twitter_username:
                  description: The new Twitter username of the user.
                  type: string
                  example: therealomarj
                  nullable: true
                company:
                  description: The new company of the user.
                  type: string
                  example: Acme corporation
                location:
                  description: The new location of the user.
                  type: string
                  example: Berlin, Germany
                hireable:
                  description: The new hiring availability of the user.
                  type: boolean
                bio:
                  description: The new short biography of the user.
                  type: string
            examples:
              default:
                summary: Example of updating blog and name
                value:
                  blog: https://github.com/blog
                  name: monalisa octocat
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/private-user'
              examples:
                default:
                  $ref: '#/components/examples/private-user'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: users
      x-stackQL-resource: users
  /user/blocks:
    get:
      summary: List users blocked by the authenticated user
      description: List the users you've blocked on your personal account.
      tags:
        - users
      operationId: users/list-blocked-by-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/blocking#list-users-blocked-by-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default:
                  $ref: '#/components/examples/simple-user-items'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: blocking
      x-stackQL-resource: blocking
  /user/blocks/{username}:
    get:
      summary: Check if a user is blocked by the authenticated user
      description: >-
        Returns a 204 if the given user is blocked by the authenticated user.
        Returns a 404 if the given user is not blocked by the authenticated
        user, or if the given user account has been identified as spam by
        GitHub.
      tags:
        - users
      operationId: users/check-blocked
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/blocking#check-if-a-user-is-blocked-by-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: If the user is blocked
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          description: If the user is not blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basic-error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: blocking
      x-stackQL-resource: blocking
    put:
      summary: Block a user
      description: >-
        Blocks the given user and returns a 204. If the authenticated user
        cannot block the given user a 422 is returned.
      tags:
        - users
      operationId: users/block
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/blocking#block-a-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: Response
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: blocking
      x-stackQL-resource: blocking
    delete:
      summary: Unblock a user
      description: Unblocks the given user and returns a 204.
      tags:
        - users
      operationId: users/unblock
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/blocking#unblock-a-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: Response
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: blocking
      x-stackQL-resource: blocking
  /user/email/visibility:
    patch:
      summary: Set primary email visibility for the authenticated user
      description: Sets the visibility for your primary email addresses.
      tags:
        - users
      operationId: users/set-primary-email-visibility-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/emails#set-primary-email-visibility-for-the-authenticated-user
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                visibility:
                  description: Denotes whether an email is publicly visible.
                  type: string
                  enum:
                    - public
                    - private
              required:
                - visibility
              type: object
            examples:
              default:
                summary: Example setting the primary email address to private
                value:
                  visibility: private
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/email'
              examples:
                default:
                  $ref: '#/components/examples/email-items-3'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: emails
      x-stackQL-resource: emails
  /user/emails:
    get:
      summary: List email addresses for the authenticated user
      description: >-
        Lists all of your email addresses, and specifies which one is visible

        to the public.


        OAuth app tokens and personal access tokens (classic) need the
        `user:email` scope to use this endpoint.
      tags:
        - users
      operationId: users/list-emails-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/emails#list-email-addresses-for-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/email'
              examples:
                default:
                  $ref: '#/components/examples/email-items-2'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: emails
      x-stackQL-resource: emails
    post:
      summary: Add an email address for the authenticated user
      description: >-
        OAuth app tokens and personal access tokens (classic) need the `user`
        scope to use this endpoint.
      tags:
        - users
      operationId: users/add-email-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/emails#add-an-email-address-for-the-authenticated-user
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                emails:
                  description: >-
                    Adds one or more email addresses to your GitHub account.
                    Must contain at least one email address. **Note:**
                    Alternatively, you can pass a single email address or an
                    `array` of emails addresses directly, but we recommend that
                    you pass an object using the `emails` key.
                  type: array
                  items:
                    type: string
                    example: username@example.com
                  minItems: 1
                  example: []
              required:
                - emails
              example:
                emails:
                  - octocat@github.com
                  - mona@github.com
              items:
                type: string
                example: username@example.com
              minItems: 1
            examples:
              default:
                summary: Example adding multiple email addresses
                value:
                  emails:
                    - octocat@github.com
                    - mona@github.com
                    - octocat@octocat.org
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/email'
              examples:
                default:
                  $ref: '#/components/examples/email-items'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: emails
      x-stackQL-resource: emails
    delete:
      summary: Delete an email address for the authenticated user
      description: >-
        OAuth app tokens and personal access tokens (classic) need the `user`
        scope to use this endpoint.
      tags:
        - users
      operationId: users/delete-email-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/emails#delete-an-email-address-for-the-authenticated-user
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: >-
                Deletes one or more email addresses from your GitHub account.
                Must contain at least one email address. **Note:**
                Alternatively, you can pass a single email address or an `array`
                of emails addresses directly, but we recommend that you pass an
                object using the `emails` key.
              properties:
                emails:
                  description: Email addresses associated with the GitHub user account.
                  type: array
                  items:
                    type: string
                    example: username@example.com
                  minItems: 1
              example:
                emails:
                  - octocat@github.com
                  - mona@github.com
              required:
                - emails
              items:
                type: string
                example: username@example.com
              minItems: 1
            examples:
              default:
                summary: Example deleting multiple email accounts
                value:
                  emails:
                    - octocat@github.com
                    - mona@github.com
      responses:
        '204':
          description: Response
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: emails
      x-stackQL-resource: emails
  /user/followers:
    get:
      summary: List followers of the authenticated user
      description: Lists the people following the authenticated user.
      tags:
        - users
      operationId: users/list-followers-for-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/followers#list-followers-of-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default:
                  $ref: '#/components/examples/simple-user-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: followers
      x-stackQL-resource: followers
  /user/following:
    get:
      summary: List the people the authenticated user follows
      description: Lists the people who the authenticated user follows.
      tags:
        - users
      operationId: users/list-followed-by-authenticated-user
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/followers#list-the-people-the-authenticated-user-follows
      parameters:
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default:
                  $ref: '#/components/examples/simple-user-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: followers
      x-stackQL-resource: followers
  /user/following/{username}:
    get:
      summary: Check if a person is followed by the authenticated user
      description: ''
      tags:
        - users
      operationId: users/check-person-is-followed-by-authenticated
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/users/followers#check-if-a-person-is-followed-by-the-authenticated-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: if the person is followed by the authenticated user
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          description: if the person is not followed by the authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basic-error'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: followers
      x-stackQL-resource: followers
    put:
      summary: Follow a user
      description: >-
        Note that you'll need to set `Content-Length` to zero when calling out
        to this endpoint. For more information, see "[HTTP
        verbs](https://docs.github.com/rest/guides/getting-started-with-the-rest-api#http-method)."


        OAuth app tokens and personal access tokens (classic) need the
        `user:follow` scope to use this endpoint.
      tags:
        - users
      operationId: users/follow
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/followers#follow-a-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: Response
        '304':
          $ref: '#/components/responses/not_modified'
        '401':
          $ref: '#/components/responses/requires_authentication'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: false
        category: users
        subcategory: followers
      x-stackQL-resource: followers
    delete:
      summary: Unfollow a user
      description: >-
        OAuth app tokens and personal access tokens (classic) need the
        `user:follow` scope to use this endpoint.
      tags:
        - users
      operationId: users/unfollow
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/users/followers#unfollow-a-user
      parameters:
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: Response
        '304':
