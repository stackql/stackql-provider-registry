        The page number of the results to fetch. For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 1
    order:
      name: order
      description: >-
        Determines whether the first search result returned is the highest
        number of matches (`desc`) or lowest number of matches (`asc`). This
        parameter is ignored unless you provide `sort`.
      in: query
      required: false
      schema:
        type: string
        enum:
          - desc
          - asc
        default: desc
    issues-advanced-search:
      name: advanced_search
      description: >-
        Set to `true` to use advanced search.

        Example:
        `http://api.github.com/search/issues?q={query}&advanced_search=true`
      in: query
      required: false
      schema:
        type: string
    search-type:
      name: search_type
      description: >-
        The type of search to perform on issues. When not specified, the default
        is lexical search.


        - `semantic` — performs a pure semantic (vector) search using
        embedding-based understanding.

        - `hybrid` — combines semantic search with lexical search for best
        results.


        Semantic and hybrid search require authentication and are rate limited
        to 10 requests per minute.

        Only applies to issue searches (`/search/issues`).
      in: query
      required: false
      schema:
        type: string
        enum:
          - semantic
          - hybrid
