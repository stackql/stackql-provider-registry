          type: integer
          example: 1296269
          description: A unique identifier of the repository.
        name:
          type: string
          example: Hello-World
          description: The name of the repository.
        full_name:
          type: string
          example: octocat/Hello-World
          description: The full, globally unique, name of the repository.
        private:
          type: boolean
          description: Whether the repository is private.
        stargazers_count:
          type: integer
          example: 80
        updated_at:
          type: string
          format: date-time
          example: '2011-01-26T19:14:43Z'
          nullable: true
      required:
        - full_name
        - id
        - name
        - private
        - stargazers_count
        - updated_at
    code-scanning-variant-analysis-status:
      type: string
      description: The new status of the CodeQL variant analysis repository task.
      enum:
        - pending
        - in_progress
        - succeeded
        - failed
        - canceled
        - timed_out
    code-scanning-variant-analysis-skipped-repo-group:
      type: object
      properties:
        repository_count:
          type: integer
          description: The total number of repositories that were skipped for this reason.
          example: 2
        repositories:
          type: array
          description: >-
            A list of repositories that were skipped. This list may not include
            all repositories that were skipped. This is only available when the
            repository was found and the user has access to it.
          items:
            $ref: '#/components/schemas/code-scanning-variant-analysis-repository'
      required:
        - repository_count
        - repositories
    code-scanning-analysis-tool-version:
      nullable: true
      type: string
      description: The version of the tool used to generate the code scanning analysis.
  responses:
    not_found:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    service_unavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
