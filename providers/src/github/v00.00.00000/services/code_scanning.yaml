          examples:
            default:
              $ref: '#/components/examples/code-scanning-bad-request'
    code_scanning_autofix_create_forbidden:
      description: >-
        Response if the repository is archived, if GitHub Advanced Security is
        not enabled for this repository or if rate limit is exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    unprocessable_analysis:
      description: Response if analysis could not be processed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    found:
      description: Found
    code_scanning_conflict:
      description: >-
        Response if there is already a validation run in progress with a
        different default setup configuration
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    code_scanning_invalid_state:
      description: >-
        Response if the configuration change cannot be made because the
        repository is not in the required state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
  parameters:
    org:
      name: org
      description: The organization name. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    tool-name:
      name: tool_name
      description: >-
        The name of a code scanning tool. Only results by this tool will be
        listed. You can specify the tool by using either `tool_name` or
        `tool_guid`, but not both.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/code-scanning-analysis-tool-name'
    tool-guid:
      name: tool_guid
      description: >-
        The GUID of a code scanning tool. Only results by this tool will be
        listed. Note that some code scanning tools may not include a GUID in
        their analysis data. You can specify the tool by using either
        `tool_guid` or `tool_name`, but not both.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/code-scanning-analysis-tool-guid'
    pagination-before:
      name: before
      description: >-
        A cursor, as given in the [Link
        header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers).
        If specified, the query only searches for results before this cursor.
        For more information, see "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      required: false
      schema:
        type: string
    pagination-after:
      name: after
      description: >-
        A cursor, as given in the [Link
        header](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api#using-link-headers).
        If specified, the query only searches for results after this cursor. For
        more information, see "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      required: false
      schema:
        type: string
    page:
      name: page
      description: >-
        The page number of the results to fetch. For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 1
    per-page:
      name: per_page
      description: >-
        The number of results per page (max 100). For more information, see
        "[Using pagination in the REST
        API](https://docs.github.com/rest/using-the-rest-api/using-pagination-in-the-rest-api)."
      in: query
      schema:
        type: integer
        default: 30
    direction:
      name: direction
      description: The direction to sort the results by.
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    owner:
      name: owner
      description: The account owner of the repository. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    repo:
      name: repo
      description: >-
        The name of the repository without the `.git` extension. The name is not
        case sensitive.
      in: path
      required: true
      schema:
        type: string
    git-ref:
      name: ref
      description: >-
        The Git reference for the results you want to list. The `ref` for a
        branch can be formatted either as `refs/heads/<branch name>` or simply
        `<branch name>`. To reference a pull request use
        `refs/pull/<number>/merge`.
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/code-scanning-ref'
    pr-alias:
      name: pr
      description: The number of the pull request for the results you want to list.
      in: query
      required: false
      schema:
        type: integer
    alert-number:
      name: alert_number
      in: path
      description: >-
        The number that identifies an alert. You can find this at the end of the
        URL for a code scanning alert within GitHub, and in the `number` field
        in the response from the `GET
        /repos/{owner}/{repo}/code-scanning/alerts` operation.
      required: true
      schema:
        $ref: '#/components/schemas/alert-number'
