                - ref
                - sarif
            examples:
              default:
                value:
                  commit_sha: 4b6472266afd7b471e86085a6659e8c7f2b119da
                  ref: refs/heads/master
                  sarif: >-
                    
      responses:
        '202':
          description: Response
          content:
            application/json:
              schema:
