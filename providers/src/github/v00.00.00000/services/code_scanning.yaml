openapi: 3.0.3
info:
  title: code_scanning API
  description: github API
  version: 1.1.4
paths:
  /orgs/{org}/code-scanning/alerts:
    get:
      summary: List code scanning alerts for an organization
      description: >-
        Lists code scanning alerts for the default branch for all eligible
        repositories in an organization. Eligible repositories are repositories
        that are owned by organizations that you own or for which you are a
        security manager. For more information, see "[Managing security managers
        in your
        organization](https://docs.github.com/organizations/managing-peoples-access-to-your-organization-with-roles/managing-security-managers-in-your-organization)."


        The authenticated user must be an owner or security manager for the
        organization to use this endpoint.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` or `repo`s cope to use this endpoint with private or
        public repositories, or the `public_repo` scope to use this endpoint
        with only public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/list-alerts-for-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#list-code-scanning-alerts-for-an-organization
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/tool-name'
        - $ref: '#/components/parameters/tool-guid'
        - $ref: '#/components/parameters/pagination-before'
        - $ref: '#/components/parameters/pagination-after'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/direction'
        - name: state
          description: >-
            If specified, only code scanning alerts with this state will be
            returned.
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-alert-state-query'
        - name: sort
          description: The property by which to sort the results.
          in: query
          required: false
          schema:
            type: string
            enum:
              - created
              - updated
            default: created
        - name: severity
          description: >-
            If specified, only code scanning alerts with this severity will be
            returned.
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-alert-severity'
        - name: assignees
          description: >
            Filter alerts by assignees. Provide a comma-separated list of user
            handles (e.g., `octocat` or `octocat,hubot`).

            Use `*` to list alerts with at least one assignee or `none` to list
            alerts with no assignees.
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/code-scanning-organization-alert-items'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-organization-alert-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/alerts:
    get:
      summary: List code scanning alerts for a repository
      description: >-
        Lists code scanning alerts.


        The response includes a `most_recent_instance` object.

        This provides details of the most recent instance of this alert

        for the default branch (or for the specified Git reference if you used
        `ref` in the request).


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/list-alerts-for-repo
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#list-code-scanning-alerts-for-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/tool-name'
        - $ref: '#/components/parameters/tool-guid'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/git-ref'
        - $ref: '#/components/parameters/pr-alias'
        - $ref: '#/components/parameters/direction'
        - $ref: '#/components/parameters/pagination-before'
        - $ref: '#/components/parameters/pagination-after'
        - name: sort
          description: The property by which to sort the results.
          in: query
          required: false
          schema:
            type: string
            enum:
              - created
              - updated
            default: created
        - name: state
          description: >-
            If specified, only code scanning alerts with this state will be
            returned.
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-alert-state-query'
        - name: severity
          description: >-
            If specified, only code scanning alerts with this severity will be
            returned.
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-alert-severity'
        - name: assignees
          description: >
            Filter alerts by assignees. Provide a comma-separated list of user
            handles (e.g., `octocat` or `octocat,hubot`).

            Use `*` to list alerts with at least one assignee or `none` to list
            alerts with no assignees.
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/code-scanning-alert-items'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-alert-items'
        '304':
          $ref: '#/components/responses/not_modified'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/alerts/{alert_number}:
    get:
      summary: Get a code scanning alert
      description: >-
        Gets a single code scanning alert.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/get-alert
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#get-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-alert'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-alert'
        '304':
          $ref: '#/components/responses/not_modified'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
    patch:
      summary: Update a code scanning alert
      description: >-
        Updates the status of a single code scanning alert.

        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      operationId: code-scanning/update-alert
      tags:
        - code-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#update-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                state:
                  $ref: '#/components/schemas/code-scanning-alert-set-state'
                dismissed_reason:
                  $ref: '#/components/schemas/code-scanning-alert-dismissed-reason'
                dismissed_comment:
                  $ref: '#/components/schemas/code-scanning-alert-dismissed-comment'
                create_request:
                  $ref: '#/components/schemas/code-scanning-alert-create-request'
                assignees:
                  $ref: '#/components/schemas/code-scanning-alert-assignees'
              required:
                - state
                - assignees
            examples:
              default:
                value:
                  state: dismissed
                  dismissed_reason: false positive
                  dismissed_comment: >-
                    This alert is not actually correct, because there's a
                    sanitizer included in the library.
                  create_request: true
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-alert'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-alert-dismissed'
        '400':
          $ref: '#/components/responses/bad_request'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_write'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        enabledForGitHubApps: true
        githubCloudOnly: false
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/autofix:
    get:
      summary: Get the status of an autofix for a code scanning alert
      description: >-
        Gets the status and description of an autofix for a code scanning alert.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/get-autofix
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#get-the-status-of-an-autofix-for-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-autofix'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-autofix'
        '400':
          $ref: '#/components/responses/code_scanning_bad_request'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
    post:
      summary: Create an autofix for a code scanning alert
      description: >-
        Creates an autofix for a code scanning alert.


        If a new autofix is to be created as a result of this request or is
        currently being generated, then this endpoint will return a 202 Accepted
        response.


        If an autofix already exists for a given alert, then this endpoint will
        return a 200 OK response.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/create-autofix
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#create-an-autofix-for-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-autofix'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-autofix'
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-autofix'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-autofix-pending'
        '400':
          $ref: '#/components/responses/code_scanning_bad_request'
        '403':
          $ref: '#/components/responses/code_scanning_autofix_create_forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: Unprocessable Entity
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/autofix/commits:
    post:
      summary: Commit an autofix for a code scanning alert
      description: >-
        Commits an autofix for a code scanning alert.


        If an autofix is committed as a result of this request, then this
        endpoint will return a 201 Created response.


        OAuth app tokens and personal access tokens (classic) need the `repo`
        scope to use this endpoint with private or public repositories, or the
        `public_repo` scope to use this endpoint with only public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/commit-autofix
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#commit-an-autofix-for-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/code-scanning-autofix-commits'
            examples:
              default:
                $ref: '#/components/examples/code-scanning-autofix-commits'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-autofix-commits-response'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-autofix-commits-response'
        '400':
          $ref: '#/components/responses/code_scanning_bad_request'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_write'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          description: Unprocessable Entity
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/instances:
    get:
      summary: List instances of a code scanning alert
      description: >-
        Lists all instances of the specified code scanning alert.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      tags:
        - code-scanning
      operationId: code-scanning/list-alert-instances
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#list-instances-of-a-code-scanning-alert
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/alert-number'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/git-ref'
        - $ref: '#/components/parameters/pr-alias'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/code-scanning-alert-instance-list'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-alert-instances'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/analyses:
    get:
      summary: List code scanning analyses for a repository
      description: >-
        Lists the details of all code scanning analyses for a repository,

        starting with the most recent.

        The response is paginated and you can use the `page` and `per_page`
        parameters

        to list the analyses you're interested in.

        By default 30 analyses are listed per page.


        The `rules_count` field in the response give the number of rules

        that were run in the analysis.

        For very old analyses this data is not available,

        and `0` is returned in this field.


        > [!WARNING]

        > **Closing down notice:** The `tool_name` field is closing down and
        will, in future, not be included in the response for this endpoint. The
        example response reflects this change. The tool name can now be found
        inside the `tool` field.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      operationId: code-scanning/list-recent-analyses
      tags:
        - code-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#list-code-scanning-analyses-for-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - $ref: '#/components/parameters/tool-name'
        - $ref: '#/components/parameters/tool-guid'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/pr-alias'
        - name: ref
          in: query
          description: >-
            The Git reference for the analyses you want to list. The `ref` for a
            branch can be formatted either as `refs/heads/<branch name>` or
            simply `<branch name>`. To reference a pull request use
            `refs/pull/<number>/merge`.
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-ref'
        - name: sarif_id
          in: query
          description: Filter analyses belonging to the same SARIF upload.
          required: false
          schema:
            $ref: '#/components/schemas/code-scanning-analysis-sarif-id'
        - $ref: '#/components/parameters/direction'
        - name: sort
          description: The property by which to sort the results.
          in: query
          required: false
          schema:
            type: string
            enum:
              - created
            default: created
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/code-scanning-analysis'
              examples:
                default:
                  $ref: '#/components/examples/code-scanning-analysis-items'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        enabledForGitHubApps: true
        githubCloudOnly: false
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
  /repos/{owner}/{repo}/code-scanning/analyses/{analysis_id}:
    get:
      summary: Get a code scanning analysis for a repository
      description: >-
        Gets a specified code scanning analysis for a repository.


        The default JSON response contains fields that describe the analysis.

        This includes the Git reference and commit SHA to which the analysis
        relates,

        the datetime of the analysis, the name of the code scanning tool,

        and the number of alerts.


        The `rules_count` field in the default response give the number of rules

        that were run in the analysis.

        For very old analyses this data is not available,

        and `0` is returned in this field.


        This endpoint supports the following custom media types. For more
        information, see "[Media
        types](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types)."


        - **`application/sarif+json`**: Instead of returning a summary of the
        analysis, this endpoint returns a subset of the analysis data that was
        uploaded. The data is formatted as [SARIF version
        2.1.0](https://docs.oasis-open.org/sarif/sarif/v2.1.0/cs01/sarif-v2.1.0-cs01.html).
        It also returns additional data such as the `github/alertNumber` and
        `github/alertUrl` properties.


        OAuth app tokens and personal access tokens (classic) need the
        `security_events` scope to use this endpoint with private or public
        repositories, or the `public_repo` scope to use this endpoint with only
        public repositories.
      operationId: code-scanning/get-analysis
      tags:
        - code-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#get-a-code-scanning-analysis-for-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: analysis_id
          in: path
          description: >-
            The ID of the analysis, as returned from the `GET
            /repos/{owner}/{repo}/code-scanning/analyses` operation.
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-analysis'
              examples:
                response:
                  $ref: '#/components/examples/code-scanning-analysis-default'
            application/sarif+json:
              schema:
                type: object
                additionalProperties: true
              examples:
                response:
                  $ref: '#/components/examples/code-scanning-analysis-sarif'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_read'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/unprocessable_analysis'
        '503':
          $ref: '#/components/responses/service_unavailable'
      x-github:
        enabledForGitHubApps: true
        githubCloudOnly: false
        category: code-scanning
        subcategory: code-scanning
      x-stackQL-resource: code_scanning
    delete:
      summary: Delete a code scanning analysis from a repository
      description: >-
        Deletes a specified code scanning analysis from a repository.


        You can delete one analysis at a time.

        To delete a series of analyses, start with the most recent analysis and
        work backwards.

        Conceptually, the process is similar to the undo function in a text
        editor.


        When you list the analyses for a repository,

        one or more will be identified as deletable in the response:


        ```

        "deletable": true

        ```


        An analysis is deletable when it's the most recent in a set of analyses.

        Typically, a repository will have multiple sets of analyses

        for each enabled code scanning tool,

        where a set is determined by a unique combination of analysis values:


        * `ref`

        * `tool`

        * `category`


        If you attempt to delete an analysis that is not the most recent in a
        set,

        you'll get a 400 response with the message:


        ```

        Analysis specified is not deletable.

        ```


        The response from a successful `DELETE` operation provides you with

        two alternative URLs for deleting the next analysis in the set:

        `next_analysis_url` and `confirm_delete_url`.

        Use the `next_analysis_url` URL if you want to avoid accidentally
        deleting the final analysis

        in a set. This is a useful option if you want to preserve at least one
        analysis

        for the specified tool in your repository.

        Use the `confirm_delete_url` URL if you are content to remove all
        analyses for a tool.

        When you delete the last analysis in a set, the value of
        `next_analysis_url` and `confirm_delete_url`

        in the 200 response is `null`.


        As an example of the deletion process,

        let's imagine that you added a workflow that configured a particular
        code scanning tool

        to analyze the code in a repository. This tool has added 15 analyses:

        10 on the default branch, and another 5 on a topic branch.

        You therefore have two separate sets of analyses for this tool.

        You've now decided that you want to remove all of the analyses for the
        tool.

        To do this you must make 15 separate deletion requests.

        To start, you must find an analysis that's identified as deletable.

        Each set of analyses always has one that's identified as deletable.

        Having found the deletable analysis for one of the two sets,

        delete this analysis and then continue deleting the next analysis in the
        set until they're all deleted.

        Then repeat the process for the second set.

        The procedure therefore consists of a nested loop:


        **Outer loop**:

        * List the analyses for the repository, filtered by tool.

        * Parse this list to find a deletable analysis. If found:

          **Inner loop**:
          * Delete the identified analysis.
          * Parse the response for the value of `confirm_delete_url` and, if found, use this in the next iteration.

        The above process assumes that you want to remove all trace of the
        tool's analyses from the GitHub user interface, for the specified
        repository, and it therefore uses the `confirm_delete_url` value.
        Alternatively, you could use the `next_analysis_url` value, which would
        leave the last analysis in each set undeleted to avoid removing a tool's
        analysis entirely.


        OAuth app tokens and personal access tokens (classic) need the `repo`
        scope to use this endpoint with private or public repositories, or the
        `public_repo` scope to use this endpoint with only public repositories.
      operationId: code-scanning/delete-analysis
      tags:
        - code-scanning
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/code-scanning/code-scanning#delete-a-code-scanning-analysis-from-a-repository
      parameters:
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
        - name: analysis_id
          in: path
          description: >-
            The ID of the analysis, as returned from the `GET
            /repos/{owner}/{repo}/code-scanning/analyses` operation.
          required: true
          schema:
            type: integer
        - name: confirm_delete
          in: query
          description: >-
            Allow deletion if the specified analysis is the last in a set. If
            you attempt to delete the final analysis in a set without setting
            this parameter to `true`, you'll get a 400 response with the
            message: `Analysis is last of its type and deletion may result in
            the loss of historical alert data. Please specify confirm_delete.`
          required: false
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/code-scanning-analysis-deletion'
              examples:
                default-response:
                  $ref: '#/components/examples/code-scanning-analysis-deletion'
        '400':
          $ref: '#/components/responses/bad_request'
        '403':
          $ref: '#/components/responses/code_scanning_forbidden_write'
        '404':
          $ref: '#/components/responses/not_found'
        '503':
          $ref: '#/components/responses/service_unavailable'
