    bad_request:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
        application/scim+json:
          schema:
            $ref: '#/components/schemas/scim-error'
    code_scanning_forbidden_write:
      description: >-
        Response if the repository is archived or if GitHub Advanced Security is
        not enabled for this repository
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/basic-error'
    code_scanning_bad_request:
      description: Bad Request
      content:
        application/json:
          schema:
