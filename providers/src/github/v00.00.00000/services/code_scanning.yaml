        - tool
        - most_recent_instance
    code-scanning-alert-set-state:
      description: >-
        Sets the state of the code scanning alert. You must provide
        `dismissed_reason` when you set the state to `dismissed`.
      type: string
      enum:
        - open
        - dismissed
    code-scanning-alert-dismissed-reason:
      type: string
      description: >-
        **Required when the state is dismissed.** The reason for dismissing or
        closing the alert.
      nullable: true
      enum:
        - false positive
        - won't fix
        - used in tests
    code-scanning-alert-dismissed-comment:
      type: string
      description: The dismissal comment associated with the dismissal of the alert.
      nullable: true
      maxLength: 280
    code-scanning-alert-create-request:
      type: boolean
      description: If `true`, attempt to create an alert dismissal request.
    code-scanning-alert-assignees:
      description: >-
        The list of users to assign to the code scanning alert. An empty array
        unassigns all previous assignees from the alert.
      type: array
      items:
        type: string
    code-scanning-autofix:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/code-scanning-autofix-status'
        description:
          $ref: '#/components/schemas/code-scanning-autofix-description'
        started_at:
          $ref: '#/components/schemas/code-scanning-autofix-started-at'
      required:
        - status
        - description
        - started_at
    code-scanning-autofix-commits:
      description: Commit an autofix for a code scanning alert
      type: object
      properties:
        target_ref:
          description: >-
            The Git reference of target branch for the commit. Branch needs to
            already exist.  For more information, see "[Git
            References](https://git-scm.com/book/en/v2/Git-Internals-Git-References)"
            in the Git documentation.
          type: string
        message:
          description: Commit message to be used.
          type: string
      nullable: true
    code-scanning-autofix-commits-response:
      type: object
      properties:
        target_ref:
          type: string
          description: >-
            The Git reference of target branch for the commit. For more
            information, see "[Git
            References](https://git-scm.com/book/en/v2/Git-Internals-Git-References)"
            in the Git documentation.
        sha:
          type: string
          description: SHA of commit with autofix.
    code-scanning-alert-instance-list:
      type: object
      properties:
        ref:
          $ref: '#/components/schemas/code-scanning-ref'
        analysis_key:
          $ref: '#/components/schemas/code-scanning-analysis-analysis-key'
        environment:
          $ref: '#/components/schemas/code-scanning-alert-environment'
        category:
          $ref: '#/components/schemas/code-scanning-analysis-category'
        state:
          $ref: '#/components/schemas/code-scanning-alert-instance-state'
        commit_sha:
          type: string
        message:
          type: object
          properties:
            text:
              type: string
        location:
          $ref: '#/components/schemas/code-scanning-alert-location'
        html_url:
          type: string
        classifications:
          type: array
          description: >-
            Classifications that have been applied to the file that triggered
            the alert.

            For example identifying it as documentation, or a generated file.
          items:
            $ref: '#/components/schemas/code-scanning-alert-classification'
    code-scanning-ref:
      type: string
      description: >-
        The Git reference, formatted as `refs/pull/<number>/merge`,
        `refs/pull/<number>/head`,

        `refs/heads/<branch name>` or simply `<branch name>`.
    code-scanning-analysis-sarif-id:
      type: string
      description: An identifier for the upload.
      example: 6c81cd8e-b078-4ac3-a3be-1dad7dbd0b53
    code-scanning-analysis:
      type: object
      properties:
        ref:
          $ref: '#/components/schemas/code-scanning-ref'
        commit_sha:
          $ref: '#/components/schemas/code-scanning-analysis-commit-sha'
        analysis_key:
          $ref: '#/components/schemas/code-scanning-analysis-analysis-key'
        environment:
          $ref: '#/components/schemas/code-scanning-analysis-environment'
        category:
          $ref: '#/components/schemas/code-scanning-analysis-category'
        error:
          type: string
          example: error reading field xyz
        created_at:
          $ref: '#/components/schemas/code-scanning-analysis-created-at'
        results_count:
          type: integer
          description: The total number of results in the analysis.
        rules_count:
          type: integer
          description: The total number of rules used in the analysis.
        id:
          type: integer
          description: Unique identifier for this analysis.
        url:
          $ref: '#/components/schemas/code-scanning-analysis-url'
        sarif_id:
          $ref: '#/components/schemas/code-scanning-analysis-sarif-id'
        tool:
          $ref: '#/components/schemas/code-scanning-analysis-tool'
        deletable:
          type: boolean
        warning:
          type: string
          description: Warning generated when processing the analysis
          example: 123 results were ignored
      required:
        - ref
        - commit_sha
        - analysis_key
        - environment
        - error
        - created_at
        - results_count
        - rules_count
        - id
        - url
        - sarif_id
        - tool
        - deletable
        - warning
    code-scanning-analysis-deletion:
      title: Analysis deletion
      description: Successful deletion of a code scanning analysis
      type: object
      properties:
        next_analysis_url:
          type: string
          description: >-
            Next deletable analysis in chain, without last analysis deletion
            confirmation
          format: uri
          readOnly: true
          nullable: true
        confirm_delete_url:
          type: string
          description: >-
            Next deletable analysis in chain, with last analysis deletion
            confirmation
          format: uri
          readOnly: true
          nullable: true
      required:
        - next_analysis_url
        - confirm_delete_url
    code-scanning-codeql-database:
      title: CodeQL Database
      description: A CodeQL database.
      type: object
      properties:
        id:
          type: integer
          description: The ID of the CodeQL database.
        name:
          type: string
          description: The name of the CodeQL database.
        language:
          type: string
          description: The language of the CodeQL database.
        uploader:
          $ref: '#/components/schemas/simple-user'
        content_type:
          type: string
          description: The MIME type of the CodeQL database file.
        size:
          type: integer
          description: The size of the CodeQL database file in bytes.
        created_at:
          type: string
          format: date-time
          description: >-
            The date and time at which the CodeQL database was created, in ISO
            8601 format':' YYYY-MM-DDTHH:MM:SSZ.
        updated_at:
          type: string
          format: date-time
          description: >-
            The date and time at which the CodeQL database was last updated, in
            ISO 8601 format':' YYYY-MM-DDTHH:MM:SSZ.
        url:
          type: string
          format: uri
          description: >-
            The URL at which to download the CodeQL database. The `Accept`
            header must be set to the value of the `content_type` property.
        commit_oid:
          type: string
          description: >-
            The commit SHA of the repository at the time the CodeQL database was
            created.
          nullable: true
      required:
        - id
        - name
        - language
        - uploader
        - content_type
        - size
        - created_at
        - updated_at
        - url
    code-scanning-variant-analysis-language:
      type: string
      description: The language targeted by the CodeQL query
      enum:
        - actions
        - cpp
        - csharp
        - go
        - java
        - javascript
        - python
        - ruby
        - rust
        - swift
    code-scanning-variant-analysis:
      title: Variant Analysis
      description: A run of a CodeQL query against one or more repositories.
      type: object
      properties:
        id:
          type: integer
          description: The ID of the variant analysis.
        controller_repo:
          $ref: '#/components/schemas/simple-repository'
        actor:
          $ref: '#/components/schemas/simple-user'
        query_language:
          $ref: '#/components/schemas/code-scanning-variant-analysis-language'
        query_pack_url:
          type: string
          description: The download url for the query pack.
        created_at:
          type: string
          format: date-time
          description: >-
            The date and time at which the variant analysis was created, in ISO
            8601 format':' YYYY-MM-DDTHH:MM:SSZ.
        updated_at:
          type: string
          format: date-time
          description: >-
            The date and time at which the variant analysis was last updated, in
            ISO 8601 format':' YYYY-MM-DDTHH:MM:SSZ.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            The date and time at which the variant analysis was completed, in
            ISO 8601 format':' YYYY-MM-DDTHH:MM:SSZ. Will be null if the variant
            analysis has not yet completed or this information is not available.
        status:
          type: string
          enum:
            - in_progress
            - succeeded
            - failed
            - cancelled
        actions_workflow_run_id:
          type: integer
          description: >-
            The GitHub Actions workflow run used to execute this variant
            analysis. This is only available if the workflow run has started.
        failure_reason:
          type: string
          enum:
            - no_repos_queried
            - actions_workflow_run_failed
            - internal_error
          description: >-
            The reason for a failure of the variant analysis. This is only
            available if the variant analysis has failed.
        scanned_repositories:
          type: array
          items:
            type: object
            properties:
              repository:
                $ref: '#/components/schemas/code-scanning-variant-analysis-repository'
              analysis_status:
                $ref: '#/components/schemas/code-scanning-variant-analysis-status'
              result_count:
                type: integer
                description: >-
                  The number of results in the case of a successful analysis.
                  This is only available for successful analyses.
              artifact_size_in_bytes:
                type: integer
                description: >-
                  The size of the artifact. This is only available for
                  successful analyses.
              failure_message:
                type: string
                description: >-
                  The reason of the failure of this repo task. This is only
                  available if the repository task has failed.
            required:
              - repository
              - analysis_status
        skipped_repositories:
          type: object
          description: >-
            Information about repositories that were skipped from processing.
            This information is only available to the user that initiated the
            variant analysis.
          properties:
            access_mismatch_repos:
              $ref: >-
                #/components/schemas/code-scanning-variant-analysis-skipped-repo-group
            not_found_repos:
              type: object
              properties:
                repository_count:
                  type: integer
                  description: >-
                    The total number of repositories that were skipped for this
                    reason.
                  example: 2
                repository_full_names:
                  type: array
                  description: >-
                    A list of full repository names that were skipped. This list
                    may not include all repositories that were skipped.
                  items:
                    type: string
              required:
                - repository_count
                - repository_full_names
            no_codeql_db_repos:
              $ref: >-
                #/components/schemas/code-scanning-variant-analysis-skipped-repo-group
            over_limit_repos:
              $ref: >-
                #/components/schemas/code-scanning-variant-analysis-skipped-repo-group
          required:
            - access_mismatch_repos
            - not_found_repos
            - no_codeql_db_repos
            - over_limit_repos
      required:
        - id
        - controller_repo
        - actor
        - query_language
        - query_pack_url
        - status
    basic-error:
      title: Basic Error
      description: Basic Error
      type: object
      properties:
        message:
          type: string
        documentation_url:
          type: string
        url:
          type: string
        status:
          type: string
    code-scanning-variant-analysis-repo-task:
      type: object
      properties:
        repository:
          $ref: '#/components/schemas/simple-repository'
        analysis_status:
          $ref: '#/components/schemas/code-scanning-variant-analysis-status'
        artifact_size_in_bytes:
          type: integer
          description: >-
            The size of the artifact. This is only available for successful
            analyses.
        result_count:
          type: integer
          description: >-
            The number of results in the case of a successful analysis. This is
            only available for successful analyses.
        failure_message:
          type: string
          description: >-
            The reason of the failure of this repo task. This is only available
            if the repository task has failed.
        database_commit_sha:
          type: string
          description: >-
            The SHA of the commit the CodeQL database was built against. This is
            only available for successful analyses.
        source_location_prefix:
          type: string
          description: >-
            The source location prefix to use. This is only available for
            successful analyses.
        artifact_url:
          type: string
          description: >-
            The URL of the artifact. This is only available for successful
            analyses.
      required:
        - repository
        - analysis_status
    code-scanning-default-setup:
      description: Configuration for code scanning default setup.
      type: object
      properties:
        state:
          description: Code scanning default setup has been configured or not.
          type: string
          enum:
            - configured
            - not-configured
        languages:
          description: Languages to be analyzed.
          type: array
          items:
            type: string
            enum:
              - actions
              - c-cpp
              - csharp
              - go
              - java-kotlin
              - javascript-typescript
              - javascript
              - python
              - ruby
              - typescript
              - swift
        runner_type:
          description: Runner type to be used.
          nullable: true
          type: string
          enum:
            - standard
            - labeled
        runner_label:
          description: Runner label to be used if the runner type is labeled.
          nullable: true
          type: string
          example: code-scanning
        query_suite:
          description: CodeQL query suite to be used.
          type: string
          enum:
            - default
            - extended
        threat_model:
          description: >-
            Threat model to be used for code scanning analysis. Use `remote` to
            analyze only network sources and `remote_and_local` to include local
            sources like filesystem access, command-line arguments, database
            reads, environment variable and standard input.
          type: string
          enum:
            - remote
            - remote_and_local
        updated_at:
          description: Timestamp of latest configuration update.
          nullable: true
          type: string
          format: date-time
          example: '2023-12-06T14:20:20.000Z'
        schedule:
          description: The frequency of the periodic analysis.
          nullable: true
          type: string
          enum:
            - weekly
      x-github-breaking-changes:
        - changeset: remove_single_js_ts
          patch:
            properties:
              languages:
                items:
                  enum:
                    - actions
                    - c-cpp
                    - csharp
                    - go
                    - java-kotlin
                    - javascript-typescript
                    - python
                    - ruby
                    - swift
            type: object
          version: '2026-03-10'
    code-scanning-default-setup-update:
      description: Configuration for code scanning default setup.
      type: object
      properties:
        state:
          description: The desired state of code scanning default setup.
          type: string
          enum:
            - configured
            - not-configured
        runner_type:
          description: Runner type to be used.
          type: string
          enum:
            - standard
            - labeled
        runner_label:
          nullable: true
          description: Runner label to be used if the runner type is labeled.
          type: string
          example: code-scanning
        query_suite:
          description: CodeQL query suite to be used.
          type: string
          enum:
            - default
            - extended
        threat_model:
          description: >-
            Threat model to be used for code scanning analysis. Use `remote` to
            analyze only network sources and `remote_and_local` to include local
            sources like filesystem access, command-line arguments, database
            reads, environment variable and standard input.
          type: string
          enum:
            - remote
            - remote_and_local
        languages:
          description: CodeQL languages to be analyzed.
          type: array
          items:
            type: string
            enum:
              - actions
              - c-cpp
              - csharp
              - go
              - java-kotlin
              - javascript-typescript
              - python
              - ruby
              - swift
      additionalProperties: false
    empty-object:
      title: Empty Object
      description: An object without any properties.
      type: object
      properties: {}
      additionalProperties: false
    code-scanning-default-setup-update-response:
      description: >-
        You can use `run_url` to track the status of the run. This includes a
        property status and conclusion.

        You should not rely on this always being an actions workflow run object.
      type: object
      properties:
        run_id:
          description: ID of the corresponding run.
          type: integer
        run_url:
          description: URL of the corresponding run.
          type: string
    code-scanning-analysis-commit-sha:
      description: The SHA of the commit to which the analysis you are uploading relates.
      type: string
      minLength: 40
      maxLength: 40
      pattern: ^[0-9a-fA-F]+$
    code-scanning-ref-full:
      type: string
      description: >-
        The full Git reference, formatted as `refs/heads/<branch name>`,

        `refs/tags/<tag>`, `refs/pull/<number>/merge`, or
        `refs/pull/<number>/head`.
      pattern: ^refs/(heads|tags|pull)/.*$
      example: refs/heads/main
    code-scanning-analysis-sarif-file:
      description: >-
        A Base64 string representing the SARIF file to upload. You must first
        compress your SARIF file using
        [`gzip`](http://www.gnu.org/software/gzip/manual/gzip.html) and then
        translate the contents of the file into a Base64 encoding string. For
        more information, see "[SARIF support for code
        scanning](https://docs.github.com/code-security/secure-coding/sarif-support-for-code-scanning)."
      type: string
    code-scanning-sarifs-receipt:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/code-scanning-analysis-sarif-id'
        url:
          type: string
          description: The REST API URL for checking the status of the upload.
          format: uri
          readOnly: true
    code-scanning-sarifs-status:
      type: object
      properties:
        processing_status:
          type: string
          enum:
            - pending
            - complete
            - failed
          description: >-
            `pending` files have not yet been processed, while `complete` means
            results from the SARIF have been stored. `failed` files have either
            not been processed at all, or could only be partially processed.
        analyses_url:
          type: string
          description: >-
            The REST API URL for getting the analyses associated with the
            upload.
          format: uri
          readOnly: true
          nullable: true
        errors:
          type: array
          items:
            type: string
          description: Any errors that ocurred during processing of the delivery.
          readOnly: true
          nullable: true
