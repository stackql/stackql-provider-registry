      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: billing
        subcategory: usage
      x-stackQL-resource: usage
components:
  schemas:
    basic-error:
      title: Basic Error
      description: Basic Error
      type: object
      properties:
        message:
          type: string
        documentation_url:
          type: string
        url:
          type: string
        status:
          type: string
    get_all_budgets:
      type: object
      properties:
        budgets:
          type: array
          items:
            $ref: '#/components/schemas/budget'
          description: Array of budget objects for the enterprise
        has_next_page:
          type: boolean
          description: >-
            Indicates if there are more pages of results available (maps to
            hasNextPage from billing platform)
        total_count:
          type: integer
          description: Total number of budgets matching the query
      required:
        - budgets
    get-budget:
      type: object
      properties:
        id:
          type: string
          description: ID of the budget.
        budget_scope:
          type: string
          description: The type of scope for the budget
          example: enterprise
          enum:
            - enterprise
            - organization
            - repository
            - cost_center
        budget_entity_name:
          type: string
          description: The name of the entity to apply the budget to
          example: octocat/hello-world
        budget_amount:
          type: integer
          description: >-
            The budget amount in whole dollars. For license-based products, this
            represents the number of licenses.
        prevent_further_usage:
          type: boolean
          description: Whether to prevent additional spending once the budget is exceeded
          example: true
        budget_product_sku:
          type: string
          description: A single product or sku to apply the budget to.
          example: actions_linux
        budget_type:
          description: The type of pricing for the budget
          example: ProductPricing
          type: string
          enum:
            - ProductPricing
        budget_alerting:
          type: object
          properties:
            will_alert:
              type: boolean
              description: Whether alerts are enabled for this budget
              example: true
            alert_recipients:
              type: array
              items:
                type: string
              description: Array of user login names who will receive alerts
              example:
                - mona
                - lisa
      required:
        - id
        - budget_amount
        - prevent_further_usage
        - budget_product_sku
        - budget_type
        - budget_alerting
        - budget_scope
        - budget_entity_name
    scim-error:
      title: Scim Error
      description: Scim Error
      type: object
      properties:
        message:
          type: string
          nullable: true
        documentation_url:
          type: string
          nullable: true
        detail:
          type: string
          nullable: true
        status:
          type: integer
        scimType:
          type: string
          nullable: true
        schemas:
          type: array
          items:
            type: string
    validation-error:
      title: Validation Error
      description: Validation Error
      type: object
      required:
        - message
        - documentation_url
      properties:
        message:
          type: string
        documentation_url:
          type: string
        errors:
          type: array
          items:
            type: object
            required:
              - code
            properties:
              resource:
                type: string
              field:
                type: string
              message:
                type: string
              code:
                type: string
              index:
                type: integer
              value:
                oneOf:
                  - type: string
                    nullable: true
                  - type: integer
                    nullable: true
                  - type: array
                    nullable: true
                    items:
                      type: string
    delete-budget:
      type: object
      properties:
        message:
          type: string
          description: A message indicating the result of the deletion operation
        id:
          type: string
          description: The ID of the deleted budget
      required:
        - message
        - id
    billing-premium-request-usage-report-org:
      type: object
      properties:
        timePeriod:
          type: object
          properties:
            year:
              type: integer
              description: The year for the usage report.
            month:
              type: integer
              description: The month for the usage report.
            day:
              type: integer
              description: The day for the usage report.
          required:
            - year
        organization:
          type: string
          description: The unique identifier of the organization.
        user:
          type: string
          description: The name of the user for the usage report.
        product:
          type: string
          description: The product for the usage report.
        model:
          type: string
          description: The model for the usage report.
        usageItems:
          type: array
          items:
            type: object
            properties:
              product:
                type: string
                description: Product name.
              sku:
                type: string
                description: SKU name.
              model:
                type: string
                description: Model name.
              unitType:
                type: string
                description: Unit type of the usage line item.
              pricePerUnit:
                type: number
                description: Price per unit of the usage line item.
              grossQuantity:
                type: number
                description: Gross quantity of the usage line item.
              grossAmount:
                type: number
                description: Gross amount of the usage line item.
              discountQuantity:
                type: number
                description: Discount quantity of the usage line item.
              discountAmount:
                type: number
                description: Discount amount of the usage line item.
              netQuantity:
                type: number
                description: Net quantity of the usage line item.
              netAmount:
                type: number
                description: Net amount of the usage line item.
            required:
              - product
              - sku
              - model
              - unitType
              - pricePerUnit
              - grossQuantity
              - grossAmount
              - discountQuantity
              - discountAmount
              - netQuantity
              - netAmount
      required:
        - timePeriod
        - organization
        - usageItems
    billing-usage-report:
      type: object
      properties:
        usageItems:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                description: Date of the usage line item.
              product:
                type: string
                description: Product name.
              sku:
                type: string
                description: SKU name.
              quantity:
                type: integer
                description: Quantity of the usage line item.
              unitType:
                type: string
                description: Unit type of the usage line item.
              pricePerUnit:
                type: number
                description: Price per unit of the usage line item.
              grossAmount:
                type: number
                description: Gross amount of the usage line item.
              discountAmount:
                type: number
                description: Discount amount of the usage line item.
              netAmount:
                type: number
                description: Net amount of the usage line item.
              organizationName:
                type: string
                description: Name of the organization.
              repositoryName:
                type: string
                description: Name of the repository.
            required:
              - date
              - product
              - sku
