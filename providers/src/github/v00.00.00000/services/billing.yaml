  parameters:
    org:
      name: org
      description: The organization name. The name is not case sensitive.
      in: path
      required: true
      schema:
        type: string
    budget:
      name: budget_id
      description: The ID corresponding to the budget.
      in: path
      required: true
      schema:
        type: string
    billing-usage-report-year:
      name: year
      description: >-
        If specified, only return results for a single year. The value of `year`
        is an integer with four digits representing a year. For example, `2025`.
        Default value is the current year.
      in: query
      required: false
      schema:
        type: integer
    billing-usage-report-month-default:
      name: month
      description: >-
        If specified, only return results for a single month. The value of
        `month` is an integer between `1` and `12`. Default value is the current
        month. If no year is specified the default `year` is used.
      in: query
      required: false
      schema:
        type: integer
    billing-usage-report-day:
      name: day
      description: >-
        If specified, only return results for a single day. The value of `day`
        is an integer between `1` and `31`. If no `year` or `month` is
        specified, the default `year` and `month` are used.
      in: query
      required: false
      schema:
        type: integer
    billing-usage-report-user:
      name: user
      description: The user name to query usage for. The name is not case sensitive.
      in: query
      required: false
      schema:
        type: string
    billing-usage-report-model:
      name: model
      description: The model name to query usage for. The name is not case sensitive.
      in: query
      required: false
      schema:
        type: string
    billing-usage-report-product:
      name: product
      description: The product name to query usage for. The name is not case sensitive.
      in: query
      required: false
      schema:
        type: string
    billing-usage-report-month:
      name: month
      description: >-
        If specified, only return results for a single month. The value of
        `month` is an integer between `1` and `12`. If no year is specified the
        default `year` is used.
      in: query
      required: false
      schema:
        type: integer
    billing-usage-report-repository:
      name: repository
      description: The repository name to query for usage in the format owner/repository.
      in: query
      required: false
      schema:
        type: string
    billing-usage-report-sku:
      name: sku
      description: The SKU to query for usage.
      in: query
      required: false
      schema:
        type: string
    username:
      name: username
      description: The handle for the GitHub user account.
      in: path
      required: true
      schema:
        type: string
