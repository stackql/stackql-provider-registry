        html_url: http://contributor-covenant.org/version/1/4/
  x-stackQL-resources:
    codes_of_conduct:
      id: github.codes_of_conduct.codes_of_conduct
      name: codes_of_conduct
      title: Codes Of Conduct
      methods:
        get_all_codes_of_conduct:
          operation:
            $ref: '#/paths/~1codes_of_conduct/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
        get_conduct_code:
          operation:
            $ref: '#/paths/~1codes_of_conduct~1{key}/get'
          response:
            mediaType: application/json
            openAPIDocKey: '200'
      sqlVerbs:
        select:
          - $ref: >-
              #/components/x-stackQL-resources/codes_of_conduct/methods/get_conduct_code
          - $ref: >-
              #/components/x-stackQL-resources/codes_of_conduct/methods/get_all_codes_of_conduct
        insert: []
        update: []
        delete: []
        replace: []
servers:
  - url: https://api.github.com
