openapi: 3.0.3
info:
  title: teams API
  description: Interact with GitHub Teams.
  version: 1.1.4
paths:
  /orgs/{org}/teams:
    get:
      summary: List teams
      description: >-
        Lists all teams in an organization that are visible to the authenticated
        user.
      tags:
        - teams
      operationId: teams/list
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#list-teams
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/team-type'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/team'
              examples:
                default:
                  $ref: '#/components/examples/team-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '403':
          $ref: '#/components/responses/forbidden'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
    post:
      summary: Create a team
      description: >-
        To create a team, the authenticated user must be a member or owner of
        `{org}`. By default, organization members can create teams. Organization
        owners can limit team creation to organization owners. For more
        information, see "[Setting team creation
        permissions](https://docs.github.com/articles/setting-team-creation-permissions-in-your-organization)."


        When you create a new team, you automatically become a team maintainer
        without explicitly adding yourself to the optional array of
        `maintainers`. For more information, see "[About
        teams](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/about-teams)".
      tags:
        - teams
      operationId: teams/create
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#create-a-team
      parameters:
        - $ref: '#/components/parameters/org'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the team.
                description:
                  type: string
                  description: The description of the team.
                maintainers:
                  type: array
                  description: >-
                    List GitHub usernames for organization members who will
                    become team maintainers.
                  items:
                    type: string
                repo_names:
                  type: array
                  description: >-
                    The full name (e.g., "organization-name/repository-name") of
                    repositories to add the team to.
                  items:
                    type: string
                privacy:
                  type: string
                  description: >-
                    The level of privacy this team should have. The options
                    are:  

                    **For a non-nested team:**  
                     * `secret` - only visible to organization owners and members of this team.  
                     * `closed` - visible to all members of this organization.  
                    Default: `secret`  

                    **For a parent or child team:**  
                     * `closed` - visible to all members of this organization.  
                    Default for child team: `closed`
                  enum:
                    - secret
                    - closed
                notification_setting:
                  type: string
                  description: >-
                    The notification setting the team has chosen. The options
                    are:  
                     * `notifications_enabled` - team members receive notifications when the team is @mentioned.  
                     * `notifications_disabled` - no one receives notifications.  
                    Default: `notifications_enabled`
                  enum:
                    - notifications_enabled
                    - notifications_disabled
                permission:
                  type: string
                  description: >-
                    **Closing down notice**. The permission that new
                    repositories will be added to the team with when none is
                    specified.
                  enum:
                    - pull
                    - push
                  default: pull
                parent_team_id:
                  type: integer
                  description: The ID of a team to set as the parent team.
              required:
                - name
            examples:
              default:
                value:
                  name: Justice League
                  description: A great team
                  permission: push
                  notification_setting: notifications_enabled
                  privacy: closed
      responses:
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-full'
              examples:
                default:
                  $ref: '#/components/examples/team-full'
        '403':
          $ref: '#/components/responses/forbidden'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-github-breaking-changes:
        - changeset: remove_team_permission
          patch:
            requestBody:
              required: true
              content:
                application/json:
                  schema:
                    properties:
                      permission: null
                    type: object
          version: '2026-03-10'
      x-stackQL-resource: teams
  /orgs/{org}/teams/{team_slug}:
    get:
      summary: Get a team by name
      description: >-
        Gets a team using the team's `slug`. To create the `slug`, GitHub
        replaces special characters in the `name` string, changes all words to
        lowercase, and replaces spaces with a `-` separator. For example, `"My
        TEam Näme"` would become `my-team-name`.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `GET /organizations/{org_id}/team/{team_id}`.
      tags:
        - teams
      operationId: teams/get-by-name
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#get-a-team-by-name
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-full'
              examples:
                default:
                  $ref: '#/components/examples/team-full'
        '404':
          $ref: '#/components/responses/not_found'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
    patch:
      summary: Update a team
      description: >-
        To edit a team, the authenticated user must either be an organization
        owner or a team maintainer.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `PATCH /organizations/{org_id}/team/{team_id}`.
      tags:
        - teams
      operationId: teams/update-in-org
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#update-a-team
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the team.
                description:
                  type: string
                  description: The description of the team.
                privacy:
                  type: string
                  description: >-
                    The level of privacy this team should have. Editing teams
                    without specifying this parameter leaves `privacy` intact.
                    When a team is nested, the `privacy` for parent teams cannot
                    be `secret`. The options are:  

                    **For a non-nested team:**  
                     * `secret` - only visible to organization owners and members of this team.  
                     * `closed` - visible to all members of this organization.  
                    **For a parent or child team:**  
                     * `closed` - visible to all members of this organization.
                  enum:
                    - secret
                    - closed
                notification_setting:
                  type: string
                  description: >-
                    The notification setting the team has chosen. Editing teams
                    without specifying this parameter leaves
                    `notification_setting` intact. The options are: 
                     * `notifications_enabled` - team members receive notifications when the team is @mentioned.  
                     * `notifications_disabled` - no one receives notifications.
                  enum:
                    - notifications_enabled
                    - notifications_disabled
                permission:
                  type: string
                  description: >-
                    **Closing down notice**. The permission that new
                    repositories will be added to the team with when none is
                    specified.
                  enum:
                    - pull
                    - push
                    - admin
                  default: pull
                parent_team_id:
                  type: integer
                  description: The ID of a team to set as the parent team.
                  nullable: true
            examples:
              default:
                value:
                  name: new team name
                  description: new team description
                  privacy: closed
                  notification_setting: notifications_enabled
      responses:
        '200':
          description: Response when the updated information already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-full'
              examples:
                default:
                  $ref: '#/components/examples/team-full'
        '201':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-full'
              examples:
                default:
                  $ref: '#/components/examples/team-full'
        '403':
          $ref: '#/components/responses/forbidden'
        '404':
          $ref: '#/components/responses/not_found'
        '422':
          $ref: '#/components/responses/validation_failed'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
    delete:
      summary: Delete a team
      description: >-
        To delete a team, the authenticated user must be an organization owner
        or team maintainer.


        If you are an organization owner, deleting a parent team will delete all
        of its child teams as well.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `DELETE /organizations/{org_id}/team/{team_id}`.
      tags:
        - teams
      operationId: teams/delete-in-org
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#delete-a-team
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
      responses:
        '204':
          description: Response
        '422':
          $ref: '#/components/responses/enterprise_team_unsupported'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
  /orgs/{org}/teams/{team_slug}/invitations:
    get:
      summary: List pending team invitations
      description: >-
        The return hash contains a `role` field which refers to the Organization
        Invitation role and will be one of the following values:
        `direct_member`, `admin`, `billing_manager`, `hiring_manager`, or
        `reinstate`. If the invitee is not a GitHub member, the `login` field in
        the return hash will be `null`.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `GET /organizations/{org_id}/team/{team_id}/invitations`.
      tags:
        - teams
      operationId: teams/list-pending-invitations-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/members#list-pending-team-invitations
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/organization-invitation'
              examples:
                default:
                  $ref: '#/components/examples/organization-invitation-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
        '422':
          $ref: '#/components/responses/enterprise_team_unsupported'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: members
      x-stackQL-resource: members
  /orgs/{org}/teams/{team_slug}/members:
    get:
      summary: List team members
      description: >-
        Team members will include the members of child teams.


        To list members in a team, the team must be visible to the authenticated
        user.
      tags:
        - teams
      operationId: teams/list-members-in-org
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/members#list-team-members
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - name: role
          description: Filters members returned by their role in the team.
          in: query
          required: false
          schema:
            type: string
            enum:
              - member
              - maintainer
              - all
            default: all
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/simple-user'
              examples:
                default:
                  $ref: '#/components/examples/simple-user-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: members
      x-stackQL-resource: members
  /orgs/{org}/teams/{team_slug}/memberships/{username}:
    get:
      summary: Get team membership for a user
      description: >-
        Team members will include the members of child teams.


        To get a user's membership with a team, the team must be visible to the
        authenticated user.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `GET /organizations/{org_id}/team/{team_id}/memberships/{username}`.


        > [!NOTE]

        > The response contains the `state` of the membership and the member's
        `role`.


        The `role` for organization owners is set to `maintainer`. For more
        information about `maintainer` roles, see [Create a
        team](https://docs.github.com/rest/teams/teams#create-a-team).
      tags:
        - teams
      operationId: teams/get-membership-for-user-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/members#get-team-membership-for-a-user
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/username'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-membership'
              examples:
                response-if-user-is-a-team-maintainer:
                  $ref: >-
                    #/components/examples/team-membership-response-if-user-is-a-team-maintainer
        '404':
          description: if user has no team membership
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: members
      x-stackQL-resource: members
    put:
      summary: Add or update team membership for a user
      description: >-
        Adds an organization member to a team. An authenticated organization
        owner or team maintainer can add organization members to a team.


        Team synchronization is available for organizations using GitHub
        Enterprise Cloud. For more information, see [GitHub's
        products](https://docs.github.com/github/getting-started-with-github/githubs-products)
        in the GitHub Help documentation.


        > [!NOTE]

        > When you have team synchronization set up for a team with your
        organization's identity provider (IdP), you will see an error if you
        attempt to use the API for making changes to the team's membership. If
        you have access to manage group membership in your IdP, you can manage
        GitHub team membership through your identity provider, which
        automatically adds and removes team members in an organization. For more
        information, see "[Synchronizing teams between your identity provider
        and
        GitHub](https://docs.github.com/articles/synchronizing-teams-between-your-identity-provider-and-github/)."


        An organization owner can add someone who is not part of the team's
        organization to a team. When an organization owner adds someone to a
        team who is not an organization member, this endpoint will send an
        invitation to the person via email. This newly-created membership will
        be in the "pending" state until the person accepts the invitation, at
        which point the membership will transition to the "active" state and the
        user will be added as a member of the team.


        If the user is already a member of the team, this endpoint will update
        the role of the team member's role. To update the membership of a team
        member, the authenticated user must be an organization owner or a team
        maintainer.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `PUT /organizations/{org_id}/team/{team_id}/memberships/{username}`.
      tags:
        - teams
      operationId: teams/add-or-update-membership-for-user-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/members#add-or-update-team-membership-for-a-user
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/username'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  description: The role that this user should have in the team.
                  enum:
                    - member
                    - maintainer
                  default: member
            examples:
              default:
                summary: Add or update team membership for an organization member
                value:
                  role: maintainer
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-membership'
              examples:
                response-if-users-membership-with-team-is-now-pending:
                  $ref: >-
                    #/components/examples/team-membership-response-if-users-membership-with-team-is-now-pending
        '403':
          description: Forbidden if team synchronization is set up
        '422':
          description: Unprocessable Entity if you attempt to add an organization to a team
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: members
      x-stackQL-resource: members
    delete:
      summary: Remove team membership for a user
      description: >-
        To remove a membership between a user and a team, the authenticated user
        must have 'admin' permissions to the team or be an owner of the
        organization that the team is associated with. Removing team membership
        does not delete the user, it just removes their membership from the
        team.


        Team synchronization is available for organizations using GitHub
        Enterprise Cloud. For more information, see [GitHub's
        products](https://docs.github.com/github/getting-started-with-github/githubs-products)
        in the GitHub Help documentation.


        > [!NOTE]

        > When you have team synchronization set up for a team with your
        organization's identity provider (IdP), you will see an error if you
        attempt to use the API for making changes to the team's membership. If
        you have access to manage group membership in your IdP, you can manage
        GitHub team membership through your identity provider, which
        automatically adds and removes team members in an organization. For more
        information, see "[Synchronizing teams between your identity provider
        and
        GitHub](https://docs.github.com/articles/synchronizing-teams-between-your-identity-provider-and-github/)."


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `DELETE /organizations/{org_id}/team/{team_id}/memberships/{username}`.
      tags:
        - teams
      operationId: teams/remove-membership-for-user-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/members#remove-team-membership-for-a-user
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/username'
      responses:
        '204':
          description: Response
        '403':
          description: Forbidden if team synchronization is set up
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: members
      x-stackQL-resource: members
  /orgs/{org}/teams/{team_slug}/repos:
    get:
      summary: List team repositories
      description: >-
        Lists a team's repositories visible to the authenticated user.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `GET /organizations/{org_id}/team/{team_id}/repos`.
      tags:
        - teams
      operationId: teams/list-repos-in-org
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/teams/teams#list-team-repositories
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/minimal-repository'
              examples:
                default:
                  $ref: '#/components/examples/minimal-repository-items'
          headers:
            Link:
              $ref: '#/components/headers/link'
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
  /orgs/{org}/teams/{team_slug}/repos/{owner}/{repo}:
    get:
      summary: Check team permissions for a repository
      description: >-
        Checks whether a team has `admin`, `push`, `maintain`, `triage`, or
        `pull` permission for a repository. Repositories inherited through a
        parent team will also be checked.


        You can also get information about the specified repository, including
        what permissions the team grants on it, by passing the following custom
        [media
        type](https://docs.github.com/rest/using-the-rest-api/getting-started-with-the-rest-api#media-types/)
        via the `application/vnd.github.v3.repository+json` accept header.


        If a team doesn't have permission for the repository, you will receive a
        `404 Not Found` response status.


        If the repository is private, you must have at least `read` permission
        for that repository, and your token must have the `repo` or `admin:org`
        scope. Otherwise, you will receive a `404 Not Found` response status.


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `GET /organizations/{org_id}/team/{team_id}/repos/{owner}/{repo}`.
      tags:
        - teams
      operationId: teams/check-permissions-for-repo-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/teams#check-team-permissions-for-a-repository
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      responses:
        '200':
          description: Alternative response with repository permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/team-repository'
              examples:
                alternative-response-with-repository-permissions:
                  $ref: >-
                    #/components/examples/team-repository-alternative-response-with-repository-permissions
        '204':
          description: >-
            Response if team has permission for the repository. This is the
            response when the repository media type hasn't been provded in the
            Accept header.
        '404':
          description: Not Found if team does not have permission for the repository
      x-github:
        githubCloudOnly: false
        enabledForGitHubApps: true
        category: teams
        subcategory: teams
      x-stackQL-resource: teams
    put:
      summary: Add or update team repository permissions
      description: >-
        To add a repository to a team or update the team's permission on a
        repository, the authenticated user must have admin access to the
        repository, and must be able to see the team. The repository must be
        owned by the organization, or a direct fork of a repository owned by the
        organization. You will get a `422 Unprocessable Entity` status if you
        attempt to add a repository to a team that is not owned by the
        organization. Note that, if you choose not to pass any parameters,
        you'll need to set `Content-Length` to zero when calling out to this
        endpoint. For more information, see "[HTTP
        method](https://docs.github.com/rest/guides/getting-started-with-the-rest-api#http-method)."


        > [!NOTE]

        > You can also specify a team by `org_id` and `team_id` using the route
        `PUT /organizations/{org_id}/team/{team_id}/repos/{owner}/{repo}`.


        For more information about the permission levels, see "[Repository
        permission levels for an
        organization](https://docs.github.com/github/setting-up-and-managing-organizations-and-teams/repository-permission-levels-for-an-organization#permission-levels-for-repositories-owned-by-an-organization)".
      tags:
        - teams
      operationId: teams/add-or-update-repo-permissions-in-org
      externalDocs:
        description: API method documentation
        url: >-
          https://docs.github.com/rest/teams/teams#add-or-update-team-repository-permissions
      parameters:
        - $ref: '#/components/parameters/org'
        - $ref: '#/components/parameters/team-slug'
        - $ref: '#/components/parameters/owner'
        - $ref: '#/components/parameters/repo'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                permission:
                  type: string
                  description: >-
                    The permission to grant the team on this repository. We
                    accept the following permissions to be set: `pull`,
