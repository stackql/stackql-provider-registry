        storageType:
          $ref: "#/components/schemas/StorageType"
          description: "Storage type for the HCI Cluster. Allowed values are 'S2D', 'SAN', 'SANS2D'. Known values are: \"S2D\", \"SAN\", and \"SANS2D\"."
        s2d:
          $ref: "#/components/schemas/StorageS2dConfig"
