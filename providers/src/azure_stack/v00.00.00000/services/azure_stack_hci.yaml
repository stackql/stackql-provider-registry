openapi: 3.0.0
servers:
  - url: https://management.azure.com/
info:
  title: Azure Local (Azure Stack HCI)
  description: Hyperconverged infrastructure clusters, updates and deployment settings for Azure Local (formerly Azure Stack HCI).
  contact:
    name: StackQL Studios
    url: https://stackql.io/
    email: info@stackql.io
  version: 2026-04-01-preview-stackql-generated
  x-serviceAlias: azure_stack_hci
  x-sdkPackage: azure-mgmt-azurestackhci
  x-plane: mgmt
security:
  - azure_auth:
      - user_impersonation
components:
  securitySchemes:
    azure_auth:
      description: Azure Active Directory OAuth2 Flow.
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    SystemData:
      type: object
      description: Metadata pertaining to creation and last modification of the resource.
      properties:
        createdBy:
          type: string
          description: The identity that created the resource.
        createdByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that created the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        createdAt:
          type: string
          format: date-time
          description: The timestamp of resource creation (UTC).
        lastModifiedBy:
          type: string
          description: The identity that last modified the resource.
        lastModifiedByType:
          $ref: "#/components/schemas/CreatedByType"
          description: 'The type of identity that last modified the resource. Known values are: "User", "Application", "ManagedIdentity", and "Key".'
        lastModifiedAt:
          type: string
          format: date-time
          description: The timestamp of resource last modification (UTC).
    CreatedByType:
      type: string
      enum:
        - User
        - Application
        - ManagedIdentity
        - Key
    ArcSettingProperties:
      type: object
      description: ArcSetting properties.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state of the ArcSetting proxy resource. Known values are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        arcInstanceResourceGroup:
          type: string
          description: The resource group that hosts the Arc agents, ie. Hybrid Compute Machine resources.
        arcApplicationClientId:
          type: string
          description: App id of arc AAD identity.
        arcApplicationTenantId:
          type: string
          description: Tenant id of arc AAD identity.
        arcServicePrincipalObjectId:
          type: string
          description: Object id of arc AAD service principal.
        arcApplicationObjectId:
          type: string
          description: Object id of arc AAD identity.
        aggregateState:
          $ref: "#/components/schemas/ArcSettingAggregateState"
          description: 'Aggregate state of Arc agent across the nodes in this HCI cluster. Known values are: "NotSpecified", "Error", "Succeeded", "Canceled", "Failed", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        perNodeDetails:
          type: array
          items:
            $ref: "#/components/schemas/PerNodeState"
          description: State of Arc agent in each of the nodes.
        connectivityProperties:
          $ref: "#/components/schemas/ArcConnectivityProperties"
          description: contains connectivity related configuration for ARC resources.
        defaultExtensions:
          type: array
          items:
            $ref: "#/components/schemas/DefaultExtensionDetails"
          description: Properties for each of the default extensions category.
    ProvisioningState:
      type: string
      enum:
        - NotSpecified
        - Error
        - Succeeded
        - Failed
        - Canceled
        - Connected
        - Disconnected
        - Deleted
        - Creating
        - Updating
        - Deleting
        - Moving
        - PartiallySucceeded
        - PartiallyConnected
        - InProgress
        - Accepted
        - Provisioning
        - DisableInProgress
    ArcSettingAggregateState:
      type: string
      enum:
        - NotSpecified
        - Error
        - Succeeded
        - Canceled
        - Failed
        - Connected
        - Disconnected
        - Deleted
        - Creating
        - Updating
        - Deleting
        - Moving
        - PartiallySucceeded
        - PartiallyConnected
        - InProgress
        - Accepted
        - Provisioning
        - DisableInProgress
    PerNodeState:
      type: object
      description: Status of Arc agent for a particular node in HCI Cluster.
      properties:
        name:
          type: string
          description: Name of the Node in HCI Cluster.
        arcInstance:
          type: string
          description: Fully qualified resource ID for the Arc agent of this node.
        arcNodeServicePrincipalObjectId:
          type: string
          description: The service principal id of the arc for server node.
        state:
          $ref: "#/components/schemas/NodeArcState"
          description: "State of the Arc agent in this node. Indicates the current lifecycle status of the agent, such as whether it's being provisioned, connected, updated, or has encountered an error. Known values are: \"NotSpecified\", \"Error\", \"Succeeded\", \"Canceled\", \"Failed\", \"Connected\", \"Disconnected\", \"Deleted\", \"Creating\", \"Updating\", \"Deleting\", \"Moving\", \"PartiallySucceeded\", \"PartiallyConnected\", \"InProgress\", \"Accepted\", \"Provisioning\", and \"DisableInProgress\"."
    NodeArcState:
      type: string
      enum:
        - NotSpecified
        - Error
        - Succeeded
        - Canceled
        - Failed
        - Connected
        - Disconnected
        - Deleted
        - Creating
        - Updating
        - Deleting
        - Moving
        - PartiallySucceeded
        - PartiallyConnected
        - InProgress
        - Accepted
        - Provisioning
        - DisableInProgress
    ArcConnectivityProperties:
      type: object
      description: Connectivity related configuration required by arc server.
      properties:
        enabled:
          type: boolean
          description: True indicates ARC connectivity is enabled.
        serviceConfigurations:
          type: array
          items:
            $ref: "#/components/schemas/ServiceConfiguration"
          description: Service configurations associated with the connectivity resource. They are only processed by the server if 'enabled' property is set to 'true'.
    ServiceConfiguration:
      type: object
      description: Service configuration details.
      properties:
        serviceName:
          $ref: "#/components/schemas/ServiceName"
          description: Specifies the name of the service associated with the update or operation. This helps identify which system component or tool is involved. Required. "WAC"
        port:
          type: integer
          description: The port on which service is enabled. Required.
      required:
        - serviceName
        - port
    ServiceName:
      type: string
      enum:
        - WAC
    DefaultExtensionDetails:
      type: object
      description: Properties for a particular default extension category.
      properties:
        category:
          type: string
          description: Default extension category.
        consentTime:
          type: string
          format: date-time
          description: Consent time for extension category.
    ArcSettingFlattened:
      type: object
      description: Flattened view of ArcSetting ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state of the ArcSetting proxy resource. Known values are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        arcInstanceResourceGroup:
          type: string
          description: The resource group that hosts the Arc agents, ie. Hybrid Compute Machine resources.
        arcApplicationClientId:
          type: string
          description: App id of arc AAD identity.
        arcApplicationTenantId:
          type: string
          description: Tenant id of arc AAD identity.
        arcServicePrincipalObjectId:
          type: string
          description: Object id of arc AAD service principal.
        arcApplicationObjectId:
          type: string
          description: Object id of arc AAD identity.
        aggregateState:
          $ref: "#/components/schemas/ArcSettingAggregateState"
          description: 'Aggregate state of Arc agent across the nodes in this HCI cluster. Known values are: "NotSpecified", "Error", "Succeeded", "Canceled", "Failed", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        perNodeDetails:
          type: array
          items:
            $ref: "#/components/schemas/PerNodeState"
          description: State of Arc agent in each of the nodes.
        connectivityProperties:
          $ref: "#/components/schemas/ArcConnectivityProperties"
          description: contains connectivity related configuration for ARC resources.
        defaultExtensions:
          type: array
          items:
            $ref: "#/components/schemas/DefaultExtensionDetails"
          description: Properties for each of the default extensions category.
    PagedArcSettingFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ArcSettingFlattened"
        nextLink:
          type: string
    ArcSetting:
      type: object
      description: ArcSetting details.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/ArcSettingProperties"
          description: ArcSetting properties.
    ArcSettingsPatchProperties:
      type: object
      description: ArcSettings properties.
      properties:
        connectivityProperties:
          $ref: "#/components/schemas/ArcConnectivityProperties"
          description: contains connectivity related configuration for ARC resources.
    PasswordCredential:
      type: object
      description: PasswordCredential.
      properties:
        secretText:
          type: string
          description: ":vartype secret_text: str"
        keyId:
          type: string
          description: ":vartype key_id: str"
        startDateTime:
          type: string
          format: date-time
          description: ":vartype start_date_time: ~datetime.datetime"
        endDateTime:
          type: string
          format: date-time
          description: ":vartype end_date_time: ~datetime.datetime"
    ArcIdentityResponse:
      type: object
      description: ArcIdentity details.
      properties:
        properties:
          $ref: "#/components/schemas/ArcIdentityResponseProperties"
          description: ArcIdentity properties.
    ArcIdentityResponseProperties:
      type: object
      description: ArcIdentityResponseProperties.
      properties:
        arcApplicationClientId:
          type: string
          description: ":vartype arc_application_client_id: str"
        arcApplicationTenantId:
          type: string
          description: ":vartype arc_application_tenant_id: str"
        arcServicePrincipalObjectId:
          type: string
          description: ":vartype arc_service_principal_object_id: str"
        arcApplicationObjectId:
          type: string
          description: ":vartype arc_application_object_id: str"
    ReconcileArcSettingsRequestProperties:
      type: object
      description: List of Arc Nodes in the cluster.
      properties:
        clusterNodes:
          type: array
          items:
            type: string
          description: ":vartype cluster_nodes: list[str]"
    ClusterJobProperties:
      type: object
      description: "Cluster Job properties. You probably want to use the sub-classes and not this class directly. Known sub-classes are: HciConfigureCvmJobProperties, HciConfigureSdnIntegrationJobProperties"
      properties:
        jobType:
          type: string
          description: 'Job Type to support polymorphic resource. Required. Known values are: "ConfigureCVM" and "ConfigureSdnIntegration".'
        deploymentMode:
          $ref: "#/components/schemas/DeploymentMode"
          description: 'Deployment mode to trigger job. Known values are: "Validate" and "Deploy".'
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Job provisioning state. Known values are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        jobId:
          type: string
          description: Unique, immutable job id.
        startTimeUtc:
          type: string
          format: date-time
          description: The UTC date and time at which the job started.
        endTimeUtc:
          type: string
          format: date-time
          description: The UTC date and time at which the job completed.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: 'Status of Cluster job. Known values are: "NotSpecified", "ValidationInProgress", "ValidationSuccess", "ValidationFailed", "DeploymentInProgress", "DeploymentFailed", "DeploymentSuccess", "Succeeded", "Failed", "Canceled", "Paused", and "Scheduled".'
        reportedProperties:
          $ref: "#/components/schemas/JobReportedProperties"
          description: Reported properties for job.
      required:
        - jobType
    DeploymentMode:
      type: string
      enum:
        - Validate
        - Deploy
    JobStatus:
      type: string
      enum:
        - NotSpecified
        - ValidationInProgress
        - ValidationSuccess
        - ValidationFailed
        - DeploymentInProgress
        - DeploymentFailed
        - DeploymentSuccess
        - Succeeded
        - Failed
        - Canceled
        - Paused
        - Scheduled
    JobReportedProperties:
      type: object
      description: Reported Properties for job triggered from cloud.
      properties:
        percentComplete:
          type: integer
          description: The percentage of the job that is complete.
        validationStatus:
          $ref: "#/components/schemas/EceActionStatus"
          description: Validation status of job.
        deploymentStatus:
          $ref: "#/components/schemas/EceActionStatus"
          description: Deployment status of job.
    EceActionStatus:
      type: object
      description: The ECE action plan deployment status for AzureStackHCI Cluster.
      properties:
        status:
          type: string
          description: Status of ECE action AzureStackHCI Cluster Deployment.
        steps:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentStep"
          description: List of steps of AzureStackHCI Cluster Deployment.
    DeploymentStep:
      type: object
      description: The Step of AzureStackHCI Cluster.
      properties:
        name:
          type: string
          description: Name of step.
        description:
          type: string
          description: Description of step.
        fullStepIndex:
          type: string
          description: FullStepIndex of step.
        startTimeUtc:
          type: string
          description: Start time of step.
        endTimeUtc:
          type: string
          description: End time of step.
        status:
          type: string
          description: Status of step. Allowed values are 'Error', 'Success', 'InProgress'.
        steps:
          type: array
          items:
            $ref: "#/components/schemas/DeploymentStep"
          description: List of nested steps of AzureStackHCI Cluster Deployment.
        exception:
          type: array
          items:
            type: string
          description: List of exceptions in AzureStackHCI Cluster Deployment.
    ClusterJobFlattened:
      type: object
      description: Flattened view of ClusterJob ('properties' hoisted to the top level).
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        jobType:
          type: string
          description: 'Job Type to support polymorphic resource. Required. Known values are: "ConfigureCVM" and "ConfigureSdnIntegration".'
        deploymentMode:
          $ref: "#/components/schemas/DeploymentMode"
          description: 'Deployment mode to trigger job. Known values are: "Validate" and "Deploy".'
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Job provisioning state. Known values are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        jobId:
          type: string
          description: Unique, immutable job id.
        startTimeUtc:
          type: string
          format: date-time
          description: The UTC date and time at which the job started.
        endTimeUtc:
          type: string
          format: date-time
          description: The UTC date and time at which the job completed.
        status:
          $ref: "#/components/schemas/JobStatus"
          description: 'Status of Cluster job. Known values are: "NotSpecified", "ValidationInProgress", "ValidationSuccess", "ValidationFailed", "DeploymentInProgress", "DeploymentFailed", "DeploymentSuccess", "Succeeded", "Failed", "Canceled", "Paused", and "Scheduled".'
        reportedProperties:
          $ref: "#/components/schemas/JobReportedProperties"
          description: Reported properties for job.
    PagedClusterJobFlattened:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: "#/components/schemas/ClusterJobFlattened"
        nextLink:
          type: string
    ClusterJob:
      type: object
      description: Cluster Jobs resource.
      properties:
        id:
          type: string
          description: Fully qualified resource ID for the resource. Ex - /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/{resourceProviderNamespace}/{resourceType}/{resourceName}.
        name:
          type: string
          description: The name of the resource.
        type:
          type: string
          description: The type of the resource. E.g. "Microsoft.Compute/virtualMachines" or "Microsoft.Storage/storageAccounts".
        systemData:
          $ref: "#/components/schemas/SystemData"
          description: Azure Resource Manager metadata containing createdBy and modifiedBy information.
        properties:
          $ref: "#/components/schemas/ClusterJobProperties"
          description: The resource-specific properties for this resource.
    ClusterProperties:
      type: object
      description: Cluster properties.
      properties:
        provisioningState:
          $ref: "#/components/schemas/ProvisioningState"
          description: 'Provisioning state. Indicates the current lifecycle status of the resource, including creation, update, deletion, connectivity, and error states. Known values are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
        status:
          $ref: "#/components/schemas/Status"
          description: 'Status of the cluster agent. Indicates the current connectivity, validation, and deployment state of the agent within the cluster. Known values are: "NotYetRegistered", "ConnectedRecently", "NotConnectedRecently", "Disconnected", "Error", "NotSpecified", "ValidationInProgress", "ValidationSuccess", "ValidationFailed", "DeploymentInProgress", "DeploymentFailed", and "DeploymentSuccess".'
        connectivityStatus:
          $ref: "#/components/schemas/ConnectivityStatus"
          description: 'Overall connectivity status for the cluster resource. Indicates whether the cluster is connected to Azure, partially connected, or has not recently communicated. Known values are: "NotYetRegistered", "Connected", "NotConnectedRecently", "PartiallyConnected", "Disconnected", and "NotSpecified".'
        cloudId:
          type: string
          description: Unique, immutable resource id.
        ring:
          type: string
          description: The ring to which this cluster belongs to.
        cloudManagementEndpoint:
          type: string
          description: Endpoint configured for management from the Azure portal.
        aadClientId:
          type: string
          description: App id of cluster AAD identity.
        aadTenantId:
          type: string
          description: Tenant id of cluster AAD identity.
        aadApplicationObjectId:
          type: string
          description: Object id of cluster AAD identity.
        aadServicePrincipalObjectId:
          type: string
          description: Id of cluster identity service principal.
        softwareAssuranceProperties:
          $ref: "#/components/schemas/SoftwareAssuranceProperties"
          description: Software Assurance properties of the cluster.
        isManagementCluster:
          type: boolean
          description: Is Management Cluster, when true indicates that the cluster is used for managing other clusters.
        logCollectionProperties:
          $ref: "#/components/schemas/LogCollectionProperties"
          description: Log Collection properties of the cluster.
        remoteSupportProperties:
          $ref: "#/components/schemas/RemoteSupportProperties"
          description: RemoteSupport properties of the cluster.
        desiredProperties:
          $ref: "#/components/schemas/ClusterDesiredProperties"
          description: Desired properties of the cluster.
        reportedProperties:
          $ref: "#/components/schemas/ClusterReportedProperties"
          description: Properties reported by cluster agent.
        isolatedVmAttestationConfiguration:
          $ref: "#/components/schemas/IsolatedVmAttestationConfiguration"
          description: Attestation configurations for isolated VM (e.g. TVM, CVM) of the cluster.
        trialDaysRemaining:
          type: number
          description: Number of days remaining in the trial period.
        billingModel:
          type: string
          description: Type of billing applied to the resource.
        billingProperties:
          $ref: "#/components/schemas/ClusterBillingProperties"
          description: Billing properties of the cluster, including upcoming billing model details.
        registrationTimestamp:
          type: string
          format: date-time
          description: First cluster sync timestamp.
        lastSyncTimestamp:
          type: string
          format: date-time
          description: Most recent cluster sync timestamp.
        lastBillingTimestamp:
          type: string
          format: date-time
          description: Most recent billing meter timestamp.
        serviceEndpoint:
          type: string
          description: Region specific DataPath Endpoint of the cluster.
        resourceProviderObjectId:
          type: string
          description: Object id of RP Service Principal.
        secretsLocations:
          type: array
          items:
            $ref: "#/components/schemas/SecretsLocationDetails"
          description: List of secret locations.
        clusterPattern:
          $ref: "#/components/schemas/ClusterPattern"
          description: 'Supported Storage Type for HCI Cluster. Known values are: "Standard" and "RackAware".'
        confidentialVmProperties:
          $ref: "#/components/schemas/ConfidentialVmProperties"
          description: Represents the Confidential Virtual Machine (CVM) support intent and current status for the cluster resource.
        sdnProperties:
          $ref: "#/components/schemas/ClusterSdnProperties"
          description: Software Defined Networking Properties of the cluster.
        localAvailabilityZones:
          type: array
          items:
            $ref: "#/components/schemas/LocalAvailabilityZones"
          description: Local Availability Zone information for HCI cluster.
        identityProvider:
          $ref: "#/components/schemas/IdentityProvider"
          description: 'Identity Provider for the cluster. Known values are: "ActiveDirectory" and "LocalIdentity".'
        storageType:
          $ref: "#/components/schemas/StorageType"
          description: 'Storage type of the cluster. Indicates whether the cluster uses S2D, SAN, or a combination. Known values are: "S2D", "SAN", and "SANS2D".'
    Status:
      type: string
      enum:
        - NotYetRegistered
        - ConnectedRecently
        - NotConnectedRecently
        - Disconnected
        - Error
        - NotSpecified
        - ValidationInProgress
        - ValidationSuccess
        - ValidationFailed
        - DeploymentInProgress
        - DeploymentFailed
        - DeploymentSuccess
    ConnectivityStatus:
      type: string
      enum:
        - NotYetRegistered
        - Connected
        - NotConnectedRecently
        - PartiallyConnected
        - Disconnected
        - NotSpecified
    SoftwareAssuranceProperties:
      type: object
      description: Software Assurance properties of the cluster.
      properties:
        softwareAssuranceStatus:
          $ref: "#/components/schemas/SoftwareAssuranceStatus"
          description: 'Status of the Software Assurance for the cluster. Known values are: "Enabled" and "Disabled".'
        softwareAssuranceIntent:
          $ref: "#/components/schemas/SoftwareAssuranceIntent"
          description: 'Customer Intent for Software Assurance Benefit. Known values are: "Enable" and "Disable".'
        lastUpdated:
          type: string
          format: date-time
          description: TimeStamp denoting the latest SA benefit applicability is validated.
    SoftwareAssuranceStatus:
      type: string
      enum:
        - Enabled
        - Disabled
    SoftwareAssuranceIntent:
      type: string
      enum:
        - Enable
        - Disable
    LogCollectionProperties:
      type: object
      description: Log Collection properties of the cluster.
      properties:
        fromDate:
          type: string
          format: date-time
          description: From DateTimeStamp from when logs need to be connected.
        toDate:
          type: string
          format: date-time
          description: To DateTimeStamp till when logs need to be connected.
        lastLogGenerated:
          type: string
          format: date-time
          description: Recent DateTimeStamp where logs are successfully generated.
        logCollectionSessionDetails:
          type: array
          items:
            $ref: "#/components/schemas/LogCollectionSession"
          description: ":vartype log_collection_session_details: list[~azure.mgmt.azurestackhci.models.LogCollectionSession]"
    LogCollectionSession:
      type: object
      description: Log Collection Session details of the cluster.
      properties:
        logStartTime:
          type: string
          format: date-time
          description: Start Time of the logs when it was collected.
        logEndTime:
          type: string
          format: date-time
          description: End Time of the logs when it was collected.
        timeCollected:
          type: string
          format: date-time
          description: Duration of logs collected.
        logSize:
          type: integer
          description: Size of the logs collected.
        logCollectionStatus:
          $ref: "#/components/schemas/LogCollectionStatus"
          description: 'LogCollection status. Known values are: "None", "InProgress", "Failed", and "Succeeded".'
        correlationId:
          type: string
          description: CorrelationId of the log collection.
        logCollectionJobType:
          $ref: "#/components/schemas/LogCollectionJobType"
