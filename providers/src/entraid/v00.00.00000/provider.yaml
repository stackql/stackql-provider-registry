config:
  auth:
    type: oauth2
    grant_type: client_credentials
    client_id_env_var: AZURE_CLIENT_ID
    client_secret_env_var: AZURE_CLIENT_SECRET
    token_url: >-
      https://login.microsoftonline.com/{{ .__env__AZURE_TENANT_ID
      }}/oauth2/v2.0/token
    scopes:
      - https://graph.microsoft.com/.default
