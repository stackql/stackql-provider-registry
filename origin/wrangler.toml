#
# StackQL Provider Registry origin Worker (green).
#
# Two environments mirror the existing dev/prod Deno Deploy split:
#   - `dev`        -> deployed from the `dev` branch  (cutover host: registry-dev.stackql.app)
#   - `production` -> deployed from the `main` branch (cutover host: registry.stackql.app)
#
# Named environments do NOT inherit top-level bindings, so each environment
# declares its own R2 + D1 bindings explicitly. The top-level block below is
# used by `wrangler dev` for local development only.
#
# Placeholders to fill once the Cloudflare resources exist (Phase 1):
#   <DEV_D1_ID>  / <PROD_D1_ID>   from `wrangler d1 create ...`
#   account_id   may be set here or via CLOUDFLARE_ACCOUNT_ID in CI.
#

name = "stackql-provider-registry"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# account_id = "<CLOUDFLARE_ACCOUNT_ID>"   # or set CLOUDFLARE_ACCOUNT_ID env var in CI

# ---------------------------------------------------------------------------
# Local dev defaults (wrangler dev). Points at the dev resources.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "REGISTRY_BUCKET"
bucket_name = "stackql-provider-registry-dev"

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "stackql-registry-analytics-dev"
database_id = "fba87ccb-e0c7-42d3-80fd-51a25798b9d8"

# ---------------------------------------------------------------------------
# dev environment  ->  `wrangler deploy --env dev`
# ---------------------------------------------------------------------------
[env.dev]
name = "stackql-provider-registry-dev"

[[env.dev.r2_buckets]]
binding = "REGISTRY_BUCKET"
bucket_name = "stackql-provider-registry-dev"

[[env.dev.d1_databases]]
binding = "ANALYTICS_DB"
database_name = "stackql-registry-analytics-dev"
database_id = "fba87ccb-e0c7-42d3-80fd-51a25798b9d8"

# Until uncommented the Worker is reachable only at its workers.dev route, which
# is what Phase 3 validation uses. Uncomment at the Phase 4 cutover to attach the
# real dev hostname as a custom domain (writes DNS on the stackql.app zone).
# [[env.dev.routes]]
# pattern = "registry-dev.stackql.app"
# custom_domain = true

# ---------------------------------------------------------------------------
# production environment  ->  `wrangler deploy --env production`
# ---------------------------------------------------------------------------
[env.production]
name = "stackql-provider-registry-prod"

[[env.production.r2_buckets]]
binding = "REGISTRY_BUCKET"
bucket_name = "stackql-provider-registry"

[[env.production.d1_databases]]
binding = "ANALYTICS_DB"
database_name = "stackql-registry-analytics"
database_id = "46c0557d-be94-4866-b56a-765db804880c"

# Uncomment at the Phase 4 cutover to attach the real prod hostname (see dev block).
# [[env.production.routes]]
# pattern = "registry.stackql.app"
# custom_domain = true
